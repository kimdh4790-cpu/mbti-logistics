<style>
:root{--bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--border:#2e3250;--text:#e8eaf6;--text2:#9da3c8;--text3:#5a5f7a;--acc:#00d4ff;--green:#00ff94;--red:#ff4d6d;--yellow:#ffd700;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:900;color:var(--acc)}
.logo-sub{font-size:11px;color:var(--text3)}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px}
.inp{width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.inp:focus{outline:none;border-color:var(--acc)}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s}
.btn-acc{background:var(--acc);color:#000}
.btn-green{background:var(--green);color:#000}
.btn-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
/* 결과 리스트 */
.result-item{padding:10px 14px;background:var(--bg3);border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px;border:1px solid transparent;transition:all .15s;margin-bottom:4px}
.result-item:hover{border-color:var(--acc)}
/* 상품 카드 */
.product-card{background:var(--bg2);border:2px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.product-card.active{border-color:var(--green)}
.product-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.product-icon{font-size:20px;width:28px;text-align:center}
.product-name{font-size:14px;font-weight:800;flex:1}
.product-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700}
.badge-on{background:rgba(0,255,148,.15);color:var(--green)}
.badge-off{background:rgba(255,77,109,.1);color:var(--red)}
.product-arrow{font-size:12px;color:var(--text3);transition:transform .2s}
.product-arrow.open{transform:rotate(180deg)}
/* 토글 */
.toggle-wrap{display:flex;align-items:center;gap:8px;margin-right:8px}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none;outline:none}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}
/* 드롭다운 내용 */
.product-body{display:none;border-top:1px solid var(--border);padding:12px 16px;background:var(--bg3)}
.product-body.open{display:block}
/* 서브 항목 */
.sub-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:8px;margin-bottom:6px}
.sub-icon{font-size:14px;width:20px;text-align:center}
.sub-name{flex:1;font-size:12px;font-weight:600}
.sub-toggle{width:34px;height:18px;border-radius:9px;background:var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none;outline:none}
.sub-toggle.on{background:var(--green)}
.sub-toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.sub-toggle.on::after{left:17px}
/* 설정 필드 */
.field-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.field-label{font-size:11px;color:var(--text3);width:60px;flex-shrink:0}
.field-inp{flex:1;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px}
.field-inp:focus{outline:none;border-color:var(--acc)}
/* 로그 */
.log-item{padding:10px 14px;background:var(--bg2);border-radius:10px;font-size:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
/* 토스트 */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>

function _showLogin(){
  var wrap=document.createElement('div');
  wrap.style.cssText='display:flex;align-items:center;justify-content:center;height:100vh';
  document.body.innerHTML='';
  document.body.appendChild(wrap);
  var box=document.createElement('div');
  box.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:320px;text-align:center';
  box.innerHTML='<div style="font-size:32px;margin-bottom:8px">⚙️</div><div style="font-size:18px;font-weight:900;color:var(--acc);margin-bottom:24px">DONWAY 어드민</div>';
  var ei=document.createElement('input');ei.type='email';ei.placeholder='슈퍼어드민 이메일';
  ei.style.cssText='width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:8px;display:block';
  var pi=document.createElement('input');pi.type='password';pi.placeholder='비밀번호';
  pi.style.cssText='width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:16px;display:block';
  var btn=document.createElement('button');btn.textContent='로그인';
  btn.style.cssText='width:100%;padding:12px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer';
  var err=document.createElement('div');err.style.cssText='color:var(--red);font-size:11px;margin-top:8px';
  btn.addEventListener('click',function(){
    firebase.auth().signInWithEmailAndPassword(ei.value,pi.value).catch(function(e){err.textContent=e.message;});
  });
  box.appendChild(ei);box.appendChild(pi);box.appendChild(btn);box.appendChild(err);
  wrap.appendChild(box);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function _tabSwitch(el,tab){
  document.querySelectorAll('.btn-acc,.btn-gray').forEach(function(b){
    b.className=b.className.replace('btn-acc','btn-gray');
  });
  el.className=el.className.replace('btn-gray','btn-acc');
  if(tab==='requests') _renderRequests();
  else _renderManage();
}

function _renderMain(){
  var wrap=document.getElementById('main-wrap');
  wrap.innerHTML=
    '<div style="display:flex;gap:8px;margin-bottom:20px">'+
      '<button id="tab-requests" class="btn btn-acc" onclick="_tabSwitch(this,\'requests\')">'+
        '📋 신청 대기 <span id="pending-count" style="background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;margin-left:4px">0</span>'+
      '</button>'+
      '<button id="tab-manage" class="btn btn-gray" onclick="_tabSwitch(this,\'manage\')">🏢 구독 관리</button>'+
    '</div>'+
    '<div id="tab-content"></div>';
  _renderRequests();
}

function _renderRequests(){
  var el=document.getElementById('tab-content');
  el.innerHTML='<div style="color:var(--text3);font-size:12px;padding:16px;text-align:center">⏳ 로딩 중...</div>';
  _db.collection('join_requests').orderBy('createdAt','desc').limit(50).get()
  .then(function(snap){
    var pending=[];var approved=[];var rejected=[];
    snap.forEach(function(d){
      var v=Object.assign({id:d.id},d.data());
      if(v.status==='pending')pending.push(v);
      else if(v.status==='approved')approved.push(v);
      else rejected.push(v);
    });
    // pending count badge
    var badge=document.getElementById('pending-count');
    if(badge)badge.textContent=pending.length;

    var html='';
    if(pending.length){
      html+='<div style="font-size:13px;font-weight:800;margin-bottom:10px;color:var(--yellow)">⏳ 승인 대기 ('+pending.length+'건)</div>';
      html+=pending.map(function(v){return _reqCard(v,'pending');}).join('');
    }
    if(approved.length){
      html+='<div style="font-size:13px;font-weight:800;margin:16px 0 10px;color:var(--green)">✅ 승인 완료 ('+approved.length+'건)</div>';
      html+=approved.map(function(v){return _reqCard(v,'approved');}).join('');
    }
    if(rejected.length){
      html+='<div style="font-size:13px;font-weight:800;margin:16px 0 10px;color:var(--red)">❌ 반려 ('+rejected.length+'건)</div>';
      html+=rejected.map(function(v){return _reqCard(v,'rejected');}).join('');
    }
    if(!html)html='<div style="text-align:center;padding:40px;color:var(--text3)">신청 내역 없음</div>';
    el.innerHTML=html;
  }).catch(function(e){el.innerHTML='<div style="color:var(--red);padding:16px">'+esc(e.message)+'</div>';});
}

function _reqCard(v,status){
  var ind={ai_settle:'🤖',delivery:'🛵',beauty:'💄',construction:'🏗️',insurance:'🛡️',care:'🏥',academy:'🎓',restaurant:'🍽️',golf:'🏌️',warehouse:'📦',freelance:'🖥️',etc:'📋'};
  var colors={pending:'var(--yellow)',approved:'var(--green)',rejected:'var(--red)'};
  var labels={pending:'대기',approved:'승인',rejected:'반려'};
  return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'+
      '<div>'+
        '<div style="font-size:14px;font-weight:900">'+esc(v.companyName||'')+'</div>'+
        '<div style="font-size:11px;color:var(--text3)">'+esc(v.repName||'')+' · '+esc(v.phone||'')+'</div>'+
        '<div style="font-size:11px;color:var(--acc)">'+esc(v.email||'')+'</div>'+
      '</div>'+
      '<span style="font-size:10px;padding:3px 8px;border-radius:20px;background:'+colors[status]+'22;color:'+colors[status]+';font-weight:700">'+labels[status]+'</span>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:10px;font-size:11px;color:var(--text3)">'+
      '<span>'+(ind[v.industry]||'📋')+' '+(v.industry||'')+'</span>'+
      '<span>·</span>'+
      '<span>👥 '+(v.personCount||0)+'명 이하</span>'+
      '<span>·</span>'+
      '<span>'+(v.createdAt||'').slice(0,10)+'</span>'+
    '</div>'+
    (v.memo?'<div style="font-size:11px;color:var(--text2);background:var(--bg3);padding:8px;border-radius:8px;margin-bottom:10px">💬 '+esc(v.memo)+'</div>':'')+
    (status==='pending'?
      '<div style="display:flex;gap:6px">'+
        '<button data-id="'+v.id+'" data-email="'+esc(v.email)+'" data-name="'+esc(v.companyName)+'" onclick="_approve(this)" class="btn btn-green" style="flex:1;padding:8px">✅ 승인 (7일 체험 시작)</button>'+
        '<button data-id="'+v.id+'" onclick="_reject(this)" class="btn btn-gray" style="padding:8px 14px">❌ 반려</button>'+
      '</div>':
      '<div style="font-size:11px;color:var(--text3)">처리일: '+(v.processedAt||'').slice(0,10)+' · 처리자: '+esc(v.processedBy||'')+'</div>')+
  '</div>';
}

function _approve(btn){
  var id=btn.dataset.id;
  var email=btn.dataset.email;
  var name=btn.dataset.name;
  if(!confirm(name+' 승인하시겠습니까?'))return;
  btn.textContent='⏳ 처리 중...';btn.disabled=true;

  var trialExpiry=new Date();trialExpiry.setDate(trialExpiry.getDate()+7);
  var trialStr=trialExpiry.toISOString().slice(0,10);
  var now=new Date().toISOString();
  var newCompanyId='';

  _db.collection('join_requests').doc(id).get()
  .then(function(d){
    if(!d.exists)throw new Error('신청 데이터 없음');
    var v=d.data();
    return _db.collection('companies').add({
      companyName:v.companyName,
      repName:v.repName,
      adminEmail:v.email,
      phone:v.phone,
      industryType:v.industry,
      personCount:v.personCount||0,
      status:'trial',
      plan:'trial',
      trialExpiry:trialStr,
      subscriptions:{donway:{active:true,plan:'trial',expiry:trialStr}},
      createdAt:now,
      approvedAt:now,
      approvedBy:_cu.email,
      joinRequestId:id,
    });
  }).then(function(ref){
    newCompanyId=ref.id;
    return _db.collection('join_requests').doc(id).update({
      status:'approved',
      processedAt:now,
      processedBy:_cu.email,
      companyId:newCompanyId,
      trialExpiry:trialStr,
    });
  }).then(function(){
    // alimtalk 큐
    return _db.collection('alimtalk_queue').add({
      type:'join_approved',email:email,companyName:name,
      trialExpiry:trialStr,loginUrl:'https://donway.ai.kr/settle',
      status:'pending',createdAt:now,
    });
  }).then(function(){
    // ★ Firebase Auth 계정 자동 생성 + 이메일 발송
    return fetch('/api/create-account',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:email,
        companyName:name,
        companyId:newCompanyId,
        trialExpiry:trialStr,
      })
    });
  }).then(function(res){return res.json();})
  .then(function(data){
    if(data&&data.ok){
      toast('✅ '+name+' 승인 완료! 계정 생성 + 이메일 자동 발송됨',3500);
    } else {
      toast('✅ '+name+' 승인 완료 (이메일 수동 발송 필요: '+(data&&data.reason||'unknown')+')',4000);
    }
    btn.textContent='✅ 승인';btn.disabled=false;
    _renderRequests();
  }).catch(function(e){
    toast('❌ '+e.message);
    btn.textContent='✅ 승인';btn.disabled=false;
  });
}

function _reject(btn){
  var id=btn.dataset.id;
  if(!confirm('반려하시겠습니까?'))return;
  _db.collection('join_requests').doc(id).update({
    status:'rejected',
    processedAt:new Date().toISOString(),
    processedBy:_cu.email,
  }).then(function(){
    toast('반려 처리됨');_renderRequests();
  }).catch(function(e){toast('❌ '+e.message);});
}

function _renderManage(){
  var el=document.getElementById('tab-content');
  el.innerHTML=
    '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px">'+
      '<div style="display:flex;gap:8px;margin-bottom:12px">'+
        '<input id="search-inp" class="inp" style="flex:1" placeholder="업체명 또는 이메일로 검색..." onkeydown="if(event.key===\'Enter\')_search()">'+
        '<button class="btn btn-acc" onclick="_search()">검색</button>'+
        '<button class="btn btn-gray" onclick="_loadAll()">전체</button>'+
      '</div>'+
      '<div id="search-result"></div>'+
    '</div>'+
    '<div id="company-detail"></div>'+
    '<div style="font-size:13px;font-weight:800;margin-bottom:10px">📋 최근 구독 변경 내역</div>'+
    '<div id="recent-logs"></div>';
  _loadLogs();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 검색
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function _search(){
  var q=(document.getElementById('search-inp')||{}).value||'';
  if(!q){_loadAll();return;}
  var el=document.getElementById('search-result');
  el.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px">⏳ 검색 중...</div>';
  Promise.all([
    _db.collection('companies').where('companyName','>=',q).where('companyName','<=',q+'\uf8ff').limit(10).get(),
    _db.collection('companies').where('adminEmail','==',q).limit(5).get(),
  ]).then(function(results){
    var seen={};var items=[];
    results.forEach(function(snap){snap.forEach(function(d){if(!seen[d.id]){seen[d.id]=true;items.push(Object.assign({id:d.id},d.data()));}});});
    _renderResults(items);
  }).catch(function(e){el.innerHTML='<div style="color:var(--red);font-size:12px">'+esc(e.message)+'</div>';});
}

function _loadAll(){
  var el=document.getElementById('search-result');
  el.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px">⏳ 로딩 중...</div>';
  _db.collection('companies').orderBy('createdAt','desc').limit(30).get()
  .then(function(snap){
    var items=[];snap.forEach(function(d){items.push(Object.assign({id:d.id},d.data()));});
    _renderResults(items);
  }).catch(function(e){el.innerHTML='<div style="color:var(--red);font-size:12px">'+esc(e.message)+'</div>';});
}

function _renderResults(items){
  var el=document.getElementById('search-result');
  if(!items.length){el.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px">검색 결과 없음</div>';return;}
  el.innerHTML=items.map(function(c){
    return '<div class="result-item" data-id="'+c.id+'" onclick="_select(\''+c.id+'\')">'+
      '<div><div style="font-weight:700">'+esc(c.companyName||c.name||'이름없음')+'</div>'+
      '<div style="color:var(--text3);font-size:10px">'+esc(c.adminEmail||c.email||'')+'</div></div>'+
      '<div style="font-size:10px;color:var(--acc);font-family:monospace">'+c.id.slice(0,8)+'</div>'+
    '</div>';
  }).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 업체 선택
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var _selCo=null;

function _select(id){
  _db.collection('companies').doc(id).get().then(function(d){
    if(!d.exists){toast('업체 없음');return;}
    _selCo=Object.assign({id:d.id},d.data());
    _renderDetail();
    document.getElementById('search-result').innerHTML='';
    document.getElementById('search-inp').value='';
    document.getElementById('company-detail').scrollIntoView({behavior:'smooth'});
  });
}

function _renderDetail(){
  var c=_selCo;
  var subs=c.subscriptions||{};
  var today=new Date();today.setMonth(today.getMonth()+1);
  var defExpiry=today.toISOString().slice(0,10);

  var cards=PRODUCTS.map(function(p){
    var s=subs[p.id]||{};
    var isOn=!!(s.active);

    // 필드 렌더링
    var fieldsHtml=p.fields.map(function(f){
      var val=s[f.id]||'';
      var inp='';
      if(f.type==='select'){
        inp='<select id="f_'+p.id+'_'+f.id+'" class="field-inp">'+
          f.opts.map(function(o){return '<option value="'+o.v+'"'+(val===o.v?' selected':'')+'>'+o.l+'</option>';}).join('')+
        '</select>';
      } else if(f.type==='date'){
        inp='<input type="date" id="f_'+p.id+'_'+f.id+'" class="field-inp" value="'+(val||defExpiry)+'">';
      } else {
        inp='<input type="'+f.type+'" id="f_'+p.id+'_'+f.id+'" class="field-inp" value="'+esc(String(val))+'" placeholder="'+esc(f.placeholder||'')+'">';
      }
      return '<div class="field-row"><div class="field-label">'+f.label+'</div>'+inp+'</div>';
    }).join('');

    // 서브항목 렌더링
    var subsHtml='';
    if(p.subs&&p.subs.length){
      var subItems=p.subs.map(function(sub){
        var subOn=!!(s.features&&s.features[sub.id]);
        return '<div class="sub-row">'+
          '<span class="sub-icon">'+sub.icon+'</span>'+
          '<span class="sub-name">'+sub.name+'</span>'+
          '<button class="sub-toggle '+(subOn?'on':'')+'" id="st_'+p.id+'_'+sub.id+'" data-pid="'+p.id+'" data-sid="'+sub.id+'" onclick="_toggleSubItem(this)"></button>'+
        '</div>';
      }).join('');
      subsHtml='<div style="margin-bottom:8px">'+
        '<div style="font-size:10px;font-weight:700;color:var(--text3);margin-bottom:6px">세부 기능</div>'+
        subItems+
      '</div>';
    }

    return '<div class="product-card '+(isOn?'active':'')+'" id="pc_'+p.id+'">'+
      '<div class="product-header" onclick="_toggleBody(\''+p.id+'\')">'+
        '<span class="product-icon">'+p.icon+'</span>'+
        '<span class="product-name">'+p.name+'</span>'+
        '<div class="toggle-wrap" onclick="event.stopPropagation()">'+
          '<button class="toggle '+(isOn?'on':'')+'" id="pt_'+p.id+'" data-pid="'+p.id+'" onclick="_toggleProduct(this)"></button>'+
        '</div>'+
        '<span class="product-badge '+(isOn?'badge-on':'badge-off')+'" id="pb_'+p.id+'">'+(isOn?'활성':'미구독')+'</span>'+
        '<span class="product-arrow" id="pa_'+p.id+'">▼</span>'+
      '</div>'+
      '<div class="product-body" id="pb_body_'+p.id+'">'+
        subsHtml+
        fieldsHtml+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('company-detail').innerHTML=
    '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
        '<div>'+
          '<div style="font-size:15px;font-weight:900">'+esc(c.companyName||c.name||'이름없음')+'</div>'+
          '<div style="font-size:11px;color:var(--text3)">'+esc(c.adminEmail||c.email||'')+'</div>'+
          '<div style="font-size:10px;color:var(--acc);font-family:monospace;margin-top:2px">'+c.id+'</div>'+
        '</div>'+
        '<div style="display:flex;gap:8px">'+
          '<button class="btn btn-green" onclick="_save()">💾 저장</button>'+
          '<button class="btn btn-gray" onclick="_close()">닫기</button>'+
        '</div>'+
      '</div>'+
      cards+
    '</div>';
}

function _toggleBody(pid){
  var body=document.getElementById('pb_body_'+pid);
  var arrow=document.getElementById('pa_'+pid);
  if(!body)return;
  var isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  if(arrow)arrow.classList.toggle('open',!isOpen);
}

function _toggleProduct(btn){
  var pid=btn.dataset.pid;
  var isOn=btn.classList.contains('on');
  btn.classList.toggle('on',!isOn);
  var card=document.getElementById('pc_'+pid);
  var badge=document.getElementById('pb_'+pid);
  if(card)card.classList.toggle('active',!isOn);
  if(badge){badge.className='product-badge '+(isOn?'badge-off':'badge-on');badge.textContent=isOn?'미구독':'활성';}
  // 켜면 드롭다운 자동 열기
  if(!isOn){
    var body=document.getElementById('pb_body_'+pid);
    var arrow=document.getElementById('pa_'+pid);
    if(body)body.classList.add('open');
    if(arrow)arrow.classList.add('open');
  }
}

function _toggleSubItem(btn){
  btn.classList.toggle('on');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 저장
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function _save(){
  if(!_selCo){toast('업체를 선택하세요');return;}
  var newSubs={};
  PRODUCTS.forEach(function(p){
    var toggle=document.getElementById('pt_'+p.id);
    var isOn=toggle?toggle.classList.contains('on'):false;
    var data={active:isOn,updatedAt:new Date().toISOString()};
    // 필드 값
    p.fields.forEach(function(f){
      var el=document.getElementById('f_'+p.id+'_'+f.id);
      if(el){var v=el.value;if(f.type==='number')v=parseFloat(v)||0;data[f.id]=v;}
    });
    // 서브항목 features
    if(p.subs&&p.subs.length){
      data.features={};
      p.subs.forEach(function(sub){
        var st=document.getElementById('st_'+p.id+'_'+sub.id);
        data.features[sub.id]=st?st.classList.contains('on'):false;
      });
    }
    newSubs[p.id]=data;
  });

  var btn=document.querySelector('.btn-green');
  if(btn){btn.textContent='⏳ 저장 중...';btn.disabled=true;}

  _db.collection('companies').doc(_selCo.id).update({
    subscriptions:newSubs,
    subsUpdatedAt:new Date().toISOString(),
    subsUpdatedBy:_cu.email,
  }).then(function(){
    return _db.collection('subscription_logs').add({
      companyId:_selCo.id,
      companyName:_selCo.companyName||_selCo.name||'',
      subscriptions:newSubs,
      updatedBy:_cu.email,
      createdAt:new Date().toISOString(),
    });
  }).then(function(){
    toast('✅ 저장 완료!');
    if(btn){btn.textContent='💾 저장';btn.disabled=false;}
    _selCo.subscriptions=newSubs;
    _loadLogs();
  }).catch(function(e){
    toast('❌ '+e.message);
    if(btn){btn.textContent='💾 저장';btn.disabled=false;}
  });
}

function _close(){
  document.getElementById('company-detail').innerHTML='';
  _selCo=null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 변경 내역
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function _loadLogs(){
  var el=document.getElementById('recent-logs');
  if(!el)return;
  _db.collection('subscription_logs').orderBy('createdAt','desc').limit(20).get()
  .then(function(snap){
    if(snap.empty){el.innerHTML='<div style="color:var(--text3);font-size:12px;padding:12px">변경 내역 없음</div>';return;}
    el.innerHTML=snap.docs.map(function(d){
      var v=d.data();
      var subs=v.subscriptions||{};
      var activeList=Object.keys(subs).filter(function(k){return subs[k]&&subs[k].active;});
      var icons={donway:'💰',qr:'🔲',inventory:'📦',kiosk:'🖥️'};
      return '<div class="log-item">'+
        '<div>'+
          '<div style="font-weight:700">'+esc(v.companyName||'')+'</div>'+
          '<div style="color:var(--text3);font-size:10px">'+(v.createdAt||'').slice(0,16).replace('T',' ')+' · '+esc(v.updatedBy||'')+'</div>'+
        '</div>'+
        '<div style="display:flex;gap:4px;flex-wrap:wrap">'+
          activeList.map(function(k){return '<span style="padding:2px 7px;background:rgba(0,255,148,.1);border-radius:10px;font-size:10px;color:var(--green)">'+(icons[k]||k)+'</span>';}).join('')+
        '</div>'+
      '</div>';
    }).join('');
  }).catch(function(){});
}
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}
// ★ PWA 설치 배너
var _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  _deferredPrompt=e;
  var btn=document.getElementById('install-btn');
  if(btn)btn.style.display='flex';
});
function _installPWA(){
  if(!_deferredPrompt)return;
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(function(){_deferredPrompt=null;});
}
</script>
