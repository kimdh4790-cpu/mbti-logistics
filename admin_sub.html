<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>구독 관리 — DONWAY 어드민</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--border:#2e3250;--text:#e8eaf6;--text2:#9da3c8;--text3:#5a5f7a;--acc:#00d4ff;--green:#00ff94;--red:#ff4d6d;--yellow:#ffd700;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.logo{font-size:16px;font-weight:900;color:var(--acc)}
.logo-sub{font-size:11px;color:var(--text3)}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px}
/* 검색 */
.search-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px}
.search-row{display:flex;gap:8px}
.inp{flex:1;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.inp:focus{outline:none;border-color:var(--acc)}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700}
.btn-acc{background:var(--acc);color:#000}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
/* 업체 카드 */
.company-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.company-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.company-name{font-size:15px;font-weight:900}
.company-info{font-size:11px;color:var(--text3);margin-top:2px}
.company-code{font-size:11px;color:var(--acc);font-family:monospace}
/* 구독 그리드 */
.sub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:600px){.sub-grid{grid-template-columns:1fr}}
.sub-item{background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:14px;transition:all .2s}
.sub-item.active{border-color:var(--green)}
.sub-item.inactive{border-color:var(--border);opacity:.7}
.sub-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sub-name{font-size:13px;font-weight:800}
.sub-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700}
.badge-on{background:rgba(0,255,148,.15);color:var(--green)}
.badge-off{background:rgba(255,77,109,.15);color:var(--red)}
.sub-toggle{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:23px}
.sub-detail{display:flex;flex-direction:column;gap:6px;font-size:11px}
.sub-row{display:flex;align-items:center;gap:6px}
.sub-label{color:var(--text3);width:60px;flex-shrink:0}
.sub-inp{flex:1;padding:5px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px}
.sub-inp:focus{outline:none;border-color:var(--acc)}
/* 검색 결과 */
.result-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.result-item{padding:10px 14px;background:var(--bg3);border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px;border:1px solid transparent;transition:all .15s}
.result-item:hover{border-color:var(--acc)}
/* 토스트 */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
/* 로그인 */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:320px;text-align:center}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo">⚙️ DONWAY 구독 어드민</div>
    <div class="logo-sub">슈퍼어드민 전용 — 업체별 구독 관리</div>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <div id="admin-email" style="font-size:11px;color:var(--text3)"></div>
    <button class="btn btn-gray" onclick="_logout()" style="padding:7px 14px;font-size:11px">로그아웃</button>
  </div>
</div>

<div class="wrap" id="main-wrap">
  <div style="text-align:center;padding:40px;color:var(--text3)">⏳ 로딩 중...</div>
</div>

<div id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
  authDomain:'mbti-logistics.firebaseapp.com',
  projectId:'mbti-logistics',
  storageBucket:'mbti-logistics.firebasestorage.app',
  messagingSenderId:'424881832661',
  appId:'1:424881832661:web:abc123def456'
});
var _db=firebase.firestore();
var _auth=firebase.auth();
var _cu=null;

// 슈퍼어드민 이메일
var SUPER_ADMINS=['kimdh4790@gmail.com','soungkyekim@naver.com'];

function toast(msg,dur){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},dur||2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _logout(){_auth.signOut().then(function(){location.reload();});}

// 구독 상품 정의
var PRODUCTS=[
  {
    id:'donway',icon:'💰',name:'DONWAY 정산',
    fields:[
      {id:'plan',label:'요금제',type:'select',opts:[
        {v:'individual_50',  l:'개인 ~50명  (390,000원/월)'},
        {v:'individual_150', l:'개인 ~150명 (650,000원/월)'},
        {v:'individual_300', l:'개인 ~300명 (975,000원/월)'},
        {v:'individual_500', l:'개인 ~500명 (1,625,000원/월)'},
        {v:'individual_700', l:'개인 ~700명 (2,275,000원/월)'},
        {v:'individual_1000',l:'개인 ~1000명 (2,600,000원/월)'},
        {v:'group_50',       l:'단체 ~50명  (300,000원/월)'},
        {v:'group_150',      l:'단체 ~150명 (500,000원/월)'},
        {v:'group_300',      l:'단체 ~300명 (750,000원/월)'},
        {v:'group_500',      l:'단체 ~500명 (1,250,000원/월)'},
        {v:'group_700',      l:'단체 ~700명 (1,750,000원/월)'},
        {v:'group_1000',     l:'단체 ~1000명 (2,000,000원/월)'},
      ]},
      {id:'maxPerson',label:'인원',type:'number',placeholder:'예) 50'},
      {id:'expiry',label:'만료일',type:'date'},
    ]
  },
  {
    id:'qr',icon:'🔲',name:'QR 패키지',
    fields:[
      {id:'persons',label:'인원',type:'number',placeholder:'예) 30'},
      {id:'expiry',label:'만료일',type:'date'},
    ]
  },
  {
    id:'inventory',icon:'📦',name:'재고관리',
    fields:[
      {id:'expiry',label:'만료일',type:'date'},
    ]
  },
  {
    id:'kiosk',icon:'🖥️',name:'키오스크·POS',
    fields:[
      {id:'expiry',label:'만료일',type:'date'},
    ]
  },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 인증
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
_auth.onAuthStateChanged(function(user){
  if(!user){_showLogin();return;}
  if(SUPER_ADMINS.indexOf(user.email)<0){
    document.getElementById('main-wrap').innerHTML='<div style="text-align:center;padding:40px;color:var(--red)">⛔ 슈퍼어드민만 접근 가능합니다</div>';
    return;
  }
  _cu=user;
  document.getElementById('admin-email').textContent=user.email;
  _renderMain();
});

function _showLogin(){
  document.body.innerHTML='<div class="login-wrap"><div class="login-box">'+
    '<div style="font-size:32px;margin-bottom:8px">⚙️</div>'+
    '<div style="font-size:18px;font-weight:900;color:var(--acc);margin-bottom:24px">DONWAY 어드민</div>'+
    '<input id="le" type="email" placeholder="슈퍼어드민 이메일" style="width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:8px;display:block">'+
    '<input id="lp" type="password" placeholder="비밀번호" style="width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:16px;display:block">'+
    '<button id="lbtn" style="width:100%;padding:12px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer">로그인</button>'+
    '<div id="lerr" style="color:var(--red);font-size:11px;margin-top:8px"></div>'+
  '</div></div>';
  document.getElementById('lbtn').addEventListener('click',function(){
    var e=document.getElementById('le').value;
    var p=document.getElementById('lp').value;
    if(!e||!p){document.getElementById('lerr').textContent='이메일과 비밀번호를 입력하세요';return;}
    firebase.auth().signInWithEmailAndPassword(e,p).catch(function(err){
      document.getElementById('lerr').textContent=err.message;
    });
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 메인 화면
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function _renderMain(){
  var wrap=document.getElementById('main-wrap');
  wrap.innerHTML=
    '<div style="font-size:15px;font-weight:900;margin-bottom:16px">🏢 업체 구독 관리</div>'+
    // 검색
    '<div class="search-box">'+
      '<div class="search-row">'+
        '<input id="search-inp" class="inp" placeholder="업체명 또는 이메일로 검색..." onkeydown="if(event.key===\'Enter\')_searchCompany()">'+
        '<button class="btn btn-acc" onclick="_searchCompany()">검색</button>'+
        '<button class="btn btn-gray" onclick="_loadAll()">전체</button>'+
      '</div>'+
      '<div id="search-result" class="result-list"></div>'+
    '</div>'+
    // 선택된 업체
    '<div id="company-detail"></div>'+
    // 최근 구독 변경 내역
    '<div style="font-size:13px;font-weight:800;margin-bottom:10px;margin-top:20px">📋 최근 구독 변경 내역</div>'+
    '<div id="recent-logs"></div>';
  _loadRecentLogs();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 업체 검색
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function _searchCompany(){
  var q=(document.getElementById('search-inp')||{}).value||'';
  if(!q){_loadAll();return;}
  var result=document.getElementById('search-result');
  result.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px">⏳ 검색 중...</div>';

  // 이름으로 검색
  Promise.all([
    _db.collection('companies').where('companyName','>=',q).where('companyName','<=',q+'\uf8ff').limit(10).get(),
    _db.collection('companies').where('adminEmail','==',q).limit(5).get(),
  ]).then(function(results){
    var seen={};var items=[];
    results.forEach(function(snap){
      snap.forEach(function(d){
        if(!seen[d.id]){seen[d.id]=true;items.push(Object.assign({id:d.id},d.data()));}
      });
    });
    if(!items.length){result.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px">검색 결과 없음</div>';return;}
    result.innerHTML=items.map(function(c){
      return '<div class="result-item" data-id="'+c.id+'" onclick="_selectCompany(\''+c.id+'\')">'+
        '<div>'+
          '<div style="font-weight:700">'+esc(c.companyName||c.name||'이름없음')+'</div>'+
          '<div style="color:var(--text3);font-size:10px">'+esc(c.adminEmail||c.email||'')+'</div>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--acc);font-family:monospace">'+c.id.slice(0,8)+'</div>'+
      '</div>';
    }).join('');
  }).catch(function(e){result.innerHTML='<div style="color:var(--red);font-size:12px">'+esc(e.message)+'</div>';});
}

function _loadAll(){
  var result=document.getElementById('search-result');
  result.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px">⏳ 로딩 중...</div>';
  _db.collection('companies').orderBy('createdAt','desc').limit(20).get()
  .then(function(snap){
    var items=[];
    snap.forEach(function(d){items.push(Object.assign({id:d.id},d.data()));});
    if(!items.length){result.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px">등록된 업체 없음</div>';return;}
    result.innerHTML=items.map(function(c){
      return '<div class="result-item" onclick="_selectCompany(\''+c.id+'\')">'+
        '<div>'+
          '<div style="font-weight:700">'+esc(c.companyName||c.name||'이름없음')+'</div>'+
          '<div style="color:var(--text3);font-size:10px">'+esc(c.adminEmail||c.email||'')+'</div>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--acc);font-family:monospace">'+c.id.slice(0,8)+'</div>'+
      '</div>';
    }).join('');
  }).catch(function(e){result.innerHTML='<div style="color:var(--red);font-size:12px">'+esc(e.message)+'</div>';});
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 업체 선택 → 구독 관리
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var _selectedCompany=null;

function _selectCompany(id){
  _db.collection('companies').doc(id).get()
  .then(function(d){
    if(!d.exists){toast('업체를 찾을 수 없음');return;}
    _selectedCompany=Object.assign({id:d.id},d.data());
    _renderCompanyDetail(_selectedCompany);
    // 검색결과 닫기
    document.getElementById('search-result').innerHTML='';
    document.getElementById('search-inp').value='';
  });
}

function _renderCompanyDetail(c){
  var subs=c.subscriptions||{};
  var detail=document.getElementById('company-detail');

  var subCards=PRODUCTS.map(function(p){
    var s=subs[p.id]||{};
    var isOn=!!(s.active);
    var expiry=s.expiry||'';
    var today=new Date().toISOString().slice(0,10);
    var expired=expiry&&expiry<today;

    var fieldsHtml=p.fields.map(function(f){
      var val=s[f.id]||'';
      var inp='';
      if(f.type==='select'){
        inp='<select id="f_'+p.id+'_'+f.id+'" class="sub-inp">'+
          f.opts.map(function(o){
            var v=typeof o==='object'?o.v:o;
            var l=typeof o==='object'?o.l:o;
            return '<option value="'+v+'"'+(val===v?' selected':'')+'>'+l+'</option>';
          }).join('')+
        '</select>';
      } else if(f.type==='date'){
        // 기본값: 오늘부터 1달 후
        if(!val){
          var d=new Date();d.setMonth(d.getMonth()+1);
          val=d.toISOString().slice(0,10);
        }
        inp='<input type="date" id="f_'+p.id+'_'+f.id+'" class="sub-inp" value="'+val+'">';
      } else {
        inp='<input type="'+f.type+'" id="f_'+p.id+'_'+f.id+'" class="sub-inp" value="'+esc(String(val))+'" placeholder="'+esc(f.placeholder||'')+'">';
      }
      return '<div class="sub-row"><div class="sub-label">'+f.label+'</div>'+inp+'</div>';
    }).join('');

    return '<div class="sub-item '+(isOn?'active':'inactive')+'" id="sub_'+p.id+'">'+
      '<div class="sub-header">'+
        '<div class="sub-name">'+p.icon+' '+p.name+'</div>'+
        '<span class="sub-badge '+(isOn?'badge-on':'badge-off')+'">'+(isOn?(expired?'만료':'활성'):'미구독')+'</span>'+
      '</div>'+
      '<div class="sub-toggle">'+
        '<button class="toggle '+(isOn?'on':'')+'" id="toggle_'+p.id+'" data-pid="'+p.id+'" onclick="_toggleSub(this)"></button>'+
        '<span style="font-size:11px;color:var(--text3)">'+(isOn?'구독 중':'미구독')+'</span>'+
      '</div>'+
      '<div class="sub-detail">'+fieldsHtml+'</div>'+
    '</div>';
  }).join('');

  detail.innerHTML=
    '<div class="company-card">'+
      '<div class="company-header">'+
        '<div>'+
          '<div class="company-name">'+esc(c.companyName||c.name||'이름없음')+'</div>'+
          '<div class="company-info">'+esc(c.adminEmail||c.email||'')+'</div>'+
          '<div class="company-code">ID: '+c.id+'</div>'+
        '</div>'+
        '<div style="display:flex;gap:8px">'+
          '<button class="btn btn-green" onclick="_saveSubs()">💾 저장</button>'+
          '<button class="btn btn-gray" onclick="_closeDetail()">닫기</button>'+
        '</div>'+
      '</div>'+
      '<div class="sub-grid">'+subCards+'</div>'+
    '</div>';
}

function _toggleSub(btn){
  var pid=btn.dataset.pid;
  var isOn=btn.classList.contains('on');
  btn.classList.toggle('on');
  var item=document.getElementById('sub_'+pid);
  if(item){
    item.className='sub-item '+(isOn?'inactive':'active');
  }
  var badge=item?item.querySelector('.sub-badge'):null;
  if(badge){
    badge.className='sub-badge '+(isOn?'badge-off':'badge-on');
    badge.textContent=isOn?'미구독':'활성';
  }
  var toggleLabel=btn.nextElementSibling;
  if(toggleLabel)toggleLabel.textContent=isOn?'미구독':'구독 중';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 구독 저장
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function _saveSubs(){
  if(!_selectedCompany){toast('업체를 선택하세요');return;}
  var newSubs={};
  PRODUCTS.forEach(function(p){
    var toggle=document.getElementById('toggle_'+p.id);
    var isOn=toggle?toggle.classList.contains('on'):false;
    var data={active:isOn,updatedAt:new Date().toISOString()};
    p.fields.forEach(function(f){
      var el=document.getElementById('f_'+p.id+'_'+f.id);
      if(el){
        var val=el.value;
        if(f.type==='number') val=parseFloat(val)||0;
        data[f.id]=val;
      }
    });
    newSubs[p.id]=data;
  });

  var btn=document.querySelector('.btn-green');
  if(btn){btn.textContent='⏳ 저장 중...';btn.disabled=true;}

  // Firebase 저장
  _db.collection('companies').doc(_selectedCompany.id).update({
    subscriptions:newSubs,
    subsUpdatedAt:new Date().toISOString(),
    subsUpdatedBy:_cu.email,
  }).then(function(){
    // 변경 로그 기록
    return _db.collection('subscription_logs').add({
      companyId:_selectedCompany.id,
      companyName:_selectedCompany.companyName||_selectedCompany.name||'',
      subscriptions:newSubs,
      updatedBy:_cu.email,
      createdAt:new Date().toISOString(),
    });
  }).then(function(){
    toast('✅ '+(_selectedCompany.companyName||'업체')+' 구독 저장 완료!');
    if(btn){btn.textContent='💾 저장';btn.disabled=false;}
    _selectedCompany.subscriptions=newSubs;
    _loadRecentLogs();
  }).catch(function(e){
    toast('❌ '+e.message);
    if(btn){btn.textContent='💾 저장';btn.disabled=false;}
  });
}

function _closeDetail(){
  document.getElementById('company-detail').innerHTML='';
  _selectedCompany=null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 최근 변경 내역
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function _loadRecentLogs(){
  var el=document.getElementById('recent-logs');
  if(!el)return;
  _db.collection('subscription_logs').orderBy('createdAt','desc').limit(20).get()
  .then(function(snap){
    if(snap.empty){el.innerHTML='<div style="color:var(--text3);font-size:12px;padding:12px">변경 내역 없음</div>';return;}
    el.innerHTML='<div style="display:flex;flex-direction:column;gap:6px">'+
      snap.docs.map(function(d){
        var v=d.data();
        var subs=v.subscriptions||{};
        var activeList=Object.keys(subs).filter(function(k){return subs[k]&&subs[k].active;});
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border-radius:10px;font-size:12px">'+
          '<div>'+
            '<div style="font-weight:700">'+esc(v.companyName||'')+'</div>'+
            '<div style="color:var(--text3);font-size:10px">'+(v.createdAt||'').slice(0,16).replace('T',' ')+' · '+esc(v.updatedBy||'')+'</div>'+
          '</div>'+
          '<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">'+
            activeList.map(function(k){
              var icons={donway:'💰',qr:'🔲',inventory:'📦',kiosk:'🖥️'};
              return '<span style="padding:2px 7px;background:rgba(0,255,148,.1);border-radius:10px;font-size:10px;color:var(--green)">'+(icons[k]||k)+'</span>';
            }).join('')+
          '</div>'+
        '</div>';
      }).join('')+
    '</div>';
  }).catch(function(){});
}
</script>
</body>
</html>
