<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#185FA5">
<title>쿠팡 영문 라벨 출력</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Malgun Gothic',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#f0f4f8;min-height:100vh;color:#1a1a18}
.app{max-width:500px;margin:0 auto;padding:12px}
.topbar{background:#185FA5;color:#fff;padding:14px 16px;border-radius:12px;margin-bottom:12px}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sub{font-size:11px;opacity:.8;margin-top:2px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid rgba(0,0,0,.08)}
.card h2{font-size:13px;font-weight:700;color:#444;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.btn{padding:11px 16px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;width:100%;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-blue{background:#185FA5;color:#fff}
.btn-green{background:#0F6E56;color:#fff}
.btn-gray{background:#f0f4f8;color:#444;border:1px solid #dde3ed}
.btn-orange{background:#f59e0b;color:#fff}
.btn-sm{padding:8px 16px;font-size:12px;width:auto;border-radius:8px}
.field{margin-bottom:10px}
.field label{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input{width:100%;padding:9px 11px;border:1.5px solid #dde3ed;border-radius:8px;font-size:13px;color:#1a1a18;outline:none}
.field input:focus{border-color:#185FA5}
/* 카메라 */
#cam-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;background:#000;margin-bottom:10px}
#cam-video{width:100%;display:block}
#cam-canvas{display:none}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-guide{border:3px solid #fff;border-radius:8px;width:85%;height:55%;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
.cam-msg{position:absolute;bottom:12px;left:0;right:0;text-align:center;color:#fff;font-size:12px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.8)}
/* 번역 카드 */
.eng-card{background:#e6f1fb;border:1.5px solid #185FA5;border-radius:12px;padding:14px;margin-bottom:10px}
.eng-lbl{font-size:10px;font-weight:700;color:#185FA5;letter-spacing:.08em;margin-bottom:6px}
.eng-name{font-size:18px;font-weight:900;color:#0c447c;margin-bottom:3px}
.eng-addr{font-size:13px;color:#1a4a7a;line-height:1.7}
.eng-track{font-size:11px;color:#185FA5;font-family:monospace;margin-top:8px;padding-top:8px;border-top:1px solid #b5d4f4}
/* 라벨 크기 선택 */
.size-tabs{display:flex;gap:6px;margin-bottom:10px}
.size-tab{flex:1;padding:8px;border-radius:8px;border:1.5px solid #dde3ed;background:#f8f9fc;font-size:12px;font-weight:700;cursor:pointer;text-align:center;color:#888;transition:all .12s}
.size-tab.on{background:#185FA5;color:#fff;border-color:#185FA5}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid rgba(24,95,165,.25);border-top-color:#185FA5;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
/* ═══ 인쇄용 라벨 ═══ */
@media screen{
  .print-area{background:#fff;border:1px solid #ccc;border-radius:8px;overflow:hidden;margin-top:8px}
}
@media print{
  body,html{background:#fff!important;margin:0!important;padding:0!important}
  .no-print{display:none!important}
  .print-area{border:none!important;margin:0!important;padding:0!important}
  @page{size:A4 portrait;margin:10mm}
}
/* 라벨 1개 (A4 전체) */
.label-a4-1{width:100%;padding:20px;font-family:'Arial',sans-serif}
.label-a4-1 .lbl-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:3px solid #1a1a18;margin-bottom:16px}
.label-a4-1 .lbl-logo{font-size:28px;font-weight:900;letter-spacing:2px;color:#e8303a}
.label-a4-1 .lbl-logo span{color:#1a1a18}
.label-a4-1 .lbl-type{font-size:12px;color:#666;text-align:right}
.label-a4-1 .lbl-from{font-size:11px;color:#888;margin-bottom:20px;padding:8px 12px;background:#f8f9fc;border-radius:6px}
.label-a4-1 .lbl-to-lbl{font-size:12px;font-weight:700;color:#888;letter-spacing:.1em;margin-bottom:6px}
.label-a4-1 .lbl-name{font-size:42px;font-weight:900;color:#1a1a18;letter-spacing:1px;margin-bottom:8px;line-height:1.1}
.label-a4-1 .lbl-addr{font-size:18px;color:#333;line-height:1.8;margin-bottom:20px}
.label-a4-1 .lbl-divider{border:none;border-top:1px dashed #aaa;margin:16px 0}
.label-a4-1 .lbl-meta{display:flex;justify-content:space-between;align-items:flex-end}
.label-a4-1 .lbl-track{font-family:monospace;font-size:14px;color:#185FA5;letter-spacing:2px}
.label-a4-1 .lbl-barnum{font-size:28px;font-weight:900;color:#1a1a18;letter-spacing:3px;margin-top:4px}
.label-a4-1 .lbl-date{font-size:13px;color:#888;text-align:right}

/* 라벨 2개 (A4 반반) */
.label-a4-2{display:grid;grid-template-columns:1fr 1fr;gap:0;width:100%;font-family:'Arial',sans-serif}
.label-item{padding:16px;border:1px solid #ddd}
.label-item .li-logo{font-size:16px;font-weight:900;letter-spacing:1px;color:#e8303a;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #1a1a18}
.label-item .li-logo span{color:#1a1a18}
.label-item .li-to{font-size:9px;font-weight:700;color:#888;letter-spacing:.1em;margin-bottom:3px}
.label-item .li-name{font-size:22px;font-weight:900;color:#1a1a18;margin-bottom:4px;line-height:1.1}
.label-item .li-addr{font-size:11px;color:#333;line-height:1.6;margin-bottom:8px}
.label-item .li-track{font-family:monospace;font-size:9px;color:#185FA5;letter-spacing:1px;border-top:1px dashed #ccc;padding-top:6px;margin-top:6px}
.label-item .li-date{font-size:9px;color:#888;margin-top:2px}
</style>

</head>
<body>
<div class="app">

<div class="topbar no-print">
  <div class="topbar-title">📦 쿠팡 영문 라벨 출력</div>
  <div class="topbar-sub">송장 촬영 → OCR 추출 → 영문 번역 → A4 출력</div>
</div>

<!-- STEP 1: 촬영 -->
<div id="step-cam" class="no-print">
  <div class="card">
    <h2>📷 STEP 1 &nbsp; 송장 촬영</h2>
    <div id="cam-wrap" style="display:none">
      <video id="cam-video" autoplay playsinline muted></video>
      <canvas id="cam-canvas"></canvas>
      <div class="cam-overlay">
        <div class="cam-guide"></div>
      </div>
      <div class="cam-msg" id="cam-msg">송장 전체가 박스 안에 들어오게 맞춰주세요</div>
    </div>
    <!-- 촬영 버튼 -->
    <button class="btn btn-blue" id="btn-start-cam" onclick="startCam()">📷 카메라 시작</button>
    <button class="btn btn-orange" id="btn-capture" style="display:none;margin-top:8px" onclick="capturePhoto()">⚡ 촬영하기</button>
    <button class="btn btn-gray" id="btn-stop-cam" style="display:none;margin-top:8px" onclick="stopCam()">■ 중지</button>
    <!-- 파일 업로드 (갤러리) -->
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
      <div style="flex:1;height:1px;background:#dde3ed"></div>
      <span style="font-size:11px;color:#aaa">또는</span>
      <div style="flex:1;height:1px;background:#dde3ed"></div>
    </div>
    <label style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;padding:11px 16px;border-radius:10px;background:#f0f4f8;border:1.5px solid #dde3ed;font-size:14px;font-weight:700;cursor:pointer;color:#444">
      🖼️ 갤러리에서 선택
      <input type="file" accept="image/*" id="file-input" style="display:none" onchange="onFileSelect(this)">
    </label>
  </div>

  <!-- 미리보기 -->
  <div class="card" id="preview-card" style="display:none">
    <h2>🔍 촬영된 송장</h2>
    <img id="preview-img" style="width:100%;border-radius:8px;margin-bottom:10px">
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" onclick="runOCR()" style="flex:2">🌐 OCR + 번역 시작</button>
      <button class="btn btn-gray btn-sm" onclick="retake()" style="flex:1">다시 촬영</button>
    </div>
  </div>
</div>

<!-- 로딩 -->
<div class="card no-print" id="loading-card" style="display:none;text-align:center;padding:32px 16px">
  <div class="spinner" style="margin-bottom:14px"></div>
  <div style="font-size:14px;font-weight:700;color:#185FA5" id="loading-msg">OCR 분석 중...</div>
  <div style="font-size:11px;color:#888;margin-top:4px">송장에서 정보를 추출하고 있습니다</div>
</div>

<!-- STEP 2: 번역 결과 확인 -->
<div id="step-result" style="display:none">
  <div class="card no-print">
    <h2>✅ STEP 2 &nbsp; 번역 결과 확인</h2>
    <div class="eng-card">
      <div class="eng-lbl">RECIPIENT</div>
      <div class="eng-name" id="e-name">—</div>
      <div class="eng-addr" id="e-addr">—</div>
      <div class="eng-track">Tracking No: <span id="e-track">—</span></div>
    </div>
    <!-- 수정 가능 -->
    <div style="background:#fff8e1;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:11px;color:#854f0b;margin-bottom:10px">
      ✏️ 아래에서 내용 수정 후 출력하세요
    </div>
    <div class="field"><label>수령인 (영문)</label><input id="edit-name" oninput="updatePreview()"></div>
    <div class="field"><label>주소 1 (영문)</label><input id="edit-addr1" oninput="updatePreview()"></div>
    <div class="field"><label>주소 2 (영문)</label><input id="edit-addr2" oninput="updatePreview()"></div>
    <div class="field"><label>송장번호</label><input id="edit-track" oninput="updatePreview()"></div>
  </div>

  <!-- STEP 3: 출력 -->
  <div class="card no-print">
    <h2>🖨️ STEP 3 &nbsp; 출력 설정</h2>
    <div class="size-tabs">
      <div class="size-tab on" onclick="setSize(1,this)">A4 1개 (크게)</div>
      <div class="size-tab" onclick="setSize(2,this)">A4 2개 (반반)</div>
    </div>
    <button class="btn btn-blue" onclick="window.print()">🖨️ A4 인쇄 / 출력</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="resetAll()">🔄 처음으로</button>
  </div>

  <!-- 인쇄 영역 -->
  <div class="print-area" id="print-area"></div>
</div>

</div>

<script>
var _stream=null; var _capturedImg=null; var _printSize=1;
var _data={name:'',addr1:'',addr2:'',track:'',date:''};

// ── 카메라 ──
function startCam(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}})
    .then(function(s){
      _stream=s;
      var v=document.getElementById('cam-video');
      v.srcObject=s; v.play();
      document.getElementById('cam-wrap').style.display='block';
      document.getElementById('btn-start-cam').style.display='none';
      document.getElementById('btn-capture').style.display='flex';
      document.getElementById('btn-stop-cam').style.display='flex';
    }).catch(function(e){
      alert('카메라 접근 실패\n갤러리에서 사진을 선택해 주세요');
    });
}
function stopCam(){
  if(_stream){_stream.getTracks().forEach(function(t){t.stop();});_stream=null;}
  document.getElementById('cam-wrap').style.display='none';
  document.getElementById('btn-start-cam').style.display='flex';
  document.getElementById('btn-capture').style.display='none';
  document.getElementById('btn-stop-cam').style.display='none';
}
function capturePhoto(){
  var v=document.getElementById('cam-video');
  var c=document.getElementById('cam-canvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  _capturedImg=c.toDataURL('image/jpeg',0.92);
  stopCam();
  showPreview(_capturedImg);
}
function onFileSelect(input){
  var f=input.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(e){ _capturedImg=e.target.result; showPreview(_capturedImg); };
  rd.readAsDataURL(f);
}
function showPreview(src){
  document.getElementById('preview-img').src=src;
  document.getElementById('preview-card').style.display='block';
  document.getElementById('preview-card').scrollIntoView({behavior:'smooth'});
}
function retake(){
  _capturedImg=null;
  document.getElementById('preview-card').style.display='none';
}

// ── OCR + 번역 ──
async function runOCR(){
  if(!_capturedImg){alert('사진을 먼저 촬영해 주세요');return;}
  document.getElementById('loading-card').style.display='block';
  document.getElementById('preview-card').style.display='none';
  document.getElementById('step-result').style.display='none';
  document.getElementById('loading-msg').textContent='OCR 분석 중...';

  // 이미지 리사이즈 (최대 1200px, 품질 0.8 - 너무 크면 Worker 실패)
  var b64=''; var mediaType='image/jpeg';
  await new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var MAX=1200;
      var w=img.width; var h2=img.height;
      if(w>MAX||h2>MAX){
        var ratio=Math.min(MAX/w,MAX/h2);
        w=Math.round(w*ratio); h2=Math.round(h2*ratio);
      }
      var c=document.createElement('canvas');
      c.width=w; c.height=h2;
      c.getContext('2d').drawImage(img,0,0,w,h2);
      var compressed=c.toDataURL('image/jpeg',0.82);
      b64=compressed.split(',')[1];
      resolve();
    };
    img.src=_capturedImg;
  });

  var prompt='이 쿠팡 송장 이미지에서 배송 정보를 추출하고 영문으로 변환해줘.\n\n'
    +'반드시 JSON만 반환 (다른 텍스트 없이):\n'
    +'{\n'
    +'"recipientKor": "수령인 한국어 이름",\n'
    +'"recipientEng": "수령인 영문 이름 (Revised Romanization)",\n'
    +'"addr1Kor": "주소1 한국어",\n'
    +'"addr1Eng": "주소1 영문 (Revised Romanization)",\n'
    +'"addr2Kor": "주소2/상세주소 한국어",\n'
    +'"addr2Eng": "주소2 영문",\n'
    +'"tracking": "송장번호 (숫자만)",\n'
    +'"city": "도시명 영문 (예: Busan, Seoul)"\n'
    +'}';

  try{
    document.getElementById('loading-msg').textContent='AI 번역 중...';
    // localStorage에서 API 키 읽기 (메인 앱과 공유)
    var apiKey = (localStorage.getItem('mbti_anthropic_api_key')||'').trim();
    if(!apiKey || apiKey.trim().length<20){
      document.getElementById('loading-card').style.display='none';
      document.getElementById('preview-card').style.display='block';
      showApiKeyInput();
      return;
    }

    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:600,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
            {type:'text',text:prompt}
          ]
        }]
      })
    });
    if(!res.ok){
      var errText=await res.text();
      var errMsg='API 오류 '+res.status;
      try{ var errJson=JSON.parse(errText); errMsg=errJson.error&&errJson.error.message?errJson.error.message:errMsg; }catch(e){}
      throw new Error(errMsg);
    }
    var rawText=await res.text();
    var data;
    try{ data=JSON.parse(rawText); }
    catch(pe){ throw new Error('응답 파싱 실패'); }
    if(data.error) throw new Error('API 오류: '+JSON.stringify(data.error));
    var text=(data.content&&data.content[0]&&data.content[0].text)||'';
    if(!text) throw new Error('AI 응답 없음');
    var m=text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('JSON 추출 실패');
    var info=JSON.parse(m[0]);
    showResult(info);
  }catch(e){
    document.getElementById('loading-card').style.display='none';
    alert('OCR 오류: '+e.message+'\n다시 촬영해 주세요');
    document.getElementById('preview-card').style.display='block';
  }
}

function showResult(info){
  var today=new Date();
  var dateStr=(today.getMonth()+1)+'/'+today.getDate()+'/'+today.getFullYear();
  _data={
    name: info.recipientEng||info.recipientKor||'',
    addr1: info.addr1Eng||'',
    addr2: info.addr2Eng||'',
    track: info.tracking||'',
    city: info.city||'South Korea',
    date: dateStr
  };
  document.getElementById('e-name').textContent=_data.name;
  document.getElementById('e-addr').textContent=(_data.addr2?_data.addr2+'\n':'')+_data.addr1+'\n'+_data.city+', South Korea';
  document.getElementById('e-track').textContent=_data.track;
  document.getElementById('edit-name').value=_data.name;
  document.getElementById('edit-addr1').value=_data.addr1;
  document.getElementById('edit-addr2').value=_data.addr2;
  document.getElementById('edit-track').value=_data.track;
  document.getElementById('loading-card').style.display='none';
  document.getElementById('step-result').style.display='block';
  document.getElementById('step-result').scrollIntoView({behavior:'smooth'});
  updatePreview();
}

function updatePreview(){
  _data.name=document.getElementById('edit-name').value;
  _data.addr1=document.getElementById('edit-addr1').value;
  _data.addr2=document.getElementById('edit-addr2').value;
  _data.track=document.getElementById('edit-track').value;
  renderLabel();
}

// ── 라벨 렌더 ──
function setSize(n,el){
  _printSize=n;
  document.querySelectorAll('.size-tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  renderLabel();
}

function renderLabel(){
  var d=_data;
  var addrBlock=(d.addr2?d.addr2+'\n':'')+d.addr1+'\n'+(d.city||'South Korea')+', South Korea';
  var today=new Date();
  var dateStr=(today.getMonth()+1)+'/'+today.getDate()+'/'+today.getFullYear();
  var html='';

  if(_printSize===1){
    html='<div class="label-a4-1">'
      +'<div class="lbl-header">'
      +'<div class="lbl-logo">cou<span>pang</span></div>'
      +'<div class="lbl-type"><div style="font-size:18px;font-weight:900">DELIVERY LABEL</div><div>International Shipping</div></div>'
      +'</div>'
      +'<div class="lbl-from">FROM: Coupang Co., Ltd. · Republic of Korea</div>'
      +'<div class="lbl-to-lbl">SHIP TO:</div>'
      +'<div class="lbl-name">'+escH(d.name)+'</div>'
      +'<div class="lbl-addr">'+escH(addrBlock).replace(/\n/g,'<br>')+'</div>'
      +'<hr class="lbl-divider">'
      +'<div class="lbl-meta">'
      +'<div>'
      +'<div class="lbl-track">Tracking No.</div>'
      +'<div class="lbl-barnum">'+escH(d.track)+'</div>'
      +'</div>'
      +'<div class="lbl-date">Date: '+dateStr+'</div>'
      +'</div>'
      +'</div>';
  } else {
    var item='<div class="label-item">'
      +'<div class="li-logo">cou<span>pang</span></div>'
      +'<div class="li-to">SHIP TO:</div>'
      +'<div class="li-name">'+escH(d.name)+'</div>'
      +'<div class="li-addr">'+escH(addrBlock).replace(/\n/g,'<br>')+'</div>'
      +'<div class="li-track">Tracking: '+escH(d.track)+'</div>'
      +'<div class="li-date">'+dateStr+'</div>'
      +'</div>';
    html='<div class="label-a4-2">'+item+item+'</div>';
  }
  document.getElementById('print-area').innerHTML=html;
}

function escH(s){
  if(!s) return '';
  return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}

function showApiKeyInput(){
  var ex=document.getElementById('apikey-card');
  if(ex) return;
  var card=document.createElement('div');
  card.id='apikey-card';
  card.className='card no-print';
  card.innerHTML='<h2>🔑 API 키 설정 필요</h2>'
    +'<div style="background:#fff8e1;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:12px;color:#854f0b;margin-bottom:12px">'
    +'💡 메인 앱(물류관리) → 내 정보 → Anthropic API 키 등록 후<br>다시 시도하거나, 아래에 직접 입력하세요.'
    +'</div>'
    +'<div class="field"><label>Anthropic API 키</label>'
    +'<input id="api-key-input" type="password" placeholder="sk-ant-api03-..." style="font-family:monospace;font-size:12px"></div>'
    +'<button class="btn btn-blue" onclick="saveApiKey()">저장 후 계속</button>';
  var stepCam=document.getElementById('step-cam');
  if(stepCam) stepCam.insertAdjacentElement('afterend',card);
  else document.querySelector('.app').appendChild(card);
  document.getElementById('apikey-card').scrollIntoView({behavior:'smooth'});
}

function saveApiKey(){
  var key=(document.getElementById('api-key-input').value||'').trim();
  if(!key||key.indexOf('sk-ant-')!==0){
    alert('올바른 API 키 형식이 아닙니다 (sk-ant-로 시작)');
    return;
  }
  localStorage.setItem('mbti_anthropic_api_key',key);
  var card=document.getElementById('apikey-card');
  if(card) card.remove();
  runOCR();
}

function resetAll(){
  _capturedImg=null; _data={name:'',addr1:'',addr2:'',track:'',date:''};
  document.getElementById('step-result').style.display='none';
  document.getElementById('preview-card').style.display='none';
  document.getElementById('loading-card').style.display='none';
  document.getElementById('print-area').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
