<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LogiNet 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.topbar{background:#1A5FA8;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{font-size:20px;font-weight:800}
.topbar .admin-badge{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.topbar .logout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'Pretendard',sans-serif}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.stat-card .label{font-size:12px;color:#718096;font-weight:600;margin-bottom:6px}
.stat-card .value{font-size:28px;font-weight:800;color:#1a202c}
.stat-card .sub{font-size:12px;color:#a0aec0;margin-top:4px}
.stat-card.blue .value{color:#1A5FA8}
.stat-card.green .value{color:#2d8c4e}
.stat-card.orange .value{color:#c05621}
.stat-card.red .value{color:#c53030}
.section{background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:20px;overflow:hidden}
.section-header{padding:18px 24px;border-bottom:1px solid #f0f4f8;display:flex;align-items:center;justify-content:space-between}
.section-header h2{font-size:15px;font-weight:700}
.filter-row{display:flex;gap:8px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#718096;font-family:'Pretendard',sans-serif;transition:.2s}
.filter-btn.active{background:#1A5FA8;color:#fff;border-color:#1A5FA8}
table{width:100%;border-collapse:collapse}
th{padding:12px 20px;text-align:left;font-size:12px;font-weight:700;color:#718096;background:#f8fafc;border-bottom:1px solid #e2e8f0}
td{padding:14px 20px;font-size:13px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-active{background:#ebfaf0;color:#2d8c4e}
.badge-expired{background:#fff5f5;color:#c53030}
.badge-trial{background:#ebf4ff;color:#1A5FA8}
.badge-plan-starter{background:#f0f4f8;color:#4a5568}
.badge-plan-basic{background:#ebf4ff;color:#1A5FA8}
.badge-plan-pro{background:#faf5ff;color:#6b46c1}
.action-btns{display:flex;gap:6px}
.btn-sm{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.2s}
.btn-extend{background:#ebfaf0;color:#2d8c4e}
.btn-extend:hover{background:#2d8c4e;color:#fff}
.btn-cancel{background:#fff5f5;color:#c53030}
.btn-cancel:hover{background:#c53030;color:#fff}
.btn-detail{background:#ebf4ff;color:#1A5FA8}
.btn-detail:hover{background:#1A5FA8;color:#fff}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8}
.login-card{background:#fff;border-radius:20px;padding:40px;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}
.login-card h1{font-size:20px;font-weight:800;margin-bottom:6px}
.login-card p{font-size:13px;color:#718096;margin-bottom:24px}
.form-group{margin-bottom:14px;text-align:left}
.form-group label{display:block;font-size:12px;font-weight:600;color:#4a5568;margin-bottom:5px}
.form-group input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:'Pretendard',sans-serif;outline:none}
.form-group input:focus{border-color:#1A5FA8}
.btn-login{width:100%;padding:14px;background:#1A5FA8;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif}
.err{background:#fff5f5;color:#c53030;border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px;display:none}
.empty{text-align:center;padding:40px;color:#a0aec0;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:360px;max-width:90vw}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal .form-group{margin-bottom:12px}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif}
.modal-btns .confirm{background:#1A5FA8;color:#fff}
.modal-btns .cancel{background:#f0f4f8;color:#4a5568}
.expire-soon{color:#c05621;font-weight:600}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}.filter-row{flex-wrap:wrap}th,td{padding:10px 12px;font-size:12px}}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div style="font-size:36px;margin-bottom:12px">🚚</div>
    <h1>LogiNet 관리자</h1>
    <p>관리자 계정으로 로그인하세요</p>
    <div class="err" id="login-err"></div>
    <div class="form-group">
      <label>이메일</label>
      <input id="a-email" type="email" placeholder="admin@example.com">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input id="a-pw" type="password" placeholder="비밀번호">
    </div>
    <button class="btn-login" id="login-btn" onclick="doAdminLogin()">로그인</button>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard" style="display:none">
  <div class="topbar">
    <div class="logo">🚚 LogiNet <span class="admin-badge">관리자</span></div>
    <button class="logout" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="container">
    <!-- 통계 -->
    <div class="stats">
      <div class="stat-card blue">
        <div class="label">구독 중</div>
        <div class="value" id="stat-active">-</div>
        <div class="sub">활성 대리점</div>
      </div>
      <div class="stat-card green">
        <div class="label">월 매출</div>
        <div class="value" id="stat-revenue">-</div>
        <div class="sub">예상 월 구독료</div>
      </div>
      <div class="stat-card orange">
        <div class="label">만료 임박</div>
        <div class="value" id="stat-expiring">-</div>
        <div class="sub">7일 이내 만료</div>
      </div>
      <div class="stat-card red">
        <div class="label">만료됨</div>
        <div class="value" id="stat-expired">-</div>
        <div class="sub">갱신 필요</div>
      </div>
    </div>

    <!-- 딜러 목록 -->
    <div class="section">
      <div class="section-header">
        <h2>딜러 구독 현황</h2>
        <div class="filter-row">
          <button class="filter-btn active" onclick="filterDealers('all',this)">전체</button>
          <button class="filter-btn" onclick="filterDealers('active',this)">구독중</button>
          <button class="filter-btn" onclick="filterDealers('trial',this)">체험중</button>
          <button class="filter-btn" onclick="filterDealers('expired',this)">만료</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>대리점명</th>
              <th>플랜</th>
              <th>상태</th>
              <th>만료일</th>
              <th>연락처</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="dealer-tbody">
            <tr><td colspan="6" class="empty">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 구독 연장 모달 -->
<div class="modal-bg" id="extend-modal">
  <div class="modal">
    <h3>구독 연장</h3>
    <div class="form-group">
      <label>연장 개월 수</label>
      <input id="extend-months" type="number" value="1" min="1" max="12">
    </div>
    <div class="form-group">
      <label>플랜 변경 (선택)</label>
      <select id="extend-plan" style="width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:'Pretendard',sans-serif">
        <option value="">변경 없음</option>
        <option value="starter">Starter (3만원)</option>
        <option value="basic">Basic (5만원)</option>
        <option value="pro">Pro (8만원)</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal()">취소</button>
      <button class="confirm" onclick="confirmExtend()">연장</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}
  from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,collection,getDocs,doc,getDoc,updateDoc,serverTimestamp,Timestamp}
  from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB={
  apiKey:"AIzaSyCTywAQNHg8IEYmbU64aYAhjqXMHWbJhjo",
  authDomain:"mbti-logistics-bfcd3.firebaseapp.com",
  projectId:"mbti-logistics-bfcd3",
  storageBucket:"mbti-logistics-bfcd3.firebasestorage.app"
};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

let _allDealers=[];
let _extendTarget=null;

// ── 로그인 ──
window.doAdminLogin=async function(){
  const email=document.getElementById('a-email').value.trim();
  const pw=document.getElementById('a-pw').value;
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='로그인 중...';
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pw);
    const uid=cred.user.uid;
    const snap=await getDoc(doc(db,'users',uid));
    if(!snap.exists()||snap.data().role!=='admin'){
      await signOut(auth);
      showErr('관리자 계정이 아닙니다.');
      btn.disabled=false;btn.textContent='로그인';
      return;
    }
    showDashboard();
  }catch(e){
    showErr('이메일 또는 비밀번호가 틀렸습니다.');
    btn.disabled=false;btn.textContent='로그인';
  }
};

window.doLogout=async function(){
  await signOut(auth);
  document.getElementById('dashboard').style.display='none';
  document.getElementById('login-screen').style.display='flex';
};

function showErr(msg){
  const el=document.getElementById('login-err');
  el.textContent=msg;el.style.display='block';
}

// ── 대시보드 로드 ──
async function showDashboard(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  await loadDealers();
}

async function loadDealers(){
  try{
    const [subSnap,dealerSnap]=await Promise.all([
      getDocs(collection(db,'subscriptions')),
      getDocs(collection(db,'dealers'))
    ]);

    const subs={};
    subSnap.forEach(d=>subs[d.id]=d.data());

    const dealers=[];
    dealerSnap.forEach(d=>{
      const data=d.data();
      const sub=subs[d.id]||{};
      dealers.push({
        id:d.id,
        name:data.name||'-',
        phone:data.phone||'-',
        email:data.email||'-',
        plan:sub.plan||'-',
        status:sub.status||'none',
        expireDate:sub.expireDate?.toDate?.()||null,
        trialEndDate:sub.trialEndDate?.toDate?.()||null,
        amount:sub.amount||0
      });
    });

    _allDealers=dealers;
    updateStats(dealers);
    renderTable(dealers);
  }catch(e){
    document.getElementById('dealer-tbody').innerHTML=
      '<tr><td colspan="6" class="empty">데이터 로드 실패: '+e.message+'</td></tr>';
  }
}

function updateStats(dealers){
  const now=new Date();
  const in7=new Date(now.getTime()+7*864e5);
  const active=dealers.filter(d=>d.status==='active');
  const expired=dealers.filter(d=>d.status==='expired');
  const expiring=active.filter(d=>d.expireDate&&d.expireDate<=in7);
  const revenue=active.reduce((s,d)=>s+(d.amount||0),0);

  document.getElementById('stat-active').textContent=active.length+'곳';
  document.getElementById('stat-revenue').textContent=(revenue/10000).toFixed(0)+'만원';
  document.getElementById('stat-expiring').textContent=expiring.length+'곳';
  document.getElementById('stat-expired').textContent=expired.length+'곳';
}

function renderTable(dealers){
  const tbody=document.getElementById('dealer-tbody');
  if(!dealers.length){
    tbody.innerHTML='<tr><td colspan="6" class="empty">딜러가 없습니다</td></tr>';
    return;
  }
  const now=new Date();
  const in7=new Date(now.getTime()+7*864e5);

  tbody.innerHTML=dealers.map(d=>{
    const statusBadge={
      active:'<span class="badge badge-active">구독중</span>',
      trial:'<span class="badge badge-trial">체험중</span>',
      expired:'<span class="badge badge-expired">만료</span>',
      none:'<span class="badge" style="background:#f0f4f8;color:#718096">미등록</span>'
    }[d.status]||'';

    const planBadge=d.plan&&d.plan!=='-'?
      `<span class="badge badge-plan-${d.plan}">${d.plan.toUpperCase()}</span>`:'';

    const expStr=d.expireDate
      ?`<span class="${d.expireDate<=in7&&d.status==='active'?'expire-soon':''}">${d.expireDate.toLocaleDateString('ko-KR')}</span>`
      :'-';

    return `<tr>
      <td><strong>${d.name}</strong><br><span style="color:#a0aec0;font-size:11px">${d.email}</span></td>
      <td>${planBadge}</td>
      <td>${statusBadge}</td>
      <td>${expStr}</td>
      <td>${d.phone}</td>
      <td><div class="action-btns">
        <button class="btn-sm btn-extend" onclick="openExtend('${d.id}','${d.name}')">연장</button>
        <button class="btn-sm btn-cancel" onclick="cancelSub('${d.id}','${d.name}')">해지</button>
      </div></td>
    </tr>`;
  }).join('');
}

window.filterDealers=function(status,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered=status==='all'?_allDealers:_allDealers.filter(d=>d.status===status);
  renderTable(filtered);
};

// ── 구독 연장 ──
window.openExtend=function(dealerId,name){
  _extendTarget={dealerId,name};
  document.getElementById('extend-months').value=1;
  document.getElementById('extend-plan').value='';
  document.getElementById('extend-modal').classList.add('open');
};

window.closeModal=function(){
  document.getElementById('extend-modal').classList.remove('open');
};

window.confirmExtend=async function(){
  if(!_extendTarget)return;
  const months=+document.getElementById('extend-months').value||1;
  const newPlan=document.getElementById('extend-plan').value;

  try{
    const subRef=doc(db,'subscriptions',_extendTarget.dealerId);
    const snap=await getDoc(subRef);
    const cur=snap.exists()?snap.data():{};
    const curExpire=cur.expireDate?.toDate?.()||new Date();
    const newExpire=new Date(Math.max(curExpire,new Date())+months*30*864e5);

    const updates={
      status:'active',
      expireDate:Timestamp.fromDate(newExpire),
      updatedAt:serverTimestamp()
    };
    if(newPlan) updates.plan=newPlan;

    await updateDoc(subRef,updates);
    closeModal();
    alert(`${_extendTarget.name} 구독이 ${months}개월 연장됐습니다.\n만료일: ${newExpire.toLocaleDateString('ko-KR')}`);
    await loadDealers();
  }catch(e){
    alert('오류: '+e.message);
  }
};

window.cancelSub=async function(dealerId,name){
  if(!confirm(`${name} 구독을 해지하시겠습니까?`))return;
  try{
    await updateDoc(doc(db,'subscriptions',dealerId),{
      status:'expired',
      updatedAt:serverTimestamp()
    });
    alert(`${name} 구독이 해지됐습니다.`);
    await loadDealers();
  }catch(e){
    alert('오류: '+e.message);
  }
};

// ── 인증 상태 확인 ──
onAuthStateChanged(auth,async u=>{
  if(u){
    const snap=await getDoc(doc(db,'users',u.uid));
    if(snap.exists()&&snap.data().role==='admin') showDashboard();
  }
});
</script>
</body>
</html>
