<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<title>FILO — 재고·출퇴근·키오스크</title>
<link rel="manifest" href="/filo-manifest.json">
<style>
/* ══════════════════════
   FILO Design System v2
   대기업 수준 UI
   ══════════════════════ */
:root{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#141420;
  --surface:#16162a;--surface2:#1c1c30;--surface3:#222236;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.1);--bd3:rgba(255,255,255,.18);
  --tx:#f2f2ff;--t2:#a0a0c0;--t3:#606080;--t4:#3a3a58;
  --br:#7c3aed;--br-l:#9f5ef8;--br-d:#5b21b6;--br-glow:rgba(124,58,237,.4);
  --br2:#0891b2;--br2-glow:rgba(8,145,178,.3);
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);--green-bd:rgba(34,197,94,.22);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);--red-bd:rgba(239,68,68,.22);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.1);--yellow-bd:rgba(245,158,11,.22);
  --blue:#60a5fa;--purple:#a78bfa;
  --topbar-h:56px;--sidebar-w:232px;
  --r:12px;--r-lg:18px;--r-xl:26px;
  --shadow:0 4px 28px rgba(0,0,0,.45);--shadow-lg:0 8px 48px rgba(0,0,0,.55);
  --shadow-brand:0 4px 24px rgba(124,58,237,.35);
  /* 호환 별칭 */
  --b2:var(--surface);--b3:var(--surface2);--b4:var(--surface3);
  --gn:var(--green);--acc:var(--purple);--border:var(--bd);
  --text:var(--tx);--text2:var(--t2);--text3:var(--t3);
  --brand:var(--br);--brand2:var(--br2);--bg-g:var(--bg);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
::selection{background:rgba(124,58,237,.35);color:#fff}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:4px}

/* ── 로그인 화면 ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;
  background:radial-gradient(ellipse at 20% 10%,rgba(124,58,237,.18) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 90%,rgba(8,145,178,.12) 0%,transparent 60%),var(--bg)}
.login-box{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-xl);padding:32px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(124,58,237,.08)}
.login-logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--br),var(--br2));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:var(--shadow-brand)}
.tab-btn{flex:1;min-width:0;padding:9px 4px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--t3);transition:.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab-btn.on{background:var(--surface3);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.btn-brand{background:linear-gradient(135deg,var(--br),var(--br-l));color:#fff;border:none;border-radius:var(--r);padding:13px;width:100%;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:var(--shadow-brand);letter-spacing:.2px}
.btn-brand:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,58,237,.45)}
.btn-brand:active{transform:translateY(0)}
label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px}
input[type=text],input[type=password],input[type=number],input[type=email],input[type=date],select,textarea{
  width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);
  color:var(--tx);font-size:13px;outline:none;transition:.2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.inp{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:13px;outline:none;transition:.2s}
.inp:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.err{font-size:11px;color:var(--red);margin-top:6px;display:none}
.fg{margin-bottom:16px}

/* ── 앱 레이아웃 ── */
#app{display:none;flex-direction:column;min-height:100dvh}

/* ── 탑바 ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:rgba(8,8,16,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:200}
.topbar-logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#a78bfa,var(--br2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
#topbar-title{flex:1;font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.topbar-badge{background:var(--br);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;letter-spacing:.3px}

/* ── 사이드바 ── */
#sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);
  background:var(--bg2);border-right:1px solid var(--bd);overflow-y:auto;z-index:150;transition:transform .25s cubic-bezier(.4,0,.2,1)}
#sidebar::-webkit-scrollbar{display:none}
.sidebar-profile{padding:16px 14px 10px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.sidebar-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--br),var(--br2));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;margin-bottom:8px}
.ns-label{font-size:9px;font-weight:800;color:var(--t4);letter-spacing:1px;padding:12px 18px 4px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:10px;margin:1px 8px;transition:.15s;position:relative}
.ni:hover{background:var(--surface2);color:var(--tx)}
.ni.active{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(8,145,178,.1));color:var(--tx);border:1px solid rgba(124,58,237,.2)}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:linear-gradient(180deg,var(--br),var(--br2));border-radius:0 3px 3px 0}
.ni-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}

/* ── 메인 콘텐츠 ── */
#content-wrap{margin-left:var(--sidebar-w);padding-top:var(--topbar-h)}
#content{padding:20px;min-height:calc(100dvh - var(--topbar-h))}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #content-wrap{margin-left:0}
  #content{padding:14px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
}

/* ── 카드 컴포넌트 ── */
.card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;transition:border-color .2s}
.card:hover{border-color:var(--bd2)}
.card-glass{background:rgba(22,22,42,.6);backdrop-filter:blur(12px);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:18px}
.card-brand{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(8,145,178,.06));border:1px solid rgba(124,58,237,.2);border-radius:var(--r-lg);padding:18px}

/* ── 버튼 ── */
.btn{padding:10px 18px;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-sm{padding:7px 12px;font-size:11px;border-radius:8px}
.btn-ghost{background:var(--surface2);color:var(--t2);border:1px solid var(--bd2)}
.btn-ghost:hover{background:var(--surface3);color:var(--tx)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}

/* ── 배지 ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.3px}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.badge-purple{background:var(--purple-bg,rgba(167,139,250,.1));color:var(--purple);border:1px solid var(--purple-bd,rgba(167,139,250,.2))}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}

/* ── 통계 카드 ── */
.stat-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:18px;position:relative;overflow:hidden;transition:.2s}
.stat-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none}

/* ── KPI 카드 ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:18px 16px;position:relative;overflow:hidden;transition:.2s}
.kpi-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r-lg) var(--r-lg) 0 0}
.kpi-card.kpi-revenue::before{background:linear-gradient(90deg,#7c3aed,#a855f7)}
.kpi-card.kpi-cost::before{background:linear-gradient(90deg,#ef4444,#f97316)}
.kpi-card.kpi-profit::before{background:linear-gradient(90deg,#22c55e,#10b981)}
.kpi-card.kpi-margin::before{background:linear-gradient(90deg,#f59e0b,#eab308)}
.kpi-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.kpi-val{font-size:24px;font-weight:900;letter-spacing:-.8px;margin:10px 0 4px;line-height:1}
.kpi-delta{font-size:11px;font-weight:700}.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}

/* ── 히어로 / 대시보드 ── */
.dash-hero{background:linear-gradient(135deg,#0a0720 0%,#120e30 40%,#0c1628 100%);
  border:1px solid rgba(124,58,237,.15);border-radius:var(--r-xl);padding:28px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.dash-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(124,58,237,.2) 0%,transparent 70%);pointer-events:none}
.dash-hero::after{content:'';position:absolute;bottom:-60px;left:10%;width:220px;height:220px;background:radial-gradient(circle,rgba(8,145,178,.12) 0%,transparent 70%);pointer-events:none}

/* ── 차트 ── */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:5px}
.chart-bar{flex:1;border-radius:4px 4px 0 0;min-width:0;transition:height .7s cubic-bezier(.34,1.56,.64,1);position:relative;cursor:pointer}
.chart-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--bd2);border-radius:8px;padding:5px 10px;font-size:10px;white-space:nowrap;color:var(--tx);z-index:10;box-shadow:var(--shadow)}

/* ── 테이블 / 리스트 ── */
.pay-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;transition:.2s}
.pay-card:hover{border-color:var(--bd2);background:var(--surface2)}
.pay-amount{font-size:18px;font-weight:900;color:var(--green);letter-spacing:-.5px}
.menu-cost-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:12px 14px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--bd);margin-bottom:6px;transition:.15s}
.menu-cost-row:hover{border-color:rgba(124,58,237,.25);background:var(--surface3)}

/* ── 마진 배지 ── */
.margin-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.3px}
.margin-badge.high{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.margin-badge.mid{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.margin-badge.low{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

/* ── QR ── */
.qr-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-xl);padding:24px;text-align:center}
.qr-wrap{width:200px;height:200px;margin:16px auto;background:#fff;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;padding:8px}

/* ── POS ── */
.pos-wrap{display:grid;grid-template-columns:1fr 340px;gap:14px;height:calc(100dvh - var(--topbar-h) - 40px);overflow:hidden}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;overflow-y:auto;padding:2px;align-content:start}
.menu-item{background:var(--surface2);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px 12px;text-align:center;cursor:pointer;transition:.2s;user-select:none}
.menu-item:hover{border-color:rgba(124,58,237,.3);background:var(--surface3);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.menu-item:active{transform:translateY(0);scale:.98}
.cart-panel{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden}

/* ── 직원/회원 카드 ── */
.member-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:.2s}
.member-card:hover{border-color:var(--bd2);background:var(--surface2)}
.avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--br),var(--br2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}

/* ── 재고 ── */
.stock-form{max-width:600px;margin:0 auto}
.stock-item{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;transition:.2s}
.stock-item:hover{border-color:var(--bd2)}

/* ── 인사이트 카드 ── */
.insight-card{background:linear-gradient(135deg,rgba(124,58,237,.07),rgba(8,145,178,.04));border:1px solid rgba(124,58,237,.15);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.insight-icon{font-size:22px;flex-shrink:0;margin-top:2px}

/* ── 모달 ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.mo>div{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-xl);width:100%;max-width:480px;box-shadow:var(--shadow-lg);animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}

/* ── 토스트 ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface3);color:var(--tx);padding:11px 20px;border-radius:40px;font-size:13px;font-weight:600;z-index:1000;transition:.3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;border:1px solid var(--bd2);box-shadow:var(--shadow)}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── 애니메이션 ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes countUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes barFill{from{width:0}to{width:var(--w)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .4s ease both}
.fade-up-1{animation:fadeUp .4s .08s ease both;opacity:0}
.fade-up-2{animation:fadeUp .4s .16s ease both;opacity:0}
.fade-up-3{animation:fadeUp .4s .24s ease both;opacity:0}
.fade-up-4{animation:fadeUp .4s .32s ease both;opacity:0}
.slide-up{animation:slideUp .35s cubic-bezier(.34,1.56,.64,1) both}
.count-anim{animation:countUp .45s cubic-bezier(.34,1.56,.64,1) both}
.pop-in{animation:countUp .35s cubic-bezier(.34,1.56,.64,1) both}
.stagger-1{animation-delay:.05s}.stagger-2{animation-delay:.1s}.stagger-3{animation-delay:.15s}.stagger-4{animation-delay:.2s}

/* ── 출퇴근 ── */
.attend-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--bd);margin-bottom:6px;transition:.15s}
.attend-row:hover{border-color:var(--bd2)}

/* ── 급여 카드 ── */
.pay-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px 18px;flex-direction:column;gap:8px;margin-bottom:10px;transition:.2s;display:flex}
.pay-card:hover{border-color:var(--bd2);box-shadow:var(--shadow)}

/* ── 섹션 헤더 ── */
.sec-title{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.page-title{font-size:18px;font-weight:900;letter-spacing:-.4px;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--t3)}

/* ── 구분선 ── */
.divider{height:1px;background:var(--bd);margin:14px 0}

/* ── 로딩 스켈레톤 ── */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r)}

/* ── 공지사항 아코디언 ── */
.notice-item{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;transition:.2s}
.notice-item:hover{border-color:var(--bd2)}
.notice-head{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px}
.notice-body{padding:0 16px 14px;font-size:12px;color:var(--t2);line-height:1.7;display:none}
.notice-body.open{display:block}

/* ── 영수증 인쇄 ── */
@media print{
  body>*:not(.mo){display:none!important}
  .mo{position:static!important;background:none!important;padding:0!important}
  .mo>div{border:none!important;box-shadow:none!important;max-width:58mm!important;margin:0!important;padding:0!important}
  button{display:none!important}
  *{color:#000!important;background:#fff!important;font-family:monospace!important}
  @page{size:58mm auto;margin:2mm}
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<body>

<!-- ── 로그인 화면 ── -->
<div id="login-screen" class="login-wrap">
<div class="login-card">
 <div style="text-align:center;margin-bottom:22px">
 <div style="width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,#7c3aed,#0891b2);display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px">
 <span style="font-size:22px">📦</span>

<script>

/* ══════════════════════════════════════════
   🍽 레시피 관리 페이지
   재료 + 사용량 + 단위 등록
   입고단가 자동 환산으로 원가 계산
   ══════════════════════════════════════════ */
function _filoPageRecipe(el){
 var did=_CU.dealerId||_CU.uid;
 el.innerHTML='<div class="slide-up" style="max-width:860px;margin:0 auto">'+
 '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
 '<div><div style="font-size:17px;font-weight:900">🍽 레시피 관리</div>'+
 '<div style="font-size:11px;color:var(--t3);margin-top:2px">메뉴별 재료·사용량 등록 → AI 원가 자동계산</div></div>'+
 '<button onclick="_filoRecipeAdd(\''+did+'\')" style="padding:8px 14px;background:var(--br);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">+ 레시피 추가</button>'+
 '</div>'+
 '<div id="recipe-list">'+
 '<div style="text-align:center;padding:30px;color:var(--t3)">⏳ 로딩 중...</div>'+
 '</div></div>';
 _filoLoadRecipes(did);
}

function _filoLoadRecipes(did){
 Promise.all([
  _db.collection('menu_recipes').where('dealerId','==',did).get(),
  _db.collection('inventory').where('dealerId','==',did).get(),
  _db.collection('inventory_in').where('dealerId','==',did).orderBy('createdAt','desc').get(),
  _db.collection('menu_costs').where('dealerId','==',did).get()
 ]).then(function(res){
  /* 최신 입고단가 맵 */
  var unitPriceMap={};   /* itemId → 단위당 단가(g/ml/개) */
  var unitTypeMap={};    /* itemId → baseUnit */
  res[1].forEach(function(doc){
   var d=doc.data();
   unitTypeMap[doc.id]=d.baseUnit||'개';
  });
  res[2].forEach(function(doc){
   var d=doc.data();
   if(!d.price||d.price<=0||unitPriceMap[d.itemId])return;
   /* 입고단위 → 기본단위 환산 */
   var inUnit=d.inUnit||unitTypeMap[d.itemId]||'개';
   var unitPrice=d.price;
   if(inUnit==='kg')unitPrice=d.price/1000;       /* g당 */
   else if(inUnit==='L')unitPrice=d.price/1000;    /* ml당 */
   else if(inUnit==='g'||inUnit==='ml'||inUnit==='개')unitPrice=d.price;
   unitPriceMap[d.itemId]={perUnit:unitPrice,inUnit:inUnit,totalPrice:d.price,qty:d.qty};
  });

  /* 메뉴별 레시피 그룹핑 */
  var recipeMap={};
  res[0].forEach(function(doc){
   var d=doc.data();
   if(!recipeMap[d.menuName])recipeMap[d.menuName]=[];
   recipeMap[d.menuName].push(Object.assign({_id:doc.id},d));
  });

  /* 판매가 맵 */
  var priceMap={};
  res[3].forEach(function(doc){var d=doc.data();priceMap[d.name]=d.price||0;});

  var list=document.getElementById('recipe-list');
  if(!list)return;
  var menuNames=Object.keys(recipeMap);
  if(!menuNames.length){
   list.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--t3)">'+
   '<div style="font-size:32px;margin-bottom:8px">🍽</div>'+
   '<div>등록된 레시피가 없습니다</div>'+
   '<div style="font-size:11px;margin-top:6px">+ 레시피 추가 버튼을 눌러 시작하세요</div></div>';
   return;
  }

  list.innerHTML=menuNames.map(function(menuName){
   var ings=recipeMap[menuName];
   var totalCost=0;
   var breakdown=ings.map(function(ing){
    var up=unitPriceMap[ing.itemId]||{perUnit:0};
    var cost=Math.round(up.perUnit*ing.amount);
    totalCost+=cost;
    return {name:ing.itemName,amount:ing.amount,unit:ing.unit,perUnit:up.perUnit,cost:cost};
   });
   var salePrice=priceMap[menuName]||0;
   var margin=salePrice>0?Math.round((salePrice-totalCost)/salePrice*100):0;
   var badge=margin>=60?'high':margin>=40?'mid':'low';
   return '<div class="card" style="margin-bottom:10px">'+
   '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'+
   '<div>'+
   '<div style="font-size:14px;font-weight:900">'+esc(menuName)+'</div>'+
   '<div style="font-size:11px;color:var(--t3);margin-top:2px">재료 '+ings.length+'종</div>'+
   '</div>'+
   '<div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+
   '<div style="font-size:16px;font-weight:900;color:#ef4444">원가 ₩'+totalCost.toLocaleString()+'</div>'+
   (salePrice>0?'<div style="font-size:11px;color:var(--t2)">판매가 ₩'+salePrice.toLocaleString()+' <span class="margin-badge '+badge+'">'+margin+'%</span></div>':
   '<button onclick="_filoSetMenuPriceRecipe(\''+did+'\',\''+menuName+'\','+totalCost+')" style="font-size:10px;padding:3px 10px;background:var(--br);border:none;border-radius:6px;color:#fff;cursor:pointer">판매가 설정</button>')+
   '</div></div>'+
   /* 재료 테이블 */
   '<div style="background:var(--b3);border-radius:10px;padding:10px 12px">'+
   '<div style="display:grid;grid-template-columns:1fr 80px 60px 70px;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--bd);margin-bottom:6px">'+
   ['재료명','사용량','단위','원가'].map(function(h){return '<div style="font-size:9px;color:var(--t3);font-weight:700">'+h+'</div>';}).join('')+
   breakdown.map(function(b){
    return '<div style="font-size:12px">'+esc(b.name)+'</div>'+
    '<div style="font-size:12px;color:var(--t2)">'+b.amount+'</div>'+
    '<div style="font-size:12px;color:var(--t3)">'+b.unit+'</div>'+
    '<div style="font-size:12px;font-weight:700;color:#ef4444">₩'+b.cost+'</div>';
   }).join('')+
   '</div>'+
   (ings[0]&&unitPriceMap[ings[0].itemId]?'':'<div style="font-size:10px;color:#f59e0b">⚠️ 일부 재료 입고단가 없음 → 입고 등록 필요</div>')+
   '</div>'+
   '<div style="display:flex;gap:6px;margin-top:8px">'+
   '<button onclick="_filoRecipeEdit(\''+did+'\',\''+menuName+'\')" style="flex:1;padding:7px;background:var(--b3);border:1px solid var(--bd);border-radius:8px;color:var(--t2);font-size:11px;cursor:pointer">✏️ 수정</button>'+
   '<button onclick="_filoRecipeDelete(\''+did+'\',\''+menuName+'\')" style="padding:7px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:#ef4444;font-size:11px;cursor:pointer">삭제</button>'+
   '</div></div>';
  }).join('');
 });
}

function _filoRecipeAdd(did){
 _filoRecipeModal(did,'','',null);
}

function _filoRecipeEdit(did,menuName){
 _db.collection('menu_recipes').where('dealerId','==',did).where('menuName','==',menuName).get().then(function(snap){
  var ings=[];snap.forEach(function(doc){ings.push(Object.assign({_id:doc.id},doc.data()));});
  _filoRecipeModal(did,menuName,'',ings);
 });
}

function _filoRecipeModal(did,menuName,salePrice,existingIngs){
 _db.collection('inventory').where('dealerId','==',did).get().then(function(invSnap){
  var invItems=[];
  invSnap.forEach(function(doc){
   invItems.push({id:doc.id,name:doc.data().name||doc.id,baseUnit:doc.data().baseUnit||'개'});
  });
  _rmInvItems=invItems;

  /* ── DOM으로 모달 생성 ── */
  var mo=document.createElement('div');
  mo.className='mo';
  var box=document.createElement('div');
  box.style.cssText='padding:22px;width:100%;max-width:520px;overflow-y:auto;max-height:85vh';

  /* 타이틀 */
  var title=document.createElement('div');
  title.style.cssText='font-size:16px;font-weight:900;margin-bottom:16px';
  title.textContent=menuName?'✏️ 레시피 수정':'🍽 레시피 추가';
  box.appendChild(title);

  /* 메뉴명 + 판매가 그리드 */
  var grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px';

  /* 메뉴명 */
  var g1=document.createElement('div');
  var l1=document.createElement('label');
  l1.style.cssText='font-size:10px;color:var(--t3);font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px';
  l1.textContent='메뉴명 *';
  var inp1=document.createElement('input');
  inp1.id='rm-name';inp1.type='text';inp1.placeholder='아이스 아메리카노';
  inp1.style.cssText='width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:13px;outline:none';
  inp1.value=menuName||'';
  if(menuName){inp1.readOnly=true;inp1.style.opacity='.6';}
  g1.appendChild(l1);g1.appendChild(inp1);

  /* 판매가 */
  var g2=document.createElement('div');
  var l2=document.createElement('label');
  l2.style.cssText=l1.style.cssText;
  l2.textContent='판매가(원)';
  var inp2=document.createElement('input');
  inp2.id='rm-price';inp2.type='number';inp2.placeholder='4500';
  inp2.style.cssText=inp1.style.cssText;
  inp2.value=salePrice||'';
  g2.appendChild(l2);g2.appendChild(inp2);

  grid.appendChild(g1);grid.appendChild(g2);
  box.appendChild(grid);

  /* 재료 목록 라벨 */
  var ingLabel=document.createElement('div');
  ingLabel.style.cssText='font-size:11px;font-weight:800;color:var(--t2);margin-bottom:8px';
  ingLabel.textContent='재료 목록';
  box.appendChild(ingLabel);

  /* 재료 행 컨테이너 */
  var ingsWrap=document.createElement('div');
  ingsWrap.id='rm-ings';
  box.appendChild(ingsWrap);

  /* 기존 재료 행 복원 */
  (existingIngs||[]).forEach(function(ing){
   _filoRmAddRowDOM(ingsWrap,invItems,ing.itemId,ing.amount,ing.unit);
  });

  /* 재료 추가 버튼 */
  var addBtn=document.createElement('button');
  addBtn.style.cssText='width:100%;padding:8px;background:var(--surface2);border:1px dashed var(--bd2);border-radius:var(--r);color:var(--t2);font-size:12px;cursor:pointer;margin-bottom:14px';
  addBtn.textContent='+ 재료 추가';
  addBtn.onclick=function(){_filoRmAddRowDOM(ingsWrap,invItems,'','','g');};
  box.appendChild(addBtn);

  /* 버튼 행 */
  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px';

function _filoRecipeSave(did,oldMenuName){
 var menuName=(document.getElementById('rm-name').value||'').trim();
 var price=parseInt(document.getElementById('rm-price').value)||0;
 if(!menuName){_filoToast('메뉴명을 입력하세요');return;}
 var rows=document.querySelectorAll('#rm-ings .rm-row');
 var ings=[];
 rows.forEach(function(row){
  var sel=row.querySelector('.rm-item');
  var amt=parseFloat(row.querySelector('.rm-amount').value)||0;
  var unit=row.querySelector('.rm-unit').value;
  if(sel&&sel.value&&amt>0){
   var opt=sel.options[sel.selectedIndex];
   ings.push({itemId:sel.value,itemName:opt.textContent.trim(),amount:amt,unit:unit});
  }
 });
 if(!ings.length){_filoToast('재료를 1개 이상 추가하세요');return;}
 var targetMenu=oldMenuName||menuName;
 /* 기존 삭제 후 재등록 */
 _db.collection('menu_recipes').where('dealerId','==',did).where('menuName','==',targetMenu).get().then(function(snap){
  return Promise.all(snap.docs.map(function(d){return d.ref.delete();}));
 }).then(function(){
  return Promise.all(ings.map(function(ing){
   return _db.collection('menu_recipes').add(Object.assign({dealerId:did,menuName:menuName},ing));
  }));
 }).then(function(){
  /* menu_costs 동기화 */
  return _db.collection('menu_costs').where('dealerId','==',did).where('name','==',menuName).get().then(function(snap){
   if(snap.empty)return _db.collection('menu_costs').add({dealerId:did,name:menuName,price:price,cost:0,createdAt:new Date().toISOString()});
   return snap.docs[0].ref.update({price:price,updatedAt:new Date().toISOString()});
  });
 }).then(function(){
  document.querySelector('.mo')&&document.querySelector('.mo').remove();
  _filoToast('✅ 레시피 저장 완료');
  _filoPageRecipe(document.getElementById('content'));
 }).catch(function(e){_filoToast('❌ '+e.message);});
}

function _filoRecipeDelete(did,menuName){
 if(!confirm('"'+menuName+'" 레시피를 삭제할까요?'))return;
 _db.collection('menu_recipes').where('dealerId','==',did).where('menuName','==',menuName).get().then(function(snap){
  return Promise.all(snap.docs.map(function(d){return d.ref.delete();}));

  _filoPageRecipe(document.getElementById('content'));
 });
}

function _filoSetMenuPriceRecipe(did,menuName,suggestedCost){

function _filoStartDynamicQR(did){

function _countUp(el, target, duration, prefix, suffix){
 prefix=prefix||''; suffix=suffix||'';
 var start=0, startTime=null;
 var step=function(timestamp){
 if(!startTime) startTime=timestamp;
 var progress=Math.min((timestamp-startTime)/duration,1);
 var ease=1-Math.pow(1-progress,3);
 var current=Math.floor(ease*target);
 el.textContent=prefix+(current>=10000?current.toLocaleString():current)+suffix;
 if(progress<1) requestAnimationFrame(step);
 else el.textContent=prefix+target.toLocaleString()+suffix;
 };
 requestAnimationFrame(step);
}

 /* ── 탭 ── */
 '<div style="display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--bd);padding-bottom:12px">'+

/* ── 탭 전환 ── */
var _mgTabIdx=0;
function _filoMgTab(idx){
 _mgTabIdx=idx;
 [0,1,2,3].forEach(function(i){
  var b=document.getElementById('mgt-'+i);
  if(b){b.style.background=i===idx?'var(--br)':'var(--b3)';b.style.color=i===idx?'#fff':'var(--t2)';}
 });
 var did=(_cachedCompanyDoc||{}).dealerId||(_cachedCompanyDoc||{}).uid||'';
 var ymEl=document.getElementById('mg-ym');
 var ym=ymEl?ymEl.value:new Date().toISOString().slice(0,7);
 if(idx===0)_filoRenderMarginAnalysis(did,ym);
 else if(idx===1)_filoSalesInput(did);
 else if(idx===2)_filoRenderCostMgmt(did);
 else _filoRenderInsights(did,ym);
}

/* ── 데이터 로드 ── */
/* ── 실시간 마진 리스너 ── */
var _marginUnsub=null,_marginCostMap={},_marginDid='';

function _filoMarginLoad(){
 var did=(_cachedCompanyDoc||{}).dealerId||(_cachedCompanyDoc||{}).uid||'';
 if(!did)return;
 _marginDid=did;
 var ymEl=document.getElementById('mg-ym');
 var ym=ymEl?ymEl.value:new Date().toISOString().slice(0,7);

 /* 원가 맵 먼저 로드 후 실시간 리스너 시작 */
 _db.collection('menu_costs').where('dealerId','==',did).get().then(function(snap){
  _marginCostMap={};
  snap.forEach(function(doc){var d=doc.data();_marginCostMap[d.name||doc.id]=d;});
  _filoStartMarginLive(did,ym);
 });
}

function _filoStartMarginLive(did,ym){
 /* 기존 리스너 해제 */
 if(_marginUnsub){_marginUnsub();_marginUnsub=null;}
 var start=ym+'-01',end=ym+'-31';
 var today=new Date().toISOString().slice(0,10);

 /* filo_sales(POS) 실시간 onSnapshot */
 _marginUnsub=_db.collection('filo_sales')
  .where('dealerId','==',did)
  .where('date','>=',start)
  .where('date','<=',end)
  .onSnapshot(function(posSnap){
   /* 수동 매출도 같이 조회 */
   _db.collection('mbetco_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get()
   .then(function(manSnap){
    _filoCalcAndRender(posSnap,manSnap,today,ym,did);
   });
  },function(e){console.error('margin listener:',e);});
}

function _filoCalcAndRender(posSnap,manSnap,today,ym,did){
 var todayRev=0,todayCost=0,todayCnt=0;
 var monthRev=0,monthCost=0;

 /* 수동 매출 */
 manSnap.forEach(function(doc){
  var d=doc.data();
  monthRev+=(d.revenue||0);
  monthCost+=(d.cost||0);
  if(d.date===today)todayRev+=(d.revenue||0);
 });

 /* POS 실시간 매출 + 원가 자동 계산 */
 posSnap.forEach(function(doc){
  var d=doc.data();
  var posTotal=d.total||0;
  var posCost=0;
  (d.items||[]).forEach(function(it){
   var c=_marginCostMap[it.name]||{};
   posCost+=((c.cost||0)*(it.qty||1));
  });
  monthRev+=posTotal;
  monthCost+=posCost;
  if(d.date===today){
   todayRev+=posTotal;
   todayCost+=posCost;
   todayCnt++;
  }
 });

 var todayProfit=todayRev-todayCost;
 var todayMargin=todayRev>0?Math.round(todayProfit/todayRev*100):0;
 var monthProfit=monthRev-monthCost;
 var monthMargin=monthRev>0?Math.round(monthProfit/monthRev*100):0;

 /* ── KPI 카드 실시간 업데이트 ── */
 function setKpi(id,val,color){
  var el=document.getElementById(id);
  if(!el)return;
  if(el.textContent!==val){
   el.textContent=val;
   el.classList.remove('count-anim');
   void el.offsetWidth;
   el.classList.add('count-anim');
   if(color)el.style.color=color;
  }
 }
 setKpi('kpi-revenue','₩'+monthRev.toLocaleString());
 setKpi('kpi-cost','₩'+monthCost.toLocaleString());
 setKpi('kpi-profit','₩'+monthProfit.toLocaleString(),monthProfit>=0?'#22c55e':'#ef4444');
 setKpi('kpi-margin',monthMargin+'%');

 /* ── 오늘 실시간 섹션 ── */
 var liveEl=document.getElementById('margin-live');
 if(liveEl){
  var pulse=todayCnt>0?'<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:5px;animation:pulse 1.5s infinite"></span>':'';
  liveEl.innerHTML=
  '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">'+
  [
   {label:'오늘 매출',val:'₩'+todayRev.toLocaleString(),color:'#60a5fa',sub:todayCnt+'건'},
   {label:'오늘 원가',val:'₩'+todayCost.toLocaleString(),color:'#f97316',sub:'식재료'},
   {label:'오늘 순이익',val:'₩'+todayProfit.toLocaleString(),color:todayProfit>=0?'#22c55e':'#ef4444',sub:todayMargin+'%'},
   {label:'이번달 마진율',val:monthMargin+'%',color:monthMargin>=60?'#22c55e':monthMargin>=40?'#f59e0b':'#ef4444',sub:'목표 60%'}
  ].map(function(s){
   return '<div style="background:var(--b3);border-radius:12px;padding:12px 10px;text-align:center;border:1px solid var(--bd)">'+
   '<div style="font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px">'+s.label+'</div>'+
   '<div style="font-size:18px;font-weight:900;color:'+s.color+';letter-spacing:-.5px" class="count-anim">'+s.val+'</div>'+
   '<div style="font-size:10px;color:var(--t3);margin-top:3px">'+s.sub+'</div></div>';
  }).join('')+
  '</div>'+
  (todayCnt>0?'<div style="margin-top:8px;padding:8px 12px;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);border-radius:8px;font-size:11px;color:#22c55e">'+
  pulse+'POS 실시간 연동 중 · 방금 업데이트됨</div>':'');
 }

 /* 히어로 서브 */
 var heroSub=document.getElementById('hero-sub');
 if(heroSub)heroSub.textContent=ym+'월 기준 · 오늘 '+todayCnt+'건 · 마진율 '+todayMargin+'%';

 /* 7일 바 차트 */
 _filoRenderHeroChart(did);

 /* 분석 탭이면 리렌더 */
 if(_mgTabIdx===0)_filoRenderMarginAnalysis(did,ym);
}

/* ── 7일 바 차트 ── */
function _filoRenderHeroChart(did){
 var days=[];
 for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
 Promise.all(days.map(function(dt){
  return _db.collection('mbetco_sales').where('dealerId','==',did).where('date','==',dt).get();
 })).then(function(snaps){
  var vals=snaps.map(function(s){var t=0;s.forEach(function(d){t+=d.data().revenue||0;});return t;});
  var maxV=Math.max.apply(null,vals)||1;
  var chart=document.getElementById('hero-chart');
  if(!chart)return;
  chart.innerHTML=vals.map(function(v,i){
   var pct=Math.round(v/maxV*100);
   var isToday=i===6;
   return '<div class="chart-bar" data-tip="'+days[i].slice(5)+' ₩'+(v/10000).toFixed(0)+'만" '+
   'style="height:'+Math.max(pct,4)+'%;background:'+(isToday?'linear-gradient(180deg,#a78bfa,#7c3aed)':'rgba(255,255,255,.12)')+';border-radius:4px 4px 0 0;flex:1;transition:height .8s cubic-bezier(.34,1.56,.64,1) '+(i*.05)+'s"></div>';
  }).join('');
 }).catch(function(){});
}

/* ── 마진 분석 탭 ── */
function _filoRenderMarginAnalysis(did,ym){
 var content=document.getElementById('mg-content');
 if(!content)return;
 content.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3)"><div style="font-size:28px;margin-bottom:8px">⏳</div>분석 중...</div>';
 var start=ym+'-01',end=ym+'-31';
 Promise.all([
  _db.collection('mbetco_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get(),
  _db.collection('filo_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get(),
  _db.collection('menu_costs').where('dealerId','==',did).get()
 ]).then(function(res){
  var manSnap=res[0],posSnap=res[1],costSnap=res[2];
  var costMap={};
  costSnap.forEach(function(doc){var d=doc.data();costMap[d.name||doc.id]=d;});

  /* 날짜별 집계 */
  var dayMap={};
  manSnap.forEach(function(doc){
   var d=doc.data();
   if(!dayMap[d.date])dayMap[d.date]={rev:0,cost:0,items:{}};
   dayMap[d.date].rev+=(d.revenue||0);
   dayMap[d.date].cost+=(d.cost||0);
   (d.menuItems||[]).forEach(function(it){
    if(!dayMap[d.date].items[it.name])dayMap[d.date].items[it.name]=0;
    dayMap[d.date].items[it.name]+=it.qty;
   });
  });
  posSnap.forEach(function(doc){
   var d=doc.data();
   if(!dayMap[d.date])dayMap[d.date]={rev:0,cost:0,items:{}};
   dayMap[d.date].rev+=(d.total||0);
   (d.items||[]).forEach(function(it){
    var c=costMap[it.name]||{};
    dayMap[d.date].cost+=((c.cost||0)*it.qty);
    if(!dayMap[d.date].items[it.name])dayMap[d.date].items[it.name]=0;
    dayMap[d.date].items[it.name]+=it.qty;
   });
  });

  /* 메뉴별 마진 집계 */
  var menuMap={};
  Object.values(dayMap).forEach(function(day){
   Object.keys(day.items).forEach(function(name){
    var c=costMap[name]||{};
    var qty=day.items[name];
    var price=c.price||0,cost=c.cost||0;
    if(!menuMap[name])menuMap[name]={name:name,qty:0,rev:0,cost:0,price:price,costPer:cost};
    menuMap[name].qty+=qty;
    menuMap[name].rev+=price*qty;
    menuMap[name].cost+=cost*qty;
   });
  });

  var days=Object.keys(dayMap).sort();
  var totalRev=days.reduce(function(s,d){return s+dayMap[d].rev;},0);
  var totalCost=days.reduce(function(s,d){return s+dayMap[d].cost;},0);
  var totalProfit=totalRev-totalCost;
  var marginRate=totalRev>0?Math.round(totalProfit/totalRev*100):0;

  var html='';

  /* 월별 일별 차트 */
  html+='<div class="card" style="margin-bottom:12px">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
  '<div style="font-size:13px;font-weight:800">📅 일별 매출 vs 순이익</div>'+
  '<div style="font-size:11px;color:var(--t3)">'+ym+'</div></div>'+
  '<div style="display:flex;align-items:flex-end;gap:3px;height:100px;overflow-x:auto">';
  if(days.length){
   var maxRev=Math.max.apply(null,days.map(function(d){return dayMap[d].rev;}))||1;
   html+=days.map(function(d){
    var rv=dayMap[d].rev,pr=Math.max(dayMap[d].rev-dayMap[d].cost,0);
    var rvH=Math.round(rv/maxRev*100),prH=Math.round(pr/maxRev*100);
    var dt=d.slice(8);
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:24px">'+
    '<div style="width:100%;position:relative;height:84px;display:flex;align-items:flex-end;gap:1px">'+
    '<div style="flex:1;height:'+rvH+'%;background:rgba(167,139,250,.3);border-radius:3px 3px 0 0;min-height:2px" title="매출 ₩'+rv.toLocaleString()+'"></div>'+
    '<div style="flex:1;height:'+prH+'%;background:linear-gradient(180deg,#22c55e,#10b981);border-radius:3px 3px 0 0;min-height:2px" title="순이익 ₩'+pr.toLocaleString()+'"></div>'+
    '</div>'+
    '<div style="font-size:9px;color:var(--t3)">'+dt+'</div></div>';
   }).join('');
  }else{html+='<div style="color:var(--t3);font-size:12px;padding:20px">매출 데이터 없음</div>';}
  html+='</div>'+
  '<div style="display:flex;gap:12px;margin-top:10px">'+
  '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:rgba(167,139,250,.4)"></div><span style="font-size:10px;color:var(--t3)">매출</span></div>'+
  '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:#22c55e"></div><span style="font-size:10px;color:var(--t3)">순이익</span></div>'+
  '</div></div>';

  /* 메뉴별 마진 테이블 */
  var menus=Object.values(menuMap).sort(function(a,b){
   var mA=a.rev>0?(a.rev-a.cost)/a.rev:0,mB=b.rev>0?(b.rev-b.cost)/b.rev:0;
   return mB-mA;
  });
  if(menus.length){
   html+='<div class="card" style="margin-bottom:12px">'+
   '<div style="font-size:13px;font-weight:800;margin-bottom:12px">🍽 메뉴별 마진 분석</div>'+
   '<div style="display:grid;grid-template-columns:1fr 60px 70px 60px;gap:6px;padding:0 4px 8px;border-bottom:1px solid var(--bd)">'+
   ['메뉴','판매수','순이익','마진율'].map(function(h){return '<div style="font-size:10px;color:var(--t3);font-weight:700">'+h+'</div>';}).join('')+'</div>'+
   menus.map(function(m){
    var profit=m.rev-m.cost;
    var rate=m.rev>0?Math.round(profit/m.rev*100):0;
    var badge=rate>=60?'high':rate>=40?'mid':'low';
    return '<div class="menu-cost-row">'+
    '<div style="font-size:12px;font-weight:700">'+esc(m.name)+'<div style="font-size:10px;color:var(--t3)">판매가 ₩'+m.price.toLocaleString()+' · 원가 ₩'+m.costPer.toLocaleString()+'</div></div>'+
    '<div style="font-size:12px;font-weight:800;text-align:right">'+m.qty+'개</div>'+
    '<div style="font-size:12px;font-weight:800;color:'+(profit>=0?'#22c55e':'#ef4444')+';text-align:right">₩'+profit.toLocaleString()+'</div>'+
    '<div style="text-align:right"><span class="margin-badge '+badge+'">'+rate+'%</span></div>'+
    '</div>';
   }).join('')+'</div>';
  }

  /* 인건비 vs 매출 비율 */
  html+='<div class="card">'+
  '<div style="font-size:13px;font-weight:800;margin-bottom:12px">📊 원가 구조 분석</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">'+
  [
   {label:'식재료 원가',val:'₩'+totalCost.toLocaleString(),sub:totalRev>0?Math.round(totalCost/totalRev*100)+'%':'—',c:'#f97316'},
   {label:'순이익',val:'₩'+Math.max(totalProfit,0).toLocaleString(),sub:marginRate+'%',c:'#22c55e'},
   {label:'손익분기',val:totalRev>0&&totalProfit<0?'미달':'달성',sub:totalProfit>=0?'✅':'⚠️',c:totalProfit>=0?'#22c55e':'#ef4444'}
  ].map(function(s){
   return '<div style="background:var(--b3);border-radius:12px;padding:14px 10px">'+
   '<div style="font-size:10px;color:var(--t3);margin-bottom:6px">'+s.label+'</div>'+
   '<div style="font-size:16px;font-weight:900;color:'+s.c+'">'+s.val+'</div>'+
   '<div style="font-size:11px;color:var(--t3);margin-top:4px">'+s.sub+'</div></div>';
  }).join('')+
  '</div></div>';

  content.innerHTML=html;
 }).catch(function(e){
  var c=document.getElementById('mg-content');
  if(c)c.innerHTML='<div style="color:var(--red);padding:20px">'+e.message+'</div>';
 });
}

function _filoSaveCost(did){
 var name=(document.getElementById('mc-name').value||'').trim();
 var price=parseInt(document.getElementById('mc-price').value)||0;
 var cost=parseInt(document.getElementById('mc-cost').value)||0;
 if(!name){_filoToast('메뉴명을 입력하세요');return;}
 _db.collection('menu_costs').add({dealerId:did,name:name,price:price,cost:cost,createdAt:new Date().toISOString()}).then(function(){
  _filoToast('✅ 원가 등록 완료');
  document.getElementById('mc-name').value='';

function _filoRenderInsights(did,ym){
 var content=document.getElementById('mg-content');
 if(!content)return;
 var start=ym+'-01',end=ym+'-31';
 Promise.all([
  _db.collection('mbetco_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get(),
  _db.collection('filo_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get(),
  _db.collection('menu_costs').where('dealerId','==',did).get()
 ]).then(function(res){
  var rev=0,cost=0,posRev=0;
  res[0].forEach(function(d){rev+=d.data().revenue||0;cost+=d.data().cost||0;});
  res[1].forEach(function(d){posRev+=d.data().total||0;});
  var costMap={};res[2].forEach(function(doc){var d=doc.data();costMap[d.name]=d;});
  var margin=rev>0?Math.round((rev-cost)/rev*100):0;
  var insights=[];
  if(margin<40)insights.push({icon:'🚨',title:'마진율 위험',desc:'현재 마진율 '+margin+'%는 일반적인 카페 권장 마진율(60% 이상)보다 낮습니다. 원가가 높은 메뉴를 점검하세요.',color:'rgba(239,68,68,.1)',border:'rgba(239,68,68,.3)'});
  else if(margin>=60)insights.push({icon:'✅',title:'마진율 우수',desc:'마진율 '+margin+'%로 양호한 수준입니다. 이 수익 구조를 유지하면서 매출 확대에 집중하세요.',color:'rgba(34,197,94,.08)',border:'rgba(34,197,94,.25)'});
  if(posRev>0&&rev===0)insights.push({icon:'💡',title:'매출 수동 입력 필요',desc:'POS 매출(₩'+posRev.toLocaleString()+')은 있지만 수동 매출 입력이 없습니다. 매출 입력 탭에서 정확한 데이터를 입력하면 마진 분석이 더 정확해집니다.',color:'rgba(245,158,11,.08)',border:'rgba(245,158,11,.25)'});
  if(Object.keys(costMap).length===0)insights.push({icon:'⚙️',title:'원가 등록 필요',desc:'메뉴 원가가 등록되지 않아 정확한 마진 계산이 불가능합니다. 원가 등록 탭에서 메뉴별 원가를 입력해 주세요.',color:'rgba(124,58,237,.08)',border:'rgba(124,58,237,.25)'});
  if(!insights.length)insights.push({icon:'🎯',title:'데이터 분석 완료',desc:'모든 지표가 정상 범위입니다. 매일 매출을 입력하면 더 정확한 인사이트를 제공합니다.',color:'rgba(34,197,94,.08)',border:'rgba(34,197,94,.25)'});
  content.innerHTML='<div style="max-width:700px">'+
  insights.map(function(ins){
   return '<div class="insight-card" style="background:'+ins.color+';border-color:'+ins.border+'">'+
   '<div class="insight-icon">'+ins.icon+'</div>'+
   '<div><div style="font-size:13px;font-weight:800;margin-bottom:4px">'+ins.title+'</div>'+
   '<div style="font-size:12px;color:var(--t2);line-height:1.6">'+ins.desc+'</div></div></div>';
  }).join('')+'</div>';
 });
}

function _filoPageExpiry(el){
 var did=(_cachedCompanyDoc||{}).dealerId||(_cachedCompanyDoc||{}).uid||'';

 var expired=[],warn=[],ok=[];
 snap.forEach(function(doc){

 if(d.expiryDate<today) expired.push(d);

 html+='</select></div>'+

 '</div></div>';
 if(expired.length){
 html+='<div class="card" style="border:2px solid #ef4444;margin-bottom:10px">'+
 '<div style="font-size:13px;font-weight:800;color:#ef4444;margin-bottom:8px">🚨 만료 ('+expired.length+'개) — 즉시 폐기</div>';
 expired.forEach(function(d){

 '<span style="font-size:12px;font-weight:700">'+d.name+'</span>'+
 '<span style="font-size:11px;color:#ef4444;font-weight:700">'+d.expiryDate+' 만료</span></div>';
 });
 html+='</div>';
 }
 if(warn.length){
 html+='<div class="card" style="border:1px solid #f59e0b;margin-bottom:10px">'+
 '<div style="font-size:13px;font-weight:800;color:#f59e0b;margin-bottom:8px">⚠️ 7일 이내 만료 ('+warn.length+'개)</div>';
 warn.forEach(function(d){
 var dL=Math.ceil((new Date(d.expiryDate)-new Date(today))/86400000);
 html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(245,158,11,.2)">'+

 '<span style="font-size:11px;color:#f59e0b;font-weight:700">D-'+dL+'</span></div>';
 });
 html+='</div>';
 }
 html+='<div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:10px">📦 전체 목록</div>';
 snap.forEach(function(doc){

function _filoLoadAttendDash(){
 var did=_CU.dealerId||_CU.uid;
 var dateEl=document.getElementById('ad-date');
 var date=dateEl?dateEl.value:new Date().toISOString().slice(0,10);
 if(_attendUnsub)_attendUnsub();
 _attendUnsub=_db.collection('attendance')
 .where('dealerId','==',did).where('date','==',date)
 .orderBy('time','asc')
 .onSnapshot(function(snap){
 var records=[];
 snap.forEach(function(doc){records.push(Object.assign({_id:doc.id},doc.data()));});
 var memberMap={};
 records.forEach(function(r){
 if(!memberMap[r.memberId])memberMap[r.memberId]={name:r.memberName||r.memberId,ins:[],outs:[],workMin:0};
 if(r.type==='in')memberMap[r.memberId].ins.push(r.time);
 else memberMap[r.memberId].outs.push(r.time);
 });
 Object.values(memberMap).forEach(function(m){
 m.ins.sort();m.outs.sort();
 var total=0;
 for(var i=0;i<Math.min(m.ins.length,m.outs.length);i++){
 total+=(new Date(m.outs[i])-new Date(m.ins[i]))/60000;
 }
 m.workMin=Math.max(0,Math.round(total));
 m.status=m.ins.length>m.outs.length?'in':'out';

/* ── 주휴수당 계산 ── */
function _calcWeeklyAllowance(ins,outs,wage,wageType){
 if(wageType!=='hourly'||!wage)return 0;
 /* 주별 근무시간 집계 */
 var weekMap={};
 ins.forEach(function(inR,i){
  var outR=outs[i];
  if(!outR)return;
  var diff=(new Date(outR.time)-new Date(inR.time))/3600000;
  if(diff<=0||diff>12)return;
  var d=new Date(inR.time);
  /* ISO week key */
  var dayOfWeek=d.getDay()||7;
  var monday=new Date(d);monday.setDate(d.getDate()-(dayOfWeek-1));
  var wk=monday.toISOString().slice(0,10);
  weekMap[wk]=(weekMap[wk]||0)+diff;
 });
 var total=0;
 Object.values(weekMap).forEach(function(hrs){
  if(hrs>=15){
   /* 주휴수당 = (주근무시간/40)*8*시급 (단 8h 한도) */
   var dailyHour=Math.min(hrs/5,8);
   total+=Math.round(dailyHour*wage);
  }
 });
 return total;
}

/* ── 세금/공제 계산 ── */
function _calcDeduction(gross,empType){
 /* empType: 'part'=단기알바(3.3%), 'full'=정직원(4대보험), 'monthly'=월급 */
 if(!gross)return{tax:0,insurance:0,total:0};
 if(empType==='part'){
  var tax=Math.round(gross*0.033);
  return{tax:tax,insurance:0,total:tax};
 }
 if(empType==='full'||empType==='monthly'){
  var pension=Math.round(gross*0.045);
  var health=Math.round(gross*0.03545);
  var employ=Math.round(gross*0.009);
  var ins=pension+health+employ;
  var tax2=Math.round((gross-ins)*0.033);
  return{tax:tax2,insurance:ins,total:tax2+ins};
 }
 return{tax:0,insurance:0,total:0};
}

/* ── 전체 급여 로드 ── */
var _payrollData=[];
function _filoLoadPayroll(){
 var did=_CU.dealerId||_CU.uid;
 var ymEl=document.getElementById('pay-ym');
 var ym=ymEl?ymEl.value:new Date().toISOString().slice(0,7);
 var startDate=ym+'-01';
 var endDate=ym+'-31';
 Promise.all([
  _db.collection('attendance').where('dealerId','==',did).where('date','>=',startDate).where('date','<=',endDate).get(),
  _db.collection('members').where('dealerId','==',did).get()
 ]).then(function(results){
  var attendSnap=results[0],memberSnap=results[1];
  var memberMap={};
  memberSnap.forEach(function(doc){memberMap[doc.id]=Object.assign({_id:doc.id},doc.data());});
  var payMap={};
  attendSnap.forEach(function(doc){
   var d=doc.data();
   var mid=d.memberId;
   if(!payMap[mid])payMap[mid]={memberId:mid,name:d.memberName||mid,workMin:0,days:new Set(),ins:[],outs:[]};
   if(d.type==='in')payMap[mid].ins.push({time:d.time,date:d.date});
   else payMap[mid].outs.push({time:d.time,date:d.date});
  });
  Object.values(payMap).forEach(function(p){
   p.ins.sort(function(a,b){return a.time>b.time?1:-1;});
   p.outs.sort(function(a,b){return a.time>b.time?1:-1;});
   var total=0;
   for(var i=0;i<Math.min(p.ins.length,p.outs.length);i++){
    var diff=(new Date(p.outs[i].time)-new Date(p.ins[i].time))/60000;
    if(diff>0&&diff<720){total+=diff;p.days.add(p.ins[i].date);}
   }
   p.workMin=Math.round(total);
   p.workHour=p.workMin/60;
   p.dayCount=p.days.size;
   var member=Object.values(memberMap).find(function(m){return m._id===p.memberId||m.name===p.name;})||{};
   p.wage=member.wage||0;
   p.wageType=member.wageType||'hourly';   /* hourly/daily/monthly */
   p.empType=member.empType||'part';        /* part/full/monthly */
   /* 기본급 계산 */
   if(p.wageType==='monthly'){p.basePay=p.wage;}
   else if(p.wageType==='daily'){p.basePay=Math.round(p.dayCount*p.wage);}
   else{p.basePay=Math.round(p.workHour*p.wage);}
   /* 주휴수당 */
   p.weeklyAllowance=_calcWeeklyAllowance(p.ins,p.outs,p.wage,p.wageType);
   /* 총지급액 */
   p.gross=p.basePay+p.weeklyAllowance;
   /* 공제 */
   var ded=_calcDeduction(p.gross,p.empType);
   p.deduction=ded.total;p.tax=ded.tax;p.insurance=ded.insurance;
   /* 실수령액 */
   p.netPay=p.gross-p.deduction;
  });
  _payrollData=Object.values(payMap);
  _filoRenderPaySummary();
  _filoRenderPayList();
 }).catch(function(e){
  var list=document.getElementById('pay-list');
  if(list)list.innerHTML='<div style="color:var(--red);padding:20px">'+e.message+'</div>';
 });
}

function _filoImportMenuExcel(input){
 var file=input.files[0];
 if(!file)return;
 var did=_CU.dealerId||_CU.uid;
 var reader=new FileReader();
 reader.onload=function(e){
  try{
   var wb=XLSX.read(e.target.result,{type:'array'});
   var ws=wb.Sheets[wb.SheetNames[0]];
   var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
   if(!rows.length){alert('데이터가 없습니다.');return;}
   var batch=[];
   rows.forEach(function(r){
    var name=r['메뉴명']||r['name']||'';
    var price=parseInt(r['가격']||r['price']||0);
    var category=r['카테고리']||r['category']||'기타';
    var emoji=r['이모지']||r['emoji']||'🍽';
    if(!name||!price)return;
    batch.push({name:name,price:price,category:category,emoji:emoji,forSale:true,dealerId:did,stock:null,minStock:null});
   });
   if(!batch.length){alert('유효한 메뉴가 없습니다.');return;}
   var db=firebase.firestore();
   var bw=db.batch();
   batch.forEach(function(m){
    var ref=db.collection('inventory').doc();
    bw.set(ref,m);
   });
   bw.commit().then(function(){
    alert(batch.length+'개 메뉴 등록 완료!');
    _filoPageKiosk(document.getElementById('content'));
   }).catch(function(e){alert('저장 오류: '+e.message);});
  }catch(e){alert('파일 읽기 오류: '+e.message);}
 };
 reader.readAsArrayBuffer(file);
 input.value='';
}

      '</div>':'')+
     '</div></div>';
   }).join('');
   // 새 주문 알림음
   if(snap.docChanges().some(function(c){return c.type==='added'&&c.doc.data().status!=='done';})){
    try{var a=new AudioContext();var o2=a.createOscillator();o2.connect(a.destination);o2.frequency.value=880;o2.start();o2.stop(a.currentTime+0.15);}catch(e){}
   }
  });
}

function _filoPageNotices(el){
 var did=_CU.dealerId||_CU.uid;
 el.innerHTML='<div class="slide-up" style="max-width:700px;margin:0 auto">'+
 '<div style="font-size:17px;font-weight:900;margin-bottom:16px">📢 공지사항</div>'+
 '<div id="notices-list"><div style="text-align:center;padding:30px;color:var(--t3)">⏳</div></div></div>';
 _db.collection('notices').where('dealerId','==',did).orderBy('createdAt','desc').limit(20).get()
 .then(function(snap){
 var el2=document.getElementById('notices-list');if(!el2)return;
 if(snap.empty){el2.innerHTML='<div class="card" style="text-align:center;padding:30px;color:var(--t3)">공지사항이 없습니다</div>';return;}
 el2.innerHTML=snap.docs.map(function(doc){
 var d=doc.data();
 return '<div class="card" style="margin-bottom:10px">'+
 '<div style="font-size:14px;font-weight:800;margin-bottom:6px">'+esc(d.title||'')+'</div>'+
 '<div style="font-size:12px;color:var(--t3);margin-bottom:8px">'+(d.createdAt||'').slice(0,10)+'</div>'+
 '<div style="font-size:13px;line-height:1.6;white-space:pre-wrap">'+esc(d.content||'')+'</div></div>';
 }).join('');
 }).catch(function(){});
}

function _cartAddFromEl(el){
 var id=el.dataset.id||'';
 var name=el.dataset.name||'';
 var price=parseInt(el.dataset.price)||0;
 if(!id||!price)return;
 var existing=_cartItems.find(function(c){return c.id===id;});
 if(existing){existing.qty++;}
 else{_cartItems.push({id:id,name:name,price:price,qty:1});}
 _cartRender();
 el.style.transform='scale(.92)';
 setTimeout(function(){el.style.transform='';},150);
}

var _origFilterKiosk = _filoFilterKiosk;
function _filoFilterKiosk(catOrEl, btn){
 var cat = typeof catOrEl==='string' ? catOrEl : catOrEl.dataset&&catOrEl.dataset.cat||'전체';
 var activeBtn = btn||catOrEl;
 document.querySelectorAll('#kiosk-cats .btn').forEach(function(b){
 b.style.background=b===activeBtn?'var(--br)':'var(--bg3)';
 b.style.color=b===activeBtn?'#fff':'var(--text)';
 });
 document.querySelectorAll('#kiosk-menu .menu-item').forEach(function(el){
 el.style.display=(cat==='전체'||el.dataset.cat===cat)?'':'none';
 });
}
