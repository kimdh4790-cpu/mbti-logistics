function _filoRenderCalendar(did){
 var wrap=document.getElementById('cal-wrap');
 if(!wrap)return;
 var year=window._calYear;
 var month=window._calMonth;
 var today=new Date();
 var firstDay=new Date(year,month,1).getDay();
 var daysInMonth=new Date(year,month+1,0).getDate();
 var monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

 /* 이 달 예약 로드 */
 var startStr=year+'-'+(month+1).toString().padStart(2,'0')+'-01';
 var endStr=year+'-'+(month+1).toString().padStart(2,'0')+'-'+daysInMonth.toString().padStart(2,'0');

 _db.collection('filo_bookings').where('dealerId','==',did)
  .where('date','>=',startStr).where('date','<=',endStr)
  .get().then(function(snap){
   var bookingMap={};
   snap.forEach(function(doc){
    var d=doc.data();
    if(!bookingMap[d.date])bookingMap[d.date]=[];
    bookingMap[d.date].push(Object.assign({_id:doc.id},d));
   });

   /* 달력 렌더 */
   var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
    '<button onclick="window._calMonth--;if(window._calMonth<0){window._calMonth=11;window._calYear--;}_filoRenderCalendar(\''+did+'\')" style="padding:6px 12px;background:var(--surface2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);cursor:pointer">◀</button>'+
    '<div style="font-size:17px;font-weight:900">'+year+'년 '+monthNames[month]+'</div>'+
    '<button onclick="window._calMonth++;if(window._calMonth>11){window._calMonth=0;window._calYear++;}_filoRenderCalendar(\''+did+'\')" style="padding:6px 12px;background:var(--surface2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);cursor:pointer">▶</button>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px">'+
    ['일','월','화','수','목','금','토'].map(function(d,i){
     return '<div style="text-align:center;font-size:11px;font-weight:700;color:'+(i===0?'#ef4444':i===6?'#60a5fa':'var(--t3)')+';padding:4px">'+d+'</div>';
    }).join('')+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';

   /* 빈칸 */
   for(var i=0;i<firstDay;i++) html+='<div></div>';

   /* 날짜 */
   for(var day=1;day<=daysInMonth;day++){
    var dateStr=year+'-'+(month+1).toString().padStart(2,'0')+'-'+day.toString().padStart(2,'0');
    var isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
    var bookings=bookingMap[dateStr]||[];
    var dow=new Date(year,month,day).getDay();
    html+='<div onclick="_filoCalDayClick(\''+did+'\',\''+dateStr+'\')" style="'+
     'min-height:60px;padding:4px;border-radius:8px;cursor:pointer;border:1px solid '+(isToday?'var(--br)':'var(--bd)')+';'+
     'background:'+(isToday?'rgba(124,58,237,.1)':'var(--surface2)')+';transition:.15s" '+
     'onmouseover="this.style.borderColor=\'rgba(124,58,237,.4)\'" onmouseout="this.style.borderColor=\''+(isToday?'var(--br)':'var(--bd)')+'\'">'+
     '<div style="font-size:12px;font-weight:700;color:'+(isToday?'#a78bfa':dow===0?'#ef4444':dow===6?'#60a5fa':'var(--tx)')+'">'+day+'</div>'+
     bookings.slice(0,2).map(function(b){
      return '<div style="font-size:9px;background:rgba(124,58,237,.15);border-radius:4px;padding:1px 4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#a78bfa">'+
       (b.time?b.time+' ':'')+esc(b.customerName||b.title||'예약')+'</div>';
     }).join('')+
     (bookings.length>2?'<div style="font-size:9px;color:var(--t3);margin-top:1px">+'+( bookings.length-2)+'개</div>':'')+
     '</div>';
   }
   html+='</div>';
   wrap.innerHTML=html;

   /* 오늘 예약 목록 */
   _filoRenderTodayReservations(did, today.toISOString().slice(0,10), bookingMap[today.toISOString().slice(0,10)]||[]);
  });
}

 mo.appendChild(box);

function _filoTaxSendReport(type){
 var did=_CU.dealerId||_CU.uid;
 var email=(document.getElementById('tax-email-inp')&&document.getElementById('tax-email-inp').value)||'';
 if(!email){_filoToast('먼저 세무사 이메일을 등록하세요');return;}
 _filoToast('⏳ 리포트 준비 중...');
 /* 매출 데이터 수집 */
 var now=new Date();
 var startDate,endDate;
 if(type==='thisMonth'){startDate=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0')+'-01';endDate=now.toISOString().slice(0,10);}
 else if(type==='lastMonth'){var lm=new Date(now.getFullYear(),now.getMonth()-1,1);startDate=lm.toISOString().slice(0,7)+'-01';endDate=new Date(now.getFullYear(),now.getMonth(),0).toISOString().slice(0,10);}
 else{startDate=now.getFullYear()+'-01-01';endDate=now.toISOString().slice(0,10);}

 _db.collection('filo_sales').where('dealerId','==',did)
  .where('date','>=',startDate).where('date','<=',endDate).get()
  .then(function(snap){
   var total=0,cnt=0,menuMap={};
   snap.forEach(function(doc){
    var d=doc.data();
    total+=d.total||0;cnt++;
    (d.items||[]).forEach(function(it){
     menuMap[it.name]=(menuMap[it.name]||0)+(it.qty||1);
    });
   });
   var topMenus=Object.entries(menuMap).sort(function(a,b){return b[1]-a[1];}).slice(0,5)
    .map(function(kv){return kv[0]+' '+kv[1]+'건';}).join(', ');

   _db.collection('alimtalk_queue').add({
    type:'tax_report',to:email,dealerId:did,
    reportData:{period:startDate+'~'+endDate,total:total,cnt:cnt,topMenus:topMenus},
    createdAt:new Date().toISOString(),status:'pending'
   }).then(function(){_filoToast('✅ 리포트가 발송됐습니다!');});
  });
}

function _filoTableStatusChange(did,docId,currentStatus){
 var next={empty:'occupied',occupied:'cleaning',cleaning:'empty',reserved:'empty'};
 var nextStatus=next[currentStatus]||'empty';
 var update={status:nextStatus,updatedAt:new Date().toISOString()};
 if(nextStatus==='occupied')update.since=new Date().toISOString();
 else if(nextStatus==='empty')update.since=null;
 _db.collection('filo_tables').doc(docId).update(update).then(function(){
  _filoToast('✅ 상태 변경: '+nextStatus);
 });
}

function _filoCreateTables(did,count,seats){
 /* 기존 삭제 후 재생성 */
 _filoToast('⏳ 테이블 생성 중...');
 _db.collection('filo_tables').where('dealerId','==',did).get().then(function(snap){
  var deletes=snap.docs.map(function(doc){return doc.ref.delete();});
  return Promise.all(deletes);
 }).then(function(){
  var creates=[];
  for(var i=1;i<=count;i++){
   creates.push(_db.collection('filo_tables').add({
    dealerId:did,tableId:i,seats:seats,
    status:'empty',since:null,
    createdAt:new Date().toISOString()
   }));
  }
  return Promise.all(creates);
 }).then(function(){
  _filoToast('✅ 테이블 '+count+'개 생성 완료!');
 }).catch(function(e){_filoToast('❌ '+e.message);});
}

var _deliveryUnsub=null;
function _filoLoadDelivery(did){
 if(window._deliveryUnsub){window._deliveryUnsub();window._deliveryUnsub=null;}
 var today=new Date().toISOString().slice(0,10);
 // filo_orders(테이블QR 배달) + filo_sales(수동접수) 통합
 var salesOrders=[], qrOrders=[];
 function renderAll(){
  var all=salesOrders.concat(qrOrders);
  all.sort(function(a,b){return (b.createdAt||'').localeCompare(a.createdAt||'');});
  _filoRenderDelivery(did,all);
 }
 var u1=_db.collection('filo_sales')
  .where('dealerId','==',did).where('date','==',today).where('type','==','delivery')
  .onSnapshot(function(snap){
   salesOrders=[];
   snap.forEach(function(doc){salesOrders.push(Object.assign({_id:doc.id,_src:'sales'},doc.data()));});
   renderAll();
  },function(e){console.error('delivery sales err:',e);renderAll();});
 var u2=_db.collection('filo_orders')
  .where('dealerId','==',did)
  .onSnapshot(function(snap){
   qrOrders=[];
   snap.forEach(function(doc){
    var d=doc.data();
    // createdAt이 오늘인 것만
    if(d.createdAt&&d.createdAt.slice(0,10)===today){
     qrOrders.push(Object.assign({_id:doc.id,_src:'qr',deliveryApp:'테이블QR',type:'delivery'},d));
    }
   });
   renderAll();
  },function(e){console.error('delivery orders err:',e);renderAll();});
 window._deliveryUnsub=function(){u1();u2();};
}

function _filoRenderDelivery(did,orders){
 /* KPI */
 var cnt=orders.length;
 var rev=orders.reduce(function(s,o){return s+(o.total||0);},0);
 var fee=orders.reduce(function(s,o){return s+(o.deliveryFee||0);},0);
 var appMap={};
 orders.forEach(function(o){var a=o.deliveryApp||'기타';appMap[a]=(appMap[a]||0)+1;});
 var topApp=Object.entries(appMap).sort(function(a,b){return b[1]-a[1];})[0];

 var e=function(id){return document.getElementById(id);};
 if(e('dkpi-cnt'))e('dkpi-cnt').textContent=cnt+'건';
 if(e('dkpi-rev'))e('dkpi-rev').textContent='₩'+rev.toLocaleString();
 if(e('dkpi-fee'))e('dkpi-fee').textContent='₩'+fee.toLocaleString();
 if(e('dkpi-top'))e('dkpi-top').textContent=topApp?topApp[0]+' '+topApp[1]+'건':'-';

 var wrap=document.getElementById('delivery-list');
 if(!wrap)return;
 wrap.innerHTML='';

 /* 앱별 필터 */
 var apps=['전체','배민','쿠팡이츠','요기요','기타'];
 var filterWrap=document.createElement('div');
 filterWrap.style.cssText='display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap';
 apps.forEach(function(app){
  var btn=document.createElement('button');
  btn.style.cssText='padding:6px 14px;border-radius:20px;border:1px solid var(--bd2);background:var(--surface2);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;transition:.15s';
  btn.textContent=app==='전체'?app+'('+cnt+')':app;
  btn.onclick=function(){
   document.querySelectorAll('.delivery-filter-btn').forEach(function(b){
    b.style.background='var(--surface2)';b.style.color='var(--t2)';b.style.borderColor='var(--bd2)';
   });
   this.style.background='var(--br)';this.style.color='#fff';this.style.borderColor='var(--br)';
   var filtered=app==='전체'?orders:orders.filter(function(o){return (o.deliveryApp||'기타')===app;});
   _filoRenderDeliveryCards(did,filtered,wrap.querySelector('#delivery-cards'));
  };
  btn.className='delivery-filter-btn';
  filterWrap.appendChild(btn);
 });
 wrap.appendChild(filterWrap);

 var cardsWrap=document.createElement('div');
 cardsWrap.id='delivery-cards';
 wrap.appendChild(cardsWrap);
 _filoRenderDeliveryCards(did,orders,cardsWrap);
}

function _filoRenderDeliveryCards(did,orders,wrap){
 if(!wrap)return;
 if(!orders.length){
  wrap.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--t3)">'+
   '<div style="font-size:32px;margin-bottom:8px">🛵</div>'+
   '<div>오늘 배달 주문이 없습니다</div>'+
   '<div style="font-size:11px;margin-top:6px">+ 주문 접수 버튼으로 배달 주문을 등록하세요</div></div>';
  return;
 }
 var appIcon={'배민':'🟢','쿠팡이츠':'🔴','요기요':'🟣','기타':'🛵'};
 var statusColor={pending:'#f59e0b',cooking:'#60a5fa',ready:'#a78bfa',delivered:'#22c55e',cancelled:'#ef4444'};
 var statusLabel={pending:'접수',cooking:'조리중',ready:'픽업대기',delivered:'배달완료',cancelled:'취소'};

 wrap.innerHTML=orders.map(function(o){
  var sc=statusColor[o.deliveryStatus||'pending'];
  var sl=statusLabel[o.deliveryStatus||'pending'];
  var kst=o.createdAt?new Date(new Date(o.createdAt).getTime()+9*3600000):new Date();
  var timeStr=kst.getUTCHours().toString().padStart(2,'0')+':'+kst.getUTCMinutes().toString().padStart(2,'0');
  return '<div class="card card-hover" style="margin-bottom:10px;border-left:3px solid '+sc+'">'+
   '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+
   '<div>'+
   '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">'+
   '<span style="font-size:16px">'+(appIcon[o.deliveryApp||'기타']||'🛵')+'</span>'+
   '<span style="font-size:14px;font-weight:900">'+(o.deliveryApp||'배달')+'</span>'+
   '<span style="font-size:11px;color:var(--t3)">'+timeStr+'</span>'+
   '</div>'+
   '<div style="font-size:12px;color:var(--t2)">'+(o.customerName||'고객')+(o.phone?' · '+o.phone:'')+'</div>'+
   '</div>'+
   '<div style="text-align:right">'+
   '<span class="chip" style="background:'+sc+'18;color:'+sc+';border-color:'+sc+'40">'+sl+'</span>'+
   '<div style="font-size:16px;font-weight:900;color:#22c55e;margin-top:4px">₩'+(o.total||0).toLocaleString()+'</div>'+
   (o.deliveryFee?'<div style="font-size:10px;color:var(--t3)">배달비 ₩'+o.deliveryFee.toLocaleString()+'</div>':'')+
   '</div></div>'+
   '<div style="font-size:12px;color:var(--t2);margin-bottom:10px">'+
   (o.items||[]).map(function(it){return it.name+' x'+it.qty;}).join(' / ')+'</div>'+
   (o.address?'<div style="font-size:11px;color:var(--t3);margin-bottom:8px">📍 '+o.address+'</div>':'')+
   '<div style="display:flex;gap:6px">'+
   ['cooking','ready','delivered'].map(function(s){
    var active=(o.deliveryStatus||'pending')===s;
    return '<button data-id="'+o._id+'" data-s="'+s+'" onclick="_filoDeliveryStatus(this.dataset.id,this.dataset.s)" '+
     'style="flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid '+(active?statusColor[s]:'var(--bd2)')+';background:'+(active?statusColor[s]+'18':'var(--surface2)')+';color:'+(active?statusColor[s]:'var(--t2)')+'">'+
     {cooking:'🍳 조리중',ready:'✅ 픽업대기',delivered:'🛵 완료'}[s]+'</button>';
   }).join('')+
   '<button data-id="'+o._id+'" onclick="_filoDeliveryCancel(this.dataset.id)" style="padding:7px 10px;border-radius:8px;font-size:11px;cursor:pointer;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.08);color:#ef4444">취소</button>'+
   '</div></div>';
 }).join('');
}

function _filoDeliveryStatus(id,status){
 _db.collection('filo_sales').doc(id).update({deliveryStatus:status,updatedAt:new Date().toISOString()})
  .then(function(){_filoToast('✅ 상태 변경: '+{cooking:'조리중',ready:'픽업대기',delivered:'배달완료'}[status]);});

function _filoDeliveryCancel(id){

  .then(function(){_filoToast('🗑 주문이 취소됐습니다');});
}

function _filoLoadMenuMgmt(did){
 _db.collection('filo_menus').where('dealerId','==',did).get().then(function(snap){
  /* 카테고리 목록 */
  var cats=[];
  snap.forEach(function(doc){
   var c=doc.data().category||'기타';
   if(cats.indexOf(c)<0)cats.push(c);
  });

  var catList=document.getElementById('cat-list');
  if(catList){
   catList.innerHTML=cats.map(function(c){
    return '<div style="display:flex;align-items:center;gap:4px;padding:5px 12px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);border-radius:20px;font-size:12px;font-weight:700;color:#a78bfa">'+
     c+
     '<button onclick="_filoDeleteCategory(\''+did+'\',\''+c+'\')" style="background:none;border:none;color:#a78bfa;cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 4px;opacity:.6">×</button>'+
     '</div>';
   }).join('');
  }

  /* 메뉴 목록 */
  var list=document.getElementById('menu-mgmt-list');
  if(!list)return;
  if(snap.empty){
   list.innerHTML='<div style="text-align:center;padding:40px;color:var(--t3)"><div style="font-size:32px;margin-bottom:8px">🍽</div>등록된 메뉴가 없습니다<br><div style="font-size:12px;margin-top:8px">+ 메뉴 추가 버튼으로 시작하세요</div></div>';
   return;
  }

  /* 카테고리별 그룹핑 */
  var grouped={};
  snap.forEach(function(doc){
   var d=doc.data();
   var c=d.category||'기타';
   if(!grouped[c])grouped[c]=[];
   grouped[c].push(Object.assign({_id:doc.id},d));
  });

  list.innerHTML='';
  Object.keys(grouped).sort().forEach(function(cat){
   var catDiv=document.createElement('div');
   catDiv.style.marginBottom='16px';
   catDiv.innerHTML='<div style="font-size:11px;font-weight:800;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:6px 0;border-bottom:1px solid var(--bd);margin-bottom:8px">'+cat+'</div>';

   var grid=document.createElement('div');
   grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px';

   grouped[cat].forEach(function(m){
    var card=document.createElement('div');
    card.style.cssText='background:var(--surface2);border:1px solid var(--bd2);border-radius:var(--r);padding:12px;position:relative;transition:.2s';
    card.onmouseover=function(){this.style.borderColor='rgba(124,58,237,.3)';};
    card.onmouseout=function(){this.style.borderColor='var(--bd2)';};

    /* 이미지 or 이모지 */
    var imgDiv=document.createElement('div');
    imgDiv.style.cssText='width:100%;height:80px;border-radius:8px;overflow:hidden;background:var(--surface3);display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:32px';
    if(m.imageUrl){
     var img=document.createElement('img');
     img.src=m.imageUrl;
     img.style.cssText='width:100%;height:100%;object-fit:cover';
     img.onerror=function(){this.style.display='none';imgDiv.textContent=m.emoji||'🍽';};
     imgDiv.appendChild(img);
    } else {
     imgDiv.textContent=m.emoji||'🍽';
    }
    card.appendChild(imgDiv);

    /* 메뉴 정보 */
    var info=document.createElement('div');
    info.innerHTML='<div style="font-size:13px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(m.name)+'</div>'+
     '<div style="font-size:13px;font-weight:900;color:#22c55e">₩'+Number(m.price||0).toLocaleString()+'</div>'+
     (m.stock!=null?'<div style="font-size:10px;color:var(--t3);margin-top:2px">재고: '+m.stock+'</div>':'');
    card.appendChild(info);

    /* 수정/삭제 버튼 */
    var btns=document.createElement('div');
    btns.style.cssText='display:flex;gap:6px;margin-top:8px';
    var editBtn=document.createElement('button');
    editBtn.style.cssText='flex:1;padding:6px;background:var(--br);border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:700;cursor:pointer';
    editBtn.textContent='수정';
    (function(menu){editBtn.onclick=function(){_filoMenuAddModal(did,menu,null);};})(m);
    var delBtn=document.createElement('button');
    delBtn.style.cssText='flex:1;padding:6px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.2);border-radius:6px;color:#ef4444;font-size:11px;cursor:pointer';
    delBtn.textContent='삭제';
    (function(id){delBtn.onclick=function(){
     if(!confirm('삭제하시겠습니까?'))return;
     _db.collection('filo_menus').doc(id).delete().then(function(){
      _filoToast('🗑 삭제됐습니다');
      _filoPageMenuMgmt(document.getElementById('content'));
     });
    };})(m._id);
    btns.appendChild(editBtn);btns.appendChild(delBtn);
    card.appendChild(btns);
    grid.appendChild(card);
   });
   catDiv.appendChild(grid);
   list.appendChild(catDiv);
  });

function _filoSalesFilter(type){
 ['today','week','month','custom'].forEach(function(t){
  var btn=document.getElementById('sf-'+t);
  if(!btn)return;
  if(t===type){btn.style.background='rgba(124,58,237,.4)';btn.style.color='#a78bfa';btn.style.border='1px solid rgba(124,58,237,.4)';}
  else{btn.style.background='transparent';btn.style.color='rgba(255,255,255,.6)';btn.style.border='1px solid rgba(255,255,255,.12)';}
 });
 var cw=document.getElementById('sf-custom-wrap');
 if(cw)cw.style.display=type==='custom'?'flex':'none';
 if(type==='custom')return;
 var today=new Date();
 var from,to=today.toISOString().slice(0,10);
 if(type==='today'){from=to;}
 else if(type==='week'){var day=today.getDay()||7;var mon=new Date(today);mon.setDate(today.getDate()-(day-1));from=mon.toISOString().slice(0,10);}
 else if(type==='month'){from=today.toISOString().slice(0,7)+'-01';}
 _filoMarginLoadRange(from,to);
}

function _filoMarginLoadRange(from,to){
 if(!from){var f=document.getElementById('sf-from');var t2=document.getElementById('sf-to');if(f)from=f.value;if(t2)to=t2.value;}
 if(!from||!to){_filoToast('날짜를 선택하세요');return;}
 var did=_CU.dealerId||_CU.uid||(_cachedCompanyDoc||{}).dealerId||(_cachedCompanyDoc||{}).uid||'';
 if(!did)return;
 var heroSub=document.getElementById('hero-sub');
 if(heroSub)heroSub.textContent=from+' ~ '+to+' 조회 중...';
 _db.collection('filo_sales').where('dealerId','==',did).where('date','>=',from).where('date','<=',to).get().then(function(snap){
  var total=0,cnt=0,items={},methods={};
  snap.forEach(function(doc){
   var d=doc.data();
   if(d.status==='cancelled')return;
   total+=d.total||0;cnt++;
   var method=d.payMethod||d.method||'기타';
   methods[method]=(methods[method]||0)+(d.total||0);
   (d.items||[]).forEach(function(it){items[it.name]=(items[it.name]||0)+(it.qty||1);});
  });
  var paySorted=Object.entries(methods).sort(function(a,b){return b[1]-a[1];});
  if(heroSub)heroSub.textContent=from+(from!==to?' ~ '+to:'')+'·'+cnt+'건·₩'+total.toLocaleString();
  ['today-sales','month-sales'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent='₩'+total.toLocaleString();});
  ['today-cnt','month-cnt'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=cnt+'건';});

  /* 결제수단별 집계 표시 */
  var payEl=document.getElementById('pay-method-breakdown');
  if(payEl){
   var methodIcons={'카드':'💳','현금':'💵','카카오페이':'🟡','네이버페이':'🟢','카운터결제':'🏪','삼성페이':'📱','기타':'💰'};
   var sorted=Object.entries(methods).sort(function(a,b){return b[1]-a[1];});
   payEl.innerHTML=sorted.length?sorted.map(function(m){
    var pct=total>0?Math.round(m[1]/total*100):0;
    var ic=methodIcons[m[0]]||'💰';
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">'+
     '<span style="font-size:16px">'+ic+'</span>'+
     '<div style="flex:1">'+
     '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
     '<span style="font-size:13px;font-weight:700">'+m[0]+'</span>'+
     '<span style="font-size:13px;font-weight:900;color:#22c55e">₩'+m[1].toLocaleString()+'</span>'+
     '</div>'+
     '<div style="height:4px;background:var(--surface3);border-radius:2px;overflow:hidden">'+
     '<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,var(--br),#22c55e);border-radius:2px;transition:width .5s"></div>'+
     '</div>'+
     '<div style="font-size:10px;color:var(--t3);margin-top:2px">'+pct+'% · 비중</div>'+
     '</div></div>';
   }).join(''):'<div style="text-align:center;padding:20px;color:var(--t3)">데이터 없음</div>';
  }

  /* 인기메뉴 */
  var topEl=document.getElementById('top-menus');
  if(topEl){
   var sorted2=Object.entries(items).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
   topEl.innerHTML=sorted2.length?sorted2.map(function(e,i){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)">'+
     '<span style="font-size:13px"><span style="color:var(--br);font-weight:800;margin-right:6px">'+(i+1)+'위</span>'+e[0]+'</span>'+
     '<span style="font-size:13px;font-weight:700">'+e[1]+'개</span></div>';
   }).join(''):'<div style="text-align:center;padding:20px;color:var(--t3)">판매 데이터 없음</div>';
  }
 /* 차트 렌더링 */
  var liveEl=document.getElementById('sales-chart-extra');if(!liveEl){liveEl=document.createElement('div');liveEl.id='sales-chart-extra';var mainEl2=document.getElementById('content');if(mainEl2)mainEl2.appendChild(liveEl);}liveEl.innerHTML='';
  if(liveEl){

     if(payParent){
      payParent.style.height='auto';
      var payHtmlStr='<div style="display:flex;flex-direction:column;gap:8px">';
      paySorted.forEach(function(p){
       var ic={'카드':'💳','현금':'💵','카카오페이':'🟡','네이버페이':'🟢','카운터결제':'🏪'}[p[0]]||'💰';
       var col=payColors[p[0]]||'#9898c0';
       var pct=total>0?Math.round(p[1]/total*100):0;
       payHtmlStr+='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:12px;border:1px solid var(--bd2)">'+
        '<span style="font-size:18px">'+ic+'</span>'+
        '<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:5px">'+
        '<span style="font-size:13px;font-weight:700">'+p[0]+'</span>'+
        '<span style="font-size:16px;font-weight:900;color:'+col+'">'+String.fromCharCode(8361)+p[1].toLocaleString()+'</span>'+
        '</div><div style="height:4px;background:var(--surface3);border-radius:2px;overflow:hidden">'+
        '<div class="pay-bar" data-pct="'+pct+'" style="height:100%;width:0%;background:'+col+';border-radius:2px;transition:width .8s ease"></div>'+
        '</div><span style="font-size:10px;color:var(--t3)">'+pct+'% 비중</span></div></div>';
      });
      payHtmlStr+='</div>';
      payParent.innerHTML=payHtmlStr;
      setTimeout(function(){
       payParent.querySelectorAll('.pay-bar').forEach(function(b){b.style.width=b.dataset.pct+'%';});
      },50);
     }
    }
   },150);
  }
 }).catch(function(e){if(heroSub)heroSub.textContent='오류: '+e.message;});
}

var _toTable=null,_toCart={};

function _filoPageTableOrder(el){
 var did=_CU.dealerId||_CU.uid;
 _toTable=null;_toCart={};
 el.innerHTML='';
 var wrap=document.createElement('div');
 wrap.className='slide-up';wrap.style.maxWidth='900px';wrap.style.margin='0 auto';

 var hdr=document.createElement('div');
 hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px';
 hdr.innerHTML='<div><div class="page-title">🪑 테이블 오더</div>'+
  '<div class="page-sub">직원 태블릿으로 테이블 주문 접수</div></div>';
 var kitBtn=document.createElement('button');
 kitBtn.style.cssText='padding:6px 12px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:8px;color:#a78bfa;font-size:11px;font-weight:700;cursor:pointer';
 kitBtn.textContent='🍳 주방화면';
 kitBtn.onclick=function(){window.open('https://filo.ai.kr/kitchen?did='+did,'_blank');};
 hdr.appendChild(kitBtn);
 wrap.appendChild(hdr);

 var layout=document.createElement('div');
 layout.style.cssText='display:grid;grid-template-columns:220px 1fr;gap:14px';

 /* 왼쪽: 테이블 */
 var leftCard=document.createElement('div');leftCard.className='card';
 leftCard.style.cssText='height:fit-content;position:sticky;top:calc(var(--topbar-h) + 16px)';
 leftCard.innerHTML='<div class="sec-title" style="margin-bottom:10px">🪑 테이블 선택</div>'+
  '<div id="to-table-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">'+
  '<div style="text-align:center;padding:20px;color:var(--t3);grid-column:1/-1;font-size:12px">⏳</div></div>';
 layout.appendChild(leftCard);

 /* 오른쪽 */
 var rw=document.createElement('div');
 var menuCard=document.createElement('div');menuCard.className='card';menuCard.style.marginBottom='14px';
 menuCard.innerHTML='<div id="to-cat-wrap" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>'+
  '<div id="to-menu-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">'+
  '<div style="text-align:center;padding:30px;color:var(--t3);grid-column:1/-1;font-size:12px">테이블을 먼저 선택하세요</div></div>';
 rw.appendChild(menuCard);

 var cartCard=document.createElement('div');cartCard.className='card';cartCard.id='to-cart-card';
 var submitBtn=document.createElement('button');
 submitBtn.style.cssText='width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#9f5ef8);border:none;border-radius:var(--r);color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.35);margin-top:10px';
 submitBtn.textContent='📤 주문 전송';
 submitBtn.onclick=function(){_toSubmitOrder(did);};
 cartCard.innerHTML='<div class="sec-title" style="margin-bottom:10px">🛒 주문 내역</div>'+
  '<div id="to-cart-list"><div style="text-align:center;padding:16px;color:var(--t3);font-size:12px">메뉴를 선택하세요</div></div>'+
  '<div id="to-total-wrap" style="display:none;border-top:1px solid var(--bd);padding-top:10px;margin-top:10px">'+
  '<div style="display:flex;justify-content:space-between;align-items:center">'+
  '<span style="font-size:14px;font-weight:800">합계</span>'+
  '<span id="to-total" style="font-size:20px;font-weight:900;color:#22c55e">₩0</span></div></div>';
 cartCard.appendChild(submitBtn);
 rw.appendChild(cartCard);
 layout.appendChild(rw);
 wrap.appendChild(layout);
 el.appendChild(wrap);
 _toLoadTables(did);_toLoadMenus(did);
}

function _toLoadTables(did){
 _db.collection('filo_tables').where('dealerId','==',did).orderBy('tableId').get().then(function(snap){
  var grid=document.getElementById('to-table-grid');if(!grid)return;
  if(snap.empty){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--t3);font-size:11px">테이블 없음<br>테이블 관리에서 추가</div>';return;}
  grid.innerHTML='';
  snap.forEach(function(doc){
   var t=doc.data();
   var sc={empty:'#22c55e',occupied:'#ef4444',reserved:'#f59e0b',cleaning:'#60a5fa'}[t.status||'empty']||'#22c55e';
   var btn=document.createElement('button');
   btn.id='to-tbtn-'+t.tableId;
   btn.style.cssText='padding:10px 4px;border-radius:10px;border:2px solid var(--bd2);background:var(--surface2);color:var(--tx);cursor:pointer;text-align:center;transition:.2s;font-size:11px;width:100%';
   btn.innerHTML='<div style="font-size:16px">🪑</div><div style="font-weight:800">'+t.tableId+'번</div>'+
    (t.seats?'<div style="font-size:9px;color:var(--t3)">'+t.seats+'인</div>':'')+
    '<div style="font-size:9px;font-weight:700;color:'+sc+'">●</div>';
   (function(tb){btn.onclick=function(){_toSelectTable(tb);};})(t);
   grid.appendChild(btn);
  });
 });
}

function _toSelectTable(t){
 _toTable=t;
 document.querySelectorAll('[id^="to-tbtn-"]').forEach(function(b){
  b.style.background='var(--surface2)';b.style.borderColor='var(--bd2)';
 });
 var sel=document.getElementById('to-tbtn-'+t.tableId);
 if(sel){sel.style.background='rgba(124,58,237,.2)';sel.style.borderColor='var(--br)';}
 _filoToast('🪑 '+t.tableId+'번 테이블 선택됨'+(t.seats?' ('+t.seats+'인석)':''));
}

function _toLoadMenus(did){
 _db.collection('filo_menus').where('dealerId','==',did).get().then(function(snap){
  var menus=[];
  snap.forEach(function(doc){var d=doc.data();if(d.forSale!==false&&d.name&&d.price)menus.push(Object.assign({_id:doc.id},d));});
  if(menus.length){window._toAllMenus=menus;_toRenderMenus(menus);return;}
  return _db.collection('inventory').where('dealerId','==',did).get();
 }).then(function(snap2){
  if(!snap2)return;
  var menus=[];
  snap2.forEach(function(doc){var d=doc.data();if(d.forSale!==false&&d.name&&d.price)menus.push(Object.assign({_id:doc.id},d));});
  window._toAllMenus=menus;_toRenderMenus(menus);
 });
}

function _toRenderMenus(menus){
 var cats=['전체',...new Set(menus.map(function(m){return m.category||'기타';}))];
 var cw=document.getElementById('to-cat-wrap');
 if(cw){
  cw.innerHTML='';
  cats.forEach(function(c,i){
   var cb=document.createElement('button');
   cb.style.cssText='padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;border:'+(i===0?'none;background:var(--br);color:#fff':'1px solid var(--bd2);background:transparent;color:var(--t2)');
   cb.textContent=c;
   (function(cat,el){
    el.onclick=function(){
     document.querySelectorAll('#to-cat-wrap button').forEach(function(b){b.style.background='transparent';b.style.border='1px solid var(--bd2)';b.style.color='var(--t2)';});
     el.style.background='var(--br)';el.style.border='none';el.style.color='#fff';
     _toShowMenuGrid(cat==='전체'?menus:menus.filter(function(m){return (m.category||'기타')===cat;}));
    };
   })(c,cb);
   cw.appendChild(cb);
  });
 }
 _toShowMenuGrid(menus);
}

function _toShowMenuGrid(menus){
 var grid=document.getElementById('to-menu-grid');if(!grid)return;
 grid.innerHTML='';
 menus.forEach(function(m){
  var qty=_toCart[m._id]?_toCart[m._id].qty:0;
  var card=document.createElement('div');
  card.style.cssText='background:var(--surface2);border:2px solid '+(qty>0?'rgba(124,58,237,.4)':'var(--bd2)')+';border-radius:var(--r);padding:10px;cursor:pointer;text-align:center;transition:.2s;position:relative';
  var badge=qty>0?'<div style="position:absolute;top:-6px;right:-6px;background:var(--br);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900">'+qty+'</div>':'';
  card.innerHTML=badge+
   '<div style="font-size:24px;margin-bottom:4px">'+(m.emoji||'🍽')+'</div>'+
   '<div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+m.name+'</div>'+
   '<div style="font-size:12px;font-weight:900;color:#22c55e">₩'+Number(m.price).toLocaleString()+'</div>';
  if(qty>0){
   var qRow=document.createElement('div');
   qRow.style.cssText='display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px';
   var dBtn=document.createElement('button');
   dBtn.style.cssText='width:22px;height:22px;border-radius:50%;border:none;background:var(--br);color:#fff;font-size:14px;font-weight:900;cursor:pointer';
   dBtn.textContent='−';
   var aBtn=document.createElement('button');
   aBtn.style.cssText=dBtn.style.cssText;
   aBtn.textContent='+';
   var qNum=document.createElement('span');qNum.style.cssText='font-size:13px;font-weight:900;color:#a78bfa';qNum.textContent=qty;
   (function(id,name,price){
    dBtn.onclick=function(e){e.stopPropagation();_toDecItem(id);};
    aBtn.onclick=function(e){e.stopPropagation();_toAddItem(id,name,price);};
   })(m._id,m.name,m.price);
   qRow.appendChild(dBtn);qRow.appendChild(qNum);qRow.appendChild(aBtn);
   card.appendChild(qRow);
  }
  (function(id,name,price){card.onclick=function(){_toAddItem(id,name,price);};})(m._id,m.name,m.price);
  grid.appendChild(card);
 });
}

function _toAddItem(id,name,price){
 if(!_toCart[id])_toCart[id]={name:name,price:price,qty:0};
 _toCart[id].qty++;_toUpdateCart();_toShowMenuGrid(window._toAllMenus||[]);
}
function _toDecItem(id){
 if(!_toCart[id])return;
 _toCart[id].qty--;if(_toCart[id].qty<=0)delete _toCart[id];
 _toUpdateCart();_toShowMenuGrid(window._toAllMenus||[]);
}

function _toUpdateCart(){
 var items=Object.values(_toCart).filter(function(it){return it.qty>0;});
 var total=items.reduce(function(s,it){return s+it.price*it.qty;},0);
 var listEl=document.getElementById('to-cart-list');
 var tw=document.getElementById('to-total-wrap');
 var te=document.getElementById('to-total');
 if(listEl){
  listEl.innerHTML=!items.length?'<div style="text-align:center;padding:16px;color:var(--t3);font-size:12px">메뉴를 선택하세요</div>':
   items.map(function(it){return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)">'+
    '<span style="font-size:13px">'+it.name+' <span style="color:var(--br)">x'+it.qty+'</span></span>'+
    '<span style="font-size:13px;font-weight:800">₩'+(it.price*it.qty).toLocaleString()+'</span></div>';}).join('');
 }
 if(tw)tw.style.display=items.length?'block':'none';
 if(te)te.textContent='₩'+total.toLocaleString();
}

function _toSubmitOrder(did){
 if(!_toTable){_filoToast('⚠️ 테이블을 먼저 선택하세요');return;}
 var items=Object.values(_toCart).filter(function(it){return it.qty>0;});
 if(!items.length){_filoToast('⚠️ 메뉴를 선택하세요');return;}
 var total=items.reduce(function(s,it){return s+it.price*it.qty;},0);
 var now=new Date();
 _db.collection('filo_sales').add({
  dealerId:did,tableId:_toTable.tableId,
  tableName:_toTable.tableId+'번 테이블',
  items:items.map(function(it){return {name:it.name,price:it.price,qty:it.qty};}),
  total:total,status:'pending',type:'table',source:'staff',
  payMethod:'카운터결제',createdBy:_CU.name||_CU.userId||'직원',
  createdAt:now.toISOString(),date:now.toISOString().slice(0,10)
 }).then(function(){
  _db.collection('filo_tables').where('dealerId','==',did).where('tableId','==',_toTable.tableId)
   .get().then(function(snap){if(!snap.empty)snap.docs[0].ref.update({status:'occupied',since:now.toISOString()});});
  _filoToast('✅ '+_toTable.tableId+'번 주문 전송! 주방/주문대기 자동 등록됩니다.');
  _toCart={};_toUpdateCart();_toShowMenuGrid(window._toAllMenus||[]);_toLoadTables(did);
 }).catch(function(e){_filoToast('❌ '+e.message);});
}
</script>
</body>
</html>
