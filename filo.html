<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<title>FILO — 재고·출퇴근·키오스크</title>
<link rel="manifest" href="/filo-manifest.json">
<style>
:root{
  --bg:#0f0f13;--bg2:#1a1a22;--bg3:#22222e;--border:rgba(255,255,255,.08);
  --text:#f0f0f5;--text2:#b0b0c0;--text3:#707088;
  --brand:#7c3aed;--brand2:#0891b2;--red:#ef4444;--green:#22c55e;
  --blue:#0066ff;--acc:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh}

/* ── 로그인 ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:16px;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(8,145,178,.1) 0%,transparent 60%),var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:400px;max-width:95vw}
.tab-btn{flex:1;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:none;color:var(--text2);transition:.15s}
.tab-btn.on{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;transition:.15s}
.fg input:focus,.fg select:focus{border-color:var(--brand)}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.btn-brand{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;width:100%;padding:12px;font-size:14px}
.btn-sm{padding:6px 14px;font-size:12px}
.err{color:var(--red);font-size:12px;margin-bottom:8px;display:none}

/* ── 앱 ── */
#app{display:none;flex-direction:column;min-height:100dvh}
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:100}
.topbar-logo{font-size:17px;font-weight:900;background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#topbar-title{flex:1;font-size:14px;font-weight:700;color:var(--text)}
.sidebar{position:fixed;top:52px;left:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;z-index:90;transform:translateX(-100%);transition:.25s}
.sidebar.open{transform:none}
.main{margin-top:52px;padding:16px;min-height:calc(100dvh - 52px)}
@media(min-width:700px){.sidebar{transform:none}.main{margin-left:220px}}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-radius:8px;margin:1px 8px;transition:.15s}
.ni:hover,.ni.on{background:rgba(124,58,237,.12);color:var(--acc)}
.ns-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.5px;padding:8px 16px 4px;text-transform:uppercase}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f0f0f5;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}

/* ── 애니메이션 ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes barFill{from{width:0}to{width:var(--w)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fade-up{animation:fadeUp .4s ease both}
.fade-up-1{animation:fadeUp .4s .1s ease both;opacity:0}
.fade-up-2{animation:fadeUp .4s .2s ease both;opacity:0}
.fade-up-3{animation:fadeUp .4s .3s ease both;opacity:0}
.fade-up-4{animation:fadeUp .4s .4s ease both;opacity:0}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:.2s}
.stat-card:hover{border-color:rgba(124,58,237,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,.02) 50%,transparent 100%);pointer-events:none}
.chart-bar{height:100%;border-radius:4px 4px 0 0;transition:height .8s cubic-bezier(.34,1.56,.64,1);position:relative;cursor:pointer}
.chart-bar:hover::after{content:attr(data-val);position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text2);white-space:nowrap;background:var(--bg3);padding:2px 6px;border-radius:4px}
.metric-ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="login-screen" class="login-wrap">
<div class="login-card">
  <div style="text-align:center;margin-bottom:22px">
    <div style="width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,#7c3aed,#0891b2);display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px">
      <span style="font-size:22px">📦</span>
    </div>
    <div style="font-size:22px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">FILO</div>
    <div style="font-size:11px;color:var(--text3);margin-top:2px">재고 · 출퇴근 · 키오스크</div>
    <button onclick="document.getElementById('landing-screen').style.display='block';document.getElementById('login-screen').style.display='none'" style="margin-top:8px;background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer">← 서비스 소개 보기</button>
  </div>

  <!-- 탭 -->
  <div style="display:flex;gap:4px;margin-bottom:20px;background:var(--bg3);border-radius:10px;padding:4px">
    <button class="tab-btn on" id="tab-login"    onclick="_filoTab('login')">로그인</button>
    <button class="tab-btn"    id="tab-register" onclick="_filoTab('register')">회사 등록</button>
    <button class="tab-btn"    id="tab-join"     onclick="_filoTab('join')">직원 가입</button>
  </div>

  <!-- ── 로그인 폼 ── -->
  <div id="form-login">
    <div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--text2);margin-bottom:14px">
      💡 <strong style="color:var(--acc)">이메일</strong> 또는 <strong style="color:var(--acc)">아이디·전화번호</strong>로 로그인
    </div>
    <div class="fg"><label>이메일 또는 아이디</label>
      <input id="fl-id" type="text" placeholder="예) kim001 · kim@email.com" onkeydown="if(event.key==='Enter')_filoLogin()">
    </div>
    <div class="fg"><label>비밀번호</label>
      <div style="position:relative">
        <input id="fl-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')_filoLogin()" style="padding-right:40px">
        <button type="button" onclick="_filoTogglePw('fl-pw',this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px">👁</button>
      </div>
    </div>
    <div id="fl-err" class="err"></div>
    <button class="btn btn-brand" onclick="_filoLogin()">로그인</button>
    <div style="margin-top:12px;text-align:center">
      <button onclick="_filoFindPw()" style="background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer">비밀번호 찾기</button>
    </div>
  </div>

  <!-- ── 회사 등록 폼 ── -->
  <div id="form-register" style="display:none">
    <div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--text2);margin-bottom:14px">
      🎁 <strong>7일 무료 체험</strong> — 카드 등록 불필요 · 사업자번호 1회 한정
    </div>
    <div class="fg"><label>회사명 <span style="color:var(--red)">*</span></label>
      <input id="fr-company" type="text" placeholder="예) 엠비티아이 유한회사">
    </div>
    <div class="fg"><label>사업자등록번호 <span style="color:var(--red)">*</span></label>
      <div style="display:flex;gap:8px">
        <input id="fr-biznum" type="text" placeholder="000-00-00000" style="flex:1" oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/(\d{3})(\d{2})(\d{5})/,'$1-$2-$3')">
        <button class="btn btn-sm" onclick="_filoBizCheck()" style="background:var(--brand);color:#fff;white-space:nowrap">중복확인</button>
      </div>
      <div id="fr-biznum-msg" style="font-size:11px;margin-top:4px;display:none"></div>
    </div>
    <!-- 사용 서비스 선택 -->
    <div class="fg">
      <label>사용할 서비스 선택 <span style="color:var(--red)">*</span></label>
      <div style="font-size:10px;color:var(--text3);margin-bottom:8px">7일 무료 체험 · 이후 월 구독</div>
      <div style="display:flex;flex-direction:column;gap:8px">

        <!-- QR+급여 -->
        <div id="fs-qr-card" onclick="_filoToggleSvc('qr')" style="border:2px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:18px">🔐</span>
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--text2)">QR출퇴근+급여</div>
                <div style="font-size:10px;color:var(--text3)">동적QR·GPS검증·급여자동계산 — 인당 4,500원/월</div>
              </div>
            </div>
            <div id="fs-qr-check" style="width:18px;height:18px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff">✓</div>
          </div>
        </div>

        <!-- 콤보 -->
        <div id="fs-combo-card" onclick="_filoToggleSvc('combo')" style="border:2px solid var(--brand);border-radius:10px;padding:10px 12px;cursor:pointer">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:18px">🚀</span>
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--text2)">재고+키오스크 콤보</div>
                <div style="font-size:10px;color:var(--text3)">재고관리+키오스크POS — 165,000원/월</div>
              </div>
            </div>
            <div id="fs-combo-check" style="width:18px;height:18px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff">✓</div>
          </div>
        </div>
      </div>
      <input type="hidden" id="fr-service" value="combo">
    </div>
    <div class="fg"><label>대표자 이름 <span style="color:var(--red)">*</span></label>
      <input id="fr-name" type="text" placeholder="예) 김형우">
    </div>
    <div class="fg"><label>이메일 (아이디) <span style="color:var(--red)">*</span></label>
      <input id="fr-email" type="email" placeholder="로그인 이메일">
    </div>
    <div class="fg"><label>비밀번호 <span style="color:var(--red)">*</span></label>
      <div style="position:relative">
        <input id="fr-pw" type="password" placeholder="8자 이상" style="padding-right:40px">
        <button type="button" onclick="_filoTogglePw('fr-pw',this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px">👁</button>
      </div>
    </div>
    <div class="fg"><label>전화번호</label>
      <input id="fr-phone" type="tel" placeholder="01012345678">
    </div>
    <div id="fr-err" class="err"></div>
    <button class="btn btn-brand" onclick="_filoRegister()">7일 무료체험 시작</button>
  </div>

  <!-- ── 직원 가입 폼 ── -->
  <div id="form-join" style="display:none">
    <div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--text2);margin-bottom:14px">
      💡 관리자에게 받은 <strong style="color:var(--acc)">회사 코드</strong> 또는 <strong style="color:var(--acc)">QR 스캔</strong>으로 가입
    </div>
    <div class="fg"><label>이름 <span style="color:var(--red)">*</span></label>
      <input id="fj-name" type="text" placeholder="실명 입력">
    </div>
    <div class="fg"><label>전화번호 <span style="color:var(--red)">*</span></label>
      <input id="fj-phone" type="tel" placeholder="01012345678 (- 없이)" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </div>
    <div class="fg"><label>회사 코드 <span style="color:var(--red)">*</span></label>
      <input id="fj-code" type="text" placeholder="관리자에게 받은 코드" style="text-transform:uppercase">
    </div>
    <div class="fg"><label>비밀번호 <span style="color:var(--red)">*</span></label>
      <div style="position:relative">
        <input id="fj-pw" type="password" placeholder="4자 이상" style="padding-right:40px">
        <button type="button" onclick="_filoTogglePw('fj-pw',this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px">👁</button>
      </div>
    </div>
    <div id="fj-err" class="err"></div>
    <button class="btn btn-brand" onclick="_filoJoin()">직원 가입</button>
  </div>

</div>
</div>

<!-- ── 앱 화면 ── -->
<div id="app">
  <div class="topbar">
    <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px">☰</button>
    <div class="topbar-logo">FILO</div>
    <div id="topbar-title">대시보드</div>
    <div id="topbar-right" style="display:flex;gap:6px;margin-left:auto"></div>
    <button onclick="_filoLogout()" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer">로그아웃</button>
  </div>
  <div id="sidebar" class="sidebar">
    <div style="padding:12px 16px 8px">
      <div id="nav-company" style="font-size:13px;font-weight:800;color:var(--text)"></div>
      <div id="nav-role" style="font-size:10px;color:var(--text3);margin-top:2px"></div>
    </div>
    <div id="nav-menu"></div>
    <div style="margin:12px 6px 0;border-top:1px solid var(--border);padding-top:10px">
      <button onclick="_filoGoPage(\'subscription\')" style="width:100%;padding:9px;background:linear-gradient(135deg,#7c3aed,#0891b2);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">+ 기능 추가하기</button>
    </div>
  </div>
  <div class="main" id="content"></div>
</div>

<div id="toast" class="toast"></div>

<!-- Firebase SDK -->
<script src="/firebase-app-compat.js"></script>
<script src="/firebase-auth-compat.js"></script>
<script src="/firebase-firestore-compat.js"></script>

<script>
// ── Firebase 초기화 ──
var _fbApp=null,_db=null,_auth=null,_CU=null,_cachedCompanyDoc=null;
function _initFirebase(){
  if(_fbApp)return;
  try{
    var cfg={
      apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
      authDomain:'mbti-logistics.firebaseapp.com',
      projectId:'mbti-logistics',
      storageBucket:'mbti-logistics.appspot.com',
      messagingSenderId:'862900137263',
      appId:'1:862900137263:web:a1b2c3d4e5f6a7b8'
    };
    _fbApp=firebase.initializeApp(cfg);
    _db=firebase.firestore();
    _auth=firebase.auth();
    _auth.onAuthStateChanged(function(u){
      if(u){
        _CU={uid:u.uid,email:u.email};
        _loadCompany(u.uid);
      } else {
        _CU=null;
        document.getElementById('login-screen').style.display='flex';
        document.getElementById('app').style.display='none';
      }
    });
  }catch(e){console.error('Firebase init:',e);}
}

// ── 회사 정보 로드 ──
function _loadCompany(uid){
  _db.collection('companies').doc(uid).get().then(function(snap){
    var data=snap.exists?snap.data():{};
    _cachedCompanyDoc=data;
    _CU.dealerId=data.dealerId||uid;
    _CU.role=data.role||'dealer';
    _CU.companyName=data.companyName||data.name||'';
    // 직원인 경우 dealerId 다를 수 있음
    if(!snap.exists){
      _db.collection('members').where('uid','==',uid).limit(1).get().then(function(ms){
        if(!ms.empty){
          var m=ms.docs[0].data();
          _CU.dealerId=m.dealerId||uid;
          _CU.role='member';
          _CU.name=m.name||m.driverName||'';
          _db.collection('companies').doc(_CU.dealerId).get().then(function(cs){
            _cachedCompanyDoc=cs.exists?cs.data():{};
            _showApp();
          });
        } else { _showApp(); }
      });
    } else { _showApp(); }
  }).catch(function(){ _showApp(); });
}

// ── 앱 표시 ──
function _showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('nav-company').textContent=_cachedCompanyDoc.companyName||_cachedCompanyDoc.name||'내 회사';
  document.getElementById('nav-role').textContent=_CU.role==='member'?'직원':'관리자';
  _buildFiloNav();
  _filoGoPage(\'home\');
}

// ── 네비게이션 ──
function _buildFiloNav(){
  var d=_cachedCompanyDoc||{};
  var subs=d.subscriptions||{};
  var today=new Date().toISOString().slice(0,10);
  function hasSub(k){var s=subs[k]||{};return !!(s.active&&(!s.expiry||s.expiry>=today));}
  var isAdmin=(_CU.role!=='member');
  var isSA=SUPER_ADMIN_EMAILS.indexOf(_CU.email||'')>=0;

  var menus=[];
  // 공통
  menus.push({s:'🏠 홈',items:[{ic:'🏠',l:'대시보드',p:'home'},{ic:'👤',l:'직원 관리',p:'members'},{ic:'📅',l:'달력',p:'schedule'}]});

  // 재고관리
  if(isSA||hasSub('inventory')||hasSub('combo')){
    menus.push({s:'📦 재고관리',items:[
      {ic:'📊',l:'재고 대시보드',p:'inventory'},
      {ic:'📥',l:'입고 등록',p:'stock_in'},
      {ic:'📤',l:'출고 등록',p:'stock_out'},
      {ic:'🔔',l:'자동 발주',p:'auto_order'},
      {ic:'📈',l:'매출·마진',p:'sales_report'},
      {ic:'⏰',l:'유통기한',p:'expiry'},
    ]});
  }
  // QR+급여
  if(isSA||hasSub('qr')||hasSub('payroll')||hasSub('combo')){
    menus.push({s:'🔐 QR·급여',items:[
      {ic:'🔐',l:'QR 출퇴근',p:'attendance'},
      {ic:'📋',l:'출퇴근 현황',p:'attend_dash'},
      {ic:'💼',l:'급여 현황',p:'payroll'},
      {ic:'🗓',l:'근무표',p:'roster'},
    ]});
  }
  // 키오스크
  if(isSA||hasSub('kiosk')||hasSub('combo')){
    menus.push({s:'🖥️ 키오스크',items:[
      {ic:'🖥️',l:'POS 결제',p:'kiosk'},
      {ic:'⭐',l:'포인트 관리',p:'points'},
      {ic:'🎫',l:'회원권',p:'membership'},

// ── 숫자 카운팅 애니메이션 ──
function _countUp(el, target, duration, prefix, suffix){
  prefix=prefix||''; suffix=suffix||'';
  var start=0, startTime=null;
  var step=function(timestamp){
    if(!startTime) startTime=timestamp;
    var progress=Math.min((timestamp-startTime)/duration,1);
    var ease=1-Math.pow(1-progress,3);
    var current=Math.floor(ease*target);
    el.textContent=prefix+(current>=10000?current.toLocaleString():current)+suffix;
    if(progress<1) requestAnimationFrame(step);
    else el.textContent=prefix+target.toLocaleString()+suffix;
  };
  requestAnimationFrame(step);
}

  var id=(document.getElementById('fl-id').value||'').trim();

  if(!id||!pw){errEl.textContent='아이디와 비밀번호를 입력해 주세요';errEl.style.display='block';return;}
  errEl.style.display='none';
  // 이메일 형식이면 바로, 아니면 아이디·전화번호로 이메일 조회
  var email=id.indexOf('@')>0?id:null;
  function doSignIn(em){
    _auth.signInWithEmailAndPassword(em,pw).catch(function(e){
      errEl.textContent=e.code==='auth/wrong-password'?'비밀번호가 틀렸습니다':
        e.code==='auth/user-not-found'?'존재하지 않는 계정입니다':'로그인 실패: '+e.message;
      errEl.style.display='block';
    });
  }
  if(email){ doSignIn(email); return; }
  // 아이디/전화번호 조회
  _db.collection('companies').where('loginId','==',id).limit(1).get().then(function(snap){
    if(!snap.empty){ doSignIn(snap.docs[0].data().email); return; }
    return _db.collection('members').where('phone','==',id).limit(1).get();
  }).then(function(snap){
    if(snap&&!snap.empty){ doSignIn(snap.docs[0].data().email); return; }
    errEl.textContent='아이디 또는 전화번호를 찾을 수 없습니다';
    errEl.style.display='block';
  }).catch(function(e){
    errEl.textContent='조회 오류: '+e.message;errEl.style.display='block';
  });
}

  }).catch(function(e){

function _filoJoin(){
  var name=(document.getElementById('fj-name').value||'').trim();
  var phone=(document.getElementById('fj-phone').value||'').trim();
  var code=(document.getElementById('fj-code').value||'').trim().toUpperCase();
  var pw=(document.getElementById('fj-pw').value||'').trim();
  var errEl=document.getElementById('fj-err');
  if(!name||!phone||!code||!pw){errEl.textContent='모든 항목을 입력해 주세요';errEl.style.display='block';return;}
  if(pw.length<4){errEl.textContent='비밀번호는 4자 이상';errEl.style.display='block';return;}
  errEl.style.display='none';
  // 회사 코드 조회
  _db.collection('companies').where('companyCode','==',code).limit(1).get().then(function(snap){
    if(snap.empty){errEl.textContent='❌ 존재하지 않는 회사 코드';errEl.style.display='block';return;}
    var company=snap.docs[0].data();
    var did=company.dealerId||snap.docs[0].id;
    var email=phone+'_'+code.toLowerCase()+'@filo.member';
    return _auth.createUserWithEmailAndPassword(email,pw).then(function(cred){
      var uid=cred.user.uid;
      var memberDoc={
        uid:uid, name:name, phone:phone, dealerId:did,
        companyName:company.companyName||company.name||'',
        email:email, role:'member', status:'active', platform:'filo',
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        joinedAt:firebase.firestore.FieldValue.serverTimestamp()
      };
      // ① members 컬렉션 — 관리자 직원 목록에 즉시 표시
      return _db.collection('members').doc(uid).set(memberDoc).then(function(){
        // ② users 컬렉션 — 로그인 권한용
        return _db.collection('users').doc(uid).set({
          uid:uid, name:name, phone:phone, email:email,
          dealerId:did, role:'member', platform:'filo',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      });
    });
  }).then(function(){
    // ★ 서버사이드 백업 저장
    fetch('/api/join-member',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({uid:_auth.currentUser&&_auth.currentUser.uid||'',
        name:document.getElementById('fj-name').value.trim(),
        phone:document.getElementById('fj-phone').value.trim(),
        dealerId:window._filoJoinDid||'',
        companyName:window._filoJoinCo||'',
        platform:'filo'
      })}).catch(function(){});
    _filoToast('✅ 가입 완료! 관리자 직원 목록에 자동 등록됩니다.');
  }).catch(function(e){
    if(e&&e.code==='auth/email-already-in-use'){errEl.textContent='이미 가입된 전화번호·코드 조합';}
    else if(e){errEl.textContent=e.message||String(e);}
    if(errEl.textContent)errEl.style.display='block';
  });
}

    '<button onclick="_filoAddMenu()" style="width:100%;padding:8px;background:var(--bg3);color:var(--text);border:1px dashed var(--border);border-radius:8px;cursor:pointer;font-size:12px;margin-bottom:12px">+ 메뉴 추가</button>'+
    '<div class="fg"><label>메모 (선택)</label><input type="text" id="si-memo" placeholder="특이사항" class="inp"></div>'+
    '<button onclick="_filoSaleSave(\''+did+'\')" style="width:100%;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;margin-top:8px">💾 저장</button>'+
    '</div>'+
    '<div id="si-recent" style="margin-top:12px"></div>';
  window._filoMenuCount=0;
  _filoAddMenu();

}

window._filoAddMenu=function(){
  window._filoMenuCount=(window._filoMenuCount||0)+1;
  var n=window._filoMenuCount;
  var div=document.createElement('div');
  div.id='fsi-menu-'+n;
  div.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center';
  div.innerHTML=
    '<input type="text" placeholder="메뉴명" class="inp" id="fsi-mname-'+n+'" style="font-size:12px">'+
    '<input type="number" placeholder="판매수" class="inp" id="fsi-mcount-'+n+'" style="font-size:12px">'+
    '<input type="number" placeholder="단가(원)" class="inp" id="fsi-mprice-'+n+'" style="font-size:12px">'+
    '<button onclick="document.getElementById(\'fsi-menu-'+n+'\')).remove()" style="padding:6px 8px;background:#fee2e2;color:#dc2626;border:none;border-radius:6px;cursor:pointer;font-size:12px">✕</button>';
  var list=document.getElementById('si-menu-list');
  if(list) list.appendChild(div);
};

window._filoSaleSave=function(did){
  var date=document.getElementById('si-date').value;
  var total=parseInt(document.getElementById('si-total').value||0);
  var memo=document.getElementById('si-memo').value||'';
  if(!date||!total){_filoToast('날짜와 총 매출액을 입력해주세요');return;}
  var menus=[];
  document.querySelectorAll('[id^="fsi-mname-"]').forEach(function(el){
    var n=el.id.split('-')[2];
    var name=el.value.trim();
    var count=parseInt(document.getElementById('fsi-mcount-'+n).value||0);
    var price=parseInt(document.getElementById('fsi-mprice-'+n).value||0);
    if(name&&count>0) menus.push({name:name,count:count,price:price,amount:count*price});
  });
  var hour=new Date().getHours();
  var timeSlot=hour<11?'아침(~11시)':hour<14?'점심(11~14시)':hour<17?'오후(14~17시)':hour<21?'저녁(17~21시)':'야간(21시~)';
  firebase.firestore().collection('mbetco_sales').add({
    dealerId:did,date:date,totalAmount:total,menus:menus,memo:memo,timeSlot:timeSlot,
    createdAt:new Date().toISOString()
  }).then(function(){
    _filoToast('✅ 매출 저장 완료');
    document.getElementById('si-total').value='';
    document.getElementById('si-memo').value='';
    document.getElementById('si-menu-list').innerHTML='';
    window._filoMenuCount=0; _filoAddMenu();
    _filoLoadRecent(did);
  }).catch(function(e){_filoToast('❌ '+e.message);});
};

function _filoLoadRecent(did){
  var area=document.getElementById('si-recent');
  if(!area)return;
  firebase.firestore().collection('mbetco_sales').where('dealerId','==',did).orderBy('date','desc').limit(7).get().then(function(snap){
    if(!snap.size){area.innerHTML='<div class="card" style="text-align:center;color:var(--text3);font-size:13px">아직 입력된 매출이 없습니다</div>';return;}
    var html='<div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:10px">📋 최근 입력 내역</div>';
    snap.forEach(function(doc){
      var d=doc.data();
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">'+
        '<div><div style="font-size:13px;font-weight:700">'+d.date+'</div>'+
        '<div style="font-size:10px;color:var(--text3)">'+(d.menus&&d.menus.length?d.menus.map(function(m){return m.name+'×'+m.count;}).join(' · '):'메뉴 미입력')+'</div></div>'+
        '<div style="text-align:right">'+
        '<div style="font-size:14px;font-weight:900;color:var(--brand)">'+(d.totalAmount||0).toLocaleString()+'원</div>'+
        '<button onclick="_filoDelSale(\''+doc.id+'\',\''+did+'\')" style="font-size:10px;color:#dc2626;background:none;border:none;cursor:pointer">삭제</button>'+
        '</div></div>';
    });
    html+='</div>';
    area.innerHTML=html;
  });
}

window._filoDelSale=function(id,did){
  if(!confirm('삭제할까요?'))return;
  firebase.firestore().collection('mbetco_sales').doc(id).delete().then(function(){_filoToast('삭제됨');_filoLoadRecent(did);});
};

function _filoSalesAnalysis(did,ym){
  var area=document.getElementById('filo-sales-content');
  if(!area)return;
  area.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">'+
    '<div style="width:40px;height:40px;border:3px solid var(--brand);border-top-color:transparent;border-radius:50%;margin:0 auto 12px;animation:pulse 1s infinite"></div>'+
    '<div style="font-size:13px">분석 중...</div></div>';
  firebase.firestore().collection('mbetco_sales').where('dealerId','==',did).where('date','>=',ym+'-01').where('date','<=',ym+'-31').get().then(function(snap){
    if(!snap.size){area.innerHTML='<div class="card" style="text-align:center;padding:30px;color:var(--text3)">이번 달 데이터가 없습니다<br><small>매출 입력 탭에서 먼저 입력해주세요</small></div>';return;}
    var totalRev=0,totalDays=0,menuMap={},weekMap={'월':0,'화':0,'수':0,'목':0,'금':0,'토':0,'일':0},timeMap={};
    var weekDays=['일','월','화','수','목','금','토'];
    snap.forEach(function(doc){
      var d=doc.data();
      totalRev+=d.totalAmount||0; totalDays++;
      if(d.menus) d.menus.forEach(function(m){
        if(!menuMap[m.name]) menuMap[m.name]={count:0,amount:0};
        menuMap[m.name].count+=m.count||0; menuMap[m.name].amount+=m.amount||0;
      });
      var dt=new Date(d.date);
      weekMap[weekDays[dt.getDay()]]=(weekMap[weekDays[dt.getDay()]]||0)+(d.totalAmount||0);
      var ts=d.timeSlot||'미분류';
      timeMap[ts]=(timeMap[ts]||0)+(d.totalAmount||0);
    });
    var avgDay=totalDays>0?Math.round(totalRev/totalDays):0;
    var menuList=Object.keys(menuMap).map(function(k){return{name:k,count:menuMap[k].count,amount:menuMap[k].amount};});
    menuList.sort(function(a,b){return b.count-a.count;});
    var weekMax=Math.max.apply(null,Object.values(weekMap))||1;
    var html='';
    // 요약
    html+='<div class="card"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
      '<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#60a5fa">'+totalRev.toLocaleString()+'</div><div style="font-size:10px;color:var(--text3)">총 매출</div></div>'+
      '<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#22c55e">'+avgDay.toLocaleString()+'</div><div style="font-size:10px;color:var(--text3)">일 평균</div></div>'+
      '<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#f59e0b">'+totalDays+'일</div><div style="font-size:10px;color:var(--text3)">영업일</div></div>'+
      '</div></div>';
    // 요일별 바차트 (애니메이션)
    var bestDay=['월','화','수','목','금','토','일'].reduce(function(a,b){return (weekMap[a]||0)>(weekMap[b]||0)?a:b;});
    html+='<div class="card fade-up-2" style="margin-top:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
      '<div style="font-size:13px;font-weight:800">📅 요일별 매출 패턴</div>'+
      '<div style="font-size:11px;color:var(--text3)">최고 <span style="color:#f59e0b;font-weight:700">'+bestDay+'요일</span></div></div>'+
      '<div style="display:flex;gap:6px;align-items:flex-end;height:80px;padding-bottom:20px;position:relative">';
    ['월','화','수','목','금','토','일'].forEach(function(wd){
      var val=weekMap[wd]||0,pct=Math.round(val/weekMax*100);
      var isWE=(wd==='토'||wd==='일');
      var isBest=(wd===bestDay);
      var color=isBest?'linear-gradient(180deg,#f59e0b,#d97706)':isWE?'linear-gradient(180deg,#a78bfa,#7c3aed)':'linear-gradient(180deg,#60a5fa,#2563eb)';
      html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative">'+
        '<div style="font-size:8px;color:var(--text3);height:14px;display:flex;align-items:center">'+(val>0?Math.round(val/10000)+'만':'')+'</div>'+
        '<div data-val="'+val.toLocaleString()+'원" class="chart-bar" style="width:100%;background:'+color+';height:'+(pct||2)+'%;min-height:3px;border-radius:4px 4px 0 0"></div>'+
        '<div style="font-size:10px;font-weight:700;color:'+(isBest?'#f59e0b':isWE?'var(--acc)':'var(--text2)')+'">'+wd+'</div></div>';
    });
    html+='</div></div>';
    // 메뉴 TOP5
    if(menuList.length){
      var maxCnt=menuList[0].count||1;
      html+='<div class="card" style="margin-top:10px"><div style="font-size:13px;font-weight:800;margin-bottom:10px">🏆 잘 팔리는 메뉴</div>';
      menuList.slice(0,5).forEach(function(m,i){
        var pct=Math.round(m.count/maxCnt*100);
        html+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
          '<span style="font-size:12px;font-weight:700">'+(i+1)+'. '+m.name+'</span>'+
          '<span style="font-size:11px;color:var(--text3)">'+m.count+'개</span></div>'+
          '<div style="background:var(--bg3);border-radius:4px;height:5px"><div style="background:var(--brand);border-radius:4px;height:5px;width:'+pct+'%"></div></div></div>';
      });
      if(menuList.length>3){
        html+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:6px">📉 안 팔리는 메뉴</div>';
        menuList.slice(-3).reverse().forEach(function(m){
          html+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)">'+
            '<span>'+m.name+'</span><span style="color:#ef4444">'+m.count+'개</span></div>';
        });
        html+='</div>';
      }
      html+='</div>';
    }
    area.innerHTML=html;
  }).catch(function(e){area.innerHTML='<div class="card" style="color:#ef4444">'+e.message+'</div>';});
}

// ── 유통기한 페이지 ──
function _filoPageExpiry(el){
  var did=(_cachedCompanyDoc||{}).dealerId||(_cachedCompanyDoc||{}).uid||'';
  if(!did){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--text3)">로그인 후 이용하세요</div>';return;}
  el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">⏳ 로딩 중...</div>';
  var today=new Date().toISOString().slice(0,10);
  firebase.firestore().collection('inventory').where('dealerId','==',did).get().then(function(snap){
    var expired=[],warn=[],ok=[];
    snap.forEach(function(doc){
      var d=Object.assign({id:doc.id},doc.data());
      if(!d.expiryDate){ok.push(d);return;}
      if(d.expiryDate<today) expired.push(d);
      else if(d.expiryDate<=new Date(Date.now()+7*86400000).toISOString().slice(0,10)) warn.push(d);
      else ok.push(d);
    });
    var html='<div style="max-width:860px;margin:0 auto">';
    // 등록 폼
    html+='<div class="card" style="margin-bottom:10px">'+
      '<div style="font-size:13px;font-weight:800;margin-bottom:12px">📝 유통기한 등록</div>'+
      '<div style="display:grid;grid-template-columns:2fr 1fr auto;gap:8px;align-items:end">'+
      '<div class="fg"><label>품목</label><select id="exp-item" class="inp" style="font-size:12px"><option value="">-- 선택 --</option>';
    snap.forEach(function(doc){html+='<option value="'+doc.id+'">'+(doc.data().name||'')+'</option>';});
    html+='</select></div>'+
      '<div class="fg"><label>유통기한</label><input type="date" id="exp-date" class="inp"></div>'+
      '<button onclick="_filoExpSave(\''+did+'\')" style="padding:10px 12px;background:var(--brand);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700">저장</button>'+
      '</div></div>';
    if(expired.length){
      html+='<div class="card" style="border:2px solid #ef4444;margin-bottom:10px">'+
        '<div style="font-size:13px;font-weight:800;color:#ef4444;margin-bottom:8px">🚨 만료 ('+expired.length+'개) — 즉시 폐기</div>';
      expired.forEach(function(d){
        html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(239,68,68,.2)">'+
          '<span style="font-size:12px;font-weight:700">'+d.name+'</span>'+
          '<span style="font-size:11px;color:#ef4444;font-weight:700">'+d.expiryDate+' 만료</span></div>';
      });
      html+='</div>';
    }
    if(warn.length){
      html+='<div class="card" style="border:1px solid #f59e0b;margin-bottom:10px">'+
        '<div style="font-size:13px;font-weight:800;color:#f59e0b;margin-bottom:8px">⚠️ 7일 이내 만료 ('+warn.length+'개)</div>';
      warn.forEach(function(d){
        var dL=Math.ceil((new Date(d.expiryDate)-new Date(today))/86400000);
        html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(245,158,11,.2)">'+
          '<span style="font-size:12px;font-weight:700">'+d.name+'</span>'+
          '<span style="font-size:11px;color:#f59e0b;font-weight:700">D-'+dL+'</span></div>';
      });
      html+='</div>';
    }
    html+='<div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:10px">📦 전체 목록</div>';
    snap.forEach(function(doc){
      var d=doc.data();
      var dL=d.expiryDate?Math.ceil((new Date(d.expiryDate)-new Date(today))/86400000):null;
      var color=dL===null?'var(--text3)':dL<0?'#ef4444':dL<=7?'#f59e0b':'#22c55e';
      html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">'+
        '<span style="font-size:12px">'+d.name+'</span>'+
        '<span style="font-size:11px;font-weight:700;color:'+color+'">'+
        (d.expiryDate?d.expiryDate+' (D-'+dL+')':'미등록')+'</span></div>';
    });
    html+='</div></div>';
    el.innerHTML=html;
  }).catch(function(e){el.innerHTML='<div class="card" style="color:#ef4444">'+e.message+'</div>';});
}

window._filoExpSave=function(did){
  var itemId=document.getElementById('exp-item').value;
  var date=document.getElementById('exp-date').value;
  if(!itemId||!date){_filoToast('품목과 유통기한을 선택해주세요');return;}
  firebase.firestore().collection('inventory').doc(itemId).update({expiryDate:date,updatedAt:new Date().toISOString()})
  .then(function(){_filoToast('✅ 저장됨');_filoPageExpiry(document.getElementById('content'));})
  .catch(function(e){_filoToast('❌ '+e.message);});

// ── 재고 대시보드 ──
function _filoPageInventory(el){
  var did=(_cachedCompanyDoc||{}).dealerId||(_cachedCompanyDoc||{}).uid||'';
  if(!did){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--text3)">로그인 후 이용하세요</div>';return;}
  el.innerHTML='<div style="max-width:900px;margin:0 auto"><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">'+
    ['오늘 매출','거래건수','재고 부족','마진율'].map(function(t,i){
      return '<div class="stat-card fade-up-'+( i+1)+'" style="flex:1;min-width:130px;text-align:center">'+
        '<div class="metric-ring" style="margin:0 auto 10px;background:'+['rgba(96,165,250,.15)','rgba(34,197,94,.15)','rgba(239,68,68,.15)','rgba(245,158,11,.15)'][i]+'">'+
        ['💰','🛒','⚠️','📊'][i]+'</div>'+
        '<div id="fi-stat-'+i+'" style="font-size:22px;font-weight:900;color:'+['#60a5fa','#22c55e','#ef4444','#f59e0b'][i]+'">—</div>'+
        '<div style="font-size:10px;color:var(--text3);margin-top:3px">'+t+'</div></div>';
    }).join('')+'</div>'+
    '<div id="fi-low-stock" class="fade-up-3"></div>'+
    '<div id="fi-expiry-warn" class="fade-up-4"></div>'+
    '</div>';

  var today=new Date().toISOString().slice(0,10);
  var ym=today.slice(0,7);
  Promise.all([
    firebase.firestore().collection('mbetco_sales').where('dealerId','==',did).where('date','==',today).get(),
    firebase.firestore().collection('mbetco_sales').where('dealerId','==',did).where('date','>=',ym+'-01').where('date','<=',ym+'-31').get(),
    firebase.firestore().collection('inventory').where('dealerId','==',did).get()
  ]).then(function(res){
    var todayRev=0,todayCnt=0,monthRev=0,monthCost=0,lowStock=[],expirySoon=[];
    res[0].forEach(function(doc){var d=doc.data();todayRev+=(d.totalAmount||0);todayCnt++;});
    res[1].forEach(function(doc){var d=doc.data();monthRev+=(d.totalAmount||0);monthCost+=(d.totalCost||0);});
    var warn7=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
    res[2].forEach(function(doc){
      var d=doc.data();
      if(d.stock!=null&&d.minStock!=null&&d.stock<=d.minStock) lowStock.push(d);
      if(d.expiryDate&&d.expiryDate<=warn7&&d.expiryDate>=today) expirySoon.push(d);
    });
    var marginRate=monthRev>0?Math.round((monthRev-monthCost)/monthRev*100):0;

    // 카운팅 애니메이션
    var stats=[todayRev,todayCnt,lowStock.length,marginRate];
    var suffixes=['원','건','개','%'];
    stats.forEach(function(v,i){
      var el2=document.getElementById('fi-stat-'+i);
      if(el2) _countUp(el2,v,800,'',suffixes[i]);
    });

    // 재고 부족 카드
    var low=document.getElementById('fi-low-stock');
    if(low&&lowStock.length){
      low.innerHTML='<div class="card" style="border-left:3px solid #ef4444;margin-bottom:10px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
        '<div style="font-size:13px;font-weight:800;color:#ef4444">⚠️ 재고 부족 '+lowStock.length+'개</div>'+
        '<button onclick="_filoGoPage(\'expiry\')" style="font-size:11px;padding:4px 10px;background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);border-radius:6px;cursor:pointer">상세보기</button>'+
        '</div>'+
        lowStock.slice(0,3).map(function(d){
          var pct=d.minStock>0?Math.round(d.stock/d.minStock*100):0;
          return '<div style="margin-bottom:8px">'+
            '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
            '<span style="font-size:12px;font-weight:600">'+d.name+'</span>'+
            '<span style="font-size:11px;color:#ef4444;font-weight:700">'+d.stock+'/'+d.minStock+'개</span></div>'+
            '<div style="background:var(--bg3);border-radius:4px;height:5px">'+
            '<div style="background:linear-gradient(90deg,#ef4444,#f97316);border-radius:4px;height:5px;width:'+Math.min(pct,100)+'%;transition:width .8s ease"></div></div></div>';
        }).join('')+
        (lowStock.length>3?'<div style="font-size:11px;color:var(--text3);margin-top:6px">외 '+(lowStock.length-3)+'개 품목...</div>':'')+
        '</div>';
    }

    // 유통기한 경고
    var exp=document.getElementById('fi-expiry-warn');
    if(exp&&expirySoon.length){
      exp.innerHTML='<div class="card" style="border-left:3px solid #f59e0b">'+
        '<div style="font-size:13px;font-weight:800;color:#f59e0b;margin-bottom:8px">⏰ 7일 내 만료 '+expirySoon.length+'개</div>'+
        expirySoon.map(function(d){
          var dL=Math.ceil((new Date(d.expiryDate)-new Date(today))/86400000);
          return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">'+
            '<span style="font-size:12px">'+d.name+'</span>'+
            '<span style="font-size:11px;font-weight:700;color:'+( dL<=3?'#ef4444':'#f59e0b')+'">D-'+dL+'</span></div>';
        }).join('')+'</div>';
    }
  }).catch(function(e){console.warn(e);});
}
