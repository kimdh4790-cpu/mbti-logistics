<!DOCTYPE html>
<!--
  filo.html - FILO 관리자 앱 (HTML 뼈대 + CSS)
  URL: filo.ai.kr/:slug
  
  ⚠️ 수정 시 주의:
  - JS 로직은 filo-*.js 파일들에 분리되어 있음
  - GitHub push → 자동배포 (GitHub Actions)
  
  JS 모듈 구조:
  - filo-common.js  : 공통 유틸/QR/재고입출 (슬림화 완료 2026-07-13)
- filo-auth.js    : 로그인, 회원가입, Firebase 초기화
- filo-margin.js  : 마진분석, AI인사이트, 대시보드
- filo-members.js : 회원관리, 출퇴근, 재고이력
- filo-payroll2.js: 급여, 명세서
- filo-payment.js : 결제, 분할결제, QR
- filo-schedule.js: 스케줄, 예약, 캘린더
- filo-settings.js: 설정, 구독, 세금공유, 공지, 카테고리
  - filo-pos.js     : POS 결제, 영수증, 분할결제, 각자계산 (16개 함수)
  - filo-table.js   : 테이블 QR, 예약, 착석, 직원호출 (11개 함수)
  - filo-menu.js    : 메뉴 관리, 레시피, 원가 (18개 함수)
  - filo-order.js   : 주문대기, 배달주문 (13개 함수)
  - filo-inventory.js: 재고 현황, 입출고, 자동발주 (6개 함수)
  - filo-staff.js   : 직원QR, 출퇴근, 급여, 근무표 (9개 함수)
  - filo-report.js  : 매출분석, 차트 (10개 함수)
  
  KV keys: filo.html, filo-common.js, filo-auth.js, filo-margin.js, filo-members.js, filo-payroll2.js, filo-payment.js, filo-schedule.js, filo-settings.js, filo-pos.js, filo-table.js,
           filo-menu.js, filo-order.js, filo-inventory.js, filo-staff.js, filo-report.js
  
  Firestore 컬렉션:
  - companies, users: 회사/사용자 정보
  - filo_menus, menu_recipes: 메뉴/레시피
  - filo_sales, filo_orders: 매출/주문
  - filo_tables, filo_bookings: 테이블/예약
  - staff_calls: 직원호출
  - inventory, inventory_in/out: 재고
  - members, attendance, payslips: 직원/출퇴근/급여
-->

<style>
/* ══════════════════════
   FILO Design System v2
   대기업 수준 UI
   ══════════════════════ */
:root{
  /* ── 배경 레이어 ── */
  --bg:#07071a;--bg2:#0c0c22;--bg3:#111128;
  --surface:#14142a;--surface2:#1a1a32;--surface3:#20203a;--surface4:#262646;
  --bd:rgba(255,255,255,.055);--bd2:rgba(255,255,255,.1);--bd3:rgba(255,255,255,.16);
  /* ── 텍스트 ── */
  --tx:#f0f0ff;--t2:#9898c0;--t3:#565678;--t4:#323250;
  /* ── 브랜드 컬러 ── */
  --br:#7c3aed;--br-l:#9f5ef8;--br-ll:#c084fc;--br-d:#5b21b6;
  --br-glow:rgba(124,58,237,.45);--br-glow2:rgba(124,58,237,.2);
  --br2:#0891b2;--br2-l:#38bdf8;--br2-glow:rgba(8,145,178,.35);
  /* ── 시맨틱 ── */
  --green:#22c55e;--green-l:#4ade80;--green-bg:rgba(34,197,94,.08);--green-bd:rgba(34,197,94,.2);
  --red:#ef4444;--red-l:#f87171;--red-bg:rgba(239,68,68,.08);--red-bd:rgba(239,68,68,.2);
  --yellow:#f59e0b;--yellow-l:#fbbf24;--yellow-bg:rgba(245,158,11,.08);--yellow-bd:rgba(245,158,11,.2);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.08);--blue-bd:rgba(96,165,250,.2);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);--purple-bd:rgba(167,139,250,.2);
  --orange:#f97316;--orange-bg:rgba(249,115,22,.08);
  /* ── 레이아웃 ── */
  --topbar-h:56px;--sidebar-w:236px;
  --r:10px;--r-lg:16px;--r-xl:22px;--r-2xl:28px;
  /* ── 그림자 ── */
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-lg:0 8px 48px rgba(0,0,0,.55);
  --shadow-xl:0 16px 64px rgba(0,0,0,.65);
  --shadow-brand:0 4px 20px rgba(124,58,237,.4);
  --shadow-green:0 4px 20px rgba(34,197,94,.3);
  /* ── 별칭 ── */
  --b2:var(--surface);--b3:var(--surface2);--b4:var(--surface3);
  --gn:var(--green);--acc:var(--purple);--border:var(--bd);
  --text:var(--tx);--text2:var(--t2);--text3:var(--t3);
  --brand:var(--br);--brand2:var(--br2);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
::selection{background:rgba(124,58,237,.35);color:#fff}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:4px}

/* ── 로그인 화면 ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;
  background:radial-gradient(ellipse at 20% 10%,rgba(124,58,237,.25) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 90%,rgba(8,145,178,.2) 0%,transparent 55%),
             radial-gradient(ellipse at 50% 50%,rgba(124,58,237,.06) 0%,transparent 70%),var(--bg)}
.login-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-xl);padding:32px 28px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(124,58,237,.08)}
.login-box{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-xl);padding:32px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(124,58,237,.08)}
.login-logo{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--br),var(--br2));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:var(--shadow-brand),0 0 40px rgba(124,58,237,.25);animation:float 4s ease-in-out infinite}
.tab-btn{padding:9px 4px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--t3);transition:.2s;text-align:center;width:100%}
.tab-btn.on{background:var(--surface3);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.btn-brand{background:linear-gradient(135deg,var(--br),var(--br-l));color:#fff;border:none;border-radius:var(--r);padding:13px;width:100%;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-brand);letter-spacing:.2px;position:relative;overflow:hidden}
.btn-brand::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}
.btn-brand:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,.5)}
.btn-brand:hover::before{opacity:1}
.btn-brand:active{transform:translateY(0);box-shadow:var(--shadow-brand)}
label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px}
input[type=text],input[type=password],input[type=number],input[type=email],input[type=date],select,textarea{
  width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);
  color:var(--tx);font-size:13px;outline:none;transition:.2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.inp{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:13px;outline:none;transition:.2s}
.inp:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.err{font-size:11px;color:var(--red);margin-top:6px;display:none}
.fg{margin-bottom:16px}

/* ── 앱 레이아웃 ── */
#app{display:none;flex-direction:column;min-height:100dvh}

/* ── 탑바 ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:rgba(7,7,26,.88);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid rgba(124,58,237,.12);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:200;
  box-shadow:0 1px 0 rgba(124,58,237,.08),0 4px 24px rgba(0,0,0,.3)}
.topbar-logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#a78bfa,var(--br2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
#topbar-title{flex:1;font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.topbar-badge{background:var(--br);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;letter-spacing:.3px}

/* ── 사이드바 ── */
#sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--bg2) 0%,rgba(7,7,26,.95) 100%);
  border-right:1px solid rgba(124,58,237,.1);
  overflow-y:auto;z-index:150;
  transition:width .25s cubic-bezier(.4,0,.2,1),transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:4px 0 24px rgba(0,0,0,.3)}
#sidebar.collapsed{width:52px;overflow-x:hidden}
#sidebar.collapsed .ni span:last-child{display:none}
#sidebar.collapsed .ni{justify-content:center;padding:9px 0}
#sidebar.collapsed .ns-label{display:none}
#sidebar.collapsed .ns-arrow{display:none}
#sidebar.collapsed #sidebar-profile{display:none}
#sidebar.collapsed #sidebar-clock{display:none}
#sidebar.collapsed .sidebar-bottom{display:none}
#content{transition:margin-left .25s cubic-bezier(.4,0,.2,1)}
#sidebar::-webkit-scrollbar{display:none}
.sidebar-profile{padding:16px 14px 10px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.sidebar-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--br),var(--br2));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;margin-bottom:8px}
.ns-label{font-size:9px;font-weight:800;color:var(--t3);letter-spacing:1.2px;padding:12px 16px 5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:color .2s;border-radius:8px;margin:0 4px}
.ns-label:hover{color:var(--t2);background:rgba(255,255,255,.03)}
.ns-label .ns-arrow{font-size:9px;transition:transform .25s cubic-bezier(.4,0,.2,1);opacity:.5}
.ns-label.collapsed .ns-arrow{transform:rotate(-90deg)}
.ns-group{overflow:hidden;transition:max-height .25s cubic-bezier(.4,0,.2,1),opacity .2s}
.ns-group.collapsed{max-height:0!important;opacity:0}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:10px;margin:1px 8px;transition:all .18s cubic-bezier(.4,0,.2,1);position:relative;letter-spacing:-.1px}
.ni:hover{background:var(--surface2);color:var(--tx);transform:translateX(2px)}
.ni.active{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(8,145,178,.1));color:var(--tx);box-shadow:inset 0 0 0 1px rgba(124,58,237,.25),0 2px 12px rgba(124,58,237,.15)}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:65%;background:linear-gradient(180deg,var(--br-ll),var(--br2));border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--br-glow)}
.ni-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;transition:transform .18s}
.ni:hover .ni-icon{transform:scale(1.1)}
.ni.active .ni-icon{filter:drop-shadow(0 0 4px var(--br-glow))}
.ni-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}

/* ── 메인 콘텐츠 ── */
#content-wrap{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);overflow-x:hidden;min-width:0;width:calc(100% - var(--sidebar-w));transition:margin-left .25s cubic-bezier(.4,0,.2,1),width .25s cubic-bezier(.4,0,.2,1)}
#content{padding:16px;min-height:calc(100dvh - var(--topbar-h));box-sizing:border-box;padding-top:calc(var(--topbar-h) + 16px);overflow-x:hidden;margin-left:var(--sidebar-w);width:calc(100% - var(--sidebar-w))}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%);position:fixed;z-index:200;box-shadow:none}
  #sidebar.open{transform:translateX(0);box-shadow:4px 0 32px rgba(0,0,0,.5)}
  #content-wrap{margin-left:0!important;width:100%!important}
  #content{margin-left:0!important;width:100%!important;padding:12px!important}
  #app.logged-in{display:block!important}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
  .pos-wrap{grid-template-columns:1fr!important;grid-template-rows:auto 1fr!important;height:auto!important;overflow:visible!important}
  .cart-panel{max-height:50dvh!important;overflow-y:auto!important}
  .menu-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))!important}
  .cat-scroll{display:flex!important;overflow-x:auto!important;gap:6px!important;padding-bottom:6px!important;flex-wrap:nowrap!important}
  .modal-inner{max-height:90dvh!important;overflow-y:auto!important}
  .section-header{flex-wrap:wrap!important;gap:8px!important}
  table{font-size:11px!important}
  .pay-card{flex-direction:column!important}
}

/* ── 카드 컴포넌트 ── */
.card{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;transition:border-color .2s,box-shadow .2s,transform .2s}
.card:hover{border-color:var(--bd2)}
.card-glass{background:rgba(22,22,42,.6);backdrop-filter:blur(12px);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:18px}
.card-brand{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(8,145,178,.06));border:1px solid rgba(124,58,237,.2);border-radius:var(--r-lg);padding:18px}

/* ── 버튼 ── */
.btn{padding:10px 18px;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-sm{padding:7px 12px;font-size:11px;border-radius:8px}
.btn-ghost{background:var(--surface2);color:var(--t2);border:1px solid var(--bd2)}
.btn-ghost:hover{background:var(--surface3);color:var(--tx)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}

/* ── 배지 ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.3px}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.badge-purple{background:var(--purple-bg,rgba(167,139,250,.1));color:var(--purple);border:1px solid var(--purple-bd,rgba(167,139,250,.2))}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}

/* ── 통계 카드 ── */
.stat-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:18px;position:relative;overflow:hidden;transition:.2s}
.stat-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none}

/* ── KPI 카드 ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:16px 14px;position:relative;overflow:hidden;transition:all .25s cubic-bezier(.4,0,.2,1)}
.kpi-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.025),transparent);pointer-events:none}
.kpi-card:hover{transform:translateY(-3px);box-shadow:var(--shadow),0 0 0 1px rgba(124,58,237,.12)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r-lg) var(--r-lg) 0 0;z-index:0}
.kpi-card.kpi-revenue{border-color:rgba(124,58,237,.18)}.kpi-card.kpi-revenue::before{background:linear-gradient(90deg,#7c3aed,#c084fc)}
.kpi-card.kpi-cost{border-color:rgba(239,68,68,.18)}.kpi-card.kpi-cost::before{background:linear-gradient(90deg,#ef4444,#f97316)}
.kpi-card.kpi-profit{border-color:rgba(34,197,94,.18)}.kpi-card.kpi-profit::before{background:linear-gradient(90deg,#22c55e,#10b981)}
.kpi-card.kpi-margin{border-color:rgba(245,158,11,.18)}.kpi-card.kpi-margin::before{background:linear-gradient(90deg,#f59e0b,#eab308)}
.kpi-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.kpi-val{font-size:24px;font-weight:900;letter-spacing:-.8px;margin:10px 0 4px;line-height:1}
.kpi-delta{font-size:11px;font-weight:700}.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}

/* ── 히어로 / 대시보드 ── */
.dash-hero{background:linear-gradient(135deg,#0a0720 0%,#120e30 40%,#0c1628 100%);
  border:1px solid rgba(124,58,237,.15);border-radius:var(--r-xl);padding:28px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.dash-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(124,58,237,.2) 0%,transparent 70%);pointer-events:none}
