<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<title>FILO — 재고·출퇴근·키오스크</title>
<link rel="manifest" href="/filo-manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/filo-icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/filo-icon-512.png">
<link rel="apple-touch-icon" href="/filo-apple-icon.png">
<style>
/* ══════════════════════
   FILO Design System v2
   대기업 수준 UI
   ══════════════════════ */
:root{
  /* ── 배경 레이어 ── */
  --bg:#07071a;--bg2:#0c0c22;--bg3:#111128;
  --surface:#14142a;--surface2:#1a1a32;--surface3:#20203a;--surface4:#262646;
  --bd:rgba(255,255,255,.055);--bd2:rgba(255,255,255,.1);--bd3:rgba(255,255,255,.16);
  /* ── 텍스트 ── */
  --tx:#f0f0ff;--t2:#9898c0;--t3:#565678;--t4:#323250;
  /* ── 브랜드 컬러 ── */
  --br:#7c3aed;--br-l:#9f5ef8;--br-ll:#c084fc;--br-d:#5b21b6;
  --br-glow:rgba(124,58,237,.45);--br-glow2:rgba(124,58,237,.2);
  --br2:#0891b2;--br2-l:#38bdf8;--br2-glow:rgba(8,145,178,.35);
  /* ── 시맨틱 ── */
  --green:#22c55e;--green-l:#4ade80;--green-bg:rgba(34,197,94,.08);--green-bd:rgba(34,197,94,.2);
  --red:#ef4444;--red-l:#f87171;--red-bg:rgba(239,68,68,.08);--red-bd:rgba(239,68,68,.2);
  --yellow:#f59e0b;--yellow-l:#fbbf24;--yellow-bg:rgba(245,158,11,.08);--yellow-bd:rgba(245,158,11,.2);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.08);--blue-bd:rgba(96,165,250,.2);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);--purple-bd:rgba(167,139,250,.2);
  --orange:#f97316;--orange-bg:rgba(249,115,22,.08);
  /* ── 레이아웃 ── */
  --topbar-h:56px;--sidebar-w:236px;
  --r:10px;--r-lg:16px;--r-xl:22px;--r-2xl:28px;
  /* ── 그림자 ── */
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-lg:0 8px 48px rgba(0,0,0,.55);
  --shadow-xl:0 16px 64px rgba(0,0,0,.65);
  --shadow-brand:0 4px 20px rgba(124,58,237,.4);
  --shadow-green:0 4px 20px rgba(34,197,94,.3);
  /* ── 별칭 ── */
  --b2:var(--surface);--b3:var(--surface2);--b4:var(--surface3);
  --gn:var(--green);--acc:var(--purple);--border:var(--bd);
  --text:var(--tx);--text2:var(--t2);--text3:var(--t3);
  --brand:var(--br);--brand2:var(--br2);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
::selection{background:rgba(124,58,237,.35);color:#fff}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:4px}

/* ── 로그인 화면 ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;
  background:radial-gradient(ellipse at 20% 10%,rgba(124,58,237,.25) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 90%,rgba(8,145,178,.2) 0%,transparent 55%),
             radial-gradient(ellipse at 50% 50%,rgba(124,58,237,.06) 0%,transparent 70%),var(--bg)}
.login-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-xl);padding:32px 28px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(124,58,237,.08)}
.login-box{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-xl);padding:32px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(124,58,237,.08)}
.login-logo{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--br),var(--br2));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:var(--shadow-brand),0 0 40px rgba(124,58,237,.25);animation:float 4s ease-in-out infinite}
.tab-btn{padding:9px 4px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--t3);transition:.2s;text-align:center;width:100%}
.tab-btn.on{background:var(--surface3);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.btn-brand{background:linear-gradient(135deg,var(--br),var(--br-l));color:#fff;border:none;border-radius:var(--r);padding:13px;width:100%;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-brand);letter-spacing:.2px;position:relative;overflow:hidden}
.btn-brand::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}
.btn-brand:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,.5)}
.btn-brand:hover::before{opacity:1}
.btn-brand:active{transform:translateY(0);box-shadow:var(--shadow-brand)}
label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px}
input[type=text],input[type=password],input[type=number],input[type=email],input[type=date],select,textarea{
  width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);
  color:var(--tx);font-size:13px;outline:none;transition:.2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.inp{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:13px;outline:none;transition:.2s}
.inp:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.err{font-size:11px;color:var(--red);margin-top:6px;display:none}
.fg{margin-bottom:16px}

/* ── 앱 레이아웃 ── */
#app{display:none;flex-direction:column;min-height:100dvh}

/* ── 탑바 ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:rgba(7,7,26,.88);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid rgba(124,58,237,.12);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:200;
  box-shadow:0 1px 0 rgba(124,58,237,.08),0 4px 24px rgba(0,0,0,.3)}
.topbar-logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#a78bfa,var(--br2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
#topbar-title{flex:1;font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.topbar-badge{background:var(--br);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;letter-spacing:.3px}

/* ── 사이드바 ── */
#sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--bg2) 0%,rgba(7,7,26,.95) 100%);
  border-right:1px solid rgba(124,58,237,.1);
  overflow-y:auto;z-index:150;
  transition:width .25s cubic-bezier(.4,0,.2,1),transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:4px 0 24px rgba(0,0,0,.3)}
#sidebar.collapsed{width:52px;overflow-x:hidden}
#sidebar.collapsed .ni span:last-child{display:none}
#sidebar.collapsed .ni{justify-content:center;padding:9px 0}
#sidebar.collapsed .ns-label{display:none}
#sidebar.collapsed .ns-arrow{display:none}
#sidebar.collapsed #sidebar-profile{display:none}
#sidebar.collapsed #sidebar-clock{display:none}
#sidebar.collapsed .sidebar-bottom{display:none}
#content{transition:margin-left .25s cubic-bezier(.4,0,.2,1)}
#sidebar::-webkit-scrollbar{display:none}
.sidebar-profile{padding:16px 14px 10px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.sidebar-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--br),var(--br2));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;margin-bottom:8px}
.ns-label{font-size:9px;font-weight:800;color:var(--t3);letter-spacing:1.2px;padding:12px 16px 5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:color .2s;border-radius:8px;margin:0 4px}
.ns-label:hover{color:var(--t2);background:rgba(255,255,255,.03)}
.ns-label .ns-arrow{font-size:9px;transition:transform .25s cubic-bezier(.4,0,.2,1);opacity:.5}
.ns-label.collapsed .ns-arrow{transform:rotate(-90deg)}
.ns-group{overflow:hidden;transition:max-height .25s cubic-bezier(.4,0,.2,1),opacity .2s}
.ns-group.collapsed{max-height:0!important;opacity:0}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:10px;margin:1px 8px;transition:all .18s cubic-bezier(.4,0,.2,1);position:relative;letter-spacing:-.1px}
.ni:hover{background:var(--surface2);color:var(--tx);transform:translateX(2px)}
.ni.active{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(8,145,178,.1));color:var(--tx);box-shadow:inset 0 0 0 1px rgba(124,58,237,.25),0 2px 12px rgba(124,58,237,.15)}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:65%;background:linear-gradient(180deg,var(--br-ll),var(--br2));border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--br-glow)}
.ni-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;transition:transform .18s}
.ni:hover .ni-icon{transform:scale(1.1)}
.ni.active .ni-icon{filter:drop-shadow(0 0 4px var(--br-glow))}
.ni-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}

/* ── 메인 콘텐츠 ── */
#content-wrap{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);overflow-x:hidden;min-width:0;width:calc(100% - var(--sidebar-w));transition:margin-left .25s cubic-bezier(.4,0,.2,1),width .25s cubic-bezier(.4,0,.2,1)}
#content{padding:16px;min-height:calc(100dvh - var(--topbar-h));box-sizing:border-box;padding-top:calc(var(--topbar-h) + 16px);overflow-x:hidden;margin-left:var(--sidebar-w);width:calc(100% - var(--sidebar-w))}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%);position:fixed;z-index:200;box-shadow:none}
  #sidebar.open{transform:translateX(0);box-shadow:4px 0 32px rgba(0,0,0,.5)}
  #content-wrap{margin-left:0!important;width:100%!important}
  #content{margin-left:0!important;width:100%!important;padding:12px!important}
  #app.logged-in{display:block!important}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
  .pos-wrap{grid-template-columns:1fr!important;grid-template-rows:auto 1fr!important;height:auto!important;overflow:visible!important}
  .cart-panel{max-height:50dvh!important;overflow-y:auto!important}
  .menu-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))!important}
  .cat-scroll{display:flex!important;overflow-x:auto!important;gap:6px!important;padding-bottom:6px!important;flex-wrap:nowrap!important}
  .modal-inner{max-height:90dvh!important;overflow-y:auto!important}
  .section-header{flex-wrap:wrap!important;gap:8px!important}
  table{font-size:11px!important}
  .pay-card{flex-direction:column!important}
}

/* ── 카드 컴포넌트 ── */
.card{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;transition:border-color .2s,box-shadow .2s,transform .2s}
.card:hover{border-color:var(--bd2)}
.card-glass{background:rgba(22,22,42,.6);backdrop-filter:blur(12px);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:18px}
.card-brand{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(8,145,178,.06));border:1px solid rgba(124,58,237,.2);border-radius:var(--r-lg);padding:18px}

/* ── 버튼 ── */
.btn{padding:10px 18px;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-sm{padding:7px 12px;font-size:11px;border-radius:8px}
.btn-ghost{background:var(--surface2);color:var(--t2);border:1px solid var(--bd2)}
.btn-ghost:hover{background:var(--surface3);color:var(--tx)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}

/* ── 배지 ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.3px}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.badge-purple{background:var(--purple-bg,rgba(167,139,250,.1));color:var(--purple);border:1px solid var(--purple-bd,rgba(167,139,250,.2))}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}

/* ── 통계 카드 ── */
.stat-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:18px;position:relative;overflow:hidden;transition:.2s}
.stat-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none}

/* ── KPI 카드 ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:16px 14px;position:relative;overflow:hidden;transition:all .25s cubic-bezier(.4,0,.2,1)}
.kpi-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.025),transparent);pointer-events:none}
.kpi-card:hover{transform:translateY(-3px);box-shadow:var(--shadow),0 0 0 1px rgba(124,58,237,.12)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r-lg) var(--r-lg) 0 0;z-index:0}
.kpi-card.kpi-revenue{border-color:rgba(124,58,237,.18)}.kpi-card.kpi-revenue::before{background:linear-gradient(90deg,#7c3aed,#c084fc)}
.kpi-card.kpi-cost{border-color:rgba(239,68,68,.18)}.kpi-card.kpi-cost::before{background:linear-gradient(90deg,#ef4444,#f97316)}
.kpi-card.kpi-profit{border-color:rgba(34,197,94,.18)}.kpi-card.kpi-profit::before{background:linear-gradient(90deg,#22c55e,#10b981)}
.kpi-card.kpi-margin{border-color:rgba(245,158,11,.18)}.kpi-card.kpi-margin::before{background:linear-gradient(90deg,#f59e0b,#eab308)}
.kpi-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.kpi-val{font-size:24px;font-weight:900;letter-spacing:-.8px;margin:10px 0 4px;line-height:1}
.kpi-delta{font-size:11px;font-weight:700}.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}

/* ── 히어로 / 대시보드 ── */
.dash-hero{background:linear-gradient(135deg,#0a0720 0%,#120e30 40%,#0c1628 100%);
  border:1px solid rgba(124,58,237,.15);border-radius:var(--r-xl);padding:28px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.dash-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(124,58,237,.2) 0%,transparent 70%);pointer-events:none}
.dash-hero::after{content:'';position:absolute;bottom:-60px;left:10%;width:220px;height:220px;background:radial-gradient(circle,rgba(8,145,178,.12) 0%,transparent 70%);pointer-events:none}

/* ── 차트 ── */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:5px}
.chart-bar{flex:1;border-radius:4px 4px 0 0;min-width:0;transition:height .7s cubic-bezier(.34,1.56,.64,1);position:relative;cursor:pointer}
.chart-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--bd2);border-radius:8px;padding:5px 10px;font-size:10px;white-space:nowrap;color:var(--tx);z-index:10;box-shadow:var(--shadow)}

/* ── 테이블 / 리스트 ── */
.pay-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;transition:.2s}
.pay-card:hover{border-color:var(--bd2);background:var(--surface2)}
.pay-amount{font-size:18px;font-weight:900;color:var(--green);letter-spacing:-.5px}
.menu-cost-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:12px 14px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--bd);margin-bottom:6px;transition:.15s}
.menu-cost-row:hover{border-color:rgba(124,58,237,.25);background:var(--surface3)}

/* ── 마진 배지 ── */
.margin-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.3px}
.margin-badge.high{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.margin-badge.mid{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.margin-badge.low{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

/* ── QR ── */
.qr-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-xl);padding:24px;text-align:center}
.qr-wrap{width:200px;height:200px;margin:16px auto;background:#fff;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;padding:8px}

/* ── POS ── */
.pos-wrap{display:grid;grid-template-columns:1fr 340px;gap:14px;height:calc(100dvh - var(--topbar-h) - 40px);overflow:hidden}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;overflow-y:auto;padding:2px;align-content:start}
.menu-item{background:var(--surface2);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s cubic-bezier(.34,1.3,.64,1);user-select:none;position:relative;overflow:hidden}
.menu-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,.06),transparent);opacity:0;transition:opacity .2s}
.menu-item:hover{border-color:rgba(124,58,237,.35);background:var(--surface3);transform:translateY(-3px) scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.35),0 0 0 1px rgba(124,58,237,.15)}
.menu-item:hover::before{opacity:1}
.menu-item:active{transform:translateY(0) scale(.97);transition-duration:.1s}
.cart-panel{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow)}

/* ── 직원/회원 카드 ── */
.member-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:.2s;position:relative;z-index:1}
.member-card:hover{border-color:var(--bd2);background:var(--surface2)}
.avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--br),var(--br2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}

/* ── 재고 ── */
.stock-form{max-width:600px;margin:0 auto}
.stock-item{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;transition:.2s}
.stock-item:hover{border-color:var(--bd2)}

/* ── 인사이트 카드 ── */

<script>

/* ══════════════════════════════════════════
   🍽 레시피 관리 페이지
   재료 + 사용량 + 단위 등록
   입고단가 자동 환산으로 원가 계산
   ══════════════════════════════════════════ */
function _filoPageRecipe(el){
 var did=_CU.dealerId||_CU.uid;
 el.innerHTML='<div class="slide-up" style="max-width:860px;margin:0 auto">'+
 '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
 '<div><div style="font-size:17px;font-weight:900">🍽 레시피 관리</div>'+
 '<div style="font-size:11px;color:var(--t3);margin-top:2px">메뉴별 재료·사용량 등록 → AI 원가 자동계산</div></div>'+
 '<button onclick="_filoRecipeAdd(\''+did+'\')" style="padding:8px 14px;background:var(--br);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">+ 레시피 추가</button>'+
 '</div>'+
 '<div id="recipe-list">'+
 '<div style="text-align:center;padding:30px;color:var(--t3)">⏳ 로딩 중...</div>'+
 '</div></div>';
 _filoLoadRecipes(did);
}

function _filoLoadRecipes(did){
 Promise.all([
  _db.collection('menu_recipes').where('dealerId','==',did).get(),
  _db.collection('inventory').where('dealerId','==',did).get(),
  _db.collection('inventory_in').where('dealerId','==',did).orderBy('createdAt','desc').get(),
  _db.collection('menu_costs').where('dealerId','==',did).get()
 ]).then(function(res){
  /* 최신 입고단가 맵 */
  var unitPriceMap={};   /* itemId → 단위당 단가(g/ml/개) */
  var unitTypeMap={};    /* itemId → baseUnit */
  res[1].forEach(function(doc){
   var d=doc.data();
   unitTypeMap[doc.id]=d.baseUnit||'개';
  });
  res[2].forEach(function(doc){
   var d=doc.data();
   if(!d.price||d.price<=0||unitPriceMap[d.itemId])return;
   /* 입고단위 → 기본단위 환산 */
   var inUnit=d.inUnit||unitTypeMap[d.itemId]||'개';
   var unitPrice=d.price;
   if(inUnit==='kg')unitPrice=d.price/1000;       /* g당 */
   else if(inUnit==='L')unitPrice=d.price/1000;    /* ml당 */
   else if(inUnit==='g'||inUnit==='ml'||inUnit==='개')unitPrice=d.price;
   unitPriceMap[d.itemId]={perUnit:unitPrice,inUnit:inUnit,totalPrice:d.price,qty:d.qty};
  });

  /* 메뉴별 레시피 그룹핑 */
  var recipeMap={};
  res[0].forEach(function(doc){
   var d=doc.data();
   if(!recipeMap[d.menuName])recipeMap[d.menuName]=[];
   recipeMap[d.menuName].push(Object.assign({_id:doc.id},d));
  });

  /* 판매가 맵 */
  var priceMap={};
  res[3].forEach(function(doc){var d=doc.data();priceMap[d.name]=d.price||0;});

  var list=document.getElementById('recipe-list');
  if(!list)return;
  var menuNames=Object.keys(recipeMap);
  if(!menuNames.length){
   list.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--t3)">'+
   '<div style="font-size:32px;margin-bottom:8px">🍽</div>'+
   '<div>등록된 레시피가 없습니다</div>'+
   '<div style="font-size:11px;margin-top:6px">+ 레시피 추가 버튼을 눌러 시작하세요</div></div>';
   return;
  }

  list.innerHTML=menuNames.map(function(menuName){
   var ings=recipeMap[menuName];
   var totalCost=0;
   var breakdown=ings.map(function(ing){
    var up=unitPriceMap[ing.itemId]||{perUnit:0};
    var cost=Math.round(up.perUnit*ing.amount);
    totalCost+=cost;
    return {name:ing.itemName,amount:ing.amount,unit:ing.unit,perUnit:up.perUnit,cost:cost};
   });
   var salePrice=priceMap[menuName]||0;
   var margin=salePrice>0?Math.round((salePrice-totalCost)/salePrice*100):0;
   var badge=margin>=60?'high':margin>=40?'mid':'low';
   return '<div class="card" style="margin-bottom:10px">'+
   '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'+
   '<div>'+
   '<div style="font-size:14px;font-weight:900">'+esc(menuName)+'</div>'+
   '<div style="font-size:11px;color:var(--t3);margin-top:2px">재료 '+ings.length+'종</div>'+
   '</div>'+
   '<div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+
   '<div style="font-size:16px;font-weight:900;color:#ef4444">원가 ₩'+totalCost.toLocaleString()+'</div>'+
   (salePrice>0?'<div style="font-size:11px;color:var(--t2)">판매가 ₩'+salePrice.toLocaleString()+' <span class="margin-badge '+badge+'">'+margin+'%</span></div>':
   '<button onclick="_filoSetMenuPriceRecipe(\''+did+'\',\''+menuName+'\','+totalCost+')" style="font-size:10px;padding:3px 10px;background:var(--br);border:none;border-radius:6px;color:#fff;cursor:pointer">판매가 설정</button>')+
   '</div></div>'+
   /* 재료 테이블 */
   '<div style="background:var(--b3);border-radius:10px;padding:10px 12px">'+
   '<div style="display:grid;grid-template-columns:1fr 80px 60px 70px;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--bd);margin-bottom:6px">'+
   ['재료명','사용량','단위','원가'].map(function(h){return '<div style="font-size:9px;color:var(--t3);font-weight:700">'+h+'</div>';}).join('')+
   breakdown.map(function(b){
    return '<div style="font-size:12px">'+esc(b.name)+'</div>'+
    '<div style="font-size:12px;color:var(--t2)">'+b.amount+'</div>'+
    '<div style="font-size:12px;color:var(--t3)">'+b.unit+'</div>'+
    '<div style="font-size:12px;font-weight:700;color:#ef4444">₩'+b.cost+'</div>';
   }).join('')+
   '</div>'+
   (ings[0]&&unitPriceMap[ings[0].itemId]?'':'<div style="font-size:10px;color:#f59e0b">⚠️ 일부 재료 입고단가 없음 → 입고 등록 필요</div>')+
   '</div>'+
   '<div style="display:flex;gap:6px;margin-top:8px">'+
   '<button onclick="_filoRecipeEdit(\''+did+'\',\''+menuName+'\')" style="flex:1;padding:7px;background:var(--b3);border:1px solid var(--bd);border-radius:8px;color:var(--t2);font-size:11px;cursor:pointer">✏️ 수정</button>'+
   '<button onclick="_filoRecipeDelete(\''+did+'\',\''+menuName+'\')" style="padding:7px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:#ef4444;font-size:11px;cursor:pointer">삭제</button>'+
   '</div></div>';
  }).join('');
 });
}

function _filoRecipeAdd(did){
 _filoRecipeModal(did,'','',null);
}

function _filoRecipeEdit(did,menuName){
 _db.collection('menu_recipes').where('dealerId','==',did).where('menuName','==',menuName).get().then(function(snap){
  var ings=[];snap.forEach(function(doc){ings.push(Object.assign({_id:doc.id},doc.data()));});
  _filoRecipeModal(did,menuName,'',ings);
 });
}

function _filoRecipeModal(did,menuName,salePrice,existingIngs){
 _db.collection('inventory').where('dealerId','==',did).get().then(function(invSnap){
  var invItems=[];
  invSnap.forEach(function(doc){
   invItems.push({id:doc.id,name:doc.data().name||doc.id,baseUnit:doc.data().baseUnit||'개'});
  });
  _rmInvItems=invItems;

  /* ── DOM으로 모달 생성 ── */
  var mo=document.createElement('div');
  mo.className='mo';
  var box=document.createElement('div');
  box.style.cssText='padding:22px;width:100%;max-width:520px;overflow-y:auto;max-height:85vh';

  /* 타이틀 */
  var title=document.createElement('div');
  title.style.cssText='font-size:16px;font-weight:900;margin-bottom:16px';
  title.textContent=menuName?'✏️ 레시피 수정':'🍽 레시피 추가';
  box.appendChild(title);

  /* 메뉴명 + 판매가 그리드 */
  var grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px';

  /* 메뉴명 */
  var g1=document.createElement('div');
  var l1=document.createElement('label');
  l1.style.cssText='font-size:10px;color:var(--t3);font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px';
  l1.textContent='메뉴명 *';
  var inp1=document.createElement('input');
  inp1.id='rm-name';inp1.type='text';inp1.placeholder='아이스 아메리카노';
  inp1.style.cssText='width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:13px;outline:none';
  inp1.value=menuName||'';
  if(menuName){inp1.readOnly=true;inp1.style.opacity='.6';}
  g1.appendChild(l1);g1.appendChild(inp1);

  /* 판매가 */
  var g2=document.createElement('div');
  var l2=document.createElement('label');
  l2.style.cssText=l1.style.cssText;
  l2.textContent='판매가(원)';
  var inp2=document.createElement('input');
  inp2.id='rm-price';inp2.type='number';inp2.placeholder='4500';
  inp2.style.cssText=inp1.style.cssText;
  inp2.value=salePrice||'';
  g2.appendChild(l2);g2.appendChild(inp2);

  grid.appendChild(g1);grid.appendChild(g2);
  box.appendChild(grid);

  /* 재료 목록 라벨 */
  var ingLabel=document.createElement('div');
  ingLabel.style.cssText='font-size:11px;font-weight:800;color:var(--t2);margin-bottom:8px';
  ingLabel.textContent='재료 목록';
  box.appendChild(ingLabel);

  /* 재료 행 컨테이너 */
  var ingsWrap=document.createElement('div');
  ingsWrap.id='rm-ings';
  box.appendChild(ingsWrap);

  /* 기존 재료 행 복원 */
  (existingIngs||[]).forEach(function(ing){
   _filoRmAddRowDOM(ingsWrap,invItems,ing.itemId,ing.amount,ing.unit);
  });

  /* 재료 추가 버튼 */
  var addBtn=document.createElement('button');
  addBtn.style.cssText='width:100%;padding:8px;background:var(--surface2);border:1px dashed var(--bd2);border-radius:var(--r);color:var(--t2);font-size:12px;cursor:pointer;margin-bottom:14px';
  addBtn.textContent='+ 재료 추가';
  addBtn.onclick=function(){_filoRmAddRowDOM(ingsWrap,invItems,'','','g');};
  box.appendChild(addBtn);

  /* 버튼 행 */
  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px';
  var cancelBtn=document.createElement('button');
  cancelBtn.style.cssText='flex:1;padding:11px;background:var(--surface2);border:none;border-radius:var(--r);color:var(--t2);font-size:13px;cursor:pointer';
  cancelBtn.textContent='취소';
  cancelBtn.onclick=function(){mo.remove();};
  var saveBtn=document.createElement('button');
  saveBtn.style.cssText='flex:2;padding:11px;background:var(--br);border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:700;cursor:pointer';
  saveBtn.textContent='💾 저장';
  saveBtn.onclick=function(){_filoRecipeSave(did,menuName);};
  btnRow.appendChild(cancelBtn);btnRow.appendChild(saveBtn);
  box.appendChild(btnRow);

  mo.appendChild(box);
  mo.onclick=function(e){if(e.target===mo)mo.remove();};
  document.body.appendChild(mo);

  /* 기존 재료 없으면 빈 행 1개 추가 */
  if(!(existingIngs&&existingIngs.length)){
   _filoRmAddRowDOM(ingsWrap,invItems,'','','g');
  }
 });
}

var _rmInvItems=[];
var _rmInvOpts=''; /* 호환용 */

function _filoRmAddRowDOM(wrap,invItems,selId,amount,unit){
 if(!wrap)wrap=document.getElementById('rm-ings');
 if(!wrap)return;
 var units=['g','ml','개','스푼','봉','컵','장'];

 var row=document.createElement('div');

function _filoRecipeSave(did,oldMenuName){
 var menuName=(document.getElementById('rm-name').value||'').trim();
 var price=parseInt(document.getElementById('rm-price').value)||0;
 if(!menuName){_filoToast('메뉴명을 입력하세요');return;}
 var rows=document.querySelectorAll('#rm-ings .rm-row');
 var ings=[];
 rows.forEach(function(row){
  var sel=row.querySelector('.rm-item');
  var amt=parseFloat(row.querySelector('.rm-amount').value)||0;
  var unit=row.querySelector('.rm-unit').value;
  if(sel&&sel.value&&amt>0){
   var opt=sel.options[sel.selectedIndex];
   ings.push({itemId:sel.value,itemName:opt.textContent.trim(),amount:amt,unit:unit});
  }
 });
 if(!ings.length){_filoToast('재료를 1개 이상 추가하세요');return;}
 var targetMenu=oldMenuName||menuName;
 /* 기존 삭제 후 재등록 */
 _db.collection('menu_recipes').where('dealerId','==',did).where('menuName','==',targetMenu).get().then(function(snap){
  return Promise.all(snap.docs.map(function(d){return d.ref.delete();}));
 }).then(function(){
  return Promise.all(ings.map(function(ing){
   return _db.collection('menu_recipes').add(Object.assign({dealerId:did,menuName:menuName},ing));
  }));
 }).then(function(){
  /* menu_costs 동기화 */
  return _db.collection('menu_costs').where('dealerId','==',did).where('name','==',menuName).get().then(function(snap){
   if(snap.empty)return _db.collection('menu_costs').add({dealerId:did,name:menuName,price:price,cost:0,createdAt:new Date().toISOString()});
   return snap.docs[0].ref.update({price:price,updatedAt:new Date().toISOString()});
  });
 }).then(function(){
  document.querySelector('.mo')&&document.querySelector('.mo').remove();
  _filoToast('✅ 레시피 저장 완료');
  _filoPageRecipe(document.getElementById('content'));
 }).catch(function(e){_filoToast('❌ '+e.message);});
}

function _toggleNavGroup(gi,el){

 var group=document.getElementById('nav-g-'+gi);

 if(!group)return;

 var closing=!el.classList.contains('collapsed');

 el.classList.toggle('collapsed',closing);

 var arrow=el.querySelector('.ns-arrow');

 if(arrow)arrow.textContent=closing?'▸':'▾';

 if(closing){

  group.style.maxHeight=group.scrollHeight+'px';

  group.offsetHeight;

  group.style.transition='max-height .25s ease';

  group.style.maxHeight='0';

  group.style.overflow='hidden';

 } else {

  group.style.overflow='';

  group.style.transition='max-height .25s ease';

  group.style.maxHeight=group.scrollHeight+'px';

  setTimeout(function(){group.style.maxHeight='none';},300);

 }

 var saved=JSON.parse(localStorage.getItem('filo_nav_closed')||'[]');

 if(closing&&saved.indexOf(gi)<0)saved.push(gi);

 else saved=saved.filter(function(x){return x!==gi;});

 localStorage.setItem('filo_nav_closed',JSON.stringify(saved));

}

/* 프리미엄 숫자 카운팅 */
function _countUp(el, target, duration, prefix, suffix){
 prefix=prefix||''; suffix=suffix||'';
 var start=0, startTime=null;
 var step=function(timestamp){
 if(!startTime) startTime=timestamp;
 var progress=Math.min((timestamp-startTime)/duration,1);
 var ease=1-Math.pow(1-progress,3);
 var current=Math.floor(ease*target);
 el.textContent=prefix+(current>=10000?current.toLocaleString():current)+suffix;
 if(progress<1) requestAnimationFrame(step);
 else el.textContent=prefix+target.toLocaleString()+suffix;
 };
 requestAnimationFrame(step);
}

function _filoRenderSalesCharts(did,from,to){
 _db.collection('filo_sales').where('dealerId','==',did).where('date','>=',from).where('date','<=',to).get()
 .then(function(snap){
  var total=0,cnt=0,items={},hours={},days={},dates={},methods={};
  snap.forEach(function(doc){
   var d=doc.data();
   if(d.status==='cancelled')return;
   var amt=d.total||0;
   total+=amt;cnt++;
   var dt=new Date(d.createdAt||d.date+'T12:00:00');
   var h=dt.getHours();
   hours[h]=(hours[h]||0)+amt;
   var day=['일','월','화','수','목','금','토'][dt.getDay()];
   days[day]=(days[day]||0)+amt;
   var dt2=d.date||'';
   dates[dt2]=(dates[dt2]||0)+amt;
   var pm=d.payMethod||'기타';
   methods[pm]=(methods[pm]||0)+amt;
   (d.items||[]).forEach(function(it){items[it.name]=(items[it.name]||0)+(it.qty||1);});
  });

  /* KPI 업데이트 (카운팅 애니메이션) */
  _filoCountUp('kpi-rev','₩',total,1200);
  _filoCountUp('kpi-cnt','',cnt,800,function(v){return v+'건';});
  _filoCountUp('kpi-avg','₩',cnt?Math.round(total/cnt):0,1000);
  var peakH=Object.entries(hours).sort(function(a,b){return b[1]-a[1];})[0];
  var peakEl=document.getElementById('kpi-peak');
  if(peakEl&&peakH)peakEl.textContent=peakH[0]+'시';
  var subMap={'kpi-rev-sub':from+(from!==to?' ~ '+to:''),'kpi-cnt-sub':'평균 '+((cnt/(new Date(to)-new Date(from)+86400000)*86400000)||0).toFixed(1)+'건/일','kpi-avg-sub':'가장 높은 단가','kpi-peak-sub':'가장 바쁜 시간'};
  Object.keys(subMap).forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=subMap[id];});

  /* 히어로 서브 */
  var hs=document.getElementById('sales-hero-sub');
  if(hs)hs.textContent=from+(from!==to?' ~ '+to:'')+'  ·  '+cnt+'건  ·  ₩'+total.toLocaleString();

  /* 시간대 바차트 */
  _filoDrawBarChart('chart-hour',
   Array.from({length:14},function(_,i){return (8+i)+'시';}),
   Array.from({length:14},function(_,i){return hours[8+i]||0;}),
   '#7c3aed','rgba(124,58,237,.15)'
  );

  /* 요일 바차트 */
  var dayOrder=['월','화','수','목','금','토','일'];
  _filoDrawBarChart('chart-day',dayOrder,dayOrder.map(function(d){return days[d]||0;}),
   '#0891b2','rgba(8,145,178,.15)'
  );

  /* 추이 라인차트 */
  var dateKeys=Object.keys(dates).sort();
  _filoDrawLineChart('chart-trend',dateKeys.map(function(d){return d.slice(5);}),dateKeys.map(function(d){return dates[d];}));

  /* 결제수단 카드 */
  var payEl=document.getElementById('pay-method-list');
  if(payEl){
   var payColors={'카드':'#60a5fa','현금':'#22c55e','카카오페이':'#f59e0b','네이버페이':'#10b981','카운터결제':'#a78bfa','기타':'#9898c0'};
   var payIcons={'카드':'💳','현금':'💵','카카오페이':'🟡','네이버페이':'🟢','카운터결제':'🏪','기타':'💰'};
   var sorted=Object.entries(methods).sort(function(a,b){return b[1]-a[1];});
   payEl.innerHTML='';
   sorted.forEach(function(m){
    var pct=total>0?Math.round(m[1]/total*100):0;
    var col=payColors[m[0]]||'#9898c0';
    var ic=payIcons[m[0]]||'💰';
    var row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)';
    row.innerHTML='<span style="font-size:16px">'+ic+'</span>'+
     '<div style="flex:1">'+
     '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
     '<span style="font-size:12px;font-weight:700">'+m[0]+'</span>'+
     '<span style="font-size:13px;font-weight:900;color:'+col+'">₩'+m[1].toLocaleString()+'</span>'+
     '</div>'+
     '<div style="height:4px;background:var(--surface3);border-radius:2px;overflow:hidden">'+
     '<div class="anim-bar" data-w="'+pct+'" style="height:100%;width:0%;background:'+col+';border-radius:2px;transition:width .8s cubic-bezier(.34,1.56,.64,1)"></div>'+
     '</div>'+
     '<span style="font-size:10px;color:var(--t3)">'+pct+'% 비중</span>'+
     '</div>';
    payEl.appendChild(row);
   });
   setTimeout(function(){document.querySelectorAll('.anim-bar').forEach(function(b){b.style.width=b.dataset.w+'%';});},100);
  }

  /* 인기메뉴 */
  var menuEl=document.getElementById('top-menu-list');
  if(menuEl){
   var topMenus=Object.entries(items).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
   var ranks=['🥇','🥈','🥉','4️⃣','5️⃣'];
   menuEl.innerHTML=topMenus.length?topMenus.map(function(m,i){
    var pct=cnt>0?Math.round(m[1]/cnt*100):0;
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)">'+
     '<span style="font-size:16px">'+ranks[i]+'</span>'+
     '<div style="flex:1">'+
     '<div style="display:flex;justify-content:space-between">'+
     '<span style="font-size:12px;font-weight:700">'+m[0]+'</span>'+
     '<span style="font-size:12px;font-weight:900;color:#22c55e">'+m[1]+'개</span>'+
     '</div>'+
     '<div style="height:3px;background:var(--surface3);border-radius:2px;margin-top:4px;overflow:hidden">'+
     '<div class="anim-bar2" data-w="'+pct+'" style="height:100%;width:0%;background:linear-gradient(90deg,var(--br),#22c55e);border-radius:2px;transition:width .8s ease '+(i*.15)+'s"></div>'+
     '</div></div></div>';
   }).join(''):'<div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">판매 데이터 없음</div>';
   setTimeout(function(){document.querySelectorAll('.anim-bar2').forEach(function(b){b.style.width=b.dataset.w+'%';});},200);
  }

 }).catch(function(e){
  var hs=document.getElementById('sales-hero-sub');
  if(hs)hs.textContent='오류: '+e.message;
 });
}

function _filoCountUp(id,prefix,target,dur,fmt){
 var el=document.getElementById(id);if(!el)return;
 var start=0,step=dur/60,inc=target/60;
 var t=setInterval(function(){
  start+=inc;
  if(start>=target){start=target;clearInterval(t);}
  var v=Math.round(start);
  el.textContent=fmt?fmt(v):(prefix+''+v.toLocaleString());
 },step);
}

function _filoDrawBarChart(id,labels,data,color,bgColor){
 var canvas=document.getElementById(id);if(!canvas||!window.Chart)return;
 if(canvas._chart)canvas._chart.destroy();
 var max=Math.max.apply(null,data)||1;
 canvas._chart=new Chart(canvas,{
  type:'bar',
  data:{labels:labels,datasets:[{label:'매출',data:data,
   backgroundColor:data.map(function(v){return v===max?color:bgColor;}),
   borderColor:data.map(function(v){return v===max?color:'transparent';}),
   borderWidth:1,borderRadius:6,borderSkipped:false}]},
  options:{responsive:true,maintainAspectRatio:false,
   animation:{duration:900,easing:'easeOutQuart'},
   plugins:{legend:{display:false},
    tooltip:{callbacks:{label:function(ctx){return '₩'+ctx.raw.toLocaleString();}},
     backgroundColor:'rgba(14,14,30,.95)',titleColor:'#a78bfa',bodyColor:'#f0f0ff',
     borderColor:'rgba(124,58,237,.3)',borderWidth:1,padding:10,cornerRadius:10}},
   scales:{
    x:{grid:{display:false},ticks:{color:'#9898c0',font:{size:10},maxRotation:0}},
    y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#9898c0',font:{size:10},
     callback:function(v){return v>=10000?(v/10000).toFixed(0)+'만':(v>=1000?(v/1000).toFixed(0)+'k':v);}}}
   }}
 });
}

function _filoGenerateAIInsight(did){
 var el=document.getElementById('ai-insight-content');if(!el)return;
 var today=new Date().toISOString().slice(0,10);
 var from=today.slice(0,7)+'-01';
 Promise.all([
  _db.collection('filo_sales').where('dealerId','==',did).where('date','>=',from).where('date','<=',today).get(),
  _db.collection('filo_menus').where('dealerId','==',did).get()
 ]).then(function(results){
  var salesSnap=results[0],menuSnap=results[1];
  var total=0,cnt=0,items={},hours={};
  salesSnap.forEach(function(doc){
   var d=doc.data();if(d.status==='cancelled')return;
   total+=d.total||0;cnt++;
   var h=new Date(d.createdAt||d.date+'T12:00:00').getHours();
   hours[h]=(hours[h]||0)+(d.total||0);
   (d.items||[]).forEach(function(it){items[it.name]=(items[it.name]||0)+(it.qty||1);});
  });
  var peakH=Object.entries(hours).sort(function(a,b){return b[1]-a[1];})[0];
  var topItem=Object.entries(items).sort(function(a,b){return b[1]-a[1];})[0];
  var avgOrder=cnt?Math.round(total/cnt):0;
  var insights=[
   peakH?'⏰ <strong>'+peakH[0]+'시</strong>가 가장 바쁜 시간대입니다. 이 시간 직원 배치를 늘려보세요.':'',
   topItem?'🏆 이번달 최고 인기 메뉴는 <strong>'+topItem[0]+'</strong> ('+topItem[1]+'개)입니다.':'',
   avgOrder?'💰 평균 객단가는 <strong>₩'+avgOrder.toLocaleString()+'</strong>입니다. '+
    (avgOrder<5000?'사이드 메뉴 추천으로 객단가를 올려보세요.':'객단가가 양호합니다.'):'',
   cnt?'📊 이번달 총 <strong>'+cnt+'건</strong> 주문 · 총 매출 <strong>₩'+total.toLocaleString()+'</strong>':'',
  ].filter(Boolean);
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'+
   insights.map(function(ins){
    return '<div style="padding:12px 14px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.15);border-radius:12px;font-size:13px;line-height:1.7;color:var(--t2)">'+ins+'</div>';
   }).join('')+
   '<div style="font-size:10px;color:var(--t3);margin-top:4px">* AI 분석은 이번달 데이터 기준입니다</div>'+
   '</div>';
 });
}

function _filoMarginLoad(){
 var did=(_cachedCompanyDoc||{}).dealerId||(_cachedCompanyDoc||{}).uid||'';
 if(!did)return;
 _marginDid=did;
 var ymEl=document.getElementById('mg-ym');
 var ym=ymEl?ymEl.value:new Date().toISOString().slice(0,7);

 /* 원가 맵 먼저 로드 후 실시간 리스너 시작 */
 _db.collection('menu_costs').where('dealerId','==',did).get().then(function(snap){
  _marginCostMap={};
  snap.forEach(function(doc){var d=doc.data();_marginCostMap[d.name||doc.id]=d;});
  _filoStartMarginLive(did,ym);
 });
}

function _filoStartMarginLive(did,ym){
 /* 기존 리스너 해제 */
 if(_marginUnsub){_marginUnsub();_marginUnsub=null;}
 var start=ym+'-01',end=ym+'-31';
 var today=new Date().toISOString().slice(0,10);

 /* filo_sales(POS) 실시간 onSnapshot */
 _marginUnsub=_db.collection('filo_sales')
  .where('dealerId','==',did)
  .where('date','>=',start)
  .where('date','<=',end)
  .onSnapshot(function(posSnap){
   /* 수동 매출도 같이 조회 */
   _db.collection('mbetco_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get()
   .then(function(manSnap){
    _filoCalcAndRender(posSnap,manSnap,today,ym,did);
   });
  },function(e){console.error('margin listener:',e);});
}

function _filoCalcAndRender(posSnap,manSnap,today,ym,did){
 var todayRev=0,todayCost=0,todayCnt=0;
 var monthRev=0,monthCost=0;

 /* 수동 매출 */
 manSnap.forEach(function(doc){
  var d=doc.data();
  monthRev+=(d.revenue||0);
  monthCost+=(d.cost||0);
  if(d.date===today)todayRev+=(d.revenue||0);
 });

 /* POS 실시간 매출 + 원가 + 메뉴통계 + 시간대 */
 var menuStats={};  /* 메뉴별 {qty,rev} */
 var hourStats={};  /* 시간대별 매출 */
 var payStats={};  /* 결제수단별 매출 */
 posSnap.forEach(function(doc){
  var d=doc.data();
  var posTotal=d.total||0;
  var pm=d.payMethod||d.method||'기타';
  payStats[pm]=(payStats[pm]||0)+posTotal;
  var posCost=0;
  (d.items||[]).forEach(function(it){
   var c=_marginCostMap[it.name]||{};
   posCost+=((c.cost||0)*(it.qty||1));
   /* 메뉴별 통계 */
   if(!menuStats[it.name])menuStats[it.name]={qty:0,rev:0};
   menuStats[it.name].qty+=(it.qty||1);
   menuStats[it.name].rev+=(it.price||0)*(it.qty||1);
  });
  monthRev+=posTotal;
  monthCost+=posCost;
  if(d.date===today){
   todayRev+=posTotal;
   todayCost+=posCost;
   todayCnt++;
   /* 시간대별 집계 */
   if(d.createdAt){
    var kstH=new Date(new Date(d.createdAt).getTime()+9*3600000).getUTCHours();
    hourStats[kstH]=(hourStats[kstH]||0)+posTotal;
   }
  }
 });

 var todayProfit=todayRev-todayCost;
 var todayMargin=todayRev>0?Math.round(todayProfit/todayRev*100):0;
 var monthProfit=monthRev-monthCost;
 var monthMargin=monthRev>0?Math.round(monthProfit/monthRev*100):0;

/* ── 7일 바 차트 ── */
function _filoRenderHeroChart(did){
 var days=[];
 for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
 Promise.all(days.map(function(dt){
  return _db.collection('mbetco_sales').where('dealerId','==',did).where('date','==',dt).get();
 })).then(function(snaps){
  var vals=snaps.map(function(s){var t=0;s.forEach(function(d){t+=d.data().revenue||0;});return t;});
  var maxV=Math.max.apply(null,vals)||1;
  var chart=document.getElementById('hero-chart');
  if(!chart)return;
  chart.innerHTML=vals.map(function(v,i){
   var pct=Math.round(v/maxV*100);
   var isToday=i===6;
   return '<div class="chart-bar" data-tip="'+days[i].slice(5)+' ₩'+(v/10000).toFixed(0)+'만" '+
   'style="height:'+Math.max(pct,4)+'%;background:'+(isToday?'linear-gradient(180deg,#a78bfa,#7c3aed)':'rgba(255,255,255,.12)')+';border-radius:4px 4px 0 0;flex:1;transition:height .8s cubic-bezier(.34,1.56,.64,1) '+(i*.05)+'s"></div>';
  }).join('');
 }).catch(function(){});
}

/* ── 마진 분석 탭 ── */
function _filoRenderMarginAnalysis(did,ym){
 var content=document.getElementById('mg-content');
 if(!content)return;
 content.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3)"><div style="font-size:28px;margin-bottom:8px">⏳</div>분석 중...</div>';
 var start=ym+'-01',end=ym+'-31';
 Promise.all([
  _db.collection('mbetco_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get(),
  _db.collection('filo_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get(),
  _db.collection('menu_costs').where('dealerId','==',did).get()
 ]).then(function(res){
  var manSnap=res[0],posSnap=res[1],costSnap=res[2];
  var costMap={};
  costSnap.forEach(function(doc){var d=doc.data();costMap[d.name||doc.id]=d;});

  /* 날짜별 집계 */
  var dayMap={};
  manSnap.forEach(function(doc){
   var d=doc.data();
   if(!dayMap[d.date])dayMap[d.date]={rev:0,cost:0,items:{}};
   dayMap[d.date].rev+=(d.revenue||0);
   dayMap[d.date].cost+=(d.cost||0);
   (d.menuItems||[]).forEach(function(it){
    if(!dayMap[d.date].items[it.name])dayMap[d.date].items[it.name]=0;
    dayMap[d.date].items[it.name]+=it.qty;
   });
  });
  posSnap.forEach(function(doc){
   var d=doc.data();
   if(!dayMap[d.date])dayMap[d.date]={rev:0,cost:0,items:{}};
   dayMap[d.date].rev+=(d.total||0);
   (d.items||[]).forEach(function(it){
    var c=costMap[it.name]||{};
    dayMap[d.date].cost+=((c.cost||0)*it.qty);
    if(!dayMap[d.date].items[it.name])dayMap[d.date].items[it.name]=0;
    dayMap[d.date].items[it.name]+=it.qty;
   });
  });

  /* 메뉴별 마진 집계 */
  var menuMap={};
  Object.values(dayMap).forEach(function(day){
   Object.keys(day.items).forEach(function(name){
    var c=costMap[name]||{};
    var qty=day.items[name];
    var price=c.price||0,cost=c.cost||0;
    if(!menuMap[name])menuMap[name]={name:name,qty:0,rev:0,cost:0,price:price,costPer:cost};
    menuMap[name].qty+=qty;
    menuMap[name].rev+=price*qty;
    menuMap[name].cost+=cost*qty;
   });
  });

  var days=Object.keys(dayMap).sort();
  var totalRev=days.reduce(function(s,d){return s+dayMap[d].rev;},0);
  var totalCost=days.reduce(function(s,d){return s+dayMap[d].cost;},0);
  var totalProfit=totalRev-totalCost;
  var marginRate=totalRev>0?Math.round(totalProfit/totalRev*100):0;

  var html='';

  /* 월별 일별 차트 */
  html+='<div class="card" style="margin-bottom:12px">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
  '<div style="font-size:13px;font-weight:800">📅 일별 매출 vs 순이익</div>'+
  '<div style="font-size:11px;color:var(--t3)">'+ym+'</div></div>'+
  '<div style="display:flex;align-items:flex-end;gap:3px;height:100px;overflow-x:auto">';
  if(days.length){
   var maxRev=Math.max.apply(null,days.map(function(d){return dayMap[d].rev;}))||1;
   html+=days.map(function(d){
    var rv=dayMap[d].rev,pr=Math.max(dayMap[d].rev-dayMap[d].cost,0);
    var rvH=Math.round(rv/maxRev*100),prH=Math.round(pr/maxRev*100);
    var dt=d.slice(8);
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:24px">'+
    '<div style="width:100%;position:relative;height:84px;display:flex;align-items:flex-end;gap:1px">'+
    '<div style="flex:1;height:'+rvH+'%;background:rgba(167,139,250,.3);border-radius:3px 3px 0 0;min-height:2px" title="매출 ₩'+rv.toLocaleString()+'"></div>'+
    '<div style="flex:1;height:'+prH+'%;background:linear-gradient(180deg,#22c55e,#10b981);border-radius:3px 3px 0 0;min-height:2px" title="순이익 ₩'+pr.toLocaleString()+'"></div>'+
    '</div>'+
    '<div style="font-size:9px;color:var(--t3)">'+dt+'</div></div>';
   }).join('');
  }else{html+='<div style="color:var(--t3);font-size:12px;padding:20px">매출 데이터 없음</div>';}
  html+='</div>'+
  '<div style="display:flex;gap:12px;margin-top:10px">'+
  '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:rgba(167,139,250,.4)"></div><span style="font-size:10px;color:var(--t3)">매출</span></div>'+
  '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:#22c55e"></div><span style="font-size:10px;color:var(--t3)">순이익</span></div>'+
  '</div></div>';

  /* 메뉴별 마진 테이블 */
  var menus=Object.values(menuMap).sort(function(a,b){
   var mA=a.rev>0?(a.rev-a.cost)/a.rev:0,mB=b.rev>0?(b.rev-b.cost)/b.rev:0;
   return mB-mA;
  });
  if(menus.length){
   html+='<div class="card" style="margin-bottom:12px">'+
   '<div style="font-size:13px;font-weight:800;margin-bottom:12px">🍽 메뉴별 마진 분석</div>'+
   '<div style="display:grid;grid-template-columns:1fr 60px 70px 60px;gap:6px;padding:0 4px 8px;border-bottom:1px solid var(--bd)">'+
   ['메뉴','판매수','순이익','마진율'].map(function(h){return '<div style="font-size:10px;color:var(--t3);font-weight:700">'+h+'</div>';}).join('')+'</div>'+
   menus.map(function(m){
    var profit=m.rev-m.cost;
    var rate=m.rev>0?Math.round(profit/m.rev*100):0;
    var badge=rate>=60?'high':rate>=40?'mid':'low';
    return '<div class="menu-cost-row">'+
    '<div style="font-size:12px;font-weight:700">'+esc(m.name)+'<div style="font-size:10px;color:var(--t3)">판매가 ₩'+m.price.toLocaleString()+' · 원가 ₩'+m.costPer.toLocaleString()+'</div></div>'+
    '<div style="font-size:12px;font-weight:800;text-align:right">'+m.qty+'개</div>'+
    '<div style="font-size:12px;font-weight:800;color:'+(profit>=0?'#22c55e':'#ef4444')+';text-align:right">₩'+profit.toLocaleString()+'</div>'+
    '<div style="text-align:right"><span class="margin-badge '+badge+'">'+rate+'%</span></div>'+
    '</div>';
   }).join('')+'</div>';
  }

  /* 인건비 vs 매출 비율 */
  html+='<div class="card">'+
  '<div style="font-size:13px;font-weight:800;margin-bottom:12px">📊 원가 구조 분석</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">'+
  [
   {label:'식재료 원가',val:'₩'+totalCost.toLocaleString(),sub:totalRev>0?Math.round(totalCost/totalRev*100)+'%':'—',c:'#f97316'},
   {label:'순이익',val:'₩'+Math.max(totalProfit,0).toLocaleString(),sub:marginRate+'%',c:'#22c55e'},
   {label:'손익분기',val:totalRev>0&&totalProfit<0?'미달':'달성',sub:totalProfit>=0?'✅':'⚠️',c:totalProfit>=0?'#22c55e':'#ef4444'}
  ].map(function(s){
   return '<div style="background:var(--b3);border-radius:12px;padding:14px 10px">'+
   '<div style="font-size:10px;color:var(--t3);margin-bottom:6px">'+s.label+'</div>'+
   '<div style="font-size:16px;font-weight:900;color:'+s.c+'">'+s.val+'</div>'+
   '<div style="font-size:11px;color:var(--t3);margin-top:4px">'+s.sub+'</div></div>';
  }).join('')+
  '</div></div>';

  content.innerHTML=html;
 }).catch(function(e){
  var c=document.getElementById('mg-content');
  if(c)c.innerHTML='<div style="color:var(--red);padding:20px">'+e.message+'</div>';
 });
}

function _filoSaveCost(did){
 var name=(document.getElementById('mc-name').value||'').trim();
 var price=parseInt(document.getElementById('mc-price').value)||0;
 var cost=parseInt(document.getElementById('mc-cost').value)||0;
 if(!name){_filoToast('메뉴명을 입력하세요');return;}
 _db.collection('menu_costs').add({dealerId:did,name:name,price:price,cost:cost,createdAt:new Date().toISOString()}).then(function(){
  _filoToast('✅ 원가 등록 완료');
  document.getElementById('mc-name').value='';
  document.getElementById('mc-price').value='';
  document.getElementById('mc-cost').value='';
  _filoRenderCostMgmt(did);
 }).catch(function(e){_filoToast('❌ '+e.message);});
}

function _filoDelCost(did,id){
 if(!confirm('삭제할까요?'))return;

  _filoToast('삭제 완료');_filoRenderCostMgmt(did);
 });
}

/* ── AI 인사이트 탭 ── */
function _filoRenderInsights(did,ym){
 var content=document.getElementById('mg-content');
 if(!content)return;
 var start=ym+'-01',end=ym+'-31';
 Promise.all([
  _db.collection('mbetco_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get(),
  _db.collection('filo_sales').where('dealerId','==',did).where('date','>=',start).where('date','<=',end).get(),
  _db.collection('menu_costs').where('dealerId','==',did).get()
 ]).then(function(res){
  var rev=0,cost=0,posRev=0;
  res[0].forEach(function(d){rev+=d.data().revenue||0;cost+=d.data().cost||0;});
  res[1].forEach(function(d){posRev+=d.data().total||0;});
  var costMap={};res[2].forEach(function(doc){var d=doc.data();costMap[d.name]=d;});
  var margin=rev>0?Math.round((rev-cost)/rev*100):0;
  var insights=[];
  if(margin<40)insights.push({icon:'🚨',title:'마진율 위험',desc:'현재 마진율 '+margin+'%는 일반적인 카페 권장 마진율(60% 이상)보다 낮습니다. 원가가 높은 메뉴를 점검하세요.',color:'rgba(239,68,68,.1)',border:'rgba(239,68,68,.3)'});
  else if(margin>=60)insights.push({icon:'✅',title:'마진율 우수',desc:'마진율 '+margin+'%로 양호한 수준입니다. 이 수익 구조를 유지하면서 매출 확대에 집중하세요.',color:'rgba(34,197,94,.08)',border:'rgba(34,197,94,.25)'});
  if(posRev>0&&rev===0)insights.push({icon:'💡',title:'매출 수동 입력 필요',desc:'POS 매출(₩'+posRev.toLocaleString()+')은 있지만 수동 매출 입력이 없습니다. 매출 입력 탭에서 정확한 데이터를 입력하면 마진 분석이 더 정확해집니다.',color:'rgba(245,158,11,.08)',border:'rgba(245,158,11,.25)'});
  if(Object.keys(costMap).length===0)insights.push({icon:'⚙️',title:'원가 등록 필요',desc:'메뉴 원가가 등록되지 않아 정확한 마진 계산이 불가능합니다. 원가 등록 탭에서 메뉴별 원가를 입력해 주세요.',color:'rgba(124,58,237,.08)',border:'rgba(124,58,237,.25)'});
  if(!insights.length)insights.push({icon:'🎯',title:'데이터 분석 완료',desc:'모든 지표가 정상 범위입니다. 매일 매출을 입력하면 더 정확한 인사이트를 제공합니다.',color:'rgba(34,197,94,.08)',border:'rgba(34,197,94,.25)'});
  content.innerHTML='<div style="max-width:700px">'+
  insights.map(function(ins){
   return '<div class="insight-card" style="background:'+ins.color+';border-color:'+ins.border+'">'+
   '<div class="insight-icon">'+ins.icon+'</div>'+
   '<div><div style="font-size:13px;font-weight:800;margin-bottom:4px">'+ins.title+'</div>'+
   '<div style="font-size:12px;color:var(--t2);line-height:1.6">'+ins.desc+'</div></div></div>';
  }).join('')+'</div>';
 });
}

function _filoPageExpiry(el){

function _filoReceiptSelected(input){
 var file=input.files&&input.files[0];

 if(label)label.textContent='📎 '+file.name.slice(0,20)+(file.name.length>20?'...':'');
 var preview=document.getElementById('si-receipt-preview');
 var img=document.getElementById('si-receipt-img');
 if(file.type.startsWith('image/')&&preview&&img){
  var reader=new FileReader();

function _filoDoStockIn(){
 var did=_CU.dealerId||_CU.uid;
 var itemId=document.getElementById('si-item').value;
 var qty=parseInt(document.getElementById('si-qty').value)||0;
 var price=parseInt(document.getElementById('si-price').value)||0;
 var expiry=document.getElementById('si-expiry').value||'';
 var supplier=document.getElementById('si-supplier').value.trim();
 var memo=document.getElementById('si-memo').value.trim();
 if(!itemId){_filoToast('품목을 선택하세요');return;}
 if(qty<=0){_filoToast('수량을 입력하세요');return;}
 var now=new Date();
 var inUnitEl=document.getElementById('si-inunit');
 var inUnit=inUnitEl?inUnitEl.value:'개';
 var unitPrice=price;
 if(inUnit==='kg')unitPrice=price/1000;
 else if(inUnit==='L')unitPrice=price/1000;
 var receiptInput=document.getElementById('si-receipt-input');
 var file=receiptInput&&receiptInput.files&&receiptInput.files[0];

 function _saveStockIn(receiptUrl){
  _db.collection('inventory_in').add({
   dealerId:did,itemId:itemId,qty:qty,price:unitPrice,totalPrice:price,inUnit:inUnit,
   expiry:expiry,supplier:supplier,memo:memo,
   receiptUrl:receiptUrl||'',hasReceipt:!!receiptUrl,
   createdAt:now.toISOString(),date:now.toISOString().slice(0,10),
   createdBy:_CU.name||_CU.userId||''
  }).then(function(){
   return _db.collection('inventory').doc(itemId).update({
    stock:firebase.firestore.FieldValue.increment(qty),
    updatedAt:now.toISOString()
   });
  }).then(function(){
   _filoToast('✅ 입고 완료 (+'+qty+'개)'+(receiptUrl?' 📎':''));
   document.getElementById('si-qty').value='';
   document.getElementById('si-price').value='';
   document.getElementById('si-memo').value='';
   if(receiptInput)receiptInput.value='';
   var lbl=document.getElementById('si-receipt-label');if(lbl)lbl.textContent='📎 파일 선택';
   var pv=document.getElementById('si-receipt-preview');if(pv)pv.style.display='none';
   _filoLoadStockHistory(did,'si-history','in');
  }).catch(function(e){_filoToast('❌ '+e.message);});
 }

 if(file){
  _filoToast('📎 업로드 중...');
  var reader=new FileReader();
  reader.onload=function(e){
   var base64=e.target.result.split(',')[1];
   var path='receipts/'+did+'/'+now.toISOString().slice(0,10)+'-'+Date.now()+'.'+file.name.split('.').pop();
   fetch('/storage-upload',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({storagePath:path,base64data:base64,contentType:file.type,idToken:(_auth&&_auth.currentUser)?_auth.currentUser.getIdToken():''})
   }).then(function(r){return r.json();}).then(function(d){_saveStockIn(d.url||'');}).catch(function(){_saveStockIn('');});
  };
  reader.readAsDataURL(file);
 } else {
  _saveStockIn('');
 }
}

function _filoLoadAttendDash(){
 var did=_CU.dealerId||_CU.uid;
 var dateEl=document.getElementById('ad-date');
 var date=dateEl?dateEl.value:new Date().toISOString().slice(0,10);
 if(_attendUnsub)_attendUnsub();
 _attendUnsub=_db.collection('attendance')
 .where('dealerId','==',did).where('date','==',date)
 .orderBy('time','asc')
 .onSnapshot(function(snap){
 var records=[];
 snap.forEach(function(doc){records.push(Object.assign({_id:doc.id},doc.data()));});
 var memberMap={};
 records.forEach(function(r){
 if(!memberMap[r.memberId])memberMap[r.memberId]={name:r.memberName||r.memberId,ins:[],outs:[],workMin:0};
 if(r.type==='in')memberMap[r.memberId].ins.push(r.time);
 else memberMap[r.memberId].outs.push(r.time);
 });
 Object.values(memberMap).forEach(function(m){
 m.ins.sort();m.outs.sort();
 var total=0;
 for(var i=0;i<Math.min(m.ins.length,m.outs.length);i++){
 total+=(new Date(m.outs[i])-new Date(m.ins[i]))/60000;
 }
 m.workMin=Math.max(0,Math.round(total));
 m.status=m.ins.length>m.outs.length?'in':'out';
 m.lastTime=(m.status==='in'?m.ins:m.outs).slice(-1)[0]||'';
 });
 var members=Object.values(memberMap);
 var inCount=members.filter(function(m){return m.status==='in';}).length;
 var outCount=members.filter(function(m){return m.status==='out'&&m.ins.length;}).length;
 var totalMin=members.reduce(function(s,m){return s+m.workMin;},0);
 var sum=document.getElementById('ad-summary');
 if(sum)sum.innerHTML=[
 {label:'현재 출근',val:inCount+'명',color:'#22c55e',icon:'🟢'},
 {label:'퇴근 완료',val:outCount+'명',color:'#94a3b8',icon:'⚪'},
 {label:'총 근무',val:Math.floor(totalMin/60)+'h '+totalMin%60+'m',color:'#a78bfa',icon:'⏱'},
 ].map(function(s,i){
 return '<div class="stat-card slide-up stagger-'+(i+1)+'">'+
 '<div style="font-size:20px;margin-bottom:6px">'+s.icon+'</div>'+
 '<div style="font-size:22px;font-weight:900;color:'+s.color+'">'+s.val+'</div>'+
 '<div style="font-size:11px;color:var(--t3);margin-top:2px">'+s.label+'</div></div>';
 }).join('');
 var list=document.getElementById('ad-list');
 if(!list)return;
 if(!members.length){list.innerHTML='<div class="card" style="text-align:center;padding:30px;color:var(--t3)">기록 없음</div>';return;}
 list.innerHTML=members.map(function(m,i){
 var inTime=m.ins[0]?(new Date(m.ins[0])).toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}):'--:--';
 var outTime=m.outs.slice(-1)[0]?(new Date(m.outs.slice(-1)[0])).toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}):'--:--';
 return '<div class="pay-card slide-up stagger-'+Math.min(i+1,4)+'">'+
 '<div style="display:flex;align-items:center;gap:10px">'+
 '<div class="attend-dot '+(m.status==='in'?'dot-in':'dot-out')+'"></div>'+
 '<div><div style="font-size:13px;font-weight:800">'+esc(m.name)+'</div>'+
 '<div style="font-size:11px;color:var(--t3)">출근 '+inTime+' · 퇴근 '+outTime+'</div></div></div>'+
 '<div style="text-align:right">'+
 '<div style="font-size:14px;font-weight:900;color:#a78bfa">'+
 (m.workMin>0?Math.floor(m.workMin/60)+'h '+m.workMin%60+'m':m.status==='in'?'근무중':'--')+'</div>'+
 '<div style="font-size:10px;color:var(--t3)">'+(m.status==='in'?'🟢 출근중':'⚪ 퇴근')+'</div></div></div>';
 }).join('');
 },function(){});
}

var _liveTickerTimer=null;
function _filoStartLiveTicker(){
 if(_liveTickerTimer)clearInterval(_liveTickerTimer);
 _filoRenderLive();
 _liveTickerTimer=setInterval(_filoRenderLive,30000);
}
function _filoRenderLive(){
 var did=_CU.dealerId||_CU.uid;
 var today=new Date().toISOString().slice(0,10);
 Promise.all([
  _db.collection('attendance').where('dealerId','==',did).where('date','==',today).where('type','==','in').get(),
  _db.collection('attendance').where('dealerId','==',did).where('date','==',today).where('type','==','out').get(),
  _db.collection('members').where('dealerId','==',did).get()
 ]).then(function(res){
  var insSnap=res[0],outsSnap=res[1],memSnap=res[2];
  var memMap={};
  memSnap.forEach(function(doc){memMap[doc.id]=doc.data();});
  var outSet={};
  outsSnap.forEach(function(doc){outSet[doc.data().memberId]=true;});
  var active=[];
  insSnap.forEach(function(doc){
   var d=doc.data();
   if(!outSet[d.memberId]){
    var mem=Object.values(memMap).find(function(m){return m.name===d.memberName;})||{};
    var inTime=new Date(d.time);
    var elapsedMin=Math.floor((Date.now()-inTime)/60000);
    var wage=mem.wage||0;
    var earned=Math.round(elapsedMin/60*wage);
    active.push({name:d.memberName||d.memberId,wage:wage,wageType:mem.wageType||'hourly',elapsedMin:elapsedMin,earned:earned,inTime:d.time});
   }
  });
  var liveEl=document.getElementById('pay-live');
  if(!liveEl)return;
  if(!active.length){liveEl.innerHTML='';return;}
  liveEl.innerHTML='<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:12px 14px;margin-bottom:4px">'+
  '<div style="font-size:12px;font-weight:800;color:#22c55e;margin-bottom:8px">🟢 현재 출근 중 ('+active.length+'명)</div>'+
  active.map(function(a){
   var h=Math.floor(a.elapsedMin/60),m=a.elapsedMin%60;
   var wLabel=a.wageType==='daily'?'일급':'시급';
   return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(34,197,94,.1)">'+
   '<div><span style="font-size:13px;font-weight:800">'+esc(a.name)+'</span>'+
   '<span style="font-size:11px;color:var(--t3);margin-left:8px">'+wLabel+' '+a.wage.toLocaleString()+'원 · '+h+'h '+m+'m 근무중</span></div>'+
   '<div style="font-size:14px;font-weight:900;color:#22c55e">+₩'+a.earned.toLocaleString()+'</div></div>';
  }).join('')+
  '</div>';
 }).catch(function(){});
}

/* ── 주휴수당 계산 ── */
function _calcWeeklyAllowance(ins,outs,wage,wageType){
 if(wageType!=='hourly'||!wage)return 0;
 /* 주별 근무시간 집계 */
 var weekMap={};
 ins.forEach(function(inR,i){
  var outR=outs[i];
  if(!outR)return;
  var diff=(new Date(outR.time)-new Date(inR.time))/3600000;
  if(diff<=0||diff>12)return;
  var d=new Date(inR.time);
  /* ISO week key */
  var dayOfWeek=d.getDay()||7;
  var monday=new Date(d);monday.setDate(d.getDate()-(dayOfWeek-1));
  var wk=monday.toISOString().slice(0,10);
  weekMap[wk]=(weekMap[wk]||0)+diff;
 });
 var total=0;
 Object.values(weekMap).forEach(function(hrs){
  if(hrs>=15){
   /* 주휴수당 = (주근무시간/40)*8*시급 (단 8h 한도) */
   var dailyHour=Math.min(hrs/5,8);
   total+=Math.round(dailyHour*wage);
  }
 });
 return total;
}

/* ── 세금/공제 계산 ── */
function _calcDeduction(gross,empType){
 /* empType: 'part'=단기알바(3.3%), 'full'=정직원(4대보험), 'monthly'=월급 */
 if(!gross)return{tax:0,insurance:0,total:0};
 if(empType==='part'){
  var tax=Math.round(gross*0.033);
  return{tax:tax,insurance:0,total:tax};
 }
 if(empType==='full'||empType==='monthly'){
  var pension=Math.round(gross*0.045);
  var health=Math.round(gross*0.03545);
  var employ=Math.round(gross*0.009);
  var ins=pension+health+employ;
  var tax2=Math.round((gross-ins)*0.033);
  return{tax:tax2,insurance:ins,total:tax2+ins};
 }
 return{tax:0,insurance:0,total:0};
}

/* ── 전체 급여 로드 ── */
var _payrollData=[];
function _filoLoadPayroll(){
 var did=_CU.dealerId||_CU.uid;
 var ymEl=document.getElementById('pay-ym');
 var ym=ymEl?ymEl.value:new Date().toISOString().slice(0,7);
 var startDate=ym+'-01';
 var endDate=ym+'-31';
 Promise.all([
  _db.collection('attendance').where('dealerId','==',did).where('date','>=',startDate).where('date','<=',endDate).get(),
  _db.collection('members').where('dealerId','==',did).get()
 ]).then(function(results){
  var attendSnap=results[0],memberSnap=results[1];
  var memberMap={};
  memberSnap.forEach(function(doc){memberMap[doc.id]=Object.assign({_id:doc.id},doc.data());});
  var payMap={};
  attendSnap.forEach(function(doc){
   var d=doc.data();
   var mid=d.memberId;
   if(!payMap[mid])payMap[mid]={memberId:mid,name:d.memberName||mid,workMin:0,days:new Set(),ins:[],outs:[]};
   if(d.type==='in')payMap[mid].ins.push({time:d.time,date:d.date});
   else payMap[mid].outs.push({time:d.time,date:d.date});
  });
  Object.values(payMap).forEach(function(p){
   p.ins.sort(function(a,b){return a.time>b.time?1:-1;});
   p.outs.sort(function(a,b){return a.time>b.time?1:-1;});
   var total=0;
   for(var i=0;i<Math.min(p.ins.length,p.outs.length);i++){
    var diff=(new Date(p.outs[i].time)-new Date(p.ins[i].time))/60000;
    if(diff>0&&diff<720){total+=diff;p.days.add(p.ins[i].date);}
   }
   p.workMin=Math.round(total);
   p.workHour=p.workMin/60;
   p.dayCount=p.days.size;
   var member=Object.values(memberMap).find(function(m){return m._id===p.memberId||m.name===p.name;})||{};
   p.wage=member.wage||0;
   p.wageType=member.wageType||'hourly';   /* hourly/daily/monthly */
   p.empType=member.empType||'part';        /* part/full/monthly */
   /* 기본급 계산 */
   if(p.wageType==='monthly'){p.basePay=p.wage;}
   else if(p.wageType==='daily'){p.basePay=Math.round(p.dayCount*p.wage);}
   else{p.basePay=Math.round(p.workHour*p.wage);}
   /* 주휴수당 */
   p.weeklyAllowance=_calcWeeklyAllowance(p.ins,p.outs,p.wage,p.wageType);
   /* 총지급액 */
   p.gross=p.basePay+p.weeklyAllowance;
   /* 공제 */
   var ded=_calcDeduction(p.gross,p.empType);
   p.deduction=ded.total;p.tax=ded.tax;p.insurance=ded.insurance;
   /* 실수령액 */
   p.netPay=p.gross-p.deduction;
  });
  _payrollData=Object.values(payMap);
  _filoRenderPaySummary();
  _filoRenderPayList();
 }).catch(function(e){
  var list=document.getElementById('pay-list');
  if(list)list.innerHTML='<div style="color:var(--red);padding:20px">'+e.message+'</div>';
 });
}

 var totalGross=members.reduce(function(s,m){return s+m.gross;},0);
 var totalNet=members.reduce(function(s,m){return s+m.netPay;},0);
 var totalHour=members.reduce(function(s,m){return s+m.workHour;},0);
 var totalWeekly=members.reduce(function(s,m){return s+(m.weeklyAllowance||0);},0);
 var sum=document.getElementById('pay-summary');

  {label:'총 실수령액',val:'₩'+totalNet.toLocaleString(),color:'#a78bfa',icon:'💳'},
  {label:'주휴수당 합계',val:'₩'+totalWeekly.toLocaleString(),color:'#f59e0b',icon:'📅'},
  {label:'총 근무시간',val:Math.round(totalHour)+'h',color:'#38bdf8',icon:'⏱'},

 }).join('');
}

function _filoImportMenuExcel(input){
 var file=input.files[0];
 if(!file)return;
 var did=_CU.dealerId||_CU.uid;
 var reader=new FileReader();
 reader.onload=function(e){
  try{
   var wb=XLSX.read(e.target.result,{type:'array'});
   var ws=wb.Sheets[wb.SheetNames[0]];
   var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
   if(!rows.length){alert('데이터가 없습니다.');return;}
   var batch=[];
   rows.forEach(function(r){
    var name=r['메뉴명']||r['name']||'';
    var price=parseInt(r['가격']||r['price']||0);
    var category=r['카테고리']||r['category']||'기타';
    var emoji=r['이모지']||r['emoji']||'🍽';
    if(!name||!price)return;
    batch.push({name:name,price:price,category:category,emoji:emoji,forSale:true,dealerId:did,stock:null,minStock:null});
   });
   if(!batch.length){alert('유효한 메뉴가 없습니다.');return;}
   var db=firebase.firestore();
   /* 기존 filo_menus 삭제 후 재등록 */
   db.collection('filo_menus').where('dealerId','==',did).get().then(function(old){
    var bwD=db.batch();
    old.forEach(function(oc){bwD.delete(oc.ref);});
    return bwD.commit();
   }).then(function(){
    var bw2=db.batch();
    batch.forEach(function(m){
     var ref=db.collection('filo_menus').doc();
     bw2.set(ref,m);
    });
    return bw2.commit();
   }).then(function(){
    alert(batch.length+'개 메뉴 등록 완료! 테이블 QR에도 반영됩니다.');
    _filoPageKiosk(document.getElementById('content'));
   }).catch(function(e){alert('저장 오류: '+e.message);});
  }catch(e){alert('파일 읽기 오류: '+e.message);}
 };
 reader.readAsArrayBuffer(file);
 input.value='';
}

function _cartAdd(id,name,price){

 if(existing){existing.qty++;}
 else{_cartItems.push({id:id,name:name,price:price,qty:1});}
 _cartRender();
 /* Ripple + 바운스 효과 */

 if(btn){
  btn.style.transform='scale(.94)';
  btn.style.borderColor='rgba(124,58,237,.6)';
  /* Ripple */
  var ripple=document.createElement('div');
  ripple.style.cssText='position:absolute;border-radius:50%;background:rgba(124,58,237,.3);width:10px;height:10px;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);animation:ripple .5s ease both;pointer-events:none;z-index:10';
  btn.appendChild(ripple);
  setTimeout(function(){
   btn.style.transform='';
   btn.style.borderColor='';
   if(ripple.parentNode)ripple.parentNode.removeChild(ripple);
  },500);

function _filoGenQRs(did){
 did=did||_CU.dealerId||_CU.uid;
 var sec=document.getElementById('qr-section');
 var grid=document.getElementById('qr-grid');
 if(!sec||!grid)return;
 sec.style.display='block';
 grid.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3)">⏳ QR 생성중...</div>';

 /* Firestore에서 테이블 목록 가져오기 */
 _db.collection('filo_tables').where('dealerId','==',did).get().then(function(snap){
  var seen={};
  if(snap.empty){
   for(var i=1;i<=10;i++)seen[i]={num:i,name:'테이블 '+i};
  } else {
   snap.forEach(function(doc){
    var d=doc.data();
    var num=d.tableNum||d.tableId||1;
    var name=d.tableName||('테이블 '+num);
    if(!seen[num]||name!=='테이블 '+num)seen[num]={num:num,name:name};
   });
  }
  var tables=Object.values(seen).sort(function(a,b){return a.num-b.num;});

  grid.innerHTML='';
  var baseUrl='https://filo.ai.kr/order?d='+did+'&t=';

  tables.forEach(function(t){
   var url=baseUrl+t.num+'&name='+encodeURIComponent(t.name);
   var div=document.createElement('div');
   div.className='card';
   div.style.cssText='text-align:center;padding:14px';
   div.innerHTML=
    '<div style="font-size:13px;font-weight:800;margin-bottom:10px">'+t.name+'</div>'+
    '<div id="qr-'+t.num+'" style="background:#fff;padding:6px;border-radius:8px;display:inline-block;margin-bottom:10px"></div>'+
    '<div style="display:flex;gap:4px;justify-content:center">'+
    '<button data-dl="'+t.num+'" data-name="'+t.name+'" style="padding:4px 8px;background:rgba(8,145,178,.15);border:1px solid rgba(8,145,178,.3);border-radius:6px;color:#38bdf8;font-size:10px;font-weight:700;cursor:pointer">💾 저장</button>'+
    '<button data-pr="'+t.num+'" data-name="'+t.name+'" style="padding:4px 8px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:6px;color:#a78bfa;font-size:10px;font-weight:700;cursor:pointer">🖨️ 인쇄</button>'+
    '<button onclick="window.open(\''+url+'\',\'_blank\')" style="padding:4px 8px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:10px;font-weight:700;cursor:pointer">👁 미리보기</button>'+
    '</div>';
   grid.appendChild(div);
  });

  /* QR 라이브러리 로드 후 생성 */
  function genQRs(){
   tables.forEach(function(t){
    var el=document.getElementById('qr-'+t.num);
    if(!el||el.children.length>0)return;
    var url=baseUrl+t.num+'&name='+encodeURIComponent(t.name);
    try{
     new QRCode(el,{text:url,width:120,height:120,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    }catch(e){console.error('QR err:',e);}
   });
  }

  if(window.QRCode){
   genQRs();
  } else {
   var s=document.createElement('script');
   s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
   s.onload=function(){setTimeout(genQRs,100);};
   document.head.appendChild(s);
  }

  /* 버튼 이벤트 위임 */
  grid.addEventListener('click',function(e){
   var dlBtn=e.target.closest('[data-dl]');
   var prBtn=e.target.closest('[data-pr]');

     });

function _filoEnsureQR(cb){
 if(window.QRCode)return cb();
 /* 혹시 로드 안됐으면 동적 로드 */
 var s=document.createElement('script');
 s.src='https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
 s.onload=function(){setTimeout(cb,100);};
 document.head.appendChild(s);
}

function _filoTableLoad(did){
 did=did||_CU.dealerId||_CU.uid;
 var today=new Date().toISOString().slice(0,10);
 /* 기존 리스너 해제 */
 if(window._tableUnsub)window._tableUnsub();
 if(window._bookingUnsub)window._bookingUnsub();
 var tableSnap=null,bookingSnap=null;
 function tryRender(){
  if(!tableSnap||!bookingSnap)return;

   Array.from({length:10},function(_,i){return {docId:'auto_'+(i+1),num:i+1,name:'테이블 '+(i+1),status:'empty',reservedName:'',occupiedSince:''};})
   :tableSnap.docs.map(function(d){
    var f=d.data();
    return {docId:d.id,num:f.tableNum||1,name:f.tableName||'테이블',status:f.status||'empty',reservedName:f.reservedName||'',occupiedSince:f.occupiedSince||''};
   }).sort(function(a,b){return a.num-b.num;})

   var border=s==='empty'?'rgba(34,197,94,.3)':s==='occupied'?'rgba(239,68,68,.25)':'rgba(245,158,11,.3)';

   /* 액션 버튼 */

   }
   /* 예약페이지 URL */
   var reserveUrl='https://filo.ai.kr/table?did='+did+'&tid='+t.num;
   return '<div style="background:'+bg+';border:1.5px solid '+border+';border-radius:12px;padding:12px;text-align:center">'+
    '<div style="font-size:20px;margin-bottom:4px">'+icon+'</div>'+

  }).join('');

  if(!bookingRows.length){blist.innerHTML='<div style="text-align:center;padding:12px;color:var(--t3);font-size:12px">오늘 예약 없음</div>';return;}
  blist.innerHTML=bookingRows.map(function(d){
   var f=d.data();
   var bid=d.id;

   var table=f.tableName||'테이블';

   var sc={pending:{c:'#f59e0b',l:'대기'},confirmed:{c:'#22c55e',l:'확정'},cancelled:{c:'#ef4444',l:'취소'}}[status]||{c:'var(--t3)',l:status};
   return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px">'+

 }
 window._tableUnsub=_db.collection('filo_tables').where('dealerId','==',did).onSnapshot(function(snap){

 },function(e){console.warn('table:',e);});

  bookingSnap=snap;tryRender();

window._filoTableSeat=function(docId,did,num){

 _db.collection('filo_tables').doc(id).set({
  dealerId:did,tableNum:parseInt(num),tableName:'테이블 '+num,

};

window._filoTableClear=function(docId,did,num){

  status:'empty',occupiedSince:'',reservedName:'',updatedAt:now

window._filoBookingConfirm=function(bid,did){

window._filoBookingReject=function(bid,did){

  var d=snap.data()||{};

  .then(function(){_filoToast('❌ 예약 거절');_filoTableLoad(did);_filoNotifyReservation(did,d,'rejected');});
 });
};

// 예약 알림: 회원+FCM허용→푸시, 회원+FCM없음→알림톡, 비회원→차단(예약단계에서 막힘)
async function _filoNotifyReservation(did,booking,status){
 var name=booking.customerName||'고객';
 var phone=booking.phone||'';
 var tableName=booking.tableName||'테이블';
 var date=booking.date||'';
 var time=booking.time||'';
 var title=status==='confirmed'?'예약 확정 ✅':'예약 불가 ❌';
 var body=status==='confirmed'
  ?(tableName+' '+date+' '+time+' 예약이 확정됐습니다!')
  :'죄송합니다. 해당 시간 예약이 어렵습니다. 다른 시간을 선택해주세요.';
 if(!phone) return;
 // 회원 조회
 var mSnap=await _db.collection('members').where('dealerId','==',did).where('phone','==',phone).limit(1).get();
 if(mSnap.empty) return; // 비회원 (예약단계에서 이미 차단됨)
 var member=mSnap.docs[0].data();
 // 1순위: FCM 푸시 (앱 설치+허용한 회원)
 var tokens=((member.fcmTokens||[]).map(function(t){return t.token||t;})).filter(Boolean);
 if(member.fcmToken&&member.fcmToken.length>20) tokens.push(member.fcmToken);
 tokens=[...new Set(tokens)].filter(function(t){return t&&t.length>20;});
 if(tokens.length){
  fetch('https://donway.ai.kr/fcm/notify-drivers',{
   method:'POST',headers:{'Content-Type':'application/json'},
   body:JSON.stringify({tokens:tokens,title:title,body:body})
  }).catch(function(){});
  _filoToast('📱 '+name+'님 푸시 발송');
  return;
 }
