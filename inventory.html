<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>재고관리 — mbtico.kr</title>

<style>
:root{--bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--border:#2e3250;--text:#e8eaf6;--text2:#9da3c8;--text3:#5a5f7a;--acc:#f59e0b;--green:#00ff94;--red:#ff4d6d;--blue:#00d4ff;--purple:#a78bfa}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-size:18px;font-weight:900;color:var(--acc)}
.sidebar-sub{font-size:10px;color:var(--text3)}
.sidebar-user{padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text3)}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--acc);border-left-color:var(--acc)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.main{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.page-title{font-size:16px;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:900;color:var(--acc)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:8px 10px;text-align:left;color:var(--text3);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:var(--bg3)}
.btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-acc{background:var(--acc);color:#000}
.btn-blue{background:rgba(0,212,255,.15);border:1px solid var(--blue);color:var(--blue)}
.btn-gray{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.btn-red{background:rgba(255,77,109,.15);border:1px solid var(--red);color:var(--red)}
.btn-green{background:rgba(0,255,148,.15);border:1px solid var(--green);color:var(--green)}
.inp{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.inp:focus{outline:none;border-color:var(--acc)}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px;display:block}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-green{background:rgba(0,255,148,.15);color:var(--green)}
.badge-red{background:rgba(255,77,109,.15);color:var(--red)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--acc)}
.badge-blue{background:rgba(0,212,255,.15);color:var(--blue)}
.badge-purple{background:rgba(167,139,250,.15);color:var(--purple)}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.popup-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.popup-title{font-size:15px;font-weight:900;margin-bottom:16px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.role-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.role-admin{background:rgba(245,158,11,.15);color:var(--acc)}
.role-manager{background:rgba(167,139,250,.15);color:var(--purple)}
/* 바코드 */
.barcode-btn{padding:8px 12px;background:rgba(0,212,255,.1);border:1px solid var(--blue);border-radius:8px;color:var(--blue);font-size:12px;font-weight:700;cursor:pointer}
/* 모바일 */
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mobile-header{display:flex!important}
}
.mobile-header{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
/* 로그인 */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:360px}
/* 드롭존 */
.dropzone{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s}
.dropzone:hover,.dropzone.drag{border-color:var(--acc);background:rgba(245,158,11,.05)}
.dropzone-icon{font-size:32px;margin-bottom:8px}
.dropzone-text{font-size:13px;color:var(--text3)}
</style>
</head>

</div>

          <a href="https://mbtico.kr/kiosk" target="_blank" style="flex:1;display:block;text-align:center;padding:7px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:8px;color:var(--purple);font-size:10px;font-weight:700;text-decoration:none">🖥️ POS</a>
        </div>
        <button class="btn btn-gray" style="width:100%;font-size:11px" onclick="_logout()">로그아웃</button>
      </div>
    </div>
    <div class="main" id="main-content">
      <div style="text-align:center;padding:40px;color:var(--text3)">⏳ 로딩 중...</div>
    </div>
  </div>
</div>

function _getDefaultItems(ind){
  var db=INVENTORY_DB[ind]; if(!db) return [];
  var items=[];
  db.categories.forEach(function(cat){
    cat.items.forEach(function(item){
      items.push(Object.assign({category:cat.name,categoryIcon:cat.icon||'📦'},item));

  });

function _pageStock(c){
  if(!c)c=document.getElementById('main-content');
  var ind=INVENTORY_DB[_curInd];
  c.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
      '<div class="page-title">📦 재고 현황 · '+(ind?ind.label:'')+'</div>'+
      '<div style="display:flex;gap:8px">'+
        '<button class="btn btn-acc" onclick="_nav(document.getElementById(\'nav-in\'),\'in\')">+ 입고</button>'+
        '<button class="btn btn-gray" onclick="_nav(document.getElementById(\'nav-out\'),\'out\')">- 출고</button>'+
      '</div>'+
    '</div>'+
    '<div id="stock-list"><div style="text-align:center;padding:30px;color:var(--text3)">⏳ 로딩 중...</div></div>';

  var did=_getDid();
  Promise.all([
    _db.collection('inventory_in').where('dealerId','==',did).get(),
    _db.collection('inventory_out').where('dealerId','==',did).where('returnFlag','==',false).get(),
    _db.collection('inventory').where('dealerId','==',did).get()
  ]).then(function(results){
    var inDocs=results[0],outDocs=results[1],masterDocs=results[2];
    var stock={};
    masterDocs.forEach(function(d){
      var v=d.data(); var k=v.itemCode||v.name||d.id;
      stock[k]={name:v.name||k,category:v.category||'기타',unit:v.unit||'개',minQty:v.minQty||0,qty:0,unitCost:v.price||0,masterId:d.id};
    });
    inDocs.forEach(function(d){
      var v=d.data(); var k=v.itemCode||v.itemName||'기타';
      if(!stock[k])stock[k]={name:v.itemName||k,category:v.category||'기타',unit:v.unit||'개',minQty:0,qty:0,unitCost:v.unitCost||0};
      stock[k].qty+=(v.qty||0);
      if(v.unitCost)stock[k].unitCost=v.unitCost;
    });
    outDocs.forEach(function(d){
      var v=d.data(); var k=v.itemCode||v.itemName||'기타';
      if(stock[k])stock[k].qty-=(v.qty||0);
    });

    var items=Object.values(stock);
    if(!items.length){
      document.getElementById('stock-list').innerHTML=
        '<div style="text-align:center;padding:40px;color:var(--text3)">'+
          '<div style="font-size:32px;margin-bottom:8px">📦</div>'+
          '<div>재고 없음</div>'+
          '<button class="btn btn-acc" style="margin-top:12px" onclick="_nav(document.getElementById(\'nav-industry\'),\'industry\')">업종 설정 →</button>'+
        '</div>';
      return;
    }

    var low=items.filter(function(i){return i.minQty>0&&i.qty<=i.minQty;});
    var html='';
    if(low.length){
      html+='<div style="background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:12px;margin-bottom:12px">'+
        '<div style="font-size:12px;font-weight:800;color:var(--red);margin-bottom:6px">⚠️ 재고 부족 ('+low.length+'개) — 발주 필요</div>'+
        low.map(function(i){return '<div style="font-size:11px;color:var(--text2);margin-top:3px">'+esc(i.name)+' — 현재 <b style="color:var(--red)">'+i.qty+i.unit+'</b> / 최소 '+i.minQty+i.unit+'</div>';}).join('')+
      '</div>';
    }

    html+='<div class="table-wrap"><table>'+
      '<tr><th>품목명</th><th>카테고리</th><th>현재고</th><th>단위</th><th>최소수량</th><th>상태</th></tr>'+
      items.map(function(i){
        var isLow=i.minQty>0&&i.qty<=i.minQty;
        return '<tr>'+
          '<td style="font-weight:700">'+esc(i.name)+'</td>'+
          '<td>'+esc(i.category)+'</td>'+
          '<td style="font-weight:900;color:'+(isLow?'var(--red)':'var(--green)')+'">'+i.qty+'</td>'+
          '<td>'+esc(i.unit)+'</td>'+
          '<td>'+i.minQty+'</td>'+
          '<td><span class="badge '+(isLow?'badge-red':'badge-green')+'">'+(isLow?'부족':'정상')+'</span></td>'+
        '</tr>';
      }).join('')+
    '</table></div>';

    document.getElementById('stock-list').innerHTML=html;
  }).catch(function(e){
    var el=document.getElementById('stock-list');
    if(el)el.innerHTML='<div style="color:var(--red);padding:16px">'+esc(e.message)+'</div>';
  });
}

        )+

var _barcodeStream=null;
function _startBarcode(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(function(stream){
    _barcodeStream=stream;
    var statusEl=document.getElementById('barcode-status');
    if(!statusEl)return;
    statusEl.innerHTML='<video id="bc-video" style="width:100%;border-radius:8px" autoplay playsinline></video>';
    var video=document.getElementById('bc-video');
    video.srcObject=stream;
    var detector=new BarcodeDetector({formats:['qr_code','ean_13','ean_8','code_128','code_39']});
    var scanning=true;
    function scan(){
      if(!scanning)return;
      detector.detect(video).then(function(codes){
        if(codes.length>0){
          scanning=false;
          var code=codes[0].rawValue;
          _stopBarcode();
          var resultEl=document.getElementById('barcode-result');
          if(resultEl){
            resultEl.innerHTML=
              '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px">'+
                '<div style="font-size:11px;color:var(--text3);margin-bottom:4px">스캔 결과</div>'+
                '<div style="font-weight:700;color:var(--acc);font-size:14px">'+esc(code)+'</div>'+
                '<input class="inp" id="bc-qty" type="number" placeholder="수량" min="1" style="margin-top:8px">'+
                '<button class="btn btn-acc" style="width:100%;margin-top:8px" onclick="_saveBarcodeIn(\''+esc(code)+'\')">입고 저장</button>'+
              '</div>';
          }
        }
      }).catch(function(){});
      if(scanning)requestAnimationFrame(scan);
    }
    video.onloadedmetadata=function(){scan();};
  }).catch(function(e){toast('카메라 오류: '+e.message);});
}
function _stopBarcode(){
  if(_barcodeStream){_barcodeStream.getTracks().forEach(function(t){t.stop();});_barcodeStream=null;}
}
function _saveBarcodeIn(code){
  var qty=parseInt((document.getElementById('bc-qty')||{}).value)||1;
  var did=_getDid();
  var today=new Date().toISOString().slice(0,10);
  _db.collection('inventory_in').add({
    dealerId:did, itemCode:code, itemName:code, qty:qty, unit:'개',
    unitCost:0, totalCost:0, date:today, ym:today.slice(0,7),
    note:'바코드 스캔', regBy:_cu?_cu.email:'', role:_role,

  }).then(function(){
    toast('✅ 바코드 입고 저장: '+code);
    document.querySelector('.popup-overlay').remove();
    _pageIn(document.getElementById('main-content'));
  }).catch(function(e){toast('❌ '+e.message);});
}

function _handleXlIn(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // 헤더 제거
    if(rows.length>0&&typeof rows[0][0]==='string'&&isNaN(rows[0][1])) rows=rows.slice(1);
    var items=rows.filter(function(r){return r[0]&&r[1];}).map(function(r){
      var today=new Date().toISOString().slice(0,10);
      return {
        itemName:String(r[0]||'').trim(),
        qty:parseInt(r[1])||0,
        unit:String(r[2]||'개').trim(),
        unitCost:parseInt(r[3])||0,
        date:r[4]?String(r[4]).slice(0,10):today
      };
    });
    var preview=document.getElementById('xl-in-preview');
    if(!preview)return;
    preview.innerHTML=
      '<div style="font-size:12px;font-weight:700;margin-bottom:8px">미리보기 ('+items.length+'건)</div>'+
      '<div class="table-wrap"><table>'+
        '<tr><th>품목명</th><th>수량</th><th>단위</th><th>단가</th><th>날짜</th></tr>'+
        items.slice(0,5).map(function(i){return '<tr><td>'+esc(i.itemName)+'</td><td>'+i.qty+'</td><td>'+i.unit+'</td><td>₩'+comma(i.unitCost)+'</td><td>'+i.date+'</td></tr>';}).join('')+
        (items.length>5?'<tr><td colspan="5" style="text-align:center;color:var(--text3)">...외 '+(items.length-5)+'건</td></tr>':'')+
      '</table></div>'+
      '<button class="btn btn-acc" style="width:100%;margin-top:10px" onclick="_saveXlIn('+JSON.stringify(items)+')">✅ '+items.length+'건 일괄 입고</button>';
  };
  reader.readAsArrayBuffer(file);
}

function _saveXlIn(items){
  var did=_getDid();
  var batch=_db.batch();
  items.forEach(function(item){
    var ref=_db.collection('inventory_in').doc();
    batch.set(ref,{
      dealerId:did, itemCode:item.itemName, itemName:item.itemName,
      qty:item.qty, unit:item.unit, unitCost:item.unitCost,
      totalCost:item.unitCost*item.qty, date:item.date,
      ym:item.date.slice(0,7), note:'엑셀 업로드',
      regBy:_cu?_cu.email:'', role:_role,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  });
  batch.commit().then(function(){
    toast('✅ '+items.length+'건 일괄 입고 완료!',3000);
    document.querySelector('.popup-overlay').remove();
    _pageIn(document.getElementById('main-content'));
  }).catch(function(e){toast('❌ '+e.message);});
}

function _startBarcode2(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(function(stream){
    _barcodeStream=stream;
    var statusEl=document.getElementById('barcode-status2');
    if(!statusEl)return;
    statusEl.innerHTML='<video id="bc-video2" style="width:100%;border-radius:8px" autoplay playsinline></video>';
    var video=document.getElementById('bc-video2');
    video.srcObject=stream;
    var detector=new BarcodeDetector({formats:['qr_code','ean_13','ean_8','code_128','code_39']});
    var scanning=true;
    function scan(){
      if(!scanning)return;
      detector.detect(video).then(function(codes){
        if(codes.length>0){
          scanning=false;
          var code=codes[0].rawValue;
          _stopBarcode();
          var resultEl=document.getElementById('barcode-result2');
          if(resultEl){
            resultEl.innerHTML=
              '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px">'+
                '<div style="font-size:11px;color:var(--text3);margin-bottom:4px">스캔 결과</div>'+
                '<div style="font-weight:700;color:var(--red);font-size:14px">'+esc(code)+'</div>'+
                '<input class="inp" id="bc-qty2" type="number" placeholder="수량" min="1" style="margin-top:8px">'+
                '<button class="btn btn-red" style="width:100%;margin-top:8px" onclick="_saveBarcodeOut(\''+esc(code)+'\')">출고 저장</button>'+
              '</div>';
          }
        }
      }).catch(function(){});
      if(scanning)requestAnimationFrame(scan);
    }
    video.onloadedmetadata=function(){scan();};
  }).catch(function(e){toast('카메라 오류: '+e.message);});
}

function _handleXlOut(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(rows.length>0&&typeof rows[0][0]==='string'&&isNaN(rows[0][1]))rows=rows.slice(1);
    var items=rows.filter(function(r){return r[0]&&r[1];}).map(function(r){
      var today=new Date().toISOString().slice(0,10);
      return {itemName:String(r[0]||'').trim(),qty:parseInt(r[1])||0,unit:String(r[2]||'개').trim(),unitCost:parseInt(r[3])||0,date:r[4]?String(r[4]).slice(0,10):today};
    });
    var preview=document.getElementById('xl-out-preview');
    if(!preview)return;
    preview.innerHTML=
      '<div style="font-size:12px;font-weight:700;margin-bottom:8px">미리보기 ('+items.length+'건)</div>'+
      '<div class="table-wrap"><table>'+
        '<tr><th>품목명</th><th>수량</th><th>단위</th><th>단가</th></tr>'+
        items.slice(0,5).map(function(i){return '<tr><td>'+esc(i.itemName)+'</td><td>'+i.qty+'</td><td>'+i.unit+'</td><td>₩'+comma(i.unitCost)+'</td></tr>';}).join('')+
      '</table></div>'+
      '<button class="btn btn-red" style="width:100%;margin-top:10px" onclick="_saveXlOut('+JSON.stringify(items)+')">📤 '+items.length+'건 일괄 출고</button>';
  };
  reader.readAsArrayBuffer(file);
}

function _saveXlOut(items){
  if(!_isAdmin()){toast('⚠️ 대표만 가능합니다');return;}
  var did=_getDid();
  var batch=_db.batch();
  items.forEach(function(item){
    var ref=_db.collection('inventory_out').doc();
    batch.set(ref,{
      dealerId:did, itemCode:item.itemName, itemName:item.itemName,
      qty:item.qty, unit:item.unit, unitCost:item.unitCost,
      totalCost:item.unitCost*item.qty, date:item.date, ym:item.date.slice(0,7),
      note:'엑셀 업로드', returnFlag:false, source:'excel',
      regBy:_cu?_cu.email:'', role:_role,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  });
  batch.commit().then(function(){
    toast('✅ '+items.length+'건 일괄 출고 완료!',3000);
    document.querySelector('.popup-overlay').remove();
    _pageOut(document.getElementById('main-content'));
  }).catch(function(e){toast('❌ '+e.message);});

function _saveMaster(btn){
  var name=(document.getElementById('m-name')||{}).value||'';
  var cat=(document.getElementById('m-cat')||{}).value||'기타';
  var unit=(document.getElementById('m-unit')||{}).value||'개';
  var min=parseInt((document.getElementById('m-min')||{}).value)||0;
  var price=parseInt((document.getElementById('m-price')||{}).value)||0;
  if(!name){toast('품목명을 입력하세요');return;}
  btn.textContent='저장 중...'; btn.disabled=true;
  var did=_getDid();
  _db.collection('inventory').add({
    dealerId:did, name:name, category:cat, unit:unit, minQty:min, price:price, qty:0,
    regBy:_cu?_cu.email:'', createdAt:new Date().toISOString()
  }).then(function(){
    toast('✅ 품목 추가됨');
    document.querySelector('.popup-overlay').remove();
    _pageMaster(document.getElementById('main-content'));
  }).catch(function(e){toast('❌ '+e.message);btn.textContent='저장';btn.disabled=false;});
}

function _delMaster(btn){
  if(!_isAdmin()){toast('⚠️ 대표만 삭제 가능합니다');return;}
  if(!confirm('품목을 삭제하시겠습니까?'))return;
  _db.collection('inventory').doc(btn.dataset.id).delete()
  .then(function(){toast('삭제됨');_pageMaster(document.getElementById('main-content'));})
  .catch(function(e){toast('❌ '+e.message);});
}

function _showExcelMaster(){
  var pop=document.createElement('div'); pop.className='popup-overlay';
  pop.innerHTML=

function _handleXlMaster(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(rows.length>0&&typeof rows[0][0]==='string')rows=rows.slice(1);
    var items=rows.filter(function(r){return r[0];}).map(function(r){
      return {name:String(r[0]||'').trim(),category:String(r[1]||'기타').trim(),unit:String(r[2]||'개').trim(),minQty:parseInt(r[3])||0,price:parseInt(r[4])||0};
    });
    var preview=document.getElementById('xl-m-preview');
    if(!preview)return;
    preview.innerHTML=
      '<div style="font-size:12px;font-weight:700;margin-bottom:8px">미리보기 ('+items.length+'개 품목)</div>'+
      '<div class="table-wrap"><table>'+
        '<tr><th>품목명</th><th>카테고리</th><th>단위</th><th>최소</th><th>단가</th></tr>'+
        items.slice(0,5).map(function(i){return '<tr><td>'+esc(i.name)+'</td><td>'+esc(i.category)+'</td><td>'+i.unit+'</td><td>'+i.minQty+'</td><td>₩'+comma(i.price)+'</td></tr>';}).join('')+
      '</table></div>'+
      '<button class="btn btn-acc" style="width:100%;margin-top:10px" onclick="_saveXlMaster('+JSON.stringify(items)+')">✅ '+items.length+'개 품목 등록</button>';
  };
  reader.readAsArrayBuffer(file);
}

function _saveXlMaster(items){
  var did=_getDid();
  var batch=_db.batch();
  items.forEach(function(item){
    var ref=_db.collection('inventory').doc();
    batch.set(ref,{dealerId:did,name:item.name,category:item.category,unit:item.unit,minQty:item.minQty,price:item.price,qty:0,source:'excel',createdAt:new Date().toISOString()});
  });
  batch.commit().then(function(){
    toast('✅ '+items.length+'개 품목 등록 완료!',3000);
    document.querySelector('.popup-overlay').remove();
    _pageMaster(document.getElementById('main-content'));
  }).catch(function(e){toast('❌ '+e.message);});
}

// ━━━ 대시보드 ━━━
function _pageDashboard(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  var ym=new Date().toISOString().slice(0,7);
  c.innerHTML='<div class="page-title">📊 대시보드 · '+ym+'</div>'+
    '<div class="stat-grid" id="dash-stats"><div style="text-align:center;padding:20px;color:var(--text3)">⏳</div></div>'+
    '<div id="dash-low"></div>';

  Promise.all([
    _db.collection('inventory_in').where('dealerId','==',did).where('ym','==',ym).get(),
    _db.collection('inventory_out').where('dealerId','==',did).where('ym','==',ym).where('returnFlag','==',false).get(),
    _db.collection('inventory').where('dealerId','==',did).get()
  ]).then(function(results){
    var inDocs=results[0],outDocs=results[1],masterDocs=results[2];
    var inTotal=0,outTotal=0,inCount=0,outCount=0;
    inDocs.forEach(function(d){var v=d.data();inTotal+=v.totalCost||0;inCount++;});
    outDocs.forEach(function(d){var v=d.data();outTotal+=v.totalCost||0;outCount++;});

    var stock={};
    masterDocs.forEach(function(d){var v=d.data();stock[v.name]={qty:0,minQty:v.minQty||0,unit:v.unit||'개'};});
    inDocs.forEach(function(d){var v=d.data();var k=v.itemName||v.itemCode||'';if(stock[k])stock[k].qty+=v.qty||0;});
    outDocs.forEach(function(d){var v=d.data();var k=v.itemName||v.itemCode||'';if(stock[k])stock[k].qty-=v.qty||0;});
    var lowCount=Object.values(stock).filter(function(i){return i.minQty>0&&i.qty<=i.minQty;}).length;

    var el=document.getElementById('dash-stats');
    if(el)el.innerHTML=
      '<div class="stat-card"><div class="stat-val">'+inCount+'건</div><div class="stat-label">이번달 입고</div><div style="font-size:11px;color:var(--blue);margin-top:4px">₩'+comma(inTotal)+'</div></div>'+
      '<div class="stat-card"><div class="stat-val">'+outCount+'건</div><div class="stat-label">이번달 출고</div><div style="font-size:11px;color:var(--red);margin-top:4px">-₩'+comma(outTotal)+'</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:var(--green)">₩'+comma(inTotal-outTotal)+'</div><div class="stat-label">재고 잔액</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:'+(lowCount?'var(--red)':'var(--green)')+'">'+lowCount+'개</div><div class="stat-label">부족 품목</div></div>';

    if(lowCount){
      var low=Object.entries(stock).filter(function(e){return e[1].minQty>0&&e[1].qty<=e[1].minQty;});
      var el2=document.getElementById('dash-low');
      if(el2)el2.innerHTML=
        '<div style="background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:14px;margin-top:12px">'+
          '<div style="font-size:12px;font-weight:800;color:var(--red);margin-bottom:8px">⚠️ 발주 필요 품목</div>'+
          low.map(function(e){return '<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,77,109,.2)">'+
            '<span>'+esc(e[0])+'</span>'+
            '<span style="color:var(--red)">현재 '+e[1].qty+e[1].unit+' / 최소 '+e[1].minQty+e[1].unit+'</span>'+
          '</div>';}).join('')+
        '</div>';
    }
  });
}

// ━━━ 업종 설정 ━━━
function _pageIndustry(c){
  if(!c)c=document.getElementById('main-content');
  var html='<div class="page-title">🏷️ 업종 설정</div>'+
    '<div style="font-size:12px;color:var(--text3);margin-bottom:16px">업종에 맞는 기본 품목을 자동으로 추가합니다</div>'+
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px">';
  Object.keys(INVENTORY_DB).forEach(function(key){
    var db=INVENTORY_DB[key];
    var isCur=(key===_curInd);
    html+='<div style="background:var(--bg2);border:2px solid '+(isCur?'var(--acc)':'var(--border)')+';border-radius:12px;padding:14px;cursor:pointer" onclick="_setIndustry(\''+key+'\')">'+
      '<div style="font-size:20px;margin-bottom:6px">'+db.label.split(' ')[0]+'</div>'+
      '<div style="font-size:12px;font-weight:700;color:'+(isCur?'var(--acc)':'var(--text)')+'">'+db.label.split(' ').slice(1).join(' ')+'</div>'+
      (isCur?'<div style="font-size:10px;color:var(--acc);font-weight:700;margin-top:4px">✅ 선택됨</div>':'')+
    '</div>';
  });
  html+='</div>'+
    '<button class="btn btn-acc" onclick="_addDefaults()" style="width:100%;padding:13px;font-size:13px;font-weight:800">📦 '+INVENTORY_DB[_curInd].label+' 기본 품목 추가</button>'+
    '<div style="font-size:11px;color:var(--text3);margin-top:8px;text-align:center">기존 품목은 유지, 새 품목만 추가됩니다</div>';
  c.innerHTML=html;
}

function _setIndustry(key){
  if(!INVENTORY_DB[key])return;
  _curInd=key;
  _pageIndustry(document.getElementById('main-content'));
}

function _addDefaults(){
  var did=_getDid();
  if(!did){toast('로그인 필요');return;}
  var items=_getDefaultItems(_curInd);
  if(!items.length){toast('품목 없음');return;}
  var now=new Date().toISOString();
  var batch=items.map(function(item){
    return _db.collection('inventory').add({
      dealerId:did, name:item.name, category:item.category,
      categoryIcon:item.categoryIcon||'📦', unit:item.unit||'개',
      minQty:item.minQty||0, price:item.price||0, qty:0,
      industry:_curInd, createdAt:now, source:'default_template'
    });
  });
  Promise.all(batch).then(function(){
    toast('✅ '+items.length+'개 기본 품목 추가!',3000);
    setTimeout(function(){_nav(document.getElementById('nav-master'),'master');},1000);
  }).catch(function(e){toast('❌ '+e.message);});
}
