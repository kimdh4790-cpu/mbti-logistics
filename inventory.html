<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>재고관리 — mbtico.kr</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--bg4:#252840;
  --border:#2e3250;--text:#e8eaf6;--text2:#9da3c8;--text3:#5a5f7a;
  --acc:#00d4ff;--acc2:#7b2fff;--green:#00ff94;--red:#ff4d6d;
  --sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo-title{font-size:16px;font-weight:900;color:var(--acc)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--acc);border-left-color:var(--acc)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.page-title{font-size:15px;font-weight:800;flex:1}
.content{flex:1;overflow-y:auto;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn-acc{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700}
.btn-acc:hover{opacity:.85}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.toast-msg{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast-msg.show{opacity:1}
/* 모바일 */
@media(max-width:768px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:100;transition:left .3s}
  .sidebar.open{left:0}
  .main{width:100%}
}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-title">🏢 mbtico.kr</div>
    <div class="logo-sub" id="company-name">로딩 중...</div>
  </div>
  <div class="nav" id="nav-menu">
    
    <div class="nav-item active" onclick="_nav(this,'stock')"><span class="nav-icon">📦</span>재고 현황</div>
    <div class="nav-item" onclick="_nav(this,'in')"><span class="nav-icon">📥</span>입고 관리</div>
    <div class="nav-item" onclick="_nav(this,'out')"><span class="nav-icon">📤</span>출고 관리</div>
    <div class="nav-item" onclick="_nav(this,'master')"><span class="nav-icon">📋</span>품목 마스터</div>
    <div class="nav-item" onclick="_nav(this,'dashboard')"><span class="nav-icon">📊</span>대시보드</div>
  </div>
  <div class="sidebar-bottom">
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px" id="user-email"></div>
    <button class="btn" onclick="_logout()" style="width:100%;font-size:11px">로그아웃</button>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px" id="menu-btn">☰</button>
    <div class="page-title" id="page-title">로딩 중...</div>
    <div id="topbar-actions"></div>
  </div>
  <div class="content" id="main-content">
    <div class="empty"><div class="empty-icon">⏳</div>로딩 중...</div>
  </div>
</div>
<div class="toast-msg" id="toast"></div>
<script>
function pageInventory(){
  var c=document.getElementById('main-content');
  if(!_db||!_CU){c.innerHTML='<div class="empty">로그인 후 이용하세요</div>';return;}
  var did=_CU.dealerId||_CU.uid;

  c.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
      '<div style="font-size:15px;font-weight:800">📦 재고관리</div>'+
      '<div style="display:flex;gap:8px">'+
        '<button onclick="pageInventoryIn()" style="padding:7px 14px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">📥 입고등록</button>'+
        '<button onclick="pageInventoryOut()" style="padding:7px 14px;background:#10b981;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">📤 출고등록</button>'+
      '</div>'+
    '</div>'+
    // 재고 현황 탭
    '<div style="display:flex;gap:8px;margin-bottom:12px">'+
      '<button onclick="_invTab(this,this.dataset.tab)" data-tab="stock" id="inv-tab-stock" style="padding:6px 14px;background:var(--acc);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">📊 재고현황</button>'+
      '<button onclick="_invTab(this,this.dataset.tab)" data-tab="in" id="inv-tab-in" style="padding:6px 14px;background:var(--bg3);color:var(--text2);border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">📥 입고내역</button>'+
      '<button onclick="_invTab(this,this.dataset.tab)" data-tab="out" id="inv-tab-out" style="padding:6px 14px;background:var(--bg3);color:var(--text2);border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">📤 출고내역</button>'+
    '</div>'+
    '<div id="inv-content"><div class="loading">⏳ 로딩 중...</div></div>';

  _loadInventoryStock(did);
}

function _invTab(btn, tab){
  document.querySelectorAll('[id^="inv-tab-"]').forEach(function(b){
    b.style.background='var(--bg3)'; b.style.color='var(--text2)';
  });
  btn.style.background='var(--acc)'; btn.style.color='#fff';
  var did=_CU.dealerId||_CU.uid;
  if(tab==='stock') _loadInventoryStock(did);
  else if(tab==='in') _loadInventoryIn(did);
  else if(tab==='out') _loadInventoryOut(did);
}

function _loadInventoryStock(did){
  var c=document.getElementById('inv-content');
  c.innerHTML='<div class="loading">⏳ 재고 계산 중...</div>';

  // 입고 - 출고 = 현재고
  Promise.all([
    _db.collection('inventory_in').where('dealerId','==',did).get(),
    _db.collection('inventory_out').where('dealerId','==',did).get()
  ]).then(function(results){
    var inDocs=results[0], outDocs=results[1];
    var stock={}; // {itemCode: {name, category, qty, unitCost}}

    inDocs.forEach(function(doc){
      var d=doc.data();
      var k=d.itemCode||d.itemName||'기타';
      if(!stock[k]) stock[k]={name:d.itemName||k,category:d.category||'미분류',qty:0,unitCost:d.unitCost||0};
      stock[k].qty+=d.qty||0;
      if(d.unitCost) stock[k].unitCost=d.unitCost;
    });

    outDocs.forEach(function(doc){
      var d=doc.data();
      var k=d.itemCode||d.itemName||'기타';
      if(!stock[k]) stock[k]={name:d.itemName||k,category:d.category||'미분류',qty:0,unitCost:0};
      stock[k].qty-=d.qty||0;
    });

    var items=Object.keys(stock);
    if(!items.length){
      c.innerHTML='<div class="empty">📦 입고된 재고가 없습니다<br><small>입고등록 버튼으로 재고를 추가하세요</small></div>';
      return;
    }

    // 카테고리별 그룹핑
    var cats={};
    items.forEach(function(k){
      var cat=stock[k].category||'미분류';
      if(!cats[cat]) cats[cat]=[];
      cats[cat].push(k);
    });

    var html='<div style="overflow-x:auto">';
    Object.keys(cats).sort().forEach(function(cat){
      html+='<div style="margin-bottom:16px">'+
        '<div style="font-size:12px;font-weight:800;color:var(--acc);margin-bottom:6px;padding:4px 8px;background:var(--bg3);border-radius:6px">'+esc(cat)+'</div>'+
        '<table style="width:100%;border-collapse:collapse;font-size:12px">'+
        '<thead><tr style="background:var(--bg3)">'+
          '<th style="padding:7px 10px;text-align:left">품목명</th>'+
          '<th style="padding:7px 10px;text-align:right">현재고</th>'+
          '<th style="padding:7px 10px;text-align:right">단가</th>'+
          '<th style="padding:7px 10px;text-align:right">재고금액</th>'+
          '<th style="padding:7px 10px;text-align:center">상태</th>'+
        '</tr></thead><tbody>';

      cats[cat].forEach(function(k){
        var s=stock[k];
        var total=(s.qty||0)*(s.unitCost||0);
        var status=s.qty<=0?'<span style="color:#dc2626;font-weight:700">품절</span>':
                   s.qty<=10?'<span style="color:#f59e0b;font-weight:700">부족</span>':
                   '<span style="color:#10b981;font-weight:700">정상</span>';
        html+='<tr style="border-bottom:1px solid var(--border)">'+
          '<td style="padding:7px 10px;font-weight:600">'+esc(s.name)+'</td>'+
          '<td style="padding:7px 10px;text-align:right;font-weight:700">'+s.qty.toLocaleString()+'</td>'+
          '<td style="padding:7px 10px;text-align:right">₩'+s.unitCost.toLocaleString()+'</td>'+
          '<td style="padding:7px 10px;text-align:right">₩'+total.toLocaleString()+'</td>'+
          '<td style="padding:7px 10px;text-align:center">'+status+'</td>'+
        '</tr>';
      });

      html+='</tbody></table></div>';
    });
    html+='</div>';
    c.innerHTML=html;
  }).catch(function(e){c.innerHTML='<div class="empty">오류: '+e.message+'</div>';});
}

function _loadInventoryIn(did){
  var c=document.getElementById('inv-content');
  c.innerHTML='<div class="loading">⏳ 로딩 중...</div>';
  _db.collection('inventory_in').where('dealerId','==',did).orderBy('createdAt','desc').limit(100).get()
    .then(function(snap){
      if(snap.empty){c.innerHTML='<div class="empty">입고 내역이 없습니다</div>';return;}
      var html='<table style="width:100%;border-collapse:collapse;font-size:12px">'+
        '<thead><tr style="background:var(--bg3)">'+
          '<th style="padding:7px 10px;text-align:left">날짜</th>'+
          '<th style="padding:7px 10px;text-align:left">품목</th>'+
          '<th style="padding:7px 10px;text-align:left">카테고리</th>'+
          '<th style="padding:7px 10px;text-align:right">수량</th>'+
          '<th style="padding:7px 10px;text-align:right">단가</th>'+
          '<th style="padding:7px 10px;text-align:left">거래처</th>'+
        '</tr></thead><tbody>';
      snap.forEach(function(doc){
        var d=doc.data();
        var dt=d.date||'';
        html+='<tr style="border-bottom:1px solid var(--border)">'+
          '<td style="padding:7px 10px">'+esc(dt)+'</td>'+
          '<td style="padding:7px 10px;font-weight:600">'+esc(d.itemName||'')+'</td>'+
          '<td style="padding:7px 10px">'+esc(d.category||'')+'</td>'+
          '<td style="padding:7px 10px;text-align:right">'+((d.qty||0).toLocaleString())+'</td>'+
          '<td style="padding:7px 10px;text-align:right">₩'+((d.unitCost||0).toLocaleString())+'</td>'+
          '<td style="padding:7px 10px">'+esc(d.supplier||'')+'</td>'+
        '</tr>';
      });
      html+='</tbody></table>';
      c.innerHTML=html;
    }).catch(function(e){c.innerHTML='<div class="empty">오류: '+e.message+'</div>';});
}

function _loadInventoryOut(did){
  var c=document.getElementById('inv-content');
  c.innerHTML='<div class="loading">⏳ 로딩 중...</div>';
  _db.collection('inventory_out').where('dealerId','==',did).orderBy('createdAt','desc').limit(100).get()
    .then(function(snap){
      if(snap.empty){c.innerHTML='<div class="empty">출고 내역이 없습니다</div>';return;}
      var html='<table style="width:100%;border-collapse:collapse;font-size:12px">'+
        '<thead><tr style="background:var(--bg3)">'+
          '<th style="padding:7px 10px;text-align:left">날짜</th>'+
          '<th style="padding:7px 10px;text-align:left">품목</th>'+
          '<th style="padding:7px 10px;text-align:right">수량</th>'+
          '<th style="padding:7px 10px;text-align:left">담당자</th>'+
          '<th style="padding:7px 10px;text-align:left">비고</th>'+
        '</tr></thead><tbody>';
      snap.forEach(function(doc){
        var d=doc.data();
        html+='<tr style="border-bottom:1px solid var(--border)">'+
          '<td style="padding:7px 10px">'+esc(d.date||'')+'</td>'+
          '<td style="padding:7px 10px;font-weight:600">'+esc(d.itemName||'')+'</td>'+
          '<td style="padding:7px 10px;text-align:right">'+((d.qty||0).toLocaleString())+'</td>'+
          '<td style="padding:7px 10px">'+esc(d.worker||'')+'</td>'+
          '<td style="padding:7px 10px">'+esc(d.note||'')+'</td>'+
        '</tr>';
      });
      html+='</tbody></table>';
      c.innerHTML=html;
    }).catch(function(e){c.innerHTML='<div class="empty">오류: '+e.message+'</div>';});
}

function pageInventoryIn(){
  var did=_CU.dealerId||_CU.uid;
  var html=
    '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px">'+
    '<div style="background:var(--bg);border-radius:14px;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
        '<div style="font-size:14px;font-weight:800">📥 입고등록</div>'+
        '<button onclick="_closeTopModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2)">✕</button>'+
      '</div>'+
      '<div style="display:grid;gap:10px">'+
        _invField('품목명 *','inv-item-name','text','예: 카스500캔')+
        _invField('품목코드','inv-item-code','text','예: K001')+
        _invField('카테고리','inv-category','text','예: 국산맥주')+
        _invField('수량 *','inv-qty','number','0')+
        _invField('단가(원)','inv-unit-cost','number','0')+
        _invField('거래처','inv-supplier','text','예: OB맥주')+
        _invField('입고일','inv-date','date','')+
        _invField('비고','inv-note','text','')+
      '</div>'+
      '<button onclick="_saveInventoryIn()" style="width:100%;margin-top:16px;padding:12px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer">💾 입고 저장</button>'+
    '</div></div>';
  var el=document.createElement('div'); el.innerHTML=html;
  document.body.appendChild(el.firstChild);
}

function _invField(label,id,type,placeholder){
  return '<div>'+
    '<label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">'+label+'</label>'+
    '<input id="'+id+'" type="'+type+'" placeholder="'+placeholder+'" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:12px">'+
  '</div>';
}

function _saveInventoryIn(){
  var did=_CU.dealerId||_CU.uid;
  var name=(document.getElementById('inv-item-name')||{}).value||'';
  var qty=parseInt((document.getElementById('inv-qty')||{}).value)||0;
  if(!name||!qty){toast('품목명과 수량은 필수입니다');return;}

  var data={
    dealerId:did,
    itemName:name,
    itemCode:(document.getElementById('inv-item-code')||{}).value||'',
    category:(document.getElementById('inv-category')||{}).value||'미분류',
    qty:qty,
    unitCost:parseInt((document.getElementById('inv-unit-cost')||{}).value)||0,
    supplier:(document.getElementById('inv-supplier')||{}).value||'',
    date:(document.getElementById('inv-date')||{}).value||new Date().toISOString().split('T')[0],
    note:(document.getElementById('inv-note')||{}).value||'',
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  _db.collection('inventory_in').add(data).then(function(){
    toast('✅ 입고 저장됨: '+name+' '+qty+'개');
    document.querySelector('div[style*="fixed"]').remove();
    pageInventory();
  }).catch(function(e){toast('❌ '+e.message);});
}

function pageInventoryOut(){
  var did=_CU.dealerId||_CU.uid;
  // 품목 목록 먼저 로드
  _db.collection('inventory_in').where('dealerId','==',did).get().then(function(snap){
    var items={};
    snap.forEach(function(doc){
      var d=doc.data();
      var k=d.itemCode||d.itemName;
      items[k]=d.itemName||k;
    });
    var itemOptions=Object.keys(items).map(function(k){
      return '<option value="'+esc(k)+'">'+esc(items[k])+'</option>';
    }).join('');

    var html=
      '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px">'+
      '<div style="background:var(--bg);border-radius:14px;padding:20px;width:100%;max-width:480px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
          '<div style="font-size:14px;font-weight:800">📤 출고등록</div>'+
          '<button onclick="_closeTopModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2)">✕</button>'+
        '</div>'+
        '<div style="display:grid;gap:10px">'+
          '<div><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">품목 *</label>'+
          '<select id="inv-out-item" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:12px">'+itemOptions+'</select></div>'+
          _invField('수량 *','inv-out-qty','number','0')+
          _invField('담당자','inv-out-worker','text','')+
          _invField('출고일','inv-out-date','date','')+
          _invField('비고','inv-out-note','text','')+
        '</div>'+
        '<button onclick="_saveInventoryOut()" style="width:100%;margin-top:16px;padding:12px;background:#10b981;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer">💾 출고 저장</button>'+
      '</div></div>';
    var el=document.createElement('div'); el.innerHTML=html;
    document.body.appendChild(el.firstChild);
  });
}

function _saveInventoryOut(){
  var did=_CU.dealerId||_CU.uid;
  var itemCode=(document.getElementById('inv-out-item')||{}).value||'';
  var qty=parseInt((document.getElementById('inv-out-qty')||{}).value)||0;
  if(!itemCode||!qty){toast('품목과 수량은 필수입니다');return;}

  var data={
    dealerId:did,
    itemCode:itemCode,
    itemName:itemCode,
    qty:qty,
    worker:(document.getElementById('inv-out-worker')||{}).value||'',
    date:(document.getElementById('inv-out-date')||{}).value||new Date().toISOString().split('T')[0],
    note:(document.getElementById('inv-out-note')||{}).value||'',
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  _db.collection('inventory_out').add(data).then(function(){
    toast('✅ 출고 저장됨: '+qty+'개');
    document.querySelector('div[style*="fixed"]').remove();
    pageInventory();
  }).catch(function(e){toast('❌ '+e.message);});
}

</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--bg4:#252840;
  --border:#2e3250;--border2:#3a3f6e;
  --acc:#4f7eff;--acc2:#7c5cff;--acc3:#00d4aa;
  --text:#e8eaf6;--text2:#9ca3c9;--text3:#5c6494;
  --red:#ff4d6d;--green:#00d4aa;--yellow:#ffc53d;--orange:#ff8c42;
  --card-shadow:0 2px 12px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sidebar-logo .logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;}
.sidebar-logo .logo-text{font-weight:700;font-size:15px;letter-spacing:-.3px;}
.sidebar-logo .logo-sub{font-size:9px;color:var(--text3);margin-top:1px;}
.nav{flex:1;overflow-y:auto;padding:8px 0;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;color:var(--text2);transition:all .15s;border-left:3px solid transparent;font-size:12px;font-weight:500;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--bg3);color:var(--acc);border-left-color:var(--acc);}
.nav-item .ni{width:16px;text-align:center;font-size:14px;}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);}
.user-chip{background:var(--bg3);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.user-chip .avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.user-chip .uinfo{flex:1;min-width:0;}
.user-chip .uname{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-chip .uemail{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;}
.topbar-title{font-weight:700;font-size:15px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.content{flex:1;padding:20px;}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--card-shadow);}
.card-title{font-weight:700;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.card-title .badge{background:var(--acc);color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:600;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--acc);color:#fff;}
.btn-primary:hover{background:#3d6de0;}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg4);color:var(--text);}
.btn-success{background:var(--green);color:#000;}
.btn-danger{background:var(--red);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fg label{font-size:11px;color:var(--text2);font-weight:600;}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc);}
.fg select option{background:var(--bg3);}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.num{text-align:right;font-variant-numeric:tabular-nums;}

/* ── CHIPS & BADGES ── */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.chip-green{background:rgba(0,212,170,.15);color:var(--green);}
.chip-red{background:rgba(255,77,109,.15);color:var(--red);}
.chip-blue{background:rgba(79,126,255,.15);color:var(--acc);}
.chip-yellow{background:rgba(255,197,61,.15);color:var(--yellow);}

/* ── STEPPER ── */
.stepper{display:flex;align-items:center;margin-bottom:20px;gap:0;}
.step{display:flex;align-items:center;gap:8px;flex:1;}
.step:last-child{flex:none;}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid var(--border);background:var(--bg3);color:var(--text3);}
.step.done .step-circle{background:var(--green);border-color:var(--green);color:#000;}
.step.active .step-circle{background:var(--acc);border-color:var(--acc);color:#fff;}
.step-label{font-size:11px;color:var(--text3);font-weight:500;}
.step.active .step-label{color:var(--text);font-weight:600;}
.step.done .step-label{color:var(--green);}
.step-line{flex:1;height:1px;background:var(--border);margin:0 6px;}
.step-line.done{background:var(--green);}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:rgba(79,126,255,.06);}
.upload-icon{font-size:36px;margin-bottom:8px;}
.upload-title{font-weight:700;font-size:14px;margin-bottom:4px;}
.upload-sub{color:var(--text3);font-size:11px;}

/* ── MAPPING UI ── */
.mapping-grid{display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;gap:8px;margin-bottom:8px;}
.map-field{background:var(--bg3);border:1px solid var(--acc);border-radius:8px;padding:7px 10px;font-size:11px;font-weight:600;color:var(--acc);}
.map-arrow{color:var(--text3);text-align:center;font-size:14px;}
.map-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:11px;font-family:inherit;outline:none;width:100%;}
.map-select:focus{border-color:var(--acc);}
.map-select option{background:var(--bg3);}
.map-required{font-size:9px;color:var(--red);margin-left:4px;}
.map-optional{font-size:9px;color:var(--text3);margin-left:4px;}

/* ── RESULT TABLE ── */
.result-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:700;}
.stat-val.green{color:var(--green);}
.stat-val.blue{color:var(--acc);}

/* ── TEMPLATE LIST ── */
.tmpl-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.tmpl-item:hover{border-color:var(--acc);background:var(--bg4);}
.tmpl-item.selected{border-color:var(--acc);background:rgba(79,126,255,.08);}
.tmpl-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tmpl-info{flex:1;}
.tmpl-name{font-size:12px;font-weight:600;}
.tmpl-desc{font-size:10px;color:var(--text3);margin-top:2px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);color:var(--text);padding:9px 18px;border-radius:24px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:all .25s;z-index:9999;pointer-events:none;border:1px solid var(--border2);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .big{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-logo .sub{font-size:11px;color:var(--text3);margin-top:4px;}
.login-err{color:var(--red);font-size:11px;text-align:center;margin-top:8px;min-height:16px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;padding:22px;}
.modal-title{font-weight:700;font-size:15px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text2);}
.empty-sub{font-size:11px;}
</style>
</head>

var _db, _auth, _CU, _dealerId;

function _nav(el,page){
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active');});
  el.classList.add('active');
  _renderPage(page);
}

function _renderPage(page){
  var titles={stock:'📦 재고 현황',in:'📥 입고 관리',out:'📤 출고 관리',master:'📋 품목 마스터',dashboard:'📊 대시보드'};
  document.getElementById('page-title').textContent=titles[page]||page;
  document.getElementById('main-content').innerHTML='';
  document.getElementById('topbar-actions').innerHTML='';
  if(page==='stock')    _loadInventoryStock();
  else if(page==='in')  pageInventoryIn();
  else if(page==='out') pageInventoryOut();
  else if(page==='master') pageInventory();
  else if(page==='dashboard') pageInventory();
}

function _initApp(){
  _renderPage('stock');
}
</script>
<script>
// Firebase
firebase.initializeApp({

});
var _db=firebase.firestore();
var _auth=firebase.auth();
var _cu=null; var _dealer=null;

function toast(msg,dur){
  var t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},dur||2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function _logout(){
  _auth.signOut().then(function(){location.reload();});
}

// 로그인 체크
_auth.onAuthStateChanged(function(user){
  if(!user){_showLogin();return;}
  _cu=user;
  document.getElementById('user-email').textContent=user.email||'';
  _db.collection('companies').where('adminEmail','==',user.email).limit(1).get()
  .then(function(snap){
    if(!snap.empty){
      _dealer=snap.docs[0].data();_dealer.id=snap.docs[0].id;
      var cn=document.getElementById('company-name');
      if(cn)cn.textContent=_dealer.companyName||_dealer.name||'';
    }
    _initApp();
  }).catch(function(){_initApp();});
});

function _showLogin(){
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)">'+

      '<input id="login-pw" type="password" placeholder="비밀번호" style="width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:16px">'+
      '<button onclick="_doLogin()" style="width:100%;padding:12px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer">로그인</button>'+

}

function _doLogin(){
  var email=(document.getElementById('login-email')||{}).value||'';
  var pw=(document.getElementById('login-pw')||{}).value||'';

}
