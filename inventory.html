<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>재고관리 — mbtico.kr</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--border:#2e3250;--text:#e8eaf6;--text2:#9da3c8;--text3:#5a5f7a;--acc:#f59e0b;--green:#00ff94;--red:#ff4d6d;--blue:#00d4ff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
/* 사이드바 */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-size:18px;font-weight:900;color:var(--acc);margin-bottom:2px}
.sidebar-sub{font-size:10px;color:var(--text3)}
.sidebar-user{padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text3)}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--acc);border-left-color:var(--acc)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.btn-logout{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:11px;cursor:pointer}
/* 메인 */
.main{flex:1;overflow-y:auto;padding:20px}
.page-title{font-size:16px;font-weight:900;margin-bottom:16px}
/* 카드 */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:900;color:var(--acc)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
/* 테이블 */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:8px 10px;text-align:left;color:var(--text3);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:var(--bg3)}
/* 버튼 */
.btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-acc{background:var(--acc);color:#000}
.btn-gray{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.btn-red{background:rgba(255,77,109,.15);border:1px solid var(--red);color:var(--red)}
/* 입력 */
.inp{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.inp:focus{outline:none;border-color:var(--acc)}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px;display:block}
/* 배지 */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-green{background:rgba(0,255,148,.15);color:var(--green)}
.badge-red{background:rgba(255,77,109,.15);color:var(--red)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--acc)}
/* 모바일 */
@media(max-width:640px){
  .sidebar{display:none}
  .mobile-header{display:flex!important}
}
.mobile-header{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;justify-content:space-between}
.mobile-logo{font-size:16px;font-weight:900;color:var(--acc)}
/* 로그인 */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:360px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .big{font-size:24px;font-weight:900;color:var(--acc)}
.login-logo .sub{font-size:11px;color:var(--text3);margin-top:4px}
/* 팝업 */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.popup-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px}
.popup-title{font-size:15px;font-weight:900;margin-bottom:16px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-logo">
      <div class="big">📦 mbtico</div>
      <div class="sub">재고관리 시스템</div>
    </div>
    <div class="field">
      <label class="field-label">이메일</label>
      <input class="inp" id="l-email" type="email" placeholder="이메일 입력">
    </div>
    <div class="field">
      <label class="field-label">비밀번호</label>
      <input class="inp" id="l-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')_doLogin()">
    </div>
    <div id="l-err" style="color:var(--red);font-size:11px;text-align:center;min-height:16px;margin-bottom:8px"></div>
    <button class="btn btn-acc" style="width:100%;padding:12px" onclick="_doLogin()">로그인</button>
    <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--text3)">
      정산은 <a href="https://donway.ai.kr" style="color:var(--blue)">donway.ai.kr</a>에서
    </div>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app-screen" style="display:none">
  <!-- 모바일 헤더 -->
  <div class="mobile-header">
    <div class="mobile-logo">📦 재고관리</div>
    <button class="btn btn-gray" style="padding:6px 10px;font-size:11px" onclick="_showMobileMenu()">☰</button>
  </div>

  <div class="app">
    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">📦 mbtico</div>
        <div class="sidebar-sub">재고관리 시스템</div>
      </div>
      <div class="sidebar-user">
        <div id="sb-company" style="font-weight:700;color:var(--text2);margin-bottom:2px"></div>
        <div id="sb-email" style="font-size:10px"></div>
      </div>
      <div class="nav">
        <div class="nav-section">재고</div>
        <div class="nav-item active" onclick="_nav(this,'stock')"><span class="nav-icon">📦</span>재고 현황</div>
        <div class="nav-item" onclick="_nav(this,'in')"><span class="nav-icon">📥</span>입고 관리</div>
        <div class="nav-item" onclick="_nav(this,'out')"><span class="nav-icon">📤</span>출고 관리</div>
        <div class="nav-item" onclick="_nav(this,'master')"><span class="nav-icon">📋</span>품목 마스터</div>
        <div class="nav-section">분석</div>
        <div class="nav-item" onclick="_nav(this,'dashboard')"><span class="nav-icon">📊</span>대시보드</div>
        <div class="nav-section">설정</div>
        <div class="nav-item" onclick="_nav(this,'industry')"><span class="nav-icon">🏷️</span>업종 설정</div>
      </div>
      <div class="sidebar-footer">
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <a href="https://donway.ai.kr/settle" style="flex:1;display:block;text-align:center;padding:7px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);border-radius:8px;color:var(--blue);font-size:10px;font-weight:700;text-decoration:none">💰 정산</a>
          <a href="https://mbtico.kr/qr" style="flex:1;display:block;text-align:center;padding:7px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:8px;color:var(--acc);font-size:10px;font-weight:700;text-decoration:none">🔲 QR</a>
          <a href="https://mbtico.kr/kiosk" style="flex:1;display:block;text-align:center;padding:7px;background:rgba(123,47,255,.1);border:1px solid rgba(123,47,255,.2);border-radius:8px;color:#a78bfa;font-size:10px;font-weight:700;text-decoration:none">🖥️ POS</a>
        </div>
        <button class="btn-logout" onclick="_logout()">로그아웃</button>
      </div>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="main" id="main-content">
      <div style="text-align:center;padding:40px;color:var(--text3)">⏳ 로딩 중...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

var _curInvIndustry='beauty';
function _getDefaultItems(ind){
  var db=INVENTORY_DB[ind];if(!db)return[];
  var items=[];
  db.categories.forEach(function(cat){
    cat.items.forEach(function(item){

<script>
firebase.initializeApp({
  apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
  authDomain:'mbti-logistics.firebaseapp.com',
  projectId:'mbti-logistics',
  storageBucket:'mbti-logistics.firebasestorage.app',
  messagingSenderId:'424881832661',
  appId:'1:40761160761:web:20545b610f03f534e949e8'
});
var _db=firebase.firestore();
var _auth=firebase.auth();
var _cu=null;
var _dealer=null;
var _curPage='stock';

function toast(msg,dur){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},dur||2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function comma(n){return Number(n||0).toLocaleString();}

// ━━━ 인증 ━━━
_auth.onAuthStateChanged(function(user){
  if(!user){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
    return;
  }
  _cu=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('sb-email').textContent=user.email||'';

  // companies 조회
  _db.collection('companies').where('adminEmail','==',user.email).limit(1).get()
  .then(function(snap){
    if(!snap.empty){
      _dealer=snap.docs[0].data();_dealer.id=snap.docs[0].id;
      document.getElementById('sb-company').textContent=_dealer.companyName||_dealer.name||'';
      if(_dealer.industryType&&INVENTORY_DB[_dealer.industryType]){
        _curInvIndustry=_dealer.industryType;
      }
    }
    _nav(null,'stock');
  }).catch(function(){_nav(null,'stock');});
});

function _doLogin(){
  var email=(document.getElementById('l-email')||{}).value||'';
  var pw=(document.getElementById('l-pw')||{}).value||'';
  var err=document.getElementById('l-err');
  if(!email||!pw){if(err)err.textContent='이메일과 비밀번호를 입력하세요';return;}
  _auth.signInWithEmailAndPassword(email,pw).catch(function(e){
    if(err)err.textContent='로그인 실패: 이메일/비밀번호 확인';
  });
}

function _logout(){
  _auth.signOut().then(function(){location.reload();});
}

// ━━━ 네비게이션 ━━━
function _nav(el,page){
  _curPage=page;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  if(el)el.classList.add('active');
  var c=document.getElementById('main-content');
  if(page==='stock')     _pageStock(c);
  else if(page==='in')   _pageIn(c);
  else if(page==='out')  _pageOut(c);
  else if(page==='master') _pageMaster(c);
  else if(page==='dashboard') _pageDashboard(c);
  else if(page==='industry') _pageIndustry(c);
}

function _getDid(){return _dealer?_dealer.id:(_cu?_cu.uid:'');}

// ━━━ 재고 현황 ━━━
function _pageStock(c){
  if(!c)c=document.getElementById('main-content');
  var ind=INVENTORY_DB[_curInvIndustry];
  c.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
      '<div class="page-title">📦 재고 현황 · '+(ind?ind.label:'')+'</div>'+
      '<div style="display:flex;gap:8px">'+
        '<button class="btn btn-acc" onclick="_nav(null,\'in\')">+ 입고</button>'+
        '<button class="btn btn-gray" onclick="_nav(null,\'out\')">- 출고</button>'+
      '</div>'+
    '</div>'+
    '<div id="stock-list"><div style="text-align:center;padding:30px;color:var(--text3)">⏳ 로딩 중...</div></div>';

  var did=_getDid();
  Promise.all([
    _db.collection('inventory_in').where('dealerId','==',did).get(),
    _db.collection('inventory_out').where('dealerId','==',did).get(),
    _db.collection('inventory').where('dealerId','==',did).get()
  ]).then(function(results){
    var inDocs=results[0],outDocs=results[1],masterDocs=results[2];
    var stock={};

    // 마스터 품목
    masterDocs.forEach(function(d){
      var v=d.data();
      var k=v.itemCode||v.name||d.id;
      stock[k]={name:v.name||k,category:v.category||'기타',unit:v.unit||'개',minQty:v.minQty||0,qty:0,unitCost:v.price||0};
    });

    // 입고
    inDocs.forEach(function(d){
      var v=d.data();
      var k=v.itemCode||v.itemName||'기타';
      if(!stock[k])stock[k]={name:v.itemName||k,category:v.category||'기타',unit:v.unit||'개',minQty:0,qty:0,unitCost:v.unitCost||0};
      stock[k].qty+=(v.qty||0);
      if(v.unitCost)stock[k].unitCost=v.unitCost;
    });

    // 출고
    outDocs.forEach(function(d){
      var v=d.data();
      var k=v.itemCode||v.itemName||'기타';
      if(stock[k])stock[k].qty-=(v.qty||0);
    });

    var items=Object.values(stock);
    if(!items.length){
      document.getElementById('stock-list').innerHTML=
        '<div style="text-align:center;padding:40px;color:var(--text3)">'+
          '<div style="font-size:32px;margin-bottom:8px">📦</div>'+
          '<div>재고 없음</div>'+
          '<div style="font-size:11px;margin-top:6px">업종 설정 후 기본 품목을 추가하세요</div>'+
          '<button class="btn btn-acc" style="margin-top:12px" onclick="_nav(null,\'industry\')">업종 설정 →</button>'+
        '</div>';
      return;
    }

    // 부족 품목
    var low=items.filter(function(i){return i.minQty>0&&i.qty<=i.minQty;});
    var html='';
    if(low.length){
      html+='<div style="background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:12px;margin-bottom:12px">'+
        '<div style="font-size:12px;font-weight:800;color:var(--red);margin-bottom:6px">⚠️ 재고 부족 ('+low.length+'개)</div>'+
        low.map(function(i){return '<div style="font-size:11px;color:var(--text2);margin-top:3px">'+esc(i.name)+' — 현재 '+i.qty+i.unit+'</div>';}).join('')+
      '</div>';
    }

    html+='<div class="table-wrap"><table>'+
      '<tr><th>품목명</th><th>카테고리</th><th>현재고</th><th>단위</th><th>최소수량</th><th>상태</th></tr>'+
      items.map(function(i){
        var isLow=i.minQty>0&&i.qty<=i.minQty;
        return '<tr>'+
          '<td style="font-weight:700">'+esc(i.name)+'</td>'+
          '<td>'+esc(i.category)+'</td>'+
          '<td style="font-weight:900;color:'+(isLow?'var(--red)':'var(--green)')+'">'+i.qty+'</td>'+
          '<td>'+esc(i.unit)+'</td>'+
          '<td>'+i.minQty+'</td>'+
          '<td><span class="badge '+(isLow?'badge-red':'badge-green')+'">'+(isLow?'부족':'정상')+'</span></td>'+
        '</tr>';
      }).join('')+
    '</table></div>';

    document.getElementById('stock-list').innerHTML=html;
  }).catch(function(e){
    document.getElementById('stock-list').innerHTML='<div style="color:var(--red);padding:16px">'+esc(e.message)+'</div>';
  });
}

function _pageDashboard(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  var ym=new Date().toISOString().slice(0,7);
  c.innerHTML='<div class="page-title" style="margin-bottom:16px">📊 대시보드 · '+ym+'</div>'+
    '<div class="stat-grid" id="dash-stats"><div style="text-align:center;padding:20px;color:var(--text3)">⏳ 로딩 중...</div></div>'+
    '<div id="dash-low"></div>';

  Promise.all([
    _db.collection('inventory_in').where('dealerId','==',did).where('ym','==',ym).get(),
    _db.collection('inventory_out').where('dealerId','==',did).where('ym','==',ym).get(),
    _db.collection('inventory').where('dealerId','==',did).get(),
  ]).then(function(results){
    var inDocs=results[0],outDocs=results[1],masterDocs=results[2];
    var inTotal=0,outTotal=0,inCount=0,outCount=0;
    inDocs.forEach(function(d){var v=d.data();inTotal+=v.totalCost||0;inCount++;});
    outDocs.forEach(function(d){var v=d.data();outTotal+=v.totalCost||0;outCount++;});

    // 현재고 계산
    var stock={};
    masterDocs.forEach(function(d){var v=d.data();stock[v.name]={qty:0,minQty:v.minQty||0,unit:v.unit||'개'};});
    inDocs.forEach(function(d){var v=d.data();var k=v.itemName||v.itemCode||'';if(stock[k])stock[k].qty+=v.qty||0;});
    outDocs.forEach(function(d){var v=d.data();var k=v.itemName||v.itemCode||'';if(stock[k])stock[k].qty-=v.qty||0;});
    var lowCount=Object.values(stock).filter(function(i){return i.minQty>0&&i.qty<=i.minQty;}).length;

    var el=document.getElementById('dash-stats');
    if(el)el.innerHTML=
      '<div class="stat-card"><div class="stat-val">'+inCount+'건</div><div class="stat-label">이번달 입고</div><div style="font-size:11px;color:var(--blue);margin-top:4px">₩'+comma(inTotal)+'</div></div>'+
      '<div class="stat-card"><div class="stat-val">'+outCount+'건</div><div class="stat-label">이번달 출고</div><div style="font-size:11px;color:var(--red);margin-top:4px">-₩'+comma(outTotal)+'</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:var(--green)">₩'+comma(inTotal-outTotal)+'</div><div class="stat-label">재고 잔액</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:'+(lowCount?'var(--red)':'var(--green)')+'">'+lowCount+'개</div><div class="stat-label">부족 품목</div></div>';

    if(lowCount){
      var low=Object.entries(stock).filter(function(e){return e[1].minQty>0&&e[1].qty<=e[1].minQty;});
      var el2=document.getElementById('dash-low');
      if(el2)el2.innerHTML=
        '<div style="background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:14px;margin-top:12px">'+
          '<div style="font-size:12px;font-weight:800;color:var(--red);margin-bottom:8px">⚠️ 발주 필요 품목</div>'+
          low.map(function(e){return '<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,77,109,.2)">'+
            '<span>'+esc(e[0])+'</span>'+
            '<span style="color:var(--red)">현재 '+e[1].qty+e[1].unit+' / 최소 '+e[1].minQty+e[1].unit+'</span>'+
          '</div>';}).join('')+
        '</div>';
    }
  }).catch(function(){});
}

// ━━━ 업종 설정 ━━━
function _pageIndustry(c){
  if(!c)c=document.getElementById('main-content');
  var html='<div class="page-title" style="margin-bottom:16px">🏷️ 업종 설정</div>'+
    '<div style="font-size:12px;color:var(--text3);margin-bottom:16px">업종에 맞는 기본 품목을 자동으로 추가합니다</div>'+
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px">';
  Object.keys(INVENTORY_DB).forEach(function(key){
    var db=INVENTORY_DB[key];
    var isCur=(key===_curInvIndustry);
    html+='<div style="background:var(--bg2);border:2px solid '+(isCur?'var(--acc)':'var(--border)')+';border-radius:12px;padding:14px;cursor:pointer" onclick="_setIndustry(\''+key+'\')">'+
      '<div style="font-size:20px;margin-bottom:6px">'+db.label.split(' ')[0]+'</div>'+
      '<div style="font-size:12px;font-weight:700;color:'+(isCur?'var(--acc)':'var(--text)')+'">'+db.label.split(' ').slice(1).join(' ')+'</div>'+
      '<div style="font-size:10px;color:var(--text3);margin-top:4px">'+db.categories.length+'개 카테고리</div>'+
      (isCur?'<div style="font-size:10px;color:var(--acc);font-weight:700;margin-top:4px">✅ 선택됨</div>':'')+
    '</div>';
  });
  html+='</div><button class="btn btn-acc" onclick="_addDefaults()" style="width:100%;padding:13px;font-size:13px;font-weight:800">📦 '+INVENTORY_DB[_curInvIndustry].label+' 기본 품목 추가</button>'+
    '<div style="font-size:11px;color:var(--text3);margin-top:8px;text-align:center">기존 품목은 유지되고 새 품목만 추가됩니다</div>';
  c.innerHTML=html;
}

function _setIndustry(key){
  if(!INVENTORY_DB[key])return;
  _curInvIndustry=key;
  _pageIndustry(document.getElementById('main-content'));
}

function _addDefaults(){
  var did=_getDid();
  if(!did){toast('로그인 필요');return;}
  var items=_getDefaultItems(_curInvIndustry);
  if(!items.length){toast('품목 없음');return;}
  var now=new Date().toISOString();
  var batch=items.map(function(item){
    return _db.collection('inventory').add({
      dealerId:did,name:item.name,category:item.category,
      categoryIcon:item.categoryIcon||'📦',unit:item.unit||'개',
      minQty:item.minQty||0,price:item.price||0,qty:0,
      industry:_curInvIndustry,createdAt:now,source:'default_template'
    });
  });
  Promise.all(batch).then(function(){
    toast('✅ '+items.length+'개 기본 품목 추가!',3000);
    setTimeout(function(){_nav(null,'master');},1000);
  }).catch(function(e){toast('❌ '+e.message);});
}

function _showMobileMenu(){
  toast('사이드바는 PC에서 사용하세요');
}
</script>
</body>
</html>
