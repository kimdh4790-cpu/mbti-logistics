<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#07071a">
<title>테이블 예약</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
 --bg:#07071a;--s1:#0c0c22;--s2:#14142a;--s3:#1a1a32;
 --br:#0891b2;--gr:#22c55e;--yl:#f59e0b;--rd:#ef4444;
 --tx:#f0f0ff;--t2:#9898c0;--t3:#565678;
 --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:'Apple SD Gothic Neo','Pretendard',sans-serif}
body{padding:16px;max-width:480px;margin:0 auto}
.logo{text-align:center;padding:20px 0 16px;font-size:22px;font-weight:900;background:linear-gradient(135deg,#38bdf8,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.store-name{text-align:center;font-size:16px;font-weight:700;color:var(--tx);margin-bottom:4px}
.store-sub{text-align:center;font-size:12px;color:var(--t3);margin-bottom:20px}
.legend{display:flex;gap:12px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.dot{width:10px;height:10px;border-radius:50%}
.table-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.table-card{background:var(--s2);border:1.5px solid var(--bd2);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.table-card.empty{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.06)}
.table-card.empty:active{transform:scale(.96)}
.table-card.occupied{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.06);cursor:not-allowed;opacity:.7}
.table-card.reserved{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.06);cursor:not-allowed;opacity:.8}
.table-icon{font-size:28px;margin-bottom:6px}
.table-num{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:3px}
.table-status{font-size:11px;color:var(--t2)}
.table-time{font-size:10px;color:var(--t3);margin-top:2px}
.loading{text-align:center;padding:40px 20px;color:var(--t2);font-size:14px}
.form-box{background:var(--s2);border:1px solid var(--bd2);border-radius:16px;padding:20px}
.form-title{font-size:16px;font-weight:800;margin-bottom:16px;color:var(--tx)}
.inp-group{margin-bottom:14px}
.inp-group label{display:block;font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:600}
.inp{width:100%;padding:12px 14px;background:var(--s3);border:1px solid var(--bd2);border-radius:10px;color:var(--tx);font-size:14px;outline:none}
.inp:focus{border-color:var(--br)}
.seats-row{display:flex;gap:8px;flex-wrap:wrap}
.seat-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--bd2);background:var(--s3);color:var(--t2);font-size:13px;cursor:pointer;transition:.15s}
.seat-btn.on{background:rgba(8,145,178,.2);border-color:var(--br);color:#38bdf8;font-weight:700}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#0891b2,#0369a1);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-cancel{width:100%;padding:12px;background:transparent;border:1px solid var(--bd2);border-radius:12px;color:var(--t2);font-size:14px;cursor:pointer;margin-top:8px}
.done-box{text-align:center;padding:32px 20px}
.done-icon{font-size:52px;margin-bottom:12px}
.done-title{font-size:22px;font-weight:900;color:var(--tx);margin-bottom:12px}
.done-sub{font-size:14px;color:var(--t2);line-height:1.7}
</style>
</head>
<body>
<div class="logo">FILO</div>
<div class="store-name" id="store-name">매장 로딩중...</div>
<div class="store-sub" id="store-sub">실시간 테이블 현황</div>
<div style="text-align:center;margin-bottom:12px">
 <span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:4px 12px;color:#22c55e">
  <span style="width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 1.5s infinite"></span>
  실시간 업데이트
 </span>
</div>
<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>
<div class="legend">
 <div class="legend-item"><div class="dot" style="background:#22c55e"></div>예약 가능</div>
 <div class="legend-item"><div class="dot" style="background:#ef4444"></div>사용 중</div>
 <div class="legend-item"><div class="dot" style="background:#f59e0b"></div>예약 완료</div>
</div>
<div id="main-view"><div class="loading">⏳ 테이블 현황 불러오는 중...</div></div>
<script>
var _API='/api';
var _P=new URLSearchParams(location.search);
var _DID=_P.get('did')||'';
var _PRE=_P.get('tid')||null;
var _TBL=[],_SEL=null,_SEATS=2,_TMR=null,_DONE=false;

function _load(){
 _DONE=false; /* 예약 화면 종료 → 폴링 재개 가능 */
 if(!_DID){_err('매장 정보가 없습니다. QR코드를 다시 스캔해주세요.');return;}
 fetch(_API+'/tables?did='+_DID)
 .then(function(r){return r.json();})
 .then(function(d){
  if(d.error){_err('테이블 정보를 불러오지 못했습니다.');return;}
  var n=d.storeName||'매장';
  document.getElementById('store-name').textContent=n;
  document.getElementById('store-sub').textContent='실시간 테이블 현황 · '+n;
  document.title=n+' — 테이블 예약';
  _TBL=d.tables||[];
  _render();
  if(_PRE){var t=_TBL.find(function(t){return String(t.num)===String(_PRE);});if(t&&t.status==='empty')_form(t);_PRE=null;}
  clearInterval(_TMR);_TMR=setInterval(_poll,10000);
 })
 .catch(function(){_err('네트워크 오류. 잠시 후 다시 시도해주세요.');});
}
function _poll(){
 if(_DONE)return; /* 예약 완료 화면 중 폴링 중단 */
 fetch(_API+'/tables?did='+_DID)
 .then(function(r){return r.json();})
 .then(function(d){if(d.tables&&!_DONE){_TBL=d.tables;_render();}})
 .catch(function(){});
}
function _render(){
 var v=document.getElementById('main-view');
 var g='<div class="table-grid">';
 _TBL.forEach(function(t){
  var c='table-card '+t.status;
  var i=t.status==='empty'?'🪑':t.status==='occupied'?'🍽':'📋';
  var s={'empty':'예약 가능','occupied':'사용 중','reserved':'예약 완료'}[t.status]||'';
  var x='';
  if(t.status==='occupied'&&t.occupiedSince){var m=Math.floor((Date.now()-new Date(t.occupiedSince))/60000);if(m>0)x=m+'분째 이용중';}
  if(t.status==='reserved'&&t.reservedName)x=t.reservedName+'님 예약';
  var o=t.status==='empty'?'onclick="_ot('+t.num+')"':'';
  g+='<div class="'+c+'" '+o+' data-num="'+t.num+'"><div class="table-icon">'+i+'</div><div class="table-num">'+t.name+'</div><div class="table-status">'+s+'</div>'+(x?'<div class="table-time">'+x+'</div>':'')+' </div>';
 });
 g+='</div>';
 var e=_TBL.filter(function(t){return t.status==='empty';}).length;
 v.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:13px;color:var(--t2)">전체 <b style="color:var(--tx)">'+_TBL.length+'</b>석</div><div style="font-size:13px;color:#22c55e;font-weight:700">빈 테이블 <b>'+e+'</b>석</div></div>'+g;
}
window._ot=function(n){var t=_TBL.find(function(t){return t.num===n;});if(!t||t.status!=='empty')return;_form(t);};
function _form(t){
 _SEL=t;_SEATS=2;
 document.getElementById('main-view').innerHTML='<div class="form-box"><div class="form-title">📋 예약하기 — '+t.name+'</div><div class="inp-group"><label>이름 *</label><input id="rn" class="inp" placeholder="홍길동" autocomplete="name"></div><div class="inp-group"><label>연락처 *</label><input id="rp" class="inp" type="tel" placeholder="010-0000-0000" autocomplete="tel"></div><div class="inp-group"><label>인원</label><div class="seats-row">'+[1,2,3,4,5,6].map(function(n){return '<div class="seat-btn'+(n===2?' on':'')+'" onclick="_ss('+n+')">'+n+'인</div>';}).join('')+'</div></div><div class="inp-group"><label>요청사항</label><input id="rm" class="inp" placeholder="창가 자리, 생일 등"></div><button class="btn-submit" onclick="_sub()">✅ 예약 확정</button><button class="btn-cancel" onclick="_load()">← 돌아가기</button></div>';
}
window._ss=function(n){_SEATS=n;document.querySelectorAll('.seat-btn').forEach(function(b){b.classList.remove('on');});document.querySelectorAll('.seat-btn')[n-1].classList.add('on');};
window._sub=function(){
 var n=(document.getElementById('rn')||{}).value||'';
 var p=(document.getElementById('rp')||{}).value||'';
 n=n.trim();p=p.trim();
 if(!n||!p){alert('이름과 연락처를 입력해주세요');return;}
 var b=document.querySelector('.btn-submit');b.disabled=true;b.textContent='예약 중...';
 var now=new Date().toISOString();
 fetch(_API+'/booking',{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({did:_DID,tableId:_SEL.id,tableNum:_SEL.num,tableName:_SEL.name,customerName:n,phone:p,seats:_SEATS,memo:(document.getElementById('rm')||{}).value||'',date:now.slice(0,10),time:now.slice(11,16)})
 }).then(function(r){return r.json();}).then(function(d){
  if(d.error){b.disabled=false;b.textContent='✅ 예약 확정';alert('오류: '+d.error);return;}
  _done(n,_SEL.name,_SEATS,now.slice(0,10),now.slice(11,16),d.bookingId);
 }).catch(function(){b.disabled=false;b.textContent='✅ 예약 확정';alert('오류가 발생했습니다');});
};
function _done(n,tn,s,rd,rt,bid){
 _DONE=true;clearInterval(_TMR); /* 테이블 폴링 중단 */
 document.getElementById('main-view').innerHTML='<div class="done-box"><div class="done-icon" id="di">⏳</div><div class="done-title" id="dt">확인 중...</div><div id="ds" class="done-sub"><b style="color:#38bdf8">'+tn+'</b><br>'+n+'님 <b>'+s+'인</b><br>'+rd+' '+rt+'<br><br><span style="color:var(--t3);font-size:12px">매장에서 예약을 확인하고 있습니다.<br>잠시만 기다려주세요.</span></div></div>';
 if(!bid)return;
 var ti=setInterval(function(){
  fetch(_API+'/booking-status?bid='+bid).then(function(r){return r.json();}).then(function(d){
   var ic=document.getElementById('di'),tt=document.getElementById('dt'),ds=document.getElementById('ds');
   if(d.status==='confirmed'){clearInterval(ti);if(ic)ic.textContent='🎉';if(tt)tt.textContent='예약 확정!';if(ds)ds.innerHTML='<b style="color:#38bdf8">'+tn+'</b><br>'+n+'님 <b>'+s+'인</b><br>'+rd+' '+rt+'<br><br><span style="color:#22c55e;font-size:13px;font-weight:700">✅ 예약이 확정됐습니다!</span>';}
   else if(d.status==='rejected'){clearInterval(ti);if(ic)ic.textContent='😔';if(tt)tt.textContent='예약 불가';if(ds)ds.innerHTML='<span style="color:#ef4444">해당 시간 예약이 어렵습니다.</span><br><button onclick="_load()" style="margin-top:16px;padding:10px 24px;background:rgba(8,145,178,.15);border:1px solid rgba(8,145,178,.3);border-radius:10px;color:#38bdf8;font-size:13px;cursor:pointer">← 다시 예약</button>';}
  }).catch(function(){});
 },3000);
}
function _err(m){document.getElementById('main-view').innerHTML='<div class="loading">⚠️ '+m+'</div>';}
_load();
</script>
</body>
</html>
