<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#07071a">
<title>테이블 예약</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
 --bg:#07071a;--s1:#0c0c22;--s2:#14142a;--s3:#1a1a32;
 --br:#0891b2;--gr:#22c55e;--yl:#f59e0b;--rd:#ef4444;
 --tx:#f0f0ff;--t2:#9898c0;--t3:#565678;
 --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:'Apple SD Gothic Neo','Pretendard',sans-serif}
body{padding:16px;max-width:480px;margin:0 auto}
.logo{text-align:center;padding:20px 0 16px;font-size:22px;font-weight:900;background:linear-gradient(135deg,#38bdf8,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.store-name{text-align:center;font-size:16px;font-weight:700;color:var(--tx);margin-bottom:4px}
.store-sub{text-align:center;font-size:12px;color:var(--t3);margin-bottom:20px}
/* 상태 범례 */
.legend{display:flex;gap:12px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.dot{width:10px;height:10px;border-radius:50%}
/* 테이블 그리드 */
.table-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.table-card{background:var(--s2);border:1.5px solid var(--bd2);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.table-card.empty{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.06)}
.table-card.empty:active{transform:scale(.96)}
.table-card.occupied{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.06);cursor:not-allowed;opacity:.7}
.table-card.reserved{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);cursor:not-allowed;opacity:.8}
.table-icon{font-size:24px;margin-bottom:6px}
.table-num{font-size:13px;font-weight:800}
.table-status{font-size:10px;margin-top:3px;font-weight:700}
.table-card.empty .table-status{color:#22c55e}
.table-card.occupied .table-status{color:#ef4444}
.table-card.reserved .table-status{color:#f59e0b}
.table-time{font-size:9px;color:var(--t3);margin-top:2px}
/* 예약 폼 */
.form-box{background:var(--s2);border:1px solid var(--bd2);border-radius:16px;padding:20px;margin-bottom:16px}
.form-title{font-size:15px;font-weight:800;margin-bottom:14px}
.inp-group{margin-bottom:12px}
.inp-group label{display:block;font-size:11px;font-weight:700;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:10px 12px;background:var(--s3);border:1px solid var(--bd2);border-radius:10px;color:var(--tx);font-size:14px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--br)}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#0891b2,#0e7490);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:-.3px}
.btn-cancel{width:100%;padding:10px;background:transparent;border:1px solid var(--bd2);border-radius:10px;color:var(--t3);font-size:13px;cursor:pointer;margin-top:8px}
/* 완료 */
.done-box{text-align:center;padding:40px 20px}
.done-icon{font-size:56px;margin-bottom:12px}
.done-title{font-size:20px;font-weight:900;margin-bottom:6px}
.done-sub{font-size:13px;color:var(--t2);line-height:1.6}
/* 로딩 */
.loading{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* 실시간 배지 */
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:#22c55e;font-weight:700;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:3px 10px;margin-bottom:14px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite}
.seats-row{display:flex;gap:8px;flex-wrap:wrap}
.seat-btn{flex:1;min-width:44px;padding:9px 6px;background:var(--s3);border:1.5px solid var(--bd2);border-radius:8px;color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.seat-btn.on{background:rgba(8,145,178,.15);border-color:var(--br);color:#38bdf8}
</style>
</head>
<body>

<div class="logo">FILO</div>
<div class="store-name" id="store-name">매장 로딩중...</div>
<div class="store-sub" id="store-sub">실시간 테이블 현황</div>

<div style="display:flex;justify-content:center">
 <div class="live-badge"><span class="live-dot"></span>실시간 업데이트</div>
</div>

<div class="legend">
 <div class="legend-item"><div class="dot" style="background:#22c55e"></div>예약 가능</div>
 <div class="legend-item"><div class="dot" style="background:#ef4444"></div>사용 중</div>
 <div class="legend-item"><div class="dot" style="background:#f59e0b"></div>예약 완료</div>
</div>

<div id="main-view">
 <div class="loading"><span class="pulse">⏳ 테이블 현황 불러오는 중...</span></div>
</div>

<script>
var FIREBASE_URL='https://firestore.googleapis.com/v1/projects/mbti-logistics/databases/(default)/documents';
var params=new URLSearchParams(location.search);
var DID=params.get('did')||'';
var PRE_TABLE=params.get('tid')||null;

var _tables=[];
var _selectedTable=null;
var _seats=2;
var _pollTimer=null;

function toNum(v){return parseInt(v)||0;}
function getField(f,k){var x=f[k];if(!x)return null;return x.stringValue!==undefined?x.stringValue:x.integerValue!==undefined?parseInt(x.integerValue):x.booleanValue!==undefined?x.booleanValue:null;}

/* 매장 정보 로드 */
function loadStore(){
 if(!DID){showError('매장 정보가 없습니다. QR코드를 다시 스캔해주세요.');return;}
 fetch(FIREBASE_URL+'/companies/'+DID)
 .then(function(r){return r.json();}).then(function(d){
  if(d&&d.fields){
   var f=d.fields;
   var name=getField(f,'storeName')||getField(f,'companyName')||getField(f,'name')||'매장';
   document.getElementById('store-name').textContent=name;
   document.getElementById('store-sub').textContent='실시간 테이블 현황 · '+name;
   document.title=name+' — 테이블 예약';
  }
  loadTables();
 }).catch(function(){loadTables();});
}

/* 테이블 현황 로드 */
function loadTables(){
 /* filo_tables 컬렉션에서 현황 조회 */
 fetch(FIREBASE_URL+':runQuery',{
  method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({structuredQuery:{
   from:[{collectionId:'filo_tables'}],
   where:{fieldFilter:{field:{fieldPath:'dealerId'},op:'EQUAL',value:{stringValue:DID}}},
   orderBy:[{field:{fieldPath:'tableNum'},direction:'ASCENDING'}]
  }})
 }).then(function(r){return r.json();}).then(function(rows){
  var docs=(rows||[]).filter(function(r){return r.document;});
  if(!docs.length){
   /* 테이블 설정 없으면 기본 10개 생성 */
   _tables=Array.from({length:10},function(_,i){return {id:'t'+(i+1),num:i+1,name:'테이블 '+(i+1),status:'empty',seats:4};});
  } else {
   _tables=docs.map(function(r){
    var f=r.document.fields||{};
    return {
     id:r.document.name.split('/').pop(),
     num:toNum(getField(f,'tableNum'))||1,
     name:getField(f,'tableName')||('테이블 '+getField(f,'tableNum')),
     status:getField(f,'status')||'empty',
     seats:toNum(getField(f,'seats'))||4,
     occupiedSince:getField(f,'occupiedSince')||'',
     reservedName:getField(f,'reservedName')||''
    };
   });
  }
  renderTables();
  /* 사전 선택된 테이블이 있으면 바로 폼 */
  if(PRE_TABLE){
   var t=_tables.find(function(t){return String(t.num)===String(PRE_TABLE);});
   if(t&&t.status==='empty')openForm(t);
   PRE_TABLE=null;
  }
  /* 10초 폴링 (REST API) */
  clearInterval(_pollTimer);
  _pollTimer=setInterval(loadTables,10000);
 }).catch(function(e){showError('데이터 로드 실패');});
}

function renderTables(){
 var view=document.getElementById('main-view');
 var grid='<div class="table-grid">';
 _tables.forEach(function(t){
  var cls='table-card '+t.status;
  var icon=t.status==='empty'?'🪑':t.status==='occupied'?'🍽':'📋';
  var statusTxt={'empty':'예약 가능','occupied':'사용 중','reserved':'예약 완료'}[t.status]||'';
  var timeTxt='';
  if(t.status==='occupied'&&t.occupiedSince){
   var m=Math.floor((Date.now()-new Date(t.occupiedSince))/60000);
   if(m>0)timeTxt=m+'분째 이용중';
  }
  if(t.status==='reserved'&&t.reservedName)timeTxt=t.reservedName+'님 예약';
  var onclick=t.status==='empty'?'onclick="_openTable('+t.num+')"':'';
  grid+='<div class="'+cls+'" '+onclick+' data-num="'+t.num+'">'+
   '<div class="table-icon">'+icon+'</div>'+
   '<div class="table-num">'+t.name+'</div>'+
   '<div class="table-status">'+statusTxt+'</div>'+
   (timeTxt?'<div class="table-time">'+timeTxt+'</div>':'')+
   '</div>';
 });
 grid+='</div>';

 var empty=_tables.filter(function(t){return t.status==='empty';}).length;
 var total=_tables.length;
 view.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
  '<div style="font-size:13px;color:var(--t2)">전체 <b style="color:var(--tx)">'+total+'</b>석</div>'+
  '<div style="font-size:13px;color:#22c55e;font-weight:700">빈 테이블 <b>'+empty+'</b>석</div>'+
  '</div>'+grid;
}

window._openTable=function(num){
 var t=_tables.find(function(t){return t.num===num;});
 if(!t||t.status!=='empty')return;
 openForm(t);
};

function openForm(t){
 _selectedTable=t;
 _seats=2;
 var view=document.getElementById('main-view');
 view.innerHTML='<div class="form-box">'+
  '<div class="form-title">📋 예약하기 — '+t.name+'</div>'+
  '<div class="inp-group"><label>이름 *</label><input id="r-name" class="inp" placeholder="홍길동" autocomplete="name"></div>'+
  '<div class="inp-group"><label>연락처 *</label><input id="r-phone" class="inp" type="tel" placeholder="010-0000-0000" autocomplete="tel"></div>'+
  '<div class="inp-group"><label>인원</label>'+
  '<div class="seats-row" id="seats-row">'+
  [1,2,3,4,5,6].map(function(n){return '<div class="seat-btn'+(n===2?' on':'')+'" onclick="_setSeat('+n+')">'+n+'인</div>';}).join('')+
  '</div></div>'+
  '<div class="inp-group"><label>요청사항</label><input id="r-memo" class="inp" placeholder="창가 자리, 생일 등 요청사항"></div>'+
  '<button class="btn-submit" onclick="_submitReserve()">✅ 예약 확정</button>'+
  '<button class="btn-cancel" onclick="loadTables()">← 돌아가기</button>'+
  '</div>';
}

window._setSeat=function(n){
 _seats=n;
 document.querySelectorAll('.seat-btn').forEach(function(b){b.classList.remove('on');});
 document.querySelectorAll('.seat-btn')[n-1].classList.add('on');
};

window._submitReserve=function(){
 var name=document.getElementById('r-name').value.trim();
 var phone=document.getElementById('r-phone').value.trim();
 if(!name||!phone){alert('이름과 연락처를 입력해주세요');return;}
 var btn=document.querySelector('.btn-submit');
 btn.disabled=true;btn.textContent='예약 중...';

 var now=new Date().toISOString();
 /* filo_bookings에 저장 */
 fetch(FIREBASE_URL+'/filo_bookings',{
  method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({fields:{
   dealerId:{stringValue:DID},
   tableId:{stringValue:_selectedTable.id},
   tableNum:{integerValue:_selectedTable.num},
   tableName:{stringValue:_selectedTable.name},
   customerName:{stringValue:name},
   phone:{stringValue:phone},
   seats:{integerValue:_seats},
   memo:{stringValue:document.getElementById('r-memo').value.trim()},
   status:{stringValue:'pending'},
   date:{stringValue:now.slice(0,10)},
   time:{stringValue:now.slice(11,16)},
   source:{stringValue:'qr_walk_in'},
   createdAt:{stringValue:now}
  }})
 }).then(function(r){return r.json();}).then(function(d){
  if(d.error){btn.disabled=false;btn.textContent='✅ 예약 확정';alert('오류: '+d.error.message);return;}
  /* filo_tables 상태 업데이트 */
  updateTableStatus(_selectedTable.id,'reserved',name);
  showDone(name,_selectedTable.name,_seats);
 }).catch(function(e){btn.disabled=false;btn.textContent='✅ 예약 확정';alert('오류가 발생했습니다');});
};

function updateTableStatus(tableId,status,reservedName){
 var fields={
  status:{stringValue:status},
  reservedName:{stringValue:reservedName||''},
  updatedAt:{stringValue:new Date().toISOString()}
 };
 fetch(FIREBASE_URL+'/filo_tables/'+DID+'_'+tableId+'?updateMask.fieldPaths=status&updateMask.fieldPaths=reservedName&updateMask.fieldPaths=updatedAt',{
  method:'PATCH',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({fields:fields})
 }).catch(function(){});
}

function showDone(name,tableName,seats){
 var view=document.getElementById('main-view');
 view.innerHTML='<div class="done-box">'+
  '<div class="done-icon">🎉</div>'+
  '<div class="done-title">예약 완료!</div>'+
  '<div class="done-sub">'+
  '<b style="color:#38bdf8">'+tableName+'</b><br>'+
  name+'님 <b>'+seats+'인</b> 예약이 접수됐습니다.<br><br>'+
  '<span style="color:var(--t3);font-size:12px">직원이 곧 안내해드립니다.</span>'+
  '</div>'+
  '<button onclick="loadTables()" style="margin-top:20px;padding:10px 24px;background:rgba(8,145,178,.15);border:1px solid rgba(8,145,178,.3);border-radius:10px;color:#38bdf8;font-size:13px;font-weight:700;cursor:pointer">← 테이블 현황 보기</button>'+
  '</div>';
}

function showError(msg){
 document.getElementById('main-view').innerHTML='<div class="loading">⚠️ '+msg+'</div>';
}

loadStore();
</script>
</body>
</html>
