name: Register Cloudflare Worker Routes

on:
  workflow_dispatch:

jobs:
  register-routes:
    runs-on: ubuntu-latest
    steps:
      - name: Register mbtico.kr Routes
        run: |
          CF_TOKEN="${{ secrets.CF_API_TOKEN }}"
          
          echo "=== mbtico.kr Zone ID 조회 ==="
          MBTICO_ZONE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=mbtico.kr" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',[]); print(r[0]['id'] if r else 'NONE')")
          echo "mbtico.kr Zone: $MBTICO_ZONE"

          if [ "$MBTICO_ZONE" != "NONE" ] && [ -n "$MBTICO_ZONE" ]; then
            echo "=== 기존 Routes 확인 ==="
            curl -s "https://api.cloudflare.com/client/v4/zones/$MBTICO_ZONE/workers/routes" \
              -H "Authorization: Bearer $CF_TOKEN" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); [print(r) for r in d.get('result',[])]"

            echo "=== mbtico.kr/* Route 등록 ==="
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$MBTICO_ZONE/workers/routes" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"pattern":"mbtico.kr/*","script":"mbti-logistics"}')
            echo "결과: $RESULT"
            echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Route 등록 성공!' if d.get('success') else '❌ 실패: '+str(d.get('errors','')))"
          else
            echo "❌ mbtico.kr Zone 없음"
            echo "Cloudflare에 mbtico.kr 도메인 등록 필요"
          fi

      - name: Register mbetco.kr Routes
        run: |
          CF_TOKEN="${{ secrets.CF_API_TOKEN }}"
          
          MBETCO_ZONE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=mbetco.kr" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',[]); print(r[0]['id'] if r else 'NONE')")
          echo "mbetco.kr Zone: $MBETCO_ZONE"

          if [ "$MBETCO_ZONE" != "NONE" ] && [ -n "$MBETCO_ZONE" ]; then
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$MBETCO_ZONE/workers/routes" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"pattern":"mbetco.kr/*","script":"mbti-logistics"}')
            echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ mbetco.kr Route 등록 성공!' if d.get('success') else '❌: '+str(d.get('errors','')))"
          else
            echo "⚠️ mbetco.kr Zone 없음"
          fi
