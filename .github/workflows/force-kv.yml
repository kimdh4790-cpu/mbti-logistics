name: Force KV Upload

on:
  workflow_dispatch:

jobs:
  force-kv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force upload order.js and filo-order-common.js to KV
        env:
          CF_EMAIL: kimdh4790@gmail.com
          CF_KEY: ${{ secrets.CF_GLOBAL_KEY }}
        run: |
          ACCOUNT="02709cbec18d848913b4246015b9148f"
          NS_ID="7f0e90efaea64f3ab08ff00f8970b28b"

          echo "=== order.js 업로드 ==="
          RESULT=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/storage/kv/namespaces/$NS_ID/values/order.js" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_KEY" \
            -H "Content-Type: application/javascript" \
            --data-binary @order.js)
          echo "$RESULT"
          echo "$RESULT" | grep -q '"success":true' && echo "✅ order.js OK" || echo "❌ order.js FAIL"

          echo "=== filo-order-common.js 업로드 ==="
          RESULT2=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/storage/kv/namespaces/$NS_ID/values/filo-order-common.js" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_KEY" \
            -H "Content-Type: application/javascript" \
            --data-binary @filo-order-common.js)
          echo "$RESULT2"
          echo "$RESULT2" | grep -q '"success":true' && echo "✅ filo-order-common.js OK" || echo "❌ filo-order-common.js FAIL"

          echo "=== KV 확인 ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/storage/kv/namespaces/$NS_ID/values/order.js" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_KEY" | head -c 200
