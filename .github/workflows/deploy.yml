name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Update sw.js cache key
        run: |
          TS=$(date +"%Y%m%d%H%M")
          sed -i "s/const CACHE = 'mbti-v9-[0-9]*/const CACHE = 'mbti-v9-$TS/" sw.js
          echo "Cache key updated: mbti-v9-$TS"

      - name: Upload settle.html to KV
        env:
          CF_KV_TOKEN: ${{ secrets.CF_KV_TOKEN }}
        run: |
          NS_ID="7f0e90efaea64f3ab08ff00f8970b28b"
          echo $NS_ID > kv_ns_id.txt
          echo "settle.html 크기: $(wc -c < settle.html) bytes"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/02709cbec18d848913b4246015b9148f/storage/kv/namespaces/$NS_ID/values/settle.html" \
            -H "Authorization: Bearer $CF_KV_TOKEN" \
            --data-binary @settle.html)
          echo "응답: $RESPONSE"
          if echo "$RESPONSE" | grep -q "HTTP_STATUS:200"; then
            echo "✅ KV 업로드 성공"
          else
            echo "❌ KV 업로드 실패"
            exit 1
          fi

      - name: Update wrangler.toml with KV binding
        run: |
          NS_ID=$(cat kv_ns_id.txt)
          echo "KV NS_ID: $NS_ID"
          echo 'name = "mbti-logistics"' > wrangler.toml
          echo 'main = "_worker.js"' >> wrangler.toml
          echo 'compatibility_date = "2025-11-01"' >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[[kv_namespaces]]' >> wrangler.toml
          echo 'binding = "DONWAY_ASSETS"' >> wrangler.toml
          echo "id = \"$NS_ID\"" >> wrangler.toml
          cat wrangler.toml

      - name: Deploy to Cloudflare Workers (curl API)
        run: |
          # Cloudflare Workers API로 직접 배포 (wrangler 우회)
          ACCOUNT_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')")
          echo "Account ID: $ACCOUNT_ID"
          
          if [ -n "$ACCOUNT_ID" ]; then
            # multipart form으로 worker 스크립트 업로드
            curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/mbti-logistics" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -F "metadata={"main_module":"_worker.js","bindings":[]};type=application/json" \
              -F "script=@_worker.js;type=application/javascript+module" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK' if d.get('success') else d.get('errors','fail'))"
            echo "✅ Worker 배포 완료"
          else
            echo "⚠️ Account ID 조회 실패 — wrangler 재시도"
            npx wrangler deploy || true
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy Firestore Rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            npm install -g firebase-tools
            firebase deploy --only firestore:rules --token "$FIREBASE_TOKEN" --project mbti-logistics
            echo "✅ Firestore rules 배포 완료"
          else
            echo "⚠️ FIREBASE_TOKEN 없음 — rules 배포 스킵"
          fi

      - name: Sync settle.html to backup
        continue-on-error: true  # 파일 크기 초과 시 무시
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, base64, os

          TOKEN = os.environ['GH_TOKEN']
          REPO = os.environ['REPO']

          # SHA 조회 (없으면 create)
          sha = None
          try:
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{REPO}/contents/backup/settle_latest.html",
                  headers={"Authorization": f"Bearer {TOKEN}", "Accept": "application/vnd.github+json"}
              )
              with urllib.request.urlopen(req) as r:
                  sha = json.loads(r.read())['sha']
          except Exception:
              sha = None

          with open('settle.html', 'rb') as f:
              content = base64.b64encode(f.read()).decode()

          body = {"message": "auto: settle_latest.html sync", "content": content}
          if sha:
              body["sha"] = sha
          payload = json.dumps(body).encode()

          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/contents/backup/settle_latest.html",
              data=payload, method="PUT",
              headers={"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json", "Accept": "application/vnd.github+json"}
          )
          with urllib.request.urlopen(req2) as r:
              result = json.loads(r.read())
              print(f"✅ backup 동기화 완료 → {result['commit']['sha'][:8]}")
          PYEOF
