name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Upload HTML files to KV via GitHub API
        env:
          GH_TOKEN: \${{ secrets.GITHUB_TOKEN }}
          CF_EMAIL: kimdh4790@gmail.com
          CF_KEY: \${{ secrets.CF_GLOBAL_KEY }}
        run: |
          NS_ID="7f0e90efaea64f3ab08ff00f8970b28b"
          ACCOUNT="02709cbec18d848913b4246015b9148f"
          REPO="kimdh4790-cpu/mbti-logistics"
          FILES="settle.html inventory.html qrpos.html kiosk.html mbtico_hub.html join.html admin_sub.html order.html donway_landing.html"
          
          for FILE in $FILES; do
            # GitHub API로 파일 다운로드
            curl -sL -H "Authorization: token $GH_TOKEN" \
              "https://raw.githubusercontent.com/$REPO/main/$FILE" \
              -o "/tmp/$FILE"
            
            if [ -f "/tmp/$FILE" ] && [ -s "/tmp/$FILE" ]; then
              RESP=$(curl -s -w "\nHTTP:%{http_code}" \
                -X PUT \
                "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/storage/kv/namespaces/$NS_ID/values/$FILE" \
                -H "X-Auth-Email: $CF_EMAIL" \
                -H "X-Auth-Key: $CF_KEY" \
                --data-binary @"/tmp/$FILE")
              STATUS=$(echo "$RESP" | tail -1)
              if [ "$STATUS" = "HTTP:200" ]; then
                echo "✅ $FILE"
              else
                echo "⚠️ $FILE 실패: $STATUS"
              fi
            fi
          done

      - name: Deploy Worker via CF API
        env:
          CF_EMAIL: kimdh4790@gmail.com
          CF_KEY: \${{ secrets.CF_GLOBAL_KEY }}
          GH_TOKEN: \${{ secrets.GITHUB_TOKEN }}
        run: |
          ACCOUNT="02709cbec18d848913b4246015b9148f"
          
          # worker.js 다운로드
          curl -sL -H "Authorization: token $GH_TOKEN" \
            "https://raw.githubusercontent.com/kimdh4790-cpu/mbti-logistics/main/_worker.js" \
            -o /tmp/_worker.js
          
          # Worker 배포
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/workers/scripts/mbti-logistics" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_KEY" \
            -F 'metadata={"main_module":"_worker.js","bindings":[{"type":"kv_namespace","name":"DONWAY_ASSETS","namespace_id":"7f0e90efaea64f3ab08ff00f8970b28b"}]};type=application/json' \
            -F "script=@/tmp/_worker.js;type=application/javascript+module")
          
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Worker 배포 성공' if d.get('success') else '❌: '+str(d.get('errors','')))"
