name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Upload all HTML files to KV
        env:
          CF_EMAIL: kimdh4790@gmail.com
          CF_KEY: ${{ secrets.CF_GLOBAL_KEY }}
        run: |
          NS_ID="7f0e90efaea64f3ab08ff00f8970b28b"
          ACCOUNT="02709cbec18d848913b4246015b9148f"
          FILES="settle.html inventory.html qrpos.html kiosk.html mbtico_hub.html join.html admin_sub.html order.html donway_landing.html"
          for FILE in $FILES; do
            if [ -f "$FILE" ]; then
              RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                -X PUT \
                "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/storage/kv/namespaces/$NS_ID/values/$FILE" \
                -H "X-Auth-Email: $CF_EMAIL" \
                -H "X-Auth-Key: $CF_KEY" \
                --data-binary @$FILE)
              if echo "$RESP" | grep -q "HTTP_STATUS:200"; then
                echo "✅ $FILE 업로드 성공"
              else
                echo "⚠️ $FILE 업로드 실패: $RESP"
              fi
            fi
          done

      - name: Deploy Worker via CF API
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          ACCOUNT_ID="02709cbec18d848913b4246015b9148f"
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/mbti-logistics" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -F 'metadata={"main_module":"_worker.js","bindings":[{"type":"kv_namespace","name":"DONWAY_ASSETS","namespace_id":"7f0e90efaea64f3ab08ff00f8970b28b"}]};type=application/json' \
            -F "script=@_worker.js;type=application/javascript+module")
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Worker 배포 성공' if d.get('success') else '❌: '+str(d.get('errors','')))"

      - name: Deploy Firestore Rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            npm install -g firebase-tools
            firebase deploy --only firestore:rules --token "$FIREBASE_TOKEN" --project mbti-logistics
          else
            echo "⚠️ FIREBASE_TOKEN 없음 — rules 배포 스킵"
          fi
