name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Sync settle.html to backup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, base64, os

          TOKEN = os.environ['GH_TOKEN']
          REPO = os.environ['REPO']

          req = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/contents/backup/settle_latest.html",
              headers={"Authorization": f"Bearer {TOKEN}", "Accept": "application/vnd.github+json"}
          )
          with urllib.request.urlopen(req) as r:
              sha = json.loads(r.read())['sha']

          with open('settle.html', 'rb') as f:
              content = base64.b64encode(f.read()).decode()

          payload = json.dumps({
              "message": "auto: settle_latest.html sync",
              "content": content, "sha": sha
          }).encode()

          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/contents/backup/settle_latest.html",
              data=payload, method="PUT",
              headers={"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json", "Accept": "application/vnd.github+json"}
          )
          with urllib.request.urlopen(req2) as r:
              result = json.loads(r.read())
              print(f"✅ backup 동기화 완료 → {result['commit']['sha'][:8]}")
          PYEOF
