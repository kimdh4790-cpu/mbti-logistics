name: Deploy

on:
  push:
    branches: [main]

jobs:

  deploy-worker-and-kv:
    runs-on: ubuntu-latest
    name: "Worker + KV + Firebase Rules 배포"
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker (wrangler)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npm install -g wrangler@4 --silent
          npx wrangler deploy 2>&1

      - name: Upload filo.html to KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 02709cbec18d848913b4246015b9148f
        run: |
          npm install -g wrangler@4 --silent
          wrangler kv key put --namespace-id=7f0e90efaea64f3ab08ff00f8970b28b "filo.html" --path=filo.html --remote
          wrangler kv key put --namespace-id=7f0e90efaea64f3ab08ff00f8970b28b "filo_backup.html" --path=filo.html --remote
          echo "✅ filo KV 완료"
      - name: Upload settle.html to KV
        env:
          CF_EMAIL: kimdh4790@gmail.com
          CF_KEY: ${{ secrets.CF_GLOBAL_KEY }}
        run: |
          ACCOUNT="02709cbec18d848913b4246015b9148f"
          NS_ID="7f0e90efaea64f3ab08ff00f8970b28b"
          RESULT=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/storage/kv/namespaces/$NS_ID/values/settle.html" \
            -H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_KEY" \
            --data-binary @settle.html)
          echo "$RESULT" | grep -q '"success":true' && echo "✅ settle.html KV 업로드 성공" || echo "❌ FAIL: $RESULT"

      - name: Upload other HTML assets to KV
        env:
          CF_EMAIL: kimdh4790@gmail.com
          CF_KEY: ${{ secrets.CF_GLOBAL_KEY }}
        run: |
          ACCOUNT="02709cbec18d848913b4246015b9148f"
          NS_ID="7f0e90efaea64f3ab08ff00f8970b28b"
          for FILE in order.html kitchen.html member-join.html staff-portal.html member-portal.html filo-landing.html donway_landing.html manifest.json firebase-messaging-sw.js sw.js; do
            [ -f "$FILE" ] && \
            RESULT=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/storage/kv/namespaces/$NS_ID/values/$FILE" \
              -H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_KEY" \
              --data-binary @"$FILE") && \
            echo "$RESULT" | grep -q '"success":true' && echo "✅ $FILE" || echo "❌ $FILE: $RESULT"
          done

      - name: Deploy Firestore Rules
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
        run: |
          if [ -z "$FIREBASE_SA_KEY" ]; then
            echo "⚠️ FIREBASE_SA_KEY 없음 — Rules 배포 스킵"
            exit 0
          fi
          npm install -g firebase-tools --silent
          echo "$FIREBASE_SA_KEY" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          firebase deploy --only firestore:rules --project mbti-logistics --non-interactive 2>&1 || echo "⚠️ Rules 배포 실패 (firebase-tools 인증 확인 필요)"
          rm -f /tmp/sa-key.json
