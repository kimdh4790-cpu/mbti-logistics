name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-settle-pages:
    runs-on: ubuntu-latest
    name: Deploy settle to Pages
    steps:
      - name: Setup settle-pages
        run: |
          mkdir -p settle-pages
          curl -sL "https://raw.githubusercontent.com/kimdh4790-cpu/mbti-logistics/main/settle.html" -o settle-pages/index.html
          echo "Size: $(wc -c < settle-pages/index.html)"

      - name: Deploy via CF API
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npm install -g wrangler@latest
          cd settle-pages
          npx wrangler pages deploy . --project-name donway-settle --branch production

  deploy-kv:
    runs-on: ubuntu-latest
    name: Upload to KV
    steps:
      - name: Upload HTML to KV
        env:
          CF_EMAIL: kimdh4790@gmail.com
          CF_KEY: ${{ secrets.CF_GLOBAL_KEY }}
        run: |
          ACCOUNT="02709cbec18d848913b4246015b9148f"
          NS_ID="7f0e90efaea64f3ab08ff00f8970b28b"
          for FILE in kiosk.html inventory.html qrpos.html mbtico_hub.html join.html admin_sub.html order.html donway_landing.html; do
            curl -sL "https://raw.githubusercontent.com/kimdh4790-cpu/mbti-logistics/main/$FILE" -o "/tmp/$FILE"
            [ -s "/tmp/$FILE" ] && curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/storage/kv/namespaces/$NS_ID/values/$FILE" \
              -H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_KEY" \
              --data-binary @"/tmp/$FILE" | grep -q "success" && echo "OK: $FILE" || echo "FAIL: $FILE"
          done
