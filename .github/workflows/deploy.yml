name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Update sw.js cache key
        run: |
          TS=$(date +"%Y%m%d%H%M")
          sed -i "s/const CACHE = 'mbti-v9-[0-9]*/const CACHE = 'mbti-v9-$TS/" sw.js
          echo "Cache key updated: mbti-v9-$TS"

      - name: Create KV namespace if not exists and upload settle.html
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import requests, os, json

          TOKEN = "${{ secrets.CF_KV_TOKEN }}"
          ACCOUNT_ID = "02709cbec18d848913b4246015b9148f"
          KV_TITLE = "donway-assets"
          headers = {"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"}

          # KV 네임스페이스 목록 조회
          r = requests.get(f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/storage/kv/namespaces", headers=headers)
          namespaces = r.json().get('result', [])
          ns = next((n for n in namespaces if n['title'] == KV_TITLE), None)

          if not ns:
              # 생성
              r2 = requests.post(f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/storage/kv/namespaces",
                  headers=headers, json={"title": KV_TITLE})
              ns = r2.json()['result']
              print(f"KV 생성: {ns['id']}")
          else:
              print(f"KV 기존: {ns['id']}")

          ns_id = ns['id']

          # settle.html 업로드
          with open('settle.html', 'rb') as f:
              content = f.read()

          r3 = requests.put(
              f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/storage/kv/namespaces/{ns_id}/values/settle.html",
              headers={"Authorization": f"Bearer {TOKEN}"},
              data=content,
              params={"expiration_ttl": 0}
          )
          print(f"settle.html 업로드: {r3.status_code}")

          # ns_id를 파일로 저장 (wrangler.toml에 반영)
          with open('kv_ns_id.txt', 'w') as f:
              f.write(ns_id)
          PYEOF

      - name: Update wrangler.toml with KV binding
        run: |
          NS_ID=$(cat kv_ns_id.txt)
          echo "KV NS_ID: $NS_ID"
          echo 'name = "mbti-logistics"' > wrangler.toml
          echo 'main = "_worker.js"' >> wrangler.toml
          echo 'compatibility_date = "2025-11-01"' >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[[kv_namespaces]]' >> wrangler.toml
          echo 'binding = "DONWAY_ASSETS"' >> wrangler.toml
          echo "id = \"$NS_ID\"" >> wrangler.toml
          cat wrangler.toml

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Sync settle.html to backup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, base64, os

          TOKEN = os.environ['GH_TOKEN']
          REPO = os.environ['REPO']

          req = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/contents/backup/settle_latest.html",
              headers={"Authorization": f"Bearer {TOKEN}", "Accept": "application/vnd.github+json"}
          )
          with urllib.request.urlopen(req) as r:
              sha = json.loads(r.read())['sha']

          with open('settle.html', 'rb') as f:
              content = base64.b64encode(f.read()).decode()

          payload = json.dumps({
              "message": "auto: settle_latest.html sync",
              "content": content, "sha": sha
          }).encode()

          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/contents/backup/settle_latest.html",
              data=payload, method="PUT",
              headers={"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json", "Accept": "application/vnd.github+json"}
          )
          with urllib.request.urlopen(req2) as r:
              result = json.loads(r.read())
              print(f"✅ backup 동기화 완료 → {result['commit']['sha'][:8]}")
          PYEOF
