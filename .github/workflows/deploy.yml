name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          wranglerVersion: '4'

      - name: Sync settle.html to backup
        run: |
          SHA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/backup/settle_latest.html" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])")
          CONTENT=$(base64 -w 0 settle.html)
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/backup/settle_latest.html" \
            -d "{\"message\":\"auto: settle_latest.html sync\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}"
          echo "✅ backup 동기화 완료"
