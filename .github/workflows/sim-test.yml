name: Simulation Test

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Test action'
        required: true
        default: 'create_test_company'

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Run simulation test
        run: |
          echo "=== 시뮬레이션 테스트 시작 ==="
          
          # 1. 테스트 데이터 생성
          echo "[1] 테스트 회사/기사/정산 데이터 생성"
          RESULT=$(curl -s -X POST "https://donway.ai.kr/api/test-sim" \
            -H "Content-Type: application/json" \
            -d '{"action":"create_test_company","secret":"${{ secrets.CRON_SECRET }}"}')
          echo "$RESULT" | python3 -m json.tool 2>/dev/null || echo "$RESULT"
          
          # 2. 데이터 확인
          echo ""
          echo "[2] 생성된 데이터 확인"
          CHECK=$(curl -s -X POST "https://donway.ai.kr/api/test-sim" \
            -H "Content-Type: application/json" \
            -d '{"action":"check_data","secret":"${{ secrets.CRON_SECRET }}","data":{"dealerId":"TEST_SIM_001"}}')
          echo "$CHECK" | python3 -m json.tool 2>/dev/null || echo "$CHECK"
          
          # 3. 알림톡 발송 테스트
          echo ""
          echo "[3] 알림톡 발송 테스트"
          SMS=$(curl -s -X POST "https://donway.ai.kr/api/send-alimtalk" \
            -H "Content-Type: application/json" \
            -d '{"to":"01047903103","templateCode":"KA01TP2605202011489862wFDonmS7ny","variables":{"#{회사명}":"테스트회사","#{이름}":"홍길동","#{월}":"2026-06","#{실지급}":"4,410,000","#{명세서링크}":"testtoken123"},"fallbackText":"[테스트] 정산명세서 발송 테스트"}')
          echo "$SMS" | python3 -m json.tool 2>/dev/null || echo "$SMS"
          
          # 4. SMS 발송 테스트
          echo ""
          echo "[4] SMS 발송 테스트"
          SMS2=$(curl -s -X POST "https://donway.ai.kr/api/send-sms" \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"to":"01047903103","text":"[DONWAY 시뮬레이션] SMS 테스트 발송입니다."}]}')
          echo "$SMS2" | python3 -m json.tool 2>/dev/null || echo "$SMS2"
          
          # 5. 데이터 정리
          echo ""
          echo "[5] 테스트 데이터 정리"
          CLEAN=$(curl -s -X POST "https://donway.ai.kr/api/test-sim" \
            -H "Content-Type: application/json" \
            -d '{"action":"cleanup","secret":"${{ secrets.CRON_SECRET }}"}')
          echo "$CLEAN"
          
          echo ""
          echo "=== 시뮬레이션 완료 ==="
