name: Fix Test Account

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix test0 account data
        run: |
          SECRET="${{ secrets.CRON_SECRET }}"
          BASE="https://donway.ai.kr"
          
          echo "=== test0 계정 데이터 수정 ==="
          
          # test0 계정 users + companies 데이터 확인 및 수정
          R=$(curl -s -X POST "$BASE/api/test-sim" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"fix_test_account\",\"secret\":\"$SECRET\"}")
          echo "$R"
