name: Force SW Upload
on:
  workflow_dispatch:
jobs:
  kv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload SW
        env:
          CF_EMAIL: kimdh4790@gmail.com
          CF_KEY: ${{ secrets.CF_GLOBAL_KEY }}
        run: |
          ACC="02709cbec18d848913b4246015b9148f"
          NS="7f0e90efaea64f3ab08ff00f8970b28b"
          R=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$ACC/storage/kv/namespaces/$NS/values/firebase-messaging-sw.js" \
            -H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_KEY" \
            -H "Content-Type: application/javascript" --data-binary @firebase-messaging-sw.js)
