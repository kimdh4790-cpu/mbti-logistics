}

// ── 세무사 연동: 정산서 저장 시 자동 공유 토큰 생성 + Firestore 저장
function _seTaxSync(settleId, payload){
  if(!_db||!_CU) return;
  var did=_CU.dealerId||_CU.uid;
  // 세무사 이메일 조회
  _db.collection('companies').doc(did).get().then(function(snap){
    var taxEmail=(snap.exists&&snap.data().taxEmail)||'';
    var taxName=(snap.exists&&snap.data().taxName)||'세무사';
    var ym=payload.month||'';
    var driver=payload.driver||payload.userId||'';
    // taxShares에 개별 정산서 토큰 저장
    var token='txs_se_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,5);
    var shareData={
      type:'tax_share_settle',
      dealerId:did,
      settleId:settleId,
      driver:driver,
      ym:ym,
      token:token,
      email:taxEmail,
      // 세무사가 볼 핵심 정산 데이터
      data:{
        driver:driver,
        month:ym,
        supplyAmt:payload.supplyAmt||0,        // 공급가액
        vatAmt:Math.round((payload.totalAmt||0)-(payload.supplyAmt||0)), // 부가세
        totalAmt:payload.totalAmt||0,           // VAT포함 합계
        empIns:payload.emp||0,                  // 고용보험
        workIns:payload.work||0,                // 산재보험
        netPay:payload.net||0,                  // 실지급액
        dcnt:payload.dcnt||0,                   // 배송건수
        bizNum:payload.bizNum||'',              // 사업자번호
        bizName:payload.bizName||''             // 상호
      },
      memo:ym+' '+driver+' 정산 내역 자동 공유 (DONWAY)',
      createdAt:new Date().toISOString(),
      expiresAt:new Date(Date.now()+90*24*60*60*1000).toISOString() // 90일 유효
    };
    _db.collection('taxShares').doc(token).set(shareData).then(function(){
      // taxSyncLog에도 기록 (세무사 공유 이력)
      _db.collection('taxShares').doc(did+'_log_'+ym).set({
        dealerId:did, ym:ym,
        lastSync:new Date().toISOString(),
        count:firebase.firestore.FieldValue.increment(1)
      },{merge:true}).catch(function(){});
      var url=window.location.origin+window.location.pathname+'?taxShare='+token;
      toast('🧾 세무사 연동 완료 → 링크 생성됨');
      // 세무사 이메일 있으면 mailto 열기
      if(taxEmail){
        setTimeout(function(){
          if(confirm('세무사('+taxEmail+')에게 이메일 보내시겠습니까?\n\n'+driver+' '+ym+' 정산 자료 공유 링크가 포함됩니다.')){
            var subj=encodeURIComponent('[DONWAY] '+ym+' '+driver+' 정산 자료 공유');
            var body=encodeURIComponent(taxName+'님 안녕하세요.\n\n'+ym+'월 '+driver+' 기사 정산 내역을 공유드립니다.\n\n'+
              '▶ 공급가액: ₩'+(payload.supplyAmt||0).toLocaleString()+'\n'+
              '▶ 세액: ₩'+Math.round(((payload.totalAmt||0)-(payload.supplyAmt||0))).toLocaleString()+'\n'+
              '▶ 실지급액: ₩'+(payload.net||0).toLocaleString()+'\n\n'+
              '공유 링크 (90일 유효):\n'+url+'\n\nDONWAY 자동화 정산 시스템');
            window.open('mailto:'+taxEmail+'?subject='+subj+'&body='+body);
          }
        },500);
      } else {
        // 이메일 없으면 링크 복사
        if(navigator.clipboard){
          navigator.clipboard.writeText(url).then(function(){toast('📋 세무사 공유 링크 복사됨 (90일 유효)');}).catch(function(){});
        }
      }
    }).catch(function(e){toast('⚠️ 세무사 연동 저장 실패: '+e.message);});
  }).catch(function(){toast('⚠️ 세무사 정보를 불러올 수 없습니다. 세무사 공유 메뉴에서 먼저 등록해 주세요.');});
}

function recalcAllSettlements(){
  if(!_settleCache||!_settleCache.length){toast('❌ 정산 데이터 없음');return;}
  var unset=Object.keys(RPRICE).length===0;
  if(unset&&!confirm('⚠️ 단가표가 비어있습니다.\n단가표 설정 후 재계산하면 기사 지급액이 계산됩니다.\n\n계속 진행하시겠습니까?'))return;
  if(!unset&&!confirm('⚡ 전체 정산 재계산\n\n총 '+_settleCache.length+'건을 단가표(RPRICE) 기준으로 재계산합니다.\n\n※ 라우트 단가가 0원인 경우 엑셀 원본 금액이 유지됩니다.\n\n계속하시겠습니까?'))return;
  var changed=0;var promises=[];
  _settleCache.forEach(function(x){
    if(!x.id)return;
    // routeDetails 기준 재계산
    var rds=x.routeDetails||[];
    var newDamt=0,newRamt=0;
    // 시즌 단가 적용 여부 확인 (정산월 기준)
    var seasonPeriods=_getOverlappingSeasons(x.month||'');
    var newRds=rds.map(function(rd){
      var rprice=RPRICE[rd.route]||0;
      // 시즌 단가 우선 적용 (겹치는 기간의 단가)
      if(seasonPeriods.length){
        for(var si=0;si<seasonPeriods.length;si++){
          if(seasonPeriods[si].prices&&seasonPeriods[si].prices[rd.route]!==undefined){
            rprice=seasonPeriods[si].prices[rd.route];break;
          }
        }
      }
      var usePrice=rprice>0?rprice:(rd.excelUnitPrice||rd.unitPrice||0);
      var dAmt=(rd.cnt||0)*usePrice;
      var rAmt=(rd.ret||0)*usePrice;
      newDamt+=dAmt;newRamt+=rAmt;
      return Object.assign({},rd,{unitPrice:usePrice,amt:dAmt,retAmt:rAmt,isSeason:seasonPeriods.length>0});
    });
    // 인센 재계산 (기사별 설정)
    var fincVal=0;
    rds.forEach(function(rd){
      var s=_getIncSetting(x.userId||x.driver,rd.route);
      if(s.on&&s.rate>0)fincVal+=(rd.cnt||0)*s.rate;
    });
    var freshRaw=x.fresh||0;
    var addInc=x.inc||0;
    var nocont=x.nocont||0;
    var dmg=x.dmg||0;
    var adv=x.adv||0;
    var eq=x.eq||0;
    var etcPlus=x.etcPlus||0;
    var etcMinus=x.etcMinus||0;
    // 세금계산서 기준 (etcMinus 제외)
    var taxBase=newDamt+newRamt+freshRaw+fincVal+addInc+nocont+etcPlus; // 모두 VAT포함가
    var supplyAmt=Math.round(taxBase/1.1);
    var monthlyWage=Math.round(supplyAmt*0.654);
    var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
    var workIns=Math.floor(monthlyWage*0.0088/10)*10;
    var deductTotal=dmg+empIns+workIns+adv+eq+etcMinus;
    var net=taxBase-deductTotal;
    var update={
      routeDetails:newRds,
      damt:newDamt,ramt:newRamt,finc:fincVal,
      totalAmt:taxBase,supplyAmt:supplyAmt,monthlyWage:monthlyWage,
      emp:empIns,work:workIns,deduct:deductTotal,net:net,
      updatedAt:new Date().toISOString()
    };
    promises.push(_db.collection('settlements').doc(x.id).update(update)
      .then(function(){changed++;Object.assign(x,update);}).catch(function(e){console.warn(e);}));
  });
  Promise.all(promises).then(function(){
    toast('✅ 재계산 완료 ('+changed+'건)\n단가표 기준으로 정산서가 갱신되었습니다.');
    _reloadSettlePage();
  });
}

var _ocrCurrentFile = null;
var _ocrCameraStream = null;

function _ocrHandleDrop(e){
  e.preventDefault();
  var f=e.dataTransfer.files[0];
  if(f) _ocrHandleFile(f);
  var dz=document.getElementById('ocr-drop-zone');
  if(dz){dz.style.borderColor='rgba(0,212,255,.3)';dz.style.background='rgba(0,212,255,.03)';}
}

function _ocrHandleFile(file){
  if(!file)return;
  _ocrCurrentFile=file;
  var preview=document.getElementById('ocr-preview-wrap');
  var img=document.getElementById('ocr-preview-img');
  var nameEl=document.getElementById('ocr-file-name');
  var analyzeBtn=document.getElementById('ocr-analyze-btn');
  if(!preview||!img)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    img.src=ev.target.result;
    if(nameEl) nameEl.textContent=file.name+' ('+Math.round(file.size/1024)+'KB)';
    preview.style.display='block';
    // 분석 버튼 숨기고 자동 분석 시작
    if(analyzeBtn) analyzeBtn.style.display='none';
    var ph=document.getElementById('ocr-analyze-placeholder');
    if(ph) ph.style.display='none';
    // 이미지 렌더링 후 바로 분석 시작
    setTimeout(function(){ _ocrAnalyze(); }, 300);
  };
  reader.readAsDataURL(file);
}

function _ocrOpenCamera(){
  var wrap=document.getElementById('ocr-camera-wrap');
  var video=document.getElementById('ocr-camera-video');
  if(!wrap||!video)return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(function(stream){
      _ocrCameraStream=stream;
      video.srcObject=stream;
      wrap.style.display='block';
    })
    .catch(function(e){
      _ocrSetStatus('❌ 카메라 접근 실패: '+e.message,'rgba(239,68,68,.1)','#ef4444');
    });
}

function _ocrCapture(){
  var video=document.getElementById('ocr-camera-video');
  if(!video)return;
  var canvas=document.createElement('canvas');
  canvas.width=video.videoWidth||640;
  canvas.height=video.videoHeight||480;
  canvas.getContext('2d').drawImage(video,0,0);
  _ocrStopCamera();
  canvas.toBlob(function(blob){
    var file=new File([blob],'camera_'+Date.now()+'.jpg',{type:'image/jpeg'});
    _ocrHandleFile(file);
  },'image/jpeg',0.92);
}

function _ocrStopCamera(){
  if(_ocrCameraStream){_ocrCameraStream.getTracks().forEach(t=>t.stop());_ocrCameraStream=null;}
  var wrap=document.getElementById('ocr-camera-wrap');
  if(wrap) wrap.style.display='none';
}

function _ocrSetStatus(msg, bg, color){
  var el=document.getElementById('ocr-modal-status');
  if(!el)return;
  el.style.display='block';
  el.style.background=bg||'rgba(0,212,255,.08)';
  el.style.color=color||'var(--cyan)';
  el.style.border='1px solid '+(color||'rgba(0,212,255,.3)');
  el.textContent=msg;
}

        .replace(/인천광역시/g,'인천광역시')  // 정상
        .replace(/광주광역시/g,'광주광역시')  // 정상
        .replace(/울산광역시/g,'울산광역시')  // 정상
        .replace(/경기도/g,'경기도')          // 정상
        // ── 부산 구 이름 교정
        .replace(/수연구/g,'수영구')
        .replace(/수염구/g,'수영구')
        .replace(/수명구/g,'수영구')
        .replace(/소영구/g,'수영구')
        .replace(/해운대구/g,'해운대구')  // 정상
        .replace(/연재구/g,'연제구')
        .replace(/금성구/g,'금정구')
        // ── 도로명 교정
        .replace(/수연로/g,'수영로')
        .replace(/수명로/g,'수영로')
        .replace(/소영로/g,'수영로')
        // ── 부산 구 누락 보정 (수영구/해운대구 등 생략되는 경우)
        .replace(/부산광역시\s+수영로/g,'부산광역시 수영구 수영로')
        .replace(/부산광역시\s+해운대로/g,'부산광역시 해운대구 해운대로')
        .replace(/부산광역시\s+중앙로/g,'부산광역시 중구 중앙로')
        // ── 숫자/영문↔한글 교정 (사업자번호)
        .replace(/([0-9O]{3})-([0-9O]{2})-([0-9OIlBSG]{4,6})/gi, function(m){
          return m.toUpperCase()
            .replace(/O/g,'0').replace(/I/g,'1').replace(/L/g,'1')
            .replace(/B/g,'8').replace(/S/g,'5').replace(/G/g,'6');
        })
        // ── 사업자번호 하이픈 없는 경우 자동 삽입
        .replace(/^([0-9]{3})([0-9]{2})([0-9]{5})$/, '$1-$2-$3')
        // ── 사업자번호 6자리→5자리 정규화
        .replace(/([0-9]{3})-([0-9]{2})-([0-9]{6})/g, function(m,a,b,c){
          return a+'-'+b+'-'+c.slice(0,5);
        })
        // ── OCR 라벨 앞붙음 보정
        .replace(/^업태\s+/,'').replace(/^종목\s+/,'').replace(/^상호\s+/,'').replace(/^대표자\s+/,'')
        // ── 업태/종목 공통 오류
        .replace(/서비스엽/g,'서비스업')
        .replace(/서비스알/g,'서비스업')
        .replace(/도소매엽/g,'도소매업')
        .replace(/운수엽/g,'운수업')
        .replace(/제조엽/g,'제조업')
        .replace(/건설엽/g,'건설업')
        .replace(/음식점엽/g,'음식점업')
        .replace(/숙박엽/g,'숙박업')
        // ── 불필요한 공백 정리
        .replace(/\s{2,}/g,' ')
        .trim();
    }
    // 모든 OCR 결과에 후처리 적용
    Object.keys(json).forEach(k=>{ if(typeof json[k]==='string') json[k]=_fixOcrKorean(json[k]); });
    var filled=0;
    Object.keys(map).forEach(k=>{
      if(json[k]){var el=document.getElementById(map[k]);if(el){el.value=json[k];filled++;}}
    });
    _ocrSetStatus('✅ '+filled+'개 항목 자동입력 완료!','rgba(0,255,136,.08)','#00ff88');
    var statusOuter=document.getElementById('edr-ocr-status');
    if(statusOuter) statusOuter.textContent='✅ OCR 완료';
    setTimeout(()=>{var mo=document.getElementById('mo-ocr-upload');if(mo)mo.remove();},1500);
  }catch(e){
    console.error('OCR 오류:',e);
    var errMsg=e.message||'알 수 없는 오류';
    _ocrSetStatus('❌ '+errMsg,'rgba(239,68,68,.1)','#ef4444');
    if(btn){btn.disabled=false;btn.textContent='🔍 다시 분석';btn.style.display='block';}
    var ph=document.getElementById('ocr-analyze-placeholder');
    if(ph) ph.style.display='none';
  }
}

async function _ocrCompressImage(file, maxW, quality){
  return new Promise(resolve=>{
    var img=new Image();
    var url=URL.createObjectURL(file);
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg',quality).split(',')[1]);
    };
    img.src=url;
  });
}

        .then(function(snap){
          if(snap&&snap.size){
            _settleCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
          }
          rebuildAndRender();
        }).catch(function(){rebuildAndRender();});

function _getRouteCamp(route){
  if(!route)return '기타';
  // 1순위: routeCampMap (엑셀 업로드 시 저장)
  if(_routeCampMap[route])return _routeCampMap[route];
  // 2순위: settlements 캐시
  if(_settleCache){
    for(var si=0;si<_settleCache.length;si++){
      var s=_settleCache[si];
      var rds=s.routeDetails||[];
      for(var ri=0;ri<rds.length;ri++){
        if(rds[ri].route===route&&s.camp)return s.camp;
      }
    }
  }
  return '기타';
}

function _applySeasonToRprice(idx){

  if(!p||!p.prices||!Object.keys(p.prices).length){toast('❌ 단가 데이터 없음');return;}

  // RPRICE 메모리 반영
  Object.assign(RPRICE, p.prices);
  // Firestore 저장
  var did=_CU&&_CU.dealerId?_CU.dealerId:'shared';
  _db.collection('settings').doc(did+'_routePrices')
    .set(p.prices,{merge:true})
    .then(function(){

// 파일 미리보기 파싱
window._seasonImportPreview=function(file){
  var prev=document.getElementById('season-import-preview');
  if(!file||!prev)return;
  prev.innerHTML='<div style="font-size:11px;color:var(--text3)">⏳ 파싱 중...</div>';
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();

  if(ext==='xlsx'||ext==='xls'){
    reader.onload=function(ev){
      try{
        var wb=XLSX.read(ev.target.result,{type:'array'});
        var parsed=[];
        wb.SheetNames.forEach(function(sn){
          var parts=sn.split('|');
          var label=parts[0].trim()||sn;
          var range=(parts[1]||'').trim();
          var dates=range.split('~');
          var start=(dates[0]||'').trim();
          var end  =(dates[1]||'').trim();
          var ws=wb.Sheets[sn];
          var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
          var prices={};

          // ★ 헤더행에서 "라우트번호" 컬럼 위치 탐지 (다중열 그룹 구조 대응)
          var routeCols=[],priceCols=[];
          var headerRow=rows[0]||[];
          headerRow.forEach(function(cell,ci){
            if(!cell)return;
            var cn=String(cell).replace(/\n/g,'').toLowerCase().trim();
            if(cn.includes('라우트')&&(cn.includes('번호')||cn.includes('코드')||cn.includes('route')))routeCols.push(ci);
            if(cn.includes('단가')||cn.includes('price'))priceCols.push(ci);
          });

          if(routeCols.length>0){
            // 다중열 그룹: 라우트번호 컬럼 위치 기준으로 읽기
            rows.slice(1).forEach(function(row){
              if(!row)return;
              routeCols.forEach(function(rc,gi){
                var pc=priceCols[gi]!==undefined?priceCols[gi]:rc+1;
                var rawRoute=String(row[rc]||'').trim();
                var price=row[pc];
                if(!rawRoute||!price)return;
                var code=rawRoute.toUpperCase().replace(/_/g,'');
                if(code&&+price>0)prices[code]=+price;
              });
            });
          } else {
            // 기존 2열 구조: row[0]=라우트, row[1]=단가
            rows.forEach(function(row){
              if(!row||!row[0])return;
              var route=String(row[0]||'').trim().toUpperCase().replace(/_/g,'');
              var price=parseFloat(row[1])||0;
              if(route&&price>0)prices[route]=price;
            });
          }

          if(label&&Object.keys(prices).length>0){
            parsed.push({id:'si'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
              label:label, start:start, end:end, prices:prices});
          }
        });
        window._seasonImportParsed=parsed;
        _showSeasonImportPreview(parsed,prev);
      }catch(e){prev.innerHTML='<div style="color:var(--red);font-size:12px">❌ 엑셀 파싱 오류: '+esc(e.message)+'</div>';}
    };
    reader.readAsArrayBuffer(file);
  } else {
    // TXT / CSV — 고정단가 파서와 동일한 패턴 지원
    reader.onload=function(ev){
      try{
        var lines=ev.target.result.replace(/\r/g,'').split('\n');
        var label='시즌',start='',end='';
        var prices={};
        var curNum='';  // "608\nA 920" 방식 번호 누적
        lines.forEach(function(line){
          line=line.trim();
          if(!line)return;
          // # 헤더: # 재계약1차|2026-05-26~2026-05-31
          if(line.startsWith('#')){
            var hdr=line.slice(1).split('|');
            label=(hdr[0]||'').trim()||label;
            var dates=(hdr[1]||'').split('~');
            start=(dates[0]||'').trim();
            end  =(dates[1]||'').trim();
            return;
          }
          // ① 쉼표/탭 구분: "608A,920" or "608_A\t920"
          if(line.indexOf(',')>=0||line.indexOf('\t')>=0){
            var cols=line.split(/[,\t]/);
            var code=String(cols[0]||'').trim().toUpperCase().replace(/_/g,'');
            var price=parseFloat(cols[1])||0;
            if(code&&price>100){prices[code]=Math.round(price);curNum='';}
            return;
          }
          // ② 숫자만 3자리 = 라우트 번호 누적
          if(/^[0-9]{3}$/.test(line)){curNum=line;return;}
          // ③ "A 920" 형태 (curNum과 조합)
          var m1=line.match(/^([A-Z])\s+([0-9]+)$/i);
          if(m1&&curNum){prices[curNum+m1[1].toUpperCase()]=+m1[2];return;}
          // ④ "608A 920" or "608_A 920" 스페이스 구분
          var m2=line.match(/^([0-9A-Z_]{2,7})\s+([0-9]+)$/i);
          if(m2&&+m2[2]>100){prices[m2[1].toUpperCase().replace(/_/g,'')]=+m2[2];curNum='';return;}
        });
        var parsed=[];
        if(Object.keys(prices).length>0){
          parsed.push({id:'si'+Date.now(),label:label,start:start,end:end,prices:prices});
        }
        window._seasonImportParsed=parsed;
        _showSeasonImportPreview(parsed,prev);
      }catch(e){prev.innerHTML='<div style="color:var(--red);font-size:12px">❌ 파싱 오류: '+esc(e.message)+'</div>';}
    };
    reader.readAsText(file,'utf-8');
  }
};

function _showSeasonImportPreview(parsed,prev){
  if(!parsed||!parsed.length){
    prev.innerHTML='<div style="color:var(--red);font-size:12px">❌ 인식된 시즌 기간이 없습니다. 파일 형식을 확인하세요.</div>';
    return;
  }
  var html='<div style="background:var(--green-l);border-radius:8px;padding:10px;font-size:12px">'
    +'<div style="font-weight:700;color:var(--green);margin-bottom:8px">✅ '+parsed.length+'개 기간 인식됨</div>';
  parsed.forEach(function(p){
    var cnt=Object.keys(p.prices).length;
    html+='<div style="padding:6px 0;border-bottom:1px solid var(--border)">'
      +'<strong>'+esc(p.label)+'</strong>'
      +(p.start?' <span style="color:var(--text3);font-size:11px">'+p.start+' ~ '+p.end+'</span>':'')
      +'<span style="float:right;color:var(--text3);font-size:11px">'+cnt+'개 라우트</span>'
      +'</div>';
    // 단가 미리보기 (최대 5개)
    var routes=Object.keys(p.prices).sort().slice(0,5);
    html+='<div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0">'
      +routes.map(function(r){
        return '<span style="background:#fef3c7;color:#b45309;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">'+r+' ₩'+p.prices[r].toLocaleString()+'</span>';
      }).join('')
      +(Object.keys(p.prices).length>5?'<span style="font-size:10px;color:var(--text3)">+'+( Object.keys(p.prices).length-5)+'개...</span>':'')
      +'</div>';
  });
  html+='</div>';
  prev.innerHTML=html;
}

// 실제 등록 실행
window._seasonImportExecute=function(){
  var parsed=window._seasonImportParsed;
  if(!parsed||!parsed.length){toast('❌ 먼저 파일을 선택해 주세요');return;}
  // 기존과 병합 (같은 label이면 덮어쓰기)
  parsed.forEach(function(p){
    var idx=SEASON_PRICES.findIndex(function(s){return s.label===p.label;});
    if(idx>=0) SEASON_PRICES[idx]=p;
    else SEASON_PRICES.push(p);
  });
  _saveSeasonPrices(function(){
    toast('✅ '+parsed.length+'개 시즌 기간 등록 완료');
    var mo=document.getElementById('mo-season-import');if(mo)mo.remove();
    window._seasonImportParsed=null;
    pageSeason();
  });
};

async function notifyDispatchToDrivers(dispatchResult, routes){
  if(!_db||!_CU) return;
  var routeMap = {};
  routes.forEach(function(r){ routeMap[r.id]=r; });

  // 기사별 배정 라우트 그룹화
  var driverRoutes = {};
  Object.entries(dispatchResult).forEach(function(entry){
    var routeId=entry[0], res=entry[1];
    if(!res.driverId) return;
    if(!driverRoutes[res.driverId]) driverRoutes[res.driverId]={name:res.driverName, routes:[]};
    driverRoutes[res.driverId].routes.push(routeId);
  });

  var count = 0;
  for(var driverId in driverRoutes){
    var info = driverRoutes[driverId];
    var routeStr = info.routes.slice(0,5).join(', ')+(info.routes.length>5?'...':'');
    // Firestore driver_notifications에 알림 저장 (기사 앱에서 실시간 수신)
    try{
      await _db.collection('driver_notifications').add({
        dealerId: _CU.dealerId,
        targetDriverId: driverId,
        targetDriverName: info.name,
        type: 'dispatch',
        title: '📦 오늘 배차 확정',
        body: '담당 라우트: '+routeStr+' ('+info.routes.length+'개)',
        routeIds: info.routes,
        date: new Date().toISOString().slice(0,10),
        isRead: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      count++;
    }catch(e){ console.warn('[배차알림] 실패:', driverId, e); }
  }
  if(count>0) toast('📱 '+count+'명 기사에게 배차 알림 전송 완료');
}

// QR 데이터 불러오기 + 자동 계산
function _hsLoad(){
  if(!_db||!_CU)return;
  var sel=document.getElementById('hs-month-sel');
  var ym=sel?sel.value:'';
  if(!ym)return;
  var did=_CU.dealerId;
  var listEl=document.getElementById('hs-result-list');
  listEl.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">⏳ 로딩 중...</div>';

  // 해당 월의 시작/끝 날짜
  var parts=ym.split('-');
  var yr=parseInt(parts[0]),mo=parseInt(parts[1]);
  var dateFrom=ym+'-01';
  var dateTo=ym+'-'+String(new Date(yr,mo,0).getDate()).padStart(2,'0');

  Promise.all([
    // 직원 목록 (workType 있는 자)
    _db.collection('drivers').where('dealerId','==',did).get(),
    // 출퇴근 기록 (해당 월)
    _db.collection('attendance')
      .where('dealerId','==',did)
      .where('date','>=',dateFrom)
      .where('date','<=',dateTo).get()
  ]).then(function(results){
    var drvSnap=results[0], attSnap=results[1];

    // 직원 파싱
    var workers=[];
    drvSnap.forEach(function(doc){
      var d=doc.data();
      if(!d.workType||d.workType==='coupang') return; // 쿠팡 기사 제외
      workers.push({
        id:doc.id,
        name:d.name||d.userId||'',
        userId:d.userId||d.coupangId||'',
        workType:d.workType||'hourly',
        hourlyRate:d.hourlyRate||LABOR_LAW_2026.minWage,
        dailyRate:d.dailyRate||LABOR_LAW_2026.minDaily,
        commissionRate:d.commissionRate||10,
        baseGuarantee:d.baseGuarantee||0,
        camp:d.camp||''
      });
    });

    // 출퇴근 파싱
    var attMap={};
    attSnap.forEach(function(doc){
      var d=doc.data();
      var uid=d.userId||d.driverId||d.driverName||'';
      if(!uid)return;
      if(!attMap[uid])attMap[uid]=[];
      attMap[uid].push({
        date:d.date||'',
        checkIn:d.checkIn||d.check_in||'',
        checkOut:d.checkOut||d.check_out||'',
        isHoliday:d.isHoliday||false
      });
    });

    window._hsState={workers:workers,attMap:attMap,did:did,ym:ym};
    _hsRenderResults(workers, attMap, ym);
  }).catch(function(e){
    listEl.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>'+esc(e.message)+'</div>';
  });
}

// 결과 렌더링
function _hsRenderResults(workers, attMap, ym){
  var listEl=document.getElementById('hs-result-list');
  if(!workers.length){
    listEl.innerHTML='<div class="empty"><div class="empty-icon">👤</div>'
      +'<div>기사 관리에서 근무 타입(시급/일급/수수료)을 등록하세요</div></div>';
    return;
  }

  var html='';
  var L=LABOR_LAW_2026;
  var results={};

  workers.forEach(function(w){
    var records=attMap[w.userId]||attMap[w.name]||attMap[w.id]||[];
    var totalH=0, nightH=0, overtimeH=0, workDays=0, holidayDays=0;

    records.forEach(function(r){
      if(!r.checkIn||!r.checkOut)return;
      var qr=calcWorkHoursFromQR(r.checkIn,r.checkOut);
      totalH+=qr.hours;
      nightH+=qr.nightH;
      if(qr.hours>L.dailyMaxH)overtimeH+=qr.hours-L.dailyMaxH;
      workDays++;
      if(r.isHoliday)holidayDays++;
    });

    // 주간 근무시간 (월 근무시간 / 4.33주)
    var weeklyH=Math.round(totalH/4.33*10)/10;

    var res={};
    if(w.workType==='hourly'){
      res=calcHourlyPay({
        hourlyRate:w.hourlyRate,totalHours:totalH,
        nightH:nightH,overtimeH:overtimeH,
        isHoliday:holidayDays>0,juhuHours:weeklyH
      });
    } else if(w.workType==='daily'){
      res=calcDailyPay({dailyRate:w.dailyRate,workDays:workDays,holidayDays:holidayDays});
    } else if(w.workType==='weekly_fixed'){
      res=calcWeeklyPay({payType:'weekly_fixed',weeklyRate:w.weeklyRate||0});
    } else if(w.workType==='monthly_fixed'||w.workType==='monthly'){
      res=calcMonthlyPay({payType:'monthly_fixed',monthlyRate:w.monthlyRate||w.salary||0,
        nightH:nightH,overtimeH:overtimeH});
    } else if(w.workType==='commission'){
      var salesEl=document.getElementById('sales-'+w.id);
      var sales=salesEl?parseFloat(salesEl.value)||0:0;
      res=calcCommissionPay({salesAmount:sales,commissionRate:w.commissionRate,baseGuarantee:w.baseGuarantee});
    } else {
      res={totalPay:0,breakdown:{}};
    }

    // 최저임금 위반 체크
    var mw=totalH>0?checkMinWage(res.totalPay,totalH):{violation:false};
    results[w.id]=Object.assign({},res,{w:w,workDays:workDays,totalH:totalH,nightH:nightH,overtimeH:overtimeH,mwCheck:mw,ym:ym});

    var typeLabel=WORK_TYPES[w.workType]||{icon:'👤',label:w.workType};
    var color=w.workType==='hourly'?'var(--blue)':w.workType==='daily'?'var(--purple)':'var(--green)';

    html+='<div class="card" style="margin-bottom:10px;border-left:4px solid '+color+'">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      +'<div style="font-size:13px;font-weight:700">'+esc(w.name||w.userId)+'</div>'
      +'<span style="background:'+color+'22;color:'+color+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">'+typeLabel.icon+' '+typeLabel.label+'</span>'
      +(w.camp?'<span style="font-size:10px;color:var(--text3)">'+esc(w.camp)+'</span>':'')
      +(mw.violation?'<span style="background:#ef4444;color:#fff;font-size:9px;padding:2px 8px;border-radius:10px;margin-left:auto">⚠️ 최저임금 미달</span>':'')
      +'</div>'
      // 근무 요약
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">'
      +_hsStat('근무일',''+workDays+'일')
      +_hsStat('총 시간',Math.round(totalH*10)/10+'h')
      +_hsStat('야간',Math.round(nightH*10)/10+'h')
      +_hsStat('연장',Math.round(overtimeH*10)/10+'h')
      +'</div>'
      // 급여 내역
      +'<div style="background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:8px">'
      +Object.entries(res.breakdown||{}).filter(function(e){return e[1]>0;}).map(function(e){
        return '<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px">'
          +'<span style="color:var(--text3)">'+esc(e[0])+'</span>'
          +'<span>₩'+Math.round(e[1]).toLocaleString()+'</span></div>';
      }).join('')
      +'<div style="display:flex;justify-content:space-between;padding:6px 0 0;border-top:1px solid var(--border);margin-top:4px;font-weight:800;font-size:14px">'
      +'<span>실지급 합계</span><span style="color:var(--primary)">₩'+Math.round(res.totalPay||0).toLocaleString()+'</span>'
      +'</div></div>'
      +(w.workType==='commission'
        ?'<div class="fg" style="margin-bottom:8px"><label style="font-size:11px">매출액 입력 후 다시 계산</label>'
         +'<input id="sales-'+w.id+'" type="number" placeholder="매출액" style="font-size:12px" onchange="_hsLoad()"></div>'
        :'')
      +'<div style="display:flex;gap:6px">'
      +'<button onclick="_hsSave(this.dataset.id)" data-id="'+w.id+'" class="btn btn-sm btn-blue" style="flex:1">💾 정산 저장</button>'
      +'<button onclick="_hsPayslip(this.dataset.id)" data-id="'+w.id+'" class="btn btn-sm" style="flex:1">📄 급여명세서</button>'
      +'</div>'
      +'</div>';
  });

  window._hsState.results=results;
  listEl.innerHTML=html||'<div class="empty">출퇴근 기록이 없습니다</div>';
}

function _hsStat(label,val){

    +'<div style="font-size:9px;color:var(--text3)">'+label+'</div>'
    +'<div style="font-size:13px;font-weight:700">'+val+'</div>'

// 개별 정산 저장
function _hsSave(wid){
  var st=window._hsState||{};
  var r=st.results&&st.results[wid];
  var did=st.did;
  if(!r||!_db||!did){toast('❌ 데이터 없음');return;}
  var w=r.w;
  var payload={
    dealerId:did, driverName:w.name||w.userId, userId:w.userId||w.id,
    settleType:w.workType, month:r.ym||'',
    workDays:r.workDays||0, totalHours:r.totalH||0,
    nightHours:r.nightH||0, overtimeHours:r.overtimeH||0,
    totalPay:Math.round(r.totalPay||0),
    breakdown:r.breakdown||{},
    hourlyRate:w.hourlyRate||0, dailyRate:w.dailyRate||0,
    minWageViolation:!!(r.mwCheck&&r.mwCheck.violation),
    status:'정산완료',
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:new Date().toISOString()
  };
  _db.collection('hourly_settlements').add(payload)
    .then(function(){toast('✅ '+w.name+' 정산 저장 완료');})
    .catch(function(e){toast('❌ '+e.message);});
}

function _hwCalc(btnOrType){
  var type=typeof btnOrType==='string'?btnOrType:(btnOrType&&btnOrType.dataset&&btnOrType.dataset.t)||btnOrType;
  var L=LABOR_LAW_2026;
  var g=function(id){return parseFloat((document.getElementById(id)||{value:0}).value)||0;};
  var res,r2=document.getElementById('hw-result');
  if(!r2)return;

  if(type==='hourly'){
    var startEl=document.getElementById('hw-start');
    var endEl=document.getElementById('hw-end');
    var startH=startEl?parseFloat(startEl.value.split(':')[0])+(parseFloat(startEl.value.split(':')[1])/60):9;
    var endH=endEl?parseFloat(endEl.value.split(':')[0])+(parseFloat(endEl.value.split(':')[1])/60):18;
    res=calcHourlyPay({hourlyRate:g('hw-rate'),totalHours:g('hw-hours'),startH:startH,endH:endH,isHoliday:g('hw-holiday')>0,juhuHours:g('hw-weekly')});
    var mw=checkMinWage(res.totalPay,g('hw-hours'));
  } else if(type==='daily'){
    res=calcDailyPay({dailyRate:g('hw-rate'),workDays:g('hw-days'),holidayDays:g('hw-hdays')});
  } else if(type==='commission'){
    res=calcCommissionPay({salesAmount:g('hw-sales'),commissionRate:g('hw-crate'),baseGuarantee:g('hw-guarantee')});
  } else if(type==='delivery'){
    var pay=(g('hw-cnt')*g('hw-dprice'))+(g('hw-ret')*g('hw-rprice'))+g('hw-bonus');
    res={totalPay:pay,breakdown:{'배송금':(g('hw-cnt')*g('hw-dprice')),'반품금':(g('hw-ret')*g('hw-rprice')),'추가수당':g('hw-bonus')}};
  } else if(type==='monthly'){
    var base=g('hw-monthly');
    var hourlyEq=Math.round(base/209);
    var ot=g('hw-ot')*hourlyEq*(L.overtimeRate-1);
    var nt=g('hw-night')*hourlyEq*L.nightRate;
    var meal=g('hw-meal');

// ★ 4대보험 정확 계산 (2026년 법정 요율)
function calc4Insurance(monthPay, dependents, empSize){
  var L=LABOR_LAW_2026; var ins=L.ins;
  monthPay=Math.round(monthPay);
  // 국민연금 기준소득 상하한 적용
  var pensionBase=Math.min(Math.max(monthPay,ins.pension_base_min),ins.pension_base_max);
  var pension=Math.round(pensionBase*ins.pension_worker);
  // 건강보험
  var health=Math.round(monthPay*ins.health_worker);
  // 장기요양 (건강보험료의 12.95% × 50%)
  var care=Math.round(health*ins.care_rate*ins.care_worker_pct);
  // 고용보험
  var employ=Math.round(monthPay*ins.employ_worker);
  // 소득세 (간이세액)
  var taxObj=L.calcIncomeTax(monthPay, dependents||1);
  var income=taxObj.income; var local=taxObj.local;
  var totalWorker=pension+health+care+employ+income+local;
  // 사업주 부담
  var pensionEmp=Math.round(pensionBase*ins.pension_employer);
  var healthEmp=Math.round(monthPay*ins.health_employer);
  var careEmp=Math.round(health*ins.care_rate*(1-ins.care_worker_pct));
  var empSize2=empSize||'small';
  var employEmp=Math.round(monthPay*(empSize2==='large'?ins.employ_employer_large:ins.employ_employer_small));
  var industrial=Math.round(monthPay*ins.industrial_logistics);
  var totalEmployer=pensionEmp+healthEmp+careEmp+employEmp+industrial;
  return {
    worker:{pension:pension,health:health,care:care,employ:employ,income:income,local:local,total:totalWorker},
    employer:{pension:pensionEmp,health:healthEmp,care:careEmp,employ:employEmp,industrial:industrial,total:totalEmployer},
    totalCost:monthPay+totalEmployer
  };
}

function _psimCalc(){
  var L=LABOR_LAW_2026;
  var g=function(id){return parseFloat((document.getElementById(id)||{value:0}).value)||0;};
  var days=g('psim-days'), dailyH=g('psim-daily-h');
  var nightH=g('psim-night-h'), otH=g('psim-ot-h');
  var hday=g('psim-hday'), deliv=g('psim-deliv');
  var totalH=days*dailyH;
  var weeklyH=Math.round(totalH/4.33*10)/10;
  // 공제
  var advance=g('psim-advance'), tax=g('psim-tax');
  var health=g('psim-health'), pension=g('psim-pension');
  var totalDeduct=advance+tax+health+pension;

  // 각 방식 계산
  var results=[
    {
      type:'hourly', label:'시급제', icon:'⏰', color:'#3b82f6',
      rate:'시급 ₩'+L.minWage.toLocaleString(),
      res:calcHourlyPay({hourlyRate:L.minWage,totalHours:totalH,nightH:nightH*days,overtimeH:otH*days,isHoliday:hday>0,juhuHours:weeklyH})
    },
    {
      type:'daily', label:'일급제', icon:'📅', color:'#7c3aed',
      rate:'일급 ₩'+L.minDaily.toLocaleString(),
      res:calcDailyPay({dailyRate:L.minDaily,workDays:days,holidayDays:hday})
    },
    {
      type:'weekly', label:'주급제', icon:'📆', color:'#059669',
      rate:'주급 기준',
      res:calcWeeklyPay({payType:'hourly',hourlyRate:L.minWage,weekH:Math.min(weeklyH,40)})
    },
    {
      type:'monthly', label:'월급제', icon:'💼', color:'#d97706',
      rate:'월급 ₩'+L.minMonthly.toLocaleString(),
      res:calcMonthlyPay({payType:'monthly_fixed',monthlyRate:L.minMonthly,nightH:nightH*days,overtimeH:otH*days})
    },
    {
      type:'delivery', label:'건당 배송', icon:'📦', color:'#0891b2',
      rate:'건당 ₩800',
      res:{totalPay:deliv*800,breakdown:{'배송건수':deliv+'건','단가':'₩800'}}
    }
  ];

  var maxPay=Math.max.apply(null,results.map(function(r){return r.res.totalPay;}));

  var html='<div style="margin-bottom:12px">'
    +'<div style="font-size:14px;font-weight:800;margin-bottom:4px">📊 급여 방식별 비교</div>'
    +'<div style="font-size:11px;color:var(--text3)">근무 '+days+'일 · '+totalH+'h · 최저임금 기준</div>'
    +'</div>'
    // 바 차트
    +'<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">';

  results.forEach(function(r){
    var gross=Math.round(r.res.totalPay||0);
    var net=Math.max(0,gross-totalDeduct);
    var pct=maxPay>0?Math.round(gross/maxPay*100):0;
    var mw=checkMinWage?checkMinWage(gross,totalH):{violation:false};
    html+='<div style="background:var(--bg2);border-radius:12px;padding:12px 14px;border:1px solid var(--border)">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      +'<span style="font-size:18px">'+r.icon+'</span>'
      +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:800">'+r.label+'</div>'
      +'<div style="font-size:10px;color:var(--text3)">'+r.rate+'</div>'
      +'</div>'
      +'<div style="text-align:right">'
      +'<div style="font-size:16px;font-weight:900;color:'+r.color+'">₩'+gross.toLocaleString()+'</div>'
      +(totalDeduct>0?'<div style="font-size:11px;color:var(--text3)">실지급 ₩'+net.toLocaleString()+'</div>':'')
      +'</div>'
      +(mw.violation?'<span style="background:#fef2f2;color:#dc2626;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700">⚠️최저임금미달</span>':'')
      +'</div>'
      // 프로그레스 바
      +'<div style="background:var(--bg3);border-radius:4px;height:8px;overflow:hidden">'
      +'<div style="height:100%;width:'+pct+'%;background:'+r.color+';border-radius:4px;transition:width .8s ease"></div></div>'
      // 상세 내역
      +'<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">'
      +Object.entries(r.res.breakdown||{}).filter(function(e){return typeof e[1]==='number'&&e[1]>0;}).map(function(e){
        return '<span style="font-size:10px;background:'+r.color+'18;color:'+r.color+';padding:2px 7px;border-radius:10px">'+esc(e[0])+' ₩'+Math.round(e[1]).toLocaleString()+'</span>';
      }).join('')
      +'</div>'
      +'</div>';
  });

  html+='</div>';

  // 공제 요약
  if(totalDeduct>0){
    html+='<div style="background:var(--red-l);border-radius:10px;padding:12px;margin-bottom:12px">'
      +'<div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px">📤 공제 합계: ₩'+totalDeduct.toLocaleString()+'</div>'

      +(advance?'<span>💸 가불 ₩'+advance.toLocaleString()+'</span>':'')
      +(tax?'<span>소득세 ₩'+tax.toLocaleString()+'</span>':'')
      +(health?'<span>건강보험 ₩'+health.toLocaleString()+'</span>':'')
      +(pension?'<span>국민연금 ₩'+pension.toLocaleString()+'</span>':'')
      +'</div></div>';
  }

  // 최적 급여 방식 추천
  var best=results.reduce(function(a,b){return a.res.totalPay>b.res.totalPay?a:b;});
  html+='<div style="background:linear-gradient(135deg,var(--brand-l),rgba(59,130,246,.05));border:1px solid var(--brand);border-radius:12px;padding:14px">'
    +'<div style="font-size:13px;font-weight:800;color:var(--brand);margin-bottom:4px">💡 최고 급여 방식</div>'
    +'<div style="font-size:16px;font-weight:900">'+best.icon+' '+best.label+' — ₩'+Math.round(best.res.totalPay).toLocaleString()+'</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-top:4px">해당 조건에서 가장 높은 급여입니다</div>'
    +'</div>';

  var resultEl=document.getElementById('psim-result');
  if(resultEl)resultEl.innerHTML=html;
}

function saveCamp(oldName){
  var nameEl=document.getElementById('camp-name-inp');

  var addrEl=document.getElementById('camp-addr-inp');
  if(!nameEl||!colorEl)return;
  var name=nameEl.value.trim();
  var addr=addrEl?addrEl.value.trim():'';
  if(!name){toast('❌ 캠프명을 입력하세요');return;}

  var did=_CU&&_CU.dealerId;
  if(!did||!_db){toast('❌ Firebase 미연결');return;}

  function doSave(lat,lng){
    if(!_campConfig[name])_campConfig[name]={};
    if(addr)_campConfig[name].addr=addr;
    if(lat)_campConfig[name].lat=lat;
    if(lng)_campConfig[name].lng=lng;
    _db.collection('settings').doc(did+'_campConfig').set(_campConfig,{merge:false})
      .then(function(){
        _syncCampColors();
        var mo=document.getElementById('mo-camp');if(mo)mo.remove();

        pageCamps();
      }).catch(function(e){toast('❌ 저장 실패: '+e.message);});
  }

  // 주소 → 좌표 변환 (카카오)
  if(addr&&window.kakao&&kakao.maps&&kakao.maps.services){
    var gc=new kakao.maps.services.Geocoder();
    gc.addressSearch(addr,function(res,status){
      if(status===kakao.maps.services.Status.OK&&res.length){
        doSave(parseFloat(res[0].y),parseFloat(res[0].x));

        doSave(null,null);

// ══ 라우트 단가 파일 일괄 등록 ══
function importRpFile(input){
  var file=input.files[0];
  if(!file)return;
  input.value='';
  var ext=file.name.split('.').pop().toLowerCase();

  // 라우트코드 인식 패턴 (다양한 포맷)
  // ★ 라우트코드 정규화 (언더스코어 제거: 109_A → 109A)
  function _normRoute(s){
    return String(s||'').trim().toUpperCase().replace(/_/g,'');
  }
  function _isRoute(s){
    if(!s)return false;
    s=_normRoute(s);
    // 숫자3자리+알파벳 (예: 608B, 213A, 109A)
    if(/^[0-9]{3}[A-Z]$/.test(s))return true;
    // 알파벳+숫자 (예: D1, F3)
    if(/^[A-Z][0-9]{1,2}$/.test(s))return true;
    // 캠프코드 형식 (예: BS1, DG2, JJ1)
    if(/^[A-Z]{2}[0-9]$/.test(s))return true;
    // 확장: 영숫자 2~6자
    if(/^[0-9A-Z]{2,6}$/.test(s)&&!/^\d+$/.test(s))return true;
    return false;
  }
  // 캠프/헤더행 스킵 판단
  function _isHeaderRow(s){
    if(!s)return true;
    s=String(s).trim();
    var skip=['라우트','캠프','구분','단가','코드','타입','route','camp','type','부산','대구','진주','wave','WAVE','합계','총계','평균','기사단가','년'];
    return skip.some(function(k){return s.toLowerCase().includes(k.toLowerCase());})||s.length>10;
  }

  if(ext==='xlsx'||ext==='xls'){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array'});
        var result={};

        wb.SheetNames.forEach(function(sn){
          var ws=wb.Sheets[sn];
          var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
          if(!rows.length)return;

          // ★ 헤더행에서 "라우트번호" 컬럼 위치 자동 탐지 (다중열 그룹 구조 대응)
          // 예: [캠프, 타입, 라우트번호, 기사단가, None, 캠프, 타입, 라우트번호, 기사단가, ...]
          var routeCols=[];  // 라우트 컬럼 인덱스 목록
          var priceCols=[];  // 단가 컬럼 인덱스 목록
          var headerRow=rows[0]||[];
          headerRow.forEach(function(cell,ci){
            if(!cell)return;
            var cn=String(cell).replace(/\n/g,'').toLowerCase().trim();
            if(cn.includes('라우트')&&(cn.includes('번호')||cn.includes('코드')||cn.includes('route')))routeCols.push(ci);
            if(cn.includes('단가')||cn.includes('price'))priceCols.push(ci);
          });

          if(routeCols.length>0){
            // ★ 다중열 그룹 구조 (캠프|타입|라우트|단가 반복)
            rows.slice(1).forEach(function(row){
              if(!row)return;
              routeCols.forEach(function(rc,gi){
                var pc=priceCols[gi]!==undefined?priceCols[gi]:rc+1;
                var rawRoute=String(row[rc]||'').trim();
                var price=row[pc];
                if(!rawRoute||!price)return;
                var code=_normRoute(rawRoute);
                if(_isRoute(code)&&+price>100)result[code]=Math.round(+price);
              });
            });
          } else {
            // 기존 2열 구조 (라우트, 단가) 또는 전체 셀 스캔
            rows.forEach(function(row){
              if(!row)return;
              // 모든 셀 쌍 검사 (셀[i]=라우트코드, 셀[i+1]=단가)
              for(var ci=0;ci<row.length-1;ci++){
                var rawCode=String(row[ci]||'').trim();
                if(!rawCode)continue;
                var code=_normRoute(rawCode);
                if(!_isRoute(code))continue;
                var v=row[ci+1];
                if(v!==null&&v!==undefined&&v!==''&&!isNaN(+v)&&+v>100){
                  result[code]=Math.round(+v);
                  break;
                }
              }
            });
          }
        });

        _showImportPreview(result,file.name);
      }catch(e){toast('❌ 엑셀 파싱 오류: '+e.message);}
    };
    reader.readAsArrayBuffer(file);

  } else if(ext==='txt'||ext==='csv'){
    var reader2=new FileReader();
    reader2.onload=function(e){
      try{
        var lines=e.target.result.replace(/\r/g,'').split('\n');
        var result={};
        var curNum='';
        lines.forEach(function(line){
          line=line.trim();
          if(!line||line.startsWith('#')||line.startsWith('//'))return;
          // CSV: 라우트,단가 (언더스코어 정규화: 109_A → 109A)
          var cols=line.split(/[,\t]/);
          if(cols.length>=2){
            var code=String(cols[0]||'').trim().toUpperCase().replace(/_/g,'');
            var price=parseFloat(cols[1])||0;
            if(code&&price>100)result[code]=Math.round(price);
            return;
          }
          // 숫자만 3자리 = 라우트 번호 (텍스트 방식)
          if(/^[0-9]{3}$/.test(line)){curNum=line;return;}
          // "A 920" 형태 (curNum과 조합)
          var m=line.match(/^([A-Z])\s+([0-9]+)$/i);
          if(m&&curNum){result[curNum+m[1].toUpperCase()]=+m[2];return;}
          // "608B 920" or "608_B 920" 스페이스 구분
          var m2=line.match(/^([0-9A-Z_]{2,7})\s+([0-9]+)$/i);
          if(m2&&+m2[2]>100)result[m2[1].toUpperCase().replace(/_/g,'')]=+m2[2];
        });
        _showImportPreview(result,file.name);
      }catch(e){toast('❌ 파일 파싱 오류: '+e.message);}
    };
    reader2.readAsText(file,'utf-8');
  } else {
    toast('❌ .xlsx/.xls/.txt/.csv 파일만 지원합니다');
  }
}

function pageStats(){
  document.getElementById('page-title').textContent='통계';
  document.getElementById('topbar-right').innerHTML='';
  var el=document.getElementById('content');
  if(!_db||!_CU){el.innerHTML='<div class="empty">로그인 후 이용하세요</div>';return;}
  el.innerHTML='<div class="loading">로딩 중...</div>';
  _db.collection('settlements').where('dealerId','==',_CU.dealerId).get()
    .then(function(snap){
      if(!snap||snap.empty){el.innerHTML='<div class="empty">데이터 없음</div>';return;}
      var settles=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      el.innerHTML='';
      // 월별 + 캠프별
      var byMonth={};var byCamp={};
      settles.forEach(function(s){
        var mo=s.month||'';var cc=_getSettleCamp(s)||'기타';
        var r=calcNet(s);
        // 대시보드와 동일한 방식으로 총매출 계산
        var ct=s.coupangTotal||(((s.damt||0)+(s.ramt||0)+(s.fresh||0)+(s.inc||0)+(s.nocont||0)))||0;
        var totalVat=ct?Math.round(ct*1.1):Math.round((r.income||0)*1.1); // 총매출(VAT포함)
        var supplyAmt=Math.round(totalVat/1.1);             // 공급가(VAT제외)
        var vat=totalVat-supplyAmt;                         // 부가세(10%)
        // 회사부담 보험료 (고용0.9% + 산재0.88%)
        var mw=r.monthlyWage||0;
        var empComp=mw>=800000?Math.floor(mw*0.009/10)*10:0;
        var workComp=Math.floor(mw*0.0088/10)*10;
        var insComp=empComp+workComp;
        // 순수익 = 총매출(VAT포함) - 기사실지급(VAT포함) - 회사보험료
        var netProfit=totalVat-(r.net||0)-insComp;
        if(!byMonth[mo])byMonth[mo]={cnt:0,dcnt:0,income:0,vat:0,totalVat:0,net:0,insComp:0,profit:0};
        byMonth[mo].cnt++;byMonth[mo].dcnt+=(s.dcnt||0);
        byMonth[mo].income+=supplyAmt;byMonth[mo].vat+=vat;byMonth[mo].totalVat+=totalVat;
        byMonth[mo].net+=r.net||0;byMonth[mo].insComp+=insComp;byMonth[mo].profit+=netProfit;

        byCamp[cc].cnt++;byCamp[cc].dcnt+=(s.dcnt||0);
        byCamp[cc].income+=supplyAmt;byCamp[cc].vat+=vat;byCamp[cc].totalVat+=totalVat;
        byCamp[cc].net+=r.net||0;byCamp[cc].insComp+=insComp;byCamp[cc].profit+=netProfit;
      });

      var camps=Object.keys(byCamp).sort();

          return '<tr style="border-bottom:1px solid var(--border);'+(isFirst?'background:rgba(59,130,246,.06)':'')+'">'
            +'<td style="padding:8px"><strong style="color:'+(isFirst?'var(--blue)':'var(--text)')+'">'+mo+'</strong>'
            +(isFirst?'<span style="margin-left:4px;background:#dbeafe;color:#1d4ed8;padding:0 4px;border-radius:8px;font-size:9px">최신</span>':'')
            +'</td>'

              +'<div style="font-weight:700;color:var(--green)">₩'+fmt(tot)+'</div>'
              +'<div style="font-size:10px;color:var(--text3);margin-top:2px">'+fmt(d.dcnt)+'건</div>'
            +'</td>'

    +months.map(function(m){return '<tr><td><strong>'+m+'</strong></td><td>'+byMonth[m].cnt+'건</td><td>'+fmt(byMonth[m].dcnt)+'건</td>'
      +'<td style="color:#0F6E56">₩'+fmt(byMonth[m].income)+'</td>'

    +'</tbody></table></div></div>'

    +'<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>캠프</th><th>정산수</th><th>배송건</th><th>수익합계</th><th>실지급</th></tr></thead><tbody>'
    +campRows+'</tbody></table></div></div>'

// ══ 인센 설정 ══
function _incKey(drv,route){return 'inc_'+drv.replace(/\s/g,'_')+'_'+route;}
function _setIncSetting(drv,route,on,rate){
  localStorage.setItem(_incKey(drv,route),JSON.stringify({on:on,rate:rate}));
  if(_db){
    var key=_incKey(drv,route);var obj={};obj[key]={on:on,rate:rate};
    _db.collection('settings').doc((_CU&&_CU.dealerId?_CU.dealerId:'shared')+'_incSettings').set(obj,{merge:true}).catch(function(){});
  }
}
function loadIncSettingsFromFB(){
  if(!_db)return;
  _db.collection('settings').doc((_CU&&_CU.dealerId?_CU.dealerId:'shared')+'_incSettings').get().then(function(doc){
    if(!doc.exists)return;
    var data=doc.data();
    Object.keys(data).forEach(function(k){
      if(k.startsWith('inc_'))localStorage.setItem(k,JSON.stringify(data[k]));
    });
  }).catch(function(){});
}
// INC_CAMPS는 동적으로 settlements에서 구성
function _buildIncCamps(panelData){
  var campMap={};
  Object.keys(panelData).forEach(function(drv){
    panelData[drv].forEach(function(route){
      var camp=_getCampForRoute(route)||'기타';
      if(!campMap[camp])campMap[camp]={name:camp,color:_campColor(camp),drvRoutes:[]};
      campMap[camp].drvRoutes.push({drv:drv,route:route});
    });
  });
  return Object.keys(campMap).sort().map(function(k){return campMap[k];});
}
function _getCampForRoute(route){
  return _getRouteCamp(route);
}

function openIncPanel(){
  if(!_db||!_CU){toast('❌ 로그인 후 이용하세요');return;}
  var settle=_settleCache||[];
  if(!settle.length){
    toast('⏳ 정산 데이터 로딩 중...');
    _db.collection('settlements').where('dealerId','==',_CU.dealerId).get()
      .then(function(snap){
        if(!snap||!snap.size){toast('정산서가 없습니다. 먼저 엑셀 업로드 하세요.');return;}
        _settleCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
        setTimeout(function(){openIncPanel();},100);
      }).catch(function(e){toast('❌ 로드 오류: '+e.message);});
    return;
  }

  // 기사별 라우트 수집
  var panelData={};
  settle.forEach(function(s){
    var drv=s.userId||s.driver||'';
    if(!drv)return;
    if(!panelData[drv])panelData[drv]=[];
    (s.routeDetails||[]).forEach(function(rd){
      if(rd.route&&panelData[drv].indexOf(rd.route)<0)panelData[drv].push(rd.route);
    });
    if(!panelData[drv].length&&s.route)panelData[drv].push(s.route);
  });
  var drivers=Object.keys(panelData).sort();
  if(!drivers.length){toast('정산서에 라우트 정보가 없습니다. 엑셀 업로드 후 시도하세요.');return;}

  // 캠프 목록 (동적)
  var campSet={};
  Object.keys(panelData).forEach(function(drv){
    panelData[drv].forEach(function(route){
      var camp=_routeCampMap[route]||'기타';
      campSet[camp]=_campColor(camp);
    });
  });
  var campNames=Object.keys(campSet).sort();

  // 테이블 행 생성
  var rows=drivers.map(function(drv){
    return panelData[drv].sort().map(function(route){
      var s2=_getIncSetting(drv,route);
      var camp=_routeCampMap[route]||'기타';
      var col=campSet[camp]||'#64748b';
      var drvSafe=drv.replace(/\s/g,'_');
      var togKey=_incNewKey(drv,route);
      var rateOpts=[10,15,25].map(function(r){
        var on=(s2.rate===r);
        var bg=on?'#2563eb':'#f1f5f9';
        var fg=on?'#fff':'#374151';
        var bd=on?'#2563eb':'#d1d5db';
        return '<button class="inc-rate-btn" data-k="'+togKey+'" data-rate="'+r+'" onclick="_incRate2(this)" style="padding:3px 8px;border-radius:6px;border:1.5px solid '+bd+';background:'+bg+';color:'+fg+';font-size:11px;font-weight:700;cursor:pointer;min-width:36px">x'+r+'</button>';
      }).join('');
      var togBg=s2.on?'#059669':'#6b7280';
      var customVal=([10,15,25].indexOf(s2.rate)<0)?s2.rate:'';
      return '<tr class="inc-row" data-camp="'+camp+'" style="border-bottom:1px solid var(--border)">'
        +'<td style="padding:7px 8px;font-weight:600;font-size:12px">'+esc(s2.name||drv)+'<br><small style="color:var(--text3);font-family:monospace;font-size:10px">'+esc(drv)+'</small></td>'
        +'<td style="padding:7px 8px;font-size:12px;font-weight:700;color:'+col+'">'+route+'</td>'
        +'<td style="padding:7px 8px"><button class="inc-tog-btn" data-k="'+togKey+'" onclick="_incToggle2(this)" style="padding:3px 10px;border-radius:100px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:'+togBg+';color:#fff">'+(s2.on?'ON':'OFF')+'</button></td>'
        +'<td style="padding:7px 8px"><div style="display:flex;gap:4px;align-items:center">'
          +rateOpts
          +'<input class="inc-custom-inp" data-k="'+togKey+'" type="number" value="'+customVal+'" placeholder="직접" oninput="_incCustom2(this)" style="width:52px;padding:3px 5px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;background:var(--bg);color:var(--text)">'
          +'<span style="font-size:11px;color:var(--text3)">원</span>'
        +'</div></td>'
        +'</tr>';
    }).join('');
  }).join('');

  // 캠프별 일괄 버튼
  // 캠프 일괄 버튼: _INC_MAP 키 방식으로 생성 (onclick 이스케이프 제거)
  var _campBulkKeys={};

    var routes=[...new Set(Object.keys(panelData).reduce(function(arr,drv){
      panelData[drv].forEach(function(r){if((_routeCampMap[r]||'기타')===camp)arr.push(r);});
      return arr;
    },[]))];
    if(routes.length){var k='cb_'+camp;_INC_MAP[k]={camp:camp,routes:routes};_campBulkKeys[camp]=k;}
  });
  var bulkBtns=campNames.map(function(camp){
    var col=campSet[camp]||'#64748b';
    var campRoutes=[];
    Object.keys(panelData).forEach(function(drv){
      panelData[drv].forEach(function(r){if((_routeCampMap[r]||'기타')===camp)campRoutes.push({drv:drv,route:r});});
    });
    if(!campRoutes.length)return '';
    var onCnt=campRoutes.filter(function(x){return _getIncSetting(x.drv,x.route).on;}).length;
    var allOn=onCnt===campRoutes.length,allOff=onCnt===0;
    var k=_campBulkKeys[camp]||'';
    return '<div style="display:inline-flex;align-items:center;gap:4px;padding:3px 4px 3px 10px;border-radius:100px;border:2px solid '+col+';background:'+col+'14">'
      +'<span style="font-size:11px;font-weight:700;color:'+col+'">'+camp+'</span>'
      +'<button class="inc-bulk-btn" data-k="'+k+'" data-on="true" style="padding:2px 8px;border:none;border-radius:100px;font-size:10px;font-weight:700;cursor:pointer;background:'+(allOn?col:'var(--bg3)')+';color:'+(allOn?'#fff':'var(--text3)')+'">ON</button>'
      +'<button class="inc-bulk-btn" data-k="'+k+'" data-on="false" style="padding:2px 8px;border:none;border-radius:100px;font-size:10px;font-weight:700;cursor:pointer;background:'+(allOff?'#6b7280':'var(--bg3)')+';color:'+(allOff?'#fff':'var(--text3)')+'">OFF</button>'
      +'</div>';
  }).join('');

  // 캠프 필터 버튼
  var filterBtns=campNames.map(function(camp){
    var col=campSet[camp]||'#64748b';
    return '<button onclick="_filterIncCamp2(\''+camp+'\')" id="incf-'+camp+'" '
      +'style="padding:3px 10px;border-radius:100px;border:1.5px solid '+col+';background:transparent;color:'+col+';font-size:11px;font-weight:700;cursor:pointer">'+camp+'</button>';
  }).join('');

  // 기존 패널 제거 후 생성
  var old=document.getElementById('inc-panel-mo');if(old)old.remove();
  var mo=document.createElement('div');
  mo.id='inc-panel-mo';
  mo.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:700;display:flex;align-items:center;justify-content:center;padding:14px';
  var inner=document.createElement('div');
  inner.style.cssText='background:var(--bg);border-radius:14px;width:700px;max-width:95vw;max-height:88vh;overflow:hidden;display:flex;flex-direction:column';
  inner.onclick=function(e){e.stopPropagation();};
  // 헤더
  var incHdr=document.createElement('div');
  incHdr.style.cssText='padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center';
  incHdr.innerHTML='<span style="font-weight:700;font-size:14px">⚙️ 기사별 라우트 인센티브 설정</span>';
  var closeBtn2=document.createElement('button');
  closeBtn2.style.cssText='padding:5px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer';
  closeBtn2.textContent='닫기';closeBtn2.onclick=function(){mo.remove();};
  incHdr.appendChild(closeBtn2);inner.appendChild(incHdr);
  // 캠프별 일괄
  if(bulkBtns){
    var bulkArea=document.createElement('div');
    bulkArea.style.cssText='padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg3)';
    bulkArea.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px">캠프별 일괄</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'+bulkBtns+'</div>';
    // 이벤트 위임: 일괄 버튼
    bulkArea.addEventListener('click',function(e){

      if(bb){
        var k=bb.dataset.k;var onVal=(bb.dataset.on==='true');

        mo.remove();
        setTimeout(function(){openIncPanel();setTimeout(function(){_filterIncCamp2(activeFilter);},100);},50);

  inner.appendChild(tipDiv);

  bodyDiv.style.cssText='overflow:auto;flex:1';
  bodyDiv.innerHTML='<div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;background:var(--bg3)">'
    +'<button onclick="_filterIncCamp2(\'전체\')" id="incf-전체" style="padding:3px 10px;border-radius:100px;border:1.5px solid var(--border);background:var(--blue);color:#fff;font-size:11px;font-weight:700;cursor:pointer">전체</button>'

    +'<th style="padding:8px 12px;text-align:left">기사/ID</th><th style="padding:8px 12px;text-align:left">라우트</th>'

    +'</tr></thead><tbody>'+rows+'</tbody></table>';
  inner.appendChild(bodyDiv);
  mo.appendChild(inner);
  document.body.appendChild(mo);
  }

function _filterIncCamp2(camp){
  document.querySelectorAll('.inc-row').forEach(function(tr){

function _incCampRoutes(routes,onVal){
  // 라우트 목록 기반 일괄 ON/OFF
  var settle=_settleCache||[];
  var routeSet=new Set(routes);
  settle.forEach(function(s){
    var drv=s.userId||s.driver||'';if(!drv)return;
    var sRoutes=[];
    if(s.routeDetails&&s.routeDetails.length)
      s.routeDetails.forEach(function(rd){if(rd.route)sRoutes.push(rd.route);});
    else if(s.route)sRoutes=[s.route];
    sRoutes.forEach(function(route){
      if(routeSet.has(route)){
        var cur=_getIncSetting(drv,route);
        _setIncSetting(drv,route,onVal,cur.rate);
      }
    });
  });
  var mo=document.getElementById('inc-panel-mo');if(mo)mo.remove();
  openIncPanel();
  toast((onVal?'🟢':'🔴')+' 캠프 인센 '+(onVal?'ON':'OFF')+' 적용');
}
function _incCampAll2(prefixes,onVal){

  var routes=Object.keys(RPRICE).filter(function(r){
    return prefixes.some(function(p){return r.startsWith(p);});
  });
  _incCampRoutes(routes,onVal);
}

function doResetData(){
  var doSettle=document.getElementById('rst-settle')&&document.getElementById('rst-settle').checked;
  var doDrivers=document.getElementById('rst-drivers')&&document.getElementById('rst-drivers').checked;
  var doRoutes=document.getElementById('rst-routes')&&document.getElementById('rst-routes').checked;
  var doInc=document.getElementById('rst-inc')&&document.getElementById('rst-inc').checked;
  if(!doSettle&&!doDrivers&&!doRoutes&&!doInc){toast('삭제할 항목을 선택하세요');return;}
  var items=[];
  if(doSettle)items.push('정산서');
  if(doDrivers)items.push('기사 정보');
  if(doRoutes)items.push('라우트 단가표');
  if(doInc)items.push('인센 설정');
  var chk=prompt('⚠️ 삭제 항목: '+items.join(', ')+'\n\n되돌릴 수 없습니다.\n확인하려면 아래에 "전체초기화" 를 입력하세요:');
  if(chk!=='전체초기화'){toast('❌ 취소됨 (입력 불일치)');return;}
  var mo=document.getElementById('mo-reset');if(mo)mo.remove();
  toast('🗑 초기화 진행 중...');
  var promises=[];
  var did=_CU&&_CU.dealerId;
  if(!_db||!did){toast('❌ 로그인 정보 없음');return;}
  // 정산서 삭제
  if(doSettle){
    promises.push(_db.collection('settlements').where('dealerId','==',did).get().then(function(snap){
      var b=_db.batch();snap.forEach(function(d){b.delete(d.ref);});
      return snap.size?b.commit():Promise.resolve();
    }));
    var _did2=(_CU&&_CU.dealerId)||'shared';
    // localStorage 완전 초기화 (removeItem + 빈 배열 덮어쓰기)
    localStorage.removeItem('dw_'+_did2+'_settlements');
    localStorage.setItem('dw_'+_did2+'_settlements','[]');
    _settleCache=[];SP('settlements',null);
  }

  // 기사 삭제
  if(doDrivers){
    promises.push(_db.collection('drivers').where('dealerId','==',did).get().then(function(snap){
      var b=_db.batch();snap.forEach(function(d){b.delete(d.ref);});
      return snap.size?b.commit():Promise.resolve();
    }));
    _drvCache=null;localStorage.removeItem('mbti_drivers');
  }
  // 라우트 단가표 초기화
  if(doRoutes){
    var rpId=did+'_routePrices';
    var rcId=did+'_routeCampMap';
    promises.push(_db.collection('settings').doc(rpId).delete().catch(function(){}));
    promises.push(_db.collection('settings').doc(rcId).delete().catch(function(){}));
    Object.keys(RPRICE).forEach(function(k){delete RPRICE[k];});
    if(window._routeCampMap){Object.keys(_routeCampMap).forEach(function(k){delete _routeCampMap[k];});}
    if(window.G_PRICES){Object.keys(G_PRICES).forEach(function(k){delete G_PRICES[k];});}
  }
  // 인센 설정 초기화
  if(doInc){
    var incId=did+'_incSettings';
    promises.push(_db.collection('settings').doc(incId).delete().catch(function(){}));
    // localStorage 인센 설정 제거
    Object.keys(localStorage).filter(function(k){return k.startsWith('inc_');}).forEach(function(k){localStorage.removeItem(k);});
  }
  Promise.all(promises).then(function(){
    toast('✅ 초기화 완료! '+items.join(', ')+' 삭제됨');
    // 완전한 초기화를 위해 페이지 새로고침
    setTimeout(function(){
      location.reload();
    }, 1200);
  }).catch(function(e){toast('⚠️ 일부 실패: '+e.message);});
}

function doChangePw(){
  var cur=(document.getElementById('chpw-cur')||{}).value||'';
  var nw=(document.getElementById('chpw-new')||{}).value||'';
  var nw2=(document.getElementById('chpw-new2')||{}).value||'';
  var errEl=document.getElementById('chpw-err');
  function showErr(msg){if(errEl){errEl.textContent=msg;errEl.style.display='block';}}
  if(!cur){showErr('현재 비밀번호를 입력하세요');return;}
  if(nw.length<6){showErr('새 비밀번호는 6자 이상이어야 합니다');return;}
  if(nw!==nw2){showErr('새 비밀번호가 일치하지 않습니다');return;}
  var user=_auth&&_auth.currentUser;
  if(!user){showErr('로그인 정보를 찾을 수 없습니다');return;}
  var btn=document.querySelector('#mo-chpw .btn-blue');
  if(btn){btn.textContent='변경 중...';btn.disabled=true;}
  var credential=firebase.auth.EmailAuthProvider.credential(user.email,cur);
  user.reauthenticateWithCredential(credential).then(function(){
    return user.updatePassword(nw);
  }).then(function(){
    document.getElementById('mo-chpw')&&document.getElementById('mo-chpw').remove();
    toast('✅ 비밀번호가 변경되었습니다');
  }).catch(function(e){
    if(btn){btn.textContent='🔑 변경하기';btn.disabled=false;}
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')
      showErr('❌ 현재 비밀번호가 올바르지 않습니다');
    else if(e.code==='auth/weak-password')
      showErr('❌ 비밀번호가 너무 약합니다 (6자 이상)');
    else
      showErr('❌ 변경 실패: '+e.message);
  });
}

        +'<div style="font-size:14px;font-weight:900">₩'+fmt(Math.round(t.bd.net/10000))+'만</div>'

function checkDuplicateSettlements(){
  if(!_settleCache||!_settleCache.length){toast('❌ 정산 데이터 없음');return;}
  var seen={},dups=[];
  _settleCache.forEach(function(s){
    var key=(s.userId||s.driver||'')+'_'+(s.month||'');
    if(seen[key])dups.push(s);
    seen[key]=true;
  });
  if(!dups.length){toast('✅ 중복 없음');return;}
  toast('\u26a0\ufe0f \uc911\ubcf5 '+dups.length+'\uac74 \ubc1c\uacac: '+dups.map(function(s){return (s.driver||s.userId)+'('+s.month+')'}).slice(0,5).join(', '));
}

// ══ 원큐 전달 (향후 카카오 API 연동 포인트) ══
function openOneQueueSend(camp){
  if(!_settleCache||!_settleCache.length){toast('❌ 정산 데이터 없음');return;}
  camp=camp||'전체';
  // 캠프 목록 수집
  var campSet2={};
  (_settleCache||[]).forEach(function(x){var cc=_getSettleCamp(x)||'기타';campSet2[cc]=_campColor(cc);});
  var allCamps2=Object.keys(campSet2).sort();
  var targets=(camp==='전체')?_settleCache.slice():_settleCache.filter(function(x){return _getSettleCamp(x)===camp;});
  if(!targets.length){toast('❌ 대상 없음');return;}
  var unsent=targets.filter(function(x){return !x.taxSent;});
  var old2=document.getElementById('mo-onequeue');if(old2)old2.remove();
  var mo=document.createElement('div');mo.className='mo show';mo.id='mo-onequeue';
  mo.onclick=function(e){if(e.target===mo)mo.remove();};
  var d=document.createElement('div');d.className='md';d.style.maxWidth='500px';d.style.maxHeight='85vh';d.style.overflowY='auto';

  var hdr=document.createElement('div');hdr.className='mdt';
  hdr.textContent='⚡ 원큐 전달 — '+camp+' ('+targets.length+'명)';d.appendChild(hdr);

  // 캠프 선택 탭
  var tabDiv=document.createElement('div');
  tabDiv.style.cssText='display:flex;gap:5px;flex-wrap:wrap;padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:10px';
  var allTab=document.createElement('button');
  allTab.style.cssText='padding:5px 12px;border-radius:100px;border:1.5px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;background:'+(camp==='전체'?'var(--blue)':'var(--bg)')+';color:'+(camp==='전체'?'#fff':'var(--text2)');
  allTab.textContent='전체 ('+_settleCache.length+')';
  allTab.onclick=function(){openOneQueueSend('전체');};
  tabDiv.appendChild(allTab);
  allCamps2.forEach(function(cc){
    var col=campSet2[cc];var cnt=_settleCache.filter(function(x){return _getSettleCamp(x)===cc;}).length;
    var isActive=(camp===cc);
    var tb=document.createElement('button');
    tb.style.cssText='padding:5px 12px;border-radius:100px;border:1.5px solid '+col+';font-size:11px;font-weight:700;cursor:pointer;background:'+(isActive?col:'transparent')+';color:'+(isActive?'#fff':col);
    tb.textContent=cc+' ('+cnt+')';
    tb.onclick=(function(cc2){return function(){openOneQueueSend(cc2);};})(cc);
    tabDiv.appendChild(tb);
  });
  d.appendChild(tabDiv);

  // 요약 카드
  var summary=document.createElement('div');
  summary.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;background:var(--bg3);border-radius:8px;margin-bottom:12px';
  summary.innerHTML='<div style="text-align:center"><div style="font-size:10px;color:var(--text3)">전체</div><div style="font-size:18px;font-weight:800">'+targets.length+'명</div></div>'
    +'<div style="text-align:center"><div style="font-size:10px;color:var(--text3)">미전달</div><div style="font-size:18px;font-weight:800;color:var(--red)">'+unsent.length+'명</div></div>';
  d.appendChild(summary);

  // 안내문구
  var note=document.createElement('div');
  note.style.cssText='padding:10px;background:#EFF6FF;border-radius:8px;font-size:11px;color:#1d4ed8;margin-bottom:12px;line-height:1.6';
  note.innerHTML='📋 <strong>현재 기능:</strong> 명세서+세금계산서 전달완료 상태 일괄 변경<br>'
    +'🔜 <strong>예정 기능:</strong> 카카오 API 연동 → 기사에게 자동 발송';
  d.appendChild(note);

  // 기사 목록 (미전달만)
  if(unsent.length){
    var listTitle=document.createElement('div');
    listTitle.style.cssText='font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px';
    listTitle.textContent='미전달 기사 목록:';d.appendChild(listTitle);
    var list=document.createElement('div');
    list.style.cssText='max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:8px';
    unsent.forEach(function(x){
      var row=document.createElement('div');
      row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px';
      var cc=_getSettleCamp(x)||'기타';var col=_campColor(cc);
      row.innerHTML='<strong>'+esc(x.driver||x.userId||'')+'</strong>'
        +'<span style="font-size:10px;background:'+col+'22;color:'+col+';padding:1px 6px;border-radius:4px">'+cc+'</span>'
        +'<span style="color:var(--purple);font-weight:700">₩'+(calcNet(x).net||0).toLocaleString()+'</span>';
      list.appendChild(row);
    });
    d.appendChild(list);
  } else {
    var alldone=document.createElement('div');
    alldone.style.cssText='text-align:center;padding:20px;color:#059669;font-weight:700';
    alldone.textContent='✅ 모두 전달완료 상태입니다';d.appendChild(alldone);
  }

  var mdf=document.createElement('div');mdf.className='mdf';
  var cb=document.createElement('button');cb.className='btn';cb.textContent='닫기';cb.onclick=function(){mo.remove();};
  mdf.appendChild(cb);
  if(unsent.length){
    var doBtn=document.createElement('button');doBtn.className='btn btn-blue';
    doBtn.textContent='✅ '+unsent.length+'명 전달완료 처리';
    doBtn.onclick=function(){
      doBtn.textContent='처리 중...';doBtn.disabled=true;
      var promises=unsent.map(function(x){
        return _db.collection('settlements').doc(x.id).update({
          taxSent:true,taxSentAt:new Date().toISOString()
        }).then(function(){x.taxSent=true;}).catch(function(){});
      });
      Promise.all(promises).then(function(){
        toast('✅ '+unsent.length+'명 전달완료');
        mo.remove();
        // TODO: 카카오 API 연동 시 여기에 발송 코드 추가
        // unsent.forEach(function(x){ sendKakao(x); });
        _settleCache=null;_reloadSettlePage();
      });
    };
    mdf.appendChild(doBtn);
  }
  d.appendChild(mdf);mo.appendChild(d);
  document.getElementById('modals').appendChild(mo);
}

// SUPER_ADMIN_EMAILS/EMAIL 상단에서 선언됨
function isSuperAdmin(){return _CU&&SUPER_ADMIN_EMAILS.indexOf(_CU.email)>=0;}

function _requirePlan(feature,callback){
  if(!_db||!_CU){toast('❌ 로그인 필요');return;}
  if(isSuperAdmin()){callback();return;}
  var did=_CU.uid||_CU.dealerId||_CU.companyId||'';
  if(!did){callback();return;}
  _db.collection('companies').doc(did).get().then(function(snap){
    var d=snap.exists?snap.data():{};
    if(_isPlanAllowed(d)){callback();}
    else{_renderPaywall(feature);}
  }).catch(function(){callback();});
}

function _isPlanAllowed(d){
  if(d.settlePaid||d.rosterPaid)return true;
  var plan=d.plan||'';
  var paid=['qr_only','settle_taxi','payroll','qr_payroll','full'];
  return paid.indexOf(plan)>=0||(d.plans&&d.plans.length>0);
}

function _renderPaywall(feature){
  var el=document.getElementById('content');

function _buildNavRender(nav,cur,plan,hasPaid){
  if(!nav||!MENUS||!MENUS.length)return;
  var paid=['qr_only','settle_taxi','payroll','qr_payroll','full'];
  var unlocked=hasPaid||paid.indexOf(plan)>=0||isSuperAdmin();
  var freeItems=[],lockItems=[],anyOpen=false,openSections=[];
  MENUS.forEach(function(g,gi){
    if(!g||!g.items)return;
    var free=g.items.filter(function(m){return m&&m.p&&(unlocked||!m.plan||m.plan==='free');});
    var lock=g.items.filter(function(m){return m&&m.p&&!unlocked&&m.plan&&m.plan!=='free';});
    lock.forEach(function(m){lockItems.push(m);});
    if(free.length)openSections.push({s:g.s,items:free,gi:gi});
  });
  var html='';
  openSections.forEach(function(g){
    var id='nsec-'+g.gi;
    var hasActive=g.items.some(function(m){return m.p===cur;});
    if(hasActive)anyOpen=true;
    html+='<div class="ns'+(hasActive?' open':'')+'" id="nshead-'+g.gi+'" onclick="_toggleNavSection(this,this.nextElementSibling.id)">'+
      '<span>'+g.s+'</span><span class="ns-arrow">›</span></div>'+
      '<div class="ns-items'+(hasActive?' open':'')+'" id="'+id+'">';
    g.items.forEach(function(m){
      html+='<div class="ni'+(m.p===cur?' on':'')+'" id="nav-'+m.p+'" data-p="'+m.p+'" onclick="goPage(this.dataset.p)">'+
        '<span style="font-size:14px">'+m.ic+'</span><span style="flex:1">'+m.l+'</span></div>';
    });
    html+='</div>';
  });
  if(lockItems.length){
    html+='<div style="margin:8px 10px 0;border-top:1px dashed var(--border);padding-top:8px">'
      +'<div style="font-size:9px;color:var(--text3);font-weight:700;padding:0 4px 6px;display:flex;align-items:center">'
      +'🔒 유료 기능'
      +'<button onclick="_showSubModal()" style="margin-left:auto;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:9px;padding:2px 7px;cursor:pointer">구독</button>'
      +'</div>';
    lockItems.forEach(function(m){
      html+='<div class="ni" id="nav-'+m.p+'" data-p="'+m.p+'" onclick="goPage(this.dataset.p)" style="opacity:.55">'+
        '<span style="font-size:14px">'+m.ic+'</span><span style="flex:1">'+m.l+'</span>'+
        '<span style="font-size:9px;color:#f59e0b">🔒</span></div>';
    });
    html+='</div>';
  }
  nav.innerHTML=html;
  if(!anyOpen&&openSections.length){
    var h0=document.getElementById('nshead-'+openSections[0].gi);
    var f0=document.getElementById('nsec-'+openSections[0].gi);
    if(h0)h0.classList.add('open');
    if(f0)f0.classList.add('open');
  }
}

(function(){
  var params=new URLSearchParams(window.location.search);
  if(params.get('toss')!=='success')return;
  var orderId=params.get('orderId')||'';
  var planType=params.get('planType')||'full';
  history.replaceState(null,'',window.location.pathname);
  function doActivate(){
    if(!_CU||!_db){setTimeout(doActivate,600);return;}
    var did=_CU.uid||_CU.dealerId||'';
    if(!did){setTimeout(doActivate,600);return;}
    _db.collection('companies').doc(did).update({
      plan:planType, plans:[], settlePaid:true, rosterPaid:true,
      planActivatedAt:new Date().toISOString(),
      planExpiry:new Date(Date.now()+30*86400000).toISOString(),
      lastOrderId:orderId
    }).then(function(){
      window._cachedPlan=planType;
      window._cachedHasPaid=true;
      window._cachedPlan=planType;
      window._navPlanLoaded=false;
      toast('🎉 결제 완료! 모든 기능이 활성화됐습니다');

      // ★ 슈퍼어드민 결제 알림
      (function(){
        var planLabel = (window.PLAN_INFO&&window.PLAN_INFO[planType])?window.PLAN_INFO[planType].label:planType;
        var amount = (window.PLAN_INFO&&window.PLAN_INFO[planType])?window.PLAN_INFO[planType].amount:0;
        var coName = (_CU&&_CU.companyName)||'';
        // FCM 푸시
        fetch('/fcm/notify-admin',{
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            title:'💳 결제 완료!',
            body:(coName||'신규고객')+' · '+planLabel+' · ₩'+(amount?amount.toLocaleString():''),
            type:'pay'
          })
        }).catch(function(){});
        // Firestore 이벤트 로그
        if(_db){
          _db.collection('admin_events').add({
            type:'pay', plan:planType, planLabel:planLabel,
            amount:amount, companyName:coName||'',
            dealerId:did, orderId:orderId||'',
            createdAt:firebase.firestore.FieldValue.serverTimestamp()
          }).catch(function(){});
        }
      })();

      // 잠금 해제 후 사이드바 즉시 갱신
      setTimeout(function(){
        buildNav();
        // 현재 페이지 새로고침

      },300);
    }).catch(function(e){toast('⚠️ 활성화 오류: '+e.message);});
  }
  setTimeout(doActivate,800);
})();

function _approvePayment(reqId, dealerId, type){
  if(!_db||!isSuperAdmin()) return;
  var TYPE_FIELD={
    contract:{contractPaid:true},
    roster:{rosterPaid:true},
    qr:{qrPaid:true},
    full:{contractPaid:true,rosterPaid:true,qrPaid:true},
    settle:{settlePaid:true}
  };
  var fields=TYPE_FIELD[type]||{};
  if(!Object.keys(fields).length){toast('❌ 알 수 없는 유형: '+type);return;}
  if(!dealerId){toast('❌ dealerId 없음');return;}

  var batch=_db.batch();
  // 결제 요청 상태 승인
  batch.update(_db.collection('payment_requests').doc(reqId),{
    status:'approved',
    approvedAt:firebase.firestore.FieldValue.serverTimestamp(),
    approvedBy:_CU.email
  });
  // 회사 기능 활성화
  batch.set(_db.collection('companies').doc(dealerId),
    Object.assign(fields,{plan:'paid',updatedAt:firebase.firestore.FieldValue.serverTimestamp()}),
    {merge:true}
  );
  batch.commit().then(function(){
    toast('✅ 승인 완료! 기능이 즉시 활성화됐습니다');
    var payTab=document.getElementById('admin-tab-1');
    if(payTab) _loadPaymentRequests(payTab);
  }).catch(function(e){toast('❌ '+e.message);});
}

function _rejectPayment(reqId){
  if(!_db||!isSuperAdmin()) return;
  _db.collection('payment_requests').doc(reqId).update({
    status:'rejected',rejectedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    toast('거절 처리됐습니다');
    var payTab=document.getElementById('admin-tab-1');
    if(payTab) _loadPaymentRequests(payTab);
  }).catch(function(e){toast('❌ '+e.message);});
}

    // 항목별 오차 체크 (1,000원 초과)
    var THR=1000;
    var checks=[
      {label:'TOTAL 합계',    excel:ev.excelTotal, sum:ev.sumTotal, diff:ev.diffTotal},

      }

      errBanner.innerHTML='<div style="font-size:13px;font-weight:800;color:#92400e;margin-bottom:2px">🔔 쿠팡↔대리점 금액 불일치! ('+errItems.length+'개 항목)</div>'        +'<div style="font-size:11px;font-weight:700;color:#b45309;margin-bottom:4px">엑셀 합계행(쿠팡 기준) ≠ 개별 기사 합산 — 쿠팡 수취액을 확인하세요</div>'        +'<div style="font-size:10px;color:#78350f;margin-bottom:4px">📌 원인: ① 반품/취소 건이 별도 집계 ② 기간이 두 달에 걸침 ③ 엑셀 수동 수정</div>'        +errLines;

<script>

function _startDispatchListener(uid){
  if(!window._db||!uid)return;
  var td=new Date().toISOString().slice(0,10);
  try{
    window._db.collection('driver_notifications')
      .where('targetDriverId','==',uid).where('type','==','dispatch')
      .where('date','==',td).where('isRead','==',false).limit(3)
      .onSnapshot(function(snap){
        snap.docChanges().forEach(function(ch){
          if(ch.type!=='added')return;
          var d=ch.doc.data();
          var bn=document.createElement('div');
          bn.style.cssText='position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9998;background:#1e40af;color:#fff;padding:14px 20px;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:260px;text-align:center;cursor:pointer;font-family:inherit';
          bn.innerHTML='<div style="font-size:20px">📦</div><div style="font-size:14px;font-weight:800">'+(d.title||'배차 알림')+'</div><div style="font-size:12px;margin-top:4px;opacity:.9">'+(d.body||'')+'</div>';
          bn.onclick=function(){bn.remove();if(window._db&&ch.doc.id)window._db.collection('driver_notifications').doc(ch.doc.id).update({isRead:true}).catch(function(){});};
          document.body.appendChild(bn);
          if(navigator.vibrate)navigator.vibrate([200,100,200]);
          setTimeout(function(){if(bn.parentNode)bn.remove();},10000);
        });
      },function(e){console.warn('[배차알림]',e);});
  }catch(e){console.warn('[배차알림시작]',e);}
}

</script>
