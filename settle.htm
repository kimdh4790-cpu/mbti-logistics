function _empHomeLoad(did, uid, today, ym){
  // 오늘 출퇴근
  _db.collection('attendance').where('dealerId','==',did).where('userId','==',uid)
    .where('date','==',today).limit(1).get()
  .then(function(snap){
    var st=document.getElementById('emp-today-status');
    var tm=document.getElementById('emp-today-time');
    if(!st)return;
    if(snap.empty){
      st.innerHTML='<span style="color:var(--amber)">⏳ 미출근</span>';
      if(tm)tm.textContent='아직 출근하지 않았습니다';
    } else {
      var d=snap.docs[0].data();
      var qr=calcWorkHoursFromQR(d.checkIn||'',d.checkOut||'');
      if(d.checkOut){
        st.innerHTML='<span style="color:var(--green)">✅ 퇴근 완료</span>';
        if(tm)tm.textContent='출근 '+d.checkIn+' → 퇴근 '+d.checkOut+' ('+Math.round(qr.hours*10)/10+'h)';
      } else {
        st.innerHTML='<span style="color:#3b82f6">🟢 출근 중</span>';
        if(tm)tm.textContent='출근 '+d.checkIn+' · 근무 중...';
      }
    }
  }).catch(function(){});

  // 이번달 근무 통계
  _db.collection('attendance').where('dealerId','==',did).where('userId','==',uid)
    .where('date','>=',ym+'-01').where('date','<=',ym+'-31').get()
  .then(function(snap){
    var days=0, totalH=0, nightH=0;
    snap.forEach(function(doc){
      var d=doc.data();
      if(d.checkIn)days++;
      var qr=calcWorkHoursFromQR(d.checkIn||'',d.checkOut||'');
      totalH+=qr.hours; nightH+=qr.nightH;
    });
    var ms=document.getElementById('emp-month-stats');
    if(ms){
      ms.innerHTML=''
        +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:10px">'
        +'<div style="font-size:20px;font-weight:900;color:var(--brand)">'+days+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">근무일수</div></div>'
        +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:10px">'
        +'<div style="font-size:20px;font-weight:900;color:var(--green)">'+Math.round(totalH*10)/10+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">총 근무(h)</div></div>'
        +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:10px">'
        +'<div style="font-size:20px;font-weight:900;color:var(--purple)">'+Math.round(nightH*10)/10+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">야간(h)</div></div>';
    }
  }).catch(function(){});

  // 연차 현황
  var year=new Date().getFullYear();
  Promise.all([
    _db.collection('drivers').where('dealerId','==',did).where('userId','==',uid).limit(1).get(),
    _db.collection('leaves').where('dealerId','==',did).where('userId','==',uid)
      .where('status','==','approved')
      .where('startDate','>=',year+'-01-01').where('startDate','<=',year+'-12-31').get()
  ]).then(function(res){
    var ls=document.getElementById('emp-leave-status');
    if(!ls)return;
    var driverData=res[0].empty?{}:res[0].docs[0].data();
    var usedDays=0; res[1].forEach(function(d){usedDays+=d.data().days||1;});
    var legal=driverData.hireDate?calcLegalLeave(driverData.hireDate,year):15;
    var total=driverData.annualLeave||legal;
    var remain=Math.max(0,total-usedDays);
    var pct=total>0?Math.round(usedDays/total*100):0;
    var barColor=pct<50?'#059669':pct<80?'#d97706':'#dc2626';
    ls.innerHTML='<div style="display:flex;justify-content:space-around;margin-bottom:10px">'
      +'<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--brand)">'+total+'</div><div style="font-size:10px;color:var(--text3)">총 연차</div></div>'
      +'<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:'+barColor+'">'+usedDays+'</div><div style="font-size:10px;color:var(--text3)">사용</div></div>'
      +'<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:'+(remain<=3?'#dc2626':'#059669')+'">'+remain+'</div><div style="font-size:10px;color:var(--text3)">잔여</div></div>'
      +'</div>'
      +'<div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">'
      +'<div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:4px;transition:width .8s"></div></div>'
      +'<div style="font-size:10px;color:var(--text3);text-align:right;margin-top:4px">'+pct+'% 사용</div>';
  }).catch(function(){});
}

function _leaveTab(tab){
  ['pending','all','balance','mine'].forEach(function(t){
    var btn=document.getElementById('ltab-'+t);
    if(btn)btn.className=(t===tab)?'btn btn-blue':'btn';
  });
  var el=document.getElementById('leave-tab-content');
  if(!el)return;
  if(tab==='pending')_leaveRenderPending(el);
  else if(tab==='all')_leaveRenderAll(el);
  else if(tab==='balance')_leaveRenderBalance(el);
  else if(tab==='mine')_leaveRenderMine(el);
}

// ── 잔여 연차 현황 ──
function _leaveRenderBalance(el){
  el.innerHTML='<div class="empty"><div class="empty-icon">⏳</div>로딩 중...</div>';
  var did=_CU.dealerId;
  var year=new Date().getFullYear();
  // 직원 목록 + 사용 현황 조합
  Promise.all([
    _db.collection('drivers').where('dealerId','==',did).limit(100).get(),
    _db.collection('leaves').where('dealerId','==',did).where('status','==','approved')
      .where('startDate','>=',year+'-01-01').where('startDate','<=',year+'-12-31')
      .limit(500).get()
  ]).then(function(results){
    var driverSnap=results[0], leaveSnap=results[1];
    // 사용일수 집계
    var usedMap={};
    leaveSnap.forEach(function(doc){
      var d=doc.data();
      var uid=d.userId||'';
      if(!usedMap[uid])usedMap[uid]=0;
      usedMap[uid]+=(d.days||1);
    });

    var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
      +'<div style="font-size:13px;font-weight:700">'+year+'년 연차 현황</div>'
      +'<button onclick="_leaveEditBalance()" class="btn" style="font-size:11px">✏️ 연차 일괄 설정</button>'
      +'</div>'
      +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
      +'<tr style="background:var(--bg3)">'
      +'<th style="padding:8px 10px;text-align:left;border-bottom:2px solid var(--border)">직원</th>'
      +'<th style="padding:8px;border-bottom:2px solid var(--border)">입사일</th>'
      +'<th style="padding:8px;border-bottom:2px solid var(--border)">총 연차</th>'
      +'<th style="padding:8px;border-bottom:2px solid var(--border)">사용</th>'
      +'<th style="padding:8px;border-bottom:2px solid var(--border)">잔여</th>'
      +'<th style="padding:8px;border-bottom:2px solid var(--border)">진행률</th>'
      +'<th style="padding:8px;border-bottom:2px solid var(--border)">수정</th>'
      +'</tr>';

    driverSnap.forEach(function(doc){
      var d=doc.data();
      var uid=d.userId||d.coupangId||doc.id;
      var legal=d.hireDate?calcLegalLeave(d.hireDate,year):15;
      var total=d.annualLeave||d['annualLeave'+year]||legal;
      var used=usedMap[uid]||0;
      var remain=Math.max(0,total-used);
      var pct=total>0?Math.round(used/total*100):0;
      var barColor=pct<50?'#059669':pct<80?'#d97706':'#dc2626';
      html+='<tr style="border-bottom:1px solid var(--border)">'
        +'<td style="padding:8px 10px;font-weight:700">'+esc(d.name||uid)+'</td>'
        +'<td style="padding:8px;text-align:center;color:var(--text3);font-size:11px">'+esc(d.hireDate||'-')+'</td>'
        +'<td style="padding:8px;text-align:center;font-weight:700">'+total+'일</td>'
        +'<td style="padding:8px;text-align:center;color:'+barColor+';font-weight:700">'+used+'일</td>'
        +'<td style="padding:8px;text-align:center;font-weight:800;color:'+(remain<=3?'#dc2626':'var(--brand)')+'">'+remain+'일</td>'
        +'<td style="padding:8px;min-width:80px">'
        +'<div style="background:var(--bg3);border-radius:4px;height:8px;overflow:hidden">'
        +'<div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:4px"></div></div>'
        +'<div style="font-size:9px;color:var(--text3);text-align:center;margin-top:2px">'+pct+'%</div>'
        +'</td>'
        +'<td style="padding:8px;text-align:center">'
        +'<button data-uid="'+esc(uid)+'" data-name="'+esc(d.name||uid)+'" data-did="'+doc.id+'" data-total="'+total+'" '
        +'onclick="_leaveSetBalance(this.dataset.uid,this.dataset.name,this.dataset.did,parseInt(this.dataset.total))" '
        +'class="btn" style="font-size:10px;padding:3px 8px">수정</button>'

function _leaveEditBalance(){
  // 전체 직원 연차 일괄 설정
  var v=prompt('전 직원 기본 연차 일수를 입력하세요 (법정: 1년=15일)','15');
  if(v===null)return;
  var n=parseFloat(v);
  if(isNaN(n)||n<1){toast('❌ 올바른 숫자를 입력하세요');return;}
  var did=_CU&&_CU.dealerId||'';
  if(!_db||!did)return;
  _db.collection('drivers').where('dealerId','==',did).get().then(function(snap){
    var batch=_db.batch();
    snap.forEach(function(doc){
      var upd={annualLeave:n}; upd['annualLeave'+new Date().getFullYear()]=n;
      batch.update(doc.ref,upd);
    });
    return batch.commit();
  }).then(function(){toast('✅ 전 직원 연차 '+n+'일로 설정됨');_leaveTab('balance');})
  .catch(function(e){toast('❌ '+e.message);});
}
function _leaveSetBalance(uid,name,docId,curTotal){
  var v=prompt(esc(name)+'의 '+new Date().getFullYear()+'년 연차 총 일수를 입력하세요 (현재: '+curTotal+'일)',curTotal);
  if(v===null)return;
  var n=parseFloat(v);
  if(isNaN(n)||n<0){toast('❌ 올바른 숫자를 입력하세요');return;}
  var upd={annualLeave:n}; upd['annualLeave'+new Date().getFullYear()]=n;
  _db.collection('drivers').doc(docId).update(upd)
    .then(function(){toast('✅ 연차 '+n+'일로 저장됨');_leaveTab('balance');})
    .catch(function(e){toast('❌ '+e.message);});
}

// ── 휴가 카드 렌더링 ──
function _leaveCard(docId,d,showActions,isMine){
  var lt=LEAVE_TYPES[d.type]||{label:d.type,icon:'📅',days:1,color:'#6b7280'};
  var ls=LEAVE_STATUS[d.status]||{label:d.status,color:'#6b7280',bg:'#f3f4f6'};
  var dateStr=d.startDate||(d.startDate===d.endDate?d.startDate:(d.startDate+' ~ '+d.endDate));
  if(d.endDate&&d.endDate!==d.startDate)dateStr=d.startDate+' ~ '+d.endDate;
  return '<div style="background:var(--bg2);border-radius:12px;padding:14px 16px;margin-bottom:8px;'
    +'border-left:4px solid '+lt.color+';box-shadow:0 1px 4px rgba(0,0,0,.06)">'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
    +'<span style="font-size:18px">'+lt.icon+'</span>'
    +'<div style="flex:1">'
    +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
    +'<span style="font-weight:800;font-size:13px">'+esc(d.driverName||d.userId||'')+'</span>'
    +'<span style="background:'+lt.color+'22;color:'+lt.color+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">'+lt.label+'</span>'
    +'<span style="background:'+ls.bg+';color:'+ls.color+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">'+ls.label+'</span>'
    +(d.days?'<span style="font-size:10px;color:var(--text3)">'+d.days+'일</span>':'')
    +'</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-top:3px">📅 '+esc(dateStr)+'</div>'
    +(d.reason?'<div style="font-size:11px;color:var(--text3);margin-top:2px">💬 '+esc(d.reason)+'</div>':'')
    +(d.rejectReason?'<div style="font-size:11px;color:var(--red);margin-top:2px">❌ 반려 사유: '+esc(d.rejectReason)+'</div>':'')
    +'</div>'
    // 승인/반려 버튼 (관리자)
    +(showActions&&d.status==='pending'?
      '<div style="display:flex;gap:6px">'
      +'<button data-id="'+docId+'" onclick="_leaveApprove(this.dataset.id)" class="btn btn-teal" style="font-size:11px;padding:5px 12px">✅ 승인</button>'
      +'<button data-id="'+docId+'" onclick="_leaveRejectModal(this.dataset.id)" class="btn" style="font-size:11px;padding:5px 12px;color:var(--red)">❌ 반려</button>'
      +'</div>'
    :'')
    // 취소 버튼 (본인, 대기 중)
    +(isMine&&d.status==='pending'?
      '<button data-id="'+docId+'" onclick="_leaveCancel(this.dataset.id)" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">취소</button>'
    :'')
    +'</div>'
    +'</div>';
}

function _leaveSelectType(btn, type){
  document.querySelectorAll('#leave-type-btns button').forEach(function(b){
    var lt=LEAVE_TYPES[b.dataset.type];
    b.style.background='var(--bg)';b.style.color='var(--text2)';b.style.borderColor='var(--border)';
  });
  var lt=LEAVE_TYPES[type]||{};
  btn.style.background=lt.color+'22';btn.style.color=lt.color;btn.style.borderColor=lt.color;
  var inp=document.getElementById('leave-type-val');
  if(inp)inp.value=type;
  _leaveCalcDays();
}

function _leaveCalcDays(){
  var type=(document.getElementById('leave-type-val')||{}).value||'';
  var start=(document.getElementById('leave-start')||{}).value||'';
  var end=(document.getElementById('leave-end')||{}).value||'';
  var prev=document.getElementById('leave-days-preview');
  if(!prev||!type||!start)return;
  var lt=LEAVE_TYPES[type]||{days:1};
  var days;
  if(lt.days===0.5){days=0.5;}
  else{
    var d1=new Date(start),d2=new Date(end||start);
    days=Math.max(1,Math.round((d2-d1)/(1000*60*60*24))+1);
  }
  prev.style.display='';
  prev.textContent='📅 '+days+'일 사용 예정 ('+LEAVE_TYPES[type].label+')';
}

function _leaveSubmit(){
  var type=(document.getElementById('leave-type-val')||{}).value||'';
  var start=(document.getElementById('leave-start')||{}).value||'';
  var end=(document.getElementById('leave-end')||{}).value||start;
  var reason=sanitizeInput((document.getElementById('leave-reason')||{}).value||'',500);
  if(!type){toast('❌ 휴가 종류를 선택하세요');return;}
  if(!start){toast('❌ 시작일을 선택하세요');return;}
  var lt=LEAVE_TYPES[type]||{days:1};
  var days=lt.days===0.5?0.5:Math.max(1,Math.round((new Date(end)-new Date(start))/(1000*60*60*24))+1);
  var did=_CU.dealerId||_CU.companyId||'';
  var uid=_CU.driverId||_CU.userId||_CU.uid||'';
  var data={
    dealerId:did, userId:uid,
    driverName:_CU.name||uid,
    type:type, startDate:start, endDate:end, days:days,
    reason:reason.trim(), status:'pending',
    createdAt:new Date().toISOString()
  };
  _db.collection('leaves').add(data).then(function(){
    document.getElementById('mo-leave').remove();
    toast('✅ 휴가 신청 완료! 관리자 승인을 기다려주세요');
    _leaveTab('mine');
    // 관리자 FCM 알림
    _sendAdminNotif('🌴 휴가 신청',esc(data.driverName)+'님이 '+LEAVE_TYPES[type].label+' 신청 ('+start+')');
  }).catch(function(e){toast('❌ '+e.message);});
}

// ── 승인 ──
function _leaveApprove(docId){
  _db.collection('leaves').doc(docId).update({
    status:'approved',
    approvedAt:new Date().toISOString(),
    approvedBy:_CU.name||_CU.uid||''
  }).then(function(){
    toast('✅ 승인됨');
    // attendance에 휴가 기록 (근무표 연동)
    _db.collection('leaves').doc(docId).get().then(function(snap){
      if(!snap.exists)return;
      var d=snap.data();
      _sendLeaveNotif(d.userId,d.driverName,'approved',d.type,d.startDate);
    });
    _leaveTab('pending');
  }).catch(function(e){toast('❌ '+e.message);});
}

function _leaveRejectModal(docId){
  var mo=document.createElement('div');
  mo.id='mo-reject';
  mo.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px';

function _leaveReject(docId){
  var reason=(document.getElementById('reject-reason')||{}).value||'';
  _db.collection('leaves').doc(docId).update({
    status:'rejected', rejectReason:reason.trim(),
    rejectedAt:new Date().toISOString(),
    rejectedBy:_CU.name||_CU.uid||''
  }).then(function(){
    var mo=document.getElementById('mo-reject');if(mo)mo.remove();
    toast('반려 처리됨');
    _db.collection('leaves').doc(docId).get().then(function(snap){
      if(!snap.exists)return;
      var d=snap.data();
      _sendLeaveNotif(d.userId,d.driverName,'rejected',d.type,d.startDate);
    });
    _leaveTab('pending');
  }).catch(function(e){toast('❌ '+e.message);});
}

function _leaveCancel(docId){
  if(!confirm('휴가 신청을 취소하시겠습니까?'))return;
  _db.collection('leaves').doc(docId).delete()
    .then(function(){toast('취소됨');_leaveTab('mine');})
    .catch(function(e){toast('❌ '+e.message);});
}

// FCM 알림 (직원에게)
function _sendLeaveNotif(userId, name, status, type, date){
  var msg=status==='approved'
    ?'🌴 '+LEAVE_TYPES[type].label+' ('+date+') 승인됐습니다!'
    :'❌ '+LEAVE_TYPES[type].label+' ('+date+') 반려됐습니다.';
  // 관리자 알림은 기존 FCM 함수 재사용
  toast(msg);
}

function pageSchedule(){
  var now=new Date();
  window._calYear=window._calYear||now.getFullYear();
  window._calMonth=window._calMonth||now.getMonth();
  _renderCalendar();
}
function _renderCalendar(){
  var y=window._calYear,m=window._calMonth;
  var mNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var dNames=['일','월','화','수','목','금','토'];
  var firstDay=new Date(y,m,1).getDay();
  var lastDate=new Date(y,m+1,0).getDate();
  var today=new Date();
  var html='<div style="max-width:600px;margin:0 auto;padding:16px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<button onclick="window._calMonth--;if(window._calMonth<0){window._calMonth=11;window._calYear--;}_renderCalendar();" style="background:var(--bg2);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:16px;color:var(--text1)">‹</button>'
    +'<div style="font-size:18px;font-weight:800">'+y+'년 '+mNames[m]+'</div>'
    +'<button onclick="window._calMonth++;if(window._calMonth>11){window._calMonth=0;window._calYear++;}_renderCalendar();" style="background:var(--bg2);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:16px;color:var(--text1)">›</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">'
    +dNames.map(function(d,i){return '<div style="text-align:center;font-size:11px;font-weight:700;padding:4px 0;color:'+(i===0?'#ef4444':i===6?'#3b82f6':'var(--text2)')+'">'+d+'</div>';}).join('')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px" id="cal-grid"></div>'
    +'<div id="cal-memo-area" style="margin-top:16px"></div>'
    +'</div>';
  document.getElementById('content').innerHTML=html;
  var grid=document.getElementById('cal-grid');
  var cells='';
  for(var i=0;i<firstDay;i++) cells+='<div></div>';
  for(var d=1;d<=lastDate;d++){
    var isToday=(y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate());
    var dow=(firstDay+d-1)%7;
    var color=dow===0?'#ef4444':dow===6?'#3b82f6':'var(--text1)';
    cells+='<div onclick="_calSelectDay('+d+')" id="cal-day-'+d+'" style="min-height:52px;padding:4px;border-radius:8px;cursor:pointer;background:'+(isToday?'rgba(59,130,246,.15)':'var(--bg2)')+';border:1px solid '+(isToday?'var(--primary)':'transparent')+'">'
      +'<div style="font-size:12px;font-weight:'+(isToday?'800':'600')+';color:'+color+';margin-bottom:2px">'+d+'</div>'
      +'<div id="cal-dots-'+d+'" style="font-size:9px;line-height:1.4"></div>'
      +'</div>';
  }
  grid.innerHTML=cells;
  if(_db&&_CU){
    var ym=y+'-'+(m+1<10?'0'+(m+1):(m+1));
    _db.collection('cal_memos').where('dealerId','==',_CU.dealerId||_CU.uid).where('ym','==',ym).get()
    .then(function(snap){
      snap.forEach(function(doc){
        var d2=doc.data();
        var dotEl=document.getElementById('cal-dots-'+d2.day);
        if(dotEl) dotEl.innerHTML+='<div style="background:var(--primary);border-radius:3px;padding:1px 3px;font-size:9px;color:#fff;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(d2.text.substring(0,8))+'</div>';
      });
    }).catch(function(){});
  }
}
function _calSelectDay(day){
  var y=window._calYear,m=window._calMonth;
  var mNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var area=document.getElementById('cal-memo-area');
  area.innerHTML='<div class="card">'
    +'<div style="font-size:14px;font-weight:700;margin-bottom:10px">'+y+'년 '+mNames[m]+' '+day+'일 메모</div>'
    +'<div id="cal-memo-list" style="margin-bottom:10px"></div>'
    +'<div style="display:flex;gap:8px">'
    +'<input id="cal-memo-input" placeholder="메모 입력..." style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:13px">'
    +'<button onclick="_calAddMemo('+day+')" style="padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">등록</button>'
    +'</div>'
    +'</div>';
  _calLoadMemos(day);
}
function _calLoadMemos(day){
  var y=window._calYear,m=window._calMonth;
  var ym=y+'-'+(m+1<10?'0'+(m+1):(m+1));
  if(!_db||!_CU)return;
  _db.collection('cal_memos').where('dealerId','==',_CU.dealerId||_CU.uid).where('ym','==',ym).where('day','==',day).orderBy('createdAt','asc').get()
  .then(function(snap){
    var html='';
    snap.forEach(function(doc){
      var d=doc.data();
      html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--bg2);border-radius:6px;margin-bottom:4px">'
        +'<div style="font-size:12px">'+esc(d.text)+'</div>'
        +'<button onclick="_calDeleteMemo(this)" data-id="'+doc.id+'" data-day="'+day+'" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 4px">×</button>'
        +'</div>';
    });
    var el=document.getElementById('cal-memo-list');
    if(el) el.innerHTML=html||'<div style="font-size:11px;color:var(--text3);margin-bottom:6px">등록된 메모가 없습니다</div>';
  }).catch(function(){});
}
function _calAddMemo(day){
  var inp=document.getElementById('cal-memo-input');
  var text=inp?inp.value.trim():'';
  if(!text)return;
  var y=window._calYear,m=window._calMonth;
  var ym=y+'-'+(m+1<10?'0'+(m+1):(m+1));
  if(!_db||!_CU)return;
  _db.collection('cal_memos').add({
    dealerId:_CU.dealerId||_CU.uid,ym:ym,day:day,text:text,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){

function _calDeleteMemo(btn){

  _db.collection('cal_memos').doc(id).delete().then(function(){_calLoadMemos(day);toast('🗑 삭제됐습니다');}).catch(function(){});
}

function _attTab(tab){
  ['qr','today','hist','sim'].forEach(function(t){
    var btn=document.getElementById('att-tab-'+t);
    var area=document.getElementById('att-'+t+'-area');
    if(!btn||!area)return;
    var active=(t===tab);
    btn.className=active?'btn btn-blue':'btn';
    area.style.display=active?'':'none';
  });
  if(tab==='qr')_attRenderQR();
  if(tab==='today')_attRenderToday();
  if(tab==='hist')_attRenderHist();
  if(tab==='sim')_attRenderSim();
}

    +'</div>'
    +'</div>';

function _attRegisterDevice(type, did){
  var name=(document.getElementById('dev-name')||{}).value||'';
  var loc=(document.getElementById('dev-loc')||{}).value||'';
  var iv=parseInt((document.getElementById('dev-iv')||{}).value||'30');
  if(!name.trim()){toast('❌ 장치 이름을 입력하세요');return;}

  // 고유 장치 ID 생성
  var devId='dev_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6);
  var baseUrl=window.location.origin+window.location.pathname;
  var url=baseUrl+'?mode='+(type==='kiosk'?'kiosk':'pc')+'&did='+did+'&devId='+devId+'&iv='+iv;

  // Firestore에 장치 저장
  var devData={
    devId:devId, dealerId:did, type:type,
    name:name.trim(), location:loc.trim(),
    interval:iv, url:url,
    createdAt:new Date().toISOString()
  };

  if(_db){
    _db.collection('devices').doc(devId).set(devData)
      .then(function(){
        document.getElementById('mo-device').remove();
        _attShowDeviceURL(type, name, url, devId);
        _attLoadDeviceList(did);
      }).catch(function(e){toast('❌ '+e.message);});
  } else {
    document.getElementById('mo-device').remove();
    _attShowDeviceURL(type, name, url, devId);
  }
}

function _attShowDeviceURL(type, name, url, devId){
  var mo=document.createElement('div');
  mo.id='mo-devurl';
  mo.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';

    +'<div style="background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:12px">'
    +'<div style="font-size:10px;color:var(--text3);margin-bottom:4px">장치 전용 URL</div>'
    +'<div style="font-size:11px;word-break:break-all;color:var(--brand);font-weight:600">'+url+'</div>'
    +'</div>'

    +'<div style="font-size:11px;color:var(--text3);margin-bottom:8px">이 QR을 장치 카메라로 열거나, URL을 북마크하세요</div>'

    +'</div>'
    +'<div style="display:flex;gap:8px">'

function _attLoadDeviceList(did){
  var list=document.getElementById('att-device-list');
  if(!list||!_db)return;
  _db.collection('devices').where('dealerId','==',did).orderBy('createdAt','desc').limit(20).get()
  .then(function(snap){
    if(snap.empty){list.innerHTML='<div style="font-size:11px;color:var(--text3)">등록된 장치 없음</div>';return;}
    var html='<div style="display:flex;flex-direction:column;gap:6px">';
    snap.forEach(function(doc){
      var d=doc.data();
      var icon=d.type==='kiosk'?'📟':'💻';
      var badgeColor=d.type==='kiosk'?'var(--purple)':'var(--brand)';
      html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:8px">'
        +'<span style="font-size:16px">'+icon+'</span>'
        +'<div style="flex:1">'
        +'<div style="font-size:12px;font-weight:700">'+esc(d.name||'')+'</div>'
        +(d.location?'<div style="font-size:10px;color:var(--text3)">'+esc(d.location)+'</div>':'')
        +'<div style="font-size:10px;color:var(--text3)">갱신주기: '+d.interval+'초</div>'
        +'</div>'
        +'<div style="display:flex;gap:4px">'
        +'<button data-url="'+esc(d.url||'')+'" onclick="window.open(this.dataset.url,\'_blank\')" class="btn" style="font-size:10px;padding:3px 8px">열기</button>'
        +'<button data-url="'+esc(d.url||'')+'" onclick="navigator.clipboard&&navigator.clipboard.writeText(this.dataset.url).then(function(){toast(\'✅ 복사됨\');})" class="btn" style="font-size:10px;padding:3px 8px">복사</button>'
        +'<button data-docid="'+doc.id+'" data-did="'+did+'" onclick="_attDeleteDevice(this.dataset.docid,this.dataset.did)" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:14px">🗑</button>'
        +'</div>'

    });
    html+='</div>';
    list.innerHTML=html;
  }).catch(function(){list.innerHTML='<div style="font-size:11px;color:var(--text3)">-</div>';});

function _attDeleteDevice(docId, did){
  if(!confirm('이 장치를 삭제하시겠습니까?'))return;
  _db.collection('devices').doc(docId).delete()
    .then(function(){toast('🗑 삭제됨');_attLoadDeviceList(did);})
    .catch(function(e){toast('❌ '+e.message);});
}

function _checkDeviceMode(){
  var params=new URLSearchParams(window.location.search);
  var mode=params.get('mode');
  var did=params.get('did');
  var devId=params.get('devId');
  var iv=parseInt(params.get('iv')||'30');
  if(!mode||!did)return;
  window._attIvSec=iv;
  window._DEVICE_MODE=mode;
  window._DEVICE_DID=did;
  window._DEVICE_ID=devId;
  if(mode==='kiosk')_launchKioskMode(did,iv);
  else if(mode==='pc')_launchPCMode(did,iv);
}

// ── 키오스크 모드 (풀스크린 대형 QR) ──
function _launchKioskMode(did, iv){
  document.body.style.overflow='hidden';
  var wrap=document.createElement('div');
  wrap.id='kiosk-wrap';
  wrap.style.cssText='position:fixed;inset:0;background:#0a0a0f;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff';
  var now=new Date();
  wrap.innerHTML=''
    +'<div style="position:absolute;top:16px;left:50%;transform:translateX(-50%);text-align:center">'
    +'<div style="font-size:13px;font-weight:800;letter-spacing:.1em;color:#60a5fa">DONWAY 출퇴근</div>'
    +'<div id="kiosk-clock" style="font-size:32px;font-weight:900;color:#fff;margin-top:4px;letter-spacing:.05em"></div>'
    +'<div id="kiosk-date" style="font-size:13px;color:#94a3b8"></div>'
    +'</div>'
    // 메인 QR
    +'<div style="text-align:center">'
    +'<div style="font-size:15px;font-weight:700;color:#94a3b8;margin-bottom:16px;letter-spacing:.05em">📱 본인 폰으로 스캔하여 출퇴근하세요</div>'
    +'<div id="kiosk-qr-box" style="display:inline-block;padding:20px;background:#fff;border-radius:20px;box-shadow:0 0 60px rgba(59,130,246,.4)"></div>'
    +'<div id="kiosk-timer-bar" style="margin-top:14px;width:320px;max-width:90vw"></div>'
    +'<div id="kiosk-token" style="font-size:10px;color:#475569;margin-top:6px"></div>'
    +'</div>'
    // 하단: 최근 출퇴근
    +'<div id="kiosk-recent" style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);'
    +'display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:90vw"></div>'
    // 풀스크린 버튼
    +'<button onclick="_kioskFullscreen()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#94a3b8;padding:6px 12px;cursor:pointer;font-size:12px">⛶ 전체화면</button>'
    +'<button onclick="_kioskExit()" style="position:absolute;bottom:16px;right:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#475569;padding:6px 12px;cursor:pointer;font-size:11px">✕ 종료</button>';
  document.body.appendChild(wrap);

  // 시계 업데이트
  _kioskClock();
  window._kioskClockInt=setInterval(_kioskClock, 1000);

  // QR 생성 (키오스크 전용 함수)
  window._attCompanyGPS=window._attCompanyGPS||{lat:0,lng:0};
  // GPS + 회사 정보 로드
  if(window.firebase&&firebase.firestore){
    firebase.firestore().collection('companies').doc(did).get().then(function(snap){
      if(snap.exists){
        var d=snap.data();
        if(d.gpsLat)window._attCompanyGPS={lat:d.gpsLat,lng:d.gpsLng};
        if(d.gpsRadius){
          var rsel=document.getElementById('att-radius-sel');
          if(rsel)rsel.value=String(d.gpsRadius);
        }
      }
      _kioskGenQR(did,iv);
    }).catch(function(){_kioskGenQR(did,iv);});
  } else {
    setTimeout(function(){_kioskGenQR(did,iv);},2000);
  }

  // Realtime 출퇴근 알림
  if(window.firebase&&firebase.firestore){
    var today=new Date().toISOString().slice(0,10);
    firebase.firestore().collection('attendance')
      .where('dealerId','==',did).where('date','==',today)
      .orderBy('createdAt','desc').limit(5)
      .onSnapshot(function(snap){_kioskUpdateRecent(snap);});
  }
}

function _kioskClock(){
  var cl=document.getElementById('kiosk-clock');
  var dt=document.getElementById('kiosk-date');
  var now=new Date();
  if(cl)cl.textContent=now.toTimeString().slice(0,8);
  if(dt){
    var days=['일','월','화','수','목','금','토'];
    dt.textContent=now.getFullYear()+'.'+(now.getMonth()+1).toString().padStart(2,'0')+'.'+now.getDate().toString().padStart(2,'0')+'('+days[now.getDay()]+')';
  }
}

function _kioskGenQR(did,iv){
  var box=document.getElementById('kiosk-qr-box');
  var tokenEl=document.getElementById('kiosk-token');
  if(!box)return;
  box.innerHTML='';
  var now=Date.now();
  var gps=window._attCompanyGPS||{lat:0,lng:0};
  var payload=JSON.stringify({v:2,dealerId:did,ts:now,ivSec:iv,gpsLat:gps.lat,gpsLng:gps.lng,radius:100});
  if(window.QRCode){
    try{new QRCode(box,{text:payload,width:280,height:280,correctLevel:QRCode.CorrectLevel.M});}
    catch(e){box.innerHTML='<div style="color:red;padding:20px">QR 오류</div>';}
  }
  if(tokenEl)tokenEl.textContent='토큰 '+now.toString(36).toUpperCase();
  // 프로그레스바
  if(window._kioskCountdown)clearInterval(window._kioskCountdown);
  var rem=iv;
  _kioskTimerBar(rem,iv);
  window._kioskCountdown=setInterval(function(){
    rem--;
    if(rem<=0){clearInterval(window._kioskCountdown);_kioskGenQR(did,iv);return;}
    _kioskTimerBar(rem,iv);
  },1000);
}

function _kioskTimerBar(rem,total){
  var el=document.getElementById('kiosk-timer-bar');
  if(!el)return;
  var pct=Math.round(rem/total*100);
  var col=pct>50?'#22c55e':pct>20?'#fbbf24':'#ef4444';
  var s=rem%60, m=Math.floor(rem/60);
  var tStr=m>0?(m+'분 '+s+'초'):(s+'초');
  el.innerHTML='<div style="font-size:13px;color:'+col+';font-weight:700;margin-bottom:6px;text-align:center">갱신까지 '+tStr+'</div>'
    +'<div style="width:320px;max-width:90vw;height:6px;background:rgba(255,255,255,.1);border-radius:3px">'
    +'<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:3px;transition:width 1s linear"></div></div>';
}

function _kioskUpdateRecent(snap){
  var el=document.getElementById('kiosk-recent');
  if(!el)return;
  var html='';
  snap.forEach(function(doc){
    var d=doc.data();
    var hasOut=!!d.checkOut;
    html+='<div style="background:rgba(255,255,255,.06);border-radius:8px;padding:6px 12px;text-align:center;min-width:80px">'
      +'<div style="font-size:11px;font-weight:700;color:#e2e8f0">'+esc(d.driverName||d.userId||'')+'</div>'
      +'<div style="font-size:10px;color:'+(hasOut?'#94a3b8':'#4ade80')+'">'+(hasOut?'퇴근 '+esc(d.checkOut):'출근 '+esc(d.checkIn))+'</div>'
      +'</div>';
  });
  el.innerHTML=html||'<div style="font-size:11px;color:#475569">오늘 출퇴근 기록 없음</div>';
}

function _kioskFullscreen(){
  var el=document.getElementById('kiosk-wrap');
  if(el&&el.requestFullscreen)el.requestFullscreen();
  else if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen();
}

function _kioskExit(){
  if(!confirm('키오스크 모드를 종료하시겠습니까?'))return;
  if(window._kioskCountdown)clearInterval(window._kioskCountdown);
  if(window._kioskClockInt)clearInterval(window._kioskClockInt);
  var wrap=document.getElementById('kiosk-wrap');
  if(wrap)wrap.remove();
  document.body.style.overflow='';
  if(document.exitFullscreen)document.exitFullscreen().catch(function(){});
}

// ── PC 모드 (컴팩트 QR 팝업) ──
function _launchPCMode(did,iv){
  var wrap=document.createElement('div');
  wrap.id='pc-qr-wrap';
  wrap.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;'
    +'background:var(--bg2);border-radius:16px;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,.2);'
    +'border:1px solid var(--border);width:220px;text-align:center';
  wrap.innerHTML=''
    +'<div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--text1)">📱 출퇴근 QR</div>'
    +'<div id="pc-qr-box" style="display:inline-block;background:#fff;padding:8px;border-radius:10px"></div>'
    +'<div id="pc-qr-timer" style="margin-top:6px;font-size:11px;color:var(--brand);font-weight:700"></div>'
    +'<div id="pc-att-status" style="margin-top:6px;font-size:11px;color:var(--text3)">오늘 출퇴근 확인 중...</div>'
    +'<button onclick="document.getElementById(\'pc-qr-wrap\').style.display=\'none\'" '
    +'style="margin-top:8px;background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3)">접기 ↓</button>';
  document.body.appendChild(wrap);

  // GPS 로드
  if(window.firebase&&firebase.firestore){
    firebase.firestore().collection('companies').doc(did).get().then(function(snap){
      if(snap.exists){var d=snap.data();if(d.gpsLat)window._attCompanyGPS={lat:d.gpsLat,lng:d.gpsLng};}
      _pcGenQR(did,iv);
    }).catch(function(){_pcGenQR(did,iv);});
  } else {
    setTimeout(function(){_pcGenQR(did,iv);},2000);
  }
}

function _pcGenQR(did,iv){
  var box=document.getElementById('pc-qr-box');
  var timer=document.getElementById('pc-qr-timer');
  if(!box)return;
  box.innerHTML='';
  var now=Date.now();
  var gps=window._attCompanyGPS||{lat:0,lng:0};
  var payload=JSON.stringify({v:2,dealerId:did,ts:now,ivSec:iv,gpsLat:gps.lat,gpsLng:gps.lng,radius:100});
  if(window.QRCode){
    try{new QRCode(box,{text:payload,width:150,height:150,correctLevel:QRCode.CorrectLevel.M});}
    catch(e){}
  }
  if(window._pcCountdown)clearInterval(window._pcCountdown);
  var rem=iv;
  window._pcCountdown=setInterval(function(){
    rem--;
    if(rem<=0){clearInterval(window._pcCountdown);_pcGenQR(did,iv);return;}
    if(timer){
      var s=rem%60,m=Math.floor(rem/60);
      var pct=Math.round(rem/iv*100);
      var col=pct>50?'var(--green)':pct>20?'var(--amber)':'var(--red)';
      timer.innerHTML='<span style="color:'+col+'">갱신 '+(m?m+'분 ':'')+s+'초</span>';
    }
  },1000);
}

// 직원 수 카운트 → 추천 주기 표시
function _attLoadEmpCount(did){
  if(!_db||!did)return;
  _db.collection('drivers').where('dealerId','==',did).get().then(function(snap){
    window._attEmpCount=snap.size;
    var rec=_attRecommendInterval(snap.size);
    var guide=document.getElementById('att-emp-guide');
    if(guide){
      guide.innerHTML='직원 <b>'+snap.size+'명</b> 기준 추천: <b style="color:var(--brand)">'+_attSecLabel(rec)+'</b>'
        +(rec===window._attIvSec?' ✅':'  <button onclick="_attSetInterval('+rec+')" style="margin-left:4px;padding:1px 8px;border:1px solid var(--brand);border-radius:10px;background:none;color:var(--brand);font-size:10px;cursor:pointer">적용</button>');
    }
  }).catch(function(){});
}

// QR 모드 전환
function _attSetQRMode(mode){
  window._attQRMode=mode;
  ['dynamic','static','empqr'].forEach(function(m){
    var btn=document.getElementById('qrmode-'+m);
    var area=document.getElementById('qrarea-'+m);
    if(btn)btn.className=(m===mode)?'btn btn-blue':'btn';
    if(area)area.style.display=(m===mode)?'':'none';
  });
  if(mode==='dynamic'&&window._attQRInterval){
    if(window._attCountdown)clearInterval(window._attCountdown);
    _attGenQR(_CU.dealerId);
  }
}

// 정적 QR 생성

  did=did||(_CU&&_CU.dealerId)||'';

  if(!box)return;
  box.innerHTML='';
  // 정적: 날짜 + dealerId (시간 없음)
  var today=new Date().toISOString().slice(0,10);
  var gps=window._attCompanyGPS||{lat:0,lng:0};

  var payload=JSON.stringify({
    v:2, type:'static', dealerId:did,
    date:today, gpsLat:gps.lat, gpsLng:gps.lng, radius:radius
  });
  if(window.QRCode){
    try{new QRCode(box,{text:payload,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});}
    catch(e){box.innerHTML='<div style="padding:20px;color:red">QR 오류</div>';}
  }
}

// 직원 개인 QR 목록
function _attLoadEmpQRList(did){
  did=did||(_CU&&_CU.dealerId)||'';
  var list=document.getElementById('emp-qr-list');
  if(!list||!_db)return;
  _db.collection('drivers').where('dealerId','==',did).limit(100).get()
  .then(function(snap){
    if(snap.empty){list.innerHTML='<div class="empty">등록된 직원 없음</div>';return;}
    var html='<div style="display:flex;gap:10px;flex-wrap:wrap">';
    snap.forEach(function(doc){
      var d=doc.data();
      var uid=d.userId||d.coupangId||doc.id;
      var name=d.name||uid;
      var qrId='empqr-'+doc.id;
      html+='<div style="text-align:center;padding:12px;background:var(--bg3);border-radius:12px;min-width:130px">'
        +'<div style="font-weight:700;font-size:12px;margin-bottom:8px">'+esc(name)+'</div>'
        +'<div id="'+qrId+'" style="display:inline-block;background:#fff;padding:6px;border-radius:6px"></div>'
        +'<div style="font-size:9px;color:var(--text3);margin-top:4px">'+esc(uid)+'</div>'
        +'</div>';
    });
    html+='</div>';
    list.innerHTML=html;
    // QR 생성
    snap.forEach(function(doc){
      var d=doc.data();
      var uid=d.userId||d.coupangId||doc.id;
      var box=document.getElementById('empqr-'+doc.id);
      if(!box||!window.QRCode)return;
      var payload=JSON.stringify({v:2,type:'emp',dealerId:did,userId:uid,name:d.name||''});
      try{new QRCode(box,{text:payload,width:110,height:110,correctLevel:QRCode.CorrectLevel.M});}
      catch(e){}
    });
  }).catch(function(e){if(list)list.innerHTML='<div class="empty">'+esc(e.message)+'</div>';});
}

// 기본 갱신 주기: 30초
window._attIvSec = window._attIvSec || 30;

function _attGenQR(did){
  var box=document.getElementById('att-qr-box');
  var timer=document.getElementById('att-qr-timer');
  var tokenEl=document.getElementById('att-qr-token');
  if(!box)return;
  box.innerHTML='';
  var now=Date.now();
  var ivSec=window._attIvSec||30;
  var gpsData=window._attCompanyGPS||{lat:0,lng:0};
  var radius=parseInt((document.getElementById('att-radius-sel')||{}).value||'100');
  var payload=JSON.stringify({
    v:2, dealerId:did, ts:now, ivSec:ivSec,
    gpsLat:gpsData.lat, gpsLng:gpsData.lng, radius:radius
  });
  try{
    new QRCode(box,{text:payload,width:220,height:220,correctLevel:QRCode.CorrectLevel.M});
  }catch(e){
    box.innerHTML='<div style="padding:20px;color:var(--red)">QR 생성 실패</div>';
  }
  if(tokenEl) tokenEl.textContent='토큰: '+now.toString(36).toUpperCase()+' · 주기: '+ivSec+'초';
  // 카운트다운
  if(window._attCountdown)clearInterval(window._attCountdown);
  var remaining=ivSec;
  _attUpdateTimerBar(remaining, ivSec);
  window._attCountdown=setInterval(function(){
    remaining--;
    if(remaining<=0){
      clearInterval(window._attCountdown);
      // 자동 갱신
      _attGenQR(did);
      _attRestartInterval(did);
      return;
    }
    _attUpdateTimerBar(remaining, ivSec);
  },1000);
}

function _attUpdateTimerBar(remaining, total){
  var timer=document.getElementById('att-qr-timer');
  if(!timer)return;
  var pct=Math.round(remaining/total*100);
  var color=pct>50?'var(--green)':pct>20?'var(--amber)':'var(--red)';
  var m=Math.floor(remaining/60), s=remaining%60;
  var tStr=m>0?(m+'분 '+s+'초'):(s+'초');
  timer.innerHTML='<div style="margin-bottom:4px;font-size:13px;color:'+color+'">⏱ 갱신까지 <b>'+tStr+'</b></div>'
    +'<div style="width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">'
    +'<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:3px;transition:width 1s linear"></div></div>';
}

function _attRestartInterval(did){
  if(window._attQRInterval)clearInterval(window._attQRInterval);
  // setInterval은 _attGenQR 내부 자동갱신으로 대체됨 (재귀 방식)
  window._attQRInterval=null;
}

// 갱신 주기 변경
function _attSetInterval(sec){
  window._attIvSec=sec;
  // 버튼 활성화
  [30,60,120,180,300,600].forEach(function(v){
    var btn=document.getElementById('iv-'+v);
    if(btn)btn.className='btn-iv'+(v===sec?' active':'');
  });
  // 직원수 기준 가이드 표시
  var guide=document.getElementById('att-emp-guide');
  if(guide){
    var empCnt=window._attEmpCount||0;
    var rec=_attRecommendInterval(empCnt);
    var match=sec===rec;
    guide.innerHTML=empCnt>0
      ?'직원 '+empCnt+'명 기준 추천: <b style="color:var(--brand)">'+_attSecLabel(rec)+'</b>'
        +(match?' ✅':'  → 현재: '+_attSecLabel(sec))
      :'직원 수 로딩 중...';
  }
  // 즉시 재생성
  if(window._attCountdown)clearInterval(window._attCountdown);
  _attGenQR(_CU&&_CU.dealerId||'');
}

function _attSecLabel(s){
  if(s<60)return s+'초';
  return Math.floor(s/60)+'분'+(s%60?s%60+'초':'');
}

// 직원 수 → 추천 갱신 주기
function _attRecommendInterval(cnt){
  if(cnt<=5)  return 30;   // ~5명: 30초
  if(cnt<=10) return 60;   // ~10명: 1분
  if(cnt<=20) return 120;  // ~20명: 2분
  if(cnt<=30) return 180;  // ~30명: 3분
  if(cnt<=50) return 300;  // ~50명: 5분
  return 600;              // 50명+: 10분
}

function _attSetGPS(did){
  var status=document.getElementById('att-gps-status');
  if(status)status.innerHTML='<span style="color:var(--text3)">📡 위치 가져오는 중...</span>';

// QR 스캔 시작
function _startQRScan(){
  var video=document.getElementById('qr-video');
  var btn=document.getElementById('qr-scan-btn');
  var msg=document.getElementById('qr-scan-msg');
  if(!video||!btn)return;

  btn.disabled=true;btn.textContent='카메라 켜는 중...';

  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(function(stream){
    video.srcObject=stream;
    btn.textContent='🔍 QR 인식 중...';
    msg.textContent='회사 화면의 QR 코드에 카메라를 갖다 대세요';
    window._qrStream=stream;
    _scanQRLoop(video);
  })
  .catch(function(e){
    btn.disabled=false;btn.textContent='📷 카메라 시작';
    msg.textContent='카메라 접근 실패: '+e.message;
  });
}

// QR 프레임 인식 루프
function _scanQRLoop(video){
  var canvas=document.getElementById('qr-canvas');
  if(!canvas||!video)return;
  var ctx=canvas.getContext('2d');
  var loop=function(){
    if(video.readyState===video.HAVE_ENOUGH_DATA){
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      var img=ctx.getImageData(0,0,canvas.width,canvas.height);
      // jsQR 라이브러리 사용
      if(window.jsQR){
        var code=jsQR(img.data,img.width,img.height);
        if(code&&code.data){
          _processQRData(code.data);
          return; // 성공 시 루프 종료
        }
      }
    }
    window._qrLoopId=requestAnimationFrame(loop);
  };
  window._qrLoopId=requestAnimationFrame(loop);
}

// QR 데이터 처리
function _processQRData(data){
  // 카메라 정지
  if(window._qrStream)window._qrStream.getTracks().forEach(function(t){t.stop();});
  if(window._qrLoopId)cancelAnimationFrame(window._qrLoopId);

  var msg=document.getElementById('qr-scan-msg');
  var btn=document.getElementById('qr-scan-btn');
  var st=document.getElementById('qr-status-text');

  try{
    var payload=JSON.parse(data);
    // 유효성 검사: dealerId 일치 + 30초 이내
    var now=Date.now();
    var qrTime=payload.ts||0;
    var did=payload.dealerId||'';

    var myDid=_CU.companyId||_CU.dealerId||'';
    var qrType=payload.type||'dynamic';

    // ── 정적 QR 처리 ──
    if(qrType==='static'){
      var today2=new Date().toISOString().slice(0,10);
      if(payload.date!==today2){
        if(msg)msg.innerHTML='<span style="color:var(--red)">❌ 오늘 유효하지 않은 QR입니다</span>';
        if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
        return;
      }
      if(did&&did!==myDid){
        if(msg)msg.innerHTML='<span style="color:var(--red)">❌ 다른 회사의 QR입니다</span>';
        if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
        return;
      }
      // GPS → 기록
      var qrLat2=payload.gpsLat||0,qrLng2=payload.gpsLng||0,qrR2=payload.radius||0;
      if(qrR2>0&&qrLat2!==0){
        if(msg)msg.innerHTML='<span style="color:var(--text3)">📡 위치 확인 중...</span>';
        navigator.geolocation.getCurrentPosition(function(pos){
          var dist=_gpsDistance(pos.coords.latitude,pos.coords.longitude,qrLat2,qrLng2);
          if(dist>qrR2){if(msg)msg.innerHTML='<span style="color:var(--red)">❌ 위치 불일치 ('+Math.round(dist)+'m)</span>';
            if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}return;}
          _doAttRecord(payload,msg,btn,st,true);
        },function(){_doAttRecord(payload,msg,btn,st,null);},{enableHighAccuracy:true,timeout:6000});
      } else {
        _doAttRecord(payload,msg,btn,st,null);
      }
      return;
    }

    // ── 동적 QR 처리 ──
    // ① 만료 체크 (설정된 주기 기준)
    var ivMs=(payload.ivSec||30)*1000 + 5000; // 여유 5초
    if(now-qrTime>ivMs){
      var ivLabel=_attSecLabel?_attSecLabel(payload.ivSec||30):(payload.ivSec||30)+'초';
      if(msg)msg.innerHTML='<span style="color:var(--red)">❌ QR이 만료됐습니다 ('+ivLabel+' 초과). 다시 스캔하세요</span>';
      if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
      return;
    }
    // ② 회사 일치 체크
    if(did&&did!==myDid){
      if(msg)msg.innerHTML='<span style="color:var(--red)">❌ 다른 회사의 QR입니다</span>';
      if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
      return;
    }
    // ③ GPS 위치 검증 (radius>0 이고 좌표 있을 때)
    var qrLat=payload.gpsLat||0, qrLng=payload.gpsLng||0;
    var qrRadius=payload.radius||0;
    if(qrRadius>0 && qrLat!==0){
      if(msg)msg.innerHTML='<span style="color:var(--text3)">📡 위치 확인 중...</span>';
      navigator.geolocation.getCurrentPosition(function(pos){
        var dist=_gpsDistance(pos.coords.latitude,pos.coords.longitude,qrLat,qrLng);
        if(dist>qrRadius){
          if(msg)msg.innerHTML='<span style="color:var(--red)">❌ 위치 불일치 (거리: '+Math.round(dist)+'m, 허용: '+qrRadius+'m)<br>회사 근처에서 스캔하세요</span>';
          if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
          return;
        }
        _doAttRecord(payload, msg, btn, st, true);
      },function(){
        // GPS 실패 시 경고 후 허용
        _doAttRecord(payload, msg, btn, st, null);
      },{enableHighAccuracy:true,timeout:6000});
      return;
    }
    // GPS 미설정 시 바로 기록
    _doAttRecord(payload, msg, btn, st, null);
  }catch(e){
    if(msg)msg.innerHTML='<span style="color:var(--red)">❌ QR 인식 오류</span>';
    if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
  }
}

// GPS 거리 계산 (Haversine, 미터 단위)
function _gpsDistance(lat1,lng1,lat2,lng2){
  var R=6371000;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// 실제 출퇴근 기록 저장
function _doAttRecord(payload, msg, btn, st, gpsOk){
    // 출퇴근 기록 저장
    var today=new Date().toISOString().slice(0,10);
    var timeStr=new Date().toTimeString().slice(0,5);
    var uid=_CU.driverId||_CU.userId||_CU.uid||'';
    var compId=_CU.companyId||_CU.dealerId||'';

    _db.collection('attendance')
      .where('dealerId','==',compId).where('userId','==',uid).where('date','==',today).limit(1).get()
    .then(function(snap){
      if(snap.empty){
        // 출근 처리
        var tsVal = (typeof firebase!=='undefined'&&firebase.firestore)
          ? firebase.firestore.FieldValue.serverTimestamp()
          : new Date().toISOString();
        return _db.collection('attendance').add({
          dealerId:compId, userId:uid,
          driverName:_CU.name||'',
          camp:payload.camp||_CU.camp||'',
          date:today, checkIn:timeStr,
          gpsOk:gpsOk,
          createdAt:tsVal
        }).then(function(){
          if(st)st.innerHTML='<span style="color:var(--green)">✅ 출근 완료!</span>';
          if(msg)msg.innerHTML='<span style="color:var(--green)">🟢 '+timeStr+' 출근이 기록됐습니다</span>';
          if(btn){btn.disabled=false;btn.textContent='퇴근 QR 스캔';}
          _playNotifSound('join');
        });
      } else {
        var doc=snap.docs[0];
        if(doc.data().checkOut){
          if(msg)msg.innerHTML='<span style="color:var(--text3)">오늘 이미 출퇴근 완료됐습니다</span>';
          if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
          return;
        }
        // 퇴근 처리
        var tsVal2 = (typeof firebase!=='undefined'&&firebase.firestore)
          ? firebase.firestore.FieldValue.serverTimestamp()
          : new Date().toISOString();
        return _db.collection('attendance').doc(doc.id).update({
          checkOut:timeStr,
          updatedAt:tsVal2
        }).then(function(){
          if(st)st.innerHTML='<span style="color:var(--green)">✅ 퇴근 완료!</span>';
          if(msg)msg.innerHTML='<span style="color:var(--green)">🌙 '+timeStr+' 퇴근이 기록됐습니다</span>';
          if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
          _playNotifSound('alert');
        });
      }
    }).catch(function(e){
      if(msg)msg.innerHTML='<span style="color:var(--red)">❌ 저장 실패: '+esc(e.message)+'</span>';
      if(btn){btn.disabled=false;btn.textContent='📷 다시 스캔';}
    });
}

// ══ 급여 계산 - 주급/월급 ══
function calcWeeklyPay(params){
  var L=LABOR_LAW_2026;
  // 주급: 시급제 기반 (주 소정근로시간 기준)
  var type=params.payType||'hourly';
  if(type==='weekly_fixed'){
    // 고정 주급
    return {totalPay:params.weeklyRate||0, breakdown:{'주급':params.weeklyRate||0}};
  }
  // 시급 기반 주급
  var rate=params.hourlyRate||L.minWage;
  var weekH=params.weekH||40;
  var regularPay=Math.min(weekH,40)*rate;
  var overtimePay=Math.max(weekH-40,0)*rate*L.overtimeRate;
  // 주휴수당 (주 15시간 이상 근무 시 지급)
  var juhuPay=weekH>=15?(rate*8):0;
  var total=regularPay+overtimePay+juhuPay;
  return {totalPay:total,breakdown:{'기본급':regularPay,'연장수당':overtimePay,'주휴수당':juhuPay}};
}

function calcMonthlyPay(params){
  var L=LABOR_LAW_2026;
  var type=params.payType||'monthly_fixed';
  if(type==='monthly_fixed'){
    // 고정 월급 (공제 별도)
    var base=params.monthlyRate||L.minMonthly;
    var overtimePay=params.overtimeH?Math.round(params.overtimeH*(base/209)*L.overtimeRate):0;
    var nightPay=params.nightH?Math.round(params.nightH*(base/209)*L.nightRate):0;
    var total=base+overtimePay+nightPay;
    return {totalPay:total,breakdown:{'기본급':base,'연장수당':overtimePay,'야간수당':nightPay}};
  }
  // 시급 → 월급 환산
  var rate=params.hourlyRate||L.minWage;
  var monthly=rate*209; // 209시간 기준
  return {totalPay:monthly,breakdown:{'월 기본급(209h)':monthly}};
}

var _saEventUnsub = null;

function _startSuperAdminListener(){
  if(!isSuperAdmin()||!_db) return;
  if(_saEventUnsub) return; // 이미 실행 중

  var lastSeen = Date.now();

  // admin_events 컬렉션 실시간 감지
  _saEventUnsub = _db.collection('admin_events')
    .orderBy('createdAt','desc').limit(20)
    .onSnapshot(function(snap){
      snap.docChanges().forEach(function(change){
        if(change.type !== 'added') return;
        var d = change.doc.data();
        // 이미 본 것 제외 (리스너 시작 전 기존 데이터)
        var ts = d.createdAt&&d.createdAt.toMillis ? d.createdAt.toMillis() : 0;
        if(ts < lastSeen - 3000) return;
        _onSuperAdminEvent(d);

    }, function(e){ console.warn('[SA Listener]', e); });

function _playNotifSound(type){
  try{
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    // type: 'join'(신규가입) / 'pay'(결제완료) / 'alert'(일반알림)
    var notes = {
      join:  [523,659,784,1047],   // C-E-G-C (밝은 상승음)
      pay:   [784,1047,1319],      // G-C-E (결제 완료음)
      alert: [440,440]             // A (일반 알림음)
    };
    var seq = notes[type]||notes.alert;
    var now = ctx.currentTime;
    seq.forEach(function(freq, i){
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      o.type = 'sine';
      g.gain.setValueAtTime(0, now + i*0.12);
      g.gain.linearRampToValueAtTime(0.3, now + i*0.12 + 0.02);
      g.gain.linearRampToValueAtTime(0, now + i*0.12 + 0.18);
      o.start(now + i*0.12);
      o.stop(now + i*0.12 + 0.2);
    });
  } catch(e){}
}

var _CAMP_FIXED_COLORS={}; // 동적 (_campConfig에서 로드)
function _campColor(camp){
  if(!camp)return '#64748B';
  if(_CAMP_FIXED_COLORS[camp])return _CAMP_FIXED_COLORS[camp];
  if(_campColorCache[camp])return _campColorCache[camp];
  var keys=Object.keys(_campColorCache);
  var col=_CAMP_PALETTE[keys.length%_CAMP_PALETTE.length];
  _campColorCache[camp]=col;
  return col;
}

var _campColorCache={};
// 실제 데이터에서 캠프 목록 추출
function _dynCampList(items,keyFn){
  var seen={},list=[];
  (items||[]).forEach(function(x){var c=keyFn(x);if(c&&c!=='기타'&&!seen[c]){seen[c]=1;list.push(c);}});
  return list.sort();
}
var CAMP_LIST_S=[];  // 동적 (pageSettlements 시 갱신)
var CAMP_COL_S={};   // 동적
function _getSettleCamp(x){
  if(x&&x.camp){var ca=(x.camp||'').replace('캠프','').trim();if(ca)return ca;}
  if(x&&x.userId){
    var drv=(_drvCache||[]).find(function(d){return d.userId===x.userId;});
    if(drv&&drv.camp)return drv.camp.replace('캠프','').trim();
  }
  var rds=(x&&x.routeDetails)||[];
  if(rds.length){var r=rds[0].route||'';var c2=_getRouteCamp(r);if(c2&&c2!=='기타')return c2.replace('캠프','').trim();}
  return '기타';
}
function _buildDynCamps(settles){
  // 정산 데이터에서 캠프 목록 동적 구성
  var seen={};
  (settles||[]).forEach(function(x){
    var cc=_getSettleCamp(x);
    if(cc&&cc!=='기타')seen[cc]=1;
  });
  CAMP_LIST_S=Object.keys(seen).sort();
  CAMP_COL_S={};
  CAMP_LIST_S.forEach(function(cc){CAMP_COL_S[cc]=_campColor(cc);});
}

// ══ 월별 정산서 삭제 ══
function deleteMonthSettlements(month){
  if(!month){toast('❌ 월 정보 없음');return;}
  if(!confirm('⚠️ '+month+' 정산서를 전부 삭제하시겠습니까?\n\n삭제 후 되돌릴 수 없습니다.'))return;
  var did=_CU&&_CU.dealerId;
  if(!_db||!did){toast('❌ 로그인 정보 없음');return;}
  toast('🗑 '+month+' 삭제 중...');
  _db.collection('settlements')
    .where('dealerId','==',did)
    .where('month','==',month)
    .get()
    .then(function(snap){
      if(!snap.size){toast('ℹ️ 삭제할 데이터 없음');return;}
      // 500개 단위 배치 처리
      var batches=[],b=_db.batch(),cnt=0;
      snap.forEach(function(doc){
        b.delete(doc.ref);cnt++;
        if(cnt%499===0){batches.push(b.commit());b=_db.batch();cnt=0;}
      });
      if(cnt>0)batches.push(b.commit());
      return Promise.all(batches);
    })
    .then(function(){
      // localStorage + 캐시도 정리
      _settleCache=(_settleCache||[]).filter(function(x){return x.month!==month;});
      var did2=(_CU&&_CU.dealerId)||'shared';
      // localStorage도 필터링된 상태로 덮어쓰기 (removeItem 대신 확실하게)
      lss('settlements',_settleCache);
      localStorage.removeItem('dw_'+did2+'_settlements');
      SP('settlements',null);
      toast('✅ '+month+' 정산서 삭제 완료');
      _reloadSettlePage();
    })
    .catch(function(e){toast('❌ 삭제 실패: '+e.message);});
}

var SEASON_PRICES = [];  // [{id,label,start,end,prices:{route:price}}]
function _loadSeasonPrices(){
  if(!_db||!_CU)return;
  _db.collection('settings').doc(_CU.dealerId+'_seasonPrices').get()
    .then(function(snap){
      if(snap.exists){var d=snap.data();SEASON_PRICES=d.periods||[];}
    }).catch(function(){});
}
function _saveSeasonPrices(cb){
  if(!_db||!_CU)return;
  _db.collection('settings').doc(_CU.dealerId+'_seasonPrices')
    .set({periods:SEASON_PRICES,updatedAt:new Date().toISOString()})
    .then(function(){if(cb)cb();}).catch(function(e){toast('❌ '+e.message);});
}
// 특정 날짜에 적용될 시즌 단가 반환
function _getSeasonPrice(route,date){
  if(!date||!SEASON_PRICES.length)return null;
  var d=date.slice(0,10);
  for(var i=0;i<SEASON_PRICES.length;i++){
    var p=SEASON_PRICES[i];
    if(d>=p.start&&d<=p.end&&p.prices&&p.prices[route]!==undefined)
      return p.prices[route];
  }
  return null;
}
// 정산월이 시즌 기간과 겹치는지 확인
function _getOverlappingSeasons(month){
  if(!month||!SEASON_PRICES.length)return [];
  var ym=month.slice(0,7);  // 2026-05
  return SEASON_PRICES.filter(function(p){
    return p.start.slice(0,7)===ym||p.end.slice(0,7)===ym
      ||p.start.slice(0,7)===String(+ym.slice(0,4))+(+ym.slice(5,7)-1<10?'-0':'-')+(+ym.slice(5,7)-1)
      ||p.end.slice(0,7)===String(+ym.slice(0,4))+(+ym.slice(5,7)+1<10?'-0':'-')+(+ym.slice(5,7)+1);
  });
}

function _renderSettleList(){
  var c=document.getElementById('stab-content');
  if(!c)return;
  c.innerHTML='<div class="loading">로딩 중...</div>';
  if(_settleCache){_renderSettlePage(_settleCache,c);return;}
  var cid2=_CU.dealerId||_CU.companyId;
  // ★ 정산 + 등록 기사 동시 로드
  Promise.all([
    _db.collection('settlements').where('dealerId','==',cid2).get(),
    _db.collection('drivers').where('dealerId','==',cid2).where('is_active','!=',false).get()
  ]).then(function(results){
    _settleCache=results[0].docs.map(function(d){return Object.assign({id:d.id},d.data());});
    _settleCache.sort(function(a,b){return (b.month||'').localeCompare(a.month||'');});

    // ★ 등록된 기사 중 이번달 정산 없는 기사 → 미정산으로 추가
    var curMonth=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0');
    var settledUsers=new Set(_settleCache.filter(function(s){return s.month===curMonth;}).map(function(s){return s.userId||s.driver;}));
    results[1].docs.forEach(function(doc){
      var d=doc.data();
      if(d.status==='pending')return;
      var uid=d.userId||d.coupangId||'';
      var nm=d.name||'';
      if(!uid&&!nm)return;
      var isSettled=settledUsers.has(uid)||settledUsers.has(nm);
      if(!isSettled){
        // 미정산 기사 → 정산 목록에 추가 (읽기 전용 표시용)
        _settleCache.push({
          id:'__driver__'+doc.id,
          driver:nm,userId:uid,
          camp:d.camp||'',month:curMonth,
          totalAmt:0,net:0,status:'미등록',
          _driverOnly:true // 정산 미등록 플래그
        });
      }
    });
    lss('settlements',_settleCache.filter(function(s){return !s._driverOnly;}));
    _renderSettlePage(_settleCache,c);
  }).catch(function(e){
    // fallback: 정산만 로드
    _db.collection('settlements').where('dealerId','==',cid2).get()
      .then(function(snap){
        _settleCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
        _settleCache.sort(function(a,b){return (b.month||'').localeCompare(a.month||'');});
        lss('settlements',_settleCache);
        _renderSettlePage(_settleCache,c);
      }).catch(function(e2){c.innerHTML='<div class="empty">⚠️ '+e2.message+'</div>';});
  });
}

      +'<span style="padding:2px 8px;background:rgba(16,185,129,.12);border-radius:12px;color:#059669">🧾 프레시백 ₩'+fmt(Math.round(gRows.reduce(function(s,x){return s+(+x.fresh||0);},0)*1.1))+'</span>'
      +(gRows.reduce(function(s,x){return s+(+x.inc||0);},0)>0?'<span style="padding:2px 8px;background:rgba(245,158,11,.12);border-radius:12px;color:#d97706">⭐ 추가인센 ₩'+fmt(Math.round(gRows.reduce(function(s,x){return s+(+x.inc||0);},0)*1.1))+'</span>':'')
      +'<span style="padding:2px 8px;background:rgba(245,158,11,.12);border-radius:12px;color:#d97706">🏥 고용+산재 -₩'+fmt(totEmp+totWork)+'</span>'
      +(totDmg>0?'<span style="padding:2px 8px;background:rgba(239,68,68,.15);border-radius:12px;color:#b91c1c">⚠️ 분실·파손 -₩'+fmt(Math.round(totDmg*1.1))+'</span>':'')
      +'<span style="padding:2px 8px;background:rgba(124,58,237,.15);border-radius:12px;color:var(--purple);font-weight:700">💰 실지급 ₩'+fmt(totNet)+'</span>'

// ══ 승인 처리 ══
function appSettle(id){
  if(!confirm('정산을 승인 처리하시겠습니까?'))return;
  _db.collection('settlements').doc(id).update({status:'완료',paidAt:new Date().toISOString().slice(0,10)})
    .then(function(){toast('✅ 정산 승인 완료');_reloadSettlePage();})
    .catch(function(e){toast('❌ '+e.message);});
}
// ══ 정산서 작성/편집 모달 ══
function _settleRow(x){
  if(!x)return '';
  // ★ 미등록 기사 (roster에서 자동 추가된 기사) - 간소화 행
  if(x._driverOnly){
    var nm=esc(x.driver||x.userId||'');
    var campCC=x.camp||'기타';
    var col=_campColor(campCC)||'var(--purple)';
    return '<tr style="opacity:0.6">'+
      '<td><strong>'+nm+'</strong><br><small style="color:var(--text3);font-size:10px">근무표 등록됨</small></td>'+
      '<td>'+_makeCampBadge(campCC)+'</td>'+
      '<td>'+esc(x.month||'')+'</td>'+
      '<td colspan="3" style="text-align:center;color:var(--text3);font-size:11px">정산 미등록</td>'+
      '<td><span class="badge b-wait">미등록</span></td>'+
      '<td><button class="btn btn-sm btn-blue" onclick="openSE(\'\')">+ 정산 작성</button></td>'+
      '</tr>';
  }
  var r=calcNet(x);
  var net=r.net||0;
  var vatIncome=r.totalAmt||0;  // ★ 기사 세금계산서 합계 (RPRICE 기반)
  var campCC=_getSettleCamp(x)||'기타';
  var col=_campColor(campCC)||'var(--purple)';
  var sent=x.taxSent;
  var statusBadge='<span class="badge '+(sent?'b-green':'b-wait')+'">'+(sent?'전달완료':'미전달')+'</span>';
  var docId=x.id||x.fbId||'';
  var drvName=esc(x.driver||x.userId||'');
  return '<tr>'
    +'<td><strong>'+drvName+'</strong>'
    +(x.userId&&x.userId!==(x.driver||'')?'<br><small style="color:var(--text3);font-family:monospace;font-size:10px">'+esc(x.userId)+'</small>':'')
    +'</td>'
    +'<td>'+_makeCampBadge(campCC)+'</td>'
    +'<td>'+esc(x.month||'')+'</td>'
    +'<td style="text-align:right;color:var(--green)">₩'+fmt(vatIncome)+'</td>'
    +'<td style="text-align:right;color:var(--red)">-₩'+fmt((r.emp||0)+(r.work||0))+'</td>'
    +'<td style="text-align:right;font-weight:800;color:var(--purple)">₩'+fmt(net)+'</td>'
    +'<td>'+statusBadge+'</td>'
    +'<td style="white-space:nowrap;padding:4px 6px">'      +'<button class="btn btn-sm btn-blue" onclick="openSE(\''+docId+'\')" style="margin-right:3px;padding:6px 10px;touch-action:manipulation">수정</button>'      +'<button class="btn btn-sm" onclick="openTaxInvoice(\''+docId+'\')" style="background:#15803d;color:#fff;border:none;padding:6px 10px;margin-right:3px;touch-action:manipulation">🧾</button>'      +'<button class="btn btn-sm" onclick="sendOne(\''+docId+'\')" style="background:#059669;color:#fff;border:none;padding:6px 10px;touch-action:manipulation">📤</button>'    +'</td>'
    +'</tr>';
}

// ══ 발송 모달 ══
function sendOne(id){
  if(!id||id==='undefined'){toast('❌ ID 없음');return;}
  var x=(_settleCache||[]).find(function(s){return s.id===id||s.fbId===id;});
  if(!x){toast('❌ 데이터 없음');return;}
  openSendModal(x);
}

function sendKakao(msgEnc){
  var msg=decodeURIComponent(msgEnc);
  if(window.Kakao&&window.Kakao.isInitialized()){
    window.Kakao.Share.sendDefault({
      objectType:'text',
      text:msg,
      link:{mobileWebUrl:'https://donway.ai.kr',webUrl:'https://donway.ai.kr'}
    });
  } else {
    // 카카오 SDK 없으면 클립보드 복사
    navigator.clipboard.writeText(msg).then(function(){
      toast('📋 메시지 복사됨! 카카오톡에 붙여넣기 하세요');
    }).catch(function(){toast('카카오톡을 열어 직접 붙여넣기 하세요');});
  }
}

function sendSMS(msgEnc,phoneEnc){
  var msg=decodeURIComponent(msgEnc);
  var phone=decodeURIComponent(phoneEnc).replace(/[^0-9]/g,'');
  if(!phone){
    toast('❌ 전화번호 없음 — 기사 정보에 추가해주세요');
    return;
  }
  var btn=event&&event.target;
  if(btn){btn.textContent='발송 중...';btn.disabled=true;}
  fetch('/api/send-sms',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:[{to:phone,text:msg}]})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.success&&d.successCount>0){
      toast('✅ SMS 발송 완료!');
      if(btn){btn.textContent='✅ 발송완료';btn.style.background='#059669';}
    } else {
      toast('❌ 발송 실패: '+(d.error||JSON.stringify(d.data)));
      if(btn){btn.textContent='📱 재시도';btn.disabled=false;}
    }
  }).catch(function(e){
    toast('❌ 오류: '+e.message);
    if(btn){btn.textContent='📱 재시도';btn.disabled=false;}
  });
}

function exportSettleExcel(rows){
  if(!rows||!rows.length){toast('❌ 내보낼 데이터가 없습니다');return;}
  try{
    var wb=XLSX.utils.book_new();
    var wsData=[['기사ID','기사명','캠프','라우트','배송건','단가','배송금','프레시백','인센','공제','실지급']];
    rows.forEach(function(r){
      wsData.push([
        r.userId||r.driver||'',r.name||'',r.camp||'',r.route||'',
        r.delivCnt||0,r.unitPrice||0,r.delivAmt||0,
        r.freshAmt||0,r.incAmt||0,r.deductAmt||0,r.netPay||0
      ]);
    });
    var ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=[{wch:12},{wch:10},{wch:10},{wch:8},{wch:8},{wch:8},{wch:12},{wch:10},{wch:10},{wch:10},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws,'정산내역');
    var month=(rows[0]&&rows[0].month)||new Date().toISOString().slice(0,7);
    XLSX.writeFile(wb,'DONWAY_정산_'+month+'.xlsx');
    toast('✅ Excel 내보내기 완료!');
  }catch(e){toast('❌ Excel 오류: '+e.message);}
}

  var allRows=_getSettleRows();

  var batch=_db.batch();
  checked.forEach(function(r){
    var ref=_db.collection('settlements').doc();
    batch.set(ref,{
      name:r.name||'',camp:r.camp||r.loc||'',
      month:month,status:status,note:note,
      deliveries:r.deliveries||0,
      unitPrice:r.unitPrice||0,

      totalPay:r.totalPay||r.netPay||0,

function setDocType(type){
  document.getElementById('doc-type').value=type;
  var tabs={quote:'doc-tab-quote',trans:'doc-tab-trans',receipt:'doc-tab-receipt'};
  Object.keys(tabs).forEach(function(t){
    var btn=document.getElementById(tabs[t]);
    if(!btn)return;
    if(t===type){btn.style.background='linear-gradient(135deg,#0f766e,#14b8a6)';btn.style.color='#fff';btn.style.border='none';}
    else{btn.style.background='var(--bg3)';btn.style.color='var(--text2)';btn.style.border='1px solid var(--border2)';}
  });
}

function addDocItem(){
  _docItems.push({name:'',qty:1,unit:'개',price:0});
  _renderDocItems();
}
function removeDocItem(idx){
  _docItems.splice(idx,1);
  _renderDocItems();
}
function _renderDocItems(){
  var el=document.getElementById('doc-items');
  if(!el)return;
  el.innerHTML=_docItems.map(function(item,i){
    return '<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr 40px;gap:4px;padding:8px 12px;border-top:1px solid var(--border2);align-items:center">'
      +'<input class="fi" style="font-size:12px;padding:6px 8px" value="'+esc(item.name)+'" placeholder="품목명" oninput="_docItemUpdate('+i+',\'name\',this.value)">'
      +'<input class="fi" style="font-size:12px;padding:6px 8px;text-align:center" type="number" value="'+item.qty+'" min="1" oninput="_docItemUpdate('+i+',\'qty\',+this.value)">'
      +'<input class="fi" style="font-size:12px;padding:6px 8px;text-align:center" value="'+esc(item.unit)+'" oninput="_docItemUpdate('+i+',\'unit\',this.value)">'
      +'<input class="fi" style="font-size:12px;padding:6px 8px;text-align:right;font-family:monospace" type="number" value="'+item.price+'" min="0" oninput="_docItemUpdate('+i+',\'price\',+this.value)">'
      +'<button onclick="removeDocItem('+i+')" style="padding:4px;background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;font-weight:900">×</button>'
      +'</div>';
  }).join('');
}
function _docItemUpdate(i,key,val){
  if(_docItems[i])_docItems[i][key]=val;
  _calcDocTotal();
}
function _calcDocTotal(){
  var supply=_docItems.reduce(function(s,item){return s+(item.qty||0)*(item.price||0);},0);
  var vatYn=(document.getElementById('doc-vat-yn')||{checked:true}).checked;
  var vat=vatYn?Math.round(supply*.1):0;
  var total=supply+vat;
  var el=document.getElementById('doc-supply');if(el)el.textContent='₩'+fmt(supply);
  el=document.getElementById('doc-vat');if(el)el.textContent='₩'+fmt(vat);
  el=document.getElementById('doc-total');if(el)el.textContent='₩'+fmt(total);
}

// Firestore 저장
function saveDocFirestore(){
  if(!_db){toast('Firestore 연결 안됨');return;}
  var type=document.getElementById('doc-type').value;
  var docNo=document.getElementById('doc-no').value;
  var supply=_docItems.reduce(function(s,item){return s+(item.qty||0)*(item.price||0);},0);
  var vatYn=(document.getElementById('doc-vat-yn')||{checked:true}).checked;
  var vat=vatYn?Math.round(supply*.1):0;
  var record={
    type:type,docNo:docNo,
    date:document.getElementById('doc-date').value,
    fromName:document.getElementById('doc-from-name').value,
    fromBiz:document.getElementById('doc-from-biz').value,
    fromRep:document.getElementById('doc-from-rep').value,
    fromTel:document.getElementById('doc-from-tel').value,
    toName:document.getElementById('doc-to-name').value,
    toBiz:document.getElementById('doc-to-biz').value,
    toRep:document.getElementById('doc-to-rep').value,
    toTel:document.getElementById('doc-to-tel').value,
    items:JSON.stringify(_docItems),
    supply:supply,vat:vat,total:supply+vat,
    note:document.getElementById('doc-note').value,
    dealerId:_CU&&_CU.dealerId,
    createdAt:new Date().toISOString()
  };
  _db.collection('documents').add(record)
    .then(function(){toast('✅ 저장 완료!');})
    .catch(function(e){toast('❌ '+e.message);});
}

function bsPreview(){
  var tmpl=(document.getElementById('bs-msg-tmpl')||{}).value||'';
  var data=window._bsData||[];
  var chks=Array.from(document.querySelectorAll('.bs-chk')).filter(function(c){return c.checked;}).map(function(c){return parseInt(c.dataset.idx);});
  if(!chks.length){toast('수신자를 선택하세요');return;}
  var sample=data[chks[0]];
  if(!sample)return;
  var net=calcNet(sample).net||0;
  var msg=tmpl.replace('{이름}',sample.driver||sample.userId||'').replace('{금액}',fmt(net));
  alert('[미리보기]\n수신: '+sample._phone+'\n\n'+msg);
}
function bsDoSend(allData){
  var tmpl=(document.getElementById('bs-msg-tmpl')||{}).value||'';
  var chkEls=Array.from(document.querySelectorAll('.bs-chk')).filter(function(c){return c.checked;});
  if(!chkEls.length){toast('수신자를 선택하세요');return;}
  var selected=chkEls.map(function(c){return allData[parseInt(c.dataset.idx)];}).filter(Boolean);
  if(!confirm(selected.length+'명에게 SMS 발송하시겠습니까?'))return;

  var btn=document.getElementById('bs-send-btn');
  if(btn){btn.disabled=true;btn.textContent='발송 중...';}
  var prog=document.getElementById('bs-progress');
  var progBar=document.getElementById('bs-progress-bar');
  var progLabel=document.getElementById('bs-progress-label');
  var result=document.getElementById('bs-result');
  if(prog)prog.style.display='block';

  var messages=selected.map(function(x){
    var net=calcNet(x).net||0;
    var msg=tmpl.replace('{이름}',x.driver||x.userId||'').replace('{금액}',fmt(net));
    return {to:(x._phone||'').replace(/[^0-9]/g,''),text:msg,_id:x.id||x.fbId,_obj:x};
  }).filter(function(m){return m.to.length>=10;});

  if(progLabel)progLabel.textContent='발송 준비 중... ('+messages.length+'건)';
  if(progBar)progBar.style.width='10%';

  fetch('/api/send-sms',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:messages.map(function(m){return {to:m.to,text:m.text};})})
  }).then(function(r){return r.json();}).then(function(d){
    if(progBar)progBar.style.width='100%';
    var ok=d.successCount||0;
    var total=messages.length;
    if(progLabel)progLabel.textContent='완료: '+ok+'/'+total+'건 성공';
    if(result){
      result.style.display='block';
      result.innerHTML='✅ '+ok+'명 발송 성공'+(total-ok>0?' / ❌ '+(total-ok)+'명 실패':'')+'<br><span style="font-size:11px;color:var(--text2)">발송 완료된 정산서는 자동으로 완료 표시됩니다</span>';
    }
    // Firestore 완료 처리
    if(d.success||ok>0){
      messages.forEach(function(m){
        if(m._id&&_db){
          _db.collection('settlements').doc(m._id).update({taxSent:true,taxSentAt:new Date().toISOString()}).then(function(){if(m._obj)m._obj.taxSent=true;}).catch(function(){});
        }
      });
      toast('✅ '+ok+'/'+total+'명 SMS 발송 완료!');
    } else {
      toast('❌ 발송 실패: '+(d.error||JSON.stringify(d).slice(0,60)));
    }
    if(btn){btn.disabled=false;btn.textContent='📡 재발송';}
  }).catch(function(e){
    if(progBar)progBar.style.width='0%';
    if(result){result.style.display='block';result.style.background='rgba(239,68,68,.08)';result.style.borderColor='rgba(239,68,68,.2)';result.style.color='#ef4444';result.textContent='❌ 오류: '+e.message;}
    toast('❌ '+e.message);
    if(btn){btn.disabled=false;btn.textContent='📡 선택 발송';}
  });
}

function updSECalc(){
  // 라우트별 재계산
  var rdinps=document.querySelectorAll('.se-rd-inp');
  var totalDamt=0,totalRamt=0;
  var byIdx={};
  rdinps.forEach(function(inp){
    var idx=+inp.dataset.rdidx;var field=inp.dataset.field;var val=+inp.value||0;
    if(!byIdx[idx])byIdx[idx]={cnt:0,ret:0,price:0};
    byIdx[idx][field]=val;
  });
  var totalDcnt=0,totalRcnt=0;
  Object.keys(byIdx).forEach(function(idx){
    var d=byIdx[idx];
    var dAmt=d.cnt*d.price;var rAmt=d.ret*d.price;
    totalDamt+=dAmt;totalRamt+=rAmt;
    totalDcnt+=d.cnt;totalRcnt+=d.ret;
    var da=document.getElementById('se-rd-damt-'+idx);var ra=document.getElementById('se-rd-ramt-'+idx);var sb=document.getElementById('se-rd-sub-'+idx);
    if(da)da.textContent='₩'+fmt(dAmt);if(ra)ra.textContent='₩'+fmt(rAmt);if(sb)sb.textContent='₩'+fmt(dAmt+rAmt);
  });
  var totD=document.getElementById('se-tot-dcnt'),totR=document.getElementById('se-tot-rcnt');
  var totDA=document.getElementById('se-tot-damt'),totRA=document.getElementById('se-tot-ramt'),totSB=document.getElementById('se-tot-sub');
  if(totD)totD.textContent=totalDcnt.toLocaleString()+'건';
  if(totR)totR.textContent=totalRcnt.toLocaleString()+'건';
  if(totDA)totDA.textContent='₩'+fmt(totalDamt);
  if(totRA)totRA.textContent='₩'+fmt(totalRamt);
  if(totSB)totSB.textContent='₩'+fmt(totalDamt+totalRamt);
  var lD=document.getElementById('se-inc-dcnt-label'),lR=document.getElementById('se-inc-rcnt-label');
  var vD=document.getElementById('se-inc-damt'),vR=document.getElementById('se-inc-ramt');
  if(lD)lD.textContent=totalDcnt.toLocaleString()+'건 × 라우트별 단가';
  if(lR)lR.textContent=totalRcnt.toLocaleString()+'건 × 라우트별 단가';
  if(vD)vD.textContent='₩'+fmt(totalDamt);
  if(vR)vR.textContent='₩'+fmt(totalRamt);
  // 항목별 합산
  function gv(id){var el=document.getElementById(id);return el?+el.value||0:0;}
  var fresh=gv('se-fresh'),finc=gv('se-finc'),inc=gv('se-inc'),nocont=gv('se-nocont');
  var dmg=gv('se-dmg'),etcP=gv('se-etc-plus'),etcM=gv('se-etc-minus'),adv=gv('se-adv');

function _saveSECurrent(){

  if(!driver&&cached)driver=cached.driver||cached.driverName||cached.userId||'';
  if(!month&&cached)month=cached.month||'';
  if(!driver||!month){toast('❌ 기사/월 정보 없음 id='+id);return;}
  var fresh=gv('se-fresh'),dmg=gv('se-dmg'),inc=gv('se-inc');
  var etcPlus=gv('se-etc-plus'),etcMinus=gv('se-etc-minus'),adv=gv('se-adv');
  var finc=gv('se-finc');
  var nocont=gv('se-nocont');
  var dcnt=cached?cached.dcnt||0:0;
  var rcnt=cached?cached.rcnt||0:0;
  var status=(document.getElementById('se-status')||{value:'정산예정'}).value;
  var rds=cached?cached.routeDetails||[]:[];
  var newDamt=0,newRamt=0;
  rds.forEach(function(rd){
    var price=RPRICE[rd.route]>0?RPRICE[rd.route]:(rd.unitPrice||0);
    newDamt+=(rd.cnt||0)*price;newRamt+=(rd.ret||0)*price;
  });
  if(!newDamt&&cached)newDamt=cached.damt||0;
  if(!newRamt&&cached)newRamt=cached.ramt||0;
  if(!finc&&rds.length){
    rds.forEach(function(rd){
      var s2=_getIncSetting(cached&&cached.userId||driver,rd.route);
      if(s2.on&&s2.rate>0)finc+=(rd.cnt||0)*s2.rate;
    });
  }
  var taxBase=newDamt+newRamt+fresh+finc+nocont+etcPlus;
  var supplyAmt=Math.round(taxBase/1.1);
  var monthlyWage=Math.round(supplyAmt*0.654);
  var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
  var workIns=Math.floor(monthlyWage*0.0088/10)*10;
  var deductTotal=empIns+workIns+dmg+etcMinus+adv;
  var netPay=taxBase-deductTotal;
  var payload={
    driver:driver,userId:cached?cached.userId||driver:driver,
    month:month,dcnt:dcnt,rcnt:rcnt,
    damt:newDamt,ramt:newRamt,
    fresh:fresh,finc:finc,inc:inc,
    etcPlus:etcPlus,etcMinus:etcMinus,
    dmg:dmg,adv:adv,nocont:nocont,
    totalAmt:taxBase,supplyAmt:supplyAmt,monthlyWage:monthlyWage,
    emp:empIns,work:workIns,deduct:deductTotal,net:netPay,
    status:status,dealerId:_CU.dealerId,
    camp:cached?cached.camp||'':'',
    updatedAt:new Date().toISOString()
  };
  var bizNum=(document.getElementById('se-biznum')||{value:''}).value.trim();
  var bizName=(document.getElementById('se-bizname')||{value:''}).value.trim();
  var bizRep=(document.getElementById('se-bizrep')||{value:''}).value.trim();
  var bizType=(document.getElementById('se-biztype')||{value:''}).value.trim();
  var bizAddr=(document.getElementById('se-bizaddr')||{value:''}).value.trim();

  if(bizName)payload.bizName=bizName;
  if(bizRep)payload.bizRep=bizRep;
  if(bizType)payload.bizType=bizType;
  if(bizAddr)payload.bizAddr=bizAddr;
  if(cached&&cached.bizType&&!bizType)payload.bizType=cached.bizType;
  if(cached&&cached.bizItem)payload.bizItem=cached.bizItem;
  if(rds.length)payload.routeDetails=rds;

      var cid3=_CU.dealerId||_CU.companyId;
      _db.collection('drivers')
        .where('dealerId','==',cid3)
        .where('userId','==',payload.userId||driver)

              bizNum:bizNum,bizNumClean:bnClean,

              updatedAt:new Date().toISOString()
            }).catch(function(){});
          }
        }).catch(function(){});
    }

    try{var d2=_CU&&_CU.dealerId||'shared';
      localStorage.removeItem('dw_'+d2+'_settlements');

    toast('❌ 저장실패: '+e.message);
    if(btn){btn.textContent='💾 저장 후 재계산';btn.disabled=false;}
