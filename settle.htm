<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DONWAY">
<meta name="application-name" content="DONWAY">
<meta name="msapplication-TileColor" content="#185FA5">
<meta name="msapplication-TileImage" content="/icon-192.png">
<title>DONWAY — 자동화 정산 플랫폼</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
:root{
  --brand:#185FA5;--brand-l:#E6F1FB;--brand-d:#0C447C;
  --green:#0F6E56;--green-l:#E1F5EE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f0efe9;
  --text:#2C2C2A;--text2:#5F5E5A;--text3:#888780;
  --border:rgba(0,0,0,.1);--r:10px
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Malgun Gothic',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px}
body.dark{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a24;--text:#f0ede6;--text2:#b8b5ae;--text3:#6b6b7a;--border:rgba(255,255,255,.12);--brand:#60a5fa;--brand-l:rgba(96,165,250,.15);--brand-d:#3b82f6;--green:#4ade80;--green-l:rgba(74,222,128,.15);--red:#f87171;--red-l:rgba(248,113,113,.15);--amber:#fbbf24;--amber-l:rgba(251,191,36,.15);--purple:#c084fc;--purple-l:rgba(192,132,252,.15)}
#app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;box-shadow:2px 0 12px rgba(0,0,0,.06)}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.sl{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sl-icon{width:30px;height:30px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sl-text{font-size:13px;font-weight:800;color:var(--brand)}
.sl-ver{font-size:9px;color:var(--purple);font-weight:600;display:block}
.snav{flex:1;padding:6px;overflow-y:auto}
.ns{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px 10px 14px;cursor:pointer;user-select:none;
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);border-radius:var(--r);margin:2px 6px;
  transition:all .2s;
}
.ns:hover{background:var(--bg3);color:var(--text2)}
.ns.open{color:var(--brand)}
.ns-arrow{font-size:10px;transition:transform .25s;opacity:.7}
.ns.open .ns-arrow{transform:rotate(90deg)}
.ns-items{overflow:hidden;max-height:0;transition:max-height .3s ease;padding:0 6px}
.ns-items.open{max-height:300px}
.ni{padding:9px 12px;border-radius:10px;cursor:pointer;color:var(--text2);
  font-size:12px;margin-bottom:3px;display:flex;align-items:center;gap:9px;
  transition:all .15s;border-left:3px solid transparent}
.ni:hover{background:var(--bg3);color:var(--text);border-left-color:var(--brand);transform:translateX(2px)}
.ni.on{background:linear-gradient(135deg,var(--brand-l),rgba(59,130,246,.08));color:var(--brand);font-weight:800;border-left-color:var(--brand);box-shadow:0 2px 8px rgba(59,130,246,.15)}
.sb-bot{padding:9px 12px;border-top:1px solid var(--border)}
.btn-iv{padding:4px 10px;border:1px solid var(--border);border-radius:20px;background:var(--bg2);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.btn-iv:hover{background:var(--brand-l);color:var(--brand);border-color:var(--brand)}
.btn-iv.active{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:700}
.topbar{height:46px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:8px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:7px}
.content{padding:14px;flex:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.btn{padding:6px 12px;border-radius:var(--r);font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--bg3)}
.btn-blue{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-orange{background:#f97316;color:#fff;border-color:#f97316}
.btn-sm{padding:4px 9px;font-size:11px;min-height:36px;-webkit-tap-highlight-color:transparent}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px}
.b-green{background:var(--green-l);color:var(--green)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-blue{background:var(--brand-l);color:var(--brand)}
.b-red{background:var(--red-l);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
th{background:var(--bg3);font-weight:600;color:var(--text2);font-size:11px}
tr:hover>td{background:var(--bg3)}
.tbl-wrap{overflow-x:auto}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:14px}
.mo.show{display:flex}
.md{background:var(--bg2);border-radius:12px;padding:20px;width:560px;max-width:100%;max-height:92vh;overflow-y:auto}
.mdt{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.mdf{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--border)}
.fg{display:flex;flex-direction:column;margin-bottom:10px}
.fg label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fg input,.fg select{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text);width:100%}
.fg input:focus,.fg select:focus{border-color:var(--brand);outline:none}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--text3)}
/* 로그인 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{background:var(--bg2);border-radius:20px;padding:32px 28px;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
/* 모바일 */
.ham{display:none;width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;border:1px solid var(--border);font-size:18px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
@media(max-width:640px){
  .sidebar{transform:translateX(-100%);transition:.25s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .ham{display:flex!important}
  .gr{grid-template-columns:1fr}
  body{overflow-y:auto!important}
  .main{overflow-y:auto;-webkit-overflow-scrolling:touch}
  .content{overflow-y:visible;padding-bottom:80px}
}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:600;opacity:0;transition:.22s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script src="https://js.tosspayments.com/v2/standard"></script>
<script>
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('keydown',function(e){
    if(e.keyCode===123){e.preventDefault();return false;}
    if(e.ctrlKey&&e.shiftKey&&(e.keyCode===73||e.keyCode===74||e.keyCode===67)){e.preventDefault();return false;}
    if(e.ctrlKey&&!e.shiftKey&&e.keyCode===85){e.preventDefault();return false;}
  });
})();
</script>
</head>
<body>
<script>
// 디버그 모드
</script>

<!-- 로그인 -->
<div id="login-screen" class="login-wrap">
  <div class="login-card" style="width:400px;max-width:95vw">
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:52px;height:52px;border-radius:14px;background:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:8px">💰</div>
      <div style="font-size:22px;font-weight:900;color:var(--brand)">DONWAY</div>
      <div id="login-subtitle" style="font-size:11px;color:var(--text3);margin-top:2px">돈의 방향을 자동화합니다</div>
      <div id="login-brand-name" style="font-size:13px;font-weight:700;color:var(--brand);margin-top:4px;display:none"></div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">돈의 방향을 자동화합니다</div>
    </div>

    <!-- 탭 -->
    <div style="display:flex;gap:4px;margin-bottom:20px;background:var(--bg3);border-radius:10px;padding:4px">
      <button id="tab-login" onclick="switchTab('login')" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--brand);color:#fff;transition:.2s">로그인</button>
      <button id="tab-register" onclick="switchTab('register')" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--text3);transition:.2s">회사 등록</button>
      <button id="tab-join" onclick="switchTab('join')" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--text3);transition:.2s">직원 가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div id="form-login">
      <div class="fg"><label>이메일</label><input id="l-email" type="email" placeholder="example@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="fg"><label>비밀번호</label><input id="l-pw" type="password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="l-err" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>
      <button class="btn btn-blue" style="width:100%;padding:11px;font-size:14px;font-weight:700" onclick="doLogin()">로그인</button>
      <div style="text-align:center;margin-top:10px"><button class="btn btn-sm" onclick="toggleDark()">🌙 다크모드</button></div>
    </div>

    <!-- 회사 등록 폼 -->
    <div id="form-register" style="display:none">
      <div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:11px;color:var(--text2)">
        🎁 <strong>7일 무료 체험</strong> — 카드 등록 불필요 · 사업자번호 1회 한정
      </div>
      <div class="fg"><label>회사명</label><input id="r-company" type="text" placeholder="엠비티아이 유한회사"></div>
      <div class="fg"><label>사업자등록번호</label>
        <div style="display:flex;gap:8px">
          <input id="r-biznum" type="text" placeholder="000-00-00000" style="flex:1" oninput="this.value=this.value.replace(/[^0-9-]/g,'')">
          <button class="btn btn-sm btn-blue" onclick="checkBizNum()" style="white-space:nowrap">중복확인</button>
        </div>
        <div id="r-biznum-msg" style="font-size:11px;margin-top:4px;display:none"></div>
      </div>
      <div class="fg"><label>관리자 이메일</label><input id="r-email" type="email" placeholder="admin@company.com"></div>
      <div class="fg"><label>비밀번호</label><input id="r-pw" type="password" placeholder="8자 이상"></div>
      <div class="fg"><label>비밀번호 확인</label><input id="r-pw2" type="password" placeholder="비밀번호 재입력"></div>
      <!-- 서비스 선택 -->
      <div class="fg" style="margin-bottom:14px">
        <label style="font-size:13px;font-weight:700;margin-bottom:8px;display:block">사용할 서비스를 선택하세요</label>
        <div style="display:flex;gap:8px">
          <label id="svc-settle-label" onclick="selectService('settle')" style="flex:1;border:2px solid var(--brand);border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:.2s;background:var(--brand-l)">
            <div style="font-size:20px;margin-bottom:4px">💰</div>
            <div style="font-size:12px;font-weight:700;color:var(--brand)">AI 자동 정산</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">정산·급여·계약서</div>
          </label>
          <label id="svc-qr-label" onclick="selectService('qr')" style="flex:1;border:2px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:.2s">
            <div style="font-size:20px;margin-bottom:4px">🔐</div>
            <div style="font-size:12px;font-weight:700;color:var(--text2)">QR 출퇴근</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">출퇴근·스케줄·직원</div>
          </label>
          <label id="svc-full-label" onclick="selectService('full')" style="flex:1;border:2px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:.2s">
            <div style="font-size:20px;margin-bottom:4px">⚡</div>
            <div style="font-size:12px;font-weight:700;color:var(--text2)">풀패키지</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">전체 기능</div>
          </label>
          <label id="svc-hourly-label" onclick="selectService('hourly')" style="flex:1;border:2px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:.2s">
            <div style="font-size:20px;margin-bottom:4px">⏰</div>
            <div style="font-size:12px;font-weight:700;color:var(--text2)">급여 관리</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">시급·일급·월급</div>
          </label>
        </div>
        <input type="hidden" id="r-service" value="settle">
      </div>
      <div id="r-err" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>
      <button class="btn btn-blue" style="width:100%;padding:11px;font-size:14px;font-weight:700" onclick="doRegister()">7일 무료 체험 시작</button>
    </div>

    <!-- 직원 가입 폼 -->
    <div id="form-join" style="display:none">
      <div style="background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.2);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:11px;color:var(--text2)">
        🔑 관리자에게 <strong>회사코드</strong>를 받아 입력하세요
      </div>
      <div class="fg"><label>이름</label><input id="j-name" type="text" placeholder="홍길동"></div>
      <div class="fg"><label>정산 아이디</label><input id="j-driverid" type="text" placeholder="예: kim001 (영문+숫자)"></div>
      <div class="fg"><label>이메일</label><input id="j-email" type="email" placeholder="example@email.com"></div>
      <div class="fg"><label>비밀번호</label><input id="j-pw" type="password" placeholder="8자 이상"></div>
      <div class="fg">
        <label>사업자등록증 <span style="color:var(--text3);font-weight:400">(선택 · 세금계산서 발급용)</span></label>
        <div style="display:flex;gap:8px;margin-bottom:6px">
          <button class="btn btn-sm" onclick="document.getElementById('j-biz-file').click()" style="white-space:nowrap">📄 파일 첨부</button>
          <button class="btn btn-sm" onclick="toggleBizManual()" style="white-space:nowrap">✏️ 직접 입력</button>
        </div>
        <input id="j-biz-file" type="file" accept="image/*,.pdf" style="display:none" onchange="previewBizFile(this)">
        <div id="j-biz-preview" style="display:none;font-size:11px;color:var(--primary);margin-bottom:4px"></div>
        <div id="j-biz-manual" style="display:none">
          <input id="j-biz-num" type="text" placeholder="사업자번호 (000-00-00000)" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:12px;margin-bottom:4px">
          <input id="j-biz-name" type="text" placeholder="상호명" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:12px;margin-bottom:4px">
          <input id="j-biz-owner" type="text" placeholder="대표자명" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:12px">
        </div>
      </div>
      <div class="fg"><label>회사코드</label>
        <div style="display:flex;gap:8px">
          <input id="j-code" type="text" placeholder="DNW-0000" style="flex:1;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
          <button class="btn btn-sm btn-blue" onclick="checkCompanyCode()" style="white-space:nowrap">확인</button>
        </div>
        <div id="j-code-msg" style="font-size:11px;margin-top:4px;display:none"></div>
      </div>
      <div id="j-err" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>
      <button class="btn btn-blue" style="width:100%;padding:11px;font-size:14px;font-weight:700" onclick="doJoin()">가입하기</button>
    </div>
  </div>
</div>

<!-- 앱 -->
<div id="app" style="display:none">
  <!-- 모바일 사이드바 backdrop -->
  <div id="sb-backdrop" onclick="document.getElementById('sidebar').classList.remove('open');this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;-webkit-tap-highlight-color:transparent"></div>
  <div class="sidebar" id="sidebar">
    <div class="sl">
      <div class="sl-icon">💰</div>
      <div><div class="sl-text">DONWAY</div><span class="sl-ver">v1.0 · 돈의 방향</span></div>
    </div>
    <div style="padding:8px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--brand-l);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--brand)" id="sb-av">관</div>
      <div><div style="font-size:12px;font-weight:600" id="sb-name">로딩중</div><div style="font-size:10px;color:var(--text3)" id="sb-role"></div></div>
    </div>
    <nav class="snav" id="snav"></nav>
    <div class="sb-bot">
      <button class="btn" style="width:100%;font-size:11px;margin-bottom:4px" onclick="toggleDark()">🌙 다크모드</button>

var DISPATCH_CONFIG = {
  maxDailyDeliveries: 200,  // 기사 1인 최대 배송건수
  maxRoutePerDriver:  3,    // 기사 1인 최대 라우트 수

// ════════════════════════════════════════
// ★ 배차 점수 계산 공식
//   Score = (배송효율 × 0.4) + (거리효율 × 0.3) +
//           (경험점수 × 0.2) + (부하균형 × 0.1)
// ════════════════════════════════════════

// ════════════════════════════════════════════════════════
// ★ 배차 경험점수 누적 — 정산 완료 시 호출
// 기사가 해당 라우트를 완료할수록 경험점수 상승
// ════════════════════════════════════════════════════════
function updateDriverRouteExp(driverId, routeId, deliveryCount) {
  if(!_db || !driverId || !routeId) return;
  // Firestore에 경험치 누적 (increment)
  _db.collection('drivers').where('userId','==',driverId).limit(1).get()
    .then(function(snap){
      if(snap.empty) return;
      var doc = snap.docs[0];
      var data = doc.data();
      var routeExp = data.routeExp || {};
      // 배송건수 기반 점수 증가 (100건당 +1점, 최대 10점)
      var current = routeExp[routeId] || 0;
      var gained = Math.min(deliveryCount / 100, 1.0);
      routeExp[routeId] = Math.min(10, Math.round((current + gained) * 10) / 10);
      return doc.ref.update({ routeExp: routeExp });
    })
    .then(function(){ console.log('[배차] routeExp 업데이트:', driverId, routeId); })
    .catch(function(e){ console.warn('[배차] routeExp 업데이트 실패:', e); });
}

// 정산 시트에서 배차 경험치 일괄 업데이트
async function _updateAllRouteExp(settlementData) {
  // settlementData: [{ driverId, route, dcnt }]
  if(!_db || !settlementData || !settlementData.length) return;
  var batch = [];
  for(var i=0; i<settlementData.length; i++){
    var s = settlementData[i];
    if(s.driverId && s.route && s.dcnt > 0){
      batch.push({driverId:s.driverId, routeId:s.route, cnt:s.dcnt});
    }
  }
  if(!batch.length) return;
  // 기사별 묶어서 1회 업데이트
  var grouped = {};
  batch.forEach(function(b){
    if(!grouped[b.driverId]) grouped[b.driverId]={};
    grouped[b.driverId][b.routeId]=(grouped[b.driverId][b.routeId]||0)+b.cnt;
  });
  var drivers = await _getCachedDriversForDispatch();
  var promises = Object.keys(grouped).map(function(driverId){
    var drv = drivers.find(function(d){ return d.userId===driverId||d.name===driverId; });
    if(!drv||!drv.fbId) return Promise.resolve();
    var routeExp = drv.routeExp || {};
    Object.keys(grouped[driverId]).forEach(function(routeId){
      var gained = Math.min(grouped[driverId][routeId]/100, 1.0);
      routeExp[routeId] = Math.min(10, Math.round(((routeExp[routeId]||0)+gained)*10)/10);
    });
    return _db.collection('drivers').doc(drv.fbId).update({routeExp:routeExp});
  });
  await Promise.all(promises.filter(Boolean));
  window._driversCache = null; // 캐시 무효화
  console.log('[배차] 경험치 일괄 업데이트 완료:', Object.keys(grouped).length+'명');
}

// Firebase에서 기사 목록 로드 (routeExp 포함)
async function _getCachedDriversForDispatch() {
  if(window._dispatchDriversCache && (Date.now()-window._dispatchDriversCacheTs)<300000){
    return window._dispatchDriversCache;
  }
  if(!_db) return ls('drivers');
  var snap = await _db.collection('drivers').where('is_active','==',true).get();
  var all = [];
  snap.forEach(function(doc){ var d=doc.data(); d.fbId=doc.id; all.push(d); });
  window._dispatchDriversCache = all;
  window._dispatchDriversCacheTs = Date.now();
  return all;
}

function calcDispatchScore(driver, route, context) {
  // driver: { id, name, camp, currentLoad, totalDeliveries, experience }
  // route:  { id, camp, wave, expectedCount }
  // context: { allDrivers, campRoutes }

  // 1. 배송효율: 같은 캠프 기사 우선
  var campMatch = (driver.camp === route.camp) ? 100 : 50;

  // 2. 거리효율: 현재 라우트와의 근접도 (캠프 기준)
  var distScore = campMatch;

  // 3. 경험점수: 해당 라우트 과거 배송 경험
  var expScore = Math.min(100, (driver.routeExp && driver.routeExp[route.id] || 0) * 10);

  // 4. 부하균형: 현재 배송량이 적을수록 높은 점수
  var loadScore = Math.max(0, 100 - Math.round((driver.currentLoad || 0) / DISPATCH_CONFIG.maxDailyDeliveries * 100));

  // 5. 가중 합산
  var score = (campMatch  * 0.4)
            + (distScore  * 0.3)
            + (expScore   * 0.2)
            + (loadScore  * 0.1);

  return {
    score: Math.round(score * 10) / 10,
    breakdown: { campMatch, distScore, expScore, loadScore }
  };
}

// ════════════════════════════════════════
// ★ 라우트 → 기사 자동 배정
// ════════════════════════════════════════
function autoDispatch(routes, drivers, options) {
  // routes: [{ id, camp, wave, expectedCount }]
  // drivers: [{ id, name, camp, currentLoad, routeExp }]
  // options: { priorityWave, balanceLoad }

  var result = {}; // routeId → driverId
  var driverLoad = {}; // driverId → 배정 라우트 수
  drivers.forEach(function(d){ driverLoad[d.id] = 0; });

  // 웨이브별 정렬 (우선 배차)
  var sortedRoutes = routes.slice().sort(function(a,b){
    var ai = DISPATCH_CONFIG.waveOrder.indexOf(a.wave);
    var bi = DISPATCH_CONFIG.waveOrder.indexOf(b.wave);
    return ai - bi;
  });

  sortedRoutes.forEach(function(route) {
    // 해당 라우트에 배정 가능한 기사 필터
    var eligible = drivers.filter(function(d){
      return driverLoad[d.id] < DISPATCH_CONFIG.maxRoutePerDriver;
    });

    if(!eligible.length) return;

    // 점수 계산 후 최고 점수 기사 배정
    var scored = eligible.map(function(d){
      var s = calcDispatchScore(d, route, { allDrivers: drivers });
      return { driver: d, score: s.score, breakdown: s.breakdown };
    }).sort(function(a,b){ return b.score - a.score; });

    var best = scored[0];
    result[route.id] = {
      driverId: best.driver.id,
      driverName: best.driver.name,
      score: best.score,
      breakdown: best.breakdown
    };
    driverLoad[best.driver.id]++;
  });

  return result;
}

// ════════════════════════════════════════
// ★ 배차 균형 검사
// ════════════════════════════════════════
function checkDispatchBalance(dispatchResult, drivers) {
  var loadMap = {};
  drivers.forEach(function(d){ loadMap[d.id] = 0; });
  Object.values(dispatchResult).forEach(function(r){
    if(r.driverId) loadMap[r.driverId] = (loadMap[r.driverId]||0) + 1;
  });

  var counts = Object.values(loadMap);
  var avg = counts.reduce(function(s,v){return s+v;},0) / counts.length;
  var max = Math.max.apply(null, counts);
  var min = Math.min.apply(null, counts);
  var balance = max > 0 ? Math.round((1 - (max-min)/max) * 100) : 100;

  return { avg: Math.round(avg*10)/10, max, min, balance, loadMap };
}

// ════════════════════════════════════════
// ★ 핵심 함수: 야간시간 계산
// ════════════════════════════════════════
function calcNightHours(startH, endH) {
  // startH, endH: 시각 (0~24)
  // 야간 = 22:00~06:00
  var nightH = 0;
  var s = startH, e = endH;
  if(e < s) e += 24; // 자정 넘김
  for(var h = s; h < e; h++) {
    var hh = h % 24;
    if(hh >= 22 || hh < 6) nightH++;
  }
  return nightH;
}

// ════════════════════════════════════════
// ★ 시급제 정산 계산
// ════════════════════════════════════════
function calcHourlyPay(params) {
  // params: { totalHours, hourlyRate, startH, endH, isHoliday, juhuHours }
  var L = LABOR_LAW_2026;
  var rate = params.hourlyRate || L.minWage;
  var total = params.totalHours || 0;
  var nightH = (params.startH !== undefined && params.endH !== undefined)
    ? calcNightHours(params.startH, params.endH) : 0;

  // 기본 / 연장 구분
  var regularH = Math.min(total, L.dailyMaxH);
  var overtimeH = Math.max(0, total - L.dailyMaxH);

  var regularPay  = regularH  * rate;
  var overtimePay = overtimeH * rate * (L.overtimeRate - 1); // 0.5 추가분
  var nightPay    = nightH    * rate * L.nightRate;          // 0.5 추가분
  var holidayPay  = params.isHoliday ? regularPay * (L.holidayRate - 1) : 0;

  // 주휴수당
  var juhuPay = 0;
  if((params.juhuHours || 0) >= L.juhuMin) {
    juhuPay = L.dailyMaxH * rate; // 1일분
  }

  var totalPay = regularPay + overtimePay + nightPay + holidayPay + juhuPay;
  return {
    regularH, overtimeH, nightH,
    regularPay, overtimePay, nightPay, holidayPay, juhuPay,
    totalPay,
    breakdown: {
      '기본급': regularPay,
      '연장수당': overtimePay,
      '야간수당': nightPay,
      '휴일수당': holidayPay,
      '주휴수당': juhuPay
    }
  };
}

// ════════════════════════════════════════
// ★ QR 출퇴근 → 근무시간 계산
// ════════════════════════════════════════
function calcWorkHoursFromQR(checkIn, checkOut) {
  // checkIn/Out: "HH:MM" 또는 timestamp
  if(!checkIn || !checkOut) return { hours:0, nightH:0, startH:0, endH:0 };
  var parseT = function(t) {
    if(typeof t === 'string' && t.includes(':')) {
      var p = t.split(':');
      return parseFloat(p[0]) + parseFloat(p[1])/60;
    }
    return 0;
  };
  var s = parseT(checkIn);
  var e = parseT(checkOut);
  if(e < s) e += 24; // 자정 넘김
  var hours = Math.max(0, e - s - 0.5); // 30분 휴게 자동 차감 (4시간 이상 시)
  if(e - s < 4) hours = e - s;
  var nightH = calcNightHours(Math.floor(s), Math.ceil(e));
  return { hours: Math.round(hours * 10)/10, nightH, startH: s, endH: e };
}

// ════════════════════════════════════════
// ★ 일급제 정산
// ════════════════════════════════════════
function calcDailyPay(params) {
  var L = LABOR_LAW_2026;
  var dailyRate = params.dailyRate || L.minDaily;
  var days = params.workDays || 0;
  var isHoliday = params.holidayDays || 0;

  var normalPay  = (days - isHoliday) * dailyRate;
  var holidayPay = isHoliday * dailyRate * L.holidayRate;
  var totalPay   = normalPay + holidayPay;

  return { days, normalPay, holidayPay, totalPay,
    breakdown: { '일급': normalPay, '휴일수당': holidayPay }
  };
}

// ════════════════════════════════════════
// ★ 수수료제 정산
// ════════════════════════════════════════
function calcCommissionPay(params) {
  var sales       = params.salesAmount || 0;
  var rate        = (params.commissionRate || 0) / 100;
  var baseGuarantee = params.baseGuarantee || 0;
  var commission  = Math.round(sales * rate);
  var totalPay    = Math.max(commission, baseGuarantee); // 최저보장액

  return { sales, commission, baseGuarantee, totalPay,
    breakdown: { '수수료': commission, '최저보장': baseGuarantee > commission ? baseGuarantee - commission : 0 }
  };
}

// ════════════════════════════════════════
function calcJuhuSudang(weeklyHours, hourlyRate) {
  var L = LABOR_LAW_2026;
  if(weeklyHours < L.juhuMin) return 0;
  var rate = hourlyRate || L.minWage;
  return L.dailyMaxH * rate; // 1일분 지급
}

// ════════════════════════════════════════
// ★ 최저임금 위반 체크
// ════════════════════════════════════════
function checkMinWage(totalPay, totalHours) {
  var L = LABOR_LAW_2026;
  var effective = totalHours > 0 ? Math.round(totalPay / totalHours) : 0;
  var violation = effective < L.minWage;
  return {
    effectiveRate: effective,
    minRequired: L.minWage * totalHours,
    violation: violation,
    shortage: violation ? Math.max(0, L.minWage * totalHours - totalPay) : 0
  };
}

// 배달대행 정산
// 배달대행 차액 정산법 (고정단가 / 앱실수령 차액)
// 기사: 건수 × 고정단가 → 항상 이 금액 보장
// 대리점: 앱실수령 - 기사지급 = 마진(+)손실(-)
function _getDeliveryTierPrice(weekTotal, tiers, basePrice){
  if(!tiers||!tiers.length) return basePrice||2900;
  var sorted=tiers.slice().sort(function(a,b){return b.minCnt-a.minCnt;});
  for(var i=0;i<sorted.length;i++){if(weekTotal>=sorted[i].minCnt)return sorted[i].price;}
  return basePrice||2900;
}
function calcNet_delivery(x, cfg){
  var weekTotal      = +x.weekTotal||+x.dcnt||+x.callCnt||0;
  var actualEarnings = +x.actualEarnings||0;   // 앱 실수령
  var nightCnt       = +x.nightCnt||0;
  var missionAmt     = +x.missionAmt||0;
  var eventAmt       = +x.eventAmt||0;
  var tiers          = cfg.tiers||[];
  var basePrice      = cfg.callPrice||2900;
  var nightSurcharge = cfg.nightSurcharge||0;
  var programFee     = cfg.programFee||0;
  var taxRate        = cfg.withhold==='3.3'?0.033:0;

  // 주간 건수 → 구간 단가 결정
  var fixedPrice  = _getDeliveryTierPrice(weekTotal, tiers, basePrice);
  // 기사 보장액 = 건수 × 고정단가
  var driverGuarantee = weekTotal * fixedPrice;
  // 심야 추가
  var nightAddAmt = nightCnt * nightSurcharge;
  var gross = driverGuarantee + nightAddAmt + missionAmt + eventAmt;
  var tax   = Math.round(gross * taxRate);
  var net   = gross - tax - programFee;

  // 대리점 차액 계산 (앱실수령 입력 시)
  var agencyMargin = 0, topUpAmt = 0, recoveryAmt = 0;
  if(actualEarnings > 0){
    agencyMargin  = actualEarnings - driverGuarantee;
    topUpAmt      = agencyMargin < 0 ? Math.abs(agencyMargin) : 0;  // 대리점 보전
    recoveryAmt   = agencyMargin > 0 ? agencyMargin : 0;             // 대리점 회수
  }

  var label = weekTotal+'건 × ₩'+fixedPrice.toLocaleString()+'/건(고정)'
    +(actualEarnings>0 ? ' | 앱실수령 ₩'+actualEarnings.toLocaleString()
      +(agencyMargin>=0 ? ' → 대리점 +₩'+recoveryAmt.toLocaleString()
                        : ' → 대리점 -₩'+topUpAmt.toLocaleString()) : '')
    +(nightCnt>0   ? ' | 심야 '+nightCnt+'건' : '')
    +(missionAmt>0 ? ' | 미션 +₩'+missionAmt.toLocaleString() : '');

  return {
    gross:gross, tax:tax, net:Math.max(0,net), income:gross,
    emp:0, work:0, deductions:tax+programFee,
    // 차액 정산 전용 필드
    fixedPrice:fixedPrice, driverGuarantee:driverGuarantee,
    actualEarnings:actualEarnings, agencyMargin:agencyMargin,
    topUpAmt:topUpAmt, recoveryAmt:recoveryAmt,
    nightAddAmt:nightAddAmt,
    label:label
  };
}

// 소상공인 정산
function calcNet_smallbiz(x, cfg){

  var delivFee = Math.round(sales * (cfg.deliveryFeeRate||0) / 100);
  var laborCost = +x.laborCost||0;
  var net = sales - cardFee - delivFee - laborCost;
  return { gross:sales, net:Math.max(0,net), income:sales,
           emp:0, work:0, deductions:cardFee+delivFee+laborCost,
           label:'매출 ₩'+sales.toLocaleString() };
}

// 용역업체 정산
function calcNet_service(x, cfg){
  var hours = +x.hours||+x.workHours||0;
  var days  = +x.days||+x.workDays||0;
  var rate  = cfg.serviceRate||12000;
  var type  = cfg.serviceType||'hourly';
  var gross = type==='hourly' ? hours*rate : type==='daily' ? days*rate : (+x.monthly||0);
  var allowance = cfg.allowance||0;
  var insRate = cfg.insurance==='3.3' ? 0.033 : cfg.insurance==='yes' ? 0.099 : 0;
  var tax = Math.round(gross * insRate);
  var net = gross - tax + allowance;
  return { gross:gross, tax:tax, net:Math.max(0,net), income:gross,
           emp:0, work:0, deductions:tax,
           label:(type==='hourly'?hours+'시간':days+'일')+' × '+rate.toLocaleString()+'원' };

           emp:0, work:0, deductions:tax,

  if(type==='delivery')   return calcNet_delivery(x, cfg);

// ██ calcNet (쿠팡 물류 기본) ██
function calcNet(x){
  // ★ 업종별 엔진 먼저 시도
  var _indResult = calcNetByIndustry(x);
  if(_indResult) return _indResult;
  // 쿠팡 물류 기본 엔진 (하위 호환)
  var dcnt=+x.dcnt||+x.delivCount||0;
  var rcnt=+x.rcnt||+x.retCount||0;
  // 용차: 건수×단가, 쿠팡: 라우트별 RPRICE × 건수로 강제 재계산 (v9.25)
  var isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  var yDel=+x.yongDel||(G_PRICES.yong_del||900); var yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  // ★ v9.25: 쿠팡 기사 정산은 무조건 RPRICE × 건수로 재계산
  //          엑셀의 회사 단가/저장된 x.damt 흔적 차단 → routeDetails 우선
  //          정책: 엑셀 단가 = 회사 단가(매출), 기사 단가 = 앱 관리자 RPRICE
  var _rdList = x.routeDetails || [];
  // ★ RPRICE(라우트단가표) 절대 우선 → routeDetails.unitPrice(업로드 시 이미 RPRICE 반영) 순
  var _damtRP = _rdList.reduce(function(s,rd){return s+(rd.cnt||0)*(RPRICE[rd.route]||rd.unitPrice||0);},0);
  var _ramtRP = _rdList.reduce(function(s,rd){return s+(rd.ret||0)*(RPRICE[rd.route]||rd.unitPrice||0);},0);
  var damt=isYong ? dcnt*yDel : (_rdList.length ? _damtRP : (+x.damt||+x.delivAmt||+x.base||0));
  var ramt=isYong ? rcnt*yRet : (_rdList.length ? _ramtRP : (+x.ramt||+x.retAmt||0));
  // ★ fresh/inc: 정산총괄에서 VAT제외로 파싱됨 → income 계산 시 VAT포함 변환
  var fresh=+x.fresh||+x.freshAmt||0;  // ★ 프레시백 회수금액만 엑셀값 사용
  // ★ 프레시백 인센티브: 항상 건수 × 25원 재계산 (저장값 무시 — 앱에서 계산)
  var isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  var finc = isCoupang ? Math.round(dcnt*(G_PRICES.freshbag_inc||25)) : 0;
  var inc=+x.inc||0;
  // ★ 미계약건: 항상 RPRICE['nocont_w1/w2'] × 건수 재계산 (저장값·엑셀금액 무시)
  var _nocontCnt=+x.nocontCnt||0;
  var _nocontIsW2=(x.camp||'').includes('부산');
  var _nocontUnit=_nocontIsW2?(RPRICE['nocont_w2']||0):(RPRICE['nocont_w1']||0);
  var nocont = _nocontCnt>0 ? _nocontCnt*_nocontUnit : 0;
  var etcPlus  = +x.etcPlus  || 0;  // ★ 기타(+)
  var etcMinus = +x.etcMinus || 0;  // ★ 기타(-)
  // ★ v9.25: 기타(+)만 세금계산서(income)에 포함 → 고용·산재 기준
  //           기타(-)는 세금계산서 제외, 실지급에서만 차감 (공제 항목)
  var income=damt+ramt+fresh+finc+nocont+etcPlus;  // ★ inc(추가인센)은 세금계산서 base 제외
  // ★ 항상 routeDetails×unitPrice 기반 재계산 (명세서와 일치)
  //   저장된 totalAmt는 참고용으로만 사용하지 않음
  var totalAmt=income;
  var supplyAmt = Math.round(totalAmt / 1.1);
  var expenseAmt = Math.round(supplyAmt * 0.346);
  var monthlyWage = supplyAmt - expenseAmt;
  var empCalc  = monthlyWage >= 800000 ? Math.floor(monthlyWage * 0.008  / 10) * 10 : 0;
  var workCalc = Math.floor(monthlyWage * 0.0088 / 10) * 10;
  var TAX_RATE = +x.taxRate || 0.033;
  var tax  = +x.tax  || (x.taxFixed ? +x.taxFixed : Math.round(income * TAX_RATE));
  var emp  = (x.emp !== undefined && x.emp !== null && x.emp !== '' && +x.emp > 0) ? +x.emp : empCalc;
  // ★ v9.25: 산재 저장값이 계산값의 50% 미만이면 비정상 → 자동 재계산
  var workStored = (x.work !== undefined && x.work !== null && x.work !== '' && +x.work > 0) ? +x.work : 0;
  var work = (workStored && workCalc > 0 && workStored >= workCalc * 0.5) ? workStored : workCalc;
  var eq   = +x.eq  || 0;
  var dmg  = +x.dmg || +x.damage || 0;
  var adv  = +x.adv || +x.advance || 0;
  // ★ 기타(-) → 공제 항목으로 실지급에서 차감
  // ★ 원천세(tax)는 회사 납부 → 기사 실지급 공제 제외
  var deduct = emp + work + eq + dmg + adv + etcMinus;
  var net = totalAmt - deduct;
  return{damt,ramt,fresh,finc,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}

// ██ parseCoupangExcel v3.0 (자동화 완전판) ██
var _CAMP_MAP={
  '부산1':'부산1캠프','부산2':'부산2캠프','부산3':'부산3캠프',
  '대구2':'대구2캠프','대구2B':'대구2B캠프',
  'M_진주1':'진주M캠프','진주M':'진주M캠프','M_진주':'진주M캠프'
};
function _normCamp(raw){
  if(!raw)return '기타';
  var t=String(raw).trim();
  if(_CAMP_MAP[t])return _CAMP_MAP[t];
  for(var k in _CAMP_MAP){if(t.indexOf(k)>=0)return _CAMP_MAP[k];}
  return t;
}
function _extractMonthFromFilename(filename){
  // "2026년_04월_정산서" 또는 "2026년 04월" 형식
  var m=filename.match(/(\d{4})년[_\s]*0*(\d{1,2})월/);
  if(m)return m[1]+'-'+String(+m[2]).padStart(2,'0');
  // YYYY-MM 형식
  var m2=filename.match(/(\d{4})[-_](0[1-9]|1[0-2])/);
  if(m2)return m2[1]+'-'+m2[2];
  return null;
}
function parseCoupangExcel(inp){
  var file=inp.files[0]; if(!file)return;
  if(typeof XLSX==='undefined'){toast('⚠️ 엑셀 라이브러리 로딩 중...'); return;}
  inp.value='';
  // 파일명에서 월 추출
  var month=_extractMonthFromFilename(file.name);
  if(!month){
    var _now=new Date();
    var _prev=new Date(_now.getFullYear(),_now.getMonth()-1,1);
    month=_prev.getFullYear()+'-'+String(_prev.getMonth()+1).padStart(2,'0');
  }
  toast('📂 '+month+' 정산 업로드 중...');
  // Firebase 기사 로드 후 파싱
  var fbPromise=(window._db&&window._CU)
    ?window._db.collection('drivers').where('dealerId','==',window._CU.dealerId).get()
      .then(function(snap){var arr=[];snap.forEach(function(d){arr.push(Object.assign({id:d.id},d.data()));});return arr;})
      .catch(function(){return[];})
    :Promise.resolve([]);
  fbPromise.then(function(fbDrivers){
    _parseCoupangExcelInner(file,fbDrivers,month);
  });
}
function _parseCoupangExcelInner(file,fbDrivers,month){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var sn=wb.SheetNames;
      // ★ 시트명 유연 탐지 (정확한 이름 → 포함 검색 → 순서)
      function findSheet(exact, keyword, idx){
        return wb.Sheets[exact]
          || wb.Sheets[sn.find(function(n){return n.replace(/\s/g,'').toLowerCase().includes(keyword.toLowerCase());})]
          || (sn[idx]?wb.Sheets[sn[idx]]:null);
      }
      var rawSheet   = findSheet('정산Raw',   'raw',   2);
      var totalSheet = findSheet('정산총괄',  '총괄',  1);
      var dmgSheet   = findSheet('분실파손List','분실', 3);
      if(!rawSheet){
        toast('❌ 정산Raw 시트 없음. 시트 목록: '+sn.join(', '));
        console.error('[엑셀] 시트 목록:', sn);
        return;
      }
      var raw=XLSX.utils.sheet_to_json(rawSheet,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
      var total=totalSheet?XLSX.utils.sheet_to_json(totalSheet,{header:1}):[];
      var dmgRows=dmgSheet?XLSX.utils.sheet_to_json(dmgSheet,{header:1}):[];
      if(raw.length<2){toast('❌ 데이터가 없습니다');return;}

      // ── 헤더 탐지
      var rawHdrIdx=0;
      for(var h=0;h<Math.min(raw.length,5);h++){
        if(raw[h]&&(String(raw[h][0]||'').includes('구분')||String(raw[h][1]||'').toLowerCase()==='id')){rawHdrIdx=h;break;}
      }
      var rh=raw[rawHdrIdx]||[];
      var rColDiv=0,rColID=1,rColRoute=2,rColDate=3,rColCamp=4,
          rColDcnt=7,rColRcnt=8,rColUnit=9,rColAddInc=10,
          rColFresh=14,    // 프레시백 회수금액
          rColFreshInc=-1, // 프레시백 인센티브 (별도 컬럼)
          rColTotal=13;
      for(var c2=0;c2<rh.length;c2++){
        var cn=String(rh[c2]||'').replace(/\s+/g,'');
        if(cn==='구분')rColDiv=c2;
        else if(cn==='ID'||cn==='id')rColID=c2;
        else if(cn.includes('Route')||cn.includes('라우트'))rColRoute=c2;
        else if(cn.includes('캠프'))rColCamp=c2;
        else if(cn.includes('배송일자')||cn.includes('작업일'))rColDate=c2;
        else if(cn.includes('배송건수')||cn.includes('배송(parcel)'))rColDcnt=c2;
        else if(cn.includes('반품')&&(cn.includes('운송장')||cn.includes('parcel')))rColRcnt=c2;
        else if(cn.includes('단가')&&!cn.includes('금액')&&!cn.includes('기본')&&!cn.includes('인센'))rColUnit=c2;
        else if(cn.includes('추가인센')&&!cn.includes('금액'))rColAddInc=c2;
        // 프레시백: 회수금액 vs 인센티브 분리
        else if((cn.includes('프레시백')||cn.includes('프레쉬백'))&&(cn.includes('인센')||cn.includes('incentive')))rColFreshInc=c2;
        else if((cn.includes('프레시백')||cn.includes('프레쉬백'))&&(cn.includes('회수')||cn.includes('금액')))rColFresh=c2;
        else if(cn.includes('프레시백')||cn.includes('프레쉬백'))rColFresh=c2; // 단일 컬럼
        else if(cn==='총금액')rColTotal=c2;
      }

      // ── Raw 시트 파싱 → drvMap 구성
      var drvMap={};  // cleanId → {camp, routes, dcnt, rcnt, ...}
      for(var i=rawHdrIdx+1;i<raw.length;i++){
        var row=raw[i];if(!row[rColID])continue;
        var userId=String(row[rColID]).trim();
        if(!userId||userId.toLowerCase()==='id')continue;
        // 한글/특수어 포함 ID는 기사 ID가 아님 (에코백회수 등) → 미계약 처리
        if(/[ㄱ-ㅎ가-힣]/.test(userId)){isNocont=true;}
        var cleanId=userId.replace(/@[a-z0-9@._-]+$/i,'').trim();  // @df 등 제거
        // 유효하지 않은 ID 스킵 (한글 포함, 공백, 특수단어)
        if(!cleanId||/[ㄱ-ㅎ가-힣]/.test(cleanId)||cleanId.length>30)continue;
        var divVal=String(row[rColDiv]||'').trim();
        // ★ 주간/야간 인센 행은 회사 단가 기준 항목 → 기사 정산 제외 (건수/반품만 합산용)
        var isSkipRow=divVal.includes('주간')&&(divVal.includes('인센')||divVal.includes('할증')||divVal.includes('추가'));
        if(!isSkipRow) isSkipRow=divVal.includes('야간')&&(divVal.includes('인센')||divVal.includes('할증')||divVal.includes('추가'));
        if(isSkipRow)continue;
        var isNocont=divVal.includes('미계약')||divVal.includes('에코백')||divVal.includes('프레시백')||divVal.includes('소급')||divVal.includes('계약외')||divVal.includes('외근');
        var route=String(row[rColRoute]||'').trim();
        // ★ route가 '미계약'이면 isNocont로 처리
        if(!isNocont&&(route.includes('미계약')||route==='계약외'))isNocont=true;
        var campRaw=String(row[rColCamp]||'').trim();
        var campName=_normCamp(campRaw);
        var dcnt=Number(row[rColDcnt])||0;
        var rcnt=Number(row[rColRcnt])||0;
        var unitPrc=Number(row[rColUnit])||0;
        var addInc=Number(row[rColAddInc])||0;
        var freshInc=Number(row[rColFresh])||0;      // 프레시백 회수금액
        var freshIncInc=rColFreshInc>=0?Number(row[rColFreshInc])||0:0; // 프레시백 인센티브
        var rowTotal=Number(row[rColTotal])||0;

        if(!drvMap[cleanId])drvMap[cleanId]={
          cleanId:cleanId,camp:campName,dcnt:0,rcnt:0,
          delAmt:0,retAmt:0,freshAmt:0,freshIncAmt:0,addIncAmt:0,
          nocontCnt:0,nocontAmt:0,routes:{}
        };
        // 캠프: 첫 번째로 발견된 캠프 우선
        if(campName&&campName!=='기타'&&drvMap[cleanId].camp==='기타')
          drvMap[cleanId].camp=campName;

        if(isNocont){
          var nc=dcnt+rcnt;
          // ★ drvMap 없으면 최소 생성
          if(!drvMap[cleanId]) drvMap[cleanId]={cleanId:cleanId,camp:campName||'기타',
            dcnt:0,rcnt:0,delAmt:0,retAmt:0,freshAmt:0,freshIncAmt:0,
            addIncAmt:0,dmgAmt:0,nocontCnt:0,nocontAmt:0,routes:{}};
          drvMap[cleanId].nocontCnt+=nc;
          if(rowTotal>0) drvMap[cleanId].nocontAmt+=rowTotal;
          // 캠프 업데이트
          if(campName&&campName!=='기타'&&drvMap[cleanId].camp==='기타')
            drvMap[cleanId].camp=campName;
          continue;
        }
        var delAmt=rowTotal>0?rowTotal:(dcnt*unitPrc);
        var retAmt=rcnt*unitPrc;
        drvMap[cleanId].dcnt+=dcnt;
        drvMap[cleanId].rcnt+=rcnt;
        drvMap[cleanId].delAmt+=delAmt;
        drvMap[cleanId].retAmt+=retAmt;
        drvMap[cleanId].freshAmt+=freshInc;
        drvMap[cleanId].freshIncAmt+=freshIncInc;  // 프레시백 인센
        drvMap[cleanId].addIncAmt+=addInc;
        // 날짜 추출
        var rowDateRaw=String(row[rColDate]||'').trim();
        var rowDate=rowDateRaw?rowDateRaw.slice(0,10):'';  // yyyy-mm-dd

        if(route){
          if(!drvMap[cleanId].routes[route])
            drvMap[cleanId].routes[route]={cnt:0,ret:0,unitPrc:0,delAmt:0,retAmt:0,addInc:0};
          drvMap[cleanId].routes[route].cnt+=dcnt;
          drvMap[cleanId].routes[route].ret+=rcnt;
          drvMap[cleanId].routes[route].delAmt+=delAmt;
          drvMap[cleanId].routes[route].retAmt+=retAmt;
          drvMap[cleanId].routes[route].addInc+=addInc;
          if(unitPrc>0)drvMap[cleanId].routes[route].unitPrc=unitPrc;

          // 시즌 기간별 분리 집계
          if(rowDate&&SEASON_PRICES.length){
            SEASON_PRICES.forEach(function(sp){
              if(rowDate>=sp.start&&rowDate<=sp.end){
                var sk='__season__'+sp.id+'__'+route;
                if(!drvMap[cleanId].routes[sk])
                  drvMap[cleanId].routes[sk]={cnt:0,ret:0,unitPrc:sp.prices[route]||unitPrc,
                    delAmt:0,retAmt:0,addInc:0,
                    _season:true,_seasonId:sp.id,_seasonLabel:sp.label,
                    _start:sp.start,_end:sp.end,_route:route};
                var sprice=sp.prices[route]||unitPrc;
                drvMap[cleanId].routes[sk].cnt+=dcnt;
                drvMap[cleanId].routes[sk].ret+=rcnt;
                drvMap[cleanId].routes[sk].delAmt+=(dcnt*sprice);
                drvMap[cleanId].routes[sk].retAmt+=(rcnt*sprice);
                drvMap[cleanId].routes[sk].addInc+=addInc;
              }
            });
          }
        }
      }

      // ── 정산총괄 파싱 → totalMap (프레시백 회수금액, 분실파손)
      var totalMap={};
      if(total.length>2){
        var tHdrIdx=-1;
        for(var th=0;th<Math.min(total.length,10);th++){
          var hr=total[th];
          if(hr&&(String(hr[3]||'').toLowerCase()==='id'||String(hr[0]||'').toLowerCase()==='no')){tHdrIdx=th;break;}
        }
        if(tHdrIdx>=0){
          var thRow=total[tHdrIdx];
          var tID=3,tFresh=8,tInc=9,tDmg=10,tTotal=11;
          for(var tc=0;tc<thRow.length;tc++){
            var tcn=String(thRow[tc]||'').replace(/\s+/g,'');
            if(tcn==='ID')tID=tc;
            else if(tcn.includes('프레시백')||tcn.includes('프레쉬백'))tFresh=tc;
            else if(tcn.includes('가중요인')||tcn.includes('추가인센'))tInc=tc;
            else if(tcn.includes('분실파손'))tDmg=tc;
            else if(tcn.includes('총합계')||tcn.includes('TOTAL'))tTotal=tc;
          }
          for(var tj=tHdrIdx+1;tj<total.length;tj++){
            var tr=total[tj];if(!tr||!tr[tID])continue;
            var tid=String(tr[tID]).replace(/@[a-z0-9@._-]+$/i,'').trim();
            if(!tid||tid==='ID')continue;
            // ★ 정산총괄 = VAT제외 기준 → ×1.1 해서 VAT포함으로 저장
            // ★ raw값 저장 (VAT제외) — display/calcNet에서 ×1.1 처리
            totalMap[tid]={
              freshAmt:Number(tr[tFresh])||0,
              incAmt:  Number(tr[tInc])||0,
              dmgAmt:  Number(tr[tDmg])||0,
              totalAmt:Number(tr[tTotal])||0
            };
          }
          // ★ 엑셀 자체 교차검증
          // ★ 엑셀 합계행에서 각 항목 총합 추출 (TOTAL>1M 인 행)
          var excelGrandTotal=0,excelGrandFresh=0,excelGrandInc=0,excelGrandDmg=0;
          for(var gtr=0;gtr<tHdrIdx;gtr++){
            var gRow=total[gtr]||[];
            var gVal=Number(gRow[tTotal])||0;
            if(gVal>1000000){
              excelGrandTotal=gVal;
              excelGrandFresh=Number(gRow[tFresh])||0;
              excelGrandInc  =Number(gRow[tInc]  )||0;
              excelGrandDmg  =Number(gRow[tDmg]  )||0;
              break;
            }
          }
          // 개별 합산 (저장값은 ×1.1 됐으므로 ÷1.1 해서 VAT제외로 비교)
          var sumTotal=Object.values(totalMap).reduce(function(s,v){return s+(v.totalAmt||0);},0);
          var sumFresh=Object.values(totalMap).reduce(function(s,v){return s+(v.freshAmt||0);},0);
          var sumInc  =Object.values(totalMap).reduce(function(s,v){return s+(v.incAmt||0);},0);
          var sumDmg  =Object.values(totalMap).reduce(function(s,v){return s+(v.dmgAmt||0);},0);
          var rawCalcTotal=Object.values(drvMap).reduce(function(s,v){return s+(v.delAmt||0);},0);
          window._excelVerify={
            excelTotal: excelGrandTotal,  excelFresh: excelGrandFresh,
            excelInc:   excelGrandInc,    excelDmg:   excelGrandDmg,
            sumTotal:   sumTotal,         sumFresh:   sumFresh,
            sumInc:     sumInc,           sumDmg:     sumDmg,
            rawCalc:    rawCalcTotal,
            diffTotal: excelGrandTotal - sumTotal,
            diffFresh: excelGrandFresh - sumFresh,
            diffInc:   excelGrandInc   - sumInc,
            diffDmg:   excelGrandDmg   - sumDmg,
            diffRaw:   excelGrandTotal - rawCalcTotal
          };
        }
      }

      // ── 분실파손List 파싱 → dmgMap
      var dmgMap={};
      if(dmgRows.length>1){
        // 헤더: 날짜,캠프,ID,이름,유형,상세,개수,차감금액,...
        var dh=dmgRows[0]||[];
        var dID=2,dName=3,dAmt=7;
        for(var dc2=0;dc2<dh.length;dc2++){
          var dcn=String(dh[dc2]||'').replace(/\s+/g,'');
          if(dcn==='ID')dID=dc2;
          else if(dcn==='이름'||dcn==='성명')dName=dc2;
          else if(dcn.includes('차감금액')||dcn.includes('금액'))dAmt=dc2;
        }
        for(var di=1;di<dmgRows.length;di++){
          var dr=dmgRows[di];if(!dr||!dr[dID])continue;
          var did=String(dr[dID]).replace(/@[a-z0-9@._-]+$/i,'').trim();
          var dname=String(dr[dName]||'').trim();
          var damt=Number(dr[dAmt])||0;
          if(!dmgMap[did])dmgMap[did]={dmg:0,name:''};
          dmgMap[did].dmg+=damt;
          if(dname&&!dmgMap[did].name)dmgMap[did].name=dname;
        }
      }

      // ── 신규 기사/라우트 자동 등록 준비
      var allCleanIds=Object.keys(drvMap);
      var newRoutes=[];  // 단가표에 없는 신규 라우트
      allCleanIds.forEach(function(cid){
        Object.keys(drvMap[cid].routes).forEach(function(r){
          if(!RPRICE[r])newRoutes.push({route:r,camp:drvMap[cid].camp});
        });
      });

      // ── 신규 라우트 → RPRICE + Firebase 등록
      var routePromises=[];
      if(newRoutes.length&&_db&&_CU){
        var newPriceObj={};
        newRoutes.forEach(function(nr){RPRICE[nr.route]=0;newPriceObj[nr.route]=0;});
        if(Object.keys(newPriceObj).length){
          var dpId=(_CU.dealerId||'shared')+'_routePrices';
          // ★ 신규 라우트만 0으로 추가 (기존 단가 절대 덮어쓰지 않음)
          routePromises.push(
            _db.collection('settings').doc(dpId).set(newPriceObj,{merge:true}).catch(function(){})
          );
        }
      }

      // ── 신규 기사 → drivers 컬렉션 자동 등록
      var driverPromises=[];
      var nowDrvIds=fbDrivers.map(function(d){return(d.userId||'').trim();});
      allCleanIds.forEach(function(cid){
        if(nowDrvIds.indexOf(cid)<0&&_db&&_CU){
          var dinfo=drvMap[cid];
          var dmgInfo=dmgMap[cid]||{};
          var dname=dmgInfo.name||'';  // 분실파손 리스트에서 이름 추출
          var autoName=dname||cid; // ★ 이름 없으면 userId를 임시 이름으로
          driverPromises.push(
            (function(){
              // ★ 중복 방지: userId 기반 조회 후 없을 때만 add
              return _db.collection('drivers')
                .where('dealerId','==',_CU.dealerId)
                .where('userId','==',cid).limit(1).get()
                .then(function(chk){
                  if(!chk.empty){
                    fbDrivers.push({id:chk.docs[0].id,userId:cid,name:chk.docs[0].data().name||autoName,camp:dinfo.camp||''});
                    return;
                  }
                  return _db.collection('drivers').add({
                    userId:cid,name:autoName,
                    camp:dinfo.camp||'',
                    dealerId:_CU.dealerId,
                    jobsub:'쿠팡',is_active:true,status:'재직',
                    autoNamed:!dname,
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                  }).then(function(ref){
                    fbDrivers.push({id:ref.id,userId:cid,name:autoName,camp:dinfo.camp||''});
                  });
                }).catch(function(){});
            })()
          );
        }
      });

      // ── 등록 후 정산서 생성
      // routeCampMap 구성 및 Firebase 저장
      // routeCampMap 구성 및 Firebase 저장
      var rcMap={};
      allCleanIds.forEach(function(cid){
        var dm=drvMap[cid];
        var campFull=dm.camp||'';
        if(!campFull||campFull==='기타')return;
        Object.keys(dm.routes).forEach(function(r){
          rcMap[r]=campFull;
        });
      });
      if(Object.keys(rcMap).length&&_db&&_CU){
        Object.assign(_routeCampMap,rcMap);
        _db.collection('settings').doc(_CU.dealerId+'_routeCampMap').set(_routeCampMap,{merge:false}).catch(function(){});
      }
      Promise.all(routePromises.concat(driverPromises)).then(function(){
        _drvCache=null;  // 기사 캐시 초기화 (재로드)
        var settlements=ls('settlements');
        // ★ 해당 월 기존 데이터 제거 (엑셀 재업로드 시 깔끔하게 덮어쓰기)
        settlements=settlements.filter(function(s){return s.month!==month;});
        var added=0,updated=0;
        allCleanIds.forEach(function(cleanId){
          var dm=drvMap[cleanId];
          var tm=totalMap[cleanId]||{};
          var dmgInfo=dmgMap[cleanId]||{};
          // ★ 이중검증 드라이버 매핑: coupangId → bizNum → 이름 순
          var cleanIdLow=cleanId.toLowerCase();
          var drvObj=fbDrivers.find(function(d){
            // ① coupangId/userId 일치
            var ids=[d.coupangId,d.userId,d.driverId].filter(Boolean)
              .map(function(x){return String(x).trim().toLowerCase();});
            if(ids.indexOf(cleanIdLow)>=0)return true;
            // ② 이름 정규화 일치
            var dnNorm=String(d.name||'').replace(/\s+/g,'').toLowerCase();
            var cmNorm=String(dm.name||cleanId).replace(/\s+/g,'').toLowerCase();
            if(dnNorm&&dnNorm===cmNorm)return true;
            return false;
          })||{name:'',camp:dm.camp||''};
          var drvName=drvObj.name||dm.name||cleanId;
          // 분실파손
          var dmgAmt=dmgInfo.dmg||tm.dmgAmt||0;
          // 프레시백 회수금액
          var freshAmt=tm.freshAmt||dm.freshAmt||0;
          // 추가 인센티브(가중요인)
          var addIncAmt=tm.incAmt||dm.addIncAmt||0;
          // ★ 프레시백 인센티브: 엑셀 freshIncAmt 우선 → 없으면 기사별 설정 계산
          var fincVal=dm.freshIncAmt||0;
          if(fincVal===0){
            Object.keys(dm.routes).forEach(function(route){
              var rv=dm.routes[route];
              var s=_getIncSetting(cleanId,route);
              if(s.on&&s.rate>0)fincVal+=rv.cnt*s.rate;
            });
          }
          // routeDetails (엑셀 단가 기준 - 첫 업로드)
          // 시즌 라우트와 일반 라우트 분리
            var allRouteKeys=Object.keys(dm.routes);
            var seasonKeys=allRouteKeys.filter(function(r){return r.startsWith('__season__');});
            var normalKeys=allRouteKeys.filter(function(r){return !r.startsWith('__season__');});
            // 시즌 상세 (기간별 소계)
            var seasonDetails=seasonKeys.map(function(sk){
              var sv=dm.routes[sk];
              return{seasonId:sv._seasonId,label:sv._seasonLabel,
                start:sv._start,end:sv._end,route:sv._route,
                cnt:sv.cnt,ret:sv.ret,unitPrice:sv.unitPrc||0,
                delAmt:sv.delAmt,retAmt:sv.retAmt};
            });
            var routeDetails=normalKeys.map(function(r){
            var rv=dm.routes[r];
            // ★ 라우트단가표(RPRICE) 우선 → 없으면 엑셀단가 fallback
            var rUnitPrice=RPRICE[r]||rv.unitPrc||0;
            return{route:r,cnt:rv.cnt,ret:rv.ret,
              unitPrice:rUnitPrice,         // ★ 라우트단가표 기준 (기사 지급단가)
              excelUnitPrice:rv.unitPrc||0, // 엑셀 원본 단가 (쿠팡→대리점 매출단가) 보존
              amt:rv.delAmt||0,retAmt:rv.retAmt||0,addInc:rv.addInc||0};
          });
          // 세금계산서 작성금액 (엑셀 단가 기준 초기값)
          var damt=dm.delAmt||0;
          var ramt=dm.retAmt||0;
          // ★ taxBase: 라우트단가표(RPRICE) 기준 계산 (calcNet/명세서와 동일하게 맞춤)
          //   RPRICE 없는 라우트만 routeDetails.unitPrice(엑셀단가) fallback
          var rdDamt=routeDetails.reduce(function(s,rd){return s+(rd.cnt||0)*(RPRICE[rd.route]||rd.unitPrice||0);},0);
          var rdRamt=routeDetails.reduce(function(s,rd){return s+(rd.ret||0)*(RPRICE[rd.route]||rd.unitPrice||0);},0);
          // ★ 미계약건: RPRICE × 건수 (엑셀금액은 회사단가 — 절대 사용 안 함)
          var nocontCntVal=dm.nocontCnt||0;
          var _nocontCamp=dm.camp||'';
          var _isW2=_nocontCamp.includes('부산');
          var nocontUnit=_isW2?(RPRICE['nocont_w2']||0):(RPRICE['nocont_w1']||0);
          var nocontAmtCalc=nocontCntVal>0 ? nocontCntVal*nocontUnit : 0;
          // (RPRICE 단가 미설정 시 0 — 엑셀금액 fallback 없음)

          var taxBase=(rdDamt||damt)+(rdRamt||ramt)+freshAmt+fincVal+nocontAmtCalc;  // ★ addIncAmt 제외 (세금계산서 base 아님)
          // 공제 계산
          var supplyAmt=Math.round(taxBase/1.1);
          var monthlyWage=Math.round(supplyAmt*0.654);
          var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
          var workIns=Math.floor(monthlyWage*0.0088/10)*10;

          var coupangRawTotal=tm.totalAmt||(Math.round((dm.delAmt||0)+(dm.retAmt||0)+(freshAmt||0)+(addIncAmt||0)+(dm.nocontAmt||0)-(dmgAmt||0)));
          var entry={
            driver:drvName, userId:cleanId, dealerId:_CU.dealerId,
            camp:dm.camp||drvObj.camp||'',
            coupangTotal:coupangRawTotal,  // 쿠팡→대리점 원본금액(VAT제외)
            seasonDetails:seasonDetails,  // 재계약 시즌 기간별 상세
            jobsub:'쿠팡', month:month,
            dcnt:dm.dcnt, rcnt:dm.rcnt,
            damt:damt, ramt:ramt,
            fresh:freshAmt,        // 프레시백 회수금액 (VAT제외 원본 저장 - calcNet에서 ×1.1)
            finc:fincVal,          // 프레시백 인센티브
            inc:addIncAmt,         // 추가인센티브(가중요인)
            nocont:nocontAmtCalc,nocontCnt:nocontCntVal,
            dmg:dmgAmt,
            etcPlus:0,etcMinus:0,
            totalAmt:taxBase,
            supplyAmt:supplyAmt,
            monthlyWage:monthlyWage,
            emp:empIns, work:workIns,
            status:'정산예정',
            routeDetails:routeDetails,
            updatedAt:new Date().toISOString(),
            createdAt:new Date().toISOString()
          };
          var existing=settlements.findIndex(function(s){return s.userId===cleanId&&s.month===month;});
          if(existing>=0){
            var prev=settlements[existing];
            // ★ fresh/finc/inc는 엑셀값으로 항상 갱신 (수동 입력값은 dmg/etcPlus/etcMinus만 보호)
            ['dmg','etcPlus','etcMinus'].forEach(function(k){
              if(prev[k]!==undefined&&prev[k]!==0)entry[k]=prev[k];
            });
            ['status','taxSent','taxSentAt','paidAt','fbId','createdAt'].forEach(function(k){
              if(prev[k]!==undefined)entry[k]=prev[k];
            });
            // routeDetails: 건수는 최신, unitPrice는 수동 편집 보존
            entry.routeDetails=routeDetails.map(function(newRd){
              var oldRd=(prev.routeDetails||[]).find(function(r){return r.route===newRd.route;});
              if(oldRd&&oldRd.unitPrice&&oldRd.unitPrice>0)
                return Object.assign({},newRd,{unitPrice:oldRd.unitPrice});
              return newRd;
            });
            settlements[existing]=Object.assign({},prev,entry);
            updated++;
          } else {
            settlements.push(entry);added++;
          }
        });
        lss('settlements',settlements);
        window._lastParsedSettlements = settlements; // 경험치 업데이트용
        // Firebase 저장
        if(_db){
          // ★ dealerId 강제 갱신 (다른 계정 데이터 혼입 방지) - fbPromises 전에 실행
          settlements.forEach(function(x){x.dealerId=_CU.dealerId;});
          var fbPromises=[];
          settlements.filter(function(x){return x.month===month;}).forEach(function(x){
            var docId=x.fbId||(x.dealerId+'_'+x.userId+'_'+x.month);
            x.fbId=docId;
            var clean=Object.assign({},x);
            Object.keys(clean).forEach(function(k){if(clean[k]===undefined)delete clean[k];});
            fbPromises.push(_db.collection('settlements').doc(docId).set(clean)
              .catch(function(e){console.error('저장 실패:',e);}));
          });
          Promise.all(fbPromises).then(function(){
            _settleCache=null;
            var newCount=driverPromises.length;
            var routeCount=newRoutes.length;
            // ★ 경험점수 자동 업데이트 (배차 엔진에 활용)
            try{
              var expData = (window._lastParsedSettlements||[]).map(function(s){
                return {driverId:s.userId||s.driver, route:s.route||s.jobsub, dcnt:s.dcnt||0};
              }).filter(function(x){return x.driverId&&x.route&&x.dcnt>0;});
              if(expData.length) _updateAllRouteExp(expData).catch(function(){});
            }catch(e){}
            SP('settlements',null);
            // 전월 대비 변동 기사 분석
            _db.collection('settlements')
              .where('dealerId','==',_CU.dealerId)
              .get().then(function(allSnap){
                var prevMonth='';
                // 직전 정산월 찾기
                var months=[];
                allSnap.forEach(function(d){var m=d.data().month||'';if(m&&m!==month&&months.indexOf(m)<0)months.push(m);});
                months.sort();prevMonth=months[months.length-1]||'';
                var prevIds=new Set();var curIds=new Set();
                allSnap.forEach(function(d){
                  var dt=d.data();
                  if(dt.month===prevMonth)prevIds.add(dt.userId||dt.driver||'');
                  if(dt.month===month)curIds.add(dt.userId||dt.driver||'');
                });
                var newDrivers=[];var leftDrivers=[];
                curIds.forEach(function(id){if(!prevIds.has(id)&&id)newDrivers.push(id);});
                prevIds.forEach(function(id){if(!curIds.has(id)&&id)leftDrivers.push(id);});
                // 결과 팝업
                _showUploadResult(month,added,updated,newCount,routeCount,newDrivers,leftDrivers,prevMonth,window._excelVerify||null);
              }).catch(function(){
                toast('✅ '+month+' 정산 업로드 완료! 등록:'+added+'건 / 갱신:'+updated+'건');
              });
          }).catch(function(){_settleCache=null;SP('settlements',null);});
        } else {
          _settleCache=null;SP('settlements',null);
        }
      });
    }catch(err){console.error(err);toast('❌ 파싱 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}
// _parseCoupangExcelInner 끝

</script>

<script>
// ══ 캠프별 취합 UI (parseCoupangExcel 이후 호출) ══
function renderCpPending(){
  var p=window._cpPending; if(!p) return;
  var camps=Object.keys(p.byCamp||{}).filter(function(camp){return p.byCamp[camp]&&p.byCamp[camp].length;}).sort();
  document.getElementById('page-title').textContent=p.month+' 쿠팡 정산 취합';
  var tr=document.getElementById('topbar-right');
  tr.innerHTML='';
  // 다시업로드 버튼 (물류앱 방식)
  var lbl=document.createElement('label');
  lbl.style.cssText='display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#f97316;color:#fff;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer';
  lbl.textContent='📂 다시 업로드';
  lbl.appendChild((function(){var fi=document.createElement('input');fi.type='file';fi.accept='.xlsx,.xls';fi.style.display='none';fi.onchange=function(){if(this.files[0])parseCoupangExcel(this);};return fi;})());
  tr.appendChild(lbl);
  var saveBtn=document.createElement('button');
  saveBtn.className='btn btn-green btn-sm';
  saveBtn.textContent='💾 전체 저장';
  saveBtn.onclick=saveAllCp;
  tr.appendChild(saveBtn);
  var cancelBtn=document.createElement('button');
  cancelBtn.className='btn btn-sm';
  cancelBtn.textContent='✕ 취소';
  cancelBtn.onclick=cancelCp;
  tr.appendChild(cancelBtn);

  var skipHtml='';
  if(p.skippedIds&&p.skippedIds.length){
    skipHtml='<div style="background:#fff3cd;border-radius:8px;padding:8px 12px;font-size:11px;color:#856404;margin-bottom:10px">'
      +'⚠️ 미등록 '+p.skippedIds.length+'명 (성함 입력 후 저장하면 자동 등록): '
      +p.skippedIds.slice(0,5).join(', ')+(p.skippedIds.length>5?'...':'')+'</div>';
  }
  var tabHtml='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
  camps.forEach(function(camp){
    var col=CAMP_COLOR[camp]||'#94A3B8';
    tabHtml+='<button id="cpb-'+camp+'" onclick="showCpCamp(\''+camp+'\')"'
      +' style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer'
      +';border:2px solid '+col+';background:transparent;color:'+col+'">'
      +camp.replace('캠프','')+' ('+p.byCamp[camp].length+')</button>';
  });
  tabHtml+='</div>';
  document.getElementById('content').innerHTML=
    '<div style="background:linear-gradient(135deg,#185FA5,#0C447C);border-radius:14px;padding:14px 18px;margin-bottom:12px;color:#fff">'
    +'<div style="font-size:16px;font-weight:800">📊 '+p.month+' 취합 완료 — '+p.total+'명</div>'
    +'<div style="font-size:12px;opacity:.8;margin-top:2px">캠프 탭 클릭 → 성함 확인 + 단가 수정 → 저장</div></div>'
    +skipHtml+tabHtml+'<div id="cp-camp-content"></div>';
  if(camps.length) showCpCamp(camps[0]);
}

function showCpCamp(campName){
  var p=window._cpPending; if(!p||!p.byCamp[campName]) return;
  var col=CAMP_COLOR[campName]||'#94A3B8';
  var drivers=p.byCamp[campName];
  document.querySelectorAll('[id^="cpb-"]').forEach(function(b){
    var bc=b.id.replace('cpb-','');
    b.style.background='transparent'; b.style.color=CAMP_COLOR[bc]||'#94A3B8';
  });
  var ab=document.getElementById('cpb-'+campName);
  if(ab){ab.style.background=col; ab.style.color='#fff';}
  window._cpCurCamp=campName;
  var tbody='';
  drivers.forEach(function(dm,i){
    var badges='';
    Object.keys(dm.routes).forEach(function(r){
      badges+='<span style="display:inline-block;background:'+col+'18;color:'+col
        +';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin:1px">'
        +r+' '+(dm.routes[r].cnt||0).toLocaleString()+'건</span>';
    });
    var priceInps='';
    Object.keys(dm.routes).forEach(function(r){
      var safeR=r;
      priceInps+='<div style="display:flex;align-items:center;gap:3px;margin-bottom:2px">'
        +'<span style="width:50px;font-size:10px;font-weight:700;color:'+col+'">'+r+'</span>'
        +'<input type="number" id="rp-'+i+'-'+r+'" value="'+(dm.routes[r].unitPrc||RPRICE[r]||0)+'" min="0" step="10"'
        +' style="width:70px;padding:2px 5px;border:1.5px solid var(--border);border-radius:5px'
        +';font-size:11px;text-align:right;background:var(--bg);color:var(--text)"'
        +' onchange="updCpAmt('+i+',\''+safeR+'\')">원</div>';
    });
    var totAmt=(dm.delAmt||0)+(dm.retAmt||0)+(dm.freshAmt||0);
    tbody+='<tr id="cpr-'+i+'">'
      +'<td style="font-family:monospace;font-size:11px;font-weight:700">'+esc(dm.uid)+'</td>'
      +'<td><input id="cpn-'+i+'" value="'+esc(dm.drvName||'')+'" placeholder="성함(선택)"'
        +' style="width:76px;padding:4px 7px;border:1.5px solid '+col+'66;border-radius:6px'
        +';font-size:12px;background:var(--bg);color:var(--text)"></td>'
      +'<td>'+badges+'</td>'
      +'<td style="text-align:right;font-weight:700">'+(dm.dcnt||0).toLocaleString()+'건</td>'
      +'<td style="text-align:right;font-weight:700;color:#0F6E56" id="cpa-'+i+'">₩'+totAmt.toLocaleString()+'</td>'
      +'<td>'+priceInps+'</td>'
      +'<td><button onclick="saveSingleCp('+i+')" style="background:'+col+';color:#fff'
        +';border:none;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">저장</button></td>'
      +'</tr>';
  });
  document.getElementById('cp-camp-content').innerHTML=
    '<div class="card"><div class="card-header">'
    +'<div class="card-title" style="color:'+col+'">🏕 '+campName.replace('캠프','')+' ('+drivers.length+'명)</div>'
    +'<button onclick="saveCampCp()" style="background:'+col+';color:#fff;border:none'
    +';padding:5px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">'
    +'💾 '+campName.replace('캠프','')+' 저장</button></div>'
    +'<div style="overflow-x:auto"><table><thead><tr>'
    +'<th>쿠팡 ID</th><th>성함</th><th>라우트·건수</th>'
    +'<th style="text-align:right">총건수</th><th style="text-align:right">수익합계</th>'
    +'<th>단가</th><th></th></tr></thead><tbody>'+tbody+'</tbody></table></div></div>';
}

function updCpAmt(i,route){
  var p=window._cpPending; if(!p||!window._cpCurCamp) return;
  var dm=p.byCamp[window._cpCurCamp][i]; if(!dm) return;
  var inp=document.getElementById('rp-'+i+'-'+route);
  if(!inp) return;
  var price=+inp.value||0;
  if(dm.routes[route]){dm.routes[route].unitPrc=price;dm.routes[route].delAmt=(dm.routes[route].cnt||0)*price;}
  dm.delAmt=0;
  Object.keys(dm.routes).forEach(function(r){dm.delAmt+=(dm.routes[r].delAmt||0);});
  var el=document.getElementById('cpa-'+i);
  if(el)el.textContent='₩'+(dm.delAmt+(dm.retAmt||0)+(dm.freshAmt||0)).toLocaleString();
}

function saveSingleCp(i){
  var p=window._cpPending; if(!p||!window._cpCurCamp) return;
  var dm=p.byCamp[window._cpCurCamp][i]; if(!dm) return;
  var name=(document.getElementById('cpn-'+i)||{value:''}).value.trim()||dm.drvName||'';
  _saveCpDriver(window._cpCurCamp,dm,name,p.month,function(){
    var row=document.getElementById('cpr-'+i);
    if(row){row.style.opacity='.4';row.style.pointerEvents='none';}
    toast('✅ '+(name||dm.uid)+' 저장');

function _saveCpDriver(camp,dm,name,month,cb){
  if(!window._db){if(cb)cb();return;}
  var uid=dm.uid;
  var damt=dm.delAmt||0,ramt=dm.retAmt||0,freshRaw=dm.freshAmt||0;
  var finc=dm.freshIncAmt||Math.round((dm.dcnt||0)*25);
  var income=damt+ramt+freshRaw+finc+(dm.nocontAmt||0);  // 모두 VAT포함가nocontAmt||0);
  var sa=Math.round(income/1.1),wage=Math.round(sa*(1-0.346));
  var emp=wage>=800000?Math.floor(wage*0.008/10)*10:0,work=Math.floor(wage*0.0088/10)*10;
  var routeDetails=[];
  Object.keys(dm.routes).forEach(function(r){
    routeDetails.push({route:r,cnt:dm.routes[r].cnt||0,ret:dm.routes[r].ret||0,
      unitPrice:dm.routes[r].unitPrc||0,amt:dm.routes[r].delAmt||0});
  });
  var dealerId=window._CU?window._CU.dealerId:'';
  var payload={dealerId:dealerId,driverName:name,driver:uid,camp:camp,month:month,jobsub:'쿠팡',
    dcnt:dm.dcnt||0,rcnt:dm.rcnt||0,damt:damt,ramt:ramt,fresh:freshRaw,finc:finc,inc:0,
    nocont:dm.nocontAmt||0,nocontCnt:dm.nocontCnt||0,etcPlus:0,etcMinus:0,dmg:0,adv:0,
    totalAmt:income,income:income,supplyAmt:sa,monthlyWage:wage,emp:emp,work:work,deduct:emp+work,net:income-(emp+work),
    routeDetails:routeDetails,status:'정산예정'};
  window._db.collection('settlements')
    .where('dealerId','==',dealerId).where('driver','==',uid).where('month','==',month).get()
    .then(function(snap){
      var prom=snap.empty
        ?window._db.collection('settlements').add(Object.assign({},payload,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}))
        :snap.docs[0].ref.update(Object.assign({},payload,{updatedAt:firebase.firestore.FieldValue.serverTimestamp()}));
      return prom;
    }).then(function(){
      if(name){
        return window._db.collection('drivers')
          .where('userId','==',uid).where('dealerId','==',dealerId).get()
          .then(function(drSnap){
            return drSnap.empty
              ?window._db.collection('drivers').add({name:name,userId:uid,dealerId:dealerId,
                  camp:camp,jobsub:'쿠팡',is_active:true,status:'재직',
                  createdAt:firebase.firestore.FieldValue.serverTimestamp()})
              :drSnap.docs[0].ref.update({name:name});
          });
      }
    }).then(function(){if(cb)cb();}).catch(function(e){toast('❌ '+e.message);});
}

async function _tossPay(planType, amount){
  if(!_CU){toast('❌ 로그인 필요');return;}
  var plan=PLAN_INFO&&PLAN_INFO[planType];
  if(!plan){toast('❌ 플랜 없음: '+planType);return;}
  var finalAmount=amount||plan.amount;
  if(!finalAmount){toast('❌ 금액 오류');return;}
  var uid=(_CU.dealerId||_CU.uid||'u').replace(/[^a-zA-Z0-9]/g,'').slice(0,8)||'user0001';
  var orderId='DW'+uid+Date.now().toString().slice(-8);
  if(_db&&(_CU.uid||_CU.dealerId)){
    _db.collection('payment_requests').add({
      orderId:orderId,dealerId:_CU.uid||_CU.dealerId,
      planType:planType,amount:finalAmount,status:'pending',
      createdAt:new Date().toISOString()
    }).catch(function(){});
  }
  try{
    var tossPayments=TossPayments('test_ck_mBZ1gQ4YVXQwywWXyyKXrl2KPoqN');
    var custKey=(_CU.dealerId||_CU.uid||'guest').replace(/[^a-zA-Z0-9\-_]/g,'').slice(0,30)||'guest01';
    tossPayments.payment({customerKey:custKey}).requestPayment({
      method:'CARD',
      amount:{currency:'KRW',value:finalAmount},
      orderId:orderId,
      orderName:'DONWAY '+plan.label,
      successUrl:window.location.origin+window.location.pathname+'?toss=success&orderId='+orderId+'&planType='+planType,
      failUrl:window.location.origin+window.location.pathname+'?toss=fail',
      customerEmail:_CU.email||'',
      customerName:(_CU.companyName||_CU.name||'고객사').slice(0,20),
      card:{useEscrow:false,flowMode:'DEFAULT',useCardPoint:false}
    }).catch(function(e){
      if(e&&(e.code==='USER_CANCEL'||String(e.message||'').indexOf('취소')>=0))return;
      toast('❌ '+(e&&e.message||'결제 오류'));
    });
  }catch(e){toast('❌ 토스 오류: '+(e&&e.message||''));}
}
