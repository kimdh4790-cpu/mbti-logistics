// 날짜 → Excel 시리얼 변환 (엑셀 기준: 1899-12-30)
function _dateToSerial(date){
  var base=new Date(1899,11,30);
  return Math.round((date-base)/(86400000));
}

// 해당 주 7일 배열 반환 (일~토)
function _getWeekDays(weekStart){
  var days=[];
  for(var i=0;i<7;i++){
    var d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    days.push(d);
  }
  return days;
}

// 캠프별 설정
var CAMP_CONFIG={
  '부산1캠프':{wave:'WAVE2',rotation:'1회전,2회전'},
  '부산2캠프':{wave:'WAVE2',rotation:'1회전,2회전'},
  '부산3캠프':{wave:'WAVE2',rotation:'1회전,2회전'},
  '대구2캠프':{wave:'WAVE1',rotation:'D1,D2,F3'},
  '대구2B캠프':{wave:'WAVE1',rotation:'D1,D2,F3'},
  '진주M캠프':{wave:'WAVE1',rotation:'D1,D2,F3'},
  // 짧은 이름도 지원
  '부산1':{wave:'WAVE2',rotation:'1회전,2회전'},
  '부산2':{wave:'WAVE2',rotation:'1회전,2회전'},
  '부산3':{wave:'WAVE2',rotation:'1회전,2회전'},
  '대구2':{wave:'WAVE1',rotation:'D1,D2,F3'},
  '진주M':{wave:'WAVE1',rotation:'D1,D2,F3'}
};

function _loadRoster(){
  var weekStart=window._rosterWeekStart;
  var weekDays=_getWeekDays(weekStart);
  var weekEnd=weekDays[6];
  var dNames=['일','월','화','수','목','금','토'];
  var fmt=function(d){return (d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0');};
  var ymd=function(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
  var content=document.getElementById('content');
  var ywStart=ymd(weekStart);

  // ── 페이지 껍데기 렌더
  content.innerHTML=
    '<div style="padding:12px 0">'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">'+
    '<button onclick="_rosterPrevWeek()" style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:14px">‹</button>'+
    '<span style="font-weight:700;font-size:14px">'+fmt(weekStart)+' (일) ~ '+fmt(weekEnd)+' (토)</span>'+
    '<button onclick="_rosterNextWeek()" style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:14px">›</button>'+
    '<select id="roster-camp-filter" onchange="_rosterApplyFilter()" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg)">'+
    '<option value="all">전체 캠프</option>'+
    '<option value="부산1">부산1</option><option value="부산2">부산2</option>'+
    '<option value="부산3">부산3</option><option value="대구2">대구2</option>'+
    '<option value="진주M">진주M</option>'+
    '</select>'+
    '<select id="roster-wave-filter" onchange="_rosterApplyFilter()" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg)">'+
    '<option value="all">전체 WAVE</option>'+
    '<option value="WAVE1">WAVE1(야간)</option>'+
    '<option value="WAVE2">WAVE2(주간)</option>'+
    '</select>'+
    '<button onclick="_loadPrevWeekRoster()" style="padding:6px 12px;background:#6366f1;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">📋 이전 스케줄 불러오기</button>'+
    '<button onclick="_downloadRosterExcel()" style="padding:6px 12px;background:#10b981;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">📥 엑셀 다운로드</button>'+
    '<label style="padding:6px 12px;background:#3b82f6;color:#fff;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">📂 쿠팡 업로드<input type="file" accept=".xlsx,.xls" style="display:none" onchange="_importRosterExcel(this)"></label>'+
    '</div>'+
    '<div id="roster-content"><div style="text-align:center;padding:30px;color:var(--text3)">⏳ 로딩 중...</div></div>'+
    '</div>';

  if(!_db||!_CU)return;
  var cid=_CU.dealerId||_CU.companyId;

  Promise.all([
    _db.collection('drivers').where('dealerId','==',cid).orderBy('name').get(),
    _db.collection('roster_week').where('dealerId','==',cid).where('weekStart','==',ywStart).get()
  ]).then(function(results){
    var drivers=[];
    results[0].forEach(function(doc){
      var d=doc.data();
      if(d.is_active===false||d.status==='pending')return;
      // 기사 기본 라우트 수집 (settleCache에서)
      var defaultRoutes=[];
      if(_settleCache){
        var lastSettle=null;
        _settleCache.forEach(function(s){
          if((s.driver===d.userId||s.userId===d.userId)&&s.routeDetails&&s.routeDetails.length){
            if(!lastSettle||s.month>lastSettle.month) lastSettle=s;
          }
        });
        if(lastSettle&&lastSettle.routeDetails)
          defaultRoutes=lastSettle.routeDetails.map(function(rd){return rd.route;}).filter(Boolean);
      }
      var camp=(d.camp||'').replace('캠프','').trim();
      var cfg=CAMP_CONFIG[camp]||CAMP_CONFIG[d.camp]||{wave:'WAVE1'};
      drivers.push({id:doc.id,name:d.name||'',camp:camp,wave:cfg.wave,
        driverId:d.userId||doc.id,defaultRoutes:defaultRoutes});
    });

    var rosterData={};
    results[1].forEach(function(doc){
      var d=doc.data();
      if(!rosterData[d.driverId])rosterData[d.driverId]={};
      rosterData[d.driverId][d.dayIndex]={status:d.status||'work',route:d.route||'',fbId:doc.id};
    });

    window._rosterDrivers=drivers;
    window._rosterData=rosterData;
    window._rosterWeekStartStr=ywStart;
    _renderRosterTable(drivers,rosterData,weekDays,dNames,fmt);
  }).catch(function(e){
    var rc=document.getElementById('roster-content');
    if(rc)rc.innerHTML='<div class="empty">⚠️ '+e.message+'</div>';
  });
}

function _rosterApplyFilter(){
  var cf=(document.getElementById('roster-camp-filter')||{value:'all'}).value;
  var wf=(document.getElementById('roster-wave-filter')||{value:'all'}).value;
  var drivers=window._rosterDrivers||[];
  var filtered=drivers.filter(function(d){
    if(cf!=='all'&&d.camp!==cf)return false;
    if(wf!=='all'&&d.wave!==wf)return false;
    return true;
  });
  var weekDays=_getWeekDays(window._rosterWeekStart);
  var dNames=['일','월','화','수','목','금','토'];
  var fmt=function(d){return (d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0');};
  _renderRosterTable(filtered,window._rosterData||{},weekDays,dNames,fmt);
}

function _renderRosterTable(drivers,rosterData,weekDays,dNames,fmt){
  // 캠프별 그룹핑
  var campOrder=['부산1','부산2','부산3','대구2','진주M'];
  var campGroups={};
  drivers.forEach(function(d){
    var k=d.camp||'미배정';
    if(!campGroups[k])campGroups[k]=[];
    campGroups[k].push(d);
  });

  var CCOL2={'부산1':'#059669','부산2':'#dc2626','부산3':'#ea580c','대구2':'#4f46e5','진주M':'#db2777','부산':'#0891b2'};

  var html='';
  var orderedCamps=campOrder.filter(function(cp){return campGroups[cp];});
  Object.keys(campGroups).forEach(function(cp){if(!campGroups[cp]||orderedCamps.includes(cp))return;orderedCamps.push(cp);});

  // ★ 날짜별 전체 취합 (모든 캠프 합산)
  var dayTotal=weekDays.map(function(_,i){
    var w=0,o=0;
    drivers.forEach(function(d){
      var e=rosterData[d.id]&&rosterData[d.id][i];
      if(!e||e.status!=='off')w++;else o++;
    });
    return {work:w,off:o};
  });
  if(drivers.length>0){
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;padding:10px 12px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)">';
    html+='<span style="font-size:11px;font-weight:700;color:var(--text1);margin-right:4px">📊 전체</span>';
    weekDays.forEach(function(d,i){
      var col2=i===0?'#ef4444':i===6?'#3b82f6':'var(--text2)';
      html+='<div style="text-align:center;min-width:52px;padding:4px 6px;background:var(--bg);border-radius:6px;border:1px solid var(--border)">'
        +'<div style="font-size:10px;font-weight:700;color:'+col2+'">'+fmt(d)+'('+dNames[i]+')</div>'
        +'<div style="font-size:11px;color:#059669;font-weight:800">출근:'+dayTotal[i].work+'</div>'
        +'<div style="font-size:11px;color:#6b7280;font-weight:600">유무:'+dayTotal[i].off+'</div>'
        +'</div>';
    });
    html+='</div>';
  }

  orderedCamps.forEach(function(camp){
    var grp=campGroups[camp];if(!grp||!grp.length)return;
    var col=CCOL2[camp]||'#94a3b8';
    var cfg=CAMP_CONFIG[camp]||{wave:'WAVE1'};

    // 일별 출근/휴무 카운트
    var daySummary=weekDays.map(function(_,i){
      var work=0,off=0;
      grp.forEach(function(d){
        var e=(rosterData[d.id]&&rosterData[d.id][i]);
        if(!e||e.status==='work')work++;else off++;
      });
      return {work:work,off:off};
    });

    html+='<div style="margin-bottom:20px">'+
      '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:'+col+'22;border-left:4px solid '+col+';border-radius:0 8px 8px 0;margin-bottom:6px">'+
      '<span style="font-weight:800;color:'+col+';font-size:14px">'+camp+'캠프</span>'+
      '<span style="font-size:11px;color:var(--text3)">'+cfg.wave+'('+( cfg.wave==='WAVE1'?'야간':'주간')+')</span>'+
      '<span style="font-size:11px;color:var(--text3)">총 '+grp.length+'명</span>'+
      '</div>'+
      '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">'+
      '<thead><tr style="background:var(--bg3)">'+
      '<th style="padding:6px 10px;text-align:left;border:1px solid var(--border);min-width:90px">이름 / 회전</th>'+
      weekDays.map(function(d,i){
        var col2=i===0?'#ef4444':i===6?'#3b82f6':'inherit';
        return '<th style="padding:4px 6px;text-align:center;border:1px solid var(--border);min-width:70px;color:'+col2+'">'+
          fmt(d)+'<br><span style="font-size:9px">'+dNames[i]+'</span></th>';
      }).join('')+
      '<th style="padding:4px;text-align:center;border:1px solid var(--border);min-width:45px">근무일</th>'+
      '</tr>'+
      // 요약 행
      '<tr style="background:var(--bg2);font-size:10px">'+
      '<td style="padding:4px 8px;border:1px solid var(--border);color:var(--text3)">출근/유무</td>'+
      daySummary.map(function(s){

  if(!orderedCamps.length)
    html='<div class="empty"><div class="empty-icon">👤</div>기사가 없습니다<br><small>기사 관리에서 캠프를 등록해주세요</small></div>';

// 상태 토글 (출근↔휴무)
function _toggleRosterStatus(el){
  var driverId=el.getAttribute('data-did');
  var dayIndex=parseInt(el.getAttribute('data-day'));
  var defRts=(el.getAttribute('data-defrts')||'').split(',').filter(Boolean);
  if(!window._rosterData)window._rosterData={};
  if(!window._rosterData[driverId])window._rosterData[driverId]={};
  var cur=(window._rosterData[driverId][dayIndex]&&window._rosterData[driverId][dayIndex].status)||'work';
  var next=cur==='work'?'off':'work';
  var curRoute=(window._rosterData[driverId][dayIndex]&&window._rosterData[driverId][dayIndex].route)||defRts[0]||'';
  var curRot=(window._rosterData[driverId][dayIndex]&&window._rosterData[driverId][dayIndex].rotation)||'';
  window._rosterData[driverId][dayIndex]={status:next,route:curRoute,rotation:curRot};
  _saveRosterCell(driverId,dayIndex,next,curRoute,curRot);
  // 셀만 새로고침
  var weekDays=_getWeekDays(window._rosterWeekStart);
  var dNames=['일','월','화','수','목','금','토'];
  var fmt=function(d){return (d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0');};
  _renderRosterTable(window._rosterDrivers||[],window._rosterData,weekDays,dNames,fmt);
}

// Firestore 저장
function _saveRosterCell(driverId,dayIndex,status,route,rotation){
  if(!_db||!_CU)return;
  var cid=_CU.dealerId||_CU.companyId;
  var ywStart=window._rosterWeekStartStr||'';
  if(!ywStart)return;
  var rot=String(rotation||'');
  var rt=String(route||'');
  var existing=window._rosterData&&window._rosterData[driverId]&&window._rosterData[driverId][dayIndex]&&window._rosterData[driverId][dayIndex].fbId;
  if(existing){
    _db.collection('roster_week').doc(existing).update({status:status,route:rt,rotation:rot,updatedAt:new Date().toISOString()}).catch(function(){});
  }else{
    _db.collection('roster_week').add({dealerId:cid,weekStart:ywStart,driverId:driverId,dayIndex:dayIndex,status:status,route:rt,rotation:rot,createdAt:firebase.firestore.FieldValue.serverTimestamp()})
      .then(function(ref){
        if(window._rosterData[driverId][dayIndex])window._rosterData[driverId][dayIndex].fbId=ref.id;
      }).catch(function(){});
  }
}

// 이전 주 스케줄 불러오기
function _loadPrevWeekRoster(){
  if(!_db||!_CU){toast('❌ 로그인 필요');return;}
  var cid=_CU.dealerId||_CU.companyId;
  var prev=new Date(window._rosterWeekStart.getTime()-7*86400000);
  var prevStr=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0')+'-'+String(prev.getDate()).padStart(2,'0');
  _db.collection('roster_week').where('dealerId','==',cid).where('weekStart','==',prevStr).get()
    .then(function(snap){
      if(snap.empty){toast('⚠️ 이전 주 스케줄 없음');return;}
      var ywStart=window._rosterWeekStartStr||'';
      var batch=_db.batch();
      var count=0;
      snap.forEach(function(doc){
        var d=doc.data();
        // 이번 주에 같은 기사+요일 없으면 복사
        if(!window._rosterData[d.driverId]||!window._rosterData[d.driverId][d.dayIndex]){
          var ref=_db.collection('roster_week').doc();
          batch.set(ref,{dealerId:cid,weekStart:ywStart,driverId:d.driverId,dayIndex:d.dayIndex,status:d.status||'work',route:d.route||'',rotation:d.rotation||'',createdAt:new Date().toISOString()});
          if(!window._rosterData[d.driverId])window._rosterData[d.driverId]={};
          window._rosterData[d.driverId][d.dayIndex]={status:d.status||'work',route:d.route||'',rotation:d.rotation||'',fbId:ref.id};
          count++;
        }
      });
      batch.commit().then(function(){
        toast('✅ 이전 스케줄 '+count+'건 불러옴');
        var weekDays=_getWeekDays(window._rosterWeekStart);
        var dNames=['일','월','화','수','목','금','토'];
        var fmt2=function(d){return (d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0');};
        _renderRosterTable(window._rosterDrivers||[],window._rosterData,weekDays,dNames,fmt2);
      }).catch(function(e){toast('❌ '+e.message);});
    }).catch(function(e){toast('❌ '+e.message);});
}

function _downloadRosterExcel(){
  var weekStart=window._rosterWeekStart;
  if(!weekStart||!(weekStart instanceof Date)){toast('❌ 주간 데이터 없음');return;}
  var drivers=window._rosterDrivers||[];
  if(!drivers.length){toast('⚠️ 기사 데이터 없음');return;}

  // ★ 물류앱과 동일: ExcelJS 동적 로드
  function _doExcelDownload(ExcelJS){
    var wb=new ExcelJS.Workbook();
    var ws=wb.addWorksheet('Sheet0');
    var weekDays=_getWeekDays(weekStart);
    var rosterData=window._rosterData||{};
    var bizNum=String((_CU&&_CU.bizNum)||(_CU&&_CU.bizNumber)||'');
    var vendorName=String((_CU&&_CU.companyName)||'');

    // 헤더
    ws.addRow(['업무일','벤더명','사업자등록번호','캠프명','웨이브','이름','아이디','업무상태','회전','업무라우트']);
    ws.columns=[
      {width:14},{width:28},{width:16},{width:10},{width:8},
      {width:10},{width:14},{width:8},{width:12},{width:20}
    ];

    var campSet={};
    drivers.forEach(function(d){if(d.camp)campSet[d.camp]=1;});
    var knownOrder=Object.keys(CAMP_CONFIG).filter(function(k){return campSet[k];});
    var unknownCamps=Object.keys(campSet).filter(function(k){return !CAMP_CONFIG[k];}).sort();
    var campOrder=knownOrder.concat(unknownCamps);
    var sortedDrivers=drivers.slice().sort(function(a,b){
      var ai=campOrder.indexOf(a.camp||'');var bi=campOrder.indexOf(b.camp||'');
      if(ai<0)ai=999;if(bi<0)bi=999;
      return ai-bi||(a.name||'').localeCompare(b.name||'');
    });

    var cnt=0;
    sortedDrivers.forEach(function(drv){
      var camp=String(drv.camp||'');
      var campShort=camp.replace('캠프','').trim();
      var cfg=CAMP_CONFIG[camp]||CAMP_CONFIG[campShort]||{wave:'',rotation:''};
      weekDays.forEach(function(dateObj,i){
        var y=dateObj.getFullYear();
        var m=String(dateObj.getMonth()+1).padStart(2,'0');
        var d2=String(dateObj.getDate()).padStart(2,'0');
        var dateStr=y+'-'+m+'-'+d2;
        var entry=(rosterData[drv.id]&&rosterData[drv.id][i])||{status:'work',route:''};
        var isWork=entry.status!=='off';
        var status=isWork?'출근':'휴무';
        var rotation=isWork?String(cfg.rotation||''):'';
        var route=isWork?String(entry.route||''):'';
        ws.addRow([dateStr,vendorName,bizNum,campShort,
          String(cfg.wave||''),String(drv.name||''),
          String(drv.driverId||drv.userId||''),
          status,rotation,route]);
        cnt++;
      });
    });

    wb.xlsx.writeBuffer().then(function(buf){
      var blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      var mo=weekStart.getMonth()+1;
      var dd=weekStart.getDate();
      a.href=url; a.download='schedule_'+mo+'_'+dd+'.xlsx';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('✅ 다운로드 완료! ('+cnt+'건)');
    }).catch(function(e){toast('❌ 오류: '+e.message);});
  }

  if(typeof ExcelJS!=='undefined'){
    _doExcelDownload(ExcelJS);
  }else{
    toast('⏳ 라이브러리 로딩 중...');
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
    s.onload=function(){_doExcelDownload(ExcelJS);};
    s.onerror=function(){toast('❌ 라이브러리 로드 실패');};
    document.head.appendChild(s);
  }
}

// 쿠팡 엑셀 업로드 → 근무표 자동 등록
function _importRosterExcel(input){
  var file=input.files[0];
  if(!file)return;
  if(typeof XLSX==='undefined'){toast('⚠️ 라이브러리 로딩 중...');return;}
  input.value='';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
      if(rows.length<2){toast('❌ 데이터가 없습니다');return;}

      // 헤더 인덱스 파악
      var hdr=rows[0];
      var iDate=hdr.indexOf('업무일'),iCamp=hdr.indexOf('캠프명');
      var iName=hdr.indexOf('이름'),iId=hdr.indexOf('아이디');
      var iVendor=hdr.indexOf('벤더명'),iBizNum=hdr.indexOf('사업자등록번호');
      var iWave=hdr.indexOf('웨이브'),iStatus=hdr.indexOf('업무상태'),iRotation=hdr.indexOf('회전'),iRoute=hdr.indexOf('업무라우트');
      if(iDate<0||iName<0||iStatus<0){toast('❌ 쿠팡 근무표 형식이 아닙니다');return;}
      // ★ 회사명/사업자번호 추출 (첫 데이터 행)
      var xlsVendor=iVendor>=0?String(rows[1][iVendor]||'').trim():'';
      var xlsBizNum=iBizNum>=0?String(rows[1][iBizNum]||'').trim():'';

      // 날짜 파싱 → 해당 주 일요일 구하기
      var firstDateRaw=rows[1][iDate];
      var firstDate=new Date(firstDateRaw);
      if(isNaN(firstDate.getTime())){toast('❌ 날짜 형식 오류');return;}
      var dow=firstDate.getDay();
      var weekSun=new Date(firstDate);
      weekSun.setDate(firstDate.getDate()-dow);
      weekSun.setHours(0,0,0,0);
      var ywStart=weekSun.getFullYear()+'-'+String(weekSun.getMonth()+1).padStart(2,'0')+'-'+String(weekSun.getDate()).padStart(2,'0');

      // 근무표 데이터 파싱
      var toSave=[];
      rows.slice(1).forEach(function(row){
        if(!row[iDate]||!row[iName]) return;
        var d=new Date(row[iDate]);
        if(isNaN(d.getTime())) return;
        var dayIndex=Math.round((d-weekSun)/86400000);
        if(dayIndex<0||dayIndex>6) return;
        var status=(row[iStatus]||'').trim()==='출근'?'work':'off';
        toSave.push({
          name:(row[iName]||'').trim(),
          driverId:(row[iId]||'').trim(),
          camp:(row[iCamp]||'').replace('캠프','').trim(),
          wave:iWave>=0?(row[iWave]||'').trim():'',
          dayIndex:dayIndex,
          status:status,
          route:iRoute>=0?String(row[iRoute]||'').trim():'',
          rotation:iRotation>=0?String(row[iRotation]||'').trim():''
        });
      });

      if(!_db||!_CU){toast('❌ 로그인 필요');return;}
      var cid=_CU.dealerId||_CU.companyId;

      // ★ 고유 기사 목록 추출 (이름+아이디+캠프+웨이브)
      var driverSet={};
      toSave.forEach(function(item){
        var key=item.driverId||item.name;
        if(key&&!driverSet[key]) driverSet[key]={
          userId:item.driverId,name:item.name,
          camp:item.camp.replace('캠프','').trim(),
          wave:item.wave||'',rotation:item.rotation||''
        };
      });
      var uniqueDrivers=Object.values(driverSet);
      toast('⏳ 기사 '+uniqueDrivers.length+'명 + 근무표 '+toSave.length+'건 등록 중...');

      // Step1: 기존 기사 조회
      _db.collection('drivers').where('dealerId','==',cid).get()
      .then(function(snap){
        // ★ 다중 키 이중 검증 매핑
        var existMap={};
        snap.forEach(function(doc){
          var d=doc.data();
          // ① 쿠팡 ID (가장 신뢰도 높음)
          [d.coupangId,d.userId,d.driverId,d.loginId].filter(Boolean)
            .forEach(function(x){
              var k=String(x).trim().toLowerCase();
              if(k)existMap[k]=doc.id;
            });
          // ② 사업자등록번호 (bizNum - 하이픈 제거)
          if(d.bizNum){
            var bn=String(d.bizNum).replace(/[^0-9]/g,'');
            if(bn.length>=9)existMap['b:'+bn]=doc.id;
          }
          // ③ 이름 정규화
          if(d.name){
            var nm=String(d.name).trim().replace(/\s+/g,'').toLowerCase();
            existMap['n:'+nm]=doc.id;
            // ④ 이름+캠프 복합키 (동명이인 구분)
            if(d.camp){
              existMap['nc:'+nm+'@'+String(d.camp).replace('캠프','').trim()]=doc.id;
            }
          }
        });

        var cfg2=CAMP_CONFIG;
        var newCount=0,updCount=0;

        var promises=uniqueDrivers.map(function(drv){
          var uid=String(drv.userId||'').trim();
          var uidLow=uid.toLowerCase();
          var nm=String(drv.name||'').trim();
          var nmNorm=nm.replace(/\s/g,'').toLowerCase();
          if(!uid&&!nm)return Promise.resolve();

          // ★ 다중 키 우선순위: coupangId > 이름+캠프 복합 > 이름 단독
          var campKey=nmNorm+'@'+campShort;
          var docId=existMap[uidLow]
            ||existMap['nc:'+campKey]
            ||(nmNorm?existMap['n:'+nmNorm]:null);
          var campShort=String(drv.camp||'').replace('캠프','').trim();
          var wv=drv.wave||((cfg2[campShort]||cfg2[drv.camp]||{}).wave||'');

          if(docId){
            updCount++;
            return _db.collection('drivers').doc(docId).update({
              name:nm,         // ★ 쿠팡 엑셀 이름이 정확하므로 업데이트
              camp:campShort,wave:wv,
              coupangId:uid,
              updatedAt:new Date().toISOString()
            }).then(function(){
              existMap[uidLow]=docId;
              existMap['n:'+nmNorm]=docId;
              existMap['nc:'+campKey]=docId;
            }).catch(function(e){console.warn('upd:'+nm,e.message);});
          }else{
            newCount++;
            return _db.collection('drivers').add({
              dealerId:cid,name:nm,
              userId:uid,coupangId:uid, // ★ 두 필드 모두 저장
              camp:campShort,wave:wv,
              rotation:String(drv.rotation||''),
              status:'active',is_active:true,
              createdAt:firebase.firestore.FieldValue.serverTimestamp()
            }).then(function(ref){
              existMap[uidLow]=ref.id;
              existMap['n:'+nmNorm]=ref.id;
              existMap['nc:'+campKey]=ref.id;
            }).catch(function(e){console.warn('add:'+nm,e.message);});
          }
        });

        return Promise.all(promises.map(function(p){
          return p?p.catch(function(){}):Promise.resolve();
        })).then(function(){
          toast('👤 신규:'+newCount+'명 업뎃:'+updCount+'명');
          return existMap;
        });
      })
      // Step2: 기존 근무표 삭제
      .then(function(driverMap){
        return _db.collection('roster_week')
          .where('dealerId','==',cid).where('weekStart','==',ywStart).get()
          .then(function(snap){
            var batch=_db.batch();
            snap.forEach(function(doc){batch.delete(doc.ref);});
            return batch.commit().then(function(){return driverMap;});
          });
      })
      // Step3: 근무표 등록
      .then(function(driverMap){
        var batch2=_db.batch();
        toSave.forEach(function(item){
          var uid=String(item.driverId||'').trim();
          var nm=String(item.name||'').trim();
          var uidL=uid.toLowerCase();
          var nmN=nm.replace(/\s/g,'').toLowerCase();
          var did=driverMap[uidL]||(nmN?driverMap['n:'+nmN]:null)||uid||nm;
          var ref=_db.collection('roster_week').doc();
          batch2.set(ref,{
            dealerId:cid,weekStart:ywStart,
            driverId:did,dayIndex:item.dayIndex,
            status:item.status,route:String(item.route||''),
            rotation:String(item.rotation||''),
            name:item.name,camp:item.camp,
            createdAt:firebase.firestore.FieldValue.serverTimestamp()
          });
        });
        return batch2.commit();
      })
      .then(function(){
        window._rosterWeekStart=weekSun;
        window._rosterDrivers=null;
        // ★ 회사명/사업자번호 자동 등록
        if(xlsVendor&&_db&&_CU){
          var cidU=_CU.dealerId||_CU.companyId;
          var compUpdate={rosterUploaded:true,lastRosterAt:new Date().toISOString()};
          // 벤더명에서 슬래시 앞 한글 이름만 추출 (예: "엠비티아이 유한회사/MBTIU" → "엠비티아이 유한회사")
          var vendKo=xlsVendor.split('/')[0].trim();
          if(vendKo)compUpdate.companyName=vendKo;
          if(xlsBizNum)compUpdate.bizNumber=xlsBizNum;
          _db.collection('companies').doc(cidU).update(compUpdate).catch(function(){});
          // _CU 메모리 업데이트
          if(vendKo&&_CU)_CU.companyName=vendKo;
          if(xlsBizNum&&_CU)_CU.bizNumber=xlsBizNum;
        }
        toast('✅ 기사 '+uniqueDrivers.length+'명 + 근무표 '+toSave.length+'건 자동 등록 완료!');
        _loadRoster();
      }).catch(function(e){toast('❌ 저장 실패: '+e.message);});
    }catch(e){toast('❌ 파일 오류: '+e.message);}
  };
  reader.readAsArrayBuffer(file);
}

window._simQRPayload=null;

function _simGenQR(){
  var did=_CU&&_CU.dealerId||'';
  var iv=parseInt((document.getElementById('sim-iv-sel')||{}).value||'30');
  var now=Date.now();
  var gps=window._attCompanyGPS||{lat:0,lng:0};
  window._simQRPayload={v:2,dealerId:did,ts:now,ivSec:iv,gpsLat:gps.lat,gpsLng:gps.lng,radius:0};
  var box=document.getElementById('sim-qr-box');
  var info=document.getElementById('sim-qr-info');
  if(box){
    box.innerHTML='';
    try{new QRCode(box,{text:JSON.stringify(window._simQRPayload),width:140,height:140,correctLevel:QRCode.CorrectLevel.M});}
    catch(e){box.innerHTML='<div style="padding:20px;font-size:11px">QRCode.js 필요</div>';}
  }
  if(info){
    var exp=new Date(now+iv*1000);
    info.textContent='만료: '+exp.toTimeString().slice(0,5)+' ('+iv+'초 유효)';
  }
  // 자동 만료
  setTimeout(function(){
    if(window._simQRPayload&&window._simQRPayload.ts===now){
      window._simQRPayload=null;
      if(box)box.innerHTML='<div style="padding:20px;font-size:11px;color:var(--red)">⏰ 만료됨</div>';
      if(info)info.textContent='QR이 만료되었습니다. 새로 생성하세요.';
    }
  }, iv*1000);
  toast('✅ QR 생성됨 ('+iv+'초 유효)');
}

function _simScan(){
  var empSel=document.getElementById('sim-emp-sel');
  var timeInp=document.getElementById('sim-time-inp');
  var result=document.getElementById('sim-scan-result');
  var uid=empSel?(empSel.value||''):'';
  var name=empSel?(empSel.options[empSel.selectedIndex]&&empSel.options[empSel.selectedIndex].getAttribute('data-name')||uid):'';
  var timeVal=timeInp?timeInp.value:'';
  if(!uid){if(result)result.innerHTML='<span style="color:var(--red)">❌ 직원을 선택하세요</span>';return;}
  if(!timeVal){if(result)result.innerHTML='<span style="color:var(--red)">❌ 시간을 입력하세요</span>';return;}
  if(!window._simQRPayload){if(result)result.innerHTML='<span style="color:var(--red)">❌ 먼저 QR을 생성하세요</span>';return;}
  // 만료 체크
  var now=Date.now();
  var iv=window._simQRPayload.ivSec||30;
  if(now-window._simQRPayload.ts>iv*1000+5000){
    if(result)result.innerHTML='<span style="color:var(--red)">❌ QR 만료됨. 새로 생성하세요</span>';
    return;
  }
  var did=_CU&&_CU.dealerId||'';
  var today=new Date().toISOString().slice(0,10);
  if(result)result.innerHTML='<span style="color:var(--text3)">처리 중...</span>';
  _db.collection('attendance')
    .where('dealerId','==',did).where('userId','==',uid).where('date','==',today).limit(1).get()
  .then(function(snap){
    var tsVal=firebase.firestore.FieldValue.serverTimestamp();
    if(snap.empty){
      return _db.collection('attendance').add({
        dealerId:did,userId:uid,driverName:name,
        date:today,checkIn:timeVal,gpsOk:true,simulated:true,
        createdAt:tsVal
      }).then(function(){
        if(result)result.innerHTML='<span style="color:var(--green)">✅ '+esc(name)+' 출근 '+timeVal+' 기록!</span>';
        _simLoadToday(did);
      });
    } else {
      var doc=snap.docs[0];
      if(doc.data().checkOut){
        if(result)result.innerHTML='<span style="color:var(--text3)">이미 퇴근 완료됨</span>';return;
      }
      return _db.collection('attendance').doc(doc.id).update({checkOut:timeVal,updatedAt:tsVal})
        .then(function(){
          if(result)result.innerHTML='<span style="color:var(--brand)">🌙 '+esc(name)+' 퇴근 '+timeVal+' 기록!</span>';
          _simLoadToday(did);
        });
    }
  }).catch(function(e){if(result)result.innerHTML='<span style="color:var(--red)">❌ '+esc(e.message)+'</span>';});
}

function _uploadDriverDoc(input, driverId, driverName){
  var file=input.files&&input.files[0];
  if(!file)return;
  var status=document.getElementById('doc-upload-status');
  var docType=(document.getElementById('doc-type-sel')||{}).value||'other';
  var did=_CU&&_CU.dealerId||'';
  if(status)status.innerHTML='<span style="color:var(--brand)">⏳ 업로드 중...</span>';
  // Firebase Storage 체크
  if(typeof firebase==='undefined'||!firebase.storage){
    // Storage 없을 경우: Firestore에 메타데이터만 저장 (base64 미사용)
    var reader=new FileReader();
    reader.onload=function(e){
      var data={
        driverId:driverId,dealerId:did,driverName:driverName,
        docType:docType,fileName:file.name,fileSize:file.size,
        fileUrl:'',fileData:e.target.result.slice(0,500)+'...[truncated]',
        uploadedAt:new Date().toISOString()
      };
      _db.collection('driverDocs').add(data).then(function(){
        if(status)status.innerHTML='<span style="color:var(--green)">✅ 메타데이터 저장됨 (Storage 미설정)</span>';
        _loadDriverDocs(driverId,did);
      }).catch(function(e){if(status)status.innerHTML='<span style="color:var(--red)">❌ '+esc(e.message)+'</span>';});
    };
    reader.readAsDataURL(file);
    return;
  }
  // Firebase Storage 업로드
  var path='driverDocs/'+did+'/'+driverId+'/'+docType+'_'+Date.now()+'_'+file.name;
  var ref=firebase.storage().ref(path);
  ref.put(file).then(function(snapshot){
    return snapshot.ref.getDownloadURL();
  }).then(function(url){
    return _db.collection('driverDocs').add({
      driverId:driverId,dealerId:did,driverName:driverName,
      docType:docType,fileName:file.name,fileSize:file.size,
      fileUrl:url,storagePath:path,
      uploadedAt:new Date().toISOString()
    });
  }).then(function(){
    if(status)status.innerHTML='<span style="color:var(--green)">✅ 업로드 완료!</span>';
    _loadDriverDocs(driverId,did);
    input.value='';
  }).catch(function(e){
    if(status)status.innerHTML='<span style="color:var(--red)">❌ '+esc(e.message)+'</span>';
  });
}

function _deleteDriverDoc(docId, driverId, did){
  if(!confirm('이 서류를 삭제하시겠습니까?'))return;
  _db.collection('driverDocs').doc(docId).delete()
    .then(function(){toast('🗑 삭제됨');_loadDriverDocs(driverId,did);})
    .catch(function(e){toast('❌ '+e.message);});

function _obNext(did){
  var step=window._obStep||1;
  // 각 단계 데이터 저장
  if(step===2){
    var name=(document.getElementById('ob-company')||{}).value||'';
    var ceo=(document.getElementById('ob-ceo')||{}).value||'';
    var biz=(document.getElementById('ob-biznum')||{}).value||'';
    var phone=(document.getElementById('ob-phone')||{}).value||'';
    if(!name.trim()){toast('❌ 회사명을 입력하세요');return;}
    if(_db) _db.collection('companies').doc(did).update({name:name,ceoName:ceo,bizNum:biz,phone:phone,updatedAt:new Date().toISOString()}).catch(function(){});
  }
  else if(step===3){
    var types=[];
    ['coupang','delivery','hourly','monthly','mixed'].forEach(function(v){
      var el=document.getElementById('ob-type-'+v);
      if(el&&el.checked)types.push(v);
    });
    var svcType=types[0]||'full';
    if(_db) _db.collection('companies').doc(did).update({serviceTypes:types,serviceType:svcType,updatedAt:new Date().toISOString()}).catch(function(){});
  }
  else if(step===4){
    var name2=(document.getElementById('ob-emp-name')||{}).value||'';
    if(name2.trim()&&_db){
      _db.collection('drivers').add({
        dealerId:did,name:name2.trim(),
        phone:(document.getElementById('ob-emp-phone')||{}).value||'',
        camp:(document.getElementById('ob-emp-camp')||{}).value||'',
        workType:(document.getElementById('ob-emp-type')||{}).value||'coupang',
        is_active:true,createdAt:new Date().toISOString()
      }).catch(function(){});
    }
  }
  else if(step===5){
    // 완료
    if(_db) _db.collection('companies').doc(did).update({onboardingDone:true,onboardingAt:new Date().toISOString()}).catch(function(){});
    var mo=document.getElementById('mo-onboard');if(mo)mo.remove();
    toast('🎉 DONWAY 시작!');
    goPage('home');
    return;
  }
  window._obStep=step+1;
  _obRender(window._obStep, did, {});
}

function _obSkip(did){
  if(_db) _db.collection('companies').doc(did).update({onboardingDone:true,onboardingSkipped:true}).catch(function(){});
  var mo=document.getElementById('mo-onboard');if(mo)mo.remove();
}

// 배달대행 이벤트 수당 계산기
function calcDeliveryBonus(platform, conditions){
  var pf=DELIVERY_PLATFORMS[platform];
  if(!pf)return{bonus:0,items:[]};
  var bonus=0; var items=[];
  var cond=conditions||{};
  pf.peaks.forEach(function(p){
    if(p.type==='weather'&&cond.weather){bonus+=p.amount||0;items.push({label:p.label,amount:p.amount||0});}
    if(p.type==='night'&&cond.night){var amt=p.amount||500;bonus+=amt;items.push({label:p.label,amount:amt});}
    if(p.type==='holiday'&&cond.holiday){var amt2=p.amount||1000;bonus+=amt2;items.push({label:p.label,amount:amt2});}
    if(p.type==='peak'&&cond.peak){var amt3=p.amount||500;bonus+=amt3;items.push({label:p.label,amount:amt3});}
  });
  return{bonus:bonus,items:items};
}

function _pfCalc(){
  var pfKey=(document.getElementById('pf-sel')||{}).value||'coupang';
  var pf=DELIVERY_PLATFORMS[pfKey];
  if(!pf)return;
  var g=function(id){return parseInt((document.getElementById(id)||{value:0}).value)||0;};
  var cnt=g('pf-cnt'), night=g('pf-night'), holiday=g('pf-holiday');
  var actualEarnings=parseInt((document.getElementById('pf-actual')||{value:0}).value)||0;
  var contractPrice=parseInt((document.getElementById('pf-contract')||{value:0}).value)||pf.baseRate;

  // ── 차액 정산 계산 (이전 대화 정산법)
  var driverGuarantee = cnt * contractPrice;               // 기사 보장액
  var nightSurcharge  = (pf.peaks.find(function(p){return p.type==='night';})||{amount:0}).amount||0;
  var holidaySurcharge= (pf.peaks.find(function(p){return p.type==='holiday';})||{amount:0}).amount||0;
  var nightAmt        = night * nightSurcharge;
  var holidayAmt      = holiday * holidaySurcharge;
  var gross           = driverGuarantee + nightAmt + holidayAmt;
  var commRate        = pf.commission>1 ? 0 : pf.commission;
  var commFixed       = pf.commission>1 ? pf.commission : 0;
  var tax             = pf.commission>1 ? cnt*commFixed : Math.round(gross*commRate);
  var net             = gross - tax;

  // 대리점 차액
  var agencyMargin    = actualEarnings > 0 ? actualEarnings - driverGuarantee : 0;
  var isTopUp         = agencyMargin < 0;

  var result=document.getElementById('pf-result');
  if(!result)return;

  var isAdmin = !(_CU&&(_CU.role==='driver'||_CU.role==='member'));
  var html = '<div style="background:var(--bg3);border-radius:12px;padding:14px">'
    +'<div style="font-size:13px;font-weight:800;margin-bottom:10px">'+pf.icon+' '+pf.label+' 정산 내역</div>';

  if(isAdmin){
    // ── 관리자 화면: 차액 정산 풀 내역
    html+='<table style="width:100%;border-collapse:collapse;font-size:12px">'
      +'<tr><td style="padding:5px 0;color:var(--text3)">📦 '+cnt+'건 × ₩'+contractPrice.toLocaleString()+'/건(계약단가)</td>'
      +'<td style="text-align:right;font-weight:700">₩'+driverGuarantee.toLocaleString()+'</td><td style="padding-left:8px;font-size:10px;color:var(--text3)">기사 보장액</td></tr>';
    if(actualEarnings>0){
      html+='<tr><td style="padding:5px 0;color:#2563eb">📱 플랫폼 실수령</td>'
        +'<td style="text-align:right;font-weight:700;color:#2563eb">₩'+actualEarnings.toLocaleString()+'</td>'
        +'<td style="padding-left:8px;font-size:10px;color:var(--text3)">앱 입금액</td></tr>';
      if(isTopUp){
        html+='<tr><td style="padding:5px 0;color:var(--red)">📤 대리점 보전 (낮은콜)</td>'
          +'<td style="text-align:right;font-weight:700;color:var(--red)">+₩'+Math.abs(agencyMargin).toLocaleString()+'</td>'
          +'<td style="padding-left:8px;font-size:10px;color:var(--red)">실수령 &lt; 보장</td></tr>';
      } else if(agencyMargin>0){
        html+='<tr><td style="padding:5px 0;color:var(--green)">💰 대리점 회수 (높은콜)</td>'
          +'<td style="text-align:right;font-weight:700;color:var(--green)">-₩'+agencyMargin.toLocaleString()+'</td>'
          +'<td style="padding-left:8px;font-size:10px;color:var(--green)">실수령 &gt; 보장</td></tr>';
      }
    }
    if(nightAmt)html+='<tr><td style="padding:5px 0;color:#7c3aed">🌙 심야 '+night+'건 할증</td><td style="text-align:right;font-weight:700;color:#7c3aed">+₩'+nightAmt.toLocaleString()+'</td><td></td></tr>';
    if(holidayAmt)html+='<tr><td style="padding:5px 0;color:#059669">🎌 공휴일 '+holiday+'건 수당</td><td style="text-align:right;font-weight:700;color:#059669">+₩'+holidayAmt.toLocaleString()+'</td><td></td></tr>';
    html+='<tr><td style="padding:5px 0;color:var(--red)">🏛 원천징수(3.3%)</td><td style="text-align:right;color:var(--red)">-₩'+tax.toLocaleString()+'</td><td></td></tr>'
      +'<tr style="border-top:2px solid var(--brand)"><td style="padding:8px 0;font-size:14px;font-weight:900;color:var(--brand)">💳 최종 지급액</td>'
      +'<td style="text-align:right;font-size:17px;font-weight:900;color:var(--brand)">₩'+net.toLocaleString()+'</td><td></td></tr>'
      +'</table>';
    if(actualEarnings>0){
      var mc=isTopUp?'var(--red)':'var(--green)';
      var ml=isTopUp?'🔴 -₩'+Math.abs(agencyMargin).toLocaleString()+' (보전 지출)':'🟢 +₩'+agencyMargin.toLocaleString()+' (차액 회수)';
      html+='<div style="margin-top:8px;padding:8px 12px;background:'+(isTopUp?'var(--red-l)':'var(--green-l)')+';border-radius:8px;font-size:12px;font-weight:700;color:'+mc+'">'
        +'대리점 마진: '+ml+'</div>';
    }
  } else {
    // ── 기사 화면: 단순 보장액만 표시
    html+='<div style="text-align:center;padding:12px 0">'
      +'<div style="font-size:11px;color:var(--text3);margin-bottom:4px">이번 주 (고정 계약단가)</div>'
      +'<div style="font-size:28px;font-weight:900;color:var(--brand)">₩'+net.toLocaleString()+'</div>'
      +'<div style="font-size:12px;color:var(--text3);margin-top:4px">'+cnt+'건 × ₩'+contractPrice.toLocaleString()+'/건</div>'
      +(tax?'<div style="font-size:11px;color:var(--red);margin-top:2px">원천징수(3.3%): -₩'+tax.toLocaleString()+'</div>':'')
      +'</div>';
  }
  html+='<div style="margin-top:6px;font-size:10px;color:var(--text3)">정산주기: '+esc(pf.settleDay)+'</div>'+'</div>';
  result.innerHTML=html;
}

var _DP_SLOTS={
  '아침':       {key:'morning',  label:'🌅 아침',      color:'#f59e0b'},
  '점심피크':   {key:'lunch_pk', label:'🍱 점심피크',  color:'#ef4444'},
  '점심노피크': {key:'lunch_off',label:'🍱 점심노피크',color:'#f97316'},
  '저녁피크':   {key:'dinner_pk',label:'🌆 저녁피크',  color:'#8b5cf6'},
  '저녁노피크': {key:'dinner_off',label:'🌆 저녁노피크',color:'#6366f1'}
};
var _DP_SLOT_KEYS=['morning','lunch_pk','lunch_off','dinner_pk','dinner_off'];

function _dpSlotKey(s){
  if(!s)return null;
  s=String(s).trim().replace(/\s+/g,'');
  for(var k in _DP_SLOTS){if(s.includes(k))return _DP_SLOTS[k].key;}
  // 영문 약어
  var lc=s.toLowerCase();
  if(lc.includes('morning')||lc.includes('am')||lc.includes('아침'))return 'morning';
  if(lc.includes('lunch')&&(lc.includes('peak')||lc.includes('pk')))return 'lunch_pk';
  if(lc.includes('lunch'))return 'lunch_off';
  if(lc.includes('dinner')&&(lc.includes('peak')||lc.includes('pk')))return 'dinner_pk';
  if(lc.includes('dinner'))return 'dinner_off';
  return null;
}

window._dpParseExcel=function(){
  var fi=document.getElementById('dp-excel-file');
  var file=fi&&fi.files&&fi.files[0];
  var res=document.getElementById('dp-result');
  if(!file){toast('❌ 파일을 선택해 주세요');return;}
  if(!res)return;
  res.innerHTML='<div style="font-size:12px;color:var(--text3)">⏳ 분석 중...</div>';
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();

  function _process(rows){
    // rows: [[col0, col1, col2, col3, col4, ...], ...]
    // 컬럼 자동 탐지: 날짜/구간/건수/단가
    var colDate=-1,colSlot=-1,colCnt=-1,colPrice=-1;
    // 헤더 행 탐지
    var headerRow=0;
    for(var hi=0;hi<Math.min(5,rows.length);hi++){
      var r=rows[hi];
      var hasDate=r.some(function(v){return v&&/(날짜|일자|date)/i.test(String(v));});
      var hasSlot=r.some(function(v){return v&&/(구간|시간대|slot)/i.test(String(v));});
      if(hasDate||hasSlot){
        headerRow=hi;
        r.forEach(function(v,ci){
          var s=String(v||'').toLowerCase();
          if(s.match(/날짜|일자|date/))colDate=ci;
          else if(s.match(/구간|시간대|slot/))colSlot=ci;
          else if(s.match(/건수|count|건/))colCnt=ci;
          else if(s.match(/단가|price|금액|원|amount/))colPrice=ci;
        });
        break;
      }
    }
    // 헤더 못 찾으면 컬럼 위치 추정 (0:날짜, 1:구간, 2:건수, 3:단가)
    if(colDate<0)colDate=0;
    if(colSlot<0)colSlot=1;
    if(colCnt<0) colCnt=2;
    if(colPrice<0)colPrice=3;

    // 데이터 파싱
    var byDate={};  // {날짜: {slot: {cnt, price}}}
    rows.slice(headerRow+1).forEach(function(row){
      if(!row||!row[colDate])return;
      var dateRaw=String(row[colDate]||'').trim();
      if(!dateRaw||dateRaw==='-')return;
      // 날짜 정규화
      var dateStr=dateRaw.replace(/[./년월]/g,'-').replace(/일/g,'').replace(/-+/g,'-').replace(/^-|-$/g,'');
      if(!dateStr.match(/\d{4}-\d{1,2}-\d{1,2}|\d{2}-\d{1,2}-\d{1,2}/))return;

      var slotRaw=String(row[colSlot]||'').trim();
      var slotKey=_dpSlotKey(slotRaw)||slotRaw||'기타';
      var cnt=parseFloat(row[colCnt])||0;
      var price=parseFloat(row[colPrice])||0;
      if(cnt<=0)return;

      if(!byDate[dateStr])byDate[dateStr]={};
      if(!byDate[dateStr][slotKey]){byDate[dateStr][slotKey]={cnt:0,price:0,total:0};}
      byDate[dateStr][slotKey].cnt+=cnt;
      byDate[dateStr][slotKey].price=price||byDate[dateStr][slotKey].price;
      byDate[dateStr][slotKey].total+=(price>0?cnt*price:byDate[dateStr][slotKey].total);
    });

    _dpRenderResult(byDate);
  }

  if(ext==='xlsx'||ext==='xls'){
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        _process(rows);
      }catch(err){res.innerHTML='<div style="color:var(--red)">❌ '+esc(err.message)+'</div>';}
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload=function(e){
      var lines=e.target.result.split(/\r?\n/);
      var rows=lines.map(function(l){return l.split(/[,\t]/);});
      _process(rows);
    };
    reader.readAsText(file,'utf-8');
  }
};

function _dpRenderResult(byDate){
  var res=document.getElementById('dp-result');
  if(!res)return;
  var dates=Object.keys(byDate).sort();
  if(!dates.length){
    res.innerHTML='<div style="color:var(--red);font-size:12px">❌ 데이터를 인식할 수 없습니다. 날짜/구간/건수/단가 컬럼이 있는지 확인하세요.</div>';
    return;
  }

  var threshold=parseInt((document.getElementById('dp-threshold')||{value:200}).value)||200;
  var guarantee=parseInt((document.getElementById('dp-guarantee')||{value:4000}).value)||4000;
  var taxRate=parseFloat((document.getElementById('dp-tax')||{value:'3.3'}).value)||0;

  // 주간 집계
  var weekTotal=0, weekAppTotal=0;
  var dayRows='';
  var allSlots=new Set();

  dates.forEach(function(d){
    Object.keys(byDate[d]).forEach(function(s){allSlots.add(s);});
    var dayCnt=0,dayApp=0;
    Object.values(byDate[d]).forEach(function(sv){
      dayCnt+=sv.cnt;
      dayApp+=sv.total||sv.cnt*sv.price;
    });
    weekTotal+=dayCnt;
    weekAppTotal+=dayApp;
  });

  var applyGuarantee=weekTotal>=threshold;
  var slots=Array.from(allSlots);

  // 컬러 헤더
  var slotHeaders=slots.map(function(s){
    var info=Object.values(_DP_SLOTS).find(function(x){return x.key===s;})||{label:s,color:'#6b7280'};
    return '<th style="padding:6px 8px;font-size:10px;color:'+info.color+';white-space:nowrap">'+info.label+'</th>';
  }).join('');

  // 일별 행
  var totalTopUp=0,totalRecovery=0;
  dates.forEach(function(d){
    var dayCnt=0,dayApp=0,dayGuar=0,dayDiff=0;
    var slotCells=slots.map(function(s){
      var sv=byDate[d][s]||{cnt:0,price:0,total:0};
      var cellApp=sv.total||sv.cnt*sv.price;
      var cellGuar=applyGuarantee?(sv.cnt*guarantee):cellApp;
      dayCnt+=sv.cnt;
      dayApp+=cellApp;
      dayGuar+=cellGuar;
      var diff=applyGuarantee?(cellGuar-cellApp):0;
      var col=diff>0?'var(--red)':diff<0?'var(--green)':'var(--text3)';
      return '<td style="padding:5px 6px;text-align:center;font-size:11px">'
        +'<div style="font-weight:700">'+sv.cnt+'건</div>'
        +(sv.price?'<div style="font-size:10px;color:var(--text3)">₩'+sv.price.toLocaleString()+'</div>':'')
        +(applyGuarantee&&sv.cnt>0?'<div style="font-size:10px;color:'+col+'">'+(diff>0?'▲':'▼')+'₩'+Math.abs(diff).toLocaleString()+'</div>':'')
        +'</td>';
    }).join('');
    dayDiff=applyGuarantee?(dayGuar-dayApp):0;
    if(dayDiff>0)totalTopUp+=dayDiff; else totalRecovery+=Math.abs(dayDiff);
    var diffCol=dayDiff>0?'var(--red)':dayDiff<0?'var(--green)':'var(--text3)';
    dayRows+='<tr style="border-bottom:1px solid var(--border)">'
      +'<td style="padding:5px 8px;font-size:11px;font-weight:700;white-space:nowrap">'+d+'</td>'
      +'<td style="padding:5px 8px;text-align:center;font-size:12px;font-weight:700">'+dayCnt+'건</td>'
      +'<td style="padding:5px 8px;text-align:right;font-size:11px">₩'+dayApp.toLocaleString()+'</td>'
      +slotCells
      +(applyGuarantee?'<td style="padding:5px 8px;text-align:right;font-size:11px;font-weight:700;color:'+diffCol+'">'+(dayDiff>0?'+':'')+'₩'+dayDiff.toLocaleString()+'</td>':'')
      +'</tr>';
  });

  // 주간 합산
  var weekGuar=applyGuarantee?(weekTotal*guarantee):weekAppTotal;
  var tax=Math.round(weekGuar*(taxRate/100));
  var net=weekGuar-tax;
  var netMargin=applyGuarantee?(weekAppTotal-weekGuar):0;

  var html='';
  // 상태 배너
  if(applyGuarantee){
    html+='<div style="background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px">'
      +'<div style="font-size:12px;opacity:.8;margin-bottom:4px">✅ 주간 '+weekTotal+'건 (기준 '+threshold+'건 이상) — 고정 계약단가 적용</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'
      +'<div style="text-align:center"><div style="font-size:10px;opacity:.7">기사 보장액</div><div style="font-size:16px;font-weight:900">₩'+weekGuar.toLocaleString()+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:10px;opacity:.7">앱 실수령</div><div style="font-size:16px;font-weight:900">₩'+weekAppTotal.toLocaleString()+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:10px;opacity:.7">'+(netMargin>=0?'대리점 회수':'대리점 보전')+'</div>'
      +'<div style="font-size:16px;font-weight:900;color:'+(netMargin>=0?'#4ade80':'#fca5a5')+'">'+(netMargin>=0?'+':'')+' ₩'+netMargin.toLocaleString()+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:10px;opacity:.7">기사 실지급(세후)</div><div style="font-size:16px;font-weight:900;color:#fbbf24">₩'+net.toLocaleString()+'</div></div>'
      +'</div></div>';
  } else {
    html+='<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:12px;font-size:12px;color:#92400e">'
      +'⚠️ 주간 '+weekTotal+'건 — 기준 '+threshold+'건 미달. 보장단가 미적용. 앱 실수령 그대로 지급.'
      +'</div>';
  }

  // 일별 테이블
  html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr style="background:var(--bg3)">'
    +'<th style="padding:6px 8px;text-align:left;font-size:11px">날짜</th>'
    +'<th style="padding:6px 8px;font-size:11px">총 건수</th>'
    +'<th style="padding:6px 8px;font-size:11px">앱 수령</th>'
    +slotHeaders
    +(applyGuarantee?'<th style="padding:6px 8px;font-size:11px;color:#2563eb">차액</th>':'')
    +'</tr></thead><tbody>'+dayRows+'</tbody>'
    +'<tfoot><tr style="background:var(--bg3);font-weight:700">'
    +'<td style="padding:7px 8px">합계</td>'
    +'<td style="padding:7px 8px;text-align:center">'+weekTotal+'건</td>'
    +'<td style="padding:7px 8px;text-align:right">₩'+weekAppTotal.toLocaleString()+'</td>'
    +'<td colspan="'+slots.length+'"></td>'
    +(applyGuarantee?'<td style="padding:7px 8px;text-align:right;color:'+(netMargin>=0?'var(--green)':'var(--red)' )+'">'+( netMargin>=0?'+':'')+'₩'+netMargin.toLocaleString()+'</td>':'')
    +'</tr></tfoot></table></div>';

  res.innerHTML=html;
}

// 출퇴근 기록 저장 시 지각/결근 자동 판단
function _checkLateness(checkInTime, stdStartTime, driverId, driverName, did, date){
  if(!checkInTime||!stdStartTime)return;
  var ci=checkInTime.split(':'); var st=stdStartTime.split(':');
  var ciMin=parseInt(ci[0])*60+parseInt(ci[1]);
  var stMin=parseInt(st[0])*60+parseInt(st[1]);
  var lateMin=ciMin-stMin;
  if(lateMin>0){
    // 지각 기록
    var severity=lateMin>=120?'조퇴':lateMin>=60?'지각(중)':'지각(경)';
    _db.collection('attendance').where('dealerId','==',did)
      .where('userId','==',driverId).where('date','==',date).limit(1).get()
      .then(function(snap){
        if(!snap.empty) snap.docs[0].ref.update({
          late:true, lateMin:lateMin, severity:severity
        });
      });
    // 관리자 알림
    _sendAdminNotif('⏰ '+severity,driverName+'님 '+lateMin+'분 지각 ('+checkInTime+' 출근)');
  }
}

// 무단결근 체크 (스케줄된 근무일 출근 없을 때 - 매일 23:00 체크)
function _checkAbsence(did){
  if(!_db||!did)return;
  var today=new Date().toISOString().slice(0,10);
  // 근무 예정인데 출근 안 한 직원 찾기
  Promise.all([
    _db.collection('drivers').where('dealerId','==',did).where('is_active','!=',false).get(),
    _db.collection('attendance').where('dealerId','==',did).where('date','==',today).get(),
    _db.collection('leaves').where('dealerId','==',did).where('startDate','<=',today)
      .where('endDate','>=',today).where('status','==','approved').get()
  ]).then(function(res){
    var allDrivers=new Set(); res[0].forEach(function(d){allDrivers.add(d.data().userId||d.id);});
    var attended=new Set(); res[1].forEach(function(d){attended.add(d.data().userId||'');});
    var onLeave=new Set(); res[2].forEach(function(d){onLeave.add(d.data().userId||'');});
    var absent=[];
    allDrivers.forEach(function(uid){
      if(!attended.has(uid)&&!onLeave.has(uid)) absent.push(uid);
    });
    if(absent.length>0){
      _db.collection('absences').add({
        dealerId:did, date:today, userIds:absent, count:absent.length,
        createdAt:new Date().toISOString()
      });
      _sendAdminNotif('🚫 무단결근 의심',today+' 출근 미확인: '+absent.length+'명');
    }
  }).catch(function(){});
}

function _initSigCanvas(){
  var canvas=document.getElementById('sig-canvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false; var lastX=0,lastY=0;
  function getPos(e){
    var r=canvas.getBoundingClientRect();
    var scaleX=canvas.width/r.width, scaleY=canvas.height/r.height;
    var src=e.touches?e.touches[0]:e;
    return {x:(src.clientX-r.left)*scaleX,y:(src.clientY-r.top)*scaleY};
  }
  function start(e){e.preventDefault();drawing=true;var p=getPos(e);lastX=p.x;lastY=p.y;ctx.beginPath();ctx.moveTo(lastX,lastY);}
  function draw(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();lastX=p.x;lastY=p.y;}
  function end(e){drawing=false;}
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',draw);canvas.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',draw,{passive:false});canvas.addEventListener('touchend',end);
}

function _sigClear(){
  var canvas=document.getElementById('sig-canvas');
  if(!canvas)return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

function _sigSave(driverId,driverName,did,contractId){
  var canvas=document.getElementById('sig-canvas');
  if(!canvas){toast('❌ 캔버스 없음');return;}
  // 빈 서명 체크
  var ctx=canvas.getContext('2d');
  var pixels=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  var hasContent=false;
  for(var i=3;i<pixels.length;i+=4){if(pixels[i]>0){hasContent=true;break;}}
  if(!hasContent){toast('❌ 서명을 먼저 해주세요');return;}
  var sigDataUrl=canvas.toDataURL('image/png');
  var sigRecord={
    driverId:driverId,dealerId:did,driverName:driverName,
    contractId:contractId||'general',
    signatureData:sigDataUrl,
    signedAt:new Date().toISOString(),
    ipNote:'웹 서명',
    valid:true
  };
  if(_db){
    _db.collection('signatures').add(sigRecord).then(function(){
      // 계약서에 서명 완료 표시
      if(contractId) _db.collection('contracts').doc(contractId).update({signed:true,signedAt:new Date().toISOString(),signatureBy:driverName}).catch(function(){});
      var mo=document.querySelector('.mo.show');if(mo)mo.remove();
      toast('✅ 전자서명 완료! 법적 효력이 있습니다');
    }).catch(function(e){toast('❌ '+e.message);});
  }
}

window._expOcrScan=function(src){
  var fileInput=document.getElementById(src==='gallery'?'exp-ocr-gallery':'exp-ocr-file');
  var file=fileInput&&fileInput.files&&fileInput.files[0];
  if(!file){return;}
  var st=document.getElementById('exp-ocr-status');
  if(st)st.innerHTML='⏳ AI 영수증 분석 중...';
  var reader=new FileReader();
  reader.onload=function(ev){
    var base64=ev.target.result.split(',')[1];
    fetch('/claude-ocr',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        image:base64,
        mediaType:file.type||'image/jpeg',
        prompt:'이 영수증 이미지에서 다음을 JSON으로 추출하세요: date(YYYY-MM-DD), desc(가게명/내용), amount(숫자만), type(주유비/식비/통신비/기타 중 하나). 반드시 JSON만 출력하세요.'
      })
    }).then(function(r){return r.json();})
    .then(function(data){
      var txt=(data.content&&data.content[0]&&data.content[0].text)||'{}';
      try{
        var clean=txt.replace(/```json|```/g,'').trim();
        var parsed=JSON.parse(clean);
        if(parsed.date){var d=document.getElementById('exp-date');if(d)d.value=parsed.date;}
        if(parsed.desc){var dc=document.getElementById('exp-desc');if(dc)dc.value=parsed.desc;}
        if(parsed.amount){var am=document.getElementById('exp-amount');if(am)am.value=parsed.amount;}
        if(parsed.type){
          var typeMap={'주유비':'fuel','식비':'food','통신비':'comm','기타':'other'};
          var sel=document.getElementById('exp-type');
          if(sel&&typeMap[parsed.type])sel.value=typeMap[parsed.type];
        }
        if(st)st.innerHTML='✅ 자동 입력 완료. 확인 후 저장하세요.';
      }catch(e){if(st)st.innerHTML='⚠️ 수동으로 입력해 주세요.';}
    }).catch(function(){if(st)st.innerHTML='⚠️ OCR 서버 오류. 수동으로 입력해 주세요.';});
  };
  reader.readAsDataURL(file);
};

  if(!desc.trim()||!amount){toast('❌ 내용과 금액을 입력하세요');return;}
  var ym=date.slice(0,7);
  var saveData={dealerId:did,type:type,date:date,ym:ym,desc:desc.trim(),amount:amount,driverName:driverName.trim(),receiptUrl:'',createdAt:new Date().toISOString()};
  function doSave(url){
    saveData.receiptUrl=url||'';
    _db.collection('expenses').add(saveData).then(function(){
      var mo=document.querySelector('.mo.show');if(mo)mo.remove();
      toast('✅ 경비 등록됨');_loadExpenses(did,ym);
    }).catch(function(e){toast('❌ '+e.message);});
  }
  if(file&&typeof firebase!=='undefined'&&firebase.storage){
    var path='expenses/'+did+'/'+Date.now()+'_'+file.name;
    firebase.storage().ref(path).put(file).then(function(s){return s.ref.getDownloadURL();})
      .then(function(url){doSave(url);}).catch(function(){doSave('');});
  } else { doSave(''); }
}

function _otSubmit(did,uid){
  var date=(document.getElementById('ot-date')||{}).value||'';
  var start=(document.getElementById('ot-start')||{}).value||'';
  var end=(document.getElementById('ot-end')||{}).value||'';
  var reason=(document.getElementById('ot-reason')||{}).value||'';
  if(!date||!start||!end){toast('❌ 날짜와 시간을 입력하세요');return;}
  var s=start.split(':'),e=end.split(':');
  var hours=Math.round(((parseInt(e[0])*60+parseInt(e[1]))-(parseInt(s[0])*60+parseInt(s[1])))/60*10)/10;
  if(hours<=0){toast('❌ 종료 시간이 잘못됐습니다');return;}
  _db.collection('overtimes').add({
    dealerId:did,userId:uid,driverName:_CU.name||uid,
    date:date,startTime:start,endTime:end,hours:hours,
    reason:reason.trim(),status:'pending',createdAt:new Date().toISOString()
  }).then(function(){
    var mo=document.querySelector('.mo.show');if(mo)mo.remove();
    toast('✅ 연장근로 신청 완료');
    _sendAdminNotif('⏰ 연장근로 신청',_CU.name+'님 '+date+' '+start+'~'+end+' ('+hours+'h)');
    _otTab('mine');
  }).catch(function(e){toast('❌ '+e.message);});
}

function _otApprove(id){
  _db.collection('overtimes').doc(id).update({status:'approved',approvedAt:new Date().toISOString(),approvedBy:_CU.name||''})
    .then(function(){toast('✅ 승인됨');_otTab('pending');}).catch(function(e){toast('❌ '+e.message);});
}
function _otReject(id){
  var r=prompt('반려 사유를 입력하세요 (선택)','');
  _db.collection('overtimes').doc(id).update({status:'rejected',rejectReason:r||'',rejectedAt:new Date().toISOString()})
    .then(function(){toast('반려됨');_otTab('pending');}).catch(function(e){toast('❌ '+e.message);});
}

    _db.collection('evaluations').where('dealerId','==',did).where('ym','==',ym).get()
    .then(function(evalSnap){
      var evalMap={};
      evalSnap.forEach(function(doc){var d=doc.data();evalMap[d.userId||'']=Object.assign({id:doc.id},d);});
      var html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">';

        var d=doc.data();

          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
          +'<div style="width:36px;height:36px;border-radius:50%;background:var(--brand-l);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--brand)">'+esc((d.name||'?')[0])+'</div>'
          +'<div><div style="font-size:13px;font-weight:800">'+esc(d.name||uid)+'</div>'
          +(d.camp?'<div style="font-size:10px;color:var(--text3)">'+esc(d.camp)+'</div>':'')
          +'</div></div>'
          // 별점
          +'<div style="display:flex;gap:4px;margin-bottom:8px" id="stars-'+uid+'">'
          +[1,2,3,4,5].map(function(n){
            return '<span data-uid="'+uid+'" data-n="'+n+'" onclick="_evalSetStar(this.dataset.uid,parseInt(this.dataset.n))" '
              +'style="font-size:24px;cursor:pointer;transition:transform .1s" '
              +'onmouseover="this.style.transform=\'scale(1.2)\'" onmouseout="this.style.transform=\'\'">'
              +(n<=stars?'⭐':'☆')+'</span>';
          }).join('')
          +'<span style="font-size:12px;color:var(--text3);margin-left:4px;line-height:28px">'+(stars?stars+'점':'미평가')+'</span>'
          +'</div>'
          +'<textarea id="comment-'+uid+'" placeholder="평가 코멘트..." rows="2" '
          +'style="width:100%;padding:7px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:11px;resize:none">'+esc(comment)+'</textarea>'
          +'<button data-uid="'+uid+'" data-name="'+esc(d.name||uid)+'" data-evid="'+(ev.id||'')+'" '
          +'onclick="_evalSave(this.dataset.uid,this.dataset.name,this.dataset.evid,\''+did+'\',\''+ym+'\')" '
          +'class="btn btn-blue" style="width:100%;margin-top:8px;font-size:12px">💾 저장</button>'
          +'</div>';
        // 별점 상태 저장
        if(!window._evalStars)window._evalStars={};
        window._evalStars[uid]=stars;
      });
      list.innerHTML=html+'</div>';
    });
  }).catch(function(e){list.innerHTML='<div class="empty">'+esc(e.message)+'</div>';});
}

function _evalSetStar(uid,n){
  if(!window._evalStars)window._evalStars={};
  window._evalStars[uid]=n;
  var box=document.getElementById('stars-'+uid);
  if(!box)return;
  box.querySelectorAll('span').forEach(function(s,i){
    s.textContent=i<n?'⭐':'☆';
  });
}

function _evalSave(uid,name,evid,did,ym){
  var stars=window._evalStars&&window._evalStars[uid]||0;
  var comment=(document.getElementById('comment-'+uid)||{}).value||'';
  if(!stars){toast('❌ 별점을 선택하세요');return;}
  var data={dealerId:did,userId:uid,driverName:name,ym:ym,stars:stars,comment:comment.trim(),updatedAt:new Date().toISOString()};
  var p=evid?_db.collection('evaluations').doc(evid).update(data)
            :_db.collection('evaluations').add(Object.assign(data,{createdAt:new Date().toISOString()}));
  p.then(function(){toast('⭐ 평가 저장됨');}).catch(function(e){toast('❌ '+e.message);});
}

function _loadDeliveryReport(){
  var did=_CU&&_CU.dealerId||'';
  var ym=(document.getElementById('dr-ym')||{}).value||'';
  if(!ym)return;
  var sumEl=document.getElementById('dr-summary');
  var tbl=document.getElementById('dr-table');
  if(tbl)tbl.innerHTML='<div class="empty"><div class="empty-icon">⏳</div>데이터 집계 중...</div>';
  _db.collection('settlements')
    .where('dealerId','==',did).where('month','==',ym).limit(500).get()
  .then(function(snap){
    var byDriver={};var byCamp={};
    var totalPay=0,totalDeliv=0;
    snap.forEach(function(doc){
      var d=doc.data();
      var uid=d.userId||d.driver||'';
      var camp=d.camp||'기타';
      if(!byDriver[uid])byDriver[uid]={name:d.driverName||uid,camp:camp,deliveries:0,pay:0,fresh:0,nocont:0};
      var cnt=d.totalCount||d.cnt||0;
      var pay=d.totalPay||d.calcNet||d.ramt||0;
      byDriver[uid].deliveries+=cnt;
      byDriver[uid].pay+=pay;
      byDriver[uid].fresh+=(d.fresh||0);
      byDriver[uid].nocont+=(d.nocont||0);
      totalPay+=pay; totalDeliv+=cnt;
      if(!byCamp[camp])byCamp[camp]={deliveries:0,pay:0,drivers:new Set()};
      byCamp[camp].deliveries+=cnt;byCamp[camp].pay+=pay;byCamp[camp].drivers.add(uid);
    });
    // 요약 카드
    if(sumEl){
      sumEl.innerHTML=''
        +'<div class="card" style="text-align:center;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff">'
        +'<div style="font-size:11px;opacity:.8">총 배달</div><div style="font-size:22px;font-weight:900">'+totalDeliv.toLocaleString()+'건</div></div>'
        +'<div class="card" style="text-align:center"><div style="font-size:20px">💰</div>'
        +'<div style="font-size:11px;color:var(--text3)">총 지급액</div><div style="font-size:16px;font-weight:900;color:var(--brand)">₩'+totalPay.toLocaleString()+'</div></div>'
        +'<div class="card" style="text-align:center"><div style="font-size:20px">👥</div>'
        +'<div style="font-size:11px;color:var(--text3)">참여 기사</div><div style="font-size:20px;font-weight:900;color:var(--green)">'+Object.keys(byDriver).length+'명</div></div>'
        +Object.entries(byCamp).map(function(e){
          return '<div class="card" style="text-align:center"><div style="font-size:11px;color:var(--text3)">'+esc(e[0])+'</div>'
            +'<div style="font-size:16px;font-weight:900;color:var(--purple)">'+e[1].deliveries.toLocaleString()+'건</div>'
            +'<div style="font-size:10px;color:var(--text3)">'+e[1].drivers.size+'명</div></div>';
        }).join('');
    }
    // 기사별 테이블
    window._drData=Object.values(byDriver).sort(function(a,b){return b.deliveries-a.deliveries;});
    var html='<table style="width:100%;border-collapse:collapse;font-size:12px">'
      +'<tr style="background:var(--bg3)">'
      +'<th style="padding:8px 10px;text-align:left">기사</th><th style="padding:8px">캠프</th>'
      +'<th style="padding:8px;text-align:right">배달건수</th><th style="padding:8px;text-align:right">프레시</th>'
      +'<th style="padding:8px;text-align:right">미계약</th><th style="padding:8px;text-align:right">지급액</th>'
      +'<th style="padding:8px;text-align:right">건당단가</th></tr>';
    window._drData.forEach(function(d,i){
      var unitPrice=d.deliveries>0?Math.round(d.pay/d.deliveries):0;
      var rankIcon=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      html+='<tr style="border-bottom:1px solid var(--border)'+(i%2===0?';background:var(--bg)':'')+'">'
        +'<td style="padding:8px 10px;font-weight:700">'+rankIcon+esc(d.name)+'</td>'
        +'<td style="padding:8px;text-align:center;color:var(--text3)">'+esc(d.camp)+'</td>'
        +'<td style="padding:8px;text-align:right;font-weight:800;color:var(--brand)">'+d.deliveries.toLocaleString()+'</td>'
        +'<td style="padding:8px;text-align:right">'+d.fresh.toLocaleString()+'</td>'
        +'<td style="padding:8px;text-align:right">'+d.nocont.toLocaleString()+'</td>'
        +'<td style="padding:8px;text-align:right;font-weight:700">₩'+d.pay.toLocaleString()+'</td>'
        +'<td style="padding:8px;text-align:right;color:var(--text3)">₩'+unitPrice.toLocaleString()+'</td>'
        +'</tr>';
    });
    html+='<tr style="font-weight:800;background:var(--bg3)">'
      +'<td colspan="2" style="padding:8px 10px">합계</td>'
      +'<td style="padding:8px;text-align:right;color:var(--brand)">'+totalDeliv.toLocaleString()+'</td>'
      +'<td colspan="2" style="padding:8px"></td>'
      +'<td style="padding:8px;text-align:right;color:var(--brand)">₩'+totalPay.toLocaleString()+'</td>'
      +'<td style="padding:8px"></td></tr>';
    if(tbl)tbl.innerHTML=html+'</table>';
  }).catch(function(e){if(tbl)tbl.innerHTML='<div class="empty">'+esc(e.message)+'</div>';});
}

function _drExportCSV(){
  var data=window._drData||[];
  if(!data.length){toast('❌ 먼저 리포트를 생성하세요');return;}
  var ym=(document.getElementById('dr-ym')||{}).value||'';

// ════════════════════════════════════════════════
// 🤖 AI 정산 이상감지
// ════════════════════════════════════════════════
function _hsAnomalyCheck(){
  var st=window._hsState;
  if(!st||!st.workers||!st.workers.length){toast('❌ 먼저 QR 데이터를 불러오세요');return;}
  var did=st.did; var ym=st.ym;
  if(!did||!ym){toast('❌ 데이터가 없습니다');return;}
  // 이전 달 계산
  var ymDate=new Date(ym+'-01');
  ymDate.setMonth(ymDate.getMonth()-1);
  var prevYM=ymDate.getFullYear()+'-'+String(ymDate.getMonth()+1).padStart(2,'0');

  var mo=document.createElement('div');
  mo.className='mo show';mo.onclick=function(e){if(e.target===mo)mo.remove();};
  var box=document.createElement('div');
  box.className='md';box.style.maxWidth='560px';
  box.innerHTML='<div class="mdt">🤖 AI 정산 이상감지 — '+ym+'</div>'
    +'<div style="padding:16px">'
    +'<div id="anomaly-loading" style="text-align:center;padding:30px">'
    +'<div style="font-size:28px;margin-bottom:10px">🔍</div>'
    +'<div style="font-size:13px;color:var(--text3)">이전달('+prevYM+') 데이터와 비교 중...</div>'
    +'</div>'
    +'<div id="anomaly-result" style="display:none"></div>'
    +'</div>'
    +'<div class="mdf"><button class="btn" onclick="this.closest(\'.mo\').remove()">닫기</button></div>';
  mo.appendChild(box);document.body.appendChild(mo);

  // 이전달 settlements 조회
  _db.collection('settlements')
    .where('dealerId','==',did)
    .where('month','==',prevYM)
    .limit(200).get()
  .then(function(prevSnap){
    var prevMap={};
    prevSnap.forEach(function(doc){
      var d=doc.data();
      var uid=d.userId||d.driver||'';
      if(uid) prevMap[uid]={
        totalPay:d.totalPay||d.calcNet||d.ramt||0,
        workDays:d.workDays||0,
        damt:d.damt||0
      };
    });

    var anomalies=[];
    var normals=[];
    var results=st.results||{};

    st.workers.forEach(function(w){
      var cur=results[w.id];
      if(!cur)return;
      var uid=w.userId||w.id;
      var prev=prevMap[uid]||prevMap[w.name]||null;
      if(!prev){
        anomalies.push({
          name:w.name||uid, type:'new',
          severity:'info',
          msg:'신규 또는 이전달 데이터 없음',
          cur:Math.round(cur.totalPay||0), prev:0
        });
        return;
      }
      var curPay=Math.round(cur.totalPay||0);
      var prevPay=Math.round(prev.totalPay||0);
      if(prevPay===0){normals.push({name:w.name||uid,cur:curPay,prev:prevPay});return;}
      var diff=curPay-prevPay;
      var pct=Math.round(Math.abs(diff)/prevPay*100);
      var curDays=cur.workDays||0;
      var prevDays=prev.workDays||0;
      // 이상 판단 기준
      if(pct>=50){
        anomalies.push({name:w.name||uid,type:'급격변동',severity:'high',
          msg:Math.abs(pct)+'% '+(diff>0?'증가':'감소')+' (이전 ₩'+prevPay.toLocaleString()+' → 현재 ₩'+curPay.toLocaleString()+')',
          cur:curPay,prev:prevPay,diff:diff,pct:pct});
      } else if(pct>=20){
        anomalies.push({name:w.name||uid,type:'주의변동',severity:'medium',
          msg:Math.abs(pct)+'% '+(diff>0?'증가':'감소'),
          cur:curPay,prev:prevPay,diff:diff,pct:pct});
      } else if(curDays===0&&prevDays>0){
        anomalies.push({name:w.name||uid,type:'미출근',severity:'high',
          msg:'이전달 '+prevDays+'일 출근 → 이번달 0일 (무단결근?)',
          cur:curPay,prev:prevPay,diff:diff,pct:pct});
      } else if(curPay<LABOR_LAW_2026.minMonthly&&cur.totalH>0&&cur.totalH>=209){
        anomalies.push({name:w.name||uid,type:'최저임금',severity:'high',
          msg:'최저임금 미달 (₩'+curPay.toLocaleString()+' < ₩'+LABOR_LAW_2026.minMonthly.toLocaleString()+')',
          cur:curPay,prev:prevPay,diff:diff,pct:pct});
      } else {
        normals.push({name:w.name||uid,cur:curPay,prev:prevPay});
      }
    });

    var loading=document.getElementById('anomaly-loading');
    var result=document.getElementById('anomaly-result');
    if(loading)loading.style.display='none';
    if(!result)return;
    result.style.display='';

    var sevColor={'high':'#dc2626','medium':'#d97706','info':'#0891b2','low':'#059669'};
    var sevIcon={'high':'🚨','medium':'⚠️','info':'ℹ️','low':'✅'};

    var html='';
    if(anomalies.length===0){
      html='<div style="text-align:center;padding:20px">'
        +'<div style="font-size:36px;margin-bottom:10px">✅</div>'
        +'<div style="font-size:15px;font-weight:800;color:var(--green)">이상 없음</div>'
        +'<div style="font-size:12px;color:var(--text3);margin-top:6px">'+ym+' 정산이 이전달과 정상 범위입니다</div>'
        +'</div>';
    } else {
      html='<div style="margin-bottom:12px">'
        +'<div style="font-size:14px;font-weight:800;margin-bottom:4px">🚨 이상 감지 '+anomalies.length+'건</div>'
        +'<div style="font-size:11px;color:var(--text3)">이전달('+prevYM+') 대비 분석 결과</div>'
        +'</div>';
      html+=anomalies.map(function(a){
        var col=sevColor[a.severity]||'#6b7280';
        var icon=sevIcon[a.severity]||'❓';
        return '<div style="background:var(--bg3);border-left:4px solid '+col+';border-radius:8px;padding:10px 12px;margin-bottom:8px">'
          +'<div style="display:flex;align-items:center;gap:8px">'
          +'<span>'+icon+'</span>'
          +'<div style="flex:1">'
          +'<div style="font-size:13px;font-weight:800">'+esc(a.name)+'</div>'
          +'<div style="font-size:11px;color:'+col+';font-weight:700;margin-top:2px">['+esc(a.type)+'] '+esc(a.msg)+'</div>'
          +(a.diff!==undefined?'<div style="font-size:10px;color:var(--text3);margin-top:2px">'
            +'이전: ₩'+(a.prev||0).toLocaleString()+' → 현재: ₩'+(a.cur||0).toLocaleString()
            +(a.diff>0?' (+₩'+a.diff.toLocaleString()+')':' (-₩'+Math.abs(a.diff||0).toLocaleString()+')')
            +'</div>':'')
          +'</div></div>'
          +'</div>';
      }).join('');
    }
    if(normals.length){
      html+='<div style="margin-top:10px;padding:8px 12px;background:var(--green-l);border-radius:8px;font-size:11px;color:var(--green)">'
        +'✅ 정상 범위: '+normals.map(function(n){return esc(n.name);}).join(', ')
        +'</div>';
    }
    result.innerHTML=html;
  }).catch(function(e){
    var r2=document.getElementById('anomaly-result');
    var ld=document.getElementById('anomaly-loading');
    if(ld)ld.style.display='none';
    if(r2){r2.style.display='';r2.innerHTML='<div style="color:var(--red)">이전달 데이터 조회 실패: '+esc(e.message)+'</div>';}
  });
}

// ── 세무사 공유 OCR: 서류 사진 → AI 자동 인식 → 메모 자동 채움
window._txsOcr=function(src){
  var inp=document.getElementById(src==='cam'?'txs-ocr-cam':'txs-ocr-gal');
  var file=inp&&inp.files&&inp.files[0];
  if(!file)return;
  var st=document.getElementById('txs-ocr-status');
  var res=document.getElementById('txs-ocr-result');
  if(st)st.innerHTML='⏳ AI 문서 분석 중...';
  if(res)res.innerHTML='';
  var reader=new FileReader();
  reader.onload=function(ev){
    var base64=ev.target.result.split(',')[1];
    fetch('/claude-ocr',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        image:base64,
        mediaType:file.type||'image/jpeg',
        prompt:'이 문서에서 세무사에게 필요한 정보를 추출하세요. JSON으로만 응답: {"ym":"YYYY-MM","desc":"문서 요약","amount":숫자또는0,"docType":"세금계산서/영수증/급여명세서/기타"}. 금액이 없으면 0.'
      })
    }).then(function(r){return r.json();})
    .then(function(data){
      var txt=(data.content&&data.content[0]&&data.content[0].text)||'{}';
      try{
        var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
        var memo='';
        if(parsed.ym){var y=document.getElementById('txs-ym');if(y)y.value=parsed.ym;}
        if(parsed.desc)memo+=parsed.desc;
        if(parsed.amount>0)memo+=' (₩'+Number(parsed.amount).toLocaleString()+')';
        if(memo){var m=document.getElementById('txs-memo');if(m&&!m.value.trim())m.value=memo;}
        if(st)st.innerHTML='✅ 자동 인식 완료';
        if(res)res.innerHTML='<div style="font-size:11px;background:var(--green-l);color:var(--green);padding:6px 10px;border-radius:6px">'
          +'📄 '+esc(parsed.docType||'문서')+(parsed.amount>0?' · ₩'+Number(parsed.amount).toLocaleString():'')+'</div>';
      }catch(e){if(st)st.innerHTML='⚠️ 인식 실패 — 수동 입력해 주세요.';}
    }).catch(function(){if(st)st.innerHTML='⚠️ OCR 서버 오류';});
  };
  reader.readAsDataURL(file);
};

// 법정 연차 계산 (근로기준법)
function calcLegalLeave(hireDateStr, targetYear){
  if(!hireDateStr)return 15;
  var hire=new Date(hireDateStr);
  var target=new Date(targetYear+'-12-31');
  var months=Math.floor((target-hire)/(1000*60*60*24*30.4));
  if(months<12) return Math.min(months, 11); // 1개월 만근 시 1일 (최대 11일)
  var years=Math.floor(months/12);
  if(years<3) return 15;
  return Math.min(15+Math.floor((years-1)/2), 25); // 2년마다 1일 추가, 최대 25일
}

function _homeLoadTodo(did, today){

  if(!el||!_db)return;
  var leaveWait=0,otWait=0,attToday=0,insExpire=0;
  var done=0,total=4;
  function _render(){
    if(++done<total)return;
    var html='';
    if(leaveWait>0) html+=_todoItem('urgent','🌴 휴가 승인 대기 '+leaveWait+'건','leave');
    if(otWait>0)    html+=_todoItem('urgent','⏰ 연장근로 승인 대기 '+otWait+'건','overtime');
    if(insExpire>0) html+=_todoItem('warn','🚗 보험/검사 만료 차량 '+insExpire+'대','vehicle');
    if(attToday===0)html+=_todoItem('info','📋 오늘 출퇴근 기록 없음 ('+today+')','attendance');
    if(!html) html='<div style="font-size:12px;color:var(--green);text-align:center;padding:8px">✅ 오늘 처리할 항목이 없습니다</div>';

  _db.collection('leaves').where('dealerId','==',did).where('status','==','pending').get()
    .then(function(s){leaveWait=s.size;}).catch(function(){}).finally(_render);
  _db.collection('overtimes').where('dealerId','==',did).where('status','==','pending').get()
    .then(function(s){otWait=s.size;}).catch(function(){}).finally(_render);
  _db.collection('attendance').where('dealerId','==',did).where('date','==',today).get()
    .then(function(s){attToday=s.size;}).catch(function(){}).finally(_render);
  _db.collection('vehicles').where('dealerId','==',did).where('insuranceExp','<=',new Date(Date.now()+30*86400000).toISOString().slice(0,10)).get()
    .then(function(s){insExpire=s.size;}).catch(function(){}).finally(_render);
}

            +'<div style="font-size:11px;color:var(--text3)">'+lt.label+' · '+esc(d.startDate||'')+'</div>'
            +'</div>'
            +'<button data-id="'+doc.id+'" onclick="_leaveApprove(this.dataset.id);this.closest(\'div\').remove();_homeLoadStats(\''+did+'\',\''+today+'\',\''+ym+'\')" '
            +'class="btn btn-teal" style="font-size:10px;padding:3px 10px">✅ 승인</button>'
            +'<button data-id="'+doc.id+'" onclick="_leaveRejectModal(this.dataset.id)" '
            +'class="btn" style="font-size:10px;padding:3px 10px;color:var(--red)">❌</button>'
            +'</div>';
        });
        leaveEl.innerHTML=lRows;
      }
    }
  }
  _db.collection('drivers').where('dealerId','==',did).get()
    .then(function(s){s.forEach(function(d){_drivers.push(d);});}).catch(function(){}).finally(_statsRender);
  _db.collection('attendance').where('dealerId','==',did).where('date','==',today).get()
    .then(function(s){s.forEach(function(d){_attDocs.push(d);});}).catch(function(){}).finally(_statsRender);
  _db.collection('leaves').where('dealerId','==',did).where('status','==','pending').get()
    .then(function(s){s.forEach(function(d){_leaveDocs.push(d);});}).catch(function(){}).finally(_statsRender);

  // 급여 요약 (이번달 attendance 집계)
  var payEl=document.getElementById('home-pay');
  _db.collection('attendance').where('dealerId','==',did)
    .where('date','>=',ym+'-01').where('date','<=',ym+'-31').get()
  .then(function(snap){
    var byUser={};
    snap.forEach(function(doc){
      var d=doc.data();
      var uid=d.userId||'';
      if(!byUser[uid])byUser[uid]={name:d.driverName||uid,days:0,hours:0};
      if(d.checkIn){byUser[uid].days++;}
      var qr=calcWorkHoursFromQR(d.checkIn||'',d.checkOut||'');
      byUser[uid].hours+=qr.hours;
    });
    var users=Object.values(byUser);
    if(!users.length){
      if(payEl)payEl.innerHTML='<div style="font-size:12px;color:var(--text3);text-align:center;padding:10px">이번달 출퇴근 기록 없음</div>';
      return;
    }
    var html='<table style="width:100%;border-collapse:collapse;font-size:12px">'
      +'<tr style="background:var(--bg3)">'
      +'<th style="padding:6px 10px;text-align:left">직원</th>'
      +'<th style="padding:6px;text-align:center">근무일</th>'
      +'<th style="padding:6px;text-align:center">총시간</th>'
      +'</tr>';
    users.slice(0,6).forEach(function(u){
      html+='<tr style="border-bottom:1px solid var(--border)">'
        +'<td style="padding:6px 10px;font-weight:700">'+esc(u.name)+'</td>'
        +'<td style="padding:6px;text-align:center;color:var(--brand);font-weight:700">'+u.days+'일</td>'
        +'<td style="padding:6px;text-align:center">'+Math.round(u.hours*10)/10+'h</td>'
        +'</tr>';
    });
    html+='</table>';
    if(payEl)payEl.innerHTML=html;
  }).catch(function(){if(payEl)payEl.innerHTML='';});
}
