<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<title>FILO — 매장 현황</title>
<style>
:root{
  --bg:#0d0d1a;--surface:#1a1a2e;--surface2:#20203a;--surface3:#262642;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.12);
  --tx:#f2f2ff;--t2:#a0a0c0;--t3:#606080;
  --br:#7c3aed;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#60a5fa;
  --r:12px;--r-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
.topbar{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(13,13,26,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px}
.topbar-logo{font-size:17px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.content{padding:70px 16px 24px}
.card{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.status-card{background:var(--surface2);border-radius:var(--r);padding:14px 10px;text-align:center;border:1px solid var(--bd)}
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px}
.table-card{border-radius:var(--r);padding:14px 8px;text-align:center;cursor:pointer;transition:.2s;border:2px solid transparent;position:relative}
.table-card.empty{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.25)}
.table-card.empty:hover{background:rgba(34,197,94,.18);transform:translateY(-2px)}
.table-card.occupied{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25)}
.table-card.reserved{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.25)}
.table-card.cleaning{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.25)}
.live-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .3s ease both}
.btn-brand{background:linear-gradient(135deg,#7c3aed,#9f5ef8);color:#fff;border:none;border-radius:var(--r);padding:13px;width:100%;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.3);margin-top:10px}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">FILO</div>
  <div id="store-name" style="font-size:13px;font-weight:700;color:var(--t2)">매장 현황</div>
  <div style="margin-left:auto;display:flex;align-items:center;font-size:11px;color:var(--t3)">
    <span class="live-dot" style="background:#22c55e"></span>실시간
  </div>
</div>

<div class="content">
  <!-- 요약 -->
  <div class="status-grid slide-up">
    <div class="status-card">
      <div style="font-size:24px;font-weight:900;color:#22c55e" id="cnt-empty">-</div>
      <div style="font-size:10px;color:var(--t3);margin-top:4px">빈 테이블</div>
    </div>
    <div class="status-card">
      <div style="font-size:24px;font-weight:900;color:#ef4444" id="cnt-occupied">-</div>
      <div style="font-size:10px;color:var(--t3);margin-top:4px">사용중</div>
    </div>
    <div class="status-card">
      <div style="font-size:24px;font-weight:900;color:#f59e0b" id="cnt-reserved">-</div>
      <div style="font-size:10px;color:var(--t3);margin-top:4px">예약</div>
    </div>
  </div>

  <!-- 테이블 맵 -->
  <div class="card">
    <div style="font-size:13px;font-weight:800;margin-bottom:14px">🗺 테이블 현황</div>
    <div class="table-grid" id="table-map">
      <div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--t3)">⏳ 로딩 중...</div>
    </div>
  </div>

  <!-- 범례 -->
  <div class="card">
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:14px;height:14px;border-radius:4px;background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.3)"></div>
        <span style="font-size:12px;color:var(--t2)">빈 테이블</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:14px;height:14px;border-radius:4px;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3)"></div>
        <span style="font-size:12px;color:var(--t2)">사용중</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:14px;height:14px;border-radius:4px;background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.3)"></div>
        <span style="font-size:12px;color:var(--t2)">예약</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:14px;height:14px;border-radius:4px;background:rgba(96,165,250,.2);border:1px solid rgba(96,165,250,.3)"></div>
        <span style="font-size:12px;color:var(--t2)">청소중</span>
      </div>
    </div>
  </div>

  <!-- 회원가입 유도 -->
  <div class="card" style="background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(8,145,178,.06));border-color:rgba(124,58,237,.2)">
    <div style="font-size:14px;font-weight:800;margin-bottom:6px">🎁 회원 혜택</div>
    <div style="font-size:12px;color:var(--t2);line-height:1.6">스탬프 적립, 할인 쿠폰, 우선 예약<br>회원가입 후 즉시 혜택을 받으세요</div>
    <button class="btn-brand" id="join-btn" onclick="_goJoin()">회원 가입하기</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var _db=null,_did='',_unsub=null;

function _init(){
  var cfg={apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',authDomain:'mbti-logistics.firebaseapp.com',projectId:'mbti-logistics',storageBucket:'mbti-logistics.appspot.com',messagingSenderId:'862900137263',appId:'1:862900137263:web:a1b2c3d4e5f6a7b8'};
  firebase.initializeApp(cfg);
  _db=firebase.firestore();

  var params=new URLSearchParams(location.search);
  _did=params.get('did')||'';

  if(!_did){
    document.getElementById('table-map').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--t3)">❌ 잘못된 링크입니다</div>';
    return;
  }

  /* 매장명 */
  _db.collection('companies').doc(_did).get().then(function(doc){
    if(doc.exists){
      var name=doc.data().companyName||doc.data().name||'매장';
      document.getElementById('store-name').textContent=name+' 현황';
    }
  });

  /* 테이블 실시간 구독 */
  _unsub=_db.collection('filo_tables')
    .where('dealerId','==',_did)
    .onSnapshot(function(snap){
      var tables=[];
      snap.forEach(function(doc){tables.push(Object.assign({_id:doc.id},doc.data()));});
      tables.sort(function(a,b){return (a.tableId||0)-(b.tableId||0);});

      /* 없으면 기본 테이블 생성 유도 */
      if(!tables.length){
        document.getElementById('table-map').innerHTML=
          '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--t3)">테이블이 설정되지 않았습니다</div>';
        return;
      }

      var empty=tables.filter(function(t){return t.status==='empty';}).length;
      var occupied=tables.filter(function(t){return t.status==='occupied';}).length;
      var reserved=tables.filter(function(t){return t.status==='reserved';}).length;

      document.getElementById('cnt-empty').textContent=empty;
      document.getElementById('cnt-occupied').textContent=occupied;
      document.getElementById('cnt-reserved').textContent=reserved;

      var statusIcon={empty:'🟢',occupied:'🔴',reserved:'🟡',cleaning:'🔵'};
      var statusLabel={empty:'빈자리',occupied:'사용중',reserved:'예약',cleaning:'청소중'};
      var statusColor={empty:'#22c55e',occupied:'#ef4444',reserved:'#f59e0b',cleaning:'#60a5fa'};

      document.getElementById('table-map').innerHTML=tables.map(function(t){
        var s=t.status||'empty';
        var since=t.since?Math.floor((Date.now()-new Date(t.since))/60000)+'분':'';
        return '<div class="table-card '+s+'" onclick="_tableClick(\''+t._id+'\',\''+t.tableId+'\',\''+s+'\')">' +
        '<div style="font-size:18px">'+statusIcon[s]+'</div>'+
        '<div style="font-size:12px;font-weight:800;margin-top:4px">'+t.tableId+'번</div>'+
        '<div style="font-size:9px;color:'+statusColor[s]+';margin-top:2px;font-weight:700">'+statusLabel[s]+'</div>'+
        (since&&s==='occupied'?'<div style="font-size:9px;color:var(--t3);margin-top:1px">'+since+'</div>':'')+
        '</div>';
      }).join('');
    });
}

function _tableClick(docId,tableId,status){
  if(status==='empty'){
    /* 빈 테이블 → 주문 페이지로 */
    location.href='/order?did='+_did+'&tid='+tableId;
  }
}

function _goJoin(){
  location.href='/member-join?did='+_did;
}

window.addEventListener('DOMContentLoaded',_init);
window.addEventListener('beforeunload',function(){if(_unsub)_unsub();});
</script>
</body>
</html>
