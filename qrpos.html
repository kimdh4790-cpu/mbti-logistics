<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link rel="manifest" href="/FILO-manifest.json">
<meta name="theme-color" content="#7b2fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FILO QR">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>QR POS — filo.ai.kr</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--bg4:#252840;
  --border:#2e3250;--text:#e8eaf6;--text2:#9da3c8;--text3:#5a5f7a;
  --acc:#00d4ff;--acc2:#7b2fff;--green:#00ff94;--red:#ff4d6d;
  --sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo-title{font-size:16px;font-weight:900;color:var(--acc)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--acc);border-left-color:var(--acc)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.page-title{font-size:15px;font-weight:800;flex:1}
.content{flex:1;overflow-y:auto;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn-acc{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700}
.btn-acc:hover{opacity:.85}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.toast-msg{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast-msg.show{opacity:1}
/* 모바일 */
@media(max-width:768px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:100;transition:left .3s}
  .sidebar.open{left:0}
  .main{width:100%}
}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-title">🏢 filo.ai.kr</div>
    <div class="logo-sub" id="company-name">로딩 중...</div>
  </div>
  <div class="nav" id="nav-menu">
    
    <div class="nav-item active" onclick="_nav(this,'gen')"><span class="nav-icon">🔲</span>QR 생성</div>
    <div class="nav-item" onclick="_nav(this,'attend')"><span class="nav-icon">⏰</span>출퇴근 관리</div>
    <div class="nav-item" onclick="_nav(this,'booking')"><span class="nav-icon">📅</span>예약 현황</div>
    <div class="nav-item" onclick="_nav(this,'today')"><span class="nav-icon">📊</span>오늘 매출</div>
    <div class="nav-item" onclick="_nav(this,'stats')"><span class="nav-icon">📈</span>매출 통계</div>
  <div class="nav-item" onclick="_nav(this,'history')"><span class="nav-icon">📋</span>결제 내역</div>
  </div>
  <div class="sidebar-bottom">
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px" id="user-email"></div>
<div id="sb-expiry" style="font-size:10px;color:var(--text3);margin-bottom:8px"></div>
    <button class="btn" onclick="_logout()" style="width:100%;font-size:11px">로그아웃</button>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px" id="menu-btn">☰</button>
    <div class="page-title" id="page-title">로딩 중...</div>
    <div id="topbar-actions"></div>
  </div>
  <div class="content" id="main-content">
    <div class="empty"><div class="empty-icon">⏳</div>로딩 중...</div>
  </div>
</div>
<div class="toast-msg" id="toast"></div>
<script>
function _pageQrPos(){
  var c=document.getElementById('main-content');
  var db=window._db; var cu=window._cu;
  if(!db||!cu){c.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3)">로그인 후 이용하세요</div>';return;}
  var did=cu.dealerId||cu.uid;
  var today=new Date().toISOString().slice(0,10);
  var ym=today.slice(0,7);

  c.innerHTML=
    '<div style="max-width:720px;margin:0 auto;padding:16px">'+
    // 헤더
    '<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(0,212,255,.2);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center">'+
      '<div style="font-size:32px;margin-bottom:8px">🔲</div>'+
      '<div style="font-size:18px;font-weight:900;color:var(--acc)">QR POS</div>'+
      '<div style="font-size:12px;color:var(--text3);margin-top:4px">매장·출장 실시간 결제 → 자동 정산 연동</div>'+
    '</div>'+
    // 탭
    '<div style="display:flex;gap:6px;margin-bottom:16px">'+
      '<button id="qr-tab-gen" onclick="_qrTab(this.dataset.tab)" data-tab="gen" style="flex:1;padding:10px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer">🔲 QR 생성</button>'+
      '<button id="qr-tab-today" onclick="_qrTab(this.dataset.tab)" data-tab="today" style="flex:1;padding:10px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">📊 오늘 매출</button>'+
      '<button id="qr-tab-history" onclick="_qrTab(this.dataset.tab)" data-tab="history" style="flex:1;padding:10px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">📋 내역</button>'+
    '</div>'+
    '<div id="qr-content"></div>'+
    '</div>';

  window._qrDid=did; window._qrToday=today; window._qrYm=ym;
  window._qrCu=cu;
  _qrTab('gen');
}

function _qrTab(tabOrEl,fallback){
  var tab=typeof tabOrEl==='string'?tabOrEl:(fallback||tabOrEl.dataset.tab);
  ['gen','today','history'].forEach(function(t){
    var btn=document.getElementById('qr-tab-'+t);
    if(!btn)return;
    if(t===tab){
      btn.style.background='var(--acc)';btn.style.color='#000';
      btn.style.border='none';
    }else{
      btn.style.background='var(--bg3)';btn.style.color='var(--text2)';
      btn.style.border='1px solid var(--border)';
    }
  });
  var c=document.getElementById('qr-content');
  if(!c)return;
  if(tab==='gen')     _qrRenderGen(c);
  else if(tab==='today')   _qrRenderToday(c);
  else if(tab==='history') _qrRenderHistory(c);
}

// ── QR 생성 탭
function _qrRenderGen(c){
  var did=window._qrDid;
  var cu=window._qrCu;
  // 회사 서비스 목록 로드
  _db.collection('mbetco_services').where('dealerId','==',did).get()
  .then(function(snap){
    var services=[];
    snap.forEach(function(d){services.push(Object.assign({id:d.id},d.data()));});

    c.innerHTML=
      // QR URL 설정
      '<div style="background:var(--bg3);border-radius:12px;padding:16px;margin-bottom:12px">'+
        '<div style="font-size:12px;font-weight:800;margin-bottom:10px;color:var(--acc)">📋 서비스 항목 등록</div>'+
        '<div style="display:flex;flex-direction:column;gap:8px">'+
          '<input id="qr-svc-name" placeholder="서비스명 (예: 시그니처펌, 에어컨청소, 방문요양 1시간)" '+
            'style="padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px">'+
          '<div style="display:flex;gap:8px">'+
            '<input id="qr-svc-price" type="number" placeholder="금액" '+
              'style="flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px">'+
            '<select id="qr-svc-worker" '+
              'style="flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px">'+
              '<option value="">담당자 선택</option>'+
              (services.length?'':'<option value="default">기본</option>')+
            '</select>'+
          '</div>'+
          '<div style="display:flex;gap:8px">'+
            '<select id="qr-pay-type" style="flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px">'+
              '<option value="card">💳 카드</option>'+
              '<option value="cash">💵 현금</option>'+
              '<option value="transfer">🏦 계좌이체</option>'+
              '<option value="kakao">💛 카카오페이</option>'+
              '<option value="naver">🟢 네이버페이</option>'+
            '</select>'+
            '<button onclick="_qrSaveService()" '+
              'style="flex:1;padding:10px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer">+ 등록</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
      // QR 생성
      '<div style="background:var(--bg3);border-radius:12px;padding:16px;margin-bottom:12px">'+
        '<div style="font-size:12px;font-weight:800;margin-bottom:10px;color:var(--acc)">🔲 QR 코드 생성</div>'+
        '<div style="display:flex;flex-direction:column;gap:8px">'+
          '<input id="qr-label" placeholder="QR 라벨 (예: 1번 테이블, 출장용, 카운터)" '+
            'style="padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px">'+
          '<button onclick="_qrGenerate()" '+
            'style="padding:12px;background:linear-gradient(90deg,var(--acc),var(--acc2));color:#000;border:none;border-radius:8px;font-size:13px;font-weight:900;cursor:pointer">🔲 QR 코드 생성</button>'+
        '</div>'+
        '<div id="qr-output" style="margin-top:12px;text-align:center"></div>'+
      '</div>'+
      // 등록된 서비스 목록
      (services.length?
        '<div style="background:var(--bg3);border-radius:12px;padding:16px">'+
          '<div style="font-size:12px;font-weight:800;margin-bottom:10px">등록된 서비스 ('+services.length+'개)</div>'+
          '<div style="display:flex;flex-direction:column;gap:6px">'+
          services.map(function(s){
            return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:8px">'+
              '<div>'+
                '<div style="font-size:12px;font-weight:700">'+_esc(s.name||'')+'</div>'+
                '<div style="font-size:10px;color:var(--text3)">₩'+(s.price||0).toLocaleString()+(s.worker?' · '+_esc(s.worker):'')+'</div>'+
              '</div>'+
              '<button data-id="'+s.id+'" onclick="_qrDeleteService(this.dataset.id)" '+
                'style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px">×</button>'+
            '</div>';
          }).join('')+
          '</div>'+
        '</div>'
      :'');

    // 담당자 목록 로드
    _db.collection('mbetco_workers').where('dealerId','==',did).get()
    .then(function(wsnap){
      var sel=document.getElementById('qr-svc-worker');
      if(!sel)return;
      sel.innerHTML='<option value="">담당자 선택</option>';
      wsnap.forEach(function(d){
        var w=d.data();
        sel.innerHTML+='<option value="'+_esc(w.name||d.id)+'">'+_esc(w.name||d.id)+'</option>';
      });
    }).catch(function(){});
  }).catch(function(e){
    c.innerHTML='<div style="padding:20px;color:var(--text3)">'+_esc(e.message)+'</div>';
  });
}

function _qrSaveService(){
  var name=(document.getElementById('qr-svc-name')||{}).value||'';
  var price=parseFloat((document.getElementById('qr-svc-price')||{}).value)||0;
  var worker=(document.getElementById('qr-svc-worker')||{}).value||'';
  if(!name||!price){toast('서비스명과 금액을 입력하세요');return;}
  var did=window._qrDid;
  _db.collection('mbetco_services').add({
    dealerId:did,name:name,price:price,worker:worker,
    createdAt:new Date().toISOString()
  }).then(function(){
    toast('✅ '+name+' 등록됨');
    _qrTab('gen');
  }).catch(function(e){toast('❌ '+e.message);});
}

function _qrDeleteService(id){
  if(!confirm('삭제할까요?'))return;
  _db.collection('mbetco_services').doc(id).delete()
  .then(function(){toast('삭제됨');_qrTab('gen');})
  .catch(function(e){toast('❌ '+e.message);});
}

function _qrGenerate(){
  var label=(document.getElementById('qr-label')||{}).value||'주문';
  var did=window._qrDid;
  // QR URL: filo.ai.kr/order?d=dealerId&l=label
  var baseUrl='https://filo.ai.kr/order';
  var qrUrl=baseUrl+'?d='+encodeURIComponent(did)+'&l='+encodeURIComponent(label);
  var out=document.getElementById('qr-output');
  if(!out)return;

  // QRCode.js CDN 사용
  out.innerHTML=
    '<div style="background:#fff;border-radius:12px;padding:16px;display:inline-block;margin-bottom:12px">'+
      '<div id="qr-canvas"></div>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--text3);margin-bottom:8px">'+_esc(label)+'</div>'+
    '<div style="display:flex;gap:8px;justify-content:center">'+
      '<button onclick="_qrPrint()" style="padding:8px 16px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer">🖨️ 인쇄</button>'+
      '<button onclick="_copyQrUrl()" '+
        'style="padding:8px 16px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:11px;cursor:pointer">🔗 링크 복사</button>'+
    '</div>';

  window._qrCurrentUrl=qrUrl;
  window._qrCurrentLabel=label;

  // QRCode 라이브러리 로드 후 생성
  if(typeof QRCode!=='undefined'){
    new QRCode(document.getElementById('qr-canvas'),{
      text:qrUrl,width:200,height:200,
      colorDark:'#000000',colorLight:'#ffffff',
      correctLevel:QRCode.CorrectLevel.H
    });
  } else {
    // 라이브러리 동적 로드
    var sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    sc.onload=function(){
      new QRCode(document.getElementById('qr-canvas'),{
        text:qrUrl,width:200,height:200,
        colorDark:'#000000',colorLight:'#ffffff',
        correctLevel:QRCode.CorrectLevel.H
      });
    };
    document.head.appendChild(sc);
  }
}

function _qrPrint(){
  var url=window._qrCurrentUrl||'';
  var label=window._qrCurrentLabel||'QR POS';
  var canvas=document.querySelector('#qr-canvas canvas')||document.querySelector('#qr-canvas img');
  var imgSrc=canvas?(canvas.toDataURL?canvas.toDataURL():canvas.src):'';
  var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR - '+label+'</title>'+
    '<style>body{font-family:sans-serif;text-align:center;padding:20px}'+
    'img{width:200px;height:200px}@media print{button{display:none}}</style></head><body>'+
    '<h3 style="margin-bottom:8px">'+label+'</h3>'+
    (imgSrc?'<img src="'+imgSrc+'" />':'<p>'+url+'</p>')+
    '<p style="font-size:11px;color:#666;margin-top:8px">'+url+'</p>'+
    '<br><button onclick="window.print()">🖨️ 인쇄</button>'+
    '\n</body></html>';

  var win=window.open('','_blank','width=320,height=400');
  if(win){win.document.write(html);win.document.close();}
}

// ── 오늘 매출
function _qrRenderToday(c){
  var did=window._qrDid;
  var today=window._qrToday;
  c.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">⏳ 로딩 중...</div>';
  _db.collection('mbetco_sales').where('dealerId','==',did).where('date','==',today)
  .orderBy('createdAt','desc').get()
  .then(function(snap){
    if(snap.empty){
      c.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3)"><div style="font-size:32px;margin-bottom:8px">📊</div>오늘 매출 없음</div>';
      return;
    }
    var byWorker={};var totalAmt=0;var cnt=0;
    snap.forEach(function(d){
      var v=d.data();
      var w=v.worker||'미지정';
      if(!byWorker[w])byWorker[w]={total:0,cnt:0,items:[]};
      byWorker[w].total+=v.amount||0;
      byWorker[w].cnt++;
      byWorker[w].items.push(v);
      totalAmt+=v.amount||0;cnt++;
    });
    var html=
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+
        '<div style="background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;padding:14px;text-align:center">'+
          '<div style="font-size:10px;opacity:.7;color:#000">총 매출</div>'+
          '<div style="font-size:20px;font-weight:900;color:#000">₩'+totalAmt.toLocaleString()+'</div>'+
        '</div>'+
        '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">'+
          '<div style="font-size:10px;color:var(--text3)">건수</div>'+
          '<div style="font-size:20px;font-weight:900">'+cnt+'건</div>'+
        '</div>'+
      '</div>';
    Object.keys(byWorker).forEach(function(w){
      var d=byWorker[w];
      html+='<div style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:8px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
          '<div style="font-size:13px;font-weight:800">'+_esc(w)+'</div>'+
          '<div style="font-size:14px;font-weight:900;color:var(--acc)">₩'+d.total.toLocaleString()+'</div>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:4px">'+
        d.items.map(function(item){
          return '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2)">'+
            '<span>'+_esc(item.serviceName||'')+'</span>'+
            '<span>₩'+(item.amount||0).toLocaleString()+' ('+_esc(item.payType||'')+')</span>'+
          '</div>';
        }).join('')+
        '</div>'+
        '<button data-w="'+_esc(w)+'" onclick="_qrExportWorker(this.dataset.w)" '+
          'style="width:100%;margin-top:8px;padding:7px;background:rgba(0,212,255,.1);color:var(--acc);'+
          'border:1px solid rgba(0,212,255,.2);border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">'+
          '📊 정산으로 내보내기</button>'+
      '</div>';
    });
    c.innerHTML=html;
  }).catch(function(e){c.innerHTML='<div style="padding:20px;color:var(--red)">'+_esc(e.message)+'</div>';});
}

// ── 내역
function _qrRenderHistory(c){
  var did=window._qrDid;
  var ym=window._qrYm;
  c.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">⏳ 로딩 중...</div>';
  _db.collection('mbetco_sales').where('dealerId','==',did).where('ym','==',ym)
  .orderBy('createdAt','desc').limit(50).get()
  .then(function(snap){
    if(snap.empty){

<script>// ★ 2026년 기준 4대보험 + 세금 계산 엔진
var TAX2026 = {
  // 국민연금 (근로자 4.5%, 사업주 4.5%)
  pension: { employee: 0.045, employer: 0.045 },
  // 건강보험 (근로자 3.545%, 사업주 3.545%)
  health: { employee: 0.03545, employer: 0.03545 },
  // 장기요양보험 (건강보험료의 12.95%)
  longterm: { rate: 0.1295 },
  // 고용보험 (근로자 0.9%, 사업주 1.15%)
  employment: { employee: 0.009, employer: 0.0115 },
  // 산재보험 (사업주 전액, 업종별 다름 — 기본 1.0%)
  accident: { employer: 0.010 },
  // 최저임금 2026년 (시급)
  minWage: 10030,
  // 원천세 간이세액표 기준 (월 급여별)
  incomeTax: function(monthly) {
    // 간이세액표 근사값 (부양가족 1인 기준)
    if(monthly <= 1060000) return 0;
    if(monthly <= 1500000) return Math.round((monthly - 1060000) * 0.06);
    if(monthly <= 3000000) return Math.round(26640 + (monthly - 1500000) * 0.15);
    if(monthly <= 4500000) return Math.round(251640 + (monthly - 3000000) * 0.24);
    if(monthly <= 8000000) return Math.round(611640 + (monthly - 4500000) * 0.35);
    return Math.round(1836640 + (monthly - 8000000) * 0.38);
  },
  // 프리랜서 원천세 3.3%
  freelance: { rate: 0.033 }
};

function _calcInsurance(grossPay, employType) {
  var result = {
    grossPay: grossPay,
    employType: employType,
    deductions: {},
    totalDeduction: 0,
    netPay: 0,
    employerCost: 0
  };

  if(employType === 'freelancer') {
    // 프리랜서: 원천세 3.3%만
    var tax33 = Math.round(grossPay * TAX2026.freelance.rate);
    result.deductions = { incomeTax33: tax33 };
    result.totalDeduction = tax33;

  } else if(employType === 'contractor') {
    // 사업자(지입): 고용보험 + 산재만 (근로자부담 없음)
    result.deductions = {
      employment_employer: Math.round(grossPay * TAX2026.employment.employer),
      accident_employer: Math.round(grossPay * TAX2026.accident.employer)
    };
    result.employerCost = result.deductions.employment_employer + result.deductions.accident_employer;
    result.totalDeduction = 0; // 근로자 부담 없음

  } else {
    // 직원: 4대보험 + 원천세 전부
    var pension_e = Math.round(grossPay * TAX2026.pension.employee);
    var health_e = Math.round(grossPay * TAX2026.health.employee);
    var longterm_e = Math.round(health_e * TAX2026.longterm.rate);
    var employ_e = Math.round(grossPay * TAX2026.employment.employee);
    var incomeTax = TAX2026.incomeTax(grossPay);
    var localTax = Math.round(incomeTax * 0.1);

    // 사업주 부담
    var pension_r = Math.round(grossPay * TAX2026.pension.employer);
    var health_r = Math.round(grossPay * TAX2026.health.employer);
    var longterm_r = Math.round(health_r * TAX2026.longterm.rate);
    var employ_r = Math.round(grossPay * TAX2026.employment.employer);
    var accident_r = Math.round(grossPay * TAX2026.accident.employer);

    result.deductions = {
      pension: pension_e,
      health: health_e,
      longterm: longterm_e,
      employment: employ_e,
      incomeTax: incomeTax,
      localTax: localTax
    };
    result.employerCost = pension_r + health_r + longterm_r + employ_r + accident_r;
    result.totalDeduction = pension_e + health_e + longterm_e + employ_e + incomeTax + localTax;
  }

  result.netPay = grossPay - result.totalDeduction;
  return result;
}

    _db.collection('mbetco_workers').where('dealerId','==',did).where('active','==',true).get(),
    _db.collection('mbetco_sales').where('dealerId','==',did).where('ym','==',ym).get()
  ]).then(function(results) {
    var workers = []; results[0].forEach(function(d){ var wdata=d.data();wdata.id=d.id;workers.push(wdata); });
    var sales = []; results[1].forEach(function(d){ var sdata=d.data();sales.push(sdata); });

    // 직원별 매출 집계
    var workerSales = {};
    sales.forEach(function(s) {
      (s.workerIds||[s.designerName]).forEach(function(wid) {
        if(!wid) return;
        if(!workerSales[wid]) workerSales[wid] = {amt:0, cnt:0};
        workerSales[wid].amt += s.finalPrice||0;
        workerSales[wid].cnt++;
      });
    });

    var el = document.getElementById('payroll-list');
    if(!el) return;
    if(!workers.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:#475569">등록된 직원 없음</div>'; return; }

    var totalNetPay = 0, totalEmployer = 0;

    el.innerHTML = workers.map(function(w) {
      var salesAmt = workerSales[w.id] ? workerSales[w.id].amt : (workerSales[w.name] ? workerSales[w.name].amt : 0);
      var salesCnt = workerSales[w.id] ? workerSales[w.id].cnt : (workerSales[w.name] ? workerSales[w.name].cnt : 0);

      // 급여 계산
      var base = w.basePay || 0;
      var commission = w.payType === 'commission' || w.payType === 'mixed'
        ? Math.round(salesAmt * ((w.commissionRate||0)/100)) : 0;
      var gross = base + commission;
      var calc = _calcInsurance(gross, w.employType||'employee');
      totalNetPay += calc.netPay;
      totalEmployer += calc.employerCost;

      var typeBadge = w.employType === 'contractor' ? '사업자' : w.employType === 'freelancer' ? '프리랜서' : '직원';
      var typeColor = w.employType === 'contractor' ? '#f59e0b' : w.employType === 'freelancer' ? '#7b2fff' : '#22c55e';

      var deductLines = Object.entries(calc.deductions).map(function(e) {
        var labels = {pension:'국민연금',health:'건강보험',longterm:'장기요양',employment:'고용보험',incomeTax:'소득세',localTax:'지방세',incomeTax33:'원천세(3.3%)',employment_employer:'고용보험(사업주)',accident_employer:'산재(사업주)'};
        return '<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)">' +
          '<span style="color:#94a3b8">' + (labels[e[0]]||e[0]) + '</span>' +
          '<span style="color:#ef4444">-₩' + e[1].toLocaleString() + '</span>' +
        '</div>';
      }).join('');

      return '<div style="background:var(--bg2,#0d1b3e);border:1px solid var(--border,rgba(0,102,255,.2));border-radius:12px;padding:14px;margin-bottom:10px">' +
        // 헤더
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
          '<div>' +
            '<span style="font-size:13px;font-weight:800">' + w.name + '</span>' +
            '<span style="font-size:10px;padding:2px 7px;border-radius:5px;margin-left:6px;background:rgba(34,197,94,.12);color:' + typeColor + '">' + typeBadge + '</span>' +
            '<div style="font-size:10px;color:#475569;margin-top:2px">' + w.role + '</div>' +
          '</div>' +
          '<div style="text-align:right">' +
            '<div style="font-size:12px;color:#94a3b8">매출 ' + salesCnt + '건</div>' +
            '<div style="font-size:12px;color:#00d4ff">₩' + salesAmt.toLocaleString() + '</div>' +
          '</div>' +
        '</div>' +
        // 급여 계산
        '<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px">' +
          '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">' +
            '<span style="color:#94a3b8">기본급</span><span>₩' + base.toLocaleString() + '</span>' +
          '</div>' +
          (commission > 0 ? '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">' +
            '<span style="color:#94a3b8">수수료(' + w.commissionRate + '%)</span><span style="color:#00d4ff">+₩' + commission.toLocaleString() + '</span>' +
          '</div>' : '') +
          '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1)">' +
            '<span style="font-weight:700">총 지급액</span><span style="font-weight:800">₩' + gross.toLocaleString() + '</span>' +
          '</div>' +
          deductLines +
          '<div style="display:flex;justify-content:space-between;font-size:13px;margin-top:8px;font-weight:800">' +
            '<span>실수령액</span><span style="color:#22c55e">₩' + calc.netPay.toLocaleString() + '</span>' +
          '</div>' +
          (calc.employerCost > 0 ? '<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px">' +
            '<span style="color:#94a3b8">사업주 추가부담</span><span style="color:#f59e0b">₩' + calc.employerCost.toLocaleString() + '</span>' +
          '</div>' : '') +
        '</div>' +
      '</div>';
    }).join('') +
    // 합계
    '<div style="background:linear-gradient(135deg,rgba(0,102,255,.15),rgba(0,212,255,.08));border:1px solid rgba(0,212,255,.3);border-radius:12px;padding:14px;margin-top:4px">' +
      '<div style="font-size:12px;font-weight:800;color:#00d4ff;margin-bottom:8px">' + ym + ' 급여 합계</div>' +
      '<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:800">' +
        '<span>총 실수령합계</span><span style="color:#22c55e">₩' + totalNetPay.toLocaleString() + '</span>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;margin-top:4px">' +
        '<span style="color:#94a3b8">사업주 총부담</span><span style="color:#f59e0b">₩' + (totalNetPay + totalEmployer).toLocaleString() + '</span>' +
      '</div>' +
    '</div>';
  });
}

// ★ 고객 CRM 페이지
function _pageCustomerCRM(c) {
  if(!c) c = document.getElementById('main-content');
  var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');

  c.innerHTML =
    '<div style="font-size:14px;font-weight:800;margin-bottom:12px">🗂 고객 관리</div>' +
    // 탭
    '<div style="display:flex;gap:6px;margin-bottom:12px">' +
      '<button onclick="_crmTab(\'list\')" id="crm-tab-list" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:#0066ff;color:#fff">목록</button>' +
      '<button onclick="_crmTab(\'add\')" id="crm-tab-add" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:var(--bg3,#1e3a5f);color:#94a3b8">+ 등록</button>' +
      '<button onclick="_crmTab(\'notify\')" id="crm-tab-notify" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:var(--bg3,#1e3a5f);color:#94a3b8">📢 알림</button>' +
    '</div>' +
    '<div id="crm-content"></div>';

  window._crmDid = did;
  _crmTab('list');
}

function _crmTab(tab) {
  ['list','add','notify'].forEach(function(t) {
    var btn = document.getElementById('crm-tab-'+t);
    if(btn){ btn.style.background = t===tab ? '#0066ff' : 'var(--bg3,#1e3a5f)'; btn.style.color = t===tab ? '#fff' : '#94a3b8'; }
  });
  var c = document.getElementById('crm-content');
  if(!c) return;
  if(tab === 'list') _crmList(c);
  else if(tab === 'add') _crmAddForm(c);
  else if(tab === 'notify') _crmNotify(c);
}

function _crmList(c) {
  var did = window._crmDid;
  c.innerHTML = '<div style="text-align:center;padding:20px;color:#475569">⏳</div>';
  _db.collection('mbetco_customers').where('dealerId','==',did)
    .orderBy('lastVisit','desc').limit(50).get()
    .then(function(snap) {
      if(snap.empty){ c.innerHTML='<div style="text-align:center;padding:20px;color:#475569">등록된 고객 없음</div>'; return; }
      c.innerHTML =
        '<input id="crm-search" placeholder="🔍 이름·연락처 검색" oninput="_crmSearch(this.value)" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px;margin-bottom:10px">' +
        '<div id="crm-list-items">' +
        snap.docs.map(function(doc) {
          var v = doc.data();
          var daysSince = v.lastVisit ? Math.floor((Date.now() - new Date(v.lastVisit).getTime()) / 86400000) : 999;
          var visitBadge = daysSince > 90 ? '<span style="color:#ef4444;font-size:10px">'+daysSince+'일 미방문</span>' :
                           daysSince > 30 ? '<span style="color:#f59e0b;font-size:10px">'+daysSince+'일 전</span>' :
                           '<span style="color:#22c55e;font-size:10px">'+daysSince+'일 전</span>';
          return '<div style="background:var(--bg2,#0d1b3e);border:1px solid var(--border,rgba(0,102,255,.2));border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer" onclick="_crmDetail(\'' + doc.id + '\')">' +
            '<div style="display:flex;justify-content:space-between;align-items:center">' +
              '<div>' +
                '<div style="font-size:13px;font-weight:800">' + (v.name||'') + '</div>' +
                '<div style="font-size:11px;color:#94a3b8;margin-top:2px">' + (v.phone||'') + ' · ' + visitBadge + '</div>' +
              '</div>' +
              '<div style="text-align:right">' +
                '<div style="font-size:12px;font-weight:700;color:#0066ff">₩' + (v.totalSpent||0).toLocaleString() + '</div>' +
                '<div style="font-size:10px;color:#475569">' + (v.totalVisits||0) + '회 방문</div>' +
              '</div>' +
            '</div>' +
          '</div>';
        }).join('') + '</div>';
      window._crmDocs = snap.docs.map(function(d){ var rdata=d.data();rdata.id=d.id;return rdata; });
    });
}

function _crmSearch(val) {
  if(!window._crmDocs) return;
  var items = document.getElementById('crm-list-items');
  if(!items) return;
  var filtered = window._crmDocs.filter(function(v) {
    return !val || (v.name||'').includes(val) || (v.phone||'').includes(val);
  });
  items.innerHTML = filtered.map(function(v) {
    return '<div style="background:var(--bg2,#0d1b3e);border:1px solid var(--border,rgba(0,102,255,.2));border-radius:10px;padding:12px;margin-bottom:8px">' +
      '<div style="font-size:13px;font-weight:800">' + (v.name||'') + '</div>' +
      '<div style="font-size:11px;color:#94a3b8">' + (v.phone||'') + ' · ₩' + (v.totalSpent||0).toLocaleString() + '</div>' +
    '</div>';
  }).join('');
}

function _crmAddForm(c) {
  c.innerHTML =
    '<div style="display:flex;flex-direction:column;gap:10px">' +
      '<input id="cust-name" placeholder="이름 *" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
      '<input id="cust-phone" placeholder="연락처 *" type="tel" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
      '<input id="cust-birth" placeholder="생년월일 (YYYY-MM-DD)" type="date" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
      '<select id="cust-gender" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
        '<option value="">성별 선택</option>' +
        '<option value="female">여성</option>' +
        '<option value="male">남성</option>' +
      '</select>' +
      '<textarea id="cust-memo" placeholder="메모 (관심 서비스, 특이사항 등)" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px;height:80px;resize:none"></textarea>' +
      '<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#94a3b8;cursor:pointer">' +
        '<input type="checkbox" id="cust-marketing" style="width:16px;height:16px"> 마케팅 알림 수신 동의' +
      '</label>' +
      '<button onclick="_saveCRM()" style="padding:12px;background:linear-gradient(135deg,#0066ff,#00d4ff);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">✅ 고객 등록</button>' +
    '</div>';
}

function _saveCRM() {
  var did = window._crmDid;
  var name = (document.getElementById('cust-name')||{}).value.trim();
  var phone = (document.getElementById('cust-phone')||{}).value.trim();
  if(!name||!phone){ toast('이름과 연락처를 입력하세요'); return; }
  _db.collection('mbetco_customers').add({
    dealerId: did, name: name, phone: phone,
    birthDate: (document.getElementById('cust-birth')||{}).value||'',
    gender: (document.getElementById('cust-gender')||{}).value||'',
    memo: (document.getElementById('cust-memo')||{}).value||'',
    marketingAgree: document.getElementById('cust-marketing') ? document.getElementById('cust-marketing').checked : false,
    totalVisits: 0, totalSpent: 0, lastVisit: '',
    createdAt: new Date().toISOString()
  }).then(function(){ toast('✅ 고객 등록 완료'); _crmTab('list'); })
  .catch(function(e){ toast('❌ '+e.message); });
}

function _crmNotify(c) {
  c.innerHTML =
    '<div style="font-size:12px;font-weight:700;color:#00d4ff;margin-bottom:10px">📢 고객 알림 발송</div>' +
    '<div style="display:flex;flex-direction:column;gap:10px">' +
      '<select id="notif-type" onchange="_notifTypeChange()" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
        '<option value="all">전체 고객</option>' +
        '<option value="novisit30">30일 이상 미방문</option>' +
        '<option value="novisit60">60일 이상 미방문</option>' +
        '<option value="birthday">이번달 생일 고객</option>' +
        '<option value="marketing">마케팅 동의 고객</option>' +
      '</select>' +
      '<div id="notif-target-count" style="font-size:12px;color:#94a3b8;padding:4px 0"></div>' +
      '<select id="notif-channel" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
        '<option value="kakao">카카오 알림톡</option>' +
        '<option value="sms">문자 (SMS)</option>' +
      '</select>' +
      '<textarea id="notif-msg" placeholder="메시지 내용을 입력하세요&#10;예) [매장명] 안녕하세요! 이번달 특별 이벤트 안내드립니다 😊" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px;height:100px;resize:none"></textarea>' +
      '<div style="font-size:11px;color:#475569;line-height:1.6;padding:8px;background:rgba(245,158,11,.06);border-radius:8px;border:1px solid rgba(245,158,11,.15)">' +
        '⚠️ 카카오 알림톡은 별도 채널 심사 필요<br>현재는 발송 내역만 저장됩니다' +
      '</div>' +
      '<button onclick="_sendNotif()" style="padding:12px;background:linear-gradient(135deg,#0066ff,#7b2fff);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">📢 발송</button>' +
    '</div>';
  _notifTypeChange();
}

function _notifTypeChange() {
  var did = window._crmDid;
  var type = (document.getElementById('notif-type')||{}).value;
  var today = new Date().toISOString().slice(0,10);
  var ym = today.slice(0,7);
  var countEl = document.getElementById('notif-target-count');
  if(!countEl) return;

  var query = _db.collection('mbetco_customers').where('dealerId','==',did);
  if(type === 'marketing') query = query.where('marketingAgree','==',true);

  query.get().then(function(snap) {
    var filtered = snap.docs.filter(function(d) {
      var v = d.data();
      if(type === 'novisit30') {
        var days = v.lastVisit ? Math.floor((Date.now()-new Date(v.lastVisit).getTime())/86400000) : 999;
        return days >= 30;
      }
      if(type === 'novisit60') {
        var days2 = v.lastVisit ? Math.floor((Date.now()-new Date(v.lastVisit).getTime())/86400000) : 999;
        return days2 >= 60;
      }
      if(type === 'birthday') return (v.birthDate||'').slice(5,7) === ym.slice(5,7);
      return true;
    });
    countEl.textContent = '대상 고객: ' + filtered.length + '명';
    window._notifTargets = filtered.map(function(d){ var rdata=d.data();rdata.id=d.id;return rdata; });
  });
}

function _sendNotif() {
  var did = window._crmDid;
  var msg = (document.getElementById('notif-msg')||{}).value.trim();
  var channel = (document.getElementById('notif-channel')||{}).value;
  var targets = window._notifTargets || [];
  if(!msg){ toast('메시지를 입력하세요'); return; }
  if(!targets.length){ toast('대상 고객이 없습니다'); return; }

  _db.collection('mbetco_notifications').add({
    dealerId: did, message: msg, channel: channel,
    targetType: (document.getElementById('notif-type')||{}).value,
    targetCount: targets.length, successCount: 0,
    sentAt: new Date().toISOString()
  }).then(function(){
    toast('✅ 발송 내역 저장 (' + targets.length + '명)');
  }).catch(function(e){ toast('❌ '+e.message); });
}

function _crmDetail(id) {
  var doc = (window._crmDocs||[]).find(function(d){ return d.id===id; });
  if(!doc) return;
  var html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:flex-end;padding:0" onclick="this.remove()">' +
    '<div style="background:var(--bg2,#0d1b3e);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto" onclick="event.stopPropagation()">' +
      '<div style="font-size:16px;font-weight:800;margin-bottom:4px">' + (doc.name||'') + '</div>' +
      '<div style="font-size:12px;color:#94a3b8;margin-bottom:14px">' + (doc.phone||'') + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">' +
        '<div style="background:var(--bg3,#1e3a5f);border-radius:8px;padding:10px;text-align:center">' +
          '<div style="font-size:16px;font-weight:900;color:#0066ff">₩' + (doc.totalSpent||0).toLocaleString() + '</div>' +
          '<div style="font-size:10px;color:#475569;margin-top:2px">총 결제액</div>' +
        '</div>' +
        '<div style="background:var(--bg3,#1e3a5f);border-radius:8px;padding:10px;text-align:center">' +
          '<div style="font-size:16px;font-weight:900;color:#22c55e">' + (doc.totalVisits||0) + '회</div>' +
          '<div style="font-size:10px;color:#475569;margin-top:2px">방문 횟수</div>' +
        '</div>' +
      '</div>' +
      (doc.memo ? '<div style="background:rgba(0,212,255,.06);border-radius:8px;padding:10px;font-size:12px;color:#94a3b8;margin-bottom:10px">' + doc.memo + '</div>' : '') +
      '<div style="font-size:11px;color:#475569;margin-bottom:14px">마지막 방문: ' + (doc.lastVisit||'없음') + '</div>' +
      '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="width:100%;padding:10px;background:var(--bg3,#1e3a5f);color:#e2e8f0;border:none;border-radius:8px;font-size:13px;cursor:pointer">닫기</button>' +
    '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}
</script>
<script>// ════════════════════════════════════════════
// ★ FILO 공통 기능 모듈
// ① 포인트 적립·사용
// ② 회원권 관리 (금액권·기간권·횟수권)
// ③ 법정 급여명세서
// ════════════════════════════════════════════

// ─── 포인트 설정 기본값 ───
var _POINT_RATE = 3; // 기본 3% 적립

// ─── 포인트 페이지 ───
function _pagePoints(c) {
  if(!c) c = document.getElementById('main-content');
  var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');
  c.innerHTML =
    '<div style="font-size:14px;font-weight:800;margin-bottom:12px">🎁 포인트 관리</div>' +
    // 설정
    '<div style="background:var(--bg2,#0d1b3e);border:1px solid var(--border,rgba(0,102,255,.2));border-radius:12px;padding:14px;margin-bottom:12px">' +
      '<div style="font-size:12px;font-weight:700;color:#00d4ff;margin-bottom:10px">⚙️ 포인트 설정</div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
        '<div style="font-size:12px;color:#94a3b8;flex:1">결제금액 대비 적립률</div>' +
        '<input id="pt-rate" type="number" value="3" min="0" max="20" style="width:60px;padding:6px;border-radius:6px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px;text-align:center">'+
        '<span style="font-size:12px;color:#94a3b8">%</span>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">' +
        '<div style="font-size:12px;color:#94a3b8;flex:1">최소 사용 포인트</div>' +
        '<input id="pt-min" type="number" value="1000" style="width:80px;padding:6px;border-radius:6px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px;text-align:center">' +
        '<span style="font-size:12px;color:#94a3b8">P</span>' +
      '</div>' +
      '<button onclick="_savePointSettings()" style="width:100%;padding:10px;background:#0066ff;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">저장</button>' +
    '</div>' +
    // 고객 포인트 조회
    '<div style="font-size:12px;font-weight:700;color:#00d4ff;margin-bottom:8px">👤 고객 포인트 조회·적립·사용</div>' +
    '<div style="display:flex;gap:8px;margin-bottom:10px">' +
      '<input id="pt-phone" placeholder="연락처 입력" type="tel" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
      '<button onclick="_searchPoint()" style="padding:10px 14px;background:#0066ff;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">조회</button>' +
    '</div>' +
    '<div id="pt-result"></div>' +
    // 전체 포인트 현황
    '<div style="font-size:12px;font-weight:700;color:#00d4ff;margin:12px 0 8px">📊 전체 현황</div>' +
    '<div id="pt-summary"><div style="text-align:center;padding:16px;color:#475569">⏳</div></div>';

  _loadPointSummary(did);
  _loadPointSettings(did);
}

function _loadPointSettings(did) {
  _db.collection('mbetco_settings').doc(did).get().then(function(snap) {
    if(!snap.exists) return;
    var v = snap.data();
    if(v.pointRate !== undefined) {
      var el = document.getElementById('pt-rate');
      if(el) el.value = v.pointRate;
      _POINT_RATE = v.pointRate;
    }
    if(v.pointMin !== undefined) {
      var el2 = document.getElementById('pt-min');
      if(el2) el2.value = v.pointMin;
    }
  });
}

function _savePointSettings() {
  var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');
  var rate = parseInt((document.getElementById('pt-rate')||{}).value||'3');
  var min = parseInt((document.getElementById('pt-min')||{}).value||'1000');
  _db.collection('mbetco_settings').doc(did).set({
    pointRate: rate, pointMin: min
  }, {merge:true}).then(function() {
    _POINT_RATE = rate;
    toast('✅ 포인트 설정 저장');
  });
}

function _searchPoint() {
  var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');
  var phone = (document.getElementById('pt-phone')||{}).value.replace(/\D/g,'');
  if(!phone) { toast('연락처를 입력하세요'); return; }
  var el = document.getElementById('pt-result');
  if(el) el.innerHTML = '<div style="text-align:center;padding:12px;color:#475569">⏳</div>';

  _db.collection('mbetco_customers').doc(did+'_'+phone).get().then(function(snap) {
    if(!snap.exists) {
      el.innerHTML = '<div style="padding:12px;color:#ef4444;font-size:12px">등록된 고객이 아닙니다</div>';
      return;
    }
    var v = snap.data();
    var pts = v.points || 0;
    el.innerHTML =
      '<div style="background:rgba(0,102,255,.08);border:1px solid rgba(0,102,255,.2);border-radius:10px;padding:12px;margin-bottom:8px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
          '<div>' +
            '<div style="font-size:13px;font-weight:800">' + (v.name||'') + '</div>' +
            '<div style="font-size:11px;color:#94a3b8">' + (v.phone||'') + '</div>' +
          '</div>' +
          '<div style="font-size:20px;font-weight:900;color:#f59e0b">' + pts.toLocaleString() + 'P</div>' +
        '</div>' +
        '<div style="display:flex;gap:6px">' +
          '<input id="pt-add-amt" placeholder="적립 금액" type="number" style="flex:1;padding:8px;border-radius:6px;border:1px solid rgba(0,102,255,.2);background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:12px">' +
          '<button onclick="_addPoint(\'' + did+'_'+phone + '\')" style="padding:8px 12px;background:#22c55e;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">적립</button>' +
        '</div>' +
        '<div style="display:flex;gap:6px;margin-top:6px">' +
          '<input id="pt-use-amt" placeholder="사용 포인트" type="number" style="flex:1;padding:8px;border-radius:6px;border:1px solid rgba(239,68,68,.2);background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:12px">' +
          '<button onclick="_usePoint(\'' + did+'_'+phone + '\',' + pts + ')" style="padding:8px 12px;background:#ef4444;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">사용</button>' +
        '</div>' +
      '</div>';
  });
}

function _addPoint(custId) {
  var amt = parseInt((document.getElementById('pt-add-amt')||{}).value||'0');
  if(!amt) { toast('금액을 입력하세요'); return; }
  var pts = Math.floor(amt * (_POINT_RATE/100));
  var ref = _db.collection('mbetco_customers').doc(custId);
  ref.update({ points: firebase.firestore.FieldValue.increment(pts) })
    .then(function() {
      toast('✅ ' + pts.toLocaleString() + 'P 적립');
      _db.collection('mbetco_point_log').add({
        custId: custId, type: 'add', pts: pts, amt: amt,
        at: new Date().toISOString()
      });
      _searchPoint();
    });
}

function _usePoint(custId, curPts) {
  var use = parseInt((document.getElementById('pt-use-amt')||{}).value||'0');
  if(!use) { toast('사용 포인트를 입력하세요'); return; }
  if(use > curPts) { toast('포인트가 부족합니다 (보유: '+curPts+'P)'); return; }
  _db.collection('mbetco_customers').doc(custId).update({
    points: firebase.firestore.FieldValue.increment(-use)
  }).then(function() {
    toast('✅ ' + use.toLocaleString() + 'P 사용');
    _db.collection('mbetco_point_log').add({
      custId: custId, type: 'use', pts: -use, at: new Date().toISOString()
    });
    _searchPoint();
  });
}

function _loadPointSummary(did) {
  _db.collection('mbetco_customers').where('dealerId','==',did)
    .where('points','>',0).get().then(function(snap) {
      var el = document.getElementById('pt-summary');
      if(!el) return;
      var total = 0;
      snap.forEach(function(d){ total += d.data().points||0; });
      el.innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
          '<div style="background:var(--bg3,#1e3a5f);border-radius:8px;padding:10px;text-align:center">' +
            '<div style="font-size:16px;font-weight:900;color:#f59e0b">' + snap.size + '명</div>' +
            '<div style="font-size:10px;color:#475569;margin-top:2px">포인트 보유 고객</div>' +
          '</div>' +
          '<div style="background:var(--bg3,#1e3a5f);border-radius:8px;padding:10px;text-align:center">' +
            '<div style="font-size:16px;font-weight:900;color:#f59e0b">' + total.toLocaleString() + 'P</div>' +
            '<div style="font-size:10px;color:#475569;margin-top:2px">총 발행 포인트</div>' +
          '</div>' +
        '</div>';
    });
}

// ─── 회원권 관리 ───
function _pageMembership(c) {
  if(!c) c = document.getElementById('main-content');
  var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');
  c.innerHTML =
    '<div style="font-size:14px;font-weight:800;margin-bottom:12px">💳 회원권 관리</div>' +
    '<div style="display:flex;gap:6px;margin-bottom:12px">' +
      '<button onclick="_mbTab(\'sell\')" id="mb-tab-sell" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:#0066ff;color:#fff">발급</button>' +
      '<button onclick="_mbTab(\'list\')" id="mb-tab-list" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:var(--bg3,#1e3a5f);color:#94a3b8">현황</button>' +
      '<button onclick="_mbTab(\'type\')" id="mb-tab-type" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:var(--bg3,#1e3a5f);color:#94a3b8">상품</button>' +

    '<div id="mb-content"></div>';
  window._mbDid = did;

function _mbTab(tab) {
  ['sell','list','type'].forEach(function(t) {
    var btn = document.getElementById('mb-tab-'+t);
    if(btn){ btn.style.background = t===tab?'#0066ff':'var(--bg3,#1e3a5f)'; btn.style.color = t===tab?'#fff':'#94a3b8'; }
  });
  var c = document.getElementById('mb-content');
  if(!c) return;
  if(tab === 'sell') _mbSellForm(c);
  else if(tab === 'list') _mbList(c);
  else if(tab === 'type') _mbTypeForm(c);
}

function _saveMbType() {
  var did = window._mbDid;
  var name = (document.getElementById('mbt-name')||{}).value.trim();
  var type = (document.getElementById('mbt-type')||{}).value;
  var price = parseInt((document.getElementById('mbt-price')||{}).value||'0');
  var value = parseInt((document.getElementById('mbt-value')||{}).value||'0');
  if(!name||!price||!value){ toast('모든 항목을 입력하세요'); return; }
  _db.collection('mbetco_mb_types').add({
    dealerId:did, name:name, mbType:type, price:price, value:value,
    active:true, createdAt:new Date().toISOString()
  }).then(function(){ toast('✅ 회원권 상품 등록'); _loadMbTypes(did); });
}

function _loadMbTypes(did) {
  _db.collection('mbetco_mb_types').where('dealerId','==',did).where('active','==',true).get()
  .then(function(snap) {
    var el = document.getElementById('mbt-list');
    if(!el) return;
    if(snap.empty){ el.innerHTML='<div style="color:#475569;font-size:12px;text-align:center;padding:12px">등록된 상품 없음</div>'; return; }
    var typeLabel = {amount:'금액권',count:'횟수권',period:'기간권'};
    el.innerHTML = snap.docs.map(function(d){
      var v = d.data();
      return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg2,#0d1b3e);border:1px solid var(--border,rgba(0,102,255,.2));border-radius:8px;padding:10px 12px;margin-bottom:6px">' +
        '<div>' +
          '<div style="font-size:12px;font-weight:700">' + v.name + '</div>' +
          '<div style="font-size:10px;color:#94a3b8">' + (typeLabel[v.mbType]||v.mbType) + ' · ₩' + v.price.toLocaleString() + ' · ' + v.value + (v.mbType==='amount'?'원':v.mbType==='count'?'회':'일') + '</div>' +
        '</div>' +
        '<button onclick="_db.collection(\'mbetco_mb_types\').doc(\'' + d.id + '\').update({active:false}).then(function(){toast(\'삭제됨\');_loadMbTypes(\'' + did + '\')})" style="padding:4px 8px;background:rgba(239,68,68,.12);color:#ef4444;border:none;border-radius:6px;font-size:10px;cursor:pointer">삭제</button>' +
      '</div>';
    }).join('');
    window._mbTypes = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
  });
}

function _mbSellForm(c) {
  var did = window._mbDid;
  _db.collection('mbetco_mb_types').where('dealerId','==',did).where('active','==',true).get()
  .then(function(snap) {
    var opts = snap.empty ? '<option value="">상품 없음</option>' :
      snap.docs.map(function(d){
        var v = d.data();
        var tl = {amount:'금액권',count:'횟수권',period:'기간권'};
        return '<option value="' + d.id + '">' + v.name + ' (₩' + v.price.toLocaleString() + ')</option>';
      }).join('');
    c.innerHTML =
      '<div style="font-size:12px;font-weight:700;color:#00d4ff;margin-bottom:10px">💳 회원권 발급</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px">' +
        '<input id="mb-phone" placeholder="고객 연락처" type="tel" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
        '<input id="mb-cname" placeholder="고객명" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
        '<select id="mb-type-sel" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' + opts + '</select>' +
        '<select id="mb-pay" style="padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
          '<option value="card">카드</option><option value="cash">현금</option><option value="transfer">계좌이체</option>' +
        '</select>' +
        '<button onclick="_issueMembership()" style="padding:12px;background:linear-gradient(135deg,#0066ff,#00d4ff);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">💳 발급</button>' +
      '</div>';
    window._mbTypeDocs = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
  });
}

function _issueMembership() {
  var did = window._mbDid;
  var phone = (document.getElementById('mb-phone')||{}).value.replace(/\D/g,'');
  var cname = (document.getElementById('mb-cname')||{}).value.trim();
  var typeId = (document.getElementById('mb-type-sel')||{}).value;
  var pay = (document.getElementById('mb-pay')||{}).value;
  if(!phone||!cname||!typeId){ toast('모든 항목을 입력하세요'); return; }
  var mbType = (window._mbTypeDocs||[]).find(function(t){ return t.id===typeId; });
  if(!mbType){ toast('상품을 선택하세요'); return; }

  var now = new Date();
  var startDate = now.toISOString().slice(0,10);
  var endDate = '';
  if(mbType.mbType === 'period') {
    var exp = new Date(now);
    exp.setDate(exp.getDate() + mbType.value);
    endDate = exp.toISOString().slice(0,10);
  }

  _db.collection('mbetco_memberships').add({
    dealerId:did, custPhone:phone, custName:cname,
    mbTypeId:typeId, mbTypeName:mbType.name,
    mbType:mbType.mbType, price:mbType.price,
    totalValue:mbType.value, remainValue:mbType.value,
    payMethod:pay, startDate:startDate, endDate:endDate,
    active:true, createdAt:now.toISOString()
  }).then(function(){
    // 매출에도 기록
    _db.collection('mbetco_sales').add({
      dealerId:did, custName:cname, custPhone:phone,
      serviceNames:'회원권: '+mbType.name,
      finalPrice:mbType.price, payMethod:pay,
      date:startDate, ym:startDate.slice(0,7),
      isMembership:true, createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('✅ 회원권 발급 완료');
    _mbSellForm(document.getElementById('mb-content'));
  });
}

function _mbList(c) {
  var did = window._mbDid;
  c.innerHTML = '<div style="text-align:center;padding:16px;color:#475569">⏳</div>';
  _db.collection('mbetco_memberships').where('dealerId','==',did)
    .where('active','==',true).orderBy('createdAt','desc').limit(30).get()
    .then(function(snap) {
      if(snap.empty){ c.innerHTML='<div style="text-align:center;padding:16px;color:#475569">발급된 회원권 없음</div>'; return; }
      var today = new Date().toISOString().slice(0,10);
      var tl = {amount:'금액권',count:'횟수권',period:'기간권'};
      c.innerHTML = snap.docs.map(function(doc){
        var v = doc.data();
        var expired = v.mbType==='period' && v.endDate && v.endDate < today;
        var remaining = v.mbType==='amount' ? '₩'+v.remainValue.toLocaleString()+'원 잔액' :
                        v.mbType==='count' ? v.remainValue+'회 남음' :
                        expired ? '만료' : v.endDate+'까지';
        return '<div style="background:var(--bg2,#0d1b3e);border:1px solid '+(expired?'rgba(239,68,68,.3)':'var(--border,rgba(0,102,255,.2))')+';border-radius:10px;padding:12px;margin-bottom:8px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<div>' +
              '<div style="font-size:13px;font-weight:800">' + v.custName + ' <span style="font-size:10px;color:#94a3b8">' + v.custPhone + '</span></div>' +
              '<div style="font-size:11px;color:#00d4ff;margin-top:2px">' + v.mbTypeName + ' · ' + (tl[v.mbType]||'') + '</div>' +
            '</div>' +
            '<div style="text-align:right">' +
              '<div style="font-size:13px;font-weight:800;color:'+(expired?'#ef4444':'#22c55e')+'">' + remaining + '</div>' +
              (v.mbType!=='period' ? '<button onclick="_useMembership(\'' + doc.id + '\',\'' + v.mbType + '\',' + v.remainValue + ')" style="margin-top:4px;padding:4px 8px;background:rgba(0,102,255,.15);color:#0066ff;border:none;border-radius:6px;font-size:10px;cursor:pointer">사용</button>' : '') +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    });
}

function _useMembership(id, mbType, remain) {
  var use = parseInt(prompt(mbType==='amount'?'사용 금액 입력':'사용 횟수 입력 (남은: '+remain+'회)', mbType==='count'?'1':'') || '0');
  if(!use||use<=0) return;
  if(use > remain){ toast('잔여량 초과'); return; }
  var newRemain = remain - use;
  _db.collection('mbetco_memberships').doc(id).update({
    remainValue: newRemain,
    active: newRemain > 0
  }).then(function(){
    toast('✅ 사용 처리 완료 (잔여: ' + newRemain + ')');
    _mbList(document.getElementById('mb-content'));
  });
}

function _slipShift(dir) {
  var ym = window._slipYm;
  var d = new Date(ym+'-01'); d.setMonth(d.getMonth()+dir);
  window._slipYm = d.toISOString().slice(0,7);
  var lbl = document.getElementById('slip-ym');
  if(lbl) lbl.textContent = window._slipYm;
  var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');
  _loadPayslips(did, window._slipYm);
}

function _loadPayslips(did, ym) {
  Promise.all([
    _db.collection('mbetco_workers').where('dealerId','==',did).where('active','==',true).get(),
    _db.collection('mbetco_sales').where('dealerId','==',did).where('ym','==',ym).get(),
    _db.collection('attendance').where('dealerId','==',did).where('ym','==',ym).get()
  ]).then(function(results) {
    var workers=[]; results[0].forEach(function(d){ workers.push(Object.assign({id:d.id},d.data())); });
    var sales=[]; results[1].forEach(function(d){ sales.push(d.data()); });
    var attends=[]; results[2].forEach(function(d){ attends.push(d.data()); });

    var el = document.getElementById('slip-list');
    if(!el) return;
    if(!workers.length){ el.innerHTML='<div style="text-align:center;padding:16px;color:#475569">등록된 직원 없음</div>'; return; }

    // 직원별 출퇴근 집계
    var workerAttend = {};
    attends.forEach(function(a) {
      var wid = a.workerId||a.workerName||'';
      if(!workerAttend[wid]) workerAttend[wid]={days:0,hours:0,overtime:0,night:0,holiday:0};
      workerAttend[wid].days++;
      var hrs = parseFloat(a.workHours||a.hours||8);
      workerAttend[wid].hours += hrs;
      if(hrs > 8) workerAttend[wid].overtime += (hrs-8);
    });

    // 직원별 매출
    var workerSales={};
    sales.forEach(function(s){
      var wid=s.designerId||s.workerIds&&s.workerIds[0]||s.designerName||'';
      if(!workerSales[wid]) workerSales[wid]=0;
      workerSales[wid]+=s.finalPrice||0;
    });

    el.innerHTML = workers.map(function(w) {
      var att = workerAttend[w.id]||workerAttend[w.name]||{days:0,hours:0,overtime:0,night:0,holiday:0};
      var salesAmt = workerSales[w.id]||workerSales[w.name]||0;
      var base = w.basePay||0;
      var commission = (w.payType==='commission'||w.payType==='mixed') ? Math.round(salesAmt*((w.commissionRate||0)/100)) : 0;
      var overtime = Math.round((base/209)*(att.overtime||0)*1.5);
      var night = Math.round((base/209)*(att.night||0)*0.5);
      var gross = base + commission + overtime + night;
      var calc = _calcInsurance(gross, w.employType||'employee');
      var payDate = ym + '-25'; // 기본 25일
      var tl = {employee:'직원',contractor:'사업자',freelancer:'프리랜서'};

      return '<div style="background:var(--bg2,#0d1b3e);border:1px solid var(--border,rgba(0,102,255,.2));border-radius:12px;padding:14px;margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
          '<div>' +
            '<div style="font-size:13px;font-weight:800">' + w.name + '</div>' +
            '<div style="font-size:10px;color:#94a3b8">' + (tl[w.employType]||'직원') + ' · ' + (w.role||'') + '</div>' +
          '</div>' +
          '<button onclick="_printPayslip(\'' + w.id + '\',\'' + w.name + '\',' + gross + ',' + calc.netPay + ',\'' + ym + '\',\'' + payDate + '\','+ att.days + ',' + att.hours + ',' + (att.overtime||0) + ',' + commission + ',' + overtime + '," + JSON.stringify(calc.deductions) + ")" style="padding:6px 10px;background:rgba(0,102,255,.15);color:#0066ff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">📄 명세서</button>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">' +
          '<div style="background:rgba(0,0,0,.2);border-radius:6px;padding:8px"><div style="color:#475569">근무일수</div><div style="font-weight:700;margin-top:2px">' + att.days + '일</div></div>' +
          '<div style="background:rgba(0,0,0,.2);border-radius:6px;padding:8px"><div style="color:#475569">총 근무시간</div><div style="font-weight:700;margin-top:2px">' + att.hours.toFixed(1) + 'h</div></div>' +
          '<div style="background:rgba(0,0,0,.2);border-radius:6px;padding:8px"><div style="color:#475569">총 지급액</div><div style="font-weight:700;color:#0066ff;margin-top:2px">₩' + gross.toLocaleString() + '</div></div>' +
          '<div style="background:rgba(0,0,0,.2);border-radius:6px;padding:8px"><div style="color:#475569">실수령액</div><div style="font-weight:700;color:#22c55e;margin-top:2px">₩' + calc.netPay.toLocaleString() + '</div></div>' +
        '</div>' +
      '</div>';
    }).join('');
  });
}

function _printPayslip(wid, wname, gross, net, ym, payDate, days, hours, overtime, commission, overtimePay, deductions) {
  if(typeof deductions === 'string') { try{ deductions=JSON.parse(deductions); }catch(e){ deductions={}; } }

  var html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;overflow-y:auto;padding:16px" onclick="this.remove()">' +
    '<div style="background:#fff;border-radius:12px;padding:20px;max-width:400px;margin:0 auto;color:#1e293b" onclick="event.stopPropagation()">' +

        '<div style="font-size:16px;font-weight:900;color:#0066ff">임금명세서</div>' +
        '<div style="font-size:11px;color:#64748b;margin-top:2px">근로기준법 제48조 · ' + ym + '</div>' +
      '</div>' +
      // 근로자 정보
      '<div style="background:#f8fafc;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px">' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">' +
          '<div><span style="color:#64748b">성명</span><br><strong>' + wname + '</strong></div>' +
          '<div><span style="color:#64748b">임금지급일</span><br><strong>' + payDate + '</strong></div>' +
          '<div><span style="color:#64748b">근로일수</span><br><strong>' + days + '일</strong></div>' +
          '<div><span style="color:#64748b">총 근무시간</span><br><strong>' + hours + 'h</strong></div>' +
          (overtime > 0 ? '<div><span style="color:#64748b">연장근로</span><br><strong>' + overtime + 'h</strong></div>' : '') +
        '</div>' +
      '</div>' +
      // 지급 내역
      '<div style="margin-bottom:12px">' +
        '<div style="font-size:12px;font-weight:700;color:#0066ff;margin-bottom:6px">지급 내역</div>' +
        _payslipRow('기본급', gross - commission - overtimePay) +
        (commission>0 ? _payslipRow('수수료', commission) : '') +

        '<div style="border-top:1px solid #e2e8f0;margin-top:6px;padding-top:6px">' +
          _payslipRow('임금 합계', gross, true) +
        '</div>' +
      '</div>' +
      // 공제 내역
      '<div style="margin-bottom:12px">' +
        '<div style="font-size:12px;font-weight:700;color:#ef4444;margin-bottom:6px">공제 내역</div>' +
        Object.entries(deductions).map(function(e){ return _payslipRow(dLabels[e[0]]||e[0], e[1]); }).join('') +
        '<div style="border-top:1px solid #e2e8f0;margin-top:6px;padding-top:6px">' +
          _payslipRow('공제 합계', totalDed, true, '#ef4444') +
        '</div>' +
      '</div>' +
      // 실수령액
      '<div style="background:linear-gradient(135deg,#0066ff,#00d4ff);border-radius:10px;padding:14px;text-align:center;color:#fff;margin-bottom:14px">' +
        '<div style="font-size:11px;opacity:.8">실수령액</div>' +
        '<div style="font-size:24px;font-weight:900">₩' + net.toLocaleString() + '</div>' +
      '</div>' +
      '<div style="font-size:10px;color:#94a3b8;text-align:center;margin-bottom:12px">' +
        '이 명세서는 근로기준법 제48조에 따라 발급됩니다' +
      '</div>' +
      '<div style="display:flex;gap:8px">' +
        '<button onclick="window.print()" style="flex:1;padding:10px;background:#0066ff;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">🖨️ 인쇄</button>' +
        '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="flex:1;padding:10px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:12px;cursor:pointer">닫기</button>' +
      '</div>' +

  document.body.insertAdjacentHTML('beforeend', html);

    '<div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:12px;margin-bottom:12px;font-size:11px;color:#94a3b8;line-height:1.7">' +
      '본인은 시술 전 충분한 상담을 받았으며, 위에 기재한 알러지 및 특이사항 외에 해당 시술에 영향을 미칠 수 있는 의학적 사항이 없음을 확인합니다. 시술 중 발생할 수 있는 일반적인 부작용(두피 자극, 색상 편차 등)에 대해 안내받았으며 이에 동의합니다.' +
    '</div>' +
    '<div style="font-size:12px;font-weight:700;margin-bottom:8px">서명</div>' +
    '<canvas id="sig-canvas" style="width:100%;height:120px;background:#fff;border-radius:8px;touch-action:none;border:1px solid rgba(0,102,255,.2)"></canvas>' +
    '<div style="display:flex;gap:8px;margin-top:8px">' +
      '<button onclick="_clearSig()" style="padding:9px 14px;background:rgba(239,68,68,.12);color:#ef4444;border:none;border-radius:8px;font-size:12px;cursor:pointer">지우기</button>' +
      '<button onclick="_saveConsent()" style="flex:1;padding:9px;background:linear-gradient(135deg,#0066ff,#00d4ff);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">✅ 동의서 저장</button>' +
    '</div>';

  // 서명 캔버스
  setTimeout(function() {
    var canvas = document.getElementById('sig-canvas');
    if(!canvas) return;
    canvas.width = canvas.offsetWidth;
    canvas.height = 120;
    var ctx = canvas.getContext('2d');
    var drawing = false;
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var src = e.touches ? e.touches[0] : e;
      return {x:(src.clientX-rect.left)*(canvas.width/rect.width), y:(src.clientY-rect.top)*(canvas.height/rect.height)};
    }
    canvas.addEventListener('mousedown', function(e){ drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
    canvas.addEventListener('mousemove', function(e){ if(!drawing)return; var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.stroke(); });
    canvas.addEventListener('mouseup', function(){ drawing=false; });
    canvas.addEventListener('touchstart', function(e){ e.preventDefault(); drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
    canvas.addEventListener('touchmove', function(e){ e.preventDefault(); if(!drawing)return; var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.stroke(); });
    canvas.addEventListener('touchend', function(){ drawing=false; });
  }, 100);
}

function _clearSig() {
  var canvas = document.getElementById('sig-canvas');
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

function _loadSchedules(did, date) {
  _db.collection('mbetco_schedules').where('dealerId','==',did).where('date','==',date)
    .orderBy('time','asc').get().then(function(snap) {
      var el = document.getElementById('sch-list');

      el.innerHTML = snap.docs.map(function(doc){
        var v = doc.data();
        var full = v.currentCount >= v.maxCapacity;
        return '<div style="background:var(--bg2,#0d1b3e);border:1px solid '+(full?'rgba(239,68,68,.3)':'var(--border,rgba(0,102,255,.2))')+';border-radius:10px;padding:12px;margin-bottom:8px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<div>' +
              '<div style="font-size:13px;font-weight:800">' + v.time + ' ' + v.title + '</div>' +
              '<div style="font-size:11px;color:#94a3b8;margin-top:2px">' + (v.trainer||'') + '</div>' +
            '</div>' +
            '<div style="text-align:right">' +
              '<div style="font-size:12px;font-weight:700;color:'+(full?'#ef4444':'#22c55e')+'">' + v.currentCount + '/' + v.maxCapacity + '명</div>' +
              '<button onclick="_checkInSchedule(\'' + doc.id + '\',' + v.currentCount + ',' + v.maxCapacity + ')" style="margin-top:4px;padding:4px 8px;background:rgba(0,102,255,.15);color:#0066ff;border:none;border-radius:6px;font-size:10px;cursor:pointer"' + (full?' disabled':'') + '>출석</button>' +

          '</div>' +
        '</div>';

    });
}

function _checkInSchedule(id, cur, max) {
  if(cur >= max){ toast('정원이 찼습니다'); return; }
  _db.collection('mbetco_schedules').doc(id).update({
    currentCount: firebase.firestore.FieldValue.increment(1)

    toast('✅ 출석 처리');
    var today = new Date().toISOString().slice(0,10);
    var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');

  });
}
