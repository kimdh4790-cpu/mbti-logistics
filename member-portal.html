<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<title>FILO — 회원 포털</title>
<style>
:root{--bg:#07071a;--surface:#14142a;--surface2:#1a1a32;--surface3:#20203a;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.12);--tx:#f0f0ff;--t2:#9898c0;--t3:#565678;--br:#7c3aed;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--r:12px;--r-lg:18px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(ellipse at 80% 0%,rgba(8,145,178,.18) 0%,transparent 55%),radial-gradient(ellipse at 10% 100%,rgba(124,58,237,.15) 0%,transparent 55%),var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
.topbar{height:52px;background:rgba(7,7,26,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(8,145,178,.1);display:flex;align-items:center;padding:0 16px;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100}
.logo{font-size:17px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.content{padding:68px 16px 32px;max-width:480px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:18px;margin-bottom:12px}
.hero{background:linear-gradient(135deg,#0a1a2e,#0f1040,#0a0720);border:1px solid rgba(8,145,178,.2);border-radius:var(--r-lg);padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(8,145,178,.2),transparent 70%);pointer-events:none}
.avatar-big{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#0891b2,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;margin-bottom:12px}
.stamp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
.stamp-cell{aspect-ratio:1;border-radius:50%;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:.3s;background:var(--surface2)}
.stamp-cell.filled{background:rgba(245,158,11,.12);border-color:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,.2)}
.stamp-cell.reward{background:rgba(34,197,94,.12);border-color:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.25);animation:glow-green 2s infinite}
@keyframes glow-green{0%,100%{box-shadow:0 0 8px rgba(34,197,94,.2)}50%{box-shadow:0 0 20px rgba(34,197,94,.5)}}
.point-big{font-size:38px;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.tab-row{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:9px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--surface2);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:.2s}
.tab.active{background:rgba(8,145,178,.15);border-color:rgba(8,145,178,.3);color:#38bdf8}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#0891b2,#38bdf8);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(8,145,178,.3);transition:.2s;margin-bottom:8px}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--bd2);border-radius:var(--r);color:var(--t2);font-size:13px;cursor:pointer;margin-bottom:8px}
.reserve-card{background:var(--surface2);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:14px;margin-bottom:8px;transition:.2s}
.reserve-card:hover{border-color:rgba(8,145,178,.3)}
input,select,textarea{width:100%;padding:13px 14px;background:var(--surface2);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:14px;outline:none;transition:.2s;-webkit-appearance:none}
input:focus,select:focus{border-color:#0891b2;box-shadow:0 0 0 3px rgba(8,145,178,.15)}
label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px}
.fg{margin-bottom:14px}
.login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--surface);border:1px solid rgba(8,145,178,.15);border-radius:24px;width:100%;max-width:380px;padding:28px 24px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(20,20,42,.95);backdrop-filter:blur(16px);color:var(--tx);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:200;transition:.35s cubic-bezier(.34,1.56,.64,1);border:1px solid var(--bd2);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease both}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.chip-teal{background:rgba(8,145,178,.12);color:#38bdf8;border:1px solid rgba(8,145,178,.2)}
.chip-green{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.chip-yellow{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.chip-red{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen" class="login-wrap">
<div class="login-card">
  <div style="text-align:center;margin-bottom:20px">
    <div style="width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#0891b2,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px">🎁</div>
    <div style="font-size:19px;font-weight:900;margin-bottom:4px" id="login-store">회원 포털</div>
    <div style="font-size:12px;color:var(--t3)">등록된 연락처로 로그인하세요</div>
  </div>
  <div class="fg"><label>휴대폰 번호</label>
    <input id="l-phone" type="tel" placeholder="010-0000-0000" oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3').substring(0,13)" onkeydown="if(event.key==='Enter')_memberLogin()">
  </div>
  <div id="l-err" style="font-size:11px;color:#ef4444;margin-bottom:10px;display:none"></div>
  <button class="btn-primary" onclick="_memberLogin()">로그인</button>
  <button class="btn-secondary" onclick="location.href='/member-join?did='+_did">처음 방문이신가요? 회원가입</button>
</div>
</div>

<!-- 메인 앱 -->
<div id="app" style="display:none">
<div class="topbar">
  <div class="logo">FILO</div>
  <div style="font-size:12px;color:var(--t2)" id="topbar-name"></div>
  <button onclick="_logout()" style="margin-left:auto;background:none;border:1px solid var(--bd2);border-radius:8px;color:var(--t3);font-size:11px;cursor:pointer;padding:4px 10px">로그아웃</button>
</div>
<div class="content">

  <!-- 회원 프로필 -->
  <div class="hero fade-up">
    <div class="avatar-big" id="mem-avatar">?</div>
    <div style="position:relative;z-index:1">
      <div style="font-size:20px;font-weight:900;margin-bottom:4px" id="mem-name">-</div>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <span class="chip chip-teal" id="mem-grade">일반</span>
        <span class="chip chip-yellow" id="mem-visit">방문 0회</span>
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,.4)">가입일 <span id="mem-joined">-</span></div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-row">
    <div class="tab active" onclick="_switchTab('point')" id="tab-point">⭐ 포인트</div>
    <div class="tab" onclick="_switchTab('stamp')" id="tab-stamp">🎫 스탬프</div>
    <div class="tab" onclick="_switchTab('reserve')" id="tab-reserve">🗓 예약</div>
    <div class="tab" onclick="_switchTab('history')" id="tab-history">📋 내역</div>
  </div>

  <!-- 포인트 탭 -->
  <div id="pane-point">
    <div class="card" style="text-align:center;padding:24px">
      <div style="font-size:11px;color:var(--t3);margin-bottom:8px;letter-spacing:.8px;text-transform:uppercase">보유 포인트</div>
      <div class="point-big" id="point-amount">0</div>
      <div style="font-size:12px;color:var(--t3);margin-top:6px">P</div>
      <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:var(--surface2);border-radius:10px;padding:12px">
          <div style="font-size:10px;color:var(--t3);margin-bottom:4px">이번달 적립</div>
          <div style="font-size:16px;font-weight:900;color:#22c55e" id="point-earned">+0P</div>
        </div>
        <div style="background:var(--surface2);border-radius:10px;padding:12px">
          <div style="font-size:10px;color:var(--t3);margin-bottom:4px">이번달 사용</div>
          <div style="font-size:16px;font-weight:900;color:#ef4444" id="point-used">-0P</div>
        </div>
      </div>
    </div>
    <!-- 포인트 안내 -->
    <div class="card" style="background:linear-gradient(135deg,rgba(8,145,178,.08),rgba(124,58,237,.06));border-color:rgba(8,145,178,.2)">
      <div style="font-size:13px;font-weight:800;margin-bottom:8px">💡 포인트 적립 안내</div>
      <div style="font-size:12px;color:var(--t2);line-height:1.7">
        • 결제금액의 5% 자동 적립<br>
        • 100P = ₩100 사용 가능<br>
        • 포인트는 다음 방문 시 사용<br>
        • 유효기간: 마지막 방문 후 1년
      </div>
    </div>
  </div>

  <!-- 스탬프 탭 -->
  <div id="pane-stamp" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;font-weight:800">스탬프 현황</div>
        <div style="font-size:12px;color:var(--t3)"><span id="stamp-count" style="font-weight:900;color:#f59e0b">0</span>/10개</div>
      </div>
      <div class="stamp-grid" id="stamp-grid-view"></div>
      <div style="font-size:12px;color:var(--t3);text-align:center;margin-top:8px" id="stamp-msg"></div>
      <div style="margin-top:12px;padding:10px 14px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:10px;font-size:11px;color:var(--t2)">
        ⭐ 결제 시 스탬프 1개 자동 적립 · 10개 완성 시 무료 음료 1잔
      </div>
    </div>
  </div>

  <!-- 예약 탭 -->
  <div id="pane-reserve" style="display:none">
    <!-- 예약 추가 버튼 -->
    <button class="btn-primary" onclick="_showReserveForm()">+ 새 예약하기</button>

    <!-- 예약 폼 (숨김) -->
    <div id="reserve-form" style="display:none" class="card">
      <div style="font-size:14px;font-weight:800;margin-bottom:14px">🗓 예약 신청</div>
      <div class="fg"><label>날짜 *</label>
        <input id="rv-date" type="date">
      </div>
      <div class="fg"><label>시간 *</label>
        <input id="rv-time" type="time" value="10:00">
      </div>
      <div class="fg"><label>서비스 / 내용</label>
        <input id="rv-service" type="text" placeholder="예: 커트, 네일, 마사지...">
      </div>
      <div class="fg"><label>요청사항</label>
        <input id="rv-memo" type="text" placeholder="특이사항을 입력해 주세요">
      </div>
      <button class="btn-primary" onclick="_submitReserve()">예약 신청</button>
      <button class="btn-secondary" onclick="document.getElementById('reserve-form').style.display='none'">취소</button>
    </div>

    <!-- 예약 목록 -->
    <div id="reserve-list"><div style="text-align:center;padding:30px;color:var(--t3)">⏳ 로딩 중...</div></div>
  </div>

  <!-- 방문 내역 탭 -->
  <div id="pane-history" style="display:none">
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px">방문 내역</div>
      <div id="history-list"><div style="text-align:center;padding:20px;color:var(--t3)">⏳</div></div>
    </div>
  </div>

</div>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var _db=null,_did='',_memberData={},_memberId='';

function _init(){
  var cfg={apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',authDomain:'mbti-logistics.firebaseapp.com',projectId:'mbti-logistics',storageBucket:'mbti-logistics.appspot.com',messagingSenderId:'862900137263',appId:'1:862900137263:web:a1b2c3d4e5f6a7b8'};
  firebase.initializeApp(cfg);
  _db=firebase.firestore();

  var params=new URLSearchParams(location.search);
  _did=params.get('did')||'';

  /* 매장명 */
  if(_did) _db.collection('companies').doc(_did).get().then(function(doc){
    if(doc.exists) document.getElementById('login-store').textContent=(doc.data().companyName||doc.data().name||'')+'  회원 포털';
  });

  /* 예약 날짜 최솟값 */
  document.getElementById('rv-date').min=new Date().toISOString().slice(0,10);

  /* 세션 복원 */
  var saved=sessionStorage.getItem('filo_member');
  if(saved){
    var s=JSON.parse(saved);
    if(s.did===_did){_did=s.did;_memberId=s.id;_memberData=s.data;_showApp();}
  }
}

function _memberLogin(){
  var phone=(document.getElementById('l-phone').value||'').replace(/-/g,'');
  if(phone.length<10){_showErr('올바른 연락처를 입력하세요');return;}
  if(!_did){_showErr('URL에 매장 정보가 없습니다');return;}

  _db.collection('filo_customers')
    .where('dealerId','==',_did)
    .where('phone','==',phone)
    .get().then(function(snap){
      if(snap.empty){
        _showErr('등록된 회원이 아닙니다.\n회원가입을 먼저 해주세요');
        return;
      }
      _memberId=snap.docs[0].id;
      _memberData=snap.docs[0].data();
      sessionStorage.setItem('filo_member',JSON.stringify({did:_did,id:_memberId,data:_memberData}));
      _showApp();
    }).catch(function(e){_showErr(e.message);});
}

function _showErr(msg){
  var el=document.getElementById('l-err');
  el.textContent=msg;el.style.display='block';
}

function _showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';

  var name=_memberData.name||'회원';
  document.getElementById('mem-avatar').textContent=name.slice(0,1);
  document.getElementById('mem-name').textContent=name;
  document.getElementById('topbar-name').textContent=name+'님 환영합니다 👋';
  document.getElementById('mem-visit').textContent='방문 '+(_memberData.visitCount||0)+'회';
  document.getElementById('mem-joined').textContent=(_memberData.joinedAt||'').slice(0,10);

  /* 등급 */
  var visits=_memberData.visitCount||0;
  var grade=visits>=50?'VIP':visits>=20?'골드':visits>=10?'실버':'일반';
  document.getElementById('mem-grade').textContent=grade;

  /* 포인트 */
  document.getElementById('point-amount').textContent=(_memberData.point||0).toLocaleString();
  _loadPointHistory();

  /* 스탬프 */
  _renderStamps(_memberData.stampCount||0);

  /* 예약 */
  _loadReservations();

  /* 방문 내역 */
  _loadHistory();
}

function _loadPointHistory(){
  var now=new Date();
  var ym=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0');
  _db.collection('filo_point_log')
    .where('dealerId','==',_did)
    .where('customerId','==',_memberId)
    .where('date','>=',ym+'-01')
    .get().then(function(snap){
      var earned=0,used=0;
      snap.forEach(function(doc){
        var d=doc.data();
        if(d.amount>0)earned+=d.amount;
        else used+=Math.abs(d.amount);
      });
      document.getElementById('point-earned').textContent='+'+earned+'P';
      document.getElementById('point-used').textContent='-'+used+'P';
    }).catch(function(){});
}

function _renderStamps(count){
  var total=10,filled=count%total,completed=Math.floor(count/total);
  var grid=document.getElementById('stamp-grid-view');
  grid.innerHTML='';
  for(var i=0;i<total;i++){
    var cell=document.createElement('div');
    cell.className='stamp-cell'+(i<filled?' filled':completed>0&&i===filled?' reward':'');
    cell.textContent=i<filled?'⭐':completed>0&&i===filled?'🎁':'○';
    grid.appendChild(cell);
  }
  document.getElementById('stamp-count').textContent=count;
  var remaining=total-(filled);
  document.getElementById('stamp-msg').textContent=
    filled===0&&completed>0?'🎉 무료 음료 '+completed+'잔 사용 가능합니다!':
    remaining>0?remaining+'개 더 모으면 무료 음료 1잔!':'적립 완료! 직원에게 알려주세요';
}

function _loadReservations(){
  var today=new Date().toISOString().slice(0,10);
  _db.collection('filo_bookings')
    .where('dealerId','==',_did)
    .where('phone','>=',((_memberData.phone||'').replace(/-/g,'')))
    .orderBy('phone').orderBy('date','desc').limit(10)
    .get().then(function(snap){
      var el=document.getElementById('reserve-list');
      if(snap.empty){
        el.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3)"><div style="font-size:32px;margin-bottom:8px">📅</div><div>예약 내역이 없습니다</div><div style="font-size:11px;margin-top:6px">위 버튼으로 예약해 보세요</div></div>';
        return;
      }
      var statusLabel={confirmed:'확정',pending:'대기',cancelled:'취소'};
      var statusColor={confirmed:'chip-green',pending:'chip-yellow',cancelled:'chip-red'};
      el.innerHTML=snap.docs.map(function(doc){
        var d=doc.data();
        var isPast=d.date<today;
        return '<div class="reserve-card">'+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
          '<div><div style="font-size:14px;font-weight:800">'+d.date+(d.time?' '+d.time:'')+'</div>'+
          '<div style="font-size:12px;color:var(--t2);margin-top:2px">'+(d.service||'예약')+'</div></div>'+
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+
          '<span class="chip '+statusColor[d.status||'confirmed']+'">'+(statusLabel[d.status||'confirmed'])+'</span>'+
          (!isPast&&(d.status!=='cancelled')?'<button onclick="_cancelReserve(\''+doc.id+'\')" style="font-size:10px;color:var(--red);background:none;border:none;cursor:pointer">취소</button>':'')+
          '</div></div>'+
          (d.memo?'<div style="font-size:11px;color:var(--t3);margin-top:4px">💬 '+d.memo+'</div>':'')+
          '</div>';
      }).join('');
    }).catch(function(){
      document.getElementById('reserve-list').innerHTML='<div style="text-align:center;padding:20px;color:var(--t3)">예약 내역을 불러올 수 없습니다</div>';
    });
}

function _showReserveForm(){
  var form=document.getElementById('reserve-form');
  form.style.display=form.style.display==='none'?'block':'none';
}

function _submitReserve(){
  var date=document.getElementById('rv-date').value;
  var time=document.getElementById('rv-time').value;
  var service=document.getElementById('rv-service').value;
  var memo=document.getElementById('rv-memo').value;
  if(!date){_toast('날짜를 선택해 주세요');return;}

  _db.collection('filo_bookings').add({
    dealerId:_did,
    customerId:_memberId,
    customerName:_memberData.name||'',
    phone:_memberData.phone||'',
    date:date,time:time,
    service:service||'예약',
    memo:memo,
    status:'pending',
    source:'member_portal',
    createdAt:new Date().toISOString()
  }).then(function(){
    _toast('✅ 예약이 신청됐습니다!');
    document.getElementById('reserve-form').style.display='none';
    document.getElementById('rv-date').value='';
    document.getElementById('rv-service').value='';
    document.getElementById('rv-memo').value='';
    _loadReservations();
  }).catch(function(e){_toast('❌ '+e.message);});
}

function _cancelReserve(id){
  if(!confirm('예약을 취소하시겠습니까?'))return;
  _db.collection('filo_bookings').doc(id).update({status:'cancelled'})
    .then(function(){_toast('예약이 취소됐습니다');_loadReservations();});
}

function _loadHistory(){
  _db.collection('filo_sales')
    .where('dealerId','==',_did)
    .where('customerId','==',_memberId)
    .orderBy('createdAt','desc').limit(10)
    .get().then(function(snap){
      var el=document.getElementById('history-list');
      if(snap.empty){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3)">방문 내역이 없습니다</div>';return;}
      el.innerHTML=snap.docs.map(function(doc){
        var d=doc.data();
        var kst=new Date(new Date(d.createdAt).getTime()+9*3600000);
        var dateStr=(kst.getUTCMonth()+1)+'/'+kst.getUTCDate()+' '+kst.getUTCHours().toString().padStart(2,'0')+':'+kst.getUTCMinutes().toString().padStart(2,'0');
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)">'+
          '<div><div style="font-size:13px;font-weight:700">'+dateStr+'</div>'+
          '<div style="font-size:11px;color:var(--t3)">'+(d.items||[]).map(function(it){return it.name+' x'+it.qty;}).join(', ')+'</div></div>'+
          '<div style="font-size:14px;font-weight:900;color:#22c55e">₩'+(d.total||0).toLocaleString()+'</div></div>';
      }).join('');
    }).catch(function(){});
}

function _switchTab(tab){
  ['point','stamp','reserve','history'].forEach(function(t){
    document.getElementById('pane-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).className='tab'+(t===tab?' active':'');
  });
}

function _logout(){
  sessionStorage.removeItem('filo_member');
  location.reload();
}

function _toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

window.addEventListener('DOMContentLoaded',_init);
</script>
</body>
</html>
