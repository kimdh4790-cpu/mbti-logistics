<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>배달 주문</title>
<style>
:root{
  --brand:#0891b2;--brand-dark:#0e7490;--brand-light:#e0f2fe;
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;
  --text1:#0f172a;--text2:#475569;--text3:#94a3b8;
  --red:#ef4444;--green:#22c55e;
  --radius:16px;--radius-sm:12px;
  --shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.16);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif;color:var(--text1)}

/* 로딩 */
#ld{position:fixed;inset:0;background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#ld .logo{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 헤더 */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 16px;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.store-info{display:flex;flex-direction:column;gap:2px}
.store-nm{font-size:17px;font-weight:900;letter-spacing:-.3px}
.store-sub{font-size:11px;color:var(--text3);font-weight:600}
.lang-row{display:flex;gap:4px}
.lb{height:28px;padding:0 10px;border:1.5px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--text2);transition:.15s}
.lb.on{background:var(--brand);color:#fff;border-color:var(--brand)}

/* 탭 (배달/픽업) */
#tab-wrap{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 16px;gap:0;flex-shrink:0}
.tab-btn{flex:1;height:44px;border:none;background:none;font-size:14px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab-btn.on{color:var(--brand);border-color:var(--brand)}

/* 카테고리 탭 */
#cat-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
#cat-wrap::-webkit-scrollbar{display:none}
#cat-bar{display:flex;padding:0 10px;gap:4px;height:44px;align-items:center;white-space:nowrap}
.cat-btn{height:34px;padding:0 16px;border-radius:20px;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;flex-shrink:0;transition:.2s}
.cat-btn.on{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(8,145,178,.3)}

/* 앱 레이아웃 */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 140px}
#menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}

/* 메뉴 카드 - 풀스크린 이미지 */
.mi{background:var(--surface);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;transition:.2s;box-shadow:var(--shadow)}
.mi:active{transform:scale(.97)}
.mi-img-wrap{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden}
.mi-img{width:100%;height:100%;object-fit:cover;display:block;transition:.3s}
.mi:active .mi-img{transform:scale(1.03)}
.mi-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:40px 12px 12px}
.mi-name-img{font-size:14px;font-weight:800;color:#fff;line-height:1.3;word-break:keep-all}
.mi-tr-img{font-size:11px;color:rgba(255,255,255,.8);font-weight:600;margin-top:2px;min-height:14px}
.mi-price-img{font-size:15px;font-weight:900;color:#fff;margin-top:4px}
.mi-emoji-wrap{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f9ff,#e0f2fe)}
.mi-emoji{font-size:56px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.1))}
.mi-body{padding:10px 12px 14px}
.mi-name{font-size:13px;font-weight:700;color:var(--text1);line-height:1.4;margin-bottom:3px}
.mi-tr{font-size:11px;color:var(--brand);font-weight:600;margin-bottom:3px;min-height:15px}
.mi-price{font-size:15px;font-weight:900;color:var(--brand)}
.mi-sold{position:absolute;inset:0;background:rgba(255,255,255,.75);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);border-radius:var(--radius)}
.mi-badge{position:absolute;top:8px;right:8px;background:var(--brand);color:#fff;font-size:11px;font-weight:900;min-width:22px;height:22px;border-radius:11px;display:none;align-items:center;justify-content:center;padding:0 6px;box-shadow:0 2px 8px rgba(8,145,178,.5)}
.mi-badge.on{display:flex}

/* 장바구니 FAB */
#cart-fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;border:none;border-radius:50px;padding:0 28px;height:56px;font-size:15px;font-weight:800;cursor:pointer;display:none;box-shadow:0 8px 28px rgba(8,145,178,.5);z-index:200;white-space:nowrap;align-items:center;gap:10px;transition:.3s}
#cart-fab.show{display:flex;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.fab-price{opacity:.9;font-weight:700;font-size:14px}

/* 오버레이 */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;backdrop-filter:blur(3px)}

/* 장바구니 시트 */
#cart-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;box-shadow:0 -4px 40px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:400;max-height:90vh;display:flex;flex-direction:column}
#cart-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0}
.sheet-hdr{padding:14px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sheet-title{font-size:17px;font-weight:900}
.sheet-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text3);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#cart-list{overflow-y:auto;padding:8px 20px;flex:1}
.ci{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.ci-emoji{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.ci-img{width:44px;height:44px;object-fit:cover;border-radius:8px;flex-shrink:0}
.ci-name{flex:1;font-size:13px;font-weight:700;color:var(--text1);line-height:1.4}
.ci-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ci-ctrl button{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--surface);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:.1s}
.ci-ctrl button:active{background:var(--brand);border-color:var(--brand);color:#fff}
.ci-qty{font-size:15px;font-weight:900;min-width:22px;text-align:center}
.ci-price{font-size:13px;font-weight:800;color:var(--brand);min-width:68px;text-align:right;flex-shrink:0}

/* 배달 정보 */
#delivery-section{padding:12px 20px 8px;border-top:1px solid var(--border)}
.ds-title{font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ds-inputs{display:flex;flex-direction:column;gap:8px}
.ds-row{display:flex;gap:8px}
.ds-input{flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text1);outline:none;background:var(--surface);transition:.15s}
.ds-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.addr-btn{width:100%;padding:12px 14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--brand);background:var(--brand-light);cursor:pointer;text-align:left;transition:.15s}

/* 합계 + 주문 버튼 */
#cart-footer{padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(14px,env(safe-area-inset-bottom))}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.total-label{font-size:14px;color:var(--text2);font-weight:600}
.total-price{font-size:24px;font-weight:900;color:var(--brand)}
#order-btn{width:100%;height:54px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;cursor:pointer;transition:.15s;box-shadow:0 4px 16px rgba(8,145,178,.4)}
#order-btn:active{background:var(--brand-dark);transform:scale(.99)}
#order-btn:disabled{background:var(--border);cursor:not-allowed;color:var(--text3);box-shadow:none}

/* 메뉴 상세 모달 */
#tl-mdl{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end;backdrop-filter:blur(4px);pointer-events:none;opacity:0;transition:opacity .2s}
#tl-mdl.open{pointer-events:all;opacity:1}
#tl-box{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding-bottom:32px}
.mdl-img-full{width:100%;max-height:280px;object-fit:cover;display:block}
.mdl-emoji{font-size:80px;text-align:center;padding:28px 0 16px;display:block;line-height:1;background:linear-gradient(135deg,#f0f9ff,#e0f2fe)}
.mdl-content{padding:20px 20px 0}
.mdl-name{font-size:22px;font-weight:900;text-align:center;margin-bottom:4px;letter-spacing:-.3px}
.mdl-tr{font-size:14px;color:var(--brand);text-align:center;margin-bottom:8px;min-height:20px;font-weight:600}
.mdl-desc{font-size:13px;color:var(--text2);text-align:center;line-height:1.7;margin-bottom:14px;padding:0 8px}
.mdl-price{font-size:28px;font-weight:900;color:var(--brand);text-align:center;margin-bottom:20px}
.mdl-qty-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.mdl-qty-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--surface);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:.1s}
.mdl-qty-btn:active{background:var(--brand);border-color:var(--brand);color:#fff}
.mdl-qty{font-size:22px;font-weight:900;min-width:36px;text-align:center}
.tl-spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(8,145,178,.3);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
.mdl-btns{display:flex;gap:8px;padding:0 20px;margin-bottom:8px}
.mdl-close-btn{width:48px;height:54px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);font-size:20px;cursor:pointer;flex-shrink:0}
.mdl-add{flex:1;height:54px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;cursor:pointer;transition:.15s;box-shadow:0 4px 16px rgba(8,145,178,.4)}
.mdl-add:active{background:var(--brand-dark)}

/* 완료 화면 */
#dn{position:fixed;inset:0;background:linear-gradient(135deg,#f0f9ff,#fff);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:600;padding:32px;text-align:center}
.dn-circle{width:88px;height:88px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 24px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(34,197,94,.4)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.dn-title{font-size:26px;font-weight:900;margin-bottom:8px;letter-spacing:-.5px}
.dn-sub{font-size:15px;color:var(--text2);margin-bottom:28px}
#dn-back{padding:16px 36px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(8,145,178,.4)}

/* 주소 팝업 */
#addr-popup{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:700;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
#addr-popup.open{display:flex}
.ap-box{background:var(--surface);border-radius:var(--radius);padding:24px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.ap-title{font-size:17px;font-weight:900;margin-bottom:16px}
.ap-input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;margin-bottom:10px;transition:.15s}
.ap-input:focus{border-color:var(--brand)}
.ap-row{display:flex;gap:10px;margin-top:6px}
.ap-ok{flex:1;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer}
.ap-cancel{padding:13px 18px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;color:var(--text2)}
.empty{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1}
.empty-ico{font-size:48px;margin-bottom:16px;opacity:.5}
</style>
</head>
<body>

<div id="ld">
  <div class="logo">🛵 FILO</div>
  <div class="spinner"></div>
</div>

<div id="app" style="display:none">
  <div id="hdr">
    <div class="store-info">
      <div class="store-nm" id="store-name">매장</div>
      <div class="store-sub" id="store-sub">배달 · 픽업</div>
    </div>
    <div class="lang-row">
      <button class="lb on" id="lb-ko" onclick="_setLang('ko')">KO</button>
      <button class="lb" id="lb-en" onclick="_setLang('en')">EN</button>
      <button class="lb" id="lb-zh" onclick="_setLang('zh')">中</button>
      <button class="lb" id="lb-ja" onclick="_setLang('ja')">日</button>
    </div>
  </div>
  <div id="tab-wrap">
    <button class="tab-btn on" id="tab-menu" onclick="_switchTab('menu')">🍽 메뉴</button>
    <button class="tab-btn" id="tab-delivery" onclick="_switchTab('delivery')">🛵 배달정보</button>
  </div>
  <div id="cat-wrap" style="display:none"><div id="cat-bar"></div></div>
  <div id="scroll-area"><div id="menu-grid"></div></div>
  <!-- 배달정보 탭 -->
  <div id="delivery-tab" style="display:none;flex:1;overflow-y:auto;padding:20px">
    <div style="background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)">
      <div style="font-size:15px;font-weight:900;margin-bottom:16px">📍 배달 정보 입력</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="addr-btn" id="addr-btn2" onclick="_searchAddr()" style="text-align:left;padding:14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:var(--brand-light);color:var(--brand);font-size:13px;font-weight:600;cursor:pointer">📍 주소를 입력해주세요</button>
        <div style="display:flex;gap:8px">
          <input class="ds-input" id="cust-name2" placeholder="이름" style="flex:1">
          <input class="ds-input" id="cust-phone2" type="tel" placeholder="010-0000-0000" style="flex:1">
        </div>
        <input class="ds-input" id="cust-memo2" placeholder="요청사항">
      </div>
    </div>
  </div>
</div>

<button id="cart-fab" onclick="_openCart()">
  🛒 <span id="fab-cnt">0</span>개
  <span class="fab-price" id="fab-price">₩0</span>
  &nbsp;·&nbsp; <span id="fab-label">주문하기</span>
</button>

<div id="overlay" onclick="_closeCart()"></div>

<div id="cart-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-title" id="cart-title">🛒 장바구니</div>
    <button class="sheet-close" onclick="_closeCart()">✕</button>
  </div>
  <div id="cart-list"></div>
  <div id="delivery-section" style="display:none">
    <div class="ds-title" id="ds-title">배달 정보</div>
    <div class="ds-inputs">
      <button class="addr-btn" id="addr-btn" onclick="_searchAddr()">📍 주소를 입력해주세요</button>
      <div class="ds-row">
        <input class="ds-input" id="cust-name" placeholder="이름">
        <input class="ds-input" id="cust-phone" type="tel" placeholder="010-0000-0000">
      </div>
      <input class="ds-input" id="cust-memo" placeholder="요청사항">
    </div>
  </div>
  <div id="cart-footer">
    <div class="total-row">
      <span class="total-label" id="tl-total">합계</span>
      <span class="total-price" id="total-price">₩0</span>
    </div>
    <button id="order-btn" onclick="_submitOrder()">주문하기</button>
  </div>
</div>

<!-- 메뉴 상세 모달 -->
<div id="tl-mdl" onclick="if(event.target===this)_closeTlMdl()">
  <div id="tl-box">
    <div class="mdl-content">
      <div class="mdl-name" id="tl-name"></div>
      <div class="mdl-tr" id="tl-tr"></div>
      <div class="mdl-desc" id="tl-desc"></div>
      <div class="mdl-price" id="tl-price"></div>
      <div class="mdl-qty-row">
        <button class="mdl-qty-btn" onclick="_tlQty(-1)">−</button>
        <span class="mdl-qty" id="tl-qty">1</span>
        <button class="mdl-qty-btn" onclick="_tlQty(1)">+</button>
      </div>
    </div>
    <div class="mdl-btns">
      <button class="mdl-close-btn" onclick="_closeTlMdl()">✕</button>
      <button class="mdl-add" id="tl-add" onclick="_addFromTlMdl()">담기 — ₩0</button>
    </div>
  </div>
</div>

<div id="dn" style="display:none">
  <div class="dn-circle">✓</div>
  <div class="dn-title" id="dn-msg">주문 완료!</div>
  <div class="dn-sub" id="dn-sub">곧 준비해드릴게요 😊</div>
  <button id="dn-back" onclick="location.reload()">메뉴로 돌아가기</button>
</div>

<div id="addr-popup">
  <div class="ap-box">
    <div class="ap-title">📍 배달 주소 입력</div>
    <input class="ap-input" id="ap-addr" placeholder="도로명 주소">
    <input class="ap-input" id="ap-detail" placeholder="상세주소">
    <div class="ap-row">
      <button class="ap-ok" onclick="_confirmAddr()">확인</button>
      <button class="ap-cancel" onclick="_closeAddrPopup()">취소</button>
    </div>
  </div>
</div>

<!-- 토스페이먼츠 SDK -->
<script src="https://js.tosspayments.com/v1/payment"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/filo-order-common.js?v=2"></script>
<script src="/store.js?v=3"></script>
</body>
</html>
