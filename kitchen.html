<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FILO — 주방화면</title>
<style>
:root{--bg:#080810;--surface:#18182e;--surface2:#1e1e36;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.12);--tx:#f2f2ff;--t2:#a0a0c0;--t3:#606080;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
.topbar{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(8,8,16,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;z-index:100;gap:12px}
.logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.content{padding:70px 16px 20px}
.order-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.order-card{background:var(--surface);border:1px solid var(--bd2);border-radius:18px;overflow:hidden;transition:.2s;animation:slideUp .3s ease both}
.order-card.new-order{border-color:#f59e0b;box-shadow:0 0 20px rgba(245,158,11,.3);animation:newOrder .5s ease both}
@keyframes newOrder{0%{transform:scale(.95);opacity:0;border-color:#f59e0b}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.order-header{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.table-name{font-size:18px;font-weight:900}
.order-time{font-size:11px;color:var(--t3)}
.order-items{padding:14px 16px}
.order-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)}
.order-item:last-child{border-bottom:none}
.item-name{font-size:15px;font-weight:700}
.item-qty{font-size:20px;font-weight:900;color:#a78bfa}
.order-footer{padding:12px 16px;display:flex;gap:8px}
.btn-done{flex:2;padding:12px;background:linear-gradient(135deg,#22c55e,#10b981);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.btn-cancel{flex:1;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:10px;color:#ef4444;font-size:13px;font-weight:700;cursor:pointer}
.total-badge{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:800;color:#22c55e}
.empty{text-align:center;padding:80px 20px;color:var(--t3)}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 2s infinite;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.count-badge{background:#ef4444;color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-left:8px}
#bell-btn{background:none;border:none;font-size:22px;cursor:pointer;margin-left:auto}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">FILO</div>
  <div style="font-size:14px;font-weight:700">🍳 주방화면</div>
  <div style="font-size:12px;color:var(--t3);display:flex;align-items:center">
    <span class="live-dot"></span>실시간 주문
  </div>
  <div id="order-count" style="margin-left:8px"></div>
  <button id="bell-btn" title="알림음 토글">🔔</button>
  <div id="store-name" style="font-size:12px;color:var(--t3);margin-left:auto"></div>
</div>

<div class="content">
  <div class="order-grid" id="order-grid">
    <div class="empty">
      <div style="font-size:48px;margin-bottom:16px">🍽</div>
      <div style="font-size:16px;font-weight:700;color:var(--t2);margin-bottom:6px">주문 대기 없음</div>
      <div style="font-size:12px">새 주문이 들어오면 여기에 표시됩니다</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var _db=null,_did='',_unsub=null,_soundOn=true,_prevOrderIds=new Set();

function _init(){
  var cfg={apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',authDomain:'mbti-logistics.firebaseapp.com',projectId:'mbti-logistics',storageBucket:'mbti-logistics.appspot.com',messagingSenderId:'862900137263',appId:'1:862900137263:web:a1b2c3d4e5f6a7b8'};
  firebase.initializeApp(cfg);
  _db=firebase.firestore();

  var params=new URLSearchParams(location.search);
  _did=params.get('did')||'';
  if(!_did){
    document.getElementById('order-grid').innerHTML='<div class="empty"><div style="font-size:40px">❌</div><div style="margin-top:12px">?did=회사ID 파라미터 필요</div></div>';
    return;
  }

  /* 매장명 */
  _db.collection('companies').doc(_did).get().then(function(doc){
    if(doc.exists) document.getElementById('store-name').textContent=doc.data().companyName||doc.data().name||'';
  });

  /* 알림음 토글 */
  document.getElementById('bell-btn').onclick=function(){
    _soundOn=!_soundOn;
    this.textContent=_soundOn?'🔔':'🔕';
  };

  /* 실시간 주문 구독 */
  var today=new Date().toISOString().slice(0,10);
  _unsub=_db.collection('filo_sales')
    .where('dealerId','==',_did)
    .where('date','==',today)
    .where('status','==','pending')
    .onSnapshot(function(snap){
      var orders=[];
      snap.forEach(function(doc){orders.push(Object.assign({_id:doc.id},doc.data()));});
      orders.sort(function(a,b){return (a.createdAt||'').localeCompare(b.createdAt||'');});

      /* 새 주문 감지 */
      var newIds=snap.docChanges().filter(function(c){return c.type==='added';}).map(function(c){return c.doc.id;});
      if(newIds.length&&_soundOn) _playSound();

      _render(orders,newIds);
      document.getElementById('order-count').innerHTML=orders.length?
        '<span class="count-badge">'+orders.length+'</span>':'';
    });
}

function _render(orders,newIds){
  var grid=document.getElementById('order-grid');
  if(!orders.length){
    grid.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:16px">✅</div><div style="font-size:16px;font-weight:700;color:var(--t2);margin-bottom:6px">모든 주문 완료!</div><div style="font-size:12px">수고하셨습니다 😊</div></div>';
    return;
  }
  grid.innerHTML='';
  orders.forEach(function(o){
    var kst=new Date(new Date(o.createdAt).getTime()+9*3600000);
    var timeStr=kst.getUTCHours().toString().padStart(2,'0')+':'+kst.getUTCMinutes().toString().padStart(2,'0');
    var isNew=newIds.indexOf(o._id)>=0;

    var card=document.createElement('div');
    card.className='order-card'+(isNew?' new-order':'');

    var hdr=document.createElement('div');
    hdr.className='order-header';
    hdr.innerHTML='<div>'+
      '<div class="table-name">'+(o.tableName||'🏪 카운터')+'</div>'+
      '<div class="order-time">'+timeStr+(o.payMethod?' · '+o.payMethod:'')+'</div>'+
      '</div>'+
      '<span class="total-badge">₩'+Number(o.total||0).toLocaleString()+'</span>';
    card.appendChild(hdr);

    var itemsDiv=document.createElement('div');
    itemsDiv.className='order-items';
    (o.items||[]).forEach(function(it){
      var row=document.createElement('div');
      row.className='order-item';
      row.innerHTML='<span class="item-name">'+it.name+'</span><span class="item-qty">×'+it.qty+'</span>';
      itemsDiv.appendChild(row);
    });
    card.appendChild(itemsDiv);

    var footer=document.createElement('div');
    footer.className='order-footer';
    var doneBtn=document.createElement('button');
    doneBtn.className='btn-done';
    doneBtn.textContent='✅ 완료';
    (function(id){doneBtn.onclick=function(){
      _db.collection('filo_sales').doc(id).update({status:'done',doneAt:new Date().toISOString()});
    };})(o._id);
    var cancelBtn=document.createElement('button');
    cancelBtn.className='btn-cancel';
    cancelBtn.textContent='취소';
    (function(id){cancelBtn.onclick=function(){
      if(confirm('주문을 취소하시겠습니까?'))
        _db.collection('filo_sales').doc(id).update({status:'cancel'});
    };})(o._id);
    footer.appendChild(doneBtn);footer.appendChild(cancelBtn);
    card.appendChild(footer);
    grid.appendChild(card);
  });
}

function _playSound(){
  try{
    var ctx=new AudioContext();
    [440,554,659].forEach(function(freq,i){
      var o=ctx.createOscillator();
      var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;
      g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.15);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.3);
      o.start(ctx.currentTime+i*0.15);
      o.stop(ctx.currentTime+i*0.15+0.3);
    });
  }catch(e){}
}

window.addEventListener('DOMContentLoaded',_init);
window.addEventListener('beforeunload',function(){if(_unsub)_unsub();});
</script>
</body>
</html>
