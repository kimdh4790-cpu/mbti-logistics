<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>용차 — 택배 노선 매칭</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1e293b;border-radius:20px;padding:32px 24px;max-width:380px;width:100%;border:1px solid #334155}
.logo{text-align:center;margin-bottom:24px}
.logo-ico{font-size:40px}
.logo-name{font-size:22px;font-weight:900;color:#f59e0b}
.logo-sub{font-size:12px;color:#64748b;margin-top:2px}
.tabs{display:flex;background:#334155;border-radius:10px;padding:4px;margin-bottom:20px;gap:4px}
.tab{flex:1;padding:8px;border-radius:8px;border:none;background:transparent;color:#64748b;font-size:13px;font-weight:700;cursor:pointer}
.tab.on{background:#f59e0b;color:#000}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.type-card{border:2px solid #334155;border-radius:12px;padding:14px;text-align:center;cursor:pointer}
.type-card.on{border-color:#f59e0b;background:rgba(245,158,11,.1)}
.type-ico{font-size:24px;margin-bottom:4px}
.type-lbl{font-size:12px;font-weight:700}
.type-desc{font-size:10px;color:#64748b;margin-top:2px}
.lbl{font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:6px;display:block}
.inp{width:100%;padding:12px;background:#334155;border:1.5px solid #475569;border-radius:10px;color:#f1f5f9;font-size:14px;outline:none;margin-bottom:12px}
.inp:focus{border-color:#f59e0b}
select.inp{cursor:pointer}
.btn{width:100%;padding:14px;background:#f59e0b;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
.btn:disabled{background:#475569;color:#94a3b8;cursor:not-allowed}
.err{color:#ef4444;font-size:12px;margin-bottom:8px;display:none}
#app{display:none;max-width:480px;width:100%;padding:20px}
.hdr{background:#1e293b;border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:16px;font-weight:900;color:#f59e0b}
.logout{background:none;border:none;color:#64748b;font-size:12px;cursor:pointer}
.home-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:12px;text-align:center}
.big-num{font-size:28px;font-weight:900;color:#f59e0b}
.btn2{width:100%;padding:12px;background:#f59e0b;color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px}
</style>
</head>
<body>
<div id="login-wrap">
<div class="card">
  <div class="logo">
    <div class="logo-ico">🚚</div>
    <div class="logo-name">용차.app</div>
    <div class="logo-sub">택배 노선 매칭 플랫폼</div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-login" onclick="showTab('login')">로그인</button>
    <button class="tab" id="tab-reg" onclick="showTab('reg')">회원가입</button>
  </div>

  <!-- 로그인 -->
  <div id="form-login">
    <label class="lbl">이메일</label>
    <input class="inp" id="l-email" type="email" placeholder="이메일">
    <label class="lbl">비밀번호</label>
    <input class="inp" id="l-pw" type="password" placeholder="비밀번호">
    <div class="err" id="l-err"></div>
    <button class="btn" id="l-btn" onclick="doLogin()">로그인</button>
  </div>

  <!-- 회원가입 -->
  <div id="form-reg" style="display:none">
    <div class="type-row">
      <div class="type-card on" id="t-agency" onclick="setType('agency')">
        <div class="type-ico">🏢</div>
        <div class="type-lbl">대리점</div>
        <div class="type-desc">공고 등록</div>
      </div>
      <div class="type-card" id="t-driver" onclick="setType('driver')">
        <div class="type-ico">🚗</div>
        <div class="type-lbl">기사</div>
        <div class="type-desc">노선 지원</div>
      </div>
    </div>
    <label class="lbl" id="r-name-lbl">대리점명</label>
    <input class="inp" id="r-name" placeholder="이름/상호명">
    <label class="lbl">이메일</label>
    <input class="inp" id="r-email" type="email" placeholder="이메일">
    <label class="lbl">연락처</label>
    <input class="inp" id="r-phone" placeholder="010-0000-0000">
    <label class="lbl">지역</label>
    <select class="inp" id="r-region">
      <option value="">선택</option>
      <option>부산</option><option>대구</option><option>서울</option>
      <option>경기</option><option>인천</option><option>경남</option>
      <option>경북</option><option>전남</option><option>전북</option>
      <option>광주</option><option>대전</option><option>울산</option>
      <option>강원</option><option>충남</option><option>충북</option><option>제주</option>
    </select>
    <label class="lbl">비밀번호 (6자+)</label>
    <input class="inp" id="r-pw" type="password" placeholder="비밀번호">
    <div class="err" id="r-err"></div>
    <button class="btn" id="r-btn" onclick="doRegister()">가입하기</button>
  </div>
</div>
</div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var _db, _auth, _CU = null, _type = 'agency';

firebase.initializeApp({
  apiKey: 'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
  authDomain: 'mbti-logistics.firebaseapp.com',
  projectId: 'mbti-logistics',
  storageBucket: 'mbti-logistics.appspot.com',
  messagingSenderId: '40761160761',
  appId: '1:40761160761:web:20545b610f03f534e949e8'
});
_db   = firebase.firestore();
_auth = firebase.auth();

_auth.onAuthStateChanged(function(u) {
  if(u) {
    _db.collection('yongcha_users').doc(u.uid).get().then(function(snap) {
      if(snap.exists) {
        _CU = Object.assign({uid:u.uid}, snap.data());
        showApp();
      } else {
        showLogin();
      }
    }).catch(function(){ showLogin(); });
  } else {
    showLogin();
  }
});

function showLogin() {
  document.getElementById('login-wrap').style.display = 'block';
  document.getElementById('app').style.display = 'none';
}
function showTab(t) {
  document.getElementById('tab-login').classList.toggle('on', t==='login');
  document.getElementById('tab-reg').classList.toggle('on', t==='reg');
  document.getElementById('form-login').style.display = t==='login'?'block':'none';
  document.getElementById('form-reg').style.display   = t==='reg'?'block':'none';
}
function setType(t) {
  _type = t;
  document.getElementById('t-agency').classList.toggle('on', t==='agency');
  document.getElementById('t-driver').classList.toggle('on', t==='driver');
  document.getElementById('r-name-lbl').textContent = t==='agency'?'대리점명':'이름';
}
function doLogin() {
  var e=(document.getElementById('l-email').value||'').trim();
  var p=(document.getElementById('l-pw').value||'').trim();
  var err=document.getElementById('l-err');
  var btn=document.getElementById('l-btn');
  if(!e||!p){err.textContent='이메일과 비밀번호를 입력하세요';err.style.display='block';return;}
  err.style.display='none';
  btn.textContent='로그인 중...'; btn.disabled=true;
  // Firebase REST API로 직접 로그인 (authDomain 우회)
  fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:e,password:p,returnSecureToken:true})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.error){
      btn.textContent='로그인'; btn.disabled=false;
      var code=data.error.message||'';
      err.textContent=code.includes('WRONG_PASSWORD')||code.includes('INVALID_LOGIN')?'비밀번호가 틀렸어요':
                      code.includes('EMAIL_NOT_FOUND')?'없는 계정이에요':
                      code.includes('TOO_MANY_ATTEMPTS')?'잠시 후 다시 시도하세요':
                      '오류: '+code;
      err.style.display='block';
      return;
    }
    // 로그인 성공 — UID로 Firestore 조회
    var uid=data.localId;
    _db.collection('yongcha_users').doc(uid).get().then(function(snap){
      if(snap.exists){
        _CU=Object.assign({uid:uid},snap.data());
        showApp();
      } else {
        // 계정은 있는데 yongcha_users 없음 — 자동 생성
        btn.textContent='로그인'; btn.disabled=false;
        err.textContent='용차 계정이 없어요. 회원가입 해주세요';
        err.style.display='block';
      }
    }).catch(function(ex){
      btn.textContent='로그인'; btn.disabled=false;
      err.textContent='DB 오류: '+ex.message;
      err.style.display='block';
    });
  }).catch(function(ex){
    btn.textContent='로그인'; btn.disabled=false;
    err.textContent='네트워크 오류: '+ex.message;
    err.style.display='block';
  });
}
function doRegister() {
  var n=(document.getElementById('r-name').value||'').trim();
  var e=(document.getElementById('r-email').value||'').trim();
  var ph=(document.getElementById('r-phone').value||'').trim();
  var rg=(document.getElementById('r-region').value||'').trim();
  var p=(document.getElementById('r-pw').value||'').trim();
  var err=document.getElementById('r-err');
  var btn=document.getElementById('r-btn');
  if(!n||!e||!ph||!rg||!p){err.textContent='모든 항목 입력';err.style.display='block';return;}
  if(p.length<6){err.textContent='비밀번호 6자 이상';err.style.display='block';return;}
  err.style.display='none';
  btn.textContent='가입 중...'; btn.disabled=true;
  _auth.createUserWithEmailAndPassword(e,p).then(function(c){
    return _db.collection('yongcha_users').doc(c.user.uid).set({
      uid:c.user.uid,type:_type,name:n,email:e,phone:ph,region:rg,
      rating:0,reviewCount:0,status:'active',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }).catch(function(ex){
    btn.textContent='가입하기'; btn.disabled=false;
    err.textContent=ex.code==='auth/email-already-in-use'?'이미 사용중인 이메일':'오류: '+ex.message;
    err.style.display='block';
  });
}
function showApp() {
  document.getElementById('login-wrap').style.display='none';
  var app=document.getElementById('app');
  app.style.display='block';
  var isAgency=_CU.type==='agency';
  app.innerHTML=
    '<div class="hdr"><div class="hdr-logo">🚚 용차</div>'+
    '<div><span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;background:'+(isAgency?'rgba(245,158,11,.2)':'rgba(34,197,94,.2)')+';color:'+(isAgency?'#f59e0b':'#22c55e')+'">'+(isAgency?'대리점':'기사')+'</span> '+
    '<span style="font-size:13px;font-weight:600;margin-left:6px">'+_CU.name+'</span>'+
    '<button class="logout" onclick="doLogout()">로그아웃</button></div></div>'+
    '<div class="home-card"><div style="font-size:13px;color:#94a3b8;margin-bottom:8px">'+(isAgency?'🏢 대리점 대시보드':'🚗 기사 대시보드')+'</div>'+
    '<div style="font-size:18px;font-weight:800">'+_CU.name+'님 환영해요!</div>'+
    '<div style="font-size:12px;color:#94a3b8;margin-top:4px">📍 '+(_CU.region||'')+'</div></div>'+
    (isAgency?
    '<button class="btn2" onclick="goPost()">📋 공고 등록하기</button>':
    '<button class="btn2" onclick="goPosts()">🔍 노선 공고 보기</button>');
}
function doLogout(){
  if(!confirm('로그아웃?'))return;
  _auth.signOut().then(showLogin);
}
function goPost(){ alert('공고 등록 — 개발 중!'); }
function goPosts(){ alert('노선 공고 목록 — 개발 중!'); }
</script>
</body>
</html>
