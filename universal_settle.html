<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>정산 자동화 — mbetco</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--bg4:#252840;
  --border:#2e3250;--border2:#3a3f6e;
  --acc:#4f7eff;--acc2:#7c5cff;--acc3:#00d4aa;
  --text:#e8eaf6;--text2:#9ca3c9;--text3:#5c6494;
  --red:#ff4d6d;--green:#00d4aa;--yellow:#ffc53d;--orange:#ff8c42;
  --card-shadow:0 2px 12px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sidebar-logo .logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;}
.sidebar-logo .logo-text{font-weight:700;font-size:15px;letter-spacing:-.3px;}
.sidebar-logo .logo-sub{font-size:9px;color:var(--text3);margin-top:1px;}
.nav{flex:1;overflow-y:auto;padding:8px 0;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;color:var(--text2);transition:all .15s;border-left:3px solid transparent;font-size:12px;font-weight:500;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--bg3);color:var(--acc);border-left-color:var(--acc);}
.nav-item .ni{width:16px;text-align:center;font-size:14px;}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);}
.user-chip{background:var(--bg3);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.user-chip .avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.user-chip .uinfo{flex:1;min-width:0;}
.user-chip .uname{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-chip .uemail{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;}
.topbar-title{font-weight:700;font-size:15px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.content{flex:1;padding:20px;}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--card-shadow);}
.card-title{font-weight:700;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.card-title .badge{background:var(--acc);color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:600;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--acc);color:#fff;}
.btn-primary:hover{background:#3d6de0;}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg4);color:var(--text);}
.btn-success{background:var(--green);color:#000;}
.btn-danger{background:var(--red);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fg label{font-size:11px;color:var(--text2);font-weight:600;}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc);}
.fg select option{background:var(--bg3);}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.num{text-align:right;font-variant-numeric:tabular-nums;}

/* ── CHIPS & BADGES ── */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.chip-green{background:rgba(0,212,170,.15);color:var(--green);}
.chip-red{background:rgba(255,77,109,.15);color:var(--red);}
.chip-blue{background:rgba(79,126,255,.15);color:var(--acc);}
.chip-yellow{background:rgba(255,197,61,.15);color:var(--yellow);}

/* ── STEPPER ── */
.stepper{display:flex;align-items:center;margin-bottom:20px;gap:0;}
.step{display:flex;align-items:center;gap:8px;flex:1;}
.step:last-child{flex:none;}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid var(--border);background:var(--bg3);color:var(--text3);}
.step.done .step-circle{background:var(--green);border-color:var(--green);color:#000;}
.step.active .step-circle{background:var(--acc);border-color:var(--acc);color:#fff;}
.step-label{font-size:11px;color:var(--text3);font-weight:500;}
.step.active .step-label{color:var(--text);font-weight:600;}
.step.done .step-label{color:var(--green);}
.step-line{flex:1;height:1px;background:var(--border);margin:0 6px;}
.step-line.done{background:var(--green);}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:rgba(79,126,255,.06);}
.upload-icon{font-size:36px;margin-bottom:8px;}
.upload-title{font-weight:700;font-size:14px;margin-bottom:4px;}
.upload-sub{color:var(--text3);font-size:11px;}

/* ── MAPPING UI ── */
.mapping-grid{display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;gap:8px;margin-bottom:8px;}
.map-field{background:var(--bg3);border:1px solid var(--acc);border-radius:8px;padding:7px 10px;font-size:11px;font-weight:600;color:var(--acc);}
.map-arrow{color:var(--text3);text-align:center;font-size:14px;}
.map-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:11px;font-family:inherit;outline:none;width:100%;}
.map-select:focus{border-color:var(--acc);}
.map-select option{background:var(--bg3);}
.map-required{font-size:9px;color:var(--red);margin-left:4px;}
.map-optional{font-size:9px;color:var(--text3);margin-left:4px;}

/* ── RESULT TABLE ── */
.result-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:700;}
.stat-val.green{color:var(--green);}
.stat-val.blue{color:var(--acc);}

/* ── TEMPLATE LIST ── */
.tmpl-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.tmpl-item:hover{border-color:var(--acc);background:var(--bg4);}
.tmpl-item.selected{border-color:var(--acc);background:rgba(79,126,255,.08);}
.tmpl-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tmpl-info{flex:1;}
.tmpl-name{font-size:12px;font-weight:600;}
.tmpl-desc{font-size:10px;color:var(--text3);margin-top:2px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);color:var(--text);padding:9px 18px;border-radius:24px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:all .25s;z-index:9999;pointer-events:none;border:1px solid var(--border2);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .big{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-logo .sub{font-size:11px;color:var(--text3);margin-top:4px;}
.login-err{color:var(--red);font-size:11px;text-align:center;margin-top:8px;min-height:16px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;padding:22px;}
.modal-title{font-weight:700;font-size:15px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text2);}
.empty-sub{font-size:11px;}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="big">mbetco</div>
        <div class="sub">범용 인력 정산 플랫폼</div>
      </div>
      <div class="fg">
        <label>이메일</label>
        <input id="l-email" type="email" placeholder="email@example.com" autocomplete="username">
      </div>
      <div class="fg">
        <label>비밀번호</label>
        <input id="l-pw" type="password" placeholder="비밀번호" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px;justify-content:center;padding:10px;" onclick="_doLogin()">로그인</button>
      <div id="l-err" class="login-err"></div>
    </div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app-screen" style="display:none">
  <div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">M</div>
        <div>
          <div class="logo-text">mbetco</div>
          <div class="logo-sub">정산 자동화</div>
        </div>
      </div>
      <nav class="nav">
        <div class="nav-item active" data-page="settle" onclick="_nav(this,'settle')">
          <span class="ni">📊</span> 정산 처리
        </div>
        <div class="nav-item" data-page="templates" onclick="_nav(this,'templates')">
          <span class="ni">🗂</span> 매핑 템플릿
        </div>
        <div class="nav-item" data-page="workers" onclick="_nav(this,'workers')">
          <span class="ni">👤</span> 인원 관리
        </div>
        <div class="nav-item" data-page="history" onclick="_nav(this,'history')">
          <span class="ni">📋</span> 정산 내역
        </div>
        <div class="nav-item" data-page="settings" onclick="_nav(this,'settings')">
          <span class="ni">⚙️</span> 설정
        </div>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-chip" onclick="_logout()">
          <div class="avatar" id="user-avatar">?</div>
          <div class="uinfo">
            <div class="uname" id="user-name">-</div>
            <div class="uemail" id="user-email">로그아웃</div>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-title" id="page-title">정산 처리</div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
      <div class="content" id="main-content">
        <!-- dynamic content -->
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// FIREBASE INIT
// ══════════════════════════════════════════
var _db, _auth, _CU, _dealerId;

function _initFirebase(){
  if(!firebase.apps.length){
    firebase.initializeApp({
      apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
      authDomain:'mbti-logistics.firebaseapp.com',
      projectId:'mbti-logistics',
      storageBucket:'mbti-logistics.firebasestorage.app',
      messagingSenderId:'40761160761',
      appId:'1:40761160761:web:20545b610f03f534e949e8'
    });
  }
  _db = firebase.firestore();
  _db.settings({experimentalAutoDetectLongPolling:true, merge:true});
  _auth = firebase.auth();

  _auth.onAuthStateChanged(function(user){
    if(!user){
      document.getElementById('login-screen').style.display='';
      document.getElementById('app-screen').style.display='none';
      return;
    }
    _CU = user;
    _loadDealer(user);
  });
}

function _loadDealer(user){
  // admins 먼저 체크 → 슈퍼어드민이면 바로 진입
  _db.collection('admins').doc(user.email).get()
    .then(function(adm){
      if(adm.exists){
        _dealerId = 'admin_'+user.email.split('@')[0];
        _startApp(user, adm.data().companyName||user.email.split('@')[0], true);
        return;
      }
      // 일반 고객사 체크
      return _db.collection('mbetco_companies').where('email','==',user.email).limit(1).get()
        .then(function(snap){
          if(snap.empty){
            toast('❌ 등록되지 않은 계정입니다');
            _auth.signOut();
            return;
          }
          var d = snap.docs[0];
          _dealerId = d.id;
          _startApp(user, d.data().companyName||user.email, false);
        });
    })
    .catch(function(e){
      // 인증 실패 → 로그아웃 (보안)
      console.error('[Auth] 권한 확인 실패:', e.message);
      toast('❌ 접근 권한이 없습니다');
      _auth.signOut();
    });
}

function _startApp(user, companyName, isAdmin){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='';
  document.getElementById('user-name').textContent = companyName;
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-avatar').textContent = (companyName||'?')[0].toUpperCase();
  _renderPage('settle');
}

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
function _doLogin(){
  var email = document.getElementById('l-email').value.trim();
  var pw    = document.getElementById('l-pw').value;
  var err   = document.getElementById('l-err');
  err.textContent = '';
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력하세요.';return;}
  _auth.signInWithEmailAndPassword(email, pw).catch(function(e){
    err.textContent = '로그인 실패: 이메일/비밀번호 확인';
  });
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none') _doLogin();
});
function _logout(){if(confirm('로그아웃 하시겠어요?')) _auth.signOut();}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
function _nav(el, page){
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active');});
  el.classList.add('active');
  _renderPage(page);
}
function _renderPage(page){
  var titles={settle:'정산 처리',templates:'매핑 템플릿',workers:'인원 관리',history:'정산 내역',settings:'설정'};
  document.getElementById('page-title').textContent = titles[page]||page;
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('main-content').innerHTML = '';
  if(page==='settle')    _pageSettle();
  else if(page==='templates') _pageTemplates();
  else if(page==='workers')   _pageWorkers();
  else if(page==='history')   _pageHistory();
  else if(page==='settings')  _pageSettings();
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
var _toastTimer;
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.classList.remove('show');},2800);
}

// ══════════════════════════════════════════
// ══ PAGE: 정산 처리 ══
// ══════════════════════════════════════════
var _settleState = {
  step: 1,        // 1:업로드 2:매핑 3:확인 4:완료
  headers: [],    // 엑셀 헤더
  rows: [],       // 엑셀 데이터 rows
  mapping: {},    // {name, count, amount, deduct, ...} → col index
  template: null, // 선택된 템플릿
  results: []     // 계산 결과
};

// 정산 필드 정의 (필수/선택)
var SETTLE_FIELDS = [
  {key:'name',    label:'이름/기사명',   required:true,  icon:'👤'},
  {key:'count',   label:'총 건수',       required:true,  icon:'📦'},
  {key:'amount',  label:'단가/기본금액', required:true,  icon:'💰'},
  {key:'id',      label:'사번/ID',       required:false, icon:'🔑'},
  {key:'dept',    label:'부서/캠프/지점',required:false, icon:'🏢'},
  {key:'period',  label:'정산기간',      required:false, icon:'📅'},
  {key:'subtotal',label:'소계/합계수수료',required:false, icon:'🧾'},
  {key:'bonus',   label:'수당/인센티브', required:false, icon:'⭐'},
  {key:'total_pay',label:'총지급액',     required:false, icon:'💵'},
  {key:'deduct',  label:'총공제액',      required:false, icon:'➖'},
  {key:'net',     label:'실지급액/정산금액', required:false, icon:'✅'},
  {key:'account', label:'계좌번호',      required:false, icon:'🏦'},
  {key:'note',    label:'비고',          required:false, icon:'📝'},
];

function _pageSettle(){
  _settleState = {step:1, headers:[], rows:[], mapping:{}, template:null, results:[], uploadMode:'single', deliveryMode:false, coupangMode:false, multiMode:false};
  _renderSettle();
}

function _renderSettle(){
  var c = document.getElementById('main-content');
  var s = _settleState;

  // Stepper
  var steps = ['엑셀 업로드','컬럼 매핑','데이터 확인','정산 완료'];
  var stHtml = '<div class="stepper">';
  steps.forEach(function(lbl,i){
    var n = i+1;
    var cls = n < s.step ? 'done' : (n===s.step ? 'active' : '');
    stHtml += '<div class="step '+cls+'">'
      +'<div class="step-circle">'+(n < s.step ? '✓' : n)+'</div>'
      +'<div class="step-label">'+lbl+'</div>'
      +'</div>';
    if(i < steps.length-1) stHtml += '<div class="step-line'+(n < s.step?' done':'')+'"></div>';
  });
  stHtml += '</div>';

  var body = '';
  if(s.step===1) body = _renderStep1();
  else if(s.step===2) body = _renderStep2();
  else if(s.step===3) body = _renderStep3();
  else if(s.step===4) body = _renderStep4();

  c.innerHTML = stHtml + body;

  // Drag & drop 이벤트
  if(s.step===1){
    var zone = document.getElementById('upload-zone');
    if(zone){
      zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('drag');});
      zone.addEventListener('dragleave',function(){zone.classList.remove('drag');});
      zone.addEventListener('drop',function(e){
        e.preventDefault(); zone.classList.remove('drag');
        var files = e.dataTransfer.files;
        if(files.length) _onFilesSelected(files);
      });
    }
  }
}

function _onFileSelected(inp){
  if(inp.files.length) _onFilesSelected(inp.files);
  inp.value = '';

function _onFilesSelected(files){
  var arr = Array.from(files).filter(function(f){return f.name.match(/\.xlsx?$/i);});
  if(!arr.length){toast('❌ xlsx 파일만 가능합니다');return;}
  // 단일 모드이거나 파일 1개면 기존 방식
  if(_settleState.uploadMode !== 'multi' || arr.length === 1){
    _loadExcel(arr[0]);
    return;
  }
  // 여러 파일: 큐에 쌓아서 순서대로 처리
  _settleState.fileQueue = arr;
  _settleState.fileQueueIdx = 0;
  _settleState.multiFiles = []; // 각 파일별 {fileName, headers, rows, mapping, results}
  toast('📂 '+arr.length+'개 파일 로드 중...');
  _loadNextFile();
}

function _loadNextFile(){
  var queue = _settleState.fileQueue;
  var idx = _settleState.fileQueueIdx;
  if(idx >= queue.length){
    // 모든 파일 로드 완료 → 첫 번째 파일 매핑으로
    toast('✅ '+queue.length+'개 파일 로드 완료');
    _settleState.multiMode = true;
    _settleState.multiIdx = 0;
    _startMultiMapping();
    return;
  }
  var file = queue[idx];
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      var sheetName = wb.SheetNames[0];
      var raw = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header:1, raw:false, defval:''});
      if(raw.length < 2){toast('⚠️ '+file.name+' 데이터 없음, 건너뜀');_settleState.fileQueueIdx++;_loadNextFile();return;}
      var hdrIdx = 0;
      for(var i=0;i<Math.min(raw.length,6);i++){if(raw[i].filter(function(c){return c!=='';}).length>=2){hdrIdx=i;break;}}
      var headers = (raw[hdrIdx]||[]).map(function(h,i){return String(h||'열'+(i+1));});
      var rows = raw.slice(hdrIdx+1).filter(function(r){return r.filter(function(c){return c!=='';}).length>0;});
      _settleState.multiFiles.push({fileName:file.name, headers:headers, rows:rows, mapping:{}, results:[]});
      _settleState.fileQueueIdx++;
      _loadNextFile();
    }catch(err){toast('❌ '+file.name+' 읽기 실패');_settleState.fileQueueIdx++;_loadNextFile();}
  };
  reader.readAsArrayBuffer(file);
}

function _startMultiMapping(){
  var idx = _settleState.multiIdx;
  var mf = _settleState.multiFiles[idx];
  _settleState.headers = mf.headers;
  _settleState.rows = mf.rows;
  _settleState.mapping = {};
  var total = _settleState.multiFiles.length;
  toast('🤖 AI 분석 중... ('+( idx+1)+'/'+total+')');
  _aiAutoMap(mf.headers, function(aiResult){
    if(aiResult && Object.keys(aiResult).length > 0){
      _settleState.mapping = aiResult;
      mf.mapping = aiResult;
      toast('✅ '+(idx+1)+'/'+total+' AI 자동매핑 완료');
    } else {
      _autoMap('__keyword');
      mf.mapping = _settleState.mapping;
      toast('✅ '+(idx+1)+'/'+total+' 키워드 매핑 완료');
    }
    _settleState.step = 2;
    _renderSettle();
  });
}

function _loadExcel(file){
  toast('📂 파일 읽는 중...');
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      var sheetName = wb.SheetNames[0];
      // 시트가 여러 개면 선택
      if(wb.SheetNames.length > 1){
        _selectSheet(wb);
        return;
      }
      _processSheet(wb, sheetName);
    }catch(err){
      toast('❌ 파일 읽기 실패: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function _selectSheet(wb){
  // 쿠팡 엑셀 자동 감지 — 정산Raw + 분실파손List 있으면 바로 쿠팡 전용 처리
  var hasRaw  = wb.SheetNames.indexOf('정산Raw') >= 0;
  var hasLoss = wb.SheetNames.indexOf('분실파손List') >= 0;
  if(hasRaw){
    // 헤더 확인
    var rawRows = XLSX.utils.sheet_to_json(wb.Sheets['정산Raw'], {header:1, raw:false, defval:''});

    for(var i=0;i<Math.min(rawRows.length,6);i++){if(rawRows[i].filter(function(c){return c!=='';}).length>=3){hdrIdx=i;break;}}
    var headers = rawRows[hdrIdx].map(function(h){return String(h).replace(/
/g,' ').trim();});
    if(_isCoupangSheet(headers)){
      _processCoupangSheet(wb, '정산Raw', hasLoss ? '분실파손List' : null);
      return;
    }
  }

  var html = '<div class="card"><div class="card-title">📋 시트 선택</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-bottom:10px">정산할 시트를 선택하거나 전체를 한꺼번에 처리하세요.</div>'

    // 전체 시트 한꺼번에 버튼
    +'<div onclick="_processAllSheets(window._pendingWb)" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:2px solid var(--acc);border-radius:10px;cursor:pointer;background:rgba(79,126,255,.08);margin-bottom:12px">'
    +'<span style="font-size:20px">📂</span>'
    +'<div><div style="font-weight:700;font-size:13px">전체 시트 한꺼번에 처리</div>'
    +'<div style="font-size:11px;color:var(--text2)">'+wb.SheetNames.length+'개 시트 각각 매핑 후 정산</div></div>'
    +'</div>'

    +'<div style="font-size:11px;color:var(--text3);margin-bottom:8px">또는 시트 1개만 선택</div>';

  wb.SheetNames.forEach(function(sn){
    html += '<div class="tmpl-item" onclick="_processSheet(window._pendingWb,\''+sn+'\')">'
      +'<span style="font-size:18px">📄</span>'
      +'<div class="tmpl-info"><div class="tmpl-name">'+sn+'</div></div>'
      +'</div>';
  });
  html += '</div>';
  window._pendingWb = wb;
  document.getElementById('main-content').innerHTML = html;
}

function _processAllSheets(wb){
  if(!wb){toast('❌ 파일 오류');return;}
  // 각 시트를 multiFiles 구조로 변환
  var multiFiles = [];
  wb.SheetNames.forEach(function(sn){
    var raw = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, raw:false, defval:''});
    if(raw.length < 2) return;
    var hdrIdx = 0;
    for(var i=0;i<Math.min(raw.length,6);i++){
      if(raw[i].filter(function(c){return c!=='';}).length>=2){hdrIdx=i;break;}
    }
    var headers = (raw[hdrIdx]||[]).map(function(h,i){return String(h||'열'+(i+1));});
    var rows = raw.slice(hdrIdx+1).filter(function(r){return r.filter(function(c){return c!=='';}).length>0;});
    if(rows.length > 0) multiFiles.push({fileName:sn, headers:headers, rows:rows, mapping:{}, results:[]});
  });

  if(!multiFiles.length){toast('❌ 데이터가 있는 시트가 없습니다');return;}

  _settleState.multiMode = true;
  _settleState.multiFiles = multiFiles;
  _settleState.multiIdx = 0;
  window._pendingWb = null;
  toast('✅ '+multiFiles.length+'개 시트 로드 완료');
  _startMultiMapping();
}

// 🛵 배달대행 정산 엔진 (settle.html 이식)
// ════════════════════════════════════════════════

// ── 배달대행 엑셀 감지
function _isDeliverySheet(headers){
  var h = headers.map(function(x){return String(x||'').toLowerCase().replace(/\s/g,'');});
  var joined = h.join('|');
  // 배달대행비 + 라이더ID/시간 조합이면 배달대행
  var hasRider  = joined.includes('라이더') || joined.includes('rider') || joined.includes('배달원');
  var hasFee    = joined.includes('배달대행비') || joined.includes('배달료') || joined.includes('정산금액');
  var hasTime   = joined.includes('완료') || joined.includes('time') || joined.includes('시각');
  return hasRider && (hasFee || hasTime);
}

// ── 건수별 트랙 단가 (기본값)
var DW_TRACKS = [
  {min:350, max:Infinity, price:5500, label:'350건+ 트랙',    key:'t350'},
  {min:300, max:350,      price:5200, label:'300~349건 트랙', key:'t300'},
  {min:250, max:300,      price:5100, label:'250~299건 트랙', key:'t250'},
  {min:180, max:250,      price:4200, label:'180~249건 트랙', key:'t180'},
  {min:0,   max:180,      price:0,    label:'180건 미만',      key:'t0'}
];

// ── 시간대별 슬롯 단가 (기본값)
var DW_SLOTS = {
  morning:     {label:'아침',       start:6,  end:11, price:0},
  lunch_peak:  {label:'점심피크',   start:11, end:13, price:0},
  lunch_off:   {label:'점심노피크', start:13, end:17, price:0},
  dinner_peak: {label:'저녁피크',   start:17, end:21, price:0},
  dinner_off:  {label:'저녁노피크', start:21, end:24, price:0},
  midnight:    {label:'심야(예외)', start:0,  end:6,  price:0}
};

function _dwSlot(hour){
  if(hour>=6  && hour<11) return 'morning';
  if(hour>=11 && hour<13) return 'lunch_peak';
  if(hour>=13 && hour<17) return 'lunch_off';
  if(hour>=17 && hour<21) return 'dinner_peak';
  if(hour>=21 && hour<24) return 'dinner_off';
  return 'midnight';
}

function _dwTrack(cnt, defPrice){
  for(var i=0;i<DW_TRACKS.length;i++){
    var t=DW_TRACKS[i];
    if(cnt>=t.min && cnt<t.max) return {price:t.price>0?t.price:(defPrice||2900), label:t.label, isDefault:t.price===0};
  }
  return {price:defPrice||2900, label:'기본계약단가', isDefault:true};
}

// ── 핵심 정산 계산 엔진
function _calcDeliverySettlement(orders, cfg){
  if(!orders||!orders.length) return null;
  cfg = cfg || {};

  // 취소건 제외한 유효 건수
  var validOrders = orders.filter(function(o){ return (o.platformPrice||0) > 0; });
  var cnt = validOrders.length;
  var cancelCnt = orders.length - cnt;

  var track   = _dwTrack(cnt, cfg.defaultPrice||2900);
  var target  = track.price;
  var pfSum=0, injected=0, extracted=0;

  var details = orders.map(function(o){
    var price = o.platformPrice||0;
    if(price <= 0) return Object.assign({},o,{slot:'cancelled',inject:0,extract:0,cancelled:true});
    pfSum += price;
    var slot = _dwSlot(o.hour||0);
    var slotPrice = DW_SLOTS[slot] && DW_SLOTS[slot].price > 0 ? DW_SLOTS[slot].price : target;
    var inj=0, ext=0;
    if(slot !== 'midnight'){
      if(price < slotPrice){ inj = Math.floor(slotPrice-price); injected  += inj; }
      else if(price > slotPrice){ ext = Math.floor(price-slotPrice); extracted += ext; }
    }
    return Object.assign({},o,{slot:slot,inject:inj,extract:ext});
  });

  var preTax   = Math.floor(pfSum + injected - extracted);
  var cancelPenalty = cancelCnt * (cfg.cancelPenalty||0);

  // 세금 처리 (개인사업자 vs 주민번호)
  var isBiz = !!cfg.isBiz;
  var emp=0, work=0, tax33=0;
  if(isBiz){
    // 개인사업자: 고용+산재
    var supplyAmt  = Math.round(preTax / 1.1);
    var expenseAmt = Math.round(supplyAmt * 0.346);
    var monthPay   = supplyAmt - expenseAmt;
    emp  = monthPay >= 800000 ? Math.round(monthPay * 0.008) : 0;
    work = Math.round(monthPay * 0.0088);
  } else {
    // 주민번호: 3.3% 원천세
    tax33 = Math.floor(preTax * 0.033);
  }

  var leaseFee    = cfg.leaseFee    || 0;
  var programFee  = cfg.programFee  || 0;
  var insuranceFee= cfg.insuranceFee|| 0;
  var deduct = emp + work + tax33 + cancelPenalty + leaseFee + programFee + insuranceFee;
  var net    = Math.max(0, Math.floor(preTax - deduct));

  return {
    trackLabel:   track.label,
    targetPrice:  target,
    isDefault:    track.isDefault,
    totalCount:   cnt,
    cancelCnt:    cancelCnt,
    pfSum:        pfSum,
    injected:     injected,
    extracted:    extracted,
    agencyMargin: extracted - injected,
    preTax:       preTax,
    cancelPenalty:cancelPenalty,
    isBiz:        isBiz,
    emp:          emp,
    work:         work,
    tax33:        tax33,
    leaseFee:     leaseFee,
    programFee:   programFee,
    insuranceFee: insuranceFee,
    deduct:       deduct,
    net:          net,
    details:      details
  };
}

// ── 배달대행 엑셀 파싱
function _parseDeliveryExcel(wb){
  var ws = null;
  for(var si=0;si<wb.SheetNames.length;si++){
    var candidate = wb.Sheets[wb.SheetNames[si]];
    var testRows  = XLSX.utils.sheet_to_json(candidate,{header:1,defval:null});
    if(testRows && testRows.filter(function(r){return r&&r.some(function(c){return c!=null;});}).length > 1){
      ws = candidate; break;
    }
  }
  if(!ws) return null;

  var rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:false,dateNF:'yyyy-mm-dd HH:MM:SS'});
  if(rows.length < 2) return null;

  // 헤더 탐색
  var hIdx = -1;
  for(var i=0;i<Math.min(rows.length,15);i++){
    if(rows[i]&&rows[i].some(function(c){return c&&String(c).trim();})){hIdx=i;break;}
  }
  if(hIdx < 0) return null;

  var headers = rows[hIdx].map(function(c){return String(c||'').trim();});
  var colId=-1, colPrice=-1, colTime=-1, colName=-1, colCancel=-1;

  headers.forEach(function(h,ci){
    var hn = h.toLowerCase().replace(/\s/g,'');
    if(colId<0   && (hn.includes('라이더id')||hn.includes('riderid')||hn.includes('배달원id')||hn.includes('기사id'))) colId=ci;
    if(colName<0 && (hn.includes('라이더명')||hn.includes('이름')||hn.includes('기사명')||hn.includes('name')))       colName=ci;
    if(colPrice<0&& (hn.includes('배달대행비')||hn.includes('정산금액')||hn.includes('지급액')||hn.includes('단가')))  colPrice=ci;
    if(colTime<0 && (hn.includes('완료시각')||hn.includes('완료일시')||hn.includes('배달완료')||hn.includes('time')))  colTime=ci;
    if(colCancel<0&&(hn.includes('취소여부')||hn.includes('cancel')||hn.includes('취소')))                            colCancel=ci;
  });

  if(colId<0 && colName>=0) colId=colName;
  if(colId<0 || colPrice<0) return null;

  var riderMap = {};
  var riderNames = {};
  rows.slice(hIdx+1).forEach(function(row){
    if(!row) return;
    var rid   = row[colId]!=null ? String(row[colId]).trim() : '';
    var rname = colName>=0&&row[colName]!=null ? String(row[colName]).trim() : rid;
    if(!rid||rid==='합계'||rid==='소계') return;

    var price = parseFloat(String(row[colPrice]||'').replace(/[,₩원\s]/g,''))||0;

    // 취소 건: 가격 0으로 처리
    var isCancelled = colCancel>=0 && String(row[colCancel]||'').trim().toUpperCase()==='Y';
    if(isCancelled) price = 0;

    var hour = 0;
    if(colTime>=0 && row[colTime]){
      var hm = String(row[colTime]).match(/(\d{1,2}):(\d{2})/);
      if(hm) hour = parseInt(hm[1]);
    }

    if(!riderMap[rid]) riderMap[rid] = [];
    riderNames[rid] = rname;
    riderMap[rid].push({riderId:rid, platformPrice:price, hour:hour, cancelled:isCancelled});
  });

  return {riderMap:riderMap, riderNames:riderNames, headers:headers};
}

function _dwApplyDeliverySettings(){
  var g = function(id){return parseInt((document.getElementById(id)||{value:0}).value)||0;};
  var taxRadio = document.querySelector('input[name="dw-tax"]:checked');
  var isBiz = taxRadio ? taxRadio.value==='1' : false;

  // 트랙 단가 업데이트
  DW_TRACKS.forEach(function(t){
    var el = document.getElementById('dw-t-'+t.key);
    if(el) t.price = parseInt(el.value)||0;
  });
  // 슬롯 단가 업데이트
  Object.keys(DW_SLOTS).forEach(function(k){
    var el = document.getElementById('dw-s-'+k);
    if(el) DW_SLOTS[k].price = parseInt(el.value)||0;
  });

  var cfg = {
    defaultPrice:   g('dw-default-price') || 2900,
    cancelPenalty:  g('dw-cancel-penalty') || 10000,
    programFee:     g('dw-program-fee'),
    leaseFee:       g('dw-lease-fee'),
    isBiz:          isBiz
  };
  _settleState.deliveryCfg = cfg;

  // 재계산
  var riderMap   = _settleState.deliveryRiderMap;
  var riderNames = _settleState.deliveryRiderNames;
  if(riderMap){
    var results = [];
    Object.keys(riderMap).forEach(function(rid){
      var orders = riderMap[rid];
      var r = _calcDeliverySettlement(orders, Object.assign({},cfg,{defaultPrice:cfg.defaultPrice}));
      if(r){ r.riderId=rid; r.riderName=riderNames[rid]||rid; results.push(r); }
    });
    results.sort(function(a,b){return a.riderName.localeCompare(b.riderName);});
    _settleState.deliveryState = {results:results, cfg:cfg};
  }

  var mo = document.querySelector('.mo.show'); if(mo) mo.remove();
  toast('✅ 설정 적용 완료 — 재계산됨');
  _renderSettle();
}

// ── 쿠팡 엑셀 감지
function _isCoupangSheet(headers){
  var h = headers.map(function(x){return x.replace(/\n/g,' ').toLowerCase();});
  var coupangKeys = ['id','캠프명','배송건수','단가','총금액'];
  var matched = coupangKeys.filter(function(k){
    return h.some(function(hh){return hh.includes(k);});
  });
  return matched.length >= 4;
}

// ── 쿠팡 전용 정산 처리
function _processCoupangSheet(wb, rawSheetName, lossSheetName){
  toast('⚙️ 쿠팡 정산 처리 중...');

  var raw  = XLSX.utils.sheet_to_json(wb.Sheets[rawSheetName],  {header:1, raw:false, defval:''});
  var loss = lossSheetName && wb.Sheets[lossSheetName]
    ? XLSX.utils.sheet_to_json(wb.Sheets[lossSheetName], {header:1, raw:false, defval:''})
    : [];

  // 헤더 행 찾기
  function findHeader(rows){
    for(var i=0;i<Math.min(rows.length,6);i++){
      if(rows[i].filter(function(c){return c!=='';}).length>=3) return i;
    }
    return 0;
  }

  var rawHdrIdx  = findHeader(raw);
  var rawHeaders = raw[rawHdrIdx].map(function(h){return String(h).replace(/\n/g,' ').trim();});
  var rawRows    = raw.slice(rawHdrIdx+1).filter(function(r){return r.some(function(c){return c!=='';});});

  // 컬럼 인덱스 찾기
  function col(keyword){
    return rawHeaders.findIndex(function(h){return h.replace(/\s/g,'').includes(keyword.replace(/\s/g,''));});
  }
  var CI = {
    id:       col('ID'),
    route:    rawHeaders.findIndex(function(h){return h==='Route'||h==='route'||h==='라우트';}),
    camp:     col('캠프명'),
    date:     col('배송일자'),
    delCnt:   col('배송건수'),
    retCnt:   col('반품'),
    price:    col('단가'),
    baseAmt:  col('기본 배송단가 금액') >= 0 ? col('기본 배송단가 금액') : col('기본배송단가금액'),
    addInc:   col('추가 인센티브 가중요인') >= 0 ? col('추가 인센티브 가중요인') : col('추가인센티브가중'),
    fresh:    col('프레시백'),
    total:    col('총금액'),
  };

  // 라우트→캠프 매핑 수집 (쿠팡 엑셀에서 자동 추출)
  var routeToCamp = {};

  // ID→이름 매핑 (분실파손에서)
  var idToName = {};
  if(loss.length > 1){
    var lHdrIdx = findHeader(loss);
    var lHeaders = loss[lHdrIdx].map(function(h){return String(h).trim();});
    var lRows    = loss.slice(lHdrIdx+1).filter(function(r){return r.some(function(c){return c!=='';});});
    var lIdCol   = lHeaders.indexOf('ID');
    var lNameCol = lHeaders.indexOf('이름');
    var lAmtCol  = lHeaders.indexOf('차감금액');
    lRows.forEach(function(r){
      var lid  = String(r[lIdCol]||'').trim();
      var name = String(r[lNameCol]||'').trim();
      if(lid && name) idToName[lid] = name;
    });
  }

  // ID별 집계
  var byId = {};
  rawRows.forEach(function(r){
    var id    = String(r[CI.id]||'').trim();
    var route = CI.route>=0 ? String(r[CI.route]||'').trim().toUpperCase() : '';
    var camp  = CI.camp>=0  ? String(r[CI.camp]||'').trim() : '';
    if(!id || id === '영업점 수수료') return;

    // 라우트→캠프 매핑 수집 (쿠팡 엑셀에서 자동 추출)
    if(route && camp) routeToCamp[route] = camp;

    if(!byId[id]) byId[id] = {
      id:      id,
      name:    idToName[id] || '',
      camp:    camp,
      routes:  {},   // 라우트별 건수/단가 집계
      delCnt:  0, retCnt: 0,
      baseAmt: 0, addInc: 0, fresh: 0, total: 0,
      dates:   [],
    };
    var g = byId[id];
    // 캠프명 갱신 (빈 경우 채우기)
    if(!g.camp && camp) g.camp = camp;
    // 라우트별 집계 (단가표 검증용)
    if(route){
      if(!g.routes[route]) g.routes[route] = {del:0, ret:0, price:0};
      g.routes[route].del   += _toNum(r[CI.delCnt]);
      g.routes[route].ret   += _toNum(r[CI.retCnt]);
      g.routes[route].price  = _toNum(r[CI.price]); // 단가 저장
    }
    g.delCnt  += _toNum(r[CI.delCnt]);
    g.retCnt  += _toNum(r[CI.retCnt]);
    g.baseAmt += _toNum(r[CI.baseAmt]);
    g.addInc  += _toNum(r[CI.addInc]);
    g.fresh   += _toNum(r[CI.fresh]);
    g.total   += _toNum(r[CI.total]);
    if(CI.date>=0 && r[CI.date]) g.dates.push(String(r[CI.date]).substring(0,10));
  });

  // 라우트→캠프 매핑 전역 저장
  _settleState.routeToCamp = routeToCamp;

  // 라우트별 전체 건수 저장 (팀장수수료 계산 기준)
  var routeCntMap = {};
  rawRows.forEach(function(r){
    var route = CI.route>=0 ? String(r[CI.route]||'').trim().toUpperCase() : '';
    if(!route) return;
    var d = parseFloat(r[CI.delCnt]||0)||0;
    var ret = parseFloat(r[CI.retCnt]||0)||0;
    routeCntMap[route] = (routeCntMap[route]||0) + d + ret;
  });
  _settleState.coupangRouteCnt = routeCntMap;

  // 분실파손 차감
  var lossByID = {};
  if(loss.length > 1){
    var lHdrIdx2 = findHeader(loss);
    var lH2      = loss[lHdrIdx2].map(function(h){return String(h).trim();});
    var lRows2   = loss.slice(lHdrIdx2+1).filter(function(r){return r.some(function(c){return c!=='';});});
    var liCol    = lH2.indexOf('ID');
    var laCol    = lH2.indexOf('차감금액');
    lRows2.forEach(function(r){
      var lid = String(r[liCol]||'').trim();
      if(!lid) return;
      lossByID[lid] = (lossByID[lid]||0) + _toNum(r[laCol]);
    });
  }

  // 최종 결과 생성
  // ※ 쿠팡 총금액 = 기본배송금액(배송+반품 동일단가) + 가중요인금액 → 그대로 사용
  // ※ 프레시백은 총금액에 미포함 → 별도 가산
  // ※ 분실파손은 차감
  // ※ 대리점 인센(incen)은 별도 추가 (기사별 설정)
  var results = Object.values(byId).map(function(g){
    var lossAmt   = lossByID[g.id] || 0;
    // 라우트단가표 있으면 단가 검증 가능 (추후 연동)
    var netAmt    = g.total + g.fresh - lossAmt;  // 인센은 나중에 추가
    var totalCnt  = g.delCnt + g.retCnt;  // 반품 = 배송과 동일 단가
    var dateRange = g.dates.length
      ? g.dates[0] + (g.dates.length>1 ? '~'+g.dates[g.dates.length-1] : '')
      : '';
    return {
      name:      g.name || g.id,
      id:        g.id,
      dept:      g.camp,
      count:     g.delCnt,      // 배송건수
      retCnt:    g.retCnt,      // 반품건수 (동일단가)
      totalCnt:  totalCnt,      // 배송+반품 합계
      baseAmt:   g.baseAmt,     // 기본배송단가금액 (반품포함)
      addInc:    g.addInc,      // 쿠팡 가중요인 (총금액에 포함됨)
      fresh:     g.fresh,       // 프레시백 인센티브
      lossAmt:   lossAmt,       // 분실파손 차감
      amount:    g.total,       // 쿠팡 총금액 (배송+반품+가중요인)
      incen:     0,             // 대리점 추가 인센 (원/건, 기사별 설정)
      net:       netAmt,        // 실지급액 (인센 설정 전)
      tax:       0,
      period:    dateRange,
      revenue:   g.total,
      margin:    0,
      rowCount:  1,
      isCoupang: true,
    };
  });

  results.sort(function(a,b){return a.dept.localeCompare(b.dept)||a.name.localeCompare(b.name);});

  _settleState.coupangMode = true;
  _settleState.results     = results;
  _settleState.step        = 3;
  window._pendingWb        = null;
  // 인센 초기값 0으로 설정
  results.forEach(function(r){ r.incen = 0; });
  _renderSettle();
  toast('✅ 쿠팡 계산 완료 — 인센 설정 후 확정하세요');
}

function _processSheet(wb, sheetName){
  var targetWb = wb || window._pendingWb;
  if(!targetWb){toast('❌ 파일 데이터가 유실됐습니다. 다시 업로드해주세요.');return;}
  wb = targetWb;
  var raw = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header:1, raw:false, defval:''});
  if(raw.length < 2){toast('❌ 데이터가 없습니다');return;}

  // 헤더 행 찾기 (비어있는 첫 행 스킵)
  var hdrIdx = 0;
  for(var i=0; i<Math.min(raw.length,6); i++){
    var nonEmpty = raw[i].filter(function(c){return c!=='';}).length;
    if(nonEmpty >= 2){hdrIdx = i; break;}
  }

  _settleState.headers = (raw[hdrIdx]||[]).map(function(h,i){return String(h||'열'+(i+1));});
  _settleState.rows = raw.slice(hdrIdx+1).filter(function(r){
    return r.filter(function(c){return c!=='';}).length > 0;
  });
  window._pendingWb = null;

  // ── 배달대행 자동 감지
  if(_isDeliverySheet(_settleState.headers)){
    toast('🛵 배달대행 엑셀 감지 — 정산 계산 중...');
    var parsed = _parseDeliveryExcel(wb||{SheetNames:[sheetName],Sheets:{[sheetName]:wb&&wb.Sheets&&wb.Sheets[sheetName]}});
    if(parsed && Object.keys(parsed.riderMap).length > 0){
      _settleState.deliveryMode  = true;
      _settleState.deliveryRiderMap   = parsed.riderMap;
      _settleState.deliveryRiderNames = parsed.riderNames;
      var defCfg = _settleState.deliveryCfg || {defaultPrice:2900, cancelPenalty:10000, isBiz:false};
      _settleState.deliveryCfg = defCfg;
      var results = [];
      Object.keys(parsed.riderMap).forEach(function(rid){
        var r = _calcDeliverySettlement(parsed.riderMap[rid], defCfg);
        if(r){ r.riderId=rid; r.riderName=parsed.riderNames[rid]||rid; results.push(r); }
      });
      results.sort(function(a,b){return a.riderName.localeCompare(b.riderName);});
      _settleState.deliveryState = {results:results, cfg:defCfg};
      _settleState.step = 3;
      _renderSettle();
      toast('✅ 배달대행 정산 완료 — '+results.length+'명 | ⚙️ 설정에서 단가/세금 변경 가능');
      return;
    }
  }

  toast('🤖 AI가 헤더 분석 중...');

  // AI 자동매핑 먼저 시도 → 실패시 키워드 룰로 폴백
  _aiAutoMap(_settleState.headers, function(aiResult){
    if(aiResult && Object.keys(aiResult).length > 0){
      _settleState.mapping = aiResult;
      toast('✅ '+_settleState.rows.length+'행 로드 · AI 자동매핑 완료');
    } else {
      _autoMap(_settleState.template || '__keyword');
      toast('✅ '+_settleState.rows.length+'행 로드 · 키워드 매핑 완료');
    }
    _settleState.step = 2;
    _renderSettle();
  });
}


// ── AI 자동매핑 (Claude)
async function _aiAutoMap(headers, onDone){
  var ak = window.__AK;
  if(!ak){ onDone(false); return; }

  var fieldDesc = [
    'name: 기사/직원/라이더 이름 또는 ID (사람 식별자)',
    'count: 배송건수/총건수/수량 (숫자)',
    'amount: 단가/건당금액/기본요금',
    'id: 사번/직원번호/고유코드',
    'dept: 캠프/지점/부서/팀',
    'period: 정산기간/날짜/월',
    'subtotal: 소계/합계수수료/기본금액합',
    'bonus: 수당/인센티브/추가금액',
    'total_pay: 총지급액/총금액/지급합계',
    'deduct: 공제액/차감/4대보험합계',
    'net: 실지급액/정산금액/차감지급액',
    'account: 계좌번호',
    'note: 비고/특이사항/메모',
  ].join('\n');

  var prompt = '다음은 정산 엑셀의 헤더 목록입니다:\n'
    + headers.map(function(h,i){return i+': '+h;}).join('\n')
    + '\n\n각 헤더를 아래 필드 중 하나에 매핑해주세요:\n'
    + fieldDesc
    + '\n\n결과를 반드시 JSON만 반환하세요. 예: {"name":1,"count":7,"amount":9}\n'
    + '매핑 불가한 헤더는 포함하지 마세요. JSON 외 텍스트 절대 금지.';

  try{
    var res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': ak,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:300,
        messages:[{role:'user',content:prompt}]
      })
    });
    var data = await res.json();
    var text = (data.content&&data.content[0]&&data.content[0].text)||'';
    var clean = text.replace(/```json|```/g,'').trim();
    var mapped = JSON.parse(clean);
    // 인덱스 숫자로 변환
    var result = {};
    Object.keys(mapped).forEach(function(k){
      var v = parseInt(mapped[k],10);
      if(!isNaN(v) && v>=0 && v<headers.length) result[k]=v;
    });
    onDone(result);
  }catch(e){
    console.warn('AI 매핑 실패, 키워드 룰로 대체:', e);
    onDone(false);
  }
}

function _autoMap(templateId){
  var headers = _settleState.headers;
  var mapping = {};

  // 내장 템플릿별 특수 처리
  var presets = {
    __cj:     {name:'기사명',count:'배달건수',amount:'단가'},
    __hanjin: {name:'성명',  count:'건수',   amount:'금액'},
    __lotte:  {name:'이름',  count:'물량',   amount:'수수료'},
    __baedal: {name:'기사',  count:'건수',   amount:'건당단가'},
  };
  var preset = presets[templateId];

  SETTLE_FIELDS.forEach(function(f){
    // 1. 정확한 헤더명 매칭
    if(preset && preset[f.key]){
      var idx = headers.findIndex(function(h){return h===preset[f.key];});
      if(idx>=0){mapping[f.key]=idx; return;}
    }
    // 2. 키워드 유사 매칭
    var rules = AUTO_MAP_RULES[f.key]||[];
    for(var i=0;i<headers.length;i++){
      var h = headers[i].toLowerCase().replace(/\s/g,'');
      for(var j=0;j<rules.length;j++){
        if(h.includes(rules[j].toLowerCase())){
          if(mapping[f.key]===undefined) mapping[f.key]=i;
          break;
        }
      }
    }
  });
  _settleState.mapping = mapping;
}

function _setMapping(key, val){
  if(val==='') delete _settleState.mapping[key];
  else _settleState.mapping[key] = parseInt(val,10);
}

function _saveTemplate(){
  var name = (document.getElementById('tmpl-save-name')||{}).value||'';
  if(!name.trim()){toast('⚠️ 템플릿 이름을 입력하세요');return;}
  var data = {
    dealerId: _dealerId,
    name: name.trim(),
    mapping: _settleState.mapping,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  _db.collection('mbetco_mappings').add(data).then(function(){
    toast('✅ 템플릿 저장됨: '+name);
  });
}

function _goStep(n){
  _settleState.step = n;
  _renderSettle();
}

function _goStep3(){
  var m = _settleState.mapping;
  if(m.name===undefined){toast('⚠️ 이름 열을 선택하세요');return;}
  if(m.count===undefined && m.amount===undefined){toast('⚠️ 건수 또는 금액 열을 선택하세요');return;}

  // 멀티모드: 현재 파일 매핑 저장 후 다음 파일로
  if(_settleState.multiMode){
    var mf = _settleState.multiFiles[_settleState.multiIdx];
    mf.mapping = Object.assign({}, _settleState.mapping);
    // 다음 파일이 있으면 이동
    if(_settleState.multiIdx < _settleState.multiFiles.length - 1){
      _settleState.multiIdx++;
      var next = _settleState.multiFiles[_settleState.multiIdx];
      _settleState.headers = next.headers;
      _settleState.rows = next.rows;
      _settleState.mapping = {};
      _autoMap('__keyword');
      next.mapping = _settleState.mapping;
      _renderSettle();
      return;
    }
    // 마지막 파일 매핑 완료 → 전체 계산
    toast('⏳ 계산 중...');
    _settleState.workers = {};
    _settleState.multiResults = [];
    _settleState.multiFiles.forEach(function(f){
      _settleState.headers = f.headers;
      _settleState.rows = f.rows;
      _settleState.mapping = f.mapping;
      _calcResults();
      f.results = _settleState.results.slice();
    });
    _settleState.step = 3;
    _renderSettle();
    return;
  }

  toast('⏳ 인원 단가 로드 중...');
  _db.collection('mbetco_workers').where('dealerId','==',_dealerId).get()
    .then(function(snap){
      var workers = {};
      snap.forEach(function(d){
        var w = d.data();
        if(w.name) workers[w.name] = w;
        if(w.workerId) workers[w.workerId] = w;
      });
      _settleState.workers = workers;
      _calcResults();
      _settleState.step = 3;
      _renderSettle();
    })
    .catch(function(){
      _settleState.workers = {};
      _calcResults();
      _settleState.step = 3;
      _renderSettle();
    });
}

// ── 정산 계산
function _calcResults(){
  var rows = _settleState.rows;
  var m    = _settleState.mapping;
  var results = [];
  var workers = _settleState.workers || {};  // {id: {rate, retRate, dept}}

  // 이름 or ID 기준 집계 (쿠팡처럼 이름없고 ID만 있는 경우 대응)
  var byName = {};
  rows.forEach(function(r){
    var name = m.name!==undefined ? String(r[m.name]||'').trim() : '';
    var id   = m.id!==undefined   ? String(r[m.id]||'').trim()   : '';
    // 이름 없으면 ID로 대체
    var key  = name || id;
    if(!key) return;
    if(!byName[key]) byName[key] = {
      name:   name || id,  // 이름 없으면 ID 표시
      id:     id,
      dept:   m.dept!==undefined   ? String(r[m.dept]||'')   : '',
      period: m.period!==undefined ? String(r[m.period]||'') : '',
      rows: []
    };
    byName[key].rows.push(r);
  });

  Object.values(byName).forEach(function(p){
    var totalCount    = 0;
    var totalAmount   = 0;  // 엑셀 원본 금액 (매출)
    var totalBase     = 0;
    var totalBonus    = 0;
    var totalDeduct   = 0;
    var totalNet      = 0;  // 엑셀의 실지급액
    var totalSubtotal = 0;
    var totalTotalPay = 0;

    p.rows.forEach(function(r){
      totalCount    += _toNum(r[m.count]);
      totalAmount   += _toNum(r[m.amount]);
      totalBase     += _toNum(r[m.base]);
      totalBonus    += _toNum(r[m.bonus]);
      totalDeduct   += _toNum(r[m.deduct]);
      totalNet      += _toNum(r[m.net]);
      totalSubtotal += _toNum(r[m.subtotal]);
      totalTotalPay += _toNum(r[m.total_pay]);
    });
    // 엑셀에 실지급액이 있으면 그걸 우선 사용
    if(totalNet > 0){
      var netFinalExcel = totalNet;
    }

    // 회사 단가 적용 (workers에 등록된 단가 우선)
    var wk = workers[p.name] || workers[p.id] || null;
    var workerRate = wk ? (wk.rate||0) : 0;
    var dept = (wk && wk.dept) ? wk.dept : p.dept;

    // 지급액 계산
    // 회사단가 있으면: 건수 × 단가
    // 없으면: 엑셀 금액 그대로
    var baseAmt = workerRate > 0
      ? totalCount * workerRate
      : (totalAmount > 0 ? totalAmount : totalCount * 0);

    var gross    = baseAmt + totalBase + totalBonus;
    var net      = gross - totalDeduct;
    var tax33    = Math.round(net * 0.033);
    var netFinal = net - tax33;

    // 마진 = 엑셀금액(매출) - 실지급
    var revenue = totalAmount;
    var margin  = revenue > 0 ? revenue - netFinal : 0;

    results.push({
      name:        p.name,
      id:          p.id,
      dept:        dept,
      count:       totalCount,
      amount:      totalAmount,   // 엑셀 원본 (매출)
      workerRate:  workerRate,    // 적용 단가
      base:        totalBase,
      bonus:       totalBonus,
      deduct:      totalDeduct,
      gross:       gross,
      tax:         tax33,
      net:         netFinal,
      revenue:     revenue,       // 매출
      margin:      margin,        // 마진
      rowCount:    p.rows.length,
      period:      p.period,      // 정산기간
      netExcel:    totalNet,      // 엑셀의 실지급액 (있으면)
      account:     m.account!==undefined ? String(p.rows[0][m.account]||'') : '',
    });
  });

  results.sort(function(a,b){return a.dept.localeCompare(b.dept)||a.name.localeCompare(b.name);});
  _settleState.results = results;
}

function _toNum(v){
  if(v===undefined||v===null||v==='') return 0;
  var n = parseFloat(String(v).replace(/[,₩\s]/g,''));
  return isNaN(n) ? 0 : n;
}

// ── AI 파서 (Claude) - 불규칙 형식 텍스트/이미지 처리
async function _aiParseRateFile(input, type, callback){
  var ak = window.__AK;
  if(!ak){ callback(null); return; }

  var isImage = (type === 'image');

  var systemPrompt = '당신은 물류 정산 데이터 파서입니다. 입력된 데이터에서 정보를 추출해 JSON만 반환하세요. 다른 텍스트 절대 금지.';

  var userPrompt;
  var messageContent;

  if(isImage){
    userPrompt = '이 이미지에서 라우트번호와 단가(원/건) 또는 팀장수수료 정보를 추출하세요.\n\n'
      + '라우트단가표라면: {"type":"rate","data":{"612A":982,"612B":860,...}}\n'
      + '팀장수수료라면: {"type":"teamfee","data":{"vmffkdl321@df":{"608B":60,"608C":60,...},...}}\n'
      + '판단 불가시: {"type":"unknown","data":{}}';
    messageContent = [
      {type:'image', source:{type:'base64', media_type:input.mediaType, data:input.data}},
      {type:'text', text:userPrompt}
    ];
  } else {
    userPrompt = '다음 텍스트에서 라우트단가 또는 팀장수수료 정보를 추출하세요.\n\n'
      + '【라우트단가 예시】\n608\nB 920\nC 920 → 608B=920, 608C=920\n\n'
      + '【팀장수수료 예시】\n하현호(vmffkdl321)\n608\nB60 C60 → vmffkdl321@df의 608B=60, 608C=60\n\n'
      + '라우트단가라면: {"type":"rate","data":{"612A":982,"612B":860,...}}\n'
      + '팀장수수료라면: {"type":"teamfee","data":{"vmffkdl321@df":{"608B":60,...},...}}\n'
      + 'ID에 @df 없으면 자동 추가.\n\n텍스트:\n' + input;
    messageContent = [{type:'text', text:userPrompt}];
  }

  try{
    var res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': ak,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: systemPrompt,
        messages:[{role:'user', content:messageContent}]
      })
    });
    var data = await res.json();
    var text = (data.content&&data.content[0]&&data.content[0].text)||'';
    var clean = text.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(clean);
    if(parsed.type && parsed.data) callback(parsed);
    else callback(null);
  }catch(e){
    console.warn('AI 파싱 실패:', e);
    callback(null);
  }
}

// ── 라우트/팀장 파일 파서
// 지원 양식:
//  [1] 고정.xlsx  : A열=캠프명또는라우트, C열=단가 (캠프명 행은 단가없음)
//  [2] 고정.txt   : "608\nB 920\nC 920" 형식 (앞자리\n뒷자리+단가)
//  [3] 팀장.txt   : "이름(ID)\n608\nB60 C60" 형식 (기사별 라우트별 수수료)

function _parseRateText(text){
  // 고정.txt 형식: 608 → B 920 형식
  var rateMap = {};
  var curPrefix = null;
  var lines = text.split(/\r?\n/);
  var isRateFormat = false;

  // 먼저 팀장 형식인지 확인 (이름(ID) 패턴)
  var hasPersonLine = lines.some(function(l){
    return /^[^\d].*\(\w+\)/.test(l.trim());
  });
  if(hasPersonLine) return _parseTeamFeeText(text);

  lines.forEach(function(line){
    line = line.trim();
    if(!line || line.startsWith('#')) return;
    // 헤더행 스킵
    if(/^라우트|^route/i.test(line)) return;
    // 3자리 숫자 = 라우트 앞자리
    if(/^\d{3}$/.test(line)){
      curPrefix = line; isRateFormat = true; return;
    }
    // "B 920" 또는 "B920" 형식
    var m = line.match(/^([A-Z])\s*(\d+)$/);
    if(m && curPrefix){
      rateMap[curPrefix+m[1]] = parseInt(m[2]);
      return;
    }
    // "라우트번호,단가" 형식
    var parts = line.split(/[,\t]+/);
    if(parts.length >= 2){
      var route = parts[0].trim().toUpperCase();
      var price = parseFloat(parts[1].replace(/[,₩\s]/g,''));
      if(route && !isNaN(price)) rateMap[route] = price;
    }
  });
  return {type:'rate', data:rateMap};
}

function _parseTeamFeeText(text){
  // 팀장.txt: 이름(ID)\n608\nB60 C60 형식
  var teamFee = {};  // {id: {route: fee}}
  var curId = null, curPrefix = null;
  text.split(/\r?\n/).forEach(function(line){
    line = line.trim();
    if(!line) return;
    // 사람 행: 이름(id) 또는 이름(id@df)
    var pm = line.match(/^[^\d\s].*\((\w+)\)/);
    if(pm){
      var rawId = pm[1];
      // @df 없으면 자동 추가
      curId = rawId.includes('@') ? rawId : rawId + '@df';
      teamFee[curId] = {};
      curPrefix = null;
      return;
    }
    // 3자리 숫자
    if(/^\d{3}$/.test(line)){ curPrefix = line; return; }
    // B60 C60 D60 형식 (붙어있거나 띄어있거나)
    if(curPrefix && curId){
      line.split(/\s+/).forEach(function(part){
        var m = part.match(/^([A-Z])(\d+)$/);
        if(m) teamFee[curId][curPrefix+m[1]] = parseInt(m[2]);
      });
    }
  });
  return {type:'teamfee', data:teamFee};
}

function _parseRateExcel(wb){
  // 고정.xlsx: A열=캠프/라우트, C열=단가
  var ws = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:''});
  var rateMap = {};
  rows.forEach(function(r){
    var col0 = String(r[0]||'').trim();
    var col2 = String(r[2]||'').trim();
    if(!col0) return;
    // 캠프명 행 (단가 없음) → 스킵
    if(!col2 || isNaN(parseFloat(col2.replace(/,/g,'')))) return;
    // 라우트 행
    var route = col0.toUpperCase();
    var price = parseFloat(col2.replace(/,/g,''));
    if(route && !isNaN(price)) rateMap[route] = price;
  });
  return {type:'rate', data:rateMap};
}

// ── 파일 업로드 처리 (텍스트/엑셀/이미지 + AI 폴백)
function _loadRateTable(inp){
  var file = inp.files[0];
  if(!file){ return; }
  inp.value = '';
  var ext = file.name.split('.').pop().toLowerCase();
  var isImage = ['jpg','jpeg','png','gif','webp','bmp'].indexOf(ext) >= 0;
  var reader = new FileReader();

  reader.onload = function(e){
    // 이미지 → AI Vision
    if(isImage){
      _handleImageFile(file, reader);
      return;
    }
    try{
      var parsed;
      if(ext === 'txt' || ext === 'csv'){
        parsed = _parseRateText(e.target.result);
      } else {
        var wb = XLSX.read(e.target.result, {type:'array'});
        parsed = _parseRateExcel(wb);
      }

      // 파싱 성공 시 바로 적용
      if(parsed && Object.keys(parsed.data).length > 0){
        _applyParsedRateData(parsed);
        return;
      }

      // 파싱 실패 → AI로 폴백
      toast('🤖 AI로 재분석 중...');
      var textContent = ext === 'txt' || ext === 'csv'
        ? e.target.result
        : null;

      if(textContent){
        _aiParseRateFile(textContent, 'text', function(aiParsed){
          if(aiParsed && Object.keys(aiParsed.data).length > 0){
            _applyParsedRateData(aiParsed);
          } else {
            toast('❌ 인식 실패 — 파일 형식을 확인하세요');
          }
        });
      } else {
        toast('⚠️ 인식 실패 — 지원 형식: txt, csv, xlsx, jpg, png');
      }

    }catch(err){
      // 에러 시도 AI 폴백
      if(ext === 'txt' || ext === 'csv'){
        toast('🤖 AI로 재분석 중...');
        _aiParseRateFile(e.target.result, 'text', function(aiParsed){
          if(aiParsed && Object.keys(aiParsed.data).length > 0){
            _applyParsedRateData(aiParsed);
          } else {
            toast('❌ 파일 읽기 실패: '+err.message);
          }
        });
      } else {
        toast('❌ 파일 읽기 실패: '+err.message);
      }
    }
  };

  if(isImage){
    reader.readAsArrayBuffer(file);
  } else if(ext === 'txt' || ext === 'csv'){
    reader.readAsText(file, 'utf-8');
  } else {
    reader.readAsArrayBuffer(file);
  }
}

// ── 고용산재 계산 (공급대가 기준)
function _calcInsurance(taxTotal){
  var supplyAmt  = taxTotal / 1.1;
  var expense    = supplyAmt * 0.346;
  var monthPay   = supplyAmt - expense;
  var employment = monthPay < 800000 ? 0 : Math.round(monthPay * 0.008);
  var accident   = Math.round(monthPay * 0.0088);
  return {
    supplyAmt:  Math.round(supplyAmt),
    expense:    Math.round(expense),
    monthPay:   Math.round(monthPay),
    employment: employment,
    accident:   accident,
    total:      employment + accident,
  };
}

// ── 실지급 재계산 (팀장수수료 + 고용산재 포함)
function _recalcCoupangNet(){
  var teamFee  = _settleState.coupangTeamFee  || {};
  var routeCnt = _settleState.coupangRouteCnt || {};
  var res = _settleState.results || [];
  res.forEach(function(r){
    // 팀장수수료
    var fee = teamFee[r.id] || {};
    var teamTotal = Object.keys(fee).reduce(function(s, route){
      return s + (routeCnt[route]||0) * fee[route];
    }, 0);
    r.teamFee = teamTotal;

    // 대리점 인센
    var incenAmt = r.count * (r.incen||0);

    // 세금계산서 합계 = 쿠팡총금액 + 프레시백 + 팀장수수료 + 대리점인센
    var taxTotal = r.amount + r.fresh + teamTotal + incenAmt;
    r.taxTotal = taxTotal;

    // 고용산재
    var ins = _calcInsurance(taxTotal);
    r.insurance = ins;

    // 실지급 = 세금계산서합계 - 고용산재 - 분실파손
    r.net = taxTotal - ins.total - r.lossAmt;
  });
}


// ── 쿠팡 인센 옵션
var INCEN_OPTIONS = [0, 10, 15, 25];

// ── 인센 설정 함수
function _setIncen(idx, val){
  _settleState.results[idx].incen = parseInt(val,10)||0;
  var r = _settleState.results[idx];
  // 재계산
  var incenAmt = r.count * (r.incen||0);
  var taxTotal = r.amount + r.fresh + (r.teamFee||0) + incenAmt;
  r.taxTotal = taxTotal;
  var ins = _calcInsurance(taxTotal);
  r.insurance = ins;
  r.net = taxTotal - ins.total - r.lossAmt;
  // 해당 행 업데이트
  var rows = document.querySelectorAll('.coupang-row');
  if(rows[idx]){
    var netCell = rows[idx].querySelector('.net-cell');
    var insCell = rows[idx].querySelector('.ins-cell');
    var taxCell = rows[idx].querySelector('.tax-cell');
    if(netCell) netCell.textContent = _fmt(r.net);
    if(insCell) insCell.textContent = '-'+_fmt(ins.total);
    if(taxCell) taxCell.textContent = _fmt(taxTotal);
  }
  _updateCoupangTotals();
}

function _updateCoupangTotals(){
  var res = _settleState.results;
  var totalIncenAmt = res.reduce(function(s,r){return s+(r.count*(r.incen||0));},0);
  var totalIns      = res.reduce(function(s,r){return s+((r.insurance&&r.insurance.total)||0);},0);
  var totalNet      = res.reduce(function(s,r){return s+r.net;},0);
  var el1 = document.getElementById('total-incen-amt');
  var el2 = document.getElementById('total-net-final');
  var el3 = document.getElementById('total-ins-amt');
  if(el1) el1.textContent = _fmt(totalIncenAmt)+'원';
  if(el2) el2.textContent = _fmt(totalNet)+'원';
  if(el3) el3.textContent = '-'+_fmt(totalIns)+'원';
}

// Firestore 저장
function _saveSettle(){
  var res = _settleState.results;
  var ym  = new Date().toISOString().slice(0,7);
  var batch = _db.batch();
  var settleId = _dealerId+'_'+ym+'_'+Date.now();

  // 정산 헤더
  var hRef = _db.collection('mbetco_settles').doc(settleId);
  batch.set(hRef, {
    dealerId:  _dealerId,
    ym:        ym,
    count:     res.length,
    totalNet:  res.reduce(function(s,r){return s+r.net;},0),
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    mapping:   _settleState.mapping,
    template:  _settleState.template||null
  });

  // 개인별 정산
  res.forEach(function(r){
    var dRef = _db.collection('mbetco_settle_details').doc(settleId+'_'+r.name);
    batch.set(dRef, Object.assign({settleId:settleId, dealerId:_dealerId, ym:ym}, r));
  });

  batch.commit().then(function(){
    toast('✅ 정산 저장 완료!');
    _settleState.step = 4;
    _settleState.settleId = settleId;
    _renderSettle();
  }).catch(function(e){
    toast('❌ 저장 실패: '+e.message);
  });
}

    +res.length+'명 · 실지급 합계 <strong style="color:var(--green)">'+_fmt(totalNet)+'원</strong></div>'
    +'<div style="display:flex;gap:8px;justify-content:center">'
    +'<button class="btn btn-secondary" onclick="_downloadExcel()">📥 엑셀 다운로드</button>'
    +'<button class="btn btn-primary" onclick="_pageSettle()">새 정산 시작</button>'
    +'</div></div>';
}

// ══════════════════════════════════════════
// ══ PAGE: 매핑 템플릿 ══
// ══════════════════════════════════════════
function _pageTemplates(){
  var c = document.getElementById('main-content');
  c.innerHTML = '<div style="color:var(--text3);text-align:center;padding:48px">로딩 중...</div>';

  _db.collection('mbetco_mappings').where('dealerId','==',_dealerId).orderBy('updatedAt','desc').get()
    .then(function(snap){
      if(snap.empty){
        c.innerHTML = '<div class="empty">'
          +'<div class="empty-icon">🗂</div>'
          +'<div class="empty-text">저장된 템플릿이 없어요</div>'
          +'<div class="empty-sub">정산 처리 시 매핑 후 저장하면 여기에 나타납니다</div>'
          +'</div>';
        return;
      }
      var html = '<div class="card"><div class="card-title">저장된 매핑 템플릿</div>';
      snap.forEach(function(d){
        var t = d.data();
        var fields = Object.keys(t.mapping||{}).map(function(k){
          var f = SETTLE_FIELDS.find(function(x){return x.key===k;});
          return f ? f.label : k;
        }).join(', ');
        html += '<div class="tmpl-item">'
          +'<div class="tmpl-icon" style="background:var(--bg4)">📋</div>'
          +'<div class="tmpl-info">'
          +'<div class="tmpl-name">'+t.name+'</div>'
          +'<div class="tmpl-desc">'+fields+'</div>'
          +'</div>'
          +'<button class="btn btn-danger btn-sm" onclick="_deleteTemplate(\''+d.id+'\')">삭제</button>'
          +'</div>';
      });
      html += '</div>';
      c.innerHTML = html;
    })
    .catch(function(e){
      c.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">'+e.message+'</div></div>';
    });
}

function _deleteTemplate(id){
  if(!confirm('템플릿을 삭제할까요?')) return;
  _db.collection('mbetco_mappings').doc(id).delete().then(function(){
    toast('삭제됨');
    _pageTemplates();
  });
}

// ══════════════════════════════════════════
// ══ PAGE: 인원 관리 ══
// ══════════════════════════════════════════
function _pageWorkers(){
  var c = document.getElementById('main-content');

  // 상단 버튼
  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn btn-primary btn-sm" onclick="_addWorkerModal()">+ 인원 추가</button>';

  c.innerHTML = '<div style="color:var(--text3);text-align:center;padding:48px">로딩 중...</div>';
  _db.collection('mbetco_workers').where('dealerId','==',_dealerId).orderBy('name').get()
    .then(function(snap){
      if(snap.empty){
        c.innerHTML = '<div class="empty">'
          +'<div class="empty-icon">👤</div>'
          +'<div class="empty-text">등록된 인원이 없어요</div>'
          +'<div class="empty-sub">+ 인원 추가 버튼으로 등록하거나,<br>정산 처리 시 자동 등록됩니다</div>'
          +'</div>';
        return;
      }
      var html = '<div class="card"><div class="tbl-wrap"><table><thead><tr>'
        +'<th>이름</th><th>ID</th><th>부서/캠프</th><th>연락처</th><th>상태</th><th></th>'
        +'</tr></thead><tbody>';
      snap.forEach(function(d){
        var w = d.data();
        html += '<tr>'
          +'<td><strong>'+w.name+'</strong></td>'
          +'<td style="color:var(--text3)">'+( w.workerId||'-')+'</td>'
          +'<td><span class="chip chip-blue">'+( w.dept||'-')+'</span></td>'
          +'<td>'+( w.phone||'-')+'</td>'
          +'<td><span class="chip '+(w.active!==false?'chip-green':'chip-red')+'">'+( w.active!==false?'재직':'퇴직')+'</span></td>'
          +'<td><button class="btn btn-secondary btn-sm" onclick="_editWorker(\''+d.id+'\')">수정</button></td>'
          +'</tr>';
      });
      html += '</tbody></table></div></div>';
      c.innerHTML = html;
    });
}

function _addWorkerModal(){
  var html = '<div class="modal-overlay" id="wk-modal">'
    +'<div class="modal-box">'
    +'<div class="modal-title">👤 인원 추가'
    +'<span class="modal-close" onclick="document.getElementById(\'wk-modal\').remove()">✕</span></div>'
    +'<div class="gr2">'
    +'<div class="fg"><label>이름 ★</label><input id="wk-name" type="text" placeholder="홍길동"></div>'
    +'<div class="fg"><label>ID/사번</label><input id="wk-id" type="text" placeholder="hong001"></div>'
    +'<div class="fg"><label>부서/캠프</label><input id="wk-dept" type="text" placeholder="부산1캠프"></div>'
    +'<div class="fg"><label>연락처</label><input id="wk-phone" type="tel" placeholder="010-0000-0000"></div>'
    +'<div class="fg"><label>건당 단가 (원)</label><input id="wk-rate" type="number" placeholder="1100" min="0"></div>'
    +'<div class="fg"><label>반품 단가 (원)</label><input id="wk-retrate" type="number" placeholder="900" min="0"></div>'
    +'</div>'
    +'<button class="btn btn-primary" style="width:100%;justify-content:center" onclick="_saveWorker()">저장</button>'
    +'</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function _saveWorker(){
  var name = (document.getElementById('wk-name')||{}).value||'';
  if(!name.trim()){toast('이름을 입력하세요');return;}
  _db.collection('mbetco_workers').add({
    dealerId:  _dealerId,
    name:      name.trim(),
    workerId:  (document.getElementById('wk-id')||{}).value||'',
    dept:      (document.getElementById('wk-dept')||{}).value||'',
    phone:     (document.getElementById('wk-phone')||{}).value||'',
    rate:      parseFloat((document.getElementById('wk-rate')||{}).value||0)||0,
    retRate:   parseFloat((document.getElementById('wk-retrate')||{}).value||0)||0,
    active:    true,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    toast('✅ 등록됨: '+name);
    document.getElementById('wk-modal').remove();
    _pageWorkers();
  });
}

function _editWorker(id){
  toast('수정 기능 준비 중');
}

// ══ PAGE: 정산 내역 ══
// ══════════════════════════════════════════
function _pageHistory(){
  var c = document.getElementById('main-content');
  c.innerHTML = '<div style="color:var(--text3);text-align:center;padding:48px">로딩 중...</div>';

  _db.collection('mbetco_settles').where('dealerId','==',_dealerId)
    .orderBy('createdAt','desc').limit(20).get()
    .then(function(snap){
      if(snap.empty){
        c.innerHTML = '<div class="empty">'
          +'<div class="empty-icon">📋</div>'
          +'<div class="empty-text">정산 내역이 없어요</div>'
          +'<div class="empty-sub">정산 처리 후 저장하면 여기에 쌓입니다</div>'
          +'</div>';
        return;
      }
      var html = '<div class="card"><div class="tbl-wrap"><table><thead><tr>'
        +'<th>정산월</th><th>인원</th><th class="num">실지급 합계</th><th>생성일시</th><th></th>'
        +'</tr></thead><tbody>';
      snap.forEach(function(d){
        var s = d.data();
        var dt = s.createdAt ? new Date(s.createdAt.seconds*1000).toLocaleString('ko-KR') : '-';
        html += '<tr>'
          +'<td><strong>'+s.ym+'</strong></td>'
          +'<td>'+s.count+'명</td>'
          +'<td class="num"><strong style="color:var(--green)">'+_fmt(s.totalNet)+'원</strong></td>'
          +'<td style="color:var(--text3);font-size:11px">'+dt+'</td>'
          +'<td><button class="btn btn-secondary btn-sm" onclick="_viewSettle(\''+d.id+'\')">상세</button></td>'
          +'</tr>';
      });
      html += '</tbody></table></div></div>';
      c.innerHTML = html;
    });
}

function _viewSettle(id){
  _db.collection('mbetco_settle_details').where('settleId','==',id).orderBy('name').get()
    .then(function(snap){
      if(snap.empty){toast('데이터 없음');return;}
      var html = '<div class="modal-overlay" id="hist-modal">'
        +'<div class="modal-box" style="max-width:700px">'
        +'<div class="modal-title">📋 정산 상세'
        +'<span class="modal-close" onclick="document.getElementById(\'hist-modal\').remove()">✕</span></div>'
        +'<div class="tbl-wrap"><table><thead><tr>'
        +'<th>이름</th><th>부서</th><th>건수</th><th class="num">총액</th><th class="num">공제</th><th class="num">원천세</th><th class="num">실지급</th>'
        +'</tr></thead><tbody>';
      snap.forEach(function(d){
        var r = d.data();
        html += '<tr>'
          +'<td>'+r.name+'</td><td>'+( r.dept||'-')+'</td>'
          +'<td>'+_fmt(r.count)+'</td>'
          +'<td class="num">'+_fmt(r.gross)+'</td>'
          +'<td class="num" style="color:var(--red)">'+_fmt(r.deduct)+'</td>'
          +'<td class="num" style="color:var(--yellow)">'+_fmt(r.tax)+'</td>'
          +'<td class="num"><strong style="color:var(--green)">'+_fmt(r.net)+'</strong></td>'
          +'</tr>';
      });
      html += '</tbody></table></div></div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    });
}
