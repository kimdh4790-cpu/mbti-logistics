<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>정산 자동화 — mbetco</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--bg4:#252840;
  --border:#2e3250;--border2:#3a3f6e;
  --acc:#4f7eff;--acc2:#7c5cff;--acc3:#00d4aa;
  --text:#e8eaf6;--text2:#9ca3c9;--text3:#5c6494;
  --red:#ff4d6d;--green:#00d4aa;--yellow:#ffc53d;--orange:#ff8c42;
  --card-shadow:0 2px 12px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sidebar-logo .logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;}
.sidebar-logo .logo-text{font-weight:700;font-size:15px;letter-spacing:-.3px;}
.sidebar-logo .logo-sub{font-size:9px;color:var(--text3);margin-top:1px;}
.nav{flex:1;overflow-y:auto;padding:8px 0;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;color:var(--text2);transition:all .15s;border-left:3px solid transparent;font-size:12px;font-weight:500;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--bg3);color:var(--acc);border-left-color:var(--acc);}
.nav-item .ni{width:16px;text-align:center;font-size:14px;}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);}
.user-chip{background:var(--bg3);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.user-chip .avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.user-chip .uinfo{flex:1;min-width:0;}
.user-chip .uname{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-chip .uemail{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;}
.topbar-title{font-weight:700;font-size:15px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.content{flex:1;padding:20px;}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--card-shadow);}
.card-title{font-weight:700;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.card-title .badge{background:var(--acc);color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:600;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--acc);color:#fff;}
.btn-primary:hover{background:#3d6de0;}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg4);color:var(--text);}
.btn-success{background:var(--green);color:#000;}
.btn-danger{background:var(--red);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fg label{font-size:11px;color:var(--text2);font-weight:600;}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc);}
.fg select option{background:var(--bg3);}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.num{text-align:right;font-variant-numeric:tabular-nums;}

/* ── CHIPS & BADGES ── */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.chip-green{background:rgba(0,212,170,.15);color:var(--green);}
.chip-red{background:rgba(255,77,109,.15);color:var(--red);}
.chip-blue{background:rgba(79,126,255,.15);color:var(--acc);}
.chip-yellow{background:rgba(255,197,61,.15);color:var(--yellow);}

/* ── STEPPER ── */
.stepper{display:flex;align-items:center;margin-bottom:20px;gap:0;}
.step{display:flex;align-items:center;gap:8px;flex:1;}
.step:last-child{flex:none;}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid var(--border);background:var(--bg3);color:var(--text3);}
.step.done .step-circle{background:var(--green);border-color:var(--green);color:#000;}
.step.active .step-circle{background:var(--acc);border-color:var(--acc);color:#fff;}
.step-label{font-size:11px;color:var(--text3);font-weight:500;}
.step.active .step-label{color:var(--text);font-weight:600;}
.step.done .step-label{color:var(--green);}
.step-line{flex:1;height:1px;background:var(--border);margin:0 6px;}
.step-line.done{background:var(--green);}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:rgba(79,126,255,.06);}
.upload-icon{font-size:36px;margin-bottom:8px;}
.upload-title{font-weight:700;font-size:14px;margin-bottom:4px;}
.upload-sub{color:var(--text3);font-size:11px;}

/* ── MAPPING UI ── */
.mapping-grid{display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;gap:8px;margin-bottom:8px;}
.map-field{background:var(--bg3);border:1px solid var(--acc);border-radius:8px;padding:7px 10px;font-size:11px;font-weight:600;color:var(--acc);}
.map-arrow{color:var(--text3);text-align:center;font-size:14px;}
.map-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:11px;font-family:inherit;outline:none;width:100%;}
.map-select:focus{border-color:var(--acc);}
.map-select option{background:var(--bg3);}
.map-required{font-size:9px;color:var(--red);margin-left:4px;}
.map-optional{font-size:9px;color:var(--text3);margin-left:4px;}

/* ── RESULT TABLE ── */
.result-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:700;}
.stat-val.green{color:var(--green);}
.stat-val.blue{color:var(--acc);}

/* ── TEMPLATE LIST ── */
.tmpl-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.tmpl-item:hover{border-color:var(--acc);background:var(--bg4);}
.tmpl-item.selected{border-color:var(--acc);background:rgba(79,126,255,.08);}
.tmpl-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tmpl-info{flex:1;}
.tmpl-name{font-size:12px;font-weight:600;}
.tmpl-desc{font-size:10px;color:var(--text3);margin-top:2px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);color:var(--text);padding:9px 18px;border-radius:24px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:all .25s;z-index:9999;pointer-events:none;border:1px solid var(--border2);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .big{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-logo .sub{font-size:11px;color:var(--text3);margin-top:4px;}
.login-err{color:var(--red);font-size:11px;text-align:center;margin-top:8px;min-height:16px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;padding:22px;}
.modal-title{font-weight:700;font-size:15px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text2);}
.empty-sub{font-size:11px;}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="big">mbetco</div>
        <div class="sub">범용 인력 정산 플랫폼</div>
      </div>
      <div class="fg">
        <label>이메일</label>
        <input id="l-email" type="email" placeholder="email@example.com" autocomplete="username">
      </div>
      <div class="fg">
        <label>비밀번호</label>
        <input id="l-pw" type="password" placeholder="비밀번호" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px;justify-content:center;padding:10px;" onclick="_doLogin()">로그인</button>
      <div id="l-err" class="login-err"></div>
    </div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app-screen" style="display:none">
  <div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">M</div>
        <div>
          <div class="logo-text">mbetco</div>
          <div class="logo-sub">정산 자동화</div>
        </div>
      </div>
      <nav class="nav">
        <div class="nav-item active" data-page="settle" onclick="_nav(this,'settle')">
          <span class="ni">📊</span> 정산 처리
        </div>
        <div class="nav-item" data-page="templates" onclick="_nav(this,'templates')">
          <span class="ni">🗂</span> 매핑 템플릿
        </div>
        <div class="nav-item" data-page="workers" onclick="_nav(this,'workers')">
          <span class="ni">👤</span> 인원 관리
        </div>
        <div class="nav-item" data-page="history" onclick="_nav(this,'history')">
          <span class="ni">📋</span> 정산 내역
        </div>
        <div class="nav-item" data-page="settings" onclick="_nav(this,'settings')">
          <span class="ni">⚙️</span> 설정
        </div>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-chip" onclick="_logout()">
          <div class="avatar" id="user-avatar">?</div>
          <div class="uinfo">
            <div class="uname" id="user-name">-</div>
            <div class="uemail" id="user-email">로그아웃</div>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-title" id="page-title">정산 처리</div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
      <div class="content" id="main-content">
        <!-- dynamic content -->
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// FIREBASE INIT
// ══════════════════════════════════════════
var _db, _auth, _CU, _dealerId;

function _initFirebase(){
  if(!firebase.apps.length){
    firebase.initializeApp({
      apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
      authDomain:'mbti-logistics.firebaseapp.com',
      projectId:'mbti-logistics',
      storageBucket:'mbti-logistics.firebasestorage.app',
      messagingSenderId:'40761160761',
      appId:'1:40761160761:web:20545b610f03f534e949e8'
    });
  }
  _db = firebase.firestore();
  _db.settings({experimentalAutoDetectLongPolling:true, merge:true});
  _auth = firebase.auth();

  _auth.onAuthStateChanged(function(user){
    if(!user){
      document.getElementById('login-screen').style.display='';
      document.getElementById('app-screen').style.display='none';
      return;
    }
    _CU = user;
    _loadDealer(user);
  });
}

function _loadDealer(user){
  // admins 먼저 체크 → 슈퍼어드민이면 바로 진입
  _db.collection('admins').doc(user.email).get()
    .then(function(adm){
      if(adm.exists){
        _dealerId = 'admin_'+user.email.split('@')[0];
        _startApp(user, adm.data().companyName||user.email.split('@')[0], true);
        return;
      }
      // 일반 고객사 체크
      return _db.collection('mbetco_companies').where('email','==',user.email).limit(1).get()
        .then(function(snap){
          if(snap.empty){
            toast('❌ 등록되지 않은 계정입니다');
            _auth.signOut();
            return;
          }
          var d = snap.docs[0];
          _dealerId = d.id;
          _startApp(user, d.data().companyName||user.email, false);
        });
    })
    .catch(function(e){
      // 인증 실패 → 로그아웃 (보안)
      console.error('[Auth] 권한 확인 실패:', e.message);
      toast('❌ 접근 권한이 없습니다');
      _auth.signOut();
    });
}

function _startApp(user, companyName, isAdmin){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='';
  document.getElementById('user-name').textContent = companyName;
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-avatar').textContent = (companyName||'?')[0].toUpperCase();
  _renderPage('settle');
}

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
function _doLogin(){
  var email = document.getElementById('l-email').value.trim();
  var pw    = document.getElementById('l-pw').value;
  var err   = document.getElementById('l-err');
  err.textContent = '';
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력하세요.';return;}
  _auth.signInWithEmailAndPassword(email, pw).catch(function(e){
    err.textContent = '로그인 실패: 이메일/비밀번호 확인';
  });
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none') _doLogin();
});
function _logout(){if(confirm('로그아웃 하시겠어요?')) _auth.signOut();}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
function _nav(el, page){
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active');});
  el.classList.add('active');
  _renderPage(page);
}
function _renderPage(page){
  var titles={settle:'정산 처리',templates:'매핑 템플릿',workers:'인원 관리',history:'정산 내역',settings:'설정'};
  document.getElementById('page-title').textContent = titles[page]||page;
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('main-content').innerHTML = '';
  if(page==='settle')    _pageSettle();
  else if(page==='templates') _pageTemplates();
  else if(page==='workers')   _pageWorkers();
  else if(page==='history')   _pageHistory();
  else if(page==='settings')  _pageSettings();
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
var _toastTimer;
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.classList.remove('show');},2800);
}

// ══════════════════════════════════════════
// ══ PAGE: 정산 처리 ══
// ══════════════════════════════════════════
var _settleState = {
  step: 1,        // 1:업로드 2:매핑 3:확인 4:완료
  headers: [],    // 엑셀 헤더
  rows: [],       // 엑셀 데이터 rows
  mapping: {},    // {name, count, amount, deduct, ...} → col index
  template: null, // 선택된 템플릿
  results: []     // 계산 결과
};

// 정산 필드 정의 (필수/선택)
var SETTLE_FIELDS = [
  {key:'name',   label:'이름/기사명',    required:true,  icon:'👤'},
  {key:'count',  label:'건수/수량',      required:true,  icon:'📦'},
  {key:'amount', label:'단가/금액',      required:true,  icon:'💰'},
  {key:'id',     label:'사번/ID',        required:false, icon:'🔑'},
  {key:'dept',   label:'부서/캠프',      required:false, icon:'🏢'},
  {key:'base',   label:'기본급',         required:false, icon:'💵'},
  {key:'bonus',  label:'인센티브/추가',  required:false, icon:'⭐'},
  {key:'deduct', label:'공제/차감',      required:false, icon:'➖'},
  {key:'note',   label:'비고',          required:false, icon:'📝'},
];

function _pageSettle(){
  _settleState = {step:1, headers:[], rows:[], mapping:{}, template:null, results:[]};
  _renderSettle();
}

function _renderSettle(){
  var c = document.getElementById('main-content');
  var s = _settleState;

  // Stepper
  var steps = ['엑셀 업로드','컬럼 매핑','데이터 확인','정산 완료'];
  var stHtml = '<div class="stepper">';
  steps.forEach(function(lbl,i){
    var n = i+1;
    var cls = n < s.step ? 'done' : (n===s.step ? 'active' : '');
    stHtml += '<div class="step '+cls+'">'
      +'<div class="step-circle">'+(n < s.step ? '✓' : n)+'</div>'
      +'<div class="step-label">'+lbl+'</div>'
      +'</div>';
    if(i < steps.length-1) stHtml += '<div class="step-line'+(n < s.step?' done':'')+'"></div>';
  });
  stHtml += '</div>';

  var body = '';
  if(s.step===1) body = _renderStep1();
  else if(s.step===2) body = _renderStep2();
  else if(s.step===3) body = _renderStep3();
  else if(s.step===4) body = _renderStep4();

  c.innerHTML = stHtml + body;

  // Drag & drop 이벤트
  if(s.step===1){
    var zone = document.getElementById('upload-zone');
    if(zone){
      zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('drag');});
      zone.addEventListener('dragleave',function(){zone.classList.remove('drag');});
      zone.addEventListener('drop',function(e){
        e.preventDefault(); zone.classList.remove('drag');
        var f = e.dataTransfer.files[0];
        if(f) _loadExcel(f);
      });
    }
  }
}

function _onFileSelected(inp){
  var f = inp.files[0];
  if(f) _loadExcel(f);
  inp.value = '';

function _loadExcel(file){
  toast('📂 파일 읽는 중...');
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      var sheetName = wb.SheetNames[0];
      // 시트가 여러 개면 선택
      if(wb.SheetNames.length > 1){
        _selectSheet(wb);
        return;
      }
      _processSheet(wb, sheetName);
    }catch(err){
      toast('❌ 파일 읽기 실패: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function _selectSheet(wb){
  var html = '<div class="card"><div class="card-title">📋 시트 선택</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-bottom:10px">파일에 시트가 여러 개 있어요. 정산 데이터가 있는 시트를 선택하세요.</div>';
  wb.SheetNames.forEach(function(sn){
    html += '<div class="tmpl-item" onclick="_processSheet(window._pendingWb,\''+sn+'\')">'
      +'<span style="font-size:18px">📄</span>'
      +'<div class="tmpl-info"><div class="tmpl-name">'+sn+'</div></div>'
      +'</div>';
  });
  html += '</div>';
  window._pendingWb = wb;
  document.getElementById('main-content').innerHTML = html;
}

function _processSheet(wb, sheetName){
  var targetWb = wb || window._pendingWb;
  if(!targetWb){toast('❌ 파일 데이터가 유실됐습니다. 다시 업로드해주세요.');return;}
  wb = targetWb;
  var raw = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header:1, raw:false, defval:''});
  if(raw.length < 2){toast('❌ 데이터가 없습니다');return;}

  // 헤더 행 찾기 (비어있는 첫 행 스킵)
  var hdrIdx = 0;
  for(var i=0; i<Math.min(raw.length,6); i++){
    var nonEmpty = raw[i].filter(function(c){return c!=='';}).length;
    if(nonEmpty >= 2){hdrIdx = i; break;}
  }

  _settleState.headers = (raw[hdrIdx]||[]).map(function(h,i){return String(h||'열'+(i+1));});
  _settleState.rows = raw.slice(hdrIdx+1).filter(function(r){
    return r.filter(function(c){return c!=='';}).length > 0;
  });
  window._pendingWb = null;  // 처리 완료 후 해제

  toast('✅ '+_settleState.rows.length+'행 로드됨');

  // 자동 매핑 항상 실행 (템플릿 있으면 preset 활용, 없으면 키워드만)
  _autoMap(_settleState.template || '__keyword');

  _settleState.step = 2;
  _renderSettle();
}

// 자동 매핑 (헤더 키워드 기반)
var AUTO_MAP_RULES = {
  name:   ['이름','성명','기사','기사명','담당자','이름/기사','worker','name','성함'],
  id:     ['아이디','id','사번','번호','쿠팡id','코드'],
  dept:   ['캠프','부서','지점','팀','지역','camp','dept'],
  count:  ['건수','수량','배달건','픽업건','count','qty','건','합계건'],
  amount: ['단가','금액','요금','수당','pay','amount','가격','합계금액','지급액'],
  base:   ['기본급','기본','기본금','base'],
  bonus:  ['인센티브','추가','보너스','성과','bonus','incentive'],
  deduct: ['공제','차감','반품','deduct','minus'],
  note:   ['비고','메모','note','remark'],
};

function _autoMap(templateId){
  var headers = _settleState.headers;
  var mapping = {};

  // 내장 템플릿별 특수 처리
  var presets = {
    __cj:     {name:'기사명',count:'배달건수',amount:'단가'},
    __hanjin: {name:'성명',  count:'건수',   amount:'금액'},
    __lotte:  {name:'이름',  count:'물량',   amount:'수수료'},
    __baedal: {name:'기사',  count:'건수',   amount:'건당단가'},
  };
  var preset = presets[templateId];

  SETTLE_FIELDS.forEach(function(f){
    // 1. 정확한 헤더명 매칭
    if(preset && preset[f.key]){
      var idx = headers.findIndex(function(h){return h===preset[f.key];});
      if(idx>=0){mapping[f.key]=idx; return;}
    }
    // 2. 키워드 유사 매칭
    var rules = AUTO_MAP_RULES[f.key]||[];
    for(var i=0;i<headers.length;i++){
      var h = headers[i].toLowerCase().replace(/\s/g,'');
      for(var j=0;j<rules.length;j++){
        if(h.includes(rules[j].toLowerCase())){
          if(mapping[f.key]===undefined) mapping[f.key]=i;
          break;
        }
      }
    }
  });
  _settleState.mapping = mapping;
}

function _goStep3(){
  var m = _settleState.mapping;
  if(m.name===undefined){toast('⚠️ 이름 열을 선택하세요');return;}
  if(m.count===undefined && m.amount===undefined){toast('⚠️ 건수 또는 금액 열을 선택하세요');return;}
  toast('⏳ 인원 단가 로드 중...');
  // workers 로드 후 계산
  _db.collection('mbetco_workers').where('dealerId','==',_dealerId).get()
    .then(function(snap){
      var workers = {};
      snap.forEach(function(d){
        var w = d.data();
        if(w.name) workers[w.name] = w;
        if(w.workerId) workers[w.workerId] = w;
      });
      _settleState.workers = workers;
      _calcResults();
      _settleState.step = 3;
      _renderSettle();
    })
    .catch(function(){
      _settleState.workers = {};
      _calcResults();
      _settleState.step = 3;
      _renderSettle();
    });
}

// ── 정산 계산
function _calcResults(){
  var rows = _settleState.rows;
  var m    = _settleState.mapping;
  var results = [];
  var workers = _settleState.workers || {};  // {id: {rate, retRate, dept}}

  // 이름 기준 집계
  var byName = {};
  rows.forEach(function(r){
    var name = String(r[m.name]||'').trim();
    if(!name) return;
    if(!byName[name]) byName[name] = {
      name: name,
      id:   m.id!==undefined    ? String(r[m.id]||'')   : '',
      dept: m.dept!==undefined  ? String(r[m.dept]||'') : '',
      rows: []
    };
    byName[name].rows.push(r);
  });

  Object.values(byName).forEach(function(p){
    var totalCount  = 0;
    var totalAmount = 0;  // 엑셀 원본 금액 (매출)
    var totalBase   = 0;
    var totalBonus  = 0;
    var totalDeduct = 0;

    p.rows.forEach(function(r){
      totalCount  += _toNum(r[m.count]);
      totalAmount += _toNum(r[m.amount]);
      totalBase   += _toNum(r[m.base]);
      totalBonus  += _toNum(r[m.bonus]);
      totalDeduct += _toNum(r[m.deduct]);
    });

    // 회사 단가 적용 (workers에 등록된 단가 우선)
    var wk = workers[p.name] || workers[p.id] || null;
    var workerRate = wk ? (wk.rate||0) : 0;
    var dept = (wk && wk.dept) ? wk.dept : p.dept;

    // 지급액 계산
    // 회사단가 있으면: 건수 × 단가
    // 없으면: 엑셀 금액 그대로
    var baseAmt = workerRate > 0
      ? totalCount * workerRate
      : (totalAmount > 0 ? totalAmount : totalCount * 0);

    var gross    = baseAmt + totalBase + totalBonus;
    var net      = gross - totalDeduct;
    var tax33    = Math.round(net * 0.033);
    var netFinal = net - tax33;

    // 마진 = 엑셀금액(매출) - 실지급
    var revenue = totalAmount;
    var margin  = revenue > 0 ? revenue - netFinal : 0;

    results.push({
      name:        p.name,
      id:          p.id,
      dept:        dept,
      count:       totalCount,
      amount:      totalAmount,   // 엑셀 원본 (매출)
      workerRate:  workerRate,    // 적용 단가
      base:        totalBase,
      bonus:       totalBonus,
      deduct:      totalDeduct,
      gross:       gross,
      tax:         tax33,
      net:         netFinal,
      revenue:     revenue,       // 매출
      margin:      margin,        // 마진
      rowCount:    p.rows.length
    });
  });

  results.sort(function(a,b){return a.dept.localeCompare(b.dept)||a.name.localeCompare(b.name);});
  _settleState.results = results;
}

function _toNum(v){
  if(v===undefined||v===null||v==='') return 0;
  var n = parseFloat(String(v).replace(/[,₩\s]/g,''));
  return isNaN(n) ? 0 : n;
}

function _fmt(n){
  if(!n && n!==0) return '-';
  return Math.round(n).toLocaleString('ko-KR');

function _editRow(i){

    +'<div class="modal-box">'
    +'<div class="modal-title">✏️ '+r.name+' 정산 수정'
    +'<span class="modal-close" onclick="document.getElementById(\'edit-modal\').remove()">✕</span></div>'
    +'<div class="gr2">'
    +'<div class="fg"><label>총액 (원)</label><input id="e-gross" type="number" value="'+r.gross+'"></div>'
    +'<div class="fg"><label>공제 (원)</label><input id="e-deduct" type="number" value="'+r.deduct+'"></div>'
    +'<div class="fg"><label>인센티브 (원)</label><input id="e-bonus" type="number" value="'+r.bonus+'"></div>'
    +'<div class="fg"><label>비고</label><input id="e-note" type="text" value="'+(r.note||'')+'"></div>'
    +'</div>'
    +'<button class="btn btn-primary" style="width:100%;justify-content:center" onclick="_applyEdit('+i+')">적용</button>'
    +'</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function _applyEdit(i){
  var r = _settleState.results[i];
  r.gross   = _toNum(document.getElementById('e-gross').value);
  r.deduct  = _toNum(document.getElementById('e-deduct').value);
  r.bonus   = _toNum(document.getElementById('e-bonus').value);
  r.note    = document.getElementById('e-note').value;
  r.tax     = Math.round((r.gross - r.deduct) * 0.033);
  r.net     = r.gross - r.deduct - r.tax;
  document.getElementById('edit-modal').remove();
  _settleState.step = 3;
  _renderSettle();
}

// 엑셀 다운로드
function _downloadExcel(){
  var res = _settleState.results;
  var ws_data = [['이름','부서/캠프','건수','총액','공제','원천세(3.3%)','실지급액','비고']];
  res.forEach(function(r){
    ws_data.push([r.name, r.dept, r.count, r.gross, r.deduct, r.tax, r.net, r.note||'']);
  });
  var ws = XLSX.utils.aoa_to_sheet(ws_data);
  ws['!cols'] = [{wch:12},{wch:10},{wch:8},{wch:12},{wch:10},{wch:12},{wch:12},{wch:15}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '정산결과');
  var ym = new Date().toISOString().slice(0,7).replace('-','');
  XLSX.writeFile(wb, 'settle_'+ym+'.xlsx');
}

// Firestore 저장
function _saveSettle(){
  var res = _settleState.results;
  var ym  = new Date().toISOString().slice(0,7);
  var batch = _db.batch();
  var settleId = _dealerId+'_'+ym+'_'+Date.now();

  // 정산 헤더
  var hRef = _db.collection('mbetco_settles').doc(settleId);
  batch.set(hRef, {
    dealerId:  _dealerId,
    ym:        ym,
    count:     res.length,
    totalNet:  res.reduce(function(s,r){return s+r.net;},0),
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    mapping:   _settleState.mapping,
    template:  _settleState.template||null
  });

  // 개인별 정산
  res.forEach(function(r){
    var dRef = _db.collection('mbetco_settle_details').doc(settleId+'_'+r.name);
    batch.set(dRef, Object.assign({settleId:settleId, dealerId:_dealerId, ym:ym}, r));
  });

  batch.commit().then(function(){
    toast('✅ 정산 저장 완료!');
    _settleState.step = 4;
    _settleState.settleId = settleId;
    _renderSettle();
  }).catch(function(e){
    toast('❌ 저장 실패: '+e.message);
  });
}

// ── STEP 4: 완료
function _renderStep4(){
  var res = _settleState.results;
  var totalNet = res.reduce(function(s,r){return s+r.net;},0);
  return '<div class="card" style="text-align:center;padding:40px 20px">'
    +'<div style="font-size:48px;margin-bottom:12px">🎉</div>'
    +'<div style="font-size:18px;font-weight:700;margin-bottom:6px">정산 완료!</div>'
    +'<div style="color:var(--text2);font-size:13px;margin-bottom:20px">'
    +res.length+'명 · 실지급 합계 <strong style="color:var(--green)">'+_fmt(totalNet)+'원</strong></div>'
    +'<div style="display:flex;gap:8px;justify-content:center">'
    +'<button class="btn btn-secondary" onclick="_downloadExcel()">📥 엑셀 다운로드</button>'
    +'<button class="btn btn-primary" onclick="_pageSettle()">새 정산 시작</button>'
    +'</div></div>';
}

// ══ PAGE: 매핑 템플릿 ══
// ══════════════════════════════════════════
function _pageTemplates(){
  var c = document.getElementById('main-content');
  c.innerHTML = '<div style="color:var(--text3);text-align:center;padding:48px">로딩 중...</div>';

  _db.collection('mbetco_mappings').where('dealerId','==',_dealerId).orderBy('updatedAt','desc').get()
    .then(function(snap){
      if(snap.empty){
        c.innerHTML = '<div class="empty">'
          +'<div class="empty-icon">🗂</div>'
          +'<div class="empty-text">저장된 템플릿이 없어요</div>'
          +'<div class="empty-sub">정산 처리 시 매핑 후 저장하면 여기에 나타납니다</div>'
          +'</div>';
        return;
      }
      var html = '<div class="card"><div class="card-title">저장된 매핑 템플릿</div>';
      snap.forEach(function(d){
        var t = d.data();
        var fields = Object.keys(t.mapping||{}).map(function(k){
          var f = SETTLE_FIELDS.find(function(x){return x.key===k;});
          return f ? f.label : k;
        }).join(', ');
        html += '<div class="tmpl-item">'
          +'<div class="tmpl-icon" style="background:var(--bg4)">📋</div>'
          +'<div class="tmpl-info">'
          +'<div class="tmpl-name">'+t.name+'</div>'
          +'<div class="tmpl-desc">'+fields+'</div>'
          +'</div>'
          +'<button class="btn btn-danger btn-sm" onclick="_deleteTemplate(\''+d.id+'\')">삭제</button>'
          +'</div>';
      });
      html += '</div>';
      c.innerHTML = html;
    })
    .catch(function(e){
      c.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">'+e.message+'</div></div>';
    });
}

function _deleteTemplate(id){
  if(!confirm('템플릿을 삭제할까요?')) return;
  _db.collection('mbetco_mappings').doc(id).delete().then(function(){
    toast('삭제됨');
    _pageTemplates();
  });
}

function _addWorkerModal(){

    +'<div class="modal-box">'
    +'<div class="modal-title">👤 인원 추가'

    +'<div class="gr2">'

    +'<div class="fg"><label>연락처</label><input id="wk-phone" type="tel" placeholder="010-0000-0000"></div>'
    +'<div class="fg"><label>건당 단가 (원)</label><input id="wk-rate" type="number" placeholder="1100" min="0"></div>'
    +'<div class="fg"><label>반품 단가 (원)</label><input id="wk-retrate" type="number" placeholder="900" min="0"></div>'
    +'</div>'

    +'</div></div>';

function _saveWorker(){
  var name = (document.getElementById('wk-name')||{}).value||'';
  if(!name.trim()){toast('이름을 입력하세요');return;}
  _db.collection('mbetco_workers').add({
    dealerId:  _dealerId,
    name:      name.trim(),
    workerId:  (document.getElementById('wk-id')||{}).value||'',
    dept:      (document.getElementById('wk-dept')||{}).value||'',
    phone:     (document.getElementById('wk-phone')||{}).value||'',
    rate:      parseFloat((document.getElementById('wk-rate')||{}).value||0)||0,
    retRate:   parseFloat((document.getElementById('wk-retrate')||{}).value||0)||0,
    active:    true,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    toast('✅ 등록됨: '+name);
    document.getElementById('wk-modal').remove();
    _pageWorkers();
  });
}

function _editWorker(id){
