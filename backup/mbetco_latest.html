<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>mbetco — 범용 정산 플랫폼</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--bg4:#252840;
  --border:#2e3250;--border2:#3a3f6e;
  --acc:#4f7eff;--acc2:#7c5cff;--acc3:#00d4aa;
  --brand:#4f7eff;
  --text:#e8eaf6;--text2:#9ca3c9;--text3:#5c6494;
  --red:#ff4d6d;--green:#00d4aa;--yellow:#ffc53d;--orange:#ff8c42;
  --purple:#7c3aed;--teal:#00d4aa;
  --card-shadow:0 2px 12px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sidebar-logo .logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;}
.sidebar-logo .logo-text{font-weight:700;font-size:15px;letter-spacing:-.3px;}
.sidebar-logo .logo-sub{font-size:9px;color:var(--text3);margin-top:1px;}
.nav{flex:1;overflow-y:auto;padding:8px 0;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;color:var(--text2);transition:all .15s;border-left:3px solid transparent;font-size:12px;font-weight:500;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--bg3);color:var(--acc);border-left-color:var(--acc);}
.nav-item .ni{width:16px;text-align:center;font-size:14px;}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);}
.user-chip{background:var(--bg3);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.user-chip .avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.user-chip .uinfo{flex:1;min-width:0;}
.user-chip .uname{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-chip .uemail{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;}
.topbar-title{font-weight:700;font-size:15px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.content{flex:1;padding:20px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--card-shadow);}
.card-title{font-weight:700;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ch{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ct{font-weight:700;font-size:13px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.btn-primary{background:var(--acc);border-color:var(--acc);color:#fff;}
.btn-primary:hover{background:#3d6eee;color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-red{background:var(--red);border-color:var(--red);color:#fff;}
.btn-green{background:var(--green);border-color:var(--green);color:#000;}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#000;}
.btn-blue{background:var(--acc);border-color:var(--acc);color:#fff;}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;}
.fg input:focus,.fg select:focus{border-color:var(--acc);}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--bg3);padding:8px;text-align:left;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);}
.tbl td{padding:8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:hover td{background:rgba(79,126,255,.04);}
.tbl .num{text-align:right;}
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:rgba(79,126,255,.06);}
.upload-icon{font-size:36px;margin-bottom:8px;}
.upload-title{font-weight:700;font-size:14px;margin-bottom:4px;}
.upload-sub{color:var(--text3);font-size:11px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:700;}
.stat-val.green{color:var(--green);}
.stat-val.blue{color:var(--acc);}
.stat-val.red{color:var(--red);}
.stat-val.purple{color:var(--purple);}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;}
.b-wait{background:rgba(255,196,60,.15);color:#ffc53d;}
.b-done{background:rgba(0,212,170,.15);color:#00d4aa;}
.b-coral{background:rgba(255,77,109,.15);color:#ff4d6d;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);color:var(--text);padding:9px 18px;border-radius:24px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:all .25s;z-index:9999;pointer-events:none;border:1px solid var(--border2);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .big{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-logo .sub{font-size:11px;color:var(--text3);margin-top:4px;}
.login-err{color:var(--red);font-size:11px;text-align:center;margin-top:8px;min-height:16px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;padding:22px;}
.modal-title{font-weight:700;font-size:15px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text2);}
.empty-sub{font-size:11px;}
/* 탭 */
.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab-btn{padding:8px 14px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--acc);border-bottom-color:var(--acc);}
/* 캠프 구분 */
.camp-header{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:12px;}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="big">mbetco</div>
        <div class="sub">범용 인력 정산 플랫폼</div>
      </div>

<!-- MAIN APP -->
<div id="app-screen" style="display:none">
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">M</div>
        <div>
          <div class="logo-text">mbetco</div>

        </div>
      </div>

        <div class="nav-item active" onclick="_nav(this,'settle')"><span class="ni">📊</span> 정산 처리</div>
        <div class="nav-item" onclick="_nav(this,'history')"><span class="ni">📋</span> 정산 내역</div>
        <div class="nav-item" onclick="_nav(this,'workers')"><span class="ni">👤</span> 인원 관리</div>

        </div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div class="topbar-title" id="page-title">정산 처리</div>

<script>
// ══ FIREBASE INIT ══
var _db, _auth, _CU, _dealerId;
function _initFirebase(){
  if(!firebase.apps.length){
    firebase.initializeApp({
      apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
      authDomain:'mbti-logistics.firebaseapp.com',
      projectId:'mbti-logistics',
      storageBucket:'mbti-logistics.firebasestorage.app',
      messagingSenderId:'40761160761',
      appId:'1:40761160761:web:20545b610f03f534e949e8'
    });
  }
  _db=firebase.firestore();
  _db.settings({experimentalAutoDetectLongPolling:true,merge:true});
  _auth=firebase.auth();
  _auth.onAuthStateChanged(function(user){
    if(!user){document.getElementById('login-screen').style.display='';document.getElementById('app-screen').style.display='none';return;}
    _CU=user;_loadDealer(user);
  });
}

function _loadDealer(user){
  _db.collection('admins').doc(user.email).get()
    .then(function(adm){
      if(adm.exists){_dealerId='admin_'+user.email.split('@')[0];_CU.dealerId=_dealerId;_startApp(user,adm.data().companyName||user.email.split('@')[0],true);return;}
      return _db.collection('mbetco_companies').where('email','==',user.email).limit(1).get()
        .then(function(snap){
          if(snap.empty){toast('❌ 등록되지 않은 계정');_auth.signOut();return;}
          var d=snap.docs[0];_dealerId=d.id;_CU.dealerId=_dealerId;
          _startApp(user,d.data().companyName||user.email,false);
        });
    }).catch(function(e){toast('❌ 접근 권한 없음');_auth.signOut();});
}

function _startApp(user,companyName,isAdmin){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='';
  document.getElementById('user-name').textContent=companyName;
  document.getElementById('user-email').textContent=user.email;
  document.getElementById('user-avatar').textContent=(companyName||'?')[0].toUpperCase();
  _loadPricesFromFirestore();
  _renderPage('settle');
}

// ══ AUTH ══
function _doLogin(){
  var email=document.getElementById('l-email').value.trim();
  var pw=document.getElementById('l-pw').value;
  var err=document.getElementById('l-err');err.textContent='';
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력하세요.';return;}
  _auth.signInWithEmailAndPassword(email,pw).catch(function(){err.textContent='로그인 실패: 이메일/비밀번호 확인';});
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')_doLogin();});
function _logout(){if(confirm('로그아웃 하시겠어요?'))_auth.signOut();}

// ══ UTIL ══
function fmt(n){return Math.round(n||0).toLocaleString('ko-KR');}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(m){var t=document.getElementById('toast');if(!t)return;t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3000);}
function curMonth(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function _toNum(v){if(v===undefined||v===null||v==='')return 0;var n=parseFloat(String(v).replace(/[,₩\s]/g,''));return isNaN(n)?0:n;}
function ls(k){try{return JSON.parse(localStorage.getItem('mb_'+k)||'[]');}catch(e){return[];}}
function lss(k,v){try{localStorage.setItem('mb_'+k,JSON.stringify(v));}catch(e){}}
function lsg(k){try{return JSON.parse(localStorage.getItem('mb_'+k)||'null');}catch(e){return null;}}

// ══ NAV ══
function _nav(el,page){
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active');});
  el.classList.add('active');_renderPage(page);
}
function _renderPage(page){
  var titles={settle:'정산 처리',history:'정산 내역',workers:'인원 관리',prices:'단가 설정',settings:'설정'};
  document.getElementById('page-title').textContent=titles[page]||page;
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('main-content').innerHTML='';
  if(page==='settle')_pageSettle();
  else if(page==='history')_pageHistory();
  else if(page==='workers')_pageWorkers();
  else if(page==='prices')_pagePrices();
  else if(page==='settings')_pageSettings();
}

// ══════════════════════════════════════════
// ██ 정산 엔진 (settle.html 완전 이식) ██
// ══════════════════════════════════════════
var RPRICE = {};
var RPRICE_ADJ = {}; // 수정 단가 (라우트수정단가 파일 적용)
// ※ 단가는 Firestore(_routePrices)에서만 로드. 하드코딩 기본값 없음.
// 초기화(전체초기화) 시 완전히 비워집니다.
// 캠프명 매핑 (라우트 숫자코드 → 캠프명)
// 캠프 설정 (Firestore {dealerId}_campConfig 에서 로드 - per dealer)
var _campConfig={};  // { campName: {color,lat,lng,addr} }
// ★ CAMP_NAMES, CAMP_ORDER, CAMP_COLOR, CAMP_GPS_DEFAULT 하드코딩 제거
//    모든 캠프 정보는 _routeCampMap(라우트→캠프) + _campConfig(캠프→설정)에서 동적 로드
var CAMP_NAMES={};   // 호환성 유지 (비워둠 - _routeCampMap이 우선)
var CAMP_ORDER=[];   // 동적
var CAMP_COLOR={};   // 동적
var CAMP_GPS_DEFAULT={};  // 동적

// 캠프 GPS 조회 (per-dealer)
function getCampGps(campName){
  var cfg=_campConfig[campName];
  if(cfg&&cfg.lat)return{lat:cfg.lat,lng:cfg.lng,addr:cfg.addr||''};
  return null;
}
// _campConfig → _CAMP_FIXED_COLORS 동기화
function _syncCampColors(){
  Object.keys(_campConfig).forEach(function(cn){
    if(_campConfig[cn]&&_campConfig[cn].color){
      _CAMP_FIXED_COLORS[cn]=_campConfig[cn].color;
    }
  });
  _campColorCache={};  // 캐시 초기화
}

function getCampByRoute(route){
  if(!route) return '';
  var code=route.replace(/[A-Da-d]$/,'').slice(0,3);
  return (CAMP_NAMES&&CAMP_NAMES[code])||'';
}

// _getIncSetting 간단 대체 (settle.html용)
function _getIncSetting(driver,route){
  var k=_incKey(driver,route);
  var stored=localStorage.getItem(k);
  if(stored){try{return JSON.parse(stored);}catch(e){}}
  return{on:true,rate:G_PRICES&&G_PRICES.freshbag_inc||25};
}

// ██ 업종별 정산 엔진 (DONWAY Multi-Industry) ██
var _COMPANY_CFG = null; // 회사 업종 설정 캐시

function _loadCompanyCfg(dealerId){
  if(!_db||!dealerId) return;
  // dealerId로 직접 조회
  _db.collection('companies').doc(dealerId).get()
    .then(function(doc){
      if(doc.exists){
        _COMPANY_CFG = doc.data();
        // 관리자 이름 설정
        if(_CU && !_CU.name && doc.data().name) _CU.name = doc.data().name;
        if(_CU && !_CU.name && doc.data().companyName) _CU.name = doc.data().companyName;
      }
    }).catch(function(){});
}

// 배달대행 정산
// 배달대행 차액 정산법 (고정단가 / 앱실수령 차액)
// 기사: 건수 × 고정단가 → 항상 이 금액 보장
// 대리점: 앱실수령 - 기사지급 = 마진(+)손실(-)
function _getDeliveryTierPrice(weekTotal, tiers, basePrice){
  if(!tiers||!tiers.length) return basePrice||2900;
  var sorted=tiers.slice().sort(function(a,b){return b.minCnt-a.minCnt;});
  for(var i=0;i<sorted.length;i++){if(weekTotal>=sorted[i].minCnt)return sorted[i].price;}
  return basePrice||2900;
}
function calcNet_delivery(x, cfg){
  var weekTotal      = +x.weekTotal||+x.dcnt||+x.callCnt||0;
  var actualEarnings = +x.actualEarnings||0;   // 앱 실수령
  var nightCnt       = +x.nightCnt||0;
  var missionAmt     = +x.missionAmt||0;
  var eventAmt       = +x.eventAmt||0;
  var tiers          = cfg.tiers||[];
  var basePrice      = cfg.callPrice||2900;
  var nightSurcharge = cfg.nightSurcharge||0;
  var programFee     = cfg.programFee||0;
  var taxRate        = cfg.withhold==='3.3'?0.033:0;

  // 주간 건수 → 구간 단가 결정
  var fixedPrice  = _getDeliveryTierPrice(weekTotal, tiers, basePrice);
  // 기사 보장액 = 건수 × 고정단가
  var driverGuarantee = weekTotal * fixedPrice;
  // 심야 추가
  var nightAddAmt = nightCnt * nightSurcharge;
  var gross = driverGuarantee + nightAddAmt + missionAmt + eventAmt;
  var tax   = Math.round(gross * taxRate);
  var net   = gross - tax - programFee;

  // 대리점 차액 계산 (앱실수령 입력 시)
  var agencyMargin = 0, topUpAmt = 0, recoveryAmt = 0;
  if(actualEarnings > 0){
    agencyMargin  = actualEarnings - driverGuarantee;
    topUpAmt      = agencyMargin < 0 ? Math.abs(agencyMargin) : 0;  // 대리점 보전
    recoveryAmt   = agencyMargin > 0 ? agencyMargin : 0;             // 대리점 회수
  }

  var label = weekTotal+'건 × ₩'+fixedPrice.toLocaleString()+'/건(고정)'
    +(actualEarnings>0 ? ' | 앱실수령 ₩'+actualEarnings.toLocaleString()
      +(agencyMargin>=0 ? ' → 대리점 +₩'+recoveryAmt.toLocaleString()
                        : ' → 대리점 -₩'+topUpAmt.toLocaleString()) : '')
    +(nightCnt>0   ? ' | 심야 '+nightCnt+'건' : '')
    +(missionAmt>0 ? ' | 미션 +₩'+missionAmt.toLocaleString() : '');

  return {
    gross:gross, tax:tax, net:Math.max(0,net), income:gross,
    emp:0, work:0, deductions:tax+programFee,
    // 차액 정산 전용 필드
    fixedPrice:fixedPrice, driverGuarantee:driverGuarantee,
    actualEarnings:actualEarnings, agencyMargin:agencyMargin,
    topUpAmt:topUpAmt, recoveryAmt:recoveryAmt,
    nightAddAmt:nightAddAmt,
    label:label
  };
}

// 소상공인 정산
function calcNet_smallbiz(x, cfg){
  var sales = +x.sales||+x.totalSales||0;
  var cardFee = Math.round(sales * (cfg.cardFeeRate||0) / 100);
  var delivFee = Math.round(sales * (cfg.deliveryFeeRate||0) / 100);
  var laborCost = +x.laborCost||0;
  var net = sales - cardFee - delivFee - laborCost;
  return { gross:sales, net:Math.max(0,net), income:sales,
           emp:0, work:0, deductions:cardFee+delivFee+laborCost,
           label:'매출 ₩'+sales.toLocaleString() };
}

// 용역업체 정산
function calcNet_service(x, cfg){
  var hours = +x.hours||+x.workHours||0;
  var days  = +x.days||+x.workDays||0;
  var rate  = cfg.serviceRate||12000;
  var type  = cfg.serviceType||'hourly';
  var gross = type==='hourly' ? hours*rate : type==='daily' ? days*rate : (+x.monthly||0);
  var allowance = cfg.allowance||0;
  var insRate = cfg.insurance==='3.3' ? 0.033 : cfg.insurance==='yes' ? 0.099 : 0;
  var tax = Math.round(gross * insRate);
  var net = gross - tax + allowance;
  return { gross:gross, tax:tax, net:Math.max(0,net), income:gross,
           emp:0, work:0, deductions:tax,
           label:(type==='hourly'?hours+'시간':days+'일')+' × '+rate.toLocaleString()+'원' };
}

// 프리랜서 정산
function calcNet_freelance(x, cfg){
  var amount = +x.amount||+x.projectAmt||+x.dcnt||0;
  var taxRate = cfg.taxRate==='3.3'?0.033 : cfg.taxRate==='8.8'?0.088 : 0;
  var tax = Math.round(amount * taxRate);
  var net = amount - tax;
  return { gross:amount, tax:tax, net:Math.max(0,net), income:amount,
           emp:0, work:0, deductions:tax,
           label:'프리랜서 ₩'+amount.toLocaleString() };
}

// 업종 자동 감지 → 해당 엔진으로 분기
function calcNetByIndustry(x){
  var cfg = _COMPANY_CFG&&_COMPANY_CFG.industryConfig;
  if(!cfg) return null; // 쿠팡 기본 엔진 사용
  var type = cfg.type||(_COMPANY_CFG&&_COMPANY_CFG.industryType)||'coupang';
  if(type==='delivery')   return calcNet_delivery(x, cfg);
  if(type==='smallbiz')   return calcNet_smallbiz(x, cfg);
  if(type==='service')    return calcNet_service(x, cfg);
  if(type==='freelance')  return calcNet_freelance(x, cfg);
  return null; // coupang → 기존 calcNet 사용
}

// ██ calcNet (쿠팡 물류 기본) ██
function calcNet(x){
  var uid=x.userId||x.driver||x.id||'';
  if(!x)return {damt:0,ramt:0,fresh:0,finc:0,_fincPerUnit:0,inc:0,nocont:0,etcPlus:0,etcMinus:0,totalAmt:0,vatIncome:0,hourlyWage:0,tax:0,emp:0,work:0,eq:0,dmg:0,adv:0,deduct:0,net:0,isYong:false,isCoupang:false,yDel:0,yRet:0};
  // ★ 업종별 엔진 먼저 시도
  var _indResult = calcNetByIndustry(x);
  if(_indResult) return _indResult;
  // 쿠팡 물류 기본 엔진 (하위 호환)
  var dcnt=+x.dcnt||+x.delivCount||0;
  var rcnt=+x.rcnt||+x.retCount||0;
  // 용차: 건수×단가, 쿠팡: 라우트별 RPRICE × 건수로 강제 재계산 (v9.25)
  var isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  var yDel=+x.yongDel||(G_PRICES.yong_del||900); var yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  // ★ v9.25: 쿠팡 기사 정산은 무조건 RPRICE × 건수로 재계산
  //          엑셀의 회사 단가/저장된 x.damt 흔적 차단 → routeDetails 우선
  //          정책: 엑셀 단가 = 회사 단가(매출), 기사 단가 = 앱 관리자 RPRICE
  var _xRoutes = x.routeDetails || [];
  // ★ RPRICE(라우트단가표) 절대 우선 → routeDetails.unitPrice(업로드 시 이미 RPRICE 반영) 순
  var _damtRP = _xRoutes.reduce(function(s,rd){return s+(rd.cnt||0)*(RPRICE[rd.route]||rd.unitPrice||0);},0);
  var _ramtRP = _xRoutes.reduce(function(s,rd){return s+(rd.ret||0)*(RPRICE[rd.route]||rd.unitPrice||0);},0);
  var damt=isYong ? dcnt*yDel : (_xRoutes.length ? _damtRP : (+x.damt||+x.delivAmt||+x.base||0));
  var ramt=isYong ? rcnt*yRet : (_xRoutes.length ? _ramtRP : (+x.ramt||+x.retAmt||0));
  // ★ fresh/inc: 정산총괄에서 VAT제외로 파싱됨 → income 계산 시 VAT포함 변환
  var fresh=+x.fresh||+x.freshAmt||0;  // ★ 프레시백 회수금액만 엑셀값 사용
  // ★ 프레시백 인센티브: 기사별 설정값(0/10/15/25원) 또는 col10 실제값 사용
  var isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  // ★ finc: 저장된 값(col10 실제값) 우선, 없으면 _getIncSetting 기사별 설정
  var _fincStored=+x.finc||0;
  var _fincRate=0;
  // ★ routeDetails로 라우트 ON/OFF 체크
  var _xRoutes=x.routeDetails||[];
  var _cnetAnyOff=false;
  if(typeof _getIncSetting==='function'&&_xRoutes.length){
    for(var _ri=0;_ri<_xRoutes.length;_ri++){
      if(!_getIncSetting(uid,_xRoutes[_ri].route||'').on){_cnetAnyOff=true;break;}
    }
  }
  if(!_fincStored&&isCoupang&&dcnt>0){
    if(_xRoutes.length&&typeof _getIncSetting==='function'){
      // ★ 라우트별 단가 계산 (ON 라우트만)
      var _fincVal=0;
      _xRoutes.forEach(function(rd){
        var _s=_getIncSetting(uid,rd.route||'');
        if(_s.on&&_s.rate>0) _fincVal+=(rd.cnt||0)*_s.rate;
      });
      _fincRate=dcnt>0?_fincVal/dcnt:0;
    } else {
      // ★ 라우트 없을 때만 __all__ fallback
      _fincRate=typeof _getIncSetting==='function'
        ?(_getIncSetting(uid,'__all__').rate||0)
        :(G_PRICES&&G_PRICES.freshbag_inc||0);
    }
  }
  var finc=isCoupang?(_fincStored>0?_fincStored:Math.round(dcnt*_fincRate)):0;
  var _fincPerUnit=dcnt>0?Math.round(finc/dcnt):_fincRate; // 건당 단가 (명세서 표시용)
  var inc=+x.inc||0;
  // ★ 미계약건: 항상 RPRICE['nocont_w1/w2'] × 건수 재계산 (저장값·엑셀금액 무시)
  var _nocontCnt=+x.nocontCnt||0;
  var _nocontIsW2=(x.camp||'').includes('부산');
  var _nocontUnit=_nocontIsW2?(RPRICE['nocont_w2']||0):(RPRICE['nocont_w1']||0);
  // ★ RPRICE에 미계약 단가 없으면 저장된 엑셀 금액 사용 (fallback)
  var nocont=_nocontCnt>0
    ? (_nocontUnit>0 ? _nocontCnt*_nocontUnit : (+x.nocont||+x.nocontAmt||0))
    : (+x.nocont||+x.nocontAmt||0);
  var etcPlus  = (+x.etcPlus||0) + (+x.etcPlusTL||0);  // ★ 기타(+) + 팀장수수료 (세금계산서 합계에 포함)
  var etcMinus = +x.etcMinus || 0;  // ★ 기타(-)
  // ★ v9.25: 기타(+)만 세금계산서(income)에 포함 → 고용·산재 기준
  //           기타(-)는 세금계산서 제외, 실지급에서만 차감 (공제 항목)
  var income=damt+ramt+fresh+finc+nocont+etcPlus;  // ★ inc(추가인센)은 세금계산서 base 제외
  var totalAmt=income;
  // ★ 사업자 여부 구분 (isBiz: 사업자번호 있음 → VAT포함/고용산재, 없음 → 원천세 3.3%만)
  var _isBiz = x.isBiz!==undefined ? !!x.isBiz : !!(x.bizNum||x.bizNumber||'').replace(/-/g,'').replace(/\s/g,'');
  var supplyAmt, expenseAmt, monthlyWage, empCalc, workCalc;
  if(_isBiz){
    // 개인사업자: VAT포함, 고용·산재 적용
    supplyAmt  = Math.round(totalAmt / 1.1);
    expenseAmt = Math.round(supplyAmt * 0.346);
    monthlyWage= supplyAmt - expenseAmt;
    empCalc    = monthlyWage >= 800000 ? Math.floor(monthlyWage * 0.008  / 10) * 10 : 0;  // 기사 부담 고용 0.8%
    workCalc   = Math.floor(monthlyWage * 0.0088 / 10) * 10;  // 산재 0.88%
  } else {
    // 주민번호(비사업자): VAT 없음, 고용·산재 없음 → 원천세 3.3%만
    supplyAmt  = totalAmt;  // VAT 없음
    expenseAmt = 0;
    monthlyWage= totalAmt;
    empCalc    = 0;
    workCalc   = 0;
  }
  var TAX_RATE = +x.taxRate || (_isBiz ? 0 : 0.033);
  var tax  = +x.tax  || (x.taxFixed ? +x.taxFixed : (_isBiz ? 0 : Math.round(income * TAX_RATE)));
  var emp  = (x.emp !== undefined && x.emp !== null && x.emp !== '' && +x.emp > 0) ? +x.emp : empCalc;
  var workStored = (x.work !== undefined && x.work !== null && x.work !== '' && +x.work > 0) ? +x.work : 0;
  var work = _isBiz ? ((workStored && workCalc > 0 && workStored >= workCalc * 0.5) ? workStored : workCalc) : 0;
  // 회사 부담 보험료 (기사 공제분과 별개)
  var empComp = _isBiz ? (monthlyWage >= 800000 ? Math.floor(monthlyWage * 0.008 / 10) * 10 : 0) : 0; // 회사 부담 고용 0.8%
  var workComp = work; // 산재 전액 회사 부담 (= work와 동일 비율)
  var insComp = empComp + workComp; // 회사 총 부담 보험료
  var eq   = +x.eq  || 0;
  var dmg  = +x.dmg || +x.damage || 0;
  var adv  = +x.adv || +x.advance || 0;
  // ★ 기타(-) → 공제 항목으로 실지급에서 차감
  // ★ 원천세(tax)는 회사 납부 → 기사 실지급 공제 제외
  var deduct = emp + work + eq + dmg + adv + etcMinus;
  var net = totalAmt - deduct;
  return{damt,ramt,fresh,finc,_fincPerUnit,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,empComp,workComp,insComp,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}

// ██ parseCoupangExcel v3.0 (자동화 완전판) ██
var _CAMP_MAP={
  '부산1':'부산1캠프','부산2':'부산2캠프','부산3':'부산3캠프',
  '대구2':'대구2캠프','대구2B':'대구2B캠프',
  'M_진주1':'진주M캠프','진주M':'진주M캠프','M_진주':'진주M캠프'
};
function _normCamp(raw){
  if(!raw)return '기타';
  var t=String(raw).trim();
  if(_CAMP_MAP[t])return _CAMP_MAP[t];
  for(var k in _CAMP_MAP){if(t.indexOf(k)>=0)return _CAMP_MAP[k];}
  return t;
}
function _extractMonthFromFilename(filename){
  // "2026년_04월_정산서" 또는 "2026년 04월" 형식
  var m=filename.match(/(\d{4})년[_\s]*0*(\d{1,2})월/);
  if(m)return m[1]+'-'+String(+m[2]).padStart(2,'0');
  // YYYY-MM 형식
  var m2=filename.match(/(\d{4})[-_](0[1-9]|1[0-2])/);
  if(m2)return m2[1]+'-'+m2[2];
  return null;
}
function parseCoupangExcel(inp){
  var file=inp.files[0]; if(!file)return;
  if(typeof XLSX==='undefined'){toast('⚠️ 엑셀 라이브러리 로딩 중...'); return;}
  inp.value='';
  // 파일명에서 월 추출
  var month=_extractMonthFromFilename(file.name);
  if(!month){
    var _now=new Date();
    var _prev=new Date(_now.getFullYear(),_now.getMonth()-1,1);
    month=_prev.getFullYear()+'-'+String(_prev.getMonth()+1).padStart(2,'0');
  }
  toast('📂 '+month+' 정산 업로드 중...');
  // Firebase 기사 로드 후 파싱
  var fbPromise=(window._db&&window._CU)
    ?window._db.collection('drivers').where('dealerId','==',window._CU.dealerId).get()
      .then(function(snap){var arr=[];snap.forEach(function(d){arr.push(Object.assign({id:d.id},d.data()));});return arr;})
      .catch(function(){return[];})
    :Promise.resolve([]);
  fbPromise.then(function(fbDrivers){
    _parseCoupangExcelInner(file,fbDrivers,month);
  });
}
function _parseCoupangExcelInner(file,fbDrivers,month){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var sn=wb.SheetNames;
      // ★ 시트명 유연 탐지 (정확한 이름 → 포함 검색 → 순서)
      function findSheet(exact, keyword, idx){
        return wb.Sheets[exact]
          || wb.Sheets[sn.find(function(n){return n.replace(/\s/g,'').toLowerCase().includes(keyword.toLowerCase());})]
          || (sn[idx]?wb.Sheets[sn[idx]]:null);
      }
      var rawSheet   = findSheet('정산Raw',   'raw',   2);
      var totalSheet = findSheet('정산총괄',  '총괄',  1);
      var dmgSheet   = findSheet('분실파손List','분실', 3);
      if(!rawSheet){
        toast('❌ 정산Raw 시트 없음. 시트 목록: '+sn.join(', '));
        console.error('[엑셀] 시트 목록:', sn);
        return;
      }
      var raw=XLSX.utils.sheet_to_json(rawSheet,{header:1,raw:true});
      var total=totalSheet?XLSX.utils.sheet_to_json(totalSheet,{header:1}):[];
      var dmgRows=dmgSheet?XLSX.utils.sheet_to_json(dmgSheet,{header:1}):[];
      if(raw.length<2){toast('❌ 데이터가 없습니다');return;}

      // ── 헤더 탐지
      var rawHdrIdx=0;
      for(var h=0;h<Math.min(raw.length,5);h++){
        if(raw[h]&&(String(raw[h][0]||'').includes('구분')||String(raw[h][1]||'').toLowerCase()==='id')){rawHdrIdx=h;break;}
      }
      var rh=raw[rawHdrIdx]||[];
      var rColDiv=0,rColID=1,rColRoute=2,rColDate=3,rColCamp=4,
          rColDcnt=7,rColRcnt=8,rColUnit=9,rColAddInc=10,
          rColFresh=14,    // 프레시백 회수금액
          rColFreshInc=-1, // 프레시백 인센티브 (별도 컬럼)
          rColBasicAmt=11, // ★ 기본 배송단가 금액 (추가인센 미포함)
          rColTotal=13;
      for(var c2=0;c2<rh.length;c2++){
        var cn=String(rh[c2]||'').replace(/\s+/g,'');
        if(cn==='구분')rColDiv=c2;
        else if(cn==='ID'||cn==='id')rColID=c2;
        else if(cn.includes('Route')||cn.includes('라우트'))rColRoute=c2;
        else if(cn.includes('캠프'))rColCamp=c2;
        else if(cn.includes('배송일자')||cn.includes('작업일'))rColDate=c2;
        else if(cn.includes('배송건수')||cn.includes('배송(parcel)'))rColDcnt=c2;
        else if(cn.includes('반품')&&(cn.includes('운송장')||cn.includes('parcel')))rColRcnt=c2;
        else if(cn.includes('단가')&&!cn.includes('금액')&&!cn.includes('기본')&&!cn.includes('인센'))rColUnit=c2;
        else if(cn.includes('추가인센')&&!cn.includes('금액'))rColAddInc=c2;
        // 프레시백: 회수금액 vs 인센티브 분리
        else if((cn.includes('프레시백')||cn.includes('프레쉬백'))&&(cn.includes('인센')||cn.includes('incentive')))rColFreshInc=c2;
        else if((cn.includes('프레시백')||cn.includes('프레쉬백'))&&(cn.includes('회수')||cn.includes('금액')))rColFresh=c2;
        else if(cn.includes('프레시백')||cn.includes('프레쉬백'))rColFresh=c2; // 단일 컬럼
        else if(cn==='총금액')rColTotal=c2;
        else if(cn.includes('기본')&&cn.includes('배송')&&cn.includes('금액'))rColBasicAmt=c2;
      }

      // ── Raw 시트 파싱 → drvMap 구성
      var drvMap={};  // cleanId → {camp, routes, dcnt, rcnt, ...}
      for(var i=rawHdrIdx+1;i<raw.length;i++){
        var row=raw[i];if(!row[rColID])continue;
        var userId=String(row[rColID]).trim();
        if(!userId||userId.toLowerCase()==='id')continue;
        // 한글/특수어 포함 ID는 기사 ID가 아님 (에코백회수 등) → 미계약 처리
        var _isKoreanId=false; // ★ 한글ID도 정상 기사일 수 있으므로 isNocont 분류 제거
        var cleanId=userId.replace(/@[a-z0-9@._-]+$/i,'').trim();  // @df 등 제거
        // 유효하지 않은 ID 스킵 (한글 포함, 공백, 특수단어)
        if(!cleanId||/[ㄱ-ㅎ가-힣]/.test(cleanId)||cleanId.length>30)continue;
        var divVal=String(row[rColDiv]||'').trim();
        // ★ 주간/야간 인센 행은 회사 단가 기준 항목 → 기사 정산 제외 (건수/반품만 합산용)
        var isSkipRow=divVal.includes('주간')&&(divVal.includes('인센')||divVal.includes('할증')||divVal.includes('추가'));
        if(!isSkipRow) isSkipRow=divVal.includes('야간')&&(divVal.includes('인센')||divVal.includes('할증')||divVal.includes('추가'));
        if(isSkipRow)continue;
        var isFreshRow=divVal.includes('프레시백')||divVal.includes('프레쉬백');
        var isEcoRow=divVal.includes('에코백');
        var isSugi=divVal.includes('수기')&&(divVal.includes('반품')||divVal.includes('회수'));
        var isNocont=(!isFreshRow&&!isEcoRow&&!isSugi&&(divVal.includes('미계약')||divVal.includes('소급')||divVal.includes('계약외')||divVal.includes('외근')));
        var route=String(row[rColRoute]||'').trim();
        // ★ route가 '미계약'이면 isNocont로 처리
        if(!isNocont&&(route.includes('미계약')||route==='계약외'))isNocont=true;
        var campRaw=String(row[rColCamp]||'').trim();
        var campName=_normCamp(campRaw);
        var dcnt=Number(row[rColDcnt])||0;
        var rcnt=Number(row[rColRcnt])||0;
        var addInc=Number(row[rColAddInc])||0; // ★ 추가 인센 단가(col10) - 기사별 0/9/23원
        var unitPrc=Number(row[rColUnit])||0;
        var freshInc=Number(row[rColFresh])||0;      // 프레시백 회수금액
        var freshIncInc=rColFreshInc>=0?Number(row[rColFreshInc])||0:0; // 프레시백 인센티브
        var rowTotal=Number(row[rColTotal])||0;

        if(!drvMap[cleanId])drvMap[cleanId]={
          cleanId:cleanId,camp:campName,dcnt:0,rcnt:0,
          delAmt:0,retAmt:0,freshAmt:0,freshIncAmt:0,addIncAmt:0,
          nocontCnt:0,nocontAmt:0,routes:{}
        };
        // 캠프: 첫 번째로 발견된 캠프 우선
        if(campName&&campName!=='기타'&&drvMap[cleanId].camp==='기타')
          drvMap[cleanId].camp=campName;

        if(isEcoRow){
          // ★ 에코백 소급: col14(인센) 있으면 프레시백인센에 포함
          if(freshInc>0||freshIncInc>0){
            if(!drvMap[cleanId])drvMap[cleanId]={cleanId:cleanId,camp:campName||'기타',dcnt:0,rcnt:0,delAmt:0,retAmt:0,freshAmt:0,freshIncAmt:0,addIncAmt:0,dmgAmt:0,nocontCnt:0,nocontAmt:0,routes:{}};
            drvMap[cleanId].freshIncAmt+=(freshInc||freshIncInc||0);
          }
          continue;
        }
        if(isFreshRow){
          if(!drvMap[cleanId]) drvMap[cleanId]={cleanId:cleanId,camp:campName||'기타',
            dcnt:0,rcnt:0,delAmt:0,retAmt:0,freshAmt:0,freshIncAmt:0,
            addIncAmt:0,dmgAmt:0,nocontCnt:0,nocontAmt:0,routes:{}};
          var freshVal=freshInc||(row[rColFresh]?Number(row[rColFresh])||0:0)||rowTotal||0;
          drvMap[cleanId].freshAmt+=freshVal;
          if(campName&&campName!=='기타'&&drvMap[cleanId].camp==='기타') drvMap[cleanId].camp=campName;
          continue;
        }
        if(isSugi){
          if(!drvMap[cleanId]) drvMap[cleanId]={cleanId:cleanId,camp:campName||'기타',
            dcnt:0,rcnt:0,delAmt:0,retAmt:0,freshAmt:0,freshIncAmt:0,
            addIncAmt:0,dmgAmt:0,nocontCnt:0,nocontAmt:0,routes:{}};
          var sugiCnt=(dcnt+rcnt);
          drvMap[cleanId].rcnt+=sugiCnt;
          // ★ 라우트별 반품에도 추가 → RPRICE 계산에 반영
          if(route){
            if(!drvMap[cleanId].routes[route])
              drvMap[cleanId].routes[route]={cnt:0,ret:0,unitPrc:0,delAmt:0,retAmt:0,addInc:0};
            drvMap[cleanId].routes[route].ret+=sugiCnt;
          }
          if(campName&&campName!=='기타'&&drvMap[cleanId].camp==='기타')
            drvMap[cleanId].camp=campName;
          continue;
        }
        if(isNocont){
          var nc=dcnt+rcnt;
          if(!drvMap[cleanId]) drvMap[cleanId]={cleanId:cleanId,camp:campName||'기타',
            dcnt:0,rcnt:0,delAmt:0,retAmt:0,freshAmt:0,freshIncAmt:0,
            addIncAmt:0,dmgAmt:0,nocontCnt:0,nocontAmt:0,routes:{}};
          drvMap[cleanId].nocontCnt+=nc;
          if(rowTotal>0) drvMap[cleanId].nocontAmt+=rowTotal;
          // 캠프 업데이트
          if(campName&&campName!=='기타'&&drvMap[cleanId].camp==='기타')
            drvMap[cleanId].camp=campName;
          continue;
        }
        // ★ basicAmt(기본배송단가금액, 추가인센 미포함) 우선 — 없으면 dcnt×unitPrc, 미계약은 col13
        var basicAmt=rColBasicAmt>=0?Number(row[rColBasicAmt])||0:0;
        var delAmt=basicAmt>0?basicAmt:(dcnt*unitPrc)||(isNocont?rowTotal:0);
        var retAmt=rcnt*unitPrc;
        drvMap[cleanId].dcnt+=dcnt;
        drvMap[cleanId].rcnt+=rcnt;
        drvMap[cleanId].delAmt+=delAmt;
        drvMap[cleanId].retAmt+=retAmt;
        drvMap[cleanId].freshAmt+=freshInc;
        drvMap[cleanId].freshIncAmt+=freshIncInc;  // 프레시백 인센
        drvMap[cleanId].addIncAmt+=addInc*(dcnt+rcnt); // ★ col10단가 × (배송+반품)건수
        // 날짜 추출
        var rowDateRaw=row[rColDate];
        var rowDate='';
        if(rowDateRaw instanceof Date){
          // XLSX.js 날짜 파싱 버그: 23:59:xx로 오는 경우 다음날로 보정
          var _rd=new Date(rowDateRaw);
          if(_rd.getHours()>=23&&_rd.getMinutes()>=58) _rd=new Date(_rd.getTime()+120000);
          var _y=_rd.getFullYear();
          var _m=String(_rd.getMonth()+1).padStart(2,'0');
          var _d=String(_rd.getDate()).padStart(2,'0');
          rowDate=_y+'-'+_m+'-'+_d;
        } else if(typeof rowDateRaw==='number'&&rowDateRaw>40000){
          // Excel 날짜 시리얼 → JS Date
          var _xd=new Date(Math.round((rowDateRaw-25569)*86400*1000));
          var _y=_xd.getUTCFullYear();
          var _m=String(_xd.getUTCMonth()+1).padStart(2,'0');
          var _d=String(_xd.getUTCDate()).padStart(2,'0');
          rowDate=_y+'-'+_m+'-'+_d;
        } else if(rowDateRaw){
          var _rs=String(rowDateRaw).trim();
          // yyyy-mm-dd 또는 yyyy/mm/dd 처리
          rowDate=_rs.replace(/\//g,'-').slice(0,10);
        }

        if(route){
          if(!drvMap[cleanId].routes[route])
            drvMap[cleanId].routes[route]={cnt:0,ret:0,unitPrc:0,delAmt:0,retAmt:0,addInc:0};
          drvMap[cleanId].routes[route].cnt+=dcnt;
          drvMap[cleanId].routes[route].ret+=rcnt;
          drvMap[cleanId].routes[route].delAmt+=delAmt;
          drvMap[cleanId].routes[route].retAmt+=retAmt;
          drvMap[cleanId].routes[route].addInc+=addInc;
          if(unitPrc>0)drvMap[cleanId].routes[route].unitPrc=unitPrc;
          if(rowDate){
            if(!drvMap[cleanId].dateRoutes)drvMap[cleanId].dateRoutes={};
            if(!drvMap[cleanId].dateRoutes[rowDate])drvMap[cleanId].dateRoutes[rowDate]={};
            if(!drvMap[cleanId].dateRoutes[rowDate][route])drvMap[cleanId].dateRoutes[rowDate][route]={cnt:0,ret:0};
            drvMap[cleanId].dateRoutes[rowDate][route].cnt+=dcnt;
            drvMap[cleanId].dateRoutes[rowDate][route].ret+=rcnt;
          }

          // 시즌 기간별 분리 집계
          if(rowDate&&SEASON_PRICES.length){
            SEASON_PRICES.forEach(function(sp){
              if(rowDate>=sp.start&&rowDate<=sp.end){
                var sk='__season__'+sp.id+'__'+route;
                if(!drvMap[cleanId].routes[sk])
                  drvMap[cleanId].routes[sk]={cnt:0,ret:0,unitPrc:sp.prices[route]||unitPrc,
                    delAmt:0,retAmt:0,addInc:0,
                    _season:true,_seasonId:sp.id,_seasonLabel:sp.label,
                    _start:sp.start,_end:sp.end,_route:route};
                var sprice=sp.prices[route]||unitPrc;
                drvMap[cleanId].routes[sk].cnt+=dcnt;
                drvMap[cleanId].routes[sk].ret+=rcnt;
                drvMap[cleanId].routes[sk].delAmt+=(dcnt*sprice);
                drvMap[cleanId].routes[sk].retAmt+=(rcnt*sprice);
                drvMap[cleanId].routes[sk].addInc+=addInc;
              }
            });
          }
        }
      }

      // ── 정산총괄 파싱 → totalMap (프레시백 회수금액, 분실파손)
      var totalMap={};
      if(total.length>2){
        var tHdrIdx=-1;
        for(var th=0;th<Math.min(total.length,10);th++){
          var hr=total[th];
          if(hr&&(String(hr[3]||'').toLowerCase()==='id'||String(hr[0]||'').toLowerCase()==='no')){tHdrIdx=th;break;}
        }
        if(tHdrIdx>=0){
          var thRow=total[tHdrIdx];
          var tID=3,tFresh=8,tInc=9,tDmg=10,tTotal=11;
          for(var tc=0;tc<thRow.length;tc++){
            var tcn=String(thRow[tc]||'').replace(/\s+/g,'');
            if(tcn==='ID')tID=tc;
            else if(tcn.includes('프레시백')||tcn.includes('프레쉬백'))tFresh=tc;
            else if(tcn.includes('가중요인')||tcn.includes('추가인센'))tInc=tc;
            else if(tcn.includes('분실파손'))tDmg=tc;
            else if(tcn.includes('총합계')||tcn.includes('TOTAL'))tTotal=tc;
          }
          for(var tj=tHdrIdx+1;tj<total.length;tj++){
            var tr=total[tj];if(!tr||!tr[tID])continue;
            var tid=String(tr[tID]).replace(/@[a-z0-9@._-]+$/i,'').trim();
            if(!tid||tid==='ID')continue;
            // ★ 정산총괄 = VAT제외 기준 → ×1.1 해서 VAT포함으로 저장
            // ★ raw값 저장 (VAT제외) — display/calcNet에서 ×1.1 처리
            totalMap[tid]={
              freshAmt:Number(tr[tFresh])||0,
              incAmt:  Number(tr[tInc])||0,
              dmgAmt:  Number(tr[tDmg])||0,
              totalAmt:Number(tr[tTotal])||0
            };
          }
          // ★ 엑셀 자체 교차검증
          // ★ 엑셀 합계행에서 각 항목 총합 추출 (TOTAL>1M 인 행)
          var excelGrandTotal=0,excelGrandFresh=0,excelGrandInc=0,excelGrandDmg=0;
          for(var gtr=0;gtr<tHdrIdx;gtr++){
            var gRow=total[gtr]||[];
            var gVal=Number(gRow[tTotal])||0;
            if(gVal>1000000){
              excelGrandTotal=gVal;
              excelGrandFresh=Number(gRow[tFresh])||0;
              excelGrandInc  =Number(gRow[tInc]  )||0;
              excelGrandDmg  =Number(gRow[tDmg]  )||0;
              break;
            }
          }
          // 개별 합산 (저장값은 ×1.1 됐으므로 ÷1.1 해서 VAT제외로 비교)
          var sumTotal=Object.values(totalMap).reduce(function(s,v){return s+(v.totalAmt||0);},0);
          var sumFresh=Object.values(totalMap).reduce(function(s,v){return s+(v.freshAmt||0);},0);
          var sumInc  =Object.values(totalMap).reduce(function(s,v){return s+(v.incAmt||0);},0);
          var sumDmg  =Object.values(totalMap).reduce(function(s,v){return s+(v.dmgAmt||0);},0);
          var rawCalcTotal=Object.values(drvMap).reduce(function(s,v){return s+(v.delAmt||0);},0);
          window._excelVerify={
            excelTotal: excelGrandTotal,  excelFresh: excelGrandFresh,
            excelInc:   excelGrandInc,    excelDmg:   excelGrandDmg,
            sumTotal:   sumTotal,         sumFresh:   sumFresh,
            sumInc:     sumInc,           sumDmg:     sumDmg,
            rawCalc:    rawCalcTotal,
            diffTotal: excelGrandTotal - sumTotal,
            diffFresh: excelGrandFresh - sumFresh,
            diffInc:   excelGrandInc   - sumInc,
            diffDmg:   excelGrandDmg   - sumDmg,
            diffRaw:   excelGrandTotal - rawCalcTotal
          };
        }
      }

      // ── 분실파손List 파싱 → dmgMap
      var dmgMap={};
      if(dmgRows.length>1){
        // 헤더: 날짜,캠프,ID,이름,유형,상세,개수,차감금액,...
        var dh=dmgRows[0]||[];
        var dID=2,dName=3,dAmt=7;
        for(var dc2=0;dc2<dh.length;dc2++){
          var dcn=String(dh[dc2]||'').replace(/\s+/g,'');
          if(dcn==='ID')dID=dc2;
          else if(dcn==='이름'||dcn==='성명')dName=dc2;
          else if(dcn.includes('차감금액')||dcn.includes('금액'))dAmt=dc2;
        }
        for(var di=1;di<dmgRows.length;di++){
          var dr=dmgRows[di];if(!dr||!dr[dID])continue;
          var did=String(dr[dID]).replace(/@[a-z0-9@._-]+$/i,'').trim();
          var dname=String(dr[dName]||'').trim();
          var damt=Number(dr[dAmt])||0;
          if(!dmgMap[did])dmgMap[did]={dmg:0,name:''};
          dmgMap[did].dmg+=damt;
          if(dname&&!dmgMap[did].name)dmgMap[did].name=dname;
        }
      }

      // ── 신규 기사/라우트 자동 등록 준비
      var allCleanIds=Object.keys(drvMap);
      var newRoutes=[];  // 단가표에 없는 신규 라우트
      allCleanIds.forEach(function(cid){
        Object.keys(drvMap[cid].routes).forEach(function(r){
          if(!RPRICE[r])newRoutes.push({route:r,camp:drvMap[cid].camp});
        });
      });

      // ── 신규 라우트 → RPRICE + Firebase 등록
      var routePromises=[];
      if(newRoutes.length&&_db&&_CU){
        var newPriceObj={};
        newRoutes.forEach(function(nr){RPRICE[nr.route]=0;newPriceObj[nr.route]=0;});
        if(Object.keys(newPriceObj).length){
          var dpId=(_CU.dealerId||'shared')+'_routePrices';
          // ★ 신규 라우트만 0으로 추가 (기존 단가 절대 덮어쓰지 않음)
          routePromises.push(
            _db.collection('settings').doc(dpId).set(newPriceObj,{merge:true}).catch(function(){})
          );
        }
      }

      // ── 신규 기사 → drivers 컬렉션 자동 등록
      var driverPromises=[];
      var nowDrvIds=fbDrivers.map(function(d){return(d.userId||'').trim();});
      allCleanIds.forEach(function(cid){
        if(nowDrvIds.indexOf(cid)<0&&_db&&_CU){
          var dinfo=drvMap[cid];
          var dmgInfo=dmgMap[cid]||{};
          var dname=dmgInfo.name||'';  // 분실파손 리스트에서 이름 추출
          var autoName=dname||cid; // ★ 이름 없으면 userId를 임시 이름으로
          driverPromises.push(
            (function(){
              // ★ 중복 방지: userId 기반 조회 후 없을 때만 add
              return _db.collection('drivers')
                .where('dealerId','==',_CU.dealerId)
                .where('userId','==',cid).limit(1).get()
                .then(function(chk){
                  if(!chk.empty){
                    fbDrivers.push({id:chk.docs[0].id,userId:cid,name:chk.docs[0].data().name||autoName,camp:dinfo.camp||''});
                    return;
                  }
                  return _db.collection('drivers').add({
                    userId:cid,name:autoName,
                    camp:dinfo.camp||'',
                    dealerId:_CU.dealerId,
                    jobsub:'쿠팡',is_active:true,status:'재직',
                    autoNamed:!dname,
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                  }).then(function(ref){
                    fbDrivers.push({id:ref.id,userId:cid,name:autoName,camp:dinfo.camp||''});
                  });
                }).catch(function(){});
            })()
          );
        }
      });

      // ── 등록 후 정산서 생성
      // routeCampMap 구성 및 Firebase 저장
      // routeCampMap 구성 및 Firebase 저장
      var rcMap={};
      allCleanIds.forEach(function(cid){
        var dm=drvMap[cid];
        var campFull=dm.camp||'';
        if(!campFull||campFull==='기타')return;
        Object.keys(dm.routes).forEach(function(r){
          rcMap[r]=campFull;
        });
      });
      if(Object.keys(rcMap).length&&_db&&_CU){
        Object.assign(_routeCampMap,rcMap);
        _db.collection('settings').doc(_CU.dealerId+'_routeCampMap').set(_routeCampMap,{merge:false}).catch(function(){});
      }
      Promise.all(routePromises.concat(driverPromises)).then(function(){
        _drvCache=null;  // 기사 캐시 초기화 (재로드)
        var settlements=ls('settlements');
        // ★ 해당 월 기존 데이터 제거 (엑셀 재업로드 시 깔끔하게 덮어쓰기)
        settlements=settlements.filter(function(s){return s.month!==month;});
        var added=0,updated=0;
        allCleanIds.forEach(function(cleanId){
          var dm=drvMap[cleanId];
          var tm=totalMap[cleanId]||{};
          var dmgInfo=dmgMap[cleanId]||{};
          // ★ 이중검증 드라이버 매핑: coupangId → bizNum → 이름 순
          var cleanIdLow=cleanId.toLowerCase();
          var drvObj=fbDrivers.find(function(d){
            // ① coupangId/userId 일치
            var ids=[d.coupangId,d.userId,d.driverId].filter(Boolean)
              .map(function(x){return String(x).trim().toLowerCase();});
            if(ids.indexOf(cleanIdLow)>=0)return true;
            // ② 이름 정규화 일치
            var dnNorm=String(d.name||'').replace(/\s+/g,'').toLowerCase();
            var cmNorm=String(dm.name||cleanId).replace(/\s+/g,'').toLowerCase();
            if(dnNorm&&dnNorm===cmNorm)return true;
            return false;
          })||{name:'',camp:dm.camp||''};
          var drvName=drvObj.name||dm.name||cleanId;
          // 분실파손
          var dmgAmt=dmgInfo.dmg||tm.dmgAmt||0;
          // 프레시백 회수금액
          var freshAmt=tm.freshAmt||dm.freshAmt||0;
          // 추가 인센티브(가중요인)
          var addIncAmt=tm.incAmt||dm.addIncAmt||0;
          // ★ 프레시백 인센티브: 엑셀 freshIncAmt 우선 → 없으면 기사별 설정 계산
          var fincVal=dm.freshIncAmt||0;
          if(fincVal===0){
            Object.keys(dm.routes).forEach(function(route){
              var rv=dm.routes[route];
              var s=_getIncSetting(cleanId,route);
              if(s.on&&s.rate>0)fincVal+=rv.cnt*s.rate;
            });
          }
          // routeDetails (엑셀 단가 기준 - 첫 업로드)
          // 시즌 라우트와 일반 라우트 분리
            var allRouteKeys=Object.keys(dm.routes);
            var seasonKeys=allRouteKeys.filter(function(r){return r.startsWith('__season__');});
            var normalKeys=allRouteKeys.filter(function(r){return !r.startsWith('__season__');});
            // 시즌 상세 (기간별 소계)
            var seasonDetails=seasonKeys.map(function(sk){
              var sv=dm.routes[sk];
              return{seasonId:sv._seasonId,label:sv._seasonLabel,
                start:sv._start,end:sv._end,route:sv._route,
                cnt:sv.cnt,ret:sv.ret,unitPrice:sv.unitPrc||0,
                delAmt:sv.delAmt,retAmt:sv.retAmt};
            });
            var routeDetails=normalKeys.map(function(r){
            var rv=dm.routes[r];
            // ★ 라우트단가표(RPRICE) 우선 → 없으면 엑셀단가 fallback
            var rUnitPrice=RPRICE[r]||rv.unitPrc||0;
            return{route:r,cnt:rv.cnt,ret:rv.ret,
              unitPrice:rUnitPrice,         // ★ 라우트단가표 기준 (기사 지급단가)
              excelUnitPrice:rv.unitPrc||0, // 엑셀 원본 단가 (쿠팡→대리점 매출단가) 보존
              amt:rv.delAmt||0,retAmt:rv.retAmt||0,addInc:rv.addInc||0};
          });
          // 세금계산서 작성금액 (엑셀 단가 기준 초기값)
          var damt=dm.delAmt||0;
          var ramt=dm.retAmt||0;
          // ★ taxBase: 라우트단가표(RPRICE) 기준 계산 (calcNet/명세서와 동일하게 맞춤)
          //   RPRICE 없는 라우트만 routeDetails.unitPrice(엑셀단가) fallback
          var rdDamt=routeDetails.reduce(function(s,rd){return s+(rd.cnt||0)*(RPRICE[rd.route]||rd.unitPrice||0);},0);
          var rdRamt=routeDetails.reduce(function(s,rd){return s+(rd.ret||0)*(RPRICE[rd.route]||rd.unitPrice||0);},0);
          // ★ 미계약건: RPRICE × 건수 (엑셀금액은 회사단가 — 절대 사용 안 함)
          var nocontCntVal=dm.nocontCnt||0;
          var _nocontCamp=dm.camp||'';
          var _isW2=_nocontCamp.includes('부산');
          var nocontUnit=_isW2?(RPRICE['nocont_w2']||0):(RPRICE['nocont_w1']||0);
          var nocontAmtCalc=nocontCntVal>0 ? nocontCntVal*nocontUnit : 0;
          // (RPRICE 단가 미설정 시 0 — 엑셀금액 fallback 없음)

          var taxBase=(rdDamt||damt)+(rdRamt||ramt)+freshAmt+fincVal+nocontAmtCalc;  // ★ addIncAmt 제외 (세금계산서 base 아님)
          // 공제 계산
          var supplyAmt=Math.round(taxBase/1.1);
          var monthlyWage=Math.round(supplyAmt*0.654);
          var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
          var workIns=Math.floor(monthlyWage*0.0088/10)*10;

          var coupangRawTotal=tm.totalAmt||(Math.round((dm.delAmt||0)+(dm.retAmt||0)+(freshAmt||0)+(addIncAmt||0)+(dm.nocontAmt||0)-(dmgAmt||0)));
          var entry={
            driver:drvName, userId:cleanId, dealerId:_CU.dealerId,
            camp:dm.camp||drvObj.camp||'',
            coupangTotal:coupangRawTotal,  // 쿠팡→대리점 원본금액(VAT제외)
            seasonDetails:seasonDetails,  // 재계약 시즌 기간별 상세
            jobsub:'쿠팡', month:month,
            dcnt:dm.dcnt, rcnt:dm.rcnt,
            damt:damt, ramt:ramt,
            fresh:freshAmt,        // 프레시백 회수금액 (VAT제외 원본 저장 - calcNet에서 ×1.1)
            finc:fincVal,          // 프레시백 인센티브
            inc:addIncAmt,         // 추가인센티브(가중요인)
            nocont:nocontAmtCalc,nocontCnt:nocontCntVal,
            dmg:dmgAmt,
            etcPlus:0,etcMinus:0,
            totalAmt:taxBase,
            supplyAmt:supplyAmt,
            monthlyWage:monthlyWage,
            emp:empIns, work:workIns,
            status:'정산예정',
            routeDetails:routeDetails,
            dateRoutes:dm.dateRoutes||{},
            updatedAt:new Date().toISOString(),
            createdAt:new Date().toISOString()
          };
          var existing=settlements.findIndex(function(s){return s.userId===cleanId&&s.month===month;});
          if(existing>=0){
            var prev=settlements[existing];
            // ★ fresh/finc/inc는 엑셀값으로 항상 갱신 (수동 입력값은 dmg/etcPlus/etcMinus만 보호)
            ['dmg','etcPlus','etcMinus'].forEach(function(k){
              if(prev[k]!==undefined&&prev[k]!==0)entry[k]=prev[k];
            });
            ['status','taxSent','taxSentAt','paidAt','fbId','createdAt'].forEach(function(k){
              if(prev[k]!==undefined)entry[k]=prev[k];
            });
            // routeDetails: 건수는 최신, unitPrice는 수동 편집 보존
            entry.routeDetails=routeDetails.map(function(newRd){
              var oldRd=(prev.routeDetails||[]).find(function(r){return r.route===newRd.route;});
              if(oldRd&&oldRd.unitPrice&&oldRd.unitPrice>0)
                return Object.assign({},newRd,{unitPrice:oldRd.unitPrice});
              return newRd;
            });
            settlements[existing]=Object.assign({},prev,entry);
            updated++;
          } else {
            settlements.push(entry);added++;
          }
        });
        // ★ 팀장 수수료 자동 계산
        (function(){
          function applyTL(){
            if(!TL_PRICES||!TL_PRICES.length) return;
            var _tlRT={};
            settlements.filter(function(s){return s.month===month;}).forEach(function(s){
              (s.routeDetails||[]).forEach(function(rd){if(rd.route)_tlRT[rd.route]=(_tlRT[rd.route]||0)+(rd.cnt||0);});
            });
            var _tlB=_calcTeamLeaderBonus(_tlRT);
            Object.keys(_tlB).forEach(function(tlId){
              var bonus=_tlB[tlId];
              var tlE=settlements.find(function(s){return s.userId===tlId&&s.month===month;});
              if(tlE){tlE.etcPlusTL=bonus.amount;tlE.etcPlusTLReason='팀장수수료 ('+bonus.amount.toLocaleString()+'원)';toast('✅ 팀장 '+bonus.name+' '+bonus.amount.toLocaleString()+'원 적용');}
              else{toast('⚠️ 팀장 '+bonus.name+' 이번달 정산 없음');}
            });
          }
          if(TL_PRICES&&TL_PRICES.length){
            applyTL();
          } else if(_db&&_CU&&_CU.dealerId){
            _db.collection('settings').doc(_CU.dealerId+'_teamLeaderPrices').get()
              .then(function(snap){if(snap.exists)TL_PRICES=(snap.data()||{}).leaders||[];applyTL();})
              .catch(function(){});
          }
        })();
        lss('settlements',settlements);
        window._lastParsedSettlements = settlements;
        if(window._guardCheckDriverCount){
          var _pgIds=[]; var _pgSet={};settlements.forEach(function(s){var id=s.userId||s.driver||'';if(id&&!_pgSet[id]){_pgSet[id]=1;_pgIds.push(id);}});
          _guardCheckDriverCount(_pgIds.length);
          _guardCheckDateRange(settlements);
          _guardCheckAmountSpike(settlements);
          _guardMarkUpload();
          var _pgRoutes={};settlements.forEach(function(s){(s.routeDetails||[]).forEach(function(r){_pgRoutes[r.route]=1;});});
          _guardCheckRouteSpike(Object.keys(_pgRoutes).length);
          _guardUpdateMonthlySeat(settlements,month);
        }
        // Firebase 저장
        if(_db){
          // ★ dealerId 강제 갱신 (다른 계정 데이터 혼입 방지) - fbPromises 전에 실행
          settlements.forEach(function(x){x.dealerId=_CU.dealerId;});
          if(window._idSupportRules&&window._idSupportRules.length){
            function _normD(s){
              if(!s)return '';
              var p=String(s).trim().split('-');
              if(p.length>=2) return p[0]+'-'+(p[1].length<2?'0'+p[1]:p[1]);
              return s;
            }
            // 날짜 → yyyy-MM (월 기준 매칭)
            function _dateYM(s){
              if(!s)return '';
              var p=String(s).trim().split('-');
              if(p.length>=2) return p[0]+'-'+(p[1].length<2?'0'+p[1]:p[1]);
              return '';
            }
            var _fd={};
            window._idSupportRules.forEach(function(rule){
              var fid=rule.fromId, tid=rule.toId;
              var fd=drvMap[fid]; if(!fd)return;
              var ts=settlements.find(function(s){return (s.userId||s.driver)===tid;});
              if(!ts)return;
              // 날짜 → yyyy-MM 변환 (월 기준)
              var tDYM=(rule.dates||[]).map(function(d){return _dateYM(d);}).filter(Boolean);
              var tDFull=(rule.dates||[]).map(function(d){var p=String(d).trim().split('-');if(p.length<3)return '';return p[0]+'-'+(p[1].length<2?'0'+p[1]:p[1])+'-'+(p[2].length<2?'0'+p[2]:p[2]);}).filter(Boolean);
              var tR=rule.routes||[];
              var tot=0, pts=[];

              var hasDateRoutes=fd.dateRoutes&&Object.keys(fd.dateRoutes).length>0;
              if(hasDateRoutes){
                Object.keys(fd.dateRoutes).forEach(function(dt){
                  var dtYM=_dateYM(dt);
                  // 날짜 조건: 비어있으면 전체, 있으면 같은 월만
                  if(tDFull.length&&tDFull.indexOf(dt)<0)return;
                  else if(!tDFull.length&&tDYM.length&&tDYM.indexOf(dtYM)<0)return;
                  Object.keys(fd.dateRoutes[dt]).forEach(function(rt){
                    if(tR.length&&tR.indexOf(rt)<0)return;
                    var rd=fd.dateRoutes[dt][rt];
                    var up=RPRICE[rt]||0; if(!up)return;
                    var amt=(rd.cnt||0)*up+(rd.ret||0)*up; if(!amt)return;
                    tot+=amt;
                    pts.push(rt+' '+(rd.cnt||0)+'건'+(rd.ret>0?' 반품'+(rd.ret)+'건':''));
                  });
                });
              } else {
                // fallback: routeDetails 기준
                var fs2=settlements.find(function(s){return (s.userId||s.driver)===fid;});
                if(fs2&&fs2.routeDetails){
                  fs2.routeDetails.forEach(function(rd){
                    if(tR.length&&tR.indexOf(rd.route)<0)return;
                    var up=RPRICE[rd.route]||0; if(!up)return;
                    var amt=(rd.cnt||0)*up+(rd.ret||0)*up; if(!amt)return;
                    tot+=amt;
                    pts.push(rd.route+' '+(rd.cnt||0)+'건'+(rd.ret>0?' 반품'+(rd.ret)+'건':''));
                  });
                }
              }

              if(!tot)return;
              ts.etcPlus=(ts.etcPlus||0)+tot;
              var pv=ts.etcPlusReason||'';
              ts.etcPlusReason=(pv?pv+' / ':'')+'아이디지원('+fid+') '+pts.join('·');
              if(!_fd[fid]) _fd[fid]=[];
              _fd[fid].push({tot:tot,pts:pts,tDYM:tDYM,tDFull:tDFull,tR:tR,hasDateRoutes:hasDateRoutes});
            });

            Object.keys(_fd).forEach(function(fid){
              var rules=_fd[fid];
              var fs=settlements.find(function(s){return (s.userId||s.driver)===fid;});
              if(!fs)return;
              var totalDeduct=rules.reduce(function(s,r){return s+r.tot;},0);
              var allPts=[];rules.forEach(function(r){allPts=allPts.concat(r.pts);});
              fs.etcMinus=(fs.etcMinus||0)+totalDeduct;
              var pvm=fs.etcMinusReason||'';
              fs.etcMinusReason=(pvm?pvm+' / ':'')+'지원차감 '+allPts.join('·');

              if(fs.routeDetails&&fs.routeDetails.length){
                rules.forEach(function(rule){
                  if(rule.hasDateRoutes){
                    var fdm=drvMap[fid];
                    if(fdm&&fdm.dateRoutes){
                      Object.keys(fdm.dateRoutes).forEach(function(dt){
                        var dtYM=_dateYM(dt);
                        if(rule.tDFull&&rule.tDFull.length&&rule.tDFull.indexOf(dt)<0)return;
                        else if((!rule.tDFull||!rule.tDFull.length)&&rule.tDYM.length&&rule.tDYM.indexOf(dtYM)<0)return;
                        Object.keys(fdm.dateRoutes[dt]).forEach(function(rt){
                          if(rule.tR.length&&rule.tR.indexOf(rt)<0)return;
                          var rd=fdm.dateRoutes[dt][rt];
                          var ri=fs.routeDetails.findIndex(function(r){return r.route===rt;});
                          if(ri<0)return;
                          fs.routeDetails[ri].cnt=Math.max(0,(fs.routeDetails[ri].cnt||0)-(rd.cnt||0));
                          fs.routeDetails[ri].ret=Math.max(0,(fs.routeDetails[ri].ret||0)-(rd.ret||0));
                        });
                      });
                    }
                  } else {
                    rule.pts.forEach(function(pt){
                      var m=pt.match(/^(\S+)\s+(\d+)\uAC74/);
                      if(!m)return;
                      var rt=m[1],cnt=parseInt(m[2]);
                      var ri=fs.routeDetails.findIndex(function(r){return r.route===rt;});
                      if(ri<0)return;
                      fs.routeDetails[ri].cnt=Math.max(0,(fs.routeDetails[ri].cnt||0)-cnt);
                    });
                  }
                });
                fs.dcnt=fs.routeDetails.reduce(function(s,r){return s+(r.cnt||0);},0);
                fs.rcnt=fs.routeDetails.reduce(function(s,r){return s+(r.ret||0);},0);
              }
            });
          }
          // 정산 보장금액 자동 채움 (동기)
          (function(){
            var drvList=fbDrivers||window._drvCache||[];
            drvList.forEach(function(drv){
              var guarantee=drv.settleGuarantee||0;
              if(!guarantee)return;
              var uid=drv.userId||drv.id||'';
              if(!uid)return;
              var settle=settlements.find(function(s){return (s.userId||s.driver)===uid;});
              if(!settle)return;
              var cn=calcNet(settle);
              var currentAmt=cn.totalAmt||cn.vatIncome||0;
              var diff=guarantee-currentAmt;
              if(diff>0){
                settle.etcPlus=(settle.etcPlus||0)+diff;
                var prev=settle.etcPlusReason||'';
                settle.etcPlusReason=(prev?prev+' / ':'')+'정산보장('+Math.round(guarantee/10000)+'만원 보장)';
              }
            });
          })();
          var fbPromises=[];
          // ★ drivers에서 사업자 정보 미리 맵핑 (isBiz, bizNum 반영)
          var _drvBizMap={};
          (fbDrivers||window._drvCache||[]).forEach(function(drv){
            var key=drv.userId||drv.id||'';
            if(key) _drvBizMap[key]={isBiz:drv.isBiz,bizNum:drv.bizNum||'',bizName:drv.bizName||''};
            if(drv.name) _drvBizMap[drv.name]={isBiz:drv.isBiz,bizNum:drv.bizNum||'',bizName:drv.bizName||''};
          });
          settlements.filter(function(x){return x.month===month;}).forEach(function(x){
            var docId=x.fbId||(x.dealerId+'_'+x.userId+'_'+x.month);
            x.fbId=docId;
            // ★ drivers 사업자 정보 병합 (엑셀 업로드 시마다 최신 isBiz 반영)
            var _biz=_drvBizMap[x.userId||'']||_drvBizMap[x.driver||'']||{};
            if(_biz.isBiz!==undefined && x.isBiz===undefined) x.isBiz=_biz.isBiz;
            if(_biz.bizNum && !x.bizNum) x.bizNum=_biz.bizNum;
            // ★ calcNet 결과를 저장에 포함 (세무사연동/명세서에서 s.net 직접 사용)
            var _cn=calcNet(x);
            x.net=_cn.net||0;
            x.tax=_cn.tax||0;
            x.emp=_cn.emp||0;
            x.work=_cn.work||0;
            x.deduct=(_cn.emp||0)+(_cn.work||0)+(_cn.dmg||0)+(_cn.etcMinus||0)+(_cn.adv||0);
            x.vatIncome=_cn.income||_cn.vatIncome||0;
            x.supplyAmt=_cn.supplyAmt||0;
            x.monthlyWage=_cn.monthlyWage||0;
            var clean=Object.assign({},x);
            Object.keys(clean).forEach(function(k){if(clean[k]===undefined)delete clean[k];});
            fbPromises.push(_db.collection('settlements').doc(docId).set(clean)
              .catch(function(e){console.error('저장 실패:',e);}));
          });
          Promise.all(fbPromises).then(function(){
            _settleCache=null;
            var newCount=driverPromises.length;
            var routeCount=newRoutes.length;
            // ★ 경험점수 자동 업데이트 (배차 엔진에 활용)
            try{
              var expData = (window._lastParsedSettlements||[]).map(function(s){
                return {driverId:s.userId||s.driver, route:s.route||s.jobsub, dcnt:s.dcnt||0};
              }).filter(function(x){return x.driverId&&x.route&&x.dcnt>0;});
              if(expData.length) _updateAllRouteExp(expData).catch(function(){});
            }catch(e){}
            SP('settlements',null);
            // 전월 대비 변동 기사 분석
            _db.collection('settlements')
              .where('dealerId','==',_CU.dealerId)
              .get().then(function(allSnap){
                var prevMonth='';
                // 직전 정산월 찾기
                var months=[];
                allSnap.forEach(function(d){var m=d.data().month||'';if(m&&m!==month&&months.indexOf(m)<0)months.push(m);});
                months.sort();prevMonth=months[months.length-1]||'';
                var prevIds=new Set();var curIds=new Set();
                allSnap.forEach(function(d){
                  var dt=d.data();
                  if(dt.month===prevMonth)prevIds.add(dt.userId||dt.driver||'');
                  if(dt.month===month)curIds.add(dt.userId||dt.driver||'');
                });
                var newDrivers=[];var leftDrivers=[];
                curIds.forEach(function(id){if(!prevIds.has(id)&&id)newDrivers.push(id);});
                prevIds.forEach(function(id){if(!curIds.has(id)&&id)leftDrivers.push(id);});
                // 결과 팝업
                _showUploadResult(month,added,updated,newCount,routeCount,newDrivers,leftDrivers,prevMonth,window._excelVerify||null);
              }).catch(function(){
                toast('✅ '+month+' 정산 업로드 완료! 등록:'+added+'건 / 갱신:'+updated+'건');
              });
          }).catch(function(){_settleCache=null;SP('settlements',null);});
        } else {
          _settleCache=null;SP('settlements',null);
        }
      });
    }catch(err){console.error(err);toast('❌ 파싱 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

<script>


// ══ localStorage 래퍼 (settle.html 호환) ══
// mbetco는 ls('settlements') 대신 Firestore 사용
// 하지만 parseCoupangExcel이 ls/lss 호출하므로 래퍼 유지
// (실제 저장은 _saveSettlementsToFirestore에서)
var _localSettlements = [];
function _localLs(k){ if(k==='settlements')return _localSettlements; return ls(k); }
function _localLss(k,v){ if(k==='settlements'){_localSettlements=v;return;} lss(k,v); }
// ls/lss override for parseCoupangExcel compatibility
var _origLs=window.ls, _origLss=window.lss;
window.ls=_localLs; window.lss=_localLss;

// ══ 단가 Firestore 로드 ══
var _routeCampMap={};
function _loadPricesFromFirestore(){
  if(!_db||!_dealerId)return;
  var did=_dealerId;
  // RPRICE
  _db.collection('settings').doc(did+'_routePrices').get().then(function(snap){
    if(snap.exists){Object.keys(RPRICE).forEach(function(k){delete RPRICE[k];});Object.assign(RPRICE,snap.data());}
  }).catch(function(){});
  // routeCampMap
  _db.collection('settings').doc(did+'_routeCampMap').get().then(function(snap){
    if(snap.exists)Object.assign(_routeCampMap,snap.data());
  }).catch(function(){});
  // TL_PRICES
  _loadTeamLeaderPrices(null);
  // idSupport
  _db.collection('idSupport').where('dealerId','==',did).get().then(function(snap){

  }).catch(function(){});

// ══ 팀장수수료 함수 ══
var TL_PRICES=[];
function _loadTeamLeaderPrices(cb){
  if(!_db||!_CU){if(cb)cb();return;}
  _db.collection('settings').doc(_CU.dealerId+'_teamLeaderPrices').get()
    .then(function(snap){TL_PRICES=snap.exists?((snap.data()||{}).leaders||[]):[];if(cb)cb();}).catch(function(){if(cb)cb();});
}
function _saveTeamLeaderPrices(cb){
  if(!_db||!_CU){toast('❌ 로그인 필요');return;}
  _db.collection('settings').doc(_CU.dealerId+'_teamLeaderPrices')
    .set({leaders:TL_PRICES,updatedAt:new Date().toISOString()},{merge:false})
    .then(function(){toast('✅ 팀장 수수료 저장');if(cb)cb();}).catch(function(e){toast('❌ '+e.message);});
}
function _parseTLLines(lines){
  var leaders=[],cur=null,curRoute=null;
  lines=lines.map(function(l){return l.replace(/\t/g,' ').trim();});
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(!line){curRoute=null;continue;}
    // 이름(아이디) — 전각 괄호 포함
    var nm=line.match(/^(.+?)\s*[\(\（]([^\)\）]+)[\)\）]\s*$/);
    if(nm){cur={name:nm[1].trim(),id:nm[2].trim(),routes:{}};leaders.push(cur);curRoute=null;continue;}
    if(!cur)continue;
    // 라우트번호만 (3~4자리)
    var rn=line.match(/^(\d{3,4})\s*$/);
    if(rn){curRoute=rn[1];continue;}
    // 라우트번호 + 단가 한 줄 (예: 608 60 / 608 B60 C80)
    var rp=line.match(/^(\d{3,4})\s+(.+)$/);
    if(rp){curRoute=rp[1];_parseTLPricePart(cur,curRoute,rp[2]);continue;}
    // 608A 60 608B 80 형식 (라우트+서브코드 공백 단가)
    var multi=line.match(/^(\d{3,4}[A-Za-z])\s+(\d+)/);
    if(multi){
      var parts=line.match(/(\d{3,4})([A-Za-z]?)\s+(\d+)/g);
      if(parts){parts.forEach(function(p){var m=p.match(/(\d{3,4})([A-Za-z]?)\s+(\d+)/);if(m)cur.routes[m[1]+(m[2]?m[2].toUpperCase():'_')]=parseInt(m[3]);});continue;}
    }
    // 단가 파트 (현재 curRoute 기준)
    if(curRoute)_parseTLPricePart(cur,curRoute,line);
  }
  return leaders;
}
function _parseTLPricePart(cur,curRoute,text){
  // 서브코드+단가: B60 / B 60 / B:60 / B=60
  var found=text.match(/([A-Za-z])\s*[:=]?\s*(\d+)/g);
  if(found&&found.length){
    found.forEach(function(p){var m=p.match(/([A-Za-z])\s*[:=]?\s*(\d+)/);if(m)cur.routes[curRoute+m[1].toUpperCase()]=parseInt(m[2]);});
    return;
  }
  // 숫자만 (서브코드 없음 → 기본 단가)
  var nums=text.match(/\d+/);
  if(nums&&parseInt(nums[0])>0)cur.routes[curRoute+'_']=parseInt(nums[0]);
}

function _parseTeamLeaderFile(file,cb){
  var name=file.name||'';
  var ext=name.split('.').pop().toLowerCase();
  var reader=new FileReader();

  // ── xlsx / xls ──
  if(ext==='xlsx'||ext==='xls'){
    reader.onload=function(e){

// docx/hwp 바이너리에서 텍스트 직접 추출 (휴리스틱)
function _parseTLLinesFromBinary(buf){
  var arr=new Uint8Array(buf);
  var text='';
  // XML 태그 사이 텍스트 추출 (docx는 ZIP 내부 XML)
  var str='';

    else if(c===13||c===10){str+='\n';}
  }
  // 이름(아이디), 라우트, 단가 패턴만 추출
  var lines=str.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  return _parseTLLines(lines);
}

function _recalcTeamLeaderBonus(month, cb){
  if(!_db||!_CU){toast('❌ 로그인 필요');return;}
  if(!TL_PRICES||!TL_PRICES.length){toast('❌ 팀장 단가 미등록 — 단가표에서 먼저 등록하세요');return;}
  var did=_CU.dealerId;
  toast('🔄 팀장 수수료 재계산 중...');

  _db.collection('settlements')
    .where('dealerId','==',did)
    .where('month','==',month)
    .get()
    .then(function(snap){
      if(snap.empty){toast('❌ '+month+' 정산 없음');return;}

      // 라우트별 전체 건수 집계
      var routeTotals={};
      var docs=[];
      snap.forEach(function(doc){
        var d=doc.data();
        docs.push({id:doc.id,data:d});
        (d.routeDetails||[]).forEach(function(rd){
          if(rd.route)routeTotals[rd.route]=(routeTotals[rd.route]||0)+(rd.cnt||0);
        });
      });

      // 팀장 수수료 계산
      var bonus=_calcTeamLeaderBonus(routeTotals);
      var tlIds=Object.keys(bonus);
      if(!tlIds.length){toast('⚠️ 매칭되는 팀장 없음 — 아이디 확인 필요');return;}

      // Firestore 일괄 업데이트
      var batch=_db.batch();
      var updated=0;
      tlIds.forEach(function(tlId){
        var b=bonus[tlId];
        var entry=docs.find(function(d){return d.data.userId===tlId||d.data.driverId===tlId;});
        if(entry){
          batch.update(_db.collection('settlements').doc(entry.id),{
            etcPlusTL: b.amount,
            etcPlusTLReason: '팀장수수료 ('+b.amount.toLocaleString()+'원)',
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          if(window._settleCache){

      });

        if(cb)cb();
      }).catch(function(e){toast('❌ '+e.message);});
    }).catch(function(e){toast('❌ '+e.message);});
}
function _calcTeamLeaderBonus(routeTotals){
  var bonus={};
  TL_PRICES.forEach(function(ldr){
    var total=0;
    Object.keys(ldr.routes||{}).forEach(function(rkey){
      var price=ldr.routes[rkey]||0;
      if(rkey.endsWith('_')){
        // 기본단가: 해당 라우트번호 모든 서브코드 합산
        var base=rkey.slice(0,-1);
        Object.keys(routeTotals).forEach(function(rt){
          if(rt===base||rt.startsWith(base))total+=(routeTotals[rt]||0)*price;
        });
      } else {
        total+=(routeTotals[rkey]||0)*price;
      }
    });
    if(total>0)bonus[ldr.id]={name:ldr.name,id:ldr.id,amount:total};
  });
  return bonus;
}

      lines=rows.map(function(r){return (r[0]||'')+'\t'+(r[1]||0);});
    }
    var newPrices={};var cnt=0;
    lines.forEach(function(ln){
      var parts=ln.trim().split(/[\t,]/);
      var route=String(parts[0]||'').trim();
      var price=parseFloat(String(parts[1]||0).replace(/[,\s]/g,''));
      if(route&&!isNaN(price)){newPrices[route]=price;cnt++;}
    });
    if(!cnt){toast('❌ 파싱 실패 — 라우트,단가 형식 확인');return;}
    Object.assign(RPRICE,newPrices);
    _db.collection('settings').doc(_dealerId+'_routePrices').set(RPRICE,{merge:false})
      .then(function(){
        toast('✅ 단가표 '+cnt+'개 저장');
        document.getElementById('cp-rate-status').textContent=cnt+'개 라우트 로드됨';
        document.getElementById('cp-rate-status').style.color='var(--green)';
      }).catch(function(e){toast('❌ 저장 실패: '+e.message);});
  };
  if(ext==='txt'||ext==='csv') reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
  inp.value='';
}

function _saveSettlementsToFirestore(settlements,month,cb){
  if(!_db||!_dealerId||!settlements.length){if(cb)cb();return;}
  var monthData=settlements.filter(function(s){return s.month===month;});
  if(!monthData.length){if(cb)cb();return;}
  var batch=_db.batch();
  monthData.forEach(function(s){
    var ref;
    if(s._fbId) ref=_db.collection('mb_settlements').doc(s._fbId);
    else ref=_db.collection('mb_settlements').doc();
    s._fbId=ref.id;s.dealerId=_dealerId;
    batch.set(ref,s,{merge:true});
  });
  batch.commit().then(function(){if(cb)cb();}).catch(function(e){toast('⚠️ 저장 실패: '+e.message);if(cb)cb();});
}

function _loadCpPending(month){
  var c=document.getElementById('main-content');
  if(!c)return;
  // Firestore에서 해당 월 정산 로드
  _db.collection('mb_settlements')
    .where('dealerId','==',_dealerId)
    .where('month','==',month)
    .get().then(function(snap){
      var data=[];
      snap.forEach(function(d){data.push(Object.assign({_fbId:d.id},d.data()));});
      _cpState.pending=data;
      _renderCpPending(c,data,month);
    }).catch(function(e){
      // localStorage fallback
      var data=_localSettlements.filter(function(s){return s.month===month;});
      _cpState.pending=data;
      _renderCpPending(c,data,month);
    });
}

function _renderCpPending(c,data,month){
  if(!data||!data.length){
    var existing=c.querySelector('#cp-result-area');
    if(existing)existing.remove();
    var area=document.createElement('div');area.id='cp-result-area';
    area.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">'+month+' 정산 데이터 없음</div><div class="empty-sub">위에서 쿠팡 엑셀을 업로드하세요</div></div>';
    c.appendChild(area);
    return;
  }

  // 캠프별 그룹핑
  var campMap={};
  data.forEach(function(s){
    var camp=s.camp||'미분류';
    if(!campMap[camp])campMap[camp]=[];
    campMap[camp].push(s);
  });

  var totIncome=data.reduce(function(s,x){return s+calcNet(x).totalAmt;},0);
  var totNet=data.reduce(function(s,x){return s+calcNet(x).net;},0);
  var totEmp=data.reduce(function(s,x){return s+calcNet(x).emp;},0);
  var totWork=data.reduce(function(s,x){return s+calcNet(x).work;},0);
  var totCoupang=data.reduce(function(s,x){return s+(x.coupangTotal||0);},0);
  var totRevenue=Math.round(totCoupang*1.1); // 쿠팡 엑셀금액×1.1=VAT포함 매출
  var totMargin=totRevenue-totIncome;

  var html='<div id="cp-result-area">'
    +'<div class="stat-grid">'
    +'<div class="stat-card"><div class="stat-label">인원</div><div class="stat-val blue">'+data.length+'명</div></div>'
    +'<div class="stat-card"><div class="stat-label">세금계산서 합계</div><div class="stat-val">₩'+fmt(totIncome)+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">실지급 합계</div><div class="stat-val green">₩'+fmt(totNet)+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">쿠팡수입(VAT포함)</div><div class="stat-val blue">₩'+fmt(totRevenue)+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">MBTI 마진</div><div class="stat-val '+( totMargin>=0?'green':'red')+'">₩'+fmt(totMargin)+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">고용+산재 합계</div><div class="stat-val purple">₩'+fmt(totEmp+totWork)+'</div></div>'
    +'</div>';

  // 캠프별 테이블
  Object.keys(campMap).sort().forEach(function(camp){
    var rows=campMap[camp];
    var campIncome=rows.reduce(function(s,x){return s+calcNet(x).totalAmt;},0);
    html+='<div class="card" style="margin-bottom:10px">'
      +'<div class="ch"><span class="ct">🏢 '+esc(camp)+'</span>'
      +'<span style="font-size:11px;color:var(--text3);margin-left:6px">'+rows.length+'명 · ₩'+fmt(campIncome)+'</span>'
      +'<button class="btn btn-sm btn-teal" style="margin-left:auto" onclick="_saveApproveAll(\''+camp+'\',\''+month+'\')">✅ 전체승인</button>'
      +'</div>'
      +'<div style="overflow-x:auto"><table class="tbl">'
      +'<thead><tr><th>기사</th><th>ID</th><th>건수</th><th class="num">세금계산서</th><th class="num">고용보험</th><th class="num">산재보험</th><th class="num">실지급</th><th>상태</th><th></th></tr></thead><tbody>';
    rows.forEach(function(s,idx){
      var cn=calcNet(s);
      var statusColor=s.status==='승인'?'var(--green)':(s.status==='지급완료'?'var(--acc)':'var(--yellow)');
      html+='<tr>'
        +'<td>'+esc(s.driver||s.name||'')+'</td>'
        +'<td style="font-size:11px;color:var(--text3)">'+esc(s.userId||'')+'</td>'
        +'<td>'+fmt(s.dcnt)+'건</td>'
        +'<td class="num">₩'+fmt(cn.totalAmt)+'</td>'
        +'<td class="num" style="color:var(--acc)">₩'+fmt(cn.emp)+'</td>'
        +'<td class="num" style="color:var(--red)">₩'+fmt(cn.work)+'</td>'
        +'<td class="num" style="color:var(--green);font-weight:700">₩'+fmt(cn.net)+'</td>'
        +'<td><span class="badge" style="background:rgba(255,196,60,.15);color:'+statusColor+'">'+esc(s.status||'정산예정')+'</span></td>'
        +'<td><button class="btn btn-sm" onclick="_openSettleEdit(\''+s._fbId+'\')">✏️</button></td>'
        +'</tr>';
    });
    html+='</tbody></table></div></div>';
  });

  html+='<div style="display:flex;gap:8px;margin-top:8px">'
    +'<button class="btn btn-primary" onclick="_dlSettleExcel(\''+month+'\')">📥 정산 엑셀 다운로드</button>'
    +'<button class="btn" onclick="_dlInsuranceExcel(\''+month+'\')">📥 고용·산재 엑셀</button>'
    +'</div>';
  html+='</div>';

  var existing=c.querySelector('#cp-result-area');
  if(existing)existing.outerHTML=html;
  else c.insertAdjacentHTML('beforeend',html);
}

function _saveApproveAll(camp,month){
  if(!confirm(camp+' 전체 승인하시겠어요?'))return;
  if(!_db||!_dealerId)return;
  var data=(_cpState.pending||[]).filter(function(s){return s.camp===camp;});
  var batch=_db.batch();
  data.forEach(function(s){
    if(s._fbId){
      batch.update(_db.collection('mb_settlements').doc(s._fbId),{status:'승인',approvedAt:new Date().toISOString()});
      s.status='승인';
    }
  });
  batch.commit().then(function(){toast('✅ '+camp+' 전체 승인');_renderCpPending(document.getElementById('main-content'),_cpState.pending,month);}).catch(function(e){toast('❌ '+e.message);});
}

function _applySettleEdit(fbId,overlay){
  var s=(_cpState.pending||[]).find(function(x){return x._fbId===fbId;});if(!s)return;
  var income=+document.getElementById('ed-income').value||0;
  var emp=+document.getElementById('ed-emp').value||0;
  var work=+document.getElementById('ed-work').value||0;
  var dmg=+document.getElementById('ed-dmg').value||0;
  var adv=+document.getElementById('ed-adv').value||0;
  var etcPlus=+document.getElementById('ed-etcp').value||0;
  var etcMinus=+document.getElementById('ed-etcm').value||0;
  var status=document.getElementById('ed-status').value;
  var updates={totalAmt:income,emp:emp,work:work,dmg:dmg,adv:adv,etcPlus:etcPlus,etcMinus:etcMinus,status:status,updatedAt:new Date().toISOString()};
  Object.assign(s,updates);
  if(fbId&&_db){
    _db.collection('mb_settlements').doc(fbId).update(updates)
      .then(function(){toast('✅ 저장');overlay.remove();_renderCpPending(document.getElementById('main-content'),_cpState.pending,_cpState.month);})
      .catch(function(e){toast('❌ '+e.message);});
  } else {
    toast('✅ 저장 (로컬)');overlay.remove();
    _renderCpPending(document.getElementById('main-content'),_cpState.pending,_cpState.month);
  }
}

function _dlSettleExcel(month){
  var data=(_cpState.pending||[]).filter(function(s){return s.month===month;});
  if(!data.length){toast('❌ 데이터 없음');return;}
  var rows=[['기사','ID','캠프','건수','세금계산서합계','공급가액','필요경비','월보수액','고용보험','산재보험','실지급액','상태']];
  data.forEach(function(s){
    var cn=calcNet(s);
    rows.push([s.driver||s.name||s.userId,s.userId,s.camp||'',(s.dcnt||0),cn.totalAmt,cn.supplyAmt,Math.round(cn.supplyAmt*0.346),cn.monthlyWage,cn.emp,cn.work,cn.net,s.status||'정산예정']);
  });
  var ws=XLSX.utils.aoa_to_sheet(rows);
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,month+' 정산');
  XLSX.writeFile(wb,'정산_'+month+'.xlsx');
}

// ══ 고용산재 보험 엑셀 ══

  var data=(_cpState.pending||[]).filter(function(s){return s.month===month;});
