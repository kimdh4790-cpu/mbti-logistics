  // ① 공급대가 ② 공급가액 ③ 필요경비 34.6% ④ 월보수액 ⑤ 고용보험(기사부담) ⑥ 산재보험 ⑦ 급여지급액

  data.forEach(function(s){
    var cn=calcNet(s);

  p.then(function(){toast('✅ 저장');overlay.remove();_loadWorkerList();}).catch(function(e){toast('❌ '+e.message);});

function _delWorker(fbId,overlay){

  var did=_dealerId;
  // RPRICE 현재값
  var rpKeys=Object.keys(RPRICE).sort();
  var rpHtml=rpKeys.length
    ? rpKeys.map(function(k){return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-weight:600;min-width:80px">'+esc(k)+'</span><input type="number" value="'+RPRICE[k]+'" style="width:100px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;font-size:12px" onchange="RPRICE[\''+k+'\']= +this.value"><span style="font-size:11px;color:var(--text3)">원</span></div>';}).join('')
    : '<div style="color:var(--text3);font-size:12px">단가 없음 — 엑셀 업로드 시 자동 생성됩니다</div>';

  c.innerHTML='<div class="card">'
    +'<div class="ch"><span class="ct">💰 라우트 단가표</span>'
    +'<div style="display:flex;gap:6px;margin-left:auto">'
    +'<button class="btn btn-sm" onclick=\"document.getElementById(\'rt-file-inp2\').click()\">📥 파일 업로드</button>'
    +'<input type="file" id="rt-file-inp2" accept=".xlsx,.xls,.txt,.csv" style="display:none" onchange="_uploadRateTable(this)">'
    +'<button class="btn btn-sm btn-primary" onclick="_saveRPRICE()">💾 저장</button>'
    +'</div></div>'
    +'<div id="rprice-list">'+rpHtml+'</div>'
    +'</div>'
    +'<div class="card" id="tl-price-card">'
    +'<div class="ch"><span class="ct">👑 팀장수수료</span>'
    +'<div style="display:flex;gap:6px;margin-left:auto">'
    +'<button class="btn btn-sm" onclick=\"document.getElementById(\'tl-file-inp2\').click()\">📥 파일 등록</button>'
    +'<input type="file" id="tl-file-inp2" accept=".txt,.xlsx,.xls" style="display:none" onchange="_onTLFile2(this)">'
    +'</div></div>'
    +'<div id="tl-price-list">'+( TL_PRICES&&TL_PRICES.length?TL_PRICES.map(function(l){return '<div style="padding:6px;background:var(--bg3);border-radius:6px;margin-bottom:4px;font-size:12px"><strong>'+esc(l.name)+'</strong> '+esc(l.id)+' — 라우트: '+Object.keys(l.routes||{}).map(function(k){return k+':₩'+l.routes[k];}).join(', ')+'</div>';}).join(''):'<div style="color:var(--text3);font-size:12px">등록된 팀장 없음</div>')+'</div>'
    +'</div>'
    +'<div class="card">'
    +'<div class="ch"><span class="ct">👥 아이디 지원 관리</span></div>'
    +'<div id="id-support-wrap"></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">'
    +'<div class="fg"><label>원래기사 ID</label><input id="ids-from" placeholder="kycandksh"></div>'
    +'<div class="fg"><label>지원기사 ID</label><input id="ids-to" placeholder="llch91"></div>'
    +'</div>'
    +'<div class="fg"><label>날짜 (쉼표구분)</label><input id="ids-dates" placeholder="2026-04-29, 2026-05-16"></div>'
    +'<div class="fg"><label>라우트 (쉼표구분)</label><input id="ids-routes" placeholder="301A, 301B"></div>'
    +'<button class="btn btn-blue" style="width:100%;justify-content:center" onclick="_saveIdSupport()">👥 지원 규칙 저장</button>'
    +'</div>';

  _loadIdSupportSection(c,did);
}

function _saveRPRICE(){
  if(!_db||!_dealerId){toast('❌ 로그인 필요');return;}
  _db.collection('settings').doc(_dealerId+'_routePrices').set(RPRICE,{merge:false})
    .then(function(){toast('✅ 단가표 저장 완료');}).catch(function(e){toast('❌ '+e.message);});
}

function _onTLFile2(inp){
  if(!inp.files[0])return;
  _parseTeamLeaderFile(inp.files[0],function(leaders){
    if(!leaders||!leaders.length){toast('❌ 파싱 실패');return;}
    TL_PRICES=leaders;
    _saveTeamLeaderPrices(function(){toast('✅ 팀장수수료 '+leaders.length+'명 등록');_pagePrices();});
  });
  inp.value='';
}

// ══════════════════════════════════════════
// ██ PAGE: 설정 ██
// ══════════════════════════════════════════
function _pageSettings(){
  var c=document.getElementById('main-content');
  c.innerHTML='<div class="card">'
    +'<div class="ch"><span class="ct">⚙️ 설정</span></div>'
    +'<div style="font-size:12px;color:var(--text3);margin-bottom:12px">Firebase: mbti-logistics · Dealer: '+esc(_dealerId||'미로그인')+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<button class="btn" onclick="_resetData()">🗑 이번달 정산 초기화</button>'
    +'</div></div>';
}
function _resetData(){
  var month=_cpState.month;
  if(!confirm(month+' 정산 데이터를 삭제할까요?\n이 작업은 되돌릴 수 없습니다.'))return;
  _db.collection('mb_settlements').where('dealerId','==',_dealerId).where('month','==',month).get()
    .then(function(snap){
      var batch=_db.batch();snap.forEach(function(d){batch.delete(d.ref);});return batch.commit();
    }).then(function(){toast('✅ '+month+' 정산 삭제됨');_cpState.pending=[];_renderCpPending(document.getElementById('main-content')||document.body,[],month);}).catch(function(e){toast('❌ '+e.message);});
}

// ══ INIT ══
document.addEventListener('DOMContentLoaded',_initFirebase);
</script>
