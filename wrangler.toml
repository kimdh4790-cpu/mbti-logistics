name = "mbti-logistics"
main = "_worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./"
binding = "ASSETS"
not_found_handling = "single-page-application"

[assets.serve_directly]
include = ["*.html", "*.js", "*.css", "*.png", "*.ico", "*.json", "*.webmanifest"]
exclude = ["node_modules/**", ".github/**", "*.toml", "*.txt", "*.md"]
