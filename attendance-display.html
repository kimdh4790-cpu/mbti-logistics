<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출퇴근 · 방문자 등록 — DONWAY</title>
<style>
:root{
  --bg:#060608;
  --card:#0e0e14;
  --border:#1a1a28;
  --cyan:#00d4ff;
  --green:#00ff88;
  --orange:#ff9500;
  --text:#e8e8f0;
  --text2:#666680;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  display:flex;flex-direction:column;
  position:relative;
}

/* 배경 효과 */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}
.bg-glow{
  position:fixed;
  width:600px;height:600px;border-radius:50%;
  filter:blur(120px);pointer-events:none;
  opacity:.15;
}
.bg-glow.left{background:var(--cyan);top:-100px;left:-200px;}
.bg-glow.right{background:var(--orange);bottom:-100px;right:-200px;}

/* 헤더 */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  border-bottom:1px solid var(--border);
  background:rgba(6,6,8,.8);backdrop-filter:blur(20px);
  z-index:10;flex-shrink:0;
}
.logo{
  font-size:11px;letter-spacing:4px;
  color:var(--cyan);font-weight:800;opacity:.8;
}
.company-name{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.clock{
  text-align:right;
}
.clock-time{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--cyan);}
.clock-date{font-size:11px;color:var(--text2);margin-top:2px;}

/* 메인 */
.main{
  flex:1;
  display:grid;
  gap:20px;
  padding:20px 28px;
  overflow:hidden;
}
.main.dual{grid-template-columns:1fr 1fr;}
.main.single{grid-template-columns:1fr;max-width:520px;margin:0 auto;width:100%;}

/* QR 패널 */
.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  display:flex;flex-direction:column;
  align-items:center;
  padding:24px 20px 20px;
  position:relative;
  overflow:hidden;
}
.panel::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
}
.panel.qr-panel::before{background:linear-gradient(90deg,var(--cyan),#0088cc);}
.panel.visitor-panel::before{background:linear-gradient(90deg,var(--orange),#ff5500);}

.panel-badge{
  font-size:10px;letter-spacing:2px;font-weight:800;
  padding:4px 12px;border-radius:20px;
  margin-bottom:12px;
}
.panel.qr-panel .panel-badge{background:rgba(0,212,255,.1);color:var(--cyan);}
.panel.visitor-panel .panel-badge{background:rgba(255,149,0,.1);color:var(--orange);}

.panel-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.panel-sub{font-size:12px;color:var(--text2);margin-bottom:16px;text-align:center;}

/* QR 코드 */
.qr-wrapper{
  background:#fff;
  border-radius:16px;
  padding:16px;
  position:relative;
}
.qr-wrapper canvas{display:block;}
.qr-expiring{
  position:absolute;inset:0;border-radius:16px;
  background:rgba(255,255,255,.95);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#333;
  opacity:0;transition:.3s;
}

/* 6자리 코드 */
.code-display{
  display:flex;gap:8px;margin-top:16px;align-items:center;
}
.code-digit{
  width:44px;height:56px;
  background:rgba(0,212,255,.06);
  border:1px solid rgba(0,212,255,.2);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;
  color:var(--cyan);
  transition:.3s;
}
.code-sep{font-size:18px;color:var(--border);}

/* 타이머 */
.timer-wrap{width:100%;margin-top:14px;}
.timer-bar{
  height:4px;background:rgba(255,255,255,.05);
  border-radius:2px;overflow:hidden;
}
.timer-fill{
  height:100%;border-radius:2px;
  transition:width .1s linear;
}
.qr-panel .timer-fill{background:linear-gradient(90deg,var(--cyan),#0088cc);}
.visitor-panel .timer-fill{background:linear-gradient(90deg,var(--orange),#ff5500);}
.timer-text{font-size:11px;color:var(--text2);text-align:center;margin-top:6px;}

/* 방문자 QR */
.visitor-qr-wrap{
  background:#fff;
  border-radius:16px;
  padding:16px;
}
.visitor-qr-wrap canvas{display:block;}
.visitor-scan-hint{
  font-size:12px;color:var(--text2);text-align:center;
  margin-top:10px;line-height:1.5;
}

/* 방문자 로그 (소형) */
.visitor-log{
  width:100%;margin-top:12px;
  max-height:120px;overflow-y:auto;
}
.visitor-log-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;
  background:rgba(255,255,255,.03);
  border-radius:6px;margin-bottom:4px;
  font-size:11px;
}
.visitor-log-name{font-weight:700;color:var(--text);}
.visitor-log-time{color:var(--text2);}
.visitor-log-purpose{color:var(--orange);margin-left:auto;}

/* 하단 상태 */
.footer{
  padding:10px 28px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,6,8,.8);
  flex-shrink:0;
}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.status-hint{font-size:10px;color:var(--text2);opacity:.5;}
.fullscreen-btn{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--text2);font-size:11px;
  padding:5px 12px;border-radius:6px;cursor:pointer;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow left"></div>
<div class="bg-glow right"></div>

<div class="header">
  <div class="logo">DONWAY DISPLAY</div>
  <div class="company-name" id="hdr-company">출퇴근 · 방문자 등록</div>
  <div class="clock">
    <div class="clock-time" id="clock-time">00:00:00</div>
    <div class="clock-date" id="clock-date"></div>
  </div>
</div>

<div class="main" id="main-area">
  <!-- JS로 동적 생성 -->
</div>

<div class="footer">
  <div class="status-text"><div class="status-dot"></div>실시간 연결됨</div>
  <div class="status-hint" id="footer-hint">QR 또는 6자리 코드로 출퇴근 기록</div>
  <button class="fullscreen-btn" onclick="toggleFS()">⛶ 전체화면</button>
</div>

<!-- QR 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
// ── Firebase ──
var FB_CFG={
  apiKey:"AIzaSyBGe5LtENnJ0-xH9iRSyCwt2XK5D2eRE5I",
  authDomain:"mbti-logistics.firebaseapp.com",
  projectId:"mbti-logistics",
  storageBucket:"mbti-logistics.appspot.com",
  messagingSenderId:"1097631848952",
  appId:"1:1097631848952:web:b4e37b47e3ff3e3b5d38b8"
};
// Firebase 초기화는 window.load에서
var _db=null;

// ── URL 파라미터 ──
var _params=new URLSearchParams(location.search);
var _dealerId=_params.get('did')||'shared';
var _companyName=_params.get('name')||'';
// mode: qr / visitor / both
var _mode=_params.get('mode')||'both';

if(_companyName) document.getElementById('hdr-company').textContent=_companyName;

// ── 시계 ──
var _days=['일','월','화','수','목','금','토'];
function updateClock(){
  var n=new Date();
  var hh=n.getHours().toString().padStart(2,'0');
  var mm=n.getMinutes().toString().padStart(2,'0');
  var ss=n.getSeconds().toString().padStart(2,'0');
  document.getElementById('clock-time').textContent=hh+':'+mm+':'+ss;
  document.getElementById('clock-date').textContent=
    n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+n.getDate()+'일 ('+_days[n.getDay()]+')';
}
setInterval(updateClock,1000);updateClock();

// ── 30초 슬롯 (TOTP 방식) ──
var SLOT=30000;
var _secret='DONWAY_'+_dealerId;

function getSlot(){return Math.floor(Date.now()/SLOT);}
function slotRemaining(){return SLOT-((Date.now())%SLOT);}

// 6자리 코드 생성 (슬롯 기반 - 전체 자리 변동)
function genCode(slot){
  var s=_secret+'|'+slot+'|'+_dealerId;
  var h1=0,h2=0,h3=0;
  for(var i=0;i<s.length;i++){
    h1=(Math.imul(31,h1)+s.charCodeAt(i))|0;
    h2=(Math.imul(37,h2)+s.charCodeAt(i)*17)|0;
    h3=(Math.imul(41,h3)+s.charCodeAt(i)*31)|0;
  }
  var n=((Math.abs(h1)%10)*100000+(Math.abs(h2)%10)*10000+
         (Math.abs(h3)%10)*1000+(Math.abs(h1^h2)%10)*100+
         (Math.abs(h2^h3)%10)*10+(Math.abs(h1^h3)%10));
  return n.toString().padStart(6,'0');
}

// QR 데이터 생성
function genQrData(slot){
  var code=genCode(slot);
  return JSON.stringify({
    type:'attendance',
    dealerId:_dealerId,
    slot:slot,
    code:code,
    ts:Date.now()
  });
}

// ── UI 구성 ──
var _mainEl=document.getElementById('main-area');
var _qrCanvas=null,_visitorCanvas=null;
var _curSlot=getSlot();

function buildUI(){
  _mainEl.innerHTML='';
  if(_mode==='both') _mainEl.className='main dual';
  else _mainEl.className='main single';

  if(_mode==='qr'||_mode==='both'){
    var panel=document.createElement('div');
    panel.className='panel qr-panel';
    panel.id='qr-panel';
    panel.innerHTML=
      '<div class="panel-badge">직원 출퇴근</div>'+
      '<div class="panel-title">QR 코드 스캔</div>'+
      '<div class="panel-sub">앱으로 QR을 스캔하거나<br>6자리 코드를 입력하세요</div>'+
      '<div class="qr-wrapper"><div id="qr-canvas-wrap"></div><div class="qr-expiring" id="qr-expiring">갱신 중...</div></div>'+
      '<div class="code-display" id="code-display"></div>'+
      '<div class="timer-wrap">'+
        '<div class="timer-bar"><div class="timer-fill qr-fill" id="qr-timer-fill"></div></div>'+
        '<div class="timer-text" id="qr-timer-text">30초마다 자동 갱신</div>'+
      '</div>';
    _mainEl.appendChild(panel);
    _qrCanvas=document.getElementById('qr-canvas-wrap');
  }

  if(_mode==='visitor'||_mode==='both'){
    var vpanel=document.createElement('div');
    vpanel.className='panel visitor-panel';
    vpanel.id='visitor-panel';
    vpanel.innerHTML=
      '<div class="panel-badge">방문자 등록</div>'+
      '<div class="panel-title">방문자 등록</div>'+
      '<div class="panel-sub">QR을 스캔하여 방문자 등록을<br>진행해주세요</div>'+
      '<div class="visitor-qr-wrap"><div id="visitor-canvas-wrap"></div></div>'+
      '<div class="visitor-scan-hint">📱 휴대폰 카메라로 QR 스캔<br>신분증 촬영 후 간단 등록</div>'+
      '<div class="visitor-log" id="visitor-log"></div>';
    _mainEl.appendChild(vpanel);
    _visitorCanvas=document.getElementById('visitor-canvas-wrap');
    buildVisitorQr();
    loadRecentVisitors();
  }
}

// ── QR 생성 ──
function buildAttendanceQr(slot){
  var wrap=document.getElementById('qr-canvas-wrap');
  if(!wrap) return;
  wrap.innerHTML='';
  var data=genQrData(slot);
  var size=_mode==='both'?220:280;
  new QRCode(wrap,{text:data,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});
  buildCodeDigits(genCode(slot));
}

function buildVisitorQr(){
  var wrap=document.getElementById('visitor-canvas-wrap');
  if(!wrap) return;
  wrap.innerHTML='';
  var slot=getSlot();
  var token=genCode(slot); // 30초 유효 토큰
  var url=location.origin+'/visitor?did='+_dealerId+
    '&slot='+slot+'&token='+token+
    (_companyName?'&name='+encodeURIComponent(_companyName):'');
  var size=_mode==='both'?200:280;
  new QRCode(wrap,{text:url,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});
}

// ── 6자리 코드 표시 ──
function buildCodeDigits(code){
  var el=document.getElementById('code-display');
  if(!el) return;
  var html='';
  for(var i=0;i<6;i++){
    if(i===3) html+='<div class="code-sep">·</div>';
    html+='<div class="code-digit" id="d'+i+'">'+code[i]+'</div>';
  }
  el.innerHTML=html;
}

function animateCodeChange(oldCode,newCode){
  for(var i=0;i<6;i++){
    if(oldCode[i]!==newCode[i]){
      var el=document.getElementById('d'+i);
      if(el){
        el.style.transform='translateY(-10px)';
        el.style.opacity='0';
        (function(idx,digit){
          setTimeout(function(){
            var d=document.getElementById('d'+idx);
            if(d){d.textContent=digit;d.style.transform='translateY(10px)';}
          },150);
          setTimeout(function(){
            var d=document.getElementById('d'+idx);
            if(d){d.style.transform='';d.style.opacity='1';}
          },200);
        })(i,newCode[i]);
      }
    }
  }
}

// ── 타이머 업데이트 ──
function updateTimer(){
  var rem=slotRemaining();
  var pct=(rem/SLOT)*100;
  var fill=document.getElementById('qr-timer-fill');
  var txt=document.getElementById('qr-timer-text');
  if(fill) fill.style.width=pct+'%';
  var sec=Math.ceil(rem/1000);
  if(txt) txt.textContent=sec+'초 후 갱신';

  // 슬롯 변경 감지
  var slot=getSlot();
  if(slot!==_curSlot){
    var oldCode=genCode(_curSlot);
    var newCode=genCode(slot);
    _curSlot=slot;
    // QR 갱신 (페이드)
    var expiring=document.getElementById('qr-expiring');
    if(expiring){
      expiring.style.opacity='1';
      setTimeout(function(){
        buildAttendanceQr(slot);
        buildVisitorQr(); // ★ 방문자 QR도 같이 갱신
        if(expiring) expiring.style.opacity='0';
        animateCodeChange(oldCode,newCode);
      },300);
    } else {
      buildAttendanceQr(slot);
      buildVisitorQr();
    }
  }
}

// ── 최근 방문자 ──
function loadRecentVisitors(){
  var today=new Date().toISOString().slice(0,10);
  _db.collection('visitors')
    .where('dealerId','==',_dealerId)
    .where('visitDate','==',today)
    .orderBy('visitedAt','desc')
    .limit(5)
    .onSnapshot(function(snap){
      var log=document.getElementById('visitor-log');
      if(!log) return;
      if(snap.empty){log.innerHTML='<div style="font-size:11px;color:var(--text2);text-align:center;padding:8px">오늘 방문자 없음</div>';return;}
      var html='';
      snap.forEach(function(d){
        var data=d.data();
        var t=data.visitedAt&&data.visitedAt.toDate?
          data.visitedAt.toDate().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'--:--';
        html+='<div class="visitor-log-item">'+
          '<span class="visitor-log-name">'+data.name+'</span>'+
          '<span class="visitor-log-time">'+t+'</span>'+
          '<span class="visitor-log-purpose">'+data.purpose+'</span>'+
          '</div>';
      });
      log.innerHTML=html;
    });
}

// ── 전체화면 ──
function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen();
}
document.addEventListener('keydown',function(e){if(e.key==='F11'){e.preventDefault();toggleFS();}});

// ── 시작 ──
window.addEventListener('load',function(){
  // Firebase 초기화
  if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
  _db=firebase.firestore();
  buildUI();
  buildAttendanceQr(_curSlot);
  setInterval(updateTimer,100);
});
</script>
</body>
</html>
