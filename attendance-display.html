<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DONWAY 출퇴근</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,'Malgun Gothic',sans-serif}
:root{--brand:#185FA5;--bg:#0a0f1e;--bg2:#0f172a;--cyan:#00d4ff;--green:#00ff88}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* 상단 헤더 */
.header{width:100%;padding:16px 32px;background:var(--bg2);border-bottom:1px solid rgba(0,212,255,.15);display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;z-index:10}
.logo{font-size:22px;font-weight:900;letter-spacing:3px;color:#fff}
.logo span{color:var(--cyan)}
.camp-name{font-size:14px;color:var(--cyan);font-weight:700;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:6px 16px}
.clock{font-size:28px;font-weight:800;font-family:monospace;color:#fff}
.date-str{font-size:12px;color:rgba(255,255,255,.5);text-align:right}

/* 메인 레이아웃 */
.main{display:grid;grid-template-columns:1fr 1fr;gap:32px;padding:100px 40px 40px;width:100%;max-width:1100px;align-items:start}

/* QR 섹션 */
.qr-section{background:var(--bg2);border:1px solid rgba(0,212,255,.2);border-radius:20px;padding:32px;text-align:center}
.qr-title{font-size:14px;letter-spacing:3px;color:var(--cyan);margin-bottom:8px;font-family:monospace}
.qr-subtitle{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:24px}
#qr-box{width:220px;height:220px;margin:0 auto 20px;background:#fff;border-radius:12px;padding:10px;display:flex;align-items:center;justify-content:center}
#qr-box canvas,#qr-box img{width:100%!important;height:100%!important}

/* 타이머 바 */
.timer-wrap{margin:0 auto 16px;width:220px}
.timer-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:6px}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--brand));border-radius:2px;transition:width .1s linear}
.timer-text{font-size:11px;color:rgba(255,255,255,.5);text-align:center;font-family:monospace}

/* 안내 */
.qr-guide{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:10px;padding:14px;font-size:12px;color:rgba(255,255,255,.6);line-height:2;text-align:left}
.qr-guide strong{color:var(--cyan)}

/* 출퇴근 현황 */
.att-section{background:var(--bg2);border:1px solid rgba(0,255,136,.15);border-radius:20px;padding:28px;max-height:80vh;overflow-y:auto}
.att-title{font-size:14px;letter-spacing:3px;color:var(--green);margin-bottom:16px;font-family:monospace;display:flex;align-items:center;justify-content:space-between}
.att-count{font-size:11px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2);padding:3px 10px;border-radius:20px;color:var(--green)}
.att-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.att-row:last-child{border-bottom:none}
.att-avatar{width:36px;height:36px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.att-name{font-size:14px;font-weight:700;flex:1}
.att-camp{font-size:10px;color:rgba(255,255,255,.4)}
.att-in{font-size:12px;color:var(--green);font-family:monospace}
.att-out{font-size:12px;color:rgba(255,255,255,.4);font-family:monospace}
.att-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.att-status.working{background:rgba(0,255,136,.15);color:var(--green)}
.att-status.done{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.att-status.absent{background:rgba(239,68,68,.1);color:#f87171}
.empty-att{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-size:13px}

/* 설정 오버레이 */
.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:flex;align-items:center;justify-content:center}
.setup-box{background:var(--bg2);border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:36px;width:100%;max-width:420px}
.setup-title{font-size:18px;font-weight:800;margin-bottom:24px;color:#fff}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;color:rgba(255,255,255,.5);margin-bottom:6px}
.fg input,.fg select{width:100%;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:14px}
.btn{padding:12px 24px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-blue{background:var(--brand);color:#fff}

@media(max-width:768px){.main{grid-template-columns:1fr;padding:90px 16px 20px}}
</style>
</head>
<body>

<!-- 설정 오버레이 (최초 1회) -->
<div class="setup-overlay" id="setup-overlay">
  <div class="setup-box">
    <div class="setup-title">🏭 출퇴근 화면 설정</div>
    <div class="fg">
      <label>회사(대리점) ID</label>
      <input id="cfg-dealer" placeholder="Firebase UID 입력" value="">
    </div>
    <div class="fg">
      <label>캠프/지점명</label>
      <input id="cfg-camp" placeholder="예: 부산1캠프, 1호점" value="">
    </div>
    <div class="fg">
      <label>관리자 비밀번호 (화면 보호용)</label>
      <input id="cfg-pw" type="password" placeholder="4자리 이상">
    </div>
    <button class="btn btn-blue" onclick="saveConfig()">시작하기 →</button>
    <div id="cfg-msg" style="font-size:12px;color:#f87171;margin-top:10px;text-align:center"></div>
  </div>
</div>

<!-- 헤더 -->
<div class="header">
  <div class="logo"><span>D</span>ONWAY</div>
  <div class="camp-name" id="header-camp">캠프 로딩 중...</div>
  <div>
    <div class="clock" id="clock">00:00:00</div>
    <div class="date-str" id="date-str"></div>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <!-- 왼쪽: QR -->
  <div class="qr-section">
    <div class="qr-title">// DONWAY QR ENGINE</div>
    <div class="qr-subtitle">직원 앱에서 이 QR을 스캔하세요</div>
    <div id="qr-box"></div>
    <div class="timer-wrap">
      <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
      <div class="timer-text" id="timer-text">30초 후 갱신</div>
    </div>
    <div class="qr-guide">
      <strong>① DONWAY 앱</strong> 로그인<br>
      <strong>② 📷 QR 출퇴근</strong> 메뉴 선택<br>
      <strong>③ 카메라 시작</strong> 후 이 QR 스캔<br>
      <strong>④ 출/퇴근 자동 기록</strong>
    </div>
  </div>

  <!-- 오른쪽: 현황 -->
  <div class="att-section">
    <div class="att-title">
      오늘 출퇴근 현황
      <span class="att-count" id="att-count">0명 출근</span>
    </div>
    <div id="att-list"><div class="empty-att">⏳ 로딩 중...</div></div>
  </div>
</div>

<script>
var CONFIG = JSON.parse(localStorage.getItem('donway_att_cfg')||'{}');
var _db = null;
var _qrSecs = 30;
var _qrInterval = null;
var _attInterval = null;

// 설정 저장
function saveConfig(){
  var dealer = document.getElementById('cfg-dealer').value.trim();
  var camp   = document.getElementById('cfg-camp').value.trim();
  var pw     = document.getElementById('cfg-pw').value.trim();
  var msg    = document.getElementById('cfg-msg');
  if(!dealer||!camp){msg.textContent='회사 ID와 캠프명을 입력하세요';return;}
  if(pw.length>0&&pw.length<4){msg.textContent='비밀번호 4자리 이상';return;}
  CONFIG = {dealer:dealer, camp:camp, pw:pw};
  localStorage.setItem('donway_att_cfg', JSON.stringify(CONFIG));
  document.getElementById('setup-overlay').style.display='none';
  init();
}

// 초기화
function init(){
  if(!CONFIG.dealer){return;}
  document.getElementById('setup-overlay').style.display='none';
  document.getElementById('header-camp').textContent=CONFIG.camp||'캠프';
  startClock();
  generateQR();
  loadAttendance();
  // 30초마다 QR 갱신
  _qrInterval = setInterval(function(){
    _qrSecs=30;
    generateQR();
  }, 30000);
  // 10초마다 출퇴근 현황 갱신
  _attInterval = setInterval(loadAttendance, 10000);
  // 타이머 카운트다운
  setInterval(function(){
    _qrSecs--;
    if(_qrSecs<0)_qrSecs=30;
    var fill=document.getElementById('timer-fill');
    var txt=document.getElementById('timer-text');
    if(fill)fill.style.width=(_qrSecs/30*100)+'%';
    if(txt)txt.textContent=_qrSecs+'초 후 갱신';
  },1000);
}

// 동적 QR 생성
function generateQR(){
  var box=document.getElementById('qr-box');
  if(!box)return;
  box.innerHTML='';
  var payload = JSON.stringify({
    dealerId: CONFIG.dealer,
    camp: CONFIG.camp||'',
    ts: Date.now()  // 타임스탬프 (30초 유효)
  });
  new QRCode(box,{
    text: payload,
    width: 200,
    height: 200,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

// 출퇴근 현황 로드
function loadAttendance(){
  if(!_db||!CONFIG.dealer)return;
  var today=new Date().toISOString().slice(0,10);
  _db.collection('attendance')
    .where('dealerId','==',CONFIG.dealer)
    .where('date','==',today)
    .orderBy('checkIn','asc').limit(50).get()
  .then(function(snap){
    var rows=[];
    snap.forEach(function(doc){rows.push(doc.data());});
    renderAttendance(rows);
  }).catch(function(){});
}

function renderAttendance(rows){
  var list=document.getElementById('att-list');
  var cnt=document.getElementById('att-count');
  if(!list)return;
  if(!rows.length){
    list.innerHTML='<div class="empty-att">아직 출근 기록이 없습니다</div>';
    if(cnt)cnt.textContent='0명 출근';
    return;
  }
  var working=rows.filter(function(r){return r.checkIn&&!r.checkOut;}).length;
  if(cnt)cnt.textContent=working+'명 근무 중 / 총 '+rows.length+'명';
  list.innerHTML=rows.map(function(r){
    var initials=(r.driverName||r.userId||'?')[0].toUpperCase();
    var status=r.checkOut?'done':'working';
    var statusTxt=r.checkOut?'퇴근':'근무 중';
    return '<div class="att-row">'
      +'<div class="att-avatar">'+initials+'</div>'
      +'<div style="flex:1">'
      +'<div class="att-name">'+(r.driverName||r.userId||'')+'</div>'
      +'<div class="att-camp">'+(r.camp||'')+'</div>'
      +'</div>'
      +'<div style="text-align:right">'
      +'<div class="att-in">🟢 '+(r.checkIn||'-')+'</div>'
      +(r.checkOut?'<div class="att-out">🌙 '+r.checkOut+'</div>':'')
      +'</div>'
      +'<span class="att-status '+status+'">'+statusTxt+'</span>'
      +'</div>';
  }).join('');
}

// 시계
function startClock(){
  function tick(){
    var now=new Date();
    var h=String(now.getHours()).padStart(2,'0');
    var m=String(now.getMinutes()).padStart(2,'0');
    var s=String(now.getSeconds()).padStart(2,'0');
    var cl=document.getElementById('clock');
    var ds=document.getElementById('date-str');
    if(cl)cl.textContent=h+':'+m+':'+s;
    if(ds)ds.textContent=now.getFullYear()+'.'+(now.getMonth()+1)+'.'+now.getDate()+' '+'일월화수목금토'[now.getDay()]+'요일';
  }
  tick();setInterval(tick,1000);
}

// 시작 (Firebase 로드 완료 후)
window.addEventListener('load', function(){
  // Firebase 초기화
  try{
    if(!firebase.apps||!firebase.apps.length){
      firebase.initializeApp({
        apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
        authDomain:'mbti-logistics.firebaseapp.com',
        projectId:'mbti-logistics',
        storageBucket:'mbti-logistics.firebasestorage.app',
        messagingSenderId:'40761160761',
        appId:'1:40761160761:web:20545b610f03f534e949e8'
      });
    }
    _db = firebase.firestore();
  }catch(e){ console.error('Firebase 초기화 실패:', e); }

  if(CONFIG.dealer){
    init();
  } else {
    // URL 파라미터로 자동 입력
    var params=new URLSearchParams(window.location.search);
    if(params.get('dealer')){
      document.getElementById('cfg-dealer').value=params.get('dealer');
      document.getElementById('cfg-camp').value=params.get('camp')||'';
    }
  }
});
</script>
</body>
</html>
