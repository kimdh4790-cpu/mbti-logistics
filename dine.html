<!--

<head>

<title>DINE — 외식업 정산 플랫폼</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
 --bg:#07071a;--s1:#0c0c22;--s2:#14142a;--s3:#1a1a32;
 --br:#0891b2;--br2:#7c3aed;--gr:#22c55e;--yl:#f59e0b;--rd:#ef4444;
 --tx:#f0f0ff;--t2:#9898c0;--t3:#565678;
 --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
 --r:12px;--topbar-h:56px;--sidebar-w:220px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;display:flex;flex-direction:column}

/* ── 탑바 ── */
#topbar{height:var(--topbar-h);background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:50;position:relative}
.tb-logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#38bdf8,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.tb-sub{font-size:11px;color:var(--t3);font-weight:600}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-user{font-size:12px;color:var(--t2);font-weight:600}
.tb-logout{padding:5px 12px;border-radius:8px;border:1px solid var(--bd2);color:var(--t3);font-size:11px;font-weight:700;cursor:pointer;background:transparent}
.tb-logout:hover{border-color:var(--rd);color:var(--rd)}

/* ── 메인 레이아웃 ── */
#main-wrap{display:flex;flex:1;overflow:hidden}

/* ── 사이드바 ── */
#sidebar{width:var(--sidebar-w);background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:.3s}
.nav-group{padding:8px 0}
.nav-group-title{font-size:9px;font-weight:800;color:var(--t3);letter-spacing:1px;text-transform:uppercase;padding:6px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:.2s;border-radius:0}
.nav-item:hover{background:rgba(8,145,178,.08);color:var(--tx)}
.nav-item.active{background:rgba(8,145,178,.12);color:#38bdf8;border-right:2px solid var(--br)}
.nav-item .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-group-title{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 4px;font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;user-select:none}
.nav-group-title:hover{color:var(--t2)}
.nav-group-title .nav-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.nav-group-title.collapsed .nav-arrow{transform:rotate(-90deg)}
.nav-group-items{overflow:hidden;transition:max-height .25s ease}
.nav-group-items.collapsed{max-height:0!important}

/* ── 콘텐츠 ── */
#content{flex:1;overflow-y:auto;padding:20px;margin-left:0}
.slide-up{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-size:18px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--t3)}
.card{background:var(--s2);border:1px solid var(--bd2);border-radius:16px;padding:16px;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:800;color:var(--t2)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi-card{background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.kpi-label{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:900;letter-spacing:-1px}
.kpi-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* ── 직원 카드 ── */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.staff-card{background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:14px;transition:.2s}
.staff-card:hover{border-color:rgba(8,145,178,.3)}
.staff-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.staff-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.staff-name{font-size:14px;font-weight:800}
.staff-role{font-size:11px;color:var(--t3);margin-top:1px}
.staff-badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-kitchen{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.badge-hall{background:rgba(8,145,178,.1);color:#38bdf8;border:1px solid rgba(8,145,178,.2)}
.badge-full{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.badge-part{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.staff-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd);font-size:12px}
.staff-row:last-child{border:none}
.staff-pay{font-size:16px;font-weight:900;color:var(--gr)}

/* ── 급여명세서 ── */
.payslip{background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:20px;max-width:500px}
.payslip-header{text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.payslip-title{font-size:18px;font-weight:900}
.payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.payslip-row.total{font-weight:900;font-size:15px;color:var(--gr);border:none;margin-top:8px}
.payslip-row.deduct{color:var(--rd)}
.payslip-row.add{color:var(--gr)}

/* ── 알림/뱃지 ── */
.alert-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--rd);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:900;margin-left:4px}
.law-alert{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--yl);margin-bottom:8px}

/* ── 버튼 ── */
.btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(8,145,178,.4)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:8px}
.btn-ghost{background:transparent;border:1px solid var(--bd2);color:var(--t2)}
.btn-ghost:hover{border-color:var(--br);color:var(--tx)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--rd)}

/* ── 모달 ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.mo-box{background:var(--s2);border:1px solid var(--bd2);border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:11px;font-weight:700;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:10px 12px;background:var(--s3);border:1px solid var(--bd2);border-radius:10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--br)}
select.inp option{background:var(--s2)}

/* ── 출퇴근 실시간 ── */
.attend-live{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gr);font-weight:700}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 반응형 ── */
@media(max-width:768px){
 :root{--sidebar-w:0px}
 #sidebar{display:none;position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);transition:.25s}
 #sidebar.open{display:flex!important;transform:translateX(0)}
 #dine-sidebar-btn{display:flex!important;align-items:center;justify-content:center}
 /* 탑바 모바일 */
 #topbar{padding:0 10px;gap:6px}
 .tb-sub{display:none}
 .tb-right{gap:6px}
 .tb-user{display:none}
 #tb-attend-cnt{font-size:10px}
 .tb-logout{padding:4px 8px;font-size:10px}
 /* 레이아웃 */
 #app-wrap{height:auto!important;min-height:100vh}
 #main-wrap{overflow:visible!important;height:auto!important}
 #content{overflow-y:auto!important;height:auto!important;min-height:calc(100vh - 56px);padding:12px}
 html,body{overflow:auto!important;height:auto!important}
 /* KPI 그리드 */
 .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
 .kpi-card{padding:10px!important}
 .kpi-val{font-size:16px!important}
 .kpi-label{font-size:9px!important}
 /* 분석 */
 .ana-kpi{padding:12px!important}
 .ana-kpi .num{font-size:16px!important}
 /* 인라인 그리드 강제 1열 */
 [style*="grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr)!important}
 [style*="grid-template-columns:repeat(3"]{grid-template-columns:repeat(2,1fr)!important}
 [style*="grid-template-columns:3fr 2fr"]{grid-template-columns:1fr!important}
 [style*="grid-template-columns:2fr 1fr"]{grid-template-columns:1fr!important}
 [style*="grid-template-columns:3fr 1fr"]{grid-template-columns:1fr!important}
 [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
 [style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important}
 /* 카드 */
 .card{padding:12px!important}
 .staff-grid{grid-template-columns:1fr!important}
 /* 페이지 타이틀 */
 .page-title{font-size:16px!important}
}

/* ── 로그인 화면 ── */
#login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 30% 40%,rgba(8,145,178,.15) 0%,transparent 55%),var(--bg)}
.login-box{background:var(--s2);border:1px solid var(--bd2);border-radius:24px;padding:32px;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:32px;font-weight:900;background:linear-gradient(135deg,#38bdf8,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:24px}

/* 모바일 하단 탭바 */
#mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);z-index:1000;padding-bottom:env(safe-area-inset-bottom)}
#mobile-tabs .mt-bar{display:flex;align-items:stretch}
#mobile-tabs .mt-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;font-size:9px;color:var(--t2);gap:3px;min-height:56px;border:none;background:transparent;-webkit-tap-highlight-color:transparent}
#mobile-tabs .mt-item .mt-ico{font-size:20px;line-height:1}
#mobile-tabs .mt-item.on{color:#0891b2}
#mobile-tabs .mt-more{position:relative}
#mobile-tabs .mt-more-menu{display:none;position:fixed;bottom:60px;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);padding:8px 0;z-index:1001}
#mobile-tabs .mt-more-menu.open{display:block}
#mobile-tabs .mt-more-menu .mm-item{display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#mobile-tabs .mt-more-menu .mm-item:active{background:var(--b3)}
@media(max-width:768px){
 #mobile-tabs{display:block}
 #content{padding-bottom:70px}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">
function _mtGo(page, btn){
 // 더보기 메뉴 닫기
 _mtMoreClose();
 // 탭 활성화
 document.querySelectorAll('.mt-item').forEach(function(b){b.classList.remove('on');});
 if(btn) btn.classList.add('on');
 // 페이지 이동
 _dinePage(page, null);
}

function _mtMoreToggle(){
 var menu=document.getElementById('mt-more-menu');
 if(menu) menu.classList.toggle('open');
}

function _mtMoreClose(){
 var menu=document.getElementById('mt-more-menu');
 if(menu) menu.classList.remove('open');
}

// 더보기 메뉴 외부 터치 시 닫기
document.addEventListener('touchstart',function(e){
 var menu=document.getElementById('mt-more-menu');
 if(menu&&menu.classList.contains('open')){
  var moreBtn=document.querySelector('.mt-more');
  if(!menu.contains(e.target)&&moreBtn&&!moreBtn.contains(e.target)){
   menu.classList.remove('open');
  }
 }
});
</script>
</head>
<body>

<!-- 로그인 -->
<div id="login-wrap">
 <div class="login-box">
  <div class="login-logo">DINE</div>
  <div class="login-sub">외식업 정산·직원·급여 플랫폼</div>

  <div style="display:flex;gap:0;margin-bottom:20px;border:1px solid var(--bd);border-radius:10px;overflow:hidden">

  </div>
  <!-- 직원 가입 폼 -->

   <div class="input-group" style="text-align:left"><label>이름 *</label><input id="st-name" class="inp" placeholder="홍길동"></div>

   <div class="input-group" style="text-align:left"><label>연락처 *</label><input id="mb-reg-phone" class="inp" type="tel" placeholder="010-0000-0000"></div>

   <div id="mb-reg-err" style="font-size:11px;color:var(--rd);margin-top:8px;min-height:16px"></div>
  </div>
 </div>
</div>

<!-- 메인 앱 -->
<div id="app-wrap" style="display:none;flex-direction:column;height:100vh">
 <!-- 탑바 -->
 <div id="topbar">
  <button id="dine-sidebar-btn" onclick="_dineToggleSidebar()" style="display:none;background:none;border:none;color:var(--tx);font-size:20px;cursor:pointer;padding:6px;border-radius:8px;margin-right:4px">☰</button>
  <div class="tb-logo">DINE</div>
  <div class="tb-sub">외식업 정산 플랫폼</div>
  <div class="tb-right">
   <div class="attend-live"><span class="live-dot"></span><span id="tb-attend-cnt">0명 출근중</span></div>

function _mtGo(page, btn){
 // 더보기 메뉴 닫기
 _mtMoreClose();
 // 탭 활성화
 document.querySelectorAll('.mt-item').forEach(function(b){b.classList.remove('on');});
 if(btn) btn.classList.add('on');
 // 페이지 이동
 _dinePage(page, null);
}

function _mtMoreToggle(){
 var menu=document.getElementById('mt-more-menu');
 if(menu) menu.classList.toggle('open');
}

function _mtMoreClose(){
 var menu=document.getElementById('mt-more-menu');
 if(menu) menu.classList.remove('open');
}

// 더보기 메뉴 외부 터치 시 닫기
document.addEventListener('touchstart',function(e){
 var menu=document.getElementById('mt-more-menu');
 if(menu&&menu.classList.contains('open')){
  var moreBtn=document.querySelector('.mt-more');
  if(!menu.contains(e.target)&&moreBtn&&!moreBtn.contains(e.target)){
   menu.classList.remove('open');
  }
 }
});
</script>
