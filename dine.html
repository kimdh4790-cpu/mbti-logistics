<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>DINE — 외식업 정산 플랫폼</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
 --bg:#07071a;--s1:#0c0c22;--s2:#14142a;--s3:#1a1a32;
 --br:#0891b2;--br2:#7c3aed;--gr:#22c55e;--yl:#f59e0b;--rd:#ef4444;
 --tx:#f0f0ff;--t2:#9898c0;--t3:#565678;
 --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
 --r:12px;--topbar-h:56px;--sidebar-w:220px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;display:flex;flex-direction:column}

/* ── 탑바 ── */
#topbar{height:var(--topbar-h);background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:50;position:relative}
.tb-logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#38bdf8,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.tb-sub{font-size:11px;color:var(--t3);font-weight:600}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-user{font-size:12px;color:var(--t2);font-weight:600}
.tb-logout{padding:5px 12px;border-radius:8px;border:1px solid var(--bd2);color:var(--t3);font-size:11px;font-weight:700;cursor:pointer;background:transparent}
.tb-logout:hover{border-color:var(--rd);color:var(--rd)}

/* ── 메인 레이아웃 ── */
#main-wrap{display:flex;flex:1;overflow:hidden}

/* ── 사이드바 ── */
#sidebar{width:var(--sidebar-w);background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:.3s}
.nav-group{padding:8px 0}
.nav-group-title{font-size:9px;font-weight:800;color:var(--t3);letter-spacing:1px;text-transform:uppercase;padding:6px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:.2s;border-radius:0}
.nav-item:hover{background:rgba(8,145,178,.08);color:var(--tx)}
.nav-item.active{background:rgba(8,145,178,.12);color:#38bdf8;border-right:2px solid var(--br)}
.nav-item .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}

/* ── 콘텐츠 ── */
#content{flex:1;overflow-y:auto;padding:20px;margin-left:0}
.slide-up{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-size:18px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--t3)}
.card{background:var(--s2);border:1px solid var(--bd2);border-radius:16px;padding:16px;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:800;color:var(--t2)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi-card{background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.kpi-label{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:900;letter-spacing:-1px}
.kpi-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* ── 직원 카드 ── */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.staff-card{background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:14px;transition:.2s}
.staff-card:hover{border-color:rgba(8,145,178,.3)}
.staff-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.staff-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.staff-name{font-size:14px;font-weight:800}
.staff-role{font-size:11px;color:var(--t3);margin-top:1px}
.staff-badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-kitchen{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.badge-hall{background:rgba(8,145,178,.1);color:#38bdf8;border:1px solid rgba(8,145,178,.2)}
.badge-full{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.badge-part{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.staff-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd);font-size:12px}
.staff-row:last-child{border:none}
.staff-pay{font-size:16px;font-weight:900;color:var(--gr)}

/* ── 급여명세서 ── */
.payslip{background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:20px;max-width:500px}
.payslip-header{text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.payslip-title{font-size:18px;font-weight:900}
.payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.payslip-row.total{font-weight:900;font-size:15px;color:var(--gr);border:none;margin-top:8px}
.payslip-row.deduct{color:var(--rd)}
.payslip-row.add{color:var(--gr)}

/* ── 알림/뱃지 ── */
.alert-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--rd);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:900;margin-left:4px}
.law-alert{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--yl);margin-bottom:8px}

/* ── 버튼 ── */
.btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(8,145,178,.4)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:8px}
.btn-ghost{background:transparent;border:1px solid var(--bd2);color:var(--t2)}
.btn-ghost:hover{border-color:var(--br);color:var(--tx)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--rd)}

/* ── 모달 ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.mo-box{background:var(--s2);border:1px solid var(--bd2);border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:11px;font-weight:700;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:10px 12px;background:var(--s3);border:1px solid var(--bd2);border-radius:10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--br)}
select.inp option{background:var(--s2)}

/* ── 출퇴근 실시간 ── */
.attend-live{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gr);font-weight:700}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 반응형 ── */
@media(max-width:768px){
 :root{--sidebar-w:0px}
 #sidebar{display:none}
 .kpi-grid{grid-template-columns:repeat(2,1fr)}
}

/* ── 로그인 화면 ── */
#login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 30% 40%,rgba(8,145,178,.15) 0%,transparent 55%),var(--bg)}
.login-box{background:var(--s2);border:1px solid var(--bd2);border-radius:24px;padding:32px;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:32px;font-weight:900;background:linear-gradient(135deg,#38bdf8,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:24px}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-wrap">
 <div class="login-box">
  <div class="login-logo">DINE</div>
  <div class="login-sub">외식업 정산·직원·급여 플랫폼</div>
  <div class="input-group" style="text-align:left">
   <label>이메일</label>
   <input id="li-email" class="inp" type="email" placeholder="example@email.com">
  </div>
  <div class="input-group" style="text-align:left">
   <label>비밀번호</label>
   <input id="li-pw" class="inp" type="password" placeholder="비밀번호">
  </div>
  <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;margin-top:4px" onclick="_dineLogin()">로그인</button>
  <div id="li-err" style="font-size:11px;color:var(--rd);margin-top:8px;min-height:16px"></div>
  <div style="margin-top:16px;font-size:11px;color:var(--t3)">30일 무료 체험 · 외식업 특화</div>
 </div>
</div>

<!-- 메인 앱 -->
<div id="app-wrap" style="display:none;flex-direction:column;height:100vh">
 <!-- 탑바 -->
 <div id="topbar">
  <div class="tb-logo">DINE</div>
  <div class="tb-sub">외식업 정산 플랫폼</div>
  <div class="tb-right">
   <div class="attend-live"><span class="live-dot"></span><span id="tb-attend-cnt">0명 출근중</span></div>
   <div class="tb-user" id="tb-user-name"></div>
   <button class="tb-logout btn" onclick="_dineLogout()">로그아웃</button>
  </div>
 </div>
 <div id="main-wrap">
  <!-- 사이드바 -->
  <div id="sidebar">
   <div class="nav-group">
    <div class="nav-group-title">대시보드</div>
    <div class="nav-item active" onclick="_dinePage('dashboard',this)"><span class="ic">📊</span>매출 현황</div>
   </div>
   <div class="nav-group">
    <div class="nav-group-title">직원 관리</div>
    <div class="nav-item" onclick="_dinePage('staff',this)"><span class="ic">👥</span>직원 현황</div>
    <div class="nav-item" onclick="_dinePage('attend',this)"><span class="ic">⏱</span>출퇴근 현황</div>
    <div class="nav-item" onclick="_dinePage('payroll',this)"><span class="ic">💰</span>급여 계산</div>
    <div class="nav-item" onclick="_dinePage('payslip',this)"><span class="ic">📋</span>급여명세서</div>
   </div>
   <div class="nav-group">
    <div class="nav-group-title">매출 정산</div>
    <div class="nav-item" onclick="_dinePage('sales',this)"><span class="ic">🛒</span>POS 매출</div>
    <div class="nav-item" onclick="_dinePage('delivery',this)"><span class="ic">🛵</span>배달앱 정산</div>
    <div class="nav-item" onclick="_dinePage('settle',this)"><span class="ic">📑</span>월 정산</div>
   </div>
   <div class="nav-group">
    <div class="nav-group-title">설정</div>
    <div class="nav-item" onclick="_dinePage('store',this)"><span class="ic">🏪</span>매장 설정</div>
    <div class="nav-item" onclick="_dinePage('alimtalk',this)"><span class="ic">💬</span>알림톡 설정</div>
   </div>
  </div>
  <div id="content"></div>
 </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
/* ── Firebase 초기화 ── */
firebase.initializeApp({
 apiKey:"AIzaSyBvOkd5aq4pGM-G3lXWXdGNZ_MixU9NGQU",
 authDomain:"mbti-logistics.firebaseapp.com",
 projectId:"mbti-logistics",
 storageBucket:"mbti-logistics.appspot.com",
 messagingSenderId:"749630062532",
 appId:"1:749630062532:web:dineapp"
});
var _db   = firebase.firestore();
var _auth = firebase.auth();
var _CU   = {};

/* ── 2026 상수 ── */
var MIN_WAGE = 10320;
var INS = {pension:0.0475,health:0.03595,longcare:0.1314,employ:0.009};

/* ── 로그인 ── */
function _dineLogin(){
 var email = document.getElementById('li-email').value.trim();
 var pw    = document.getElementById('li-pw').value;
 var err   = document.getElementById('li-err');
 if(!email||!pw){err.textContent='이메일과 비밀번호를 입력하세요';return;}
 err.textContent='';
 _auth.signInWithEmailAndPassword(email,pw)
  .catch(function(e){err.textContent='로그인 실패: '+e.message;});
}
document.getElementById('li-pw').addEventListener('keydown',function(e){if(e.key==='Enter')_dineLogin();});

function _dineLogout(){
 if(!confirm('로그아웃하시겠습니까?'))return;
 _auth.signOut();
}

_auth.onAuthStateChanged(function(u){
 if(u){
  _db.collection('companies').where('uid','==',u.uid).limit(1).get()
   .then(function(s){
    var co = s.empty ? null : s.docs[0].data();
    _CU = {uid:u.uid,email:u.email,dealerId:u.uid,name:(co&&co.name)||u.email.split('@')[0],company:co};
    document.getElementById('login-wrap').style.display='none';
    var aw=document.getElementById('app-wrap');aw.style.display='flex';
    document.getElementById('tb-user-name').textContent=_CU.name;
    _dinePage('dashboard',document.querySelector('.nav-item'));
    _dineWatchAttend();
   });
 } else {
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('app-wrap').style.display='none';
 }
});

/* ── 페이지 라우팅 ── */
function _dinePage(p,el){
 document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
 if(el)el.classList.add('active');
 var c=document.getElementById('content');
 if(p==='dashboard') _dineDashboard(c);
 else if(p==='staff')    _dineStaff(c);
 else if(p==='attend')   _dineAttend(c);
 else if(p==='payroll')  _dinePayroll(c);
 else if(p==='payslip')  _dinePayslip(c);
 else if(p==='sales')    _dineSales(c);
 else if(p==='delivery') _dineDelivery(c);
 else if(p==='settle')   _dineSettle(c);
 else if(p==='store')    _dineStore(c);
 else if(p==='alimtalk') _dineAlimtalk(c);
}

/* ── 출퇴근 실시간 감지 ── */
var _attendUnsub=null;
function _dineWatchAttend(){
 if(_attendUnsub)_attendUnsub();
 var today=new Date().toISOString().slice(0,10);
 _attendUnsub=_db.collection('attendance').where('dealerId','==',_CU.dealerId)
  .where('date','==',today).onSnapshot(function(snap){
   var ins={},outs={};
   snap.forEach(function(doc){
    var d=doc.data();
    if(d.type==='in')ins[d.memberId]=d;
    else outs[d.memberId]=d;
   });
   var working=Object.keys(ins).filter(function(id){return !outs[id];});
   var el=document.getElementById('tb-attend-cnt');
   if(el)el.textContent=working.length+'명 출근중';
  });
}

/* ══════════════════════════════════
   📊 대시보드
   ══════════════════════════════════ */
function _dineDashboard(el){
 var did=_CU.dealerId;
 el.innerHTML='';
 var wrap=document.createElement('div');
 wrap.className='slide-up';

 var hdr=document.createElement('div');
 hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px';
 hdr.innerHTML='<div><div class="page-title">📊 오늘 현황</div><div class="page-sub" id="dash-date"></div></div>';
 var now=new Date();
 wrap.appendChild(hdr);

 /* KPI */
 var kpi=document.createElement('div');
 kpi.className='kpi-grid';
 [{id:'kpi-sales',label:'오늘 매출',icon:'💰',color:'#38bdf8'},
  {id:'kpi-orders',label:'주문 건수',icon:'🛒',color:'#a78bfa'},
  {id:'kpi-staff',label:'출근 인원',icon:'👥',color:'#22c55e'},
  {id:'kpi-labor',label:'인건비율',icon:'📈',color:'#f59e0b'}
 ].forEach(function(k){
  var card=document.createElement('div');
  card.className='kpi-card';
  card.style.borderTop='2px solid '+k.color;
  card.innerHTML='<div class="kpi-label">'+k.icon+' '+k.label+'</div>'+
   '<div class="kpi-val" id="'+k.id+'" style="color:'+k.color+'">-</div>'+
   '<div class="kpi-sub" id="'+k.id+'-sub">로딩중</div>';
  kpi.appendChild(card);
 });
 wrap.appendChild(kpi);

 /* 2열 레이아웃 */
 var grid=document.createElement('div');
 grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px';

 /* 오늘 출퇴근 현황 */
 var attCard=document.createElement('div');
 attCard.className='card';
 attCard.innerHTML='<div class="sec-title" style="margin-bottom:10px"><span class="attend-live"><span class="live-dot"></span>실시간 출퇴근</span></div>'+
  '<div id="dash-attend-list"><div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">⏳ 로딩중</div></div>';
 grid.appendChild(attCard);

 /* 근로법 알림 */
 var lawCard=document.createElement('div');
 lawCard.className='card';
 lawCard.innerHTML='<div class="sec-title" style="margin-bottom:10px">⚖️ 근로법 알림</div>'+
  '<div id="dash-law-list"><div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">⏳ 로딩중</div></div>';
 grid.appendChild(lawCard);
 wrap.appendChild(grid);
 el.appendChild(wrap);

 /* 날짜 */
 var days=['일','월','화','수','목','금','토'];
 document.getElementById('dash-date').textContent=
  now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+days[now.getDay()]+')';

 /* 데이터 로드 */
 var today=now.toISOString().slice(0,10);
 _dineLoadDashboard(did,today);
}

function _dineLoadDashboard(did,today){
 Promise.all([
  _db.collection('filo_sales').where('dealerId','==',did).where('date','==',today).get(),
  _db.collection('attendance').where('dealerId','==',did).where('date','==',today).get(),
  _db.collection('members').where('dealerId','==',did).get()
 ]).then(function(results){
  var salesSnap=results[0],attSnap=results[1],memSnap=results[2];

  /* 매출 */
  var totalSales=0,orderCnt=0;
  salesSnap.forEach(function(doc){var d=doc.data();if(d.status!=='cancelled'){totalSales+=d.total||0;orderCnt++;}});

  /* 출퇴근 */
  var ins={},outs={};
  attSnap.forEach(function(doc){var d=doc.data();if(d.type==='in')ins[d.memberId]=d;else outs[d.memberId]=d;});
  var working=Object.keys(ins).filter(function(id){return !outs[id];});
  var worked=Object.keys(outs).length;

  /* 인건비 추산 */
  var estLabor=0;
  attSnap.forEach(function(doc){
   var d=doc.data();
   if(d.type==='out'&&ins[d.memberId]){
    var h=(new Date(d.time)-new Date(ins[d.memberId].time))/3600000;
    estLabor+=Math.round(h*MIN_WAGE);
   }
  });
  var laborRate=totalSales>0?Math.round(estLabor/totalSales*100):0;

  /* KPI 업데이트 */
  _countUp('kpi-sales',totalSales,'₩','');
  _countUp('kpi-orders',orderCnt,'','건');
  var se=document.getElementById('kpi-staff');if(se)se.textContent=working.length+'명';
  var lr=document.getElementById('kpi-labor');if(lr)lr.textContent=laborRate+'%';
  var ss=document.getElementById('kpi-sales-sub');if(ss)ss.textContent='주문 '+orderCnt+'건';
  var os=document.getElementById('kpi-orders-sub');if(os)os.textContent='평균 ₩'+(orderCnt?Math.round(totalSales/orderCnt).toLocaleString():0);
  var ws=document.getElementById('kpi-staff-sub');if(ws)ws.textContent='오늘 총 '+(working.length+worked)+'명 근무';

/* ── 근로법 자동 체크 ── */
function _dineCheckLaborLaw(did,memSnap,attSnap){
 var lawList=document.getElementById('dash-law-list');
 if(!lawList)return;
 var alerts=[];
 var now=new Date();
 var ym=now.toISOString().slice(0,7);

 memSnap.forEach(function(doc){
  var m=doc.data();
  if(!m.hireDate)return;
  var hire=new Date(m.hireDate);
  var months=Math.floor((now-hire)/(30*24*3600*1000));

  /* 연차 발생 알림 (1개월 개근 시) */
  if(months>0&&months<=11&&m.payType==='hourly'){
   alerts.push({type:'yl',icon:'📅',msg:(m.name||'직원')+'님 입사 '+months+'개월 — 연차 '+Math.min(months,11)+'일 발생 확인 필요'});
  }

  /* 퇴직금 발생 알림 (1년 도달) */
  if(months===12){
   alerts.push({type:'gr',icon:'💼',msg:(m.name||'직원')+'님 1년 근속 달성 — 퇴직금 발생 (계속 근무 시 충당 필요)'});
  }

  /* 최저임금 미달 체크 */
  if(m.payType==='hourly'&&m.hourlyWage<MIN_WAGE){
   alerts.push({type:'rd',icon:'⚠️',msg:(m.name||'직원')+'님 시급 '+m.hourlyWage+'원 — 2026 최저임금('+MIN_WAGE+'원) 미달!'});
  }
 });

 if(!alerts.length){
  lawList.innerHTML='<div style="font-size:12px;color:var(--gr);padding:8px">✅ 근로법 이상 없음</div>';
  return;
 }
 var colorMap={yl:'rgba(245,158,11,.08)',gr:'rgba(34,197,94,.08)',rd:'rgba(239,68,68,.08)'};
 var borderMap={yl:'rgba(245,158,11,.2)',gr:'rgba(34,197,94,.2)',rd:'rgba(239,68,68,.2)'};
 var textMap={yl:'#f59e0b',gr:'#22c55e',rd:'#ef4444'};
 lawList.innerHTML=alerts.map(function(a){
  return '<div style="background:'+colorMap[a.type]+';border:1px solid '+borderMap[a.type]+';border-radius:8px;padding:8px 10px;font-size:11px;color:'+textMap[a.type]+';margin-bottom:6px">'+
   a.icon+' '+a.msg+'</div>';
 }).join('');
}

function _dineLoadAttend(did){
 var date=document.getElementById('att-date')?.value||new Date().toISOString().slice(0,10);
 Promise.all([
  _db.collection('attendance').where('dealerId','==',did).where('date','==',date).get(),
  _db.collection('members').where('dealerId','==',did).get()
 ]).then(function(results){
  var attSnap=results[0],memSnap=results[1];
  var memMap={};memSnap.forEach(function(doc){memMap[doc.id]=doc.data();});
  var ins={},outs={};
  attSnap.forEach(function(doc){var d=doc.data();if(d.type==='in')ins[d.memberId]=d;else outs[d.memberId]=d;});
  var allIds=[...new Set([...Object.keys(ins),...Object.keys(outs)])];
  var table=document.getElementById('att-table');if(!table)return;
  if(!allIds.length){table.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3);font-size:12px">'+date+' 출퇴근 기록 없음</div>';return;}

  var html='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'+
   '<thead><tr style="border-bottom:1px solid var(--bd)">'+
   '<th style="padding:8px;text-align:left;color:var(--t3)">이름</th>'+
   '<th style="padding:8px;text-align:left;color:var(--t3)">파트</th>'+
   '<th style="padding:8px;text-align:center;color:var(--t3)">출근</th>'+
   '<th style="padding:8px;text-align:center;color:var(--t3)">퇴근</th>'+
   '<th style="padding:8px;text-align:center;color:var(--t3)">근무시간</th>'+
   '<th style="padding:8px;text-align:right;color:var(--t3)">예상급여</th>'+
   '<th style="padding:8px;text-align:center;color:var(--t3)">상태</th>'+
   '</tr></thead><tbody>';

  allIds.forEach(function(id){
   var m=memMap[id]||{};
   var inT=ins[id]?new Date(ins[id].time):null;
   var outT=outs[id]?new Date(outs[id].time):null;
   var diffH=0,nightH=0,estPay=0;
   if(inT&&outT){
    var diffMin=(outT-inT)/60000;
    var breakMin=diffMin>=480?60:diffMin>=240?30:0;
    diffH=Math.round((diffMin-breakMin)/60*10)/10;
    /* 야간 계산 */
    var ns=new Date(inT);ns.setHours(22,0,0,0);
    if(outT>ns){nightH=Math.round((outT-Math.max(inT,ns))/3600000*10)/10;}
    var wage=m.hourlyWage||MIN_WAGE;
    estPay=Math.round(diffH*wage+nightH*wage*0.5);
   }
   var isWorking=inT&&!outT;
   var partColor={'kitchen':'#ef4444','hall':'#38bdf8'}[m.part]||'#a78bfa';
   html+='<tr style="border-bottom:1px solid var(--bd)">'+
    '<td style="padding:8px;font-weight:700">'+(m.name||id)+'</td>'+
    '<td style="padding:8px"><span style="font-size:10px;font-weight:700;color:'+partColor+'">'+({'kitchen':'주방','hall':'홀','management':'관리'}[m.part]||'-')+'</span></td>'+
    '<td style="padding:8px;text-align:center">'+(inT?inT.toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}):'-')+'</td>'+
    '<td style="padding:8px;text-align:center">'+(outT?outT.toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}):isWorking?'<span style="color:var(--gr)">근무중</span>':'-')+'</td>'+
    '<td style="padding:8px;text-align:center">'+(diffH?diffH+'h':isWorking?'...':'-')+'</td>'+
    '<td style="padding:8px;text-align:right;color:var(--gr);font-weight:700">'+(estPay?'₩'+estPay.toLocaleString():'-')+'</td>'+
    '<td style="padding:8px;text-align:center"><span style="font-size:10px;font-weight:700;color:'+(isWorking?'#22c55e':'var(--t3)')+'">'+
    (isWorking?'● 근무중':'완료')+'</span></td>'+
    '</tr>';
  });
  html+='</tbody></table></div>';
  table.innerHTML=html;
 });
}

/* ── 핵심 급여 계산 함수 ── */
function _calcPayFull(m,att,empCnt,ym){
 var ins=att.ins||[],outs=att.outs||[];
 ins.sort(function(a,b){return a.time>b.time?1:-1;});
 outs.sort(function(a,b){return a.time>b.time?1:-1;});

 var totalMin=0,nightMin=0,overMin=0;
 for(var i=0;i<Math.min(ins.length,outs.length);i++){
  var inT=new Date(ins[i].time),outT=new Date(outs[i].time);
  var diff=(outT-inT)/60000;
  if(diff<=0||diff>720)continue;
  var br=diff>=480?60:diff>=240?30:0;
  var net=diff-br;totalMin+=net;
  /* 야간 */
  var ns=new Date(inT);ns.setHours(22,0,0,0);
  if(outT>ns)nightMin+=(outT-Math.max(inT,ns))/60000;
  /* 연장 */
  if(net>480)overMin+=net-480;
 }

 var totalHour=totalMin/60;
 var nightHour=Math.round(nightMin/60*10)/10;
 var overHour=Math.round(overMin/60*10)/10;
 var monthlyHours=Math.round(totalHour);

 var basePay=0,weeklyHoliday=0,nightPay=0,overPay=0;

 if(m.payType==='monthly'){
  basePay=m.monthlySalary||0;
  basePay+=(m.mealAllowance||0)+(m.transportAllowance||0);
  if(empCnt>=5){
   var hw=Math.round((m.monthlySalary||0)/209);
   nightPay=Math.round(nightHour*hw*0.5);
   overPay=Math.round(overHour*hw*0.5);
  }
 } else {
  var wage=m.hourlyWage||MIN_WAGE;
  basePay=Math.round(totalHour*wage);
  /* 주휴수당 */
  var weekH=totalHour/4;
  if(weekH>=15)weeklyHoliday=Math.round((weekH/40)*8*wage);
  /* 야간/연장 (5인↑) */
  nightPay=Math.round(nightHour*wage*0.5);
  if(empCnt>=5)overPay=Math.round(overHour*wage*0.5);
 }

 var grossSalary=basePay+weeklyHoliday+nightPay+overPay;

 /* 4대보험 */
 var insTotal=0,insItems={};
 var insured=m.payType==='monthly'||monthlyHours>=60;
 if(insured&&m.insuranceType==='4대보험'){
  insItems.pension=Math.floor(grossSalary*INS.pension);
  insItems.health=Math.floor(grossSalary*INS.health);
  insItems.longcare=Math.floor(insItems.health*INS.longcare);
  insItems.employ=Math.floor(grossSalary*INS.employ);
  insTotal=Object.values(insItems).reduce(function(s,v){return s+v;},0);
 } else if(m.insuranceType==='3.3%'){
  insTotal=Math.floor(grossSalary*0.033);
 }

 /* 소득세 */
 var taxBase=grossSalary-insTotal;
 var incomeTax=taxBase<1060000?0:taxBase<2000000?Math.floor(taxBase*0.01):taxBase<3000000?Math.floor(taxBase*0.015):Math.floor(taxBase*0.02);
 var localTax=Math.floor(incomeTax*0.1);
 var taxTotal=incomeTax+localTax;

 var netSalary=grossSalary-insTotal-taxTotal;

 /* 근로법 알림 */
 var lawAlerts=[];
 if(m.hireDate){
  var hire=new Date(m.hireDate);
  var months=Math.floor((new Date()-hire)/(30*24*3600*1000));
  if(months>=1&&months<=11&&empCnt>=5&&m.payType==='hourly'){
   lawAlerts.push({text:'연차 '+Math.min(months,11)+'일',bg:'rgba(8,145,178,.1)',color:'#38bdf8',border:'rgba(8,145,178,.2)'});
  }
  if(months>=12){
   lawAlerts.push({text:'퇴직금 충당',bg:'rgba(34,197,94,.1)',color:'#22c55e',border:'rgba(34,197,94,.2)'});
  }
 }
 if(weeklyHoliday>0)lawAlerts.push({text:'주휴수당 포함',bg:'rgba(245,158,11,.1)',color:'#f59e0b',border:'rgba(245,158,11,.2)'});
 if(nightPay>0)lawAlerts.push({text:'야간수당 포함',bg:'rgba(124,58,237,.1)',color:'#a78bfa',border:'rgba(124,58,237,.2)'});
 if(empCnt<5)lawAlerts.push({text:'5인미만(가산제외)',bg:'rgba(150,150,150,.1)',color:'var(--t3)',border:'rgba(150,150,150,.2)'});

 return{basePay,weeklyHoliday,nightPay,nightHour,overPay,overHour,grossSalary,insTotal,insItems,taxTotal,netSalary,monthlyHours,lawAlerts};
}

      '</div>';
    }).join('');
  });

function _dineCalcSettle(did){
 var ym=document.getElementById('settle-ym')?.value||new Date().toISOString().slice(0,7);
 var from=ym+'-01',to=ym+'-31';
 var res=document.getElementById('settle-result');
 if(!res)return;
 res.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3)">⏳ 정산 계산중...</div>';

 Promise.all([
  _db.collection('filo_sales').where('dealerId','==',did).where('date','>=',from).where('date','<=',to).get(),
  _db.collection('attendance').where('dealerId','==',did).where('date','>=',from).where('date','<=',to).get(),
  _db.collection('members').where('dealerId','==',did).get()
 ]).then(function(results){
  var salesSnap=results[0],attSnap=results[1],memSnap=results[2];

  var totalSales=0;salesSnap.forEach(function(doc){var d=doc.data();if(d.status!=='cancelled')totalSales+=d.total||0;});

  var attMap={};
  attSnap.forEach(function(doc){var d=doc.data();if(!attMap[d.memberId])attMap[d.memberId]={ins:[],outs:[]};if(d.type==='in')attMap[d.memberId].ins.push(d);else attMap[d.memberId].outs.push(d);});

  var totalLabor=0;
  memSnap.forEach(function(doc){var m=doc.data();var r=_calcPayFull(m,attMap[doc.id]||{ins:[],outs:[]},memSnap.size,ym);totalLabor+=r.grossSalary;});

  var laborRate=totalSales>0?Math.round(totalLabor/totalSales*100):0;
  var profit=totalSales-totalLabor;

  res.innerHTML='<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">'+
   '<div class="kpi-card" style="border-top:2px solid #38bdf8"><div class="kpi-label">💰 총 매출</div><div class="kpi-val" style="color:#38bdf8">₩'+totalSales.toLocaleString()+'</div><div class="kpi-sub">POS 매출</div></div>'+
   '<div class="kpi-card" style="border-top:2px solid #ef4444"><div class="kpi-label">👥 인건비</div><div class="kpi-val" style="color:#ef4444">₩'+totalLabor.toLocaleString()+'</div><div class="kpi-sub">'+memSnap.size+'명 기준</div></div>'+
   '<div class="kpi-card" style="border-top:2px solid #f59e0b"><div class="kpi-label">📈 인건비율</div><div class="kpi-val" style="color:#f59e0b">'+laborRate+'%</div><div class="kpi-sub">'+(laborRate<30?'✅ 양호':laborRate<35?'⚠️ 주의':'❌ 과다')+'</div></div>'+
   '<div class="kpi-card" style="border-top:2px solid #22c55e"><div class="kpi-label">💵 인건비 차감</div><div class="kpi-val" style="color:#22c55e">₩'+profit.toLocaleString()+'</div><div class="kpi-sub">매출-인건비</div></div>'+
   '</div>'+
   '<div class="card"><div style="font-size:12px;color:var(--t2)">'+
   '💡 배달앱 매출은 배달앱 정산 탭에서 엑셀 업로드 후 자동 합산됩니다.<br>'+
   '외식업 적정 인건비율: <b style="color:var(--gr)">25~30%</b> (매출 대비)</div></div>';
 });
}

/* ══════════════════════════════════
   🏪 매장 설정
   ══════════════════════════════════ */
function _dineStore(el){
 var did=_CU.dealerId;
 el.innerHTML='';
 var wrap=document.createElement('div');wrap.className='slide-up';
 wrap.innerHTML='<div style="margin-bottom:16px"><div class="page-title">🏪 매장 설정</div><div class="page-sub">매장 정보 및 근로 기준 설정</div></div>';

 _db.collection('companies').where('uid','==',did).limit(1).get().then(function(snap){
  var co=snap.empty?{}:snap.docs[0].data();
  var box=document.createElement('div');box.className='card';
  box.innerHTML='<div class="sec-title" style="margin-bottom:12px">매장 기본 정보</div>'+
   '<div class="input-group"><label>매장명</label><input id="st-storeName" class="inp" type="text" value="'+(co.storeName||co.name||'')+'"></div>'+
   '<div class="input-group"><label>사업자번호</label><input id="st-bizNo" class="inp" type="text" value="'+(co.bizNo||'')+'"></div>'+
   '<div class="input-group"><label>주소</label><input id="st-address" class="inp" type="text" value="'+(co.address||'')+'"></div>'+
   '<div class="input-group"><label>전화번호</label><input id="st-phone" class="inp" type="tel" value="'+(co.phone||'')+'"></div>'+
   '<div class="input-group"><label>직원수(5인기준)</label><input id="st-empCount" class="inp" type="number" value="'+(co.empCount||5)+'"></div>'+
   '<div class="input-group"><label>기본 시급</label><input id="st-defaultWage" class="inp" type="number" value="'+(co.defaultWage||10320)+'"></div>'+
   '<div class="input-group"><label>급여일</label><input id="st-payDate" class="inp" type="number" value="'+(co.payDate||25)+'"></div>'+
   '<button class="btn btn-primary" onclick="_dineSaveStore(\''+did+'\')">저장</button>';
  wrap.appendChild(box);
  el.appendChild(wrap);
 });
}

function _dineSaveStore(did){
 var data={
  storeName:document.getElementById('st-storeName')?.value||'',
  bizNo:document.getElementById('st-bizNo')?.value||'',
  address:document.getElementById('st-address')?.value||'',
  phone:document.getElementById('st-phone')?.value||'',
  empCount:parseInt(document.getElementById('st-empCount')?.value)||5,
  defaultWage:parseInt(document.getElementById('st-defaultWage')?.value)||MIN_WAGE,
  payDate:parseInt(document.getElementById('st-payDate')?.value)||25,
  updatedAt:new Date().toISOString()
 };
 _db.collection('companies').where('uid','==',did).limit(1).get().then(function(snap){
  var pr=snap.empty?_db.collection('companies').add(Object.assign(data,{uid:did})):snap.docs[0].ref.update(data);
  pr.then(function(){_dineToast('✅ 저장됐습니다');}).catch(function(e){_dineToast('❌ '+e.message);});
 });
}

function _dinePayslip(el){el.innerHTML='<div class="slide-up"><div class="page-title">📋 급여명세서</div><div class="page-sub" style="margin-bottom:16px">급여 계산 탭에서 명세서 버튼을 눌러주세요</div></div>';}
function _dineAlimtalk(el){el.innerHTML='<div class="slide-up"><div class="page-title">💬 알림톡 설정</div><div class="card" style="margin-top:16px"><div style="font-size:13px;color:var(--t2)">카카오 알림톡 발송을 위해 솔라피 API 키를 등록하세요.<br><br>솔라피 API Key: <input class="inp" placeholder="API Key 입력" style="margin-top:8px"><br><button class="btn btn-primary" style="margin-top:8px">저장</button></div></div></div>';}

/* ── 유틸 ── */
function _dineToast(msg){
 var t=document.createElement('div');
 t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--bd2);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;z-index:300;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)';
 t.textContent=msg;
 document.body.appendChild(t);
 setTimeout(function(){t.remove();},2500);
}

function _countUp(id,target,prefix,suffix){
 var el=document.getElementById(id);if(!el)return;
 var start=0,step=800/60,inc=target/60;
 var t=setInterval(function(){start+=inc;if(start>=target){start=target;clearInterval(t);}
  el.textContent=prefix+Math.round(start).toLocaleString()+suffix;},step);
}
