<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#185FA5">
<title>LogiNet — 물류 정산관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --red:#A32D2D;--red-l:#FCEBEB;
  --green:#3B6D11;--green-l:#EAF3DE;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --gray:#5F5E5A;--gray-l:#F1EFE8;--gray-m:#D3D1C7;
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f0efe9;
  --text:#2C2C2A;--text2:#5F5E5A;--text3:#888780;
  --border:rgba(0,0,0,.1);--r:10px;--rl:14px
}
body.dark{
  --bg:#1a1a18;--bg2:#242422;--bg3:#1e1e1c;--text:#e8e6e0;--text2:#a0a09a;--text3:#666663;
  --border:rgba(255,255,255,.12);--gray-l:#2a2a28;--blue-l:#0d2a45;--teal-l:#062e20;
  --amber-l:#2d1f04;--red-l:#2d1010;--green-l:#142209;--purple-l:#1a1840
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Malgun Gothic',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sl{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sl-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sl-text{font-size:13px;font-weight:800;color:var(--blue);line-height:1.3;letter-spacing:.5px}
.sl-ver{font-size:9px;color:var(--purple);font-weight:600;display:block}
.su{padding:8px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)}
.av{width:26px;height:26px;border-radius:50%;background:var(--blue-l);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--blue);flex-shrink:0}
.snav{flex:1;padding:6px;overflow-y:auto}
.ns{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.05em;padding:6px 8px 2px}
.ni{display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:12px;margin-bottom:1px}
.ni:hover{background:var(--gray-l)}
.ni.on{background:var(--blue-l);color:var(--blue);font-weight:600}
.ni-ic{font-size:14px}
.sb-bot{padding:9px 12px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:0 16px;height:46px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0;gap:8px}
.topbar-title{font-size:15px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:7px}
.content{flex:1;overflow-y:auto;padding:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.card-header{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
.card-body{padding:4px 0}
.btn{padding:7px 12px;border-radius:var(--r);font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--bg3)}
.btn:active{transform:scale(.97)}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-green{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-amber{background:#d97706;color:#fff;border-color:#d97706}
.btn-sm{padding:4px 9px;font-size:11px}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px}
.b-green{background:var(--green-l);color:var(--green)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-blue{background:var(--blue-l);color:var(--blue)}
.b-red{background:var(--red-l);color:var(--red)}
.b-gray{background:var(--gray-l);color:var(--gray)}
.fg{display:flex;flex-direction:column;margin-bottom:10px}
.fg label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fg input,.fg select,.fg textarea{padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text);outline:none;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--blue)}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
th{background:var(--bg3);font-weight:600;color:var(--text2);font-size:11px}
tr:hover>td{background:var(--bg3)}
.tbl-wrap{overflow-x:auto}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:14px}
.mo.show{display:flex}
.md{background:var(--bg2);border-radius:var(--rl);padding:20px;width:560px;max-width:100%;max-height:92vh;overflow-y:auto}
.mdt{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.mdb{margin-bottom:14px}
.mdf{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--border)}
.close-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);line-height:1}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:900;margin-bottom:4px}
.stat-lbl{font-size:11px;color:var(--text3)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--text3)}
.info-box{background:var(--blue-l);border-radius:var(--r);padding:10px 12px;font-size:11px;color:var(--blue-d);margin-bottom:10px}
/* 차트 */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:100px;padding:0 8px}
.chart-bar-col{display:flex;flex-direction:column;align-items:center;flex:1}
.chart-bar{background:var(--blue);border-radius:4px 4px 0 0;width:100%;position:relative;transition:height .3s;min-height:4px}
.chart-bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text3);white-space:nowrap}
.chart-bar-lbl{font-size:9px;color:var(--text3);margin-top:3px}
/* 햄버거 */
.ham{display:none;width:32px;height:32px;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;border:1px solid var(--border);background:var(--bg3);font-size:16px;flex-shrink:0}
/* 로그인 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{background:var(--bg2);border-radius:20px;padding:32px 28px;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo-icon{width:56px;height:56px;border-radius:14px;background:var(--blue);display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px}
.login-title{font-size:22px;font-weight:900;color:var(--blue);letter-spacing:1px}
.login-sub{font-size:12px;color:var(--text3);margin-top:3px}
@media(max-width:640px){
  .sidebar{position:fixed;z-index:300;height:100%;transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .ham{display:flex!important}
  .stat-grid{grid-template-columns:1fr 1fr}
  .gr{grid-template-columns:1fr}
}
@media print{
  @page{size:A4 portrait;margin:12mm}
  .sidebar,.topbar,.no-print{display:none!important}
  #app{display:block}
  .main,.content{height:auto;overflow:visible}
}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:600;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">💰</div>
      <div class="login-title">LogiNet</div>
      <div class="login-sub">물류 정산관리 시스템 v2.0</div>
    </div>
    <div class="fg"><label>이메일</label><input id="login-email" type="email" placeholder="example@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="fg"><label>비밀번호</label><input id="login-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="login-err" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>
    <button class="btn btn-blue" style="width:100%;padding:12px;font-size:14px;font-weight:700" onclick="doLogin()">로그인</button>
    <div style="text-align:center;margin-top:12px">
      <button class="btn btn-sm" style="font-size:11px" onclick="toggleDark()">🌙 다크모드</button>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app" style="display:none">
<div class="sidebar" id="sidebar">
  <div class="sl">
    <div class="sl-icon">💰</div>
    <div>
      <div class="sl-text">LogiNet</div>
      <span class="sl-ver">v2.0 · 엠비티아이</span>
    </div>
  </div>
  <div class="su">
    <div class="av" id="sb-av">관</div>
    <div>
      <div style="font-size:12px;font-weight:600" id="sb-name">관리자</div>
      <div style="font-size:10px;color:var(--text3)" id="sb-role">로딩중...</div>
    </div>

  <nav class="snav" id="snav"></nav>
  <div class="sb-bot">
    <button class="btn" style="width:100%;font-size:11px;margin-bottom:4px" onclick="toggleDark()">🌙 다크모드</button>

  </div>
</div>
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="ham" onclick="toggleSb()">☰</div>
      <div class="topbar-title" id="page-title">대시보드</div>
    </div>
    <div class="topbar-right" id="topbar-actions"></div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- 파일 입력 (고정) -->
<input type="file" id="excel-file-input" accept=".xlsx,.xls" style="display:none">

<!-- 모달 컨테이너 -->
<div id="modals"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc,addDoc,updateDoc,deleteDoc,collection,query,where,getDocs,serverTimestamp,writeBatch}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB_CFG={
  apiKey:"AIzaSyCTywAQNHg8IEYmbU64aYAhjqXMHWbJhjo",
  authDomain:"mbti-logistics-bfcd3.firebaseapp.com",
  projectId:"mbti-logistics-bfcd3",
  storageBucket:"mbti-logistics-bfcd3.firebasestorage.app",
  messagingSenderId:"780709870161",
  appId:"1:780709870161:web:4325a56d089bfa18855670"
};
const fb=initializeApp(FB_CFG);
const auth=getAuth(fb);
const db=getFirestore(fb);

// ── 전역 상태 ──
let CU=null; // 현재 유저
let RPRICE={
  '101C':700,'101D':730,'109A':1050,'109B':1100,'109C':1060,'109D':1050,
  '213A':1080,'213B':1080,'213C':1000,'213D':1080,
  '215A':720,'215B':720,'215C':720,'215D':720,
  '508B':950,'608B':920,'608C':920,'608D':930,
  '612A':890,'612B':860,'612C':880,'612D':950,
  '613A':880,'613B':900,'613C':880,'613D':910,
  '614A':930,'614B':910,'614C':930,'614D':920,
  '619A':930,'619B':930,'619C':860,'619D':880,
  '812A':960,'812B':930,'812C':930,'812D':800
};
const CAMP_COLOR={'부산1':'#3B82F6','부산2':'#8B5CF6','부산3':'#10B981','대구2':'#F59E0B','대구2B':'#FB923C','진주M':'#EF4444','기타':'#94A3B8'};
const RCAMP=[
  {name:'부산1',prefix:['101','215']},
  {name:'부산2',prefix:['213']},
  {name:'부산3',prefix:['508']},
  {name:'대구2',prefix:['109','213']},
  {name:'진주M',prefix:['608','612','613','614','619','812']}
];

// ── 유틸 ──
function fmt(n){return Math.round(n||0).toLocaleString('ko-KR');}
function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function curMonth(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function today(){return new Date().toLocaleDateString('ko-KR');}
function toast(msg,dur=2500){const el=document.getElementById('toast');if(!el)return;el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur);}
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('ln_dark',document.body.classList.contains('dark')?1:0);}
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');}
function getCampByRoute(route){if(!route)return'기타';for(const c of RCAMP){for(const p of c.prefix){if(route.startsWith(p))return c.name;}}return'기타';}
function stripDf(uid){return(uid||'').trim().replace(/@[a-z0-9]+$/i,'').trim();}
function calcNet(s){
  const income=(s.damt||0)+(s.ramt||0)+(s.fresh||0)+(s.finc||0)+(s.inc||0)+(s.etcPlus||0)-(s.etcMinus||0);
  const sa=Math.round(income/1.1);
  const wage=Math.round(sa*(1-0.346));
  const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;
  const work=Math.floor(wage*0.0088/10)*10;
  const deduct=emp+work+(s.dmg||0)+(s.adv||0);
  return{income,supplyAmt:sa,wage,emp,work,deduct,net:income-deduct};
}
window.fmt=fmt;window.esc=esc;window.calcNet=calcNet;window.getCampByRoute=getCampByRoute;

// ── 로그인 ──
window.doLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const errEl=document.getElementById('login-err');
  errEl.style.display='none';
  if(!email||!pw){errEl.textContent='이메일과 비밀번호를 입력하세요';errEl.style.display='block';return;}
  try{
    await signInWithEmailAndPassword(auth,email,pw);
  }catch(e){
    errEl.textContent='로그인 실패: '+e.message;
    errEl.style.display='block';
  }
};
window.doLogout=async function(){await signOut(auth);};

// ── 인증 상태 감지 ──
onAuthStateChanged(auth,async user=>{
  if(!user){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
    CU=null;return;
  }
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  // 유저 정보 로드
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    if(snap.exists()){
      const d=snap.data();
      CU={uid:user.uid,email:user.email,name:d.name||'',role:d.role||'dealer',dealerId:d.dealerId||user.uid};
    }else{
      CU={uid:user.uid,email:user.email,name:'',role:'dealer',dealerId:user.uid};
    }
  }catch(e){CU={uid:user.uid,email:user.email,name:'',role:'dealer',dealerId:user.uid};}
  // RPRICE Firebase에서 로드
  try{
    const rSnap=await getDoc(doc(db,'settings','routePrices'));
    if(rSnap.exists())Object.assign(RPRICE,rSnap.data());
  }catch(e){}
  // UI 업데이트
  document.getElementById('sb-av').textContent=(CU.name||CU.email||'?')[0].toUpperCase();
  document.getElementById('sb-name').textContent=CU.name||CU.email||'';
  document.getElementById('sb-role').textContent=CU.role==='admin'?'슈퍼관리자':'대리점 관리자';
  buildNav();
  goPage('settle');
  if(localStorage.getItem('ln_dark')==='1')document.body.classList.add('dark');
  // 파일 입력 이벤트 연결
  const fi=document.getElementById('excel-file-input');
  if(fi)fi.onchange=function(){if(this.files[0])parseExcelNuri(this);};
});

// ── 메뉴 구성 ──
const MENUS={
  admin:[
    {s:'대시보드',items:[{ic:'📊',l:'전체 현황',p:'settle'}]},
    {s:'관리',items:[{ic:'📋',l:'전체 정산',p:'settlements'},{ic:'🏢',l:'대리점 관리',p:'dealers'},{ic:'👥',l:'전체 기사',p:'drivers'},{ic:'📌',l:'라우트 단가표',p:'prices'}]},
    {s:'시스템',items:[{ic:'⚙️',l:'설정',p:'settings'}]}
  ],
  dealer:[
    {s:'대시보드',items:[{ic:'📊',l:'정산 현황',p:'settle'}]},
    {s:'운영',items:[{ic:'📋',l:'정산 관리',p:'settlements'},{ic:'👤',l:'기사 관리',p:'drivers'}]},
    {s:'설정',items:[{ic:'📌',l:'단가표',p:'prices'},{ic:'📈',l:'통계',p:'stats'}]}
  ]
};
function buildNav(){
  const nav=document.getElementById('snav');
  const menus=MENUS[CU.role]||MENUS.dealer;
  nav.innerHTML=menus.map(g=>`
    <div class="ns">${g.s}</div>
    ${g.items.map(m=>`<div class="ni" id="nav-${m.p}" onclick="goPage('${m.p}')"><span class="ni-ic">${m.ic}</span>${m.l}</div>`).join('')}
  `).join('');
}
window.goPage=function(page){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const nav=document.getElementById('nav-'+page);
  if(nav)nav.classList.add('on');
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('sidebar').classList.remove('open');
  const pages={settle:pageSettle,settlements:pageSettlements,drivers:pageDrivers,prices:pagePrices,stats:pageStats,dealers:pageDealers,settings:pageSettings};
  const fn=pages[page];
  if(fn)fn();
  else document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">🚧</div><div>준비 중입니다</div></div>`;
};

// ══════════════════════════════════════
// ██ 정산 현황 대시보드
// ══════════════════════════════════════
async function pageSettle(){
  document.getElementById('page-title').textContent='정산 현황';
  document.getElementById('topbar-actions').innerHTML=`
    <input type="file" id="excel-file-input" accept=".xlsx,.xls" style="display:none" onchange="window._excelHandler&&window._excelHandler(this)">
    <button class="btn btn-green btn-sm" onclick="triggerExcel()">📂 쿠팡 엑셀 업로드</button>
    <button class="btn btn-blue btn-sm" onclick="goPage('settlements')">정산 목록 →</button>`;
  // excel 핸들러 등록
  window._excelHandler=parseExcelNuri;
  // 파일 입력 재연결
  setTimeout(()=>{
    const fi=document.getElementById('excel-file-input');

window.parseExcelNuri=function(inp){
  const file=inp.files[0];
  if(!file)return;
  const fname=file.name;
  inp.value='';
  toast('📊 '+fname+' 분석 중...');
  const fnMatch=fname.match(/(\d{4})년[_\s]*(\d{2})월/);
  const month=fnMatch?`${fnMatch[1]}-${fnMatch[2]}`:curMonth();
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let ws=null;
      for(const name of wb.SheetNames){
        const cand=wb.Sheets[name];
        const s=XLSX.utils.sheet_to_json(cand,{header:1,defval:null,range:0});
        if(s[0]&&s[0][0]==='구분'){ws=cand;break;}
      }
      if(!ws){for(const name of wb.SheetNames){const cand=wb.Sheets[name];const all=XLSX.utils.sheet_to_json(cand,{header:1,defval:null});if(all.some(r=>r&&r[0]==='구분')){ws=cand;break;}}}
      if(!ws){toast('❌ 정산Raw 시트를 찾을 수 없습니다');return;}
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const hIdx=rows.findIndex(r=>r&&r[0]==='구분');
      if(hIdx<0){toast('❌ 헤더 없음');return;}
      const perD={},freshM={};
      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;
        const cat=String(row[0]).trim();
        if(cat==='배송'||cat==='수기반영'){
          const uid=stripDf(row[1]?String(row[1]).trim():'');
          if(!uid)return;
          const route=row[2]?String(row[2]).trim():'기타';
          const del=+row[7]||0,ret=+row[8]||0,coUnit=+row[9]||0;
          if(!perD[uid])perD[uid]={uid,routes:{},dcnt:0,rcnt:0,fresh:0};
          const pd=perD[uid];
          pd.dcnt+=del;pd.rcnt+=ret;
          if(!pd.routes[route])pd.routes[route]={route,cnt:0,ret:0,unitPrice:RPRICE[route]||0,coUnit};
          pd.routes[route].cnt+=del;pd.routes[route].ret+=ret;
          if(RPRICE[route]>0)pd.routes[route].unitPrice=RPRICE[route];
        }else if(cat.includes('프레시백')||cat.includes('프레쉬백')||cat.includes('에코백')){
          const fuid=stripDf(row[1]?String(row[1]).trim():'');
          if(fuid)freshM[fuid]=(freshM[fuid]||0)+(+row[14]||0);
        }
      });
      Object.values(perD).forEach(pd=>{
        pd.fresh=freshM[pd.uid]||0;
        pd.routeList=Object.values(pd.routes).sort((a,b)=>a.route.localeCompare(b.route));
        pd.damt=pd.routeList.reduce((s,r)=>s+r.cnt*(r.unitPrice||0),0);
        pd.ramt=pd.routeList.reduce((s,r)=>s+r.ret*(r.unitPrice||0),0);
        pd.finc=Math.round(pd.dcnt*25);
        pd.total=pd.damt+pd.ramt+pd.fresh;
      });
      const CO=['부산1','부산2','부산3','대구2','대구2B','진주M'];
      const byCamp={};
      Object.values(perD).forEach(pd=>{
        let camp='기타';
        for(const r of pd.routeList){const cg=getCampByRoute(r.route);if(cg!=='기타'){camp=cg;break;}}
        if(!byCamp[camp])byCamp[camp]=[];
        byCamp[camp].push(pd);
      });
      Object.values(byCamp).forEach(arr=>arr.sort((a,b)=>(a.routeList[0]?.route||'').localeCompare(b.routeList[0]?.route||'')));
      window._pending={month,byCamp,total:Object.keys(perD).length,totalAmt:Object.values(perD).reduce((s,p)=>s+p.total,0)};
      renderPending();
    }catch(err){toast('❌ '+err.message);console.error(err);}
  };
  reader.readAsArrayBuffer(file);
};

window.updAmt=function(camp,i,route,price){
  const p=window._pending;if(!p?.byCamp[camp]?.[i])return;
  const pd=p.byCamp[camp][i];
  if(pd.routes[route])pd.routes[route].unitPrice=price;
  pd.routeList=Object.values(pd.routes).sort((a,b)=>a.route.localeCompare(b.route));
  pd.damt=pd.routeList.reduce((s,r)=>s+r.cnt*(r.unitPrice||0),0);
  pd.ramt=pd.routeList.reduce((s,r)=>s+r.ret*(r.unitPrice||0),0);
  pd.total=pd.damt+pd.ramt+pd.fresh;
  const el=document.getElementById(`pa-${camp}-${i}`);
  if(el)el.textContent='₩'+fmt(pd.total);
};

window.saveSingle=async function(camp,i){
  const pd=window._pending?.byCamp[camp]?.[i];if(!pd)return;
  const name=(document.getElementById(`pn-${camp}-${i}`)?.value.trim())||'';
  try{
    await _savePd(camp,pd,name);
    const row=document.getElementById(`pr-${camp}-${i}`);
    if(row){row.style.opacity='.4';row.style.pointerEvents='none';}
    toast('✅ '+(name||pd.uid)+' 저장');
  }catch(err){toast('❌ '+err.message);}
};

window.saveCamp=async function(camp){
  const drivers=window._pending?.byCamp[camp];if(!drivers?.length)return;
  let n=0;
  for(let i=0;i<drivers.length;i++){
    const name=(document.getElementById(`pn-${camp}-${i}`)?.value.trim())||'';
    try{await _savePd(camp,drivers[i],name);n++;}catch(e){console.error(e);}
  }
  toast(`✅ ${camp} ${n}명 저장 완료`);showCamp(camp);
};

window.saveAllPending=async function(){
  const p=window._pending;if(!p)return;
  let n=0;
  for(const camp of Object.keys(p.byCamp)){
    for(let i=0;i<p.byCamp[camp].length;i++){
      const name=(document.getElementById(`pn-${camp}-${i}`)?.value.trim())||'';
      try{await _savePd(camp,p.byCamp[camp][i],name);n++;}catch(e){console.error(e);}
    }
  }
  toast(`✅ 전체 ${n}명 저장 완료!`);
  window._pending=null;goPage('settlements');
};

window.cancelPending=function(){window._pending=null;goPage('settle');};

async function _savePd(camp,pd,name){
  const month=window._pending.month;
  const uid=stripDf(pd.uid);
  const r=calcNet({damt:pd.damt,ramt:pd.ramt,fresh:pd.fresh,finc:pd.finc});
  const payload={dealerId:CU.dealerId,driverName:name,driver:uid,camp,month,jobsub:'쿠팡',
    dcnt:pd.dcnt,rcnt:pd.rcnt,damt:pd.damt,ramt:pd.ramt,fresh:pd.fresh,finc:pd.finc,
    inc:0,etcPlus:0,etcMinus:0,dmg:0,adv:0,
    income:r.income,supplyAmt:r.supplyAmt,monthlyWage:r.wage,emp:r.emp,work:r.work,
    deduct:r.deduct,net:r.net,status:'pending',
    routeDetails:pd.routeList.map(x=>({route:x.route,cnt:x.cnt,ret:x.ret||0,unitPrice:x.unitPrice||0}))};
  const exSnap=await getDocs(query(collection(db,'settlements'),
    where('dealerId','==',CU.dealerId),where('driver','==',uid),where('month','==',month)));
  if(!exSnap.empty)await updateDoc(exSnap.docs[0].ref,{...payload,updatedAt:serverTimestamp()});
  else await addDoc(collection(db,'settlements'),{...payload,createdAt:serverTimestamp()});
  // 기사 등록/업데이트
  const drQ=await getDocs(query(collection(db,'drivers'),where('userId','==',uid),where('dealerId','==',CU.dealerId)));
  if(drQ.empty){if(name)await addDoc(collection(db,'drivers'),{name,userId:uid,dealerId:CU.dealerId,camp,jobsub:'쿠팡',is_active:true,status:'재직',createdAt:serverTimestamp()});}
  else if(name)await updateDoc(drQ.docs[0].ref,{name});
}

// 사업자등록증 OCR
window.ocrBizReg=async function(inp,driverId){
  const file=inp.files[0];if(!file)return;
  const st=document.getElementById('biz-st-'+driverId);
  if(st)st.textContent='🔄 인식 중...';
  const apiKey=(localStorage.getItem('mbti_claude_api_key')||'').trim();
  if(!apiKey){if(st)st.textContent='❌ API 키 없음 (설정에서 입력)';return;}
  try{
    const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result.split(',')[1]);fr.readAsDataURL(file);});
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
        {type:'text',text:'사업자등록증에서 추출. JSON만 반환.\\n{"bizNum":"사업자번호","bizName":"상호","bizAddr":"사업장주소"}'}
      ]}]})});
    const data=await res.json();
    const text=(data.content?.[0]?.text)||'';
    const m=text.match(/\{[\s\S]*\}/);
    if(m){const info=JSON.parse(m[0]);
      if(info.bizNum&&document.getElementById('edr-bizNum'))document.getElementById('edr-bizNum').value=info.bizNum;
      if(info.bizName&&document.getElementById('edr-bizName'))document.getElementById('edr-bizName').value=info.bizName;
      if(info.bizAddr&&document.getElementById('edr-bizAddr'))document.getElementById('edr-bizAddr').value=info.bizAddr;
      if(st)st.textContent='✅ 인식 완료! 확인 후 저장';
    }
  }catch(e){if(st)st.textContent='❌ '+e.message;}
};

  document.getElementById('page-title').textContent='통계';
  document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const snap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId)));
    const settles=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!settles.length){c.innerHTML='<div class="empty"><div class="empty-icon">📈</div><div>정산 데이터가 없습니다</div></div>';return;}
    const byMonth={},byDriver={},byCamp={};
    settles.forEach(s=>{
      const m=s.month||'';const r=calcNet(s);
      if(!byMonth[m])byMonth[m]={cnt:0,income:0,net:0,dcnt:0};
      byMonth[m].cnt++;byMonth[m].income+=r.income;byMonth[m].net+=r.net;byMonth[m].dcnt+=(s.dcnt||0);
      const n=s.driverName||s.driver||'';
      if(!byDriver[n])byDriver[n]={net:0,dcnt:0,cnt:0};
      byDriver[n].net+=r.net;byDriver[n].dcnt+=(s.dcnt||0);byDriver[n].cnt++;
      const camp=s.camp||'기타';
      if(!byCamp[camp])byCamp[camp]={net:0,dcnt:0,cnt:0};
      byCamp[camp].net+=r.net;byCamp[camp].dcnt+=(s.dcnt||0);byCamp[camp].cnt++;
    });
    const months=Object.keys(byMonth).sort().reverse().slice(0,12);
    const drivers=Object.entries(byDriver).sort((a,b)=>b[1].net-a[1].net).slice(0,20);
    c.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="card">
          <div class="card-header"><div class="card-title">📅 월별 현황</div></div>
          <div class="card-body" style="padding:0"><div class="tbl-wrap"><table>
            <thead><tr><th>월</th><th style="text-align:right">배송건</th><th style="text-align:right">수익합계</th><th style="text-align:right">실지급</th></tr></thead>
            <tbody>${months.map(m=>`<tr><td><strong>${esc(m)}</strong></td><td style="text-align:right">${fmt(byMonth[m].dcnt)}건</td><td style="text-align:right;color:var(--green)">₩${fmt(byMonth[m].income)}</td><td style="text-align:right;font-weight:800;color:var(--blue)">₩${fmt(byMonth[m].net)}</td></tr>`).join('')}</tbody>
          </table></div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">🏆 기사별 실지급 순위</div></div>
          <div class="card-body" style="padding:0"><div class="tbl-wrap"><table>
            <thead><tr><th>순위</th><th>기사</th><th style="text-align:right">배송건</th><th style="text-align:right">실지급</th></tr></thead>
            <tbody>${drivers.map(([n,d],i)=>`<tr><td style="font-weight:800;color:${i<3?'#f59e0b':'var(--text3)'}">${i+1}</td><td><strong>${esc(n)}</strong></td><td style="text-align:right">${fmt(d.dcnt)}건</td><td style="text-align:right;font-weight:800;color:var(--blue)">₩${fmt(d.net)}</td></tr>`).join('')}</tbody>
          </table></div></div>
        </div>
      </div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`;}
}

// ██ 대리점 (admin)
// ══════════════════════════════════════
async function pageDealers(){
  document.getElementById('page-title').textContent='대리점 관리';
  document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const snap=await getDocs(collection(db,'dealers'));
    if(snap.empty){c.innerHTML='<div class="empty"><div class="empty-icon">🏢</div><div>등록된 대리점이 없습니다</div></div>';return;}
    const rows=snap.docs.map(d=>{const dd=d.data();return`<tr><td><strong>${esc(dd.name||'')}</strong></td><td style="font-size:11px;color:var(--text3)">${esc(dd.email||'')}</td><td>${esc(dd.brn||'')}</td><td><span class="badge b-green">활성</span></td></tr>`;}).join('');
    c.innerHTML=`<div class="card"><div class="card-header"><div class="card-title">🏢 대리점 목록 (${snap.size}개)</div></div><div class="card-body" style="padding:0"><div class="tbl-wrap"><table><thead><tr><th>대리점명</th><th>이메일</th><th>사업자번호</th><th>상태</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`;}
}

function pageSettings(){

  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="card-header"><div class="card-title">🔑 Claude API 키 (OCR용)</div></div>
      <div class="card-body">
        <div class="fg"><label>API 키</label><input id="set-apikey" type="password" value="${esc(saved)}" placeholder="sk-ant-..."></div>
        <button class="btn btn-blue" onclick="saveApiKey()">저장</button>
      </div>
    </div>`;
}

window.saveApiKey=function(){
  const val=document.getElementById('set-apikey')?.value.trim();
  if(val)localStorage.setItem('mbti_claude_api_key',val);
  toast('✅ API 키 저장');
};
