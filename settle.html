<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LogiNet 정산관리 v2.0</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--brand:#1A5FA8;--brand-d:#0C3F74;--brand-l:#E8F1FB;--green:#0D6B45;--green-l:#E4F5EE;--red:#B02020;--red-l:#FBEAEA;--amber:#7A4500;--amber-l:#FDF0DE;--teal:#0A6860;--teal-l:#E2F4F2;--purple:#4A3DB0;--gray:#52504C;--gray-l:#F2F0EA;--gray-m:#D0CEC6;--bg:#F5F4EF;--bg2:#fff;--bg3:#ECEAE3;--text:#1E1E1C;--text2:#52504C;--text3:#8A887E;--border:rgba(0,0,0,.09);}
body.dark{--bg:#111;--bg2:#1C1C1A;--bg3:#242422;--text:#E8E6DF;--text2:#A0A09A;--text3:#66655F;--border:rgba(255,255,255,.1);--gray-l:#242422;--brand-l:#0A2540;--green-l:#042A1C;--red-l:#2A0A0A;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Malgun Gothic',-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#login-wrap{position:fixed;inset:0;z-index:9999;background:linear-gradient(145deg,var(--brand-d),var(--brand));display:flex;align-items:center;justify-content:center}
.lbox{background:var(--bg2);border-radius:20px;padding:44px 40px;width:360px;max-width:94vw;box-shadow:0 24px 60px rgba(0,0,0,.3);text-align:center}
.lbox input{width:100%;padding:12px 14px;margin-bottom:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--bg);color:var(--text)}
.lbox input:focus{border-color:var(--brand)}
.lbox-btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.lbox-err{color:var(--red);font-size:12px;margin-top:10px;display:none;background:var(--red-l);padding:8px;border-radius:8px}
#app{display:none}.layout{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--brand-d);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .25s}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-title{font-size:18px;font-weight:900;color:#fff}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user-name{font-size:13px;font-weight:700;color:#fff}
.sb-user-role{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.snav{flex:1;padding:8px 0;overflow-y:auto}
.ns{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);padding:10px 16px 4px;letter-spacing:.08em;text-transform:uppercase}
.ni{padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);border-radius:8px;margin:1px 8px;transition:all .15s}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:rgba(255,255,255,.18);color:#fff;font-weight:700}
.sb-bot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.sb-bot-btn{width:100%;padding:8px;background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:8px;color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;margin-bottom:6px;transition:all .15s}
.sb-bot-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:800}
.content{padding:20px;flex:1}
.card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:800}
.card-body{padding:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px}
.stat-val{font-size:24px;font-weight:900;color:var(--brand)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-blue{background:var(--brand);color:#fff}.btn-blue:hover{background:var(--brand-d)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-amber{background:#F59E0B;color:#fff}
.btn-gray{background:var(--gray-l);color:var(--text2);border:1px solid var(--border)}
.btn-teal{background:var(--teal);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--brand);color:var(--brand)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.field input,.field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--brand)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:700;font-size:12px;color:var(--text2)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-blue{background:var(--brand-l);color:var(--brand)}
.b-green{background:var(--green-l);color:var(--green)}
.b-red{background:var(--red-l);color:var(--red)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-teal{background:var(--teal-l);color:var(--teal)}
.b-gray{background:var(--gray-l);color:var(--gray)}
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:16px}
.mo.show{display:flex}
.md{background:var(--bg2);border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.md-lg{max-width:700px}
.mdt{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mdb{padding:20px}
.mdf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2)}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E1E1C;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;z-index:9999;transition:all .25s;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.auto-btns{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.camp-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.camp-tab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);transition:all .15s}
.camp-tab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.info-box{background:var(--brand-l);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--brand);margin-bottom:12px;line-height:1.5}
.excel-drop{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.excel-drop:hover{border-color:var(--brand);background:var(--brand-l)}
.excel-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.route-tbl{width:100%;border-collapse:collapse;font-size:11px}
.route-tbl th,.route-tbl td{padding:4px 8px;border:1px solid var(--border)}
.route-tbl th{background:var(--bg3);font-weight:700;text-align:center}
.xrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px}
.stmt-wrap{font-family:'Malgun Gothic',Arial,sans-serif;font-size:12px;color:#1a1a18;background:#fff;padding:24px;border-radius:12px;max-width:580px;margin:0 auto}
.stmt-brand{font-size:9px;font-weight:700;color:#888;letter-spacing:.1em;margin-bottom:3px}
.stmt-title{font-size:20px;font-weight:900;margin-bottom:2px}
.stmt-meta{font-size:12px;color:#555;margin-bottom:14px}
.stmt-divider{border:none;border-top:2px solid #1a1a18;margin:10px 0}
.stmt-section-title{font-size:10px;font-weight:700;color:#888;letter-spacing:.08em;margin:10px 0 4px}
.stmt-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0ede5;font-size:13px}
.stmt-row.total{background:#f8f6f0;margin:0 -24px;padding:10px 24px;font-weight:700;font-size:14px;border:none}
.stmt-row.deduct{color:#B02020}
.stmt-row.net{background:#1A5FA8;color:#fff;margin:0 -24px;padding:14px 24px;border-radius:0 0 12px 12px;font-weight:900;font-size:16px}
.amt-plus{color:#0D6B45;font-weight:700}
.amt-minus{color:#B02020;font-weight:700}
.driver-hero{background:linear-gradient(135deg,var(--brand-d),var(--brand));border-radius:14px;padding:20px;color:#fff;margin-bottom:14px}
.settle-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.settle-card:hover{border-color:var(--brand);transform:translateY(-1px)}
.loading{text-align:center;padding:40px;color:var(--text3)}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.ham{display:block!important}.content{padding:12px}.fg,.fg3,.fg4{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr 1fr}}
.ham{display:none;cursor:pointer;font-size:20px;padding:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
.overlay.show{display:block}
@media print{#login-wrap,#app .sidebar,.topbar,.auto-btns,.mdf,button,.btn,#toast{display:none!important}.main{margin-left:0!important}.content{padding:0}}
</style>
</head>
<body>
<div id="login-wrap">
  <div class="lbox">
    <div style="font-size:36px;margin-bottom:6px">🚚</div>
    <div style="font-size:22px;font-weight:900;color:var(--brand);margin-bottom:2px">LogiNet</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:28px">로지넷 물류 정산관리 시스템</div>
    <input id="l-email" type="email" placeholder="이메일" autocomplete="email"
      onkeydown="if(event.key==='Enter')document.getElementById('l-pw').focus()">
    <input id="l-pw" type="password" placeholder="비밀번호" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbox-btn" onclick="doLogin()">🔐 로그인</button>
    <div class="lbox-err" id="l-err"></div>
    <div style="font-size:10px;color:var(--text3);margin-top:16px">v2.0 · 엠비티아이 유한회사</div>
  </div>
</div>
<div id="app">
  <div class="overlay" id="overlay" onclick="closeSb()"></div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-title">🚚 LogiNet</div>
        <div class="sb-logo-sub">물류 정산관리 v2.0</div>
      </div>
      <div class="sb-user">
        <div class="sb-user-name" id="sb-name">-</div>
        <div class="sb-user-role" id="sb-role">-</div>
      </div>
      <nav class="snav" id="snav"></nav>
      <div class="sb-bot">
        <button class="sb-bot-btn" onclick="toggleDark()">🌙 다크모드</button>
        <button class="sb-bot-btn" onclick="doLogout()">🚪 로그아웃</button>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="ham" onclick="openSb()">☰</div>
          <div class="topbar-title" id="page-title">대시보드</div>
        </div>
        <div id="topbar-actions" style="display:flex;gap:8px"></div>
      </div>
      <div class="content" id="content"><div class="loading">⏳ 로딩 중...</div></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>

/* ===== Firebase REST API 폴리필 (SDK CDN 불필요) ===== */
(function(){
var _AK='AIzaSyCTywAQNHg8IEYmbU64aYAhjqXMHWbJhjo';
var _PID='mbti-logistics-bfcd3';
var _FS='https://firestore.googleapis.com/v1/projects/'+_PID+'/databases/(default)/documents';
var _AU='https://identitytoolkit.googleapis.com/v1';
var _TK='https://securetoken.googleapis.com/v1/token';
var _idToken=null,_cbs=[],_cu=null;

function _toV(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(v&&v.__sts)return{timestampValue:new Date().toISOString()};
  if(typeof v==='boolean')return{booleanValue:v};
  if(typeof v==='number'){return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};}
  if(typeof v==='string')return{stringValue:v};
  if(v instanceof Date)return{timestampValue:v.toISOString()};
  if(Array.isArray(v))return{arrayValue:{values:v.map(_toV)}};
  if(typeof v==='object'){var f={};Object.keys(v).forEach(function(k){f[k]=_toV(v[k]);});return{mapValue:{fields:f}};}
  return{stringValue:String(v)};
}
function _frV(v){
  if(!v)return null;
  if('nullValue' in v)return null;
  if('booleanValue' in v)return v.booleanValue;
  if('integerValue' in v)return parseInt(v.integerValue);
  if('doubleValue' in v)return v.doubleValue;
  if('stringValue' in v)return v.stringValue;
  if('timestampValue' in v)return v.timestampValue;
  if('arrayValue' in v)return(v.arrayValue.values||[]).map(_frV);
  if('mapValue' in v){var o={};Object.keys(v.mapValue.fields||{}).forEach(function(k){o[k]=_frV(v.mapValue.fields[k]);});return o;}
  return null;
}
function _frD(doc){if(!doc||!doc.fields)return{};var o={};Object.keys(doc.fields).forEach(function(k){o[k]=_frV(doc.fields[k]);});return o;}
function _toF(data){var f={};Object.keys(data).forEach(function(k){f[k]=_toV(data[k]);});return f;}
function _did(name){return name?name.split('/').pop():'';}
function _ah(){return _idToken?{'Authorization':'Bearer '+_idToken}:{};}

async function _req(method,path,body){
  var opts={method:method,headers:Object.assign({'Content-Type':'application/json'},_ah())};
  if(body)opts.body=JSON.stringify(body);
  var r=await fetch(_FS+path,opts);
  if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||r.statusText||'Firestore 오류');}
  return r.status===204?null:r.json();
}

function DocRef(col,id){this.collection=col;this.id=id;}
DocRef.prototype.get=async function(){
  var data=await _req('GET','/'+this.collection+'/'+this.id);
  var self=this;
  return{exists:!!(data&&data.fields),id:self.id,data:function(){return _frD(data);},ref:self};
};
DocRef.prototype.set=async function(data,opts){
  var fields=_toF(data);
  if(opts&&opts.merge){
    var masks=Object.keys(fields).map(function(k){return'updateMask.fieldPaths='+encodeURIComponent(k);}).join('&');
    var r2=await fetch(_FS+'/'+this.collection+'/'+this.id+'?'+masks,{method:'PATCH',headers:Object.assign({'Content-Type':'application/json'},_ah()),body:JSON.stringify({fields:fields})});
    if(!r2.ok){var e2=await r2.json().catch(function(){return{};});throw new Error((e2.error&&e2.error.message)||r2.statusText);}
    return;
  }
  await _req('PATCH','/'+this.collection+'/'+this.id,{fields:fields});
};
DocRef.prototype.update=async function(data){
  var fields=_toF(data);
  var masks=Object.keys(fields).map(function(k){return'updateMask.fieldPaths='+encodeURIComponent(k);}).join('&');
  var r=await fetch(_FS+'/'+this.collection+'/'+this.id+'?'+masks,{method:'PATCH',headers:Object.assign({'Content-Type':'application/json'},_ah()),body:JSON.stringify({fields:fields})});
  if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||r.statusText);}
};
DocRef.prototype.delete=async function(){await _req('DELETE','/'+this.collection+'/'+this.id);};

function QSnap(docs){this.docs=docs;this.size=docs.length;this.empty=!docs.length;}
QSnap.prototype.forEach=function(fn){this.docs.forEach(fn);};

function Query(col,ws){this._c=col;this._w=ws||[];}
Query.prototype.where=function(f,op,v){return new Query(this._c,this._w.concat([[f,op,v]]));};
Query.prototype.get=async function(){
  var col=this._c;
  if(!this._w.length){
    var data=await _req('GET','/'+col+'?pageSize=1000');
    var docs=[];
    if(data&&data.documents){
      docs=data.documents.map(function(d){
        var id=_did(d.name);
        return{id:id,exists:true,data:function(){return _frD(d);},ref:new DocRef(col,id)};
      });
    }
    return new QSnap(docs);
  }
  var opMap={'==':'EQUAL','<':'LESS_THAN','<=':'LESS_THAN_OR_EQUAL','>':'GREATER_THAN','>=':'GREATER_THAN_OR_EQUAL','!=':'NOT_EQUAL'};
  var filters=this._w.map(function(w){return{fieldFilter:{field:{fieldPath:w[0]},op:opMap[w[1]]||'EQUAL',value:_toV(w[2])}};});
  var q={structuredQuery:{from:[{collectionId:col}],where:filters.length===1?filters[0]:{compositeFilter:{op:'AND',filters:filters}},limit:1000}};
  var r=await fetch(_FS+':runQuery',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},_ah()),body:JSON.stringify(q)});
  if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||r.statusText);}
  var arr=await r.json();
  var docs2=arr.filter(function(x){return x.document;}).map(function(x){
    var id=_did(x.document.name);
    return{id:id,exists:true,data:function(){return _frD(x.document);},ref:new DocRef(col,id)};
  });
  return new QSnap(docs2);
};
Query.prototype.doc=function(id){return new DocRef(this._c,id);};
Query.prototype.add=async function(data){
  var res=await _req('POST','/'+this._c,{fields:_toF(data)});
  return{id:_did(res.name)};
};

function ColRef(col){Query.call(this,col,[]);}
ColRef.prototype=Object.create(Query.prototype);
ColRef.prototype.constructor=ColRef;

function Batch(){this._ops=[];}
Batch.prototype.update=function(ref,data){
  var fields=_toF(data);
  this._ops.push({update:{name:_FS+'/'+ref.collection+'/'+ref.id,fields:fields},updateMask:{fieldPaths:Object.keys(fields)}});
};
Batch.prototype.delete=function(ref){this._ops.push({delete:_FS+'/'+ref.collection+'/'+ref.id});};
Batch.prototype.commit=async function(){
  if(!this._ops.length)return;
  var r=await fetch(_FS+':batchWrite',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},_ah()),body:JSON.stringify({writes:this._ops})});
  if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||r.statusText);}
};

async function _refresh(rt,cb){
  try{
    var r=await fetch(_TK+'?key='+_AK,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(rt)});
    var d=await r.json();
    if(r.ok&&d.id_token){
      _idToken=d.id_token;_cu={uid:d.user_id,email:localStorage.getItem('_fe')||''};
      localStorage.setItem('_ft',d.id_token);localStorage.setItem('_fr',d.refresh_token);
      localStorage.setItem('_fx',String(Date.now()+parseInt(d.expires_in||3600)*1000));
      cb(_cu);
    }else{['_ft','_fr','_fx','_fu','_fe'].forEach(function(k){localStorage.removeItem(k);});cb(null);}
  }catch(e){cb(null);}

var _auth={

function calcNet(x){
  var dcnt=+x.dcnt||+x.delivCount||0;
  var rcnt=+x.rcnt||+x.retCount||0;
  // 용차: 건수×단가, 쿠팡: 라우트별 RPRICE × 건수로 강제 재계산 (v9.25)
  var isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  var yDel=+x.yongDel||(G_PRICES.yong_del||900); var yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  // ★ v9.25: 쿠팡 기사 정산은 무조건 RPRICE × 건수로 재계산
  //          엑셀의 회사 단가/저장된 x.damt 흔적 차단 → routeDetails 우선
  //          정책: 엑셀 단가 = 회사 단가(매출), 기사 단가 = 앱 관리자 RPRICE
  var _rdList = x.routeDetails || [];
  var _damtRP = _rdList.reduce(function(s,rd){return s+(rd.cnt||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0);},0);
  var _ramtRP = _rdList.reduce(function(s,rd){return s+(rd.ret||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0);},0);
  var damt=isYong ? dcnt*yDel : (_rdList.length ? _damtRP : (+x.damt||+x.delivAmt||+x.base||0));
  var ramt=isYong ? rcnt*yRet : (_rdList.length ? _ramtRP : (+x.ramt||+x.retAmt||0));
  var fresh=+x.fresh||+x.freshAmt||0;
  // ★ 프레시백 인센 계산 (v9.25 방어 로직)
  // 1순위: 저장된 x.finc 값이 있으면 jobsub과 무관하게 그대로 사용 (데이터 정합성 우선)
  // 2순위: x.finc 없으면 쿠팡은 건수×25원, 그 외(용차/컬리/CJ)는 0
  var isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  var hasStoredFinc=(x.finc!==undefined&&x.finc!==null&&x.finc!=='');
  var finc = hasStoredFinc
    ? +x.finc
    : (isCoupang ? Math.round(dcnt*(G_PRICES.freshbag_inc||25)) : 0);
  var inc=+x.inc||0;
  var nocont = +x.nocont || 0;  // ★ 미계약건 (+수익)
  var etcPlus  = +x.etcPlus  || 0;  // ★ 기타(+)
  var etcMinus = +x.etcMinus || 0;  // ★ 기타(-)
  // ★ v9.25: 기타(+)만 세금계산서(income)에 포함 → 고용·산재 기준
  //           기타(-)는 세금계산서 제외, 실지급에서만 차감 (공제 항목)
  var income=damt+ramt+fresh+finc+inc+nocont+etcPlus;
  // 세금계산서 기준 금액 = etcPlus 포함, etcMinus 제외
  var totalAmt = income;
  var supplyAmt = Math.round(totalAmt / 1.1);
  var expenseAmt = Math.round(supplyAmt * 0.346);
  var monthlyWage = supplyAmt - expenseAmt;
  var empCalc  = monthlyWage >= 800000 ? Math.floor(monthlyWage * 0.008  / 10) * 10 : 0;
  var workCalc = Math.floor(monthlyWage * 0.0088 / 10) * 10;
  var TAX_RATE = +x.taxRate || 0.033;
  var tax  = +x.tax  || (x.taxFixed ? +x.taxFixed : Math.round(income * TAX_RATE));
  var emp  = (x.emp !== undefined && x.emp !== null && x.emp !== '' && +x.emp > 0) ? +x.emp : empCalc;
  // ★ v9.25: 산재 저장값이 계산값의 50% 미만이면 비정상 → 자동 재계산
  var workStored = (x.work !== undefined && x.work !== null && x.work !== '' && +x.work > 0) ? +x.work : 0;
  var work = (workStored && workCalc > 0 && workStored >= workCalc * 0.5) ? workStored : workCalc;
  var eq   = +x.eq  || 0;
  var dmg  = +x.dmg || +x.damage || 0;
  var adv  = +x.adv || +x.advance || 0;
  // ★ 기타(-) → 공제 항목으로 실지급에서 차감
  // ★ 원천세(tax)는 회사 납부 → 기사 실지급 공제 제외
  var deduct = emp + work + eq + dmg + adv + etcMinus;
  var net = totalAmt - deduct;
  return{damt,ramt,fresh,finc,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}

          rawHdrIdx=h; break;
        }

      var rh=raw[rawHdrIdx]||[];
      var rColDiv=0,rColID=1,rColRoute=2,rColDcnt=7,rColRcnt=8,rColUnit=9,rColFresh=14,rColTotal=13;
      for(var c=0;c<rh.length;c++){

        else if(cn==='ID'||cn==='id')rColID=c;
        else if(cn.includes('Route')||cn.includes('라우트'))rColRoute=c;
        else if(cn.includes('배송건수')||cn.includes('배송(parcel)'))rColDcnt=c;
        else if(cn.includes('반품')&&(cn.includes('운송장')||cn.includes('parcel')))rColRcnt=c;
        // ★ 단가 컬럼: "금액"이나 "기본"이 없는 순수 단가만 (기본배송단가금액 제외)
        else if(cn.includes('단가')&&!cn.includes('금액')&&!cn.includes('기본')&&!cn.includes('인센'))rColUnit=c;

        var ramt=dm.retAmt||0;
        // ★ 미계약건: 엑셀 총금액 그대로 사용
        var nocontAmt=dm.nocontAmt||0;
        var nocontCnt=dm.nocontCnt||0;
        if(nocontAmt>0||nocontCnt>0){ncDrivers++;ncTotalCnt+=nocontCnt;ncTotalAmt+=nocontAmt;}  // ★ v9.25 fix

        // ★ 인센티브: 기사별 설정 기준 (Firebase에서 로드된 설정 사용)
        var fincVal=0;
        Object.keys(dm.routes).forEach(function(route){
          var rv=dm.routes[route];
          var s=_getIncSetting(d.name, route);
          if(s.on && s.rate>0) fincVal+=rv.cnt*s.rate;
        });

        // ★ 세금계산서 기준 금액 = 배송+반품 + 프레시백회수 + 프레시백인센 + 미계약 + 추가인센
        var incAmt=tm.incAmt||0; // ★ 추가인센티브(가중요인) — 엑셀 총괄에서 파싱
        var taxBase=damt+ramt+freshAmt+fincVal+nocontAmt+incAmt;
        var totalAmt=taxBase;
        var income=taxBase;
        // ★ 고용·산재 계산 (세금계산서 방식)
        var supplyAmt=Math.round(totalAmt/1.1);
        var expenseAmt=Math.round(supplyAmt*0.346);
        var monthlyWage=supplyAmt-expenseAmt;
        var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
        var workIns=Math.floor(monthlyWage*0.0088/10)*10;

        var routeDetails=Object.keys(dm.routes).map(function(r){
          var rv=dm.routes[r];
          var up=rv.unitPrc||0;
          return{
            route:r, cnt:rv.cnt, ret:rv.ret, unitPrice:up,
            amt:rv.delAmt||0,
            retAmt:rv.retAmt||0
          };
        });

        var existing=settlements.findIndex(function(s){return s.driver===d.name&&s.month===month;});
        var entry={
          driver:d.name, userId:cleanId, coupangId:userId,
          jobsub:d.jobsub||'쿠팡', month:month,
          dcnt:dm.dcnt, rcnt:dm.rcnt,
          damt:damt,
          ramt:ramt,
          fresh:freshAmt,
          finc:fincVal,               // ★ 프레시백 인센티브
          inc:incAmt,                 // ★ 추가인센티브(가중요인) — 엑셀 총괄 파싱값
          nocont:nocontAmt,           // ★ 미계약건 금액 (엑셀 자동)
          nocontCnt:nocontCnt,        // ★ 미계약 건수
          coupangTotal:tm.totalAmt||0, // ★ v9.25: 엑셀 정산총괄 금액(총합계) — 쿠팡 실제 지급액
          tax:0,
          totalAmt:totalAmt,          // ★ 공급대가 저장
          supplyAmt:supplyAmt,        // ★ 공급가액
          monthlyWage:monthlyWage,    // ★ 월보수액
          emp:empIns,                 // ★ 고용보험 (월보수액×0.8%, 80만미만 제외)
          work:workIns,               // ★ 산재보험 (월보수액×0.88%)
          eq:0, dmg:dmgAmt, adv:0,
          status:'정산예정',
          routeDetails:routeDetails,
          updatedAt:new Date().toISOString(),
          createdAt:new Date().toISOString()
        };
        if(existing>=0){
          // ★ v9.25: 기존 정산 완료/승인된 항목 재업로드 시 상태 보호
          //   → 금액·라우트 데이터만 갱신, status·taxSent·paidAt 등 보존
          var prev=settlements[existing];
          var protectedFields={};
          ['status','taxSent','taxSentAt','paidAt','fbId','createdAt','sharedAt'].forEach(function(k){
            if(prev[k]!==undefined) protectedFields[k]=prev[k];
          });
          // ★ v9.49: 수기 입력 필드 보호 (재업로드 시 초기화 방지)
          //   fresh(프레시백), dmg(분실/파손), adv(선지급), eq, etcPlus, etcMinus
          //   finc(프레시백 인센), nocont(미계약건) ← v9.49 추가
          ['fresh','dmg','adv','eq','etcPlus','etcMinus','finc','nocont'].forEach(function(k){
            if(prev[k]!==undefined && prev[k]!==0 && prev[k]!=='') protectedFields[k]=prev[k];
          });
          // ★ routeDetails: 건수/반품은 엑셀 최신값, unitPrice는 수동 편집값 보존
          var mergedRoutes=entry.routeDetails.map(function(newRd){
            var oldRd=(prev.routeDetails||[]).find(function(r){return r.route===newRd.route;});
            if(oldRd && oldRd.unitPrice && oldRd.unitPrice>0){
              return Object.assign({},newRd,{unitPrice:oldRd.unitPrice});
            }
            return newRd;
          });
          var updateData=Object.assign({},entry,{routeDetails:mergedRoutes});
          delete updateData.status;
          delete updateData.createdAt;
          updateData.updatedAt=new Date().toISOString();
          settlements[existing]=Object.assign(prev, updateData, protectedFields);
          settlements[existing].finc=entry.finc;
          updated++;
        }
        else{settlements.push(entry); added++;}
      });
      // Firebase 저장은 _finalize에서 처리
      // ★ Firebase에도 자동 저장 (다른 기기 동기화용)
      // ★ v9.25: undefined 필드 제거 후 저장 (sharedAt 등 없는 필드 Firebase 오류 차단)
      function _cleanUndef(obj){
        var clean={};
        Object.keys(obj).forEach(function(k){
          if(obj[k]!==undefined&&obj[k]!==null||k==='taxSent') clean[k]=obj[k]===undefined?false:obj[k];
          else if(obj[k]!==undefined) clean[k]=obj[k];
        });
        return clean;
      }
      var fbOk=0,fbFail=0;
      // ★ v9.25: lss → Firebase 완료 후 저장 (onSnapshot 경쟁 방지)
      function _finalize(){
        // Firebase 저장은 _finalize에서 처리
        var protectedCount=0;
        settlements.forEach(function(x){if(x.month===month&&x.status==='완료')protectedCount++;});
        var ncMsg=ncDrivers?('\n💡 미계약: '+ncDrivers+'명 / '+ncTotalCnt+'건 / ₩'+ncTotalAmt.toLocaleString()):'';
        var skipMsg=skippedIds.length?('\n⚠️ 미매칭: '+skippedIds.slice(0,5).join(', ')+(skippedIds.length>5?'... 외'+(skippedIds.length-5)+'명':'')):'';
        var protMsg=protectedCount?('\n🔒 완료 보호: '+protectedCount+'건 (상태 유지)'):'';
        toast('✅ 쿠팡 엑셀 정산 완료: '+added+'건 등록 / '+updated+'건 갱신 / '+skipped+'건 미매칭'+protMsg+ncMsg+skipMsg);
        SP('settle',null);
      }
      if(FB&&_db){
        var promises=[];
        settlements.forEach(function(x){
          if(x.month!==month)return;
          var docId=x.fbId||x.driver+'_'+x.month;
          var cleanX=_cleanUndef(x);
          promises.push(_db.collection('settlements').doc(docId).set(cleanX)
            .then(function(){fbOk++;x.fbId=docId;})
            .catch(function(e){fbFail++;console.warn('FB 저장 실패:',x.driver,e.message);}));
        });
        Promise.all(promises).then(function(){
          if(fbFail>0)toast('⚠️ Firebase '+fbFail+'건 저장 실패 (로컬은 정상)');
          _finalize();
        }).catch(function(){_finalize();});
      } else {
        _finalize();
      }
    }catch(err){console.error(err);toast('❌ 파싱 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
  inp.value='';
}

window.parseExcelSingle=function(inp){var file=inp.files[0];if(!file)return;toast('📊 엑셀 분석 중...');var reader=new FileReader();reader.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});var hIdx=rows.findIndex(function(r){return r&&r[0]==='구분';});if(hIdx<0){toast('❌ 형식 오류');return;}var tA=0,tD=0,tR=0,tRA=0,tF=0,tN=0;var rMap={};rows.slice(hIdx+1).forEach(function(row){if(!row||!row[0])return;var cat=String(row[0]).trim();if(cat==='배송'||cat==='수기반영'){var route=row[2]?String(row[2]).trim():'기타';var del=+row[7]||0;var ret=+row[8]||0;var up=RPRICE[route]||0;var da=del*up;var ra=ret*up;tA+=da;tD+=del;tR+=ret;tRA+=ra;if(!rMap[route])rMap[route]={cnt:0,ret:0,amt:0,retAmt:0,unitPrice:up};rMap[route].cnt+=del;rMap[route].ret+=ret;rMap[route].amt+=da;rMap[route].retAmt+=ra;}else if(cat.includes('프레시백')||cat.includes('프레쉬백')){tF+=+row[14]||0;}else if(cat.includes('미계약')){tN+=(+row[14]||+row[10]||0);}});var routes=Object.entries(rMap).map(function(e){return{route:e[0],cnt:e[1].cnt,ret:e[1].ret,amt:e[1].amt,retAmt:e[1].retAmt,unitPrice:e[1].unitPrice};}).sort(function(a,b){return b.amt-a.amt;});S_EXCEL_ROUTES=routes;var finc=Math.round(tD*25);sv('se-dcnt',tD);sv('se-damt',tA);sv('se-rcnt',tR);sv('se-ramt',tRA);sv('se-fresh',tF);sv('se-finc',finc);sv('se-nocont',tN);updSettle();var res=document.getElementById('excel-result');if(res){res.style.display='block';var rRows=routes.map(function(r){return'<tr><td><strong>'+r.route+'</strong></td><td>'+fmt(r.cnt)+'</td><td>'+(r.ret>0?fmt(r.ret):'—')+'</td><td>₩'+fmt(r.unitPrice)+'</td><td>₩'+fmt(r.amt)+'</td></tr>';}).join('');res.innerHTML='<div style="margin-top:10px"><div style="font-size:12px;font-weight:700;color:var(--teal);margin-bottom:6px">📊 라우트별 실적 ('+routes.length+'개)</div><div style="max-height:160px;overflow-y:auto"><table class="route-tbl"><thead><tr><th>라우트</th><th>배송건</th><th>반품건</th><th>단가</th><th>금액</th></tr function buildStmtHTML(s,dn){var r=calcNet(Object.assign({},s,{emp:0,work:0}));var r2=calcNet(s);var rds=s.routeDetails||[];var rt='';if(rds.length){var rr=rds.map(function(rd){var up=rd.unitPrice||RPRICE[rd.route]||0;var tot=(rd.cnt||0)*up+(rd.ret||0)*up;return'<tr><td><strong>'+esc(rd.route)+'</strong></td><td style="color:#888">'+esc(CAMP_NAMES[rd.route.replace(/[A-D]$/,'')]||'')+'</td><td>'+fmt(rd.cnt)+'</td><td>'+(rd.ret>0?fmt(rd.ret):'—')+'</td><td>₩'+fmt(up)+'</td><td style="font-weight:600">₩'+fmt(tot)+'</td></tr>';}).join('');rt='<div class="stmt-section-title">📊 라우트별 실적</div><div style="overflow-x:auto;margin-bottom:10px"><table class="route-tbl"><thead><tr><th>라우트</th><th>캠프</th><th>배송건</th><th>반품건</th><th>단가</th><th>소계</th></tr></thead><tbody>'+rr+'</tbody></table></div>';}var h='<div class="stmt-wrap"><div class="stmt-brand">LogiNet · 로지넷 물류 정산관리</div><div class="stmt-title">'+esc(safeMonthDisp(s.month))+' 정산 명세서</div><div class="stmt-meta">'+esc(s.driver||s.driverName||'')+' 기사 · '+esc(s.jobsub||'쿠팡')+' · '+esc(dn||CU.dealerName||'')+'</div><hr class="stmt-divider">'+rt+'<div class="stmt-section-title">📋 수익 내역</div>';if(r.damt>0)h+='<div class="stmt-row"><span>📦 배송수익 ('+fmt(s.dcnt||0)+'건)</span><span class="amt-plus">+₩'+fmt(r.damt)+'</span></div>';if(r.ramt>0)h+='<div class="stmt-row"><span>↩ 반품수익 ('+fmt(s.rcnt||0)+'건)</span><span class="amt-plus">+₩'+fmt(r.ramt)+'</span></div>';if(r.fresh>0)h+='<div class="stmt-row"><span>🎒 프레시백 회수</span><span class="amt-plus">+₩'+fmt(r.fresh)+'</span></div>';if(r.finc>0)h+='<div class="stmt-row"><span>⭐ 프레시백 인센 ('+fmt(s.dcnt||0)+'건×'+(G_PRICES.freshbag_inc||25)+'원)</span><span class="amt-plus">+₩'+fmt(r.finc)+'</span></div>';if(r.nocont>0)h+='<div class="stmt-row"><span>📌 미계약건</span><span class="amt-plus">+₩'+fmt(r.nocont)+'</span></div>';h+='<div class="stmt-row total"><span>세금계산서 작성금액</span><span>₩'+fmt(r.income)+'</span></div><div class="stmt-section-title" style="margin-top:10px">📌 공제 내역</div>';h+='<div class="stmt-row deduct"><span>고용보험</span><span class="amt-minus">-₩'+fmt(r2.emp)+'</span></div><div class="stmt-row deduct"><span>산재보험 (0.88%)</span><span class="amt-minus">-₩'+fmt(r2.work)+'</span></div>';if(r2.dmg>0)h+='<div class="stmt-row deduct"><span>⚠️ 분실/파손</span><span class="amt-minus">-₩'+fmt(r2.dmg)+'</span></div>';if(r2.adv>0)h+='<div class="stmt-row deduct"><span>💸 가불금</span><span class="amt-minus">-₩'+fmt(r2.adv)+'</span></div>';if(r2.etcMinus>0)h+='<div class="stmt-row deduct"><span>➖ 기타(-)</span><span class="amt-minus">-₩'+fmt(r2.etcMinus)+'</span></div>';h+='<div class="stmt-row net"><span>💰 실 지급액</span><span>₩'+fmt(r2.net)+'</span></div><div style="text-align:right;font-size:10px;color:#aaa;margin-top:12px;border-top:1px solid #eee;padding-top:10px">발행일: '+today()+' · LogiNet 로지넷 · 엠비티아이 유한회사 · 051-711-3103</div></div>';return h;}

gn:right">'+taxAmt.toLocaleString()+'</td></tr></table><table style="width:100%;border-collapse:collapse;font-size:11px"><tr><td style="padding:8px;font-weight:700">합계금액: '+r.income.toLocaleString()+'원</td><td style="padding:8px;text-align:right">공급가액 '+supply.toLocaleString()+' + 세액 '+taxAmt.toLocaleString()+'</td></tr></table><div style="padding:6px 10px;font-size:10px;color:#666;border-top:1px solid #ddd">정산 공제: 고용보험 ₩'+fmt(r.emp)+' · 산재 ₩'+fmt(r.work)+' → 실지급액 ₩'+fmt(r.net)+'</div></div>';var moEl=makeModal('mo-tax','🧾 세금계산서','<div style="padding:12px">'+h+'</div>','<button class="btn btn-gray" onclick="closePanel(this)">닫기</button><button class="btn btn-green btn-sm" onclick="window.print()">🖨️ 인쇄/PDF</button>','lg');moEl.classList.add('show');};
PAGES['dealer-dash']=async function(){setTitle('현황');setActions('');setContent('<div class="loading">⏳ 로딩 중...</div>');try{var res=await Promise.all([_db.collection('drivers').where('dealerId','==',CU.dealerId).get(),_db.collection('settlements').where('dealerId','==',CU.dealerId).get()]);var settles=res[1].docs.map(function(d){return d.data();});var tNet=settles.reduce(function(a,s){return a+(calcNet(s).net||0);},0);var thisM=curMonth();setContent('<div class="stat-grid"><div class="stat-card"><div class="stat-val">'+res[0].size+'</div><div class="stat-lbl">👤 소속 기사</div></div><div class="stat-card"><div class="stat-val">'+settles.filter(function(s){return safeMonth(s.month)===thisM;}).length+'</div><div class="stat-lbl">📋 이번달 정산</div></div><div class="stat-card"><div class="stat-val">'+settles.filter(function(s){return s.status==='완료';}).length+'</div><div class="stat-lbl">✅ 완료 정산</div></div><div class="stat-card"><div class="stat-val">₩'+fmt(tNet)+'</div><div class="stat-lbl">💰 총 지급액</div></div></div>');}catch(e){setContent('<div class="empty">⚠️ '+e.message+'</div>');}};
PAGES['dealer-stats']=async function(){setTitle('통계');setActions('');setContent('<div class="loading">⏳ 로딩 중...</div>');try{var snap=await _db.collection('settlements').where('dealerId','==',CU.dealerId).get();var settles=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});if(!settles.length){setContent('<div class="empty"><div class="empty-icon">📈</div><div>정산 데이터가 없습니다</div></div>');return;}var byD={};settles.forEach(function(s){var n=s.driver||s.driverName||'?';if(!byD[n])byD[n]={cnt:0,net:0,dcnt:0,camp:s.camp||getCampFromRoutes(s)||''};var r=calcNet(s);byD[n].cnt++;byD[n].net+=r.net;byD[n].dcnt+=(s.dcnt||0);});var drivers=Object.entries(byD).sort(function(a,b){return b[1].net-a[1].net;});var tNet=settles.reduce(function(a,s){return a+(calcNet(s).net||0);},0);var rows=drivers.map(function(e,i){return'<tr><td>'+(i+1)+'</td><td><strong>'+esc(e[0])+'</strong></td><td>'+esc(e[1].camp)+'</td><td>'+fmt(e[1].dcnt)+'건</td><td style="font-weight:800;color:var(--brand)">₩'+fmt(e[1].net)+'</td><td>'+e[1].cnt+'회</td></tr>';}).join('');setContent('<div class="stat-grid"><div class="stat-card"><div class="stat-val">'+Object.keys(byD).length+'</div><div class="stat-lbl">👤 기사 수</div></div><div class="stat-card"><div class="stat-val">'+fmt(settles.reduce(function(a,s){return a+(s.dcnt||0);},0))+'</div><div class="stat-lbl">📦 총 배송건</div></div><div class="stat-card"><div class="stat-val">₩'+fmt(tNet)+'</div><div class="stat-lbl">💰 총 실지급</div></div></div><div class="card"><div class="card-header"><div class="card-title">👤 기사별 실적 통계</div></div><div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>#</th><th>기사</th><th>캠프</th><th>배송건</th><th>실지급합계</th><th>정산횟수</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>');}catch(e){setContent('<div class="empty">⚠️ '+e.message+'</div>');}};

PAGES['driver-home']=async function(){setTitle('내 정산 명세서');setActions('');setContent('<div class="loading">⏳ 로딩 중...</div>');try{var snap=await _db.collection('settlements').where('dealerId','==',CU.dealerId).get();var myS=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}).filter(function(s){return(s.driver||s.driverName)===CU.name;}).sort(function(a,b){return(b.month||'').localeCompare(a.month||'');});var hero='<div class="driver-hero"><div style="font-size:20px;font-weight:900">👋 '+esc(CU.name)+'</div>';if(myS.length){var lat=calcNet(myS[0]);var tN=myS.reduce(function(a,s){return a+(calcNet(s).net||0);},0);hero+='<div style="display:flex;gap:20px;margin-top:14px"><div><div style="font-size:22px;font-weight:900">₩'+fmt(lat.net)+'</div><div style="font-size:11px;opacity:.7">최근 실지급</div></div><div><div style="font-size:22px;font-weight:900">₩'+fmt(tN)+'</div><div style="font-size:11px;opacity:.7">누적 지급액</div></div></div>';}hero+='</div>';if(!myS.length){setContent(hero+'<div class="empty"><div class="empty-icon">📋</div><div>명세서가 없습니다</div></div>');return;}var cards=myS.map(function(s){var r=calcNet(s);return'<div class="settle-card" data-id="'+s.id+'" onclick="viewStmt(this.dataset.id)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:14px;font-weight:800">📅 '+esc(safeMonthDisp(s.month))+' 정산</div><span class="badge '+(s.status==='완료'?'b-green':'b-amber')+'">'+(s.status||'정산예정')+'</span></div><div style="font-size:20px;font-weight:900;color:var(--brand)">₩'+fmt(r.net)+'</div><div style="font-size:12px;color:var(--text3);margin-top:4px">배송 '+fmt(s.dcnt||0)+'건 · 수익 ₩'+fmt(r.income)+'</div></div>';}).join('');setContent(hero+cards);}catch(e){setContent('<div class="empty">⚠️ '+e.message+'</div>');}};
