<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LogiNet 정산관리 v2.0</title>
<meta name="theme-color" content="#1A5FA8">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --brand:#1A5FA8;--brand-d:#0C3F74;--brand-l:#E8F1FB;
  --green:#0D6B45;--green-l:#E4F5EE;
  --red:#B02020;--red-l:#FBEAEA;
  --amber:#7A4500;--amber-l:#FDF0DE;
  --teal:#0A6860;--teal-l:#E2F4F2;
  --purple:#4A3DB0;--purple-l:#EEECFC;
  --gray:#52504C;--gray-l:#F2F0EA;--gray-m:#D0CEC6;
  --bg:#F5F4EF;--bg2:#fff;--bg3:#ECEAE3;
  --text:#1E1E1C;--text2:#52504C;--text3:#8A887E;
  --border:rgba(0,0,0,.09);--r:10px;
}
body.dark{
  --bg:#111;--bg2:#1C1C1A;--bg3:#242422;
  --text:#E8E6DF;--text2:#A0A09A;--text3:#66655F;
  --border:rgba(255,255,255,.1);--gray-l:#242422;
  --brand-l:#0A2540;--green-l:#042A1C;--red-l:#2A0A0A;
  --amber-l:#2A1800;--teal-l:#041E1B;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Malgun Gothic',-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* 로그인 */
#login-wrap{position:fixed;inset:0;z-index:9999;background:linear-gradient(145deg,var(--brand-d),var(--brand));display:flex;align-items:center;justify-content:center}
.lbox{background:var(--bg2);border-radius:20px;padding:44px 40px;width:360px;max-width:94vw;box-shadow:0 24px 60px rgba(0,0,0,.3);text-align:center}
.lbox-ic{font-size:36px;margin-bottom:6px}
.lbox-title{font-size:22px;font-weight:900;color:var(--brand);margin-bottom:2px}
.lbox-sub{font-size:11px;color:var(--text3);margin-bottom:28px}
.lbox input{width:100%;padding:12px 14px;margin-bottom:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--bg);color:var(--text);transition:border-color .15s}
.lbox input:focus{border-color:var(--brand)}
.lbox-btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}
.lbox-btn:hover{background:var(--brand-d)}
.lbox-err{color:var(--red);font-size:12px;margin-top:10px;display:none;background:var(--red-l);padding:8px;border-radius:8px}

/* 레이아웃 */
#app{display:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--brand-d);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .25s}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-title{font-size:18px;font-weight:900;color:#fff}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user-name{font-size:13px;font-weight:700;color:#fff}
.sb-user-role{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.snav{flex:1;padding:8px 0;overflow-y:auto}
.ns{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);padding:10px 16px 4px;letter-spacing:.08em;text-transform:uppercase}
.ni{padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);border-radius:8px;margin:1px 8px;transition:all .15s}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:rgba(255,255,255,.18);color:#fff;font-weight:700}
.sb-bot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.sb-bot-btn{width:100%;padding:8px;background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:8px;color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;margin-bottom:6px;transition:all .15s}
.sb-bot-btn:hover{background:rgba(255,255,255,.12);color:#fff}

/* 메인 */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:800}
.content{padding:20px;flex:1}

/* 카드 */
.card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:800}
.card-body{padding:16px}

/* 통계 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px}
.stat-val{font-size:24px;font-weight:900;color:var(--brand)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px}

/* 버튼 */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-blue{background:var(--brand);color:#fff}.btn-blue:hover{background:var(--brand-d)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#095234}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#8A1818}
.btn-amber{background:#F59E0B;color:#fff}.btn-amber:hover{background:#D97706}
.btn-gray{background:var(--gray-l);color:var(--text2);border:1px solid var(--border)}.btn-gray:hover{background:var(--gray-m)}
.btn-teal{background:var(--teal);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn-outline{background:transparent;border:1.5px solid var(--brand);color:var(--brand)}.btn-outline:hover{background:var(--brand-l)}

/* 폼 */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--brand)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}

/* 테이블 */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:700;font-size:12px;color:var(--text2)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}

/* 배지 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-blue{background:var(--brand-l);color:var(--brand)}
.b-green{background:var(--green-l);color:var(--green)}
.b-red{background:var(--red-l);color:var(--red)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-teal{background:var(--teal-l);color:var(--teal)}
.b-purple{background:var(--purple-l);color:var(--purple)}
.b-gray{background:var(--gray-l);color:var(--gray)}

/* 캠프 배지 */
.camp-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}

/* 모달 */
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:16px}
.mo.show{display:flex}
.md{background:var(--bg2);border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.md-lg{max-width:700px}
.mdt{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mdb{padding:20px}
.mdf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2)}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px;line-height:1}

/* 토스트 */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E1E1C;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;z-index:9999;transition:all .25s;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 정산 자동화 버튼들 */
.auto-btns{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.auto-btn{padding:7px 14px;border:none;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}

/* 엑셀 업로드 */
.excel-drop{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.excel-drop:hover{border-color:var(--brand);background:var(--brand-l)}
.excel-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.route-tbl{width:100%;border-collapse:collapse;font-size:11px}
.route-tbl th,.route-tbl td{padding:4px 8px;border:1px solid var(--border);text-align:right}
.route-tbl th{background:var(--bg3);font-weight:700;text-align:center}
.route-tbl td:first-child{text-align:left;font-weight:600}
.xrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px}

/* 캠프 탭 */
.camp-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.camp-tab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);transition:all .15s}
.camp-tab.on,.camp-tab:hover{background:var(--brand);color:#fff;border-color:var(--brand)}

/* 명세서 */
.stmt-wrap{font-family:'맑은 고딕',Arial,sans-serif;font-size:12px;color:#1a1a18;background:#fff;padding:24px;border-radius:12px;max-width:580px;margin:0 auto}
.stmt-brand{font-size:9px;font-weight:700;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.stmt-title{font-size:20px;font-weight:900;margin-bottom:2px}
.stmt-meta{font-size:12px;color:#555;margin-bottom:14px}
.stmt-divider{border:none;border-top:2px solid #1a1a18;margin:10px 0}
.stmt-section-title{font-size:10px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin:10px 0 4px}
.stmt-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0ede5;font-size:13px}
.stmt-row:last-child{border:none}
.stmt-row.total{background:#f8f6f0;margin:0 -24px;padding:10px 24px;font-weight:700;font-size:14px;border:none}
.stmt-row.deduct{color:#B02020}
.stmt-row.net{background:#1A5FA8;color:#fff;margin:0 -24px;padding:14px 24px;border-radius:0 0 12px 12px;font-weight:900;font-size:16px}
.amt-plus{color:#0D6B45;font-weight:700}
.amt-minus{color:#B02020;font-weight:700}

/* 기사 앱 */
.driver-hero{background:linear-gradient(135deg,var(--brand-d),var(--brand));border-radius:14px;padding:20px;color:#fff;margin-bottom:14px}
.driver-hero-name{font-size:20px;font-weight:900}
.settle-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.settle-card:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.08)}

/* 반응형 */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .ham{display:block!important}
  .content{padding:12px}
  .fg,.fg3,.fg4{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
}
.ham{display:none;cursor:pointer;font-size:20px;padding:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
.overlay.show{display:block}
.loading{text-align:center;padding:40px;color:var(--text3)}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.info-box{background:var(--brand-l);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--brand);margin-bottom:12px;line-height:1.5}
@media print{
  #login-wrap,#app .sidebar,.topbar,.auto-btns,.mdf,button,.btn,#toast{display:none!important}
  .main{margin-left:0!important}
  .content{padding:0}
  .stmt-wrap{max-width:100%;box-shadow:none}
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-wrap">
  <div class="lbox">
    <div class="lbox-ic">🚚</div>
    <div class="lbox-title">LogiNet</div>
    <div class="lbox-sub">로지넷 물류 정산관리 시스템</div>
    <input id="l-email" type="email" placeholder="이메일" autocomplete="email"
      onkeydown="if(event.key==='Enter')document.getElementById('l-pw').focus()">
    <input id="l-pw" type="password" placeholder="비밀번호" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbox-btn" onclick="doLogin()">🔐 로그인</button>
    <div class="lbox-err" id="l-err">이메일 또는 비밀번호를 확인해주세요</div>
    <div style="font-size:10px;color:var(--text3);margin-top:16px">v2.0 · 엠비티아이 유한회사</div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="overlay" id="overlay" onclick="closeSb()"></div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-title">🚚 LogiNet</div>
        <div class="sb-logo-sub">물류 정산관리 v2.0</div>
      </div>
      <div class="sb-user">
        <div class="sb-user-name" id="sb-name">—</div>
        <div class="sb-user-role" id="sb-role">—</div>
      </div>
      <nav class="snav" id="snav"></nav>
      <div class="sb-bot">
        <button class="sb-bot-btn" onclick="toggleDark()">🌙 다크모드</button>
        <button class="sb-bot-btn" onclick="doLogout()">🚪 로그아웃</button>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="ham" onclick="openSb()">☰</div>
          <div class="topbar-title" id="page-title">대시보드</div>
        </div>
        <div id="topbar-actions" style="display:flex;gap:8px"></div>
      </div>
      <div class="content" id="content"><div class="loading">⏳ 로딩 중...</div></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
var FB_CFG={
  apiKey:['AIzaSyCTywAQNH','g8IEYmbU64aYA','hjqXMHWbJhjo'].join(''),

try{_db.enablePersistence({synchronizeTabs:false});}catch(e){}

// ══════════════════════════════════════════════

var CU={uid:'',email:'',name:'',role:'',dealerId:'',dealerName:''};
var S={page:'',campFilter:'전체'};

// ── 유틸 ──
function fmt(n){return Math.round(n||0).toLocaleString('ko-KR');}
function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);});}
function today(){return new Date().toISOString().slice(0,10);}
function curMonth(){return new Date().toISOString().slice(0,7);}
function nid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function safeMonth(m){
  if(!m)return'';
  var s=String(m).trim();
  if(/^\d{5}$/.test(s)){var d=new Date((+s-25569)*86400000);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
  return s;
}
function safeMonthDisplay(m){
  var s=safeMonth(m);if(!s)return'';
  var p=s.split('-');return(p.length>=2&&p[0]&&p[1])?p[0]+'년 '+p[1]+'월':s;
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3200);
}
function openSb(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('ln_dark',document.body.classList.contains('dark')?'1':'0');}
function OM(id){var el=document.getElementById(id);if(el)el.classList.add('show');}
function CM(id){var el=document.getElementById(id);if(el)el.classList.remove('show');}
window.openSb=openSb;window.closeSb=closeSb;window.toggleDark=toggleDark;window.OM=OM;window.CM=CM;

var CAMP_NAMES={

  '608':'진주M캠프','612':'진주M캠프','613':'진주M캠프',
  '614':'진주M캠프','619':'진주M캠프'
};
// 캠프 표시 순서
var CAMP_ORDER=['부산1캠프','부산2캠프','부산3캠프','대구2캠프','대구2B캠프','진주M캠프'];
// 캠프 색상
var CAMP_COLOR={
  '부산1캠프':'#3B82F6','부산2캠프':'#8B5CF6','부산3캠프':'#10B981',

// ── 기본 업무별 단가 (부가세 포함, 관리자 설정으로 덮어씌워짐)
var DEFAULT_UNIT_PRICES = {
  coupang_normal:  1100,   // 쿠팡 일반배송 (VAT 포함)
  coupang_fresh:   1300,   // 쿠팡 신선배송 (VAT 포함)
  coupang_return:   900,   // 쿠팡 반품 (VAT 포함)
  cj_normal:       1050,   // CJ대한통운 (VAT 포함)
  kurly_normal:    1200,   // 마켓컬리 (VAT 포함)
  water_normal:     800,   // 생수배송 (VAT 포함)
  freshbag_inc:      25,   // 프레시백 인센티브 (건당)
  yong_del:         900,   // 용차 배송단가
  yong_ret:         900    // 용차 반품단가
};
// 런타임 단가 (Firestore 로드 후 업데이트)
var G_PRICES = Object.assign({}, DEFAULT_UNIT_PRICES);

// ══════════════════════════════════════════════
// v9 calcNet — 완전 이식
// ══════════════════════════════════════════════
function calcNet(x){
  var dcnt=+x.dcnt||+x.delivCount||0;
  var rcnt=+x.rcnt||+x.retCount||0;
  // 용차: 건수×단가, 쿠팡: 라우트별 RPRICE × 건수로 강제 재계산 (v9.25)
  var isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  var yDel=+x.yongDel||(G_PRICES.yong_del||900); var yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  // ★ v9.25: 쿠팡 기사 정산은 무조건 RPRICE × 건수로 재계산
  //          엑셀의 회사 단가/저장된 x.damt 흔적 차단 → routeDetails 우선
  //          정책: 엑셀 단가 = 회사 단가(매출), 기사 단가 = 앱 관리자 RPRICE
  var _rdList = x.routeDetails || [];
  var _damtRP = _rdList.reduce(function(s,rd){return s+(rd.cnt||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0);},0);
  var _ramtRP = _rdList.reduce(function(s,rd){return s+(rd.ret||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0);},0);
  var damt=isYong ? dcnt*yDel : (_rdList.length ? _damtRP : (+x.damt||+x.delivAmt||+x.base||0));
  var ramt=isYong ? rcnt*yRet : (_rdList.length ? _ramtRP : (+x.ramt||+x.retAmt||0));
  var fresh=+x.fresh||+x.freshAmt||0;
  // ★ 프레시백 인센 계산 (v9.25 방어 로직)
  // 1순위: 저장된 x.finc 값이 있으면 jobsub과 무관하게 그대로 사용 (데이터 정합성 우선)
  // 2순위: x.finc 없으면 쿠팡은 건수×25원, 그 외(용차/컬리/CJ)는 0
  var isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  var hasStoredFinc=(x.finc!==undefined&&x.finc!==null&&x.finc!=='');
  var finc = hasStoredFinc
    ? +x.finc
    : (isCoupang ? Math.round(dcnt*(G_PRICES.freshbag_inc||25)) : 0);
  var inc=+x.inc||0;
  var nocont = +x.nocont || 0;  // ★ 미계약건 (+수익)
  var etcPlus  = +x.etcPlus  || 0;  // ★ 기타(+)
  var etcMinus = +x.etcMinus || 0;  // ★ 기타(-)
  // ★ v9.25: 기타(+)만 세금계산서(income)에 포함 → 고용·산재 기준
  //           기타(-)는 세금계산서 제외, 실지급에서만 차감 (공제 항목)
  var income=damt+ramt+fresh+finc+inc+nocont+etcPlus;
  // 세금계산서 기준 금액 = etcPlus 포함, etcMinus 제외
  var totalAmt = income;
  var supplyAmt = Math.round(totalAmt / 1.1);
  var expenseAmt = Math.round(supplyAmt * 0.346);
  var monthlyWage = supplyAmt - expenseAmt;
  var empCalc  = monthlyWage >= 800000 ? Math.floor(monthlyWage * 0.008  / 10) * 10 : 0;
  var workCalc = Math.floor(monthlyWage * 0.0088 / 10) * 10;
  var TAX_RATE = +x.taxRate || 0.033;
  var tax  = +x.tax  || (x.taxFixed ? +x.taxFixed : Math.round(income * TAX_RATE));
  var emp  = (x.emp !== undefined && x.emp !== null && x.emp !== '' && +x.emp > 0) ? +x.emp : empCalc;
  // ★ v9.25: 산재 저장값이 계산값의 50% 미만이면 비정상 → 자동 재계산
  var workStored = (x.work !== undefined && x.work !== null && x.work !== '' && +x.work > 0) ? +x.work : 0;
  var work = (workStored && workCalc > 0 && workStored >= workCalc * 0.5) ? workStored : workCalc;
  var eq   = +x.eq  || 0;
  var dmg  = +x.dmg || +x.damage || 0;
  var adv  = +x.adv || +x.advance || 0;
  // ★ 기타(-) → 공제 항목으로 실지급에서 차감
  // ★ 원천세(tax)는 회사 납부 → 기사 실지급 공제 제외
  var deduct = emp + work + eq + dmg + adv + etcMinus;
  var net = totalAmt - deduct;
  return{damt,ramt,fresh,finc,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}

window.recalcAll=async function(){
  if(!confirm('모든 정산을 현재 RPRICE 단가로 재계산합니다. 계속?'))return;
  toast('🔄 재계산 중...');
  var dealerId=CU.role==='admin'?null:CU.dealerId;
  var q=dealerId?_db.collection('settlements').where('dealerId','==',dealerId):_db.collection('settlements');
  var snap=await q.get();
  var batch=_db.batch();var cnt=0;
  snap.docs.forEach(function(d){
    var s=d.data();
    if(!s.routeDetails||!s.routeDetails.length)return;
    var newDetails=s.routeDetails.map(function(rd){return Object.assign({},rd,{unitPrice:RPRICE[rd.route]||rd.unitPrice||0});});
    var newDamt=newDetails.reduce(function(a,rd){return a+(rd.cnt||0)*(rd.unitPrice||0);},0);
    var newRamt=newDetails.reduce(function(a,rd){return a+(rd.ret||0)*(rd.unitPrice||0);},0);
    batch.update(d.ref,{routeDetails:newDetails,damt:newDamt,ramt:newRamt,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});cnt++;
  });
  await batch.commit();toast('✅ '+cnt+'건 재계산 완료');
};

  var totalIncome=filteredCamp.reduce(function(a,s){return a+(calcNet(s).income||0);},0);

  var tabsHtml='<div class="camp-tabs" style="padding:0 16px">'+camps.map(function(cn){var cnt=cn==='전체'?filtered.length:filtered.filter(function(s){return(s.camp||getCampByRoutes(s)||'기타')===cn;}).length;return'<div class="camp-tab '+(cf===cn?'on':'')+'" onclick="setSettleCamp(''+cn+'')">'+cn+' ('+cnt+')</div>';}).join('')+'</div>';

    '<div class="stat-card"><div class="stat-val">₩'+fmt(totalNet)+'</div><div class="stat-lbl">💰 실지급 합계</div></div>'+
    '</div>';

    var rr=calcNet(s);

      '<td>'+esc(safeMonth(s.month)||'')+'</td>'+

      '<td style="color:var(--green);font-weight:700">₩'+fmt(rr.income)+'</td>'+

function getCampByRoutes(s){
  if(s.camp)return s.camp;
  var rds=s.routeDetails||[];
  if(!rds.length)return'';
  var prefix=rds[0].route.replace(/[A-D]$/,'');
  return CAMP_NAMES[prefix]||'기타';
}

window.delMonth=async function(m){
  if(!confirm(m+'월 정산 전체 삭제?'))return;
  var snap=await _db.collection('settlements').where('dealerId','==',CU.dealerId).get();

  snap.docs.forEach(function(d){if(safeMonth(d.data().month)===m){batch.delete(d.ref);cnt++;}});
  await batch.commit();toast('🗑 '+cnt+'건 삭제');PAGES['dealer-settle']();
};

window.checkDup=async function(){
  var snap=await _db.collection('settlements').where('dealerId','==',CU.dealerId).get();
  var seen={};var dups=[];
  snap.docs.forEach(function(d){var s=d.data();var key=(s.driver||s.driverName)+':'+safeMonth(s.month);if(seen[key]){dups.push(d.id);}else{seen[key]=d.id;}});
  if(!dups.length){toast('✅ 중복 없음');return;}
  if(confirm('중복 정산 '+dups.length+'건 발견. 삭제할까요?')){
    var batch=_db.batch();dups.forEach(function(id){batch.delete(_db.collection('settlements').doc(id));});
    await batch.commit();toast('🗑 '+dups.length+'건 중복 삭제');PAGES['dealer-settle']();
  }
};

window.saveSettle=async function(){
  var driver=document.getElementById('se-driver').value.trim();
  var rawMonth=document.getElementById('se-month').value;
  var month=safeMonth(rawMonth)||rawMonth;
  if(!driver||!month||!/^\d{4}-(0[1-9]|1[0-2])$/.test(month)){toast('❌ 기사와 정산월을 확인해주세요');return;}
  var g=function(id){return+(document.getElementById(id)||{value:0}).value||0;};
  var jobsub=document.getElementById('se-jobsub').value;
  var isYong=jobsub==='용차';var isCoupang=jobsub==='쿠팡';
  var dcnt=g('se-dcnt');var rcnt=g('se-rcnt');
  var finc=isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0;
  var data={dealerId:CU.dealerId,driver:driver,driverName:driver,jobsub:jobsub,month:month,
    dcnt:dcnt,damt:isYong?dcnt*g('se-yong-del'):g('se-damt'),
    rcnt:rcnt,ramt:isYong?rcnt*g('se-yong-ret'):g('se-ramt'),
    fresh:g('se-fresh'),finc:finc,inc:0,nocont:g('se-nocont'),
    etcMinus:g('se-etcm'),dmg:g('se-dmg'),adv:g('se-adv'),
    yongDel:isYong?g('se-yong-del'):0,yongRet:isYong?g('se-yong-ret'):0,
    work:g('se-work')||0,routeDetails:window.S_EXCEL_ROUTES||[],
    status:'정산예정',updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  // 고용/산재 계산
  var r=calcNet(data);
  data.emp=r.emp;if(!data.work)data.work=r.work;
  data.createdAt=data.createdAt||firebase.firestore.FieldValue.serverTimestamp();
  try{
    // 중복 체크
    var dup=await _db.collection('settlements').where('dealerId','==',CU.dealerId).where('driver','==',driver).get();
    var existing=dup.docs.find(function(d){return safeMonth(d.data().month)===month;});
    if(existing){
      if(!confirm(driver+' '+month+' 정산이 이미 있습니다. 덮어쓸까요?'))return;
      await existing.ref.update(data);toast('✅ '+driver+' 정산 업데이트');
    }else{
      await _db.collection('settlements').add(data);toast('✅ '+driver+' 정산 저장');
    }
    CM('mo-settle');resetSettleForm();PAGES['dealer-settle']();
  }catch(e){toast('❌ '+e.message);}
};

// ══ v9 parseExcel (단건) ══
window.parseExcelSingle=function(inp){
  var file=inp.files[0];if(!file)return;
  // parseExcel inline
(function(inp){
  var file=inp.files[0];if(!file)return;
  toast('📊 엑셀 분석 중...');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      var hIdx=rows.findIndex(r=>r&&r[0]==='구분');
      if(hIdx<0){toast('❌ 형식 오류 — 엑셀 파일(.xlsx) 형식 오류');return;}
      var totalAmt=0,totalFresh=0,totalDel=0,totalRet=0,totalRetAmt=0;
      var totalNocont=0, totalNocontCnt=0;  // ★ 미계약건 (수익 항목)
      var routeMap={};
      var dailyRows=[];  // [{date,route,cnt,ret,unitPrice,amt}]
      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;
        var cat=String(row[0]).trim();
        if(cat==='배송'||cat==='수기반영'){
          var route=row[2]?String(row[2]).trim():'기타';
          var del=+row[7]||0, ret=+row[8]||0;
          // ★ v9.25 정책 — 엑셀 단가/금액 = 회사 단가(쿠팡→회사 매출), 기사 단가는 무관
          //                기사 정산은 무조건 RPRICE × 건수 (앱 관리자 모드 쿠팡 라우트 단가)
          //                엑셀 금액 컬럼(row[10],[14])은 절대 사용하지 않음
          var unitPrice = RPRICE[route] || 0;
          var delAmt = del * unitPrice;   // 배송금액 = 배송건수 × RPRICE (기사 단가)
          var retAmt = ret * unitPrice;   // 반품금액 = 반품건수 × RPRICE (기사 단가)
          // 날짜 파싱
          var dateRaw=row[3];
          var dateStr='';
          if(dateRaw instanceof Date) dateStr=dateRaw.toISOString().slice(0,10);
          else if(dateRaw) dateStr=String(dateRaw).slice(0,10);
          totalAmt+=delAmt; totalDel+=del; totalRet+=ret; totalRetAmt+=retAmt;
          if(!routeMap[route])routeMap[route]={cnt:0,ret:0,amt:0,retAmt:0,unitPrice:unitPrice};
          routeMap[route].cnt+=del; routeMap[route].ret+=ret;
          routeMap[route].amt+=delAmt; routeMap[route].retAmt+=retAmt;
          if(unitPrice&&!routeMap[route].unitPrice)routeMap[route].unitPrice=unitPrice;
          // 날짜별 상세 행 기록
          if(del>0)dailyRows.push({date:dateStr,route,cnt:del,ret,unitPrice,amt:delAmt,retAmt});
        } else if(cat.includes('프레쉬백')||cat.includes('프레시백')){
          totalFresh+=+row[14]||0;
        } else if(cat==='반품'||cat==='반품처리'){
          // 반품 전용 행은 라우트 없으므로 배송 행에서 이미 RPRICE 계산됨 → 건수만 합산
          totalRet+=(+row[7]||0);
        } else if(cat==='미계약 라우트'||cat==='미계약건'||cat==='미계약'){
          // ★ 미계약건 — 수익 항목으로 별도 집계
          var miscCnt=+row[7]||0;
          // row[14]에 금액이 있을 수도 있고 없으면 row[10] 또는 계산 값 (관리자가 수동 조정 가능)
          var miscAmt=(+row[14]||+row[10]||0);
          totalNocont += miscAmt;
          totalNocontCnt += miscCnt;
          // 참고용으로 라우트 테이블에도 표시 (기존 동작 유지)
          if(!routeMap['미계약'])routeMap['미계약']={cnt:miscCnt,ret:0,amt:miscAmt,retAmt:0,unitPrice:0};
          else{routeMap['미계약'].cnt+=miscCnt; routeMap['미계약'].amt+=miscAmt;}
        }
      });
      var routes=Object.entries(routeMap)
        .map(([r,v])=>({route:r,cnt:v.cnt,ret:v.ret,amt:v.amt,retAmt:v.retAmt||0,unitPrice:v.unitPrice}))
        .sort((a,b)=>b.amt-a.amt);
      S.excelRoutes=routes;
      S.excelDaily=dailyRows;  // 날짜별 상세 저장
      // 프레시백 인센티브: 쿠팡 고정 건수×25원
      var finc=Math.round(totalDel*25);
      var income=totalAmt+totalFresh+finc+totalNocont;  // ★ 미계약건 합산
      var tax=Math.round(income*0.033), emp=Math.round(income*0.008), ind=Math.round(income*0.013);
      var netPay=income-emp-ind;
      // 정산서 모달 자동 입력
      var setVal=(id,v)=>{var el=document.getElementById(id);if(el)el.value=v;};
      setVal('se-dcnt',totalDel);
      setVal('se-damt',totalAmt);   // 배송금액(배송건수×RPRICE)
      setVal('se-rcnt',totalRet);
      setVal('se-ramt',totalRetAmt);  // 반품금액 = 반품건수 × RPRICE
      setVal('se-fresh',totalFresh);
      setVal('se-finc',finc);  // 프레시백 인센 자동
      setVal('se-nocont',totalNocont);  // ★ 미계약건 자동
      setVal('se-nocont-cnt',totalNocontCnt);  // ★ 미계약건수
      updSettle();
      var res=document.getElementById('excel-result');
      res.style.display='block';
      res.innerHTML=`
        <div style="font-size:12px;font-weight:700;color:var(--teal);margin-bottom:5px">📊 라우트별 실적 (${routes.length}개)</div>
        <div style="max-height:140px;overflow-y:auto;margin-bottom:8px;border:1px solid var(--border);border-radius:var(--r)">
          <table class="route-tbl">
            <thead><tr><th>라우트</th><th>배송건</th><th>반품건</th><th>단가(원)</th><th>배송금액</th><th>반품금액</th><th>소계</th></tr></thead>
            <tbody>
            ${routes.map(r=>`<tr>
              <td><strong>${r.route}</strong></td>
              <td>${r.cnt.toLocaleString()}</td>
              <td style="color:var(--amber)">${r.ret>0?r.ret.toLocaleString():'—'}</td>
              <td style="color:var(--teal)">${r.unitPrice?r.unitPrice.toLocaleString():'—'}</td>
              <td>₩${r.amt.toLocaleString()}</td>
              <td style="color:var(--amber)">${r.retAmt>0?'₩'+r.retAmt.toLocaleString():'—'}</td>
              <td style="color:var(--green)">₩${(r.amt+(r.retAmt||0)).toLocaleString()}</td>
            </tr>`).join('')}
            <tr style="font-weight:700;background:var(--green-l)"><td>합계</td><td>${totalDel.toLocaleString()}</td><td style="color:var(--amber)">${totalRet>0?totalRet.toLocaleString():'—'}</td><td>—</td><td style="color:var(--green)">₩${totalAmt.toLocaleString()}</td></tr>
            </tbody>
          </table>
        </div>
        <details style="margin-bottom:8px">
          <summary style="font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;padding:4px 0">📅 날짜별 상세 내역 (${dailyRows.length}행) — 클릭하여 펼치기</summary>
          <div style="max-height:150px;overflow-y:auto;margin-top:4px;border:1px solid var(--border);border-radius:var(--r)">
            <table class="route-tbl">
              <thead><tr><th>날짜</th><th>라우트</th><th>배송건</th><th>단가</th><th>금액</th></tr></thead>
              <tbody>${dailyRows.map(d=>`<tr><td style="font-size:10px">${d.date}</td><td>${d.route}</td><td>${d.cnt}</td><td>${d.unitPrice?d.unitPrice.toLocaleString():''}</td><td>₩${d.amt.toLocaleString()}</td></tr>`).join('')}</tbody>
            </table>
          </div>
        </details>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px">
          <div class="xrow"><span>① 배송 총금액</span><span style="color:var(--green)"><strong>₩${totalAmt.toLocaleString()}</strong></span></div>
          <div class="xrow"><span>② 프레시백 회수</span><span style="color:var(--blue)"><strong>₩${totalFresh.toLocaleString()}</strong></span></div>
          <div class="xrow" style="background:var(--blue-l);padding:4px 6px;border-radius:5px;margin:3px 0">
            <span><strong>③ 프레시백 인센 (${totalDel.toLocaleString()}건 × 25원)</strong></span>
            <span style="color:var(--blue);font-weight:700">₩${finc.toLocaleString()}</span>
          </div>
          ${totalNocont>0||totalNocontCnt>0?`<div class="xrow" style="background:rgba(245,158,11,.12);padding:4px 6px;border-radius:5px;margin:3px 0">
            <span><strong>④ 미계약건 (${totalNocontCnt.toLocaleString()}건)</strong></span>
            <span style="color:var(--amber);font-weight:700">₩${totalNocont.toLocaleString()}</span>
          </div>`:''}
          <div class="xrow" style="font-weight:700;border-top:1px solid var(--border);padding-top:5px"><span>수익 합계</span><span style="color:var(--green)">₩${income.toLocaleString()}</span></div>
          <div style="margin-top:5px;padding:6px 8px;background:var(--red-l);border-radius:5px;font-size:11px">
            <div style="display:flex;justify-content:space-between"><span>고용보험 0.8% (월보수액기준)</span><span style="color:var(--red)">−₩${emp.toLocaleString()}</span></div>
            <div style="display:flex;justify-content:space-between"><span>산재보험 0.88%</span><span style="color:var(--red)">−₩${ind.toLocaleString()}</span></div>
          </div>
          <div class="xrow" style="font-size:14px;font-weight:700;padding-top:7px;border-top:1px solid var(--border);margin-top:4px">
            <span>✅ 예상 실지급액</span><span style="color:var(--purple);font-size:16px">₩${netPay.toLocaleString()}</span>
          </div>
        </div>`;
    }catch(e){toast('❌ 엑셀 분석 오류: '+e.message);console.error(e);}
  };
  reader.readAsArrayBuffer(file);
})(inp);
};

// ══ v9 parseCoupangExcel (전체 일괄) ══
// ★ 쿠팡 정산 엑셀 업로드 → 기사별 자동 정산 등록
window.parseCoupangExcel=function(inp){
  var file=inp.files[0]; if(!file)return;
  if(typeof XLSX==='undefined'){toast('⚠️ 엑셀 라이브러리 로딩 중...'); return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var rawSheet=wb.Sheets['정산Raw']||wb.Sheets[wb.SheetNames[2]];
      var totalSheet=wb.Sheets['정산총괄']||wb.Sheets[wb.SheetNames[1]];
      if(!rawSheet){toast('❌ 정산Raw 시트를 찾을 수 없습니다');return;}
      var raw=XLSX.utils.sheet_to_json(rawSheet,{header:1});
      var total=totalSheet?XLSX.utils.sheet_to_json(totalSheet,{header:1}):[];
      if(raw.length<2){toast('❌ 데이터가 없습니다');return;}

      // ★ 정산Raw 헤더 행 자동 탐지 (컬럼 동적 매핑)
      var rawHdrIdx=0;
      for(var h=0;h<Math.min(raw.length,5);h++){
        if(raw[h]&&(String(raw[h][0]||'').includes('구분')||String(raw[h][1]||'').toLowerCase()==='id')){
          rawHdrIdx=h; break;
        }
      }
      var rh=raw[rawHdrIdx]||[];
      var rColDiv=0,rColID=1,rColRoute=2,rColDcnt=7,rColRcnt=8,rColUnit=9,rColFresh=14,rColTotal=13;
      for(var c=0;c<rh.length;c++){
        var cn=String(rh[c]||'').replace(/\s+/g,'');
        if(cn==='구분'||cn==='유형')rColDiv=c;
        else if(cn==='ID'||cn==='id')rColID=c;
        else if(cn.includes('Route')||cn.includes('라우트'))rColRoute=c;
        else if(cn.includes('배송건수')||cn.includes('배송(parcel)'))rColDcnt=c;
        else if(cn.includes('반품')&&(cn.includes('운송장')||cn.includes('parcel')))rColRcnt=c;
        // ★ 단가 컬럼: "금액"이나 "기본"이 없는 순수 단가만 (기본배송단가금액 제외)
        else if(cn.includes('단가')&&!cn.includes('금액')&&!cn.includes('기본')&&!cn.includes('인센'))rColUnit=c;
        else if(cn.includes('프레시백')||cn.includes('프레쉬백'))rColFresh=c;
        else if(cn==='총금액'||cn.includes('총금액'))rColTotal=c;
      }

      var drvMap={};
      for(var i=rawHdrIdx+1;i<raw.length;i++){
        var row=raw[i]; if(!row[rColID])continue;
        var userId=String(row[rColID]).trim();
        if(userId===''||userId.toLowerCase()==='id')continue;
        var divVal=String(row[rColDiv]||'').trim();
        var isNocont=divVal.includes('미계약');
        var route=String(row[rColRoute]||'').trim();
        var dcnt=Number(row[rColDcnt])||0;
        var rcnt=Number(row[rColRcnt])||0;

        if(!drvMap[userId])drvMap[userId]={
          userId:userId,dcnt:0,rcnt:0,
          delAmt:0,retAmt:0,freshAmt:0,
          nocontCnt:0,nocontAmt:0,
          routes:{}
        };

        // ★ 미계약 라우트: 총금액 그대로 합산, 일반 dcnt/routes에는 포함 안 함
        if(isNocont){
          var ncAmt=Number(row[rColTotal])||0;
          drvMap[userId].nocontCnt+=dcnt+rcnt;
          drvMap[userId].nocontAmt+=ncAmt;
          continue;
        }

        // ★ v9.25: 배송금액 = 엑셀 총금액 컬럼 직접 사용 (RPRICE 계산 아님)
        //   쿠팡 실제 지급액 기준 → 라우트 테이블 합계 = 배송수익 일치
        var rowTotal=Number(row[rColTotal])||0;  // 총금액 컬럼
        var unitPrc=(route&&RPRICE[route])||Number(row[rColUnit])||0; // 단가 표시용
        var freshInc=Number(row[rColFresh])||0;
        // 배송금액: 총금액 컬럼 우선, 없으면 dcnt×단가
        var delAmt=rowTotal>0?rowTotal:(dcnt*unitPrc);
        var retAmt=rcnt*unitPrc;

        drvMap[userId].dcnt+=dcnt;
        drvMap[userId].rcnt+=rcnt;
        drvMap[userId].delAmt+=delAmt;
        drvMap[userId].retAmt+=retAmt;
        drvMap[userId].freshAmt+=freshInc;

        if(route){
          if(!drvMap[userId].routes[route])
            drvMap[userId].routes[route]={cnt:0,ret:0,unitPrc:0,delAmt:0,retAmt:0};
          drvMap[userId].routes[route].cnt+=dcnt;
          drvMap[userId].routes[route].ret+=rcnt;
          drvMap[userId].routes[route].delAmt+=delAmt;   // ★ 금액 누적
          drvMap[userId].routes[route].retAmt+=retAmt;   // ★ 반품 금액 누적
          if(unitPrc>0)drvMap[userId].routes[route].unitPrc=unitPrc;
        }
      }

      // 정산총괄 — 헤더 행 자동 탐지 후 컬럼 인덱스 동적 매핑
      var totalMap={};
      if(total.length>2){
        // ★ "ID" 또는 "vendor" 포함 행을 헤더로 자동 탐지
        var totalHdrIdx=-1;
        for(var h=0;h<Math.min(total.length,10);h++){
          var hr=total[h];
          if(hr&&(String(hr[3]||'').toLowerCase()==='id'||String(hr[2]||'').toLowerCase()==='vendor'||String(hr[0]||'').toLowerCase()==='no')){
            totalHdrIdx=h; break;
          }
        }
        if(totalHdrIdx>=0){
          var hRow=total[totalHdrIdx];
          // 컬럼명으로 인덱스 탐지
          var colID=-1,colFresh=-1,colDmg=-1,colTotal=-1,colInc=-1,colSub=-1;
          for(var c=0;c<hRow.length;c++){
            var cell=String(hRow[c]||'').replace(/\s+/g,'');
            if(cell==='ID'||cell==='id')colID=c;
            else if(cell.includes('프레시백')||cell.includes('프레쉬백'))colFresh=c;
            else if(cell.includes('분실파손'))colDmg=c;
            else if(cell.includes('총합계')||cell.includes('TOTAL'))colTotal=c;
            else if(cell.includes('추가인센')||cell.includes('가중요인'))colInc=c;
            else if(cell.includes('금액(소계)')||cell.includes('소계'))colSub=c;
          }
          if(colID<0)colID=3;
          if(colFresh<0)colFresh=8;
          if(colInc<0)colInc=9;
          if(colDmg<0)colDmg=10;
          if(colTotal<0)colTotal=11;
          if(colSub<0)colSub=7;

          for(var j=totalHdrIdx+1;j<total.length;j++){
            var tr=total[j]; if(!tr||!tr[colID])continue;
            var uid=String(tr[colID]).trim();
            if(uid===''||uid==='ID')continue;
            var tAmt=Number(tr[colTotal])||0;
            var tSub=Number(tr[colSub])||0;
            var tFresh=Number(tr[colFresh])||0;
            var tDmg=Number(tr[colDmg])||0;
            var tInc=Number(tr[colInc])||0;
            if(tAmt>0)totalMap[uid]={totalAmt:tAmt,subAmt:tSub,freshAmt:tFresh,dmgAmt:tDmg,incAmt:tInc};
          }
        }
      }

      // ★ v9.25: 엑셀 전체 총합계 계산 (기사 매칭 무관, 쿠팡 총매출 표시용)
      var excelGrandTotal=Object.values(totalMap).reduce(function(s,v){return s+(v.totalAmt||0);},0);
      var excelGrandFresh=Object.values(totalMap).reduce(function(s,v){return s+(v.freshAmt||0);},0);
      var excelGrandDmg=Object.values(totalMap).reduce(function(s,v){return s+(v.dmgAmt||0);},0);
      var drivers=ls('drivers');
      var settlements=ls('settlements');
      var _now=new Date();
      var _prev=new Date(_now.getFullYear(),_now.getMonth()-1,1);
      var _defaultMonth=_prev.getFullYear()+'-'+String(_prev.getMonth()+1).padStart(2,'0');
      var _curMonth=_now.getFullYear()+'-'+String(_now.getMonth()+1).padStart(2,'0');
      var inputMonth=prompt(
        '📅 정산월을 입력하세요 (YYYY-MM)\n\n'+
        '쿠팡은 일반적으로 전월 배송분을 당월에 정산합니다.\n\n'+
        '• 전월: '+_defaultMonth+' (기본값)\n'+
        '• 당월: '+_curMonth,
        _defaultMonth
      );
      if(!inputMonth){toast('정산 업로드 취소됨');return;}
      if(!/^\d{4}-(0[1-9]|1[0-2])$/.test(inputMonth)){
        toast('❌ 형식 오류 (YYYY-MM 예: 2026-03): '+inputMonth);return;
      }
      var month=inputMonth;
      // ★ v9.25: inputMonth 확정 후 저장 (이전엔 undefined로 저장되는 버그 있었음)
      try{
        var ctKey='coupang_total_'+month.replace('-','_');
        var ctData={vat_excl:excelGrandTotal,fresh:excelGrandFresh,dmg:excelGrandDmg,vat_incl:Math.round(excelGrandTotal*1.1),updatedAt:new Date().toISOString()};
        var ctStore=JSON.parse(localStorage.getItem('mbti_coupang_totals')||'{}');
        ctStore[ctKey]=ctData;
        localStorage.setItem('mbti_coupang_totals',JSON.stringify(ctStore));
        console.log('[쿠팡총매출] 저장 완료:',ctKey,'→ VAT포함 ₩'+ctData.vat_incl.toLocaleString());
      }catch(e){console.warn('[쿠팡총매출] 저장 실패:',e);}
      var added=0,skipped=0,updated=0,skippedIds=[];
      var ncDrivers=0,ncTotalCnt=0,ncTotalAmt=0;  // ★ 미계약건 집계 (v9.25 fix)

      Object.keys(drvMap).forEach(function(userId){
        var cleanId=userId.replace(/@df$/i,'').replace(/@.*$/,'').trim();
        var d=drivers.find(function(dr){
          var dId=(dr.userId||'').toLowerCase();
          return dId===userId.toLowerCase()||dId===cleanId.toLowerCase();
        });
        if(!d){skipped++;skippedIds.push(cleanId);return;}

        var dm=drvMap[userId];
        var tm=totalMap[userId]||totalMap[cleanId]||{};
        var freshAmt=tm.freshAmt||dm.freshAmt||0;
        var dmgAmt=tm.dmgAmt||0;
        var damt=dm.delAmt||0;
        var ramt=dm.retAmt||0;
        // ★ 미계약건: 엑셀 총금액 그대로 사용
        var nocontAmt=dm.nocontAmt||0;
        var nocontCnt=dm.nocontCnt||0;
        if(nocontAmt>0||nocontCnt>0){ncDrivers++;ncTotalCnt+=nocontCnt;ncTotalAmt+=nocontAmt;}  // ★ v9.25 fix

        // ★ 인센티브: 기사별 설정 기준 (Firebase에서 로드된 설정 사용)
        var fincVal=0;
        Object.keys(dm.routes).forEach(function(route){
          var rv=dm.routes[route];
          var s=_getIncSetting(d.name, route);
          if(s.on && s.rate>0) fincVal+=rv.cnt*s.rate;
        });

        // ★ 세금계산서 기준 금액 = 배송+반품 + 프레시백회수 + 프레시백인센 + 미계약 + 추가인센
        var incAmt=tm.incAmt||0; // ★ 추가인센티브(가중요인) — 엑셀 총괄에서 파싱
        var taxBase=damt+ramt+freshAmt+fincVal+nocontAmt+incAmt;
        var totalAmt=taxBase;
        var income=taxBase;
        // ★ 고용·산재 계산 (세금계산서 방식)
        var supplyAmt=Math.round(totalAmt/1.1);
        var expenseAmt=Math.round(supplyAmt*0.346);
        var monthlyWage=supplyAmt-expenseAmt;
        var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
        var workIns=Math.floor(monthlyWage*0.0088/10)*10;

        var routeDetails=Object.keys(dm.routes).map(function(r){
          var rv=dm.routes[r];
          var up=rv.unitPrc||0;
          return{
            route:r, cnt:rv.cnt, ret:rv.ret, unitPrice:up,
            amt:rv.delAmt||0,
            retAmt:rv.retAmt||0
          };
        });

        var existing=settlements.findIndex(function(s){return s.driver===d.name&&s.month===month;});
        var entry={
          driver:d.name, userId:cleanId, coupangId:userId,
          jobsub:d.jobsub||'쿠팡', month:month,
          dcnt:dm.dcnt, rcnt:dm.rcnt,
          damt:damt,
          ramt:ramt,
          fresh:freshAmt,
          finc:fincVal,               // ★ 프레시백 인센티브
          inc:incAmt,                 // ★ 추가인센티브(가중요인) — 엑셀 총괄 파싱값
          nocont:nocontAmt,           // ★ 미계약건 금액 (엑셀 자동)
          nocontCnt:nocontCnt,        // ★ 미계약 건수
          coupangTotal:tm.totalAmt||0, // ★ v9.25: 엑셀 정산총괄 금액(총합계) — 쿠팡 실제 지급액
          tax:0,
          totalAmt:totalAmt,          // ★ 공급대가 저장
          supplyAmt:supplyAmt,        // ★ 공급가액
          monthlyWage:monthlyWage,    // ★ 월보수액
          emp:empIns,                 // ★ 고용보험 (월보수액×0.8%, 80만미만 제외)
          work:workIns,               // ★ 산재보험 (월보수액×0.88%)
          eq:0, dmg:dmgAmt, adv:0,
          status:'정산예정',
          routeDetails:routeDetails,
          updatedAt:new Date().toISOString(),
          createdAt:new Date().toISOString()
        };
        if(existing>=0){
          // ★ v9.25: 기존 정산 완료/승인된 항목 재업로드 시 상태 보호
          //   → 금액·라우트 데이터만 갱신, status·taxSent·paidAt 등 보존
          var prev=settlements[existing];
          var protectedFields={};
          ['status','taxSent','taxSentAt','paidAt','fbId','createdAt','sharedAt'].forEach(function(k){
            if(prev[k]!==undefined) protectedFields[k]=prev[k];
          });
          // ★ v9.49: 수기 입력 필드 보호 (재업로드 시 초기화 방지)
          //   fresh(프레시백), dmg(분실/파손), adv(선지급), eq, etcPlus, etcMinus
          //   finc(프레시백 인센), nocont(미계약건) ← v9.49 추가
          ['fresh','dmg','adv','eq','etcPlus','etcMinus','finc','nocont'].forEach(function(k){
            if(prev[k]!==undefined && prev[k]!==0 && prev[k]!=='') protectedFields[k]=prev[k];
          });
          // ★ routeDetails: 건수/반품은 엑셀 최신값, unitPrice는 수동 편집값 보존
          var mergedRoutes=entry.routeDetails.map(function(newRd){
            var oldRd=(prev.routeDetails||[]).find(function(r){return r.route===newRd.route;});
            if(oldRd && oldRd.unitPrice && oldRd.unitPrice>0){
              return Object.assign({},newRd,{unitPrice:oldRd.unitPrice});
            }
            return newRd;
          });
          var updateData=Object.assign({},entry,{routeDetails:mergedRoutes});
          delete updateData.status;
          delete updateData.createdAt;
          updateData.updatedAt=new Date().toISOString();
          settlements[existing]=Object.assign(prev, updateData, protectedFields);
          settlements[existing].finc=entry.finc;
          updated++;
        }
        else{settlements.push(entry); added++;}
      });
      lss('settlements',settlements);
      // ★ Firebase에도 자동 저장 (다른 기기 동기화용)
      // ★ v9.25: undefined 필드 제거 후 저장 (sharedAt 등 없는 필드 Firebase 오류 차단)
      function _cleanUndef(obj){
        var clean={};
        Object.keys(obj).forEach(function(k){
          if(obj[k]!==undefined&&obj[k]!==null||k==='taxSent') clean[k]=obj[k]===undefined?false:obj[k];
          else if(obj[k]!==undefined) clean[k]=obj[k];
        });
        return clean;
      }
      var fbOk=0,fbFail=0;
      // ★ v9.25: lss → Firebase 완료 후 저장 (onSnapshot 경쟁 방지)
      function _finalize(){
        lss('settlements',settlements);
        var protectedCount=0;
        settlements.forEach(function(x){if(x.month===month&&x.status==='완료')protectedCount++;});
        var ncMsg=ncDrivers?('\n💡 미계약: '+ncDrivers+'명 / '+ncTotalCnt+'건 / ₩'+ncTotalAmt.toLocaleString()):'';
        var skipMsg=skippedIds.length?('\n⚠️ 미매칭: '+skippedIds.slice(0,5).join(', ')+(skippedIds.length>5?'... 외'+(skippedIds.length-5)+'명':'')):'';
        var protMsg=protectedCount?('\n🔒 완료 보호: '+protectedCount+'건 (상태 유지)'):'';
        toast('✅ 쿠팡 엑셀 정산 완료: '+added+'건 등록 / '+updated+'건 갱신 / '+skipped+'건 미매칭'+protMsg+ncMsg+skipMsg);
        SP('settle',null);
      }
      if(FB&&_db){
        var promises=[];
        settlements.forEach(function(x){
          if(x.month!==month)return;
          var docId=x.fbId||x.driver+'_'+x.month;
          var cleanX=_cleanUndef(x);
          promises.push(_db.collection('settlements').doc(docId).set(cleanX)
            .then(function(){fbOk++;x.fbId=docId;})
            .catch(function(e){fbFail++;console.warn('FB 저장 실패:',x.driver,e.message);}));
        });
        Promise.all(promises).then(function(){
          if(fbFail>0)toast('⚠️ Firebase '+fbFail+'건 저장 실패 (로컬은 정상)');
          _finalize();
        }).catch(function(){_finalize();});
      } else {
        _finalize();
      }
    }catch(err){console.error(err);toast('❌ 파싱 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
  inp.value='';
};

    var snap=await _db.collection('settlements').where('dealerId','==',CU.dealerId).get();
    var settles=snap.docs.map(function(d){return{id:d.id,...d.data()};});
    if(!settles.length){c.innerHTML='<div class="empty"><div class="empty-icon">📈</div><div>정산 데이터가 없습니다</div></div>';return;}
    var byDriver={};
    settles.forEach(function(s){var n=s.driver||s.driverName||'?';if(!byDriver[n]){byDriver[n]={cnt:0,income:0,net:0,dcnt:0,camp:s.camp||getCampByRoutes(s)||''};} var r=calcNet(s);byDriver[n].cnt++;byDriver[n].income+=r.income;byDriver[n].net+=r.net;byDriver[n].dcnt+=(s.dcnt||0);});
    var drivers=Object.entries(byDriver).sort(function(a,b){return b[1].net-a[1].net;});
    var byMonth={};
    settles.forEach(function(s){var m=safeMonth(s.month)||s.month;if(!byMonth[m])byMonth[m]={cnt:0,income:0,net:0};var r=calcNet(s);byMonth[m].cnt++;byMonth[m].income+=r.income;byMonth[m].net+=r.net;});
    var months=Object.keys(byMonth).sort().reverse();
    var totalDrivers=Object.keys(byDriver).length;
    var totalDcnt=settles.reduce(function(a,s){return a+(s.dcnt||0);},0);
    var totalNet=settles.reduce(function(a,s){return a+(calcNet(s).net||0);},0);
    c.innerHTML='<div class="stat-grid"><div class="stat-card"><div class="stat-val">'+totalDrivers+'</div><div class="stat-lbl">👤 기사 수</div></div><div class="stat-card"><div class="stat-val">'+fmt(totalDcnt)+'</div><div class="stat-lbl">📦 총 배송건</div></div><div class="stat-card"><div class="stat-val">₩'+fmt(totalNet)+'</div><div class="stat-lbl">💰 총 실지급</div></div></div>'+
    '<div class="card"><div class="card-header"><div class="card-title">👤 기사별 실적</div></div><div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>#</th><th>기사</th><th>캠프</th><th>배송건</th><th>실지급합계</th><th>정산횟수</th></tr></thead><tbody>'+
    drivers.map(function(e,i){return'<tr><td>'+( i+1)+'</td><td><strong>'+esc(e[0])+'</strong></td><td>'+esc(e[1].camp)+'</td><td>'+fmt(e[1].dcnt)+'건</td><td style="font-weight:800;color:var(--brand)">₩'+fmt(e[1].net)+'</td><td>'+e[1].cnt+'회</td></tr>';}).join('')+
    '</tbody></table></div></div></div>'+
    '<div class="card"><div class="card-header"><div class="card-title">📅 월별 현황</div></div><div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>정산월</th><th>건수</th><th>실지급합계</th></tr></thead><tbody>'+
    months.map(function(m){var d=byMonth[m];return'<tr><td><strong>'+esc(safeMonthDisplay(m))+'</strong></td><td>'+d.cnt+'건</td><td style="font-weight:700;color:var(--brand)">₩'+fmt(d.net)+'</td></tr>';}).join('')+
    '</tbody></table></div></div></div>';
  }catch(e){c.innerHTML='<div class="empty">⚠️ '+e.message+'</div>';}
};

// ══════════════════════════════════════════════
// 기사 페이지
// ══════════════════════════════════════════════
PAGES['driver-home']=async function(){
  document.getElementById('page-title').textContent='내 정산 명세서';
  document.getElementById('topbar-actions').innerHTML='';
  var c=document.getElementById('content');c.innerHTML='<div class="loading">⏳ 로딩 중...</div>';
  try{
    var snap=await _db.collection('settlements').where('dealerId','==',CU.dealerId).get();
    var myName=CU.name;
    var myS=snap.docs.map(function(d){return{id:d.id,...d.data()};}).filter(function(s){return(s.driver||s.driverName)===myName;}).sort(function(a,b){return(b.month||'').localeCompare(a.month||'');});
    if(!myS.length){c.innerHTML='<div class="driver-hero"><div class="driver-hero-name">👋 '+esc(myName)+'</div></div><div class="empty"><div class="empty-icon">📋</div><div>명세서가 없습니다</div><div style="font-size:12px;color:var(--text3);margin-top:6px">관리자가 정산을 입력하면 여기에 표시됩니다</div></div>';return;}
    var latest=calcNet(myS[0]);
    var totalNet=myS.reduce(function(a,s){return a+(calcNet(s).net||0);},0);
    var cards=myS.map(function(s){var r=calcNet(s);return'<div class="settle-card" onclick="viewDriverSettle(\'"+s.id+"\')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:14px;font-weight:800">📅 '+esc(safeMonthDisplay(s.month))+' 정산</div><span class="badge ''+(function(){return'+(s.status===\'완료\'?\'b-green\':\'b-amber\')+'';}())+'">'+( s.status||'정산예정')+'</span></div><div style="font-size:20px;font-weight:900;color:var(--brand)">₩'+fmt(r.net)+'</div><div style="font-size:12px;color:var(--text3);margin-top:4px">배송 '+fmt(s.dcnt||0)+'건 · 수익 ₩'+fmt(r.income)+'</div></div>';}).join('');
    c.innerHTML='<div class="driver-hero"><div class="driver-hero-name">👋 '+esc(myName)+'</div><div style="display:flex;gap:20px;margin-top:14px"><div><div style="font-size:22px;font-weight:900">₩'+fmt(latest.net)+'</div><div style="font-size:11px;opacity:.7">최근 실지급</div></div><div><div style="font-size:22px;font-weight:900">₩'+fmt(totalNet)+'</div><div style="font-size:11px;opacity:.7">누적 지급액</div></div></div></div>'+cards;
  }catch(e){c.innerHTML='<div class="empty">⚠️ '+e.message+'</div>';}
};

window.viewDriverSettle=async function(id){
  var snap=await _db.collection('settlements').doc(id).get();
  if(!snap.exists)return;
  var s={id:id,...snap.data()};
  var html=buildStmtHTML(s,{name:CU.dealerName||''});
  document.getElementById('mo-drv-stmt')&&document.getElementById('mo-drv-stmt').remove();
  document.body.insertAdjacentHTML('beforeend','<div class="mo show" id="mo-drv-stmt"><div class="md md-lg"><div class="mdt">📋 정산 명세서 <button class="close-btn" onclick="document.getElementById(\'mo-drv-stmt\').remove()">✕</button></div><div class="mdb">'+html+'</div><div class="mdf"><button class="btn btn-gray" onclick="document.getElementById(\'mo-drv-stmt\').remove()">닫기</button><button class="btn btn-green btn-sm" onclick="window.print()">🖨️ 인쇄/PDF</button></div></div></div>');
};

// 해시 링크 명세서 직접 열기
async function checkHashView(){
  var hash=location.hash;if(!hash.startsWith('#view:'))return;
  var id=hash.replace('#view:','');if(!id)return;
  try{
    var snap=await _db.collection('settlements').doc(id).get();
    if(!snap.exists){toast('명세서를 찾을 수 없습니다');return;}
    var s={id:id,...snap.data()};
    var html=buildStmtHTML(s,{name:''});
    document.body.insertAdjacentHTML('beforeend','<div class="mo show" style="background:linear-gradient(135deg,#0C3F74,#1A5FA8)"><div class="md md-lg"><div class="mdt">📋 정산 명세서</div><div class="mdb">'+html+'</div><div class="mdf"><button class="btn btn-green btn-sm" onclick="window.print()">🖨️ 인쇄/PDF</button></div></div></div>');
    history.replaceState(null,'',location.pathname);
  }catch(e){}
}
window.addEventListener('load',checkHashView);
</script>
