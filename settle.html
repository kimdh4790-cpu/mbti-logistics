<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#185FA5">
<title>LogiNet — 정산관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --brand:#185FA5;--brand-l:#E6F1FB;--brand-d:#0C447C;
  --green:#0F6E56;--green-l:#E1F5EE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f0efe9;
  --text:#2C2C2A;--text2:#5F5E5A;--text3:#888780;
  --border:rgba(0,0,0,.1);--r:10px
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Malgun Gothic',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px}
body.dark{--bg:#1a1a18;--bg2:#242422;--bg3:#1e1e1c;--text:#e8e6e0;--text2:#a0a09a;--text3:#666663;--border:rgba(255,255,255,.12)}
#app{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.main{margin-left:200px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.sl{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sl-icon{width:30px;height:30px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sl-text{font-size:13px;font-weight:800;color:var(--brand)}
.sl-ver{font-size:9px;color:var(--purple);font-weight:600;display:block}
.snav{flex:1;padding:6px;overflow-y:auto}
.ns{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.05em;padding:6px 8px 2px}
.ni{padding:7px 9px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:12px;margin-bottom:1px;display:flex;align-items:center;gap:6px}
.ni:hover{background:var(--bg3)}
.ni.on{background:var(--brand-l);color:var(--brand);font-weight:600}
.sb-bot{padding:9px 12px;border-top:1px solid var(--border)}
.topbar{height:46px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:8px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:7px}
.content{padding:14px;flex:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.btn{padding:6px 12px;border-radius:var(--r);font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--bg3)}
.btn-blue{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-orange{background:#f97316;color:#fff;border-color:#f97316}
.btn-sm{padding:4px 9px;font-size:11px}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px}
.b-green{background:var(--green-l);color:var(--green)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-blue{background:var(--brand-l);color:var(--brand)}
.b-red{background:var(--red-l);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
th{background:var(--bg3);font-weight:600;color:var(--text2);font-size:11px}
tr:hover>td{background:var(--bg3)}
.tbl-wrap{overflow-x:auto}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:14px}
.mo.show{display:flex}
.md{background:var(--bg2);border-radius:12px;padding:20px;width:560px;max-width:100%;max-height:92vh;overflow-y:auto}
.mdt{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.mdf{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--border)}
.fg{display:flex;flex-direction:column;margin-bottom:10px}
.fg label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fg input,.fg select{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text);width:100%}
.fg input:focus,.fg select:focus{border-color:var(--brand);outline:none}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--text3)}
/* 로그인 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{background:var(--bg2);border-radius:20px;padding:32px 28px;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
/* 모바일 */
.ham{display:none;width:32px;height:32px;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;border:1px solid var(--border);font-size:16px}
@media(max-width:640px){
  .sidebar{transform:translateX(-100%);transition:.25s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .ham{display:flex!important}
  .gr{grid-template-columns:1fr}
}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:600;opacity:0;transition:.22s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:56px;height:56px;border-radius:14px;background:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px">💰</div>
      <div style="font-size:22px;font-weight:900;color:var(--brand)">LogiNet</div>
      <div style="font-size:12px;color:var(--text3);margin-top:3px">물류 정산관리 v2.0</div>
    </div>
    <div class="fg"><label>이메일</label><input id="l-email" type="email" placeholder="example@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="fg"><label>비밀번호</label><input id="l-pw" type="password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="l-err" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>
    <button class="btn btn-blue" style="width:100%;padding:11px;font-size:14px;font-weight:700" onclick="doLogin()">로그인</button>
    <div style="text-align:center;margin-top:10px"><button class="btn btn-sm" onclick="toggleDark()">🌙 다크모드</button></div>
  </div>
</div>

<!-- 앱 -->
<div id="app" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sl">
      <div class="sl-icon">💰</div>
      <div><div class="sl-text">LogiNet</div><span class="sl-ver">v2.0 · 엠비티아이</span></div>
    </div>
    <div style="padding:8px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--brand-l);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--brand)" id="sb-av">관</div>
      <div><div style="font-size:12px;font-weight:600" id="sb-name">로딩중</div><div style="font-size:10px;color:var(--text3)" id="sb-role"></div></div>
    </div>
    <nav class="snav" id="snav"></nav>
    <div class="sb-bot">
      <button class="btn" style="width:100%;font-size:11px;margin-bottom:4px" onclick="toggleDark()">🌙 다크모드</button>
      <button class="btn btn-red" style="width:100%;font-size:11px" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="ham" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</div>
        <div class="topbar-title" id="page-title">대시보드</div>
      </div>
      <div class="topbar-right" id="topbar-right"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="modals"></div>
<div id="toast"></div>

<!-- ★ 고정 파일 입력 (항상 존재) -->
<input type="file" id="excel-input" accept=".xlsx,.xls" style="display:none">

<script>
// ██ 유틸 ██
function fmt(n){return Math.round(n||0).toLocaleString('ko-KR');}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(m){var t=document.getElementById('toast');if(!t)return;t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3000);}
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('ln_dark',document.body.classList.contains('dark')?1:0);}
function curMonth(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function stripDf(uid){return(uid||'').trim().replace(/@[a-z0-9]+$/i,'').trim();}
if(localStorage.getItem('ln_dark')==='1') document.body.classList.add('dark');

// ██ 물류앱 이식: RPRICE, CAMP_NAMES, DEFAULT_UNIT_PRICES, G_PRICES ██
var DEFAULT_UNIT_PRICES = {
  coupang_normal:  1100,   // 쿠팡 일반배송 (VAT 포함)
  coupang_fresh:   1300,   // 쿠팡 신선배송 (VAT 포함)
  coupang_return:   900,   // 쿠팡 반품 (VAT 포함)
  cj_normal:       1050,   // CJ대한통운 (VAT 포함)
  kurly_normal:    1200,   // 마켓컬리 (VAT 포함)
  water_normal:     800,   // 생수배송 (VAT 포함)
  freshbag_inc:      25,   // 프레시백 인센티브 (건당)
  yong_del:         900,   // 용차 배송단가
  yong_ret:         900    // 용차 반품단가
};
// 런타임 단가 (Firestore 로드 후 업데이트)
var G_PRICES = Object.assign({}, DEFAULT_UNIT_PRICES);


var RPRICE = {
  '101C':700,'101D':730,
  '109A':1050,'109B':1100,'109C':1060,'109D':1050,
  '213A':1080,'213B':1080,'213C':1000,'213D':1080,
  '215A':720,'215B':720,'215C':720,'215D':720,
  '508B':950,
  '608B':920,'608C':920,'608D':930,
  '612A':890,'612B':860,'612C':880,'612D':950,
  '613A':880,'613B':900,'613C':880,'613D':910,
  '614A':930,'614B':910,'614C':930,'614D':920,
  '619A':930,'619B':930,'619C':860,'619D':880,
  '812A':960,'812B':930,'812C':930,'812D':800
};
// 캠프명 매핑 (라우트 숫자코드 → 캠프명)
var CAMP_NAMES={
  '101':'부산1캠프','215':'부산1캠프',
  '812':'부산2캠프',
  '508':'부산3캠프',
  '109':'대구2캠프','213':'대구2B캠프',
  '608':'진주M캠프','612':'진주M캠프','613':'진주M캠프',
  '614':'진주M캠프','619':'진주M캠프'
};
// 캠프 표시 순서
var CAMP_ORDER=['부산1캠프','부산2캠프','부산3캠프','대구2캠프','대구2B캠프','진주M캠프'];
// 캠프 색상
var CAMP_COLOR={
  '부산1캠프':'#3B82F6','부산2캠프':'#8B5CF6','부산3캠프':'#10B981',
  '대구2캠프':'#F59E0B','대구2B캠프':'#FB923C','진주M캠프':'#EF4444'
};
// ★ v9.25: 캠프 GPS 좌표 (출근 체크인 300m 거리 검증용)
//    관리자가 [기사관리 > 캠프 GPS 등록] 메뉴에서 수정 가능 → localStorage 'campGps'
var CAMP_GPS_DEFAULT={
  '부산1캠프':{lat:35.1941,lng:129.1198,addr:'부산광역시 해운대구 반여로 20'},
  '부산2캠프':{lat:35.1252,lng:128.9641,addr:'부산광역시 사상구 강변대로456번길 15-36'},
  '부산3캠프':{lat:35.0659,lng:129.0100,addr:'부산광역시 서구 원양로 203'},
  '대구2캠프':{lat:35.8183,lng:128.7203,addr:'경상북도 경산시 삼성현로 156'},          // 109노선
  '대구2B캠프':{lat:35.8762,lng:128.6794,addr:'대구광역시 동구 동촌로 374'},            // 213노선
  '진주M캠프':{lat:35.1190,lng:128.0989,addr:'경남 진주시 정촌면 화개천로 12'}
};

function getCampByRoute(route){
  if(!route) return '';
  var code=route.replace(/[A-Da-d]$/,'').slice(0,3);
  return (CAMP_NAMES&&CAMP_NAMES[code])||'';
}



// _getIncSetting 간단 대체 (settle.html용)
function _getIncSetting(driver,route){return{on:true,rate:G_PRICES&&G_PRICES.freshbag_inc||25};}

// ██ calcNet ██
function calcNet(x){
  var dcnt=+x.dcnt||+x.delivCount||0;
  var rcnt=+x.rcnt||+x.retCount||0;
  // 용차: 건수×단가, 쿠팡: 라우트별 RPRICE × 건수로 강제 재계산 (v9.25)
  var isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  var yDel=+x.yongDel||(G_PRICES.yong_del||900); var yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  // ★ v9.25: 쿠팡 기사 정산은 무조건 RPRICE × 건수로 재계산
  //          엑셀의 회사 단가/저장된 x.damt 흔적 차단 → routeDetails 우선
  //          정책: 엑셀 단가 = 회사 단가(매출), 기사 단가 = 앱 관리자 RPRICE
  var _rdList = x.routeDetails || [];
  var _damtRP = _rdList.reduce(function(s,rd){return s+(rd.cnt||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0);},0);
  var _ramtRP = _rdList.reduce(function(s,rd){return s+(rd.ret||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0);},0);
  var damt=isYong ? dcnt*yDel : (_rdList.length ? _damtRP : (+x.damt||+x.delivAmt||+x.base||0));
  var ramt=isYong ? rcnt*yRet : (_rdList.length ? _ramtRP : (+x.ramt||+x.retAmt||0));
  var fresh=+x.fresh||+x.freshAmt||0;
  // ★ 프레시백 인센 계산 (v9.25 방어 로직)
  // 1순위: 저장된 x.finc 값이 있으면 jobsub과 무관하게 그대로 사용 (데이터 정합성 우선)
  // 2순위: x.finc 없으면 쿠팡은 건수×25원, 그 외(용차/컬리/CJ)는 0
  var isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  var hasStoredFinc=(x.finc!==undefined&&x.finc!==null&&x.finc!=='');
  var finc = hasStoredFinc
    ? +x.finc
    : (isCoupang ? Math.round(dcnt*(G_PRICES.freshbag_inc||25)) : 0);
  var inc=+x.inc||0;
  var nocont = +x.nocont || 0;  // ★ 미계약건 (+수익)
  var etcPlus  = +x.etcPlus  || 0;  // ★ 기타(+)
  var etcMinus = +x.etcMinus || 0;  // ★ 기타(-)
  // ★ v9.25: 기타(+)만 세금계산서(income)에 포함 → 고용·산재 기준
  //           기타(-)는 세금계산서 제외, 실지급에서만 차감 (공제 항목)
  var income=damt+ramt+fresh+finc+inc+nocont+etcPlus;
  // 세금계산서 기준 금액 = etcPlus 포함, etcMinus 제외
  var totalAmt = income;
  var supplyAmt = Math.round(totalAmt / 1.1);
  var expenseAmt = Math.round(supplyAmt * 0.346);
  var monthlyWage = supplyAmt - expenseAmt;
  var empCalc  = monthlyWage >= 800000 ? Math.floor(monthlyWage * 0.008  / 10) * 10 : 0;
  var workCalc = Math.floor(monthlyWage * 0.0088 / 10) * 10;
  var TAX_RATE = +x.taxRate || 0.033;
  var tax  = +x.tax  || (x.taxFixed ? +x.taxFixed : Math.round(income * TAX_RATE));
  var emp  = (x.emp !== undefined && x.emp !== null && x.emp !== '' && +x.emp > 0) ? +x.emp : empCalc;
  // ★ v9.25: 산재 저장값이 계산값의 50% 미만이면 비정상 → 자동 재계산
  var workStored = (x.work !== undefined && x.work !== null && x.work !== '' && +x.work > 0) ? +x.work : 0;
  var work = (workStored && workCalc > 0 && workStored >= workCalc * 0.5) ? workStored : workCalc;
  var eq   = +x.eq  || 0;
  var dmg  = +x.dmg || +x.damage || 0;
  var adv  = +x.adv || +x.advance || 0;
  // ★ 기타(-) → 공제 항목으로 실지급에서 차감
  // ★ 원천세(tax)는 회사 납부 → 기사 실지급 공제 제외
  var deduct = emp + work + eq + dmg + adv + etcMinus;
  var net = totalAmt - deduct;
  return{damt,ramt,fresh,finc,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}


// ██ parseCoupangExcel (물류앱 원본 + Firebase 연동) ██
function parseCoupangExcel(inp){
  var file=inp.files[0]; if(!file)return;
  if(typeof XLSX==='undefined'){toast('⚠️ 엑셀 라이브러리 로딩 중...'); return;}
  inp.value='';
  toast('📂 기사 목록 로딩 중...');
  // Firebase 기사 로드 후 엑셀 파싱 (Promise 체이닝)
  var fbPromise=(window._db&&window._CU)
    ?window._db.collection('drivers').where('dealerId','==',window._CU.dealerId).get()
      .then(function(snap){
        var arr=[];
        snap.forEach(function(d){arr.push(Object.assign({id:d.id},d.data()));});
        return arr;
      }).catch(function(){return[];})
    :Promise.resolve([]);
  fbPromise.then(function(fbDrivers){
    _parseCoupangExcelInner(file,fbDrivers);
  });
}
function _parseCoupangExcelInner(file,fbDrivers){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var rawSheet=wb.Sheets['정산Raw']||wb.Sheets[wb.SheetNames[2]];
      var totalSheet=wb.Sheets['정산총괄']||wb.Sheets[wb.SheetNames[1]];
      if(!rawSheet){toast('❌ 정산Raw 시트를 찾을 수 없습니다');return;}
      var raw=XLSX.utils.sheet_to_json(rawSheet,{header:1});
      var total=totalSheet?XLSX.utils.sheet_to_json(totalSheet,{header:1}):[];
      if(raw.length<2){toast('❌ 데이터가 없습니다');return;}

      // ★ 정산Raw 헤더 행 자동 탐지 (컬럼 동적 매핑)
      var rawHdrIdx=0;
      for(var h=0;h<Math.min(raw.length,5);h++){
        if(raw[h]&&(String(raw[h][0]||'').includes('구분')||String(raw[h][1]||'').toLowerCase()==='id')){
          rawHdrIdx=h; break;
        }
      }
      var rh=raw[rawHdrIdx]||[];
      var rColDiv=0,rColID=1,rColRoute=2,rColDcnt=7,rColRcnt=8,rColUnit=9,rColFresh=14,rColTotal=13;
      for(var c=0;c<rh.length;c++){
        var cn=String(rh[c]||'').replace(/\s+/g,'');
        if(cn==='구분'||cn==='유형')rColDiv=c;
        else if(cn==='ID'||cn==='id')rColID=c;
        else if(cn.includes('Route')||cn.includes('라우트'))rColRoute=c;
        else if(cn.includes('배송건수')||cn.includes('배송(parcel)'))rColDcnt=c;
        else if(cn.includes('반품')&&(cn.includes('운송장')||cn.includes('parcel')))rColRcnt=c;
        // ★ 단가 컬럼: "금액"이나 "기본"이 없는 순수 단가만 (기본배송단가금액 제외)
        else if(cn.includes('단가')&&!cn.includes('금액')&&!cn.includes('기본')&&!cn.includes('인센'))rColUnit=c;
        else if(cn.includes('프레시백')||cn.includes('프레쉬백'))rColFresh=c;
        else if(cn==='총금액'||cn.includes('총금액'))rColTotal=c;
      }

      var drvMap={};
      for(var i=rawHdrIdx+1;i<raw.length;i++){
        var row=raw[i]; if(!row[rColID])continue;
        var userId=String(row[rColID]).trim();
        if(userId===''||userId.toLowerCase()==='id')continue;
        var divVal=String(row[rColDiv]||'').trim();
        var isNocont=divVal.includes('미계약');
        var route=String(row[rColRoute]||'').trim();
        var dcnt=Number(row[rColDcnt])||0;
        var rcnt=Number(row[rColRcnt])||0;

        if(!drvMap[userId])drvMap[userId]={
          userId:userId,dcnt:0,rcnt:0,
          delAmt:0,retAmt:0,freshAmt:0,
          nocontCnt:0,nocontAmt:0,
          routes:{}
        };

        // ★ 미계약 라우트: 총금액 그대로 합산, 일반 dcnt/routes에는 포함 안 함
        if(isNocont){
          var ncAmt=Number(row[rColTotal])||0;
          drvMap[userId].nocontCnt+=dcnt+rcnt;
          drvMap[userId].nocontAmt+=ncAmt;
          continue;
        }

        // ★ v9.25: 배송금액 = 엑셀 총금액 컬럼 직접 사용 (RPRICE 계산 아님)
        //   쿠팡 실제 지급액 기준 → 라우트 테이블 합계 = 배송수익 일치
        var rowTotal=Number(row[rColTotal])||0;  // 총금액 컬럼
        var unitPrc=(route&&RPRICE[route])||Number(row[rColUnit])||0; // 단가 표시용
        var freshInc=Number(row[rColFresh])||0;
        // 배송금액: 총금액 컬럼 우선, 없으면 dcnt×단가
        var delAmt=rowTotal>0?rowTotal:(dcnt*unitPrc);
        var retAmt=rcnt*unitPrc;

        drvMap[userId].dcnt+=dcnt;
        drvMap[userId].rcnt+=rcnt;
        drvMap[userId].delAmt+=delAmt;
        drvMap[userId].retAmt+=retAmt;
        drvMap[userId].freshAmt+=freshInc;

        if(route){
          if(!drvMap[userId].routes[route])
            drvMap[userId].routes[route]={cnt:0,ret:0,unitPrc:0,delAmt:0,retAmt:0};
          drvMap[userId].routes[route].cnt+=dcnt;
          drvMap[userId].routes[route].ret+=rcnt;
          drvMap[userId].routes[route].delAmt+=delAmt;   // ★ 금액 누적
          drvMap[userId].routes[route].retAmt+=retAmt;   // ★ 반품 금액 누적
          if(unitPrc>0)drvMap[userId].routes[route].unitPrc=unitPrc;
        }
      }

      // 정산총괄 — 헤더 행 자동 탐지 후 컬럼 인덱스 동적 매핑
      var totalMap={};
      if(total.length>2){
        // ★ "ID" 또는 "vendor" 포함 행을 헤더로 자동 탐지
        var totalHdrIdx=-1;
        for(var h=0;h<Math.min(total.length,10);h++){
          var hr=total[h];
          if(hr&&(String(hr[3]||'').toLowerCase()==='id'||String(hr[2]||'').toLowerCase()==='vendor'||String(hr[0]||'').toLowerCase()==='no')){
            totalHdrIdx=h; break;
          }
        }
        if(totalHdrIdx>=0){
          var hRow=total[totalHdrIdx];
          // 컬럼명으로 인덱스 탐지
          var colID=-1,colFresh=-1,colDmg=-1,colTotal=-1,colInc=-1,colSub=-1;
          for(var c=0;c<hRow.length;c++){
            var cell=String(hRow[c]||'').replace(/\s+/g,'');
            if(cell==='ID'||cell==='id')colID=c;
            else if(cell.includes('프레시백')||cell.includes('프레쉬백'))colFresh=c;
            else if(cell.includes('분실파손'))colDmg=c;
            else if(cell.includes('총합계')||cell.includes('TOTAL'))colTotal=c;
            else if(cell.includes('추가인센')||cell.includes('가중요인'))colInc=c;
            else if(cell.includes('금액(소계)')||cell.includes('소계'))colSub=c;
          }
          if(colID<0)colID=3;
          if(colFresh<0)colFresh=8;
          if(colInc<0)colInc=9;
          if(colDmg<0)colDmg=10;
          if(colTotal<0)colTotal=11;
          if(colSub<0)colSub=7;

          for(var j=totalHdrIdx+1;j<total.length;j++){
            var tr=total[j]; if(!tr||!tr[colID])continue;
            var uid=String(tr[colID]).trim();
            if(uid===''||uid==='ID')continue;
            var tAmt=Number(tr[colTotal])||0;
            var tSub=Number(tr[colSub])||0;
            var tFresh=Number(tr[colFresh])||0;
            var tDmg=Number(tr[colDmg])||0;
            var tInc=Number(tr[colInc])||0;
            if(tAmt>0)totalMap[uid]={totalAmt:tAmt,subAmt:tSub,freshAmt:tFresh,dmgAmt:tDmg,incAmt:tInc};
          }
        }
      }

      // ★ v9.25: 엑셀 전체 총합계 계산 (기사 매칭 무관, 쿠팡 총매출 표시용)
      var excelGrandTotal=Object.values(totalMap).reduce(function(s,v){return s+(v.totalAmt||0);},0);
      var excelGrandFresh=Object.values(totalMap).reduce(function(s,v){return s+(v.freshAmt||0);},0);
      var excelGrandDmg=Object.values(totalMap).reduce(function(s,v){return s+(v.dmgAmt||0);},0);
      // localStorage 기사도 확인 (하위 호환), Firebase 기사 우선
      var drivers=ls('drivers');
      // Firebase 기사 합치기 (userId 기준)
      fbDrivers.forEach(function(fd){
        var exists=drivers.find(function(d){return(d.userId||'').replace(/@[a-z0-9]+$/i,'')===fd.userId;});
        if(!exists) drivers.push({name:fd.name||'',userId:fd.userId||'',camp:fd.camp||fd.jobsub||'',jobsub:fd.jobsub||'쿠팡'});
      });
      var settlements=ls('settlements');
      var _now=new Date();
      var _prev=new Date(_now.getFullYear(),_now.getMonth()-1,1);
      var _defaultMonth=_prev.getFullYear()+'-'+String(_prev.getMonth()+1).padStart(2,'0');
      var _curMonth=_now.getFullYear()+'-'+String(_now.getMonth()+1).padStart(2,'0');
      var inputMonth=prompt(
        '📅 정산월을 입력하세요 (YYYY-MM)\n\n'+
        '쿠팡은 일반적으로 전월 배송분을 당월에 정산합니다.\n\n'+
        '• 전월: '+_defaultMonth+' (기본값)\n'+
        '• 당월: '+_curMonth,
        _defaultMonth
      );
      if(!inputMonth){toast('정산 업로드 취소됨');return;}
      if(!/^\d{4}-(0[1-9]|1[0-2])$/.test(inputMonth)){
        toast('❌ 형식 오류 (YYYY-MM 예: 2026-03): '+inputMonth);return;
      }
      var month=inputMonth;
      // ★ v9.25: inputMonth 확정 후 저장 (이전엔 undefined로 저장되는 버그 있었음)
      try{
        var ctKey='coupang_total_'+month.replace('-','_');
        var ctData={vat_excl:excelGrandTotal,fresh:excelGrandFresh,dmg:excelGrandDmg,vat_incl:Math.round(excelGrandTotal*1.1),updatedAt:new Date().toISOString()};
        var ctStore=JSON.parse(localStorage.getItem('mbti_coupang_totals')||'{}');
        ctStore[ctKey]=ctData;
        localStorage.setItem('mbti_coupang_totals',JSON.stringify(ctStore));
        console.log('[쿠팡총매출] 저장 완료:',ctKey,'→ VAT포함 ₩'+ctData.vat_incl.toLocaleString());
      }catch(e){console.warn('[쿠팡총매출] 저장 실패:',e);}
      var added=0,skipped=0,updated=0,skippedIds=[];
      var ncDrivers=0,ncTotalCnt=0,ncTotalAmt=0;  // ★ 미계약건 집계 (v9.25 fix)

      Object.keys(drvMap).forEach(function(userId){
        var cleanId=userId.replace(/@df$/i,'').replace(/@.*$/,'').trim();
        var d=drivers.find(function(dr){
          var dId=(dr.userId||'').toLowerCase();
          return dId===userId.toLowerCase()||dId===cleanId.toLowerCase();
        });
        if(!d){skipped++;skippedIds.push(cleanId);return;}

        var dm=drvMap[userId];
        var tm=totalMap[userId]||totalMap[cleanId]||{};
        var freshAmt=tm.freshAmt||dm.freshAmt||0;
        var dmgAmt=tm.dmgAmt||0;
        var damt=dm.delAmt||0;
        var ramt=dm.retAmt||0;
        // ★ 미계약건: 엑셀 총금액 그대로 사용
        var nocontAmt=dm.nocontAmt||0;
        var nocontCnt=dm.nocontCnt||0;
        if(nocontAmt>0||nocontCnt>0){ncDrivers++;ncTotalCnt+=nocontCnt;ncTotalAmt+=nocontAmt;}  // ★ v9.25 fix

        // ★ 인센티브: 기사별 설정 기준 (Firebase에서 로드된 설정 사용)
        var fincVal=0;
        Object.keys(dm.routes).forEach(function(route){
          var rv=dm.routes[route];
          var s=_getIncSetting(d.name, route);
          if(s.on && s.rate>0) fincVal+=rv.cnt*s.rate;
        });

        // ★ 세금계산서 기준 금액 = 배송+반품 + 프레시백회수 + 프레시백인센 + 미계약 + 추가인센
        var incAmt=tm.incAmt||0; // ★ 추가인센티브(가중요인) — 엑셀 총괄에서 파싱
        var taxBase=damt+ramt+freshAmt+fincVal+nocontAmt+incAmt;
        var totalAmt=taxBase;
        var income=taxBase;
        // ★ 고용·산재 계산 (세금계산서 방식)
        var supplyAmt=Math.round(totalAmt/1.1);
        var expenseAmt=Math.round(supplyAmt*0.346);
        var monthlyWage=supplyAmt-expenseAmt;
        var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
        var workIns=Math.floor(monthlyWage*0.0088/10)*10;

        var routeDetails=Object.keys(dm.routes).map(function(r){
          var rv=dm.routes[r];
          var up=rv.unitPrc||0;
          return{
            route:r, cnt:rv.cnt, ret:rv.ret, unitPrice:up,
            amt:rv.delAmt||0,
            retAmt:rv.retAmt||0
          };
        });

        var existing=settlements.findIndex(function(s){return s.driver===d.name&&s.month===month;});
        var entry={
          driver:d.name, userId:cleanId, coupangId:userId,
          jobsub:d.jobsub||'쿠팡', month:month,
          dcnt:dm.dcnt, rcnt:dm.rcnt,
          damt:damt,
          ramt:ramt,
          fresh:freshAmt,
          finc:fincVal,               // ★ 프레시백 인센티브
          inc:incAmt,                 // ★ 추가인센티브(가중요인) — 엑셀 총괄 파싱값
          nocont:nocontAmt,           // ★ 미계약건 금액 (엑셀 자동)
          nocontCnt:nocontCnt,        // ★ 미계약 건수
          coupangTotal:tm.totalAmt||0, // ★ v9.25: 엑셀 정산총괄 금액(총합계) — 쿠팡 실제 지급액
          tax:0,
          totalAmt:totalAmt,          // ★ 공급대가 저장
          supplyAmt:supplyAmt,        // ★ 공급가액
          monthlyWage:monthlyWage,    // ★ 월보수액
          emp:empIns,                 // ★ 고용보험 (월보수액×0.8%, 80만미만 제외)
          work:workIns,               // ★ 산재보험 (월보수액×0.88%)
          eq:0, dmg:dmgAmt, adv:0,
          status:'정산예정',
          routeDetails:routeDetails,
          updatedAt:new Date().toISOString(),
          createdAt:new Date().toISOString()
        };
        if(existing>=0){
          // ★ v9.25: 기존 정산 완료/승인된 항목 재업로드 시 상태 보호
          //   → 금액·라우트 데이터만 갱신, status·taxSent·paidAt 등 보존
          var prev=settlements[existing];
          var protectedFields={};
          ['status','taxSent','taxSentAt','paidAt','fbId','createdAt','sharedAt'].forEach(function(k){
            if(prev[k]!==undefined) protectedFields[k]=prev[k];
          });
          // ★ v9.49: 수기 입력 필드 보호 (재업로드 시 초기화 방지)
          //   fresh(프레시백), dmg(분실/파손), adv(선지급), eq, etcPlus, etcMinus
          //   finc(프레시백 인센), nocont(미계약건) ← v9.49 추가
          ['fresh','dmg','adv','eq','etcPlus','etcMinus','finc','nocont'].forEach(function(k){
            if(prev[k]!==undefined && prev[k]!==0 && prev[k]!=='') protectedFields[k]=prev[k];
          });
          // ★ routeDetails: 건수/반품은 엑셀 최신값, unitPrice는 수동 편집값 보존
          var mergedRoutes=entry.routeDetails.map(function(newRd){
            var oldRd=(prev.routeDetails||[]).find(function(r){return r.route===newRd.route;});
            if(oldRd && oldRd.unitPrice && oldRd.unitPrice>0){
              return Object.assign({},newRd,{unitPrice:oldRd.unitPrice});
            }
            return newRd;
          });
          var updateData=Object.assign({},entry,{routeDetails:mergedRoutes});
          delete updateData.status;
          delete updateData.createdAt;
          updateData.updatedAt=new Date().toISOString();
          settlements[existing]=Object.assign(prev, updateData, protectedFields);
          settlements[existing].finc=entry.finc;
          updated++;
        }
        else{settlements.push(entry); added++;}
      });
      lss('settlements',settlements);
      // ★ Firebase에도 자동 저장 (다른 기기 동기화용)
      // ★ v9.25: undefined 필드 제거 후 저장 (sharedAt 등 없는 필드 Firebase 오류 차단)
      function _cleanUndef(obj){
        var clean={};
        Object.keys(obj).forEach(function(k){
          if(obj[k]!==undefined&&obj[k]!==null||k==='taxSent') clean[k]=obj[k]===undefined?false:obj[k];
          else if(obj[k]!==undefined) clean[k]=obj[k];
        });
        return clean;
      }
      var fbOk=0,fbFail=0;
      // ★ v9.25: lss → Firebase 완료 후 저장 (onSnapshot 경쟁 방지)
      // _cpPending 세팅 (캠프별 취합 UI용)
      var byCamp={};
      Object.keys(drvMap).forEach(function(uid){
        var dm=drvMap[uid];
        var cleanId=uid.replace(/@[a-z0-9]+$/i,'').trim();
        var matchedDrv=fbDrivers.find(function(fd){return fd.userId===cleanId;})||drivers.find(function(d){return(d.userId||'').replace(/@[a-z0-9]+$/i,'')===cleanId;});
        var camp='기타';
        if(matchedDrv&&matchedDrv.camp) camp=matchedDrv.camp;
        else{
          var firstRoute=Object.keys(dm.routes)[0]||'';
          var c2=getCampByRoute(firstRoute);
          if(c2) camp=c2;
        }
        dm.uid=cleanId;
        dm.drvName=matchedDrv?matchedDrv.name||'':'';
        if(!byCamp[camp])byCamp[camp]=[];
        byCamp[camp].push(dm);
      });
      window._cpPending={month:month,byCamp:byCamp,total:Object.keys(drvMap).length,
        skippedIds:skippedIds,campOrder:CAMP_ORDER};
      function _finalize(){
        lss('settlements',settlements);
        var protectedCount=0;
        settlements.forEach(function(x){if(x.month===month&&x.status==='완료')protectedCount++;});
        var ncMsg=ncDrivers?('\n💡 미계약: '+ncDrivers+'명 / '+ncTotalCnt+'건 / ₩'+ncTotalAmt.toLocaleString()):'';
        var skipMsg=skippedIds.length?('\n⚠️ 미매칭: '+skippedIds.slice(0,5).join(', ')+(skippedIds.length>5?'... 외'+(skippedIds.length-5)+'명':'')):'';
        var protMsg=protectedCount?('\n🔒 완료 보호: '+protectedCount+'건 (상태 유지)'):'';
        toast('✅ 쿠팡 엑셀 정산 완료: '+added+'건 등록 / '+updated+'건 갱신 / '+skipped+'건 미매칭'+protMsg+ncMsg+skipMsg);
        if(window._cpPending){renderCpPending();}else{SP('settle',null);}
      }
      if(FB&&_db){
        var promises=[];
        settlements.forEach(function(x){
          if(x.month!==month)return;
          var docId=x.fbId||x.driver+'_'+x.month;
          var cleanX=_cleanUndef(x);
          promises.push(_db.collection('settlements').doc(docId).set(cleanX)
            .then(function(){fbOk++;x.fbId=docId;})
            .catch(function(e){fbFail++;console.warn('FB 저장 실패:',x.driver,e.message);}));
        });
        Promise.all(promises).then(function(){
          if(fbFail>0)toast('⚠️ Firebase '+fbFail+'건 저장 실패 (로컬은 정상)');
          _finalize();
        }).catch(function(){_finalize();});
      } else {
        _finalize();
      }
    }catch(err){console.error(err);toast('❌ 파싱 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}
// _parseCoupangExcelInner 끝


</script>

<script>
// ══ 캠프별 취합 UI (parseCoupangExcel 이후 호출) ══
function renderCpPending(){
  var p=window._cpPending; if(!p) return;
  var camps=CAMP_ORDER.filter(function(camp){return p.byCamp[camp]&&p.byCamp[camp].length;});
  document.getElementById('page-title').textContent=p.month+' 쿠팡 정산 취합';
  var tr=document.getElementById('topbar-right');
  tr.innerHTML='';
  // 다시업로드 버튼 (물류앱 방식)
  var lbl=document.createElement('label');
  lbl.style.cssText='display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#f97316;color:#fff;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer';
  lbl.textContent='📂 다시 업로드';

function updCpAmt(i,route){
  var p=window._cpPending; if(!p||!window._cpCurCamp) return;
  var dm=p.byCamp[window._cpCurCamp][i]; if(!dm) return;
  var inp=document.getElementById('rp-'+i+'-'+route);
  if(!inp) return;
  var price=+inp.value||0;
  if(dm.routes[route]){dm.routes[route].unitPrc=price;dm.routes[route].delAmt=(dm.routes[route].cnt||0)*price;}
  dm.delAmt=0;
  Object.keys(dm.routes).forEach(function(r){dm.delAmt+=(dm.routes[r].delAmt||0);});
  var el=document.getElementById('cpa-'+i);
  if(el)el.textContent='₩'+(dm.delAmt+(dm.retAmt||0)+(dm.freshAmt||0)).toLocaleString();
}

function saveSingleCp(i){
  var p=window._cpPending; if(!p||!window._cpCurCamp) return;
  var dm=p.byCamp[window._cpCurCamp][i]; if(!dm) return;
  var name=(document.getElementById('cpn-'+i)||{value:''}).value.trim()||dm.drvName||'';
  _saveCpDriver(window._cpCurCamp,dm,name,p.month,function(){
    var row=document.getElementById('cpr-'+i);
    if(row){row.style.opacity='.4';row.style.pointerEvents='none';}
    toast('✅ '+(name||dm.uid)+' 저장');
  });
}

function saveCampCp(){
  var p=window._cpPending; if(!p||!window._cpCurCamp) return;
  var drivers=p.byCamp[window._cpCurCamp];
  var n=0,total=drivers.length;
  drivers.forEach(function(dm,i){
    var name=(document.getElementById('cpn-'+i)||{value:''}).value.trim()||dm.drvName||'';
    _saveCpDriver(window._cpCurCamp,dm,name,p.month,function(){
      n++;if(n===total)toast('✅ '+window._cpCurCamp.replace('캠프','')+' '+n+'명 저장');
    });
  });
}

function saveAllCp(){
  var p=window._cpPending; if(!p) return;
  var all=[],total=0;
  CAMP_ORDER.forEach(function(camp){
    if(p.byCamp[camp])p.byCamp[camp].forEach(function(dm,i){all.push({camp:camp,dm:dm,i:i});total++;});
  });
  var n=0;
  all.forEach(function(item){
    var name=(document.getElementById('cpn-'+item.i)||{value:''}).value.trim()||item.dm.drvName||'';
    _saveCpDriver(item.camp,item.dm,name,p.month,function(){
      n++;if(n===total){toast('✅ 전체 '+n+'명 저장 완료!');window._cpPending=null;goPage('settlements');}
    });
  });
}

function cancelCp(){window._cpPending=null;goPage('settlements');}

function _saveCpDriver(camp,dm,name,month,cb){
  if(!window._db){if(cb)cb();return;}
  var uid=dm.uid;
  var damt=dm.delAmt||0,ramt=dm.retAmt||0,fresh=dm.freshAmt||0,finc=Math.round((dm.dcnt||0)*25);
  var income=damt+ramt+fresh+finc+(dm.nocontAmt||0);
  var sa=Math.round(income/1.1),wage=Math.round(sa*(1-0.346));
  var emp=wage>=800000?Math.floor(wage*0.008/10)*10:0,work=Math.floor(wage*0.0088/10)*10;
  var routeDetails=[];
  Object.keys(dm.routes).forEach(function(r){
    routeDetails.push({route:r,cnt:dm.routes[r].cnt||0,ret:dm.routes[r].ret||0,
      unitPrice:dm.routes[r].unitPrc||0,amt:dm.routes[r].delAmt||0});
  });
  var dealerId=window._CU?window._CU.dealerId:'';
  var payload={dealerId:dealerId,driverName:name,driver:uid,camp:camp,month:month,jobsub:'쿠팡',
    dcnt:dm.dcnt||0,rcnt:dm.rcnt||0,damt:damt,ramt:ramt,fresh:fresh,finc:finc,inc:0,
    nocont:dm.nocontAmt||0,nocontCnt:dm.nocontCnt||0,etcPlus:0,etcMinus:0,dmg:0,adv:0,
    income:income,supplyAmt:sa,monthlyWage:wage,emp:emp,work:work,deduct:emp+work,net:income-(emp+work),
    routeDetails:routeDetails,status:'정산예정'};
  window._db.collection('settlements')
    .where('dealerId','==',dealerId).where('driver','==',uid).where('month','==',month).get()
    .then(function(snap){
      var prom=snap.empty
        ?window._db.collection('settlements').add(Object.assign({},payload,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}))
        :snap.docs[0].ref.update(Object.assign({},payload,{updatedAt:firebase.firestore.FieldValue.serverTimestamp()}));
      return prom;
    }).then(function(){
      if(name){
        return window._db.collection('drivers')
          .where('userId','==',uid).where('dealerId','==',dealerId).get()
          .then(function(drSnap){
            return drSnap.empty
              ?window._db.collection('drivers').add({name:name,userId:uid,dealerId:dealerId,
                  camp:camp,jobsub:'쿠팡',is_active:true,status:'재직',
                  createdAt:firebase.firestore.FieldValue.serverTimestamp()})
              :drSnap.docs[0].ref.update({name:name});
          });
      }
    }).then(function(){if(cb)cb();}).catch(function(e){toast('❌ '+e.message);});
}

  if(x&&x.camp){var ca=(x.camp||'').replace('캠프','');if(CAMP_LIST_S.indexOf(ca)>=0)return ca;}
  var CAMP_NAMES={'101':'부산1','215':'부산1','117':'부산2','213':'대구2B','214':'대구2','406':'진주M'};

function _saveSE(id){
  var driver=document.getElementById('se-driver').value.trim();
  var month=document.getElementById('se-month').value.trim();
  var dcnt=+document.getElementById('se-dcnt').value||0;
  var status=document.getElementById('se-status').value;
  if(!driver||!month){toast('❌ 기사명·정산월 필수');return;}
  var payload={driver:driver,month:month,dcnt:dcnt,status:status,dealerId:_CU.dealerId};
  var p=id
    ?_db.collection('settlements').doc(id).update(payload)
    :_db.collection('settlements').add(Object.assign(payload,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
  p.then(function(){toast('💾 저장 완료');closeMoById('mo-se');_reloadSettlePage();})
   .catch(function(e){toast('❌ '+e.message);});
}

function recalcAllSettlements(){
  if(!_settleCache||!_settleCache.length){toast('❌ 데이터 없음');return;}
  if(!confirm('⚡ 전체 정산 재계산 - 총 '+_settleCache.length+'건 RPRICE 기준 재계산 후 저장합니다. 계속하시겠습니까?'))return;
  var changed=0;var promises=[];
  _settleCache.forEach(function(x){
    var r=calcNet(x);
    promises.push(_db.collection('settlements').doc(x.id).update({income:r.income,net:r.net,emp:r.emp,work:r.work}).then(function(){changed++;}).catch(function(){}));
  });
  Promise.all(promises).then(function(){toast('✅ 재계산 완료 ('+changed+'건)');_reloadSettlePage();});
}

  if(!_settleCache||!_settleCache.length){toast('❌ 데이터 없음');return;}
  var seen={};var dups=[];
  _settleCache.forEach(function(x){var k=(x.driver||'')+'__'+(x.month||'');if(seen[k])dups.push(x);else seen[k]=true;});
  if(!dups.length){toast('✅ 중복 없음 ('+_settleCache.length+'건 검사 완료)');return;}
  toast('⚠️ 중복 '+dups.length+'건: '+dups.slice(0,5).map(function(x){return x.driver+' '+x.month;}).join(', ')+(dups.length>5?'...':''));
}

  if(!_settleCache){toast('❌ 데이터가 로드되지 않았습니다');return;}
  var targets=_settleCache.filter(function(x){return x.month===month;});

  var promises=targets.map(function(x){
    return _db.collection('settlements').doc(x.id).delete().catch(function(){});

  Promise.all(promises).then(function(){

var _drvCache=null,_drvCampFilter='all';
function pageDrivers(){
  document.getElementById('page-title').textContent='기사 관리';
  var tr=document.getElementById('topbar-right');tr.innerHTML='';
  var btn=document.createElement('button');btn.className='btn btn-blue btn-sm';btn.textContent='+ 기사 추가';btn.onclick=openAddDriver;tr.appendChild(btn);
  var c=document.getElementById('content');

  c.innerHTML='<div class="loading">로딩 중...</div>';
  if(_drvCache){_renderDrivers(_drvCache,c);return;}
  _db.collection('drivers').where('dealerId','==',_CU.dealerId).get().then(function(snap){
    _drvCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    _renderDrivers(_drvCache,c);
  }).catch(function(e){c.innerHTML='<div class="empty">⚠️ '+e.message+'</div>';});
}
function _getDrvCamp(d){
  if(!d)return '';
  if(d.camp)return d.camp.replace('캠프','');
  var r=d.route||'';
  var ORDER=['부산1','부산2','부산3','대구2','진주M'];
  for(var i=0;i<ORDER.length;i++){if(r.indexOf(ORDER[i])>=0)return ORDER[i];}
  if(r==='213')return '대구2B';if(r.indexOf('대구')>=0)return '대구2';if(r.indexOf('진주')>=0)return '진주M';
  return '';
}
function filterDrvCamp(cc){_drvCampFilter=cc;var el=document.getElementById('content');if(el&&_drvCache)_renderDrivers(_drvCache,el);}
function _renderDrivers(drivers,c){
  var CAMPS=['부산1','부산2','부산3','대구2','대구2B','진주M'];
  var CCOL={'부산1':'#3B82F6','부산2':'#8B5CF6','부산3':'#10B981','대구2':'#F59E0B','대구2B':'#FB923C','진주M':'#EF4444'};
  var act=drivers.filter(function(d){return d.is_active!==false&&d.status!=='탈퇴'&&d.status!=='거부';});
  var cntMap={};CAMPS.forEach(function(cc){cntMap[cc]=0;});
  act.forEach(function(d){var cc=_getDrvCamp(d);if(cntMap[cc]!==undefined)cntMap[cc]++;});
  var flt=_drvCampFilter;
  var filtered=flt==='all'?act:act.filter(function(d){return _getDrvCamp(d)===flt;});
  // 캠프 필터 탭
  var tabs='<div style="display:flex;gap:5px;padding:8px 0 12px;flex-wrap:wrap;align-items:center">'
    +'<span style="font-size:10px;color:var(--text3);font-weight:700;margin-right:4px">🏕️ 캠프</span>'
    +'<button onclick="filterDrvCamp(\'all\')" style="padding:5px 12px;border-radius:100px;border:1.5px solid '+(flt==='all'?'var(--blue)':'var(--border)')+';background:'+(flt==='all'?'var(--blue)':'var(--bg)')+';color:'+(flt==='all'?'#fff':'var(--text2)')+';font-size:12px;font-weight:700;cursor:pointer">전체 ('+act.length+')</button>'
    +CAMPS.map(function(cc){var on=cc===flt;var col=CCOL[cc]||'var(--blue)';var cnt=cntMap[cc]||0;
      return '<button onclick="filterDrvCamp(\''+cc+'\')" style="padding:5px 12px;border-radius:100px;border:1.5px solid '+(on?col:'var(--border)')+';background:'+(on?col:'var(--bg)')+';color:'+(on?'#fff':'var(--text2)')+';font-size:12px;font-weight:700;cursor:pointer">'+cc+' ('+cnt+')</button>';}).join('')
    +'</div>';
  if(!filtered.length){c.innerHTML=tabs+'<div class="empty"><div class="empty-icon">👤</div>해당 캠프 기사가 없습니다</div>';return;}
  // 캠프별 그룹 테이블
  var byCamp={};
  filtered.forEach(function(d){var camp=_getDrvCamp(d)||'미지정';if(!byCamp[camp])byCamp[camp]=[];byCamp[camp].push(d);});
  var campOrder=flt==='all'?[].concat(CAMPS,['미지정','기타']):[flt];
  var html=tabs+campOrder.filter(function(cc){return byCamp[cc]&&byCamp[cc].length;}).map(function(camp){
    var col=CCOL[camp]||'#94A3B8';
    return '<div class="card" style="margin-bottom:10px"><div class="card-header"><div class="card-title" style="color:'+col+'">🏕 '+camp+' ('+byCamp[camp].length+'명)</div></div>'
      +'<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>성함</th><th>쿠팡 ID</th><th>상태</th><th></th></tr></thead><tbody>'
      +byCamp[camp].map(function(d){
        var actBadge=d.is_active!==false?'b-green':'b-red';
        var actTxt=d.is_active!==false?'재직':'퇴직';
        return '<tr><td><strong>'+esc(d.name||'')+'</strong></td>'
          +'<td style="font-family:monospace;font-size:11px;color:var(--text3)">'+esc(d.userId||'')+'</td>'
          +'<td><span class="badge '+actBadge+'">'+actTxt+'</span></td>'
          +'<td><button class="btn btn-sm" onclick="editDriver(\''+d.id+'\')">수정</button></td></tr>';
      }).join('')
      +'</tbody></table></div></div>';
  }).join('');
  c.innerHTML=html;
}

function _renderPrices(c){

    html+='<div class="empty"><div class="empty-icon">📋</div><div style="font-size:13px;font-weight:700;margin-bottom:6px">등록된 단가가 없습니다</div>'
      +'<div style="font-size:11px;color:var(--text3)">메인앱(엠비티아이 물류관리)에서 단가를 먼저 설정해주세요</div></div>';
    c.innerHTML=html;return;
  }
  var campOrderLocal=['부산1캠프','부산2캠프','부산3캠프','대구2캠프','대구2B캠프','진주M캠프','기타'];
  var CCOL={'부산1캠프':'#3B82F6','부산2캠프':'#8B5CF6','부산3캠프':'#10B981','대구2캠프':'#F59E0B','대구2B캠프':'#FB923C','진주M캠프':'#EF4444','기타':'#94A3B8'};
  campOrderLocal.forEach(function(camp){
    if(!groups[camp]||!groups[camp].length)return;
    var col=CCOL[camp]||'#94A3B8';
    html+='<div class="card" style="margin-bottom:10px"><div class="card-header"><div class="card-title" style="color:'+col+'">🏕 '+camp.replace('캠프','')+'</div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px">'
      +groups[camp].map(function(r){
        return '<div style="display:flex;flex-direction:column;align-items:center;background:var(--bg3);border-radius:8px;padding:10px 4px">'
          +'<div style="font-size:11px;font-weight:700;color:'+col+';margin-bottom:5px">'+r+'</div>'
          +'<input type="number" id="rp-'+r+'" value="'+(RPRICE[r]||0)+'" min="0" step="10"'
          +' style="width:80px;padding:5px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;text-align:center;background:var(--bg);color:var(--text)">'
          +'<div style="font-size:9px;color:var(--text3);margin-top:3px">원/건</div></div>';
      }).join('')
      +'</div></div>';
  });
  c.innerHTML=html;
}

  document.getElementById('page-title').textContent='통계';
  document.getElementById('topbar-right').innerHTML='';
  var c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';
  if(!_db)return;
  // 캐시 재활용
  if(_settleCache){_renderStats(_settleCache,c);return;}
  _db.collection('settlements').where('dealerId','==',_CU.dealerId).get().then(function(snap){
    if(snap.empty){c.innerHTML='<div class="empty"><div class="empty-icon">📈</div>데이터 없음</div>';return;}
    _settleCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    _settleCache.sort(function(a,b){return (b.month||'').localeCompare(a.month||'');});
    _renderStats(_settleCache,c);
  }).catch(function(e){c.innerHTML='<div class="empty">⚠️ '+e.message+'</div>';});
}
function _renderStats(settles,c){
  var CAMPS=['부산1','부산2','부산3','대구2','대구2B','진주M'];
  var CCOL={'부산1':'#3B82F6','부산2':'#8B5CF6','부산3':'#10B981','대구2':'#F59E0B','대구2B':'#FB923C','진주M':'#EF4444'};
  var byMonth={},byDriver={},byCamp={};
  settles.forEach(function(s){
    var m=s.month||'';var r=calcNet(s);
    var camp=_getSettleCamp(s)||'기타';
    if(!byMonth[m])byMonth[m]={cnt:0,income:0,net:0,dcnt:0};
    byMonth[m].cnt++;byMonth[m].income+=r.income||0;byMonth[m].net+=r.net||0;byMonth[m].dcnt+=(+s.dcnt||0);
    var n=s.driverName||s.driver||'';
    if(!byDriver[n])byDriver[n]={net:0,dcnt:0,cnt:0,camp:camp};
    byDriver[n].net+=r.net||0;byDriver[n].dcnt+=(+s.dcnt||0);byDriver[n].cnt++;
    if(!byCamp[camp])byCamp[camp]={net:0,dcnt:0,cnt:0,income:0};
    byCamp[camp].net+=r.net||0;byCamp[camp].dcnt+=(+s.dcnt||0);byCamp[camp].cnt++;byCamp[camp].income+=r.income||0;
  });
  var months=Object.keys(byMonth).sort().reverse().slice(0,12);
  var drivers=Object.keys(byDriver).sort(function(a,b){return byDriver[b].net-byDriver[a].net;}).slice(0,20);
  var campRows=[].concat(CAMPS,['기타']).filter(function(cc){return byCamp[cc];}).map(function(cc){
    var col=CCOL[cc]||'#94A3B8';
    return '<tr><td><strong style="color:'+col+'">'+cc+'</strong></td><td>'+byCamp[cc].cnt+'건</td><td>'+fmt(byCamp[cc].dcnt)+'건</td>'
      +'<td style="color:var(--green)">₩'+fmt(byCamp[cc].income)+'</td>'
      +'<td style="font-weight:800;color:var(--purple)">₩'+fmt(byCamp[cc].net)+'</td></tr>';
  }).join('');
  c.innerHTML='<div style="display:grid;gap:14px">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
    +'<div class="card"><div class="card-header"><div class="card-title">📅 월별 현황</div></div>'
    +'<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>월</th><th>정산</th><th>배송건</th><th>수익합계</th><th>실지급</th></tr></thead><tbody>'
    +months.map(function(m){return '<tr><td><strong>'+m+'</strong></td><td>'+byMonth[m].cnt+'건</td><td>'+fmt(byMonth[m].dcnt)+'건</td>'
      +'<td style="color:#0F6E56">₩'+fmt(byMonth[m].income)+'</td>'
      +'<td style="font-weight:800;color:#185FA5">₩'+fmt(byMonth[m].net)+'</td></tr>';}).join('')
    +'</tbody></table></div></div>'
    +'<div class="card"><div class="card-header"><div class="card-title">🏕️ 캠프별 현황</div></div>'
    +'<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>캠프</th><th>정산수</th><th>배송건</th><th>수익합계</th><th>실지급</th></tr></thead><tbody>'
    +campRows
    +'</tbody></table></div></div>'
    +'</div>'
    +'<div class="card"><div class="card-header"><div class="card-title">🏆 기사별 순위</div></div>'
    +'<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>#</th><th>기사</th><th>캠프</th><th>정산수</th><th>배송건</th><th>실지급 합계</th></tr></thead><tbody>'
    +drivers.map(function(n,i){
      var cc=byDriver[n].camp||'';var col=CCOL[cc]||'#94a3b8';
      return '<tr><td style="font-weight:800;color:'+(i<3?'#f59e0b':'var(--text3)')+'">'+(i+1)+'</td>'
        +'<td><strong>'+esc(n)+'</strong></td>'
        +'<td><span style="background:'+col+'22;color:'+col+';border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">'+cc+'</span></td>'
        +'<td>'+byDriver[n].cnt+'건</td>'
        +'<td>'+fmt(byDriver[n].dcnt)+'건</td>'
        +'<td style="font-weight:800;color:#185FA5">₩'+fmt(byDriver[n].net)+'</td></tr>';}).join('')
    +'</tbody></table></div></div>'
    +'</div>';
}

// ══ 초기화 ══
document.addEventListener('click',function(e){
  var sb=document.getElementById('sidebar');
  if(sb&&sb.classList.contains('open')&&!sb.contains(e.target))sb.classList.remove('open');
});
window.addEventListener('load',function(){setTimeout(initFirebase,200);});
</script>
