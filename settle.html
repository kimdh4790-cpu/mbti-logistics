<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#185FA5">
<title>LogiNet — 정산관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --brand:#185FA5;--brand-l:#E6F1FB;--brand-d:#0C447C;
  --green:#0F6E56;--green-l:#E1F5EE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f0efe9;
  --text:#2C2C2A;--text2:#5F5E5A;--text3:#888780;
  --border:rgba(0,0,0,.1);--r:10px
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Malgun Gothic',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px}
body.dark{--bg:#1a1a18;--bg2:#242422;--bg3:#1e1e1c;--text:#e8e6e0;--text2:#a0a09a;--text3:#666663;--border:rgba(255,255,255,.12)}
#app{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.main{margin-left:200px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.sl{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sl-icon{width:30px;height:30px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sl-text{font-size:13px;font-weight:800;color:var(--brand)}
.sl-ver{font-size:9px;color:var(--purple);font-weight:600;display:block}
.snav{flex:1;padding:6px;overflow-y:auto}
.ns{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.05em;padding:6px 8px 2px}
.ni{padding:7px 9px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:12px;margin-bottom:1px;display:flex;align-items:center;gap:6px}
.ni:hover{background:var(--bg3)}
.ni.on{background:var(--brand-l);color:var(--brand);font-weight:600}
.sb-bot{padding:9px 12px;border-top:1px solid var(--border)}
.topbar{height:46px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:8px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:7px}
.content{padding:14px;flex:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.btn{padding:6px 12px;border-radius:var(--r);font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--bg3)}
.btn-blue{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-orange{background:#f97316;color:#fff;border-color:#f97316}
.btn-sm{padding:4px 9px;font-size:11px}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px}
.b-green{background:var(--green-l);color:var(--green)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-blue{background:var(--brand-l);color:var(--brand)}
.b-red{background:var(--red-l);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
th{background:var(--bg3);font-weight:600;color:var(--text2);font-size:11px}
tr:hover>td{background:var(--bg3)}
.tbl-wrap{overflow-x:auto}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:14px}
.mo.show{display:flex}
.md{background:var(--bg2);border-radius:12px;padding:20px;width:560px;max-width:100%;max-height:92vh;overflow-y:auto}
.mdt{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.mdf{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--border)}
.fg{display:flex;flex-direction:column;margin-bottom:10px}
.fg label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fg input,.fg select{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text);width:100%}
.fg input:focus,.fg select:focus{border-color:var(--brand);outline:none}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--text3)}
/* 로그인 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{background:var(--bg2);border-radius:20px;padding:32px 28px;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
/* 모바일 */
.ham{display:none;width:32px;height:32px;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;border:1px solid var(--border);font-size:16px}
@media(max-width:640px){
  .sidebar{transform:translateX(-100%);transition:.25s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .ham{display:flex!important}
  .gr{grid-template-columns:1fr}
}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:600;opacity:0;transition:.22s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<script>
(function(){
  document.addEventListener("contextmenu",function(e){e.preventDefault();});
  document.addEventListener("keydown",function(e){
    if(e.keyCode===123){e.preventDefault();return false;}
    if(e.ctrlKey&&e.shiftKey&&(e.keyCode===73||e.keyCode===74||e.keyCode===67)){e.preventDefault();return false;}
    if(e.ctrlKey&&!e.shiftKey&&e.keyCode===85){e.preventDefault();return false;}
    if(e.ctrlKey&&e.keyCode===83){e.preventDefault();return false;}
  });
})();
</script>

<!-- 로그인 -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:56px;height:56px;border-radius:14px;background:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px">💰</div>
      <div style="font-size:22px;font-weight:900;color:var(--brand)">LogiNet</div>
      <div style="font-size:12px;color:var(--text3);margin-top:3px">물류 정산관리 v2.0</div>
    </div>
    <div class="fg"><label>이메일</label><input id="l-email" type="email" placeholder="example@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>

<!-- 앱 -->
<div id="app" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sl">
      <div class="sl-icon">💰</div>
      <div><div class="sl-text">LogiNet</div><span class="sl-ver">v2.0 · 엠비티아이</span></div>
    </div>

</div>

<script>
// ██ 유틸 ██
function fmt(n){return Math.round(n||0).toLocaleString('ko-KR');}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(m){var t=document.getElementById('toast');if(!t)return;t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3000);}
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('ln_dark',document.body.classList.contains('dark')?1:0);}
function curMonth(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function stripDf(uid){return(uid||'').trim().replace(/@[a-z0-9]+$/i,'').trim();}
if(localStorage.getItem('ln_dark')==='1') document.body.classList.add('dark');

// ██ 물류앱 이식: RPRICE, CAMP_NAMES, DEFAULT_UNIT_PRICES, G_PRICES ██
var DEFAULT_UNIT_PRICES = {
  coupang_normal:  1100,   // 쿠팡 일반배송 (VAT 포함)
  coupang_fresh:   1300,   // 쿠팡 신선배송 (VAT 포함)
  coupang_return:   900,   // 쿠팡 반품 (VAT 포함)
  cj_normal:       1050,   // CJ대한통운 (VAT 포함)
  kurly_normal:    1200,   // 마켓컬리 (VAT 포함)
  water_normal:     800,   // 생수배송 (VAT 포함)
  freshbag_inc:      25,   // 프레시백 인센티브 (건당)
  yong_del:         900,   // 용차 배송단가
  yong_ret:         900    // 용차 반품단가
};
// 런타임 단가 (Firestore 로드 후 업데이트)
var G_PRICES = Object.assign({}, DEFAULT_UNIT_PRICES);

var RPRICE = {
  '101C':700,'101D':730,
  '109A':1050,'109B':1100,'109C':1060,'109D':1050,
  '213A':1080,'213B':1080,'213C':1000,'213D':1080,
  '215A':720,'215B':720,'215C':720,'215D':720,
  '508B':950,
  '608B':920,'608C':920,'608D':930,
  '612A':890,'612B':860,'612C':880,'612D':950,
  '613A':880,'613B':900,'613C':880,'613D':910,
  '614A':930,'614B':910,'614C':930,'614D':920,
  '619A':930,'619B':930,'619C':860,'619D':880,
  '812A':960,'812B':930,'812C':930,'812D':800
};
// 캠프명 매핑 (라우트 숫자코드 → 캠프명)
var CAMP_NAMES={
  '101':'부산1캠프','215':'부산1캠프',
  '812':'부산2캠프',
  '508':'부산3캠프',
  '109':'대구2캠프','213':'대구2B캠프',
  '608':'진주M캠프','612':'진주M캠프','613':'진주M캠프',
  '614':'진주M캠프','619':'진주M캠프'
};
// 캠프 표시 순서
var CAMP_ORDER=['부산1캠프','부산2캠프','부산3캠프','대구2캠프','대구2B캠프','진주M캠프'];
// 캠프 색상
var CAMP_COLOR={
  '부산1캠프':'#3B82F6','부산2캠프':'#8B5CF6','부산3캠프':'#10B981',
  '대구2캠프':'#F59E0B','대구2B캠프':'#FB923C','진주M캠프':'#EF4444'
};
// ★ v9.25: 캠프 GPS 좌표 (출근 체크인 300m 거리 검증용)
//    관리자가 [기사관리 > 캠프 GPS 등록] 메뉴에서 수정 가능 → localStorage 'campGps'
var CAMP_GPS_DEFAULT={
  '부산1캠프':{lat:35.1941,lng:129.1198,addr:'부산광역시 해운대구 반여로 20'},
  '부산2캠프':{lat:35.1252,lng:128.9641,addr:'부산광역시 사상구 강변대로456번길 15-36'},
  '부산3캠프':{lat:35.0659,lng:129.0100,addr:'부산광역시 서구 원양로 203'},
  '대구2캠프':{lat:35.8183,lng:128.7203,addr:'경상북도 경산시 삼성현로 156'},          // 109노선
  '대구2B캠프':{lat:35.8762,lng:128.6794,addr:'대구광역시 동구 동촌로 374'},            // 213노선
  '진주M캠프':{lat:35.1190,lng:128.0989,addr:'경남 진주시 정촌면 화개천로 12'}
};

function getCampByRoute(route){
  if(!route) return '';
  var code=route.replace(/[A-Da-d]$/,'').slice(0,3);
  return (CAMP_NAMES&&CAMP_NAMES[code])||'';
}

// _getIncSetting 간단 대체 (settle.html용)
function _getIncSetting(driver,route){return{on:true,rate:G_PRICES&&G_PRICES.freshbag_inc||25};}

// ██ calcNet ██
function calcNet(x){
  var dcnt=+x.dcnt||+x.delivCount||0;
  var rcnt=+x.rcnt||+x.retCount||0;
  // 용차: 건수×단가, 쿠팡: 라우트별 RPRICE × 건수로 강제 재계산 (v9.25)
  var isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  var yDel=+x.yongDel||(G_PRICES.yong_del||900); var yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  // ★ v9.25: 쿠팡 기사 정산은 무조건 RPRICE × 건수로 재계산
  //          엑셀의 회사 단가/저장된 x.damt 흔적 차단 → routeDetails 우선
  //          정책: 엑셀 단가 = 회사 단가(매출), 기사 단가 = 앱 관리자 RPRICE
  var _rdList = x.routeDetails || [];
  var _damtRP = _rdList.reduce(function(s,rd){return s+(rd.cnt||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0);},0);
  var _ramtRP = _rdList.reduce(function(s,rd){return s+(rd.ret||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0);},0);
  var damt=isYong ? dcnt*yDel : (_rdList.length ? _damtRP : (+x.damt||+x.delivAmt||+x.base||0));
  var ramt=isYong ? rcnt*yRet : (_rdList.length ? _ramtRP : (+x.ramt||+x.retAmt||0));
  var fresh=+x.fresh||+x.freshAmt||0;
  // ★ 프레시백 인센 계산 (v9.25 방어 로직)
  // 1순위: 저장된 x.finc 값이 있으면 jobsub과 무관하게 그대로 사용 (데이터 정합성 우선)
  // 2순위: x.finc 없으면 쿠팡은 건수×25원, 그 외(용차/컬리/CJ)는 0
  var isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  var hasStoredFinc=(x.finc!==undefined&&x.finc!==null&&x.finc!=='');
  var finc = hasStoredFinc
    ? +x.finc
    : (isCoupang ? Math.round(dcnt*(G_PRICES.freshbag_inc||25)) : 0);
  var inc=+x.inc||0;
  var nocont = +x.nocont || 0;  // ★ 미계약건 (+수익)
  var etcPlus  = +x.etcPlus  || 0;  // ★ 기타(+)
  var etcMinus = +x.etcMinus || 0;  // ★ 기타(-)
  // ★ v9.25: 기타(+)만 세금계산서(income)에 포함 → 고용·산재 기준
  //           기타(-)는 세금계산서 제외, 실지급에서만 차감 (공제 항목)
  var income=damt+ramt+fresh+finc+inc+nocont+etcPlus;
  // 세금계산서 기준 금액 = etcPlus 포함, etcMinus 제외
  var totalAmt = income;
  var supplyAmt = Math.round(totalAmt / 1.1);
  var expenseAmt = Math.round(supplyAmt * 0.346);
  var monthlyWage = supplyAmt - expenseAmt;
  var empCalc  = monthlyWage >= 800000 ? Math.floor(monthlyWage * 0.008  / 10) * 10 : 0;
  var workCalc = Math.floor(monthlyWage * 0.0088 / 10) * 10;
  var TAX_RATE = +x.taxRate || 0.033;
  var tax  = +x.tax  || (x.taxFixed ? +x.taxFixed : Math.round(income * TAX_RATE));
  var emp  = (x.emp !== undefined && x.emp !== null && x.emp !== '' && +x.emp > 0) ? +x.emp : empCalc;
  // ★ v9.25: 산재 저장값이 계산값의 50% 미만이면 비정상 → 자동 재계산
  var workStored = (x.work !== undefined && x.work !== null && x.work !== '' && +x.work > 0) ? +x.work : 0;
  var work = (workStored && workCalc > 0 && workStored >= workCalc * 0.5) ? workStored : workCalc;
  var eq   = +x.eq  || 0;
  var dmg  = +x.dmg || +x.damage || 0;
  var adv  = +x.adv || +x.advance || 0;
  // ★ 기타(-) → 공제 항목으로 실지급에서 차감
  // ★ 원천세(tax)는 회사 납부 → 기사 실지급 공제 제외
  var deduct = emp + work + eq + dmg + adv + etcMinus;
  var net = totalAmt - deduct;
  return{damt,ramt,fresh,finc,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}

// ██ parseCoupangExcel v3.0 (자동화 완전판) ██
var _CAMP_MAP={
  '부산1':'부산1캠프','부산2':'부산2캠프','부산3':'부산3캠프',
  '대구2':'대구2캠프','대구2B':'대구2B캠프',
  'M_진주1':'진주M캠프','진주M':'진주M캠프','M_진주':'진주M캠프'
};
function _normCamp(raw){
  if(!raw)return '기타';
  var t=String(raw).trim();
  if(_CAMP_MAP[t])return _CAMP_MAP[t];
  for(var k in _CAMP_MAP){if(t.indexOf(k)>=0)return _CAMP_MAP[k];}
  return t;
}
function _extractMonthFromFilename(filename){
  // "2026년_04월_정산서" 또는 "2026년 04월" 형식
  var m=filename.match(/(\d{4})년[_\s]*0*(\d{1,2})월/);
  if(m)return m[1]+'-'+String(+m[2]).padStart(2,'0');
  // YYYY-MM 형식
  var m2=filename.match(/(\d{4})[-_](0[1-9]|1[0-2])/);
  if(m2)return m2[1]+'-'+m2[2];
  return null;
}
function parseCoupangExcel(inp){
  var file=inp.files[0]; if(!file)return;
  if(typeof XLSX==='undefined'){toast('⚠️ 엑셀 라이브러리 로딩 중...'); return;}
  inp.value='';
  // 파일명에서 월 추출
  var month=_extractMonthFromFilename(file.name);
  if(!month){
    var _now=new Date();
    var _prev=new Date(_now.getFullYear(),_now.getMonth()-1,1);
    month=_prev.getFullYear()+'-'+String(_prev.getMonth()+1).padStart(2,'0');
  }
  toast('📂 '+month+' 정산 업로드 중...');
  // Firebase 기사 로드 후 파싱
  var fbPromise=(window._db&&window._CU)
    ?window._db.collection('drivers').where('dealerId','==',window._CU.dealerId).get()
      .then(function(snap){var arr=[];snap.forEach(function(d){arr.push(Object.assign({id:d.id},d.data()));});return arr;})
      .catch(function(){return[];})
    :Promise.resolve([]);
  fbPromise.then(function(fbDrivers){
    _parseCoupangExcelInner(file,fbDrivers,month);
  });
}
function _parseCoupangExcelInner(file,fbDrivers,month){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var rawSheet=wb.Sheets['정산Raw']||wb.Sheets[wb.SheetNames[2]];
      var totalSheet=wb.Sheets['정산총괄']||wb.Sheets[wb.SheetNames[1]];
      var dmgSheet=wb.Sheets['분실파손List']||wb.Sheets[wb.SheetNames[3]];
      if(!rawSheet){toast('❌ 정산Raw 시트를 찾을 수 없습니다');return;}
      var raw=XLSX.utils.sheet_to_json(rawSheet,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
      var total=totalSheet?XLSX.utils.sheet_to_json(totalSheet,{header:1}):[];
      var dmgRows=dmgSheet?XLSX.utils.sheet_to_json(dmgSheet,{header:1}):[];
      if(raw.length<2){toast('❌ 데이터가 없습니다');return;}

      // ── 헤더 탐지
      var rawHdrIdx=0;
      for(var h=0;h<Math.min(raw.length,5);h++){
        if(raw[h]&&(String(raw[h][0]||'').includes('구분')||String(raw[h][1]||'').toLowerCase()==='id')){rawHdrIdx=h;break;}
      }
      var rh=raw[rawHdrIdx]||[];
      var rColDiv=0,rColID=1,rColRoute=2,rColDate=3,rColCamp=4,
          rColDcnt=7,rColRcnt=8,rColUnit=9,rColAddInc=10,rColFresh=14,rColTotal=13;
      for(var c2=0;c2<rh.length;c2++){
        var cn=String(rh[c2]||'').replace(/\s+/g,'');
        if(cn==='구분')rColDiv=c2;
        else if(cn==='ID'||cn==='id')rColID=c2;
        else if(cn.includes('Route')||cn.includes('라우트'))rColRoute=c2;
        else if(cn.includes('캠프'))rColCamp=c2;
        else if(cn.includes('배송일자')||cn.includes('작업일'))rColDate=c2;
        else if(cn.includes('배송건수')||cn.includes('배송(parcel)'))rColDcnt=c2;
        else if(cn.includes('반품')&&(cn.includes('운송장')||cn.includes('parcel')))rColRcnt=c2;
        else if(cn.includes('단가')&&!cn.includes('금액')&&!cn.includes('기본')&&!cn.includes('인센'))rColUnit=c2;
        else if(cn.includes('추가인센')&&!cn.includes('금액'))rColAddInc=c2;
        else if(cn.includes('프레시백')||cn.includes('프레쉬백'))rColFresh=c2;
        else if(cn==='총금액')rColTotal=c2;
      }

      // ── Raw 시트 파싱 → drvMap 구성
      var drvMap={};  // cleanId → {camp, routes, dcnt, rcnt, ...}
      for(var i=rawHdrIdx+1;i<raw.length;i++){
        var row=raw[i];if(!row[rColID])continue;
        var userId=String(row[rColID]).trim();
        if(!userId||userId.toLowerCase()==='id')continue;
        // 한글/특수어 포함 ID는 기사 ID가 아님 (에코백회수 등) → 미계약 처리
        if(/[ㄱ-ㅎ가-힣]/.test(userId)){isNocont=true;}
        var cleanId=userId.replace(/@[a-z0-9@._-]+$/i,'').trim();  // @df 등 제거
        // 유효하지 않은 ID 스킵 (한글 포함, 공백, 특수단어)
        if(!cleanId||/[ㄱ-ㅎ가-힣]/.test(cleanId)||cleanId.length>30)continue;
        var divVal=String(row[rColDiv]||'').trim();
        var isNocont=divVal.includes('미계약')||divVal.includes('에코백')||divVal.includes('프레시백')||divVal.includes('소급');
        var route=String(row[rColRoute]||'').trim();
        var campRaw=String(row[rColCamp]||'').trim();
        var campName=_normCamp(campRaw);
        var dcnt=Number(row[rColDcnt])||0;
        var rcnt=Number(row[rColRcnt])||0;
        var unitPrc=Number(row[rColUnit])||0;
        var addInc=Number(row[rColAddInc])||0;
        var freshInc=Number(row[rColFresh])||0;
        var rowTotal=Number(row[rColTotal])||0;

        if(!drvMap[cleanId])drvMap[cleanId]={
          cleanId:cleanId,camp:campName,dcnt:0,rcnt:0,
          delAmt:0,retAmt:0,freshAmt:0,addIncAmt:0,
          nocontCnt:0,nocontAmt:0,routes:{}
        };
        // 캠프: 첫 번째로 발견된 캠프 우선
        if(campName&&campName!=='기타'&&drvMap[cleanId].camp==='기타')
          drvMap[cleanId].camp=campName;

        if(isNocont){
          drvMap[cleanId].nocontCnt+=dcnt+rcnt;
          drvMap[cleanId].nocontAmt+=rowTotal;
          continue;
        }
        var delAmt=rowTotal>0?rowTotal:(dcnt*unitPrc);
        var retAmt=rcnt*unitPrc;
        drvMap[cleanId].dcnt+=dcnt;
        drvMap[cleanId].rcnt+=rcnt;
        drvMap[cleanId].delAmt+=delAmt;
        drvMap[cleanId].retAmt+=retAmt;
        drvMap[cleanId].freshAmt+=freshInc;
        drvMap[cleanId].addIncAmt+=addInc;
        // 날짜 추출
        var rowDateRaw=String(row[rColDate]||'').trim();
        var rowDate=rowDateRaw?rowDateRaw.slice(0,10):'';  // yyyy-mm-dd

        if(route){
          if(!drvMap[cleanId].routes[route])
            drvMap[cleanId].routes[route]={cnt:0,ret:0,unitPrc:0,delAmt:0,retAmt:0,addInc:0};
          drvMap[cleanId].routes[route].cnt+=dcnt;
          drvMap[cleanId].routes[route].ret+=rcnt;
          drvMap[cleanId].routes[route].delAmt+=delAmt;
          drvMap[cleanId].routes[route].retAmt+=retAmt;
          drvMap[cleanId].routes[route].addInc+=addInc;
          if(unitPrc>0)drvMap[cleanId].routes[route].unitPrc=unitPrc;

          // 시즌 기간별 분리 집계
          if(rowDate&&SEASON_PRICES.length){
            SEASON_PRICES.forEach(function(sp){
              if(rowDate>=sp.start&&rowDate<=sp.end){
                var sk='__season__'+sp.id+'__'+route;
                if(!drvMap[cleanId].routes[sk])
                  drvMap[cleanId].routes[sk]={cnt:0,ret:0,unitPrc:sp.prices[route]||unitPrc,
                    delAmt:0,retAmt:0,addInc:0,
                    _season:true,_seasonId:sp.id,_seasonLabel:sp.label,
                    _start:sp.start,_end:sp.end,_route:route};
                var sprice=sp.prices[route]||unitPrc;
                drvMap[cleanId].routes[sk].cnt+=dcnt;
                drvMap[cleanId].routes[sk].ret+=rcnt;
                drvMap[cleanId].routes[sk].delAmt+=(dcnt*sprice);
                drvMap[cleanId].routes[sk].retAmt+=(rcnt*sprice);
                drvMap[cleanId].routes[sk].addInc+=addInc;
              }
            });
          }
        }
      }

      // ── 정산총괄 파싱 → totalMap (프레시백 회수금액, 분실파손)
      var totalMap={};
      if(total.length>2){
        var tHdrIdx=-1;
        for(var th=0;th<Math.min(total.length,10);th++){
          var hr=total[th];
          if(hr&&(String(hr[3]||'').toLowerCase()==='id'||String(hr[0]||'').toLowerCase()==='no')){tHdrIdx=th;break;}
        }
        if(tHdrIdx>=0){
          var thRow=total[tHdrIdx];
          var tID=3,tFresh=8,tInc=9,tDmg=10,tTotal=11;
          for(var tc=0;tc<thRow.length;tc++){
            var tcn=String(thRow[tc]||'').replace(/\s+/g,'');
            if(tcn==='ID')tID=tc;
            else if(tcn.includes('프레시백')||tcn.includes('프레쉬백'))tFresh=tc;
            else if(tcn.includes('가중요인')||tcn.includes('추가인센'))tInc=tc;
            else if(tcn.includes('분실파손'))tDmg=tc;
            else if(tcn.includes('총합계')||tcn.includes('TOTAL'))tTotal=tc;
          }
          for(var tj=tHdrIdx+1;tj<total.length;tj++){
            var tr=total[tj];if(!tr||!tr[tID])continue;
            var tid=String(tr[tID]).replace(/@[a-z0-9@._-]+$/i,'').trim();
            if(!tid||tid==='ID')continue;
            totalMap[tid]={
              freshAmt:Number(tr[tFresh])||0,
              incAmt:Number(tr[tInc])||0,
              dmgAmt:Number(tr[tDmg])||0,
              totalAmt:Number(tr[tTotal])||0
            };
          }
        }
      }

      // ── 분실파손List 파싱 → dmgMap
      var dmgMap={};
      if(dmgRows.length>1){
        // 헤더: 날짜,캠프,ID,이름,유형,상세,개수,차감금액,...
        var dh=dmgRows[0]||[];
        var dID=2,dName=3,dAmt=7;
        for(var dc2=0;dc2<dh.length;dc2++){
          var dcn=String(dh[dc2]||'').replace(/\s+/g,'');
          if(dcn==='ID')dID=dc2;
          else if(dcn==='이름'||dcn==='성명')dName=dc2;
          else if(dcn.includes('차감금액')||dcn.includes('금액'))dAmt=dc2;
        }
        for(var di=1;di<dmgRows.length;di++){
          var dr=dmgRows[di];if(!dr||!dr[dID])continue;
          var did=String(dr[dID]).replace(/@[a-z0-9@._-]+$/i,'').trim();
          var dname=String(dr[dName]||'').trim();
          var damt=Number(dr[dAmt])||0;
          if(!dmgMap[did])dmgMap[did]={dmg:0,name:''};
          dmgMap[did].dmg+=damt;
          if(dname&&!dmgMap[did].name)dmgMap[did].name=dname;
        }
      }

      // ── 신규 기사/라우트 자동 등록 준비
      var allCleanIds=Object.keys(drvMap);
      var newRoutes=[];  // 단가표에 없는 신규 라우트
      allCleanIds.forEach(function(cid){
        Object.keys(drvMap[cid].routes).forEach(function(r){
          if(!RPRICE[r])newRoutes.push({route:r,camp:drvMap[cid].camp});
        });
      });

      // ── 신규 라우트 → RPRICE + Firebase 등록
      var routePromises=[];
      if(newRoutes.length&&_db&&_CU){
        var newPriceObj={};
        newRoutes.forEach(function(nr){RPRICE[nr.route]=0;newPriceObj[nr.route]=0;});
        if(Object.keys(newPriceObj).length){
          var dpId=(_CU.dealerId||'shared')+'_routePrices';
          routePromises.push(
            _db.collection('settings').doc(dpId).set(RPRICE,{merge:true}).catch(function(){})
          );
        }
      }

      // ── 신규 기사 → drivers 컬렉션 자동 등록
      var driverPromises=[];
      var nowDrvIds=fbDrivers.map(function(d){return(d.userId||'').trim();});
      allCleanIds.forEach(function(cid){
        if(nowDrvIds.indexOf(cid)<0&&_db&&_CU){
          var dinfo=drvMap[cid];
          var dmgInfo=dmgMap[cid]||{};
          var dname=dmgInfo.name||'';  // 분실파손 리스트에서 이름 추출
          driverPromises.push(
            _db.collection('drivers').add({
              userId:cid,name:dname,
              camp:dinfo.camp||'',
              dealerId:_CU.dealerId,
              jobsub:'쿠팡',is_active:true,status:'재직',
              createdAt:firebase.firestore.FieldValue.serverTimestamp()
            }).then(function(ref){
              fbDrivers.push({id:ref.id,userId:cid,name:dname,camp:dinfo.camp||''});
            }).catch(function(){})
          );
        }
      });

      // ── 등록 후 정산서 생성
      // routeCampMap 구성 및 Firebase 저장
      // routeCampMap 구성 및 Firebase 저장
      var rcMap={};
      allCleanIds.forEach(function(cid){
        var dm=drvMap[cid];
        var campFull=dm.camp||'';
        if(!campFull||campFull==='기타')return;
        Object.keys(dm.routes).forEach(function(r){
          rcMap[r]=campFull;
        });
      });
      if(Object.keys(rcMap).length&&_db&&_CU){
        Object.assign(_routeCampMap,rcMap);
        _db.collection('settings').doc(_CU.dealerId+'_routeCampMap').set(_routeCampMap,{merge:false}).catch(function(){});
      }
      Promise.all(routePromises.concat(driverPromises)).then(function(){
        _drvCache=null;  // 기사 캐시 초기화 (재로드)
        var settlements=ls('settlements');
        var added=0,updated=0;
        allCleanIds.forEach(function(cleanId){
          var dm=drvMap[cleanId];
          var tm=totalMap[cleanId]||{};
          var dmgInfo=dmgMap[cleanId]||{};
          var drvObj=fbDrivers.find(function(d){return(d.userId||'').trim()===cleanId;})||{name:'',camp:dm.camp||''};
          var drvName=drvObj.name||cleanId;  // 이름 없으면 ID로 표시
          // 분실파손
          var dmgAmt=dmgInfo.dmg||tm.dmgAmt||0;
          // 프레시백 회수금액
          var freshAmt=tm.freshAmt||dm.freshAmt||0;
          // 추가 인센티브(가중요인)
          var addIncAmt=tm.incAmt||dm.addIncAmt||0;
          // 프레시백 인센티브 (기사별 설정)
          var fincVal=0;
          Object.keys(dm.routes).forEach(function(route){
            var rv=dm.routes[route];
            var s=_getIncSetting(cleanId,route);
            if(s.on&&s.rate>0)fincVal+=rv.cnt*s.rate;
          });
          // routeDetails (엑셀 단가 기준 - 첫 업로드)
          // 시즌 라우트와 일반 라우트 분리
            var allRouteKeys=Object.keys(dm.routes);
            var seasonKeys=allRouteKeys.filter(function(r){return r.startsWith('__season__');});
            var normalKeys=allRouteKeys.filter(function(r){return !r.startsWith('__season__');});
            // 시즌 상세 (기간별 소계)
            var seasonDetails=seasonKeys.map(function(sk){
              var sv=dm.routes[sk];
              return{seasonId:sv._seasonId,label:sv._seasonLabel,
                start:sv._start,end:sv._end,route:sv._route,
                cnt:sv.cnt,ret:sv.ret,unitPrice:sv.unitPrc||0,
                delAmt:sv.delAmt,retAmt:sv.retAmt};
            });
            var routeDetails=normalKeys.map(function(r){
            var rv=dm.routes[r];
            return{route:r,cnt:rv.cnt,ret:rv.ret,
              unitPrice:rv.unitPrc||0,  // 엑셀 단가 (쿠팡→대리점)
              excelUnitPrice:rv.unitPrc||0,  // 원본 보존
              amt:rv.delAmt||0,retAmt:rv.retAmt||0,addInc:rv.addInc||0};
          });
          // 세금계산서 작성금액 (엑셀 단가 기준 초기값)
          var damt=dm.delAmt||0;
          var ramt=dm.retAmt||0;
          var taxBase=damt+ramt+freshAmt+fincVal+addIncAmt+(dm.nocontAmt||0);
          // 공제 계산
          var supplyAmt=Math.round(taxBase/1.1);
          var monthlyWage=Math.round(supplyAmt*0.654);
          var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
          var workIns=Math.floor(monthlyWage*0.0088/10)*10;

          var coupangRawTotal=tm.totalAmt||(Math.round((dm.delAmt||0)+(dm.retAmt||0)+(freshAmt||0)+(addIncAmt||0)+(dm.nocontAmt||0)-(dmgAmt||0)));
          var entry={
            driver:drvName, userId:cleanId, dealerId:_CU.dealerId,
            camp:dm.camp||drvObj.camp||'',
            coupangTotal:coupangRawTotal,  // 쿠팡→대리점 원본금액(VAT제외)
            seasonDetails:seasonDetails,  // 재계약 시즌 기간별 상세
            jobsub:'쿠팡', month:month,
            dcnt:dm.dcnt, rcnt:dm.rcnt,
            damt:damt, ramt:ramt,
            fresh:freshAmt,        // 프레시백 회수금액
            finc:fincVal,          // 프레시백 인센티브
            inc:addIncAmt,         // 추가인센티브(가중요인)
            nocont:dm.nocontAmt||0,nocontCnt:dm.nocontCnt||0,
            dmg:dmgAmt,
            etcPlus:0,etcMinus:0,
            totalAmt:taxBase,
            supplyAmt:supplyAmt,
            monthlyWage:monthlyWage,
            emp:empIns, work:workIns,
            status:'정산예정',
            routeDetails:routeDetails,
            updatedAt:new Date().toISOString(),
            createdAt:new Date().toISOString()
          };
          var existing=settlements.findIndex(function(s){return s.userId===cleanId&&s.month===month;});
          if(existing>=0){
            var prev=settlements[existing];
            // 수동 편집값 보호
            ['fresh','dmg','etcPlus','etcMinus','finc'].forEach(function(k){
              if(prev[k]!==undefined&&prev[k]!==0)entry[k]=prev[k];
            });
            ['status','taxSent','taxSentAt','paidAt','fbId','createdAt'].forEach(function(k){
              if(prev[k]!==undefined)entry[k]=prev[k];
            });
            // routeDetails: 건수는 최신, unitPrice는 수동 편집 보존
            entry.routeDetails=routeDetails.map(function(newRd){
              var oldRd=(prev.routeDetails||[]).find(function(r){return r.route===newRd.route;});
              if(oldRd&&oldRd.unitPrice&&oldRd.unitPrice>0)
                return Object.assign({},newRd,{unitPrice:oldRd.unitPrice});
              return newRd;
            });
            settlements[existing]=Object.assign({},prev,entry);
            updated++;
          } else {
            settlements.push(entry);added++;
          }
        });
        lss('settlements',settlements);
        // Firebase 저장
        if(_db){
          var fbPromises=[];
          settlements.filter(function(x){return x.month===month&&x.dealerId===_CU.dealerId;}).forEach(function(x){
            var docId=x.fbId||(x.userId+'_'+x.month);
            var clean=Object.assign({},x);
            Object.keys(clean).forEach(function(k){if(clean[k]===undefined)delete clean[k];});
            fbPromises.push(_db.collection('settlements').doc(docId).set(clean)
              .then(function(){x.fbId=docId;}).catch(function(){}));
          });
          Promise.all(fbPromises).then(function(){
            _settleCache=null;
            var newCount=driverPromises.length;
            var routeCount=newRoutes.length;
            SP('settlements',null);
            // 전월 대비 변동 기사 분석
            _db.collection('settlements')
              .where('dealerId','==',_CU.dealerId)
              .get().then(function(allSnap){
                var prevMonth='';
                // 직전 정산월 찾기
                var months=[];
                allSnap.forEach(function(d){var m=d.data().month||'';if(m&&m!==month&&months.indexOf(m)<0)months.push(m);});
                months.sort();prevMonth=months[months.length-1]||'';
                var prevIds=new Set();var curIds=new Set();
                allSnap.forEach(function(d){
                  var dt=d.data();
                  if(dt.month===prevMonth)prevIds.add(dt.userId||dt.driver||'');
                  if(dt.month===month)curIds.add(dt.userId||dt.driver||'');
                });
                var newDrivers=[];var leftDrivers=[];
                curIds.forEach(function(id){if(!prevIds.has(id)&&id)newDrivers.push(id);});
                prevIds.forEach(function(id){if(!curIds.has(id)&&id)leftDrivers.push(id);});
                // 결과 팝업
                _showUploadResult(month,added,updated,newCount,routeCount,newDrivers,leftDrivers,prevMonth);
              }).catch(function(){
                toast('✅ '+month+' 정산 업로드 완료! 등록:'+added+'건 / 갱신:'+updated+'건');
              });
          }).catch(function(){_settleCache=null;SP('settlements',null);});
        } else {
          _settleCache=null;SP('settlements',null);
        }
      });
    }catch(err){console.error(err);toast('❌ 파싱 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

</script>

function updCpAmt(i,route){
  var p=window._cpPending; if(!p||!window._cpCurCamp) return;
  var dm=p.byCamp[window._cpCurCamp][i]; if(!dm) return;
  var inp=document.getElementById('rp-'+i+'-'+route);
  if(!inp) return;
  var price=+inp.value||0;
  if(dm.routes[route]){dm.routes[route].unitPrc=price;dm.routes[route].delAmt=(dm.routes[route].cnt||0)*price;}
  dm.delAmt=0;
  Object.keys(dm.routes).forEach(function(r){dm.delAmt+=(dm.routes[r].delAmt||0);});
  var el=document.getElementById('cpa-'+i);
  if(el)el.textContent='₩'+(dm.delAmt+(dm.retAmt||0)+(dm.freshAmt||0)).toLocaleString();
}

function saveSingleCp(i){
  var p=window._cpPending; if(!p||!window._cpCurCamp) return;
  var dm=p.byCamp[window._cpCurCamp][i]; if(!dm) return;
  var name=(document.getElementById('cpn-'+i)||{value:''}).value.trim()||dm.drvName||'';
  _saveCpDriver(window._cpCurCamp,dm,name,p.month,function(){
    var row=document.getElementById('cpr-'+i);
    if(row){row.style.opacity='.4';row.style.pointerEvents='none';}
    toast('✅ '+(name||dm.uid)+' 저장');
  });
}

function saveCampCp(){
  var p=window._cpPending; if(!p||!window._cpCurCamp) return;
  var drivers=p.byCamp[window._cpCurCamp];
  var n=0,total=drivers.length;
  drivers.forEach(function(dm,i){
    var name=(document.getElementById('cpn-'+i)||{value:''}).value.trim()||dm.drvName||'';
    _saveCpDriver(window._cpCurCamp,dm,name,p.month,function(){
      n++;if(n===total)toast('✅ '+window._cpCurCamp.replace('캠프','')+' '+n+'명 저장');
    });
  });
}

function saveAllCp(){
  var p=window._cpPending; if(!p) return;
  var all=[],total=0;
  Object.keys(_campColorCache).forEach(function(camp){
    if(p.byCamp[camp])p.byCamp[camp].forEach(function(dm,i){all.push({camp:camp,dm:dm,i:i});total++;});
  });
  var n=0;
  all.forEach(function(item){
    var name=(document.getElementById('cpn-'+item.i)||{value:''}).value.trim()||item.dm.drvName||'';
    _saveCpDriver(item.camp,item.dm,name,p.month,function(){
      n++;if(n===total){toast('✅ 전체 '+n+'명 저장 완료!');window._cpPending=null;goPage('settlements');}
    });
  });
}

function _saveCpDriver(camp,dm,name,month,cb){
  if(!window._db){if(cb)cb();return;}
  var uid=dm.uid;
  var damt=dm.delAmt||0,ramt=dm.retAmt||0,fresh=dm.freshAmt||0,finc=Math.round((dm.dcnt||0)*25);
  var income=damt+ramt+fresh+finc+(dm.nocontAmt||0);
  var sa=Math.round(income/1.1),wage=Math.round(sa*(1-0.346));
  var emp=wage>=800000?Math.floor(wage*0.008/10)*10:0,work=Math.floor(wage*0.0088/10)*10;
  var routeDetails=[];
  Object.keys(dm.routes).forEach(function(r){
    routeDetails.push({route:r,cnt:dm.routes[r].cnt||0,ret:dm.routes[r].ret||0,
      unitPrice:dm.routes[r].unitPrc||0,amt:dm.routes[r].delAmt||0});
  });
  var dealerId=window._CU?window._CU.dealerId:'';
  var payload={dealerId:dealerId,driverName:name,driver:uid,camp:camp,month:month,jobsub:'쿠팡',
    dcnt:dm.dcnt||0,rcnt:dm.rcnt||0,damt:damt,ramt:ramt,fresh:fresh,finc:finc,inc:0,
    nocont:dm.nocontAmt||0,nocontCnt:dm.nocontCnt||0,etcPlus:0,etcMinus:0,dmg:0,adv:0,
    income:income,supplyAmt:sa,monthlyWage:wage,emp:emp,work:work,deduct:emp+work,net:income-(emp+work),
    routeDetails:routeDetails,status:'정산예정'};
  window._db.collection('settlements')
    .where('dealerId','==',dealerId).where('driver','==',uid).where('month','==',month).get()
    .then(function(snap){
      var prom=snap.empty
        ?window._db.collection('settlements').add(Object.assign({},payload,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}))
        :snap.docs[0].ref.update(Object.assign({},payload,{updatedAt:firebase.firestore.FieldValue.serverTimestamp()}));
      return prom;
    }).then(function(){
      if(name){
        return window._db.collection('drivers')
          .where('userId','==',uid).where('dealerId','==',dealerId).get()
          .then(function(drSnap){
            return drSnap.empty
              ?window._db.collection('drivers').add({name:name,userId:uid,dealerId:dealerId,
                  camp:camp,jobsub:'쿠팡',is_active:true,status:'재직',
                  createdAt:firebase.firestore.FieldValue.serverTimestamp()})
              :drSnap.docs[0].ref.update({name:name});
          });
      }
    }).then(function(){if(cb)cb();}).catch(function(e){toast('❌ '+e.message);});
}

function checkDealerDataIntegrity(docs, dealerId, collectionName){

var _campColorCache={};
// 실제 데이터에서 캠프 목록 추출
function _dynCampList(items,keyFn){
  var seen={},list=[];
  (items||[]).forEach(function(x){var c=keyFn(x);if(c&&c!=='기타'&&!seen[c]){seen[c]=1;list.push(c);}});
  return list.sort();
}
var CAMP_LIST_S=[];  // 동적 (pageSettlements 시 갱신)
var CAMP_COL_S={};   // 동적
function _getSettleCamp(x){
  if(x&&x.camp){var ca=(x.camp||'').replace('캠프','').trim();if(ca)return ca;}
  if(x&&x.userId){
    var drv=(_drvCache||[]).find(function(d){return d.userId===x.userId;});
    if(drv&&drv.camp)return drv.camp.replace('캠프','').trim();
  }
  var rds=(x&&x.routeDetails)||[];
  if(rds.length){var r=rds[0].route||'';var c2=_getRouteCamp(r);if(c2&&c2!=='기타')return c2.replace('캠프','').trim();}
  return '기타';
}
function _buildDynCamps(settles){
  // 정산 데이터에서 캠프 목록 동적 구성
  var seen={};
  (settles||[]).forEach(function(x){
    var cc=_getSettleCamp(x);
    if(cc&&cc!=='기타')seen[cc]=1;
  });
  CAMP_LIST_S=Object.keys(seen).sort();
  CAMP_COL_S={};
  CAMP_LIST_S.forEach(function(cc){CAMP_COL_S[cc]=_campColor(cc);});
}

// 특정 날짜에 적용될 시즌 단가 반환
function _getSeasonPrice(route,date){
  if(!date||!SEASON_PRICES.length)return null;
  var d=date.slice(0,10);
  for(var i=0;i<SEASON_PRICES.length;i++){
    var p=SEASON_PRICES[i];
    if(d>=p.start&&d<=p.end&&p.prices&&p.prices[route]!==undefined)
      return p.prices[route];
  }
  return null;
}
// 정산월이 시즌 기간과 겹치는지 확인
function _getOverlappingSeasons(month){
  if(!month||!SEASON_PRICES.length)return [];
  var ym=month.slice(0,7);  // 2026-05
  return SEASON_PRICES.filter(function(p){
    return p.start.slice(0,7)===ym||p.end.slice(0,7)===ym
      ||p.start.slice(0,7)===String(+ym.slice(0,4))+(+ym.slice(5,7)-1<10?'-0':'-')+(+ym.slice(5,7)-1)
      ||p.end.slice(0,7)===String(+ym.slice(0,4))+(+ym.slice(5,7)+1<10?'-0':'-')+(+ym.slice(5,7)+1);
  });
}

// ══ 승인 처리 ══
function appSettle(id){
  if(!confirm('정산을 승인 처리하시겠습니까?'))return;
  _db.collection('settlements').doc(id).update({status:'완료',paidAt:new Date().toISOString().slice(0,10)})
    .then(function(){toast('✅ 정산 승인 완료');_reloadSettlePage();})
    .catch(function(e){toast('❌ '+e.message);});
}
// ══ 정산서 작성/편집 모달 ══
function _settleRow(x){
  if(!x)return '';
  var r=calcNet(x);
  var net=r.net||0;
  var ct=x.coupangTotal||(((x.damt||0)+(x.ramt||0)+(x.fresh||0)+(x.inc||0)+(x.nocont||0)))||0;
  var vatIncome=ct?Math.round(ct*1.1):Math.round((r.income||0)*1.1);
  var campCC=_getSettleCamp(x)||'기타';
  var col=_campColor(campCC)||'var(--purple)';
  var sent=x.taxSent;
  var statusBadge='<span class="badge '+(sent?'b-green':'b-wait')+'">'+(sent?'전달완료':'미전달')+'</span>';
  var docId=x.id||x.fbId||'';
  var drvName=esc(x.driver||x.userId||'');
  return '<tr>'
    +'<td><strong>'+drvName+'</strong>'
    +(x.userId&&x.userId!==(x.driver||'')?'<br><small style="color:var(--text3);font-family:monospace;font-size:10px">'+esc(x.userId)+'</small>':'')
    +'</td>'
    +'<td>'+_makeCampBadge(campCC)+'</td>'
    +'<td>'+esc(x.month||'')+'</td>'
    +'<td style="text-align:right;color:var(--green)">₩'+fmt(vatIncome)+'</td>'
    +'<td style="text-align:right;color:var(--red)">-₩'+fmt((r.emp||0)+(r.work||0))+'</td>'
    +'<td style="text-align:right;font-weight:800;color:var(--purple)">₩'+fmt(net)+'</td>'
    +'<td>'+statusBadge+'</td>'
    +'<td style="white-space:nowrap">'
      +'<button class="btn btn-sm btn-blue" onclick="openSE(this.dataset.id)" data-id="'+docId+'" style="margin-right:2px">수정</button>'
      +'<button class="btn btn-sm" onclick="openTaxInvoice(this.dataset.id)" data-id="'+docId+'" style="background:#15803d;color:#fff;border:none;font-size:10px;margin-right:2px">🧾</button>'
      +'<button class="btn btn-sm" onclick="sendOne(this.dataset.id)" data-id="'+docId+'" style="background:#059669;color:#fff;border:none;font-size:10px">📤</button>'
    +'</td>'
    +'</tr>';
}
function sendOne(id){
  if(!id||id==='undefined'){toast('❌ ID 없음');return;}
  if(!_db)return;
  _db.collection('settlements').doc(id).update({taxSent:true,taxSentAt:new Date().toISOString()})
    .then(function(){
      var x=(_settleCache||[]).find(function(s){return s.id===id||s.fbId===id;});
      if(x){x.taxSent=true;}
      toast('✅ 전달완료 처리');
      // 해당 행의 상태 배지 갱신
      var tr=document.querySelector('[data-id="'+id+'"]');
      if(tr){
        var badge=tr.closest('tr').querySelector('.badge');
        if(badge){badge.className='badge b-green';badge.textContent='전달완료';}
      }
    }).catch(function(e){toast('❌ '+e.message);});
}

function openSE(id){
  if(!id||id==='undefined'){_showSEModal(null);return;}
  if(!_db||!_CU){toast('❌ 로그인 필요');return;}
  // 캐시에서 먼저 찾기
  var cached=(_settleCache||[]).find(function(x){
    return x.id===id||x.fbId===id||(x.userId+'_'+x.month)===id;
  });
  if(cached){_showSEModal(cached);return;}
  // Firebase에서 조회
  _db.collection('settlements').doc(id).get()
    .then(function(snap){
      if(!snap.exists){
        // docId 형식으로도 시도 (userId_month)
        toast('❌ 정산서를 찾을 수 없습니다');return;
      }
      var data=Object.assign({id:snap.id},snap.data());
      _showSEModal(data);
    }).catch(function(e){toast('❌ '+e.message);});
}

function updSECalc(){
  // 라우트별 재계산
  var rdinps=document.querySelectorAll('.se-rd-inp');
  var totalDamt=0,totalRamt=0;
  var byIdx={};
  rdinps.forEach(function(inp){
    var idx=+inp.dataset.rdidx;var field=inp.dataset.field;var val=+inp.value||0;
    if(!byIdx[idx])byIdx[idx]={cnt:0,ret:0,price:0};
    byIdx[idx][field]=val;
  });
  Object.keys(byIdx).forEach(function(idx){
    var d=byIdx[idx];
    var dAmt=d.cnt*d.price;var rAmt=d.ret*d.price;
    totalDamt+=dAmt;totalRamt+=rAmt;
    var da=document.getElementById('se-rd-damt-'+idx);var ra=document.getElementById('se-rd-ramt-'+idx);var sb=document.getElementById('se-rd-sub-'+idx);
    if(da)da.textContent='₩'+fmt(dAmt);if(ra)ra.textContent='₩'+fmt(rAmt);if(sb)sb.textContent='₩'+fmt(dAmt+rAmt);
  });
  // 항목별 합산
  function gv(id){var el=document.getElementById(id);return el?+el.value||0:0;}
  var fresh=gv('se-fresh'),finc=gv('se-finc'),nocont=gv('se-nocont');
  var dmg=gv('se-dmg'),etcP=gv('se-etc-plus'),etcM=gv('se-etc-minus');
  var taxBase=totalDamt+totalRamt+fresh+finc+nocont+etcP-etcM;
  var supplyAmt=Math.round(taxBase/1.1);
  var vatAmt=taxBase-supplyAmt;
  var monthlyWage=Math.round(supplyAmt*0.654);
  var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
  var workIns=Math.floor(monthlyWage*0.0088/10)*10;
  var deduct=empIns+workIns+dmg;
  var net=taxBase-deduct;
  // 요약 카드 갱신
  var sumEl=document.getElementById('se-summary');
  if(sumEl){
    sumEl.innerHTML='<div style="text-align:center;padding:12px 8px;border-right:1px solid var(--border)">'
      +'<div style="font-size:9px;color:var(--text3);margin-bottom:2px">세금계산서 합계</div>'
      +'<div style="font-size:15px;font-weight:800;color:var(--green)">₩'+fmt(taxBase)+'</div>'
      +'<div style="font-size:9px;color:var(--text3)">공급가 ₩'+fmt(supplyAmt)+' + VAT ₩'+fmt(vatAmt)+'</div>'
      +'</div>'
      +'<div style="text-align:center;padding:12px 8px;border-right:1px solid var(--border)">'
      +'<div style="font-size:9px;color:var(--text3);margin-bottom:2px">공제 합계</div>'
      +'<div style="font-size:15px;font-weight:800;color:var(--red)">-₩'+fmt(deduct)+'</div>'
      +'<div style="font-size:9px;color:var(--text3)">고용+산재+파손</div>'
      +'</div>'

function _saveSECurrent(){

  var etcPlus=gv('se-etc-plus'),etcMinus=gv('se-etc-minus');
  var dcnt=gv('se-dcnt'),rcnt=gv('se-rcnt'),finc=gv('se-finc');
  var status=(document.getElementById('se-status')||{value:'정산예정'}).value;
  // 기존 정산서에서 routeDetails 가져와서 재계산
  var cached=id?(_settleCache||[]).find(function(x){return x.id===id||x.fbId===id;}):null;
  var rds=cached?cached.routeDetails||[]:[];
  var newDamt=0,newRamt=0;
  rds.forEach(function(rd){
    var price=RPRICE[rd.route]>0?RPRICE[rd.route]:(rd.unitPrice||0);
    newDamt+=(rd.cnt||0)*price;
    newRamt+=(rd.ret||0)*price;
  });
  if(!newDamt&&cached)newDamt=cached.damt||0;
  if(!newRamt&&cached)newRamt=cached.ramt||0;
  // 프레시백 인센 재계산
  if(!finc&&rds.length){
    rds.forEach(function(rd){
      var s2=_getIncSetting(cached&&cached.userId||driver,rd.route);
      if(s2.on&&s2.rate>0)finc+=(rd.cnt||0)*s2.rate;
    });
  }
  var nocont=cached?cached.nocont||0:0;
  var taxBase=newDamt+newRamt+fresh+finc+inc+nocont+etcPlus-etcMinus;
  var supplyAmt=Math.round(taxBase/1.1);
  var monthlyWage=Math.round(supplyAmt*0.654);
  var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
  var workIns=Math.floor(monthlyWage*0.0088/10)*10;

  var bizName=(document.getElementById('se-bizname')||{value:''}).value.trim();
  var bizAddr=(document.getElementById('se-bizaddr')||{value:''}).value.trim();
  var payload={
    driver:driver,userId:cached?cached.userId||driver:driver,
    month:month,dcnt:dcnt,rcnt:rcnt,
    damt:newDamt,ramt:newRamt,
    fresh:fresh,finc:finc,inc:inc,
    etcPlus:etcPlus,etcMinus:etcMinus,
    dmg:dmg,nocont:nocont,
    totalAmt:taxBase,supplyAmt:supplyAmt,monthlyWage:monthlyWage,
    emp:empIns,work:workIns,
    status:status,dealerId:_CU.dealerId,
    camp:cached?cached.camp||'':'',
    updatedAt:new Date().toISOString()
  };
  if(bizNum)payload.bizNum=bizNum;
  if(bizName)payload.bizName=bizName;
  if(bizAddr)payload.bizAddr=bizAddr;
  if(rds.length)payload.routeDetails=rds;
  var btn=document.querySelector('#mo-se .btn-blue');
  if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  var p;
  if(id){
    p=_db.collection('settlements').doc(id).update(payload);
  } else {
    payload.createdAt=new Date().toISOString();
    p=_db.collection('settlements').add(payload);
  }
  p.then(function(ref){
    if(ref&&ref.id){
      payload.id=ref.id;
      if(_settleCache)_settleCache.push(payload);
    } else if(cached){
      Object.assign(cached,payload);
    }
    toast('✅ 저장 완료');
    var mo=document.getElementById('mo-se');if(mo)mo.remove();
    _settleCache=null;_reloadSettlePage();
  }).catch(function(e){
    toast('❌ '+e.message);

  });
}

function recalcAllSettlements(){
  if(!_settleCache||!_settleCache.length){toast('❌ 정산 데이터 없음');return;}
  var unset=Object.keys(RPRICE).length===0;
  if(unset&&!confirm('⚠️ 단가표가 비어있습니다.\n단가표 설정 후 재계산하면 기사 지급액이 계산됩니다.\n\n계속 진행하시겠습니까?'))return;
  if(!unset&&!confirm('⚡ 전체 정산 재계산\n\n총 '+_settleCache.length+'건을 단가표(RPRICE) 기준으로 재계산합니다.\n\n※ 라우트 단가가 0원인 경우 엑셀 원본 금액이 유지됩니다.\n\n계속하시겠습니까?'))return;
  var changed=0;var promises=[];
  _settleCache.forEach(function(x){
    if(!x.id)return;
    // routeDetails 기준 재계산
    var rds=x.routeDetails||[];
    var newDamt=0,newRamt=0;
    // 시즌 단가 적용 여부 확인 (정산월 기준)
    var seasonPeriods=_getOverlappingSeasons(x.month||'');
    var newRds=rds.map(function(rd){
      var rprice=RPRICE[rd.route]||0;
      // 시즌 단가 우선 적용 (겹치는 기간의 단가)
      if(seasonPeriods.length){
        for(var si=0;si<seasonPeriods.length;si++){
          if(seasonPeriods[si].prices&&seasonPeriods[si].prices[rd.route]!==undefined){
            rprice=seasonPeriods[si].prices[rd.route];break;
          }
        }
      }
      var usePrice=rprice>0?rprice:(rd.excelUnitPrice||rd.unitPrice||0);
      var dAmt=(rd.cnt||0)*usePrice;
      var rAmt=(rd.ret||0)*usePrice;
      newDamt+=dAmt;newRamt+=rAmt;
      return Object.assign({},rd,{unitPrice:usePrice,amt:dAmt,retAmt:rAmt,isSeason:seasonPeriods.length>0});
    });
    // 인센 재계산 (기사별 설정)
    var fincVal=0;
    rds.forEach(function(rd){
      var s=_getIncSetting(x.userId||x.driver,rd.route);
      if(s.on&&s.rate>0)fincVal+=(rd.cnt||0)*s.rate;
    });
    var fresh=x.fresh||0;
    var addInc=x.inc||0;
    var nocont=x.nocont||0;
    var dmg=x.dmg||0;
    var etcPlus=x.etcPlus||0;
    var etcMinus=x.etcMinus||0;
    // 세금계산서 작성금액
    var taxBase=newDamt+newRamt+fresh+fincVal+addInc+nocont+etcPlus-etcMinus;
    var supplyAmt=Math.round(taxBase/1.1);
    var monthlyWage=Math.round(supplyAmt*0.654);
    var empIns=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
    var workIns=Math.floor(monthlyWage*0.0088/10)*10;
    var net=taxBase-dmg-empIns-workIns;
    var update={
      routeDetails:newRds,
      damt:newDamt,ramt:newRamt,finc:fincVal,
      totalAmt:taxBase,supplyAmt:supplyAmt,monthlyWage:monthlyWage,
      emp:empIns,work:workIns,
      updatedAt:new Date().toISOString()
    };
    promises.push(_db.collection('settlements').doc(x.id).update(update)
      .then(function(){changed++;Object.assign(x,update);}).catch(function(e){console.warn(e);}));
  });
  Promise.all(promises).then(function(){
    toast('✅ 재계산 완료 ('+changed+'건)\n단가표 기준으로 정산서가 갱신되었습니다.');
    _reloadSettlePage();
  });
}

function _getDrvCamp(d){
  if(!d)return '';

  var r=d.route||'';
  var ORDER=['부산1','부산2','부산3','대구2','진주M'];
  for(var i=0;i<ORDER.length;i++){if(r.indexOf(ORDER[i])>=0)return ORDER[i];}
  if(r==='213')return '대구2B';if(r.indexOf('대구')>=0)return '대구2';if(r.indexOf('진주')>=0)return '진주M';

  // 실제 기사 데이터 기반 동적 캠프
  var campSet={};
  act.forEach(function(d){var cc=_getDrvCamp(d);if(cc&&cc!=='미지정')campSet[cc]=_campColor(cc);});
  var CAMPS=Object.keys(campSet).sort();
  var cntMap={};
  CAMPS.forEach(function(cc){cntMap[cc]=0;});
  act.forEach(function(d){var cc=_getDrvCamp(d);if(cntMap[cc]!==undefined)cntMap[cc]++;});

var _rpCampActive=null;
// RPRICE 에서 동적으로 캠프 그룹 구성
function _buildRouteCampGroups(){
  var groups={};
  Object.keys(RPRICE).sort().forEach(function(route){
    var camp=_getRouteCamp(route)||'기타';
    if(!groups[camp])groups[camp]={name:camp,routes:[]};
    groups[camp].routes.push(route);
  });
  return Object.keys(groups).sort().map(function(camp){
    return {name:camp,color:_campColor(camp),routes:groups[camp].routes};
  });
}
function pagePrices(){
  document.getElementById('page-title').textContent='쿠팡 라우트 단가표';
  document.getElementById('topbar-right').innerHTML='';
  var el=document.getElementById('content');
  if(!_db||!_CU){el.innerHTML='<div class="empty">로그인 후 이용하세요</div>';return;}
  el.innerHTML='<div class="loading">로딩 중...</div>';
  var did=_CU.dealerId;
  // 단가표 + routeCampMap 동시 로드
  Promise.all([
    _db.collection('settings').doc(did+'_routePrices').get().catch(function(){return null;}),
    _db.collection('settings').doc(did+'_routeCampMap').get().catch(function(){return null;})
  ]).then(function(results){
    var rpSnap=results[0],rcSnap=results[1];
    if(rpSnap&&rpSnap.exists){
      var data=rpSnap.data();
      Object.keys(RPRICE).forEach(function(k){delete RPRICE[k];});
      Object.keys(data).forEach(function(k){if(typeof data[k]==='number')RPRICE[k]=data[k];});
    }
    if(rcSnap&&rcSnap.exists){
      Object.assign(_routeCampMap,rcSnap.data());
    }
    // settlements 캐시에서 캠프 매핑 재구성 (없으면 Firebase에서 로드)
    function rebuildAndRender(){
      (_settleCache||[]).forEach(function(s){
        var camp=s.camp||_getSettleCamp(s);
        if(!camp||camp==='기타')return;
        (s.routeDetails||[]).forEach(function(rd){
          if(rd.route)_routeCampMap[rd.route]=camp;
        });
      });
      _renderPrices(el);
    }
    if(!_settleCache||!_settleCache.length){
      _db.collection('settlements').where('dealerId','==',did).get()
        .then(function(snap){
          if(snap&&snap.size){
            _settleCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
          }
          rebuildAndRender();
        }).catch(function(){rebuildAndRender();});
    } else {
      rebuildAndRender();
    }
  });
}
function _getRouteCamp(route){
  if(!route)return '기타';
  // 1순위: routeCampMap (엑셀 업로드 시 저장)
  if(_routeCampMap[route])return _routeCampMap[route];
  // 2순위: settlements 캐시
  if(_settleCache){
    for(var si=0;si<_settleCache.length;si++){
      var s=_settleCache[si];
      var rds=s.routeDetails||[];
      for(var ri=0;ri<rds.length;ri++){
        if(rds[ri].route===route&&s.camp)return s.camp;
      }
    }
  }
  return '기타';
}

  var hasAny=campGroups.length>0;
  // ─ 상단 보기
  var viewHTML='<div class="card" style="margin-bottom:14px">'
    +'<div class="ch"><span class="ct">쿠팡 라우트 단가표</span>'
    +'<span style="font-size:11px;color:var(--text3)">캠프명 탭 눌러서 펼치기</span></div>';
  if(!hasAny){
    viewHTML+='<div class="empty" style="padding:24px 0"><div class="empty-icon">📋</div>'
      +'<div style="font-size:13px;font-weight:700;margin-bottom:6px">등록된 단가가 없습니다</div>'
      +'<div style="font-size:11px;color:var(--text3)">쿠팡 엑셀 업로드 시 자동으로 등록됩니다</div></div>';
    viewHTML+='</div>';
  } else {
    campGroups.forEach(function(cg,ci){
      var gid='vcg_'+ci;var col=cg.color;
      var grid='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:6px;padding:10px 0">'
        +cg.routes.map(function(r){
          return '<div style="display:flex;flex-direction:column;align-items:center;background:var(--bg);border-radius:8px;padding:8px 4px;border:1px solid '+col+'33">'
            +'<div style="font-size:11px;font-weight:700;color:'+col+';margin-bottom:3px">'+r+'</div>'
            +'<div style="font-size:13px;font-weight:800;color:var(--text)">'+Number(RPRICE[r]).toLocaleString()+'</div>'
            +'<div style="font-size:9px;color:var(--text3)">원/건</div></div>';
        }).join('')+'</div>';
      viewHTML+='<div style="margin-bottom:6px">'
        +'<div onclick="toggleRpCamp(\''+gid+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--bg3);border-radius:var(--r);cursor:pointer;border:1px solid var(--border)">'
        +'<span style="font-size:13px;font-weight:700;color:'+col+'">'+cg.name+'</span>'
        +'<span style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--text3)">'+cg.routes.length+'개 라우트</span>'
        +'<span id="'+gid+'_a" style="font-size:11px;color:var(--text3)">▼</span></span>'
        +'</div><div id="'+gid+'" style="display:none">'+grid+'</div></div>';
    });
    viewHTML+='</div>';
  }
  // ─ 하단 편집
  var editHTML='<div class="card"><div class="ch">'
    +'<span class="ct">📌 라우트별 단가 수정</span>'
    +'<span style="font-size:10px;color:var(--text3)">(저장 즉시 정산 반영)</span>'
    +'<button class="btn btn-sm btn-teal" onclick="saveRprice()" style="margin-left:auto">💾 저장</button>'
    +'</div>';
  if(!hasAny){
    editHTML+='<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">쿠팡 엑셀 업로드 후 자동으로 라우트가 등록됩니다</div></div>';
    c.innerHTML=viewHTML+editHTML;return;
  }
  // 캠프 탭
  editHTML+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px" id="rp-camp-tabs">';
  campGroups.forEach(function(cg){
    var cid=cg.name.replace(/\s/g,'_');
    editHTML+='<button id="rpctab-'+cid+'" onclick="showRpCampTab(\''+cg.name+'\')"'
      +' style="padding:5px 14px;border:2px solid '+cg.color+';border-radius:8px;background:transparent;color:'+cg.color+';font-size:11px;font-weight:700;cursor:pointer;transition:all .15s">'+cg.name+'</button>';
  });
  editHTML+='</div>';
  campGroups.forEach(function(cg){
    var cid=cg.name.replace(/\s/g,'_');
    editHTML+='<div id="rpcpanel-'+cid+'" class="rp-camp-panel" style="display:none">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;background:'+cg.color+'22;border-left:4px solid '+cg.color+';border-radius:0 8px 8px 0">'
      +'<span style="font-size:13px;font-weight:800;color:'+cg.color+'">🏭 '+cg.name+'</span>'
      +'<span style="font-size:10px;color:var(--text3)">'+cg.routes.length+'개 라우트</span></div>';
    if(cg.routes.length){
      editHTML+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-bottom:12px">';
      cg.routes.forEach(function(r){
        editHTML+='<div style="display:flex;flex-direction:column;align-items:center;background:var(--bg3);border-radius:8px;padding:8px 4px;border:1px solid '+cg.color+'44">'
          +'<div style="font-size:10px;font-weight:700;color:'+cg.color+';margin-bottom:3px">'+r+'</div>'
          +'<input id="rp-'+r+'" type="number" value="'+(RPRICE[r]||0)+'"'
          +' style="width:100%;text-align:center;padding:5px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-weight:700;background:var(--bg);color:var(--teal)">'
          +'<div style="font-size:9px;color:var(--text3);margin-top:2px">원/건</div></div>';
      });
      editHTML+='</div>';
    }
    editHTML+='<div style="display:flex;gap:5px;margin-bottom:4px">'
      +'<input id="rp-nk-'+cid+'" type="text" placeholder="신규 라우트 코드" maxlength="8"'
      +' style="flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--r);font-size:12px;text-transform:uppercase;background:var(--bg);color:var(--text)" oninput="this.value=this.value.toUpperCase()">'
      +'<input id="rp-nv-'+cid+'" type="number" placeholder="단가(원)"'
      +' style="width:90px;padding:6px;border:1.5px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--text)">'
      +'<button class="btn btn-sm" style="background:'+cg.color+';color:#fff;border:none;font-size:11px;white-space:nowrap" onclick="addRpCamp(\''+cid+'\')">+ 추가</button>'
      +'</div></div>';
  });
  editHTML+='</div>';
  c.innerHTML=viewHTML+editHTML;
  if(campGroups.length)setTimeout(function(){showRpCampTab(campGroups[0].name);},10);
}
function toggleRpCamp(gid){
  var b=document.getElementById(gid);var a=document.getElementById(gid+'_a');
  if(b){b.style.display=b.style.display==='none'?'block':'none';if(a)a.textContent=b.style.display==='none'?'▼':'▲';}
}
function showRpCampTab(campName){
  _rpCampActive=campName;
  document.querySelectorAll('.rp-camp-panel').forEach(function(p){p.style.display='none';});
  document.querySelectorAll('[id^="rpctab-"]').forEach(function(b){
    var col=b.style.borderColor;b.style.background='transparent';b.style.color=col;
  });
  var sid='rpcpanel-'+campName.replace(/\s/g,'_');
  var tid='rpctab-'+campName.replace(/\s/g,'_');
  var panel=document.getElementById(sid);var tab=document.getElementById(tid);
  if(panel)panel.style.display='block';
  if(tab){tab.style.background=tab.style.borderColor;tab.style.color='#fff';}
}
function addRpCamp(cid){
  var campName=cid.replace(/_/g,' ');
  var kEl=document.getElementById('rp-nk-'+cid);var vEl=document.getElementById('rp-nv-'+cid);
  if(!kEl||!vEl)return;
  var k=kEl.value.trim().toUpperCase(),v=parseInt(vEl.value)||0;
  if(!k||!v){toast('라우트 코드와 단가를 입력하세요');return;}
  RPRICE[k]=v;kEl.value='';vEl.value='';
  var c=document.getElementById('content');
  _renderPrices(c);
  setTimeout(function(){showRpCampTab(campName);},30);
  toast('✅ '+k+' ('+v.toLocaleString()+'원) 추가');
}
function saveRprice(){
  if(!_db){toast('❌ Firebase 미연결');return;}
  var newPrices={};
  Object.keys(RPRICE).forEach(function(r){
    var el=document.getElementById('rp-'+r);
    var v=el?+el.value:RPRICE[r];
    if(v>0)newPrices[r]=v;
  });
  Object.keys(RPRICE).forEach(function(k){delete RPRICE[k];});
  Object.assign(RPRICE,newPrices);
  Promise.all([
    _db.collection('settings').doc((_CU&&_CU.dealerId?_CU.dealerId:'shared')+'_routePrices').set(newPrices,{merge:false}),
    _db.collection('settings').doc((_CU&&_CU.dealerId?_CU.dealerId:'shared')+'_unitPrices').set({routePrices:newPrices},{merge:true})
  ]).then(function(){
    toast('✅ 라우트 단가 저장 완료 ('+Object.keys(newPrices).length+'개 라우트)');
    var c=document.getElementById('content');_renderPrices(c);
    setTimeout(function(){if(_rpCampActive)showRpCampTab(_rpCampActive);},30);
  }).catch(function(e){toast('❌ '+e.message);});
}

function pageStats(){
  document.getElementById('page-title').textContent='통계';
  document.getElementById('topbar-right').innerHTML='';
  var el=document.getElementById('content');
  if(!_db||!_CU){el.innerHTML='<div class="empty">로그인 후 이용하세요</div>';return;}
  el.innerHTML='<div class="loading">로딩 중...</div>';
  _db.collection('settlements').where('dealerId','==',_CU.dealerId).get()
    .then(function(snap){
      if(!snap||snap.empty){el.innerHTML='<div class="empty">데이터 없음</div>';return;}
      var settles=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      el.innerHTML='';
      // 월별 + 캠프별
      var byMonth={};var byCamp={};
      settles.forEach(function(s){
        var mo=s.month||'';var cc=_getSettleCamp(s)||'기타';
        var r=calcNet(s);
        // 대시보드와 동일한 방식으로 총매출 계산
        var ct=s.coupangTotal||(((s.damt||0)+(s.ramt||0)+(s.fresh||0)+(s.inc||0)+(s.nocont||0)))||0;
        var totalVat=ct?Math.round(ct*1.1):Math.round((r.income||0)*1.1); // 총매출(VAT포함)
        var supplyAmt=Math.round(totalVat/1.1);             // 공급가(VAT제외)
        var vat=totalVat-supplyAmt;                         // 부가세(10%)
        // 회사부담 보험료 (고용0.9% + 산재0.88%)
        var mw=r.monthlyWage||0;
        var empComp=mw>=800000?Math.floor(mw*0.009/10)*10:0;
        var workComp=Math.floor(mw*0.0088/10)*10;
        var insComp=empComp+workComp;
        // 순수익 = 공급가(VAT제외) - 기사실지급 - 회사보험료 (VAT는 국가납부분 제외)
        var netProfit=supplyAmt-(r.net||0)-insComp;
        if(!byMonth[mo])byMonth[mo]={cnt:0,dcnt:0,income:0,vat:0,totalVat:0,net:0,insComp:0,profit:0};
        byMonth[mo].cnt++;byMonth[mo].dcnt+=(s.dcnt||0);
        byMonth[mo].income+=supplyAmt;byMonth[mo].vat+=vat;byMonth[mo].totalVat+=totalVat;
        byMonth[mo].net+=r.net||0;byMonth[mo].insComp+=insComp;byMonth[mo].profit+=netProfit;
        if(!byCamp[cc])byCamp[cc]={cnt:0,dcnt:0,income:0,vat:0,totalVat:0,net:0,insComp:0,profit:0};
        byCamp[cc].cnt++;byCamp[cc].dcnt+=(s.dcnt||0);
        byCamp[cc].income+=supplyAmt;byCamp[cc].vat+=vat;byCamp[cc].totalVat+=totalVat;
        byCamp[cc].net+=r.net||0;byCamp[cc].insComp+=insComp;byCamp[cc].profit+=netProfit;
      });
      var months=Object.keys(byMonth).sort().reverse();
      var camps=Object.keys(byCamp).sort();
      // 레이아웃
      var grid=document.createElement('div');
      grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:14px';
      // 월별 카드
      var mCard=document.createElement('div');mCard.className='card';
      mCard.innerHTML='<div class="ch"><span class="ct">📅 월별 현황</span></div>'
        +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'
        +'<thead><tr style="background:var(--bg3)">'
        +'<th style="padding:8px">월</th>'
        +'<th style="padding:8px;text-align:right">배송건</th>'
        +'<th style="padding:8px;text-align:right">공급가</th>'
        +'<th style="padding:8px;text-align:right;color:#7c3aed">부가세(10%)</th>'
        +'<th style="padding:8px;text-align:right">총매출(VAT포함)</th>'
        +'<th style="padding:8px;text-align:right">기사실지급</th>'
        +'<th style="padding:8px;text-align:right">회사보험료</th>'
        +'<th style="padding:8px;text-align:right;color:#059669">🏢 순수익</th>'
        +'</tr></thead><tbody>'
        +months.map(function(mo,i){
          var d=byMonth[mo];var isFirst=(i===0);
          var tot=d.totalVat; // 총매출(VAT포함) - 대시보드와 동일
          return '<tr style="border-bottom:1px solid var(--border);'+(isFirst?'background:rgba(59,130,246,.06)':'')+'">'
            +'<td style="padding:8px"><strong style="color:'+(isFirst?'var(--blue)':'var(--text)')+'">'+mo+'</strong>'
            +(isFirst?'<span style="margin-left:4px;background:#dbeafe;color:#1d4ed8;padding:0 4px;border-radius:8px;font-size:9px">최신</span>':'')
            +'</td>'
            +'<td style="padding:8px;text-align:right">'+fmt(d.dcnt)+'</td>'
            +'<td style="padding:8px;text-align:right;color:var(--text2)">₩'+fmt(d.income)+'</td>'
            +'<td style="padding:8px;text-align:right;color:#7c3aed;font-size:11px">₩'+fmt(d.vat)+'</td>'
            +'<td style="padding:8px;text-align:right;color:var(--green);font-weight:700">₩'+fmt(tot)+'</td>'
            +'<td style="padding:8px;text-align:right;color:var(--blue);font-weight:700">₩'+fmt(d.net)+'</td>'
            +'<td style="padding:8px;text-align:right;color:#dc2626;font-size:11px">-₩'+fmt(d.insComp)+'</td>'
            +'<td style="padding:8px;text-align:right;font-weight:900;color:#059669">₩'+fmt(d.profit)+'</td>'
            +'</tr>';
        }).join('')+'</tbody></table></div>';
      grid.appendChild(mCard);
      // 캠프별 카드
      var cCard=document.createElement('div');cCard.className='card';
      cCard.innerHTML='<div class="ch"><span class="ct">🏕 캠프별 현황</span></div>'
        +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'
        +'<thead><tr style="background:var(--bg3)">'
        +'<th style="padding:8px">캠프</th>'
        +'<th style="padding:8px;text-align:right">배송건</th>'
        +'<th style="padding:8px;text-align:right">공급가</th>'
        +'<th style="padding:8px;text-align:right;color:#7c3aed">부가세(10%)</th>'
        +'<th style="padding:8px;text-align:right">총매출(VAT포함)</th>'
        +'<th style="padding:8px;text-align:right">기사실지급</th>'
        +'<th style="padding:8px;text-align:right">회사보험료</th>'
        +'<th style="padding:8px;text-align:right;color:#059669">🏢 순수익</th>'
        +'</tr></thead><tbody>'
        +camps.map(function(cc){
          var d=byCamp[cc];var col=_campColor(cc);
          var tot=d.totalVat; // 총매출(VAT포함) - 대시보드와 동일
          return '<tr style="border-bottom:1px solid var(--border)">'
            +'<td style="padding:8px"><span style="background:'+col+';color:#fff;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700">'+esc(cc)+'</span></td>'
            +'<td style="padding:8px;text-align:right">'+fmt(d.dcnt)+'</td>'
            +'<td style="padding:8px;text-align:right;color:var(--text2)">₩'+fmt(d.income)+'</td>'
            +'<td style="padding:8px;text-align:right;color:#7c3aed;font-size:11px">₩'+fmt(d.vat)+'</td>'
            +'<td style="padding:8px;text-align:right;color:var(--green);font-weight:700">₩'+fmt(tot)+'</td>'
            +'<td style="padding:8px;text-align:right;color:var(--blue);font-weight:700">₩'+fmt(d.net)+'</td>'
            +'<td style="padding:8px;text-align:right;color:#dc2626;font-size:11px">-₩'+fmt(d.insComp)+'</td>'
            +'<td style="padding:8px;text-align:right;font-weight:900;color:#059669">₩'+fmt(d.profit)+'</td>'
            +'</tr>';
        }).join('')+'</tbody></table></div>';
      grid.appendChild(cCard);
      el.appendChild(grid);
      // 기사별 순위
      var rankCard=document.createElement('div');rankCard.className='card';rankCard.style.marginTop='14px';
      var by={};
      settles.forEach(function(s){
        var n=s.driver||s.userId||'';var cc=_getSettleCamp(s)||'기타';
        if(!by[n])by[n]={dcnt:0,net:0,cnt:0,camp:cc};
        by[n].dcnt+=(s.dcnt||0);by[n].net+=calcNet(s).net;by[n].cnt++;
      });
      var sorted=Object.keys(by).sort(function(a,b){return by[b].dcnt-by[a].dcnt;}); // 건수 기준 정렬
      var medals=['🥇','🥈','🥉'];
      // 시상대
      var podium=document.createElement('div');
      podium.style.cssText='display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:20px 16px 8px;background:linear-gradient(180deg,#fafafa,var(--bg));border-radius:10px;margin-bottom:12px';
      [1,0,2].forEach(function(i){
        var n=sorted[i];if(!n)return;
        var bd=by[n];var col=_campColor(bd.camp);

        +sorted.map(function(n,i){

          return '<tr style="border-bottom:1px solid var(--border);'+rowBg+'">'
            +'<td style="padding:8px;text-align:center;font-size:'+(rank<=3?'18px':'12px')+'">'+(medal||rank)+'</td>'

            +'<td style="padding:8px;text-align:right;font-weight:800;color:var(--purple)">₩'+fmt(bd.net)+'</td>'
            +'</tr>';
        }).join('')+'</tbody></table>';
      rankCard.appendChild(rtbl);el.appendChild(rankCard);
    }).catch(function(e){logError('통계',e.message);el.innerHTML='<div class="empty">❌ '+e.message+'</div>';});
}

function _renderStats(settles,c){
  var CAMPS=CAMP_LIST_S.length?CAMP_LIST_S:[];
  var CCOL={}; CAMPS.forEach(function(cc){CCOL[cc]=_campColor(cc);});
  var byMonth={},byDriver={},byCamp={};
  settles.forEach(function(s){
    var m=s.month||'';var r=calcNet(s);
    var camp=_getSettleCamp(s)||'기타';
    if(!byMonth[m])byMonth[m]={cnt:0,income:0,net:0,dcnt:0};
    byMonth[m].cnt++;byMonth[m].income+=r.income||0;byMonth[m].net+=r.net||0;byMonth[m].dcnt+=(+s.dcnt||0);
    var n=s.driverName||s.driver||'';
    if(!byDriver[n])byDriver[n]={net:0,dcnt:0,cnt:0,camp:camp};

function _incKey(drv,route){return 'inc_'+drv.replace(/\s/g,'_')+'_'+route;}
function _setIncSetting(drv,route,on,rate){
  localStorage.setItem(_incKey(drv,route),JSON.stringify({on:on,rate:rate}));
  if(_db){
    var key=_incKey(drv,route);var obj={};obj[key]={on:on,rate:rate};
    _db.collection('settings').doc((_CU&&_CU.dealerId?_CU.dealerId:'shared')+'_incSettings').set(obj,{merge:true}).catch(function(){});
  }
}
function loadIncSettingsFromFB(){
  if(!_db)return;
  _db.collection('settings').doc((_CU&&_CU.dealerId?_CU.dealerId:'shared')+'_incSettings').get().then(function(doc){
    if(!doc.exists)return;
    var data=doc.data();
    Object.keys(data).forEach(function(k){
      if(k.startsWith('inc_'))localStorage.setItem(k,JSON.stringify(data[k]));
    });
  }).catch(function(){});
}
// INC_CAMPS는 동적으로 settlements에서 구성
function _buildIncCamps(panelData){
  var campMap={};
  Object.keys(panelData).forEach(function(drv){
    panelData[drv].forEach(function(route){
      var camp=_getCampForRoute(route)||'기타';
      if(!campMap[camp])campMap[camp]={name:camp,color:_campColor(camp),drvRoutes:[]};
      campMap[camp].drvRoutes.push({drv:drv,route:route});
    });
  });
  return Object.keys(campMap).sort().map(function(k){return campMap[k];});
}
function _getCampForRoute(route){
  return _getRouteCamp(route);
}

        if(!snap||!snap.size){toast('정산서가 없습니다. 먼저 엑셀 업로드 하세요.');return;}

function _filterIncCamp2(camp){
  document.querySelectorAll('.inc-row').forEach(function(tr){
    tr.style.display=(camp==='전체'||tr.dataset.camp===camp)?'':'none';
  });
  document.querySelectorAll('[id^="incf-"]').forEach(function(b){
    var isSel=b.id==='incf-'+camp;
    b.style.background=isSel?'var(--blue)':'transparent';
    b.style.color=isSel?'#fff':b.style.borderColor||'var(--text2)';
  });
}
// 인센 글로벌 맵 (HTML 이스케이프 없이 drv/route 저장)
var _INC_MAP={};
var _INC_KEY_IDX=0;
function _incNewKey(drv,route){
  var k='ik'+(++_INC_KEY_IDX);
  _INC_MAP[k]={drv:drv,route:route};
  return k;
}
function _incToggle2(btn){
  var k=btn.dataset.k;var m=_INC_MAP[k];if(!m)return;
  var s=_getIncSetting(m.drv,m.route);s.on=!s.on;
  _setIncSetting(m.drv,m.route,s.on,s.rate);
  btn.textContent=s.on?'ON':'OFF';
  btn.style.background=s.on?'#059669':'#6b7280';
}
function _incRate2(rateBtn){
  var k=rateBtn.dataset.k;var rate=+rateBtn.dataset.rate;
  var m=_INC_MAP[k];if(!m)return;
  _setIncSetting(m.drv,m.route,_getIncSetting(m.drv,m.route).on,rate);
  // 같은 그룹(같은 k) 버튼들 스타일 갱신
  document.querySelectorAll('.inc-rate-btn[data-k="'+k+'"]').forEach(function(b){

    b.style.background=on?'#2563eb':'#f1f5f9';
    b.style.color=on?'#fff':'#374151';
    b.style.borderColor=on?'#2563eb':'#d1d5db';
  });
  // 직접입력 칸 초기화
  var ci=document.querySelector('.inc-custom-inp[data-k="'+k+'"]');if(ci)ci.value='';
}
function _incCustom2(inp){
  var k=inp.dataset.k;var rate=parseInt(inp.value);
  var m=_INC_MAP[k];if(!m||isNaN(rate)||rate<=0)return;
  _setIncSetting(m.drv,m.route,_getIncSetting(m.drv,m.route).on,rate);
  document.querySelectorAll('.inc-rate-btn[data-k="'+k+'"]').forEach(function(b){
    b.style.background='#f1f5f9';b.style.color='#374151';b.style.borderColor='#d1d5db';
  });
}
function _incCampRoutes(routes,onVal){
  // 라우트 목록 기반 일괄 ON/OFF
  var settle=_settleCache||[];
  var routeSet=new Set(routes);
  settle.forEach(function(s){
    var drv=s.userId||s.driver||'';if(!drv)return;
    var sRoutes=[];
    if(s.routeDetails&&s.routeDetails.length)
      s.routeDetails.forEach(function(rd){if(rd.route)sRoutes.push(rd.route);});
    else if(s.route)sRoutes=[s.route];
    sRoutes.forEach(function(route){
      if(routeSet.has(route)){
        var cur=_getIncSetting(drv,route);
        _setIncSetting(drv,route,onVal,cur.rate);
      }
    });
  });
  var mo=document.getElementById('inc-panel-mo');if(mo)mo.remove();
  openIncPanel();
  toast((onVal?'🟢':'🔴')+' 캠프 인센 '+(onVal?'ON':'OFF')+' 적용');
}
function _incCampAll2(prefixes,onVal){
  // 하위 호환용 - prefix 기반
  var routes=Object.keys(RPRICE).filter(function(r){
    return prefixes.some(function(p){return r.startsWith(p);});
  });
  _incCampRoutes(routes,onVal);
}

function doResetData(){
  var doSettle=document.getElementById('rst-settle')&&document.getElementById('rst-settle').checked;
  var doDrivers=document.getElementById('rst-drivers')&&document.getElementById('rst-drivers').checked;
  var doRoutes=document.getElementById('rst-routes')&&document.getElementById('rst-routes').checked;
  var doInc=document.getElementById('rst-inc')&&document.getElementById('rst-inc').checked;
  if(!doSettle&&!doDrivers&&!doRoutes&&!doInc){toast('삭제할 항목을 선택하세요');return;}
  var items=[];
  if(doSettle)items.push('정산서');
  if(doDrivers)items.push('기사 정보');
  if(doRoutes)items.push('라우트 단가표');
  if(doInc)items.push('인센 설정');
  if(!confirm('삭제 항목: '+items.join(', ')+'\n이 작업은 되돌릴 수 없습니다. 정말 삭제하시겠습니까?'))return;
  var mo=document.getElementById('mo-reset');if(mo)mo.remove();
  toast('🗑 초기화 진행 중...');
  var promises=[];
  var did=_CU&&_CU.dealerId;
  if(!_db||!did){toast('❌ 로그인 정보 없음');return;}
  // 정산서 삭제
  if(doSettle){
    promises.push(_db.collection('settlements').where('dealerId','==',did).get().then(function(snap){
      var b=_db.batch();snap.forEach(function(d){b.delete(d.ref);});
      return snap.size?b.commit():Promise.resolve();
    }));
    localStorage.removeItem('mbti_settlements');_settleCache=null;
  }
  // 기사 삭제
  if(doDrivers){
    promises.push(_db.collection('drivers').where('dealerId','==',did).get().then(function(snap){
      var b=_db.batch();snap.forEach(function(d){b.delete(d.ref);});
      return snap.size?b.commit():Promise.resolve();
    }));
    _drvCache=null;localStorage.removeItem('mbti_drivers');
  }
  // 라우트 단가표 초기화
  if(doRoutes){
    var rpId=did+'_routePrices';
    promises.push(_db.collection('settings').doc(rpId).delete().catch(function(){}));
    Object.keys(RPRICE).forEach(function(k){delete RPRICE[k];});
  }
  // 인센 설정 초기화
  if(doInc){
    var incId=did+'_incSettings';
    promises.push(_db.collection('settings').doc(incId).delete().catch(function(){}));
    // localStorage 인센 설정 제거
    Object.keys(localStorage).filter(function(k){return k.startsWith('inc_');}).forEach(function(k){localStorage.removeItem(k);});
  }
  Promise.all(promises).then(function(){
    toast('✅ 초기화 완료!\n'+items.join(', ')+' 삭제됨');
    goPage('settle');
  }).catch(function(e){toast('⚠️ 일부 실패: '+e.message);});
}

function doChangePw(){
  var cur=(document.getElementById('chpw-cur')||{}).value||'';
  var nw=(document.getElementById('chpw-new')||{}).value||'';
  var nw2=(document.getElementById('chpw-new2')||{}).value||'';
  var errEl=document.getElementById('chpw-err');
  function showErr(msg){if(errEl){errEl.textContent=msg;errEl.style.display='block';}}
  if(!cur){showErr('현재 비밀번호를 입력하세요');return;}
  if(nw.length<6){showErr('새 비밀번호는 6자 이상이어야 합니다');return;}
  if(nw!==nw2){showErr('새 비밀번호가 일치하지 않습니다');return;}
  var user=_auth&&_auth.currentUser;
  if(!user){showErr('로그인 정보를 찾을 수 없습니다');return;}
  var btn=document.querySelector('#mo-chpw .btn-blue');
  if(btn){btn.textContent='변경 중...';btn.disabled=true;}
  var credential=firebase.auth.EmailAuthProvider.credential(user.email,cur);
  user.reauthenticateWithCredential(credential).then(function(){
    return user.updatePassword(nw);
  }).then(function(){
    document.getElementById('mo-chpw')&&document.getElementById('mo-chpw').remove();
    toast('✅ 비밀번호가 변경되었습니다');
  }).catch(function(e){
    if(btn){btn.textContent='🔑 변경하기';btn.disabled=false;}
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')
      showErr('❌ 현재 비밀번호가 올바르지 않습니다');
    else if(e.code==='auth/weak-password')
      showErr('❌ 비밀번호가 너무 약합니다 (6자 이상)');
    else
      showErr('❌ 변경 실패: '+e.message);
  });
}

function pageNotices(){
  document.getElementById('page-title').textContent='관리자 공지';

    var typeColor={info:'#dbeafe',update:'#d1fae5',warning:'#fef3c7',event:'#fce7f3'};
    var typeTxtColor={info:'#1e40af',update:'#065f46',warning:'#92400e',event:'#9d174d'};
    var html='<div style="display:flex;flex-direction:column;gap:10px">';
    snap.forEach(function(doc){
      var n=doc.data();
      var dt=n.createdAt&&n.createdAt.toDate?n.createdAt.toDate().toLocaleDateString('ko-KR'):'-';
      var ic=typeIcon[n.type]||'📢';
      var bg=typeColor[n.type]||'#dbeafe';
      var tc=typeTxtColor[n.type]||'#1e40af';
      html+='<div class="card" style="border-left:4px solid '+tc+'">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="background:'+bg+';color:'+tc+';padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">'+ic+' '+(n.type==='info'?'공지':n.type==='update'?'업데이트':n.type==='warning'?'점검':n.type==='event'?'이벤트':n.type)+'</span>'
        +'<strong style="font-size:14px">'+esc(n.title||'')+'</strong></div>'
        +'<span style="font-size:10px;color:var(--text3);white-space:nowrap">'+dt+'</span></div>'
        +'<div style="font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap">'+esc(n.body||'')+'</div>'
        +'</div>';
    });

    logError('관리자공지',e.message);c.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>'+esc(e.message)+'</div>';

}
