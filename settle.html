    notice.textContent='🔍 현재 열람 중: '+window._adminViewDealerId;
    d.insertBefore(notice, body);
  }

  var mdf=document.createElement('div');mdf.className='mdf';
  var resetBtn=document.createElement('button');resetBtn.className='btn btn-sm';
  resetBtn.style.marginRight='auto';
  resetBtn.textContent='🔄 내 계정 복귀';
  resetBtn.onclick=function(){
    window._adminViewDealerId=null;
    if(_auth&&_auth.currentUser)_CU.dealerId=_auth.currentUser.uid;
    mo.remove();_settleCache=null;_drvCache=null;
    toast('✅ 내 계정으로 복귀');_reloadSettlePage();
  };
  var closeBtn=document.createElement('button');closeBtn.className='btn';closeBtn.textContent='닫기';
  closeBtn.onclick=function(){mo.remove();};
  mdf.appendChild(resetBtn);mdf.appendChild(closeBtn);
  d.appendChild(mdf);mo.appendChild(d);
  document.getElementById('modals').appendChild(mo);

  // 대리점 목록 로드
  function buildDealerRows(items){
    var tbl=document.createElement('table');tbl.className='tbl';tbl.style.width='100%';
    var thead=document.createElement('thead');
    thead.innerHTML='<tr><th>대리점</th><th>ID</th><th>정산수</th><th></th></tr>';
    tbl.appendChild(thead);
    var tbody=document.createElement('tbody');
    items.forEach(function(item){
      var tr=document.createElement('tr');tr.style.borderBottom='1px solid var(--border)';
      var isCurrent=(window._adminViewDealerId===item.id);
      tr.innerHTML='<td style="padding:8px 10px"><strong>'+esc(item.name||item.id)+'</strong></td>'
        +'<td style="padding:8px 10px;font-family:monospace;font-size:10px">'+esc(item.id)+'</td>'
        +'<td style="padding:8px 10px">'+item.cnt+'건</td>';
      var td=document.createElement('td');td.style.padding='8px 10px';
      var btn=document.createElement('button');
      btn.className='btn btn-sm '+(isCurrent?'btn-teal':'btn-blue');
      btn.textContent=isCurrent?'✅ 보는 중':'🔍 열람';
      btn.onclick=(function(id){return function(){switchDealer(id);mo.remove();};})(item.id);
      td.appendChild(btn);tr.appendChild(td);tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    body.innerHTML='';body.appendChild(tbl);
  }

  // settlements에서 dealerId 수집 후 users에서 이름 조회
  _db.collection('settlements').get().then(function(sSnap){
    var dealerMap={};
    sSnap.forEach(function(doc){
      var did=doc.data().dealerId;
      if(did)dealerMap[did]=(dealerMap[did]||0)+1;
    });
    var dids=Object.keys(dealerMap).sort();
    if(!dids.length){body.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">등록된 대리점 없음</div>';return;}
    var userProms=dids.map(function(did){
      return _db.collection('users').doc(did).get().then(function(us){
        return{id:did,name:us.exists?(us.data().companyName||us.data().name||did):did,cnt:dealerMap[did]};
      }).catch(function(){return{id:did,name:did,cnt:dealerMap[did]};});
    });
    Promise.all(userProms).then(function(items){buildDealerRows(items);});
  }).catch(function(e){body.innerHTML='<div style="color:var(--red)">❌ '+e.message+'</div>';});
}

      +'<div style="font-size:11px;color:var(--text2);margin-bottom:6px">'
      +(prevMonth?prevMonth+'에는 있었는데 '+month+'에는 없는 기사입니다. ':'')
      +'실제 퇴직이라면 기사 상태를 퇴직으로 변경해주세요.</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'
      +leftDrivers.map(function(id){
        return '<span style="background:#FED7AA;color:#C2410C;padding:2px 8px;border-radius:100px;font-size:10px;font-family:monospace">'+esc(id)+'</span>';
      }).join('')+'</div>';
    var goBtn2=document.createElement('button');goBtn2.className='btn btn-sm';
    goBtn2.style.cssText='background:#ea580c;color:#fff;border:none';
    goBtn2.textContent='👤 기사관리 → 상태 변경하기';
    goBtn2.onclick=function(){mo.remove();goPage('drivers');};
    leftSec.appendChild(goBtn2);d.appendChild(leftSec);
  }

  // 신규/퇴직 없으면
  if(!newDrivers.length&&!leftDrivers.length){
    var ok=document.createElement('div');
    ok.style.cssText='text-align:center;padding:12px;color:#059669;font-size:12px;font-weight:700';
    ok.textContent='✅ 전월 대비 기사 변동 없음';d.appendChild(ok);
  }

  // 안내
  var tip=document.createElement('div');
  tip.style.cssText='font-size:10px;color:var(--text3);padding:8px;background:var(--bg3);border-radius:6px;margin-top:8px;line-height:1.5';
  tip.textContent='💡 정산서 관리에서 단가표 기준 재계산을 실행하면 최종 금액이 확정됩니다.';
  d.appendChild(tip);

  var mdf=document.createElement('div');mdf.className='mdf';
  var cb=document.createElement('button');cb.className='btn';cb.textContent='확인';
  cb.onclick=function(){mo.remove();goPage('settlements');};
  mdf.appendChild(cb);d.appendChild(mdf);mo.appendChild(d);
  document.getElementById('modals').appendChild(mo);
}

function _showWelcome(){
  var name=(_CU&&_CU.displayName)||(_CU&&_CU.email&&_CU.email.split('@')[0])||'관리자';
  var now=new Date();
  var h=now.getHours();
  var greeting=h<6?'🌙 새벽에도 수고하세요':h<12?'🌅 좋은 아침이에요':h<18?'☀️ 좋은 오후예요':'🌙 수고하셨어요';
  var mo=document.createElement('div');
  mo.id='mo-welcome';
  mo.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:14px;animation:fadeIn .4s ease';
  mo.onclick=function(e){if(e.target===mo)mo.remove();};
  var d=document.createElement('div');
  d.style.cssText='background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#7c3aed 100%);border-radius:20px;padding:36px 32px;text-align:center;max-width:360px;width:100%;color:#fff;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)';
  d.innerHTML='<div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.04);border-radius:50%"></div>'
    +'<div style="font-size:48px;margin-bottom:8px;animation:bounce 1s infinite">👑</div>'
    +'<div style="font-size:13px;opacity:.7;margin-bottom:4px;letter-spacing:1px">MBTI Co. LOGISTICS</div>'
    +'<div style="font-size:22px;font-weight:900;margin-bottom:4px">'+greeting+'</div>'
    +'<div style="font-size:16px;font-weight:700;margin-bottom:16px;color:#93c5fd">'+esc(name)+' 님 ✨</div>'
    +'<div style="background:rgba(255,255,255,.1);border-radius:12px;padding:12px;margin-bottom:20px">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:4px">🚀 오늘도 번창하세요!</div>'
      +'<div style="font-size:11px;opacity:.75">엠비티아이 물류관리 · 로지넷</div>'
    +'</div>'
    +'<button onclick="document.getElementById(\'mo-welcome\').remove()" '
      +'style="background:#fff;color:#1e3a8a;border:none;border-radius:100px;padding:10px 32px;font-size:14px;font-weight:800;cursor:pointer;width:100%">입장하기 →</button>';
  mo.appendChild(d);document.body.appendChild(mo);
  // 3초 후 자동 닫기
  setTimeout(function(){var m=document.getElementById('mo-welcome');if(m)m.remove();},4000);
}

// ══ 초기화 ══
document.addEventListener('click',function(e){
  var sb=document.getElementById('sidebar');
  if(sb&&sb.classList.contains('open')&&!sb.contains(e.target))sb.classList.remove('open');
});
window.addEventListener('load',function(){setTimeout(initFirebase,200);});
</script>
