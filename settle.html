<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1A5FA8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>LogiNet — 물류 정산 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════
   LOGINET v2 — Design System
═══════════════════════════════════════ */
:root{
  --brand:#1A5FA8;
  --brand-d:#0C3F74;
  --brand-l:#E8F1FB;
  --brand-m:#2B75C8;
  --green:#0A6E48;--green-l:#E2F5EC;
  --red:#C0202A;--red-l:#FCEAEA;
  --amber:#8B5A00;--amber-l:#FEF3E2;
  --purple:#5B3DB5;--purple-l:#EEEAFC;
  --teal:#0A6860;--teal-l:#E2F4F2;
  --gray:#54524E;--gray-l:#F3F1EB;--gray-m:#D2CFC7;
  --bg:#F4F2ED;--bg2:#FFFFFF;--bg3:#EDEAE3;
  --text:#1C1C1A;--text2:#54524E;--text3:#8C8A82;
  --border:rgba(0,0,0,.09);
  --r:10px;--rl:14px;--rxl:18px;
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --font:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;
}
body.dark{
  --bg:#111110;--bg2:#1A1A18;--bg3:#222220;
  --text:#E6E4DC;--text2:#A4A29A;--text3:#6A6860;
  --border:rgba(255,255,255,.09);
  --gray-l:#222220;--brand-l:#091A30;--green-l:#041E12;
  --red-l:#240809;--amber-l:#1E1000;--purple-l:#150D30;--teal-l:#041B18;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font);-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;line-height:1.5}

/* ─── LOGIN ─── */
#login-wrap{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,var(--brand-d) 0%,var(--brand) 55%,#2B81D8 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{
  background:var(--bg2);border-radius:22px;
  padding:40px 36px;width:360px;max-width:100%;
  box-shadow:0 28px 72px rgba(0,0,0,.35);
  animation:loginPop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes loginPop{from{opacity:0;transform:scale(.92) translateY(16px)}}
.login-logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.login-icon{font-size:34px}
.login-brand{font-size:26px;font-weight:900;color:var(--brand);letter-spacing:-.5px}
.login-sub{font-size:11px;color:var(--text3);text-align:center;margin-bottom:28px;letter-spacing:.05em}
.login-input{
  width:100%;padding:12px 14px;margin-bottom:10px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;outline:none;background:var(--bg);color:var(--text);
  transition:border-color .15s;
}
.login-input:focus{border-color:var(--brand)}
.login-btn{
  width:100%;padding:13px;background:var(--brand);color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:700;
  cursor:pointer;transition:background .15s;margin-top:4px;
}
.login-btn:hover{background:var(--brand-d)}
.login-btn:active{transform:scale(.98)}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none}
.login-ver{font-size:10px;color:var(--text3);text-align:center;margin-top:16px;opacity:.7}

/* ─── LAYOUT ─── */
#app{display:none}
.layout{display:flex;min-height:100vh}

/* ─── SIDEBAR ─── */
.sidebar{
  width:230px;min-height:100vh;
  background:var(--brand-d);
  display:flex;flex-direction:column;
  position:fixed;left:0;top:0;bottom:0;z-index:100;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-row{display:flex;align-items:center;gap:9px}
.sb-logo-icon{font-size:20px}
.sb-logo-text{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.3px}
.sb-logo-badge{
  font-size:9px;background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);
  padding:2px 7px;border-radius:20px;margin-top:4px;display:inline-block;letter-spacing:.05em;
}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.sb-user-role{
  font-size:10px;font-weight:700;letter-spacing:.06em;
  display:inline-block;padding:2px 8px;border-radius:20px;
  background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);
}
.sb-user-dealer{font-size:10px;color:rgba(255,255,255,.45);margin-top:4px}
.snav{flex:1;padding:8px 0;overflow-y:auto}
.ns{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);padding:12px 16px 4px;letter-spacing:.1em;text-transform:uppercase}
.ni{
  padding:9px 16px;cursor:pointer;
  font-size:13px;color:rgba(255,255,255,.65);
  border-radius:9px;margin:1px 8px;
  transition:all .14s;display:flex;align-items:center;gap:8px;
}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:rgba(255,255,255,.2);color:#fff;font-weight:700}
.ni-ic{font-size:15px;width:20px;text-align:center}
.sb-bot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.sb-bot-btn{
  width:100%;padding:8px 12px;background:transparent;
  border:1px solid rgba(255,255,255,.2);border-radius:9px;
  color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;
  margin-bottom:6px;transition:all .15s;text-align:left;
  display:flex;align-items:center;gap:6px;
}
.sb-bot-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-version{font-size:9px;color:rgba(255,255,255,.25);text-align:center;padding-top:4px;letter-spacing:.05em}

/* ─── TOPBAR ─── */
.main{margin-left:230px;flex:1;display:flex;flex-direction:column}
.topbar{
  height:54px;background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:50;
  box-shadow:0 1px 8px rgba(0,0,0,.04);
}
.topbar-title{font-size:15px;font-weight:800;color:var(--text)}
.topbar-right{display:flex;gap:8px;align-items:center}
.content{padding:20px;flex:1}

/* ─── CARDS ─── */
.card{
  background:var(--bg2);border-radius:var(--rl);
  border:1px solid var(--border);margin-bottom:14px;
  overflow:hidden;box-shadow:var(--shadow);
}
.card-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
.card-body{padding:16px 18px}

/* ─── STAT GRID ─── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{
  background:var(--bg2);border-radius:var(--rl);
  border:1px solid var(--border);padding:18px 16px;
  box-shadow:var(--shadow);transition:transform .15s;
}
.stat-card:hover{transform:translateY(-2px)}
.stat-val{font-size:24px;font-weight:900;color:var(--brand)}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 16px;border-radius:9px;font-size:13px;
  font-weight:700;cursor:pointer;border:none;
  transition:all .15s;white-space:nowrap;line-height:1;
}
.btn:active{transform:scale(.97)}
.btn-blue{background:var(--brand);color:#fff}
.btn-blue:hover{background:var(--brand-d)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#074D33}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#950A14}
.btn-amber{background:var(--amber);color:#fff}
.btn-amber:hover{background:#6A4200}
.btn-gray{background:var(--gray-l);color:var(--text2);border:1px solid var(--border)}
.btn-gray:hover{background:var(--gray-m)}
.btn-outline{background:transparent;border:1.5px solid var(--brand);color:var(--brand)}
.btn-outline:hover{background:var(--brand-l)}
.btn-kakao{background:#FEE500;color:#1A1300;border:none}
.btn-kakao:hover{background:#F0D800}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}

/* ─── FORMS ─── */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:9px;
  font-size:13px;background:var(--bg);color:var(--text);outline:none;
  transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);background:var(--bg2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field input[readonly]{background:var(--bg3);color:var(--text3)}

/* ─── TABLE ─── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:700;font-size:11px;color:var(--text2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.route-tbl td{padding:6px 10px;font-size:12px}
.route-tbl th{padding:6px 10px;font-size:11px}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-blue{background:var(--brand-l);color:var(--brand)}
.b-green{background:var(--green-l);color:var(--green)}
.b-red{background:var(--red-l);color:var(--red)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-purple{background:var(--purple-l);color:var(--purple)}
.b-teal{background:var(--teal-l);color:var(--teal)}
.b-gray{background:var(--gray-l);color:var(--gray)}

/* ─── MODAL ─── */
.mo{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;padding:16px;
}
.mo.show{display:flex}
.md{
  background:var(--bg2);border-radius:var(--rxl);
  width:100%;max-width:500px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.28);
  animation:mdIn .2s cubic-bezier(.34,1.2,.64,1);
}
@keyframes mdIn{from{opacity:0;transform:scale(.96) translateY(8px)}}
.mdt{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.mdb{padding:20px}
.mdf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px;line-height:1;transition:color .12s}
.close-btn:hover{color:var(--text)}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1C1C1A;color:#fff;padding:10px 22px;border-radius:100px;
  font-size:13px;font-weight:600;opacity:0;pointer-events:none;z-index:9999;
  transition:all .25s;white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── EXCEL UPLOAD ─── */
.excel-drop{
  border:2px dashed var(--brand);border-radius:var(--rl);
  padding:18px;text-align:center;cursor:pointer;
  background:var(--brand-l);transition:all .15s;position:relative;
  margin-bottom:10px;
}
.excel-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.excel-drop:hover{border-color:var(--brand-d);background:#d8e9f8}
.excel-drop.done{border-color:var(--green);background:var(--green-l)}

/* ─── STATEMENT (인쇄용 포함) ─── */
.stmt-wrap{
  background:#fff;color:#1a1a18;
  padding:24px;border-radius:14px;max-width:600px;margin:0 auto;
}
.stmt-brand{font-size:10px;font-weight:800;color:var(--brand);letter-spacing:.12em;margin-bottom:3px;text-transform:uppercase}
.stmt-title{font-size:21px;font-weight:900;margin-bottom:3px}
.stmt-meta{font-size:12px;color:#666;margin-bottom:14px}
.stmt-divider{height:2px;background:linear-gradient(90deg,#1A5FA8,#2B81D8,transparent);border:none;margin:12px 0}
.stmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ede4;font-size:13px}
.stmt-row:last-child{border:none}
.stmt-row.total{background:#f5f3ed;margin:0 -24px;padding:12px 24px;font-weight:800;font-size:14px}
.stmt-row.deduct{color:#C0202A}
.stmt-row.net{background:var(--brand);color:#fff;margin:0 -24px -24px;padding:16px 24px;border-radius:0 0 14px 14px;font-weight:900;font-size:17px}
.amt-plus{color:#0A6E48;font-weight:700}
.amt-minus{color:#C0202A;font-weight:700}
.stmt-section-title{font-size:11px;font-weight:800;color:var(--brand);letter-spacing:.07em;text-transform:uppercase;margin:14px 0 6px;padding-bottom:4px;border-bottom:1.5px solid var(--brand-l)}
.route-preview{
  border:1px solid #e8e4dc;border-radius:8px;overflow:hidden;margin-bottom:10px;
  font-size:12px;
}
.route-preview table{font-size:11px}
.route-preview th{background:#f5f3ed;font-size:10px;padding:5px 8px}
.route-preview td{padding:5px 8px;border-bottom:1px solid #f0ede4}

/* ─── DRIVER HERO ─── */
.driver-hero{
  background:linear-gradient(135deg,var(--brand-d),var(--brand));
  border-radius:var(--rl);padding:22px;color:#fff;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(26,95,168,.3);
}
.driver-hero-name{font-size:22px;font-weight:900}
.driver-hero-info{font-size:12px;opacity:.75;margin-top:3px}
.settle-card{
  background:var(--bg2);border-radius:var(--rl);
  border:1px solid var(--border);padding:16px;margin-bottom:10px;
  cursor:pointer;transition:all .15s;
  box-shadow:var(--shadow);
}
.settle-card:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.settle-card-month{font-size:14px;font-weight:800}
.settle-card-net{font-size:20px;font-weight:900;color:var(--brand)}

/* ─── CHART ─── */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{background:var(--brand);border-radius:5px 5px 0 0;width:100%;min-height:4px;transition:height .4s cubic-bezier(.34,1.2,.64,1);position:relative}
.chart-bar:hover{background:var(--brand-m)}
.chart-bar-lbl{font-size:9px;color:var(--text3);font-weight:600;text-align:center}
.chart-bar-val{font-size:9px;color:var(--brand);font-weight:700;position:absolute;top:-16px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* ─── CALC PREVIEW ─── */
.calc-preview{
  background:var(--brand-l);border:1.5px solid var(--brand);
  border-radius:var(--rl);padding:14px 16px;margin-top:10px;
}
.calc-preview .row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.calc-preview .row.total{font-weight:800;font-size:14px;color:var(--brand);border-top:1.5px solid var(--brand);margin-top:6px;padding-top:8px}
.calc-preview .row.deduct{color:var(--red)}
.calc-preview .net-val{font-size:18px;font-weight:900;color:var(--brand);text-align:right;margin-top:8px}

/* ─── 반응형 ─── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .topbar{padding:0 14px}
  .content{padding:12px}
  .ham{display:flex!important}
  .stat-grid{grid-template-columns:1fr 1fr}
  .fg,.fg3{grid-template-columns:1fr}
  .tbl-wrap{overflow-x:auto}
}
.ham{display:none;cursor:pointer;font-size:20px;padding:4px;align-items:center;justify-content:center;width:36px;height:36px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
.overlay.show{display:block}

/* ─── MISC ─── */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.loading::before{content:'⏳ ';font-size:20px}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.section-label{font-size:11px;font-weight:800;color:var(--brand);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.divider{height:1px;background:var(--border);margin:12px 0}
.info-box{background:var(--brand-l);border:1.5px solid var(--brand);border-radius:var(--r);padding:12px 14px;font-size:12px;margin-bottom:12px}

/* ─── SECURITY RULES (참고용 주석) ─────
Firestore Security Rules (mbti-logistics-bfcd3):
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    // 인증 필수
    match /{document=**} { allow read, write: if false; }

    // users: 본인 데이터만
    match /users/{uid} {
      allow read, write: if request.auth != null && request.auth.uid == uid;
    }
    // dealers: admin만 쓰기, dealer는 본인 것만
    match /dealers/{dealerId} {
      allow read: if request.auth != null && (
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin' ||
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.dealerId == dealerId
      );
      allow write: if request.auth != null &&
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
    }
    // drivers: dealer는 자기 대리점만, driver는 본인만
    match /drivers/{driverId} {
      allow read, write: if request.auth != null && (
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin' ||
        (get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'dealer' &&
         resource.data.dealerId == get(/databases/$(database)/documents/users/$(request.auth.uid)).data.dealerId) ||
        (resource.data.authUid == request.auth.uid)
      );
    }
    // settlements: dealer는 자기 대리점만, driver는 본인 것만
    match /settlements/{settleId} {
      allow read, write: if request.auth != null && (
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin' ||
        (get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'dealer' &&
         resource.data.dealerId == get(/databases/$(database)/documents/users/$(request.auth.uid)).data.dealerId)
      );
      allow read: if request.auth != null &&
        resource.data.authUid == request.auth.uid;
    }
    // settings: admin만
    match /settings/{doc} {
      allow read: if request.auth != null;
      allow write: if request.auth != null &&
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
    }
    // prices: dealer는 자기 대리점
    match /prices/{priceId} {
      allow read, write: if request.auth != null && (
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin' ||
        (get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'dealer' &&
         resource.data.dealerId == get(/databases/$(database)/documents/users/$(request.auth.uid)).data.dealerId)
      );
    }
  }
}
─────────────────────────────────────── */

/* ─── PRINT ─── */
@media print{
  body,html{background:#fff!important;margin:0;padding:0}
  .no-print{display:none!important}
  .sidebar,.topbar,.overlay{display:none!important}
  .main{margin-left:0!important}
  .stmt-wrap{box-shadow:none!important;padding:0!important;border-radius:0!important}
  @page{size:A4;margin:15mm}
}

<script>
(function(){
  var _pending={};
  function bridge(name){
    window[name]=function(){
      var real=window['_m_'+name];
      if(real){real.apply(this,arguments);return;}
      // 이미 대기 중인 타이머가 있으면 인자만 업데이트
      if(_pending[name]){_pending[name].args=arguments;return;}
      var args=arguments;
      var tries=0;
      var t=setInterval(function(){
        tries++;
        var fn=window['_m_'+name];
        if(fn){
          clearInterval(t);delete _pending[name];
          fn.apply(window,_pending[name]?.args||args);
        }else if(tries>150){ // 15초 대기
          clearInterval(t);delete _pending[name];
          console.warn('[LogiNet] '+name+' 로드 지연 — 페이지를 새로고침해주세요');
          if(typeof toast==='function')toast('⚠️ 로딩이 지연되고 있습니다. 잠시 후 다시 시도해주세요.');
          else alert('로딩 중입니다. 잠시 후 다시 시도해주세요.');
        }
      },100);
      _pending[name]={t,args};
    };
  }
  ['doLogin','doLogout','openSb','closeSb','toggleDark','closeModal','goPage',
   'openAddDealer','addDealer','addDealerV2','editDealer','saveDealer',

// ══ calcNet — v9 완전 이식 ══

function getCampByRoute(route){
  if(!route) return '';
  const code=route.replace(/[A-Za-z]/g,'').slice(0,3);
  const map={'101':'부산1','215':'부산1','812':'부산2','508':'부산3','109':'대구2','213':'대구2B','608':'진주M','612':'진주M','613':'진주M','614':'진주M','619':'진주M'};
  return map[code]||'';
}
function calcNet(x){
  const dcnt=+x.dcnt||+x.delivCount||0;
  const rcnt=+x.rcnt||+x.retCount||0;
  const isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  const yDel=+x.yongDel||(G_PRICES.yong_del||900);
  const yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  const _rdList=x.routeDetails||[];
  const _damtRP=_rdList.reduce((s,rd)=>s+(rd.cnt||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0),0);
  const _ramtRP=_rdList.reduce((s,rd)=>s+(rd.ret||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0),0);
  const damt=isYong?dcnt*yDel:(_rdList.length?_damtRP:(+x.damt||+x.delivAmt||+x.base||0));
  const ramt=isYong?rcnt*yRet:(_rdList.length?_ramtRP:(+x.ramt||+x.retAmt||0));
  const fresh=+x.fresh||+x.freshAmt||0;
  const isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  const hasStoredFinc=(x.finc!==undefined&&x.finc!==null&&x.finc!=='');
  const finc=hasStoredFinc?+x.finc:(isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0);
  const inc=+x.inc||0;
  const nocont=+x.nocont||0;
  const etcPlus=+x.etcPlus||0;
  const etcMinus=+x.etcMinus||0;
  const income=damt+ramt+fresh+finc+inc+nocont+etcPlus;
  const totalAmt=income;
  const supplyAmt=Math.round(totalAmt/1.1);
  const expenseAmt=Math.round(supplyAmt*0.346);
  const monthlyWage=supplyAmt-expenseAmt;
  const empCalc=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
  const workCalc=Math.floor(monthlyWage*0.0088/10)*10;
  const TAX_RATE=+x.taxRate||0.033;
  const tax=+x.tax||(x.taxFixed?+x.taxFixed:Math.round(income*TAX_RATE));
  const emp=(x.emp!==undefined&&x.emp!==null&&x.emp!==''&&+x.emp>0)?+x.emp:empCalc;
  const workStored=(x.work!==undefined&&x.work!==null&&x.work!==''&&+x.work>0)?+x.work:0;
  const work=(workStored&&workCalc>0&&workStored>=workCalc*0.5)?workStored:workCalc;
  const eq=+x.eq||0;
  const dmg=+x.dmg||+x.damage||0;
  const adv=+x.adv||+x.advance||0;
  const deduct=emp+work+eq+dmg+adv+etcMinus;
  const net=totalAmt-deduct;
  return{damt,ramt,fresh,finc,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}

// ══ parseExcel — v9 완전 이식 ══
function parseExcelData(file,onResult){
  toast('📊 엑셀 분석 중...');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      // ★ 시트 자동 감지: '구분' 헤더가 있는 시트를 찾아서 사용 (SheetNames[0] 아님)
      let ws=null;
      for(const name of wb.SheetNames){
        const candidate=wb.Sheets[name];
        const sample=XLSX.utils.sheet_to_json(candidate,{header:1,defval:null,range:0});
        if(sample.length>0&&sample[0]&&sample[0][0]==='구분'){ws=candidate;break;}
      }
      // 못 찾으면 전체에서 hIdx 탐색 (헤더가 중간 행에 있는 경우)
      if(!ws){
        for(const name of wb.SheetNames){
          const candidate=wb.Sheets[name];
          const allRows=XLSX.utils.sheet_to_json(candidate,{header:1,defval:null});
          if(allRows.some(r=>r&&r[0]==='구분')){ws=candidate;break;}
        }
      }
      if(!ws){toast('❌ 구분 헤더가 있는 시트를 찾을 수 없습니다\n(정산Raw 또는 배송내역 시트 필요)');return;}

      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const hIdx=rows.findIndex(r=>r&&r[0]==='구분');
      if(hIdx<0){toast('❌ 구분 헤더를 찾을 수 없습니다');return;}

      // ★ 컬럼 레이아웃 (2026년 쿠팡 정산서 형식):
      // [0]구분 [1]ID [2]Route [3]날짜 [4]캠프 [5]배송유형 [6]업체명
      // [7]배송건수 [8]반품건수 [9]단가 [10]추가인센 [11]기본금액
      // [12]추가인센금액 [13]총금액 [14]프레시백인센

      let totalAmt=0,totalFresh=0,totalDel=0,totalRet=0,totalRetAmt=0;
      let totalNocont=0,totalNocontCnt=0;
      const routeMap={};
      const dailyRows=[];

      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;
        const cat=String(row[0]).trim();
        if(cat==='배송'||cat==='수기반영'){
          const route=row[2]?String(row[2]).trim():'기타';
          const del=+row[7]||0,ret=+row[8]||0;
          // ★ v9 정책: 기사 단가 = RPRICE (관리자 설정), 엑셀 row[9]는 쿠팡→회사 단가(매출용)
          const unitPrice=RPRICE[route]||0;
          const delAmt=del*unitPrice;
          const retAmt=ret*unitPrice;
          let dateRaw=row[3],dateStr='';
          if(dateRaw instanceof Date)dateStr=dateRaw.toISOString().slice(0,10);
          else if(typeof dateRaw==='string')dateStr=dateRaw.slice(0,10);
          else if(dateRaw)dateStr=String(dateRaw).slice(0,10);
          totalAmt+=delAmt;totalDel+=del;totalRet+=ret;totalRetAmt+=retAmt;
          if(!routeMap[route])routeMap[route]={cnt:0,ret:0,amt:0,retAmt:0,unitPrice};
          routeMap[route].cnt+=del;routeMap[route].ret+=ret;
          routeMap[route].amt+=delAmt;routeMap[route].retAmt+=retAmt;
          if(del>0)dailyRows.push({date:dateStr,route,cnt:del,ret,unitPrice,amt:delAmt,retAmt});
        }else if(
          cat.includes('프레쉬백')||cat.includes('프레시백')||
          cat.includes('에코백')  // ★ 에코백 = 프레시백과 동일 처리
        ){
          // ★ 프레시백/에코백 금액: row[14] (프레시백 회수 인센티브)
          totalFresh+=+row[14]||0;
        }else if(cat==='미계약 라우트'||cat==='미계약건'||cat==='미계약'){
          // ★ 미계약: count=row[8], amount=row[13] (2026 포맷)
          const miscCnt=+row[8]||+row[7]||0;
          const miscAmt=+row[13]||+row[14]||+row[10]||0;
          totalNocont+=miscAmt;totalNocontCnt+=miscCnt;
          if(!routeMap['미계약'])routeMap['미계약']={cnt:miscCnt,ret:0,amt:miscAmt,retAmt:0,unitPrice:0};
          else{routeMap['미계약'].cnt+=miscCnt;routeMap['미계약'].amt+=miscAmt;}
        }
      });

      const routes=Object.entries(routeMap)
        .map(([r,v])=>({route:r,cnt:v.cnt,ret:v.ret,amt:v.amt,retAmt:v.retAmt||0,unitPrice:v.unitPrice}))
        .sort((a,b)=>b.amt-a.amt);
      const finc=Math.round(totalDel*(G_PRICES.freshbag_inc||25));
      const driverId=rows[hIdx+1]&&rows[hIdx+1][1]?String(rows[hIdx+1][1]).trim():'';

      // ★ 전체 기사 ID + 캠프 추출 (자동 등록용)
      const allDriversMap={};
      const routeCampsMap={};
      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;
        const cat=String(row[0]).trim();
        if((cat==='배송'||cat==='수기반영')&&row[1]&&row[2]){
          const did=String(row[1]).trim();
          const route=String(row[2]).trim();
          const camp=row[4]?String(row[4]).trim():'';
          if(did&&!allDriversMap[did])allDriversMap[did]={id:did,camp};
          if(route&&route!=='미계약'&&!routeCampsMap[route])routeCampsMap[route]=camp;
        }
      });

      // ★ 기사별 분리 정산 데이터 생성
      const perDriverMap={};
      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;
        const cat=String(row[0]).trim();
        if(cat!=='배송'&&cat!=='수기반영')return;
        if(!row[1])return;
        const did=String(row[1]).trim();
        const route=row[2]?String(row[2]).trim():'기타';
        const del=+row[7]||0,ret=+row[8]||0;
        const unitPrice=RPRICE[route]||0;
        const camp=row[4]?String(row[4]).trim():'';
        if(!perDriverMap[did])perDriverMap[did]={
          id:did,camp,routes:{},totalDel:0,totalRet:0,totalAmt:0,totalRetAmt:0
        };
        const pd=perDriverMap[did];
        pd.totalDel+=del;pd.totalRet+=ret;
        pd.totalAmt+=del*unitPrice;pd.totalRetAmt+=ret*unitPrice;
        if(!pd.routes[route])pd.routes[route]={cnt:0,ret:0,amt:0,retAmt:0,unitPrice};
        pd.routes[route].cnt+=del;pd.routes[route].ret+=ret;
        pd.routes[route].amt+=del*unitPrice;pd.routes[route].retAmt+=ret*unitPrice;
      });
      // 프레시백도 기사별 분리
      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;
        const cat=String(row[0]).trim();
        if(!(cat.includes('프레시백')||cat.includes('프레쉬백')||cat.includes('에코백')))return;
        if(!row[1])return;
        const did=String(row[1]).trim();
        if(perDriverMap[did])perDriverMap[did].fresh=(perDriverMap[did].fresh||0)+(+row[14]||0);
      });

      const perDriverList=Object.values(perDriverMap).map(pd=>({
        driverId:pd.id,camp:pd.camp,
        routes:Object.entries(pd.routes).map(([r,v])=>({route:r,cnt:v.cnt,ret:v.ret,amt:v.amt,retAmt:v.retAmt,unitPrice:v.unitPrice})),
        totalDel:pd.totalDel,totalRet:pd.totalRet,
        totalAmt:pd.totalAmt,totalRetAmt:pd.totalRetAmt,
        fresh:pd.fresh||0
      }));

      onResult({
        routes,dailyRows,totalAmt,totalFresh,totalDel,totalRet,totalRetAmt,
        totalNocont,totalNocontCnt,finc,driverIdFromExcel:driverId,
        allDrivers:Object.values(allDriversMap),
        routeCamps:routeCampsMap,
        perDriverList  // ★ 기사별 개별 데이터
      });
    }catch(e){toast('❌ 엑셀 분석 오류: '+e.message);console.error(e);}
  };
  reader.readAsArrayBuffer(file);
}

window.shareKakao=function(id,driver,month,net){
  const url=location.origin+location.pathname+'#view:'+id;
  const msg=`[로지넷 정산]\n${driver} 기사 ${month} 정산 명세서\n실지급액: ₩${net}\n\n${url}`;
  const kakaoUrl='https://sharer.kakao.com/talk/friends/picker/link?url='+encodeURIComponent(url);
  // 카카오톡 앱 딥링크 시도
  const shareData={title:`${driver} ${month} 정산 명세서`,text:msg,url};
  if(navigator.share){
    navigator.share(shareData).catch(()=>window.open(kakaoUrl,'_blank'));
  }else{
    // 모바일: 카카오 URI 스킴
    const kakaoAppUrl=`kakaolink://send?text=${encodeURIComponent(msg)}`;
    const win=window.open(kakaoAppUrl,'_blank');
    setTimeout(()=>{
      try{if(!win||win.closed)throw new Error();}
      catch(e){
        if(confirm(`카카오톡 앱이 없으면 링크를 복사합니다.\n\n${msg}\n\n링크 복사하시겠습니까?`)){
          navigator.clipboard.writeText(url).then(()=>toast('🔗 링크 복사됨')).catch(()=>prompt('복사:',url));
        }
      }
    },1500);
  }
};

  const contaminated=docs.filter(d=>d.dealerId&&d.dealerId!==dealerId);

  }
}

window.addDealerV2=async function(){
  const name=document.getElementById('d2-name')?.value?.trim();
  const email=document.getElementById('d2-email')?.value?.trim();
  const pw=document.getElementById('d2-pw')?.value?.trim();
  const brn=document.getElementById('d2-brn')?.value?.trim();
  if(!name||!email||!pw){toast('❌ 대리점명, 이메일, 비밀번호는 필수입니다');return;}
  const plan=document.getElementById('d2-plan')?.value||'standard';
  const trialDays=+(document.getElementById('d2-trial')?.value||30);
  const PLAN_FEE={starter:20000,standard:40000,pro:70000,enterprise:100000};
  const fee=PLAN_FEE[plan]||40000;
  // 만료일 계산
  const expDate=new Date();expDate.setDate(expDate.getDate()+trialDays+(trialDays>0?0:30));
  try{
    const uc=await createUserKeepSession(email,pw);
    const uid=uc.uid;
    const mgr=document.getElementById('d2-mgr')?.value||'';
    // 대리점 문서
    const dealerRef=await addDoc(collection(db,'dealers'),{
      name,email,contact:document.getElementById('d2-tel')?.value||'',
      managerName:mgr,
      brn:brn||'',ceoName:document.getElementById('d2-ceo')?.value||'',
      corpName:document.getElementById('d2-corp')?.value||name,
      bizType:document.getElementById('d2-biz')?.value||'',
      address:document.getElementById('d2-addr')?.value||'',
      adminUid:uid,active:true,driverCount:0,
      plan,monthlyFee:fee,
      contractStatus:'pending',
      createdAt:serverTimestamp()
    });
    // 사용자 역할
    await setDoc(doc(db,'users',uid),{
      email,name:mgr||name,role:'dealer',
      dealerId:dealerRef.id,dealerName:name,createdAt:serverTimestamp()
    });
    // 구독 문서 자동 생성
    await setDoc(doc(db,'subscriptions',dealerRef.id),{
      dealerId:dealerRef.id,dealerName:name,plan,monthlyFee:fee,
      status:'active',
      trialDays,
      startDate:new Date(),
      expireDate:expDate,
      createdAt:serverTimestamp()
    });
    // 첫 청구서 생성 (체험 기간 이후)
    const invoiceMonth=new Date();invoiceMonth.setDate(1);
    if(trialDays>0)invoiceMonth.setMonth(invoiceMonth.getMonth()+1);
    await addDoc(collection(db,'invoices'),{
      dealerId:dealerRef.id,dealerName:name,
      month:invoiceMonth.toISOString().slice(0,7),
      amount:fee,status:'pending',
      brn:brn||'',corpName:document.getElementById('d2-corp')?.value||name,
      ceoName:document.getElementById('d2-ceo')?.value||'',
      createdAt:serverTimestamp()
    });
    closeModal('mo-dealer-v2');
    toast(`✅ ${name} 대리점 추가 + 구독 생성 완료`);
    // 모두싸인 계약서 발송
    const sendContract=document.getElementById('d2-contract')?.checked;
    if(sendContract){
      await sendModusignContract({
        dealerId:dealerRef.id,name,email,mgr,brn,plan,fee,
        corp:document.getElementById('d2-corp')?.value||name,
        ceo:document.getElementById('d2-ceo')?.value||''
      });
    }
    PAGES['admin-dealers']();
  }catch(e){toast('❌ '+(e.code==='auth/email-already-in-use'?'이미 사용 중인 이메일':e.message))}
};
window._m_addDealerV2=window.addDealerV2;

window.deleteDealer=async function(dealerId,name){
  if(!confirm(`⚠️ "${name}" 대리점을 삭제하시겠습니까?\n\n• Firestore 대리점 문서 삭제\n• 구독/청구서 데이터 삭제\n• Firebase Auth 계정은 별도 삭제 필요\n\n계속하시겠습니까?`))return;
  try{
    // 관련 데이터 삭제
    const batch=writeBatch(db);
    batch.delete(doc(db,'dealers',dealerId));
    // subscriptions 삭제
    batch.delete(doc(db,'subscriptions',dealerId));
    await batch.commit();
    // invoices 삭제
    const iSnap=await getDocs(query(collection(db,'invoices'),where('dealerId','==',dealerId)));
    for(const d of iSnap.docs)await deleteDoc(doc(db,'invoices',d.id));
    // drivers 삭제
    const drSnap=await getDocs(query(collection(db,'drivers'),where('dealerId','==',dealerId)));
    for(const d of drSnap.docs)await deleteDoc(doc(db,'drivers',d.id));
    // settlements 삭제
    const sSnap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',dealerId)));
    for(const d of sSnap.docs)await deleteDoc(doc(db,'settlements',d.id));
    // users 문서 삭제
    const uSnap=await getDocs(query(collection(db,'users'),where('dealerId','==',dealerId)));
    for(const d of uSnap.docs)await deleteDoc(doc(db,'users',d.id));
    toast(`🗑 ${name} 대리점 삭제 완료\n(Firebase Auth 계정은 콘솔에서 별도 삭제)`);
    PAGES['admin-dealers']();
  }catch(e){toast('❌ '+e.message)}
};
window._m_deleteDealer=window.deleteDealer;

window.parseDriversFromExcel=function(inp){
  const file=inp.files[0];if(!file)return;
  toast('📊 기사 ID 추출 중...');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let ws=null;
      for(const name of wb.SheetNames){
        const candidate=wb.Sheets[name];
        const sample=XLSX.utils.sheet_to_json(candidate,{header:1,defval:null,range:0});
        if(sample.length>0&&sample[0]&&sample[0][0]==='구분'){ws=candidate;break;}
      }
      if(!ws){toast('❌ 정산Raw 시트를 찾을 수 없습니다');return;}

        name,userId:d.id,dealerId:CU.dealerId,

PAGES['dealer-settlements']=async function(){
  document.getElementById('page-title').textContent='정산 관리';
  document.getElementById('topbar-actions').innerHTML=`
    <select id="filter-month" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text)" onchange="filterSettles()">
      <option value="">전체 월</option>
    </select>
    <label style="position:relative;cursor:pointer">
      <input type="file" accept=".xlsx,.xls" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%" onchange="batchExcelUpload(this)">
      <span class="btn btn-green btn-sm">📂 쿠팡 엑셀 → 일괄정산</span>
    </label>
    <button class="btn btn-blue btn-sm" onclick="openNewSettle()">+ 수동 입력</button>`;
  // 캠프별 버튼 렌더
  const campBtnArea=document.createElement('div');
  campBtnArea.id='camp-filter-area';
  campBtnArea.style.cssText='display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px 0';
  const campColors={'부산1캠프':'#3B82F6','부산2캠프':'#8B5CF6','부산3캠프':'#10B981','대구2캠프':'#F59E0B','대구2B캠프':'#FB923C','진주M캠프':'#EF4444'};
  const camps=['전체','부산1캠프','부산2캠프','부산3캠프','대구2캠프','대구2B캠프','진주M캠프'];
  // 캠프별 카운트 계산 후 버튼 렌더 (settles 로드 후 업데이트)
  campBtnArea.innerHTML=camps.map((camp,i)=>{
    const col=campColors[camp]||'#6B7280';
    const isAll=camp==='전체';
    return `<button onclick="setCampFilter('${camp}')" id="camp-btn-${i}"
      style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid ${isAll?'var(--brand)':col};background:${isAll?'var(--brand)':'transparent'};color:${isAll?'#fff':col};transition:all .15s"
      >${isAll?'전체':camp.replace('캠프','')}</button>`;
  }).join('');
  // 기존 캠프 버튼 제거 후 재삽입
  document.getElementById('camp-filter-area')?.remove();
  document.getElementById('content').before(campBtnArea);
  window._campFilter='전체';
  window.setCampFilter=function(camp){
    window._campFilter=camp;
    camps.forEach((_,i)=>{
      const btn=document.getElementById('camp-btn-'+i);
      if(!btn)return;
      const isActive=camps[i]===camp;
      const col=campColors[camps[i]]||'var(--brand)';
      const activeBg=camps[i]==='전체'?'var(--brand)':col;
      btn.style.background=isActive?activeBg:'transparent';
      btn.style.color=isActive?'#fff':col;
    });
    filterSettles();
  };
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    // dealerId 있으면 필터, 없으면 전체 (admin)
    const settlQuery=CU.dealerId
      ? query(collection(db,'settlements'),where('dealerId','==',CU.dealerId))
      : collection(db,'settlements');
    const snap=await getDocs(settlQuery);
    if(CU.dealerId) checkDealerDataIntegrity(snap.docs.map(d=>d.data()),CU.dealerId,'settlements');
    if(snap.empty){
      c.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div style="font-size:15px;font-weight:700;margin-bottom:6px">정산 데이터가 없습니다</div><button class="btn btn-blue" onclick="openNewSettle()" style="margin-top:12px">+ 첫 정산 입력</button></div>`;
      buildSettleModal();return;
    }
    let settles=snap.docs.map(d=>({id:d.id,...d.data()}));
    settles.sort((a,b)=>(b.month||'').localeCompare(a.month||''));

    // 월 필터 채우기
    const months=[...new Set(settles.map(s=>s.month||''))].sort().reverse();
    const mSel=document.getElementById('filter-month');
    if(mSel)months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;mSel.appendChild(o);});

    window._allSettles=settles;
    window.filterSettles=function(){
      const m=(document.getElementById('filter-month')||{}).value||'';
      const camp=window._campFilter||'전체';
      let filtered=m?settles.filter(s=>s.month===m):settles;
      if(camp!=='전체'){
        filtered=filtered.filter(s=>{
          // routeDetails 배열에서 첫 번째 라우트로 캠프 판별
          const firstRoute=(s.routeDetails&&s.routeDetails[0])?s.routeDetails[0].route:(s.route||'');
          const campName=getCampByRoute(firstRoute);
          return (campName+'캠프')===camp;
        });
      }
      renderSettleTable(filtered);
    };
    renderSettleTable(settles);
    buildSettleModal();
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

function renderSettleTable(settles){
  // 캠프 버튼 카운트 업데이트
  const allSettles=window._allSettles||settles;
  const campCount={'전체':allSettles.length};
  allSettles.forEach(s=>{
    const route=(s.routeDetails&&s.routeDetails[0])?s.routeDetails[0].route:(s.route||'');
    const cn=getCampByRoute(route);
    if(cn){const full=cn+'캠프';campCount[full]=(campCount[full]||0)+1;}
  });
  ['전체','부산1캠프','부산2캠프','부산3캠프','대구2캠프','대구2B캠프','진주M캠프'].forEach((camp,i)=>{
    const btn=document.getElementById('camp-btn-'+i);
    if(!btn)return;
    const cnt=campCount[camp]||0;
    const label=camp==='전체'?`전체 (${cnt})`:camp.replace('캠프','')+` (${cnt})`;
    btn.textContent=label;
  });
  const tbody=document.getElementById('settle-tbody');
  if(tbody){
    tbody.innerHTML=settles.map(s=>buildSettleRow(s)).join('');return;
  }
  const totIncome=settles.reduce((a,s)=>a+(calcNet(s).income||0),0);
  const totNet=settles.reduce((a,s)=>a+(calcNet(s).net||0),0);
  const c=document.getElementById('content');
  if(!c)return;
  const rows=settles.map(s=>buildSettleRow(s)).join('');
  c.innerHTML=`
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-val">${settles.length}</div><div class="stat-lbl">📋 정산 건수</div></div>
      <div class="stat-card"><div class="stat-val">₩${fmt(totIncome)}</div><div class="stat-lbl">📊 수익 합계</div></div>
      <div class="stat-card"><div class="stat-val">₩${fmt(totNet)}</div><div class="stat-lbl">💰 실지급 합계</div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">📋 정산 목록 (${settles.length}건)</div></div>
      <div class="card-body">
        <div class="tbl-wrap"><table>
          <thead><tr><th>기사</th><th>캠프</th><th>정산월</th><th>분류</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>상태</th><th></th></tr></thead>
          <tbody id="settle-tbody">${rows}</tbody>
        </table></div>
      </div>
    </div>`;
  buildSettleModal();
}
function buildSettleRow(s){
  const r=calcNet(s);
  const dName=s.driverName||s.name||s.driver||s.userId||'';
  const firstRoute=(s.routeDetails&&s.routeDetails[0])?s.routeDetails[0].route:(s.route||'');
  const campName=getCampByRoute(firstRoute);
  const campColor={'부산1':'#3B82F6','부산2':'#8B5CF6','부산3':'#10B981','대구2':'#F59E0B','대구2B':'#FB923C','진주M':'#EF4444'}[campName]||'#6B7280';
  return`<tr>
    <td><strong>${esc(dName)}</strong></td>
    <td>${campName?`<span style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:${campColor}22;color:${campColor};border:1.5px solid ${campColor}">${campName}</span>`:''}</td>
    <td>${esc(s.month||'')}</td>
    <td><span class="badge b-blue" style="font-size:10px">${esc(s.jobsub||'쿠팡')}</span></td>
    <td style="color:var(--teal)">${fmt(s.dcnt||0)}건</td>
    <td style="color:var(--green);font-weight:700">₩${fmt(r.income)}</td>
    <td style="font-weight:900;color:var(--brand)">₩${fmt(r.net)}</td>
    <td><span class="badge ${s.status==='approved'?'b-green':'b-amber'}">${s.status==='approved'?'승인완료':'정산예정'}</span></td>
    <td style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="btn btn-outline btn-xs" onclick="viewSettle('${esc(s.id)}')">명세서</button>
      <button class="btn btn-gray btn-xs" onclick="editSettle('${esc(s.id)}')">✏️수정</button>
      ${s.status!=='approved'?`<button class="btn btn-green btn-xs" onclick="approveSettle('${esc(s.id)}')">✅승인</button>`:''}
      <button class="btn btn-red btn-xs" onclick="delSettle('${esc(s.id)}','${esc(dName)}')">삭제</button>
    </td>
  </tr>`;
}

// ★ 정산 수정 저장
window.updateSettle=async function(id){
  const driver=document.getElementById('se-driver').value.trim();
  if(!driver){toast('❌ 기사를 입력해주세요');return;}
  const month=document.getElementById('se-month').value;
  const g=elId=>+(document.getElementById(elId)||{value:0}).value||0;
  const gv=elId=>(document.getElementById(elId)||{value:''}).value||'';
  const j=gv('se-jobsub')||'쿠팡';
  const isYong=j==='용차';const isCoupang=j==='쿠팡';
  const dcnt=g('se-dcnt');const rcnt=g('se-rcnt');
  const yDel=g('se-yong-del')||900;const yRet=g('se-yong-ret')||900;
  const damt=isYong?dcnt*yDel:g('se-damt');
  const ramt=isYong?rcnt*yRet:g('se-ramt');
  const finc=isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0;
  const etcPlus=g('se-etc-plus'),etcMinus=g('se-etc-minus');
  const income=damt+ramt+g('se-fresh')+finc+g('se-nocont')+etcPlus;
  const supplyAmt=Math.round(income/1.1);
  const wage=Math.round(supplyAmt*(1-0.346));
  const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;
  const work=Math.floor(wage*0.0088/10)*10;
  const deduct=emp+work+g('se-dmg')+g('se-adv')+etcMinus;
  const net=income-deduct;
  try{
    await updateDoc(doc(db,'settlements',id),{
      driverName:driver,driver,month,jobsub:j,
      dcnt,damt,rcnt,ramt,fresh:g('se-fresh'),finc,
      nocont:g('se-nocont'),nocontCnt:g('se-nocont-cnt'),
      etcPlus,etcPlusReason:gv('se-etc-plus-r'),
      etcMinus,etcMinusReason:gv('se-etc-minus-r'),
      dmg:g('se-dmg'),dmgReason:gv('se-dmg-r'),adv:g('se-adv'),
      yongDel:isYong?yDel:0,yongRet:isYong?yRet:0,
      income,supplyAmt,monthlyWage:wage,emp,work,deduct,net,
      routeDetails:_excelRoutes,updatedAt:serverTimestamp()
    });
    closeModal('mo-settle');resetSettleForm();_excelRoutes=[];
    // 저장 버튼 원복
    const mdb=document.querySelector('#mo-settle .mdf');
    if(mdb)mdb.innerHTML=`<button class="btn btn-gray" onclick="closeModal('mo-settle');resetSettleForm()">취소</button><button class="btn btn-blue" onclick="saveSettle()">💾 저장 &amp; 공유</button>`;
    toast(`✅ ${driver} ${month} 정산서 수정 완료`);
    PAGES['dealer-settlements']();
  }catch(e){toast('❌ '+e.message)}
};

window.handleExcelUpload=function(inp){
  const file=inp.files[0];if(!file)return;
  // ★ 파일명에서 월 자동 감지 (필수)
  let autoMonth='';
  const fnM=file.name.match(/(20[0-9]{2})[-_./]?(0[1-9]|1[0-2])/);
  if(fnM){ autoMonth=fnM[1]+'-'+fnM[2]; }
  else {
    // 파일명에서 못 찾으면 현재 월 사용
    const now=new Date();
    autoMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  }
  const mEl=document.getElementById('se-month');
  if(mEl) mEl.value=autoMonth;

  parseExcelData(file,async function(result){
    _excelRoutes=result.routes;
    const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
    sv('se-dcnt',result.totalDel);sv('se-damt',result.totalAmt);
    sv('se-rcnt',result.totalRet);sv('se-ramt',result.totalRetAmt);
    sv('se-fresh',result.totalFresh);sv('se-finc',result.finc);
    sv('se-nocont',result.totalNocont);sv('se-nocont-cnt',result.totalNocontCnt);

    // ★ 기사 자동 매칭 (단일 기사)
    if(result.driverIdFromExcel){
      window._lastDriverId=result.driverIdFromExcel;
      try{
        const drSnap=await getDocs(query(collection(db,'drivers'),
          where('userId','==',result.driverIdFromExcel),where('dealerId','==',CU.dealerId)));
        if(!drSnap.empty){
          const dr=drSnap.docs[0].data();
          const dEl=document.getElementById('se-driver');
          if(dEl&&!dEl.value){dEl.value=dr.name;}
          const jEl=document.getElementById('se-jobsub');
          if(jEl&&dr.jobsub)jEl.value=dr.jobsub;
          onJobsubChange();
          toast(`👤 기사 자동 매칭: ${dr.name}`);
        }
      }catch(e){}
    }
    calcSettlePreview();
    const drop=document.getElementById('se-excel-drop');
    if(drop)drop.className='excel-drop done';

    // ★ 기사별 자동 매핑 + 정보 표시
    if(result.perDriverList?.length){
      // drivers 컬렉션에서 userId→이름 매핑
      let driverNameMap={};
      try{
        const drSnap=await getDocs(query(collection(db,'drivers'),where('dealerId','==',CU.dealerId)));
        drSnap.docs.forEach(d=>{
          const dd=d.data();
          if(dd.userId) driverNameMap[dd.userId]=dd.name||dd.userId;
        });
      }catch(e){}

      window._perDriverList=result.perDriverList;
      window._autoMonth=autoMonth;
      window._driverNameMap=driverNameMap;

      const infoEl=document.getElementById('se-auto-info');
      const infoTxt=document.getElementById('se-auto-info-text');
      if(infoEl&&infoTxt){
        infoEl.style.display='block';
        const driverSummary=result.perDriverList.map(pd=>{
          const name=driverNameMap[pd.driverId]||pd.driverId;
          const camp=pd.camp||'';
          return `<span style="display:inline-block;margin-right:8px;margin-bottom:4px;padding:2px 8px;border-radius:12px;background:var(--brand-l);border:1px solid var(--brand);font-size:11px">👤 ${name} (${fmt(pd.totalDel)}건)</span>`;
        }).join('');
        infoTxt.innerHTML=`📅 <strong>${autoMonth}</strong> &nbsp;|&nbsp; 👥 <strong>${result.perDriverList.length}명</strong><br>${driverSummary}<br><button class="btn btn-blue" style="margin-top:8px;width:100%" onclick="saveBatchSettle()">✅ 전체 기사 ${result.perDriverList.length}명 일괄 정산 저장</button>`;
      }
    }

    // ★ 기사 자동 등록 (미등록 기사만)
    if(result.allDrivers?.length&&CU.dealerId){
      try{
        const exSnap=await getDocs(query(collection(db,'drivers'),where('dealerId','==',CU.dealerId)));
        const existIds=new Set(exSnap.docs.map(d=>d.data().userId));
        const campMap={'부산1':'부산1','부산2':'부산2','부산3':'부산3','M_진주1':'진주M','대구2':'대구2','대구2B':'대구2B'};
        let newCount=0;
        for(const drv of result.allDrivers){
          if(existIds.has(drv.id))continue;
          const camp=campMap[drv.camp]||drv.camp||'기타';
          await addDoc(collection(db,'drivers'),{
            name:'',userId:drv.id,dealerId:CU.dealerId,
            camp,jobsub:'쿠팡',is_active:true,status:'재직',
            createdAt:serverTimestamp()
          });
          newCount++;
        }
        if(newCount>0)toast(`👥 ${newCount}명 신규 기사 자동 등록 — 기사 관리에서 성함 입력해주세요`);
      }catch(e){console.warn('auto driver reg:',e.message);}
    }

    // ★ 라우트 단가 자동 등록 (미등록 라우트만)
    if(result.routeCamps&&CU.dealerId){
      try{
        const prSnap=await getDocs(query(collection(db,'prices'),where('dealerId','==',CU.dealerId)));
        const existRoutes=new Set(prSnap.docs.map(d=>d.data().route));
        const campMap={'부산1':'부산1캠프','부산2':'부산2캠프','부산3':'부산3캠프',
          'M_진주1':'진주M캠프','대구2':'대구2캠프','대구2B':'대구2B캠프'};
        let routeCount=0;
        for(const [route,rawCamp] of Object.entries(result.routeCamps)){
          if(existRoutes.has(route)||route==='미계약')continue;
          const camp=campMap[rawCamp]||rawCamp||CAMP_NAMES[route.replace(/[A-D]$/,'')]||'기타';
          const price=RPRICE[route]||0;
          await addDoc(collection(db,'prices'),{
            dealerId:CU.dealerId,route,camp,price,createdAt:serverTimestamp()
          });
          routeCount++;
        }
        if(routeCount>0)toast(`📌 ${routeCount}개 라우트 자동 등록됨`);
      }catch(e){console.warn('auto route reg:',e.message);}
    }

    // ★ 캠프별 라우트 분류
    const cmap={'101':'부산1캠프','215':'부산1캠프','812':'부산2캠프','508':'부산3캠프',
      '109':'대구2캠프','213':'대구2B캠프','608':'진주M캠프','612':'진주M캠프',
      '613':'진주M캠프','614':'진주M캠프','619':'진주M캠프'};
    const ccol={'부산1캠프':'#3B82F6','부산2캠프':'#8B5CF6','부산3캠프':'#10B981',
      '대구2캠프':'#F59E0B','대구2B캠프':'#FB923C','진주M캠프':'#EF4444','기타':'#6B7280','미계약':'#F59E0B'};
    const campRoutes={};
    result.routes.forEach(r=>{
      const prefix=r.route.replace(/[A-D]$/,'');
      const camp=r.route==='미계약'?'미계약':(cmap[prefix]||'기타');
      campRoutes[camp]=campRoutes[camp]||[];campRoutes[camp].push(r);
    });

window.calcSettlePreview=function(){
  const g=id=>+(document.getElementById(id)||{value:0}).value||0;
  const j=(document.getElementById('se-jobsub')||{}).value||'쿠팡';
  const isYong=j==='용차';
  const isCoupang=j==='쿠팡';
  const dcnt=g('se-dcnt');
  let finc=isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0;
  const fincEl=document.getElementById('se-finc');
  if(fincEl)fincEl.value=finc;
  if(isYong){
    const yDel=g('se-yong-del')||900,yRet=g('se-yong-ret')||900;
    const rcnt=g('se-rcnt');
    const da=document.getElementById('se-damt');if(da&&!da.dataset.manual)da.value=dcnt*yDel;
    const ra=document.getElementById('se-ramt');if(ra&&!ra.dataset.manual)ra.value=rcnt*yRet;
    finc=0;
  }
  const income=g('se-damt')+g('se-ramt')+g('se-fresh')+finc+g('se-nocont')+g('se-etc-plus');
  const supplyAmt=Math.round(income/1.1);
  const expAmt=Math.round(supplyAmt*0.346);
  const wage=supplyAmt-expAmt;
  const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;
  const work=Math.floor(wage*0.0088/10)*10;
  const deduct=emp+work+g('se-dmg')+g('se-adv')+g('se-etc-minus');
  const net=income-deduct;
  const s=function(id,v,pfx=''){const el=document.getElementById(id);if(el)el.textContent=(pfx||'')+'₩'+fmt(v);};
  s('cp-income',income);s('cp-total',income);s('cp-wage',wage);
  s('cp-emp',emp,'-');s('cp-work',work,'-');s('cp-deduct',deduct,'-');s('cp-net',net);
};

window.batchExcelUpload=async function(inp){
  const file=inp.files[0];
  if(!file)return;
  inp.value='';

  // 파일명에서 월 추출: 2026년_04월 → 2026-04
  const fnMatch=file.name.match(/(\d{4})년[_\s]*(\d{2})월/);
  const autoMonth=fnMatch?`${fnMatch[1]}-${fnMatch[2]}`:curMonth();

  toast('📊 엑셀 분석 중...');

  parseExcelData(file,async function(result){
    if(!result.perDriverList?.length){toast('❌ 기사 데이터를 찾을 수 없습니다');return;}

    // 등록된 기사 매핑
    let nameMap={};
    try{
      const drSnap=await getDocs(query(collection(db,'drivers'),where('dealerId','==',CU.dealerId)));
      drSnap.docs.forEach(d=>{const dd=d.data();if(dd.userId)nameMap[dd.userId]=dd.name||'';});
    }catch(e){}

    // 기존 같은 월 정산 확인
    let existIds=new Set();
    try{
      const exSnap=await getDocs(query(collection(db,'settlements'),
        where('dealerId','==',CU.dealerId),where('month','==',autoMonth)));
      exSnap.docs.forEach(d=>existIds.add(d.data().driver));
    }catch(e){}

    // 미등록 기사 자동 등록
    const campMap={'M_진주1':'진주M','M_진주':'진주M','부산1':'부산1','부산2':'부산2','부산3':'부산3','대구2B':'대구2B','대구2':'대구2'};
    for(const pd of result.perDriverList){
      if(!(pd.driverId in nameMap)){
        const camp=Object.entries(campMap).find(([k])=>pd.camp?.includes(k))?.[1]||pd.camp||'기타';
        try{
          await addDoc(collection(db,'drivers'),{
            name:'',userId:pd.driverId,dealerId:CU.dealerId,
            camp,jobsub:'쿠팡',is_active:true,status:'재직',createdAt:serverTimestamp()
          });
          nameMap[pd.driverId]='';
        }catch(e){}
      }
    }

    // 프리뷰 팝업 표시
    const previewId='mo-batch-preview';
    document.getElementById(previewId)?.remove();
    const rows=result.perDriverList.map(pd=>{
      const name=nameMap[pd.driverId]||'';
      const isDup=existIds.has(pd.driverId);
      const campRaw=pd.camp||'';
      const camp=Object.entries(campMap).find(([k])=>campRaw.includes(k))?.[1]||campRaw;
      return`<tr style="${isDup?'opacity:.5':''}">
        <td><input id="pv-name-${pd.driverId.replace(/@/g,'_')}" value="${esc(name)}" placeholder="성함 입력" style="width:80px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px"></td>
        <td style="font-size:11px;color:var(--text3)">${esc(pd.driverId)}</td>
        <td><span style="font-size:10px;font-weight:700;background:${{'진주M':'#ffeaea','부산1':'#eaf0ff','부산2':'#f3eaff','부산3':'#eafff3','대구2':'#fff7ea'}[camp]||'#f0f0f0'};padding:2px 7px;border-radius:10px">${camp}</span></td>
        <td style="text-align:right">${(pd.totalDel+pd.totalRet).toLocaleString()}건</td>
        <td style="text-align:right;font-weight:700;color:var(--brand)">₩${fmt(pd.totalAmt+pd.totalRetAmt)}</td>
        ${isDup?'<td style="color:var(--red);font-size:11px">중복</td>':'<td></td>'}
      </tr>`;
    }).join('');
    const dupCnt=result.perDriverList.filter(pd=>existIds.has(pd.driverId)).length;

    document.getElementById('modals').insertAdjacentHTML('beforeend',`
      <div class="mo show" id="${previewId}">
        <div class="md" style="max-width:620px">
          <div class="mdt">📊 ${autoMonth} 일괄정산 미리보기 — ${result.perDriverList.length}명
            <button class="close-btn" onclick="document.getElementById('${previewId}').remove()">✕</button>
          </div>
          <div class="mdb">
            ${dupCnt>0?`<div style="background:#fff7e6;border:1px solid #f6ad55;border-radius:8px;padding:8px 12px;font-size:12px;color:#744210;margin-bottom:10px">⚠️ 중복 ${dupCnt}명은 저장 제외됩니다</div>`:''}
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">💡 성함이 비어있으면 나중에 기사 관리에서 수정 가능합니다</div>
            <div style="max-height:360px;overflow-y:auto">
              <table style="width:100%;border-collapse:collapse;font-size:12px">
                <thead><tr style="background:var(--bg2)"><th style="padding:6px 8px;text-align:left">성함</th><th style="padding:6px 8px;text-align:left">아이디</th><th>캠프</th><th style="text-align:right">건수</th><th style="text-align:right">금액</th><th></th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
          <div class="mdf">
            <button class="btn btn-gray" onclick="document.getElementById('${previewId}').remove()">취소</button>
            <button class="btn btn-blue" onclick="confirmBatchSave(${JSON.stringify(autoMonth)},${result.perDriverList.length})">✅ ${result.perDriverList.filter(pd=>!existIds.has(pd.driverId)).length}명 정산 저장</button>
          </div>
        </div>
      </div>`);

    window._batchPreviewData={perDriverList:result.perDriverList,autoMonth,nameMap,existIds,campMap};
  });
};

window.confirmBatchSave=async function(autoMonth,total){
  const {perDriverList,nameMap,existIds,campMap}=window._batchPreviewData||{};

      // 프리뷰에서 입력한 이름 우선
      const nameInput=document.getElementById('pv-name-'+pd.driverId.replace(/@/g,'_'));
      const driverName=nameInput?.value.trim()||nameMap[pd.driverId]||pd.driverId;
      // 이름 업데이트
      if(nameInput?.value.trim()){
        try{
          const drSnap=await getDocs(query(collection(db,'drivers'),
            where('userId','==',pd.driverId),where('dealerId','==',CU.dealerId)));
          if(!drSnap.empty)await updateDoc(drSnap.docs[0].ref,{name:nameInput.value.trim()});
        }catch(e){}
      }
      const campRaw=pd.camp||'';
      const camp=Object.entries(campMap).find(([k])=>campRaw.includes(k))?.[1]||campRaw||'기타';
      const dcnt=pd.totalDel,rcnt=pd.totalRet;
      const damt=pd.totalAmt,ramt=pd.totalRetAmt;
      const freshRaw=pd.fresh||0;
      const finc=Math.round(dcnt*(G_PRICES.freshbag_inc||25));
      const income=damt+ramt+freshRaw+finc;
      const supplyAmt=Math.round(income/1.1);
      const wage=Math.round(supplyAmt*(1-0.346));
      const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;
      const work=Math.floor(wage*0.0088/10)*10;
      const deduct=emp+work;
      const net=income-deduct;
      await addDoc(collection(db,'settlements'),{
        dealerId:CU.dealerId,
        driverName,driver:pd.driverId,
        camp,month:autoMonth,jobsub:'쿠팡',
        dcnt,damt,rcnt,ramt,
        fresh:freshRaw,finc,inc:0,
        nocont:0,nocontCnt:0,
        etcPlus:0,etcMinus:0,dmg:0,adv:0,
        income,supplyAmt,monthlyWage:wage,
        emp,work,deduct,net,
        routeDetails:pd.routes,
        status:'pending',createdAt:serverTimestamp()

    document.getElementById('mo-batch-preview')?.remove();
    toast(`✅ ${saved}명 정산 저장 완료!`);
    PAGES['dealer-settlements']();
  }catch(e){
    toast('❌ 저장 오류: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='다시 시도';}
  }
};

PAGES['dealer-stats']=async function(){
  document.getElementById('page-title').textContent='통계';
  document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const sSnap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId)));
    const settles=sSnap.docs.map(d=>({id:d.id,...d.data()}));
    if(settles.length===0){c.innerHTML='<div class="empty"><div class="empty-icon">📈</div><div>정산 데이터가 없습니다</div></div>';return;}

    // 월별 집계
    const byMonth={};
    settles.forEach(s=>{
      const m=s.month||'';
      if(!byMonth[m])byMonth[m]={cnt:0,income:0,net:0,dcnt:0};
      const r=calcNet(s);
      byMonth[m].cnt++;byMonth[m].income+=r.income;byMonth[m].net+=r.net;byMonth[m].dcnt+=(s.dcnt||0);
    });
    const months=Object.keys(byMonth).sort().reverse().slice(0,12);

    // 기사별 집계
    const byDriver={};
    settles.forEach(s=>{
      const n=s.driverName||s.driver||'';
      if(!byDriver[n])byDriver[n]={cnt:0,income:0,net:0,dcnt:0};
      const r=calcNet(s);
      byDriver[n].cnt++;byDriver[n].income+=r.income;byDriver[n].net+=r.net;byDriver[n].dcnt+=(s.dcnt||0);
    });
    const drivers=Object.entries(byDriver).sort((a,b)=>b[1].net-a[1].net);

    const monthRows=months.map(m=>{
      const d=byMonth[m];
      return`<tr>
        <td><strong>${esc(m)}</strong></td>
        <td>${fmt(d.dcnt)}건</td>
        <td style="color:var(--green)">₩${fmt(d.income)}</td>
        <td style="font-weight:800;color:var(--brand)">₩${fmt(d.net)}</td>
        <td>${d.cnt}건</td>
      </tr>`;
    }).join('');
    const driverRows=drivers.map(([n,d],i)=>`<tr>
      <td><strong>${i+1}. ${esc(n)}</strong></td>
      <td>${fmt(d.dcnt)}건</td>
      <td style="color:var(--green)">₩${fmt(d.income)}</td>
      <td style="font-weight:800;color:var(--brand)">₩${fmt(d.net)}</td>
      <td>${d.cnt}회</td>
    </tr>`).join('');

    // 월별 차트 (전체 기간)
    const allMonths=Object.keys(byMonth).sort();
    const maxNet=Math.max(...allMonths.map(m=>byMonth[m].net),1);
    const chartBars=allMonths.map(m=>`
      <div class="chart-bar-col">
        <div class="chart-bar" style="height:${Math.round((byMonth[m].net/maxNet)*100)}px">
          <div class="chart-bar-val">${fmt(Math.round(byMonth[m].net/10000))}만</div>
        </div>
        <div class="chart-bar-lbl">${m.slice(5)}월</div>
      </div>`).join('');

    c.innerHTML=`
      <div class="card">
        <div class="card-header"><div class="card-title">📈 월별 실지급액 추이</div></div>
        <div class="card-body"><div class="chart-bar-wrap" style="position:relative;padding-top:24px">${chartBars}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="card">
          <div class="card-header"><div class="card-title">📅 월별 정산 현황</div></div>
          <div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>월</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>건수</th></tr></thead><tbody>${monthRows}</tbody></table></div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">🏆 기사별 누적 순위</div></div>
          <div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>기사</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>정산회</th></tr></thead><tbody>${driverRows}</tbody></table></div></div>
        </div>
      </div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

const MODUSIGN_API='https://api.modusign.co.kr';

async function getModusignKey(){
  try{
    const snap=await getDoc(doc(db,'settings','modusign'));
    return snap.exists()?snap.data().apiKey||'':'';
  }catch(e){return '';}

async function sendModusignContract(dealer){
  const apiKey=await getModusignKey();
  if(!apiKey){
    toast('⚠️ 모두싸인 API 키 미설정 — 설정 페이지에서 등록해주세요');
    return;
  }
  try{
    const templateSnap=await getDoc(doc(db,'settings','modusign'));
    const templateId=templateSnap.exists()?templateSnap.data().templateId||'':'';
    const PLAN_KO={starter:'스타터',standard:'스탠다드',pro:'프로',enterprise:'엔터프라이즈'};
    const body={
      document:{
        title:`[로지넷] ${dealer.name} 서비스이용계약서`,
        participantMappings:[{
          name:dealer.mgr||dealer.name,
          email:dealer.email,
          signingMethod:{type:'EMAIL'}
        }]
      }
    };
    if(templateId)body.templateId=templateId;
    const res=await fetch(`${MODUSIGN_API}/documents${templateId?'/embedded/from-template':''}`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify(body)
    });
    if(res.ok){
      const data=await res.json();
      // 계약서 ID를 Firestore에 저장
      await updateDoc(doc(db,'dealers',dealer.dealerId),{
        contractDocId:data.id||'',contractStatus:'sent',contractSentAt:serverTimestamp()
      });
      toast(`✍️ ${dealer.name} 계약서 발송 완료 (모두싸인)`);
    }else{
      const err=await res.json().catch(()=>({}));
      console.warn('[Modusign]',err);
      toast(`⚠️ 계약서 발송 실패: ${err.message||res.status} — 모두싸인에서 수동 발송해주세요`);
    }
  }catch(e){
    console.warn('[Modusign CORS]',e.message);
    toast('⚠️ 계약서는 모두싸인 대시보드에서 수동 발송해주세요 (CORS 제한)');
  }
}

window.extendSub=async function(dealerId,days){
  try{
    const snap=await getDoc(doc(db,'subscriptions',dealerId));
    const sub=snap.exists()?snap.data():{};
    const now=new Date();
    const base=sub.expireDate?.toDate?.()>now?sub.expireDate.toDate():now;
    const newExp=new Date(base);newExp.setDate(newExp.getDate()+days);
    await setDoc(doc(db,'subscriptions',dealerId),{status:'active',expireDate:newExp,updatedAt:serverTimestamp()},{merge:true});
    toast(`✅ ${days}일 연장 완료 → ${newExp.toLocaleDateString('ko-KR')}`);
    PAGES['admin-subscriptions']();

window.genAllInvoices=async function(){
  if(!confirm(`${curMonth()} 청구서를 전체 대리점에 생성하시겠습니까?`))return;
  try{
    const [dSnap,sSnap,iSnap]=await Promise.all([getDocs(collection(db,'dealers')),getDocs(collection(db,'subscriptions')),getDocs(query(collection(db,'invoices'),where('month','==',curMonth())))]);
    const existingDealer=new Set(iSnap.docs.map(d=>d.data().dealerId));
    const subMap={};sSnap.forEach(d=>subMap[d.id]=d.data());
    let cnt=0;
    for(const d of dSnap.docs){
      if(existingDealer.has(d.id))continue;
      const dd=d.data();const sub=subMap[d.id]||{};
      const fee=sub.monthlyFee||PLAN_FEE[sub.plan||'standard']||40000;
      await addDoc(collection(db,'invoices'),{
        dealerId:d.id,dealerName:dd.name,month:curMonth(),
        amount:fee,plan:sub.plan||'standard',
        status:'pending',brn:dd.brn||'',corpName:dd.corpName||dd.name,
        ceoName:dd.ceoName||'',createdAt:serverTimestamp()
      });cnt++;
    }
    toast(`✅ ${cnt}건 청구서 생성 완료`);PAGES['admin-invoices']();
  }catch(e){toast('❌ '+e.message)}
};

    // 구독 1개월 연장
    const sSnap=await getDoc(doc(db,'subscriptions',inv.dealerId));
    if(sSnap.exists()){
      const sub=sSnap.data();
      const now=new Date();
      const base=sub.expireDate?.toDate?.()>now?sub.expireDate.toDate():now;
      const newExp=new Date(base);newExp.setMonth(newExp.getMonth()+1);
      await updateDoc(doc(db,'subscriptions',inv.dealerId),{status:'active',expireDate:newExp,updatedAt:serverTimestamp()});
    }
    toast(`✅ ${name} 납부 확인 + 구독 1개월 연장`);PAGES['admin-invoices']();
  }catch(e){toast('❌ '+e.message)}
};
window._m_markInvoicePaid=window.markInvoicePaid;
window.copyInvoiceLink=async function(id){
  const url=`${location.origin}${location.pathname}#invoice:${id}`;
  try{await navigator.clipboard.writeText(url);}catch(e){prompt('링크:',url);return;}
  toast('🔗 청구서 링크 복사됨');
};
window._m_copyInvoiceLink=window.copyInvoiceLink;
window.shareInvoiceKakao=async function(id){
  const url=`${location.origin}${location.pathname}#invoice:${id}`;
  const msg=`[로지넷 청구서]\n서비스 이용료 청구서가 발행되었습니다.\n입금계좌: 하나은행 ${BANK_INFO.account} (${BANK_INFO.holder})\n\n청구서 확인: ${url}`;
  if(navigator.share){navigator.share({title:'로지넷 청구서',text:msg,url}).catch(()=>{});}
  else{
    navigator.clipboard.writeText(msg).then(()=>toast('💬 카카오톡에 붙여넣기 후 발송해주세요')).catch(()=>prompt('복사 후 카카오톡 전송:',msg));
  }
};
window._m_shareInvoiceKakao=window.shareInvoiceKakao;

// ── 청구서 URL 해시 처리
async function checkInvoiceHash(){
  const hash=location.hash;
  if(!hash.startsWith('#invoice:'))return;
  const id=hash.replace('#invoice:','');
  if(!id)return;
  try{
    const snap=await getDoc(doc(db,'invoices',id));
    if(!snap.exists()){toast('청구서를 찾을 수 없습니다');return;}
    const inv={id,...snap.data()};
    const dSnap=await getDoc(doc(db,'dealers',inv.dealerId));
    const dealer=dSnap.exists()?dSnap.data():null;
    const html=buildInvoiceHTML(inv,dealer);
    document.getElementById('modals').insertAdjacentHTML('beforeend',`
      <div class="mo show" id="mo-invoice-hash" style="background:linear-gradient(135deg,var(--brand-d),var(--brand))">
        <div class="md" style="max-width:600px">
          <div class="mdt">📄 청구서</div>
          <div class="mdb">${html}</div>
          <div class="mdf"><button class="btn btn-green btn-sm" onclick="window.print()">🖨️ 인쇄/저장</button></div>
        </div>
      </div>`);
    history.replaceState(null,'',location.pathname);
  }catch(e){console.warn(e)}
}

PAGES['admin-contracts']=async function(){
  document.getElementById('page-title').textContent='계약서 관리';
  document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const dSnap=await getDocs(collection(db,'dealers'));
    const rows=dSnap.docs.map(d=>{
      const dd=d.data();
      const status=dd.contractStatus||'none';
      const statusBadge={sent:'b-blue',completed:'b-green',none:'b-gray'}[status]||'b-gray';
      const statusLabel={sent:'발송완료',completed:'서명완료',none:'미발송'}[status]||'미발송';
      return`<tr>
        <td><strong>${esc(dd.name)}</strong></td>
        <td style="font-size:11px;color:var(--text3)">${esc(dd.email||'—')}</td>
        <td>${esc(dd.brn||'—')}</td>
        <td><span class="badge ${statusBadge}">${statusLabel}</span></td>
        <td style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn btn-blue btn-xs" onclick="resendContract('${d.id}','${esc(dd.name)}','${esc(dd.email)}','${esc(dd.managerName||'')}')">✍️발송</button>
          ${status==='sent'?`<button class="btn btn-green btn-xs" onclick="markContractDone('${d.id}','${esc(dd.name)}')">✅서명완료</button>`:''}
        </td>
      </tr>`;
    }).join('');
    c.innerHTML=`
      <div class="card">
        <div class="card-header"><div class="card-title">✍️ 계약서 현황</div></div>
        <div class="card-body">
          <div class="info-box">💡 모두싸인 계약서를 발송합니다. API 키는 설정 페이지에서 등록하세요.</div>
          <div class="tbl-wrap"><table><thead><tr><th>대리점</th><th>이메일</th><th>사업자번호</th><th>계약상태</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
        </div>
      </div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}

window.resendContract=async function(dealerId,name,email,mgr){
  if(!confirm(`${name}에게 서비스이용계약서를 발송하시겠습니까?`))return;
  await sendModusignContract({dealerId,name,email,mgr});
  await updateDoc(doc(db,'dealers',dealerId),{contractStatus:'sent',contractSentAt:serverTimestamp()});
  toast(`✍️ ${name} 계약서 발송 처리`);PAGES['admin-contracts']();
};
window._m_resendContract=window.resendContract;
window.markContractDone=async function(dealerId,name){
  await updateDoc(doc(db,'dealers',dealerId),{contractStatus:'completed',contractCompletedAt:serverTimestamp()});
  toast(`✅ ${name} 서명 완료 처리`);PAGES['admin-contracts']();
};
window._m_markContractDone=window.markContractDone;

PAGES['dealer-subscription']=async function(){
  document.getElementById('page-title').textContent='내 구독 현황';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const snap=await getDoc(doc(db,'subscriptions',CU.dealerId));
    if(!snap.exists()){c.innerHTML='<div class="empty"><div class="empty-icon">💳</div><div>구독 정보가 없습니다. 관리자에게 문의해주세요.</div></div>';return;}
    const sub=snap.data();
    const exp=sub.expireDate?.toDate?.()||null;
    const now=new Date();
    const isActive=sub.status==='active'&&exp&&exp>now;
    const daysLeft=exp?Math.ceil((exp-now)/86400000):0;
    c.innerHTML=`
      <div class="card">
        <div class="card-header"><div class="card-title">💳 구독 현황</div></div>
        <div class="card-body">
          <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
            <div class="stat-card"><div class="stat-val">${PLAN_LABEL[sub.plan||'standard']||'—'}</div><div class="stat-lbl">현재 플랜</div></div>
            <div class="stat-card"><div class="stat-val">₩${fmt(sub.monthlyFee||0)}</div><div class="stat-lbl">월 이용료</div></div>
            <div class="stat-card"><div class="stat-val ${daysLeft<7?'amber':''}">${daysLeft>0?`D-${daysLeft}`:'만료'}</div><div class="stat-lbl">남은 기간</div></div>
          </div>
          <div style="background:${isActive?'var(--green-l)':'var(--red-l)'};border:1.5px solid ${isActive?'var(--green)':'var(--red)'};border-radius:var(--r);padding:14px 16px;margin-top:12px">
            <div style="font-size:16px;font-weight:900;color:${isActive?'var(--green)':'var(--red)'}">${isActive?'✅ 서비스 이용 중':'❌ 구독 만료'}</div>
            <div style="font-size:12px;margin-top:4px">만료일: ${exp?exp.toLocaleDateString('ko-KR'):'—'}</div>
          </div>
          ${!isActive?`<div class="info-box" style="margin-top:12px">
            💳 이용료 납부 후 관리자에게 연락해주세요<br>
            <strong>하나은행 ${BANK_INFO.account} (${BANK_INFO.holder})</strong><br>
            문의: ${BANK_INFO.tel}
          </div>`:''}
        </div>
      </div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

PAGES['dealer-invoices']=async function(){
  document.getElementById('page-title').textContent='청구서 조회';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const snap=await getDocs(query(collection(db,'invoices'),where('dealerId','==',CU.dealerId)));
    const invoices=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.month||'').localeCompare(a.month||''));
    if(invoices.length===0){c.innerHTML='<div class="empty"><div class="empty-icon">📄</div><div>청구서가 없습니다</div></div>';return;}
    const rows=invoices.map(i=>`<tr>
      <td>${esc(i.month||'')}</td>
      <td style="font-weight:700">₩${fmt(i.amount||0)}</td>
      <td><span class="badge ${i.status==='paid'?'b-green':'b-amber'}">${i.status==='paid'?'납부완료':'납부대기'}</span></td>
      <td><button class="btn btn-outline btn-xs" onclick="viewInvoice('${i.id}')">청구서 보기</button></td>
    </tr>`).join('');
    c.innerHTML=`
      <div class="info-box">💳 납부 계좌: 하나은행 ${BANK_INFO.account} (예금주: ${BANK_INFO.holder})<br>입금 후 담당자(${BANK_INFO.tel})에게 연락 주시면 확인해드립니다.</div>
      <div class="card"><div class="card-header"><div class="card-title">📄 청구서 목록</div></div><div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>청구월</th><th>금액</th><th>상태</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

      </div>
    </div>

      <div class="card-header"><div class="card-title">🚛 화주사 관리</div></div>

        <div class="info-box">기사 분류 및 정산서에 표시되는 화주사 목록을 관리합니다.</div>

            ${['쿠팡','컬리','CJ','용차'].includes(j)?'':'<button onclick="removeJobsub(\''+esc(j)+'\')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;line-height:1;padding:0">✕</button>'}

window.addJobsub=async function(){
  const val=(document.getElementById('new-jobsub')?.value||'').trim();
  if(!val){toast('화주사명을 입력해주세요');return;}
  if(JOBSUBS.includes(val)){toast('이미 있는 화주사입니다');return;}
  JOBSUBS.push(val);
  await setDoc(doc(db,'settings','jobsubs'),{list:JOBSUBS},{merge:false});
  document.getElementById('new-jobsub').value='';
  toast(`✅ "${val}" 추가 완료`);
  PAGES['admin-settings']();
};
window._m_addJobsub=window.addJobsub;
window.removeJobsub=async function(name){
  if(!confirm(`"${name}" 화주사를 삭제하시겠습니까?`))return;
  JOBSUBS=JOBSUBS.filter(j=>j!==name);
  await setDoc(doc(db,'settings','jobsubs'),{list:JOBSUBS},{merge:false});
  toast(`🗑 "${name}" 삭제 완료`);
  PAGES['admin-settings']();
};
window._m_removeJobsub=window.removeJobsub;
window.saveModusignKey=async function(){
  const key=document.getElementById('ms-key')?.value;
  const tmpl=document.getElementById('ms-tmpl')?.value||'';
  if(!key||key.includes('●')){toast('새 API 키를 입력해주세요');return;}
  try{
    await setDoc(doc(db,'settings','modusign'),{apiKey:key,templateId:tmpl,updatedAt:serverTimestamp()},{merge:true});
    toast('✅ 모두싸인 API 키 저장 완료');
  }catch(e){toast('❌ '+e.message)}
};
window._m_saveModusignKey=window.saveModusignKey;
