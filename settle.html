<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>
:root{
  --brand:#1A5FA8;--brand-d:#0C3F74;--brand-l:#E8F1FB;--brand-m:#2B75C8;
  --green:#0A6E48;--green-l:#E2F5EC;--red:#C0202A;--red-l:#FCEAEA;
  --amber:#8B5A00;--amber-l:#FEF3E2;--purple:#5B3DB5;--purple-l:#EEEAFC;
  --teal:#0A6860;--teal-l:#E2F4F2;
  --gray:#54524E;--gray-l:#F3F1EB;--gray-m:#D2CFC7;
  --bg:#F4F2ED;--bg2:#FFFFFF;--bg3:#EDEAE3;
  --text:#1C1C1A;--text2:#54524E;--text3:#8C8A82;
  --border:rgba(0,0,0,.09);--r:10px;--rl:14px;--rxl:18px;
  --shadow:0 2px 16px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --font:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;
}
body.dark{--bg:#111110;--bg2:#1A1A18;--bg3:#222220;--text:#E6E4DC;--text2:#A4A29A;--text3:#6A6860;--border:rgba(255,255,255,.09);--gray-l:#222220;--brand-l:#091A30;--green-l:#041E12;--red-l:#240809;--amber-l:#1E1000;--purple-l:#150D30;--teal-l:#041B18;}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font);-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;line-height:1.5}
#login-wrap{position:fixed;inset:0;z-index:9999;background:linear-gradient(145deg,var(--brand-d) 0%,var(--brand) 55%,#2B81D8 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--bg2);border-radius:22px;padding:40px 36px;width:360px;max-width:100%;box-shadow:0 28px 72px rgba(0,0,0,.35);animation:loginPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes loginPop{from{opacity:0;transform:scale(.92) translateY(16px)}}
.login-logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.login-icon{font-size:34px}.login-brand{font-size:26px;font-weight:900;color:var(--brand);letter-spacing:-.5px}
.login-sub{font-size:11px;color:var(--text3);text-align:center;margin-bottom:28px;letter-spacing:.05em}
.login-input{width:100%;padding:12px 14px;margin-bottom:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--bg);color:var(--text);transition:border-color .15s;}
.login-input:focus{border-color:var(--brand)}
.login-btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px;}
.login-btn:hover{background:var(--brand-d)}.login-btn:active{transform:scale(.98)}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none}
.login-ver{font-size:10px;color:var(--text3);text-align:center;margin-top:16px;opacity:.7}
#app{display:none}.layout{display:flex;min-height:100vh}
.sidebar{width:230px;min-height:100vh;background:var(--brand-d);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-row{display:flex;align-items:center;gap:9px}
.sb-logo-icon{font-size:20px}.sb-logo-text{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.3px}
.sb-logo-badge{font-size:9px;background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);padding:2px 7px;border-radius:20px;margin-top:4px;display:inline-block;letter-spacing:.05em;}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.sb-user-role{font-size:10px;font-weight:700;letter-spacing:.06em;display:inline-block;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);}
.sb-user-dealer{font-size:10px;color:rgba(255,255,255,.45);margin-top:4px}
.snav{flex:1;padding:8px 0;overflow-y:auto}
.ns{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);padding:12px 16px 4px;letter-spacing:.1em;text-transform:uppercase}
.ni{padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.65);border-radius:9px;margin:1px 8px;transition:all .14s;display:flex;align-items:center;gap:8px;}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}.ni.on{background:rgba(255,255,255,.2);color:#fff;font-weight:700}
.ni-ic{font-size:15px;width:20px;text-align:center}
.sb-bot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.sb-bot-btn{width:100%;padding:8px 12px;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:9px;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;margin-bottom:6px;transition:all .15s;text-align:left;display:flex;align-items:center;gap:6px;}
.sb-bot-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-version{font-size:9px;color:rgba(255,255,255,.25);text-align:center;padding-top:4px;letter-spacing:.05em}
.main{margin-left:230px;flex:1;display:flex;flex-direction:column}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.04);}
.topbar-title{font-size:15px;font-weight:800;color:var(--text)}.topbar-right{display:flex;gap:8px;align-items:center}
.content{padding:20px;flex:1}
.card{background:var(--bg2);border-radius:var(--rl);border:1px solid var(--border);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
.card-body{padding:16px 18px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--bg2);border-radius:var(--rl);border:1px solid var(--border);padding:18px 16px;box-shadow:var(--shadow);transition:transform .15s;}
.stat-card:hover{transform:translateY(-2px)}
.stat-val{font-size:24px;font-weight:900;color:var(--brand)}.stat-val.green{color:var(--green)}.stat-val.amber{color:var(--amber)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;line-height:1;}
.btn:active{transform:scale(.97)}
.btn-blue{background:var(--brand);color:#fff}.btn-blue:hover{background:var(--brand-d)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#074D33}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#950A14}
.btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{background:#6A4200}
.btn-gray{background:var(--gray-l);color:var(--text2);border:1px solid var(--border)}.btn-gray:hover{background:var(--gray-m)}
.btn-outline{background:transparent;border:1.5px solid var(--brand);color:var(--brand)}.btn-outline:hover{background:var(--brand-l)}
.btn-kakao{background:#FEE500;color:#1A1300;border:none}.btn-kakao:hover{background:#F0D800}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);background:var(--bg2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field input[readonly]{background:var(--bg3);color:var(--text3)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:700;font-size:11px;color:var(--text2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.route-tbl td{padding:6px 10px;font-size:12px}.route-tbl th{padding:6px 10px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-blue{background:var(--brand-l);color:var(--brand)}.b-green{background:var(--green-l);color:var(--green)}
.b-red{background:var(--red-l);color:var(--red)}.b-amber{background:var(--amber-l);color:var(--amber)}
.b-purple{background:var(--purple-l);color:var(--purple)}.b-teal{background:var(--teal-l);color:var(--teal)}
.b-gray{background:var(--gray-l);color:var(--gray)}
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:16px;}
.mo.show{display:flex}
.md{background:var(--bg2);border-radius:var(--rxl);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.28);animation:mdIn .2s cubic-bezier(.34,1.2,.64,1);}
@keyframes mdIn{from{opacity:0;transform:scale(.96) translateY(8px)}}
.mdt{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.mdb{padding:20px}.mdf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px;line-height:1;transition:color .12s}.close-btn:hover{color:var(--text)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1C1C1A;color:#fff;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;z-index:9999;transition:all .25s;white-space:nowrap;max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.excel-drop{border:2px dashed var(--brand);border-radius:var(--rl);padding:18px;text-align:center;cursor:pointer;background:var(--brand-l);transition:all .15s;position:relative;margin-bottom:10px;}
.excel-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.excel-drop:hover{border-color:var(--brand-d);background:#d8e9f8}.excel-drop.done{border-color:var(--green);background:var(--green-l)}
.stmt-wrap{background:#fff;color:#1a1a18;padding:24px;border-radius:14px;max-width:600px;margin:0 auto;}
.stmt-brand{font-size:10px;font-weight:800;color:var(--brand);letter-spacing:.12em;margin-bottom:3px;text-transform:uppercase}
.stmt-title{font-size:21px;font-weight:900;margin-bottom:3px}
.stmt-meta{font-size:12px;color:#666;margin-bottom:14px}
.stmt-divider{height:2px;background:linear-gradient(90deg,#1A5FA8,#2B81D8,transparent);border:none;margin:12px 0}
.stmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ede4;font-size:13px}
.stmt-row:last-child{border:none}
.stmt-row.total{background:#f5f3ed;margin:0 -24px;padding:12px 24px;font-weight:800;font-size:14px}
.stmt-row.deduct{color:#C0202A}
.stmt-row.net{background:var(--brand);color:#fff;margin:0 -24px -24px;padding:16px 24px;border-radius:0 0 14px 14px;font-weight:900;font-size:17px}
.amt-plus{color:#0A6E48;font-weight:700}.amt-minus{color:#C0202A;font-weight:700}
.stmt-section-title{font-size:11px;font-weight:800;color:var(--brand);letter-spacing:.07em;text-transform:uppercase;margin:14px 0 6px;padding-bottom:4px;border-bottom:1.5px solid var(--brand-l)}
.route-preview{border:1px solid #e8e4dc;border-radius:8px;overflow:hidden;margin-bottom:10px;font-size:12px;}
.route-preview table{font-size:11px}.route-preview th{background:#f5f3ed;font-size:10px;padding:5px 8px}
.route-preview td{padding:5px 8px;border-bottom:1px solid #f0ede4}
.driver-hero{background:linear-gradient(135deg,var(--brand-d),var(--brand));border-radius:var(--rl);padding:22px;color:#fff;margin-bottom:14px;box-shadow:0 4px 20px rgba(26,95,168,.3);}
.driver-hero-name{font-size:22px;font-weight:900}.driver-hero-info{font-size:12px;opacity:.75;margin-top:3px}
.settle-card{background:var(--bg2);border-radius:var(--rl);border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.settle-card:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.settle-card-month{font-size:14px;font-weight:800}.settle-card-net{font-size:20px;font-weight:900;color:var(--brand)}
.chart-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{background:var(--brand);border-radius:5px 5px 0 0;width:100%;min-height:4px;transition:height .4s cubic-bezier(.34,1.2,.64,1);position:relative}
.chart-bar:hover{background:var(--brand-m)}.chart-bar-lbl{font-size:9px;color:var(--text3);font-weight:600;text-align:center}
.chart-bar-val{font-size:9px;color:var(--brand);font-weight:700;position:absolute;top:-16px;left:50%;transform:translateX(-50%);white-space:nowrap}
.calc-preview{background:var(--brand-l);border:1.5px solid var(--brand);border-radius:var(--rl);padding:14px 16px;margin-top:10px;}
.calc-preview .row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.calc-preview .row.total{font-weight:800;font-size:14px;color:var(--brand);border-top:1.5px solid var(--brand);margin-top:6px;padding-top:8px}
.calc-preview .row.deduct{color:var(--red)}.calc-preview .net-val{font-size:18px;font-weight:900;color:var(--brand);text-align:right;margin-top:8px}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.topbar{padding:0 14px}.content{padding:12px}.ham{display:flex!important}.stat-grid{grid-template-columns:1fr 1fr}.fg,.fg3{grid-template-columns:1fr}.tbl-wrap{overflow-x:auto}}
.ham{display:none;cursor:pointer;font-size:20px;padding:4px;align-items:center;justify-content:center;width:36px;height:36px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}.overlay.show{display:block}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}.loading::before{content:'⏳ ';font-size:20px}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}.empty-icon{font-size:40px;margin-bottom:10px}
.section-label{font-size:11px;font-weight:800;color:var(--brand);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.divider{height:1px;background:var(--border);margin:12px 0}
.info-box{background:var(--brand-l);border:1.5px solid var(--brand);border-radius:var(--r);padding:12px 14px;font-size:12px;margin-bottom:12px}
@media print{body,html{background:#fff!important;margin:0;padding:0}.no-print{display:none!important}.sidebar,.topbar,.overlay{display:none!important}.main{margin-left:0!important}.stmt-wrap{box-shadow:none!important;padding:0!important;border-radius:0!important}@page{size:A4;margin:15mm}}
</style>
</head>

<!-- ★ Bridge: 모듈 로드 전 onclick 오류 방지 -->
<script>
(function(){
  var _pending={};
  function bridge(name){
    window[name]=function(){
      var real=window['_m_'+name];
      if(real){real.apply(this,arguments);return;}
      if(_pending[name]){_pending[name].args=arguments;return;}
      var args=arguments;var tries=0;
      var t=setInterval(function(){
        tries++;
        var fn=window['_m_'+name];
        if(fn){clearInterval(t);delete _pending[name];fn.apply(window,_pending[name]?.args||args);}
        else if(tries>150){clearInterval(t);delete _pending[name];if(typeof toast==='function')toast('⚠️ 로딩이 지연되고 있습니다. 새로고침해주세요.');}
      },100);
      _pending[name]={t,args};
    };
  }
  ['doLogin','doLogout','openSb','closeSb','toggleDark','closeModal','goPage',
   'openAddDealer','addDealer','addDealerV2','editDealer','saveDealer',
   'openAddDriver','addDriver','delDriver','editDriver','saveDriver','quickSettle',
   'openNewSettle','saveSettle','updateSettle','viewSettle','approveSettle','delSettle','editSettle',
   'viewDriverSettle','adminViewSettle','filterSettles',
   'onDriverInput','onJobsubChange','handleExcelUpload','calcSettlePreview',
   'addRoutePrice','delRoutePrice','saveAllRoutePrices','saveOneRoutePrice','saveUnitPrices',
   'addDealerRoute','updateDealerPrice','deleteDealerPrice',
   'copyStmtLink','shareKakao','showStmtModal',
   'saveProfile','createAdmin','saveModusignKey',
   'extendSub','changePlan','suspendSub','genAllInvoices',
   'viewInvoice','markInvoicePaid','copyInvoiceLink','shareInvoiceKakao',
   'resendContract','markContractDone','acceptTerms',
   'openExcelDriverImport','parseDriversFromExcel','bulkSaveDrivers',
   'addJobsub','removeJobsub','openChangePw','doChangePw',
   'recalcAllSettlements','deleteMonthSettles','resetAllSettles',
   'checkDuplicateSettles','openIncentiveSettings','openDriverStats',
   'bulkShareSettlements','openTaxArchive','viewTaxInvoice'
  ].forEach(bridge);
})();
</script>

// ★ calcNet — v9 완전 이식
function calcNet(x){
  const dcnt=+x.dcnt||+x.delivCount||0;const rcnt=+x.rcnt||+x.retCount||0;
  const isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  const yDel=+x.yongDel||(G_PRICES.yong_del||900);const yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  const _rdList=x.routeDetails||[];
  const _damtRP=_rdList.reduce((s,rd)=>s+(rd.cnt||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0),0);
  const _ramtRP=_rdList.reduce((s,rd)=>s+(rd.ret||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0),0);
  const damt=isYong?dcnt*yDel:(_rdList.length?_damtRP:(+x.damt||+x.delivAmt||+x.base||0));
  const ramt=isYong?rcnt*yRet:(_rdList.length?_ramtRP:(+x.ramt||+x.retAmt||0));
  const fresh=+x.fresh||+x.freshAmt||0;
  const isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  const hasStoredFinc=(x.finc!==undefined&&x.finc!==null&&x.finc!=='');
  const finc=hasStoredFinc?+x.finc:(isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0);
  const inc=+x.inc||0;const nocont=+x.nocont||0;const etcPlus=+x.etcPlus||0;const etcMinus=+x.etcMinus||0;
  const income=damt+ramt+fresh+finc+inc+nocont+etcPlus;const totalAmt=income;
  const supplyAmt=Math.round(totalAmt/1.1);const expenseAmt=Math.round(supplyAmt*0.346);const monthlyWage=supplyAmt-expenseAmt;
  const empCalc=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;const workCalc=Math.floor(monthlyWage*0.0088/10)*10;
  const TAX_RATE=+x.taxRate||0.033;const tax=+x.tax||(x.taxFixed?+x.taxFixed:Math.round(income*TAX_RATE));
  const emp=(x.emp!==undefined&&x.emp!==null&&x.emp!==''&&+x.emp>0)?+x.emp:empCalc;
  const workStored=(x.work!==undefined&&x.work!==null&&x.work!==''&&+x.work>0)?+x.work:0;
  const work=(workStored&&workCalc>0&&workStored>=workCalc*0.5)?workStored:workCalc;
  const eq=+x.eq||0;const dmg=+x.dmg||+x.damage||0;const adv=+x.adv||+x.advance||0;
  const deduct=emp+work+eq+dmg+adv+etcMinus;const net=totalAmt-deduct;
  return{damt,ramt,fresh,finc,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}

// ★ parseExcel — v9 완전 이식
function parseExcelData(file,onResult){
  toast('📊 엑셀 분석 중...');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let ws=null;
      for(const name of wb.SheetNames){
        const candidate=wb.Sheets[name];
        const sample=XLSX.utils.sheet_to_json(candidate,{header:1,defval:null,range:0});
        if(sample.length>0&&sample[0]&&sample[0][0]==='구분'){ws=candidate;break;}
      }
      if(!ws){for(const name of wb.SheetNames){const candidate=wb.Sheets[name];const allRows=XLSX.utils.sheet_to_json(candidate,{header:1,defval:null});if(allRows.some(r=>r&&r[0]==='구분')){ws=candidate;break;}}}
      if(!ws){toast('❌ 구분 헤더가 있는 시트를 찾을 수 없습니다');return;}
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const hIdx=rows.findIndex(r=>r&&r[0]==='구분');
      if(hIdx<0){toast('❌ 구분 헤더를 찾을 수 없습니다');return;}
      let totalAmt=0,totalFresh=0,totalDel=0,totalRet=0,totalRetAmt=0,totalNocont=0,totalNocontCnt=0;
      const routeMap={};const dailyRows=[];
      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;
        const cat=String(row[0]).trim();
        if(cat==='배송'||cat==='수기반영'){
          const route=row[2]?String(row[2]).trim():'기타';
          const del=+row[7]||0,ret=+row[8]||0;
          const unitPrice=RPRICE[route]||0;
          const delAmt=del*unitPrice,retAmt=ret*unitPrice;
          let dateRaw=row[3],dateStr='';
          if(dateRaw instanceof Date)dateStr=dateRaw.toISOString().slice(0,10);
          else if(typeof dateRaw==='string')dateStr=dateRaw.slice(0,10);
          else if(dateRaw)dateStr=String(dateRaw).slice(0,10);
          totalAmt+=delAmt;totalDel+=del;totalRet+=ret;totalRetAmt+=retAmt;
          if(!routeMap[route])routeMap[route]={cnt:0,ret:0,amt:0,retAmt:0,unitPrice};
          routeMap[route].cnt+=del;routeMap[route].ret+=ret;routeMap[route].amt+=delAmt;routeMap[route].retAmt+=retAmt;
          if(del>0)dailyRows.push({date:dateStr,route,cnt:del,ret,unitPrice,amt:delAmt,retAmt});
        }else if(cat.includes('프레쉬백')||cat.includes('프레시백')||cat.includes('에코백')){
          totalFresh+=+row[14]||0;
        }else if(cat==='미계약 라우트'||cat==='미계약건'||cat==='미계약'){
          const miscCnt=+row[8]||+row[7]||0;const miscAmt=+row[13]||+row[14]||+row[10]||0;
          totalNocont+=miscAmt;totalNocontCnt+=miscCnt;
          if(!routeMap['미계약'])routeMap['미계약']={cnt:miscCnt,ret:0,amt:miscAmt,retAmt:0,unitPrice:0};
          else{routeMap['미계약'].cnt+=miscCnt;routeMap['미계약'].amt+=miscAmt;}
        }
      });
      const routes=Object.entries(routeMap).map(([r,v])=>({route:r,cnt:v.cnt,ret:v.ret,amt:v.amt,retAmt:v.retAmt||0,unitPrice:v.unitPrice})).sort((a,b)=>b.amt-a.amt);
      const finc=Math.round(totalDel*(G_PRICES.freshbag_inc||25));
      const driverIdFromExcel=rows[hIdx+1]&&rows[hIdx+1][1]?String(rows[hIdx+1][1]).trim():'';
      const allDriversMap={};const routeCampsMap={};const driverSettleMap={};let excelMonth='';
      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;const cat=String(row[0]).trim();
        if((cat==='배송'||cat==='수기반영')&&row[1]&&row[2]){
          const did=String(row[1]).trim(),route=String(row[2]).trim(),camp=row[4]?String(row[4]).trim():'';
          const del=+row[7]||0,ret=+row[8]||0,unitPrice=RPRICE[route]||0;
          const delAmt=del*unitPrice,retAmt=ret*unitPrice;
          let dateStr='';
          if(row[3] instanceof Date)dateStr=row[3].toISOString().slice(0,7);
          else if(row[3])dateStr=String(row[3]).slice(0,7);
          if(dateStr&&!excelMonth)excelMonth=dateStr;
          if(did&&!allDriversMap[did])allDriversMap[did]={id:did,camp};
          if(route&&route!=='미계약'&&!routeCampsMap[route])routeCampsMap[route]=camp;
          if(!driverSettleMap[did])driverSettleMap[did]={userId:did,camp,month:dateStr||excelMonth,routeMap:{},totalDel:0,totalRet:0,totalAmt:0,totalRetAmt:0,totalFresh:0,totalNocont:0,totalNocontCnt:0};
          const ds=driverSettleMap[did];if(!ds.month&&dateStr)ds.month=dateStr;
          ds.totalDel+=del;ds.totalRet+=ret;ds.totalAmt+=delAmt;ds.totalRetAmt+=retAmt;
          if(!ds.routeMap[route])ds.routeMap[route]={cnt:0,ret:0,amt:0,retAmt:0,unitPrice};
          ds.routeMap[route].cnt+=del;ds.routeMap[route].ret+=ret;ds.routeMap[route].amt+=delAmt;ds.routeMap[route].retAmt+=retAmt;
        }else if(cat.includes('프레쉬백')||cat.includes('프레시백')||cat.includes('에코백')){
          if(row[1]){const did=String(row[1]).trim();if(driverSettleMap[did])driverSettleMap[did].totalFresh+=(+row[14]||0);}
        }else if(cat==='미계약 라우트'||cat==='미계약건'||cat==='미계약'){
          if(row[1]){const did=String(row[1]).trim();if(driverSettleMap[did]){driverSettleMap[did].totalNocont+=(+row[13]||+row[14]||0);driverSettleMap[did].totalNocontCnt+=(+row[8]||+row[7]||0);}}
        }
      });
      const allDriverSettlements=Object.values(driverSettleMap).map(ds=>({...ds,routes:Object.entries(ds.routeMap).map(([r,v])=>({route:r,...v})).sort((a,b)=>b.amt-a.amt),finc:Math.round(ds.totalDel*(G_PRICES.freshbag_inc||25))}));
      onResult({routes,dailyRows,totalAmt,totalFresh,totalDel,totalRet,totalRetAmt,totalNocont,totalNocontCnt,finc,driverIdFromExcel,allDrivers:Object.values(allDriversMap),routeCamps:routeCampsMap,allDriverSettlements,excelMonth:excelMonth||curMonth()});
    }catch(e){toast('❌ 엑셀 분석 오류: '+e.message);console.error(e);}
  };
  reader.readAsArrayBuffer(file);
}

PAGES['admin-dashboard']=async function(){

  const c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const [dSnap,drSnap,sSnap]=await Promise.all([getDocs(collection(db,'dealers')),getDocs(collection(db,'drivers')),getDocs(collection(db,'settlements'))]);
    const settles=sSnap.docs.map(d=>({id:d.id,...d.data()}));
    const thisM=curMonth();const thisMS=settles.filter(s=>s.month===thisM);
    const approved=settles.filter(s=>s.status==='approved').length;
    const totalNet=settles.filter(s=>s.status==='approved').reduce((a,s)=>a+(calcNet(s).net||0),0);
    const thisNet=thisMS.reduce((a,s)=>a+(calcNet(s).net||0),0);
    const months=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}

    const maxNet=Math.max(...monthData.map(m=>m.net),1);
    const chartBars=monthData.map(m=>`<div class="chart-bar-col"><div class="chart-bar" style="height:${Math.round((m.net/maxNet)*100)}px" title="${m.m}: ₩${fmt(m.net)}">${m.net>0?`<div class="chart-bar-val">${fmt(Math.round(m.net/10000))}만</div>`:''}</div><div class="chart-bar-lbl">${m.m.slice(5)}월</div></div>`).join('');

    c.innerHTML=`<div class="stat-grid"><div class="stat-card"><div class="stat-val">${dSnap.size}</div><div class="stat-lbl">🏢 등록 대리점</div></div><div class="stat-card"><div class="stat-val">${drSnap.size}</div><div class="stat-lbl">👤 전체 기사</div></div><div class="stat-card"><div class="stat-val green">${approved}</div><div class="stat-lbl">✅ 승인된 정산</div></div><div class="stat-card"><div class="stat-val">₩${fmt(totalNet)}</div><div class="stat-lbl">💰 누적 지급액</div></div><div class="stat-card"><div class="stat-val amber">${thisMS.length}</div><div class="stat-lbl">📋 이번달 정산</div></div><div class="stat-card"><div class="stat-val">₩${fmt(thisNet)}</div><div class="stat-lbl">📅 이번달 지급액</div></div></div><div class="card"><div class="card-header"><div class="card-title">📈 월별 지급액 추이 (최근 6개월)</div></div><div class="card-body"><div class="chart-bar-wrap" style="align-items:flex-end;position:relative;padding-top:20px">${chartBars}</div></div></div><div class="card"><div class="card-header"><div class="card-title">🏢 대리점 현황</div><button class="btn btn-blue btn-sm" onclick="goPage('admin-dealers')">+ 대리점 관리</button></div><div class="card-body">${dSnap.empty?'<div class="empty"><div class="empty-icon">🏢</div><div>등록된 대리점이 없습니다</div></div>':`<div class="tbl-wrap"><table><thead><tr><th>대리점명</th><th>관리자 이메일</th><th>기사수</th><th>상태</th></tr></thead><tbody>${dealerRows}</tbody></table></div>`}</div></div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

=calcNet(s);return`<tr><td><strong>${esc(s.driverName||s.driver||'')}</strong></td><td>${esc(s.month||'')}</td><td>${fmt(s.dcnt||0)}건</td><td>₩${fmt(r.income)}</td><td style="font-weight:800;color:var(--brand)">₩${fmt(r.net)}</td><td><span class="badge ${s.status==='approved'?'b-green':'b-amber'}">${s.status==='approved'?'승인완료':'정산예정'}</span></td></tr>`;}).join('')}</tbody></table></div>`}</div></div>`;

function buildDriverModal(){

window.openAddDriver=function(){buildDriverModal();['dr-name','dr-uid','dr-phone','dr-acct','dr-email'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const pw=document.getElementById('dr-pw');if(pw)pw.value='driver1234';openModal('mo-driver');};
window.addDriver=async function(){
  const name=document.getElementById('dr-name').value.trim();const userId=document.getElementById('dr-uid').value.trim();
  if(!name||!userId){toast('❌ 성함과 아이디는 필수입니다');return;}
  try{
    const driverData={name,userId,dealerId:CU.dealerId,camp:document.getElementById('dr-camp').value,jobsub:document.getElementById('dr-job').value,phone:document.getElementById('dr-phone').value.trim(),account:document.getElementById('dr-acct').value.trim(),is_active:true,status:'재직',createdAt:serverTimestamp()};
    const email=document.getElementById('dr-email').value.trim();const pw=document.getElementById('dr-pw').value.trim();
    if(email&&pw){try{const uc=await createUserKeepSession(email,pw);driverData.authUid=uc.uid;await setDoc(doc(db,'users',uc.uid),{email,name,role:'driver',dealerId:CU.dealerId,driverUserId:userId,createdAt:serverTimestamp()});}catch(ae){if(ae.code!=='auth/email-already-in-use')throw ae;}}
    await addDoc(collection(db,'drivers'),driverData);closeModal('mo-driver');toast(`✅ ${name} 기사 등록 완료`);PAGES['dealer-drivers']();
  }catch(e){toast('❌ '+e.message)}
};
window.delDriver=async function(driverId,name){if(!confirm(`${name} 기사를 삭제하시겠습니까?`))return;await deleteDoc(doc(db,'drivers',driverId));toast(`🗑 ${name} 삭제 완료`);PAGES['dealer-drivers']();};

window.parseDriversFromExcel=function(inp){
  const file=inp.files[0];if(!file)return;toast('📊 기사 ID 추출 중...');
  const reader=new FileReader();
  reader.onload=function(e){
    try{const wb=XLSX.read(e.target.result,{type:'array'});let ws=null;for(const name of wb.SheetNames){const candidate=wb.Sheets[name];const sample=XLSX.utils.sheet_to_json(candidate,{header:1,defval:null,range:0});if(sample.length>0&&sample[0]&&sample[0][0]==='구분'){ws=candidate;break;}}if(!ws){toast('❌ 정산Raw 시트를 찾을 수 없습니다');return;}const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});const hIdx=rows.findIndex(r=>r&&r[0]==='구분');if(hIdx<0){toast('❌ 구분 헤더를 찾을 수 없습니다');return;}const driverMap={};rows.slice(hIdx+1).forEach(row=>{if(!row||row[0]!=='배송'||!row[1]||!row[2])return;const id=String(row[1]).trim();const camp=row[4]?String(row[4]).trim():'';if(!driverMap[id])driverMap[id]={id,camp};});window._driverImportList=Object.values(driverMap);getDocs(query(collection(db,'drivers'),where('dealerId','==',CU.dealerId))).then(snap=>{const existMap={};snap.docs.forEach(d=>existMap[d.data().userId]=d.data().name);const list=window._driverImportList;const res=document.getElementById('de-result');if(!res)return;res.innerHTML=`<div class="section-label" style="margin-top:12px">추출된 기사 (${list.length}명)</div><div style="max-height:360px;overflow-y:auto"><table style="width:100%;font-size:12px;border-collapse:collapse"><thead style="background:var(--bg3);position:sticky;top:0"><tr><th style="padding:6px 8px;text-align:left">쿠팡 ID</th><th style="padding:6px 8px;text-align:left">캠프</th><th style="padding:6px 8px;text-align:left">성함 *</th><th style="padding:6px 8px;text-align:left">화주사</th><th style="padding:6px 8px;text-align:left">상태</th></tr></thead><tbody>${list.map((d,i)=>{const existing=existMap[d.id];return`<tr style="border-bottom:1px solid var(--border)"><td style="padding:5px 8px;font-size:11px;font-family:monospace">${esc(d.id)}</td><td style="padding:5px 8px;font-size:11px">${esc(d.camp||'기타')}</td><td style="padding:5px 8px"><input id="di-name-${i}" value="${esc(existing||'')}" placeholder="성함" style="width:80px;padding:3px 6px;border:1.5px solid var(--border);border-radius:5px;font-size:12px"></td><td style="padding:5px 8px"><select id="di-job-${i}" style="padding:3px 6px;border:1.5px solid var(--border);border-radius:5px;font-size:12px">${JOBSUBS.map(j=>`<option>${j}</option>`).join('')}</select></td><td style="padding:5px 8px"><span class="badge ${existing?'b-green':'b-gray'}">${existing?'등록됨':'신규'}</span></td></tr>`;}).join('')}</tbody></table></div>`;const btn=document.getElementById('de-save-btn');if(btn)btn.style.display='inline-flex';toast(`✅ ${list.length}명 추출 — 성함 입력 후 일괄 등록`);});}catch(e){toast('❌ 엑셀 분석 오류: '+e.message);}
  };reader.readAsArrayBuffer(file);
};
window._m_parseDriversFromExcel=window.parseDriversFromExcel;
window.bulkSaveDrivers=async function(){
  const list=window._driverImportList||[];let saved=0,updated=0,skipped=0;
  for(let i=0;i<list.length;i++){const name=(document.getElementById(`di-name-${i}`)?.value||'').trim();if(!name){skipped++;continue;}const jobsub=document.getElementById(`di-job-${i}`)?.value||'쿠팡';const d=list[i];const existing=await getDocs(query(collection(db,'drivers'),where('userId','==',d.id),where('dealerId','==',CU.dealerId)));if(!existing.empty){await updateDoc(doc(db,'drivers',existing.docs[0].id),{name,jobsub,camp:d.camp||'기타',updatedAt:serverTimestamp()});updated++;}else{await addDoc(collection(db,'drivers'),{name,userId:d.id,dealerId:CU.dealerId,camp:d.camp||'기타',jobsub,is_active:true,status:'재직',createdAt:serverTimestamp()});saved++;}}
  toast(`✅ 신규 ${saved}명 등록, ${updated}명 수정${skipped>0?' ('+skipped+'명 건너뜀)':''}`);document.getElementById('mo-driver-excel')?.remove();PAGES['dealer-drivers']();
};
window._m_bulkSaveDrivers=window.bulkSaveDrivers;

PAGES['dealer-settlements']=async function(){
  document.getElementById('page-title').textContent='정산 관리';
  document.getElementById('topbar-actions').innerHTML=`<select id="filter-month" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text)" onchange="filterSettles()"><option value="">전체 월</option></select><button class="btn btn-red btn-sm" onclick="deleteMonthSettles()">🗑 해당월 삭제</button><button class="btn btn-gray btn-sm" onclick="resetAllSettles()">⚠️ 전체 초기화</button><button class="btn btn-blue btn-sm" onclick="openNewSettle()">+ 정산 입력</button>`;
  const c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const snap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId)));
    if(snap.empty){c.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div>정산 데이터가 없습니다</div><button class="btn btn-blue" onclick="openNewSettle()" style="margin-top:12px">+ 첫 정산 입력</button></div>`;buildSettleModal();return;}
    let settles=snap.docs.map(d=>({id:d.id,...d.data()}));settles.sort((a,b)=>(b.month||'').localeCompare(a.month||''));
    try{const drSnap=await getDocs(query(collection(db,'drivers'),where('dealerId','==',CU.dealerId)));window._driverNameCache={};drSnap.docs.forEach(d=>{const dd=d.data();if(dd.userId&&dd.name)window._driverNameCache[dd.userId]=dd.name;});}catch(e){}
    const months=[...new Set(settles.map(s=>s.month||''))].sort().reverse();
    const mSel=document.getElementById('filter-month');if(mSel)months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;mSel.appendChild(o);});
    window._allSettles=settles;
    window.filterSettles=function(){const m=(document.getElementById('filter-month')||{}).value||'';renderSettleTable(m?settles.filter(s=>s.month===m):settles);};
    renderSettleTable(settles);buildSettleModal();
    const autoBar=document.createElement('div');autoBar.id='settle-auto-bar';
    autoBar.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:12px"><div style="font-size:11px;font-weight:800;color:var(--text3);margin-bottom:8px">📋 정산 자동화</div><div style="display:flex;flex-wrap:wrap;gap:6px"><button class="btn btn-sm" style="background:#FF6B35;color:#fff" onclick="openNewSettle()">🚚 쿠팡 엑셀 업로드 → 자동정산</button><button class="btn btn-sm" style="background:#E74C3C;color:#fff" onclick="recalcAllSettlements()">⚡ 전체 정산 재계산</button><button class="btn btn-sm" style="background:#3498DB;color:#fff" onclick="bulkShareSettlements()">📤 정산 일괄 전달</button></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"><button class="btn btn-sm" style="background:#9B59B6;color:#fff" onclick="openIncentiveSettings()">⚙️ 기사별 인센 설정</button><button class="btn btn-sm" style="background:#F39C12;color:#fff" onclick="openDriverStats()">📊 기사별 실적 통계</button><button class="btn btn-sm" style="background:#E74C3C;color:#fff" onclick="checkDuplicateSettles()">🔍 중복 검사</button></div></div>`;
    const contentEl=document.getElementById('content');contentEl.insertBefore(autoBar,contentEl.firstChild);
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};
function renderSettleTable(settles){
  const totIncome=settles.reduce((a,s)=>a+(calcNet(s).income||0),0);const totNet=settles.reduce((a,s)=>a+(calcNet(s).net||0),0);
  const c=document.getElementById('content');if(!c)return;
  const rows=settles.map(s=>buildSettleRow(s)).join('');
  c.innerHTML=`<div class="stat-grid" style="grid-template-columns:repeat(3,1fr)"><div class="stat-card"><div class="stat-val">${settles.length}</div><div class="stat-lbl">📋 정산 건수</div></div><div class="stat-card"><div class="stat-val">₩${fmt(totIncome)}</div><div class="stat-lbl">📊 수익 합계</div></div><div class="stat-card"><div class="stat-val">₩${fmt(totNet)}</div><div class="stat-lbl">💰 실지급 합계</div></div></div><div class="card"><div class="card-header"><div class="card-title">📋 정산 목록 (${settles.length}건)</div></div><div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>기사</th><th>정산월</th><th>분류</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>상태</th><th></th></tr></thead><tbody id="settle-tbody">${rows}</tbody></table></div></div></div>`;buildSettleModal();
}
function buildSettleRow(s){
  const r=calcNet(s);const _dname=(s.driverName||s.driver||'');const _nameDisp=_dname&&_dname.includes('@')&&window._driverNameCache?(window._driverNameCache[_dname]||_dname):_dname;
  return`<tr><td><strong>${esc(_nameDisp)}</strong>${_nameDisp!==_dname?`<br><span style="font-size:10px;color:var(--text3)">${esc(_dname)}</span>`:''}</td><td>${esc(s.month||'')}</td><td><span class="badge b-blue" style="font-size:10px">${esc(s.jobsub||'쿠팡')}</span></td><td style="color:var(--teal)">${fmt(s.dcnt||0)}건</td><td style="color:var(--green);font-weight:700">₩${fmt(r.income)}</td><td style="font-weight:900;color:var(--brand)">₩${fmt(r.net)}</td><td><span class="badge ${s.status==='approved'?'b-green':'b-amber'}">${s.status==='approved'?'승인완료':'정산예정'}</span></td><td style="display:flex;gap:4px;flex-wrap:wrap"><button class="btn btn-outline btn-xs" onclick="viewSettle('${esc(s.id)}')">명세서</button><button class="btn btn-gray btn-xs" onclick="editSettle('${esc(s.id)}')">✏️수정</button>${s.status!=='approved'?`<button class="btn btn-green btn-xs" onclick="approveSettle('${esc(s.id)}')">✅승인</button>`:''}<button class="btn btn-red btn-xs" onclick="delSettle('${esc(s.id)}','${esc(s.driverName||s.driver||'')}')">삭제</button></td></tr>`;
}

  catch(e){toast('❌ '+e.message)}
};

window.updateSettle=async function(id){
  const driver=document.getElementById('se-driver').value.trim();if(!driver){toast('❌ 기사를 입력해주세요');return;}
  const month=document.getElementById('se-month').value;const g=elId=>+(document.getElementById(elId)||{value:0}).value||0;const gv=elId=>(document.getElementById(elId)||{value:''}).value||'';const j=gv('se-jobsub')||'쿠팡';const isYong=j==='용차';const isCoupang=j==='쿠팡';const dcnt=g('se-dcnt');const rcnt=g('se-rcnt');const yDel=g('se-yong-del')||900;const yRet=g('se-yong-ret')||900;const damt=isYong?dcnt*yDel:g('se-damt');const ramt=isYong?rcnt*yRet:g('se-ramt');const finc=isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0;const etcPlus=g('se-etc-plus'),etcMinus=g('se-etc-minus');const income=damt+ramt+g('se-fresh')+finc+g('se-nocont')+etcPlus;const supplyAmt=Math.round(income/1.1);const wage=Math.round(supplyAmt*(1-0.346));const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;const work=Math.floor(wage*0.0088/10)*10;
  try{await updateDoc(doc(db,'settlements',id),{driverName:driver,driver,month,jobsub:j,dcnt,damt,rcnt,ramt,fresh:g('se-fresh'),finc,nocont:g('se-nocont'),nocontCnt:g('se-nocont-cnt'),etcPlus,etcPlusReason:gv('se-etc-plus-r'),etcMinus,etcMinusReason:gv('se-etc-minus-r'),dmg:g('se-dmg'),dmgReason:gv('se-dmg-r'),adv:g('se-adv'),yongDel:isYong?yDel:0,yongRet:isYong?yRet:0,income,supplyAmt,monthlyWage:wage,emp,work,deduct:emp+work+g('se-dmg')+g('se-adv')+etcMinus,net:income-(emp+work+g('se-dmg')+g('se-adv')+etcMinus),routeDetails:_excelRoutes,updatedAt:serverTimestamp()});closeModal('mo-settle');resetSettleForm();_excelRoutes=[];const mdb=document.querySelector('#mo-settle .mdf');if(mdb)mdb.innerHTML=`<button class="btn btn-gray" onclick="closeModal('mo-settle');resetSettleForm()">취소</button><button class="btn btn-blue" onclick="saveSettle()">💾 저장 &amp; 공유</button>`;toast(`✅ ${driver} ${month} 정산서 수정 완료`);PAGES['dealer-settlements']();}
  catch(e){toast('❌ '+e.message)}
};

iv><div class="fg3"><div class="field"><label>반품금액</label><input id="se-ramt" type="number" min="0" oninput="calcSettlePreview()"></div><div class="field"><label>프레시백 회수</label><input id="se-fresh" type="number" min="0" oninput="calcSettlePreview()"></div><div class="field"><label>프레시백 인센</label><input id="se-finc" type="number" min="0" readonly style="background:var(--teal-l)"></div></div><div class="fg"><div class="field"><label>미계약건 금액</label><input id="se-nocont" type="number" min="0" oninput="calcSettlePreview()"></div><div class="field"><label>미계약 건수</label><input id="se-nocont-cnt" type="number" min="0"></div></div><div class="fg"><div class="field"><label>기타(+) 금액</label><input id="se-etc-plus" type="number" min="0" oninput="calcSettlePreview()"></div><div class="field"><label>기타(+) 사유</label><input id="se-etc-plus-r" placeholder="사유 입력"></div></div><div class="divider"></div><div class="section-label">📌 공제 항목</div><div class="fg3"><div class="field"><label>손해공제</label><input id="se-dmg" type="number" min="0" oninput="calcSettlePreview()"></div><div class="field"><label>공제 사유</label><input id="se-dmg-r" placeholder="사유"></div><div class="field"><label>가불금</label><input id="se-adv" type="number" min="0" oninput="calcSettlePreview()"></div></div><div class="fg"><div class="field"><label>기타(-) 금액</label><input id="se-etc-minus" type="number" min="0" oninput="calcSettlePreview()"></div><div class="field"><label>기타(-) 사유</label><input id="se-etc-minus-r" placeholder="사유 입력"></div></div><div class="calc-preview" id="se-calc-preview"><div class="row"><span>수익 합계</span><span id="cp-income" style="font-weight:700">₩0</span></div><div class="row" style="font-size:11px;color:var(--text3)"><span>월보수액</span><span id="cp-wage">₩0</span></div><div class="row deduct"><span>고용보험</span><span id="cp-emp">₩0</span></div><div class="row deduct"><span>산재보험</span><span id="cp-work">₩0</span></div><div class="row deduct"><span>공제 합계</span><span id="cp-deduct">₩0</span></div><div class="row total"><span>실지급액</span><span id="cp-net">₩0</span></div></div></div><div class="mdf"><button class="btn btn-gray" onclick="closeModal('mo-settle');resetSettleForm()">취소</button><button class="btn btn-blue" onclick="saveSettle()">💾 저장 &amp; 공유</button></div></div></div>`);

window.handleExcelUpload=function(inp){
  const file=inp.files[0];if(!file)return;
  parseExcelData(file,async function(result){
    _excelRoutes=result.routes;
    const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
    sv('se-dcnt',result.totalDel);sv('se-damt',result.totalAmt);sv('se-rcnt',result.totalRet);sv('se-ramt',result.totalRetAmt);sv('se-fresh',result.totalFresh);sv('se-finc',result.finc);sv('se-nocont',result.totalNocont);sv('se-nocont-cnt',result.totalNocontCnt);
    if(result.driverIdFromExcel){window._lastDriverId=result.driverIdFromExcel;try{const drSnap=await getDocs(query(collection(db,'drivers'),where('userId','==',result.driverIdFromExcel),where('dealerId','==',CU.dealerId)));if(!drSnap.empty){const dr=drSnap.docs[0].data();const dEl=document.getElementById('se-driver');if(dEl&&!dEl.value){dEl.value=dr.name;}const jEl=document.getElementById('se-jobsub');if(jEl&&dr.jobsub)jEl.value=dr.jobsub;onJobsubChange();toast(`👤 기사 자동 매칭: ${dr.name}`);}}catch(e){}}

    if(result.allDriverSettlements?.length&&CU.dealerId){try{const drSnap=await getDocs(query(collection(db,'drivers'),where('dealerId','==',CU.dealerId)));const drMap={};drSnap.docs.forEach(d=>{const dd=d.data();if(dd.userId)drMap[dd.userId]=dd;});const month=result.excelMonth||curMonth();const exSnap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId),where('month','==',month)));const existSet=new Set(exSnap.docs.map(d=>d.data().driverUserId||''));let autoCount=0;for(const ds of result.allDriverSettlements){if(existSet.has(ds.userId))continue;const drInfo=drMap[ds.userId]||{};const driverName=drInfo.name||ds.userId;const income=ds.totalAmt+ds.totalRetAmt+ds.totalFresh+ds.finc+ds.totalNocont;const supplyAmt=Math.round(income/1.1);const wage=Math.round(supplyAmt*(1-0.346));const empCalc=wage>=800000?Math.floor(wage*0.008/10)*10:0;const workCalc=Math.floor(wage*0.0088/10)*10;await addDoc(collection(db,'settlements'),{dealerId:CU.dealerId,dealerName:CU.dealerName||'',driver:driverName,driverName,driverUserId:ds.userId,month,jobsub:drInfo.jobsub||'쿠팡',dcnt:ds.totalDel,damt:ds.totalAmt,rcnt:ds.totalRet,ramt:ds.totalRetAmt,fresh:ds.totalFresh,finc:ds.finc,nocont:ds.totalNocont,nocontCnt:ds.totalNocontCnt,emp:empCalc,work:workCalc,routeDetails:ds.routes,status:'정산예정',createdAt:serverTimestamp()});autoCount++;}if(autoCount>0){toast(`✅ ${autoCount}명 정산 자동 완료 (${month})`);setTimeout(()=>PAGES['dealer-settlements']?.(),800);}}catch(e){console.warn('auto settle:',e.message);}}
    // 라우트 단가 자동 등록
    if(result.routeCamps&&CU.dealerId){try{const prSnap=await getDocs(query(collection(db,'prices'),where('dealerId','==',CU.dealerId)));const existRoutes=new Set(prSnap.docs.map(d=>d.data().route));const campMap={'부산1':'부산1캠프','부산2':'부산2캠프','부산3':'부산3캠프','M_진주1':'진주M캠프','대구2':'대구2캠프','대구2B':'대구2B캠프'};let routeCount=0;for(const [route,rawCamp] of Object.entries(result.routeCamps)){if(existRoutes.has(route)||route==='미계약')continue;const camp=campMap[rawCamp]||rawCamp||CAMP_NAMES[route.replace(/[A-D]$/,'')]||'기타';const price=RPRICE[route]||0;await addDoc(collection(db,'prices'),{dealerId:CU.dealerId,route,camp,price,createdAt:serverTimestamp()});routeCount++;}if(routeCount>0)toast(`📌 ${routeCount}개 라우트 자동 등록됨`);}catch(e){console.warn('auto route reg:',e.message);}}
    // 캠프별 라우트 분류 표시
    const cmap={'101':'부산1캠프','215':'부산1캠프','812':'부산2캠프','508':'부산3캠프','109':'대구2캠프','213':'대구2B캠프','608':'진주M캠프','612':'진주M캠프','613':'진주M캠프','614':'진주M캠프','619':'진주M캠프'};
    const ccol={'부산1캠프':'#3B82F6','부산2캠프':'#8B5CF6','부산3캠프':'#10B981','대구2캠프':'#F59E0B','대구2B캠프':'#FB923C','진주M캠프':'#EF4444','기타':'#6B7280','미계약':'#F59E0B'};
    const campRoutes={};result.routes.forEach(r=>{const prefix=r.route.replace(/[A-D]$/,'');const camp=r.route==='미계약'?'미계약':(cmap[prefix]||'기타');campRoutes[camp]=campRoutes[camp]||[];campRoutes[camp].push(r);});
    const campOrder=['부산1캠프','부산2캠프','부산3캠프','대구2캠프','대구2B캠프','진주M캠프','기타','미계약'];
    const campHTML=campOrder.filter(camp=>campRoutes[camp]?.length).map(camp=>{const rs=campRoutes[camp];const tot=rs.reduce((s,r)=>s+r.amt+(r.retAmt||0),0);return`<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:${ccol[camp]||'#666'};padding:3px 0;border-bottom:1px solid var(--border)">🏕 ${camp} — ${rs.reduce((s,r)=>s+(r.cnt||0),0).toLocaleString()}건 · ₩${fmt(tot)}</div><table class="route-tbl" style="margin-top:0"><thead><tr><th>라우트</th><th>배송</th><th>반품</th><th>단가</th><th>소계</th></tr></thead><tbody>${rs.map(r=>`<tr><td><strong>${esc(r.route)}</strong></td><td>${fmt(r.cnt)}</td><td style="color:var(--amber)">${r.ret>0?fmt(r.ret):'—'}</td><td>${r.unitPrice?fmt(r.unitPrice)+'원':'—'}</td><td style="color:var(--green)">₩${fmt(r.amt+(r.retAmt||0))}</td></tr>`).join('')}</tbody></table></div>`;}).join('');
    const res=document.getElementById('se-excel-result');if(res){res.style.display='block';res.innerHTML=`<div class="section-label" style="margin-top:8px">📊 캠프별 라우트 (${result.routes.length}개)</div><div style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);padding:6px;margin-bottom:8px">${campHTML}</div><div style="display:flex;gap:8px;font-size:12px;font-weight:700;flex-wrap:wrap;padding:6px;background:var(--brand-l);border-radius:var(--r)"><span style="color:var(--green)">📦 배송: ₩${fmt(result.totalAmt)}</span><span style="color:var(--teal)">⭐ 인센: ₩${fmt(result.finc)}</span>${result.totalFresh>0?`<span style="color:var(--brand)">🎒 프레시백: ₩${fmt(result.totalFresh)}</span>`:''}${result.totalNocont>0?`<span style="color:var(--amber)">📌 미계약: ₩${fmt(result.totalNocont)}</span>`:''}</div>`;}
    toast(`✅ 엑셀 분석 완료 — ${result.routes.length}개 라우트, ${fmt(result.totalDel)}건`);
  });
};
window.calcSettlePreview=function(){
  const g=id=>+(document.getElementById(id)||{value:0}).value||0;const j=(document.getElementById('se-jobsub')||{}).value||'쿠팡';const isYong=j==='용차';const isCoupang=j==='쿠팡';const dcnt=g('se-dcnt');
  let finc=isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0;const fincEl=document.getElementById('se-finc');if(fincEl)fincEl.value=finc;
  if(isYong){const yDel=g('se-yong-del')||900,yRet=g('se-yong-ret')||900;const rcnt=g('se-rcnt');const da=document.getElementById('se-damt');if(da&&!da.dataset.manual)da.value=dcnt*yDel;const ra=document.getElementById('se-ramt');if(ra&&!ra.dataset.manual)ra.value=rcnt*yRet;finc=0;}
  const income=g('se-damt')+g('se-ramt')+g('se-fresh')+finc+g('se-nocont')+g('se-etc-plus');const supplyAmt=Math.round(income/1.1);const wage=Math.round(supplyAmt*(1-0.346));const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;const work=Math.floor(wage*0.0088/10)*10;const deduct=emp+work+g('se-dmg')+g('se-adv')+g('se-etc-minus');const net=income-deduct;
  const s=function(id,v,pfx=''){const el=document.getElementById(id);if(el)el.textContent=(pfx||'')+'₩'+fmt(v);};s('cp-income',income);s('cp-wage',wage);s('cp-emp',emp,'-');s('cp-work',work,'-');s('cp-deduct',deduct,'-');s('cp-net',net);
};
function resetSettleForm(){_excelRoutes=[];const drop=document.getElementById('se-excel-drop');if(drop){drop.className='excel-drop';drop.innerHTML='<input type="file" accept=".xlsx,.xls,.csv" onchange="handleExcelUpload(this)"><div style="font-size:22px;margin-bottom:4px">📂</div><div style="font-size:12px;font-weight:700;color:var(--brand)">엑셀 파일 업로드</div>';}const res=document.getElementById('se-excel-result');if(res)res.style.display='none';}
window.openNewSettle=async function(){buildSettleModal();await refreshDriverList();document.getElementById('se-month').value=curMonth();['se-dcnt','se-damt','se-rcnt','se-ramt','se-fresh','se-nocont','se-nocont-cnt','se-dmg','se-adv','se-etc-plus','se-etc-minus','se-dmg-r','se-etc-plus-r','se-etc-minus-r'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('se-driver').value='';document.getElementById('se-jobsub').value='쿠팡';resetSettleForm();onJobsubChange();calcSettlePreview();openModal('mo-settle');};
window.saveSettle=async function(){
  let driver=document.getElementById('se-driver').value.trim();if(!driver&&_excelRoutes?.length){driver=window._lastDriverId||'미지정';const dEl=document.getElementById('se-driver');if(dEl)dEl.value=driver;}
  if(!driver){toast('❌ 기사명을 입력하거나 엑셀을 업로드해주세요');return;}const month=document.getElementById('se-month').value;if(!month){toast('❌ 정산월을 선택해주세요');return;}
  const g=id=>+(document.getElementById(id)||{value:0}).value||0;const gv=id=>(document.getElementById(id)||{value:''}).value||'';const j=gv('se-jobsub')||'쿠팡';const isYong=j==='용차';const isCoupang=j==='쿠팡';const dcnt=g('se-dcnt');const rcnt=g('se-rcnt');const yDel=g('se-yong-del')||900;const yRet=g('se-yong-ret')||900;const damt=isYong?dcnt*yDel:g('se-damt');const ramt=isYong?rcnt*yRet:g('se-ramt');const finc=isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0;const etcPlus=g('se-etc-plus'),etcMinus=g('se-etc-minus');const income=damt+ramt+g('se-fresh')+finc+g('se-nocont')+etcPlus;const supplyAmt=Math.round(income/1.1);const wage=Math.round(supplyAmt*(1-0.346));const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;const work=Math.floor(wage*0.0088/10)*10;
  try{await addDoc(collection(db,'settlements'),{dealerId:CU.dealerId,driverName:driver,driver,month,jobsub:j,dcnt,damt,rcnt,ramt,fresh:g('se-fresh'),finc,inc:0,nocont:g('se-nocont'),nocontCnt:g('se-nocont-cnt'),etcPlus,etcPlusReason:gv('se-etc-plus-r'),etcMinus,etcMinusReason:gv('se-etc-minus-r'),dmg:g('se-dmg'),dmgReason:gv('se-dmg-r'),adv:g('se-adv'),yongDel:isYong?yDel:0,yongRet:isYong?yRet:0,income,supplyAmt,monthlyWage:wage,emp,work,deduct:emp+work+g('se-dmg')+g('se-adv')+etcMinus,net:income-(emp+work+g('se-dmg')+g('se-adv')+etcMinus),routeDetails:_excelRoutes,status:'pending',createdAt:serverTimestamp()});closeModal('mo-settle');resetSettleForm();_excelRoutes=[];toast(`✅ ${driver} ${month} 정산서 저장 완료`);PAGES['dealer-settlements']();}
  catch(e){toast('❌ '+e.message)}
};

PAGES['dealer-prices']=async function(filterCamp){
  document.getElementById('page-title').textContent='라우트 단가표';
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-amber btn-sm" onclick="recalcAllSettlements()">🔄 전체 재계산</button><button class="btn btn-blue btn-sm" onclick="addDealerRoute()">+ 라우트 추가</button>`;
  const c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const snap=await getDocs(query(collection(db,'prices'),where('dealerId','==',CU.dealerId)));
    const customRoutes=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.route.localeCompare(b.route));
    const campCount={};customRoutes.forEach(r=>{const k=r.camp||CAMP_NAMES[r.route.replace(/[A-D]$/,'')]||'기타';campCount[k]=(campCount[k]||0)+1;});
    const uniqueCamps=[...new Set(customRoutes.map(r=>r.camp||CAMP_NAMES[r.route.replace(/[A-D]$/,'')]||'기타'))].sort();
    const campList=['전체',...uniqueCamps];const activeFilter=filterCamp||'전체';
    const filtered=activeFilter==='전체'?customRoutes:customRoutes.filter(r=>(r.camp||CAMP_NAMES[r.route.replace(/[A-D]$/,'')]||'기타')===activeFilter);
    const campTabs=campList.map(camp=>{const cnt=camp==='전체'?customRoutes.length:(campCount[camp]||0);return`<button onclick="PAGES['dealer-prices']('${camp}')" style="padding:4px 12px;border-radius:20px;border:1.5px solid ${activeFilter===camp?'var(--brand)':'var(--border)'};background:${activeFilter===camp?'var(--brand)':'var(--bg)'};color:${activeFilter===camp?'#fff':'var(--text2)'};font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">${camp} (${cnt})</button>`;}).join('');
    const customRowsHTML=filtered.map(r=>`<tr><td><strong>${esc(r.route)}</strong></td><td><span class="badge b-blue" style="font-size:10px">${esc(r.camp||CAMP_NAMES[r.route.replace(/[A-D]$/,'')]||'—')}</span></td><td><input type="number" value="${r.price||0}" style="width:90px;padding:4px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:13px" onchange="updateDealerPrice('${r.id}',this.value)"></td><td><button class="btn btn-red btn-xs" onclick="deleteDealerPrice('${r.id}')">삭제</button></td></tr>`).join('');
    c.innerHTML=`<div class="info-box">💡 여기 설정된 단가가 기사 정산에 사용됩니다.</div><div style="display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 12px">${campTabs}</div><div class="card"><div class="card-header"><div class="card-title">📌 전용 단가표 (${filtered.length}개)</div></div><div class="card-body">${customRoutes.length===0?`<div class="empty" style="padding:20px 0"><div class="empty-icon">📌</div><div>등록된 단가가 없습니다</div><div style="font-size:12px;color:var(--text3);margin-top:6px">쿠팡 엑셀 업로드 시 자동 등록됩니다</div></div>`:`<div class="tbl-wrap"><table><thead><tr><th>라우트</th><th>캠프</th><th>기사 단가 (원/건)</th><th></th></tr></thead><tbody>${customRowsHTML}</tbody></table></div>`}</div></div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};
window.addDealerRoute=async function(){const route=prompt('라우트 코드:','');if(!route)return;const price=+prompt('단가 (원/건):','0')||0;await addDoc(collection(db,'prices'),{dealerId:CU.dealerId,route:route.toUpperCase().trim(),price,createdAt:serverTimestamp()});toast('✅ 추가 완료');PAGES['dealer-prices']();};
window.updateDealerPrice=async function(id,val){await updateDoc(doc(db,'prices',id),{price:+val||0});toast('✅ 단가 저장');};
window.deleteDealerPrice=async function(id){if(!confirm('삭제하시겠습니까?'))return;await deleteDoc(doc(db,'prices',id));toast('🗑 삭제');PAGES['dealer-prices']();};

PAGES['dealer-stats']=async function(){
  document.getElementById('page-title').textContent='통계';document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const sSnap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId)));
    const settles=sSnap.docs.map(d=>({id:d.id,...d.data()}));
    if(settles.length===0){c.innerHTML='<div class="empty"><div class="empty-icon">📈</div><div>정산 데이터가 없습니다</div></div>';return;}
    const byMonth={};settles.forEach(s=>{const m=s.month||'';if(!byMonth[m])byMonth[m]={cnt:0,income:0,net:0,dcnt:0};const r=calcNet(s);byMonth[m].cnt++;byMonth[m].income+=r.income;byMonth[m].net+=r.net;byMonth[m].dcnt+=(s.dcnt||0);});
    const months=Object.keys(byMonth).sort().reverse().slice(0,12);
    const byDriver={};settles.forEach(s=>{const n=s.driverName||s.driver||'';if(!byDriver[n])byDriver[n]={cnt:0,income:0,net:0,dcnt:0};const r=calcNet(s);byDriver[n].cnt++;byDriver[n].income+=r.income;byDriver[n].net+=r.net;byDriver[n].dcnt+=(s.dcnt||0);});
    const drivers=Object.entries(byDriver).sort((a,b)=>b[1].net-a[1].net);
    const allMonths=Object.keys(byMonth).sort();const maxNet=Math.max(...allMonths.map(m=>byMonth[m].net),1);
    const chartBars=allMonths.map(m=>`<div class="chart-bar-col"><div class="chart-bar" style="height:${Math.round((byMonth[m].net/maxNet)*100)}px"><div class="chart-bar-val">${fmt(Math.round(byMonth[m].net/10000))}만</div></div><div class="chart-bar-lbl">${m.slice(5)}월</div></div>`).join('');
    const monthRows=months.map(m=>{const d=byMonth[m];return`<tr><td><strong>${esc(m)}</strong></td><td>${fmt(d.dcnt)}건</td><td style="color:var(--green)">₩${fmt(d.income)}</td><td style="font-weight:800;color:var(--brand)">₩${fmt(d.net)}</td><td>${d.cnt}건</td></tr>`;}).join('');
    const driverRows=drivers.map(([n,d],i)=>`<tr><td><strong>${i+1}. ${esc(n)}</strong></td><td>${fmt(d.dcnt)}건</td><td style="color:var(--green)">₩${fmt(d.income)}</td><td style="font-weight:800;color:var(--brand)">₩${fmt(d.net)}</td><td>${d.cnt}회</td></tr>`).join('');
    c.innerHTML=`<div class="card"><div class="card-header"><div class="card-title">📈 월별 실지급액 추이</div></div><div class="card-body"><div class="chart-bar-wrap" style="position:relative;padding-top:24px">${chartBars}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="card"><div class="card-header"><div class="card-title">📅 월별 정산 현황</div></div><div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>월</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>건수</th></tr></thead><tbody>${monthRows}</tbody></table></div></div></div><div class="card"><div class="card-header"><div class="card-title">🏆 기사별 누적 순위</div></div><div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>기사</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>정산회</th></tr></thead><tbody>${driverRows}</tbody></table></div></div></div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

// ────── 정산 관련 유틸 ──────
window.recalcAllSettlements=async function(){
  if(!confirm('현재 단가표로 모든 정산을 재계산하시겠습니까?\n(승인된 정산은 제외됩니다)'))return;
  try{toast('🔄 재계산 중...');
    const prSnap=await getDocs(query(collection(db,'prices'),where('dealerId','==',CU.dealerId)));
    const dealerPrices={};prSnap.docs.forEach(d=>{const dd=d.data();dealerPrices[dd.route]=dd.price||0;});
    const sSnap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId),where('status','!=','approved')));
    let cnt=0;
    for(const sd of sSnap.docs){const data=sd.data();const rdList=data.routeDetails||[];if(!rdList.length)continue;
      const newRoutes=rdList.map(rd=>{const price=dealerPrices[rd.route]||RPRICE[rd.route]||rd.unitPrice||0;return{...rd,unitPrice:price,amt:(rd.cnt||0)*price,retAmt:(rd.ret||0)*price};});
      const newDamt=newRoutes.reduce((s,rd)=>s+rd.amt,0);const newRamt=newRoutes.reduce((s,rd)=>s+rd.retAmt,0);
      const income=newDamt+newRamt+(data.fresh||0)+(data.finc||0)+(data.nocont||0);
      const wage=Math.round(Math.round(income/1.1)*(1-0.346));
      await updateDoc(doc(db,'settlements',sd.id),{damt:newDamt,ramt:newRamt,routeDetails:newRoutes,emp:wage>=800000?Math.floor(wage*0.008/10)*10:0,work:Math.floor(wage*0.0088/10)*10,updatedAt:serverTimestamp()});cnt++;}
    toast(`✅ ${cnt}건 재계산 완료`);}catch(e){toast('❌ '+e.message);}
};
window._m_recalcAllSettlements=window.recalcAllSettlements;
window.deleteMonthSettles=async function(){const m=(document.getElementById('filter-month')||{}).value||'';if(!m){toast('❌ 먼저 삭제할 월을 선택해주세요');return;}const settles=window._allSettles||[];const targets=settles.filter(s=>s.month===m);if(!targets.length){toast('해당 월에 정산이 없습니다');return;}if(!confirm(`⚠️ ${m} 정산 ${targets.length}건을 전부 삭제하시겠습니까?`))return;try{for(const s of targets)await deleteDoc(doc(db,'settlements',s.id));toast(`🗑 ${m} 정산 ${targets.length}건 삭제 완료`);PAGES['dealer-settlements']();}catch(e){toast('❌ '+e.message)}};
window._m_deleteMonthSettles=window.deleteMonthSettles;

window.checkDuplicateSettles=async function(){const settles=window._allSettles||[];const map={};settles.forEach(s=>{const key=`${s.driverUserId||s.driver}_${s.month}`;map[key]=map[key]||[];map[key].push(s);});const dupes=Object.values(map).filter(arr=>arr.length>1);if(!dupes.length){toast('✅ 중복 정산 없음');return;}document.getElementById('mo-dupe')?.remove();const rows=dupes.flat().map(s=>`<tr style="background:var(--red-l)"><td><strong>${esc(s.driverName||s.driver||'')}</strong></td><td>${esc(s.month||'')}</td><td>${fmt(s.dcnt||0)}건</td><td>₩${fmt(calcNet(s).net)}</td><td><button class="btn btn-red btn-xs" onclick="delSettle('${s.id}','${esc(s.driverName||s.driver||'')}');document.getElementById('mo-dupe').remove()">삭제</button></td></tr>`).join('');document.getElementById('modals').insertAdjacentHTML('beforeend',`<div class="mo show" id="mo-dupe"><div class="md" style="max-width:600px"><div class="mdt">🔍 중복 정산 검사 <button class="close-btn" onclick="document.getElementById('mo-dupe').remove()">✕</button></div><div class="mdb"><div class="info-box" style="border-color:var(--red)">⚠️ ${dupes.length}건 중복 발견</div><div class="tbl-wrap"><table><thead><tr><th>기사</th><th>정산월</th><th>배송건</th><th>실지급</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="mdf"><button class="btn btn-gray" onclick="document.getElementById('mo-dupe').remove()">닫기</button></div></div></div>`);};
window._m_checkDuplicateSettles=window.checkDuplicateSettles;

window.openDriverStats=async function(){
  document.getElementById('mo-drstats')?.remove();toast('📊 통계 로드 중...');
  try{const [sSnap,drSnap]=await Promise.all([getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId))),getDocs(query(collection(db,'drivers'),where('dealerId','==',CU.dealerId)))]);
  const drMap={};drSnap.docs.forEach(d=>{const dd=d.data();drMap[dd.userId||d.id]=dd;});const driverStats={};
  sSnap.docs.forEach(sd=>{const s=sd.data();const r=calcNet(s);const uid=s.driverUserId||s.driver||'';const name=s.driverName||s.driver||uid;if(!driverStats[uid])driverStats[uid]={name,camp:drMap[uid]?.camp||'',months:new Set(),totalDel:0,totalNet:0,settleCount:0};const ds=driverStats[uid];if(s.month)ds.months.add(s.month);ds.totalDel+=s.dcnt||0;ds.totalNet+=r.net||0;ds.settleCount++;});
  const stats=Object.entries(driverStats).sort((a,b)=>b[1].totalNet-a[1].totalNet);
  const rows=stats.map(([uid,d],i)=>`<tr><td style="font-size:11px">${i+1}</td><td><strong>${esc(d.name)}</strong></td><td><span class="badge b-blue" style="font-size:10px">${esc(d.camp||'—')}</span></td><td style="font-weight:700;color:var(--teal)">${fmt(d.totalDel)}건</td><td style="font-weight:700;color:var(--green)">₩${fmt(d.totalNet)}</td><td>${d.settleCount}회</td><td style="font-size:10px;color:var(--text3)">${[...d.months].sort().join(', ')}</td></tr>`).join('');
  document.getElementById('modals').insertAdjacentHTML('beforeend',`<div class="mo show" id="mo-drstats"><div class="md" style="max-width:700px"><div class="mdt">📊 기사별 실적 통계 <button class="close-btn" onclick="document.getElementById('mo-drstats').remove()">✕</button></div><div class="mdb"><div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px"><div class="stat-card"><div class="stat-val">${stats.length}</div><div class="stat-lbl">👤 기사 수</div></div><div class="stat-card"><div class="stat-val">${fmt(stats.reduce((a,[,d])=>a+d.totalDel,0))}</div><div class="stat-lbl">📦 총 배송건</div></div><div class="stat-card"><div class="stat-val green">₩${fmt(stats.reduce((a,[,d])=>a+d.totalNet,0))}</div><div class="stat-lbl">💰 총 실지급</div></div></div><div style="max-height:400px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead style="background:var(--bg3);position:sticky;top:0"><tr><th style="padding:6px 8px">#</th><th style="padding:6px 8px;text-align:left">기사</th><th style="padding:6px 8px">캠프</th><th style="padding:6px 8px">배송건</th><th style="padding:6px 8px">실지급합계</th><th style="padding:6px 8px">횟수</th><th style="padding:6px 8px;text-align:left">정산월</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="mdf"><button class="btn btn-gray" onclick="document.getElementById('mo-drstats').remove()">닫기</button></div></div></div>`);}
  catch(e){toast('❌ '+e.message);}
};

PAGES['driver-home']=async function(){

  const c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const driverSnap=await getDocs(query(collection(db,'drivers'),where('authUid','==',CU.uid)));
    let driver=driverSnap.empty?null:driverSnap.docs[0].data();
    const dname=driver?.name||CU.name||'';
    let mySettles=[];
    try{const sSnap=await getDocs(query(collection(db,'settlements'),where('driver','==',dname)));mySettles=sSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.month||'').localeCompare(a.month||''));}
    catch(e){try{const sSnap2=await getDocs(query(collection(db,'settlements'),where('driverName','==',dname)));mySettles=sSnap2.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.month||'').localeCompare(a.month||''));}catch(e2){}}

    const latest=calcNet(mySettles[0]);const totalNet=mySettles.reduce((a,s)=>a+(calcNet(s).net||0),0);

    c.innerHTML=`<div class="driver-hero"><div class="driver-hero-name">👋 ${esc(dname)}</div><div class="driver-hero-info">${esc(driver?.camp||'')} · ${esc(driver?.jobsub||'쿠팡')}</div><div style="display:flex;gap:20px;margin-top:14px"><div><div style="font-size:22px;font-weight:900">₩${fmt(latest.net)}</div><div style="font-size:11px;opacity:.7">이번달 실지급</div></div><div><div style="font-size:22px;font-weight:900">₩${fmt(totalNet)}</div><div style="font-size:11px;opacity:.7">누적 지급액</div></div></div></div>${cards}`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

function buildInvoiceHTML(inv,dealer){const issueDate=inv.createdAt?.toDate?.()||new Date();const dueDate=new Date(issueDate);dueDate.setDate(25);return`<div class="stmt-wrap"><div class="stmt-brand">LogiNet · 로지넷 물류 정산관리</div><div class="stmt-title" style="font-size:22px">서비스 이용 청구서</div><div class="stmt-meta">청구월: ${inv.month||''} · 발행일: ${issueDate.toLocaleDateString('ko-KR')}</div><hr class="stmt-divider"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;font-size:12px"><div style="background:#f5f3ed;padding:12px;border-radius:8px"><div style="font-weight:800;margin-bottom:6px;color:#1A5FA8">청구대상</div><div><strong>${esc(dealer?.name||inv.dealerName||'')}</strong></div><div>사업자번호: ${esc(dealer?.brn||inv.brn||'—')}</div></div><div style="background:#e8f1fb;padding:12px;border-radius:8px"><div style="font-weight:800;margin-bottom:6px;color:#1A5FA8">입금 계좌</div><div style="font-size:16px;font-weight:900;color:#0C3F74">${BANK_INFO.bank}</div><div style="font-size:18px;font-weight:900;color:#1A5FA8;letter-spacing:1px">${BANK_INFO.account}</div><div style="font-weight:700">예금주: ${BANK_INFO.holder}</div><div style="color:#C0202A;font-weight:700;margin-top:4px">납부기한: ${dueDate.toLocaleDateString('ko-KR')}</div></div></div><div class="stmt-row total"><span>청구 금액 (${PLAN_LABEL[inv.plan||'standard']||''} 플랜)</span><span>₩${fmt(inv.amount||0)}</span></div><div style="margin-top:12px;padding:10px;background:#fff8e1;border-radius:8px;font-size:11px;border:1px solid #ffe082">⚠️ 입금 시 대리점명을 입금자명으로 기재해주세요. 문의: ${BANK_INFO.tel}</div></div>`;}
PAGES['admin-invoices']=async function(){
  document.getElementById('page-title').textContent='청구서 관리';document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-blue btn-sm" onclick="genAllInvoices()">+ 이번달 청구서 생성</button>`;
  const c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';

window.genAllInvoices=async function(){if(!confirm(`${curMonth()} 청구서를 전체 대리점에 생성하시겠습니까?`))return;try{const [dSnap,sSnap,iSnap]=await Promise.all([getDocs(collection(db,'dealers')),getDocs(collection(db,'subscriptions')),getDocs(query(collection(db,'invoices'),where('month','==',curMonth())))]);const existingDealer=new Set(iSnap.docs.map(d=>d.data().dealerId));const subMap={};sSnap.forEach(d=>subMap[d.id]=d.data());let cnt=0;for(const d of dSnap.docs){if(existingDealer.has(d.id))continue;const dd=d.data();const sub=subMap[d.id]||{};const fee=sub.monthlyFee||PLAN_FEE[sub.plan||'standard']||40000;await addDoc(collection(db,'invoices'),{dealerId:d.id,dealerName:dd.name,month:curMonth(),amount:fee,plan:sub.plan||'standard',status:'pending',brn:dd.brn||'',corpName:dd.corpName||dd.name,ceoName:dd.ceoName||'',createdAt:serverTimestamp()});cnt++;}toast(`✅ ${cnt}건 청구서 생성 완료`);PAGES['admin-invoices']();}catch(e){toast('❌ '+e.message)}};

};
window.resendContract=async function(dealerId,name,email,mgr){if(!confirm(`${name}에게 계약서를 발송하시겠습니까?`))return;await sendModusignContract({dealerId,name,email,mgr});await updateDoc(doc(db,'dealers',dealerId),{contractStatus:'sent',contractSentAt:serverTimestamp()});toast(`✍️ ${name} 계약서 발송 처리`);PAGES['admin-contracts']();};
window._m_resendContract=window.resendContract;
window.markContractDone=async function(dealerId,name){await updateDoc(doc(db,'dealers',dealerId),{contractStatus:'completed',contractCompletedAt:serverTimestamp()});toast(`✅ ${name} 서명 완료 처리`);PAGES['admin-contracts']();};
window._m_markContractDone=window.markContractDone;

// ────── 대리점 구독/청구서 조회 ──────
PAGES['dealer-subscription']=async function(){
  document.getElementById('page-title').textContent='내 구독 현황';const c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';
  try{const snap=await getDoc(doc(db,'subscriptions',CU.dealerId));if(!snap.exists()){c.innerHTML='<div class="empty"><div class="empty-icon">💳</div><div>구독 정보가 없습니다. 관리자에게 문의해주세요.</div></div>';return;}const sub=snap.data();const exp=sub.expireDate?.toDate?.()||null;const now=new Date();const isActive=sub.status==='active'&&exp&&exp>now;const daysLeft=exp?Math.ceil((exp-now)/86400000):0;c.innerHTML=`<div class="card"><div class="card-header"><div class="card-title">💳 구독 현황</div></div><div class="card-body"><div class="stat-grid" style="grid-template-columns:repeat(3,1fr)"><div class="stat-card"><div class="stat-val">${PLAN_LABEL[sub.plan||'standard']||'—'}</div><div class="stat-lbl">현재 플랜</div></div><div class="stat-card"><div class="stat-val">₩${fmt(sub.monthlyFee||0)}</div><div class="stat-lbl">월 이용료</div></div><div class="stat-card"><div class="stat-val ${daysLeft<7?'amber':''}">${daysLeft>0?`D-${daysLeft}`:'만료'}</div><div class="stat-lbl">남은 기간</div></div></div><div style="background:${isActive?'var(--green-l)':'var(--red-l)'};border:1.5px solid ${isActive?'var(--green)':'var(--red)'};border-radius:var(--r);padding:14px 16px;margin-top:12px"><div style="font-size:16px;font-weight:900;color:${isActive?'var(--green)':'var(--red)'}">${isActive?'✅ 서비스 이용 중':'❌ 구독 만료'}</div><div style="font-size:12px;margin-top:4px">만료일: ${exp?exp.toLocaleDateString('ko-KR'):'—'}</div></div>${!isActive?`<div class="info-box" style="margin-top:12px">💳 하나은행 ${BANK_INFO.account} (${BANK_INFO.holder})<br>문의: ${BANK_INFO.tel}</div>`:''}</div></div>`;}catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};
PAGES['dealer-invoices']=async function(){
  document.getElementById('page-title').textContent='청구서 조회';const c=document.getElementById('content');c.innerHTML='<div class="loading">로딩 중...</div>';
  try{const snap=await getDocs(query(collection(db,'invoices'),where('dealerId','==',CU.dealerId)));const invoices=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.month||'').localeCompare(a.month||''));if(!invoices.length){c.innerHTML='<div class="empty"><div class="empty-icon">📄</div><div>청구서가 없습니다</div></div>';return;}const rows=invoices.map(i=>`<tr><td>${esc(i.month||'')}</td><td style="font-weight:700">₩${fmt(i.amount||0)}</td><td><span class="badge ${i.status==='paid'?'b-green':'b-amber'}">${i.status==='paid'?'납부완료':'납부대기'}</span></td><td><button class="btn btn-outline btn-xs" onclick="viewInvoice('${i.id}')">청구서 보기</button></td></tr>`).join('');c.innerHTML=`<div class="info-box">💳 납부 계좌: 하나은행 ${BANK_INFO.account} (예금주: ${BANK_INFO.holder})<br>입금 후 담당자(${BANK_INFO.tel})에게 연락 주시면 확인해드립니다.</div><div class="card"><div class="card-header"><div class="card-title">📄 청구서 목록</div></div><div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>청구월</th><th>금액</th><th>상태</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;}catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

console.log('[LogiNet v2] 모듈 로드 완료');
</script>
