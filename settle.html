<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1A5FA8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>LogiNet — 물류 정산 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════
   LOGINET v2 — Design System
═══════════════════════════════════════ */
:root{
  --brand:#1A5FA8;
  --brand-d:#0C3F74;
  --brand-l:#E8F1FB;
  --brand-m:#2B75C8;
  --green:#0A6E48;--green-l:#E2F5EC;
  --red:#C0202A;--red-l:#FCEAEA;
  --amber:#8B5A00;--amber-l:#FEF3E2;
  --purple:#5B3DB5;--purple-l:#EEEAFC;
  --teal:#0A6860;--teal-l:#E2F4F2;
  --gray:#54524E;--gray-l:#F3F1EB;--gray-m:#D2CFC7;
  --bg:#F4F2ED;--bg2:#FFFFFF;--bg3:#EDEAE3;
  --text:#1C1C1A;--text2:#54524E;--text3:#8C8A82;
  --border:rgba(0,0,0,.09);
  --r:10px;--rl:14px;--rxl:18px;
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --font:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;
}
body.dark{
  --bg:#111110;--bg2:#1A1A18;--bg3:#222220;
  --text:#E6E4DC;--text2:#A4A29A;--text3:#6A6860;
  --border:rgba(255,255,255,.09);
  --gray-l:#222220;--brand-l:#091A30;--green-l:#041E12;
  --red-l:#240809;--amber-l:#1E1000;--purple-l:#150D30;--teal-l:#041B18;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font);-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;line-height:1.5}

/* ─── LOGIN ─── */
#login-wrap{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,var(--brand-d) 0%,var(--brand) 55%,#2B81D8 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{
  background:var(--bg2);border-radius:22px;
  padding:40px 36px;width:360px;max-width:100%;
  box-shadow:0 28px 72px rgba(0,0,0,.35);
  animation:loginPop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes loginPop{from{opacity:0;transform:scale(.92) translateY(16px)}}
.login-logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.login-icon{font-size:34px}
.login-brand{font-size:26px;font-weight:900;color:var(--brand);letter-spacing:-.5px}
.login-sub{font-size:11px;color:var(--text3);text-align:center;margin-bottom:28px;letter-spacing:.05em}
.login-input{
  width:100%;padding:12px 14px;margin-bottom:10px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;outline:none;background:var(--bg);color:var(--text);
  transition:border-color .15s;
}
.login-input:focus{border-color:var(--brand)}
.login-btn{
  width:100%;padding:13px;background:var(--brand);color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:700;
  cursor:pointer;transition:background .15s;margin-top:4px;
}
.login-btn:hover{background:var(--brand-d)}
.login-btn:active{transform:scale(.98)}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none}
.login-ver{font-size:10px;color:var(--text3);text-align:center;margin-top:16px;opacity:.7}

/* ─── LAYOUT ─── */
#app{display:none}
.layout{display:flex;min-height:100vh}

/* ─── SIDEBAR ─── */
.sidebar{
  width:230px;min-height:100vh;
  background:var(--brand-d);
  display:flex;flex-direction:column;
  position:fixed;left:0;top:0;bottom:0;z-index:100;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-row{display:flex;align-items:center;gap:9px}
.sb-logo-icon{font-size:20px}
.sb-logo-text{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.3px}
.sb-logo-badge{
  font-size:9px;background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);
  padding:2px 7px;border-radius:20px;margin-top:4px;display:inline-block;letter-spacing:.05em;
}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.sb-user-role{
  font-size:10px;font-weight:700;letter-spacing:.06em;
  display:inline-block;padding:2px 8px;border-radius:20px;
  background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);
}
.sb-user-dealer{font-size:10px;color:rgba(255,255,255,.45);margin-top:4px}
.snav{flex:1;padding:8px 0;overflow-y:auto}
.ns{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);padding:12px 16px 4px;letter-spacing:.1em;text-transform:uppercase}
.ni{
  padding:9px 16px;cursor:pointer;
  font-size:13px;color:rgba(255,255,255,.65);
  border-radius:9px;margin:1px 8px;
  transition:all .14s;display:flex;align-items:center;gap:8px;
}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:rgba(255,255,255,.2);color:#fff;font-weight:700}
.ni-ic{font-size:15px;width:20px;text-align:center}
.sb-bot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.sb-bot-btn{
  width:100%;padding:8px 12px;background:transparent;
  border:1px solid rgba(255,255,255,.2);border-radius:9px;
  color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;
  margin-bottom:6px;transition:all .15s;text-align:left;
  display:flex;align-items:center;gap:6px;
}
.sb-bot-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-version{font-size:9px;color:rgba(255,255,255,.25);text-align:center;padding-top:4px;letter-spacing:.05em}

/* ─── TOPBAR ─── */
.main{margin-left:230px;flex:1;display:flex;flex-direction:column}
.topbar{
  height:54px;background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:50;
  box-shadow:0 1px 8px rgba(0,0,0,.04);
}
.topbar-title{font-size:15px;font-weight:800;color:var(--text)}
.topbar-right{display:flex;gap:8px;align-items:center}
.content{padding:20px;flex:1}

/* ─── CARDS ─── */
.card{
  background:var(--bg2);border-radius:var(--rl);
  border:1px solid var(--border);margin-bottom:14px;
  overflow:hidden;box-shadow:var(--shadow);
}
.card-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
.card-body{padding:16px 18px}

/* ─── STAT GRID ─── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{
  background:var(--bg2);border-radius:var(--rl);
  border:1px solid var(--border);padding:18px 16px;
  box-shadow:var(--shadow);transition:transform .15s;
}
.stat-card:hover{transform:translateY(-2px)}
.stat-val{font-size:24px;font-weight:900;color:var(--brand)}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 16px;border-radius:9px;font-size:13px;
  font-weight:700;cursor:pointer;border:none;
  transition:all .15s;white-space:nowrap;line-height:1;
}
.btn:active{transform:scale(.97)}
.btn-blue{background:var(--brand);color:#fff}
.btn-blue:hover{background:var(--brand-d)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#074D33}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#950A14}
.btn-amber{background:var(--amber);color:#fff}
.btn-amber:hover{background:#6A4200}
.btn-gray{background:var(--gray-l);color:var(--text2);border:1px solid var(--border)}
.btn-gray:hover{background:var(--gray-m)}
.btn-outline{background:transparent;border:1.5px solid var(--brand);color:var(--brand)}
.btn-outline:hover{background:var(--brand-l)}
.btn-kakao{background:#FEE500;color:#1A1300;border:none}
.btn-kakao:hover{background:#F0D800}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}

/* ─── FORMS ─── */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:9px;
  font-size:13px;background:var(--bg);color:var(--text);outline:none;
  transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);background:var(--bg2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field input[readonly]{background:var(--bg3);color:var(--text3)}

/* ─── TABLE ─── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:700;font-size:11px;color:var(--text2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.route-tbl td{padding:6px 10px;font-size:12px}
.route-tbl th{padding:6px 10px;font-size:11px}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-blue{background:var(--brand-l);color:var(--brand)}
.b-green{background:var(--green-l);color:var(--green)}
.b-red{background:var(--red-l);color:var(--red)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-purple{background:var(--purple-l);color:var(--purple)}
.b-teal{background:var(--teal-l);color:var(--teal)}
.b-gray{background:var(--gray-l);color:var(--gray)}

/* ─── MODAL ─── */
.mo{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;padding:16px;
}
.mo.show{display:flex}
.md{
  background:var(--bg2);border-radius:var(--rxl);
  width:100%;max-width:500px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.28);
  animation:mdIn .2s cubic-bezier(.34,1.2,.64,1);
}
@keyframes mdIn{from{opacity:0;transform:scale(.96) translateY(8px)}}
.mdt{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.mdb{padding:20px}
.mdf{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px;line-height:1;transition:color .12s}
.close-btn:hover{color:var(--text)}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1C1C1A;color:#fff;padding:10px 22px;border-radius:100px;
  font-size:13px;font-weight:600;opacity:0;pointer-events:none;z-index:9999;
  transition:all .25s;white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── EXCEL UPLOAD ─── */
.excel-drop{
  border:2px dashed var(--brand);border-radius:var(--rl);
  padding:18px;text-align:center;cursor:pointer;
  background:var(--brand-l);transition:all .15s;position:relative;
  margin-bottom:10px;
}
.excel-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.excel-drop:hover{border-color:var(--brand-d);background:#d8e9f8}
.excel-drop.done{border-color:var(--green);background:var(--green-l)}

/* ─── STATEMENT (인쇄용 포함) ─── */
.stmt-wrap{
  background:#fff;color:#1a1a18;
  padding:24px;border-radius:14px;max-width:600px;margin:0 auto;
}
.stmt-brand{font-size:10px;font-weight:800;color:var(--brand);letter-spacing:.12em;margin-bottom:3px;text-transform:uppercase}
.stmt-title{font-size:21px;font-weight:900;margin-bottom:3px}
.stmt-meta{font-size:12px;color:#666;margin-bottom:14px}
.stmt-divider{height:2px;background:linear-gradient(90deg,#1A5FA8,#2B81D8,transparent);border:none;margin:12px 0}
.stmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ede4;font-size:13px}
.stmt-row:last-child{border:none}
.stmt-row.total{background:#f5f3ed;margin:0 -24px;padding:12px 24px;font-weight:800;font-size:14px}
.stmt-row.deduct{color:#C0202A}
.stmt-row.net{background:var(--brand);color:#fff;margin:0 -24px -24px;padding:16px 24px;border-radius:0 0 14px 14px;font-weight:900;font-size:17px}
.amt-plus{color:#0A6E48;font-weight:700}
.amt-minus{color:#C0202A;font-weight:700}
.stmt-section-title{font-size:11px;font-weight:800;color:var(--brand);letter-spacing:.07em;text-transform:uppercase;margin:14px 0 6px;padding-bottom:4px;border-bottom:1.5px solid var(--brand-l)}
.route-preview{
  border:1px solid #e8e4dc;border-radius:8px;overflow:hidden;margin-bottom:10px;
  font-size:12px;
}
.route-preview table{font-size:11px}
.route-preview th{background:#f5f3ed;font-size:10px;padding:5px 8px}
.route-preview td{padding:5px 8px;border-bottom:1px solid #f0ede4}

/* ─── DRIVER HERO ─── */
.driver-hero{
  background:linear-gradient(135deg,var(--brand-d),var(--brand));
  border-radius:var(--rl);padding:22px;color:#fff;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(26,95,168,.3);
}
.driver-hero-name{font-size:22px;font-weight:900}
.driver-hero-info{font-size:12px;opacity:.75;margin-top:3px}
.settle-card{
  background:var(--bg2);border-radius:var(--rl);
  border:1px solid var(--border);padding:16px;margin-bottom:10px;
  cursor:pointer;transition:all .15s;
  box-shadow:var(--shadow);
}
.settle-card:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.settle-card-month{font-size:14px;font-weight:800}
.settle-card-net{font-size:20px;font-weight:900;color:var(--brand)}

/* ─── CHART ─── */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{background:var(--brand);border-radius:5px 5px 0 0;width:100%;min-height:4px;transition:height .4s cubic-bezier(.34,1.2,.64,1);position:relative}
.chart-bar:hover{background:var(--brand-m)}
.chart-bar-lbl{font-size:9px;color:var(--text3);font-weight:600;text-align:center}
.chart-bar-val{font-size:9px;color:var(--brand);font-weight:700;position:absolute;top:-16px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* ─── CALC PREVIEW ─── */
.calc-preview{
  background:var(--brand-l);border:1.5px solid var(--brand);
  border-radius:var(--rl);padding:14px 16px;margin-top:10px;
}
.calc-preview .row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.calc-preview .row.total{font-weight:800;font-size:14px;color:var(--brand);border-top:1.5px solid var(--brand);margin-top:6px;padding-top:8px}
.calc-preview .row.deduct{color:var(--red)}
.calc-preview .net-val{font-size:18px;font-weight:900;color:var(--brand);text-align:right;margin-top:8px}

/* ─── 반응형 ─── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .topbar{padding:0 14px}
  .content{padding:12px}
  .ham{display:flex!important}
  .stat-grid{grid-template-columns:1fr 1fr}
  .fg,.fg3{grid-template-columns:1fr}
  .tbl-wrap{overflow-x:auto}
}
.ham{display:none;cursor:pointer;font-size:20px;padding:4px;align-items:center;justify-content:center;width:36px;height:36px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
.overlay.show{display:block}

/* ─── MISC ─── */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.loading::before{content:'⏳ ';font-size:20px}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.section-label{font-size:11px;font-weight:800;color:var(--brand);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.divider{height:1px;background:var(--border);margin:12px 0}
.info-box{background:var(--brand-l);border:1.5px solid var(--brand);border-radius:var(--r);padding:12px 14px;font-size:12px;margin-bottom:12px}

/* ─── SECURITY RULES (참고용 주석) ─────
Firestore Security Rules (mbti-logistics-bfcd3):
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    // 인증 필수
    match /{document=**} { allow read, write: if false; }

    // users: 본인 데이터만
    match /users/{uid} {
      allow read, write: if request.auth != null && request.auth.uid == uid;
    }
    // dealers: admin만 쓰기, dealer는 본인 것만
    match /dealers/{dealerId} {
      allow read: if request.auth != null && (
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin' ||
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.dealerId == dealerId
      );
      allow write: if request.auth != null &&
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
    }
    // drivers: dealer는 자기 대리점만, driver는 본인만
    match /drivers/{driverId} {
      allow read, write: if request.auth != null && (
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin' ||
        (get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'dealer' &&
         resource.data.dealerId == get(/databases/$(database)/documents/users/$(request.auth.uid)).data.dealerId) ||
        (resource.data.authUid == request.auth.uid)
      );
    }
    // settlements: dealer는 자기 대리점만, driver는 본인 것만
    match /settlements/{settleId} {
      allow read, write: if request.auth != null && (
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin' ||
        (get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'dealer' &&
         resource.data.dealerId == get(/databases/$(database)/documents/users/$(request.auth.uid)).data.dealerId)
      );
      allow read: if request.auth != null &&
        resource.data.authUid == request.auth.uid;
    }
    // settings: admin만
    match /settings/{doc} {
      allow read: if request.auth != null;
      allow write: if request.auth != null &&
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
    }
    // prices: dealer는 자기 대리점
    match /prices/{priceId} {
      allow read, write: if request.auth != null && (
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin' ||
        (get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'dealer' &&
         resource.data.dealerId == get(/databases/$(database)/documents/users/$(request.auth.uid)).data.dealerId)
      );
    }
  }
}
─────────────────────────────────────── */

/* ─── PRINT ─── */
@media print{
  body,html{background:#fff!important;margin:0;padding:0}
  .no-print{display:none!important}
  .sidebar,.topbar,.overlay{display:none!important}
  .main{margin-left:0!important}
  .stmt-wrap{box-shadow:none!important;padding:0!important;border-radius:0!important}
  @page{size:A4;margin:15mm}
}

// ══ calcNet — v9 완전 이식 ══
function calcNet(x){
  const dcnt=+x.dcnt||+x.delivCount||0;
  const rcnt=+x.rcnt||+x.retCount||0;
  const isYong=(x.jobsub==='용차'||x.client==='용차'||x.category==='용차');
  const yDel=+x.yongDel||(G_PRICES.yong_del||900);
  const yRet=+x.yongRet||(G_PRICES.yong_ret||900);
  const _rdList=x.routeDetails||[];
  const _damtRP=_rdList.reduce((s,rd)=>s+(rd.cnt||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0),0);
  const _ramtRP=_rdList.reduce((s,rd)=>s+(rd.ret||0)*((rd.unitPrice&&rd.unitPrice>0?rd.unitPrice:0)||RPRICE[rd.route]||0),0);
  const damt=isYong?dcnt*yDel:(_rdList.length?_damtRP:(+x.damt||+x.delivAmt||+x.base||0));
  const ramt=isYong?rcnt*yRet:(_rdList.length?_ramtRP:(+x.ramt||+x.retAmt||0));
  const fresh=+x.fresh||+x.freshAmt||0;
  const isCoupang=(x.jobsub==='쿠팡'||x.client==='쿠팡');
  const hasStoredFinc=(x.finc!==undefined&&x.finc!==null&&x.finc!=='');
  const finc=hasStoredFinc?+x.finc:(isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0);
  const inc=+x.inc||0;
  const nocont=+x.nocont||0;
  const etcPlus=+x.etcPlus||0;
  const etcMinus=+x.etcMinus||0;
  const income=damt+ramt+fresh+finc+inc+nocont+etcPlus;
  const totalAmt=income;
  const supplyAmt=Math.round(totalAmt/1.1);
  const expenseAmt=Math.round(supplyAmt*0.346);
  const monthlyWage=supplyAmt-expenseAmt;
  const empCalc=monthlyWage>=800000?Math.floor(monthlyWage*0.008/10)*10:0;
  const workCalc=Math.floor(monthlyWage*0.0088/10)*10;
  const TAX_RATE=+x.taxRate||0.033;
  const tax=+x.tax||(x.taxFixed?+x.taxFixed:Math.round(income*TAX_RATE));
  const emp=(x.emp!==undefined&&x.emp!==null&&x.emp!==''&&+x.emp>0)?+x.emp:empCalc;
  const workStored=(x.work!==undefined&&x.work!==null&&x.work!==''&&+x.work>0)?+x.work:0;
  const work=(workStored&&workCalc>0&&workStored>=workCalc*0.5)?workStored:workCalc;
  const eq=+x.eq||0;
  const dmg=+x.dmg||+x.damage||0;
  const adv=+x.adv||+x.advance||0;
  const deduct=emp+work+eq+dmg+adv+etcMinus;
  const net=totalAmt-deduct;
  return{damt,ramt,fresh,finc,inc,nocont,etcPlus,etcMinus,income,totalAmt,supplyAmt,monthlyWage,tax,emp,work,eq,dmg,adv,deduct,net,isYong,isCoupang,yDel,yRet};
}

// ══ parseExcel — v9 완전 이식 ══
function parseExcelData(file,onResult){
  toast('📊 엑셀 분석 중...');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const hIdx=rows.findIndex(r=>r&&r[0]==='구분');
      if(hIdx<0){toast('❌ 형식 오류 — 구분 헤더를 찾을 수 없습니다');return;}
      let totalAmt=0,totalFresh=0,totalDel=0,totalRet=0,totalRetAmt=0;
      let totalNocont=0,totalNocontCnt=0;
      const routeMap={};
      const dailyRows=[];
      rows.slice(hIdx+1).forEach(row=>{
        if(!row||!row[0])return;
        const cat=String(row[0]).trim();
        if(cat==='배송'||cat==='수기반영'){
          const route=row[2]?String(row[2]).trim():'기타';
          const del=+row[7]||0,ret=+row[8]||0;
          const unitPrice=RPRICE[route]||0;
          const delAmt=del*unitPrice;
          const retAmt=ret*unitPrice;
          let dateRaw=row[3],dateStr='';
          if(dateRaw instanceof Date)dateStr=dateRaw.toISOString().slice(0,10);
          else if(dateRaw)dateStr=String(dateRaw).slice(0,10);
          totalAmt+=delAmt;totalDel+=del;totalRet+=ret;totalRetAmt+=retAmt;
          if(!routeMap[route])routeMap[route]={cnt:0,ret:0,amt:0,retAmt:0,unitPrice:unitPrice};
          routeMap[route].cnt+=del;routeMap[route].ret+=ret;
          routeMap[route].amt+=delAmt;routeMap[route].retAmt+=retAmt;
          if(unitPrice&&!routeMap[route].unitPrice)routeMap[route].unitPrice=unitPrice;
          if(del>0)dailyRows.push({date:dateStr,route,cnt:del,ret,unitPrice,amt:delAmt,retAmt});
        }else if(cat.includes('프레쉬백')||cat.includes('프레시백')){
          totalFresh+=+row[14]||0;
        }else if(cat==='미계약 라우트'||cat==='미계약건'||cat==='미계약'){
          const miscCnt=+row[7]||0;
          const miscAmt=+row[14]||+row[10]||0;
          totalNocont+=miscAmt;totalNocontCnt+=miscCnt;
          if(!routeMap['미계약'])routeMap['미계약']={cnt:miscCnt,ret:0,amt:miscAmt,retAmt:0,unitPrice:0};
          else{routeMap['미계약'].cnt+=miscCnt;routeMap['미계약'].amt+=miscAmt;}
        }
      });
      const routes=Object.entries(routeMap)
        .map(([r,v])=>({route:r,cnt:v.cnt,ret:v.ret,amt:v.amt,retAmt:v.retAmt||0,unitPrice:v.unitPrice}))
        .sort((a,b)=>b.amt-a.amt);
      const finc=Math.round(totalDel*(G_PRICES.freshbag_inc||25));
      onResult({routes,dailyRows,totalAmt,totalFresh,totalDel,totalRet,totalRetAmt,totalNocont,totalNocontCnt,finc});
    }catch(e){toast('❌ 엑셀 분석 오류: '+e.message);console.error(e);}
  };
  reader.readAsArrayBuffer(file);
}

window.copyStmtLink=async function(id){
  const url=location.origin+location.pathname+'#view:'+id;
  try{await navigator.clipboard.writeText(url);}
  catch(e){prompt('링크 복사:',url);return;}
  toast('🔗 링크가 클립보드에 복사되었습니다');
};
window.shareKakao=function(id,driver,month,net){
  const url=location.origin+location.pathname+'#view:'+id;
  const msg=`[로지넷 정산]\n${driver} 기사 ${month} 정산 명세서\n실지급액: ₩${net}\n\n${url}`;
  const kakaoUrl='https://sharer.kakao.com/talk/friends/picker/link?url='+encodeURIComponent(url);
  // 카카오톡 앱 딥링크 시도
  const shareData={title:`${driver} ${month} 정산 명세서`,text:msg,url};
  if(navigator.share){
    navigator.share(shareData).catch(()=>window.open(kakaoUrl,'_blank'));
  }else{
    // 모바일: 카카오 URI 스킴
    const kakaoAppUrl=`kakaolink://send?text=${encodeURIComponent(msg)}`;
    const win=window.open(kakaoAppUrl,'_blank');
    setTimeout(()=>{
      try{if(!win||win.closed)throw new Error();}
      catch(e){
        if(confirm(`카카오톡 앱이 없으면 링크를 복사합니다.\n\n${msg}\n\n링크 복사하시겠습니까?`)){
          navigator.clipboard.writeText(url).then(()=>toast('🔗 링크 복사됨')).catch(()=>prompt('복사:',url));
        }
      }
    },1500);
  }
};

// ══ URL 해시 명세서 직접 보기 ══
async function checkHashView(){
  const hash=location.hash;
  if(!hash.startsWith('#view:'))return;
  const id=hash.replace('#view:','');
  if(!id)return;
  try{
    const snap=await getDoc(doc(db,'settlements',id));
    if(!snap.exists()){toast('명세서를 찾을 수 없습니다');return;}
    const sd={id,...snap.data()};
    let dealerName='';
    if(sd.dealerId){const ds=await getDoc(doc(db,'dealers',sd.dealerId));if(ds.exists())dealerName=ds.data().name;}
    showStmtModal(sd,dealerName);
    history.replaceState(null,'',location.pathname);
  }catch(e){console.warn(e)}
}

PAGES['dealer-dashboard']=async function(){
  document.getElementById('page-title').textContent='대리점 현황';
  document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const [drSnap,sSnap]=await Promise.all([
      getDocs(query(collection(db,'drivers'),where('dealerId','==',CU.dealerId))),
      getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId)))
    ]);
    const settles=sSnap.docs.map(d=>({id:d.id,...d.data()}));
    const thisM=curMonth();
    const thisMS=settles.filter(s=>s.month===thisM);
    const approved=settles.filter(s=>s.status==='approved').length;
    const thisNet=thisMS.reduce((a,s)=>a+(calcNet(s).net||0),0);
    const totalNet=settles.reduce((a,s)=>a+(calcNet(s).net||0),0);
    const pending=settles.filter(s=>s.status!=='approved').length;

    // 월별 차트
    const months=[];
    for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
    const monthData=months.map(m=>{
      const ms=settles.filter(s=>s.month===m);
      return{m,cnt:ms.length,net:ms.reduce((a,s)=>a+(calcNet(s).net||0),0)};
    });
    const maxNet=Math.max(...monthData.map(m=>m.net),1);
    const chartBars=monthData.map(m=>`
      <div class="chart-bar-col">
        <div class="chart-bar" style="height:${Math.round((m.net/maxNet)*100)}px">
          ${m.net>0?`<div class="chart-bar-val">${fmt(Math.round(m.net/10000))}만</div>`:''}
        </div>
        <div class="chart-bar-lbl">${m.m.slice(5)}월<br><span style="font-size:8px">${m.cnt}건</span></div>
      </div>`).join('');

    // 기사 순위
    const driverNets={};
    settles.filter(s=>s.month===thisM).forEach(s=>{
      const n=s.driverName||s.driver||'';
      driverNets[n]=(driverNets[n]||0)+(calcNet(s).net||0);
    });
    const topDrivers=Object.entries(driverNets).sort((a,b)=>b[1]-a[1]).slice(0,5);

    c.innerHTML=`
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val">${drSnap.size}</div><div class="stat-lbl">👤 소속 기사</div></div>
        <div class="stat-card"><div class="stat-val amber">${thisMS.length}</div><div class="stat-lbl">📋 이번달 정산</div></div>
        <div class="stat-card"><div class="stat-val green">${approved}</div><div class="stat-lbl">✅ 승인 완료</div></div>
        <div class="stat-card"><div class="stat-val">${pending}</div><div class="stat-lbl">⏳ 정산예정</div></div>
        <div class="stat-card"><div class="stat-val">₩${fmt(thisNet)}</div><div class="stat-lbl">📅 이번달 지급액</div></div>
        <div class="stat-card"><div class="stat-val">₩${fmt(totalNet)}</div><div class="stat-lbl">💰 누적 지급액</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px" class="chart-grid">
        <div class="card">
          <div class="card-header"><div class="card-title">📈 월별 지급액</div></div>
          <div class="card-body"><div class="chart-bar-wrap" style="position:relative;padding-top:20px">${chartBars}</div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">🏆 이번달 상위 기사</div></div>
          <div class="card-body">
            ${topDrivers.length?topDrivers.map((([n,v],i)=>`
              <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
                <span style="font-size:12px"><strong>${i+1}.</strong> ${esc(n)}</span>
                <span style="font-weight:700;color:var(--brand);font-size:13px">₩${fmt(v)}</span>
              </div>`)).join('')
            :'<div class="empty" style="padding:20px 0">이번달 정산 데이터가 없습니다</div>'}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">📋 최근 정산</div>
          <button class="btn btn-blue btn-sm" onclick="goPage('dealer-settlements')">전체 보기</button>
        </div>
        <div class="card-body">
          ${settles.length===0?'<div class="empty"><div class="empty-icon">📋</div><div>정산 데이터가 없습니다</div></div>':
            `<div class="tbl-wrap"><table><thead><tr><th>기사</th><th>월</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>상태</th></tr></thead><tbody>
            ${settles.slice(0,8).map(s=>{const r=calcNet(s);return`<tr>
              <td><strong>${esc(s.driverName||s.driver||'')}</strong></td>
              <td>${esc(s.month||'')}</td>
              <td>${fmt(s.dcnt||0)}건</td>
              <td>₩${fmt(r.income)}</td>
              <td style="font-weight:800;color:var(--brand)">₩${fmt(r.net)}</td>
              <td><span class="badge ${s.status==='approved'?'b-green':'b-amber'}">${s.status==='approved'?'승인완료':'정산예정'}</span></td>
            </tr>`;}).join('')}
            </tbody></table></div>`}
        </div>
      </div>`;
    // 반응형: 모바일에서 차트 그리드 1열로
    const cg=c.querySelector('.chart-grid');
    if(cg&&window.innerWidth<600)cg.style.gridTemplateColumns='1fr';
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

window.addDriver=async function(){
  const name=document.getElementById('dr-name').value.trim();
  const userId=document.getElementById('dr-uid').value.trim();
  if(!name||!userId){toast('❌ 성함과 아이디는 필수입니다');return;}
  try{
    const driverData={
      name,userId,dealerId:CU.dealerId,
      camp:document.getElementById('dr-camp').value,
      jobsub:document.getElementById('dr-job').value,
      phone:document.getElementById('dr-phone').value.trim(),
      car:document.getElementById('dr-car').value.trim(),
      account:document.getElementById('dr-acct').value.trim(),
      yongDel:+document.getElementById('dr-yong-del').value||900,
      is_active:true,status:'재직',createdAt:serverTimestamp()
    };
    const email=document.getElementById('dr-email').value.trim();
    const pw=document.getElementById('dr-pw').value.trim();
    if(email&&pw){
      try{
        const uc=await createUserWithEmailAndPassword(auth,email,pw);
        driverData.authUid=uc.user.uid;
        await setDoc(doc(db,'users',uc.user.uid),{
          email,name,role:'driver',dealerId:CU.dealerId,driverUserId:userId,createdAt:serverTimestamp()
        });
      }catch(ae){if(ae.code!=='auth/email-already-in-use')throw ae;}
    }
    await addDoc(collection(db,'drivers'),driverData);
    closeModal('mo-driver');toast(`✅ ${name} 기사 등록 완료`);PAGES['dealer-drivers']();
  }catch(e){toast('❌ '+e.message)}
};

PAGES['dealer-settlements']=async function(){

  document.getElementById('topbar-actions').innerHTML=`
    <select id="filter-month" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text)" onchange="filterSettles()">
      <option value="">전체 월</option>
    </select>

  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const snap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId)));
    if(snap.empty){
      c.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div style="font-size:15px;font-weight:700;margin-bottom:6px">정산 데이터가 없습니다</div><button class="btn btn-blue" onclick="openNewSettle()" style="margin-top:12px">+ 첫 정산 입력</button></div>`;
      buildSettleModal();return;
    }
    let settles=snap.docs.map(d=>({id:d.id,...d.data()}));
    settles.sort((a,b)=>(b.month||'').localeCompare(a.month||''));

    // 월 필터 채우기
    const months=[...new Set(settles.map(s=>s.month||''))].sort().reverse();
    const mSel=document.getElementById('filter-month');
    if(mSel)months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;mSel.appendChild(o);});

    window._allSettles=settles;
    window.filterSettles=function(){
      const m=(document.getElementById('filter-month')||{}).value||'';
      renderSettleTable(m?settles.filter(s=>s.month===m):settles);
    };
    renderSettleTable(settles);
    buildSettleModal();
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

function renderSettleTable(settles){
  const tbody=document.getElementById('settle-tbody');
  if(tbody){
    tbody.innerHTML=settles.map(s=>buildSettleRow(s)).join('');return;
  }
  const totIncome=settles.reduce((a,s)=>a+(calcNet(s).income||0),0);
  const totNet=settles.reduce((a,s)=>a+(calcNet(s).net||0),0);
  const c=document.getElementById('content');
  if(!c)return;
  const rows=settles.map(s=>buildSettleRow(s)).join('');
  c.innerHTML=`
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-val">${settles.length}</div><div class="stat-lbl">📋 정산 건수</div></div>
      <div class="stat-card"><div class="stat-val">₩${fmt(totIncome)}</div><div class="stat-lbl">📊 수익 합계</div></div>
      <div class="stat-card"><div class="stat-val">₩${fmt(totNet)}</div><div class="stat-lbl">💰 실지급 합계</div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">📋 정산 목록 (${settles.length}건)</div></div>
      <div class="card-body">
        <div class="tbl-wrap"><table>
          <thead><tr><th>기사</th><th>정산월</th><th>분류</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>상태</th><th></th></tr></thead>
          <tbody id="settle-tbody">${rows}</tbody>
        </table></div>
      </div>
    </div>`;
  buildSettleModal();
}
function buildSettleRow(s){
  const r=calcNet(s);
  return`<tr>
    <td><strong>${esc(s.driverName||s.driver||'')}</strong></td>
    <td>${esc(s.month||'')}</td>
    <td><span class="badge b-blue" style="font-size:10px">${esc(s.jobsub||'쿠팡')}</span></td>
    <td style="color:var(--teal)">${fmt(s.dcnt||0)}건</td>
    <td style="color:var(--green);font-weight:700">₩${fmt(r.income)}</td>
    <td style="font-weight:900;color:var(--brand)">₩${fmt(r.net)}</td>

              </tr>`).join('')}
            </tbody>
          </table>

window.calcSettlePreview=function(){
  const g=id=>+(document.getElementById(id)||{value:0}).value||0;
  const j=(document.getElementById('se-jobsub')||{}).value||'쿠팡';
  const isYong=j==='용차';
  const isCoupang=j==='쿠팡';
  const dcnt=g('se-dcnt');
  let finc=isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0;
  const fincEl=document.getElementById('se-finc');
  if(fincEl)fincEl.value=finc;
  if(isYong){
    const yDel=g('se-yong-del')||900,yRet=g('se-yong-ret')||900;
    const rcnt=g('se-rcnt');
    const da=document.getElementById('se-damt');if(da&&!da.dataset.manual)da.value=dcnt*yDel;
    const ra=document.getElementById('se-ramt');if(ra&&!ra.dataset.manual)ra.value=rcnt*yRet;
    finc=0;
  }
  const income=g('se-damt')+g('se-ramt')+g('se-fresh')+finc+g('se-nocont')+g('se-etc-plus');
  const supplyAmt=Math.round(income/1.1);
  const expAmt=Math.round(supplyAmt*0.346);
  const wage=supplyAmt-expAmt;
  const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;
  const work=Math.floor(wage*0.0088/10)*10;
  const deduct=emp+work+g('se-dmg')+g('se-adv')+g('se-etc-minus');
  const net=income-deduct;
  const s=function(id,v,pfx=''){const el=document.getElementById(id);if(el)el.textContent=(pfx||'')+'₩'+fmt(v);};
  s('cp-income',income);s('cp-total',income);s('cp-wage',wage);
  s('cp-emp',emp,'-');s('cp-work',work,'-');s('cp-deduct',deduct,'-');s('cp-net',net);
};

};
window.saveSettle=async function(){
  const driver=document.getElementById('se-driver').value.trim();
  if(!driver){toast('❌ 기사를 입력해주세요');return;}
  const month=document.getElementById('se-month').value;
  if(!month){toast('❌ 정산월을 선택해주세요');return;}
  const g=id=>+(document.getElementById(id)||{value:0}).value||0;
  const gv=id=>(document.getElementById(id)||{value:''}).value||'';
  const j=gv('se-jobsub')||'쿠팡';
  const isYong=j==='용차';const isCoupang=j==='쿠팡';
  const dcnt=g('se-dcnt');const rcnt=g('se-rcnt');
  const yDel=g('se-yong-del')||900;const yRet=g('se-yong-ret')||900;
  const damt=isYong?dcnt*yDel:g('se-damt');
  const ramt=isYong?rcnt*yRet:g('se-ramt');
  const finc=isCoupang?Math.round(dcnt*(G_PRICES.freshbag_inc||25)):0;
  const etcPlus=g('se-etc-plus'),etcMinus=g('se-etc-minus');
  const income=damt+ramt+g('se-fresh')+finc+g('se-nocont')+etcPlus;
  const supplyAmt=Math.round(income/1.1);
  const wage=Math.round(supplyAmt*(1-0.346));
  const emp=wage>=800000?Math.floor(wage*0.008/10)*10:0;
  const work=Math.floor(wage*0.0088/10)*10;
  const deduct=emp+work+g('se-dmg')+g('se-adv')+etcMinus;
  const net=income-deduct;
  const data={
    dealerId:CU.dealerId,driverName:driver,driver,month,jobsub:j,
    dcnt,damt,rcnt,ramt,
    fresh:g('se-fresh'),finc,inc:0,
    nocont:g('se-nocont'),nocontCnt:g('se-nocont-cnt'),
    etcPlus,etcPlusReason:gv('se-etc-plus-r'),
    etcMinus,etcMinusReason:gv('se-etc-minus-r'),
    dmg:g('se-dmg'),dmgReason:gv('se-dmg-r'),adv:g('se-adv'),
    yongDel:isYong?yDel:0,yongRet:isYong?yRet:0,
    income,supplyAmt,monthlyWage:wage,
    emp,work,deduct,net,
    routeDetails:_excelRoutes,
    status:'pending',createdAt:serverTimestamp()
  };
  try{
    await addDoc(collection(db,'settlements'),data);
    closeModal('mo-settle');
    resetSettleForm();_excelRoutes=[];
    toast(`✅ ${driver} ${month} 정산서 저장 완료`);
    PAGES['dealer-settlements']();
  }catch(e){toast('❌ '+e.message)}
};

  try{
    const snap=await getDocs(query(collection(db,'prices'),where('dealerId','==',CU.dealerId)));
    const customRoutes=snap.docs.map(d=>({id:d.id,...d.data()}));
    const globalRows=Object.entries(RPRICE).sort((a,b)=>a[0].localeCompare(b[0])).map(([r,p])=>`
      <tr>
        <td><strong>${esc(r)}</strong></td>
        <td style="font-size:11px;color:var(--text3)">${esc(CAMP_NAMES[r.replace(/[A-D]$/,'')]||'전역')}</td>
        <td>₩${fmt(p)}</td>
        <td><span class="badge b-blue" style="font-size:10px">전역 설정</span></td>
      </tr>`).join('');
    const customRowsHTML=customRoutes.map(r=>`
      <tr>
        <td><strong>${esc(r.route)}</strong></td>
        <td>—</td>
        <td><input type="number" value="${r.price||0}" style="width:90px;padding:4px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:13px" onchange="updateDealerPrice('${r.id}',this.value)"></td>
        <td>
          <span class="badge b-green" style="font-size:10px">대리점 설정</span>
          <button class="btn btn-red btn-xs" style="margin-left:4px" onclick="deleteDealerPrice('${r.id}')">삭제</button>
        </td>
      </tr>`).join('');
    c.innerHTML=`
      <div class="card">
        <div class="card-header"><div class="card-title">📌 대리점 전용 단가 (${customRoutes.length}개)</div></div>
        <div class="card-body">
          ${customRoutes.length===0?'<div class="empty" style="padding:16px 0">추가된 단가가 없습니다</div>':
            `<div class="tbl-wrap"><table><thead><tr><th>라우트</th><th>캠프</th><th>단가</th><th></th></tr></thead><tbody>${customRowsHTML}</tbody></table></div>`}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">📋 전역 RPRICE 단가표 (관리자 설정)</div></div>
        <div class="card-body">
          <div class="tbl-wrap"><table><thead><tr><th>라우트</th><th>캠프</th><th>단가</th><th></th></tr></thead><tbody>${globalRows}</tbody></table></div>
        </div>
      </div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};
window.addDealerRoute=async function(){
  const route=prompt('라우트 코드:','');if(!route)return;
  const price=+prompt('단가 (원/건):','0')||0;
  await addDoc(collection(db,'prices'),{dealerId:CU.dealerId,route:route.toUpperCase().trim(),price,createdAt:serverTimestamp()});
  toast('✅ 추가 완료');PAGES['dealer-prices']();
};
window.updateDealerPrice=async function(id,val){
  await updateDoc(doc(db,'prices',id),{price:+val||0});toast('✅ 단가 저장');
};
window.deleteDealerPrice=async function(id){
  if(!confirm('삭제하시겠습니까?'))return;
  await deleteDoc(doc(db,'prices',id));toast('🗑 삭제');PAGES['dealer-prices']();
};

// ──────────────────────────────────────
// 📈 DEALER STATS
// ──────────────────────────────────────
PAGES['dealer-stats']=async function(){
  document.getElementById('page-title').textContent='통계';
  document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const sSnap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId)));
    const settles=sSnap.docs.map(d=>({id:d.id,...d.data()}));
    if(settles.length===0){c.innerHTML='<div class="empty"><div class="empty-icon">📈</div><div>정산 데이터가 없습니다</div></div>';return;}

    // 월별 집계
    const byMonth={};
    settles.forEach(s=>{
      const m=s.month||'';
      if(!byMonth[m])byMonth[m]={cnt:0,income:0,net:0,dcnt:0};
      const r=calcNet(s);
      byMonth[m].cnt++;byMonth[m].income+=r.income;byMonth[m].net+=r.net;byMonth[m].dcnt+=(s.dcnt||0);
    });
    const months=Object.keys(byMonth).sort().reverse().slice(0,12);

    // 기사별 집계
    const byDriver={};
    settles.forEach(s=>{
      const n=s.driverName||s.driver||'';
      if(!byDriver[n])byDriver[n]={cnt:0,income:0,net:0,dcnt:0};
      const r=calcNet(s);
      byDriver[n].cnt++;byDriver[n].income+=r.income;byDriver[n].net+=r.net;byDriver[n].dcnt+=(s.dcnt||0);
    });
    const drivers=Object.entries(byDriver).sort((a,b)=>b[1].net-a[1].net);

    const monthRows=months.map(m=>{
      const d=byMonth[m];
      return`<tr>
        <td><strong>${esc(m)}</strong></td>
        <td>${fmt(d.dcnt)}건</td>
        <td style="color:var(--green)">₩${fmt(d.income)}</td>
        <td style="font-weight:800;color:var(--brand)">₩${fmt(d.net)}</td>
        <td>${d.cnt}건</td>
      </tr>`;
    }).join('');
    const driverRows=drivers.map(([n,d],i)=>`<tr>
      <td><strong>${i+1}. ${esc(n)}</strong></td>
      <td>${fmt(d.dcnt)}건</td>
      <td style="color:var(--green)">₩${fmt(d.income)}</td>
      <td style="font-weight:800;color:var(--brand)">₩${fmt(d.net)}</td>
      <td>${d.cnt}회</td>
    </tr>`).join('');

    // 월별 차트 (전체 기간)
    const allMonths=Object.keys(byMonth).sort();
    const maxNet=Math.max(...allMonths.map(m=>byMonth[m].net),1);
    const chartBars=allMonths.map(m=>`
      <div class="chart-bar-col">
        <div class="chart-bar" style="height:${Math.round((byMonth[m].net/maxNet)*100)}px">
          <div class="chart-bar-val">${fmt(Math.round(byMonth[m].net/10000))}만</div>
        </div>
        <div class="chart-bar-lbl">${m.slice(5)}월</div>
      </div>`).join('');

    c.innerHTML=`
      <div class="card">
        <div class="card-header"><div class="card-title">📈 월별 실지급액 추이</div></div>
        <div class="card-body"><div class="chart-bar-wrap" style="position:relative;padding-top:24px">${chartBars}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="card">
          <div class="card-header"><div class="card-title">📅 월별 정산 현황</div></div>
          <div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>월</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>건수</th></tr></thead><tbody>${monthRows}</tbody></table></div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">🏆 기사별 누적 순위</div></div>
          <div class="card-body"><div class="tbl-wrap"><table><thead><tr><th>기사</th><th>배송건</th><th>수익합계</th><th>실지급</th><th>정산회</th></tr></thead><tbody>${driverRows}</tbody></table></div></div>
        </div>
      </div>`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};

PAGES['driver-home']=async function(){
  document.getElementById('page-title').textContent='내 정산 명세서';
  document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">로딩 중...</div>';
  try{
    const driverSnap=await getDocs(query(collection(db,'drivers'),where('authUid','==',CU.uid)));
    let driver=driverSnap.empty?null:driverSnap.docs[0].data();
    const dname=driver?.name||CU.name||'';

    const sSnap=await getDocs(query(collection(db,'settlements'),where('dealerId','==',CU.dealerId||'')));
    const mySettles=sSnap.docs
      .filter(d=>(d.data().driverName===dname||d.data().driver===dname))
      .map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.month||'').localeCompare(a.month||''));

    if(mySettles.length===0){
      c.innerHTML=`
        <div class="driver-hero">
          <div class="driver-hero-name">👋 ${esc(dname)}</div>
          <div class="driver-hero-info">${esc(driver?.camp||'')} · ${esc(driver?.jobsub||'쿠팡')}</div>
        </div>
        <div class="empty"><div class="empty-icon">📋</div><div>명세서가 없습니다</div><div style="font-size:12px;color:var(--text3);margin-top:6px">관리자가 정산을 입력하면 여기에 표시됩니다</div></div>`;
      return;
    }
    const latest=calcNet(mySettles[0]);
    const totalNet=mySettles.reduce((a,s)=>a+(calcNet(s).net||0),0);
    const cards=mySettles.map(s=>{
      const r=calcNet(s);
      return`<div class="settle-card" onclick="viewDriverSettle('${esc(s.id)}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div class="settle-card-month">📅 ${esc(s.month||'')} 정산</div>
          <span class="badge ${s.status==='approved'?'b-green':'b-amber'}">${s.status==='approved'?'승인완료':'정산예정'}</span>
        </div>
        <div class="settle-card-net">₩${fmt(r.net)}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">배송 ${fmt(s.dcnt||0)}건 · 수익 ₩${fmt(r.income)} · ${esc(s.jobsub||'쿠팡')}</div>
      </div>`;
    }).join('');
    c.innerHTML=`
      <div class="driver-hero">
        <div class="driver-hero-name">👋 ${esc(dname)}</div>
        <div class="driver-hero-info">${esc(driver?.camp||'')} · ${esc(driver?.jobsub||'쿠팡')}</div>
        <div style="display:flex;gap:20px;margin-top:14px">
          <div><div style="font-size:22px;font-weight:900">₩${fmt(latest.net)}</div><div style="font-size:11px;opacity:.7">이번달 실지급</div></div>
          <div><div style="font-size:22px;font-weight:900">₩${fmt(totalNet)}</div><div style="font-size:11px;opacity:.7">누적 지급액</div></div>
        </div>
      </div>
      ${cards}`;
  }catch(e){c.innerHTML=`<div class="empty">⚠️ ${e.message}</div>`}
};
window.viewDriverSettle=async function(id){
  try{
    const snap=await getDoc(doc(db,'settlements',id));
    if(!snap.exists())return;
    const sd={id,...snap.data()};
    let dn='';
    if(sd.dealerId){const ds=await getDoc(doc(db,'dealers',sd.dealerId));if(ds.exists())dn=ds.data().name;}
    showStmtModal(sd,dn);
  }catch(e){toast('❌ '+e.message)}
};
