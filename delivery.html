            // 중앙 60%x70% → 중앙 80%x85% → 전체
            var cx=Math.floor(vw*0.20), cy=Math.floor(vh*0.15);
            var cw2=Math.floor(vw*0.60), ch2=Math.floor(vh*0.70);
            // ★ v9.47: 원본 시도 → 전처리(대비강화) 재시도 (파란송장 대응)
            var r = _jsqrScan(cx, cy, cw2, ch2, vw, vh, false)                 // ①중앙 원본
                 || _jsqrScan(Math.floor(vw*0.10), Math.floor(vh*0.08),
                              Math.floor(vw*0.80), Math.floor(vh*0.84), vw, vh, false) // ②중앙 원본
                 || _jsqrScan(0, 0, vw, vh, vw, vh, false)                     // ③전체 원본
                 || _jsqrScan(cx, cy, cw2, ch2, vw, vh, true)                  // ④중앙 대비강화
                 || _jsqrScan(Math.floor(vw*0.10), Math.floor(vh*0.08),
                              Math.floor(vw*0.80), Math.floor(vh*0.84), vw, vh, true)  // ⑤중앙 대비강화
                 || _jsqrScan(0, 0, vw, vh, vw, vh, true);                     // ⑥전체 대비강화
            if(r && r.data && _active){
              _stopScanline();
              if(r._pts) drawQrBox(r._pts, r._vw, r._vh);
              _trackCount2++;
              if(_trackCount2 >= 2){
                _active=false;
                statusEl.textContent='✅ QR 인식!';
                _emerHandleScan(r.data, statusEl);
              } else {
                requestAnimationFrame(jsqrTick);
              }
              return;
            }
            _trackCount2 = 0;
          }catch(e){}
          requestAnimationFrame(jsqrTick);
        }
        video.addEventListener('loadedmetadata', function(){ requestAnimationFrame(jsqrTick); }, {once:true});
        if(video.readyState >= 2) requestAnimationFrame(jsqrTick);
        window._emerBdStop = function(){ _active=false; _stopScanline(); };
      }

      _startScanLoop();
    })
    .catch(function(e){
      statusEl.textContent = '❌ 카메라 권한 필요 — 주소창 🔒 → 카메라 허용';
      console.warn('[cam]', e);
    });
}

// ★ v9.25: 스캔 결과 통합 처리
function _emerHandleScan(raw, statusEl){
  if(!raw) return;
  if(window._emerScanLock) return;
  window._emerScanLock = true;
  // ★ v9.46: 1.2초 자동 해제 제거 → emerSave 완료 시점에 해제
  // (자동 저장 1.5초 타이머 > 락 해제 1.2초 → 저장 전 스캔 가능했던 버그 수정)

  // ★ v9.61: 중복 운송장 체크
  var _qpCheck = _parseQrText(raw);
  var _tnCheck = _qpCheck.tracking_no || (raw.replace(/[.\-\s]/g,'').match(/^\d{10,}$/) ? raw.replace(/[.\-\s]/g,'') : null);
  if(_tnCheck){
    // 오늘 저장된 기록에서 중복 확인
    var _todayLocs = window._activeDriverMapEmerLocs || window._emerLocs || [];
    var _dup = _todayLocs.find(function(x){
      return (x.trackings||[]).indexOf(_tnCheck)>=0 || x.tracking===_tnCheck;
    });
    if(_dup){
      // 중복 경고
      try{
        var _ac=new(window.AudioContext||window.webkitAudioContext)();
        var _o=_ac.createOscillator(),_g=_ac.createGain();
        _o.connect(_g);_g.connect(_ac.destination);
        _o.type='sawtooth';_o.frequency.value=280;
        _g.gain.setValueAtTime(0.3,_ac.currentTime);
        _g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+0.4);
        _o.start();_o.stop(_ac.currentTime+0.4);
        setTimeout(function(){try{_ac.close();}catch(e){}},600);
        navigator.vibrate&&navigator.vibrate([200,100,200,100,200]);
      }catch(e){}
      _tts('중복');
      // 중복 토스트
      var _dt=document.createElement('div');
      _dt.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(220,38,38,.95);color:#fff;padding:16px 24px;border-radius:12px;font-size:16px;font-weight:900;z-index:9999;text-align:center';
      _dt.innerHTML='⚠️ 중복 운송장!<br><span style="font-size:12px;font-weight:500">'+_tnCheck+'<br>이미 저장된 건입니다</span>';
      document.body.appendChild(_dt);
      setTimeout(function(){_dt.style.opacity='0';_dt.style.transition='opacity .3s';setTimeout(function(){_dt.remove();},300);},2000);
      window._emerScanLock=false;
      return;
    }

    // ★ v9.61: 같은 집 묶음 체크 — GPS 15m + 수령인 + 동호수 모두 일치
    function _extractUnit(addr){
      if(!addr) return {};
      // ★ v9.34 보강: 알파벳 동(A동/B동) + 숫자 동 + 맨션/차(단지) 모두 인식
      var dongMatch = addr.match(/([A-Za-z\d]+)\s*동(?![아네은])/)        // A동, 102동, 5동
                   || addr.match(/(\d+)\s*맨션/)                          // 1맨션, 2맨션
                   || addr.match(/(\d+)\s*차(?![량선])/)                  // 1차, 2차 (차량/차선 제외)
                   || addr.match(/(\d+)동/);                              // 폴백
      var hoMatch = addr.match(/(\d+)\s*호/) || addr.match(/(\d+)\s*-\s*\d+\s*호/);
      var dong = dongMatch ? String(dongMatch[1]).toUpperCase() : null;
      var ho = hoMatch ? hoMatch[1] : null;
      return {dong:dong, ho:ho};
    }
    function _gpsDist(a,b){
      if(!a||!b) return 9999;
      var R=6371000, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
      var x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }
    if(_qpCheck.address){
      var _newGps = _qpCheck.lat ? {lat:_qpCheck.lat,lng:_qpCheck.lng} : (window._emerGps||null);
      var _newUnit = _extractUnit(_qpCheck.address);
      var _newName = (_qpCheck.recipient||'').replace(/\*/g,'');
      var _bundle = _todayLocs.find(function(x){
        if(!x.addr || x.fbId && x.fbId.indexOf('_preview')>=0) return false;
        // ① GPS 15m 이내
        var dist = _gpsDist(_newGps, x.gps);
        if(dist > 15) return false;
        // ② 수령인 일치 (★ v9.59: 수령인 미상이면 동호수만으로 판단)
        var xName = (x.recipient||'').replace(/\*/g,'');
        var _nameUnknown = !_newName || _newName==='수령인미상' || _newName==='수령인 미상';
        var _xUnknown = !xName || xName==='수령인미상' || xName==='수령인 미상';
        if(!_nameUnknown && !_xUnknown && _newName !== xName) return false;
        // ③ 동호수 일치 (아파트/오피스텔), 없으면 GPS 8m 이내
        var xUnit = _extractUnit(x.addr);
        var hasUnit = _newUnit.ho || xUnit.ho;
        if(hasUnit){
          if(_newUnit.dong && xUnit.dong && _newUnit.dong !== xUnit.dong) return false;
          if(_newUnit.ho && xUnit.ho && _newUnit.ho !== xUnit.ho) return false;
        } else {
          if(dist > 8) return false; // 주택: 8m 이내만
        }
        return true;
      });
      if(_bundle && _bundle.fbId && _bundle.fbId.indexOf('_preview')<0){
        // 같은 집 발견 → 기존 핀에 운송장 추가
        _tts('묶음');
        var _bt=document.createElement('div');
        _bt.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(245,158,11,.95);color:#fff;padding:16px 24px;border-radius:12px;font-size:15px;font-weight:900;z-index:9999;text-align:center';
        _bt.innerHTML='📦 같은 집 묶음!<br><span style="font-size:12px;font-weight:500">'+(_bundle.recipient||'')+'<br>'+(_bundle.addr||'').slice(0,25)+'</span>';
        document.body.appendChild(_bt);
        setTimeout(function(){_bt.style.opacity='0';_bt.style.transition='opacity .3s';setTimeout(function(){_bt.remove();},300);},2000);
        // Firebase에 기존 레코드에 운송장 추가
        if(FB && _db){
          var _newTrackings = (_bundle.trackings||[_bundle.tracking]).slice();
          if(_newTrackings.indexOf(_tnCheck)<0) _newTrackings.push(_tnCheck);
          _db.collection('emergency_deliveries').doc(_bundle.fbId).update({trackings:_newTrackings}).catch(function(){});
        }
        window._emerIncScan && window._emerIncScan();

      // 숫자 형태는 아니지만 텍스트 QR → 주소/수령인 파싱 시도
      var qrText = foundOther.join('\n');
      var parsed = _parseQrText(qrText);
      var filled2 = [];
      if(parsed.address){ var ae=document.getElementById('emer-addr'); if(ae&&!ae.value){ae.value=parsed.address; filled2.push('주소');} }
      if(parsed.recipient){ var re=document.getElementById('emer-recipient'); if(re&&!re.value){re.value=parsed.recipient; filled2.push('수령인');} }
      if(parsed.order_id){ var oe=document.getElementById('emer-orderid'); if(oe&&!oe.value){oe.value=parsed.order_id; filled2.push('주문번호');} }

      if(filled2.length){
        if(status) status.innerHTML = '<span style="color:var(--teal)">✅ QR에서 '+filled2.join('/')+'자동 입력됨 (운송장은 직접 입력)</span>';
        var sumEl2=document.getElementById('emer-ocr-summary');
        if(sumEl2){
          sumEl2.style.display='block';
          sumEl2.innerHTML='<b>📊 QR 인식 결과</b><br>'
            +(parsed.address?'📍 주소: '+parsed.address+'<br>':'')
            +(parsed.recipient?'👤 수령인: '+parsed.recipient+'<br>':'')
            +(parsed.order_id?'📋 주문번호: '+parsed.order_id+'<br>':'');
        }
      } else {
        if(status) status.innerHTML = '<span style="color:var(--amber)">⚠️ 인식됨: '+foundOther[0].slice(0,30)+' — 운송장 형식 아님, 직접 입력 필요</span>';
        var memoEl = document.getElementById('emer-memo');
        if(memoEl && !memoEl.value) memoEl.value = '[바코드 인식] '+foundOther.join(' / ');
      }
    } else {
      if(status) status.innerHTML = '<span style="color:var(--red)">❌ 인식된 바코드가 비어있음 — 직접 입력해주세요</span>';
    }

    // 사진도 자동 첨부 (분쟁 대응)
    var fr2 = new FileReader();
    fr2.onload = function(e){ window._emerPhotos.push(e.target.result); emerRefreshPhotoWrap(); };
    fr2.readAsDataURL(file);

  }catch(e){
    console.warn('바코드 스캔 오류:', e);
    if(status) status.innerHTML = '<span style="color:var(--red)">❌ 바코드 인식 실패: '+(e.message||'알 수 없음')+' — 직접 입력해주세요</span>';
  }
}

function emerRefreshTrackingList(){
  var list = document.getElementById('emer-tracking-list');
  if(!list) return;

  var cnt = window._emerTrackings.length;

  // ★ v9.25: 스캔 카운터 업데이트
  var counter = document.getElementById('emer-scan-counter');
  if(counter){
    if(cnt > 0){
      counter.style.display = 'block';
      counter.textContent = cnt+'건 스캔됨';
      counter.style.animation = 'none';
      counter.offsetHeight; // reflow
      counter.style.animation = 'notiPop .3s ease';
    } else {
      counter.style.display = 'none';
    }
  }

  // ★ v9.25: 오프라인 감지 표시
  var offWarn = document.getElementById('emer-offline-warn');
  if(offWarn) offWarn.style.display = !navigator.onLine ? 'block' : 'none';

  // 스캔 목록 렌더 (최신 추가분 팝인 애니메이션)
  list.innerHTML = window._emerTrackings.map(function(t, i){
    var isNew = (i === cnt-1 && cnt > 0);
    var timeStr = window._emerTrackingTimes && window._emerTrackingTimes[t]
      ? window._emerTrackingTimes[t] : '';
    return '<div style="display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);'+(isNew?'animation:notiPop .3s ease;border-color:var(--teal)':'')+'">'
      +'<span style="font-size:14px;flex-shrink:0">'+(i===0&&cnt===1?'📦':'📦')+'</span>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-family:monospace;font-weight:700;color:'+(isNew?'var(--teal)':'var(--text)')+'">'+t+'</div>'
      +(timeStr?'<div style="font-size:10px;color:var(--text3)">'+timeStr+' 스캔</div>':'')
      +'</div>'
      +'<span style="font-size:10px;color:var(--teal);font-weight:700;margin-right:4px">✓</span>'
      +'<button onclick="window._emerTrackings.splice('+i+',1);emerRefreshTrackingList()" '
      +'style="padding:2px 8px;background:var(--red-l,#fee2e2);color:var(--red);border:none;border-radius:4px;font-size:11px;cursor:pointer">✕</button>'
      +'</div>';
  }).join('');
}

async function emerSave(){
  if(window._emerSaving){ toast('⏳ 저장 중입니다...'); return; }
  window._emerSaving = true;

  if(!window._emerTrackings||!window._emerTrackings.length){
    var inp = document.getElementById('emer-tracking-inp')?.value.replace(/[\.\-\s]/g,'').trim();
    if(inp){ window._emerTrackings=[inp]; emerRefreshTrackingList(); }
    // ★ v9.59: 운송장 없어도 주소 있으면 저장 허용 (파란송장 등 OCR 부분 인식)
    else {
      var _addrCheck = (document.getElementById('emer-addr')?.value||'').trim();
      if(!_addrCheck){
        window._emerSaving=false;
        window._emerScanLock=false;
        toast('❌ 운송장 또는 주소를 입력해주세요');
        return;
      }
      // 주소만 있을 경우 임시 운송장 생성 (나중에 수정 가능)
      window._emerTrackings=['미확인-'+Date.now().toString().slice(-6)];
      emerRefreshTrackingList();
    }
  }
  // ★ v9.25: 사진 필수 조건 제거 (배송완료 사진은 지도 핀에서 처리)

  var orderId   = (document.getElementById('emer-orderid')?.value||'').trim();
  if(!orderId && window._pendingOrderId) orderId = window._pendingOrderId; // ★ OCR 경로 보완
  var recipient = (document.getElementById('emer-recipient')?.value||'').trim(); if(!recipient) recipient='수령인 미상'; // ★ v9.59
  var addr      = (document.getElementById('emer-addr')?.value||'').trim();
  // ★ v9.65: 카카오 매칭 도로명이 있으면 addr 강제 보정 (OCR 텍스트 오류 무력화)
  if(window._emerGps && window._emerGps.matchedAddr && window._emerGps.src && window._emerGps.src.indexOf('kakao')>=0){
    var mAddr = window._emerGps.matchedAddr;
    var mName = window._emerGps.matchedName || '';
    // addr이 카카오 도로명을 포함하지 않으면 → OCR 오인식이므로 강제 재구성
    if(addr && mAddr && addr.replace(/\s/g,'').indexOf(mAddr.replace(/\s/g,'').slice(0,8)) < 0){
      var hoM = addr.match(/(\d+호)/);
      var dongM2 = addr.match(/(\d+동)(?![아네은])/);
      var rebuilt2 = mAddr;
      if(mName && mName.indexOf(mAddr) < 0) rebuilt2 += ' ' + mName;
      if(dongM2 && rebuilt2.indexOf(dongM2[1])<0) rebuilt2 += ' ' + dongM2[1];
      if(hoM && rebuilt2.indexOf(hoM[1])<0) rebuilt2 += ' ' + hoM[1];
      rebuilt2 = rebuilt2.replace(/\s+/g,' ').trim();
      console.log('[emerSave ADDR_OVERRIDE v9.65]', addr, '→', rebuilt2);
      addr = rebuilt2;
      var emerAddrEl2 = document.getElementById('emer-addr');
      if(emerAddrEl2) emerAddrEl2.value = addr;
    }
  }
  var delivMemo = (document.getElementById('emer-delivmemo')?.value||'').trim();
  var memo      = (document.getElementById('emer-memo')?.value||'').trim();
  var now = new Date();

  // ★ v9.25: GPS 정제 (undefined 값 차단 — Firestore invalid-argument 방지)
  var gpsClean = null;
  if(window._emerGps && typeof window._emerGps.lat==='number' && typeof window._emerGps.lng==='number'){
    gpsClean = { lat: window._emerGps.lat, lng: window._emerGps.lng, acc: window._emerGps.acc||0, src: window._emerGps.src||'device' };
  }

  // ★ v9.25: 저장 직전 GPS 처리 — QR/OCR 때 이미 Geocoding 완료된 경우 재실행 안 함 (속도 개선)
  if(window._emerGps && window._emerGps.lat && 
     (window._emerGps.src==='geocode'||window._emerGps.src==='QR'||
      window._emerGps.src==='kakao'||window._emerGps.src==='kakao_addr'||
      window._emerGps.src==='kakao_kw'||window._emerGps.src==='kakao_kw2'||
      window._emerGps.src==='kakao_kw_dong'||window._emerGps.src==='kakao_kw_apt'||
      window._emerGps.src==='cache')){
    // ★ v9.59: 카카오/QR/Geocode 좌표 모두 재사용 (중복 geocoding 방지)
    gpsClean = {lat:window._emerGps.lat, lng:window._emerGps.lng, acc:0, src:window._emerGps.src};
    console.debug('[emerSave] 기존 GPS 사용:', window._emerGps.src);
  } else if(addr){
    // GPS 없거나 device GPS인 경우에만 geocoding 시도 (1.5초 타임아웃)
    var apiKey2 = window._cachedGoogleApiKey || localStorage.getItem('mbti_google_api_key') || '';
    if(apiKey2){
      try{
        var gcCtrl = new AbortController();
        var gcTimer = setTimeout(function(){ gcCtrl.abort(); }, 1500);
        var gcRes2 = await fetch(
          'https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(addr)+'&language=ko&region=kr&key='+apiKey2,
          { signal: gcCtrl.signal }
        );
        clearTimeout(gcTimer);
        var gcData2 = await gcRes2.json();
        if(gcData2.status==='OK' && gcData2.results && gcData2.results[0]){
          var loc2 = gcData2.results[0].geometry.location;
          if(typeof loc2.lat==='number' && typeof loc2.lng==='number'){
            gpsClean = { lat: loc2.lat, lng: loc2.lng, acc: 0, src: 'geocode' };
          }
        }
      }catch(e){ console.warn('[emerSave] Geocoding 폴백 실패:', e.message||e); }
    }
  }

  // GPS 없으면 현위치로 폴백
  if(!gpsClean && navigator.geolocation){
    try{
      var _pos = await new Promise(function(res,rej){
        navigator.geolocation.getCurrentPosition(res,rej,{timeout:3000,enableHighAccuracy:true,maximumAge:10000});
      });
      gpsClean = {lat:_pos.coords.latitude, lng:_pos.coords.longitude, acc:_pos.coords.accuracy, src:'device_fallback'};
    }catch(e){}
  }

  // ★ v9.43: emerSave 시점 거리 검증 비활성화
  // 이유: 캠프(물류센터)에서 송장 일괄 스캔 → 모든 송장에서 false positive 발생
  //       검증은 saveDelivComplete (배송완료 처리 시점)으로 이동
  var addressGpsMismatch = null; // 배송완료 시점에 채워짐

  // ★ v9.25: 등록방식 판정 (자동인식 / 바코드 / 수기)
  var entryMode = 'manual'; // 기본: 수기
  if(window._emerEntryMode === 'ocr') entryMode = 'ocr';
  else if(window._emerEntryMode === 'barcode') entryMode = 'barcode';

  var record = {
    type: 'emergency_delivery',
    driver: window._APP.driver||'',
    order_id: orderId||'',
    trackings: window._emerTrackings.slice(),
    tracking: window._emerTrackings[0]||'',
    recipient: recipient||'',
    addr: addr||'',
    delivery_memo: delivMemo||'',
    memo: memo||'',
    gps: gpsClean,
    photos: [],
    entryMode: entryMode, // ★ 등록방식: ocr / barcode / manual
    savedAt: now.toISOString(),
    date: today(),
    time: now.toTimeString().slice(0,5),
    // ★ v9.34: OCR 자동 추출 - 라우트 코드 + 배송일
    route_code: (window._emerRouteCode||'').trim(),
    delivery_date: (window._emerDeliveryDate||'').trim(),
    // ★ v9.37: 박스 규격 (RPB2.4 등)
    box_code: (window._emerBoxCode||'').trim(),
    // ★ v9.36: 주소-GPS 불일치 감지 (100m 이상 차이 시 미터 값, 정상이면 null)
    addressGpsMismatch: addressGpsMismatch
  };

  var saveBtn = document.querySelector('#emer-del-mo button[onclick="emerSave()"]');
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='⏳ 저장 중... 잠시만요'; }
  toast('💾 저장 중...');

  // ★ v9.25: 로컬 선저장 (즉시) — Firebase 저장 전에 먼저 로컬에 기록
  var localId = 'emer_'+now.getTime();
  var recordLocal = Object.assign({}, record, {
    photosLocal: window._emerPhotos.slice(),
    _localId: localId,
    _syncStatus: 'pending'
  });
  try{
    var emerList = JSON.parse(localStorage.getItem('mbti_emergency_del')||'[]');
    emerList.push(recordLocal);
    localStorage.setItem('mbti_emergency_del', JSON.stringify(emerList));
  }catch(e){ console.warn('로컬 저장 실패:', e); }

  // ★ v9.25: 사진 병렬 업로드 (순차→동시 → 3장이면 3~5초에 완료)
  var uploaded = [];
  var isOnline = navigator.onLine;

  // ★ v9.59: 사진은 백그라운드 업로드 — 저장 먼저, 사진은 나중에 붙임
  record.photos = []; // 일단 빈 배열로 저장
  if(!isOnline){
    record._syncStatus = 'offline';
  } else if(FB && _st && window._emerPhotos.length > 0){
    // 백그라운드 업로드 예약 (저장 블로킹 없음)
    var _bgPhotos = window._emerPhotos.slice(0,1); // 1장만
    var _bgTime = now.getTime();
    var _bgDriver = window._APP.driver||'';
    window._pendingPhotoUpload = {photos:_bgPhotos, time:_bgTime, driver:_bgDriver};
  }
  record.photos = uploaded;

  // Firebase 저장 + 관리자 알림 — .add() 사용 (docId 문제 완전 회피)
  var docId = null;
  var mergedTo = null;
  if(FB&&_db){
    try{
      // ★ v9.25: 자동 묶음 — 같은 기사 + 같은 주문번호 + 미완료 핀이 있으면 운송장만 추가
      if(orderId && orderId.length >= 4){
        try{
          var existSnap = await _db.collection('emergency_deliveries')
            .where('driver','==',window._APP.driver||'')
            .where('order_id','==',orderId)
            .limit(5).get();

          var existDoc = null;
          existSnap.forEach(function(d){
            if(existDoc) return;
            var data = d.data();
            // 미완료 + 같은 주소(있으면) 만 매칭
            if(data.status !== '완료'){
              if(addr && data.addr && addr !== data.addr) return; // 주소 다르면 다른 핀
              existDoc = { id: d.id, data: data };
            }
          });

          if(existDoc){
            // ★ 기존 핀에 운송장만 추가 (중복 제거)
            var prevTrackings = existDoc.data.trackings || [];
            var newTrackings = window._emerTrackings.filter(function(t){
              return prevTrackings.indexOf(t) < 0;
            });
            if(newTrackings.length){
              var merged = prevTrackings.concat(newTrackings);
              var mergedPhotos = (existDoc.data.photos||[]).concat(uploaded);
              await _db.collection('emergency_deliveries').doc(existDoc.id).update({
                trackings: merged,
                photos: mergedPhotos,
                mergedAt: now.toISOString(),
                memo: ((existDoc.data.memo||'')+(memo?(' | '+memo):'')).trim()
              });
              mergedTo = existDoc.id;
              docId = existDoc.id;
              record._fbId = docId;
              record._merged = true;
              toast('✅ 같은 주문에 합쳐짐 (총 '+merged.length+'건)');
            } else {
              // 새 운송장 없음 (이미 모두 등록됨)
              mergedTo = existDoc.id;
              docId = existDoc.id;
              record._fbId = docId;
              toast('ℹ️ 이미 등록된 운송장입니다 (기존 핀 '+prevTrackings.length+'건)');
            }
          }
        }catch(e){
          console.warn('자동 묶음 검색 실패:', e.code||e.message);
          // 실패 시 그냥 새 핀 생성
        }
      }

      // 자동 묶음이 안 되었으면 → 새 핀 생성
      if(!mergedTo){
        // ★ v9.25: undefined 완전 제거 후 저장

// ★ v9.25: 사진 공통 처리 유틸 — 1600px 자동 압축 (Storage 안정성 ↑↑)
//   분쟁 증빙 가독성 충분 + 폰 데이터 절약 + Storage 실패율 ↓
async function _emerCompressPhoto(file, maxSize, quality){
  maxSize = maxSize || 1600; // 기본 1600px
  quality = quality || 0.85; // 기본 85%
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        if(w > maxSize || h > maxSize){
          var ratio = Math.min(maxSize/w, maxSize/h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        var cvs = document.createElement('canvas');
        cvs.width = w; cvs.height = h;
        cvs.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(cvs.toDataURL('image/jpeg', quality));
      };
      img.onerror = function(){ reject(new Error('이미지 로드 실패')); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ reject(new Error('파일 읽기 실패')); };
    reader.readAsDataURL(file);
  });
}

// ★ v9.25: Storage 업로드 + 자동 재시도 (최대 3회) — 폴백 발생률 ↓↓
async function _emerStorageUpload(dataUrl, path, maxRetry){
  maxRetry = maxRetry || 3;
  var byteStr = atob(dataUrl.split(',')[1]);
  var ab = new ArrayBuffer(byteStr.length);
  var ia = new Uint8Array(ab);
  for(var j=0; j<byteStr.length; j++) ia[j] = byteStr.charCodeAt(j);
  var blob = new Blob([ab], {type:'image/jpeg'});

  var lastErr = null;
  for(var attempt=1; attempt<=maxRetry; attempt++){
    try{
      var ref = _st.ref(path);
      await ref.put(blob);
      var url = await ref.getDownloadURL();
      if(attempt > 1) console.log('✅ Storage 업로드 성공 (재시도 '+attempt+'회차)');
      return url;
    }catch(e){
      lastErr = e;
      console.warn('Storage 업로드 실패 ('+attempt+'/'+maxRetry+') —', e.code||e.message);
      if(attempt < maxRetry){
        // 재시도 대기 (점진 백오프: 500ms → 1000ms → 2000ms)
        await new Promise(function(r){ setTimeout(r, 500 * Math.pow(2, attempt-1)); });
      }
    }
  }
  throw lastErr || new Error('Storage 업로드 최종 실패');
}

// 배송완료 저장
// ★ v9.48: 배송완료 사진으로 호수 자동 감지 (Claude Vision)
// 사진에서 문 호수 번호판 읽기 → 운송장 주소 호수와 비교
async function _checkDelivPhotoHo(photoBase64, expectedHo){
  // API 키 로드
  var apiKey = '';
  if(FB && _db){
    try{
      var doc = await _fsGetCached('settings/claude_config', 20);
      if(doc && doc.anthropicApiKey) apiKey = doc.anthropicApiKey.trim();
    }catch(e){}
  }
  if(!apiKey) apiKey = (localStorage.getItem('mbti_anthropic_api_key')||'').trim();
  if(!apiKey || apiKey.indexOf('sk-ant-')!==0) return null; // API 키 없으면 skip (정상 처리)

  try{
    var b64 = photoBase64.split(',')[1]; // data:image/jpeg;base64, 제거
    if(!b64) return null;

    var resp = await fetch('/claude-ocr', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        // 'x-api-key': 프록시에서 처리
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 100,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text', text: '이 사진에서 문 호수 번호(예: 1209호, 301호)를 찾아주세요.\n숫자+호 형태만 찾으세요.\n있으면 "1209호" 형식으로만 답하세요.\n없으면 "없음"이라고만 답하세요.\n다른 설명은 하지 마세요.' }
          ]
        }]
      })
    });
    var data = await resp.json();
    if(data.error) return null;
    var text = (data.content||[]).map(function(c){return c.text||'';}).join('').trim();
    if(!text || text==='없음' || text.indexOf('없음')>=0) return null;
    var m = text.match(/(\d+)\s*호/);
    return m ? m[1]+'호' : null;
  }catch(e){
    console.warn('[배송사진 OCR 실패]', e&&e.message);
    return null;
  }
}
