<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title id="page-title">배송앱</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<!-- jsQR -->
<script src="/jsQR.min.js"></script>

<style>
:root{
  --bg:#0f172a; --bg2:#1e293b; --bg3:#334155;
  --blue:#3b82f6; --blue2:#2563eb; --green:#10b981;
  --red:#ef4444; --red2:#dc2626; --yellow:#f59e0b;
  --text:#f8fafc; --text2:#cbd5e1; --text3:#64748b;
  --border:#334155; --r:14px; --r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,'Malgun Gothic',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── 로그인 화면 ── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:radial-gradient(ellipse at top,#1e3a5f,#0f172a 60%)}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:900;letter-spacing:.04em;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:32px}
.login-card{background:var(--bg2);border-radius:var(--r);padding:24px;width:100%;max-width:360px;border:1px solid var(--border)}
.login-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.driver-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:240px;overflow-y:auto}
.driver-btn{padding:14px 16px;background:var(--bg3);border:2px solid transparent;border-radius:var(--r2);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.driver-btn:hover,.driver-btn.sel{background:#1e3a5f;border-color:var(--blue);color:var(--blue)}
.driver-btn .camp-tag{font-size:10px;font-weight:600;background:var(--bg);padding:2px 8px;border-radius:99px;color:var(--text3)}
.login-enter{width:100%;padding:15px;background:var(--blue);border:none;border-radius:var(--r2);color:#fff;font-size:16px;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:.04em}
.login-enter:disabled{background:var(--bg3);color:var(--text3)}

/* ── 메인 앱 ── */
#app-screen{display:none;min-height:100vh;padding-bottom:90px}
.topbar{background:var(--bg2);padding:14px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.driver-name{font-size:15px;font-weight:800}
.driver-route{font-size:11px;color:var(--blue);font-weight:700;margin-top:1px;letter-spacing:.05em}
.topbar-logout{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text3);font-size:11px;font-weight:700;cursor:pointer}

/* ── 카운터 히어로 ── */
.hero{padding:20px 16px;background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);border-bottom:1px solid var(--border)}
.hero-counts{display:grid;grid-template-columns:1fr 1px 1fr;gap:0;background:var(--bg2);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.count-sep{background:var(--border)}
.count-box{padding:16px;text-align:center}
.count-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:4px}
.count-num{font-size:44px;font-weight:900;line-height:1;letter-spacing:-1px}
.count-num.scan{color:var(--blue)}
.count-num.expect{color:var(--text2)}
.count-sub{font-size:10px;color:var(--text3);margin-top:2px}
.prog-wrap{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .4s ease}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:6px}

/* ── 카드 ── */
.card{background:var(--bg2);border-radius:var(--r);padding:16px;margin:10px 12px;border:1px solid var(--border)}
.card-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* ── 스캔 버튼 ── */
.scan-big{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;padding:28px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:var(--r);color:#fff;font-size:20px;font-weight:900;cursor:pointer;letter-spacing:.04em;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(124,58,237,.4)}
.scan-big:active{transform:scale(.97)}
.scan-big::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .2s}
.scan-big:active::after{opacity:1}
.scan-big-sub{font-size:12px;font-weight:600;opacity:.8;letter-spacing:.04em}

/* ── 상태 배지 ── */
.status-badge{border-radius:10px;padding:12px 14px;font-size:13px;font-weight:700;text-align:center;min-height:44px;display:flex;align-items:center;justify-content:center;gap:8px;margin:0 12px 10px}
.s-idle{background:var(--bg3);color:var(--text3)}
.s-scan{background:#1e3a5f;color:var(--blue)}
.s-ok{background:#064e3b;color:var(--green)}
.s-err{background:#450a0a;color:#fca5a5}
.s-dup{background:#451a03;color:var(--yellow)}

/* ── 노선별 현황 ── */
.route-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.route-row:last-child{border-bottom:none}
.route-name{font-size:13px;font-weight:700}
.route-cnt{font-size:20px;font-weight:900;color:var(--blue)}

/* ── 하단 고정 ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;max-width:520px;margin:0 auto}
.btn-sm{flex:1;padding:11px;border-radius:var(--r2);font-size:12px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.btn-red{background:var(--red2);color:#fff}

/* ── 토스트 ── */
#toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);color:var(--text);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;border:1px solid var(--border);opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 스피너 ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:16px;height:16px;border:2.5px solid rgba(59,130,246,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}

/* ── 팝업 애니 ── */
@keyframes notiPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* ── 공유 카드 ── */
.share-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:12px;font-size:12px;color:var(--text2);white-space:pre-wrap;word-break:break-all;margin-top:8px}

/* ── 모달 (긴급배송 기존 코드용) ── */
:root{
  --red:#ef4444; --teal:#10b981;
  --bg:var(--bg); --bg3:var(--bg3); --border:var(--border); --text2:var(--text2); --text3:var(--text3);
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ══════════════ 로그인 ══════════════ -->
<div id="login-screen">
  <div class="login-logo">🚛</div>
  <div class="login-title" id="co-name">배송앱</div>
  <div class="login-sub" id="co-sub">기사 전용</div>
  <div class="login-card">
    <div class="login-label">기사 선택</div>
    <div class="driver-list" id="driver-list">
      <div style="color:var(--text3);font-size:13px;padding:8px;text-align:center">
        <span class="spin"></span> 불러오는 중...
      </div>
    </div>
    <button class="login-enter" id="login-btn" disabled onclick="doLogin()">
      ▶ 배송 시작
    </button>
  </div>
</div>

<!-- ══════════════ 메인 앱 ══════════════ -->
<div id="app-screen">

  <!-- 상단바 -->
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="driver-name" id="tb-name">—</div>
        <div class="driver-route" id="tb-route">노선 미배정</div>
      </div>
      <button class="topbar-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 카운터 히어로 -->
  <div class="hero">
    <div class="hero-counts">
      <div class="count-box">
        <div class="count-label">✅ 완료</div>
        <div class="count-num scan" id="cnt-done">0</div>
        <div class="count-sub">건</div>
      </div>
      <div class="count-sep"></div>
      <div class="count-box">
        <div class="count-label">📦 예상</div>
        <div class="count-num expect" id="cnt-expect">—</div>
        <div class="count-sub">건</div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="prog-label">
      <span id="prog-pct">0%</span>
      <span id="prog-remain">— 건 남음</span>
    </div>
  </div>

  <!-- 스캔 상태 -->
  <div class="status-badge s-idle" id="scan-status">📷 송장을 촬영하세요</div>

  <!-- 메인 스캔 버튼 -->
  <div style="padding:0 12px 10px">
    <label style="display:block">
      <div class="scan-big" onclick="document.getElementById('scan-input').click()">
        <span style="font-size:36px">📸</span>
        <span>촬영 → 자동 스캔</span>
        <span class="scan-big-sub">QR + OCR 자동 인식 · 주소 · GPS 자동저장</span>
      </div>
      <input type="file" id="scan-input" accept="image/*" capture="environment" style="display:none" onchange="emerUnifiedScan(this)">
    </label>

<!-- 카메라 + 갤러리 버튼 -->
<input type="file" id="gallery-input-main" accept="image/*" style="display:none" onchange="emerUnifiedScan(this)">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
  <button style="padding:11px;background:rgba(59,130,246,.15);color:var(--blue);border:1.5px solid var(--blue);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer" onclick="document.getElementById('scan-input').click()">📷 카메라</button>
  <button style="padding:11px;background:rgba(123,47,255,.12);color:#7b2fff;border:1.5px solid #7b2fff;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer" onclick="document.getElementById('gallery-input-main').click()">🖼️ 갤러리</button>
</div>
<div style="display:flex;gap:8px;margin-top:6px">
  <button class="btn-sm btn-outline" onclick="emerStartScan()">🎥 라이브 스캔</button>
  <button class="btn-sm btn-outline" onclick="showManualEntry()">✏️ 직접입력</button>
</div>
  </div>

  <!-- 예상 건수 카드 (캠프 수령 데이터) -->
  <div class="card" id="route-info-card" style="display:none">
    <div class="card-title">📊 내 노선 현황</div>
    <div id="route-info-body">—</div>
    <button onclick="loadRouteInfo()" style="width:100%;margin-top:12px;padding:9px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer">🔄 새로고침</button>
  </div>

  <!-- 오늘 배송 기록 -->
  <div class="card">
    <div class="card-title">📋 오늘 배송기록 <span id="today-cnt-badge" style="background:var(--blue);color:#fff;padding:1px 8px;border-radius:99px;font-size:10px;margin-left:auto">0건</span></div>
    <div id="today-list">
      <div style="color:var(--text3);font-size:12px;padding:8px 0;text-align:center">아직 저장된 배송이 없습니다</div>
    </div>
  </div>

  <!-- 공유 버튼 카드 -->
  <div class="card">
    <div class="card-title">📤 공유</div>
    <button class="btn-sm" style="width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px" onclick="shareReport()">
      💬 배송 현황 공유
    </button>
  </div>

</div><!-- /app-screen -->

<!-- 하단 바 -->
<div class="bottom-bar" id="bottom-bar" style="display:none">
  <button class="btn-sm btn-outline" onclick="loadRouteInfo()">🔄 건수 갱신</button>
  <button class="btn-sm btn-red" onclick="if(confirm('오늘 기록을 초기화하시겠습니까?'))resetDay()">🗑 초기화</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  MBTI 배송앱 — 앱 코어
//  Firebase: mbti-logistics (v9 앱과 동일 프로젝트)
// ═══════════════════════════════════════════════

// ── Firebase 초기화 (DOMContentLoaded 이후 실행) ──
var _fk=['AIzaSyDQmEFf','LczgCuPQidu','nbBXqaHWgs3','9VMg0'].join('');
var _fp='mbti-logistics';
var _fa='1:40761160761:web:20545b610f03f534e949e8';
var FB, _db, _st;
var _fbReady=false, _fbRetry=0;

function _initFirebase(){
  if(typeof firebase==='undefined'){
    _fbRetry++;
    if(_fbRetry<20){ setTimeout(_initFirebase,300); return; }
    console.warn('[FB] SDK 로드 실패 — CDN 차단 또는 네트워크 오류');
    _showFbFallback();
    return;
  }
  try{
    // 이미 초기화된 앱 재사용 (중복 오류 방지)
    try{ FB=firebase.app('mbti-delivery'); }
    catch(e){
      FB=firebase.initializeApp({
        apiKey:_fk, authDomain:_fp+'.firebaseapp.com',
        projectId:_fp, storageBucket:_fp+'.firebasestorage.app',
        messagingSenderId:'40761160761', appId:_fa
      },'mbti-delivery');
    }
    _db=FB.firestore();
    _st=FB.storage();
    _fbReady=true;
    console.log('[FB] 초기화 완료');
    _loadCompanyName();
    setTimeout(_tryFirebaseAuth, 200);
  }catch(e){
    console.warn('[FB] 초기화 오류:', e.message);
    _showFbFallback();
  }
}

// ★ Firebase Auth 로그인 (DONWAY 계정)
function _tryFirebaseAuth() {
  if(!FB) { _showFbFallback(); return; }
  var auth = FB.auth ? FB.auth() : null;
  if(!auth) { _showFbFallback(); return; }
  auth.onAuthStateChanged(function(user) {
    if(user) {
      _db.collection('drivers').where('email','==',user.email).limit(1).get()
      .then(function(snap) {
        if(!snap.empty) {
          var drv = snap.docs[0].data();
          _selDriver = drv.name || user.displayName || user.email.split('@')[0];
          _selCamp = drv.camp || localStorage.getItem('mbti_delivery_camp') || '';
          _renderDriverPanel();
        } else {
          _showFbFallback();
        }
      }).catch(function() { _showFbFallback(); });
    } else {
      _showAuthForm();
    }
  });
}

function _renderDriverPanel() {
  var el = document.getElementById('driver-list');
  if(!el) return;
  var info = document.createElement('div');
  info.style.cssText = 'background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:12px;margin-bottom:12px';
  info.innerHTML = '<div style="font-size:13px;font-weight:800;color:#22c55e">✅ ' + _selDriver + '</div><div style="font-size:11px;color:#94a3b8;margin-top:2px">캠프: ' + (_selCamp||'미지정') + '</div>';
  el.innerHTML = '';
  el.appendChild(info);
  var row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:6px;margin-top:8px';
  ['부산1','부산2','부산3','대구2','진주M'].forEach(function(c) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('data-camp', c);
    btn.style.cssText = 'flex:1;padding:8px 2px;background:'+(_selCamp===c?'#1e3a5f':'var(--bg3)')+';border:1.5px solid '+(_selCamp===c?'var(--blue)':'var(--border2)')+';border-radius:8px;color:'+(_selCamp===c?'var(--blue)':'var(--text3)')+';font-size:11px;font-weight:700;cursor:pointer';
    btn.textContent = c;
    btn.onclick = function(){ _selCamp_btn(this, this.getAttribute('data-camp')); };
    row.appendChild(btn);
  });
  el.appendChild(row);
  var loginBtn = document.getElementById('login-btn');
  if(loginBtn) { loginBtn.disabled = false; loginBtn.onclick = doLogin; }
}

function _showAuthForm() {
  var el = document.getElementById('driver-list');
  if(!el) return;
  el.innerHTML =
    '<div style="margin-bottom:10px">' +
      '<div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:5px">📧 DONWAY 이메일</div>' +
      '<input id="auth-email" type="email" placeholder="company@email.com" style="width:100%;padding:11px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;outline:none">' +
    '</div>' +
    '<div style="margin-bottom:12px">' +
      '<div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:5px">🔑 비밀번호</div>' +
      '<input id="auth-pw" type="password" placeholder="비밀번호" style="width:100%;padding:11px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;outline:none">' +
    '</div>' +
    '<button onclick="_doEmailLogin()" style="width:100%;padding:12px;background:linear-gradient(135deg,#0066ff,#00d4ff);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px">🔑 로그인</button>' +
    '<div style="text-align:center;font-size:11px;color:var(--text3);margin-bottom:8px">또는</div>';
  // 폴백 추가
  _showFbFallback();
}

function _doEmailLogin() {
  var email = (document.getElementById('auth-email')||{}).value.trim();
  var pw = (document.getElementById('auth-pw')||{}).value;
  if(!email||!pw){ toast('❌ 이메일과 비밀번호를 입력하세요'); return; }
  if(!FB||!FB.auth) { toast('❌ 연결 오류'); return; }
  FB.auth().signInWithEmailAndPassword(email, pw)
    .then(function(cred) {
      toast('✅ 로그인 완료');
    }).catch(function(e) {
      toast('❌ 로그인 실패: ' + (e.code==='auth/wrong-password'?'비밀번호 오류':e.code==='auth/user-not-found'?'이메일 없음':e.message));
    });
}

// 로그인 UI — Firebase 없어도 항상 동작 (캠프 버튼 + 이름 입력)
function _showFbFallback(){
  var el=document.getElementById('driver-list');
  if(!el) return;
  var CAMPS=['부산1','부산2','부산3','대구2','진주M'];
  var savedCamp=localStorage.getItem('mbti_delivery_camp')||'';
  var savedName=localStorage.getItem('mbti_delivery_driver')||'';
  var campBtns=CAMPS.map(function(c){
    var isSel=c===savedCamp;
    return '<button type="button" data-camp="'+c+'" onclick="_selCamp_btn(this,this.getAttribute(\'data-camp\'))"'

// ── 유틸 ──
function today(){ return new Date().toISOString().slice(0,10); }
function toast(m){
  var t=document.getElementById('toast');
  if(!t)return;
  t.textContent=m;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3500);
}
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 기사 목록 로드 — 즉시 수동입력 UI, Firebase 연결 시 목록으로 업그레이드 ──
async function loadDriverList(){
  // 항상 즉시 수동입력 UI 표시 (Firebase 기다리지 않음)
  _showFbFallback();
  // Firebase 연결될 때까지 최대 3초 대기 후 목록으로 교체
  var waited=0;
  while(!_fbReady && waited<6){ await new Promise(function(r){setTimeout(r,500);}); waited++; }
  if(!_db) return; // Firebase 없으면 수동입력 그대로 유지
  try{
    var snap = await _db.collection('drivers')
      .where('is_active','!=',false).orderBy('is_active').orderBy('camp').orderBy('name').get();
    var drivers = [];
    snap.forEach(function(d){ drivers.push(Object.assign({id:d.id},d.data())); });
    if(!drivers.length) throw new Error('기사 없음');
    el.innerHTML = drivers.map(function(d){
      var camp = d.camp||'미배정';
      return '<button class="driver-btn" onclick="selectDriver(\''+escH(d.name)+'\',\''+escH(camp)+'\')">'+
        '<span>'+escH(d.name)+'</span>'+
        '<span class="camp-tag">'+escH(camp)+'</span>'+
      '</button>';
    }).join('');
  }catch(e){
    // Firestore 못 읽으면 v9 localStorage 폴백
    var cached = [];
    try{ cached = JSON.parse(localStorage.getItem('mbti_drivers_cache')||'[]'); }catch(e2){}
    if(cached.length){
      el.innerHTML = cached.filter(function(d){return d.is_active!==false;}).map(function(d){
        return '<button class="driver-btn" onclick="selectDriver(\''+escH(d.name)+'\',\''+escH(d.camp||'')+'\')">'+
          '<span>'+escH(d.name)+'</span>'+
          '<span class="camp-tag">'+escH(d.camp||'?')+'</span>'+
        '</button>';
      }).join('');
    }
  }
}

var _selDriver='', _selCamp='';
function selectDriver(name, camp){
  _selDriver=name; _selCamp=camp;
  document.querySelectorAll('.driver-btn').forEach(function(b){b.classList.remove('sel');});

function doLogin(){
  if(!_selDriver) return;
  window._APP.driver = _selDriver;
  window._APP.camp   = _selCamp;

function doLogout(){

// ★ Firestore settings에서 카카오 키 로드
async function _loadApiKeys(){
  if(!_db) return;
  try {
    var d = await _db.collection('settings').doc('claude_config').get();
    if(d.exists) {
      var data = d.data();
      if(data.kakaoApiKey) {
        window._cachedKakaoApiKey = data.kakaoApiKey;
        localStorage.setItem('mbti_kakao_api_key', data.kakaoApiKey);
      }
    }
  } catch(e) {}
}

async function loadTodayRoute(){
  if(!_db) return;
  var route = '';
  try{
    // 1순위: drivers.todayDispatch
    var dSnap = await _db.collection('drivers').where('name','==',window._APP.driver).limit(1).get();
    dSnap.forEach(function(d){
      var data = d.data();
      if(data.todayDispatch && data.todayDispatch.date===today()){
        route = data.todayDispatch.routeNo||'';
      }
    });
    // 2순위: schedules 컬렉션
    if(!route){
      var sSnap = await _db.collection('schedules')
        .where('driver','==',window._APP.driver)
        .where('date','==',today()).limit(1).get();
      sSnap.forEach(function(d){ route = d.data().route||''; });
    }
  }catch(e){}
  if(!route) route = localStorage.getItem('drv_lastRoute_'+window._APP.driver)||'';
  window._APP.route = route;
  localStorage.setItem('mbti_delivery_route', route);
  document.getElementById('tb-route').textContent = route ? '📍 '+route : '노선 미배정';
  loadRouteInfo();
}

// ── scan_sessions에서 예상 건수 로드 ──
async function loadRouteInfo(){
  var camp = window._APP.camp;
  if(!camp){ document.getElementById('route-info-card').style.display='none'; return; }
  var sid = today().replace(/-/g,'')+'_'+camp.replace(/\s/g,'');
  // _worker.js /scan-get 사용
  try{
    var resp = await fetch('/scan-get/'+encodeURIComponent(today()+'_'+camp.replace(/\s/g,'')));
    var data = await resp.json();
    if(!data.ok || data.empty){
      document.getElementById('route-info-card').style.display='block';
      document.getElementById('route-info-body').innerHTML=
        '<div style="color:var(--text3);font-size:12px">오늘 적재 정보 없음 — 물류센터 공유 후 확인</div>';
      return;
    }
    var routes = data.receivedRoutes||data.loadedRoutes||{};
    var myRoute = window._APP.route;
    var myCount = myRoute && routes[myRoute] ? routes[myRoute].count : null;
    var totalRecv = data.receivedTotal||0;

    window._APP.expectCount = myCount || totalRecv;
    refreshCounters();

    var html = '';
    if(myRoute && myCount){
      html += '<div style="background:#1e3a5f;border-radius:10px;padding:12px;margin-bottom:10px">';
      html += '<div style="font-size:11px;color:var(--blue);font-weight:700;margin-bottom:2px">내 노선 ('+escH(myRoute)+')</div>';
      html += '<div style="font-size:32px;font-weight:900;color:#fff">'+myCount+'<span style="font-size:14px;color:var(--text2)">건</span></div>';
      html += '</div>';
    }
    if(Object.keys(routes).length){
      html += '<div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:700">캠프 전체 노선</div>';
      Object.keys(routes).sort().forEach(function(k){
        var isMe = k===myRoute;
        html += '<div class="route-row" style="'+(isMe?'color:var(--blue)':'')+'">';
        html += '<div class="route-name">'+(isMe?'★ ':'')+escH(k)+'</div>';
        html += '<div class="route-cnt">'+routes[k].count+'건</div>';
        html += '</div>';
      });
      if(data.receivedAt){
        html += '<div style="font-size:10px;color:var(--text3);margin-top:8px;text-align:right">수령: '+new Date(data.receivedAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+'</div>';
      }
    }
    document.getElementById('route-info-card').style.display='block';
    document.getElementById('route-info-body').innerHTML = html||'<div style="color:var(--text3);font-size:12px">데이터 없음</div>';
  }catch(e){
    document.getElementById('route-info-card').style.display='block';
    document.getElementById('route-info-body').innerHTML='<div style="color:var(--text3);font-size:12px">조회 실패: '+e.message+'</div>';
  }
}

// ── 카운터 갱신 ──
function refreshCounters(){
  var done = window._APP.doneCount||0;
  var exp  = window._APP.expectCount||0;
  document.getElementById('cnt-done').textContent = done;
  document.getElementById('cnt-expect').textContent = exp||'—';
  var pct = exp>0 ? Math.min(100,Math.round(done/exp*100)) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-remain').textContent = exp>0 ? (exp-done)+'건 남음' : '';
}

function _cleanAddr(addr){
  if(!addr || typeof addr !== 'string') return '';
  return addr
    .replace(/["']\s*\(string\)/g, '')   // " (string) 제거
    .replace(/^["']+|["']+$/g, '')           // 앞뒤 따옴표 제거
    .replace(/\\n|\\t|\\r/g, ' ')       // 이스케이프 개행 제거
    .replace(/\s{2,}/g, ' ')                 // 연속 공백 단일화
    .trim();
}
function _addBusanPrefix(addr){
  if(!addr) return addr;
  if(/^(서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)/.test(addr.trim())) return addr;
  if(/구|동|로|길|번길/.test(addr)) return '부산 '+addr.trim();
  return addr;
}

function _geoCacheKey(address){
  if(!address) return '';
  var s = String(address).replace(/\s+/g,'').toLowerCase();
  // 아파트명+동 추출 (캐시 키 최소화)
  var aptM = s.match(/([가-힣a-z\d]+(?:임대아파트|공공아파트|영구임대|아파트|오피스텔|빌라|맨션|주공|lh|sh))/);
  var dongM = s.match(/([a-z가-힣]?\d+)동(?![아네은])/);
  if(aptM && dongM) return aptM[1]+'_'+dongM[1]+'동';
  // 도로명+번지만 있으면 그것으로
  var roadM = s.match(/([가-힣a-z]+(?:로|길|번길)\d+(?:-\d+)?)/);
  if(roadM) return roadM[1];
  return s.slice(0, 30);
}
function _geoCacheGet(address){
  var k = _geoCacheKey(address);
  if(!k) return null;
  if(window._geoCacheMem[k]) return window._geoCacheMem[k];
  try{
    var raw = localStorage.getItem('mbti_geo_cache_'+k);
    if(!raw) return null;
    var obj = JSON.parse(raw);
    if(!obj || !obj.lat || !obj.lng) return null;
    // 90일 만료
    if(obj.ts && (Date.now() - obj.ts) > 90*24*3600*1000){
      localStorage.removeItem('mbti_geo_cache_'+k); return null;
    }
    window._geoCacheMem[k] = obj;
    return obj;
  }catch(e){ return null; }
}
function _geoCacheSet(address, gps){
  if(!address || !gps || !gps.lat || !gps.lng) return;
  var k = _geoCacheKey(address);
  if(!k) return;
  var obj = {lat:gps.lat, lng:gps.lng, src:gps.src||'cached', ts:Date.now()};
  window._geoCacheMem[k] = obj;
  try{ localStorage.setItem('mbti_geo_cache_'+k, JSON.stringify(obj)); }catch(e){}
}
// 저장된 emergency_deliveries에서 같은 동 GPS 찾기 (즉시 메모리, Firestore 조회 안 함)
function _geoFromStoredDeliveries(address){
  if(!address) return null;

}

    var prompt = '이 송장 사진에서 정확한 한국어 주소를 추출해 주세요.\n\n'

      + '숫자 1자리 오인식 가능성 주의 (예: 408 vs 403, 408 vs 480).\n\n'
      + '응답 형식 (JSON만, 다른 설명 없이):\n'
      + '{"address":"정확한 도로명 주소","apt":"단지명","dong":"408동","ho":"505호","tracking":"운송장번호 12-13자리","recipient":"수령인"}\n'
      + '읽을 수 없는 필드는 빈 문자열 "".';

    var requestBody = {
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 500,
      messages: [{
        role:'user',
        content:[
          {type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}},
          {type:'text', text: prompt}
        ]
      }]
    };

    // ─── 1순위: Firestore의 anthropicApiKey로 직접 호출 ───
    var apiKey = '';
    if(FB && _db){
      try{
        var doc = await _fsGetCached('settings/claude_config', 20);
        if(doc && doc.anthropicApiKey) apiKey = doc.anthropicApiKey.trim();
      }catch(e){}
    }
    // 보안: localStorage 직접 키 사용 제거

    var resp = null, data = null;
    if(apiKey && apiKey.indexOf('sk-ant-') === 0){
      try{
        console.log('[ClaudeVerify v9.68a] /claude-ocr 프록시 사용');
        resp = await fetch('/claude-ocr', {
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            // 'x-api-key': 프록시에서 처리
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
          },
          body: JSON.stringify(requestBody)
        });
        if(resp.ok) data = await resp.json();
        else console.warn('[ClaudeVerify direct] HTTP', resp.status);
      }catch(e1){ console.warn('[ClaudeVerify direct] error:', e1.message); }
    }

    // ─── 2순위: /claude-ocr 프록시 폴백 ───
    if(!data){
      try{
        console.log('[ClaudeVerify v9.68a] /claude-ocr 프록시 폴백');
        resp = await fetch('/claude-ocr', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(requestBody)
        });
        if(resp.ok) data = await resp.json();
        else console.warn('[ClaudeVerify proxy] HTTP', resp.status);
      }catch(e2){ console.warn('[ClaudeVerify proxy] error:', e2.message); }
    }

    if(!data){
      console.warn('[ClaudeVerify] 모든 경로 실패 — Claude 키 확인 필요');
      _geoResultBanner('⚠️ Claude 키 미설정 — 마이페이지에서 등록하세요');
      return null;
    }
    if(data.error){
      console.warn('[ClaudeVerify] API error:', data.error.message);
      return null;
    }
    var text = (data.content||[]).map(function(x){return x.text||'';}).join('').trim();
    text = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    var parsed;
    try{ parsed = JSON.parse(text); }
    catch(e){ console.warn('[ClaudeVerify] JSON parse fail:', text.slice(0,200)); return null; }
    console.log('[ClaudeVerify v9.68a]', parsed);
    return parsed;

}

      }

  }

  var addrFull = _addBusanPrefix(address);
  var aptM  = address.match(/([가-힣A-Za-z\d]+(?:임대아파트|공공아파트|영구임대|아파트|오피스텔|빌라|맨션|주공|LH|SH))/);
  if(!aptM) aptM = address.match(/([가-힣]{2,}아파트)/);

  var dongM = address.match(/([A-Za-z가-힣]?\d+)\s*동(?![아네은])/);

  // ★ v9.61: STEP 1-PRIORITY 강화 — 다중 쿼리 + 별칭 + 동 매칭 점수
  //   카카오맵 실측 검증: "도로명 + 동번호" 패턴이 가장 강력
  //   예: "모라로110번길121, 106동" → 모라주공1단지 106동 정확 매칭
  //   별칭: "영구임대" → 카카오는 "주공N단지"로 등록된 경우 많음
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  if(kKey && (aptM || dongM)){
    // 도로명+번지 추출 (예: "모라로110번길 121")
    var roadOnly = (addrFull||'').match(/([가-힣A-Za-z\d]+(?:로|길|번길)\s*\d+(?:-\d+)?)/);
    var roadStr = roadOnly ? roadOnly[1].replace(/\s+/g,' ') : '';
    var dongStr = dongM ? dongM[1]+'동' : '';
    var aptStr  = aptM ? aptM[1] : '';
    // ★ v9.66: 행정동 추출 (예: "모라동", "개금동") — OCR에 명시되면 검증용
    var legalDongM = (addrFull||'').match(/([가-힣]+동\d?)(?=\s|$|[^가-힣\d])/);
    var legalDongStr = '';
    if(legalDongM){
      var ld = legalDongM[1];

      if(ld.length >= 3 && !/^\d+동/.test(ld) && ld !== dongStr) legalDongStr = ld.replace(/\d$/,'');

    var aptAliases = [aptStr];

      aptAliases.push(aptStr.replace(/임대아파트$/,'주공'));

    //   카카오 OCR이 마지막 자리를 자주 누락 → 2자리를 3자리로 확장 시도
    function _roadVariants(road){

          });

      }

      var m2 = road.match(/(.*로\s*)(\d{2})(번길.*)/);
      if(m2){
        var n = parseInt(m2[2],10);
        [2,0,1,3,4,5,6,7,8,9].forEach(function(d){
          v.push(m2[1]+(n*10+d)+m2[3]);
        });
      }
      // 1자리 번길 → 2자리 변형 (×10 + 0~9)
      var m1 = road.match(/(.*로\s*)(\d{1})(번길.*)/);
      if(m1){
        var n1 = parseInt(m1[2],10);
        [1,2,0,3,4,5].forEach(function(d){
          v.push(m1[1]+(n1*10+d)+m1[3]);
        });
      }
      return v.filter(function(x,i,a){ return x && a.indexOf(x)===i; });
    }
    var roadVariants = _roadVariants(roadStr);

    // ★ v9.64: 쿼리 후보 생성 — 단지명+동을 최우선 (OCR 도로명 오인식 극복)
    var kwCands = [];

    if(aptStr && dongStr){
      aptAliases.forEach(function(an){
        if(!an) return;
        kwCands.push(an+' '+dongStr);

    if(roadStr && dongStr){

      });
    }

    if(roadStr && !dongStr){
      aptAliases.forEach(function(an){
        if(!an) return;
        roadVariants.forEach(function(rv){
          kwCands.push(an+' '+rv);
        });
      });
    }
    // 중복 제거 + 빈값 제거
    kwCands = kwCands.filter(function(v,i,a){ return v && v.length>3 && a.indexOf(v)===i; });
    console.log('[KAKAO_KW_CANDS v9.62]', kwCands.slice(0,10));

    // ★ v9.66: 행정구/행정동 강제 검증 추가
    function _scoreDoc(d){
      var pn = (d.place_name||'')+' '+(d.address_name||'')+' '+(d.road_address_name||'');
      var pnNS = pn.replace(/\s/g,'');
      var pnName = (d.place_name||'').replace(/\s/g,'');
      var addrFullPn = (d.address_name||'') + ' ' + (d.road_address_name||'');
      var sc = 0;
      // ★ v9.66: 행정구 검증 — OCR에 "사상구"인데 결과가 "진구"면 -100 (강력 거부)
      if(guStrTrim && guStrTrim.length >= 2){
        if(addrFullPn.indexOf(guStrTrim) < 0){
          console.log('[KW_GU_MISMATCH]', d.place_name, '|', addrFullPn, '≠', guStrTrim);
          return -100; // 행정구 불일치 = 완전 거부
        }
      }
      // ★ v9.66: 행정동 검증 — OCR에 "모라동"인데 결과가 "개금동"이면 -50
      if(legalDongStr && legalDongStr.length >= 2){
        if(addrFullPn.indexOf(legalDongStr) >= 0) sc += 30;
        else sc -= 50;
      }
      if(dongStr && pn.indexOf(dongStr) >= 0) sc += 50;
      // 원본 도로명 + OCR 교정 변형 도로명 매칭
      var roadMatched = false;
      if(roadStr){
        for(var rvi=0; rvi<roadVariants.length; rvi++){
          if(pnNS.indexOf(roadVariants[rvi].replace(/\s/g,'')) >= 0){
            sc += (rvi===0 ? 20 : 25);
            roadMatched = true;
            break;
          }
        }
      }
      // ★ v9.64: 단지명(별칭 포함) 매칭 — 강화된 점수
      var aptMatched = false;
      var aptKey = null;
      if(aptStr && pnName.length > 0){
        for(var ai=0; ai<aptAliases.length; ai++){
          if(!aptAliases[ai]) continue;
          var aliasKey = aptAliases[ai].slice(0,4).replace(/\s/g,'');
          if(aliasKey.length >= 2 && pnName.indexOf(aliasKey) >= 0){
            sc += 40; // ★ v9.64: 단지명(별칭 포함) 매칭 +40
            aptMatched = true; aptKey = aliasKey;
            break;
          }
        }
      }
      // 정확히 "{단지명} {동번호}" 패턴이면 추가 +30
      if(aptMatched && dongStr && pnName.indexOf(dongStr) >= 0){
        sc += 30;
      }
      // ★ v9.64: 도로명만 매칭되고 단지명 매칭 안 되면 -50 (OCR 오인식 위험)
      if(roadMatched && !aptMatched && aptStr){
        sc -= 50;
        console.log('[KW_PENALTY]', d.place_name, '단지명 미포함 -50');
      }
      // ★ v9.67: 동별 좌표 압도적 우선 — place_name이 "N동"으로 끝나면 +100
      //   예: "모라주공1단지아파트 106동" (동별) vs "모라주공1단지아파트" (단지중심)
      //   동별 결과는 카카오에 동 입구 좌표로 등록되어 있어 가장 정확
      if(dongStr && aptMatched){
        var pnTrim = (d.place_name||'').trim();
        var dongAtEnd = pnTrim.match(/(\d+동)\s*$/);
        if(dongAtEnd && dongAtEnd[1] === dongStr){
          sc += 100; // 동별 핀 강제 우선
          console.log('[KW_DONG_EXACT]', pnTrim, '+100 (동별 좌표)');
        }
      }
      if(d.category_group_code==='AT4') sc += 5;
      if(d.category_group_code==='') sc += 3;
      return sc;
    }

    var bestDoc = null, bestScore = 0, bestQuery = '';
    for(var ki=0; ki<Math.min(kwCands.length, 6); ki++){
      try{
        var kr0 = await fetch('https://dapi.kakao.com/v2/local/search/keyword.json?query='+encodeURIComponent(kwCands[ki])+'&size=15',
          {headers:{'Authorization':'KakaoAK '+kKey}});
        var kd0 = await kr0.json();
        if(kd0.documents && kd0.documents.length > 0){
          for(var di=0; di<kd0.documents.length; di++){
            var sc = _scoreDoc(kd0.documents[di]);
            if(sc > bestScore){
              bestScore = sc; bestDoc = kd0.documents[di]; bestQuery = kwCands[ki];
            }
          }
          // ★ v9.67: 동별 매칭(+100점) 나올 때까지 기다리기 — 임계값 150
          if(bestScore >= 150) break;
        }
      }catch(e){ console.debug('[KW'+ki+']', e.message); }
    }

    if(bestDoc && bestScore >= 50){
      // 동 번호 매칭된 결과 → 동 단위 정확도 확보
      var _isDongExact = (bestDoc.place_name||'').match(/(\d+동)\s*$/);
      var _matchType = (_isDongExact && _isDongExact[1]===dongStr) ? '동별핀' : (bestScore>=100?'정확':'단지');
      _geoResultBanner('📍 카카오키워드('+_matchType+' '+bestScore+'점) ✅ | '+bestDoc.y+', '+bestDoc.x+'\n   "'+bestQuery+'" → '+bestDoc.place_name);
      // ★ v9.65: 카카오 매칭 도로명을 반환값에 포함 (주소 텍스트 자동 갱신용)
      var matchedRoad = bestDoc.road_address_name || bestDoc.address_name || '';
      var matchedName = bestDoc.place_name || '';
      var _gpsKW = {lat:parseFloat(bestDoc.y), lng:parseFloat(bestDoc.x), src:'kakao_kw_dong', matchedAddr:matchedRoad, matchedName:matchedName};
      _geoCacheSet(address, _gpsKW);
      console.log('[KAKAO_KW_BEST v9.65]', bestQuery, '→', matchedName, '|', matchedRoad, 'score:', bestScore);
      // ★ v9.65: 카카오 매칭 도로명으로 emer-addr 입력란 강제 재구성
      try{
        var emerAddrEl = document.getElementById('emer-addr');
        if(emerAddrEl && matchedRoad){
          var curVal = emerAddrEl.value || '';
          // 호수 추출 (예: "1209호")
          var hoMatch = curVal.match(/(\d+호)/);
          var hoStr = hoMatch ? hoMatch[1] : '';
          // 새 주소 재구성: "{카카오도로명} {단지명} {동번호} {호수}"
          var rebuilt = matchedRoad;
          if(matchedName) rebuilt += ' ' + matchedName.replace(matchedRoad,'').trim();
          if(dongStr && rebuilt.indexOf(dongStr)<0) rebuilt += ' ' + dongStr;
          if(hoStr && rebuilt.indexOf(hoStr)<0) rebuilt += ' ' + hoStr;
          rebuilt = rebuilt.replace(/\s+/g,' ').trim();
          if(rebuilt !== curVal && rebuilt.length > 10){
            emerAddrEl.value = rebuilt;
            console.log('[ADDR_AUTO_REBUILD v9.65]', curVal, '→', rebuilt);
            _geoResultBanner('🔧 주소 자동교정 ✅\n   원본: '+curVal.slice(0,50)+'\n   교정: '+rebuilt);
          }
        }
      }catch(autoCorrErr){ console.debug('addr rebuild skip:', autoCorrErr); }
      return _gpsKW;
    }
    if(bestDoc && bestScore >= 20){
      // 동 매칭은 못 했지만 도로명/아파트명 매칭 → 단지 단위
      _geoResultBanner('📍 카카오키워드(단지'+bestScore+'점) ⚠️ | '+bestDoc.y+', '+bestDoc.x);
      var _gpsKW2 = {lat:parseFloat(bestDoc.y), lng:parseFloat(bestDoc.x), src:'kakao_kw_apt'};
      _geoCacheSet(address, _gpsKW2);
      console.log('[KAKAO_KW_APT]', bestQuery, '→', bestDoc.place_name, 'score:', bestScore);
      return _gpsKW2;
    }
    // 점수 부족 → STEP 1로 fallthrough
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // STEP 1: 카카오 주소검색 — OCR 번길 오인식 자동교정
  //  2자리 번길(예:19번길)이면 ×10, +1, +2 변형도 시도
  //  건물번호(main_building_no) 있는 결과만 채택 → 틀린 도로는 자동 탈락
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  if(kKey){
    // 도로명+번지 추출 (아파트명 제거, 동번호 유지)
    var roadBase = addrFull
      .replace(/\s*[가-힣A-Za-z]{2,}(?:아파트|오피스텔|빌라|맨션|주공|임대)[가-힣A-Za-z\d\s]*/g,'')
      .replace(/\s*\d+호\s*$/,'').trim();
    var dongStr = dongM ? ' '+dongM[1]+'동' : '';

    // 쿼리 후보 생성: 원본 + 2자리 번길이면 × 10, +1, +2 교정 추가
    function makeAddrCandidates(base){
      var cands = [(base+dongStr).trim(), base.replace(/\s*\d+동\s*$/, '').trim()];
      var twoDigit = base.match(/(로\s*)(\d{2})(번길)/);
      if(twoDigit){
        var n = parseInt(twoDigit[2], 10);
        [0, 2, 1, 3, 4, 5].forEach(function(d){
          var v = base.replace(/(로\s*)(\d{2})(번길)/, '$1'+(n*10+d)+'$3');
          cands.push((v+dongStr).trim());
          cands.push(v.replace(/\s*\d+동\s*$/,'').trim());
        });
      }
      return cands.filter(function(v,i,a){ return v && v.length>5 && a.indexOf(v)===i; });
    }

    var addrCands = makeAddrCandidates(roadBase);
    console.log('[KAKAO_CANDS]', addrCands.slice(0,4));

    for(var ai=0; ai<addrCands.length; ai++){
      try{
        var ar = await fetch('https://dapi.kakao.com/v2/local/search/address.json?query='+encodeURIComponent(addrCands[ai])+'&size=1',
          {headers:{'Authorization':'KakaoAK '+kKey}});
        var ad = await ar.json();
        if(ad.documents && ad.documents.length > 0){
          var adoc = ad.documents[0];
          var bno  = adoc.road_address && adoc.road_address.main_building_no;
          console.log('[KAKAO_ADDR]', addrCands[ai].slice(-30), '→ 건물번호:', bno||'없음');
          if(bno){
            // 건물번호 있는 결과 → 정확한 도로+번지 확인됨
            _geoResultBanner('📍 카카오주소 | '+adoc.y+', '+adoc.x);
            var _gpsS1 = {lat:parseFloat(adoc.y), lng:parseFloat(adoc.x), src:'kakao_addr'};
            _geoCacheSet(address, _gpsS1);
            return _gpsS1;
          }
        }
      }catch(e){ console.debug('[A'+ai+']',e.message); }
    }
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // STEP 2: Google — 원본 주소 + 번길 교정 변형
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  if(gKey){
    var baseG = addrFull.replace(/\s*\d+호\s*$/,'').trim();
    var googleCands = [baseG];
    var twoG = addrFull.match(/(로\s*)(\d{2})(번길)/);
    if(twoG){
      var ng = parseInt(twoG[2],10);
      [0,2,1,3].forEach(function(d){
        var v = addrFull.replace(/(로\s*)(\d{2})(번길)/, '$1'+(ng*10+d)+'$3').replace(/\s*\d+호\s*$/,'');
        googleCands.push(v.trim());
      });
    }
    googleCands = googleCands.filter(function(v,i,a){ return v && a.indexOf(v)===i; });

    for(var gi=0; gi<googleCands.length; gi++){
      try{
        var gr = await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(googleCands[gi])+'&language=ko&region=kr&key='+gKey);
        var gd = await gr.json();
        var fmt = gd.results&&gd.results[0]&&gd.results[0].formatted_address||'';
        console.log('[GOOGLE]', googleCands[gi].slice(-30), '→', gd.status, fmt.slice(-25));
        if(gd.status==='OK' && gd.results && gd.results[0]){
          var gl = gd.results[0].geometry.location;
          _geoResultBanner('🌐 Google | '+gl.lat.toFixed(5)+', '+gl.lng.toFixed(5));
          var _gpsS2 = {lat:gl.lat, lng:gl.lng, src:'google'};
          _geoCacheSet(address, _gpsS2);
          return _gpsS2;
        }
        if(gd.status==='REQUEST_DENIED'){
          _geoResultBanner('❌ Google Geocoding API 미활성 — Cloud Console 확인');
          break;
        }
      }catch(e){ console.debug('[G'+gi+']',e.message); }
    }
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // STEP 3: 카카오 키워드 — 아파트명+동 (최후)
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  if(kKey && aptM){
    var kwQ = '부산 '+guStr+aptM[1]+(dongM?' '+dongM[1]+'동':'');
    try{
      var kr = await fetch('https://dapi.kakao.com/v2/local/search/keyword.json?query='+encodeURIComponent(kwQ)+'&size=3',
        {headers:{'Authorization':'KakaoAK '+kKey}});
      var kd = await kr.json();
      if(kd.documents && kd.documents.length > 0){
        var best = (dongM && kd.documents.find(function(d){return d.place_name&&d.place_name.indexOf(dongM[1]+'동')>=0;}))
                 || kd.documents[0];
        _geoResultBanner('📍 카카오키워드⚠️ | '+best.y+', '+best.x);
        var _gpsS3 = {lat:parseFloat(best.y), lng:parseFloat(best.x), src:'kakao_kw'};
        _geoCacheSet(address, _gpsS3);
        return _gpsS3;
      }
    }catch(e){}
  }

  _geoResultBanner('❌ 좌표 변환 실패 — 주소를 확인하세요');
  return null;
}


async function _googleGeocodePin(addrFull, gKey){
  // _kakaoGeocode 내부에서 직접 Google 호출하므로 이 함수는 호환용 래퍼
  if(!gKey) return null;
  try{
    var noHo = addrFull.replace(/\s*\d+호\s*$/,'').trim();
    var gr = await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(noHo)+'&language=ko&region=kr&key='+gKey);
    var gd = await gr.json();
    if(gd.status==='OK' && gd.results && gd.results[0]){
      var gl = gd.results[0].geometry.location;
      return {lat:gl.lat, lng:gl.lng, src:'google'};
    }
  }catch(e){}
  return null;
}

    var fullTextForAddr = fullText;
    var recvIdx = fullText.search(/받는\s*분|수취인|SHIP\s*TO|RECIPIENT/i);
    var sendIdx = fullText.search(/보내는\s*분|발송인|보내는이|SENDER|FROM/i);
    if(recvIdx >= 0){
      // 받는분 이후, 보내는분 이전만 사용
      var endIdx = sendIdx > recvIdx ? sendIdx : fullText.length;
      fullTextForAddr = fullText.slice(recvIdx, endIdx);
    } else if(sendIdx >= 0){
      // 보내는분 이전만 사용
      fullTextForAddr = fullText.slice(0, sendIdx);
    }
    // 국제 송장 주소: 콤마 구분 형식 파싱 (예: 607호, 광안동 89-13 화목오피스텔, 수영구, 부산광역시)
    var intlAddrMatch = fullTextForAddr.match(/(\d+호[^\n]*(?:구|시|동|로|길|아파트|오피스텔|빌라)[^\n,]*(?:,[^\n,]*)*?)(?:,\s*\d{5}|,\s*KR|,\s*Korea|\n)/i);
    if(!intlAddrMatch){
      intlAddrMatch = fullTextForAddr.match(/(\d+호[^\n,]+,[^\n]+(?:구|시)[^\n]*)/);
    }
    var intlAddr = intlAddrMatch ? intlAddrMatch[1].replace(/,\s*\d{5}.*$/,'').replace(/,\s*KR.*/i,'').replace(/,\s*Korea.*/i,'').trim() : ''

    // ★ v9.25: 주소 파싱 — 전체 줄 스캔 후 주소 조각 모두 수집 (From./잡텍스트 건너뜀)
    var addrLine = (function(){
      function isAddrLine(l){
        if(!l || l.replace(/[\d\.,\s]/g,'').length < 2) return false;
        if(l.replace(/[^\d]/g,'').length > l.length * 0.75) return false;
        return l.match(/(시|구)\s*.*(로|길|동|아파트|오피스텔|빌라|임대|주공|현대|삼성|롯데)/) ||
               l.match(/(로|길)\s*\d+/) ||
               l.match(/\d+동\s*\d+호/) ||
               l.match(/\d+호$/) ||
               l.match(/아파트|오피스텔|빌라|임대아파트|주공/);
      }
      function isJunkLine(l){
        if(l.match(/서명|인수자|보내는이|보내는분|발송인|택배사|위탁|개인정보|SENDER|FROM\.:/i)) return true;
        if(l.match(/[a-zA-Z]{5,}/)) return true; // 영어 5자↑
        if(l.match(/^(RPB|D\d|오전|오후|DATE|From|To\.)/i)) return true;
        if(l.match(/coupang|gls\.com/i)) return true;
        if(l.match(/1577[-\s]*7011|1544[-\s]*9898/)) return true;
        if(l.match(/^\d{2,4}[\/\.]\d{2}/)) return true; // 날짜
        if(l.match(/^[\d,\.]{10,}/)) return true; // 숫자열
        return false;
      }

      // ① 주소 파트 전체 수집 (줄 순서 유지, 쓰레기 건너뜀)
      var streetPart = ''; // 도로명 (로/길 포함)
      var detailParts = []; // 상세주소 파트 (동, 호 각각 수집)

      // ★ 전처리: OCR 줄 분리 보정 (번길/번지 숫자가 잘린 경우 합치기)
      // "모라로19" + "2번길 50" → "모라로192번길 50"
      // "408동 505" + "호" → "408동 505호"
      var mergedLines = [];
      for(var mi=0; mi<lines.length; mi++){
        var ml = (lines[mi]||'').trim();
        if(!ml) continue;
        var prev = mergedLines.length > 0 ? mergedLines[mergedLines.length-1] : '';
        // 이전 줄이 도로명 끝 숫자로 끝나고, 현재 줄이 번길/번지로 시작하면 합치기
        if(prev.match(/(로|길)\s*\d+$/) && ml.match(/^\d*번길/)){
          mergedLines[mergedLines.length-1] = prev + ml;
        }
        // 이전 줄이 숫자(동/호 없이)로 끝나고 현재 줄이 번길로 시작하면 합치기
        else if(prev.match(/\d+$/) && ml.match(/^번길\s*\d/)){
          mergedLines[mergedLines.length-1] = prev + ml;
        }
        // "505" + "호" → "505호"
        else if(prev.match(/\d+$/) && ml === '호'){
          mergedLines[mergedLines.length-1] = prev + '호';
        }
        // 현재 줄이 숫자만 (번지)이고 이전 줄이 도로명이면 합치기
        else if(prev.match(/(로|길|번길)\s*$/) && ml.match(/^\d+$/)){
          mergedLines[mergedLines.length-1] = prev + ml;
        }
        else {
          mergedLines.push(ml);
        }
      }
      lines = mergedLines;

      for(var i=0; i<lines.length; i++){
        var l = lines[i].trim();
        if(!l || isJunkLine(l)) continue;

        // 영어 잡텍스트 잘라내기
        l = l.replace(/\s+[a-zA-Z][a-zA-Z\s]{1,}.*$/,'').trim();
        // ★ v9.59: 번지 뒤 잡문자 제거 (아파트명은 보존)
        // 번지수 뒤에 붙은 OCR 아티팩트 (~, 숫자 등) 제거
        l = l.replace(/((?:로|길|번길)\s*\d{1,4})([~\-]\d+|\d{1,2}(?=[\s\D]))/, '$1').trim();
        // 2글자 이하 한글 잡텍스트만 제거 (아파트명 3글자↑ 보존)
        l = l.replace(/((?:로|길|번길)\s*\d+(?:-\d+)?)\s+[가-힣]{1,2}$/, '$1').trim();
        if(!l) continue;

        var hasStreet = l.match(/(시|구).*(로|길)/) || l.match(/(로|길)\s*\d+/);
        var hasDong   = l.match(/\d+동/) || l.match(/아파트|오피스텔|빌라|임대|주공/);
        var hasHo     = l.match(/\d+호/);

        if(hasStreet && !streetPart){
          streetPart = l;
          // ★ 다음 줄이 번길 숫자 보정인지 확인 (예: "2번길 50")
          var nextL = lines[i+1] ? lines[i+1].trim() : '';
          if(nextL.match(/^\d{1,2}번길\s*\d/) && streetPart.match(/(로|길)\d+$/)){
            streetPart = streetPart + nextL;
            i++; // 다음 줄 건너뜀
          }
        } else if(hasDong && !detailParts.some(function(x){ return x.match(/아파트|오피스텔|동/); })){
          detailParts.push(l);
          // 같은 줄에 호수도 있으면 종료
          if(hasHo) break;
        } else if(hasHo && detailParts.length > 0 && !detailParts[detailParts.length-1].match(/\d+호/)){
          // 동 다음 줄에 호수만 있는 경우 (쿠팡 스타일) — 앞 줄에 붙임
          detailParts[detailParts.length-1] += ' ' + l;
          break;
        } else if(hasHo && detailParts.length === 0 && streetPart){
          // 도로명 바로 다음에 호수만 있는 경우
          detailParts.push(l);
          break;
        }
      }

      // ② 조합
      var detailPart = detailParts.join(' ').trim();
      if(streetPart && detailPart) return _cleanAddr(streetPart + ' ' + detailPart);
      return _cleanAddr(streetPart || detailPart || '');
    })();

    // ★ 국제 송장 주소가 더 정확하면 우선 사용
    if(intlAddr && intlAddr.length > (addrLine||'').length){
      addrLine = intlAddr;
    }

    // ★ 2자리 번길 감지 → 오인식 경고 (192번길을 19번길로 읽을 수 있음)
    if(addrLine && /로\s*\d{2}번길/.test(addrLine)){
      var _addrWarnEl = document.getElementById('emer-addr-warn');
      if(!_addrWarnEl){
        _addrWarnEl = document.createElement('div');
        _addrWarnEl.id = 'emer-addr-warn';
        var _addrInput = document.getElementById('emer-addr');
        if(_addrInput && _addrInput.parentNode){
          _addrInput.parentNode.insertBefore(_addrWarnEl, _addrInput.nextSibling);
        }
      }
      _addrWarnEl.style.cssText = 'font-size:11px;color:#b45309;background:#fef3c7;border:1px solid #f59e0b;border-radius:5px;padding:4px 8px;margin-top:3px';
      _addrWarnEl.innerHTML = '⚠️ 번길 숫자 확인 필요 (예: 19번길→192번길). 틀리면 직접 수정 후 저장하세요.';
      console.warn('[ADDR_WARN] 2자리 번길 감지:', addrLine);
    }

    // 배송메모: 문 앞, 경비실 등
    var memoLine = lines.find(function(l){ return l.match(/문\s*앞|경비실|자율출입|직접|부재|택배함/); });

    // ★ v9.34: 라우트 코드 자동 추출 (예: "310 C01", "215C", "320A05")
    // 패턴: 3자리 숫자 + 알파벳 1자 + 0~2자리 숫자 (공백 허용)
    var routeMatch = fullText.match(/\b(\d{3})\s?([A-Z])(\d{0,2})\b/);
    var routeCode = routeMatch ? (routeMatch[1] + routeMatch[2] + (routeMatch[3]||'')) : '';

    // ★ v9.34: 배송일 자동 추출 (예: "02/12 목", "12/25 수")
    // 패턴: M/D 또는 MM/DD + 한글 요일
    var dateMatch = fullText.match(/(\d{1,2})\/(\d{1,2})\s*([월화수목금토일])/);
    var deliveryDate = dateMatch
      ? String(dateMatch[1]).padStart(2,'0')+'/'+String(dateMatch[2]).padStart(2,'0')+' '+dateMatch[3]
      : '';

    // ★ v9.37: 박스 규격 자동 추출 (예: "RPB2.4", "RPB 1.5", "RPB3")
    // 박스 크기/종류 파악용 (R = Reusable Package Box?)
    var boxMatch = fullText.match(/\bRPB\s*([\d\.]+)\b/i);
    var boxCode = boxMatch ? ('RPB'+boxMatch[1]) : '';

    var p = {
      order_id: orderId,
      tracking_no: trackingNo,
      recipient: recipientMatch ? recipientMatch[0] : '',
      address: addrLine || '',
      delivery_memo: memoLine || '',
      route_code: routeCode,           // ★ v9.34
      delivery_date: deliveryDate,     // ★ v9.34
      box_code: boxCode                // ★ v9.37: 박스 규격
    };

    // 자동 입력 — hidden 필드에 저장 (지도 핀용)
    if(p.order_id){ var oi=document.getElementById('emer-orderid'); if(oi) oi.value=p.order_id; window._pendingOrderId=p.order_id; }
    if(p.recipient)    { var re=document.getElementById('emer-recipient'); if(re) re.value=p.recipient; }
    if(p.address)      { var ad=document.getElementById('emer-addr');      if(ad) ad.value=p.address; }
    if(p.delivery_memo){ var dm=document.getElementById('emer-delivmemo'); if(dm) dm.value=p.delivery_memo; }

    if(p.tracking_no){
      var clean = p.tracking_no.replace(/[\.\-\s]/g,'');
      var inp = document.getElementById('emer-tracking-inp');
      if(inp) inp.value = clean;
      emerAddTracking();
    }

    // ★ v9.25: OCR 결과 → 수정 가능한 입력창으로 표시
    var summary = document.getElementById('emer-ocr-summary');
    if(summary){
      var fs = 'width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text);margin-top:2px';
      var rows = '';
      rows += '<div style="font-size:11px;font-weight:700;color:var(--teal);margin-bottom:6px">✅ OCR 완료 — 틀린 부분 수정 후 저장</div>';
      // 운송장
      rows += '<div style="margin-bottom:5px"><label style="font-size:11px;color:var(--text2)">🔢 운송장번호</label><input id="ocr-edit-track" style="'+fs+'" value="'+(p.tracking_no||'')+'" oninput="_emerOcrApply()"></div>';
      // 주문번호
      rows += '<div style="margin-bottom:5px"><label style="font-size:11px;color:var(--text2)">📋 주문번호</label><input id="ocr-edit-order" style="'+fs+'" value="'+(p.order_id||'')+'" oninput="_emerOcrApply()"></div>';
      // 수령인
      rows += '<div style="margin-bottom:5px"><label style="font-size:11px;color:var(--text2)">👤 수령인</label><input id="ocr-edit-recip" style="'+fs+'" value="'+(p.recipient||'')+'" oninput="_emerOcrApply()"></div>';
      // 주소
      rows += '<div style="margin-bottom:5px"><label style="font-size:11px;color:var(--text2)">📍 주소 <span style="color:#f59e0b;font-size:10px">(틀리면 직접 수정)</span></label><input id="ocr-edit-addr" style="'+fs+'" value="'+(p.address||'')+'" oninput="_emerOcrApply()"></div>';
      // ★ v9.34: 라우트 코드 + 배송일 (자동 추출)
      if(p.route_code || p.delivery_date || p.box_code){
        rows += '<div style="display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap">';
        if(p.route_code){
          rows += '<div style="flex:1;min-width:90px"><label style="font-size:11px;color:var(--text2)">🚛 라우트</label><input id="ocr-edit-route" style="'+fs+'" value="'+p.route_code+'" oninput="_emerOcrApply()"></div>';
        }
        if(p.delivery_date){
          rows += '<div style="flex:1;min-width:90px"><label style="font-size:11px;color:var(--text2)">📅 배송일</label><input id="ocr-edit-date" style="'+fs+'" value="'+p.delivery_date+'" oninput="_emerOcrApply()"></div>';
        }
        if(p.box_code){
          rows += '<div style="flex:1;min-width:90px"><label style="font-size:11px;color:var(--text2)">📦 박스</label><input id="ocr-edit-box" style="'+fs+'" value="'+p.box_code+'" oninput="_emerOcrApply()"></div>';
        }
        rows += '</div>';
      }
      // 원문 보기 토글
      rows += '<details style="margin-top:4px"><summary style="font-size:10px;color:var(--text3);cursor:pointer">🔍 OCR 원문 보기 (디버그)</summary><pre style="font-size:9px;color:var(--text3);white-space:pre-wrap;max-height:120px;overflow-y:auto;background:var(--bg2);padding:6px;border-radius:4px;margin-top:4px">'+ocrText.replace(/</g,'&lt;').slice(0,600)+'</pre></details>';
      summary.innerHTML = rows;
      summary.style.display='block';
    }
    if(status) status.innerHTML = '';

    // 수정된 OCR 값을 hidden 필드에 실시간 반영
    window._emerOcrApply = function(){
      var t=document.getElementById('ocr-edit-track'),
          o=document.getElementById('ocr-edit-order'),
          r=document.getElementById('ocr-edit-recip'),
          a=document.getElementById('ocr-edit-addr'),
          rt=document.getElementById('ocr-edit-route'),  // ★ v9.34
          dt=document.getElementById('ocr-edit-date'),   // ★ v9.34
          bx=document.getElementById('ocr-edit-box');    // ★ v9.37
      if(t&&t.value){
        var cl=t.value.replace(/[.\-\s]/g,'').trim();
        window._emerTrackings=[cl]; emerRefreshTrackingList();
        var inp=document.getElementById('emer-tracking-inp'); if(inp) inp.value=cl;
      }
      if(o){ var oi=document.getElementById('emer-orderid'); if(oi) oi.value=o.value; }
      if(r){ var re=document.getElementById('emer-recipient'); if(re) re.value=r.value; }
      if(a){ var ad=document.getElementById('emer-addr'); if(ad) ad.value=a.value; }
      // ★ v9.34: 라우트/배송일 → window 변수에 보존 (emerSave에서 Firebase에 포함)
      window._emerRouteCode = rt ? rt.value.trim() : (p.route_code||'');
      window._emerDeliveryDate = dt ? dt.value.trim() : (p.delivery_date||'');
      // ★ v9.37: 박스 규격 보존
      window._emerBoxCode = bx ? bx.value.trim() : (p.box_code||'');
    };
    window._emerOcrApply();

    // ★ OCR 성공 → 운송장 입력란 숨김
    var tw = document.getElementById('emer-tracking-wrap');
    if(tw && window._emerTrackings.length>0) tw.style.display='none';

    // ★ v9.59: OCR 결과 디버그
    console.log('[OCR_RESULT]', JSON.stringify({
      tracking: p.tracking_no,
      addr: _cleanAddr(p.address),
      recipient: p.recipient,
      ocrLen: (ocrText||'').length
    }));

    // ★ v9.59: 주소 없으면 OCR 전체 텍스트에서 재추출 시도
    if(!p.address && ocrText){
      var _lines2 = ocrText.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      var _addrLine = _lines2.find(function(l){
        return l.match(/(구|군).*(로|길|번길)/) || l.match(/(동|구).*(아파트|오피스텔|빌라)/);
      });
      if(_addrLine){
        p.address = _addrLine;
        var _adEl = document.getElementById('emer-addr');
        if(_adEl) _adEl.value = _addrLine;
        console.log('[OCR_ADDR_RETRY]', _addrLine);
      }
    }

    // ★ v9.59: QR GPS 우선 사용 — QR에 좌표가 있으면 재지오코딩 불필요
    var pinGps = null;
    var _qrGps = window._emerGps;
    if(_qrGps && _qrGps.src === 'QR' && _qrGps.lat && _qrGps.lng){
      // QR 좌표 직접 사용 (쿠팡 배송시스템 좌표 = 가장 정확)
      pinGps = {lat:_qrGps.lat, lng:_qrGps.lng, src:'QR', addr:_cleanAddr(p.address)};
      if(status) status.innerHTML='<span style="color:var(--teal)">✅ QR GPS 사용 (쿠팡 좌표)</span>';
      _geoResultBanner('📍 QR | '+_qrGps.lat.toFixed(5)+', '+_qrGps.lng.toFixed(5));
      console.log('[GPS] QR 좌표 사용:', _qrGps.lat, _qrGps.lng);
      // ★ v9.60: QR GPS도 캐시 저장 — 같은 동의 다른 송장이 QR 없어도 동일 좌표 사용
      if(p.address) _geoCacheSet(p.address, {lat:_qrGps.lat, lng:_qrGps.lng, src:'QR'});
    } else if(p.address){
      if(status) status.innerHTML = '<span style="color:var(--blue)">📍 배송지 좌표 변환 중...</span>';
      try{
        // QR 없거나 OCR만 인식된 경우 → 지오코딩
        var _kkr = await _kakaoGeocode(p.address);
        if(_kkr){
          pinGps={lat:_kkr.lat,lng:_kkr.lng,src:(_kkr.src||'kakao'),addr:_cleanAddr(p.address)};
          window._emerGps={lat:_kkr.lat,lng:_kkr.lng,acc:0,src:(_kkr.src||'kakao'),addr:_cleanAddr(p.address)};
          var _srcLabel = {google:'Google',kakao_addr:'카카오주소',kakao_kw:'카카오키워드⚠️',kakao:'카카오'}[_kkr.src]||_kkr.src;
          if(status) status.innerHTML='<span style="color:var(--teal)">✅ '+_srcLabel+' 좌표 변환 완료</span>';
          _geoResultBanner('📍 '+_srcLabel+' | '+_kkr.lat.toFixed(5)+', '+_kkr.lng.toFixed(5));
        } else {
          console.warn('[KAKAO_GEO_FAIL] 카카오 실패 → Google 시도');
          var gcRes = await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(_addBusanPrefix(p.address))+'&language=ko&region=kr&key='+apiKey);
          var gcData = await gcRes.json();
          if(gcData.status==='OK' && gcData.results && gcData.results[0]){
            var loc = gcData.results[0].geometry.location;
            if(typeof loc.lat==='number' && typeof loc.lng==='number'){
              pinGps={lat:loc.lat,lng:loc.lng,src:'geocode',addr:_cleanAddr(p.address)};
              window._emerGps={lat:loc.lat,lng:loc.lng,acc:0,src:'geocode',addr:_cleanAddr(p.address)};
              if(status) status.innerHTML='<span style="color:var(--teal)">✅ 배송지 좌표 변환 완료</span>';
            }
          } else if(gcData.status==='REQUEST_DENIED'){
            if(status) status.innerHTML='<span style="color:#f59e0b">⚠️ Geocoding API 비활성 — 현위치 사용</span>';
          }
        }
      }catch(geoErr){ console.warn('Geocoding 실패:', geoErr); }
    } // end if(p.address)

// ★ v9.25: 바코드/QR 인식 (운송장 훼손 시 보조 수단)
// ★ v9.25: QR/바코드 텍스트에서 주소/수령인/주문번호/GPS 파싱
// 쿠팡 QR 형식: |V1|운송장|주소|상세주소|수령인|해시|위도|경도|타입|타임스탬프|
function _parseQrText(text){
  if(!text) return {};
  var result = {};

  // ★ 쿠팡 QR 파이프 구분 형식 우선 파싱
  if(text.indexOf('|') >= 0){
    var parts = text.split('|').map(function(p){ return p.trim(); }).filter(Boolean);
    // |V1|운송장|주소|상세주소|수령인|해시|위도|경도|타입|타임스탬프|
    // parts[0]=V1, [1]=운송장, [2]=주소, [3]=상세주소, [4]=수령인, [5]=해시, [6]=위도, [7]=경도
    if(parts[0] === 'V1' && parts.length >= 5){
      // 운송장 번호
      if(parts[1] && /^\d{10,20}$/.test(parts[1])){
        result.tracking_no = parts[1];
      }
      // 주소 (주소 + 상세주소 합치기)
      var addr = parts[2] || '';
      var addrDetail = parts[3] || '';
      if(addr) result.address = addrDetail ? addr + ' ' + addrDetail : addr;
      // 수령인 (김*우 패턴)
      if(parts[4] && parts[4].match(/[가-힣]+\*[가-힣]/)){
        result.recipient = parts[4];
      }
      // GPS 좌표 — 전체 파트 스캔 (고정 인덱스 아님 — 쿠팡 포맷 변경 대응)
      // 한국 좌표: lat 33~38, lng 126~130
      for(var gi=2; gi<parts.length-1; gi++){
        var pLat = parseFloat(parts[gi]);
        var pLng = parseFloat(parts[gi+1]);
        if(!isNaN(pLat) && !isNaN(pLng) &&
           pLat > 33 && pLat < 38 && pLng > 126 && pLng < 130){
          result.lat = pLat;
          result.lng = pLng;
          break;
        }
      }
      return result;
    }
  }

  // 일반 텍스트 폴백 파싱 (비쿠팡 형식)
  var lines = text.split(/[\n\r,]/).map(function(l){ return l.trim(); }).filter(Boolean);
  var full = text.replace(/\s+/g,' ');
  var recMatch = full.match(/[가-힣]{2,4}\*[가-힣]/) || full.match(/수령인[:\s]*([가-힣]{2,4})/);
  if(recMatch) result.recipient = recMatch[1]||recMatch[0];
  lines.forEach(function(l){
    if(!result.address && (l.match(/(시|구)\s*.*(로|길|동)/) || l.match(/(로|길)\s*\d+/) || l.match(/\d+동\s*\d+호/))){
      result.address = l;
    }
  });
  var ordMatch = full.match(/7[\d\.\-]{12,16}/);
  if(ordMatch) result.order_id = ordMatch[0].replace(/[^\d]/g,'');
  var memoMatch = full.match(/문\s*앞|경비실|자율출입|택배함|부재/);
  if(memoMatch) result.memo = memoMatch[0];
  return result;
}

// ★ v9.61: 통합 송장 촬영 — QR 먼저, 실패 시 OCR 자동
function emerUnifiedScan(input){
  var statusEl = document.getElementById('emer-unified-status');
  if(!input.files || !input.files[0]) return;
  var file = input.files[0];
  input.value = '';
  window._scanPhotoAdded=false;
  window._emerGps=null;           // ★ v9.59: GPS 초기화
  window._pendingPhotoUpload=null; // ★ v9.59: 이전 사진 취소
  if(statusEl) statusEl.innerHTML = '🔍 QR 분석 중...';

  var url = URL.createObjectURL(file);
  var img = new Image();
  img.onload = function(){
    URL.revokeObjectURL(url);
    var scale = Math.min(1, 2000/Math.max(img.naturalWidth, img.naturalHeight));
    var cw=Math.round(img.naturalWidth*scale), ch=Math.round(img.naturalHeight*scale);
    var cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
    var ctx=cv.getContext('2d'); ctx.drawImage(img,0,0,cw,ch);

    // ★ v9.59: 파란 송장 감지 → 전처리 캔버스 추가
    var _smp=document.createElement('canvas'); _smp.width=100; _smp.height=100;
    _smp.getContext('2d').drawImage(img,0,0,cw,ch,0,0,100,100);
    var _sd=_smp.getContext('2d').getImageData(0,0,100,100);
    var _bl=0; for(var _i=0;_i<_sd.data.length;_i+=16){if(_sd.data[_i+2]>_sd.data[_i]+40&&_sd.data[_i+2]>80)_bl++;}
    var _isBlueLabel=(_bl/625)>0.15;
    var cvBlue=null;
    if(_isBlueLabel){
      cvBlue=document.createElement('canvas'); cvBlue.width=cw; cvBlue.height=ch;
      var ctxB=cvBlue.getContext('2d'); ctxB.drawImage(img,0,0,cw,ch);
      var dB=ctxB.getImageData(0,0,cw,ch);
      for(var _j=0;_j<dB.data.length;_j+=4){
        var _r=dB.data[_j],_g=dB.data[_j+1],_b=dB.data[_j+2];
        if(_b>_r+30&&_b>_g+20&&_b>80){ dB.data[_j]=dB.data[_j+1]=dB.data[_j+2]=255; }
        else{ var _gr=Math.round(_r*.299+_g*.587+_b*.114); dB.data[_j]=dB.data[_j+1]=dB.data[_j+2]=(_gr<140?0:255); }
      }
      ctxB.putImageData(dB,0,0);
    }

    function goOCR(){
      toast('📷 goOCR호출', 2000); // ★ 디버그
      if(statusEl) statusEl.innerHTML = '🔍 OCR 분석 중...';
      statusEl.id = 'emer-ocr-status';
      setTimeout(function(){ var el=document.getElementById('emer-ocr-status'); if(el) el.id='emer-unified-status'; }, 10000);
      emerOcrScan(file, document.getElementById('emer-ocr-status'));
    }

    // ① BarcodeDetector — QR 전용 (로컬, API 비용 0)
    if('BarcodeDetector' in window){
      var bd;
      try{ bd=new BarcodeDetector({formats:['qr_code','data_matrix','aztec']}); }
      catch(e){ try{ bd=new BarcodeDetector({formats:['qr_code']}); }catch(e2){} }
      if(bd){
        // ★ v9.59: 파란 송장이면 전처리 캔버스도 시도
        var _detectTarget = (_isBlueLabel && cvBlue) ? cvBlue : cv;
        bd.detect(_detectTarget).then(function(codes){
          if(codes&&codes.length&&codes[0].rawValue){
            var raw=codes[0].rawValue;
            if(raw.indexOf('V1|')===0){
              if(statusEl) statusEl.textContent='✅ QR 인식!';
              _emerHandleScan(raw, statusEl);
            } else if(_isBlueLabel && cvBlue){
              // 파란 전처리 실패 → 원본으로 재시도
              bd.detect(cv).then(function(c2){
                if(c2&&c2.length&&c2[0].rawValue&&c2[0].rawValue.indexOf('V1|')===0){
                  if(statusEl) statusEl.textContent='✅ QR 인식!';
                  _emerHandleScan(c2[0].rawValue,statusEl);
                } else { _nativeCamJsQR(_isBlueLabel&&cvBlue?cvBlue:cv,cw,ch,statusEl,goOCR); }
              }).catch(function(){ _nativeCamJsQR(cv,cw,ch,statusEl,goOCR); });
            } else { goOCR(); }
          } else { _nativeCamJsQR(_isBlueLabel&&cvBlue?cvBlue:cv,cw,ch,statusEl,goOCR); }
        }).catch(function(){ _nativeCamJsQR(cv,cw,ch,statusEl,goOCR); });
        return;
      }
    }
    // ② jsQR (로컬, API 비용 0)
    _nativeCamJsQR(_isBlueLabel&&cvBlue?cvBlue:cv, cw, ch, statusEl, goOCR);
  };
  img.onerror = function(){ URL.revokeObjectURL(url); if(statusEl) statusEl.textContent='❌ 이미지 로드 실패'; };
  img.src = url;
}

function _nativeCamJsQR(cv, cw, ch, statusEl, fallback){
  if(!window.jsQR){ if(statusEl) statusEl.textContent='❌ jsQR 미로드'; if(fallback) fallback(); return; }
  var cv2=document.createElement('canvas'), ctx2=cv2.getContext('2d');

  // ★ v9.59: 파란 쿠팡 송장 감지 — 파란 배경 제거 후 흑백 변환
  function isBlueLabel(d){
    var px=d.data, blue=0, total=px.length/4;
    for(var i=0;i<px.length;i+=16){ // 4픽셀 샘플링
      if(px[i+2]>px[i]+40 && px[i+2]>px[i+1]+30 && px[i+2]>100) blue++;
    }
    return (blue/(total/4)) > 0.15; // 15% 이상 파란 픽셀이면 파란 송장
  }
  function removeBlue(d){
    var px=d.data;
    for(var i=0;i<px.length;i+=4){
      var r=px[i],g=px[i+1],b=px[i+2];
      if(b>r+30 && b>g+20 && b>80){
        px[i]=px[i+1]=px[i+2]=255; // 파란 배경 → 흰색
      } else {
        var gray=Math.round(r*.299+g*.587+b*.114);
        px[i]=px[i+1]=px[i+2]=(gray<128?0:255); // 나머지 → 이진화
      }
    }
    return d;
  }
  function enhance(d){ var px=d.data,len=px.length,mn=255,mx=0; for(var i=0;i<len;i+=4){var g=Math.round(px[i]*.299+px[i+1]*.587+px[i+2]*.114);px[i]=px[i+1]=px[i+2]=g;} for(var j=0;j<len;j+=4){if(px[j]<mn)mn=px[j];if(px[j]>mx)mx=px[j];} var rng=mx-mn||1; for(var k=0;k<len;k+=4){var v=Math.round((px[k]-mn)/rng*255);px[k]=px[k+1]=px[k+2]=v;} return d; }
  function scan(sx,sy,sw,sh,enh){ cv2.width=sw;cv2.height=sh; ctx2.drawImage(cv,sx,sy,sw,sh,0,0,sw,sh); var d=ctx2.getImageData(0,0,sw,sh); if(enh)enhance(d); ctx2.putImageData(d,0,0); return window.jsQR(d.data,sw,sh,{inversionAttempts:'attemptBoth'}); }
  function scanBlue(sx,sy,sw,sh){ cv2.width=sw;cv2.height=sh; ctx2.drawImage(cv,sx,sy,sw,sh,0,0,sw,sh); var d=ctx2.getImageData(0,0,sw,sh); removeBlue(d); ctx2.putImageData(d,0,0); return window.jsQR(d.data,sw,sh,{inversionAttempts:'attemptBoth'}); }

  // 파란 송장 여부 사전 감지
  cv2.width=Math.min(cw,200); cv2.height=Math.min(ch,200);
  ctx2.drawImage(cv,0,0,cw,ch,0,0,cv2.width,cv2.height);
  var _sampleData=ctx2.getImageData(0,0,cv2.width,cv2.height);
  var _isBlue=isBlueLabel(_sampleData);

  var rx=Math.floor(cw/2), cy2=Math.floor(ch*.12), cw2=Math.floor(cw*.72), ch2=Math.floor(ch*.76);
  var r;
  if(_isBlue){
    // 파란 송장: 파란 배경 제거 버전 우선
    r=scanBlue(0,0,cw,ch)||scanBlue(rx,0,cw-rx,ch)||scan(0,0,cw,ch,true)||scan(Math.floor(cw*.14),cy2,cw2,ch2,false);
  } else {
    r=scan(0,0,cw,ch,false)||scan(rx,0,cw-rx,ch,false)||scan(Math.floor(cw*.14),cy2,cw2,ch2,false)||scan(0,0,cw,ch,true);
  }
  if(r&&r.data){
    if(r.data.indexOf('V1|')===0 || r.data.indexOf('V1\t')===0){
      if(statusEl) statusEl.textContent='✅ QR 인식!'; _emerHandleScan(r.data,statusEl);
    } else if(fallback){ fallback(); }
    else { if(statusEl) statusEl.textContent='✅ QR 인식!'; _emerHandleScan(r.data,statusEl); }
  }
  else if(fallback){ fallback(); }
  else { if(statusEl) statusEl.innerHTML='❌ 인식 실패 — 다시 찍어주세요'; }
}

function emerStartScan(){
  var mo = document.getElementById('emer-scan-mo');

  var statusEl = document.getElementById('emer-scan-status');

  // ★ v9.25: QR 트래킹 오버레이 캔버스 (네이티브 카메라처럼 QR 따라다니는 박스)
  var ov = document.getElementById('emer-scan-overlay');
  if(!ov){
    ov = document.createElement('canvas');
    ov.id = 'emer-scan-overlay';
    ov.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3';
    video.parentNode.insertBefore(ov, video.nextSibling);
  }
  var octx = ov.getContext('2d');

  function syncOv(){
    ov.width = video.offsetWidth || 320;
    ov.height = video.offsetHeight || 480;
  }
  function drawGuide(){
    syncOv();
    var cw=ov.width, ch=ov.height;
    octx.clearRect(0,0,cw,ch);
    // ★ v9.25: QR만 꽉 채우도록 큰 가이드 박스 (화면의 80%)
    var pad=Math.min(cw,ch)*0.08;
    var bw=cw-pad*2, bh=bw; // 정사각형
    if(bh > ch-pad*2) bh = ch-pad*2;
    var x=pad, y=(ch-bh)/2;
    // 사방 어둡게
    octx.fillStyle='rgba(0,0,0,0.5)';
    octx.fillRect(0,0,cw,y);
    octx.fillRect(0,y+bh,cw,ch-y-bh);
    octx.fillRect(0,y,x,bh);
    octx.fillRect(x+bw,y,cw-x-bw,bh);
    // 모서리 코너 (노란색 — 눈에 잘 띔)
    var cl=28, lw=4;
    octx.strokeStyle='#FFD600'; octx.lineWidth=lw;
    [[x,y,1,1],[x+bw,y,-1,1],[x,y+bh,1,-1],[x+bw,y+bh,-1,-1]].forEach(function(p){
      octx.beginPath();
      octx.moveTo(p[0],p[1]); octx.lineTo(p[0]+p[2]*cl,p[1]);
      octx.moveTo(p[0],p[1]); octx.lineTo(p[0],p[1]+p[3]*cl);
      octx.stroke();
    });
    // 안내 텍스트
    octx.font='bold 15px sans-serif';
    octx.textAlign='center';
    octx.fillStyle='rgba(0,0,0,0.7)';
    octx.fillRect(cw/2-140, y+bh+6, 280, 28);
    octx.fillStyle='#FFD600';
    octx.fillText('QR 코드를 노란 박스에 꽉 채우세요  📦', cw/2, y+bh+24);
    octx.textAlign='start';
  }
  function drawQrBox(pts, vw, vh){
    syncOv();
    var cw=ov.width, ch=ov.height, sx=cw/vw, sy=ch/vh;
    octx.clearRect(0,0,cw,ch);
    // QR 위치에 초록 추적 박스
    octx.save();
    octx.beginPath();
    octx.moveTo(pts[0].x*sx, pts[0].y*sy);
    for(var i=1;i<pts.length;i++) octx.lineTo(pts[i].x*sx, pts[i].y*sy);
    octx.closePath();
    // 반투명 채우기
    octx.fillStyle='rgba(0,255,136,0.18)'; octx.fill();
    // 테두리
    octx.strokeStyle='#00ff88'; octx.lineWidth=3;
    octx.shadowColor='#00ff88'; octx.shadowBlur=10;
    octx.stroke();
    octx.restore();
  }

  // ★ v9.25: 스캔라인 애니메이션
  var _scanLineY = 0, _scanDir = 1, _scanAni = null;
  function _startScanline(){
    var pad=Math.min(ov.width,ov.height)*0.08;
    var bw=ov.width-pad*2, bh=bw;
    if(bh > ov.height-pad*2) bh = ov.height-pad*2;
    var x0=pad, y0=(ov.height-bh)/2; bw=bw; // x0,y0,bw 재정의
    if(_scanAni) cancelAnimationFrame(_scanAni);
    function aniTick(){
      drawGuide();
      _scanLineY += _scanDir * 2.5;
      if(_scanLineY > bw-4){ _scanDir=-1; _scanLineY=bw-4; }
      if(_scanLineY < 4){ _scanDir=1; _scanLineY=4; }
      var grad=octx.createLinearGradient(0, y0+_scanLineY-8, 0, y0+_scanLineY+8);
      grad.addColorStop(0,'rgba(0,255,136,0)');
      grad.addColorStop(0.5,'rgba(0,255,136,0.8)');
      grad.addColorStop(1,'rgba(0,255,136,0)');
      octx.fillStyle=grad;
      octx.fillRect(x0, y0+_scanLineY-8, bw, 16);
      _scanAni=requestAnimationFrame(aniTick);
    }
    _scanAni=requestAnimationFrame(aniTick);
  }
  function _stopScanline(){ if(_scanAni){ cancelAnimationFrame(_scanAni); _scanAni=null; } }

  var constraints = {
    video:{
      facingMode:{ideal:'environment'},
      width:{ideal:1280, min:640},
      height:{ideal:720, min:480},
      frameRate:{ideal:30}
    }
  };

  navigator.mediaDevices.getUserMedia(constraints)
    .catch(function(){
      return navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
    })
    .catch(function(){
      return navigator.mediaDevices.getUserMedia({video:true});
    })
    .then(function(stream){
      window._emerCamStream = stream;
      video.srcObject = stream;
      video.play();
      statusEl.innerHTML = '📦 QR 코드에 <b style="color:#FFD600">바짝</b> 가까이 — 화면 가득 채우세요';

      // ★ v9.25: getCapabilities() 체크 후 지원 기기만 autofocus 적용
      try{
        var vTrack = stream.getVideoTracks()[0];
        var caps = vTrack.getCapabilities ? vTrack.getCapabilities() : {};
        var adv = {};
        if(caps.focusMode && caps.focusMode.indexOf('continuous') >= 0) adv.focusMode = 'continuous';
        if(caps.whiteBalanceMode && caps.whiteBalanceMode.indexOf('continuous') >= 0) adv.whiteBalanceMode = 'continuous';
        if(caps.exposureMode && caps.exposureMode.indexOf('continuous') >= 0) adv.exposureMode = 'continuous';
        if(Object.keys(adv).length > 0) vTrack.applyConstraints({advanced:[adv]}).catch(function(){});
      }catch(e){}

      video.addEventListener('loadedmetadata', function(){
        syncOv(); _startScanline();
      }, {once:true});
      setTimeout(function(){ syncOv(); _startScanline(); }, 600);

      function _startScanLoop(){
        var _active = true;

        // ★ v9.55: BarcodeDetector 단순화 — 필터 제거, 감지 즉시 처리
        if('BarcodeDetector' in window){
          var bd;
          try{ bd = new BarcodeDetector({formats:['qr_code','code_128','data_matrix','aztec','code_39']}); }
          catch(e){ try{ bd = new BarcodeDetector({formats:['qr_code','code_128']}); }
          catch(e2){ try{ bd = new BarcodeDetector({formats:['qr_code']}); }catch(e3){} } }

          if(bd){
            function bdTick(){
              if(!_active) return;
              if(video.readyState < 2){ requestAnimationFrame(bdTick); return; }
              // ★ v9.59: live video 대신 스냅샷 방식 (BarcodeDetector 정확도 향상)
              createImageBitmap(video).then(function(bmp){

              }).catch(function(){ return bd.detect(video); })
                .then(function(codes){
                  if(!_active) return;

                    // 가장 큰 코드 선택 (작은 것 무시)
                    var best = codes.reduce(function(a,b){
                      if(!a.cornerPoints) return b;
                      if(!b.cornerPoints) return a;
                      var aw = Math.abs(a.cornerPoints[1].x - a.cornerPoints[0].x);
                      var bw = Math.abs(b.cornerPoints[1].x - b.cornerPoints[0].x);
                      return bw > aw ? b : a;
                    });
                    if(!best.rawValue){ requestAnimationFrame(bdTick); return; }
                    // 최소 크기만 체크 (화면의 6% 이상)
                    if(best.cornerPoints && video.videoWidth){
                      var pw = Math.abs(best.cornerPoints[1].x - best.cornerPoints[0].x);
                      if(pw < video.videoWidth * 0.06){ requestAnimationFrame(bdTick); return; }
                    }
                    _active = false;
                    _stopScanline();
                    if(best.cornerPoints && video.videoWidth) drawQrBox(best.cornerPoints, video.videoWidth, video.videoHeight);
                    var _fmt = best.format||'';
                    var _isBC = (_fmt==='code_128'||_fmt==='code_39');
                    if(_isBC){
                      var _bParsed = _parseQrText(best.rawValue);
                      if(_bParsed.tracking_no || _bParsed.address){
                        statusEl.textContent = '✅ 바코드 인식!';
                        _emerHandleScan(best.rawValue, statusEl);
                      } else {
                        var _bNum = best.rawValue.replace(/[^\d]/g,'');
                        statusEl.textContent = '✅ 운송장: ' + _bNum;
                        window._emerTrackings=[_bNum]; emerRefreshTrackingList&&emerRefreshTrackingList();
                        var _i=document.getElementById('emer-tracking-inp'); if(_i)_i.value=_bNum;
                        window._emerEntryMode='barcode';
                        try{navigator.vibrate&&navigator.vibrate([80,40,80]);}catch(e){}
                        _active=true; requestAnimationFrame(bdTick);
                      }
                    } else {
                      statusEl.textContent = '✅ QR 인식!';
                      _emerHandleScan(best.rawValue, statusEl);
                    }
                    return;
                  }
                  requestAnimationFrame(bdTick);
                })
                .catch(function(){ requestAnimationFrame(bdTick); });
            }
            video.addEventListener('loadedmetadata', function(){ requestAnimationFrame(bdTick); }, {once:true});

          }

        var canvas2 = document.createElement('canvas');
        var ctx2 = canvas2.getContext('2d');
        var _trackCount2 = 0;

        // ★ v9.25: QR 크기+비율 필터 — 작은QR/바코드 차단, 정사각형만 통과
        function _isQrBigEnough(loc, sw, sh){
          if(!loc) return true;
          var w = Math.abs(loc.topRightCorner.x - loc.topLeftCorner.x);
          var h = Math.abs(loc.bottomLeftCorner.y - loc.topLeftCorner.y);
          var ratio = h > 0 ? w / h : 0;
          return (w >= sw * 0.12) && (h >= sh * 0.12) && (ratio >= 0.4 && ratio <= 2.5);
        }

        // ★ v9.47: 이미지 전처리 — 그레이스케일 + 대비 강화 (파란 송장 대응)
        function _enhanceContrast(imgData){
          var d=imgData.data, len=d.length;
          // 1. 그레이스케일 변환
          for(var i=0;i<len;i+=4){
            var g = Math.round(d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114);
            d[i]=d[i+1]=d[i+2]=g;
          }
          // 2. 히스토그램 기반 대비 스트레칭 (min~max → 0~255)
          var mn=255, mx=0;
          for(var j=0;j<len;j+=4){ if(d[j]<mn)mn=d[j]; if(d[j]>mx)mx=d[j]; }
          var range=mx-mn||1;
          for(var k=0;k<len;k+=4){
            var v=Math.round((d[k]-mn)/range*255);
            d[k]=d[k+1]=d[k+2]=v;
          }
          return imgData;
        }

        function _jsqrScan(sx,sy,sw,sh,vw,vh,enhance){
          if(!window.jsQR) return null;
          canvas2.width=sw; canvas2.height=sh;
          ctx2.drawImage(video,sx,sy,sw,sh,0,0,sw,sh);
          var d=ctx2.getImageData(0,0,sw,sh);
          if(enhance) _enhanceContrast(d);
          var r=window.jsQR(d.data,d.width,d.height,{inversionAttempts:'attemptBoth'});
          if(r && r.data){
            // 크기 필터: 작은 QR / 바코드 차단
            if(!_isQrBigEnough(r.location, sw, sh)) return null;
            if(r.location){
              var loc=r.location;
              function adj(p){ return {x:p.x+sx, y:p.y+sy}; }
              r._pts=[adj(loc.topLeftCorner),adj(loc.topRightCorner),adj(loc.bottomRightCorner),adj(loc.bottomLeftCorner)];
              r._vw=vw; r._vh=vh;
            }

          }
          return null;
        }

        function jsqrTick(){
          if(!_active) return;
          if(video.readyState < 2){ requestAnimationFrame(jsqrTick); return; }
