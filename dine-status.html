<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#07071a">
<title>테이블 현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07071a;--s1:#0c0c22;--s2:#14142a;--br:#0891b2;--tx:#f0f0ff;--t2:#9898c0;--t3:#565678;--bd:rgba(255,255,255,.07);--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
body{background:var(--bg);color:var(--tx);font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;min-height:100vh}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:16px 20px;display:flex;align-items:center;gap:12px}
.hdr-logo{font-size:18px;font-weight:900;color:#38bdf8}
.hdr-store{font-size:13px;color:var(--t2)}
.hdr-badge{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green)}
.hdr-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* 대기 현황 */
.wait-section{padding:20px;background:linear-gradient(135deg,rgba(8,145,178,.15),rgba(124,58,237,.1));border-bottom:1px solid var(--bd)}
.wait-title{font-size:12px;color:var(--t2);margin-bottom:8px;letter-spacing:1px}
.wait-num{font-size:48px;font-weight:900;color:#38bdf8;line-height:1}
.wait-sub{font-size:12px;color:var(--t2);margin-top:4px}
.wait-register{margin-top:16px}
.wait-inp{width:100%;padding:12px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:14px;margin-bottom:8px}
.wait-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0891b2,#0e7490);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.my-wait{margin-top:12px;padding:12px 16px;background:rgba(8,145,178,.12);border:1px solid rgba(8,145,178,.3);border-radius:10px;font-size:13px;text-align:center;display:none}
.my-wait-num{font-size:24px;font-weight:900;color:#38bdf8}
.cancel-btn{margin-top:8px;padding:8px 20px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#ef4444;font-size:12px;font-weight:700;cursor:pointer}

/* 테이블 현황 */
.table-section{padding:16px 20px}
.section-title{font-size:13px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.legend{display:flex;gap:12px;margin-bottom:14px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%}
.table-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tbl{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.tbl.empty{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05)}
.tbl.occupied{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05)}
.tbl.reserved{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.05)}
.tbl-icon{font-size:24px;margin-bottom:6px}
.tbl-name{font-size:12px;font-weight:700;margin-bottom:3px}
.tbl-status{font-size:10px}
.tbl.empty .tbl-status{color:var(--green)}
.tbl.occupied .tbl-status{color:var(--red)}
.tbl.reserved .tbl-status{color:var(--amber)}

/* 로딩 */
.loading{text-align:center;padding:60px 20px;color:var(--t3)}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.refresh-bar{text-align:center;padding:12px;font-size:11px;color:var(--t3)}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo" id="store-name">매장</div>
    <div class="hdr-store">테이블 · 대기 현황</div>
  </div>
  <div class="hdr-badge">
    <div class="hdr-dot"></div>
    실시간
  </div>
</div>

<!-- 대기 현황 -->
<div class="wait-section">
  <div class="wait-title">현재 대기</div>
  <div class="wait-num" id="wait-count">-</div>
  <div class="wait-sub" id="wait-sub">로딩 중...</div>

  <div class="wait-register" id="wait-register">
    <input class="wait-inp" id="wait-name" placeholder="이름">
    <input class="wait-inp" id="wait-phone" placeholder="연락처 (010-0000-0000)" type="tel">
    <input class="wait-inp" id="wait-people" placeholder="인원 수" type="number" min="1" max="20" value="2">
    <button class="wait-btn" onclick="registerWait()">📋 대기 등록</button>
  </div>

  <div class="my-wait" id="my-wait">
    <div style="font-size:12px;color:var(--t2);margin-bottom:4px">내 대기 순번</div>
    <div class="my-wait-num" id="my-wait-num">-</div>
    <div style="font-size:11px;color:var(--t2);margin-top:4px" id="my-wait-info"></div>
    <button class="cancel-btn" onclick="cancelWait()">대기 취소</button>
  </div>
</div>

<!-- 테이블 현황 -->
<div class="table-section">
  <div class="section-title">🪑 테이블 현황</div>
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:var(--green)"></div>빈 테이블</div>
    <div class="legend-item"><div class="dot" style="background:var(--red)"></div>사용 중</div>
    <div class="legend-item"><div class="dot" style="background:var(--amber)"></div>예약</div>
  </div>
  <div id="table-area"><div class="loading"><div class="spin"></div>로딩 중...</div></div>
</div>

<div class="refresh-bar" id="refresh-bar"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
  authDomain:'filo.ai.kr',
  projectId:'mbti-logistics'
});
var _db = firebase.firestore();
var _did = null;
var _slug = window.__DINE_SLUG__ || location.pathname.replace(/^\//,'').split('/')[0];
var _myWaitId = localStorage.getItem('dine_wait_'+_slug);
var _unsub = null;
var _waitUnsub = null;

// 매장 정보 로드
function init(){
  document.getElementById('store-name').textContent = window.__DINE_STORE__ || _slug;
  document.title = (window.__DINE_STORE__ || _slug) + ' · 테이블 현황';

  // dealerId 조회
  _db.collection('companies')
    .where('dineSlug','==',_slug)
    .limit(1).get()
    .then(function(snap){
      if(snap.empty){
        document.getElementById('table-area').innerHTML='<div class="loading">매장 정보를 찾을 수 없습니다.</div>';
        return;
      }
      _did = snap.docs[0].id;
      subscribeTables();
      subscribeWaiting();
      checkMyWait();
    });
}

// 테이블 실시간 구독
function subscribeTables(){
  if(_unsub) _unsub();
  _unsub = _db.collection('filo_tables')
    .where('dealerId','==',_did)
    .onSnapshot(function(snap){
      renderTables(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));
      document.getElementById('refresh-bar').textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString();
    });
}

function renderTables(tables){
  tables.sort(function(a,b){return (a.tableNum||0)-(b.tableNum||0);});
  var empty = tables.filter(function(t){return t.status==='empty';}).length;
  var area = document.getElementById('table-area');
  if(!tables.length){area.innerHTML='<div class="loading">등록된 테이블이 없습니다.</div>';return;}
  area.innerHTML='<div class="table-grid">'+tables.map(function(t){
    var cls = t.status==='occupied'?'occupied':t.status==='reserved'?'reserved':'empty';
    var label = t.status==='occupied'?'사용 중':t.status==='reserved'?'예약':' 빈 테이블';
    var icon = t.status==='occupied'?'🔴':t.status==='reserved'?'🟡':'🟢';
    return '<div class="tbl '+cls+'">'+
      '<div class="tbl-icon">🪑</div>'+
      '<div class="tbl-name">'+(t.tableName||'테이블 '+t.tableNum)+'</div>'+
      '<div class="tbl-status">'+icon+' '+label+'</div>'+
      '</div>';
  }).join('')+'</div>';

  // 대기 안내
  var waitSub = document.getElementById('wait-sub');
  if(waitSub) waitSub.textContent = '빈 테이블 '+empty+'개 / 전체 '+tables.length+'개';
}

// 대기 현황 실시간 구독
function subscribeWaiting(){
  if(_waitUnsub) _waitUnsub();
  _waitUnsub = _db.collection('dine_waiting')
    .where('dealerId','==',_did)
    .where('status','==','waiting')
    .orderBy('createdAt')
    .onSnapshot(function(snap){
      document.getElementById('wait-count').textContent = snap.size + '팀';
      checkMyWait();
    });
}

// 대기 등록
window.registerWait = function(){
  var name = document.getElementById('wait-name').value.trim();
  var phone = document.getElementById('wait-phone').value.trim();
  var people = parseInt(document.getElementById('wait-people').value)||2;
  if(!name||!phone){alert('이름과 연락처를 입력해주세요');return;}
  _db.collection('dine_waiting').add({
    dealerId:_did, name:name, phone:phone, people:people,
    status:'waiting', createdAt:new Date().toISOString()
  }).then(function(ref){
    localStorage.setItem('dine_wait_'+_slug, ref.id);
    _myWaitId = ref.id;
    document.getElementById('wait-register').style.display='none';
    checkMyWait();
  });
};

// 내 대기 확인
function checkMyWait(){
  if(!_myWaitId||!_did) return;
  _db.collection('dine_waiting')
    .where('dealerId','==',_did)
    .where('status','==','waiting')
    .orderBy('createdAt')
    .get().then(function(snap){
      var myIdx = -1;
      snap.docs.forEach(function(d,i){if(d.id===_myWaitId)myIdx=i;});
      if(myIdx>=0){
        document.getElementById('wait-register').style.display='none';
        document.getElementById('my-wait').style.display='block';
        document.getElementById('my-wait-num').textContent = (myIdx+1)+'번';
        document.getElementById('my-wait-info').textContent = '앞에 '+myIdx+'팀 대기 중';
      } else {
        localStorage.removeItem('dine_wait_'+_slug);
        _myWaitId = null;
        document.getElementById('wait-register').style.display='block';
        document.getElementById('my-wait').style.display='none';
      }
    });
}

// 대기 취소
window.cancelWait = function(){
  if(!_myWaitId) return;
  if(!confirm('대기를 취소하시겠습니까?')) return;
  _db.collection('dine_waiting').doc(_myWaitId).update({status:'cancelled'}).then(function(){
    localStorage.removeItem('dine_wait_'+_slug);
    _myWaitId = null;
    document.getElementById('wait-register').style.display='block';
    document.getElementById('my-wait').style.display='none';
  });
};

init();
</script>
</body>
</html>
