<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#185FA5">
<title>간선차 스캔 | LogiNet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Malgun Gothic',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#f0f4f8;min-height:100vh;color:#1a1a18}
.app{max-width:500px;margin:0 auto;padding:12px;padding-bottom:80px}
.topbar{background:#185FA5;color:#fff;padding:14px 16px;border-radius:12px;margin-bottom:12px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid rgba(0,0,0,.08)}
.btn{padding:11px 16px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;width:100%;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-blue{background:#185FA5;color:#fff}
.btn-green{background:#0F6E56;color:#fff}
.btn-orange{background:#f59e0b;color:#fff}
.btn-gray{background:#f0f4f8;color:#444;border:1px solid #dde3ed}
.btn-red{background:#dc2626;color:#fff}
.btn-sm{width:auto;padding:6px 12px;font-size:12px;border-radius:8px}
.field{margin-bottom:10px}
.field label{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{width:100%;padding:9px 11px;border:1.5px solid #dde3ed;border-radius:8px;font-size:13px;outline:none}
.field input:focus,.field select:focus{border-color:#185FA5}
/* 모드 탭 */
.mode-tab{display:flex;gap:0;background:#dde3ed;border-radius:10px;padding:3px;margin-bottom:12px}
.mode-btn{flex:1;padding:10px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:700;cursor:pointer;color:#888;transition:all .15s;text-align:center}
.mode-btn.on{background:#fff;color:#185FA5;box-shadow:0 1px 4px rgba(0,0,0,.12)}
/* 요약 바 */
.sum-bar{border-radius:14px;padding:16px;color:#fff;margin-bottom:10px}
.sum-bar-load{background:linear-gradient(135deg,#185FA5,#0c447c)}
.sum-bar-recv{background:linear-gradient(135deg,#0F6E56,#064e3b)}
.sum-total{font-size:52px;font-weight:900;line-height:1}
.prog-bar{background:rgba(255,255,255,.25);border-radius:100px;height:8px;margin-top:10px;overflow:hidden}
.prog-fill{background:#fff;border-radius:100px;height:100%;transition:width .3s}
/* 노선 카드 */
.route-row{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;border:1px solid #dde3ed;display:flex;align-items:center;justify-content:space-between}
.route-row.highlight{border-color:#185FA5;background:#e6f1fb}
.route-cnt{font-size:26px;font-weight:900;color:#185FA5;min-width:50px;text-align:right;line-height:1}
.route-name{font-size:14px;font-weight:700}
.route-sub{font-size:11px;color:#888;margin-top:2px}
/* 비교 테이블 */
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.cmp-tbl th{background:#f0f4f8;padding:8px;text-align:center;font-weight:700}
.cmp-tbl td{padding:8px;text-align:center;border-bottom:1px solid #f0f4f8}
.cmp-ok{color:#059669;font-weight:700}
.cmp-warn{color:#d97706;font-weight:700}
.cmp-err{color:#dc2626;font-weight:700}
/* 스캔 상태 */
.scan-status{border-radius:10px;padding:12px 14px;font-size:13px;font-weight:700;text-align:center;margin-bottom:8px;min-height:44px;display:flex;align-items:center;justify-content:center;gap:8px}
.s-idle{background:#f0f4f8;color:#888}
.s-scan{background:#dbeafe;color:#1e40af}
.s-ok{background:#d1fae5;color:#065f46}
.s-err{background:#fee2e2;color:#991b1b}
/* 결과 뱃지 */
.result-badge{border-radius:10px;padding:12px;font-size:14px;font-weight:700;text-align:center;margin-bottom:10px}
.r-ok{background:#d1fae5;color:#065f46}
.r-warn{background:#fef9c3;color:#854d0e}
.r-err{background:#fee2e2;color:#991b1b}
/* 하단 고정 버튼 */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #dde3ed;padding:10px 16px;display:flex;gap:8px;max-width:500px;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:3px solid rgba(30,64,175,.2);border-top-color:#1e40af;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="app">

<!-- 헤더 -->
<div class="topbar">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;opacity:.7">LogiNet</div>
      <div style="font-size:16px;font-weight:700">🚛 간선차 스캔 시스템</div>
    </div>
    <div style="background:rgba(255,255,255,.2);padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700">🏕 캠프 수령</div>
  </div>
</div>

<!-- 캠프 수령 전용 -->

<!-- ══════════ 캠프 수령 ══════════ -->
<div id="mode2">
  <div class="card">
    <div style="display:flex;gap:8px">
      <div class="field" style="flex:1">
        <label>내 캠프</label>
        <select id="r-camp">
          <option>부산1</option><option>부산2</option><option>부산3</option>
          <option>대구2</option><option>진주M</option>
        </select>
      </div>
      <div class="field" style="flex:1">
        <label>적재 건수 (공유받은)</label>
        <input type="number" id="r-expect" placeholder="물류센터 공유값" min="0" oninput="refreshRecv()">
      </div>
    </div>
    <div id="r-shared-info" style="display:none;background:#e6f1fb;border-radius:8px;padding:10px;font-size:12px;margin-top:4px">
      <span style="font-weight:700;color:#185FA5">📤 적재 정보:</span>
      <span id="r-shared-text"></span>
    </div>
    <button id="r-load-btn" class="btn btn-blue" style="margin-top:8px;font-size:13px;padding:10px" onclick="loadFromCenter()">🔄 물류센터 적재 정보 불러오기</button>
  </div>

  <!-- 수령 요약 -->
  <div id="truck-widget-scan" style="margin-bottom:10px"></div>
<div class="sum-bar sum-bar-recv">
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div style="font-size:11px;opacity:.7;margin-bottom:4px">수령 스캔 건수</div>
        <div class="sum-total" id="r-total">0</div>
        <div style="font-size:12px;opacity:.8;margin-top:4px" id="r-sub">적재 건수를 입력하세요</div>
      </div>
      <div style="text-align:right;font-size:12px;opacity:.8" id="r-route-cnt">노선 0종</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="r-prog" style="width:0%"></div></div>
  </div>

  <!-- 비교 결과 -->
  <div id="r-compare" style="display:none"></div>

  <!-- 스캔 상태 -->
  <div class="scan-status s-idle" id="r-status">📷 수령 박스 라벨을 촬영하세요</div>

  <!-- 촬영 버튼 -->
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <label style="flex:3;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:10px;background:#0F6E56;color:#fff;font-size:16px;font-weight:700;cursor:pointer">
      📷 라벨 촬영
      <input type="file" accept="image/*" capture="environment" id="r-input" style="display:none" onchange="doScan('recv',this)">
    </label>
    <button class="btn btn-gray" style="flex:1;font-size:13px" onclick="manualScan()">✏️ 직접</button>
    <button class="btn btn-gray" style="flex:1" onclick="undo('recv')">↩ 취소</button>
  </div>

  <!-- 노선별 비교 -->
  <div id="r-route-list">
    <div style="text-align:center;padding:20px;color:#aaa;font-size:13px">아직 스캔된 항목이 없습니다</div>
  </div>

  <!-- 완료 보고서 -->
  <button class="btn btn-green" style="margin-top:8px" onclick="showReport()">📊 수령 완료 보고서</button>
  <button class="btn btn-gray" style="margin-top:8px" onclick="shareResult()">💬 결과 공유</button>
</div>

</div><!-- /app -->

<!-- 하단 바 -->
<div class="bottom-bar" id="bottom-bar">
  <button class="btn btn-red btn-sm" style="flex:1" onclick="resetCurrent()">🗑 초기화</button>
  <button class="btn btn-gray btn-sm" style="flex:2" onclick="showReport()">📊 보고서</button>
</div>

<!-- 모달 -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;padding:16px;overflow-y:auto">
  <div style="background:#fff;border-radius:16px;padding:20px;max-width:460px;margin:0 auto">
    <div id="modal-title" style="font-size:16px;font-weight:700;margin-bottom:16px"></div>
    <div id="modal-body"></div>
    <button class="btn btn-blue" style="margin-top:16px" onclick="document.getElementById('modal').style.display='none'">닫기</button>
  </div>
</div>

<script>
(function(){
  document.addEventListener("contextmenu",function(e){e.preventDefault();});
  document.addEventListener("keydown",function(e){
    if(e.keyCode===123){e.preventDefault();return false;}
    if(e.ctrlKey&&e.shiftKey&&(e.keyCode===73||e.keyCode===74||e.keyCode===67)){e.preventDefault();return false;}
    if(e.ctrlKey&&!e.shiftKey&&e.keyCode===85){e.preventDefault();return false;}
    if(e.ctrlKey&&e.keyCode===83){e.preventDefault();return false;}
  });
})();

var _cur = 1; // 현재 모드
var _data = {
  load: { routes:{}, history:[] },  // 물류센터 적재
  recv: { routes:{}, history:[] }   // 캠프 수령
};

// 캠프 수령 전용 모드

// ── OCR + QR 스캔 ──
async function doScan(mode, input){
  if(!input.files||!input.files[0]) return;
  var file = input.files[0];
  input.value = '';
  var statusId = mode==='load'?'l-status':'r-status';
  setStatus(statusId, '<span class="spin"></span>QR 분석 중...', 's-scan');

  // QR 디코딩
  var trackingNo = await _decodeQR(file).catch(function(){return null;});

  // Claude OCR
  setStatus(statusId, '<span class="spin"></span>노선번호 OCR 중...', 's-scan');
  var ocr = {};
  try{ ocr = await _doOCR(file); }
  catch(e){ setStatus(statusId, '❌ OCR 실패: '+e.message, 's-err'); return; }

  var route = ocr.route || null;
  var camp = ocr.camp || null;

  if(!route){
    // OCR 실패 시 수동 입력 허용
    var manual = window.prompt('노선번호 자동인식 실패\n직접 입력해 주세요 (예: 812 B01)');
    if(!manual || !manual.trim()){
      setStatus(statusId, '❌ 노선번호 미인식 — 다시 촬영해 주세요', 's-err');
      return;
    }
    route = manual.trim();
  }

  // 데이터 추가
  var now = new Date();
  var t = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2)+':'+('0'+now.getSeconds()).slice(-2);
  var d = _data[mode];
  var k = route.trim();
  if(!d.routes[k]) d.routes[k] = {route:k, camp:camp||'', count:0, scans:[]};
  d.routes[k].count++;
  d.routes[k].scans.push({time:t, tracking:trackingNo||''});
  if(camp&&!d.routes[k].camp) d.routes[k].camp=camp;
  d.history.push({route:k, time:t});

  setStatus(statusId, '✅ '+k+' — '+d.routes[k].count+'건 추가됨', 's-ok');
  if(navigator.vibrate) navigator.vibrate(60);

  refreshRecv(); saveRecvToFirebase();
}

function manualScan(){
  var route = window.prompt('노선번호 입력 (예: 812 B01)');
  if(!route || !route.trim()) return;
  var camp = (document.getElementById('r-camp')||{value:''}).value||'';
  var now = new Date();
  var t = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2)+':'+('0'+now.getSeconds()).slice(-2);
  var d = _data.recv;
  var k = route.trim();
  if(!d.routes[k]) d.routes[k]={route:k,camp:camp,count:0,scans:[]};
  d.routes[k].count++;
  d.routes[k].scans.push({time:t,tracking:''});
  d.history.push({route:k,time:t});
  setStatus('r-status','✅ '+k+' — '+d.routes[k].count+'건 추가 (수동)','s-ok');
  if(navigator.vibrate)navigator.vibrate(60);
  refreshRecv();
  saveRecvToFirebase();
}

function undo(mode){
  var d=_data.recv;
  if(!d.history.length){alert('취소할 항목 없음');return;}
  var last=d.history.pop();
  var r=d.routes[last.route];
  if(r){r.count--;r.scans.pop();if(r.count<=0)delete d.routes[last.route];}
  setStatus('r-status','↩ 취소: '+last.route,'s-idle');
  refreshRecv();
}

function resetCurrent(){
  if(!confirm('초기화하시겠습니까?'))return;
  _data.recv={routes:{},history:[]};
  setStatus('r-status','📷 수령 박스 라벨을 촬영하세요','s-idle');
  refreshRecv();
}

// ── 화면 갱신 ──
function refreshLoad(){
  var d = _data.load;
  var total = Object.values(d.routes).reduce(function(s,r){return s+r.count;},0);
  var keys = Object.keys(d.routes);
  var exp = parseInt(document.getElementById('l-expect').value)||0;
  document.getElementById('l-total').textContent = total;
  document.getElementById('l-route-cnt').textContent = '노선 '+keys.length+'종';
  if(exp>0){
    var pct=Math.min(100,Math.round(total/exp*100));
    var diff=total-exp;
    document.getElementById('l-prog').style.width=pct+'%';
    document.getElementById('l-sub').textContent='예상 '+exp+'건 | '+(diff>=0?'+':'')+diff+'건 | '+pct+'%';
  } else {
    document.getElementById('l-prog').style.width='0%';
    document.getElementById('l-sub').textContent='예상 건수를 입력하세요';
  }
  renderRouteList('load', 'l-route-list');
}

function refreshRecv(){
  var d = _data.recv;
  var total = Object.values(d.routes).reduce(function(s,r){return s+r.count;},0);
  var keys = Object.keys(d.routes);
  var exp = parseInt(document.getElementById('r-expect').value)||0;
  document.getElementById('r-total').textContent = total;
  document.getElementById('r-route-cnt').textContent = '노선 '+keys.length+'종';
  // 진행률
  if(exp>0){
    var pct=Math.min(100,Math.round(total/exp*100));
    var diff=total-exp;
    document.getElementById('r-prog').style.width=pct+'%';
    document.getElementById('r-sub').textContent='적재 '+exp+'건 | '+(diff>=0?'+':'')+diff+'건 | '+pct+'%';
    // 비교 결과
    var cr=document.getElementById('r-compare');
    cr.style.display='block';
    var cls=diff===0?'r-ok':(Math.abs(diff)<=5?'r-warn':'r-err');
    var msg=diff===0?'✅ 정확히 일치! 이상 없음':(Math.abs(diff)<=5?'⚠️ '+Math.abs(diff)+'건 차이 — 확인 권장':(diff>0?'🔴 '+diff+'건 초과 수령!':'🔴 '+Math.abs(diff)+'건 미수령 — 누락 확인!'));
    cr.innerHTML='<div class="result-badge '+cls+'">'+msg+'</div>';
  } else {
    document.getElementById('r-prog').style.width='0%';
    document.getElementById('r-sub').textContent='적재 건수를 입력하세요';
    document.getElementById('r-compare').style.display='none';
  }
  renderRouteList('recv','r-route-list');
}

function renderRouteList(mode, elId){
  var d = _data[mode];
  var el = document.getElementById(elId);
  var keys = Object.keys(d.routes);
  if(!keys.length){
    el.innerHTML='<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">아직 스캔된 항목이 없습니다</div>';
    return;
  }
  keys.sort(function(a,b){return d.routes[b].count-d.routes[a].count;});
  // 캠프 수령모드: 노선별 비교 테이블 (항상 표시)
  if(mode==='recv'){
    var hasLoad = Object.keys(_data.load.routes).length>0;
    var allKeys = Array.from(new Set(
      (hasLoad?Object.keys(_data.load.routes):[]).concat(keys)
    )).sort();
    var html='<div style="font-size:11px;font-weight:700;color:#888;margin-bottom:6px">'
      +(hasLoad?'노선별 비교 (적재 vs 수령)':'수령 노선별 현황')+'</div>'
      +'<div style="overflow-x:auto"><table class="cmp-tbl">'
      +'<thead><tr>'
      +'<th style="text-align:left;padding:8px">노선</th>'
      +(hasLoad?'<th style="padding:8px">적재</th>':'')
      +'<th style="padding:8px">수령</th>'
      +(hasLoad?'<th style="padding:8px">차이</th>':'')
      +'</tr></thead><tbody>';
    if(allKeys.length===0){
      html+='<tr><td colspan="'+(hasLoad?4:2)+'" style="padding:16px;text-align:center;color:#aaa;font-size:12px">아직 스캔된 항목이 없습니다</td></tr>';
    } else {
      allKeys.forEach(function(k){
        var lc=(hasLoad&&_data.load.routes[k])?_data.load.routes[k].count:null;
        var rc=d.routes[k]?d.routes[k].count:0;
        var camp=d.routes[k]?d.routes[k].camp:(hasLoad&&_data.load.routes[k]?_data.load.routes[k].camp:'');
        var diff=lc!==null?rc-lc:null;
        var diffCls=diff===null?'':(diff===0?'cmp-ok':(Math.abs(diff)<=2?'cmp-warn':'cmp-err'));
        var diffStr=diff===null?'—':(diff===0?'✅':(diff>0?'+'+diff:''+diff));
        var rowBg=diff!==null&&diff!==0?'background:'+(diff>0?'#fef9c3':'#fee2e2'):'';;
        html+='<tr style="border-bottom:1px solid #f0f4f8;'+rowBg+'">'
          +'<td style="padding:8px;font-weight:700">'+escHtml(k)
          +(camp?'<span style="margin-left:4px;font-size:10px;color:#888;font-weight:400">'+escHtml(camp)+'</span>':'')
          +'</td>'
          +(hasLoad?'<td style="padding:8px;text-align:center">'+(lc!==null?lc:'—')+'</td>':'')
          +'<td style="padding:8px;text-align:center;font-weight:700;color:#0F6E56">'+rc+'</td>'
          +(hasLoad?'<td style="padding:8px;text-align:center;font-weight:700" class="'+diffCls+'">'+diffStr+'</td>':'')
          +'</tr>';
      });
      // 합계 행
      var lTotal=hasLoad?Object.values(_data.load.routes).reduce(function(s,r){return s+r.count;},0):null;
      var rTotal=Object.values(d.routes).reduce(function(s,r){return s+r.count;},0);
      var totalDiff=lTotal!==null?rTotal-lTotal:null;
      var totalCls=totalDiff===null?'':(totalDiff===0?'cmp-ok':(Math.abs(totalDiff)<=5?'cmp-warn':'cmp-err'));
      html+='<tr style="background:#f0f4f8;font-weight:800">'
        +'<td style="padding:8px">합계</td>'
        +(hasLoad?'<td style="padding:8px;text-align:center">'+(lTotal!==null?lTotal:'—')+'</td>':'')
        +'<td style="padding:8px;text-align:center;color:#0F6E56">'+rTotal+'</td>'
        +(hasLoad?'<td style="padding:8px;text-align:center" class="'+totalCls+'">'+(totalDiff===null?'—':(totalDiff===0?'✅':(totalDiff>0?'+'+totalDiff:''+totalDiff)))+'</td>':'')
        +'</tr>';
    }
    html+='</tbody></table></div>';
    el.innerHTML=html;
    return;
  }
  // 기본 노선 목록
  // 물류센터 모드 노선 테이블
  var html='<div style="font-size:11px;font-weight:700;color:#888;margin-bottom:6px">노선별 적재 현황</div>'
    +'<div style="overflow-x:auto"><table class="cmp-tbl">'
    +'<thead><tr><th style="text-align:left;padding:8px">노선</th><th style="padding:8px">캠프</th><th style="padding:8px;text-align:right">적재건수</th></tr></thead><tbody>';
  var total=0;
  keys.forEach(function(k){
    var r=d.routes[k];
    total+=r.count;
    html+='<tr style="border-bottom:1px solid #f0f4f8">'

// ── OCR 함수 ──
async function _decodeQR(file){
  return new Promise(function(resolve){
    var img=new Image(), url=URL.createObjectURL(file);
    img.onload=async function(){
      URL.revokeObjectURL(url);
      if('BarcodeDetector' in window){
        try{
          var bd=new BarcodeDetector({formats:['qr_code','aztec']});
          var bmp=await createImageBitmap(file);
          var codes=await bd.detect(bmp);
          bmp.close&&bmp.close();
          if(codes&&codes.length>0){resolve(codes[0].rawValue);return;}
        }catch(e){}
      }
      var max=1600,w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      var raw=cv.getContext('2d').getImageData(0,0,w,h);
      if(window.jsQR){var c=window.jsQR(raw.data,raw.width,raw.height,{inversionAttempts:'attemptBoth'});if(c&&c.data){resolve(c.data);return;}}
      resolve(null);
    };
    img.onerror=function(){URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

async function _doOCR(file){
  var AK=(window.__AK||'').trim();
  if(!AK){
    try{var _kr=await fetch('/get-label-key');var _kd=await _kr.json();AK=(_kd.k||'').trim();}catch(e){}
  }
  if(!AK) throw new Error('API 키 없음');
  var b64=await new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){res(e.target.result.split(',')[1]);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-3-5-haiku-20241022',max_tokens:150,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
        {type:'text',text:'쿠팡 배송 라벨에서 ★ 뒤 노선번호(예:812 B01, 101a)와 캠프명(예:부산2)을 추출하라.\nJSON만 반환: {"route":"...","camp":"..."}\n없으면 null. 다른 텍스트 없이 JSON만.'}
      ]}]
    })
  });
  if(!resp.ok){var e=await resp.json().catch(function(){return{};});throw new Error(JSON.stringify(e));}
  var data=await resp.json();
  var text=(data.content&&data.content[0]&&data.content[0].text)||'{}';
  try{return JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){return {};}
}

  else{var t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();cb&&cb();}
}

// ── 간선차 GPS 위젯 ──
var CAMP_COORDS={
  '부산1':{lat:35.1941,lng:129.1198},'부산2':{lat:35.1252,lng:128.9641},
  '부산3':{lat:35.0659,lng:129.0100},'대구2':{lat:35.8183,lng:128.7203},
  '진주M':{lat:35.1190,lng:128.0989}
};
var _truckTimer=null;

function _gpsDistKm(a,b,c,d){
  var R=6371,dL=(b-a)*Math.PI/180,dG=(d-c)*Math.PI/180;
  var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(b*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function refreshTruckGPS(camp, widgetId){
  if(!camp)return;
  var today=new Date().toISOString().slice(0,10).replace(/-/g,'');
  var truckId='truck_'+today+'_'+camp.replace(/\s/g,'');
  var el=document.getElementById(widgetId);
  if(!el)return;
  try{
    var resp=await fetch('/truck-get/'+encodeURIComponent(truckId));
    var data=await resp.json();
    if(!data.ok||data.empty){
      el.innerHTML='<div style="padding:10px 12px;background:#f0f4f8;border-radius:10px;font-size:12px;color:#888">🚛 간선차 GPS 미공유 상태</div>';
      return;
    }
    var updAt=data.updatedAt?new Date(data.updatedAt):null;
    var secAgo=updAt?Math.round((new Date()-updAt)/1000):9999;
    var isStale=secAgo>120;
    var tgt=CAMP_COORDS[camp];
    var dist=tgt?_gpsDistKm(data.lat,data.lng,tgt.lat,tgt.lng):null;
    var spd=data.speed||0;
    var eta=(dist&&spd>5)?Math.round(dist/spd*60):null;
    var distStr=dist?(dist<1?Math.round(dist*1000)+'m':dist.toFixed(1)+'km'):'—';
    var etaStr=data.status==='arrived'?'도착완료':(eta!==null?'약 '+eta+'분':'계산불가');
    var sColor=data.status==='arrived'?'#059669':(isStale?'#d97706':'#185FA5');
    var sIcon=data.status==='arrived'?'🏁':(isStale?'⚠️':'📡');
    var tStr=updAt?updAt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
    var tmapUrl='tmap://route?startX='+data.lng+'&startY='+data.lat+(tgt?'&goalX='+tgt.lng+'&goalY='+tgt.lat:'');
    var naverUrl='nmap://route/car?slng='+data.lng+'&slat='+data.lat+(tgt?'&dlng='+tgt.lng+'&dlat='+tgt.lat:'')+'&appname=kr.co.mbti';
    el.innerHTML=
      '<div style="background:#e6f1fb;border:1.5px solid '+(isStale?'#d97706':sColor)+';border-radius:10px;padding:12px;font-size:12px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
          '<div style="font-weight:700;color:'+sColor+'">'+sIcon+' 간선차 '+camp+'행'+(data.driver?' ('+escHtml(data.driver)+')':'')+'</div>'+
          '<div style="font-size:10px;color:#888">'+tStr+'</div>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">'+
          '<div style="background:#fff;border-radius:6px;padding:6px;text-align:center"><div style="font-size:10px;color:#888">거리</div><div style="font-size:14px;font-weight:700;color:#185FA5">'+distStr+'</div></div>'+
          '<div style="background:#fff;border-radius:6px;padding:6px;text-align:center"><div style="font-size:10px;color:#888">ETA</div><div style="font-size:14px;font-weight:700;color:'+(data.status==='arrived'?'#059669':'#185FA5')+'">'+etaStr+'</div></div>'+
          '<div style="background:#fff;border-radius:6px;padding:6px;text-align:center"><div style="font-size:10px;color:#888">속도</div><div style="font-size:14px;font-weight:700;color:#185FA5">'+Math.round(spd)+'km/h</div></div>'+
        '</div>'+
        '<div style="display:flex;gap:6px">'+
          '<a href="'+tmapUrl+'" style="flex:1;display:flex;align-items:center;justify-content:center;padding:6px;background:#1c6cd7;color:#fff;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none">🗺 T맵</a>'+
          '<a href="'+naverUrl+'" style="flex:1;display:flex;align-items:center;justify-content:center;padding:6px;background:#03C75A;color:#fff;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none">🗺 네이버</a>'+
          '<button id="gps-refresh-btn-'+widgetId+'" style="flex:1;padding:6px;background:#f0f4f8;border:1px solid #dde3ed;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">🔄 갱신</button>'+
        '</div>'+
      '</div>';
    document.getElementById('gps-refresh-btn-'+widgetId).onclick=function(){refreshTruckGPS(camp,widgetId);};
  }catch(e){
    if(el) el.innerHTML='<div style="padding:10px 12px;background:#f0f4f8;border-radius:10px;font-size:12px;color:#888">🚛 간선차 GPS 미공유 상태</div>';
  }
}

function startTruckPolling(campSelector, widgetId){
  function poll(){
    var camp=campSelector.startsWith('#')?(document.getElementById(campSelector.slice(1))||{value:''}).value:campSelector;
    if(camp)refreshTruckGPS(camp,widgetId);
  }
  poll();
  if(_truckTimer)clearInterval(_truckTimer);
  _truckTimer=setInterval(poll,30000);
}
// GPS 폴링 (캠프 수령 모드)
setTimeout(function(){startTruckPolling('#r-camp','truck-widget-scan');},1000);
