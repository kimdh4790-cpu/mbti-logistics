<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#185FA5">
<title>간선차 스캔 | LogiNet</title>
<script src="/jsQR.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Malgun Gothic',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#f0f4f8;min-height:100vh;color:#1a1a18}
.app{max-width:500px;margin:0 auto;padding:12px;padding-bottom:80px}
.topbar{background:#185FA5;color:#fff;padding:14px 16px;border-radius:12px;margin-bottom:12px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid rgba(0,0,0,.08)}
.btn{padding:11px 16px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;width:100%;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-blue{background:#185FA5;color:#fff}
.btn-green{background:#0F6E56;color:#fff}
.btn-orange{background:#f59e0b;color:#fff}
.btn-gray{background:#f0f4f8;color:#444;border:1px solid #dde3ed}
.btn-red{background:#dc2626;color:#fff}
.btn-sm{width:auto;padding:6px 12px;font-size:12px;border-radius:8px}
.field{margin-bottom:10px}
.field label{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{width:100%;padding:9px 11px;border:1.5px solid #dde3ed;border-radius:8px;font-size:13px;outline:none}
.field input:focus,.field select:focus{border-color:#185FA5}
/* 모드 탭 */
.mode-tab{display:flex;gap:0;background:#dde3ed;border-radius:10px;padding:3px;margin-bottom:12px}
.mode-btn{flex:1;padding:10px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:700;cursor:pointer;color:#888;transition:all .15s;text-align:center}
.mode-btn.on{background:#fff;color:#185FA5;box-shadow:0 1px 4px rgba(0,0,0,.12)}
/* 요약 바 */
.sum-bar{border-radius:14px;padding:16px;color:#fff;margin-bottom:10px}
.sum-bar-load{background:linear-gradient(135deg,#185FA5,#0c447c)}
.sum-bar-recv{background:linear-gradient(135deg,#0F6E56,#064e3b)}
.sum-total{font-size:52px;font-weight:900;line-height:1}
.prog-bar{background:rgba(255,255,255,.25);border-radius:100px;height:8px;margin-top:10px;overflow:hidden}
.prog-fill{background:#fff;border-radius:100px;height:100%;transition:width .3s}
/* 노선 카드 */
.route-row{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;border:1px solid #dde3ed;display:flex;align-items:center;justify-content:space-between}
.route-row.highlight{border-color:#185FA5;background:#e6f1fb}
.route-cnt{font-size:26px;font-weight:900;color:#185FA5;min-width:50px;text-align:right;line-height:1}
.route-name{font-size:14px;font-weight:700}
.route-sub{font-size:11px;color:#888;margin-top:2px}
/* 비교 테이블 */
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.cmp-tbl th{background:#f0f4f8;padding:8px;text-align:center;font-weight:700}
.cmp-tbl td{padding:8px;text-align:center;border-bottom:1px solid #f0f4f8}
.cmp-ok{color:#059669;font-weight:700}
.cmp-warn{color:#d97706;font-weight:700}
.cmp-err{color:#dc2626;font-weight:700}
/* 스캔 상태 */
.scan-status{border-radius:10px;padding:12px 14px;font-size:13px;font-weight:700;text-align:center;margin-bottom:8px;min-height:44px;display:flex;align-items:center;justify-content:center;gap:8px}
.s-idle{background:#f0f4f8;color:#888}
.s-scan{background:#dbeafe;color:#1e40af}
.s-ok{background:#d1fae5;color:#065f46}
.s-err{background:#fee2e2;color:#991b1b}
/* 결과 뱃지 */
.result-badge{border-radius:10px;padding:12px;font-size:14px;font-weight:700;text-align:center;margin-bottom:10px}
.r-ok{background:#d1fae5;color:#065f46}
.r-warn{background:#fef9c3;color:#854d0e}
.r-err{background:#fee2e2;color:#991b1b}
/* 하단 고정 버튼 */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #dde3ed;padding:10px 16px;display:flex;gap:8px;max-width:500px;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:3px solid rgba(30,64,175,.2);border-top-color:#1e40af;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* ══ 출퇴근 QR 시스템 ══ */
.att-tab{display:flex;gap:6px;margin-bottom:14px}
.att-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:#f0f4f8;color:#888;transition:.2s}
.att-btn.on{background:linear-gradient(135deg,#0066ff,#00d4ff);color:#fff;box-shadow:0 4px 12px rgba(0,102,255,.3)}
.qr-wrap{background:#030912;border-radius:16px;padding:24px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.qr-canvas-wrap{position:relative;display:inline-block;margin:0 auto}
#att-qr-canvas{border-radius:12px;display:block}
.qr-scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00d4ff,transparent);box-shadow:0 0 10px #00d4ff;animation:scanQR 2s ease-in-out infinite;pointer-events:none}
@keyframes scanQR{0%,100%{top:10%}50%{top:90%}}
.qr-timer-wrap{display:flex;align-items:center;gap:10px;margin-top:14px;padding:10px 14px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:10px}
.qr-count-box{background:#030912;border:1px solid rgba(0,255,136,.2);border-radius:12px;padding:14px;text-align:center;margin-bottom:10px}
.att-result{border-radius:12px;padding:16px;text-align:center;margin-bottom:10px;font-size:15px;font-weight:700;display:none}
.att-ok{background:#d1fae5;color:#065f46;border:1.5px solid #6ee7b7}
.att-err{background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5}
.att-warn{background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d}
.gps-status{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;font-size:12px;font-weight:600;margin-bottom:10px}
.gps-ok-bg{background:#d1fae5;color:#065f46}
.gps-err-bg{background:#fee2e2;color:#991b1b}
.gps-check-bg{background:#dbeafe;color:#1e40af}
.att-log-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #f0f4f8;font-size:12px}
.att-in{color:#0F6E56;font-weight:700}.att-out{color:#dc2626;font-weight:700}
</style>
</head>
<body>
<div class="app">

<!-- 헤더 -->
<div class="topbar">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;opacity:.7">LogiNet</div>
      <div style="font-size:16px;font-weight:700">🚛 간선차 스캔 시스템</div>
    </div>
    <div style="background:rgba(255,255,255,.2);padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700">🏕 캠프 수령</div>
  </div>
</div>


<!-- 출퇴근 탭 버튼 (스캔 상단) -->
<div class="att-tab" id="main-tabs" style="margin-bottom:8px">
  <button class="att-btn" onclick="switchMainTab('scan')">📦 배송 스캔</button>
  <button class="att-btn on" onclick="switchMainTab('att')">🔐 출퇴근 QR</button>
</div>

<!-- 배송 스캔 섹션 (기존) -->
<div id="tab-scan" style="display:none">
<!-- 캠프 수령 전용 -->
<!-- ══════════ 캠프 수령 ══════════ -->
<div id="mode2">
  <div class="card">
    <div style="display:flex;gap:8px">
      <div class="field" style="flex:1">
        <label>내 캠프</label>
        <select id="r-camp">
          <option>부산1</option><option>부산2</option><option>부산3</option>
          <option>대구2</option><option>진주M</option>
        </select>
      </div>
      <div class="field" style="flex:1">
        <label>적재 건수 (공유받은)</label>
        <input type="number" id="r-expect" placeholder="물류센터 공유값" min="0" oninput="refreshRecv()">
      </div>
    </div>
    <div id="r-shared-info" style="display:none;background:#e6f1fb;border-radius:8px;padding:10px;font-size:12px;margin-top:4px">
      <span style="font-weight:700;color:#185FA5">📤 적재 정보:</span>
      <span id="r-shared-text"></span>
    </div>
    <button id="r-load-btn" class="btn btn-blue" style="margin-top:8px;font-size:13px;padding:10px" onclick="loadFromCenter()">🔄 물류센터 적재 정보 불러오기</button>
  </div>

  <!-- 수령 요약 -->
  <div id="truck-widget-scan" style="margin-bottom:10px"></div>
<div class="sum-bar sum-bar-recv">
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div style="font-size:11px;opacity:.7;margin-bottom:4px">수령 스캔 건수</div>
        <div class="sum-total" id="r-total">0</div>
        <div style="font-size:12px;opacity:.8;margin-top:4px" id="r-sub">적재 건수를 입력하세요</div>
      </div>
      <div style="text-align:right;font-size:12px;opacity:.8" id="r-route-cnt">노선 0종</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="r-prog" style="width:0%"></div></div>
  </div>

  <!-- 비교 결과 -->
  <div id="r-compare" style="display:none"></div>

  <!-- 스캔 상태 -->
  <div class="scan-status s-idle" id="r-status">📷 수령 박스 라벨을 촬영하세요</div>

  <!-- 촬영 버튼 -->
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <label style="flex:3;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:10px;background:#0F6E56;color:#fff;font-size:16px;font-weight:700;cursor:pointer">
      📷 라벨 촬영
      <input type="file" accept="image/*" capture="environment" id="r-input" style="display:none" onchange="doScan('recv',this)">
    </label>
    <button class="btn btn-gray" style="flex:1;font-size:13px" onclick="manualScan()">✏️ 직접</button>
    <button class="btn btn-gray" style="flex:1" onclick="undo('recv')">↩ 취소</button>
  </div>

  <!-- 노선별 비교 -->
  <div id="r-route-list">
    <div style="text-align:center;padding:20px;color:#aaa;font-size:13px">아직 스캔된 항목이 없습니다</div>
  </div>

  <!-- 완료 보고서 -->
  <button class="btn btn-green" style="margin-top:8px" onclick="showReport()">📊 수령 완료 보고서</button>
  <button class="btn btn-gray" style="margin-top:8px" onclick="shareResult()">💬 결과 공유</button>
</div>

</div><!-- /tab-scan -->

<!-- ══════════ 출퇴근 QR 시스템 ══════════ -->
<div id="tab-att">

  <!-- 관리자/기사 전환 -->
  <div style="display:flex;gap:6px;margin-bottom:12px">
    <button class="att-btn on" id="att-mode-admin" onclick="attSetMode('admin')">🖥 관리자 (QR 생성)</button>
    <button class="att-btn" id="att-mode-driver" onclick="attSetMode('driver')">📱 기사 (QR 스캔)</button>
  </div>

  <!-- ── 관리자: QR 생성 ── -->
  <div id="att-admin">
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div class="field" style="flex:1">
          <label>캠프 선택</label>
          <select id="att-camp" onchange="attGenQR()">
            <option>부산1</option><option>부산2</option><option>부산3</option>
            <option>대구2</option><option>진주M</option>
          </select>
        </div>
        <div class="field" style="flex:1">
          <label>갱신 주기</label>
          <select id="att-interval" onchange="attRestartTimer()">
            <option value="30">30초 (표준)</option>
            <option value="15">15초 (보안 강화)</option>
            <option value="60">60초</option>
          </select>
        </div>
      </div>

      <!-- QR 코드 표시 -->
      <div class="qr-wrap">
        <div style="font-size:9px;letter-spacing:3px;color:rgba(0,212,255,.6);margin-bottom:12px;font-family:monospace">DONWAY DYNAMIC QR SYSTEM</div>
        <div class="qr-canvas-wrap">
          <canvas id="att-qr-canvas" width="200" height="200"></canvas>
          <div class="qr-scan-line"></div>
        </div>
        <div style="margin-top:12px;font-size:10px;font-family:monospace;color:rgba(0,212,255,.5)" id="att-qr-token-preview">생성 중...</div>
      </div>

      <!-- 타이머 바 -->
      <div class="qr-timer-wrap">
        <div style="font-size:11px;font-family:monospace;color:#00d4ff;min-width:44px" id="att-timer">00:30</div>
        <div style="flex:1;height:6px;background:rgba(0,212,255,.1);border-radius:3px;overflow:hidden">
          <div id="att-timer-bar" style="height:100%;background:linear-gradient(90deg,#00ff88,#00d4ff);border-radius:3px;transition:width 1s linear;width:100%"></div>
        </div>
        <div style="font-size:10px;color:rgba(0,212,255,.5);font-family:monospace">갱신 대기</div>
      </div>
    </div>

    <!-- 발급 카운터 -->
    <div class="qr-count-box">
      <div style="font-size:10px;font-family:monospace;color:rgba(0,255,136,.6);letter-spacing:2px;margin-bottom:6px">QR 발급 카운트</div>
      <div style="font-size:48px;font-weight:900;font-family:monospace;color:#00ff88;line-height:1" id="att-qr-count">0</div>
      <div style="font-size:11px;color:#5a7299;margin-top:4px">총 발급 횟수</div>
      <div style="font-size:9px;font-family:monospace;color:rgba(0,255,136,.4);margin-top:8px" id="att-last-scan">마지막 스캔: -</div>
    </div>

    <!-- 오늘 출퇴근 현황 -->
    <div class="card">
      <div style="font-size:12px;font-weight:700;color:#185FA5;margin-bottom:10px">📋 오늘 출퇴근 현황 <button onclick="loadAttLog()" style="float:right;padding:3px 8px;font-size:10px;background:#e6f1fb;border:none;border-radius:6px;cursor:pointer">새로고침</button></div>
      <div id="att-log-list"><div style="text-align:center;padding:16px;color:#aaa;font-size:12px">로딩 중...</div></div>
    </div>
  </div>

  <!-- ── 기사: QR 스캔 + GPS ── -->
  <div id="att-driver" style="display:none">
    <div class="card" style="margin-bottom:10px">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:#185FA5">📱 출퇴근 QR 스캔</div>

      <!-- GPS 상태 -->
      <div class="gps-status gps-check-bg" id="drv-gps-status">
        <span>📍</span><span id="drv-gps-text">GPS 위치 확인 중...</span>
      </div>

      <!-- 스캔 유형 -->
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button id="att-in-btn" onclick="attSetType('in')" style="flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#0F6E56,#059669);color:#fff">🟢 출근</button>
        <button id="att-out-btn" onclick="attSetType('out')" style="flex:1;padding:12px;border-radius:10px;border:2px solid #dde3ed;font-size:14px;font-weight:700;cursor:pointer;background:#fff;color:#888">🔴 퇴근</button>
      </div>

      <!-- 카메라 스캔 -->
      <label style="display:flex;align-items:center;justify-content:center;gap:10px;padding:18px;border-radius:12px;background:linear-gradient(135deg,#0066ff,#00d4ff);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px">
        📷 QR 코드 스캔
        <input type="file" accept="image/*" capture="environment" style="display:none" id="drv-qr-input" onchange="drvScanQR(this)">
      </label>

      <!-- 결과 -->
      <div class="att-result att-ok" id="drv-result"></div>

      <!-- 스캔 상태 -->
      <div class="scan-status s-idle" id="drv-status">QR을 촬영하면 자동으로 인증됩니다</div>
    </div>

    <!-- 내 출퇴근 기록 -->
    <div class="card">
      <div style="font-size:12px;font-weight:700;color:#185FA5;margin-bottom:10px">📋 내 출퇴근 기록 (오늘)</div>
      <div id="drv-log-list"><div style="text-align:center;padding:12px;color:#aaa;font-size:12px">기록 없음</div></div>
    </div>
  </div>

</div><!-- /tab-att -->

</div><!-- /app -->

<!-- 하단 바 -->
<div class="bottom-bar" id="bottom-bar">
  <button class="btn btn-red btn-sm" style="flex:1" onclick="resetCurrent()">🗑 초기화</button>
  <button class="btn btn-gray btn-sm" style="flex:2" onclick="showReport()">📊 보고서</button>
</div>

<!-- 모달 -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;padding:16px;overflow-y:auto">
  <div style="background:#fff;border-radius:16px;padding:20px;max-width:460px;margin:0 auto">
    <div id="modal-title" style="font-size:16px;font-weight:700;margin-bottom:16px"></div>
    <div id="modal-body"></div>
    <button class="btn btn-blue" style="margin-top:16px" onclick="document.getElementById('modal').style.display='none'">닫기</button>
  </div>
</div>

<script>
(function(){
  document.addEventListener("contextmenu",function(e){e.preventDefault();});
  document.addEventListener("keydown",function(e){
    if(e.keyCode===123){e.preventDefault();return false;}
    if(e.ctrlKey&&e.shiftKey&&(e.keyCode===73||e.keyCode===74||e.keyCode===67)){e.preventDefault();return false;}
    if(e.ctrlKey&&!e.shiftKey&&e.keyCode===85){e.preventDefault();return false;}
    if(e.ctrlKey&&e.keyCode===83){e.preventDefault();return false;}
  });
})();

var _cur = 1; // 현재 모드
var _data = {
  load: { routes:{}, history:[] },  // 물류센터 적재
  recv: { routes:{}, history:[] }   // 캠프 수령
};

// 캠프 수령 전용 모드

// ── OCR + QR 스캔 ──
async function doScan(mode, input){
  if(!input.files||!input.files[0]) return;
  var file = input.files[0];
  input.value = '';
  var statusId = mode==='load'?'l-status':'r-status';
  setStatus(statusId, '<span class="spin"></span>QR 분석 중...', 's-scan');

  // QR 디코딩
  var trackingNo = await _decodeQR(file).catch(function(){return null;});

  // Claude OCR
  setStatus(statusId, '<span class="spin"></span>노선번호 OCR 중...', 's-scan');
  var ocr = {};
  try{ ocr = await _doOCR(file); }
  catch(e){ setStatus(statusId, '❌ OCR 실패: '+e.message, 's-err'); return; }

  var route = ocr.route || null;
  var camp = ocr.camp || null;

  if(!route){
    // OCR 실패 시 수동 입력 허용
    var manual = window.prompt('노선번호 자동인식 실패\n직접 입력해 주세요 (예: 812 B01)');
    if(!manual || !manual.trim()){
      setStatus(statusId, '❌ 노선번호 미인식 — 다시 촬영해 주세요', 's-err');
      return;
    }
    route = manual.trim();
  }

  // 데이터 추가
  var now = new Date();
  var t = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2)+':'+('0'+now.getSeconds()).slice(-2);
  var d = _data[mode];
  var k = route.trim();
  if(!d.routes[k]) d.routes[k] = {route:k, camp:camp||'', count:0, scans:[]};
  d.routes[k].count++;
  d.routes[k].scans.push({time:t, tracking:trackingNo||''});
  if(camp&&!d.routes[k].camp) d.routes[k].camp=camp;
  d.history.push({route:k, time:t});

  setStatus(statusId, '✅ '+k+' — '+d.routes[k].count+'건 추가됨', 's-ok');
  if(navigator.vibrate) navigator.vibrate(60);

  refreshRecv(); saveRecvToFirebase();
}

function manualScan(){
  var route = window.prompt('노선번호 입력 (예: 812 B01)');
  if(!route || !route.trim()) return;
  var camp = (document.getElementById('r-camp')||{value:''}).value||'';
  var now = new Date();
  var t = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2)+':'+('0'+now.getSeconds()).slice(-2);
  var d = _data.recv;
  var k = route.trim();
  if(!d.routes[k]) d.routes[k]={route:k,camp:camp,count:0,scans:[]};
  d.routes[k].count++;
  d.routes[k].scans.push({time:t,tracking:''});
  d.history.push({route:k,time:t});
  setStatus('r-status','✅ '+k+' — '+d.routes[k].count+'건 추가 (수동)','s-ok');
  if(navigator.vibrate)navigator.vibrate(60);
  refreshRecv();
  saveRecvToFirebase();
}

function undo(mode){
  var d=_data.recv;
  if(!d.history.length){alert('취소할 항목 없음');return;}
  var last=d.history.pop();
  var r=d.routes[last.route];
  if(r){r.count--;r.scans.pop();if(r.count<=0)delete d.routes[last.route];}
  setStatus('r-status','↩ 취소: '+last.route,'s-idle');
  refreshRecv();
}

function resetCurrent(){
  if(!confirm('초기화하시겠습니까?'))return;
  _data.recv={routes:{},history:[]};

// ── OCR 함수 ──
async function _decodeQR(file){
  return new Promise(function(resolve){
    var img=new Image(), url=URL.createObjectURL(file);
    img.onload=async function(){
      URL.revokeObjectURL(url);
      if('BarcodeDetector' in window){
        try{
          var bd=new BarcodeDetector({formats:['qr_code','aztec']});
          var bmp=await createImageBitmap(file);
          var codes=await bd.detect(bmp);
          bmp.close&&bmp.close();
          if(codes&&codes.length>0){resolve(codes[0].rawValue);return;}
        }catch(e){}
      }
      var max=1600,w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      var raw=cv.getContext('2d').getImageData(0,0,w,h);
      if(window.jsQR){var c=window.jsQR(raw.data,raw.width,raw.height,{inversionAttempts:'attemptBoth'});if(c&&c.data){resolve(c.data);return;}}
      resolve(null);
    };
    img.onerror=function(){URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

async function _doOCR(file){
  // 브라우저 직접 Anthropic 호출 (settle.html과 동일 방식)
  var b64=await new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){res(e.target.result.split(',')[1]);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
  // API 키 서버에서 가져오기
  var keyResp=await fetch('/get-label-key');
  var keyData=await keyResp.json();
  var AK=(keyData.k||'').trim();
  if(!AK) throw new Error('API 키 없음');

  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':AK,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-5',max_tokens:200,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
        {type:'text',text:'택배 운송장 라벨에서 라우트 코드만 추출하세요. 예: 508B, 213A, 109C 형태. JSON으로만 답하세요: {"route":"코드"}'}
      ]}]
    })
  });
  if(!resp.ok){var ed=await resp.json().catch(()=>({}));throw new Error(ed.error?.message||resp.status);}
  var data=await resp.json();
  if(data.error) throw new Error(data.error.message);
  var text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  var m=text.match(/\{[\s\S]+\}/);
  if(!m) return null;
  try{return JSON.parse(m[0]);}catch(e){return null;}
}

function _gpsDistKm(a,b,c,d){
  var R=6371,dL=(b-a)*Math.PI/180,dG=(d-c)*Math.PI/180;
  var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(b*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ██ QR 생성 (관리자) ██
// ══════════════════════
function attRestartTimer(){
  _attInterval=parseInt(document.getElementById('att-interval').value)||30;
  _attTimerSec=_attInterval;
  attGenQR();
}

function _genQRToken(camp){
  var windowId=Math.floor(Date.now()/(_attInterval*1000));
  var payload=_attCompany+':'+camp+':'+windowId+':'+_attInterval;
  // 간단 해시 (HMAC 대용)
  var hash=_simpleHash(payload+_attSecret);
  // btoa는 Latin1만 지원 → UTF-8 safe 인코딩
  var safeStr = encodeURIComponent(payload+':'+hash).replace(/%([0-9A-F]{2})/g,function(_,p){return String.fromCharCode(parseInt(p,16));});
  return 'DONWAY:'+btoa(safeStr).replace(/=/g,'');
}
function _simpleHash(str){
  var h=0;
  for(var i=0;i<str.length;i++){h=Math.imul(31,h)+str.charCodeAt(i)|0;}
  return Math.abs(h).toString(36).toUpperCase().slice(0,8);
}
function _parseQRToken(token){
  if(!token||!token.startsWith('DONWAY:'))return null;
  try{
    var b64 = token.slice(7)+'==';
    var decoded = decodeURIComponent(atob(b64).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));
    var parts=decoded.split(':');
    if(parts.length<5)return null;
    return{company:parts[0],camp:parts[1],windowId:parseInt(parts[2]),interval:parseInt(parts[3]),hash:parts[4]};
  }catch(e){return null;}
}
function _verifyQRToken(token,drvGPS,campGPS){
  var p=_parseQRToken(token);
  if(!p)return{ok:false,reason:'유효하지 않은 QR 코드입니다'};
  var interval=p.interval||30;
  var now=Math.floor(Date.now()/(interval*1000));
  // 현재 또는 이전 윈도우 허용
  if(p.windowId!==now&&p.windowId!==now-1)
    return{ok:false,reason:'QR이 만료되었습니다 ('+interval+'초 이내 갱신 필요)'};
  // 해시 검증
  var payload=p.company+':'+p.camp+':'+p.windowId+':'+interval;
  var expectedHash=_simpleHash(payload+_attSecret);
  if(p.hash!==expectedHash)
    return{ok:false,reason:'QR 위변조가 감지되었습니다'};
  // GPS 검증
  if(drvGPS&&drvGPS.lat&&campGPS&&campGPS.lat){
    var dist=_gpsDistM(drvGPS.lat,drvGPS.lng,campGPS.lat,campGPS.lng);
    if(dist>300)
      return{ok:false,reason:'위치 불일치 (현재: 캠프에서 '+Math.round(dist)+'m 거리)'};
  }
  return{ok:true,camp:p.camp,windowId:p.windowId};
}
function _gpsDistM(lat1,lng1,lat2,lng2){
  var R=6371000,d2r=Math.PI/180;
  var dlat=(lat2-lat1)*d2r,dlng=(lng2-lng1)*d2r;
  var a=Math.sin(dlat/2)*Math.sin(dlat/2)+Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dlng/2)*Math.sin(dlng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function attGenQR(){

// QR Canvas 그리기 (순수 JS, 라이브러리 없음)
function _drawQR(text){
  var canvas=document.getElementById('att-qr-canvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var size=200;
  ctx.fillStyle='#030912'; ctx.fillRect(0,0,size,size);
  // jsQR 라이브러리로 생성 불가 → QRCode 라이브러리 필요
  // 대신 시각적 QR 시뮬레이션 (실제 스캔 가능한 QR은 qrcode.js 필요)
  _drawVisualQR(ctx,text,size);
}
function _drawVisualQR(ctx,text,size){
  var cells=_makeQRMatrix(text);
  var n=cells.length;
  var cell=size/n;
  for(var r=0;r<n;r++){
    for(var c=0;c<n;c++){
      ctx.fillStyle=cells[r][c]?'#00d4ff':'#030912';
      ctx.fillRect(c*cell+1,r*cell+1,cell-1,cell-1);
    }
  }
  // 모서리 정렬자 (고정 패턴)
  function drawFinder(x,y){
    ctx.fillStyle='#00d4ff';ctx.fillRect(x*cell,y*cell,7*cell,7*cell);
    ctx.fillStyle='#030912';ctx.fillRect((x+1)*cell,(y+1)*cell,5*cell,5*cell);
    ctx.fillStyle='#00d4ff';ctx.fillRect((x+2)*cell,(y+2)*cell,3*cell,3*cell);
  }
  drawFinder(0,0);drawFinder(n-7,0);drawFinder(0,n-7);
}
function _makeQRMatrix(text){
  // 텍스트 기반 결정론적 패턴 생성 (시각적 표현용)
  var seed=0;for(var i=0;i<text.length;i++)seed=(seed*31+text.charCodeAt(i))&0xffffffff;
  var n=25;var cells=[];
  for(var r=0;r<n;r++){
    cells[r]=[];
    for(var c=0;c<n;c++){
      // 결정론적 패턴
      var v=(seed^(r*73+c*37)^(r^c)*19)&1;
      cells[r][c]=!!v;
    }
  }
  return cells;
}

function startDrvGPS(){
  if(!navigator.geolocation){
    _updateGPSStatus(false,'GPS를 지원하지 않는 기기입니다');return;
  }
  _updateGPSStatus(null,'GPS 위치 확인 중...');
  navigator.geolocation.watchPosition(
    function(pos){
      _drvGPS={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy};
      _updateGPSStatus(true,'위치 확인 ✓ (정확도: '+Math.round(pos.coords.accuracy)+'m)');
    },
    function(err){
      _updateGPSStatus(false,'GPS 오류: '+(['','허용 거부','위치 없음','타임아웃'][err.code]||err.message));
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:5000}
  );
}
function _updateGPSStatus(ok,msg){
  var el=document.getElementById('drv-gps-status');
  var tel=document.getElementById('drv-gps-text');
  if(!el)return;
  el.className='gps-status '+(ok===true?'gps-ok-bg':ok===false?'gps-err-bg':'gps-check-bg');
  if(tel)tel.textContent=msg;
}

function drvScanQR(input){
  var file=input.files[0];
  if(!file)return;
  var statusEl=document.getElementById('drv-status');
  var resultEl=document.getElementById('drv-result');
  if(statusEl){statusEl.className='scan-status s-scan';statusEl.textContent='QR 분석 중...';}
  if(resultEl)resultEl.style.display='none';

  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      canvas.width=img.width;canvas.height=img.height;
      var ctx=canvas.getContext('2d');ctx.drawImage(img,0,0);
      var imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
      var qr=null;
      if(typeof jsQR!=='undefined'){
        qr=jsQR(imageData.data,imageData.width,imageData.height);
      }
      if(qr&&qr.data){
        _processAttQR(qr.data,statusEl,resultEl);
      } else {
        if(statusEl){statusEl.className='scan-status s-err';statusEl.textContent='QR을 인식하지 못했습니다. 다시 시도하세요.';}
      }
      input.value='';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function _processAttQR(tokenData,statusEl,resultEl){
  // 캠프 GPS 좌표 (실제 운영 시 Firestore에서 로드)
  var campGPS={
    '부산1':{lat:35.1580,lng:129.1170},'부산2':{lat:35.1652,lng:129.0560},
    '부산3':{lat:35.1900,lng:129.0800},'대구2':{lat:35.8714,lng:128.6014},
    '진주M':{lat:35.1797,lng:128.1077}
  };
  var p=_parseQRToken(tokenData);
  var cGPS=p&&campGPS[p.camp]?campGPS[p.camp]:null;
  var verify=_verifyQRToken(tokenData,_drvGPS,cGPS);

  if(!verify.ok){
    if(statusEl){statusEl.className='scan-status s-err';statusEl.textContent='❌ '+verify.reason;}
    if(resultEl){resultEl.className='att-result att-err';resultEl.textContent='❌ 인증 실패: '+verify.reason;resultEl.style.display='block';}
    return;
  }

  // 인증 성공 → Firestore 기록
  var now=new Date();
  var todayStr=now.toISOString().slice(0,10);
  var timeStr=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var type=_attType;
  var camp=verify.camp;
  var userName=(typeof _CU!=='undefined'&&_CU&&(_CU.name||_CU.email))||'기사';

  var record={
    type:type,camp:camp,name:userName,
    lat:_drvGPS.lat||0,lng:_drvGPS.lng||0,
    gpsAcc:_drvGPS.acc||0,
    date:todayStr,time:timeStr,
    timestamp:now.toISOString(),
    dealerId:(typeof _CU!=='undefined'&&_CU&&_CU.dealerId)||_attCompany
  };

  if(_attDB){
    _attDB.collection('attendance').add(record)
      .then(function(){
        if(statusEl){statusEl.className='scan-status s-ok';statusEl.textContent='✅ '+(type==='in'?'출근':'퇴근')+' 인증 완료!';}
        if(resultEl){
          resultEl.className='att-result att-ok';
          resultEl.innerHTML='✅ '+(type==='in'?'🟢 출근':'🔴 퇴근')+' 완료<br><span style="font-size:12px;font-weight:400">'+camp+' · '+timeStr+'</span>';
          resultEl.style.display='block';
        }
        loadDrvLog(userName,todayStr);
        // 관리자 측 마지막 스캔 갱신
        var lastEl=document.getElementById('att-last-scan');
        if(lastEl)lastEl.textContent='마지막 스캔: '+userName+' '+timeStr;
      }).catch(function(e){
        if(statusEl){statusEl.className='scan-status s-err';statusEl.textContent='❌ 저장 실패: '+e.message;}
      });
  } else {
    if(statusEl){statusEl.className='scan-status s-ok';statusEl.textContent='✅ '+(type==='in'?'출근':'퇴근')+' 완료 (오프라인)';}
    if(resultEl){resultEl.className='att-result att-ok';resultEl.innerHTML='✅ '+(type==='in'?'🟢 출근':'🔴 퇴근')+'<br>'+timeStr;resultEl.style.display='block';}
  }
}

// ── 출퇴근 기록 조회 (관리자) ──
function loadAttLog(){
  var listEl=document.getElementById('att-log-list');
  if(!listEl)return;
  if(!_attDB){listEl.innerHTML='<div style="text-align:center;padding:12px;color:#aaa;font-size:12px">Firebase 연결 중...</div>';return;}
  var today=new Date().toISOString().slice(0,10);
  _attDB.collection('attendance').where('date','==',today)
    .orderBy('timestamp','desc').limit(50)
    .get().then(function(snap){
      if(snap.empty){listEl.innerHTML='<div style="text-align:center;padding:12px;color:#aaa;font-size:12px">오늘 기록 없음</div>';return;}
      listEl.innerHTML=snap.docs.map(function(doc){
        var d=doc.data();
        return '<div class="att-log-row">'
          +'<div><div style="font-weight:700;font-size:13px">'+escHtml(d.name||'')+'</div>'
          +'<div style="font-size:10px;color:#888">'+escHtml(d.camp||'')+' · GPS '+(d.gpsAcc?'±'+Math.round(d.gpsAcc)+'m':'없음')+'</div></div>'
          +'<div class="'+( d.type==='in'?'att-in':'att-out')+'">'+( d.type==='in'?'🟢 출근':'🔴 퇴근')+'<div style="font-size:10px;font-weight:400;color:#888">'+escHtml(d.time||'')+'</div></div>'
          +'</div>';
      }).join('');
    }).catch(function(e){listEl.innerHTML='<div style="text-align:center;padding:12px;color:#aaa;font-size:12px">로드 실패: '+e.message+'</div>';});
}

// ── 내 출퇴근 기록 (기사) ──
function loadDrvLog(name,date){
  var listEl=document.getElementById('drv-log-list');
  if(!listEl||!_attDB)return;
  _attDB.collection('attendance').where('date','==',date).where('name','==',name)
    .orderBy('timestamp','asc').get().then(function(snap){
      if(snap.empty){listEl.innerHTML='<div style="text-align:center;padding:8px;color:#aaa;font-size:12px">기록 없음</div>';return;}
      listEl.innerHTML=snap.docs.map(function(doc){
        var d=doc.data();
        return '<div class="att-log-row">'
          +'<div class="'+( d.type==='in'?'att-in':'att-out')+'">'+( d.type==='in'?'🟢 출근':'🔴 퇴근')+'</div>'
          +'<div style="font-size:12px;color:#888">'+escHtml(d.time||'')+'</div>'
          +'<div style="font-size:11px;color:#aaa">'+escHtml(d.camp||'')+'</div>'
          +'</div>';
      }).join('');
    }).catch(function(){});
}



// 초기 탭: 배송 스캔 숨기고 출퇴근 탭 표시
document.addEventListener('DOMContentLoaded',function(){
  switchMainTab('att');
  attSetMode('admin');
  loadAttLog();
});

</div>
<script>
// ★ mbtico.kr 구독 체크
function _checkMbticoSub(db, uid, email, cb){

  if(SA.indexOf(email)>=0){cb(true);return;}

    if(!snap.exists){cb(false);return;}

<script>
// ════════════════════════════════════════
// ★ scan.html 고도화
// ① 연속 스캔 카운터 (진동 피드백)
// ② 라우트별 건수 통계 실시간
// ③ DONWAY 정산 건수 자동 전송
// ════════════════════════════════════════

var _scanCount = 0;
var _scanSession = [];
var _scanStartTime = null;

// 연속 스캔 세션 시작
function _startScanSession() {
  _scanCount = 0;
  _scanSession = [];
  _scanStartTime = new Date();
  var el = document.getElementById('scan-session-bar');
  if(el) el.style.display = 'block';
  _updateSessionBar();
}

// 세션 바 업데이트
function _updateSessionBar() {
  var el = document.getElementById('scan-session-cnt');
  if(el) el.textContent = _scanCount;
  var timeEl = document.getElementById('scan-session-time');
  if(timeEl && _scanStartTime) {
    var sec = Math.floor((Date.now() - _scanStartTime.getTime()) / 1000);
    timeEl.textContent = Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0');
  }
}

// 스캔 성공 시 진동 + 카운터 증가
function _onScanSuccess(barcode, routeName) {
  _scanCount++;
  _scanSession.push({ barcode: barcode, route: routeName, at: new Date().toISOString() });
  _updateSessionBar();
  // 진동 피드백
  if(navigator.vibrate) navigator.vibrate(50);
  // 50건마다 강한 진동
  if(_scanCount % 50 === 0) {
    if(navigator.vibrate) navigator.vibrate([100,50,100]);
    toast('📦 ' + _scanCount + '건 스캔 완료!');
  }
}

// DONWAY 정산 건수 전송
function _sendScanToDonway() {
  if(!_scanSession.length) { toast('스캔 데이터 없음'); return; }
  var did = typeof _did !== 'undefined' ? _did : '';
  if(!did) { toast('로그인 필요'); return; }

  var today = new Date().toISOString().slice(0,10);
  var ym = today.slice(0,7);

  // 라우트별 집계
  var byRoute = {};
  _scanSession.forEach(function(s) {
    var r = s.route || '미분류';
    if(!byRoute[r]) byRoute[r] = 0;
    byRoute[r]++;
  });

  // Firestore에 스캔 결과 저장
  var db = typeof _db !== 'undefined' ? _db : (typeof firebase !== 'undefined' ? firebase.firestore() : null);
  if(!db) { toast('DB 연결 오류'); return; }

  db.collection('scan_results').add({
    dealerId: did,
    date: today, ym: ym,
    totalCount: _scanSession.length,
    byRoute: byRoute,
    session: _scanSession.slice(0, 500), // 최대 500건
    sentAt: new Date().toISOString()
  }).then(function() {
    toast('✅ ' + _scanSession.length + '건 → DONWAY 전송 완료');
    // 세션 초기화
    _scanCount = 0;
    _scanSession = [];
    _scanStartTime = null;
    _updateSessionBar();
  }).catch(function(e) { toast('❌ ' + e.message); });
}

// 라우트별 건수 통계 로드
function _loadScanStats() {
  var did = typeof _did !== 'undefined' ? _did : '';
  if(!did) return;
  var db = typeof _db !== 'undefined' ? _db : (typeof firebase !== 'undefined' ? firebase.firestore() : null);
  if(!db) return;

  var today = new Date().toISOString().slice(0,10);
  db.collection('scan_results').where('dealerId','==',did).where('date','==',today)
    .get().then(function(snap) {
      var el = document.getElementById('scan-stats-today');
      if(!el) return;
      if(snap.empty) { el.innerHTML = '<div style="color:#94a3b8;font-size:12px;text-align:center;padding:8px">오늘 스캔 기록 없음</div>'; return; }

      var totalToday = 0;
      var byRoute = {};
      snap.forEach(function(d) {
        var v = d.data();
        totalToday += v.totalCount || 0;
        Object.keys(v.byRoute || {}).forEach(function(r) {
          byRoute[r] = (byRoute[r]||0) + (v.byRoute[r]||0);
        });
      });

      var sorted = Object.entries(byRoute).sort(function(a,b){return b[1]-a[1];});
      el.innerHTML =
        '<div style="font-size:11px;color:#94a3b8;margin-bottom:6px">오늘 총 <strong style="color:#00d4ff;font-size:14px">' + totalToday + '건</strong></div>' +
        sorted.map(function(e) {
          var pct = totalToday ? Math.round(e[1]/totalToday*100) : 0;
          return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
            '<span style="font-size:12px">' + e[0] + '</span>' +
            '<div style="display:flex;align-items:center;gap:6px">' +
              '<div style="width:60px;height:4px;background:rgba(255,255,255,.1);border-radius:2px"><div style="width:'+pct+'%;height:100%;background:#0066ff;border-radius:2px"></div></div>' +
              '<span style="font-size:12px;font-weight:700;color:#00d4ff;min-width:28px;text-align:right">' + e[1] + '건</span>' +
            '</div>' +
          '</div>';
        }).join('');
    });
}

// 세션 바 HTML 주입
(function() {
  var bar = document.createElement('div');
  bar.id = 'scan-session-bar';
  bar.style.cssText = 'display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#185FA5,#0c447c);padding:10px 16px;z-index:999;max-width:500px;margin:0 auto';
  bar.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<div style="color:#fff">' +
        '<span style="font-size:20px;font-weight:900" id="scan-session-cnt">0</span>' +
        '<span style="font-size:12px;margin-left:4px">건 스캔</span>' +
        '<span style="font-size:11px;color:rgba(255,255,255,.6);margin-left:8px" id="scan-session-time">0:00</span>' +
      '</div>' +
      '<button onclick="_sendScanToDonway()" style="padding:7px 14px;background:#00d4ff;color:#0c447c;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer">DONWAY 전송 →</button>' +
    '</div>';
  document.body.appendChild(bar);

  // 통계 패널 주입
  setTimeout(function() {
    var app = document.querySelector('.app');
    if(!app) return;
    var statsDiv = document.createElement('div');
    statsDiv.className = 'card';
    statsDiv.style.marginBottom = '10px';
    statsDiv.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
        '<div style="font-size:13px;font-weight:800">📊 오늘 스캔 현황</div>' +
        '<button onclick="_loadScanStats()" style="padding:4px 10px;background:#185FA5;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer">새로고침</button>' +
      '</div>' +
      '<div id="scan-stats-today"><div style="color:#94a3b8;font-size:12px;text-align:center;padding:8px">로딩 중...</div></div>';
    app.insertBefore(statsDiv, app.firstChild);
    _loadScanStats();
  }, 800);
})();

// 기존 doScan에 훅 추가 (원본 함수 래핑)
var _origDoScan = typeof doScan !== 'undefined' ? doScan : null;
if(_origDoScan) {
  doScan = function(mode, input) {
    var result = _origDoScan.call(this, mode, input);
    if(result !== false) {
      if(!_scanStartTime) _startScanSession();
      _onScanSuccess(input, mode || '');
    }
    return result;
  };
}
</script>
