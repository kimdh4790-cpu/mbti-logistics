<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>н…Ңмқҙлё” мЈјл¬ё</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f8f8fc;--s1:#fff;--s2:#f2f2f8;--br:#0891b2;--gr:#22c55e;--rd:#ef4444;--yl:#f59e0b;--tx:#1a1a2e;--t2:#6b7280;--t3:#9ca3af;--bd:#e5e7eb;--r:12px}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;overscroll-behavior:none}

/* в”Җв”Җ н—ӨлҚ” в”Җв”Җ */
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--s1);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hdr-table{font-size:16px;font-weight:900;color:var(--tx)}
.hdr-sub{font-size:11px;color:var(--t3)}
.hdr-cart{margin-left:auto;position:relative;width:44px;height:44px;border-radius:50%;background:var(--br);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-badge{position:absolute;top:-2px;right:-2px;background:var(--rd);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;display:none}

/* в”Җв”Җ м№ҙн…Ңкі лҰ¬ нғӯ в”Җв”Җ */
#cat-tabs{position:fixed;top:69px;left:0;right:0;z-index:99;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;padding:0 12px;gap:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:10px 14px;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.cat-tab.active{color:var(--br);border-bottom-color:var(--br)}

/* в”Җв”Җ л©”лүҙ в”Җв”Җ */
#menu-wrap{padding:130px 16px 160px;overflow-y:auto;min-height:100vh}
.cat-section{margin-bottom:24px}
.cat-title{font-size:14px;font-weight:900;color:var(--t2);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--bd)}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.menu-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.menu-card:active{transform:scale(.97)}
.menu-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:40px}
.menu-info{padding:10px}
.menu-name{font-size:13px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menu-price{font-size:14px;font-weight:900;color:var(--br)}
.menu-sold{position:absolute;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--rd);border-radius:14px}
.menu-cnt{position:absolute;top:8px;right:8px;background:var(--br);color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:900;display:none}
.menu-cnt.show{display:block}

/* в”Җв”Җ мһҘл°”кө¬лӢҲ л°”н…ҖмӢңнҠё в”Җв”Җ */
#cart-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.12);transform:translateY(100%);transition:.35s cubic-bezier(.32,.72,0,1);z-index:200;max-height:80vh;display:flex;flex-direction:column}
#cart-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--bd);margin:12px auto 0}
.sheet-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.sheet-title{font-size:16px;font-weight:900}
.sheet-close{background:none;border:none;font-size:22px;color:var(--t3);cursor:pointer;line-height:1}
.cart-items{overflow-y:auto;flex:1;padding:12px 16px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.cart-item:last-child{border:none}
.ci-emoji{font-size:24px;flex-shrink:0}
.ci-name{flex:1;font-size:13px;font-weight:700}
.ci-price{font-size:13px;font-weight:900;color:var(--br)}
.ci-qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--bd);background:var(--s2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-num{font-size:14px;font-weight:900;min-width:20px;text-align:center}
.cart-footer{padding:12px 16px;border-top:1px solid var(--bd)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.total-label{font-size:14px;color:var(--t2)}
.total-val{font-size:20px;font-weight:900;color:var(--tx)}
.order-btn{width:100%;padding:16px;background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit}
.order-btn:active{transform:scale(.98)}
.order-btn:disabled{background:#ccc;cursor:not-allowed}

/* в”Җв”Җ мЈјл¬ё мҷ„лЈҢ в”Җв”Җ */
#order-done{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.done-icon{font-size:80px;margin-bottom:20px;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.done-title{font-size:24px;font-weight:900;margin-bottom:8px}
.done-sub{font-size:14px;color:var(--t2);margin-bottom:32px;line-height:1.6}
.done-table{font-size:16px;font-weight:800;color:var(--br);margin-bottom:4px}
.more-btn{padding:14px 32px;background:var(--s1);border:2px solid var(--br);border-radius:14px;color:var(--br);font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}

/* в”Җв”Җ лЎңл”© в”Җв”Җ */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400}
.loading-logo{font-size:28px;font-weight:900;color:var(--br);margin-bottom:12px}
.loading-txt{font-size:13px;color:var(--t3)}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--br);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* в”Җв”Җ кІ°м ң л°©лІ• м„ нғқ в”Җв”Җ */
.pay-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:250;padding:0}
.pay-sheet{background:var(--s1);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px}
.pay-title{font-size:17px;font-weight:900;margin-bottom:16px;text-align:center}
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pay-btn{padding:16px;border:2px solid var(--bd);border-radius:14px;background:var(--s2);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.2s}
.pay-btn:hover,.pay-btn.sel{border-color:var(--br);background:rgba(8,145,178,.06);color:var(--br)}
.pay-confirm{width:100%;padding:16px;background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- лЎңл”© -->
<div id="loading">
 <div class="loading-logo">рҹҚҪ FILO</div>
 <div class="spinner"></div>
 <div class="loading-txt">л©”лүҙлҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>
</div>

<!-- н—ӨлҚ” -->
<div id="header" style="display:none">
 <div>
  <div class="hdr-table" id="hdr-table">н…Ңмқҙлё”</div>
  <div class="hdr-sub" id="hdr-store">л§ӨмһҘ</div>
 </div>
 <button class="hdr-cart" id="cart-btn" onclick="_openCart()">
  рҹӣ’<span class="cart-badge" id="cart-badge">0</span>
 </button>
</div>

<!-- м№ҙн…Ңкі лҰ¬ нғӯ -->
<div id="cat-tabs" style="display:none"></div>

<!-- л©”лүҙ лӘ©лЎқ -->
<div id="menu-wrap" style="display:none"></div>

<!-- мһҘл°”кө¬лӢҲ л°”н…ҖмӢңнҠё -->
<div id="cart-sheet">
 <div class="sheet-handle"></div>
 <div class="sheet-header">
  <div class="sheet-title">рҹӣ’ мһҘл°”кө¬лӢҲ</div>
  <button class="sheet-close" onclick="_closeCart()">вң•</button>
 </div>
 <div class="cart-items" id="cart-items"></div>
 <div class="cart-footer">
  <div class="total-row">
   <span class="total-label">н•©кі„</span>
   <span class="total-val" id="cart-total">вӮ©0</span>
  </div>
  <button class="order-btn" id="order-btn" onclick="_selectPayMethod()">мЈјл¬ён•ҳкё°</button>
 </div>
</div>

<!-- мЈјл¬ё мҷ„лЈҢ -->
<div id="order-done">
 <div class="done-icon">вң…</div>
 <div class="done-table" id="done-table"></div>
 <div class="done-title">мЈјл¬ёмқҙ м ‘мҲҳлҗҗмҠөлӢҲлӢӨ!</div>
 <div class="done-sub" id="done-sub">мһ мӢң нӣ„ мӨҖл№„н•ҙ л“ңлҰ¬кІ мҠөлӢҲлӢӨ</div>
 <button class="more-btn" onclick="_resetOrder()">+ м¶”к°Җ мЈјл¬ё</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
 apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
 authDomain:'mbti-logistics.firebaseapp.com',
 projectId:'mbti-logistics',
 storageBucket:'mbti-logistics.appspot.com',
 messagingSenderId:'862900137209',
 appId:'1:862900137209:web:filoapp'
});
var _db=firebase.firestore();
var _cart={};
var _menus=[];
var _did='',_tableNum='',_tableName='';

/* в”Җв”Җ URL нҢҢлқјлҜён„° в”Җв”Җ */
function _getParam(k){return new URLSearchParams(location.search).get(k)||'';}

/* в”Җв”Җ мҙҲкё°нҷ” в”Җв”Җ */
window.onload=function(){
 _did=_getParam('d');
 _tableNum=_getParam('t');
 _tableName=decodeURIComponent(_getParam('name')||('н…Ңмқҙлё” '+_tableNum));
 if(!_did||!_tableNum){
  document.getElementById('loading').innerHTML='<div style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:12px">вқҢ</div><div style="font-size:14px;color:#666">мһҳлӘ»лҗң QR мҪ”л“ңмһ…лӢҲлӢӨ</div></div>';
  return;
 }
 document.getElementById('hdr-table').textContent=_tableName;
 document.getElementById('done-table').textContent=_tableName;
 _loadMenus();
};

function _loadMenus(){
 // /api/menus кіөк°ң APIлЎң л©”лүҙ лЎңл“ң (Firestore Rules мҡ°нҡҢ)
 fetch('/api/menus?did='+encodeURIComponent(_did))
 .then(function(r){return r.json();})
 .then(function(data){
  var menus=data.menus||[];
  // companies м •ліҙлҸ„ лі„лҸ„ лЎңл“ң
  fetch('/api/menus?did='+encodeURIComponent(_did)+'&info=1')
  .catch(function(){return {json:function(){return {};}}; });
  _renderMenus(menus);
  // л§ӨмһҘлӘ… лЎңл“ң
  _db.collection('companies').doc(_did).get().then(function(doc){
   if(doc.exists){
    var d=doc.data();
    var el=document.getElementById('store-name');
    if(el) el.textContent=d.companyName||d.name||'л§ӨмһҘ';
   }
  }).catch(function(){});
 })
 .catch(function(e){
  document.getElementById('loading').innerHTML=
   '<div style="text-align:center;padding:40px">'+
   '<div style="font-size:40px;margin-bottom:12px">рҹҳ…</div>'+
   '<div style="font-size:14px;color:#ef4444">л©”лүҙлҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ<br><small>'+e.message+'</small></div></div>';
 });
}

function _renderMenus(){
 /* м№ҙн…Ңкі лҰ¬ м¶”м¶ң */
 var cats=['м „мІҙ'];
 _menus.forEach(function(m){if(m.category&&cats.indexOf(m.category)<0)cats.push(m.category);});

 /* нғӯ */
 var tabs=document.getElementById('cat-tabs');
 tabs.innerHTML=cats.map(function(c,i){
  return '<button class="cat-tab'+(i===0?' active':'')+'" onclick="_filterCat(\''+c+'\',this)">'+c+'</button>';
 }).join('');

 /* л©”лүҙ */
 var wrap=document.getElementById('menu-wrap');
 wrap.innerHTML='';

 if(!_menus.length){
  wrap.innerHTML='<div style="text-align:center;padding:60px;color:var(--t3)">л“ұлЎқлҗң л©”лүҙк°Җ м—ҶмҠөлӢҲлӢӨ</div>';
  return;
 }

 /* м№ҙн…Ңкі лҰ¬лі„ м„№м…ҳ */
 var grouped={};
 _menus.forEach(function(m){
  var cat=m.category||'кё°нғҖ';
  if(!grouped[cat])grouped[cat]=[];
  grouped[cat].push(m);
 });

 Object.keys(grouped).forEach(function(cat){
  var sec=document.createElement('div');
  sec.className='cat-section';
  sec.id='sec-'+cat;
  sec.innerHTML='<div class="cat-title">'+cat+'</div>';
  var grid=document.createElement('div');
  grid.className='menu-grid';

  grouped[cat].forEach(function(m){
   var card=document.createElement('div');
   card.className='menu-card';
   card.id='mc-'+m._id;

   var soldOut=m.stock!==null&&m.stock!==undefined&&m.stock<=0;
   var cnt=_cart[m._id]?_cart[m._id].qty:0;

   card.innerHTML=
    '<div class="menu-img">'+(m.imageUrl?'<img src="'+m.imageUrl+'" style="width:100%;height:100%;object-fit:cover">':'<span>'+(m.emoji||'рҹҚҪ')+'</span>')+'</div>'+
    '<div class="menu-info">'+
    '<div class="menu-name">'+m.name+'</div>'+
    '<div class="menu-price">вӮ©'+(m.price||0).toLocaleString()+'</div>'+
    '</div>'+
    (soldOut?'<div class="menu-sold">н’Ҳм Ҳ</div>':'')+
    '<div class="menu-cnt'+(cnt>0?' show':'')+'" id="cnt-'+m._id+'">'+cnt+'</div>';

   if(!soldOut){
    card.onclick=function(){_addToCart(m);};
   }
   grid.appendChild(card);
  });
  sec.appendChild(grid);
  wrap.appendChild(sec);
 });
}

function _filterCat(cat,el){
 document.querySelectorAll('.cat-tab').forEach(function(t){t.classList.remove('active');});
 el.classList.add('active');
 if(cat==='м „мІҙ'){
  document.querySelectorAll('.cat-section').forEach(function(s){s.style.display='';});
  document.getElementById('menu-wrap').scrollTop=0;
 } else {
  document.querySelectorAll('.cat-section').forEach(function(s){s.style.display='none';});
  var sec=document.getElementById('sec-'+cat);
  if(sec){sec.style.display='';sec.scrollIntoView({behavior:'smooth',block:'start'});}
 }
}

/* в”Җв”Җ мһҘл°”кө¬лӢҲ в”Җв”Җ */
function _addToCart(m){
 if(!_cart[m._id]) _cart[m._id]={...m,qty:0};
 _cart[m._id].qty++;
 _updateCartUI();
 /* м№ҙл“ң м№ҙмҡҙн„° */
 var cnt=document.getElementById('cnt-'+m._id);
 if(cnt){cnt.textContent=_cart[m._id].qty;cnt.classList.add('show');}
 /* н”јл“ңл°ұ м• лӢҲл©”мқҙм…ҳ */
 var card=document.getElementById('mc-'+m._id);
 if(card){card.style.transform='scale(.94)';setTimeout(function(){card.style.transform='';},150);}
}

function _updateCartUI(){
 var total=0,cnt=0;
 Object.values(_cart).forEach(function(i){total+=i.price*i.qty;cnt+=i.qty;});
 var badge=document.getElementById('cart-badge');
 if(badge){badge.textContent=cnt;badge.style.display=cnt?'flex':'none';}
 document.getElementById('cart-total').textContent='вӮ©'+total.toLocaleString();
 document.getElementById('order-btn').disabled=cnt===0;
}

function _openCart(){
 _renderCartItems();
 document.getElementById('cart-sheet').classList.add('open');
}
function _closeCart(){
 document.getElementById('cart-sheet').classList.remove('open');
}

function _renderCartItems(){
 var el=document.getElementById('cart-items');
 var items=Object.values(_cart).filter(function(i){return i.qty>0;});
 if(!items.length){
  el.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3);font-size:13px">мһҘл°”кө¬лӢҲк°Җ л№„м–ҙмһҲмҠөлӢҲлӢӨ</div>';
  return;
 }
 el.innerHTML='';
 items.forEach(function(item){
  var row=document.createElement('div');
  row.className='cart-item';
  row.innerHTML=
   '<div class="ci-emoji">'+(item.emoji||'рҹҚҪ')+'</div>'+
   '<div class="ci-name">'+item.name+'</div>'+
   '<div class="ci-qty">'+
   '<button class="qty-btn" id="qm-'+item._id+'">вҲ’</button>'+
   '<span class="qty-num" id="qn-'+item._id+'">'+item.qty+'</span>'+
   '<button class="qty-btn" id="qp-'+item._id+'">+</button>'+
   '</div>'+
   '<div class="ci-price">вӮ©'+(item.price*item.qty).toLocaleString()+'</div>';
  el.appendChild(row);

  document.getElementById('qm-'+item._id).onclick=function(){_changeQty(item._id,-1);};
  document.getElementById('qp-'+item._id).onclick=function(){_changeQty(item._id,1);};
 });
}

function _changeQty(id,delta){
 if(!_cart[id])return;
 _cart[id].qty+=delta;
 if(_cart[id].qty<=0)delete _cart[id];
 /* м№ҙл“ң м№ҙмҡҙн„° м—…лҚ°мқҙнҠё */
 var cnt=document.getElementById('cnt-'+id);
 if(cnt){
  var q=_cart[id]?_cart[id].qty:0;
  cnt.textContent=q;
  cnt.classList[q>0?'add':'remove']('show');
 }
 _updateCartUI();
 _renderCartItems();
}

/* в”Җв”Җ кІ°м ң л°©лІ• м„ нғқ в”Җв”Җ */
function _selectPayMethod(){
 var items=Object.values(_cart).filter(function(i){return i.qty>0;});
 if(!items.length)return;

 var mo=document.createElement('div');
 mo.className='pay-modal';
 var sheet=document.createElement('div');
 sheet.className='pay-sheet';
 sheet.innerHTML=
  '<div class="pay-title">рҹ’і кІ°м ң л°©лІ• м„ нғқ</div>'+
  '<div class="pay-methods">'+
  '<button class="pay-btn" onclick="_selPay(this,\'м№ҙл“ң\')">рҹ’і м№ҙл“ң</button>'+
  '<button class="pay-btn" onclick="_selPay(this,\'нҳ„кёҲ\')">рҹ’ө нҳ„кёҲ</button>'+
  '<button class="pay-btn" onclick="_selPay(this,\'м№ҙм№ҙмҳӨнҺҳмқҙ\')">рҹҹЎ м№ҙм№ҙмҳӨнҺҳмқҙ</button>'+
  '<button class="pay-btn" onclick="_selPay(this,\'л„ӨмқҙлІ„нҺҳмқҙ\')">рҹҹў л„ӨмқҙлІ„нҺҳмқҙ</button>'+
  '</div>'+
  '<button class="pay-confirm" id="pay-confirm-btn" onclick="_submitOrder()" disabled>мЈјл¬ё нҷ•м •</button>';
 mo.appendChild(sheet);
 mo.onclick=function(e){if(e.target===mo)mo.remove();};
 document.body.appendChild(mo);
 window._payModal=mo;
}

var _selectedPay='';
function _selPay(el,method){
 document.querySelectorAll('.pay-btn').forEach(function(b){b.classList.remove('sel');});
 el.classList.add('sel');
 _selectedPay=method;
 document.getElementById('pay-confirm-btn').disabled=false;
}

/* в”Җв”Җ мЈјл¬ё м ңм¶ң в”Җв”Җ */
function _submitOrder(){
 var items=Object.values(_cart).filter(function(i){return i.qty>0;});
 if(!items.length)return;
 if(!_selectedPay){alert('кІ°м ң л°©лІ•мқ„ м„ нғқн•ҳм„ёмҡ”');return;}

 var btn=document.getElementById('pay-confirm-btn');
 btn.disabled=true;btn.textContent='мЈјл¬ё мӨ‘...';

 var total=items.reduce(function(s,i){return s+i.price*i.qty;},0);
 var now=new Date();
 var order={
  dealerId:_did,
  tableNum:parseInt(_tableNum),
  tableName:_tableName,
  items:items.map(function(i){return {name:i.name,qty:i.qty,price:i.price,emoji:i.emoji||'рҹҚҪ'};}),
  total:total,
  payMethod:_selectedPay,
  status:'pending',
  date:now.toISOString().slice(0,10),
  createdAt:now.toISOString(),
  source:'table_qr'
 };

 _db.collection('filo_sales').add(order).then(function(){
  /* н…Ңмқҙлё” мғҒнғң вҶ’ occupied */
  _db.collection('filo_tables').where('dealerId','==',_did).where('tableNum','==',parseInt(_tableNum)).limit(1).get()
   .then(function(snap){
    if(!snap.empty) snap.docs[0].ref.update({status:'occupied',occupiedSince:now.toISOString()});
   });

  /* мҷ„лЈҢ нҷ”л©ҙ */
  if(window._payModal)window._payModal.remove();
  _closeCart();
  document.getElementById('done-sub').textContent=
   items.map(function(i){return i.name+' Г—'+i.qty;}).join(', ')+'\nмҙқ вӮ©'+total.toLocaleString();
  document.getElementById('order-done').style.display='flex';
 }).catch(function(e){
  btn.disabled=false;btn.textContent='мЈјл¬ё нҷ•м •';
  alert('мЈјл¬ё мӢӨнҢЁ: '+e.message);
 });
}

/* в”Җв”Җ м¶”к°Җ мЈјл¬ё в”Җв”Җ */
function _resetOrder(){
 _cart={};
 _selectedPay='';
 document.getElementById('order-done').style.display='none';
 document.querySelectorAll('.menu-cnt').forEach(function(c){c.classList.remove('show');});
 _updateCartUI();
 _renderCartItems();
}

</script>
