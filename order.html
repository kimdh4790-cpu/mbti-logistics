<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>테이블 주문</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f8fafc;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#hdr{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.tn{font-size:15px;font-weight:900;color:#1e293b}
.sn{font-size:11px;color:#94a3b8;margin-top:1px}
.lw{display:flex;gap:3px}
.lb{padding:3px 7px;border:1px solid #cbd5e1;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:#fff;color:#64748b}
.lb.on{background:#0891b2;color:#fff;border-color:#0891b2}
#wrap{display:flex;flex:1;overflow:hidden}
#cats{width:68px;flex-shrink:0;background:#f1f5f9;border-right:1px solid #e2e8f0;overflow-y:auto;padding:6px 4px;display:flex;flex-direction:column;gap:2px}
.cb{display:flex;flex-direction:column;align-items:center;padding:8px 4px;border-radius:10px;cursor:pointer;font-size:9px;font-weight:700;color:#64748b;border:none;background:transparent;text-align:center;line-height:1.4;min-height:50px;width:100%}
.cb.on{background:#0891b2;color:#fff}
.ci{font-size:20px;margin-bottom:2px;display:block}
#area{flex:1;overflow-y:auto;padding:8px}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mi{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:8px 6px;text-align:center;cursor:pointer;transition:.15s;position:relative}
.mi:active{transform:scale(.96);background:#e0f2fe}
.mi img{width:100%;height:60px;object-fit:cover;border-radius:8px;margin-bottom:4px;display:block}
.me{font-size:26px;margin-bottom:4px;display:block;line-height:1}
.mn{font-size:10px;font-weight:700;color:#1e293b;margin-bottom:2px;line-height:1.3;word-break:keep-all}
.mp{font-size:11px;font-weight:900;color:#0891b2}
.ms{position:absolute;top:4px;right:4px;background:#ef4444;color:#fff;font-size:8px;padding:1px 5px;border-radius:6px}
.mc{position:absolute;top:-6px;right:-6px;background:#0891b2;color:#fff;font-size:10px;font-weight:900;width:20px;height:20px;border-radius:50%;display:none;align-items:center;justify-content:center}
.mc.on{display:flex}
#cbt{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#0891b2;color:#fff;border:none;border-radius:50px;padding:14px 28px;font-size:15px;font-weight:900;cursor:pointer;display:none;box-shadow:0 4px 20px rgba(8,145,178,.4);z-index:200;white-space:nowrap}
#cs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.15);transform:translateY(100%);transition:.3s cubic-bezier(.4,0,.2,1);z-index:300;max-height:85vh;display:flex;flex-direction:column}
#cs.open{transform:translateY(0)}
#ch{padding:14px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#ch .t{font-size:16px;font-weight:900}
#ccl{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8}
#cl{overflow-y:auto;flex:1;padding:8px 16px}
.ri{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.rn{flex:1;font-size:13px;font-weight:700}
.rc{display:flex;align-items:center;gap:6px}
.rc button{width:24px;height:24px;border-radius:50%;border:1px solid #e2e8f0;background:#f8fafc;font-size:14px;cursor:pointer}
.rq{font-size:13px;font-weight:700;min-width:20px;text-align:center}
.rp{font-size:13px;font-weight:900;color:#0891b2;min-width:60px;text-align:right}
#cf{padding:14px 16px;border-top:1px solid #f1f5f9;flex-shrink:0}
#tr{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;font-weight:700}
#tp{font-size:20px;font-weight:900;color:#0891b2}
#ob{width:100%;padding:14px;background:#0891b2;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer}
#dn{position:fixed;inset:0;background:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:400}
#dn .ico{font-size:60px;margin-bottom:16px}
#dn .dm{font-size:20px;font-weight:900;margin-bottom:8px}
#dn .ds{font-size:13px;color:#94a3b8;margin-bottom:24px}
#db{padding:12px 32px;background:#0891b2;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
#ld{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500}
#ld .lo{font-size:28px;font-weight:900;color:#0891b2;margin-bottom:16px}
.sp{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#0891b2;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#ld .lt{font-size:12px;color:#94a3b8;margin-top:12px}
</style>
</head>
<body>
<div id="ld"><div class="lo">🍽 FILO</div><div class="sp"></div><div class="lt">메뉴를 불러오는 중...</div></div>
<div id="hdr" style="display:none">
  <div><div class="tn" id="tn">테이블</div><div class="sn" id="sn"></div></div>
  <div class="lw">
    <button class="lb on" id="lb-ko">KO</button>
    <button class="lb" id="lb-en">EN</button>
    <button class="lb" id="lb-zh">中</button>
    <button class="lb" id="lb-ja">日</button>
  </div>
</div>
<div id="wrap" style="display:none">
  <div id="cats"></div>
  <div id="area"><div id="grid"></div></div>
</div>
<button id="cbt">🛒 <span id="ct">주문하기</span> · <span id="ctp">₩0</span></button>
<div id="cs">
  <div id="ch"><div class="t" id="cht">주문 내역</div><button id="ccl">✕</button></div>
  <div id="cl"></div>
  <div id="cf">
    <div id="tr"><span id="tl">합계</span><span id="tp">₩0</span></div>
    <button id="ob">주문하기</button>
  </div>
</div>
<div id="dn">
  <div class="ico">✅</div>
  <div class="dm" id="dm">주문이 접수됐습니다!</div>
  <div class="ds" id="ds">잠시 후 준비됩니다</div>
  <button id="db">메뉴로 돌아가기</button>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var _did='',_tn='',_menus=[],_cart={},_lang='ko';
var _i18n={
  ko:{all:'전체',so:'품절',ct:'주문 내역',tl:'합계',ob:'주문하기',dm:'주문이 접수됐습니다!',ds:'잠시 후 준비됩니다',db:'메뉴로 돌아가기',cbt:'주문하기'},
  en:{all:'All',so:'Sold Out',ct:'Order List',tl:'Total',ob:'Order Now',dm:'Order Received!',ds:'Please wait',db:'Back to Menu',cbt:'Order'},
  zh:{all:'全部',so:'售罄',ct:'订单',tl:'合计',ob:'下单',dm:'订单已接收！',ds:'请稍等',db:'返回菜单',cbt:'下单'},
  ja:{all:'全て',so:'売切',ct:'注文リスト',tl:'合計',ob:'注文する',dm:'注文を受け付けました！',ds:'少々お待ちください',db:'メニューに戻る',cbt:'注文'}
};
function _t(k){return(_i18n[_lang]&&_i18n[_lang][k])||_i18n.ko[k]||k;}
function _p(k){return new URLSearchParams(location.search).get(k)||'';}

firebase.initializeApp({apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',authDomain:'mbti-logistics.firebaseapp.com',projectId:'mbti-logistics'});
var _db=firebase.firestore();

document.getElementById('lb-ko').onclick=function(){_setLang('ko');};
document.getElementById('lb-en').onclick=function(){_setLang('en');};
document.getElementById('lb-zh').onclick=function(){_setLang('zh');};
document.getElementById('lb-ja').onclick=function(){_setLang('ja');};
document.getElementById('ccl').onclick=function(){document.getElementById('cs').classList.remove('open');};
document.getElementById('ob').onclick=function(){_submitOrder();};
document.getElementById('db').onclick=function(){document.getElementById('dn').style.display='none';};
document.getElementById('cbt').onclick=function(){_openCart();};

function _setLang(l){
  _lang=l;
  ['ko','en','zh','ja'].forEach(function(x){document.getElementById('lb-'+x).classList.toggle('on',x===l);});
  document.getElementById('cht').textContent=_t('ct');
  document.getElementById('tl').textContent=_t('tl');
  document.getElementById('ob').textContent=_t('ob');
  document.getElementById('dm').textContent=_t('dm');
  document.getElementById('ds').textContent=_t('ds');
  document.getElementById('db').textContent=_t('db');
  document.getElementById('ct').textContent=_t('cbt');
  document.querySelectorAll('.ms').forEach(function(s){s.textContent=_t('so');});
  document.querySelectorAll('.cb').forEach(function(b){if(b.dataset.cat==='전체')b.querySelector('.cl').textContent=_t('all');});
}

window.onload=function(){
  _did=_p('d');
  var tnum=_p('t');
  _tn=decodeURIComponent(_p('name')||('테이블 '+tnum));
  if(!_did||!tnum){document.getElementById('ld').innerHTML='<div style="text-align:center"><div style="font-size:40px">❌</div><div style="margin-top:12px;color:#ef4444">잘못된 QR 코드입니다</div></div>';return;}
  document.getElementById('tn').textContent=_tn;
  fetch('/api/menus?did='+encodeURIComponent(_did))
  .then(function(r){return r.json();})
  .then(function(d){
    _menus=d.menus||[];
    document.getElementById('ld').style.display='none';
    document.getElementById('hdr').style.display='flex';
    document.getElementById('wrap').style.display='flex';
    _render();
  })
  .catch(function(e){
    document.getElementById('ld').innerHTML='<div style="text-align:center"><div style="font-size:40px">😅</div><div style="margin-top:12px;color:#ef4444;font-size:14px">메뉴를 불러올 수 없습니다</div></div>';
  });
};

var _catIco={'전체':'🍽','버거':'🍔','치킨':'🍗','피자':'🍕','분식':'🌶️','음료':'☕','사이드':'🍟','디저트':'🍰','세트':'🎉','카페':'☕','한식':'🍱','기타':'🍽'};

function _render(){
  var cats=['전체'];
  _menus.forEach(function(m){if(m.category&&cats.indexOf(m.category)<0)cats.push(m.category);});
  var bar=document.getElementById('cats');
  bar.innerHTML='';
  cats.forEach(function(cat,i){
    var btn=document.createElement('button');
    btn.className='cb'+(i===0?' on':'');
    btn.dataset.cat=cat;
    btn.innerHTML='<span class="ci">'+((_catIco[cat])||'🍽')+'</span><span class="cl">'+cat+'</span>';
    btn.onclick=function(){
      document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      document.querySelectorAll('.mi').forEach(function(item){
        item.style.display=(cat==='전체'||item.dataset.cat===cat)?'':'none';
      });
      document.getElementById('area').scrollTop=0;
    };
    bar.appendChild(btn);
  });
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  _menus.forEach(function(m){
    var item=document.createElement('div');
    item.className='mi';
    item.dataset.cat=m.category||'기타';
    var so=m.stock!=null&&m.stock<=0;
    item.innerHTML=(m.imageUrl?'<img src="'+m.imageUrl+'" loading="lazy">':'<span class="me">'+(m.emoji||'🍽')+'</span>')+
      '<div class="mn">'+m.name+'</div>'+
      '<div class="mp">₩'+(m.price||0).toLocaleString()+'</div>'+
      (so?'<div class="ms">'+_t('so')+'</div>':'')+
      '<div class="mc" id="mc-'+m.name.replace(/\W/g,'')+'"></div>';
    if(!so){
      (function(menu){
        item.onclick=function(){_add(menu);};
      })(m);
    } else {
      item.style.opacity='.6';
    }
    grid.appendChild(item);
  });
}

function _add(m){
  if(!_cart[m.name]) _cart[m.name]={name:m.name,price:m.price,qty:0};
  _cart[m.name].qty++;
  var el=document.getElementById('mc-'+m.name.replace(/\W/g,''));
  if(el){el.textContent=_cart[m.name].qty;el.className='mc on';}
  _updBtn();
}

function _updBtn(){
  var total=0,cnt=0;
  Object.values(_cart).forEach(function(i){total+=i.price*i.qty;cnt+=i.qty;});
  var btn=document.getElementById('cbt');
  if(cnt>0){btn.style.display='block';document.getElementById('ctp').textContent='₩'+total.toLocaleString();}
  else btn.style.display='none';
}

function _openCart(){
  var list=document.getElementById('cl');
  list.innerHTML='';
  var total=0;
  Object.values(_cart).forEach(function(item){
    if(!item.qty) return;
    total+=item.price*item.qty;
    var row=document.createElement('div');row.className='ri';
    var nd=document.createElement('div');nd.className='rn';nd.textContent=item.name;
    var ctrl=document.createElement('div');ctrl.className='rc';
    var bm=document.createElement('button');bm.textContent='−';
    var qs=document.createElement('span');qs.className='rq';qs.textContent=item.qty;
    var bp=document.createElement('button');bp.textContent='+';
    (function(n){
      bm.onclick=function(){_chg(n,-1);};
      bp.onclick=function(){_chg(n,1);};
    })(item.name);
    ctrl.appendChild(bm);ctrl.appendChild(qs);ctrl.appendChild(bp);
    var pd=document.createElement('div');pd.className='rp';pd.textContent='₩'+(item.price*item.qty).toLocaleString();
    row.appendChild(nd);row.appendChild(ctrl);row.appendChild(pd);
    list.appendChild(row);
  });
  document.getElementById('tp').textContent='₩'+total.toLocaleString();
  document.getElementById('cs').classList.add('open');
}

function _chg(name,d){
  if(!_cart[name]) return;
  _cart[name].qty+=d;
  if(_cart[name].qty<=0) delete _cart[name];
  var el=document.getElementById('mc-'+name.replace(/\W/g,''));
  if(el){
    var q=(_cart[name]&&_cart[name].qty)||0;
    el.textContent=q;el.className='mc'+(q>0?' on':'');
  }
  _openCart();_updBtn();
}

function _submitOrder(){
  var items=Object.values(_cart).filter(function(i){return i.qty>0;});
  if(!items.length) return;
  var total=items.reduce(function(s,i){return s+i.price*i.qty;},0);
  _db.collection('filo_orders').add({dealerId:_did,tableName:_tn,items:items,total:total,status:'pending',createdAt:new Date().toISOString()})
  .then(function(){
    _cart={};
    document.getElementById('cs').classList.remove('open');
    _updBtn();
    document.querySelectorAll('.mc').forEach(function(c){c.textContent='';c.className='mc';});
    document.getElementById('dn').style.display='flex';
  }).catch(function(e){alert('주문 실패: '+e.message);});
}
</script>
</body>
</html>
