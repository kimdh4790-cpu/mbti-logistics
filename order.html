<!--
⚠️ order.html — Claude 인수인계
- 테이블 QR 주문 페이지 (비로그인 고객용)
- URL: filo.ai.kr/order?d=매장ID&t=테이블번호&name=테이블명
- filo_orders 컬렉션에 저장
- /api/menus Worker API로 메뉴 로드
- /api/translate Worker API로 AI 번역
- id="body" 사용 금지 (HTML body태그 충돌)
-->
<!DOCTYPE html>
<!--
  order.html - FILO 테이블 QR 주문 페이지 (HTML 뼈대)
  URL: filo.ai.kr/order?d=dealerId&t=tableNum&name=tableName
  
  ⚠️ 수정 시 주의:
  - JS 로직은 order.js에 있음
  - GitHub push → 자동배포 (GitHub Actions)
  - KV keys: order.html, order.js
  
  연관 파일:
  - order.js: 모든 JS 로직
  - _worker.js: /order 라우팅, /api/menus, /api/translate
  - filo.html: 관리자 (테이블 현황, 주문 접수)
  
  Firestore:
  - filo_menus: 메뉴 읽기 (비로그인)
  - filo_orders: 주문 쓰기 (type=table)
  - staff_calls: 직원 호출 쓰기
  - filo_stores: 매장 정보 읽기
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>주문하기</title>
<style>
:root{
  --brand:#0891b2;
  --brand-dark:#0e7490;
  --brand-light:#e0f2fe;
  --bg:#f8fafc;
  --surface:#ffffff;
  --border:#e2e8f0;
  --text1:#0f172a;
  --text2:#475569;
  --text3:#94a3b8;
  --red:#ef4444;
  --green:#22c55e;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo',sans-serif;color:var(--text1)}

/* ── 로딩 ── */
#ld{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#ld .logo{font-size:32px;font-weight:900;color:var(--brand);letter-spacing:-1px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#ld .hint{font-size:12px;color:var(--text3);margin-top:4px}

/* ── 헤더 ── */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;flex-direction:column}
.store-name{font-size:16px;font-weight:800;color:var(--text1);letter-spacing:-.3px}
.table-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--brand);font-weight:700;margin-top:1px}
.lang-row{display:flex;gap:4px}
.lb{height:26px;padding:0 8px;border:1.5px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--text2);transition:.15s}
.lb.on{background:var(--brand);color:#fff;border-color:var(--brand)}

/* ── 카테고리 탭 (가로 스크롤) ── */
#cat-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
#cat-wrap::-webkit-scrollbar{display:none}
#cat-bar{display:flex;padding:0 12px;gap:4px;height:44px;align-items:center;white-space:nowrap}
.cat-btn{height:32px;padding:0 14px;border-radius:20px;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;flex-shrink:0;transition:.15s;display:flex;align-items:center;gap:5px}
.cat-btn.on{background:var(--brand);color:#fff}
.cat-btn .cat-ico{font-size:14px}

/* ── 메뉴 영역 ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 120px}
#menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* ── 메뉴 카드 ── */
.mi{background:var(--surface);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;position:relative;transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border)}
.mi:active{transform:scale(.96);box-shadow:none}
.mi-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.mi-emoji{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#f0f9ff,#e0f2fe)}
.mi-body{padding:10px 10px 12px}
.mi-name{font-size:13px;font-weight:700;color:var(--text1);line-height:1.4;margin-bottom:4px;word-break:keep-all}
.mi-tr{font-size:11px;color:var(--brand);font-weight:600;margin-bottom:4px;min-height:15px}
.mi-price{font-size:14px;font-weight:900;color:var(--brand)}
.mi-sold{position:absolute;inset:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3)}
.mi-badge{position:absolute;top:6px;right:6px;background:var(--brand);color:#fff;font-size:10px;font-weight:900;min-width:20px;height:20px;border-radius:10px;display:none;align-items:center;justify-content:center;padding:0 5px}
.mi-badge.on{display:flex}

/* ── 장바구니 버튼 ── */
#cart-fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;border:none;border-radius:50px;padding:0 24px;height:52px;font-size:15px;font-weight:800;cursor:pointer;display:none;box-shadow:0 6px 24px rgba(8,145,178,.4);z-index:200;white-space:nowrap;align-items:center;gap:10px;letter-spacing:-.2px}
#cart-fab.show{display:flex}
#cart-fab .fab-price{opacity:.85;font-weight:600;font-size:14px}

/* ── 오버레이 ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;backdrop-filter:blur(2px)}

/* ── 장바구니 시트 ── */
#cart-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;box-shadow:var(--shadow-lg);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:400;max-height:90vh;display:flex;flex-direction:column}
#cart-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.sheet-hdr{padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sheet-title{font-size:16px;font-weight:800}
.sheet-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;padding:4px}
#cart-list{overflow-y:auto;padding:8px 16px;flex:1}
.ci{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ci-emoji{font-size:24px;flex-shrink:0}
.ci-name{flex:1;font-size:13px;font-weight:700;color:var(--text1)}
.ci-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ci-ctrl button{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text1);font-weight:700;transition:.1s}
.ci-ctrl button:active{background:var(--brand-light)}
.ci-qty{font-size:14px;font-weight:800;min-width:20px;text-align:center}
.ci-price{font-size:13px;font-weight:800;color:var(--brand);min-width:64px;text-align:right;flex-shrink:0}

/* ── 배달 정보 폼 (시트 내) ── */
#delivery-section{padding:12px 16px 8px;border-top:1px solid var(--border)}
.ds-title{font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ds-inputs{display:flex;flex-direction:column;gap:6px}
.ds-row{display:flex;gap:6px}
.ds-input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text1);outline:none;background:var(--surface);transition:.15s}
.ds-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.addr-btn{width:100%;padding:10px 12px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--brand);background:var(--brand-light);cursor:pointer;text-align:left;transition:.15s}
.addr-btn:active{opacity:.8}

/* ── 합계 + 주문 버튼 ── */
#cart-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.total-label{font-size:13px;color:var(--text2)}
.total-price{font-size:22px;font-weight:900;color:var(--brand)}
#order-btn{width:100%;height:52px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;cursor:pointer;transition:.15s;letter-spacing:-.2px}
#order-btn:active{background:var(--brand-dark)}
#order-btn:disabled{background:var(--border);cursor:not-allowed;color:var(--text3)}

/* ── 메뉴 상세 모달 ── */
#mdl{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(3px)}
#mdl.open{display:flex}
#mdl-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding:20px 20px 32px;max-height:80vh;overflow-y:auto}
.mdl-img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius);margin-bottom:14px;display:block}
.mdl-emoji{font-size:64px;text-align:center;margin-bottom:8px;display:block;line-height:1}
.mdl-name{font-size:20px;font-weight:900;text-align:center;margin-bottom:4px;letter-spacing:-.3px}
.mdl-tr{font-size:14px;color:var(--brand);text-align:center;margin-bottom:12px;min-height:20px;font-weight:600}
.mdl-price{font-size:26px;font-weight:900;color:var(--brand);text-align:center;margin-bottom:20px}
.mdl-add{width:100%;height:52px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;cursor:pointer;transition:.15s}
.mdl-add:active{background:var(--brand-dark)}
.tl-spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}

/* ── 완료 화면 ── */
#done{position:fixed;inset:0;background:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:600;padding:32px;text-align:center}
.done-circle{width:80px;height:80px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.done-title{font-size:22px;font-weight:900;margin-bottom:8px;letter-spacing:-.3px}
.done-sub{font-size:14px;color:var(--text2);margin-bottom:6px}
.done-num{font-size:13px;color:var(--text3);margin-bottom:8px;font-weight:600}
.done-items{font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:24px;background:var(--bg);border-radius:var(--radius-sm);padding:12px;width:100%;max-width:320px}
#done-back{padding:14px 32px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer}

/* ── 주소 입력 팝업 ── */
#addr-popup{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:700;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
#addr-popup.open{display:flex}
.ap-box{background:var(--surface);border-radius:var(--radius);padding:20px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.ap-title{font-size:16px;font-weight:800;margin-bottom:14px}
.ap-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;margin-bottom:8px;transition:.15s}
.ap-input:focus{border-color:var(--brand)}
.ap-row{display:flex;gap:8px;margin-top:4px}
.ap-ok{flex:1;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer}
.ap-cancel{padding:12px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;color:var(--text2)}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-msg{font-size:14px}
#call-btn{position:fixed;bottom:90px;right:16px;width:52px;height:52px;background:#fff;border:2px solid var(--brand);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:999;transition:.2s;pointer-events:all}
#call-btn:active{transform:scale(.92);background:#e0f2fe}
#call-btn .cb-ico{font-size:20px;line-height:1}
#call-btn .cb-txt{font-size:8px;font-weight:800;color:var(--brand);margin-top:1px}
#call-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 20px;border-radius:50px;font-size:13px;font-weight:700;z-index:9999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3)}
/* 결제 선택 모달 */
#pay-mdl{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
#pay-mdl.open{display:flex}
#pay-mb{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:24px 20px 36px}
.pay-drag{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 20px}
.pay-title{font-size:18px;font-weight:900;color:#0f172a;text-align:center;margin-bottom:6px}
.pay-sub{font-size:12px;color:#94a3b8;text-align:center;margin-bottom:20px}
.pay-total{font-size:24px;font-weight:900;color:#0891b2;text-align:center;margin-bottom:20px}
.pay-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.pay-opt{display:flex;align-items:center;gap:14px;padding:16px;border:2px solid #e2e8f0;border-radius:16px;cursor:pointer;transition:.15s}
.pay-opt:active{background:#f0f9ff;border-color:#0891b2}
.pay-opt.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.pay-opt-ico{font-size:28px;flex-shrink:0}
.pay-opt-info{flex:1}
.pay-opt-name{font-size:15px;font-weight:800;color:#0f172a}
.pay-opt-desc{font-size:11px;color:#94a3b8;margin-top:2px}
.pay-opt-badge{font-size:10px;font-weight:700;background:#f0f9ff;color:#0891b2;padding:2px 8px;border-radius:10px}
.pay-cancel{width:100%;padding:14px;background:#f1f5f9;border:none;border-radius:14px;font-size:14px;font-weight:700;color:#64748b;cursor:pointer}
</style>
</head>
<body>

<div id="ld">
  <div class="logo">🍽 FILO</div>
  <div class="spinner"></div>
  <div class="hint">메뉴를 불러오는 중...</div>
</div>

<div id="app" style="display:none">
  <div id="hdr">
    <div class="hdr-left">
      <div class="store-name" id="store-name">매장</div>
      <div class="table-badge">🪑 <span id="table-name">테이블</span></div>
    </div>
    <div class="lang-row">
      <button class="lb on" id="lb-ko">KO</button>
      <button class="lb" id="lb-en">EN</button>
      <button class="lb" id="lb-zh">中</button>
      <button class="lb" id="lb-ja">日</button>
    </div>
  </div>
  <div id="cat-wrap"><div id="cat-bar"></div></div>
  <div id="scroll-area"><div id="menu-grid"></div></div>
</div>

<button id="cart-fab" onclick="_openCart()">
  🛒 <span id="fab-cnt">0</span>개
  <span class="fab-price" id="fab-price">₩0</span>
  &nbsp;·&nbsp; <span id="fab-label">주문하기</span>
</button>

<div id="overlay" onclick="_closeCart()"></div>

<div id="cart-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-title" id="cart-title">🛒 장바구니</div>
    <button class="sheet-close" onclick="_closeCart()">✕</button>
  </div>
  <div id="cart-list"></div>
  <div id="delivery-section" style="display:none">
    <div class="ds-title" id="ds-title">배달 정보</div>
    <div class="ds-inputs">
      <button class="addr-btn" id="addr-btn" onclick="_openAddrPopup()">📍 주소를 입력해주세요</button>
      <div class="ds-row">
        <input class="ds-input" id="cust-name" placeholder="이름" id="sf-name">
        <input class="ds-input" id="cust-phone" type="tel" placeholder="010-0000-0000">
      </div>
      <input class="ds-input" id="cust-memo" placeholder="요청사항 (문 앞 놓아주세요 등)">
    </div>
  </div>
  <div id="cart-footer">
    <div class="total-row">
      <span class="total-label" id="total-label">합계</span>
      <span class="total-price" id="total-price">₩0</span>
    </div>
    <button id="order-btn" onclick="_submitOrder()">주문하기</button>
  </div>
</div>

<div id="mdl" onclick="if(event.target===this)_closeMdl()">
  <div id="mdl-box">
    <div class="mdl-emoji" id="mdl-emoji"></div>
    <div class="mdl-name" id="mdl-name"></div>
    <div class="mdl-tr" id="mdl-tr"></div>
    <div id="mdl-desc" style="font-size:12px;color:#64748b;text-align:center;margin:0 0 10px;line-height:1.6;padding:0 8px;min-height:0"></div>
    <div class="mdl-price" id="mdl-price"></div>
    <button class="mdl-add" id="mdl-add" onclick="_addFromMdl()">담기</button>
  </div>
</div>

<div id="done">
  <div class="done-circle">✓</div>
  <div class="done-title" id="done-title">주문 완료!</div>
  <div class="done-sub" id="done-sub">잠시 후 준비됩니다</div>
  <div class="done-num" id="done-num"></div>
  <div class="done-items" id="done-items"></div>
  <button id="done-back" onclick="location.reload()">메뉴로 돌아가기</button>
</div>

<div id="addr-popup">
  <div class="ap-box">
    <div class="ap-title">📍 배달 주소 입력</div>
    <input class="ap-input" id="ap-addr" placeholder="도로명 주소 (예: 수영로 668)">
    <input class="ap-input" id="ap-detail" placeholder="상세주소 (예: 607호)">
    <div class="ap-row">
      <button class="ap-ok" onclick="_confirmAddr()">확인</button>
      <button class="ap-cancel" onclick="_closeAddrPopup()">취소</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/order.js?v=2"></script>
<!-- 직원 호출 -->
<div id="call-btn" onclick="_callStaff()">
  <span class="cb-ico">🔔</span>
  <span class="cb-txt">호출</span>
</div>
<div id="call-toast">✅ 직원을 호출했습니다!</div>
<!-- 결제 방식 선택 모달 -->
<div id="pay-mdl" onclick="if(event.target===this)_closePayMdl()">
  <div id="pay-mb">
    <div class="pay-drag"></div>
    <div class="pay-title">💳 결제 방식 선택</div>
    <div class="pay-sub">편하신 방법으로 결제해주세요</div>
    <div class="pay-total" id="pay-total-amt">₩0</div>
    <div class="pay-opts">
      <div class="pay-opt" onclick="_doOrder('postpay')">
        <div class="pay-opt-ico">🧾</div>
        <div class="pay-opt-info">
          <div class="pay-opt-name">후불 결제</div>
          <div class="pay-opt-desc">식사 후 카운터에서 결제</div>
        </div>
        <div class="pay-opt-badge">기본</div>
      </div>
      <div class="pay-opt disabled" id="prepay-opt" onclick="_doOrder('prepay')">
        <div class="pay-opt-ico">📱</div>
        <div class="pay-opt-info">
          <div class="pay-opt-name">선결제 <span style="font-size:10px;color:#f59e0b">준비중</span></div>
          <div class="pay-opt-desc">카드·카카오페이·네이버페이</div>
        </div>
      </div>
    </div>
    <button class="pay-cancel" onclick="_closePayMdl()">취소</button>
  </div>
</div>
</body>
</html>
