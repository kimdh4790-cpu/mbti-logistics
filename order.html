<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<title>FILO — 테이블 주문</title>
<style>
:root{
  --bg:#0d0d1a;--surface:#1a1a2e;--surface2:#20203a;--surface3:#262642;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.12);
  --tx:#f2f2ff;--t2:#a0a0c0;--t3:#606080;
  --br:#7c3aed;--br2:#0891b2;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --r:12px;--r-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
.topbar{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(13,13,26,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px}
.topbar-logo{font-size:17px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.content{padding:70px 16px 100px}
.card{background:var(--surface);border:1px solid var(--bd2);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.btn-brand{background:linear-gradient(135deg,#7c3aed,#9f5ef8);color:#fff;border:none;border-radius:var(--r);padding:14px;width:100%;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.3)}
.btn-ghost{background:var(--surface2);color:var(--t2);border:1px solid var(--bd2);border-radius:var(--r);padding:12px;width:100%;font-size:13px;font-weight:600;cursor:pointer}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.menu-card{background:var(--surface2);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.menu-card:active{transform:scale(.97)}
.menu-card.selected{border-color:#7c3aed;background:rgba(124,58,237,.1)}
.menu-card .qty-badge{position:absolute;top:-6px;right:-6px;background:#7c3aed;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.cart-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:rgba(13,13,26,.95);backdrop-filter:blur(16px);border-top:1px solid var(--bd)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.badge-red{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.cat-btn{padding:7px 14px;border:1px solid var(--bd2);border-radius:20px;background:var(--surface2);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-btn.active{background:var(--br);color:#fff;border-color:var(--br)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.slide-up{animation:slideUp .3s ease both}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface3);color:var(--tx);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:200;transition:.3s;border:1px solid var(--bd2);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">FILO</div>
  <div id="table-label" style="font-size:13px;font-weight:700;color:var(--t2)">로딩 중...</div>
  <div id="status-badge" style="margin-left:auto"></div>
</div>

<div class="content" id="main-content">
  <div style="text-align:center;padding:60px 20px;color:var(--t3)">
    <div style="font-size:32px;margin-bottom:12px">⏳</div>
    <div>메뉴 불러오는 중...</div>
  </div>
</div>

<div class="cart-bar" id="cart-bar" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div style="font-size:13px;font-weight:700">🛒 <span id="cart-count">0</span>개 선택</div>
    <div style="font-size:16px;font-weight:900;color:#22c55e">₩<span id="cart-total">0</span></div>
  </div>
  <button class="btn-brand" onclick="_orderSubmit()">주문하기</button>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var _db=null,_cartItems={},_allMenus=[],_did='',_tid='',_tName='';

function _init(){
  var cfg={apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',authDomain:'mbti-logistics.firebaseapp.com',projectId:'mbti-logistics',storageBucket:'mbti-logistics.appspot.com',messagingSenderId:'862900137263',appId:'1:862900137263:web:a1b2c3d4e5f6a7b8'};
  firebase.initializeApp(cfg);
  _db=firebase.firestore();

  var params=new URLSearchParams(location.search);
  _did=params.get('did')||'';
  _tid=params.get('tid')||'';
  _tName=_tid?'테이블 '+_tid:'포장';

  document.getElementById('table-label').textContent=_tName;

  if(!_did){
    document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:60px;color:var(--t3)"><div style="font-size:32px">❌</div><div style="margin-top:12px">잘못된 QR 코드입니다</div></div>';
    return;
  }

  /* 테이블 상태 occupied로 변경 */
  if(_tid){
    _db.collection('filo_tables').where('dealerId','==',_did).where('tableId','==',parseInt(_tid)).get().then(function(snap){
      if(!snap.empty){
        snap.docs[0].ref.update({status:'occupied',since:new Date().toISOString()});
      }
    });
  }

  _loadMenus();
}

function _loadMenus(){
  _db.collection('filo_menus').where('dealerId','==',_did).get().then(function(snap){
    _allMenus=[];
    snap.forEach(function(doc){_allMenus.push(Object.assign({_id:doc.id},doc.data()));});

    if(!_allMenus.length){
      /* filo_menus 없으면 menu_costs에서 */
      return _db.collection('menu_costs').where('dealerId','==',_did).get().then(function(snap2){
        snap2.forEach(function(doc){
          var d=doc.data();
          _allMenus.push({_id:doc.id,name:d.name,price:d.price||0,category:'전체',emoji:'🍽'});
        });
        _renderMenus();
      });
    }
    _renderMenus();
  });
}

function _renderMenus(){
  var content=document.getElementById('main-content');
  if(!_allMenus.length){
    content.innerHTML='<div style="text-align:center;padding:60px;color:var(--t3)"><div style="font-size:40px">🍽</div><div style="margin-top:12px">등록된 메뉴가 없습니다</div></div>';
    return;
  }

  /* 카테고리 */
  var cats=['전체',...new Set(_allMenus.map(function(m){return m.category||'기타';}))];
  var activeCat='전체';

  function render(cat){
    activeCat=cat;
    var filtered=cat==='전체'?_allMenus:_allMenus.filter(function(m){return (m.category||'기타')===cat;});
    var menuHtml=filtered.map(function(m){
      var qty=_cartItems[m._id]?_cartItems[m._id].qty:0;
      return '<div class="menu-card'+(qty>0?' selected':'')+'" onclick="_toggleMenu(\''+m._id+'\',\''+esc(m.name)+'\','+m.price+')">'+
      (qty>0?'<div class="qty-badge">'+qty+'</div>':'')+
      '<div style="font-size:28px;margin-bottom:8px">'+(m.emoji||'🍽')+'</div>'+
      '<div style="font-size:13px;font-weight:800;margin-bottom:4px">'+esc(m.name)+'</div>'+
      '<div style="font-size:13px;font-weight:900;color:#22c55e">₩'+Number(m.price||0).toLocaleString()+'</div>'+
      (m.stock!=null&&m.stock<=0?'<div style="font-size:10px;color:#ef4444;margin-top:4px">품절</div>':'')+
      '</div>';
    }).join('');

    var catHtml=cats.map(function(c){
      return '<button class="cat-btn'+(c===activeCat?' active':'')+'" onclick="_renderCat(\''+c+'\')">'+c+'</button>';
    }).join('');

    content.innerHTML=
    '<div style="overflow-x:auto;display:flex;gap:8px;margin-bottom:16px;padding-bottom:4px">'+catHtml+'</div>'+
    '<div class="menu-grid slide-up">'+menuHtml+'</div>';
  }

  window._renderCat=function(cat){render(cat);};
  render('전체');
}

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}

function _toggleMenu(id,name,price){
  if(!_cartItems[id]){_cartItems[id]={name:name,price:price,qty:1};}
  else{_cartItems[id].qty++;} 
  _updateCart();
  _renderMenus();
}

function _updateCart(){
  var total=0,count=0;
  Object.values(_cartItems).forEach(function(it){total+=it.price*it.qty;count+=it.qty;});
  document.getElementById('cart-count').textContent=count;
  document.getElementById('cart-total').textContent=total.toLocaleString();
  document.getElementById('cart-bar').style.display=count>0?'block':'none';
}

function _orderSubmit(){
  var items=Object.values(_cartItems).filter(function(it){return it.qty>0;});
  if(!items.length){return;}
  var total=items.reduce(function(s,it){return s+it.price*it.qty;},0);
  var now=new Date();

  _db.collection('filo_sales').add({
    dealerId:_did,
    tableId:_tid?parseInt(_tid):null,
    tableName:_tName,
    items:items.map(function(it){return {name:it.name,price:it.price,qty:it.qty};}),
    total:total,
    status:'pending',
    type:'table',
    createdAt:now.toISOString(),
    date:now.toISOString().slice(0,10)
  }).then(function(){
    _cartItems={};
    _updateCart();
    _renderMenus();
    _showToast('✅ 주문이 접수됐습니다!');
    document.getElementById('status-badge').innerHTML='<span class="badge badge-green">주문 완료</span>';
  }).catch(function(e){_showToast('❌ '+e.message);});
}

function _showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

window.addEventListener('DOMContentLoaded',_init);
</script>
</body>
</html>
