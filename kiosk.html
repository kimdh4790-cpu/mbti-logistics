<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link rel="manifest" href="/FILO-manifest.json">
<meta name="theme-color" content="#7b2fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FILO 키오스크">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>키오스크·POS — filo.ai.kr</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--border:#2e3250;--text:#e8eaf6;--text2:#9da3c8;--text3:#5a5f7a;--acc:#f59e0b;--green:#00ff94;--red:#ff4d6d;--blue:#00d4ff;--purple:#a78bfa;--pink:#f472b6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
/* 사이드바 */
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:16px;border-bottom:1px solid var(--border)}
.sb-logo-title{font-size:16px;font-weight:900;color:var(--pink)}
.sb-logo-sub{font-size:10px;color:var(--text3);margin-top:2px}
.sb-user{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text3)}
.nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--pink);border-left-color:var(--pink)}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-section{padding:10px 14px 3px;font-size:10px;font-weight:700;color:var(--text3)}
.sb-footer{padding:10px 14px;border-top:1px solid var(--border)}
/* 메인 */
.main{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.page-title{font-size:15px;font-weight:900;margin-bottom:14px}
/* 카드 */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
/* 테이블 */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:7px 10px;text-align:left;color:var(--text3);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:var(--bg3)}
/* 버튼 */
.btn{padding:7px 12px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-acc{background:var(--pink);color:#fff}
.btn-blue{background:rgba(0,212,255,.15);border:1px solid var(--blue);color:var(--blue)}
.btn-gray{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.btn-red{background:rgba(255,77,109,.15);border:1px solid var(--red);color:var(--red)}
.btn-green{background:rgba(0,255,148,.15);border:1px solid var(--green);color:var(--green)}
/* 입력 */
.inp{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.inp:focus{outline:none;border-color:var(--pink)}
.field{margin-bottom:10px}
.field-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:3px;display:block}
/* 배지 */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.badge-green{background:rgba(0,255,148,.15);color:var(--green)}
.badge-red{background:rgba(255,77,109,.15);color:var(--red)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--acc)}
.badge-blue{background:rgba(0,212,255,.15);color:var(--blue)}
/* 팝업 */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.popup-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.popup-title{font-size:14px;font-weight:900;margin-bottom:14px}
/* 토스트 */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:12px;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
/* 시술 입력 그리드 */
.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.service-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:all .2s}
.service-card:hover,.service-card.selected{border-color:var(--pink);background:rgba(244,114,182,.08)}
.service-card .s-name{font-size:12px;font-weight:700;margin-bottom:3px}
.service-card .s-price{font-size:14px;font-weight:900;color:var(--pink)}
/* 통계 카드 */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:900;color:var(--pink)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
/* 모바일 */
@media(max-width:600px){
  .sidebar{display:none}
  .mobile-header{display:flex!important}
}
.mobile-header{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
/* 로그인 */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:30px 26px;width:100%;max-width:340px}
/* 예약 카드 */
.booking-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:30px;margin-bottom:6px">🖥️</div>
      <div style="font-size:18px;font-weight:900;color:var(--pink)">키오스크·POS</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">filo.ai.kr</div>
    </div>
    <div class="field">
      <label class="field-label">이메일</label>
      <input class="inp" id="l-email" type="email" placeholder="이메일">
    </div>
    <div class="field">
      <label class="field-label">비밀번호</label>
      <input class="inp" id="l-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')_doLogin()">
    </div>
    <div id="l-err" style="color:var(--red);font-size:11px;text-align:center;min-height:14px;margin-bottom:8px"></div>
    <button class="btn btn-acc" style="width:100%;padding:12px;font-size:14px" onclick="_doLogin()">로그인</button>
    <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--text3)">
      정산 → <a href="https://donway.ai.kr" style="color:var(--blue)">donway.ai.kr</a>
    </div>
  </div>
</div>

<!-- 앱 -->
<div id="app-screen" style="display:none">
  <div class="mobile-header">
    <div style="font-size:14px;font-weight:900;color:var(--pink)">🖥️ 키오스크·POS</div>
    <button class="btn btn-gray" style="padding:5px 9px;font-size:11px" onclick="document.getElementById('sidebar').style.display='flex'">☰</button>
  </div>
  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-title">🖥️ FILO POS</div>
        <div class="sb-logo-sub">키오스크·매출·예약</div>
      </div>
      <div class="sb-user">
        <div id="sb-company" style="font-weight:700;color:var(--text2);margin-bottom:1px"></div>
        <div id="sb-email" style="font-size:10px"></div>
<div id="sb-expiry" style="font-size:10px;margin-top:3px;color:var(--text3)"></div>
      </div>
      <div class="nav">
        <div class="nav-section">매출</div>
        <div class="nav-item active" id="nav-input" onclick="_nav(this,'input')"><span class="nav-icon">✍️</span>시술 입력</div>
        <div class="nav-item" id="nav-today" onclick="_nav(this,'today')"><span class="nav-icon">📊</span>오늘 매출</div>
        <div class="nav-item" id="nav-staff" onclick="_nav(this,'staff')"><span class="nav-icon">👤</span>직원별 현황</div>
        <div class="nav-section">관리</div>
        <div class="nav-item" id="nav-bookings" onclick="_nav(this,'bookings')">
          <span class="nav-icon">📅</span>오늘 예약
          <span id="booking-count" style="display:none;margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700"></span>
        </div>
        <div class="nav-item" id="nav-menu" onclick="_nav(this,'menu')"><span class="nav-icon">💆</span>서비스 메뉴</div>
        <div class="nav-item" id="nav-stats" onclick="_nav(this,'stats')"><span class="nav-icon">📈</span>매출 통계</div>
    <div class="nav-item" id="nav-customer" onclick="_nav(this,'customer')"><span class="nav-icon">🗂</span>고객 DB</div>
        <div class="nav-section">연결</div>
        <div class="nav-item" onclick="window.open('https://donway.ai.kr/settle','_blank')"><span class="nav-icon">💰</span>DONWAY 정산</div>
        <div class="nav-item" onclick="window.open('https://filo.ai.kr/inventory','_blank')"><span class="nav-icon">📦</span>재고관리</div>
        <div class="nav-item" onclick="window.open('https://filo.ai.kr/qr','_blank')"><span class="nav-icon">🔲</span>QR 관리</div>
      </div>
      <div class="sb-footer">
        <button class="btn btn-gray" style="width:100%;font-size:11px" onclick="_logout()">로그아웃</button>
      </div>
    </div>
    <div class="main" id="main-content">
      <div style="text-align:center;padding:40px;color:var(--text3)">⏳ 로딩 중...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
  authDomain:'mbti-logistics.firebaseapp.com',
  projectId:'mbti-logistics',
  storageBucket:'mbti-logistics.firebasestorage.app',
  messagingSenderId:'40761160761',
  appId:'1:40761160761:web:20545b610f03f534e949e8'
});
var _db=firebase.firestore();
var _auth=firebase.auth();
var _cu=null;
var _dealer=null;
var _services=[];
var _designers=[];
var _today=new Date().toISOString().slice(0,10);
var _ym=_today.slice(0,7);

function toast(msg,dur){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},dur||2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function comma(n){return Number(n||0).toLocaleString();}
function _getDid(){return _dealer?_dealer.id:(_cu?_cu.uid:'');}

// ━━━ 인증 + 구독 게이트 ━━━
function _showSubGate(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='none';
  var g=document.getElementById('sub-gate');
  if(!g){
    g=document.createElement('div');
    g.id='sub-gate';
    g.style.cssText='position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
    g.innerHTML='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 32px;max-width:400px;width:100%;text-align:center">'+
      '<div style="font-size:48px;margin-bottom:16px">🔒</div>'+
      '<div style="font-size:18px;font-weight:900;margin-bottom:8px">구독이 필요합니다</div>'+
      '<div style="font-size:13px;color:var(--text3);line-height:1.7;margin-bottom:24px">'+
        '키오스크·POS 기능을 이용하려면<br>filo.ai.kr 구독이 필요합니다.<br>'+
        '<b style="color:#7b2fff">월 50,000원</b> (VAT별도)'+
      '</div>'+
      '<a href="tel:051-711-3103" style="display:block;padding:14px;background:linear-gradient(90deg,#7b2fff,#a855f7);color:#fff;border-radius:12px;font-size:14px;font-weight:900;text-decoration:none;margin-bottom:10px">📞 051-711-3103 도입 문의</a>'+
      '<a href="https://donway.ai.kr/join" style="display:block;padding:12px;background:var(--bg3);color:var(--text2);border-radius:12px;font-size:13px;font-weight:700;text-decoration:none">온라인 신청하기 →</a>'+
    '</div>';
    document.body.appendChild(g);
  }
  g.style.display='flex';
}

_auth.onAuthStateChanged(function(user){
  if(!user){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
    return;
  }
  _cu=user;
    _linkAccount(user.email);
  document.getElementById('sb-email').textContent=user.email||'';

  _db.collection('companies').where('adminEmail','==',user.email).limit(1).get()
  .then(function(snap){
    if(!snap.empty){_dealer=snap.docs[0].data();_dealer.id=snap.docs[0].id;document.getElementById('sb-company').textContent=_dealer.companyName||'';}
    // ★ 구독 체크
    var subs=(_dealer&&_dealer.subscriptions)||{};
    var ks=subs.kiosk||{};
    var today=new Date().toISOString().slice(0,10);
    var isActive=!!(ks.active && (!ks.expiry || ks.expiry >= today));
    var _SA_EMAILS=['kimdh4790@gmail.com','soungkyekim@naver.com'];
    var _isSA=_SA_EMAILS.indexOf((user&&user.email)||'')>=0;
    var _kExp=document.getElementById('sb-expiry');
      if(_kExp){
        if(_isSA){_kExp.textContent='슈퍼어드민';_kExp.style.color='var(--blue)';}
        else{_kExp.textContent=ks.expiry?'만료: '+ks.expiry:'구독 활성';_kExp.style.color=(ks.expiry&&ks.expiry<today)?'#ef4444':'#059669';}
      }
      if(!isActive && !_isSA){_showSubGate();return;}
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    _loadMeta();
    _nav(document.getElementById('nav-input'),'input');
    _startBookingListener();
  }).catch(function(){_nav(document.getElementById('nav-input'),'input');});
});

function _doLogin(){
  var e=(document.getElementById('l-email')||{}).value||'';
  var p=(document.getElementById('l-pw')||{}).value||'';
  var err=document.getElementById('l-err');
  if(!e||!p){if(err)err.textContent='이메일과 비밀번호 입력';return;}
  _auth.signInWithEmailAndPassword(e,p).catch(function(){if(err)err.textContent='로그인 실패';});
}
function _logout(){_auth.signOut().then(function(){location.reload();});}

// ━━━ 메타 로드 (서비스·직원) ━━━
function _loadMeta(){
  var did=_getDid();
  _db.collection('mbetco_services').where('dealerId','==',did).get()
  .then(function(snap){_services=[];snap.forEach(function(d){_services.push(Object.assign({id:d.id},d.data()));});})
  .catch(function(){});
  _db.collection('ind_workers').where('dealerId','==',did).get()
  .then(function(snap){_designers=[];snap.forEach(function(d){_designers.push(Object.assign({id:d.id},d.data()));});})
  .catch(function(){});
}

// ━━━ 네비게이션 ━━━
function _nav(el,page){
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  if(el)el.classList.add('active');
  document.getElementById('sidebar').style.display='';
  var c=document.getElementById('main-content');
  if(page==='input') _pageInput(c);
  else if(page==='today') _pageToday(c);
  else if(page==='staff') _pageStaff(c);
  else if(page==='bookings') _pageBookings(c);
  else if(page==='menu') _pageMenu(c);
  else if(page==='customer') _pageCustomer(c);
  else if(page==='stats') _statsPage(c,_getDid(),'mbetco_sales','date','finalPrice','💰 매출');
  else if(page==='monthly') _pageMonthly(c);
  else if(page==='payroll') _pagePayroll(c);
  else if(page==='crm') _pageCustomerCRM(c);
  else if(page==='payslip') _pagePayslip(c);
  else if(page==='industry') _pageIndustry(c);
  else if(page==='beauty') _pageBeautyRecord(c);
  else if(page==='consent') _pageConsent(c);
  else if(page==='sched') _pageSchedule(c);
  else if(page==='laundry') _pageLaundry(c);
  else if(page==='rooms') _pageRooms(c);
  else if(page==='points') _pagePoints(c);
  else if(page==='membership') _pageMembership(c);
  else if(page==='link') _pageOnlineLink(c);
}

// ━━━ 시술 입력 ━━━
function _pageInput(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  c.innerHTML=
    '<div class="page-title">✍️ 시술 입력</div>'+
    '<div class="card">'+
      '<div class="field"><label class="field-label">담당 디자이너</label>'+
        '<select class="inp" id="inp-designer">'+
          '<option value="">선택</option>'+
          _designers.map(function(d){return '<option value="'+esc(d.id)+'">'+esc(d.name||d.workerName||'')+'</option>';}).join('')+
        '</select>'+
      '</div>'+
      '<div class="field"><label class="field-label">고객명</label><input class="inp" id="inp-cust" placeholder="고객명 (선택)"></div>'+
      '<div class="field"><label class="field-label">연락처</label><input class="inp" id="inp-phone" type="tel" placeholder="010-0000-0000"></div>'+
    '</div>'+
    '<div class="field-label" style="margin-bottom:8px">서비스 선택</div>'+
    '<div class="service-grid" id="service-grid">'+
      (_services.length?
        _services.map(function(s){
          return '<div class="service-card" data-id="'+s.id+'" data-name="'+esc(s.name)+'" data-price="'+s.price+'" onclick="_selectService(this)">'+
            '<div class="s-name">'+esc(s.name)+'</div>'+
            '<div class="s-price">₩'+comma(s.price)+'</div>'+
          '</div>';
        }).join(''):
        '<div style="color:var(--text3);font-size:12px;grid-column:1/-1">서비스 메뉴 탭에서 먼저 등록하세요</div>'
      )+
    '</div>'+
    '<div class="card" id="inp-summary" style="display:none">'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">선택 서비스</div>'+
      '<div id="inp-selected"></div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'+
        '<div style="font-size:13px;font-weight:700">합계</div>'+
        '<div id="inp-total" style="font-size:18px;font-weight:900;color:var(--pink)">₩0</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-top:10px">'+
        '<div class="field" style="flex:1;margin:0">'+
          '<label class="field-label">할인</label>'+
          '<input class="inp" id="inp-discount" type="number" placeholder="0" oninput="_calcTotal()">'+
        '</div>'+
        '<div class="field" style="flex:1;margin:0">'+
          '<label class="field-label">결제방법</label>'+
          '<select class="inp" id="inp-paymethod">'+
            '<option value="card">카드</option>'+
            '<option value="cash">현금</option>'+
            '<option value="transfer">계좌이체</option>'+
            '<option value="kakao">카카오페이</option>'+
          '</select>'+
        '</div>'+
      '</div>'+
      '<button class="btn btn-acc" style="width:100%;padding:12px;font-size:14px;margin-top:10px" onclick="_saveSale()">💳 결제 완료</button>'+
    '</div>';
  window._selectedServices=[];
}

var _selectedServices=[];
function _selectService(el){
  var id=el.dataset.id;
  var idx=_selectedServices.findIndex(function(s){return s.id===id;});
  if(idx>=0){_selectedServices.splice(idx,1);el.classList.remove('selected');}
  else{_selectedServices.push({id:id,name:el.dataset.name,price:parseInt(el.dataset.price)||0});el.classList.add('selected');}
  _calcTotal();
  var summary=document.getElementById('inp-summary');
  if(summary)summary.style.display=_selectedServices.length?'block':'none';
}

function _calcTotal(){
  var discount=parseInt((document.getElementById('inp-discount')||{}).value)||0;
  var subtotal=_selectedServices.reduce(function(a,s){return a+s.price;},0);
  var total=Math.max(0,subtotal-discount);
  var sel=document.getElementById('inp-selected');
  if(sel)sel.innerHTML=_selectedServices.map(function(s){return '<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>'+esc(s.name)+'</span><span>₩'+comma(s.price)+'</span></div>';}).join('');
  var tot=document.getElementById('inp-total');
  if(tot)tot.textContent='₩'+comma(total);
}

function _saveSale(){
  if(!_selectedServices.length){toast('서비스를 선택하세요');return;}
  var did=_getDid();
  var designerId=(document.getElementById('inp-designer')||{}).value||'';
  var designer=_designers.find(function(d){return d.id===designerId;});
  var custName=(document.getElementById('inp-cust')||{}).value||'';
  var custPhone=(document.getElementById('inp-phone')||{}).value||'';
  var discount=parseInt((document.getElementById('inp-discount')||{}).value)||0;
  var payMethod=(document.getElementById('inp-paymethod')||{}).value||'card';
  var subtotal=_selectedServices.reduce(function(a,s){return a+s.price;},0);
  var finalPrice=Math.max(0,subtotal-discount);

  // 원가 계산 (서비스별 costRate 기반)
  var costAmt = _selectedServices.reduce(function(a,s){
    return a + Math.round((s.price||0)*((s.costRate||0)/100));
  },0);
  // 직원 수수료 계산
  var commissionAmt = 0;
  if(designer && designer.commissionRate) {
    commissionAmt = Math.round(finalPrice * (designer.commissionRate/100));
  }
  var netProfit = finalPrice - costAmt - commissionAmt;

  var data={
    dealerId:did,
    designerId:designerId,
    designerName:designer?designer.name||designer.workerName||'':'',
    workerIds:[designerId],
    custName:custName,
    custPhone:custPhone,
    services:_selectedServices,
    serviceNames:_selectedServices.map(function(s){return s.name;}).join(', '),
    subtotal:subtotal,
    discount:discount,
    finalPrice:finalPrice,
    costAmt:costAmt,
    commissionAmt:commissionAmt,
    netProfit:netProfit,
    payMethod:payMethod,
    date:_today,
    ym:_ym,
    time:new Date().toTimeString().slice(0,5),
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  _db.collection('mbetco_sales').add(data).then(function(){
    // 고객 DB 업데이트
    if(custPhone){
      var custRef=_db.collection('mbetco_customers').doc(did+'_'+custPhone.replace(/\D/g,''));
      custRef.set({
        dealerId:did,name:custName,phone:custPhone,
        lastVisit:_today,lastService:data.serviceNames,lastAmount:finalPrice
      },{merge:true});
      custRef.update({
        totalVisits: firebase.firestore.FieldValue.increment(1),
        totalSpent: firebase.firestore.FieldValue.increment(finalPrice),
        visitCount: firebase.firestore.FieldValue.increment(1)
      });
    }
    toast('✅ 결제 완료! ₩'+comma(finalPrice),3000);
    _selectedServices=[];
    _nav(document.getElementById('nav-input'),'input');
  }).catch(function(e){toast('❌ '+e.message);});
}

function _pageBookings(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  c.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
      '<div class="page-title" style="margin:0">📅 오늘 예약 · '+_today+'</div>'+
      '<button class="btn btn-gray" style="font-size:11px" onclick="_pageBookings()">🔄</button>'+
    '</div>'+
    '<div id="booking-list"><div style="text-align:center;padding:20px;color:var(--text3)">⏳</div></div>';

  _db.collection('mbetco_bookings').where('dealerId','==',did)
  .where('date','==',_today).orderBy('time','asc').get()
  .then(function(snap){
    var el=document.getElementById('booking-list');if(!el)return;
    var badge=document.getElementById('booking-count');
    var waiting=snap.docs.filter(function(d){return (d.data().status||'waiting')==='waiting';});
    if(badge){badge.textContent=waiting.length;badge.style.display=waiting.length?'inline':'none';}
    if(snap.empty){
      el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">'+
        '<div style="font-size:28px;margin-bottom:8px">📅</div>'+
        '<div>오늘 예약 없음</div>'+
        '<div style="font-size:11px;margin-top:6px">QR 예약 링크를 고객에게 공유하세요</div>'+
      '</div>';
      return;
    }
    el.innerHTML=snap.docs.map(function(d){
      var v=d.data();var id=d.id;
      var status=v.status||'waiting';
      var colors={waiting:'var(--acc)',done:'var(--green)',cancel:'var(--red)'};
      var labels={waiting:'대기',done:'완료',cancel:'취소'};
      return '<div class="booking-card">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
          '<div>'+
            '<div style="font-size:14px;font-weight:900">'+esc(v.time||'')+'</div>'+
            '<div style="font-size:13px;font-weight:700;margin-top:2px">'+esc(v.custName||'이름없음')+'</div>'+
            '<div style="font-size:11px;color:var(--text3)">'+esc(v.custPhone||'')+'</div>'+
          '</div>'+
          '<span class="badge" style="background:rgba(var(--acc-rgb),.15);color:'+colors[status]+'">'+labels[status]+'</span>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-top:6px">'+
          '👤 '+esc(v.designerName||'미배정')+' · '+esc(v.serviceName||'')+' · ₩'+comma(v.servicePrice||0)+
        '</div>'+
        (status==='waiting'?
          '<div style="display:flex;gap:6px;margin-top:8px">'+
            '<button class="btn btn-green" style="flex:1;font-size:11px" data-id="'+id+'" onclick="_bookingDone(this)">✅ 완료</button>'+
            '<button class="btn btn-red" style="flex:1;font-size:11px" data-id="'+id+'" onclick="_bookingCancel(this)">취소</button>'+
          '</div>':'')+'</div>';
    }).join('');
  });
}

function _bookingDone(btn){
  _db.collection('mbetco_bookings').doc(btn.dataset.id)
  .update({status:'done',doneAt:new Date().toISOString()})
  .then(function(){toast('✅ 완료 처리');_pageBookings();})
  .catch(function(e){toast('❌ '+e.message);});
}
function _bookingCancel(btn){
  if(!confirm('예약을 취소하시겠습니까?'))return;
  _db.collection('mbetco_bookings').doc(btn.dataset.id)
  .update({status:'cancel',cancelAt:new Date().toISOString()})
  .then(function(){toast('취소 처리됨');_pageBookings();})
  .catch(function(e){toast('❌ '+e.message);});
}

// 실시간 예약 알림
function _startBookingListener(){
  var did=_getDid();
  _db.collection('mbetco_bookings').where('dealerId','==',did)
  .where('date','==',_today).where('status','==','waiting')
  .onSnapshot(function(snap){
    var badge=document.getElementById('booking-count');
    if(badge){badge.textContent=snap.size;badge.style.display=snap.size?'inline':'none';}
    if(snap.docChanges){
      snap.docChanges().forEach(function(change){
        if(change.type==='added'&&window._bkListening){
          var v=change.doc.data();
          toast('🔔 새 예약! '+(v.custName||'')+'님 '+(v.time||''),4000);
        }
      });
      window._bkListening=true;
    }
  });
}

function _loadPointSettings(did) {
  _db.collection('mbetco_settings').doc(did).get().then(function(snap) {
    if(!snap.exists) return;
    var v = snap.data();
    if(v.pointRate !== undefined) {
      var el = document.getElementById('pt-rate');
      if(el) el.value = v.pointRate;
      _POINT_RATE = v.pointRate;
    }
    if(v.pointMin !== undefined) {
      var el2 = document.getElementById('pt-min');
      if(el2) el2.value = v.pointMin;
    }
  });
}

function _savePointSettings() {
  var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');
  var rate = parseInt((document.getElementById('pt-rate')||{}).value||'3');
  var min = parseInt((document.getElementById('pt-min')||{}).value||'1000');

function _searchPoint() {

function _addPoint(custId) {
  var amt = parseInt((document.getElementById('pt-add-amt')||{}).value||'0');
  if(!amt) { toast('금액을 입력하세요'); return; }
  var pts = Math.floor(amt * (_POINT_RATE/100));
  var ref = _db.collection('mbetco_customers').doc(custId);
  ref.update({ points: firebase.firestore.FieldValue.increment(pts) })
    .then(function() {
      toast('✅ ' + pts.toLocaleString() + 'P 적립');
      _db.collection('mbetco_point_log').add({
        custId: custId, type: 'add', pts: pts, amt: amt,
        at: new Date().toISOString()
      });
      _searchPoint();
    });
}

function _usePoint(custId, curPts) {
  var use = parseInt((document.getElementById('pt-use-amt')||{}).value||'0');
  if(!use) { toast('사용 포인트를 입력하세요'); return; }
  if(use > curPts) { toast('포인트가 부족합니다 (보유: '+curPts+'P)'); return; }
  _db.collection('mbetco_customers').doc(custId).update({
    points: firebase.firestore.FieldValue.increment(-use)
  }).then(function() {
    toast('✅ ' + use.toLocaleString() + 'P 사용');
    _db.collection('mbetco_point_log').add({
      custId: custId, type: 'use', pts: -use, at: new Date().toISOString()
    });
    _searchPoint();
  });
}

function _loadPointSummary(did) {
  _db.collection('mbetco_customers').where('dealerId','==',did)

function _issueMembership() {
  var did = window._mbDid;
  var phone = (document.getElementById('mb-phone')||{}).value.replace(/\D/g,'');
  var cname = (document.getElementById('mb-cname')||{}).value.trim();
  var typeId = (document.getElementById('mb-type-sel')||{}).value;
  var pay = (document.getElementById('mb-pay')||{}).value;
  if(!phone||!cname||!typeId){ toast('모든 항목을 입력하세요'); return; }
  var mbType = (window._mbTypeDocs||[]).find(function(t){ return t.id===typeId; });
  if(!mbType){ toast('상품을 선택하세요'); return; }

  var now = new Date();
  var startDate = now.toISOString().slice(0,10);
  var endDate = '';
  if(mbType.mbType === 'period') {
    var exp = new Date(now);
    exp.setDate(exp.getDate() + mbType.value);
    endDate = exp.toISOString().slice(0,10);
  }

  _db.collection('mbetco_memberships').add({
    dealerId:did, custPhone:phone, custName:cname,
    mbTypeId:typeId, mbTypeName:mbType.name,
    mbType:mbType.mbType, price:mbType.price,
    totalValue:mbType.value, remainValue:mbType.value,
    payMethod:pay, startDate:startDate, endDate:endDate,
    active:true, createdAt:now.toISOString()
  }).then(function(){
    // 매출에도 기록
    _db.collection('mbetco_sales').add({
      dealerId:did, custName:cname, custPhone:phone,
      serviceNames:'회원권: '+mbType.name,
      finalPrice:mbType.price, payMethod:pay,
      date:startDate, ym:startDate.slice(0,7),
      isMembership:true, createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('✅ 회원권 발급 완료');
    _mbSellForm(document.getElementById('mb-content'));
  });
}

function _mbList(c) {
  var did = window._mbDid;
  c.innerHTML = '<div style="text-align:center;padding:16px;color:#475569">⏳</div>';
  _db.collection('mbetco_memberships').where('dealerId','==',did)
    .where('active','==',true).orderBy('createdAt','desc').limit(30).get()
    .then(function(snap) {
      if(snap.empty){ c.innerHTML='<div style="text-align:center;padding:16px;color:#475569">발급된 회원권 없음</div>'; return; }
      var today = new Date().toISOString().slice(0,10);
      var tl = {amount:'금액권',count:'횟수권',period:'기간권'};
      c.innerHTML = snap.docs.map(function(doc){
        var v = doc.data();
        var expired = v.mbType==='period' && v.endDate && v.endDate < today;
        var remaining = v.mbType==='amount' ? '₩'+v.remainValue.toLocaleString()+'원 잔액' :
                        v.mbType==='count' ? v.remainValue+'회 남음' :
                        expired ? '만료' : v.endDate+'까지';
        return '<div style="background:var(--bg2,#0d1b3e);border:1px solid '+(expired?'rgba(239,68,68,.3)':'var(--border,rgba(0,102,255,.2))')+';border-radius:10px;padding:12px;margin-bottom:8px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<div>' +
              '<div style="font-size:13px;font-weight:800">' + v.custName + ' <span style="font-size:10px;color:#94a3b8">' + v.custPhone + '</span></div>' +
              '<div style="font-size:11px;color:#00d4ff;margin-top:2px">' + v.mbTypeName + ' · ' + (tl[v.mbType]||'') + '</div>' +
            '</div>' +
            '<div style="text-align:right">' +
              '<div style="font-size:13px;font-weight:800;color:'+(expired?'#ef4444':'#22c55e')+'">' + remaining + '</div>' +
              (v.mbType!=='period' ? '<button onclick="_useMembership(\'' + doc.id + '\',\'' + v.mbType + '\',' + v.remainValue + ')" style="margin-top:4px;padding:4px 8px;background:rgba(0,102,255,.15);color:#0066ff;border:none;border-radius:6px;font-size:10px;cursor:pointer">사용</button>' : '') +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    });
}

function _useMembership(id, mbType, remain) {
  var use = parseInt(prompt(mbType==='amount'?'사용 금액 입력':'사용 횟수 입력 (남은: '+remain+'회)', mbType==='count'?'1':'') || '0');
  if(!use||use<=0) return;
  if(use > remain){ toast('잔여량 초과'); return; }
  var newRemain = remain - use;
  _db.collection('mbetco_memberships').doc(id).update({
    remainValue: newRemain,
    active: newRemain > 0
  }).then(function(){
    toast('✅ 사용 처리 완료 (잔여: ' + newRemain + ')');
    _mbList(document.getElementById('mb-content'));
  });
}

function _slipShift(dir) {
  var ym = window._slipYm;
  var d = new Date(ym+'-01'); d.setMonth(d.getMonth()+dir);
  window._slipYm = d.toISOString().slice(0,7);
  var lbl = document.getElementById('slip-ym');
  if(lbl) lbl.textContent = window._slipYm;
  var did = _getDid ? _getDid() : (_dealer?_dealer.id:'');
  _loadPayslips(did, window._slipYm);
}

function _loadPayslips(did, ym) {
  Promise.all([
    _db.collection('mbetco_workers').where('dealerId','==',did).where('active','==',true).get(),
    _db.collection('mbetco_sales').where('dealerId','==',did).where('ym','==',ym).get(),
    _db.collection('attendance').where('dealerId','==',did).where('ym','==',ym).get()
  ]).then(function(results) {
    var workers=[]; results[0].forEach(function(d){ workers.push(Object.assign({id:d.id},d.data())); });
    var sales=[]; results[1].forEach(function(d){ sales.push(d.data()); });
    var attends=[]; results[2].forEach(function(d){ attends.push(d.data()); });

    var el = document.getElementById('slip-list');
    if(!el) return;
    if(!workers.length){ el.innerHTML='<div style="text-align:center;padding:16px;color:#475569">등록된 직원 없음</div>'; return; }

    // 직원별 출퇴근 집계
    var workerAttend = {};
    attends.forEach(function(a) {
      var wid = a.workerId||a.workerName||'';
      if(!workerAttend[wid]) workerAttend[wid]={days:0,hours:0,overtime:0,night:0,holiday:0};
      workerAttend[wid].days++;
      var hrs = parseFloat(a.workHours||a.hours||8);
      workerAttend[wid].hours += hrs;
      if(hrs > 8) workerAttend[wid].overtime += (hrs-8);
    });

    // 직원별 매출
    var workerSales={};
    sales.forEach(function(s){
      var wid=s.designerId||s.workerIds&&s.workerIds[0]||s.designerName||'';
      if(!workerSales[wid]) workerSales[wid]=0;
      workerSales[wid]+=s.finalPrice||0;
    });

    el.innerHTML = workers.map(function(w) {
      var att = workerAttend[w.id]||workerAttend[w.name]||{days:0,hours:0,overtime:0,night:0,holiday:0};
      var salesAmt = workerSales[w.id]||workerSales[w.name]||0;
      var base = w.basePay||0;
      var commission = (w.payType==='commission'||w.payType==='mixed') ? Math.round(salesAmt*((w.commissionRate||0)/100)) : 0;
      var overtime = Math.round((base/209)*(att.overtime||0)*1.5);
      var night = Math.round((base/209)*(att.night||0)*0.5);
      var gross = base + commission + overtime + night;
      var calc = _calcInsurance(gross, w.employType||'employee');
      var payDate = ym + '-25'; // 기본 25일
      var tl = {employee:'직원',contractor:'사업자',freelancer:'프리랜서'};

      return '<div style="background:var(--bg2,#0d1b3e);border:1px solid var(--border,rgba(0,102,255,.2));border-radius:12px;padding:14px;margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
          '<div>' +
            '<div style="font-size:13px;font-weight:800">' + w.name + '</div>' +
            '<div style="font-size:10px;color:#94a3b8">' + (tl[w.employType]||'직원') + ' · ' + (w.role||'') + '</div>' +
          '</div>' +
          '<button onclick="_printPayslip(\'' + w.id + '\',\'' + w.name + '\',' + gross + ',' + calc.netPay + ',\'' + ym + '\',\'' + payDate + '\','+ att.days + ',' + att.hours + ',' + (att.overtime||0) + ',' + commission + ',' + overtime + '," + JSON.stringify(calc.deductions) + ")" style="padding:6px 10px;background:rgba(0,102,255,.15);color:#0066ff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">📄 명세서</button>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">' +
          '<div style="background:rgba(0,0,0,.2);border-radius:6px;padding:8px"><div style="color:#475569">근무일수</div><div style="font-weight:700;margin-top:2px">' + att.days + '일</div></div>' +
          '<div style="background:rgba(0,0,0,.2);border-radius:6px;padding:8px"><div style="color:#475569">총 근무시간</div><div style="font-weight:700;margin-top:2px">' + att.hours.toFixed(1) + 'h</div></div>' +
          '<div style="background:rgba(0,0,0,.2);border-radius:6px;padding:8px"><div style="color:#475569">총 지급액</div><div style="font-weight:700;color:#0066ff;margin-top:2px">₩' + gross.toLocaleString() + '</div></div>' +
          '<div style="background:rgba(0,0,0,.2);border-radius:6px;padding:8px"><div style="color:#475569">실수령액</div><div style="font-weight:700;color:#22c55e;margin-top:2px">₩' + calc.netPay.toLocaleString() + '</div></div>' +
        '</div>' +
      '</div>';
    }).join('');
  });
}

function _printPayslip(wid, wname, gross, net, ym, payDate, days, hours, overtime, commission, overtimePay, deductions) {
  if(typeof deductions === 'string') { try{ deductions=JSON.parse(deductions); }catch(e){ deductions={}; } }
  var dLabels = {pension:'국민연금',health:'건강보험',longterm:'장기요양보험',employment:'고용보험',incomeTax:'소득세',localTax:'지방소득세',incomeTax33:'원천세(3.3%)'};
  var totalDed = Object.values(deductions).reduce(function(a,b){return a+(b||0);},0);

  var html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;overflow-y:auto;padding:16px" onclick="this.remove()">' +
    '<div style="background:#fff;border-radius:12px;padding:20px;max-width:400px;margin:0 auto;color:#1e293b" onclick="event.stopPropagation()">' +
      // 헤더
      '<div style="text-align:center;border-bottom:2px solid #0066ff;padding-bottom:12px;margin-bottom:14px">' +
        '<div style="font-size:16px;font-weight:900;color:#0066ff">임금명세서</div>' +
        '<div style="font-size:11px;color:#64748b;margin-top:2px">근로기준법 제48조 · ' + ym + '</div>' +
      '</div>' +
      // 근로자 정보
      '<div style="background:#f8fafc;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px">' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">' +
          '<div><span style="color:#64748b">성명</span><br><strong>' + wname + '</strong></div>' +
          '<div><span style="color:#64748b">임금지급일</span><br><strong>' + payDate + '</strong></div>' +
          '<div><span style="color:#64748b">근로일수</span><br><strong>' + days + '일</strong></div>' +
          '<div><span style="color:#64748b">총 근무시간</span><br><strong>' + hours + 'h</strong></div>' +
          (overtime > 0 ? '<div><span style="color:#64748b">연장근로</span><br><strong>' + overtime + 'h</strong></div>' : '') +
        '</div>' +
      '</div>' +
      // 지급 내역
      '<div style="margin-bottom:12px">' +
        '<div style="font-size:12px;font-weight:700;color:#0066ff;margin-bottom:6px">지급 내역</div>' +
        _payslipRow('기본급', gross - commission - overtimePay) +
        (commission>0 ? _payslipRow('수수료', commission) : '') +
        (overtimePay>0 ? _payslipRow('연장근로수당', overtimePay) : '') +
        '<div style="border-top:1px solid #e2e8f0;margin-top:6px;padding-top:6px">' +
          _payslipRow('임금 합계', gross, true) +
        '</div>' +
      '</div>' +
      // 공제 내역
      '<div style="margin-bottom:12px">' +
        '<div style="font-size:12px;font-weight:700;color:#ef4444;margin-bottom:6px">공제 내역</div>' +
        Object.entries(deductions).map(function(e){ return _payslipRow(dLabels[e[0]]||e[0], e[1]); }).join('') +
        '<div style="border-top:1px solid #e2e8f0;margin-top:6px;padding-top:6px">' +
          _payslipRow('공제 합계', totalDed, true, '#ef4444') +
        '</div>' +
      '</div>' +
      // 실수령액
      '<div style="background:linear-gradient(135deg,#0066ff,#00d4ff);border-radius:10px;padding:14px;text-align:center;color:#fff;margin-bottom:14px">' +
        '<div style="font-size:11px;opacity:.8">실수령액</div>' +
        '<div style="font-size:24px;font-weight:900">₩' + net.toLocaleString() + '</div>' +
      '</div>' +
      '<div style="font-size:10px;color:#94a3b8;text-align:center;margin-bottom:12px">' +
        '이 명세서는 근로기준법 제48조에 따라 발급됩니다' +
      '</div>' +
      '<div style="display:flex;gap:8px">' +
        '<button onclick="window.print()" style="flex:1;padding:10px;background:#0066ff;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">🖨️ 인쇄</button>' +
        '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="flex:1;padding:10px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:12px;cursor:pointer">닫기</button>' +
      '</div>' +
    '</div>' +
  '</div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function _payslipRow(label, amt, bold, color) {

    '<span style="color:#475569">' + label + '</span>' +
    '<span style="' + (color?'color:'+color+';':'') + '">' + (typeof amt==='number'?'₩'+amt.toLocaleString():amt) + '</span>' +

}

      '본인은 시술 전 충분한 상담을 받았으며, 위에 기재한 알러지 및 특이사항 외에 해당 시술에 영향을 미칠 수 있는 의학적 사항이 없음을 확인합니다. 시술 중 발생할 수 있는 일반적인 부작용(두피 자극, 색상 편차 등)에 대해 안내받았으며 이에 동의합니다.' +
    '</div>' +
    '<div style="font-size:12px;font-weight:700;margin-bottom:8px">서명</div>' +
    '<canvas id="sig-canvas" style="width:100%;height:120px;background:#fff;border-radius:8px;touch-action:none;border:1px solid rgba(0,102,255,.2)"></canvas>' +
    '<div style="display:flex;gap:8px;margin-top:8px">' +
      '<button onclick="_clearSig()" style="padding:9px 14px;background:rgba(239,68,68,.12);color:#ef4444;border:none;border-radius:8px;font-size:12px;cursor:pointer">지우기</button>' +
      '<button onclick="_saveConsent()" style="flex:1;padding:9px;background:linear-gradient(135deg,#0066ff,#00d4ff);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">✅ 동의서 저장</button>' +

    var drawing = false;
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var src = e.touches ? e.touches[0] : e;
      return {x:(src.clientX-rect.left)*(canvas.width/rect.width), y:(src.clientY-rect.top)*(canvas.height/rect.height)};
    }
    canvas.addEventListener('mousedown', function(e){ drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
    canvas.addEventListener('mousemove', function(e){ if(!drawing)return; var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.stroke(); });
    canvas.addEventListener('mouseup', function(){ drawing=false; });
    canvas.addEventListener('touchstart', function(e){ e.preventDefault(); drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
    canvas.addEventListener('touchmove', function(e){ e.preventDefault(); if(!drawing)return; var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.stroke(); });
    canvas.addEventListener('touchend', function(){ drawing=false; });
  }, 100);
}

function _loadSchedules(did, date) {
  _db.collection('mbetco_schedules').where('dealerId','==',did).where('date','==',date)

      '<input id="rm-price" placeholder="기본요금" type="number" style="width:100px;padding:10px;border-radius:8px;border:1px solid var(--border,rgba(0,102,255,.2));background:var(--bg3,#1e3a5f);color:#e2e8f0;font-size:13px">' +
      '<button onclick="_saveRoom()" style="padding:10px 14px;background:#0066ff;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">추가</button>' +
    '</div>' +
    '<div id="rm-setup-list"><div style="text-align:center;padding:12px;color:#475569">⏳</div></div>';

  _db.collection('mbetco_rooms').where('dealerId','==',did).get().then(function(snap){
    var el = document.getElementById('rm-setup-list');
    if(!el) return;
    if(snap.empty){ el.innerHTML='<div style="color:#475569;font-size:12px;text-align:center;padding:8px">등록된 객실 없음</div>'; return; }
    el.innerHTML = snap.docs.map(function(d){
      var v = d.data();
      return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg2,#0d1b3e);border:1px solid var(--border,rgba(0,102,255,.2));border-radius:8px;padding:10px 12px;margin-bottom:6px">' +
        '<div><div style="font-size:12px;font-weight:700">' + v.name + '</div><div style="font-size:10px;color:#94a3b8">₩' + (v.price||0).toLocaleString() + '/박</div></div>' +
        '<button onclick="_db.collection(\'mbetco_rooms\').doc(\'' + d.id + '\').delete().then(function(){toast(\'삭제됨\');_roomSetup(document.getElementById(\'rm-content\'))})" style="padding:4px 8px;background:rgba(239,68,68,.12);color:#ef4444;border:none;border-radius:6px;font-size:10px;cursor:pointer">삭제</button>' +
      '</div>';
    }).join('');
  });
}

function _saveRoom() {
  var did = window._rmDid;
  var name=(document.getElementById('rm-name')||{}).value.trim();
  var price=parseInt((document.getElementById('rm-price')||{}).value||'0');
  if(!name){ toast('객실명을 입력하세요'); return; }
  _db.collection('mbetco_rooms').add({
    dealerId:did, name:name, price:price, active:true
  }).then(function(){ toast('✅ 객실 추가'); _roomSetup(document.getElementById('rm-content')); });
}
</script>
</body>
</html>
