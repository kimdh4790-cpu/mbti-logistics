<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>키오스크·POS — mbtico.kr</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#171a24;--bg3:#1e2130;--border:#2e3250;--text:#e8eaf6;--text2:#9da3c8;--text3:#5a5f7a;--acc:#f59e0b;--green:#00ff94;--red:#ff4d6d;--blue:#00d4ff;--purple:#a78bfa;--pink:#f472b6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
/* 사이드바 */
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:16px;border-bottom:1px solid var(--border)}
.sb-logo-title{font-size:16px;font-weight:900;color:var(--pink)}
.sb-logo-sub{font-size:10px;color:var(--text3);margin-top:2px}
.sb-user{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text3)}
.nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--pink);border-left-color:var(--pink)}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-section{padding:10px 14px 3px;font-size:10px;font-weight:700;color:var(--text3)}
.sb-footer{padding:10px 14px;border-top:1px solid var(--border)}
/* 메인 */
.main{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.page-title{font-size:15px;font-weight:900;margin-bottom:14px}
/* 카드 */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
/* 테이블 */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:7px 10px;text-align:left;color:var(--text3);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:var(--bg3)}
/* 버튼 */
.btn{padding:7px 12px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-acc{background:var(--pink);color:#fff}
.btn-blue{background:rgba(0,212,255,.15);border:1px solid var(--blue);color:var(--blue)}
.btn-gray{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.btn-red{background:rgba(255,77,109,.15);border:1px solid var(--red);color:var(--red)}
.btn-green{background:rgba(0,255,148,.15);border:1px solid var(--green);color:var(--green)}
/* 입력 */
.inp{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.inp:focus{outline:none;border-color:var(--pink)}
.field{margin-bottom:10px}
.field-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:3px;display:block}
/* 배지 */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.badge-green{background:rgba(0,255,148,.15);color:var(--green)}
.badge-red{background:rgba(255,77,109,.15);color:var(--red)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--acc)}
.badge-blue{background:rgba(0,212,255,.15);color:var(--blue)}
/* 팝업 */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.popup-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.popup-title{font-size:14px;font-weight:900;margin-bottom:14px}
/* 토스트 */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:12px;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
/* 시술 입력 그리드 */
.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.service-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:all .2s}
.service-card:hover,.service-card.selected{border-color:var(--pink);background:rgba(244,114,182,.08)}
.service-card .s-name{font-size:12px;font-weight:700;margin-bottom:3px}
.service-card .s-price{font-size:14px;font-weight:900;color:var(--pink)}
/* 통계 카드 */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:900;color:var(--pink)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
/* 모바일 */
@media(max-width:600px){
  .sidebar{display:none}
  .mobile-header{display:flex!important}
}
.mobile-header{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
/* 로그인 */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:30px 26px;width:100%;max-width:340px}
/* 예약 카드 */
.booking-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:30px;margin-bottom:6px">🖥️</div>
      <div style="font-size:18px;font-weight:900;color:var(--pink)">키오스크·POS</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">mbtico.kr</div>
    </div>
    <div class="field">
      <label class="field-label">이메일</label>
      <input class="inp" id="l-email" type="email" placeholder="이메일">
    </div>
    <div class="field">
      <label class="field-label">비밀번호</label>
      <input class="inp" id="l-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')_doLogin()">
    </div>
    <div id="l-err" style="color:var(--red);font-size:11px;text-align:center;min-height:14px;margin-bottom:8px"></div>
    <button class="btn btn-acc" style="width:100%;padding:12px;font-size:14px" onclick="_doLogin()">로그인</button>
    <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--text3)">
      정산 → <a href="https://donway.ai.kr" style="color:var(--blue)">donway.ai.kr</a>
    </div>
  </div>
</div>

<!-- 앱 -->
<div id="app-screen" style="display:none">
  <div class="mobile-header">
    <div style="font-size:14px;font-weight:900;color:var(--pink)">🖥️ 키오스크·POS</div>
    <button class="btn btn-gray" style="padding:5px 9px;font-size:11px" onclick="document.getElementById('sidebar').style.display='flex'">☰</button>
  </div>
  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-title">🖥️ mbtico POS</div>
        <div class="sb-logo-sub">키오스크·매출·예약</div>
      </div>
      <div class="sb-user">
        <div id="sb-company" style="font-weight:700;color:var(--text2);margin-bottom:1px"></div>
        <div id="sb-email" style="font-size:10px"></div>
      </div>
      <div class="nav">
        <div class="nav-section">매출</div>
        <div class="nav-item active" id="nav-input" onclick="_nav(this,'input')"><span class="nav-icon">✍️</span>시술 입력</div>
        <div class="nav-item" id="nav-today" onclick="_nav(this,'today')"><span class="nav-icon">📊</span>오늘 매출</div>
        <div class="nav-item" id="nav-staff" onclick="_nav(this,'staff')"><span class="nav-icon">👤</span>직원별 현황</div>
        <div class="nav-section">관리</div>
        <div class="nav-item" id="nav-bookings" onclick="_nav(this,'bookings')">
          <span class="nav-icon">📅</span>오늘 예약
          <span id="booking-count" style="display:none;margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700"></span>
        </div>
        <div class="nav-item" id="nav-menu" onclick="_nav(this,'menu')"><span class="nav-icon">💆</span>서비스 메뉴</div>
        <div class="nav-item" id="nav-customer" onclick="_nav(this,'customer')"><span class="nav-icon">🗂</span>고객 DB</div>
        <div class="nav-section">연결</div>
        <div class="nav-item" onclick="window.open('https://donway.ai.kr/settle','_blank')"><span class="nav-icon">💰</span>DONWAY 정산</div>
        <div class="nav-item" onclick="window.open('https://mbtico.kr/inventory','_blank')"><span class="nav-icon">📦</span>재고관리</div>
        <div class="nav-item" onclick="window.open('https://mbtico.kr/qr','_blank')"><span class="nav-icon">🔲</span>QR 관리</div>
      </div>
      <div class="sb-footer">
        <button class="btn btn-gray" style="width:100%;font-size:11px" onclick="_logout()">로그아웃</button>
      </div>
    </div>
    <div class="main" id="main-content">
      <div style="text-align:center;padding:40px;color:var(--text3)">⏳ 로딩 중...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
  authDomain:'mbti-logistics.firebaseapp.com',
  projectId:'mbti-logistics',
  storageBucket:'mbti-logistics.firebasestorage.app',
  messagingSenderId:'40761160761',
  appId:'1:40761160761:web:20545b610f03f534e949e8'
});
var _db=firebase.firestore();
var _auth=firebase.auth();
var _cu=null;
var _dealer=null;
var _services=[];
var _designers=[];
var _today=new Date().toISOString().slice(0,10);
var _ym=_today.slice(0,7);

function toast(msg,dur){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},dur||2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function comma(n){return Number(n||0).toLocaleString();}
function _getDid(){return _dealer?_dealer.id:(_cu?_cu.uid:'');}

// ━━━ 인증 + 구독 게이트 ━━━
function _showSubGate(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='none';
  var g=document.getElementById('sub-gate');
  if(!g){
    g=document.createElement('div');
    g.id='sub-gate';
    g.style.cssText='position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
    g.innerHTML='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 32px;max-width:400px;width:100%;text-align:center">'+
      '<div style="font-size:48px;margin-bottom:16px">🔒</div>'+
      '<div style="font-size:18px;font-weight:900;margin-bottom:8px">구독이 필요합니다</div>'+
      '<div style="font-size:13px;color:var(--text3);line-height:1.7;margin-bottom:24px">'+
        '키오스크·POS 기능을 이용하려면<br>mbtico.kr 구독이 필요합니다.<br>'+
        '<b style="color:#7b2fff">월 50,000원</b> (VAT별도)'+
      '</div>'+
      '<a href="tel:051-711-3103" style="display:block;padding:14px;background:linear-gradient(90deg,#7b2fff,#a855f7);color:#fff;border-radius:12px;font-size:14px;font-weight:900;text-decoration:none;margin-bottom:10px">📞 051-711-3103 도입 문의</a>'+
      '<a href="https://donway.ai.kr/join" style="display:block;padding:12px;background:var(--bg3);color:var(--text2);border-radius:12px;font-size:13px;font-weight:700;text-decoration:none">온라인 신청하기 →</a>'+
    '</div>';
    document.body.appendChild(g);
  }
  g.style.display='flex';
}

_auth.onAuthStateChanged(function(user){
  if(!user){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
    return;
  }
  _cu=user;
  document.getElementById('sb-email').textContent=user.email||'';

  _db.collection('companies').where('adminEmail','==',user.email).limit(1).get()
  .then(function(snap){
    if(!snap.empty){_dealer=snap.docs[0].data();_dealer.id=snap.docs[0].id;document.getElementById('sb-company').textContent=_dealer.companyName||'';}
    // ★ 구독 체크
    var subs=(_dealer&&_dealer.subscriptions)||{};
    var ks=subs.kiosk||{};
    var today=new Date().toISOString().slice(0,10);
    var isActive=!!(ks.active && (!ks.expiry || ks.expiry >= today));
    if(!isActive){_showSubGate();return;}
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    _loadMeta();
    _nav(document.getElementById('nav-input'),'input');
    _startBookingListener();
  }).catch(function(){_nav(document.getElementById('nav-input'),'input');});
});

function _doLogin(){
  var e=(document.getElementById('l-email')||{}).value||'';
  var p=(document.getElementById('l-pw')||{}).value||'';
  var err=document.getElementById('l-err');
  if(!e||!p){if(err)err.textContent='이메일과 비밀번호 입력';return;}
  _auth.signInWithEmailAndPassword(e,p).catch(function(){if(err)err.textContent='로그인 실패';});
}
function _logout(){_auth.signOut().then(function(){location.reload();});}

// ━━━ 메타 로드 (서비스·직원) ━━━
function _loadMeta(){
  var did=_getDid();
  _db.collection('mbetco_services').where('dealerId','==',did).get()
  .then(function(snap){_services=[];snap.forEach(function(d){_services.push(Object.assign({id:d.id},d.data()));});})
  .catch(function(){});
  _db.collection('ind_workers').where('dealerId','==',did).get()
  .then(function(snap){_designers=[];snap.forEach(function(d){_designers.push(Object.assign({id:d.id},d.data()));});})
  .catch(function(){});
}

// ━━━ 네비게이션 ━━━
function _nav(el,page){
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  if(el)el.classList.add('active');
  document.getElementById('sidebar').style.display='';
  var c=document.getElementById('main-content');
  if(page==='input') _pageInput(c);
  else if(page==='today') _pageToday(c);
  else if(page==='staff') _pageStaff(c);
  else if(page==='bookings') _pageBookings(c);
  else if(page==='menu') _pageMenu(c);
  else if(page==='customer') _pageCustomer(c);
}

// ━━━ 시술 입력 ━━━
function _pageInput(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  c.innerHTML=
    '<div class="page-title">✍️ 시술 입력</div>'+
    '<div class="card">'+
      '<div class="field"><label class="field-label">담당 디자이너</label>'+
        '<select class="inp" id="inp-designer">'+
          '<option value="">선택</option>'+
          _designers.map(function(d){return '<option value="'+esc(d.id)+'">'+esc(d.name||d.workerName||'')+'</option>';}).join('')+
        '</select>'+
      '</div>'+
      '<div class="field"><label class="field-label">고객명</label><input class="inp" id="inp-cust" placeholder="고객명 (선택)"></div>'+
      '<div class="field"><label class="field-label">연락처</label><input class="inp" id="inp-phone" type="tel" placeholder="010-0000-0000"></div>'+
    '</div>'+
    '<div class="field-label" style="margin-bottom:8px">서비스 선택</div>'+
    '<div class="service-grid" id="service-grid">'+
      (_services.length?
        _services.map(function(s){
          return '<div class="service-card" data-id="'+s.id+'" data-name="'+esc(s.name)+'" data-price="'+s.price+'" onclick="_selectService(this)">'+
            '<div class="s-name">'+esc(s.name)+'</div>'+
            '<div class="s-price">₩'+comma(s.price)+'</div>'+
          '</div>';
        }).join(''):
        '<div style="color:var(--text3);font-size:12px;grid-column:1/-1">서비스 메뉴 탭에서 먼저 등록하세요</div>'
      )+
    '</div>'+
    '<div class="card" id="inp-summary" style="display:none">'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">선택 서비스</div>'+
      '<div id="inp-selected"></div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'+
        '<div style="font-size:13px;font-weight:700">합계</div>'+
        '<div id="inp-total" style="font-size:18px;font-weight:900;color:var(--pink)">₩0</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-top:10px">'+
        '<div class="field" style="flex:1;margin:0">'+
          '<label class="field-label">할인</label>'+
          '<input class="inp" id="inp-discount" type="number" placeholder="0" oninput="_calcTotal()">'+
        '</div>'+
        '<div class="field" style="flex:1;margin:0">'+
          '<label class="field-label">결제방법</label>'+
          '<select class="inp" id="inp-paymethod">'+
            '<option value="card">카드</option>'+
            '<option value="cash">현금</option>'+
            '<option value="transfer">계좌이체</option>'+
            '<option value="kakao">카카오페이</option>'+
          '</select>'+
        '</div>'+
      '</div>'+
      '<button class="btn btn-acc" style="width:100%;padding:12px;font-size:14px;margin-top:10px" onclick="_saveSale()">💳 결제 완료</button>'+
    '</div>';
  window._selectedServices=[];
}

var _selectedServices=[];
function _selectService(el){
  var id=el.dataset.id;
  var idx=_selectedServices.findIndex(function(s){return s.id===id;});
  if(idx>=0){_selectedServices.splice(idx,1);el.classList.remove('selected');}
  else{_selectedServices.push({id:id,name:el.dataset.name,price:parseInt(el.dataset.price)||0});el.classList.add('selected');}
  _calcTotal();
  var summary=document.getElementById('inp-summary');
  if(summary)summary.style.display=_selectedServices.length?'block':'none';
}

function _calcTotal(){
  var discount=parseInt((document.getElementById('inp-discount')||{}).value)||0;
  var subtotal=_selectedServices.reduce(function(a,s){return a+s.price;},0);
  var total=Math.max(0,subtotal-discount);
  var sel=document.getElementById('inp-selected');
  if(sel)sel.innerHTML=_selectedServices.map(function(s){return '<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>'+esc(s.name)+'</span><span>₩'+comma(s.price)+'</span></div>';}).join('');
  var tot=document.getElementById('inp-total');
  if(tot)tot.textContent='₩'+comma(total);
}

function _saveSale(){
  if(!_selectedServices.length){toast('서비스를 선택하세요');return;}
  var did=_getDid();
  var designerId=(document.getElementById('inp-designer')||{}).value||'';
  var designer=_designers.find(function(d){return d.id===designerId;});
  var custName=(document.getElementById('inp-cust')||{}).value||'';
  var custPhone=(document.getElementById('inp-phone')||{}).value||'';
  var discount=parseInt((document.getElementById('inp-discount')||{}).value)||0;
  var payMethod=(document.getElementById('inp-paymethod')||{}).value||'card';
  var subtotal=_selectedServices.reduce(function(a,s){return a+s.price;},0);
  var finalPrice=Math.max(0,subtotal-discount);

  var data={
    dealerId:did,
    designerId:designerId,
    designerName:designer?designer.name||designer.workerName||'':'',
    custName:custName,
    custPhone:custPhone,
    services:_selectedServices,
    serviceNames:_selectedServices.map(function(s){return s.name;}).join(', '),
    subtotal:subtotal,
    discount:discount,
    finalPrice:finalPrice,
    payMethod:payMethod,
    date:_today,
    ym:_ym,
    time:new Date().toTimeString().slice(0,5),
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  _db.collection('mbetco_sales').add(data).then(function(){
    // 고객 DB 업데이트
    if(custPhone){
      var custRef=_db.collection('mbetco_customers').doc(did+'_'+custPhone.replace(/\D/g,''));
      custRef.set({
        dealerId:did,name:custName,phone:custPhone,
        lastVisit:_today,lastService:data.serviceNames,lastAmount:finalPrice
      },{merge:true});
      custRef.update({visitCount:firebase.firestore.FieldValue.increment(1)});
    }
    toast('✅ 결제 완료! ₩'+comma(finalPrice),3000);
    _selectedServices=[];
    _nav(document.getElementById('nav-input'),'input');
  }).catch(function(e){toast('❌ '+e.message);});
}

// ━━━ 오늘 매출 ━━━
function _pageToday(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  c.innerHTML='<div class="page-title">📊 오늘 매출 · '+_today+'</div>'+
    '<div class="stat-grid" id="today-stats"><div style="text-align:center;padding:20px;color:var(--text3)">⏳</div></div>'+
    '<div id="today-list"></div>';

  _db.collection('mbetco_sales').where('dealerId','==',did).where('date','==',_today)
  .orderBy('createdAt','desc').get()
  .then(function(snap){
    var total=0,count=0,byPay={};
    snap.forEach(function(d){var v=d.data();total+=v.finalPrice||0;count++;byPay[v.payMethod]=(byPay[v.payMethod]||0)+(v.finalPrice||0);});
    var el=document.getElementById('today-stats');
    if(el)el.innerHTML=
      '<div class="stat-card"><div class="stat-val">'+count+'건</div><div class="stat-label">오늘 시술</div></div>'+
      '<div class="stat-card"><div class="stat-val">₩'+comma(total)+'</div><div class="stat-label">오늘 매출</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:var(--blue)">₩'+comma(byPay.card||0)+'</div><div class="stat-label">카드</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:var(--green)">₩'+comma(byPay.cash||0)+'</div><div class="stat-label">현금</div></div>';

    var el2=document.getElementById('today-list');
    if(!el2)return;
    if(snap.empty){el2.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">오늘 매출 없음</div>';return;}
    el2.innerHTML='<div class="table-wrap"><table>'+
      '<tr><th>시간</th><th>담당</th><th>서비스</th><th>금액</th><th>결제</th></tr>'+
      snap.docs.map(function(d){
        var v=d.data();
        return '<tr>'+
          '<td>'+esc(v.time||'')+'</td>'+
          '<td>'+esc(v.designerName||'')+'</td>'+
          '<td style="font-size:11px">'+esc(v.serviceNames||'')+'</td>'+
          '<td style="font-weight:700;color:var(--pink)">₩'+comma(v.finalPrice||0)+'</td>'+
          '<td><span class="badge badge-blue">'+esc(v.payMethod||'')+'</span></td>'+
        '</tr>';
      }).join('')+
    '</table></div>';
  });
}

// ━━━ 직원별 현황 ━━━
function _pageStaff(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  c.innerHTML='<div class="page-title">👤 직원별 현황 · '+_ym+'</div>'+
    '<div id="staff-list"><div style="text-align:center;padding:20px;color:var(--text3)">⏳</div></div>';

  _db.collection('mbetco_sales').where('dealerId','==',did).where('ym','==',_ym).get()
  .then(function(snap){
    var byStaff={};
    snap.forEach(function(d){
      var v=d.data();
      var name=v.designerName||'미배정';
      if(!byStaff[name])byStaff[name]={count:0,total:0};
      byStaff[name].count++;
      byStaff[name].total+=v.finalPrice||0;
    });
    var el=document.getElementById('staff-list');if(!el)return;
    if(!Object.keys(byStaff).length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">이번달 데이터 없음</div>';return;}
    el.innerHTML='<div class="table-wrap"><table>'+
      '<tr><th>직원명</th><th>시술 건수</th><th>매출 합계</th><th>평균 단가</th></tr>'+
      Object.entries(byStaff).sort(function(a,b){return b[1].total-a[1].total;}).map(function(e){
        return '<tr>'+
          '<td style="font-weight:700">'+esc(e[0])+'</td>'+
          '<td>'+e[1].count+'건</td>'+
          '<td style="color:var(--pink);font-weight:700">₩'+comma(e[1].total)+'</td>'+
          '<td style="color:var(--text3)">₩'+comma(Math.round(e[1].total/e[1].count))+'</td>'+
        '</tr>';
      }).join('')+
    '</table></div>';
  });
}

// ━━━ 오늘 예약 ━━━
function _pageBookings(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  c.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
      '<div class="page-title" style="margin:0">📅 오늘 예약 · '+_today+'</div>'+
      '<button class="btn btn-gray" style="font-size:11px" onclick="_pageBookings()">🔄</button>'+
    '</div>'+
    '<div id="booking-list"><div style="text-align:center;padding:20px;color:var(--text3)">⏳</div></div>';

  _db.collection('mbetco_bookings').where('dealerId','==',did)
  .where('date','==',_today).orderBy('time','asc').get()
  .then(function(snap){
    var el=document.getElementById('booking-list');if(!el)return;
    var badge=document.getElementById('booking-count');
    var waiting=snap.docs.filter(function(d){return (d.data().status||'waiting')==='waiting';});
    if(badge){badge.textContent=waiting.length;badge.style.display=waiting.length?'inline':'none';}
    if(snap.empty){
      el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">'+
        '<div style="font-size:28px;margin-bottom:8px">📅</div>'+
        '<div>오늘 예약 없음</div>'+
        '<div style="font-size:11px;margin-top:6px">QR 예약 링크를 고객에게 공유하세요</div>'+
      '</div>';
      return;
    }
    el.innerHTML=snap.docs.map(function(d){
      var v=d.data();var id=d.id;
      var status=v.status||'waiting';
      var colors={waiting:'var(--acc)',done:'var(--green)',cancel:'var(--red)'};
      var labels={waiting:'대기',done:'완료',cancel:'취소'};
      return '<div class="booking-card">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
          '<div>'+
            '<div style="font-size:14px;font-weight:900">'+esc(v.time||'')+'</div>'+
            '<div style="font-size:13px;font-weight:700;margin-top:2px">'+esc(v.custName||'이름없음')+'</div>'+
            '<div style="font-size:11px;color:var(--text3)">'+esc(v.custPhone||'')+'</div>'+
          '</div>'+
          '<span class="badge" style="background:rgba(var(--acc-rgb),.15);color:'+colors[status]+'">'+labels[status]+'</span>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-top:6px">'+
          '👤 '+esc(v.designerName||'미배정')+' · '+esc(v.serviceName||'')+' · ₩'+comma(v.servicePrice||0)+
        '</div>'+
        (status==='waiting'?
          '<div style="display:flex;gap:6px;margin-top:8px">'+
            '<button class="btn btn-green" style="flex:1;font-size:11px" data-id="'+id+'" onclick="_bookingDone(this)">✅ 완료</button>'+
            '<button class="btn btn-red" style="flex:1;font-size:11px" data-id="'+id+'" onclick="_bookingCancel(this)">취소</button>'+
          '</div>':'')+'</div>';
    }).join('');
  });
}

function _bookingDone(btn){
  _db.collection('mbetco_bookings').doc(btn.dataset.id)
  .update({status:'done',doneAt:new Date().toISOString()})
  .then(function(){toast('✅ 완료 처리');_pageBookings();})
  .catch(function(e){toast('❌ '+e.message);});
}
function _bookingCancel(btn){
  if(!confirm('예약을 취소하시겠습니까?'))return;
  _db.collection('mbetco_bookings').doc(btn.dataset.id)
  .update({status:'cancel',cancelAt:new Date().toISOString()})
  .then(function(){toast('취소 처리됨');_pageBookings();})
  .catch(function(e){toast('❌ '+e.message);});
}

// 실시간 예약 알림
function _startBookingListener(){
  var did=_getDid();
  _db.collection('mbetco_bookings').where('dealerId','==',did)
  .where('date','==',_today).where('status','==','waiting')
  .onSnapshot(function(snap){
    var badge=document.getElementById('booking-count');
    if(badge){badge.textContent=snap.size;badge.style.display=snap.size?'inline':'none';}
    if(snap.docChanges){
      snap.docChanges().forEach(function(change){
        if(change.type==='added'&&window._bkListening){
          var v=change.doc.data();
          toast('🔔 새 예약! '+(v.custName||'')+'님 '+(v.time||''),4000);
        }
      });
      window._bkListening=true;
    }
  });
}

// ━━━ 서비스 메뉴 ━━━
function _pageMenu(c){
  if(!c)c=document.getElementById('main-content');
  var did=_getDid();
  c.innerHTML=
    '<div class="page-title">💆 서비스 메뉴</div>'+
    '<div class="card">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<div class="field" style="margin:0"><label class="field-label">서비스명</label><input class="inp" id="mn" placeholder="예) 커트"></div>'+
        '<div class="field" style="margin:0"><label class="field-label">금액 (원)</label><input class="inp" id="mp" type="number" placeholder="0"></div>'+
      '</div>'+
      '<button class="btn btn-acc" style="width:100%;margin-top:8px" onclick="_addMenu()">+ 추가</button>'+
    '</div>'+
    '<div id="menu-list"><div style="text-align:center;padding:20px;color:var(--text3)">⏳</div></div>';

  _db.collection('mbetco_services').where('dealerId','==',did).get()
  .then(function(snap){
    var el=document.getElementById('menu-list');if(!el)return;
    if(snap.empty){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">등록된 서비스 없음</div>';return;}
    el.innerHTML='<div class="table-wrap"><table>'+
      '<tr><th>서비스명</th><th>금액</th><th></th></tr>'+
      snap.docs.map(function(d){
        var v=d.data();
        return '<tr><td style="font-weight:700">'+esc(v.name||'')+'</td><td style="color:var(--pink);font-weight:700">₩'+comma(v.price||0)+'</td>'+
          '<td><button class="btn btn-red" style="padding:3px 8px;font-size:10px" onclick="_delMenu(\''+d.id+'\')">삭제</button></td></tr>';
      }).join('')+
    '</table></div>';
    _services=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  });
}

function _addMenu(){
  var n=(document.getElementById('mn')||{}).value||'';
  var p=parseFloat((document.getElementById('mp')||{}).value)||0;
  if(!n||!p){toast('서비스명과 금액을 입력하세요');return;}
  var did=_getDid();
  _db.collection('mbetco_services').add({dealerId:did,name:n,price:p,useCount:0,createdAt:new Date().toISOString()})
  .then(function(){toast('✅ 등록됨');_pageMenu(document.getElementById('main-content'));})
  .catch(function(e){toast('❌ '+e.message);});
}
function _delMenu(id){
  if(!confirm('삭제하시겠습니까?'))return;
  _db.collection('mbetco_services').doc(id).delete()
  .then(function(){toast('삭제됨');_pageMenu(document.getElementById('main-content'));})
  .catch(function(e){toast('❌ '+e.message);});
}

// ━━━ 고객 DB ━━━

    '<div id="cust-list"><div style="text-align:center;padding:20px;color:var(--text3)">⏳</div></div>';

  _db.collection('mbetco_customers').where('dealerId','==',did)

        '</tr>';
