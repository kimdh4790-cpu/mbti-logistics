<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DONWAY 데이터 패치</title>
<style>
body{background:#0a0a14;color:#e8e8f0;font-family:sans-serif;padding:20px;max-width:600px;margin:0 auto}
.card{background:#10101a;border:1px solid #1a1a2e;border-radius:12px;padding:20px;margin-bottom:12px}
button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:sans-serif}
.btn-blue{background:#0066ff;color:#fff}
.btn-red{background:#dc2626;color:#fff}
.btn-green{background:#059669;color:#fff}
input{width:100%;padding:10px;border:1px solid #1a1a2e;border-radius:8px;background:#0a0a14;color:#e8e8f0;font-size:14px;margin-bottom:10px;box-sizing:border-box}
.log{background:#000;border-radius:8px;padding:14px;font-family:monospace;font-size:12px;max-height:300px;overflow-y:auto;white-space:pre-wrap}
.ok{color:#00ff88}.err{color:#ff4466}.info{color:#00d4ff}.warn{color:#f59e0b}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:18px;font-weight:900;margin-bottom:4px">🔧 DONWAY 데이터 패치</div>
  <div style="font-size:12px;color:#666;margin-bottom:16px">dealerId 없는 문서에 현재 로그인 UID를 일괄 추가합니다</div>
  <div id="auth-area">
    <input type="email" id="email" placeholder="이메일" value="kimdh4790@gmail.com">
    <input type="password" id="pw" placeholder="비밀번호">
    <button class="btn-blue" onclick="doLogin()">로그인</button>
  </div>
  <div id="patch-area" style="display:none">
    <div style="font-size:13px;margin-bottom:10px">로그인: <span id="uid-display" style="color:#00d4ff"></span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn-blue" onclick="runPatch()">🚀 전체 패치 실행</button>
      <button class="btn-red" onclick="doLogout()">로그아웃</button>
    </div>
    <div style="font-size:11px;color:#666;margin-bottom:10px">
      패치 대상: drivers, settlements, attendance, settings, notices,
      delivery_sessions, hourly_settlements, visitors, leave_payments,
      overtimes, leaves, accidents, activity, emergency_deliveries
    </div>
  </div>
</div>
<div class="card">
  <div style="font-size:13px;font-weight:700;margin-bottom:8px">📋 패치 로그</div>
  <div class="log" id="log">대기 중...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:'AIzaSyDQmEFfLczgCuPQidunbBXqaHWgs39VMg0',
  authDomain:'mbti-logistics.firebaseapp.com',
  projectId:'mbti-logistics',
  storageBucket:'mbti-logistics.firebasestorage.app',
  messagingSenderId:'40761160761',
  appId:'1:40761160761:web:20545b610f03f534e949e8'
});
var _db=firebase.firestore(), _auth=firebase.auth();
var _uid='';

function log(msg,cls){
  var el=document.getElementById('log');
  el.innerHTML+='<span class="'+(cls||'')+'">['+new Date().toLocaleTimeString('ko-KR')+'] '+msg+'</span>\n';
  el.scrollTop=el.scrollHeight;
}

_auth.onAuthStateChanged(function(user){
  if(user){
    _uid=user.uid;
    document.getElementById('auth-area').style.display='none';
    document.getElementById('patch-area').style.display='block';
    document.getElementById('uid-display').textContent=user.email+' ('+user.uid+')';
    log('✅ 로그인 완료: '+user.email,'ok');
    log('UID: '+user.uid,'info');
  } else {
    document.getElementById('auth-area').style.display='block';
    document.getElementById('patch-area').style.display='none';
  }
});

function doLogin(){
  var email=document.getElementById('email').value.trim();
  var pw=document.getElementById('pw').value;
  _auth.signInWithEmailAndPassword(email,pw).catch(function(e){log('❌ 로그인 실패: '+e.message,'err');});
}
function doLogout(){_auth.signOut();}

async function patchCollection(colName){
  log('📂 '+colName+' 패치 시작...','info');
  try{
    var snap=await _db.collection(colName).get();
    var noPatch=snap.docs.filter(function(d){return !d.data().dealerId;});
    log('  총 '+snap.size+'개 / dealerId 없는 것: '+noPatch.length+'개');
    if(!noPatch.length){log('  ✅ 이미 모두 패치됨','ok');return {total:snap.size,patched:0};}
    
    // 배치로 처리 (500개 제한)
    var batches=[];
    for(var i=0;i<noPatch.length;i+=400){
      batches.push(noPatch.slice(i,i+400));
    }
    var totalPatched=0;
    for(var b=0;b<batches.length;b++){
      var batch=_db.batch();
      batches[b].forEach(function(doc){
        batch.update(doc.ref,{dealerId:_uid});
      });
      await batch.commit();
      totalPatched+=batches[b].length;
      log('  배치 '+(b+1)+'/'+batches.length+' 완료 ('+totalPatched+'개)');
    }
    log('  ✅ '+colName+' 패치 완료: '+totalPatched+'개','ok');
    return {total:snap.size,patched:totalPatched};
  }catch(e){
    log('  ❌ '+colName+' 오류: '+e.message,'err');
    return {total:0,patched:0,error:e.message};
  }
}

async function runPatch(){
  if(!_uid){log('❌ 로그인 필요','err');return;}
  log('🚀 전체 패치 시작! UID='+_uid,'warn');
  
  var cols=[
    'drivers','settlements','attendance','settings','notices',
    'delivery_sessions','hourly_settlements','visitors','leave_payments',
    'overtimes','leaves','accidents','activity','emergency_deliveries',
    'campSupports','inquiries','complaints','photo_logs','driver_locations',
    'admin_notifications','temp_logs','deliveries','device_tokens',
    'driver_notifications','vehicles','expenses','contracts',
    'signatures','driverDocs','cal_memos','roster_week'
  ];
  
  var total=0,patched=0;
  for(var i=0;i<cols.length;i++){
    var r=await patchCollection(cols[i]);
    total+=r.total||0;
    patched+=r.patched||0;
  }
  
  log('','');
  log('🎉 전체 패치 완료!','ok');
  log('  전체 문서: '+total+'개','info');
  log('  패치된 문서: '+patched+'개','ok');
  log('','');
  log('✅ 이제 Firestore Rules에서 ownedOrLegacy → ownedByDealer로 강화하세요!','warn');
}
</script>
</body>
</html>
